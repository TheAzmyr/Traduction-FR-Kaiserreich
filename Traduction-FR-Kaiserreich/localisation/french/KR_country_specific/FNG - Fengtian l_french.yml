 FNG_chinese_tanks: "Programme Local de Guerre Blindée"

 FNG_beiyang_popular_support_intro:9 "L'image populaire d'un seigneur de la guerre est celle d'un tyran arbitraire : un autocrate cruel et inculte, peu soucieux de la vie humaine, entouré d'une cour décadente composée de vices et de flagorneurs. La réalité est beaucoup plus nuancée. De nombreux seigneurs de la guerre étaient bien éduqués et se tenaient informés des tendances politiques internationales, et si la plupart avaient un côté impitoyable, cela n'avait rien d'inhabituel en Chine. De plus, ils ne régnaient guère seuls : ils étaient soutenus par un réseau complexe de politiciens, de généraux, d'élites économiques, de personnalités sociales et d'intellectuels."

 FNG_popular_support_twin_dragons_taming_the_water:9 "Esprit Fédéraliste : §cDragons Jumeaux Domptant l'Eau§!"
 FNG_popular_support_twin_dragons_taming_the_water_desc:9 "Le Fédéralisme chinois moderne a connu son apogée et son déclin au cours de la première moitié des années 1920. Une coalition de constitutionnalistes, de démocrates et de régionalistes s'est formée au plus fort de l'ère des seigneurs de la guerre, alors que l'impasse entre le Nord et le Sud persistait. Leurs appels aux différentes provinces pour qu'elles s'efforcent de mettre en place une autonomie locale, puis de s'unir pacifiquement au sein d'une république fédérale, ont suscité un certain intérêt, mais après des débuts prometteurs, ils ont été rejetés par les gouvernements du Nord et du Sud, puis discrédité davantage par l'unification réussie par la force menée par le Zhili.\n\nDans ce qui ressemble presque à une cruelle plaisanterie, il semblerait que la dernière tentative en date pour combler le fossé entre le Nord et le Sud ait été la plus fructueuse ; enfin, après des décennies, la nation est unie dans des termes quelque peu amicaux. Cependant, la situation est loin d'être authentique. Avec Zhang Junmai propulsé au poste de Premier ministre de compromis pour un président qui préfère profiter des plaisirs de l'hédonisme plutôt que de se soucier de la gouvernance, le gouvernement s'est retrouvé miraculeusement inefficace, même dans les tâches les plus élémentaires de la gouvernance. Unie en surface, il suffit d'un coup d'œil sous la surface pour constater toutes les fissures qui apparaissent dans les structures hâtivement mises en place par la République."

 FNG_popular_support_the_finely_oiled_machine:9 "Légitimité Politique : §cLa Machine Bien Huilée§!"
 FNG_popular_support_the_finely_oiled_machine_desc:9 "$FNG_beiyang_popular_support_intro$\n\nÀ l'instar d'un entrepreneur qui dirige son entreprise, les différents maestros, maîtres et cadres supérieurs qui entourent le président Xueliang, distant, ont repris confiance et mènent désormais la politique comme bon leur semble. Dotée d'actifs, d'influence, de connaissances et de savoir-faire, la Clique des Communications est passée d'une position insignifiante à une place prépondérante au niveau national. Quiconque est quelqu'un, ou souhaite le devenir, doit graisser les rouages de la machine politique des Communications, et en retour être généreusement récompensé pour ses efforts. La politique et l'ingérence des politiciens peuvent passer au second plan, car la gestion économique et la reconstruction sont les antidotes nécessaires aux maux de la Chine."

 FNG_popular_support_in_the_eye_of_the_beiyang_tiger:9 "Légitimité Politique : §gDans l'Oeil du Tigre de Beiyang§!"
 FNG_popular_support_in_the_eye_of_the_beiyang_tiger_desc:9 "$FNG_beiyang_popular_support_intro$\n\nMiraculeusement, il semblerait que les leçons apprises par Duan Qirui et sa Clique de l'Anhui n'aient pas nécessairement disparu avec la perte de leur statut, car leurs méthodes ont été observées, étudiées et renforcées pour donner naissance à une toute nouvelle méthode de domination. Autrefois composée d'un groupe hétéroclite de politiciens exilés et de ratés, la Ligue pour la Reconquête a réussi à renforcer ses effectifs grâce à une expertise indéniable sous le couvert des Cinq Races, et grâce aux efforts d'hommes tels que Pan Fu, Gu Weijun et Wang Yitang, le Vieux Maréchal semble avoir vu son souhait se réaliser : un État totalement soumis à lui et à sa famille, composé de savants avisés comme au bon vieux temps."

 FNG_popular_support_stewardship_of_providence:9 "Légitimité Politique : §nIntendant de la Providence§!"
 FNG_popular_support_stewardship_of_providence_desc:9 "$FNG_beiyang_popular_support_intro$\n\nPeu de gens croiraient que le carriérisme et la méritocratie constituent des obstacles physiques à la possibilité de gravir les échelons, mais ces personnes n'auraient alors pas été bien accueillies au sein de la Clique du Fengtian. Ennemis de longue date du Jeune Maréchal et de ses partisans, Yang Yuting et sa Clique Shikan ont réussi à naviguer dans le bourbier familial du Fengtian et à renverser les décennies de domination de la famille Zhang. Avec une attitude napoléonienne, en s'inspirant des leçons apprises des Japonais et en collaborant avec la Clique des Communications et le Parti Jeune Chine, le président Yang a redonné modernité, progrès et vitalité à l'Empire du Milieu en déclin."

 FNG_popular_support_a_chinese_shogun:9 "Légitimité Politique : §PUn Shogun Chinois§!"
 FNG_popular_support_a_chinese_shogun_desc:9 "$FNG_beiyang_popular_support_intro$\n\nCurieusement, il semblerait que les attitudes écrasantes dissuadant un partenariat panasiatique "égalitaire" entre la Chine et le Japon aient été balayées par l'ascension du président Yang Yuting. Mettant fin à des décennies de domination du Clan Zhang, le président Yang ne s'est pas tourné vers sa propre Clique Shikan, bien que celle-ci continue de jouer un rôle prépondérant, mais plutôt vers l'hétéroclite Association Concordia. Prônant une véritable collaboration panasiatique et l'aspiration à un avenir meilleur pour l'Asie, le soi-disant "Shogun chinois" maintient une ligne pragmatique de conformité avec Tokyo, car il est inévitable que la Chine retrouve avec le temps sa position dominante en Asie."

 FNG_popular_support_the_marionette_regime:9 "Légitimité Politique : §nLe Régime Fantoche§!"
 FNG_popular_support_the_marionette_regime_desc:9 "$FNG_beiyang_popular_support_intro$\n\nEnfin divisé, l'Empire du Milieu a finalement été mis sous la coupe du Soleil levant. Compte tenu des circonstances qui ont conduit à la promulgation du Gouvernement réformé, l'Armée du Kwantung a étendu ses opérations au-delà de la Mandchourie et, en collaboration avec les forces japonaises à Tianjin, Shanghai et ailleurs, a pris les rênes de la formation du nouveau gouvernement "national" chinois. Ayant trouvé en Zhang Jinghui, un ancien homme du Fengtian et du Zhili sans charisme et macabre, un pion malléable, le Régime fantoche est en réalité dirigé par l'entourage du Président : les Japonais, les gardiens de la Clique des Communications et toutes sortes d'autres opportunistes."

 FNG_popular_support_beiyangs_compradors:9 "Légitimité Politique : §gLes Compradores de Beiyang§!"
 FNG_popular_support_beiyangs_compradors_desc:9 "$FNG_beiyang_popular_support_intro$\n\nDéveloppant un talent certain pour survivre politiquement dans les circonstances les plus improbables, le président Wang Yitang et les différents membres de la Ligue pour la Reconquête, autrefois courtiers communs du maréchal Zhang, ont réussi à rallier les forces des Cinq Races sous une Seule Union au sein d'une nouvelle République de Beiyang, sous la surveillance bienveillante du Japon. Sans avoir à se plier aux caprices des autocrates ou de ses supérieurs, à l'exception de Tokyo, Wang s'est vu accorder les pleins pouvoirs pour mettre en œuvre les politiques sociales qu'il souhaitait, qui rappellent l'époque de l'apogée du Club de l'Anfu. Quoi qu'il en soit, les politiques de Wang profitent d'abord aux Japonais, puis à son peuple, même s'il n'est pas disposé à le faire."

 FNG_popular_support_governance_of_monopolies:9 "Légitimité Politique : §cGouvernement des Monopoles§!"
 FNG_popular_support_governance_of_monopolies_desc:9 "$FNG_beiyang_popular_support_intro$\n\nAprès avoir été reléguée à l'insignifiance politique à la suite des Émeutes de Novembre, la Nouvelle Clique des Communications a connu, pendant son mandat dans l'ombre, une brève résurgence de ses anciens rivaux de la Vieille Clique des Communications, Liang Shiyi et Zhou Ziqi. Mais finalement, grâce à la dépendance de la Clique du Fengtian vis-à-vis du Japon et à la résurgence de la politique pro-japonaise, des hommes autrefois considérés comme des traîtres, tels que Zhang Zongxiang, Lu Zongyu et Cao Rulin, ont pu retrouver leur importance. De plus, sous le gouvernement mis en place par le Japon, la Nouvelle Clique des Communications cherche à mener à bien sa mission des années 1910 : industrialiser et moderniser la nation, tout en engrangeant des profits."

 FNG_waging_the_war_of_minds_and_bodies:9 "Mener la Guerre des Esprits et des Corps"
 FNG_waging_the_war_of_minds_and_bodies_desc:9 "Le Gouvernement réformé de Chine incarne un phare de l'ordre public, s'opposant fermement au chaos qui ronge le pays depuis la Guerre de Protection de la Nation. Cependant, le gouvernement doit continuer à consolider son emprise sur l'arrière-pays, alors que les rebelles ne cessent de s'agiter contre le nouvel ordre établi en Asie. Le peuple finira lui aussi par perdre tout respect pour notre gouvernement si ces insurgés continuent d'infliger insulte après insulte à l'administration [ROOT.GetLeader]. Le Gouvernement réformé doit éradiquer ces parasites et les traiter comme il se doit."

 FNG_war_of_national_pacification:9 "Guerre de Pacification Nationale"
 FNG_war_of_national_pacification_desc:9 "Même si le Japon et la Chine restent les deux piliers de la puissance asiatique, le Dragon ne peut pas continuer à dépendre uniquement du Soleil levant. La Nouvelle Chine doit mettre sur pied une armée suffisamment puissante pour assurer seule la consolidation du pays, face à tous les agitateurs qui cherchent à replonger notre nation dans ses heures les plus sombres. La Heping Jianguojun est forte, la Heping Jianguojun est inébranlable. Zhonghua Minguo wansui !"

 FNG_preparing_the_students:9 "Préparer les Étudiants"
 FNG_preparing_the_students_desc:9 "La nation elle-même est peut-être divisée, mais une menace encore plus grande se profile à l'horizon. Notre ancien "allié", l'Empire japonais, ne considère le Gouvernement du Fengtian que comme un pion dans un jeu plus vaste. Ainsi, dans toute guerre imminente pour le salut de la nation, les étudiants, qui restent les bras croisés, doivent se préparer. Car même s’ils ne doivent pas être contraints à la guerre, celle-ci pourrait tout de même venir frapper à leur porte. Grâce à des exercices paramilitaires, à l’endoctrinement aux principes de la nation et à une foi inébranlable en la Chine, chaque âme valide se lèvera pour défendre la nation."

 FNG_reviving_chinese_financial_stability:9 "Restaurer la Stabilité Financière en Chine"
 FNG_reviving_chinese_financial_stability_desc:9 "Il va sans dire que la situation financière de la Chine est loin d'être idéale. La majeure partie de la richesse bancaire étant concentrée dans des villes côtières telles que Tianjin, Hong Kong ou Shanghai, la stabilité des finances du pays échappe largement à son contrôle. De même, des décennies de guerre et l'absence d'un Gouvernement central véritablement fort et résilient ont entraîné à la fois une méfiance à l'égard du crédit chinois, un afflux excessif de devises locales et même la thésaurisation d'actifs en période de grande difficulté. Cela demandera un effort colossal, mais le gouvernement peut au moins s'efforcer de reconstruire le commerce chinois."

 FNG_pacification_by_chinese_might:9 "Pacification par la Puissance Chinoise"
 FNG_pacification_by_chinese_might_desc:9 "Tout comme à l'époque de la dynastie Jin, le président Yuan Shikai n'a pas réussi à maintenir l'ordre dans l'Empire du Milieu, et l'État central a de nouveau sombré dans le chaos, avec l'émergence de deux gouvernements prétendant chacun représenter l'ensemble de la Chine. Le gouvernement du maréchal [ROOT.GetLeader] s'inscrit dans la lignée de l'Armée de Beiyang, la force la plus vertueuse et la plus modernisatrice de toute la Chine.\n\nPendant ce temps, l'ignoble Gouvernement de Guangzhou revendique la succession du vil Sun Yat-sen qui, dans sa folie, a introduit le fléau du marxisme au cœur de notre nation sacrée. Contre les libéraux qui se qualifient bêtement d'humanistes et les bandits socialistes qui volent aussi bien les riches que les pauvres, le gouvernement de l'Anguojun marche en avant pour rétablir non seulement l'ordre, mais aussi la restauration spirituelle d'une nation souffrant du mal de l'impérialisme."

 FNG_maximising_production_line_efficiency_idea:9 "Maximisation de l'Efficacité des Lignes de Production"
 FNG_maximising_production_line_efficiency_idea_desc:9 "En Occident, la supériorité industrielle a entraîné le redécoupage des frontières et la chute d’empires. Si le Fengtian peut se targuer de posséder la plus grande base industrielle de toute la Chine, une telle puissance industrielle reste vaine si elle n’est pas exploitée à son plein potentiel. L'Empire du Japon à l'Est et l'Ours russe au Nord disposent de méthodes de fabrication bien supérieures aux nôtres, et si la Chine veut se libérer par elle-même, le Gouvernement de l'Anguojun doit mettre en place les réglementations et l'organisation de la production indispensables afin de produire suffisamment d'équipement militaire pour garantir que l'Anguojun reste la force la mieux équipée du pays."

 FNG_intolerable_political_realities:9 "Réalités Politiques Intolérables"
 FNG_intolerable_political_realities_desc:9 "Bien que le Gouvernement du Fengtian se présente une fois de plus comme le véritable Gouvernement central basé à Beijing, un gouvernement fondé sur la tradition et l'ordre semble continuer à échapper au peuple chinois. L'Anguojun continue de défendre ces nobles idéaux, mais le gouvernement provisoire, qui ne régnait auparavant qu'à Shenyang, n'est actuellement pas en mesure d'administrer efficacement les provinces situées au sud de la Grande Muraille. L'autorité ne s'étend guère au-delà des remparts de la ville, et de nombreux postes administratifs restent vacants alors que l'administration de [ROOT.GetLeader] s'efforce de pourvoir tous les postes."

 FNG_endemic_economic_malaise:9 "Malaise Économique Endémique"
 FNG_endemic_economic_malaise_desc:9 "En 1926, Zhang Zuolin a constaté que le dollar du Fengtian peinait à conserver sa valeur et espérait obtenir des prêts étrangers pour soutenir une économie en difficulté. La Campagne du Nord n’a fait qu’aggraver la fragilité de l’économie, et le dollar du Fengtian s’est effondré après que la Clique du Zhili dirigée par Wu eut repoussé Zhang au-delà de la Grande Muraille. L'économie du Nord-Est était dans un tel état que les opportunistes russes tentèrent d'empiéter sur le territoire chinois, ce qui ne fut stoppé que par la capitulation face aux Japonais.\n\nBien que l'aide japonaise ait largement stabilisé les finances de l'Anguojun, il semblerait que la Guerre de Reconquête nationale ait une fois de plus mis l'économie du Fengtian au bord du gouffre. De nombreuses entreprises étrangères se montrent réticentes à s'implanter sur nos terres tant que le banditisme et la violence continuent de sévir dans les centres urbains, et de nombreuses entreprises chinoises qui opéraient sous l'ordre du Zhili se retrouvent désormais évincées de la Nouvelle Chine. Le maréchal [ROOT.GetLeader] doit remédier à ces difficultés économiques sous peine de perdre le soutien du peuple."

 FNG_crippling_army_rivalries:9 "Rivalités Militaires Écrasantes"
 FNG_crippling_army_rivalries_desc:9 "Bien que la Clique du Fengtian reste l'une des factions militaires les plus soudées opérant en Chine, elle a elle aussi été sujette à des divisions. Alors que le maréchal Zhang Zuolin et ses frères de sang constituaient initialement le noyau de l'armée, l'Armée du Fengtian a vu se développer, au cours des années suivantes, toute une série de factions de la « Jeune Garde ». Le fils aîné de Zhang, Zhang Xueliang, après avoir obtenu son diplôme de l'Académie militaire du Fengtian, a établi son propre cercle restreint au sein de l'Armée du Fengtian, qui est devenu connu sous le nom de Clique Shaoshuai. Lorsque Zhang a accueilli Yang Yuting et d'autres sous-officiers formés au Japon dans l'armée du Fengtian, ces officiers ont formé la Clique Shikan, qui prônait des réformes militaires d'inspiration japonaise.\n\nUne troisième faction progressiste de la Jeune Garde a été créée par Guo Songling, officier du Fengtian en pleine ascension, qui méprisait profondément Yang et sa Clique Shikan. Finalement, Guo a mené une rébellion à la suite de la 2e Guerre Zhifeng, qui a entraîné sa mort et la destruction de son groupe, mais les séquelles de la révolte anti-Fengtian continuent de se faire sentir au sein de l'Armée de l'Anguojun. Zhang Xueliang n'a jamais pardonné à Yang d'avoir exécuté son vieil ami et mentor, et cette deuxième victoire du Fengtian a une fois de plus ravivé les ambitions et exacerbé les tensions. Si [ROOT.GetLeader] souhaite maintenir un régime ordonné, il doit veiller à ce qu'aucune révolte anti-Fengtian ne se produise sous son mandat."

 FNG_an_army_of_traitors:9 "Une Armée de Traîtres"
 FNG_an_army_of_traitors_desc:9 "Quel devoir ou quel honneur peut-on tirer d'une institution déployée contre ses propres compatriotes ? Telle est la question qui occupe de manière persistante et profonde l'esprit de nombreux soldats de base de la Heping Jianguojun. L'argent est bien sûr une motivation, mais il ne peut purifier l'âme. Les rares hommes dotés de talents militaires qui ont choisi la collaboration restent peu nombreux et dispersés, tandis que l'armée elle-même dépend énormément des armes et du matériel japonais pour assurer ne serait-ce que les efforts de garnison les plus élémentaires."

 FNG_hollowed_out_economy:9 "Économie Vidée"
 FNG_hollowed_out_economy_desc:9 "Une autorité d'occupation transformée en un nouvel État : rares sont ceux qui auraient nourri de grands espoirs quant à la situation économique du gouvernement réformé à l'aube de "l'indépendance", et pourtant, la situation est bien pire que n'importe quel effondrement économique que la Chine ait jamais connu. Une nation brutalisée par ses nouveaux maîtres, des villes entières ont été réduites en ruines, avec des usines et des quartiers rasés. De plus, les seuls secteurs où une production économique est encore possible restent entre les mains des Japonais ou de leurs compradores, et ceux-ci ne semblent guère disposés à renoncer de leur plein gré à leur butin."

 FNG_collaboration_the_great_evil:9 "Collaboration : Le Grand Mal"
 FNG_collaboration_the_great_evil_desc:9 "Hanjian. C'est le terme qu'ils utilisent pour désigner les membres du gouvernement actuel. Des traîtres non seulement envers leur pays, mais aussi envers toute la nation chinoise. Cependant, la collaboration est un concept complexe, et les différentes personnes réunies sous les auspices de la nouvelle administration chinoise ont toutes rejoint le giron de Tokyo pour diverses raisons. Parmi ces raisons, on peut citer : une sympathie sincère, des considérations matérielles, un désaccord avec les structures du pouvoir précédent, etc. Pourtant, tous les collaborateurs ne sont pas égaux, en particulier ceux qui n’étaient pas consentants ou qui ont été contraints. Néanmoins, le péché qu’ils ont commis est grave, et la nation ne l’oubliera pas de sitôt."

 FNG_the_new_oligarchy:9 "La Nouvelle Oligarchie"
 FNG_the_new_oligarchy_desc:9 "À l'époque impériale, la société était dirigée par la prospère classe des gentilshommes et par des érudits. Ces hommes continueront d'occuper une place prépondérante dans la Nouvelle Chine, mais les réalités de notre nation exigent qu'une nouvelle élite prenne la tête du mouvement. En Occident, ce sont la classe ploutocratique et les hommes d'affaires industrieux qui ont permis la modernisation économique, et le peuple chinois doit s'inspirer de leurs succès tout en évitant leurs erreurs. La Chine d'hier était le grand empire du passé, la Chine d'aujourd'hui est le tigre endormi, et la Chine de demain est le dragon renaissant."

 FNG_achieving_national_statism:9 "Réalisation de l'Étatisme National"
 FNG_achieving_national_statism_desc:9 "Zeng Qi et ses amis ont beaucoup appris de leurs querelles avec leurs anciens amis marxistes. Alors que ceux-ci se laissaient bercer par l'illusion du socialisme international, Zeng a compris que le socialisme ne s'appliquait au mieux que pour la cause de la nation elle-même. Il a ainsi forgé une idéologie appelée Étatisme national, qui est devenue le pilier du Parti Jeune Chine. La Chine renaîtra non pas par la mort de l'ancienne Chine, mais par la célébration à la fois de l'ancienne et de la nouvelle Chine, afin d'honorer véritablement le rêve de 1911 et d’établir une Chine nationaliste, corporatiste et confucéenne."

 FNG_true_equality_of_the_five_races:9 "Véritable Égalité des Cinq Races"
 FNG_true_equality_of_the_five_races_desc:9 "Contrairement aux rebelles du Sud qui se sont battus pour une Chine han, la Nouvelle Chine, forgée par les expériences du Nord-Est, lutte pour toutes les ethnies réunies sous son drapeau. L’Association Concordia a été fondée pour instaurer l’harmonie ethnique dans tout le Dongbei, et aujourd’hui, ces rêves s’épanouiront non seulement dans le Heilongjiang, mais aussi aux quatre coins du pays, de Kunming à Hulunbuir, de Kashgar à Harbin ! Ensemble, les races égales construiront une Chine plus juste, qui inaugurera une nouvelle ère de paix et de prospérité."

 FNG_financing_reformed_reconstruction:9 "Financer la Reconstruction Réformée"
 FNG_financing_reformed_reconstruction_desc:9 "Diplomates habiles et experts en gestion d'entreprise, les membres de la Nouvelle Clique des Communications ont réussi à obtenir des prêts lucratifs, des accords commerciaux exceptionnels et l'adhésion d'autres groupes industriels et commerciaux en Chine afin de financer leurs grands projets de reconstruction économique nationale. Si certains observateurs dénoncent la création de monopoles et de gigantesques conglomérats d'entreprises, les efforts indispensables que l'État doit déployer pour mener à bien la renaissance nationale ne peuvent être financés par de simples capitaux modestes."
