#Unused Loc:
#Heilongjiang, Jilin, and Fengtian, known as the 'Three Eastern Provinces' during the Qing and Beiyang periods, were split into nine smaller sub-divisions in 1931 to aid governance and economic planning. The vast majority of Fengtian's industry and mineral wealth is concentrated in the South, while the central and Northern provinces are primarily agricultural. Rehe, to the Southwest of Liaoning Province, remained untouched by the reorganisation, but has suffered thanks to the end of rail traffic through the Liaoxi Corridor, which connected land transportation between Beijing and the Northeast. Thanks to the government's new initiatives incentivising development across the provinces, prosperity will surely increase, but serious structural issues remain, and may become problematic as a result of increasing disparity in development between the north and south.

#The 'Huanghanhui', or 'Imperial Han Society', have been found to be using bribes and threats of violence to coerce low-level members of the Assembly. Unfortunately this information has gone public, even as the Assemblymen in question have been removed from office, and local police pursue additional suspects.\n\nShortly after information regarding this incident was presented to Japanese authorities, Kempeitai agents were observed entering an enclosed compound outside Shenyang, and reports indicate gunfire was exchanged. Over a dozen bodies were removed from the premises, and it would be unwise to pursue this matter any further."

#"The Imperial Han Society, a secret society with a Han-chauvinistic ideology and uncompromising hate of other ethnicities, is believed to be behind a number of killings in Shenyang, Changchun, and Harbin. The targets appear to be more or less random, linked only by their status as ethnic Russians, Manchu, Koreans, and Japanese. Mantetsu and the Japanese Consulate are demanding investigations, and the Kempeitai have already carted away a number of suspects to an unknown fate."

#Xiehehui (Concordia Association)\n§LA grouping of politicians and lobbyists with all the trappings of a party, the Concordia Association represents the interests of Mantetsu, and sometimes other Japanese Zaibatsu, in the Assembly. Their actual ideological positions vary, some using the Japanese to counter Zhang's power for their own gain, with others subscribing to Pan-Asian principles.§!\n

KR_Fengtian: "Fengtian" # Focus tree ID

### Ideas ###
 FNG_Regionalist_Sentiment: "Sentiment Régionaliste"
 FNG_Regionalist_Sentiment_desc: "Les objectifs nationaux de notre gouvernement se sont toujours heurtés à des messages régionalistes plus localisés, qui ont plus d'attrait auprès de la majorité largement apolitique que les idéaux républicains de haut niveau. Bien que Zhang Zuolin ait jadis porté le sentiment régionaliste à son poste actuel de dirigeant, il menace maintenant de faire dérailler ses projets de repartir au sud de la Grande Muraille, de conquérir Beijing et de reconquérir toute la Chine."
 FNG_Regionalist_Resentment: "Ressentiment Régionaliste"
 FNG_Regionalist_Resentment_desc: "Déclenchée par des rumeurs, la colère couve tranquillement dans certaines parties du public, tandis que d'autres ont commencé à descendre dans la rue pour protester."
 FNG_Regionalist_Outrage: "Outrage Régionaliste"
 FNG_Regionalist_Outrage_desc: "Les tentatives du gouvernement pour réprimer le soi-disant 'Parti Dongbei' ont échoué, au moins temporairement, car les manifestations ont rapidement évolué en émeutes dans certains centres urbains. La violence n'est pas encore extrême, mais elle n'a pas besoin de l'être. Le gouvernement a maintenant la justification dont il a besoin pour réprimer et supprimer ce mouvement subversif une fois pour toutes."
 FNG_Backward_Industry: "Industrie Arriérée"
 FNG_Backward_Industry_desc: "Bien que le Fengtian puisse contenir la deuxième plus grande base industrielle d'Asie de l'Est, sa taille cache des machines obsolètes, des pratiques inefficaces et une grave mauvaise gestion. Seules des réformes approfondies, soutenues par de nombreux investissements, peuvent permettre de surmonter ces difficultés."
 FNG_factionalism_modifier: "Gouvernance Divisée"
 FNG_factionalism_modifier_desc: "Malgré ses affirmations du contraire, le Gouvernement de Fengtian est en proie à une corruption endémique, à des luttes intestines et à des abus de pouvoir. Bien que cela n'ait rien d'exceptionnel pour la Chine, cela entrave le bon fonctionnement du gouvernement et limite le soutien au régime. Si l'une des factions au pouvoir gagne trop d'influence, des conséquences désastreuses sont à prévoir."
 FNG_Investment_Dearth: "Pénurie d'Investissements"
 FNG_Investment_Dearth_desc: "L'effondrement économique qui a suivi l'entrée du Fengtian dans la dernière Guerre Zhifeng a gravement endommagé sa base fiscale et sa crédibilité financière, laissant le gouvernement avec peu de créanciers, et les entreprises privées avec des options très limitées. Peu de gens ont la confiance nécessaire pour investir dans le Fengtian, que ce soit dans leur pays ou à l'étranger."
 FNG_Limited_Investment: "Investissement Limité"
 FNG_Limited_Investment_desc: "Grâce aux incitations gouvernementales, les investissements ont augmenté, mais il y a encore une pénurie générale. Nous devons nous tourner vers d'autres sources pour obtenir les fonds dont nous avons besoin."
FNG_Intel_Leak: "Fuite de renseignements"
 FNG_Intel_Leak_desc: "Par grossière incompétence, ou pour des raisons encore plus douteuses, un ministre a divulgué des renseignements vitaux aux ennemis du Fengtian."
 FNG_Year_of_Righteous_Effort: "L'Année de l'Effort Vertueux"
FNG_Year_of_Righteous_Effort_desc: "Avec la Proclamation du Grand Maréchal, la nation est unie dans un effort acharné pour se préparer aux rigueurs de la guerre."
 FNG_Japanese_Aid_Cut: "Réduction de l'Aide Japonaise"
 FNG_Japanese_Aid_Cut_desc: "Le Japon a coupé toute aide au gouvernement pour punir ce qu'il considère comme de l'insubordination."
FNG_Buying_Silver: "Acheter de l'argent"
 FNG_Buying_Silver_desc: "L'argent, par définition, est cher et le gouvernement en achète actuellement une grande partie. Cependant, une fois la réserve pleine, il disposera d'une base fiable pour la monnaie et le crédit."
 FNG_Central_Bank_Collapse: "Effondrement de la Banque Centrale"
FNG_Central_Bank_Collapse_desc: "La Banque centrale semble avoir égaré des millions de taels d'argent précisément au moment où les banques japonaises demandaient le remboursement de leurs prêts. Comment cela a-t-il pu se produire ?"
 FNG_The_Kwantung_Army: "L'Armée du Kwantung"
 FNG_The_Kwantung_Army_desc: "L'Armée du Kwantung est présente en Mandchourie depuis des décennies, mais son rôle crucial lors de la révolte de Guo Songling en 1925 lui a donné tout le poids nécessaire pour déplacer son quartier général à Shenyang, augmentant ainsi considérablement son influence sur le gouvernement. Aujourd'hui, ils opèrent comme une mission militaire et une force d'occupation de facto, protégeant les chemins de fer, fournissant une aide matérielle et donnant des "conseils". Malheureusement, ignorer ces conseils peut avoir des conséquences désastreuses."
 FNG_Educational_Vacuum: "Vide Éducatif"
 FNG_Educational_Vacuum_desc: "L'absence soudaine de certains enseignants, professeurs et scientifiques a laissé un vide éducatif inquiétant. Des remplaçants étrangers et nationaux peuvent être trouvés, mais à un prix, et non sans grand inconvénient."
FNG_Post-Colonial_Chaos_1: "Chaos post-colonial"
 FNG_Post-Colonial_Chaos_1_desc: "Même dans sa forme la plus limitée, l'emprise de Mantetsu sur l'économie et les infrastructures de Fengtian était étroite, et maintenant que ses systèmes et structures soigneusement mis en place s'effondrent, le pays tout entier est paralysé. Il faudra du temps pour reconstruire et réorganiser, mais si l'influence de Mantetsu était plus grande, cela aurait pu être bien pire."
FNG_Post-Colonial_Chaos_2: "Chaos post-colonial"
 FNG_Post-Colonial_Chaos_2_desc: "L'emprise de Mantetsu sur la politique, l'économie et les infrastructures de Fengtian était étroite, et maintenant que ses systèmes et structures soigneusement mis en place s'effondrent, le pays tout entier est paralysé. Il faudra du temps pour reconstruire et réorganiser, mais si l'influence de Mantetsu était encore plus grande, cela aurait pu être pire."
FNG_Post-Colonial_Chaos_3: "Chaos post-colonial"
 FNG_Post-Colonial_Chaos_3_desc: "L'emprise de Mantetsu sur la politique, l'économie et les infrastructures de Fengtian était étouffante, et maintenant que ses systèmes et structures soigneusement mis en place s'effondrent, le pays dans son ensemble est complètement paralysé. Il faudra beaucoup de temps pour le reconstruire et le réorganiser."
 FNG_Disastrous_Governance: "Gouvernance Désastreuse"
 FNG_Disastrous_Governance_desc: "L'emprise de la Ligue pour la Reconquête sur le pouvoir a commencé à effilocher la légitimité déjà fragile de l'État."
 FNG_Army_Dominance: "Domination de l'Armée"
 FNG_Army_Dominance_desc: "La Clique de Zhang et l'Armée ont une emprise totale sur le gouvernement, ce qui pousse les autres factions politiques à se tourner vers des moyens non conventionnels pour limiter leur contrôle. Malheureusement, ces moyens et les abus de pouvoir de la Clique de Zhang ont des conséquences désastreuses."
 FNG_Plutocratic_Exploitation: "Exploitation Ploutocratique"
FNG_Plutocratic_Exploitation_desc: "La main de fer de la Clique des communications sur le gouvernement de la nation lui a permis de s'engager dans un tout nouveau niveau d'exploitation et d'avidité, réduisant la légitimité de l'État et attirant une pression politique japonaise sans précédent."
 FNG_the_heilongjiang_defection_idea:9 "La Défection du Heilongjiang"
 FNG_the_heilongjiang_defection_idea_desc:9 "Ayant longtemps été des rivaux et des opposants à Yang Yutin, sous l'apparence de la fin du mandat de Zhang Zuolin dans les trois Provinces du Nord-Est, Ma Zhanshan et les alliés proches de Zhang depuis l'époque du banditisme, la Clique du Heilongjiang, ont fait défection après l'ascension de Yuting au rang de Grand Maréchal du Gouvernement du Fengtian. Emportant avec eux l'équivalent de 3 millions de dollars en argent des réserves, ils ont eu un impact sérieux sur la capacité financière de l'administration."
 FNG_ma_insurgency_idea:9 "L'Insurrection du Heilongjiang"
 FNG_ma_insurgency_idea_desc:9 "L'offre de ses services à l'ennemi ayant été rejetée, la Clique du Heilongjiang de Ma Zhanshan, Wan Fulin et Wu Junsheng a décidé de prendre les choses en main. Diffusant un appel à la résistance nationale dans toutes les stations de radio du Nord-Est, ils ont commencé à attirer des recrues potentielles à leur cause et à attaquer diverses garnisons du Dongbei. Bien qu'il soit peu probable que cela se transforme en révolte totale contre les nouvelles autorités du Fengtian, il s'agit néanmoins d'une affaire urgente qui requiert une attention particulière, dont une grande partie pourrait être orientée vers l'intérieur."

 FNG_Legations_Deal: "L'accord des Légations"
 FNG_Legations_Deal_desc: "Grâce à une politique intelligente, et peut-être à une négociation en coulisse, le ministre de l'économie a obtenu un accord commercial de grande valeur avec les villes légataires."
 FNG_China_Welfare_Fund: "Fonds d'Aide Sociale de la Chine"
 FNG_Controversy_Women_Emancipation: "Suffrage des Femmes Controversé"
 FNG_Towards_the_Third_Principle: "Vers le Troisième Principe"
FNG_Negotiated_Provincial_Revenues: "Revenus provinciaux négociés"
FNG_Baojia_System: "Système Baojia"
FNG_Bingzhan_Network: "Réseau de Bingzhan"

 FNG_Suppressed_Labour_Movement: "Mouvement Ouvrier Supprimé"
 FNG_Suppressed_Labour_Movement_desc:9 "Bien que les ouvriers soient devenus un élément essentiel de la société chinoise, ils constituent également un foyer fertile pour le mouvement socialiste chinois en plein essor. Ces idéaux ont toujours été et resteront le mal qui ronge le cœur de la nation, et l'Anguojun apportera le remède nécessaire à ce mal."

FNG_Worker_Loyalty: "Fidélité des travailleurs"
 FNG_Worker_Loyalty_desc:9 "Si notre nation doit un jour atteindre un niveau de puissance proche de celui des grandes dynasties d'autrefois, elle doit alors parler d'une seule voix. Parler de lutte des classes ne fait que diviser le peuple, alors que le succès national apporte la prospérité à toutes les couches de la société. Tout comme le Grand Maréchal doit avoir à cœur les intérêts supérieurs du peuple, toutes les classes doivent elles aussi avoir à cœur les intérêts supérieurs de la nation. Ce n’est qu’alors que le peuple chinois récoltera les fruits de sa foi et surpassera même les plus grands empires de l’Occident."

 FNG_Centralized_Provincial_Revenues: "Recettes provinciales centralisées"
 FNG_Centralized_Provincial_Revenues_desc:9 "Au plus fort de l'ère des seigneurs de la guerre, n'importe quel seigneur de guerre pouvait s'emparer de Beijing ou de Guangzhou de son propre chef et devenir ainsi Président de la République. De ce fait, les provinces protégeaient farouchement leurs richesses pour éviter qu'elles ne soient taxées par leurs rivaux sur le trône républicain, préférant utiliser les recettes provinciales pour financer leurs propres armées et leurs économies locales.\n\nCette période de désunion a désormais pris fin, avec le triomphe de l'Anguojun sur ses plus grands rivaux. Si la Chine veut redevenir forte, alors la nation tout entière doit fonctionner selon une vision unique, tout comme un orchestre symphonique doit suivre les caprices d'un seul chef d'orchestre. Les codes fiscaux et les systèmes juridiques parallèles doivent être abolis, et tous devront se soumettre au véritable gouvernement de la Chine."

 FNG_primacy_of_the_loyalists:9 "Primauté des Loyalistes"
 FNG_primacy_of_the_loyalists_desc:9 "Contrairement au pompeux Wu Peifu, ancien élève de la prestigieuse Académie de Baoding, et aux intellectuels libéraux du Sud qui se moquent du Gouvernement du Fengtian, notre maréchal Zhang est issu d’un milieu très modeste. Né dans une pauvreté abjecte, il est devenu bandit dans sa jeunesse. C’est à cette époque que Zhang a rencontré de nombreux compagnons d’infortune, avec lesquels il a forgé une fraternité à toute épreuve. Ces bandes de frères ont été collectivement absorbées par l'armée Qing à la suite de la Guerre russo-japonaise, et se sont rangées du côté du Gouvernement impérial et de l'Armée de Beiyang pendant la Révolution Xinhai.\n\nZhang et ses frères ont fini par former le noyau de la Clique du Fengtian, et ce groupe soudé de bandits devenus seigneurs de la guerre a réussi à exercer une domination politique sur la Chine pendant un certain temps. Même si le gouvernement du maréchal Zhang a fini par perdre Beijing en 1927, la structure cohésive de la Clique du Fengtian lui a permis de reprendre le contrôle de la Cité interdite. C'est grâce à ses amis et à sa famille que le maréchal Zhang a pu remporter la victoire finale sur ses rivaux, et ses alliés continueront de former le noyau de la force militaire de l'Anguojun."

FNG_Command_Reforms: "Réformes approfondies du commandement"
 FNG_Command_Reforms_desc:9 "Chaque clique militaire en Chine a son centre, mais ce n’est pas ce centre qui mène souvent à la victoire. Non, ce sont les efforts et les sacrifices de ses membres les plus assidus, de ceux qui osent rêver de grandeur et de ceux qui n’ont pas peur de la saisir. Alors que l’armée japonaise a adopté des réformes méritoires, il semble que la Chine et la Clique du Fengtian continuent d’accuser un retard dans ce domaine. Le Grand Maréchal doit veiller à ce que l'armée chinoise ne soit pas uniquement structurée autour de ses amis et de sa famille, mais qu'elle intègre également les jeunes talents les plus brillants qui émergent de la masse, ceux qui continueront à accomplir de grands exploits au service de la nation, et qui la dirigeront peut-être un jour."

 FNG_triumph_of_the_model_officers:9 "Triomphe des Officiers Modèles"
 FNG_triumph_of_the_model_officers_desc:9 "Au Japon, de nombreux jeunes étudiants chinois prometteurs ont appris à mener la guerre à la manière japonaise. De retour au pays, ils ont rapporté avec eux ce savoir et ont transformé l'armée à leur image. Sun Chuanfang s'est hissé au rang non seulement de petit seigneur de la guerre, mais aussi de maître de la Chine orientale. Chiang Kai-shek est devenu directeur militaire du Kuomintang et a été chargé de la formation des élèves de Whampoa. Pendant ce temps, au sein de la Clique du Fengtian, la Clique Shikan a été à l'origine de nombreuses victoires du maréchal Zhang. Le Maréchal a reconnu les mérites de ces hommes et a permis que leurs méthodes deviennent le fil conducteur de la nouvelle armée chinoise."

 FNG_Japanese_Economic_Union: "Union Économique Japonaise"
FNG_Industrial_Soy_Shortage: "Pénurie de soie industrielle"
 FNG_support_ANQ_idea: "Soutien au Gouvernement d'Anqing"
 FNG_support_SHD_idea:0 "Soutien à la clique de Shandong"
 FNG_support_SHD_idea_tt:9 "(§Y[SHD.GetNameWithFlag]§!) $volunteer_limit_plus_two_tt$"

 FNG_Expel_the_Japanese_Bandits: "Expulsez les Bandits Japonais !"
FNG_Expel_the_Japanese_Bandits_desc: "Le temps est venu de chasser les intrus japonais de Chine, et de mettre fin à un siècle d'insupportable humiliation nationale !"

 FNG_Break_Mantetsu_Monopoly: "Casser le Monopole de Mantetsu"
 FNG_Break_Mantetsu_Monopoly_desc: "La Compagnie ferroviaire de Mandchourie du Sud japonaise a longtemps eu la mainmise sur le réseau logistique de la Mandchourie, limitant notre capacité à réagir rapidement si elle nous attaque - ou si nous les attaquons. Prendre le contrôle des chemins de fer japonais ne sera pas facile, car ils saboteront sans doute ce qu'ils peuvent, et nos ingénieurs seront contraints de travailler dans des circonstances peu familières."

 FNG_Legitimacy: "Légitimité Nationale"
 FNG_Economic_Concessions: "Concessions Économiques du Fengtian"
 FNG_Economic_Concessions_To_Guangdong: "Concessions Économiques au Guangdong"

 FNG_mantetsu_influence_modifier: "£pol_idea Influence de la Mantetsu"
 FNG_mantetsu_influence_idea: "Influence de la Mantetsu"
 FNG_mantetsu_influence_idea_desc: "L'influence économique de la Mantetsu s'étend à tout le pays et à toute l'Assemblée - parfois bénéfique, parfois simplement bénigne, mais toujours préoccupante. Bien que le gouvernement de Fengtian s'engage actuellement à résister à l'influence japonaise, cela pourrait ne pas durer éternellement."
