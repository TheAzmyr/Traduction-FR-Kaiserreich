### Renames ###
 FNG_national_unity_league:0 "LUN"
 FNG_national_unity_league_long:9 "$FNG_national_unity_league_tt$\n§LFruit d’efforts herculéens visant à combler une nouvelle fois le fossé entre le Sud réformiste et le Nord conservateur, la Ligue d'Unité nationale est une organisation politique pratiquement créée de toutes pièces pour répondre à un besoin de légitimité, dans le cadre des nouvelles dispositions juridiques négociées entre les figures de proue de la Clique du Fengtian et les divers démocrates du Sud.\n\nRegroupant un mélange de politiciens de la Ligue de la Reconquête, de nouveaux bureaucrates de Beiyang, un afflux de jeunes troubadours de la garde attirés par le mince vernis de réformisme du Shaoshuai, divers constitutionnalistes chinois, des membres du Parti Jeune Chine et bien d’autres individus aux affiliations et aux couleurs variées, la Ligue ne dispose que de peu de pouvoir législatif réel, étant fortement divisée en factions et marquée par un chaos idéologique.\n\nPeu de membres de la Ligue, et encore moins de personnes en dehors de celle-ci, semblent véritablement comprendre les machinations de la LUN. Dirigée presque entièrement par la seule personnalité de certains de ses membres de premier plan, sa nature paradoxale l’a amenée à être tiraillée dans toutes les directions, mais elle reste unie par un intérêt commun : ne jamais voir la Chine retourner à l’ère des seigneurs de la guerre. Cependant, une telle force de cohésion ne suffit guère à contrer le carrousel politique incessant à Beijing.§!\n"
 FNG_national_unity_league_tt:9 "Ligue d'Unité nationale (Guojia Tongyi Lianmeng)"
 FNG_shikan_clique:0 "Clique Shikan"
 FNG_shikan_clique_long:9 "$FNG_shikan_clique_tt$\n§LLa Clique Shikan tire son nom de la Rikugun Shikan Gakkō, ou "Académie de l'Armée impériale", la plus prestigieuse des écoles militaires japonaises. La plupart de ses membres y ont étudié ou ont fréquenté d'autres établissements d'élite japonais, apportant ainsi à la Clique du Fengtian une mentalité militaire typiquement japonaise. Bien qu'ils ne nourrissent pas strictement des sentiments pro-japonais, ils se tournent souvent vers leurs associés japonais pour obtenir à la fois des connaissances et de l'aide afin de lutter contre la farouche opposition de la Clique de Zhang.\n\nDirigée par des personnalités telles que Yang Yuting, Yu Zhen, Ji Yiqiao et Chang Yinhuai, la Clique Shikan dégage une aura de prestige, de diligence et de méritocratie, se démarquant ainsi des cliques familiales stéréotypées du Fengtian. Naturellement, cela leur a valu beaucoup de respect de la part des autres satellites de la cour du Vieux Maréchal, mais aussi beaucoup de virulence et de ressentiment face à leur nature hautaine, leurs attitudes napoléoniennes et leurs capacités.\n\nCela ne se traduit toutefois pas nécessairement par de l'insubordination, car tous les hommes de Shikan ont prêté serment à leurs supérieurs, à condition bien sûr que ceux-ci soient dignes de leur respect.§!\n"
 FNG_shikan_clique_tt:9 "Clique Shikan (Shiguan Pai)"
 FNG_new_peoples_society:0 "Nouvelle Société du Peuple"
 FNG_new_peoples_society_long:9 "$FNG_new_peoples_society_tt$\n§LCréée en tant qu'organisation de masse par des politiciens et des fonctionnaires, en collaboration avec l'armée japonaise, la Nouvelle Société du Peuple a pour seul objectif de maintenir l'illusion d'une autonomie tout en servant les intérêts du Japon. Bien qu'elles soient distinctes de l'Association Concordia, de la Ligue de la Reconquête et de la Clique des Communications, toutes ces associations travaillent en étroite collaboration sur les questions politiques et économiques, au service de leurs maîtres japonais.§!\n"
 FNG_new_peoples_society_tt:9 "Nouvelle Société du Peuple (Xinminhui)"

