### Characters ###

 FNG_assorted_leaders:0 "Chefs Divers"

 #張作霖
 FNG_zhang_zuolin: "Zhang Zuolin"
 FNG_zhang_zuolin_bio:9 "Né dans une famille pauvre près de Shenyang, Zhang Zuolin a débuté son ascension fulgurante en tant que bandit, exploitant la situation militaire chaotique de la fin de l’Ère Guangxu. À la suite de la Révolution Xinhai, Zhang parvint à prendre le contrôle de sa province natale du Fengtian. Le large assortiment d'alliances de Zhang, composé d'officiers locaux de Beiyang et d'anciens amis bandits, a formé le noyau de la Clique du Fengtian, qui devint l'un des principaux dissidents de la Clique de Beiyang.\n\nZhang avait à l'origine fait alliance avec Duan Qirui, dans le but d'utiliser ses connexions japonaises pour s'assurer des armes à feu, mais il se retourna bientôt contre la Clique de l'Anhui avec l'aide de la Clique du Zhili. Les deux cliques du Zhili et du Fengtian sont ensuite devenues des ennemies jurées, une situation qui perdure encore aujourd'hui. Zhang contrôla Beijing seul pendant un moment, mais la Clique du Zhili restaura son contrôle sur la ville en 1927.\n\nÀ la suite de la Restauration Qing, Zhang a préservé l'indépendance du Nord-est envers l'autorité de Beijing et a contesté leur autorité directe à diriger la Chine, revendiquant pour lui-même le manteau la Révolution Xinhai et se disant héritier légitime du Gouvernement de Beiyang. L'engagement réel de Zhang envers le républicanisme démocratique est pour le moins douteux, mais si le Vieux Maréchal peut utiliser la rhétorique républicaine pour restaurer son statut de gouvernement internationalement reconnu, alors qu'il en soit ainsi."
 FNG_zhang_zuolin_leader_desc:9 "§YNaissance :§! §L19 mars 1875, comté de Haicheng, district de Shengjing, Grand Qing§!\n§YCarrière :§! §L$FNG_zhang_zuolin_bio$§!"
 FNG_zhang_zuolin_army_chief_desc:9 "§YNaissance :§! §L19 mars 1875, comté de Haicheng, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §L$FNG_zhang_zuolin_bio$§!\n\n§YNotes : Malgré son illettrisme et son manque d'éducation, le Vieux Maréchal est un chef compétent et conscient de lui-même, avec une passion pour la délégation. Sa nature pragmatique a amené certains à le décrire comme idéologiquement "pro-Zhang".§!"

 #張學良
 FNG_zhang_xueliang: "Zhang Xueliang"
 FNG_zhang_xueliang_desc_body:9 "Zhang Xueliang est né dans des conditions opposées à celles de son père, le Vieux Maréchal. Alors que Zhang Zuolin est né dans la pauvreté et n'a jamais eu d'éducation formelle, il s'est assuré que son fils naisse dans une vie de privilèges et ait accès à des tuteurs privés. Zhang Xueliang grandit en étant bien plus ouvert aux idées occidentales que son père conservateur, qui était désapprouvé par la classe intellectuelle chinoise. Cherchant à marcher dans les pas de son père, Zhang s'enrôla au sein de l'Amphithéâtre du Fengtian.\n\nAprès avoir obtenu son diplôme du département d'artillerie, Zhang Zuolin promut son fils au rang de commandant de brigade des gardes du nord-est. Lorsque la Clique du Fengtian fut vaincue par la Clique du Zhili lors de la 1ère Guerre Zhifeng, Zhang Xueliang fut chargé par son père de négocier la paix. Pour venger sa défaite, Zhang Zuolin débuta un grand effort de modernisation de ses armées, et Zhang Xueliang fut fait superviseur du Bureau de l'Aviation du Nord-Est, chargé de donner à son père une force aérienne moderne, ce qu'il réussit à faire via l'achat d'avions étrangers.\n\nLes efforts du "Jeune Maréchal" ont payé lors de la 2e Guerre Zhifeng, qui vit la Clique du Fengtian prendre le contrôle de Beijing et dominer la politique chinoise."
 FNG_zhang_xueliang_leader_desc:9 "§YNaissance :§! §L3 juin 1901, à Bajiaotai, district de Shengjing, Grand Qing§!\n§YCarrière :§! §L$FNG_zhang_xueliang_desc_body$ Bien que les Zhang ait perdu Beijing un an plus tard, la Clique du Fengtian l'a reprise une fois de plus, et se tient désormais comme le gouvernement légitime de la Chine. Débordant d'ambition, seul le temps dira si le Jeune Maréchal est à la hauteur de la tâche de diriger la nation.§!"
 FNG_zhang_xueliang_army_chief_desc:9 "§YNaissance :§! §L3 juin 1901, à Bajiaotai, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aClique Shaoshuai§!\n§YCarrière :§! §L$FNG_zhang_xueliang_desc_body$ Malheureusement pour les Zhang, la Clique du Zhili reprit le contrôle de Beijing quelques années plus tard. Depuis, Zhang Xueliang aide son père à poursuivre la modernisation afin qu'un jour, père et fils puissent à nouveau régner sur l'Empire du Milieu.§!\n\n§YNotes : Il est connu pour fréquenter les Villes des Légations afin de fumer, jouer et s'adonner à des beuveries en compagnie de femmes, au grand désarroi de son père. Malgré cela, Zhang montre un intérêt sincère pour la politique, se montrant nettement plus anti-japonais que son père.§!"

 #馮庸
 FNG_feng_yong:9 "Feng Yong"
 FNG_feng_yong_desc_body:0 "Ami intime de Zhang Xueliang, avec qui il est proche depuis l'enfance, Feng Yong est le fils aîné de Feng Delin, l'un des anciens vétérans de la Clique du Fengtian et allié de Zhang Zuolin. Portant le même nom de courtoisie que Xueliang et ayant grandi à ses côtés, Feng accompagnait Xueliang à l'Amphithéâtre de l'Armée du Nord-Est, ainsi qu'à l'École des officiers de Baoding. En tant qu'officier d'état-major du département de l'aviation du Fengtian, il joua un rôle clé dans la création de l'Armée de l'air du Nord-Est.\n\nÀ la suite de la Première Guerre ZhiFeng en 1922, Feng, dégoûté par la guerre, démissionna de l'armée et devint directeur général de l'Usine sidérurgique de Daye, où il se consacra à la production d'armement, tout en occupant le poste de directeur de l'École d'ingénieurs de l'usine de Daye. En 1926, il fit don de 3,1 millions de yuans pour fonder l'université Feng Yong, dont il devint le directeur — la première université de style occidental du Nord-Est. Avec la gratuité des frais de scolarité et l'importance accordée à l'éducation militaire et physique, ses idées eurent un impact considérable sur les étudiants du Nord-Est.\n\nÀ la suite du déclenchement des Quatrième et Cinquième Guerres ZhiFeng, Feng sortit de sa retraite à la demande de Xueliang, mais pas pour combattre le Zhili. Après avoir mobilisé ses propres forces, Feng s'attacha plutôt à contrecarrer les opérations japonaises en Mandchourie, apparemment avec l'accord du Vieux Maréchal."
 FNG_feng_yong_commander_desc:9 "§YNaissance :§! §L23 octobre 1901, à Haicheng, district de Shengjing, Grand Qing§!\n§YAlignement :§! §nParti Jeune Chine§!\n§YCarrière :§! §L$FNG_feng_yong_desc_body$§!\n\n§YNotes : Au cours de son mandat de recteur, Feng s'est rapproché du Parti Jeune Chine, faisant de son université l'un des bastions les plus actifs de l'expansion de ce parti. Bien qu'il ne s'implique pas pleinement dans les activités du PJC, il en est membre officiel.§!"

 #唐紹儀
 FNG_tang_shaoyi: "Tang Shaoyi"
 FNG_tang_shaoyi_leader_desc:9 "§YNaissance :§! §L2 janvier 1862, comté de Xiangshan, province du Guangdong, Grand Qing§!\n§YCarrière :§! §LQuelle indignité. Être forcé de sortir de sa retraite pour danser au bout des ficelles japonaises. Un homme d'État loyal, que certains considèrent comme un héros, réduit à l'état d'épave, "Président" en apparence pour le compte de ses geôliers japonais. Pourtant, Tang Shaoyi a une histoire riche et triomphante en tant qu'un des premiers hommes d'État républicains de Chine.\n\nAmi proche de Yuan Shikai dans sa jeunesse, il monta dans les rangs de la bureaucratie civile des Qing, suivant Yuan où qu'il aille. Promu Ministre des Affaires étrangères en 1906 à la suite de sa gestion experte de la situation tibétaine, Tang fut brièvement Gouverneur du Fengtian, Ministre des Postes et Communications avant de participer à la Révolution Xinhai en tant que porte-parole civil de Yuan Shikai. Capital dans les négociations de paix nord-sud, Tang Shaoyi finit par s'assurer le poste de premier Premier Ministre de la République.\n\nIl démissionna peu après, invoquant le mépris de Yuan Shikai pour l'État de droit et le dénonçant pendant la Guerre de Protection de la Nation. Tang servit dans un des gouvernements de Duan Qirui avant de le quitter pour rejoindre le Mouvement de protection de la Constitution dans le sud, mené par le Dr Sun. Avec le virage de plus en plus autoritaire de Sun, reflété de la même manière à Beijing, la fibre démocrate et parlementaire de Tang s'étiola et disparut. Vivant reclus en 1927, il revint finalement en 1929 pour servir de magistrat de comté, participant à des cercles anti-Zhili.\n\nAyant pris sa retraite à Shanghai, les forces d'occupation japonaises ont traîné Tang Shaoyi hors de chez lui et l'ont placé provisoirement au sommet de leur "Nouvelle République", promettant de nouvelles élections après la stabilisation. Qu'il soit un martyr ou un collaborateur volontaire est encore sujet à débat.§!"

