### Parties ###
 FNG_totalist_party:0 "Radicaux"
 FNG_totalist_party_long:9 "Radicaux et Révolutionnaires indépendants\n§LLa branche révolutionnaire du radicalisme en Chine a une histoire fascinante, émanant de la lutte immémoriale des martyrs et des héros contre les injustices. Mobilisant la fureur des masses, divers révolutionnaires se sont succédé, pacifiquement ou par le feu et la guerre. Se rassemblant pour la plupart dans divers partis tels que le Kuomintang ou le Parti Jeune Chine, la pensée révolutionnaire est largement opposée à celle des réformistes.\n\nL'attrait du radicalisme s'étend cependant à toute la Chine, de la steppe frontalière du Nord-Ouest aux rues bruyantes de Shanghai, et beaucoup s'accrochent aux idéaux d'une Chine radicalement transformée, soit par l'idéal égalitaire socialiste, soit par le nationalisme. Agissant sous les ordres des éléments radicaux du Kuomintang, du Parti Jeune Chine ou du Parti syndicaliste chinois, les groupes extrémistes refusent de participer au système parlementaire chinois, considérant le nouveau Gouvernement central comme une trahison de la révolution socialiste.§!\n"
 FNG_syndicalist_party:0 "PSC"
 FNG_syndicalist_party_long:9 "Parti syndicaliste chinois (Zhongguo Gongtuandang)\n§LLargement confiné aux centres urbains ou aux villes portuaires, le Parti syndicaliste chinois est resté pendant des années un simple parti junior fragmenté du Kuomintang chinois. Considéré comme un radicalisme de bas étage épousant une idéologie étrangère dans un pays ne disposant pas d'une base de soutien ouvrier aussi importante qu'en Europe ou en Amérique, le parti syndicaliste chinois a néanmoins remporté des succès significatifs dans son histoire politique. Il a joué un rôle clé dans des événements historiques tels que les grèves de Hong Kong-Canton en 1925, qui ont abouti à la création de la Ligue des Syndicalistes chinois, ou le Soulèvement de Shanghai en 1932, qui a donné lieu à une vaste action de masse nationale.\n\nPluraliste par nature, le Parti syndicaliste chinois s'est retrouvé fragmenté en une série de cliques disparates. Dans le Nord-Est, ils sont largement réduits à une bande de guérilleros dirigés par Guan Xiangying, ce qui diverge fortement de leur appui sur la population ouvrière urbaine du reste de la Chine. Ils ne sont rien de plus qu'un épouvantail politique.§!\n"
 FNG_radical_socialist_party:0 "KMT"
 FNG_radical_socialist_party_long:9 "Kuomintang chinois (Zhongguo Guomindang)\n§LLe Parti nationaliste chinois a pris de nombreuses formes au cours de son histoire mouvementée. Fondé en tant qu'organisation parlementaire du Tongmenghui en 1912 par Sun Yat-sen, Huang Xing et Song Jiaoren, le Kuomintang s'est efforcé de servir fidèlement de parti parlementaire au sein de la première République de Beiyang. Après l'assassinat de Song et les multiples exils de Sun, le Parti s'est réorganisé pour devenir le Gemingang chinois, avant de renaître sous le nom de Guomindang le 10 octobre 1919. Dédié aux Trois Principes du Peuple tels qu'adoptés par le Dr Sun Yat-sen, le Kuomintang aspire à la mise en œuvre du Parti-État, ou Dangguo, et à la mise en œuvre de la Révolution nationale en trois étapes. En aspirant aux Trois Principes de Minzu, Minquan et Minsheng (respectivement le nationalisme, la démocratie et la justice sociale), il espère voir naître une nouvelle république révolutionnaire.\n\nForcé à la clandestinité en 1927, son influence limitée au sein de poches révolutionnaires utopiques et d'exilés épars ne fait aucune différence dans le Nord-Est, où sa plus grande cellule de sympathisants est connue sous le nom de Directoire du Salut national anti-japonais du Nord-Est, dirigé par Zhu Jiqing de l'Association des Camarades pour la Réorganisation.§!\n"
 FNG_social_democrat_party:9 "AEPNE"
 FNG_social_democrat_party_long:9 "Association d'Entraide du Peuple du Nord-Est (Dongbei minzhong zijiu hui)\n§LNée de la brève période de libéralisation de la fin des années 1920 et du début des années 1930, la Ligue nationale unifiée pour la construction allait finalement être interdite, mais cette interdiction ouvrit la voie à la création de la Fédération des Partis démocratiques chinois. Mouvement national s'étendant du nord au sud, la FPDC cherchait à rassembler sous une même bannière tous les partis en faveur du constitutionnalisme et de la démocratie libérale. Grâce à leurs efforts, ils défendirent la cause de la véritable liberté pour le peuple chinois et finirent inévitablement par contraindre même les seigneurs de la guerre les plus puissants à se plier à la fureur des intellectuels et des masses.\n\nAlors que les constitutionnalistes, et en particulier la Société de la Renaissance nationale de Zhang Junmai, sont persona non grata de l'autre côté de la Grande Muraille, divers membres de la clique de Zhang Junmai se sont installés dans le Nord-Est, généralement autour de Zhou Jngwen. En 1933, il a organisé l’Association d'Entraide du Peuple du Nord-Est comme une extension de la branche de gauche du Parti constitutionnaliste chinois, en réponse au Soulèvement de Shanghai de 1932, agissant comme une faction gravitant autour du PCC.§!\n"
 FNG_social_liberal_party:9 "Républicains"
 FNG_social_liberal_party_long:9 "Républicains indépendants\n§LLe gouvernement de Beiyang comprenait de nombreux politiques indépendants, une tradition maintenue dans l'assemblée du Fengtian. Sans doute unis par un désir commun pour un avenir constitutionnaliste et civil, leur incapacité à s'organiser à un niveau supérieur a limité leurs options. En effet, ils votent rarement comme un bloc uni, quelle que soit la question, les législateurs étant achetés ou menacés pour obtenir leur vote.\n\nNéanmoins, ils sont tout de même une force établie et puissante, et apportent de l'espoir dans un avenir constitutionnaliste. Leurs rêves de réformes démocratiques sont cependant destinés à être tempérés par la réalité dans laquelle ils se trouvent. Peu d'entre eux osent s'exprimer, mais ceux qui le font rêvent clairement d'une république bien plus démocratique.§!\n"
 FNG_market_liberal_party:9 "Société pour la Restauration"
 FNG_market_liberal_party_long:9 "Société pour la Restauration (Guangfuhui)\n§LFondée en 1904 sous le nom d'Association pour l'Éducation militaire nationale par Tao Chengzhang, Zhang Taiyan, Cai Yuanpei, Gong Baoquan et Wei Lan, la future Société pour la Restauration était une organisation révolutionnaire basée à Shanghai qui s'étendait au Jiangsu et au Zhejiang. Fortement anti-mandchoue, la Société pour la Restauration utilisait diverses institutions comme l'École Datong de Xu Xilin pour créer un bloc paramilitaire de cadres révolutionnaires prêts à "rendre le pouvoir au peuple Han, reprendre nos montagnes et nos fleuves, nous dévouer au pays, puis nous retirer une fois le succès atteint".\n\nAvec la fondation du Tongmenghui, la plupart de la Société pour la Restauration avait fusionné avec le nouveau Parti révolutionnaire, mais certains comme Xu Xilin et Qiu Jin continuaient d'opérer indépendamment, mourant dans des tentatives de soulèvement. En 1908, Tao reprit les opérations du parti à la suite de désaccords avec Sun Yat-sen, et en 1910 Zhang Taiyan aida Tao à se séparer officiellement de Sun. Combattant pendant Xinhai, l'organisation fut démantelée en 1912 après l'assassinat de Tao par Chiang Kai-shek.\n\nToutefois, la Société pour la Restauration, en tant qu'icône et organisation, a récemment été ressuscitée par deux de ses anciens membres, Zhou Yawei et sa femme Yin Ruizhi. Révolutionnaires engagés à des degrés divers, la nouvelle Société pour la Restauration plaide pour une forme vague de libéralisme nationaliste et républicain, et conserve certains amis au Zhejiang.§!\n"
 FNG_social_conservative_party: "Clique des Communications"
 FNG_social_conservative_party_long:9 "Clique des Communications (Jiaotongxi)\n§LSeule faction politiquement cohérente issue de l'ancien Gouvernement de Beiyang, la "Clique des Communications" a été fondée à l'aube de la Révolution Xinhai par Tang Shaoyi, même si elle est surtout associée à des personnalités telles que Liang Shiyi, son dirigeant de longue date et l'un de ses membres les plus en vue. Rattachée au ministère des Postes et des Communications, chargé des chemins de fer, des services postaux, de la navigation, des téléphones et de la Banque des Communications, la Clique des Communications jouait un rôle crucial au sein de l'ancien Gouvernement de Beiyang en raison de ses immenses richesses et de ses revenus considérables.\n\nSoutenant fermement la restauration de la monarchie par Yuan Shikai, tant par conviction que par intérêt personnel, la "Vieille" Clique des Communications fut exilée après la défaite de Yuan en 1915, donnant naissance à la "Nouvelle" Clique des Communications. Centrée autour des remplaçants de Liang à la Banque des Communications, elle fut fondée par Cao Rulin, Zhang Zongxiang et Lu Zongyu, et était étroitement liée à la Clique de l'Anhui. Avec le retour de Liang et de Zhou Zhiqi en 1918, la vieille clique devint suffisamment puissante pour fonctionner à la manière d'un parti politique à l'Assemblée nationale, sur un programme de modernisation.\n\nLa Nouvelle Clique des Communications, composée de japonophiles et de pragmatiques, allait s'effondrer politiquement à la suite de son attitude lors des pourparlers de paix d'après-guerre concernant les revendications japonaises. Lorsque Liang devint Premier ministre en 1921, il fut destitué par Wu Peifu malgré la farouche opposition de Zhang Zuolin, ce qui entraîna la Première Guerre ZhiFeng. Ayant autrefois occupé les fonctions de Premier ministre et de Président, les membres survivants des Vieille et Nouvelle Cliques des Communications se concentrent désormais davantage sur les querelles avec les Japonais au sujet des projets de développement des infrastructures.§!\n"
 FNG_authoritarian_democrat_party: "Ligue pour la Reconquête"
 FNG_authoritarian_democrat_party_long:9 "Ligue pour la Reconquête (Guangfuxi)\n§LUne association informelle de généraux déchus, de gouverneurs, de fonctionnaires et d'hommes politiques sans affiliation idéologique marquée, dont la plupart se sont retrouvés au Fengtian car il existe peu d’autres endroits où ils pourraient exercer un semblant de pouvoir. Facilement corruptibles et influençables, ils servent souvent les intérêts de quiconque est prêt à les payer ; par conséquent, bien qu’elle contrôle une grande partie de l'Assemblée, la "ligue" est fortement divisée et manque de la volonté politique nécessaire pour agir de manière décisive.\n\nCependant, leur chef de file informel, Wang Yitang, nourrit depuis longtemps des ambitions politiques plus grandes que celle d’être le complice de Zuolin. Ayant rassemblé au sein de la Ligue un grand nombre d’anciens membres de la Clique de l'Anhui, il a transformé l’organisation en une sorte de renaissance de la machine politique de leur ancien ami, bien qu’elle dépende du Fengtian pour compléter son bras armé.§!\n"
 FNG_paternal_autocrat_party: "Clique de Zhang"
 FNG_paternal_autocrat_party_long:9 "Clique de Zhang (Zhanghui)\n§LAncrée dans les débuts de la carrière de Zhang Zuolin en tant que bandit puis soldat, la Clique de Zhang n’est rien d’autre qu’un vaste ensemble hétéroclite regroupant diverses organisations et factions de moindre envergure, composées de fidèles et de généraux. Si l’idéologie est présente dans les décisions politiques des membres de la Clique de Zhang, elle reste secondaire par rapport à la loyauté envers Zhang Zuolin. Peu en mesure de continuer à gouverner en tant que simples hommes forts militaires, les prétentions à la démocratie de la Clique de Zhang et son manque d'engagement général envers une véritable idéologie la laissent ouverte et malléable à de nombreuses interprétations du républicanisme chinois.\n\nAvec des cliques régionales plus petites réparties dans tout le Dongbei, celles-ci fonctionnent comme des groupes d'intérêt au sein du cercle restreint de Zhang Zuolin ; la Clique du Heilongjiang de Wan Fulin, Wu Junsheng et Ma Zhanshan, ou la Clique Shaoshuai de Zhang Xueliang, la Clique Shikan de Yang Yuting, ou encore la Clique Jilin de Zhang Zuoxiang, pour n'en citer que quelques-unes. Considérée comme ayant la plus grande influence sur la vision politique de Zuolin, la Clique de Zhang elle-même est en proie à des luttes intestines et à des querelles à mesure que les convictions idéologiques et les loyautés mûrissent, puis s'estompent.§!\n"
 FNG_national_populist_party:9 "Parti Jeune Chine"
 FNG_national_populist_party_long:9 "Parti Jeune Chine (Zhongguo Qingniandang)\n§LNé de la "Société Jeune Chine" étudiante, le Parti Jeune Chine fut l'un des successeurs de cette société et se divisa en factions "nationaliste", "socialiste" et "idéaliste", dirigées respectivement par Zeng Qi et Li Huang, Li Dazhao et Wang Guangqi. Lors de leurs voyages d'études en France, Zeng Qi et Li Huang, ainsi que les autres membres de leur faction nationaliste, se disputaient avec d'autres étudiants en France tels que Zhou Enlai, Cai Yuanpei et Li Shizeng.\n\nDevenues parfois violentes, les manifestations de soutien au Parti syndicaliste chinois amènent Zeng et Li à former leur propre parti, annonçant la création du Parti Jeune Chine en 1923, en dehors de Paris. Se développant rapidement parmi les organisations étudiantes chinoises, le Parti Jeune Chine s'opposa concrètement à la coopération du Kuomintang avec le PSC, et le PJC revint à Shanghai en fondant une série de sociétés politiques et de journaux en 1924.\n\nLargement confiné au sud de la Grande Muraille, le Parti Jeune Chine a néanmoins un peu d'influence au Nord-Est. Grâce à des contacts dans diverses institutions éducatives telles que les académies de Feng Yong ou l'Académie de l'Armée du Nord-Est, Wang Shizeng a réussi à rallier des intellectuels comme Wang Jiexia et Huo Weizhou, gagnant un avant-poste au sein de la Clique du Fengtian.§!\n"

