 FNG_grand_marshals_favor_category_desc:9 "Le Gouvernement de Fengtian est composé de plusieurs factions corrompues et hargneuses qui ne sont unies que par leur désir commun de reconquérir toute la Chine. Un équilibre sain entre toutes ces factions est crucial pour la stabilité du gouvernement.\n\n[FNG_communications_clique_influence][FNG_recovery_league_influence][FNG_national_unity_league_influence][FNG_zhang_clique_influence]"

