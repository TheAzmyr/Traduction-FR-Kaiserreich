### Focuses ###
 FNG_Preservation_of_the_Xinhai_Order: "Préservation de la Révolution Xinhai"
 FNG_Preservation_of_the_Xinhai_Order_desc: "Ironiquement, le Fengtian est le seul gouvernement national à maintenir l'ordre établi par la révolution Xinhai en 1911, qui appelait au renversement des Qing et à l'instauration d'une République. Bien que ses engagements républicains soient discutables, et que la reconquête du Sud soit actuellement irréaliste, le gouvernement a défendu haut et fort ces deux objectifs, car ils favorisent la légitimité nationale."

FNG_Fuguo_Qiangbing: "Fuguo Qiangbing"
 FNG_Fuguo_Qiangbing_desc: "Traduit en gros par "Enrichir le pays, renforcer l'armée", ce proverbe remonte aux anciens philosophes légalistes, mais a été utilisé plus récemment pour inspirer des réformes à la fois dans la Chine de l'ère Guangxu et au Japon de l'ère Meiji. Aujourd'hui, il est à nouveau appliqué en fengtien, alors que le gouvernement cherche à se moderniser et à frapper éventuellement le Sud contre la Clique Zhili qui renaît, et à partir de là, à établir un contrôle sur toute la Chine."

 FNG_Open_the_Propaganda_Front: "Ouvrir le Front de la Propagande"
FNG_Open_the_Propaganda_Front_desc: "Parfois, les batailles les plus décisives sont menées et gagnées dans les cœurs et les esprits. Nous menons une guerre de mots passive avec [QIE.GetNameDef] depuis 1928, et le moment est venu de lancer une nouvelle offensive et de redoubler d'efforts. Dix mille ans à la République !"

#Suppress Regionalist Sentiment Branch
 FNG_Suppress_Regionalist_Sentiment: "Supprimer le Sentiment Régionaliste"
 FNG_Suppress_Regionalist_Sentiment_desc: "Pendant de nombreuses années, le principal slogan politique de Zhang Zuolin était "Le Nord-Est pour le Nord-Est", mais lorsque ses ambitions se sont tournées vers Beijing, ce message régionaliste a dû être mis de côté. Depuis lors, il s'est avéré être une épine dans le pied du Grand Maréchal, et nombreux sont ceux qui continuent d'épouser ces vieux sentiments. Le temps est venu de mettre fin à cette affaire une fois pour toutes."

 FNG_Silence_Targeted_Subversives: "Faire Taire les Éléments Subversifs"
 FNG_Silence_Targeted_Subversives_desc: "Le mouvement régionaliste n'a jamais été organisé, mais il a reçu le soutien de la noblesse locale, des enseignants et des bureaucrates du gouvernement. Certaines de ces personnalités sont devenues de plus en plus importantes, et en les réduisant au silence, on risque de couper la tête du serpent régionaliste. Certains peuvent être soudoyés, et d'autres peuvent être menacés ou renvoyés - sans parler d'autres méthodes persistantes."

 FNG_Justify_Mass_Arrests: "Justifier les Arrestations Massives"
 FNG_Justify_Mass_Arrests_desc: "Tant que le mouvement régionaliste restera pacifique, nous ne disposerons pas du soutien institutionnel et public nécessaire pour l'écraser de manière décisive. En envoyant des agents déguisés en manifestants, nous pouvons pousser le mouvement vers des moyens violents, leur faire perdre leur soutien public, puis justifier des arrestations massives."

#Mantetsu Collaboration Section
 FNG_Mantetsu_Collaboration:9 "[FNG_Mantetsu_Collaboration_focus_name]"
 FNG_Mantetsu_Collaboration_name:0 "Collaboration avec la Mantetsu"
 FNG_Seize_Mantetsu_Assets:9 "Saisir les Actifs de la Mantetsu"
 FNG_Mantetsu_Collaboration_desc:9 "[FNG_Mantetsu_Collaboration_focus_desc]"
 FNG_Mantetsu_Collaboration_normal_desc:0 "La Mantetsu, également connue sous le nom de "Compagnie des Chemins de fer de Mandchourie du Sud", exerce une influence considérable sur notre économie, avec de nombreuses filiales allant des minoteries aux hôpitaux. Son aide sera malheureusement indispensable pour développer la plupart des secteurs de notre économie qui nécessitent l'expertise technique japonaise."
 FNG_Seize_Mantetsu_Assets_desc:9 "Avant le retrait japonais, la Mantetsu était l'une des entités "privées" les plus influentes de tout le Dongbei, possédant un large éventail de filiales et d'actifs allant des chemins de fer aux hôpitaux. Maintenant que les relations avec le Japon se sont détériorées, la saisie des actifs de la Mantetsu devrait nous permettre de reprendre le contrôle de notre économie et de la développer."

 FNG_Yamato_Hotel_Licenses:9 "[FNG_Yamato_Hotel_Licenses_focus_name]"
 FNG_Yamato_Hotel_Licenses_name:0 "Licences Hôtelières Yamato"
 FNG_Repurpose_Yamato_Hotel_Franchises:9 "Réorienter les Franchises Hôtelières Yamato"
 FNG_Yamato_Hotel_Licenses_desc:9 "[FNG_Yamato_Hotel_Licenses_focus_desc]"
 FNG_Yamato_Hotel_Licenses_normal_desc:0 "L'une des initiatives les plus fructueuses de la Mantetsu en Mandchourie est sa franchise d'hôtels Yamato, qui accueille les innombrables hommes d'affaires japonais qui font quotidiennement la navette entre la Mandchourie et l'archipel japonais. Malgré l'influence indésirable qu'ils exercent, leurs compétences et leurs capitaux sont indispensables. Nous devons décider de leur avenir."
 FNG_Repurpose_Yamato_Hotel_Franchises_desc:9 "Avec le départ des Japonais, nous nous retrouvons avec plusieurs hôtels de luxe vides qui ne verront pas de clients de sitôt. Étant donné qu'il est peu probable que des hommes d'affaires et des dignitaires japonais viennent visiter notre territoire dans un avenir proche, il serait judicieux de transformer ces hôtels de luxe en quelque chose de plus utile."

 FNG_Japanese_Electrical_Expertise: "Expertise Électrique Japonaise"
 FNG_Japanese_Electrical_Expertise_desc: "En raison du retard de la Chine au cours du siècle dernier et du chaos des deux dernières décennies, le pays compte peu d'ingénieurs natifs. L'aide du Japon sera essentielle pour apporter la modernité au Nord-Est."

 FNG_Mantetsu_Research_Wing:9 "[FNG_Mantetsu_Research_Wing_focus_name]"
 FNG_Mantetsu_Research_Wing_name:0 "Aile de Recherche de la Mantetsu"
 FNG_Expand_Northeastern_University:9 "Développer l'Université du Nord-Est"
 FNG_Mantetsu_Research_Wing_desc:9 "[FNG_Mantetsu_Research_Wing_focus_desc]"
 FNG_Mantetsu_Research_Wing_normal_desc:0 "La Division de recherche de la Mantetsu, connue sous le nom de "Mantetsu Chōsabu", constitue la pièce maîtresse du programme colonial japonais et poursuit un large éventail d'objectifs scientifiques. Ses moyens financiers considérables et son vivier de talents pourraient nous être d'une grande utilité dans le cadre de nos propres efforts."
 FNG_Expand_Northeastern_University_desc:9 "Fondée en 1902 sous le nom d’Université du Fengtian par Zhao Erxun, alors Vice-roi des Trois Provinces du Nord-Est, l’Université du Nord-Est allait finir par devenir indispensable à la région, constituant notre principale source de connaissances techniques. Puisque nous ne pouvons plus compter sur l’assistance technique des Japonais, il est impératif que nous développions notre capacité à acquérir une expertise technique au niveau national."

 FNG_Mantetsu_Civil_Engineering_Projects: "Projets de Génie Civil de la Mantetsu"
 FNG_Mantetsu_Civil_Engineering_Projects_desc: "Si les Japonais ont beaucoup à gagner directement des grands projets de génie civil au Fengtian, ils le font aussi indirectement en contribuant à présenter notre régime comme parvenant à améliorer la vie quotidienne des citoyens. À cet égard, nos intérêts sont mutuellement alignés."

#Crossover Section
 FNG_Develop_the_Northern_Frontier: "Développer la Frontière Nord"
 FNG_Develop_the_Northern_Frontier_desc: "Depuis des temps immémoriaux, la partie nord du Heilongjiang et du Xing'an est dominée par une forêt boréale montagneuse, balayée par les vents violents de Sibérie et habitée uniquement par les nomades de passage. Les technologies modernes pourraient permettre aux colons de pénétrer dans cet environnement hostile, de poursuivre les rumeurs de charbon, d'or et de graphite dans les montagnes de Khingan."

 FNG_Fengtian_Society_for_Light_Metals: "Société du Fengtian pour les Métaux Légers"
 FNG_Fengtian_Society_for_Light_Metals_desc: "On sait depuis de nombreuses années qu'il existe d'importants gisements de bauxite et d'alunite dans la province du Fengtian, mais les progrès récents des laboratoires parrainés par Mantetsu à Fushun et à Tokyo ont permis de produire de l'aluminium, grâce à un certain nombre de procédés électrochimiques."

 FNG_Yalu_and_Songhua_Hydroelectricity: "L'hydroélectricité de Yalu et Songhua"
 FNG_Yalu_and_Songhua_Hydroelectricity_desc: "Les abondants gisements de charbon de la Mandchourie constituent une excellente source d'énergie, mais les forts courants des rivières Yalu et Songhua pourraient fournir une énergie supplémentaire à un coût minime. Avec l'expertise japonaise, nous pourrions exploiter ces puissantes rivières pour alimenter plus de foyers et d'industries."

 FNG_Japanese_Coal_Gasification_Methods: "Méthodes Japonaises de Gazéification du Charbon"
 FNG_Japanese_Coal_Gasification_Methods_desc: "La quête du Japon pour du pétrole crucial l'a mené en Mandchourie, mais maintenant avec les résultats décevants de la prospection, la gazéification du charbon semble être la seule voie logique à suivre. Bien qu'ils soient très gourmands en énergie, les énormes gisements de charbon de Fushun pourraient rendre les processus complexes intéressants."

 FNG_Manchurian_Model_Cities: "Villes Modèles de la Mandchourie"
FNG_Manchurian_Model_Cities_desc: "Le Japon se donne parfois des moyens surprenants pour présenter son rôle en fengtien comme celui d'un paternalisme bienveillant. C'est pourquoi Mantetsu prévoit d'installer des systèmes électriques, d'égouts et de tramways à la pointe de la technologie dans les grandes villes de Shenyang, Changchun et Harbin."

#Industrial Development Committee Section
 FNG_Found_the_Northeast_IDC: "Fonder la CDI du Nord-Est"
 FNG_Found_the_Northeast_IDC_desc: "Sur recommandation du Japon, une proposition a été faite pour organiser plusieurs hommes d'affaires et hommes politiques influents en un organisme appelé "Commission de développement industriel du Nord-Est" qui pourrait guider le développement industriel de Fengtian."

FNG_Expand_the_Anshan_Mines: "Développer les mines d'Anshan"
FNG_Expand_the_Anshan_Mines_desc: "Les énormes gisements de fer d'Anshan ont été décrits comme étant d'une "importance mondiale", et produisent près de 7 millions de tonnes de fer, avec le potentiel de tripler la production d'ici 1942. Cette expansion semble susceptible de propulser Anshan vers l'un des plus grands centres industriels d'Asie de l'Est"

FNG_Establish_the_Jinzhou_Industrial_Zone: "Créer la zone industrielle de Jinzhou"
FNG_Establish_the_Jinzhou_Industrial_Zone_desc: "Les quais de Jinzhou et sa position stratégique dans le "couloir Liaoxi", qui relie les transports terrestres entre le nord et le nord-est de la Chine, en font une cible de choix pour le développement encouragé par le gouvernement. Il reste à voir si des règles spéciales seront appliquées à cette zone en faveur des entreprises chinoises ou japonaises"

 FNG_Expand_the_Fushun_Mines: "Développer les Mines de Fushun"
FNG_Expand_the_Fushun_Mines_desc: "Les mines autour de Fushun produisent près de 11 millions de tonnes de charbon par an, avec des gisements promettant de produire plus de 4,5 milliards de tonnes au total. Alors que certains trains et navires modernes en Occident utilisent le pétrole, l'Empire japonais fonctionne au charbon, et l'importance stratégique de ces mines ne peut être sous-estimée"

 FNG_Yingkou_Commercial_Development: "Développement Commercial de Yingkou"
FNG_Yingkou_Commercial_Development_desc: "La ville portuaire de Yingkou est la principale porte d'entrée de Fengtian dans le monde, et le deuxième plus grand port du golfe de Bohai après celui contrôlé par le Japon [745.GetCapitalVictoryPointName]. L'augmentation considérable de la production de matériaux à Fengtian exige un investissement tout aussi important dans les infrastructures commerciales"

#Develop the Nine Provinces Section
 FNG_Develop_the_Three_Northeast_Provinces: "Développer les trois provinces du Nord-Est"
 FNG_Develop_the_Three_Northeast_Provinces_desc: "Les Trois Provinces du Nord-Est, Fengtian, Jilin et Heilongjiang, abritent déjà plus de 30 % des chemins de fer chinois et une grande partie de l'industrie lourde du pays. Cependant, si l'on veut gagner la guerre de reconquête nationale, il faudra développer et améliorer ces deux éléments. L'idéal serait que ce soit uniquement le peuple chinois qui y parvienne, mais la réalité veut que les Japonais soient les principaux responsables de l'évolution de la situation."

FNG_Wang_Yongjiangs_Legacy: "L'héritage de Wang Yongjiang"
FNG_Wang_Yongjiangs_Legacy_desc: "La transformation de la Mandchourie, d'une région frontalière arriérée en l'une des régions les plus prospères de Chine, est due au travail de Wang Yongjiang, le défunt ministre des finances de Zhang Zuolin. Dégoûté par les coûteuses excursions du Grand Maréchal au sud de la Grande Muraille en 1928, Wang démissionna et mourut peu après, son travail étant resté inachevé. Nous devons reprendre là où il s'est arrêté"

 FNG_Reorganise_the_NTC: "Réorganiser le NTC"
 FNG_Reorganise_the_NTC_desc: "Fondée par le gouvernement fengtien peu après sa création, la Commission nationale des transports sert de conseil de planification pour la construction d'infrastructures dans tout le pays. Les Japonais affirment que son but premier est de perturber les activités de Mantetsu, et il se peut que cette affirmation soit au moins partiellement vraie"

FNG_Support_Sino-Japanese_Joint_Companies: "Soutenir les sociétés mixtes sino-japonaises"
FNG_Support_Sino-Japanese_Joint_Companies_desc: "Un grand nombre d'entreprises en fengtien offrent des actions à la fois aux Chinois et aux Japonais, y compris la tristement célèbre Mantetsu, mais relativement peu de Chinois ont les fonds nécessaires pour investir et, par conséquent, la plupart des sociétés mixtes sont dominées par les Japonais. Le soutien du gouvernement peut nous permettre de fournir des moyens et des incitations à nos compatriotes chinois et de modifier progressivement cet équilibre"

### Beijing Tree ###

 FNG_From_Beijing_to_the_Begonia_Leaf: "De Beijing à la Feuille de Bégonia"
 FNG_From_Beijing_to_the_Begonia_Leaf_desc: "Depuis des décennies, étudiants et nationalistes comparent la forme de la Chine, c'est-à-dire la Chine indivise, à la forme d'une feuille de bégonia. Avec Beijing entre nos mains, il est temps de reconquérir toute notre patrie et de faire de la feuille de bégonia une réalité !"

 FNG_Suppress_the_Bandits_Collect_the_Harvest: "Réprimez les Bandits ; Récoltez la Moisson"
 FNG_Suppress_the_Bandits_Collect_the_Harvest_desc: "La dernière fois que les soldats de l'armée de Fengtian sont entrés dans la plaine de Chine du Nord, certaines unités ont été encouragées à réprimer le banditisme et à aider à la collecte des récoltes saisonnières en échange de logements et de nourriture. Là où de telles commodités étaient normalement simplement saisies, ces tactiques semblent avoir amélioré l'agitation locale et l'activité partisane. Tous les commandants feraient bien de suivre cet exemple."

 FNG_Continue_the_Reclamation_War: "Continuer la Guerre de Reconquête"
 FNG_Continue_the_Reclamation_War_desc: "La guerre de reconquête nationale ne s'est pas terminée avec la prise de Beijing. Une par une, chacune des provinces chinoises doit être mise au pas, et le pays à nouveau unifié."

 FNG_Integrate_Occupied_Arsenals: "Intégrer les Arsenaux Occupés"
 FNG_Integrate_Occupied_Arsenals_desc: "L'arsenal de Shenyang est sans aucun doute le plus grand de Chine, mais en intégrant et en spécialisant les arsenaux nouvellement saisis, désormais dans le cadre d'un système d'approvisionnement national, nous pourrions alléger le fardeau de Shenyang et améliorer notre capacité logistique globale."

 FNG_Crush_Flies_and_Capture_Pigs: "Écraser les Mouches et Capturer les Cochons"
 FNG_Crush_Flies_and_Capture_Pigs_desc: "La corruption et l'abus de pouvoir sont monnaie courante en Chine depuis plusieurs décennies, et tous les niveaux du Gouvernement du Fengtian sont complices de cette activité. Afin de regagner la confiance du public, il faut rétablir un certain ordre public, et des exemples seront donnés de "mouches" de bas niveau et de "porcs" de haut niveau, qui se sont gavés avec avidité des moyens de subsistance de la nation."

 FNG_Expand_the_Baojia_System: "Élargir le Système Baojia"
 FNG_Expand_the_Baojia_System_desc: "Le système Baojia est une ancienne méthode d'organisation sociale et de recrutement militaire. Zhang Zuolin a relancé cette pratique il y a plusieurs décennies dans le nord-est, et avec beaucoup de succès, mais le temps est venu d'étendre à nouveau le système au reste de la Chine, où il a été largement abandonné"

 FNG_Incorporate_Local_Patronage_Networks: "Intégrer les réseaux locaux de mécénat"
FNG_Incorporate_Local_Patronage_Networks_desc: "Toute institution a plus à offrir que ce que l'on voit, et tout bon seigneur de guerre construit sa forteresse grâce à un réseau de partenariats réciproques négociés à huis clos. Avec l'effondrement de l'autorité ennemie, de nombreuses personnes et institutions de ce type n'ont plus de place précise dans le nouvel ordre. Il y a toutes les raisons de commencer à intégrer ces individus dans nos propres réseaux, lorsque cela est possible"

 FNG_Centralize_Provincial_Revenues: "Centraliser les recettes provinciales"
FNG_Centralize_Provincial_Revenues_desc: "La plus grande source de désunion en Chine a peut-être été la décentralisation du système fiscal, commencée avec l'introduction des tarifs de transit provinciaux "Lijin" en 1853. Le nouveau gouvernement central doit limiter l'imposition provinciale et réduire le pourcentage que les autorités locales peuvent garder pour elles-mêmes. Sinon, les gouvernements locaux continueront à priver la nation de revenus"

FNG_Institute_Labour_Discipline: "Institut de Discipline du Travail"
 FNG_Institute_Labour_Discipline_desc: "La politique industrielle de notre nation est menacée par les intérêts de plus en plus divergents des industriels, des dirigeants syndicaux et des travailleurs. Les syndicats ne servent qu'à diviser et à créer de la méfiance, obligeant les dirigeants de notre pays à faire des compromis. Ce n'est que par une intervention qui renforce la discipline et la loyauté des organisations syndicales que peut se forger l'unité qui nous permettra de faire avancer notre pays"

FNG_The_Generals_Know_Best: "Les généraux savent ce qu'il y a de mieux"
 FNG_The_Generals_Know_Best_desc: "Il ne fait aucun doute qu'une armée centralisée peut servir de base à un État centralisé, mais la grande taille de la Chine exige une approche différente. C'est pourquoi nous continuerons à nommer des gouverneurs militaires. Pour mieux équilibrer cet arrangement, les armées provinciales doivent recruter la majorité des troupes en dehors de leur propre province, et limiter leur production et leur déploiement d'armes lourdes"

 FNG_One_Army_One_Republic: "Une Armée, Une République"
FNG_One_Army_One_Republic_desc: "Si nous devons tirer une seule leçon de plus de deux mille ans d'histoire chinoise, c'est que lorsque la force militaire est divisée, le pays l'est aussi. Pour construire une Chine unifiée, nous devons créer une seule armée, sous une seule bannière, à la direction d'une seule structure de commandement. Cette mesure ne sera populaire à aucun niveau de gouvernement en dehors du Cabinet"

 FNG_Secure_the_Rear_Area: "Sécuriser les Zones Arrières"
FNG_Secure_the_Rear_Area_desc: "La plaine de Chine du Nord a été saisie, mais elle n'a pas été pacifiée. Pour l'instant, l'armée ne contrôle que les chemins de fer et leur proximité immédiate, et les bandits et les partisans courent en liberté au-delà. La Chine est un grand pays, et les zones arrières doivent être minutieusement fouillées afin d'assurer une avancée sans compromis vers l'objectif de réunification nationale"

 FNG_against_imperialism_of_all_forms:9 "Contre l'Impérialisme sous Toutes ses Formes"
 FNG_against_imperialism_of_all_forms_desc:9 "Le Japon se présente comme un ami, un allié compétent, voire un égal. Mais les Chinois ne sont pas dupes : ils connaissent leurs visées sur ce pays, leurs ambitions pour l'Asie tout entière, ainsi que leur mépris pour toute tentative de se détacher de leurs "alliés" chinois. Ils ne font que pratiquer l'impérialisme sous une forme bien plus subtile, mais ils devront se montrer bien plus rusés s'ils veulent déjouer le Vieux Maréchal."

 FNG_faith_in_the_anguojun:9 "Foi dans l'Anguojun"
 FNG_faith_in_the_anguojun_desc:9 "Seule l'Armée nationale de Pacification, branche militaire du gouvernement rival dirigé par le Fengtian, peut garantir la pérennité de l'héritage de la Révolution Xinhai et du principe des Cinq Races sous une Seule Union. Entachée par des personnages tels que les seigneurs de la guerre provinciaux, les Fédéralistes, les Démocrates de la Troisième Voie et les Révolutionnaires, la Révolution chinoise a été terriblement dénaturée, transformée en un cancer virulent qu'il faut éradiquer. Et seuls nos officiers en sont capables."

 FNG_ensuring_efficient_procurement:9 "Garantir l'Efficacité des Achats"
 FNG_ensuring_efficient_procurement_desc:9 "Soucieux de s'enrichir et d'assurer leur avenir, divers petits seigneurs de la guerre et bandits de second ordre se sont mis à détourner des livraisons d'armes "légitimes" destinées aux unités du Gouvernement central. De même, la guerre et la destruction ont causé d'importants dégâts aux arsenaux locaux chinois, et leur production, autrefois florissante, a connu une chute vertigineuse ces derniers temps. La logistique et l'approvisionnement sont les clés de la victoire, c'est pourquoi il convient d'y accorder toute l'attention et le soin nécessaires."

 FNG_revitalise_the_bank_of_communications:9 "Revitaliser la Banque des Communications"
 FNG_revitalise_the_bank_of_communications_desc:9 "La Banque des Communications détenait autrefois entre ses mains la stabilité même des gouvernements chinois, car elle facilitait les investissements étrangers, essentiels pour soutenir les gouvernements de Yuan Shikai, puis celui de Duan Qirui. Cependant, avec le prêt Nishiwara et le tollé suscité par la Conférence de Paix de Paris, son influence s'est considérablement affaiblie. Il est tout à fait naturel que les compétences de ses employés soient à nouveau mises en avant dans un rôle de premier plan."

 FNG_renewing_trust_in_industry:9 "Renouveler la Confiance dans l'Industrie"
 FNG_renewing_trust_in_industry_desc:9 "Avec une ère des seigneurs de la guerre qui s'étend à l'infini, à l'exception d'un bref interrègne marqué par l'unification du Zhili, la stabilité et la confiance dans la capacité industrielle de l'État-nation chinois sont particulièrement faibles, du moins aux yeux des entreprises étrangères. Face à l'explosion du mouvement anti-concessionniste qui a précédé le Soulèvement de Shanghai et d'autres événements, il faudra un effort concerté de la part du gouvernement pour rétablir la confiance dans nos usines."

 FNG_the_marshal_and_the_emperor:9 "Le Maréchal et l'Empereur"
 FNG_the_marshal_and_the_emperor_desc:9 "Main dans la main, le Fils du Ciel et le Vieux Maréchal du Dongbei ont ouvert la voie à une nouvelle ère de prospérité pour l'Asie. Il serait regrettable d'y mettre fin prématurément. Tout ce dont le Fengtian a besoin, il l'obtient du Japon, et bien que de nombreux membres du gouvernement mettent en garde le Maréchal contre les pièges, les intrigues et les complots liés aux Japonais, il en faut plus qu'un simple espion pour terrasser le Tigre du Nord."

 FNG_following_the_kingly_way:9 "Suivre la Voie Royale"
 FNG_following_the_kingly_way_desc:9 "La Voie royale, cette méthode de gouvernance confucéenne visant à garantir la moralité et la bienveillance, bien que traditionnellement appliquée à l'empereur dans le cadre de sa cour, occupe une place tout aussi importante au sein du Palais du Maréchal. Ne vous y trompez pas, il n'y aura pas de monarques dans la nouvelle Chine, mais le Vieux Maréchal, le Père de la Nation, c'est son portrait qui trône sur la place Tiananmen, et c'est son exemple que les Chinois doivent suivre."

 FNG_militarise_the_student_body:9 "Militariser le Corps Étudiant"
 FNG_militarise_the_student_body_desc:9 "En cette période de grands troubles et d’effroyables effusions de sang, ce sont les jeunes qui souffrent le plus. Privés des fondements les plus élémentaires de leur avenir, à savoir le système éducatif, ils ne peuvent que dépérir tandis que la nation se trouve de plus en plus meurtrie. Mais ce sont ces mêmes jeunes qui tiennent l’avenir de la nation entre leurs mains, et il est de leur devoir de se battre pour la Chine et pour la libération nationale."

 FNG_dictatorship_of_the_transport_ministry:9 "Dictature du Ministère des Transports"
 FNG_dictatorship_of_the_transport_ministry_desc:9 "Les chemins de fer sont synonymes de prospérité ! Ou du moins, ils auraient dû l'être. Pourtant, la plupart des chemins de fer en Chine sont construits par des entreprises occidentales, ou tout au moins financés par celles-ci. Concrètement, ils ont toujours été à la fois un symbole de progrès et d'un impérialisme omniprésent. Grâce à une action résolue, des hommes tels que Chang Yinhuai vont reprendre le contrôle des chemins de fer aux mains des impérialistes et les ramener sous l'égide du Gouvernement central."

### Unification Tree ###

 FNG_dongbeis_final_victory:9 "La Victoire Finale du Dongbei"
 FNG_dongbeis_final_victory_desc:9 "Après de nombreuses tentatives infructueuses s'étalant sur plus d'une décennie, le Fengtian a finalement triomphé de tous ses ennemis ; ni le Zhili, ni l'Anhui, ni les Russes n'ont pu résister à l'ingéniosité et au talent des fils et filles du Dongbei. Avec la prise de Beijing pour la troisième fois, il ne reste plus qu'à décider de l'avenir de la République chinoise, et de nombreuses vies pourraient bien en dépendre."

 FNG_the_moral_republic:9 "[FNG_the_moral_republic]"
 FNG_the_moral_republic_desc:9 "[FNG_the_moral_republic_desc]"

 FNG_rulership_as_a_family_business:9 "[FNG_rulership_as_a_family_business]"
 FNG_rulership_as_a_family_business_desc:9 "[FNG_rulership_as_a_family_business_desc]"

 FNG_denouncing_imperialist_vultures:9 "[FNG_denouncing_imperialist_vultures]"
 FNG_denouncing_imperialist_vultures_desc:9 "[FNG_denouncing_imperialist_vultures_desc]"

 FNG_from_poverty_to_extravagance:9 "De la Pauvreté à l'Extravagance"
 FNG_from_poverty_to_extravagance_desc:9 "Autrefois simple bandit errant dans les terres désolées des Trois Provinces du Nord-Est, Zhang Zuolin s'est hissé bien au-delà des rêves les plus fous du plus humble des brigands. Il n'est pas seulement Grand Maréchal, mais aussi celui qui fait et défait les rois de toute la nation. C'est à lui que l'armée obéit, répondant à presque tous ses ordres, et c'est à Zhang Zuolin que la République devra dix mille ans de prospérité !"

 FNG_commencing_true_recovery:9 "Commencer la Véritable Reconquête"
 FNG_commencing_true_recovery_desc:9 "Après plus de cinq ans de querelles internes, il semblerait que la Ligue de la Reconquête ait enfin reçu le feu vert pour se consolider et consolider ses acquis politiques. Ayant été le principal instrument par lequel la Clique du Fengtian a exercé ses ambitions politiques, la reconduction de Pan Fu au poste de Premier ministre a renforcé la vision d'une République porteuse de progrès."

 FNG_harmonising_the_social_classes:9 "Harmoniser les Classes Sociales"
 FNG_harmonising_the_social_classes_desc:9 "Les masses constituent une force puissante, capable de déclencher un tourbillon politique auquel peu d'associations peuvent résister ; l'Anhui s'en est rendu compte, peut-être seulement avec le recul. Mais il est possible de s'attirer les faveurs des masses sans pour autant devenir leur otage. En renforçant les liens entre la paysannerie, les ouvriers, la petite noblesse et les industriels, la Chine peut instaurer une nouvelle prospérité en s'appuyant presque exclusivement sur ses propres forces."

 FNG_the_first_party_of_the_state:9 "Le Premier Parti de l'État"
 FNG_the_first_party_of_the_state_desc:9 "Aucune autre association, ligue, parti ou groupe ne peut imaginer être capable d'exercer le pouvoir en Chine. Il s'agit d'une réalité totalement inconnue de la plupart des autres acteurs sur le terrain. Nous ne sommes pas des apôtres de la démocratie, et nous ne sommes pas non plus assez naïfs pour perpétuer l'autocratie ; nous proposons la seule solution permettant, à terme, d'accéder aux droits civiques, au bien-être, à l'éducation et à la stabilité."

 FNG_clear_cut_political_economics:9 "Politiques Économiques Claires"
 FNG_clear_cut_political_economics_desc:9 "Il ne s'agit pas d'un jeu de cartes : la vie de tous les Chinois est en jeu, et on ne peut confier au Gouvernement central la transformation de ses villages et hameaux les plus modestes en villes modernes si ses dirigeants ne sont que de simples politiciens. Ce n'est que sous la houlette d'hommes d'affaires dotés de sens des affaires et de compétences que la Chine pourra être assurée de son développement économique et de son progrès. On ne peut qu'espérer que, d'ici dix ans, la Chine deviendra une métropole."

 FNG_alliance_of_state_and_business:9 "Alliance de l'État et des Entreprises"
 FNG_alliance_of_state_and_business_desc:9 "La véritable clé du redressement de la Chine, après des décennies de désunion et de troubles, réside dans le capital ; ce n’est qu’à travers les hommes d’affaires et leurs actifs que le gouvernement peut dégager les moyens nécessaires pour recoudre les déchirures de la nation. En concluant des contrats publics avec diverses grandes entreprises, celles-ci engrangent des bénéfices, tandis que le gouvernement peut affecter ses ressources à des fins utiles."

 FNG_government_as_a_machine:9 "Le Gouvernement comme Machine"
 FNG_government_as_a_machine_desc:9 "En matière de politique, il n'y a pas de place pour les débats ni pour les mesquineries ; l'idéologie, l'intellectualisme et l'idéalisme ne font que freiner les efforts déployés par le gouvernement pour s'acquitter de ses fonctions avec une efficacité maximale. Le gouvernement est le seul vecteur par lequel la nation peut se réaffirmer sur la scène internationale, et à ce titre, il doit être géré comme une machine ou une usine, en visant le profit à moindre coût."

 FNG_the_president_of_providence:9 "Le Président Providentiel"
 FNG_the_president_of_providence_desc:9 "Homme de devoir, de persévérance, de dévouement et de loyauté, Yang Yuting a longtemps été privé de son destin. Et cela, de manière flagrante, par crainte de ses capacités. Ayant combattu pendant la majeure partie de l'ère des seigneurs de la guerre, il s'est vu privé de postes uniquement à cause de l'ingérence d'hommes tels que Xueliang. Mais aujourd'hui, ceux-ci ne représentent plus aucune menace pour l'Homme de la Providence et sa République renaissante."

 FNG_the_dragons_gambit:9 "Le Pari du Dragon"
 FNG_the_dragons_gambit_desc:9 "Rares sont ceux qui croiraient qu’un seul homme puisse dompter ou contrôler la Clique du Fengtian aussi bien que le Vieux Maréchal, mais c’est qu’ils n’ont pas rencontré Yang Yuting ni Chang Yinhuai. Jouant le même jeu, mais en sortant vainqueur, Yang a réalisé son plus grand coup de maître à ce jour. Plus aucune façade de courtoisie ni l’incompétence de Xueliang ne viendront contrecarrer ses ambitions. Que les Cinq Races flottent à jamais dans les cieux !"

 FNG_redeeming_the_lost_patriots:9 "Racheter les Patriotes Perdus"
 FNG_redeeming_the_lost_patriots_desc:9 "Grâce à des liens tacites remontant aux années 1920, Yang a toujours porté un regard à la fois admiratif et curieux sur le Parti Jeune Chine. Bien qu’il n’ait pas pu véritablement s’associer à eux dans le Nord-Est, en partie à cause de leur opposition au régime du Fengtian et de l’alliance de Feng Yong avec Xueliang, maintenant qu’ils se retrouvent face à face, Yang ne peut que tendre les bras à ce nouveau groupe d’érudits chevronnés."

 FNG_the_rising_sun_and_the_waking_tiger:9 "Le Soleil Levant et le Tigre Éveillé"
 FNG_the_rising_sun_and_the_waking_tiger_desc:9 "Zhang Zuolin se croyait capable de conclure un accord d'égal à égal avec les Japonais, mais il ne disposait ni du tact ni des compétences nécessaires pour y parvenir. Yang Yuting, en revanche, bien plus doué en tant que soldat, orateur et homme politique, a réussi à gagner la véritable faveur de Tokyo. Ils ne sont plus maître et sujet, mais de véritables égaux, et ensemble, ils sont invincibles."

 FNG_concord_of_nationalities:9 "Concorde des Nationalités"
 FNG_concord_of_nationalities_desc:9 "À l'image de la grande diversité ethnique et nationale de la Chine, la "cour" du gouvernement de Yang Yuting compte en ses rangs des personnalités de tous horizons et de toutes tendances. Qu'il s'agisse de diplômés des académies japonaises, de membres de l'Association Concordia, de la "Clique des Communications", de la "Clique de Zhang" aux sympathies japonaises, ou même des Japonais eux-mêmes. Ce nouveau gouvernement s'inspire fortement de celui de Tokyo, pour le meilleur et pour le pire."

 FNG_freedom_of_the_five_races:9 "Liberté des Cinq Races"
 FNG_freedom_of_the_five_races_desc:9 "La Chine est une nation composée de nombreuses ethnies : les Hans, les Mandchous, les Mongols, les Tibétains, les Huis. Et même une telle classification est loin d’être exhaustive. En unissant les différentes ethnies de la Chine autour des principes directeurs de la Voie royale, l’État peut ancrer l’harmonie nationale dans la notion même de citoyenneté et d’État ; une nation fondée sur la moralité et l’étiquette, et non sur la révolution."

 FNG_the_chinese_shogunate:9 "Le Shogunat Chinois"
 FNG_the_chinese_shogunate_desc:9 "En bref, les Qing ont refusé de se moderniser en raison de leur arrogance et de leur conviction d’avoir reçu un mandat divin ; malgré les nombreuses propositions de divers États offrant des accords extrêmement avantageux, la cour s’est toujours empressée de faire obstacle à la modernisation. Mais les Chinois d’aujourd’hui sont bien plus pragmatiques ; si nous parvenons à tirer tous les enseignements du Japon, nous finirons inévitablement par devenir plus forts qu’eux."

 FNG_in_the_spirit_of_1912:9 "Dans l'Esprit de 1912"
 FNG_in_the_spirit_of_1912_desc:9 "Que ce soit par folie, par idéalisme ou par un vague désir d’un monde plus utopique, le Nord et le Sud ont une nouvelle fois tenté de conclure un accord de réunification nationale mutuellement avantageux. Bien que vivement critiqués et considérés comme une imposture, leurs efforts font écho à ceux de 1912, à l’aube de la Révolution Xinhai. Avec le maintien des différents gouverneurs fédéraux du Sud et la nomination de Zhang Junmai au poste de Premier ministre, les choses se passeront peut-être plus en douceur que la dernière fois."

 FNG_reconstruction_through_autonomy:9 "Reconstruction par l'Autonomie"
 FNG_reconstruction_through_autonomy_desc:9 "L'une des nombreuses promesses faites au mouvement fédéraliste concernait la création d'assemblées provinciales élues démocratiquement, organisées conformément à leurs constitutions provinciales élaborées au niveau local. Bien que la promulgation de ces dernières relève de la compétence du Gouvernement central, la délégation des pouvoirs a permis une reconstruction nationale rapide et régulière, même si elle s'est avérée disparate."

 FNG_Twin_Dragons_Taming_the_Water: "Dragons Jumeaux Domptant l'Eau"
 FNG_Twin_Dragons_Taming_the_Water_desc:9 "Après des décennies de chaos, de désunion et de mauvaise gouvernance, une paix vigilante sous le règne bipartite du Grand Maréchal Zhang Zuolin et du Premier ministre Zhang Junmai semble être un véritable paradis. Ensemble, ils sont devenus connus sous le nom des "Dragons Jumeaux Domptant l'Eau", bien que certains se demandent si cette harmonie peut durer éternellement."

 FNG_disavow_tokyo:9 "Désavouer Tokyo"
 FNG_disavow_tokyo_desc:9 "Le Japon s'est montré utile, voire bienveillant et bénéfique, dans ses relations de longue date avec les nombreux ministres du Gouvernement central actuel. Pourtant, il se révèle incapable de dissimuler sa soif de pouvoir, ni son désir inné de "pots-de-vin", de "concessions", voire d'annexion territoriale. En vérité, il n'a rien appris des deux dernières décennies ; il est donc temps de prendre nos distances avec Tokyo et de nous tourner vers l'autonomie."

FNG_The_Ultimatum: "L'Ultimatum"
FNG_The_Ultimatum_desc: "La Chine est écrasée et humiliée sous la botte des puissances étrangères depuis près d'un siècle. Le temps est venu de mettre fin à l'humiliation nationale, et le Japon doit respecter nos conditions ou notre acier"

 FNG_entering_the_international_scene:9 "Entrer sur la Scène Internationale"
 FNG_entering_the_international_scene_desc:9 "Après avoir longtemps dû traiter avec des courtiers internationaux via le Japon ou des agents de Shanghai, nous avons enfin obtenu la possibilité de négocier la politique de la Chine selon ses propres conditions. Forts du soutien de la nation unie, laissons la véritable République chinoise s'affirmer face à tous les impérialistes étrangers."

FNG_Chunchi-Xiangyi: "Chunchi-Xiangyi"
 FNG_Chunchi-Xiangyi_desc:9 "On a dit un jour que la Chine et le Japon sont "aussi proches que des lèvres et des dents", et aujourd'hui, une intégration plus poussée ne peut que signifier une plus grande prospérité. Nous pouvons maintenant faire en sorte que la Chine tire tous les avantages de la production japonaise. Certains appellent cela la porte d'entrée vers un marché chinois captif, mais nous n'avons pas besoin de semer la peur. Ce que les gens veulent, ce sont des vêtements, des radios et des cigarettes bon marché !"

FNG_Treaty_of_Friendship_and_Cooperation: "Traité d'amitié et de coopération"
 FNG_Treaty_of_Friendship_and_Cooperation_desc: "En reconnaissant la position incontestablement ascendante du Japon à cheval sur l'Est, nous devons reconnaître notre propre rôle en tant que partenaires égaux mais subordonnés dans la poursuite du Rêve Pan-Asiatique. Le temps est venu de rejoindre l'alliance du Japon et de nous engager à atteindre ses objectifs louables."

