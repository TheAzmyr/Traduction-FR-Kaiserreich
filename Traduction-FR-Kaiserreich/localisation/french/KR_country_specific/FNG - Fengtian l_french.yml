### Scripted Loc ###
 FNG_the_moral_republic_zhang:9 "La République Morale"
 FNG_the_moral_republic_yang:9 "Établir la Légitimité Républicaine"

 FNG_the_moral_republic_desc_zhang:9 "En tant que nation, la Chine semble avoir complètement perdu son identité, son caractère national, la structure même qui unit les familles et permet à la société de prospérer. Depuis le 4 Novembre, on assiste à un rejet massif des mérites du confucianisme, mais le néo-confucianisme a également donné naissance à une nouvelle forme de philosophie nationale globale, et ces traditions doivent être respectées."
 FNG_the_moral_republic_desc_yang:9 "La notion de République chinoise s'est trouvée brouillée, voire confuse, au cours des longues décennies de l'expérience républicaine. Incapable de saisir véritablement son véritable objectif, et parfois même retombant brièvement dans le despotisme autocratique, la République a désespérément besoin d'une véritable légitimité, une légitimité qui ne soit pas entachée par la mauvaise gestion et la kleptocratie, et alimentée par une intention sincère de créer un État-nation fort et résilient."

 FNG_rulership_as_a_family_business_zhang:9 "Une Affaire de Famille"
 FNG_rulership_as_a_family_business_yang:9 "Le Règne des Méritants"

 FNG_rulership_as_a_family_business_desc_zhang:9 "Inapte à la présidence, que ce soit par apathie, par désir de rester proche des questions militaires ou par manque de confiance en raison de sa réputation en Chine, le Vieux Maréchal a finalement jugé bon de laisser le Jeune Maréchal prendre les rênes, sous la supervision attentive de son père, bien sûr. Jeunes et ouverts au réformisme, le père et le fils de la République envisagent un avenir radieux pour la Chine."
 FNG_rulership_as_a_family_business_desc_yang:9 "Contrairement à la famille Zhang, insulaire et ignoble, Yang Yuting, Chang Yinhuai, Yu Zhen et Yi Jiqiao comprennent que la Chine ne peut plus être gouvernée par des liens familiaux ; Cao Kun l'a prouvé dans le pire des cas, et au bord du précipice, Zhang Zuolin était susceptible de suivre. La nation doit être gouvernée par ses plus compétents, ses technocrates et ses administrateurs fiables, car elle doit aller au-delà du népotisme."

 FNG_denouncing_imperialist_vultures_zhang:9 "Dénoncer les Vautours de l'Impérialisme"
 FNG_denouncing_imperialist_vultures_yang:9 "Rationalisation des Classes et de la Société"

 FNG_denouncing_imperialist_vultures_desc_zhang:9 "La Chine a longtemps été considérée comme une puissance de second ordre, un terrain de jeu où les grandes puissances pouvaient s'ingérer et se disputer ; quand ce n'étaient pas les Britanniques, c'étaient les Russes ou les Allemands. Et même aujourd'hui, à une époque bien éloignée de l'apogée du colonialisme, les grandes puissances continuent d'exercer leur contrôle sur des concessions clés à travers le pays ; comment une telle catastrophe peut-elle être tolérée en cette nouvelle ère ?"
 FNG_denouncing_imperialist_vultures_desc_yang:9 "Bien qu'ils soient peut-être ennemis dans toute situation autre que celle du gouvernement de Yang Yuting, le Parti Jeune Chine et l'Association Concordia ont miraculeusement trouvé un terrain d'entente. Désireux d'une nouvelle nation, gouvernée par le corporatisme et formant un tout national inclusif, ils ont soutenu le gouvernement de Yuting sous une forme dans laquelle toutes les classes et toutes les couches sociales de Chine travailleront à l'avancement national."
