 #阮振鐸
 FNG_ruan_zhenduo: "Ruan Zhenduo"
 FNG_ruan_zhenduo_bio:9 "Après avoir reçu une éducation standard, Ruan Zhenduo a été diplômé de l'école de médecine Nanman, de style japonais, en 1918, après une série de séjours dans des établissements d'enseignement inférieur. Diplômé en médecine, Ruan travaille comme médecin à l'hôpital Fengtian Mantie et, temporairement, comme médecin chargé de la prévention de la peste à Shenyang. De 1919 à 1920, Ruan étudie la chimie médicale à l'école de médecine de l'université impériale de Kyoto, puis retourne en Chine en 1921 pour occuper les fonctions de responsable d'école et de médecin scolaire à l'université du Nord-Est.\n\nEn tant que médecin jusqu'en 1924, il devient président de la branche de Fengtian de l'Association médicale de Chine et, en 1928, il est nommé responsable adjoint de la prévention de la peste. En 1930, Ruan est directeur de l'hôpital ferroviaire de Changchun Ji-Chang Ji-Dun et, l'année suivante, il est nommé consultant de l'association locale de maintenance de Fengtian. \n\nSe lançant dans la politique grâce à ses contacts japonais, Ruan est nommé secrétaire général du gouvernement provincial de Fengtian et crée l'association Concordia, avec d'autres membres de la Ligue de la jeunesse de Mandchourie, afin d'influencer l'assemblée de Fengtian. En continuant à démontrer son expertise dans une série de postes liés au transport et à la communication, Ruan continuera à défendre la cause du Japon au sein de l'assemblée croupion."
 FNG_ruan_zhenduo_leader_desc:9 "§YNaissance :§! §L12 mai 1892, comté de Tieling, district de Shengjing, Grand Qing§!\n§YCarrière :§! §L$FNG_ruan_zhenduo_bio$\n\nDésormais chef des projets du Japon en Mandchourie, Ruan a reçu carte blanche pour intégrer la Mandchourie dans la Sphère de Coprospérité de la Grande Asie orientale comme lui et ses soutiens japonais le souhaitent.§!"
 FNG_ruan_zhenduo_sic_desc:9 "§YNaissance :§! §L12 mai 1892, comté de Tieling, district de Shengjing, Grand Qing§!\n§YAlignement :§! §mAssociation Concordia§!\n§YCarrière :§! §L$FNG_ruan_zhenduo_bio$§!"

 #靳雲鵬
 FNG_jin_yunpeng:0 "Jin Yunpeng"
 FNG_jin_yunpeng_sic_desc:9 "§YNaissance :§! §L1877, comté de Zou, province du Shandong, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LFrère de Jin Yun'e, le duo fut enrôlé de force dans la "Nouvelle Armée" entraînée par Yuan Shikai à Tianjin, devenant ainsi les subordonnés de Duan Qirui, qui allait bientôt entrer dans la légende. Pendant ses études à l'Académie militaire de Tianjin, il noua des liens solides avec Duan, Xu Shuzheng, Wu Guangxin et Fu Liangzuo. Ils devinrent connus sous le nom des "Quatre King Kong" de la Clique de l'Anhui. Après une série de promotions au poste d'officier d'état-major, il fut affecté au Yunnan en 1911. Lorsque le Soulèvement du Double Neuf lancé par Cai E et Li Genyuan prit de l'ampleur, Jin résista au nom des Qing, mais dut finalement s'enfuir.\n\nRecommandé sans relâche par Duan Qirui, Jin gravit les échelons jusqu’au poste de gouverneur par intérim du Shandong en 1913, devenant influent et riche grâce à son administration. Collaborant avec des personnalités telles que Xu Shuzheng, Qu Tongfeng et Fu Liangzuo, tous les quatre soutinrent résolument Duan dans toutes les affaires pendant son mandat de Premier ministre. Cependant, un conflit alla s'envenimer entre Xu et Jin, Xu étant un jeune soldat de la garde arrogant, tandis que Jin était âgé et passif.\n\nAdhérant finalement à la politique pro-japonaise de la Clique de l'Anhui, il devint chef de l'armée grâce au président Xu Shichang, ce qui entraîna une lente détérioration des relations entre Duan et Jin. S'efforçant de ravir le pouvoir au Club Anfu de Duan pendant son mandat de Premier ministre, Jin finit par démissionner en raison de l'opposition, avant d'être rappelé grâce à Cao Kun et Zhang Zuolin. Étendant peu à peu son influence, Jin se fit des ennemis au sein de la Clique des Communications, de Zhang Zuolin et même de Xu Shichang, démissionnant à nouveau en 1921.\n\nVivant en retraite, il fut brièvement renommé Premier ministre par Zhang Zuolin en 1926, malgré l'opposition de Wu Peifu. Après avoir été expulsé par le Zhili à la suite des Guerres ZhiFeng, Jin fut renommé par Zhang pour remplacer Pan Fu en tant que Premier ministre préféré, capable d'endiguer la vague de factionalisme du Fengtian.§!"

 #潘復
 FNG_pan_fu:0 "Pan Fu"
 FNG_pan_fu_sic_desc:9 "§YNaissance :§! §L22 novembre 1883, à Jining, province du Shandong, Grand Qing§!\n§YAlignement :§! §aBeiyang§!\n§YCarrière :§! §LAprès avoir étudié pour devenir un érudit impérial, Pan Fu devint un fonctionnaire local célèbre dans le Shandong, en demandant l'ouverture de la ligne de chemin de fer de Jining. Au cours de la Révolution Xinhai, Pan servit d'assistant direct au gouverneur du Shanxi, Lu Zhongqi, mais comme Lu mourut au combat, Pan retourna au Shandong. Membre du Ministère des finances du Gouvernement provisoire de Nanjing en 1912, il devint secrétaire du quartier général du gouverneur du Jiangsu, Cheng Dequan.\n\nAprès avoir occupé simultanément plusieurs postes dans l'industrie et la fonction publique du Shandong, Pan devint membre de la clique naissante de Zhang Zuolin et fut nommé directeur du département industriel du Shandong par Zhou Ziqi. Sous la direction de Zhou, puis de Jin Yunpeng, Pan devint conseiller du Ministre des Finances en 1915, puis président par intérim du Bureau national de conservation de l'eau. Sous-secrétaire aux finances dans le premier cabinet de Jin Yunpeng, il occupa plusieurs ministères des finances avant de démissionner pour Tianjin en 1921.\n\nNommé conseiller général du Bureau de supervision sous Zhang Zongchang, Pan Fu fut Ministre des Finances dans le cabinet de Wellington Koo en 1926, puis Ministre des Communications. Avec la création de l'Anguojun en 1927, Pan Fu devint Premier ministre de la République de Beiyang et ministre des Communications. Éjecté à la suite des Troisième et Quatrième Guerres ZhiFeng, Pan Fu est ostensiblement l'un des dirigeants de la "Ligue pour la Reconquête".§!"

 #曹汝霖
 FNG_cao_rulin:0 "Cao Rulin"
 FNG_cao_rulin_advisor_desc:9 "§YNaissance :§! §L2 janvier 1877, comté de Shanghai, province du Jiangsu, Grand Qing§!\n§YAlignement :§! §cNouvelle Clique des Communications§!\n§YCarrière :§! §LAprès avoir étudié à la faculté de droit de Tokyo en 1900, Cao Rulin retourna en Chine en 1904, où il travailla au Département du Commerce avant d'être muté au ministère des Affaires étrangères. En 1910, il fut nommé sous-secrétaire d'État aux Affaires étrangères par Zaifeng ; il exerça brièvement la profession d'avocat après Xinhai avant de revenir à la vie politique en tant que membre du premier Sénat de Beiyang.\n\nDevenu vice-ministre des Affaires étrangères en 1913, Cao négocia en 1915 aux côtés de Lu Zhengxiang les "Vingt-et-une exigences" présentées par le Japon au gouvernement de Yuan Shikai, s'attirant les foudres de personnalités telles que Zhang Xun qui l'accusèrent de trahir le pays. Il devint directeur général des Communications l'année suivante, puis fut nommé ministre des Affaires étrangères plus tard dans l'année. Succédant à Liang Shiyi au poste de président de la Banque des Communications, Cao forma sa propre "Nouvelle clique des Communications" pour faire contrepoids à la "Vieille clique des Communications" de Liang Shiyi.\n\nAyant occupé les fonctions de directeur général des Transports, de secrétaire général aux Finances et divers autres postes au sein du cabinet de Duan Qirui, Cao accueillit favorablement l'aide financière croissante apportée par le Japon pour financer le gouvernement et l'armée de l'Anhui. Sa résidence ayant été incendiée lors des Manifestations de Novembre, il fut démis de ses fonctions au sein du cabinet en 1920, puis occupa à nouveau le poste de président de la Banque des Communications.\n\nInvité par Zhang Zuolin à occuper le poste de président du Comité des Finances au sein de son gouvernement de l'Anguojun, Cao a suivi le Vieux Maréchal vers le nord après la Troisième Guerre ZhiFeng, retrouvant ainsi Zhang Zongxiang et le reste de la Clique des Communications.§!"

 #楊宇霆
 FNG_yang_yuting: "Yang Yuting"
 FNG_yang_yuting_desc_mid:9 "et, à son retour en Chine, il a été nommé chef de peloton à Changchun. Après la révolution Xinhai, Yang s'est rendu à l'amphithéâtre de l'armée du Nord-Est pour y enseigner l'artillerie. Lorsque Zhang Zuolin prend le contrôle de la province de Fengtian, il nomme Yang chef d'état-major.\n\nYang Yuting collabore secrètement avec Xu Shuzheng pour utiliser les fonds militaires de Fengtian afin de créer une nouvelle armée sous leur commandement. Zhang Zuolin, furieux, expulse Yang, qui est relégué dans l'armée de Xu. En 1921, Zhang Zuolin se sentit contraint par le manque de subordonnés compétents et rappela Yang à son service pour travailler aux côtés de Wang Yongjiang. La vieille garde de la clique de Fengtian est désavouée à la suite de l'échec de la première guerre de Zhifeng, et Zhang Xueliang, Guo Songling et Yang Yuting acquièrent plus de pouvoir."
 FNG_yang_yuting_leader_desc:9 "§YNaissance :§! §L29 août 1886, à Faku, district de Shengjing, Grand Qing§!\n§YCarrière :§! §LNé au crépuscule de la dynastie Qing, Yang décida de faire carrière dans l'armée. Yang se rendit au Japon pour étudier l'artillerie, $FNG_yang_yuting_desc_mid$\n\nCependant, les trois ne réussirent pas à s'entendre et Guo était de plus en plus mécontent de la faveur croissante de Yang malgré l'engagement plus important de ce dernier dans la 2e Guerre Zhifeng. Le ressentiment de Guo se transforma en rébellion et, à la suite de sa défaite, Yang exhorta le Vieux Maréchal à exécuter Guo. Les ambitions de Yang furent finalement satisfaites avec son ascension à la tête de la Chine, et il tentera d'utiliser le Japon aussi longtemps qu'il sera utile à la Chine.§!"
 FNG_yang_yuting_army_chief_desc:9 "§YNaissance :§! §L29 août 1886, à Faku, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PClique Shikan§!\n§YCarrière :§! §LNé au crépuscule de la dynastie Qing, Yang décida de faire carrière dans l'armée. Il partit au Japon pour étudier l'Artillerie au sein de la 8e promotion de l'Académie de l'Armée impériale japonaise, $FNG_yang_yuting_desc_mid$\n\nCependant, Guo et Yang ne s'entendaient pas, et le premier en vint à en vouloir de plus en plus au second, qui gagnait en faveur malgré l'engagement plus important du premier lors de la 2e Guerre Zhifeng. La rancœur de Guo déborda en rébellion, et à la suite de sa défaite, Yang insista fortement auprès du Vieux Maréchal pour qu'il fasse exécuter Guo. Depuis lors, Yang et Zhang se sont partagé la jeune garde de la Clique du Fengtian, la Clique Shikan de Yang étant composée d'officiers ayant étudié au Japon et favorisant l'amitié avec Tokyo jusqu'à ce qu'elle ne soit plus nécessaire.§!\n\n§YNotes : Yang Yuting est le principal rival de Zhang Xueliang. Cependant, son ascension est sérieusement freinée par le fait qu'il n'a pas l'occasion d'exercer un commandement direct sur une armée.§!"

 #常蔭槐
 FNG_chang_yinhuai:9 "Chang Yinhuai"
 FNG_chang_yinhuai_sic_desc:9 "§YNaissance :§! §L1888, préfecture de Changtu, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PClique Shikan§!\n§YCarrière :§! §LDiplômé de la deuxième promotion de l'École de droit du Fengtian en 1910, Chang Yinhuai fut amené dans le Heilongjiang par son frère aîné, Chang Yinting. Il occupa d'abord le poste de greffier adjoint au sein du Département de l'Approvisionnement militaire du bureau du gouverneur du Heilongjiang, puis, au quartier général de la 1re division de l'Armée du Heilongjiang, celui de juge militaire principal et de directeur du Département du Droit militaire. Son style de travail, à la fois décisif, impitoyable et audacieux, lui valut d'être très apprécié par Li Jinglin.\n\nEn 1922, Chang occupa le poste de chef d'état-major du commandement de la cavalerie de l'Armée Zhenwei. À la suite de la défaite de l'Armée du Fengtian et de sa déroute lors de la Première Guerre ZhiFeng, Chang fut nommé par Zhang Zuolin directeur du Département provincial de l'Application de la loi militaire et policière du Fengtian. Il infligea une discipline sévère aux soldats et aux unités en fuite, mettant rapidement fin à la retraite chaotique. Sur la recommandation de Yang Yuting, Chang fut chargé de diriger de vastes contingents de troupes pour réprimer le banditisme, avec une cruauté extrême.\n\nEn 1925, il devint directeur du Bureau des chemins de fer Beijing-Fengtian, où il instaura des règles et des règlements stricts, allant parfois jusqu'à appliquer la peine capitale. En 1926, il devint directeur du département des affaires politiques et officier logistique dans l'Armée du Fengtian, avant d'être nommé vice-ministre des Transports de la République. Refusant de se plier aux exigences du Japon en matière de contrôle ferroviaire, Chang fut de plus en plus poussé vers le camp de Yang Yuting, membre de la Clique du Fengtian, avec lequel il se lia d'amitié. Aujourd'hui ministre des Transports au sein du gouvernement du Fengtian, Chang continue de faire preuve d'une volonté de fer et d'arrogance.§!"

 #李鼎彝
 FNG_li_dingyi: "Li Dingyi"
 FNG_li_dingyi_advisor_desc:9 "§YNaissance :§! §L1899, préfecture de Xincheng, province du Jilin, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LHomme au passé mystérieux, on sait peu de choses sur le passé de Li Dingyi. Certains laissent entendre qu'il était un descendant du peuple Miao, mais une chose est sûre, Li Dingyi était extrêmement talentueux. Admis au Département chinois de l'Université de Beijing en 1920, il obtint son diplôme en 1926 et retourna à Jilin, où il se consacra à l'enseignement et à la recherche sur l'histoire de la littérature chinoise.\n\nLa menace japonaise étant toujours présente, Li orchestra, par patriotisme, l'organisation connue sous le nom de "Association Anti-Ennemie des Quatre Provinces du Nord-Est", gérant de fait un réseau de renseignements pour le compte du Vieux Maréchal.§!"

 #王揖唐
 FNG_wang_yitang:0 "Wang Yitang"
 FNG_wang_yitang_leader_desc:9 "§YNaissance :§! §L1878, comté de Hefei, province de l'Anhui, Grand Qing§!\n§YCarrière :§! §L$FNG_wang_yitang_desc_body$ Maintenant qu'il est chargé de diriger la Chine, nombreux sont ceux qui pensent que l'accession de Wang à la présidence est le signe que la stratégie de l'Anhui a porté ses fruits.§!"
 FNG_wang_yitang_sic_desc:9 "§YNaissance :§! §L1878, comté de Hefei, province de l'Anhui, Grand Qing§!\n§YAlignement :§! §aBeiyang§!\n§YCarrière :§! §L$FNG_wang_yitang_desc_body$§!"
 FNG_wang_yitang_desc_body:9 "Réussissant l'examen impérial en 1904, Wang Yitang demanda à la cour Qing l'autorisation d'étudier les affaires militaires au Japon, et fut envoyé à la Tokyo Shinbu Gakko. Après avoir obtenu son diplôme, Wang servit brièvement comme stagiaire dans un régiment d'artillerie ; cependant, ne parvenant pas à s'habituer à la vie de soldat, il changea d'orientation et poursuivit ses études à l'université Hosei.\n\nDe retour en Chine en 1907, Wang occupa les fonctions de directeur du ministère de la Guerre, de conseiller militaire au bureau du gouverneur général du Nord-Est et de commandant de brigade. En 1909, lors d'un voyage diplomatique en Russie, Wang reçut l'Ordre de l'Étoile précieuse des mains du tsar, puis effectua une tournée dans plusieurs pays d'Europe et d'Amérique afin d'étudier les développements militaires, politiques et dans le domaine des transports. De retour dans son pays, il occupa le poste de directeur général du département de préparation militaire de Jilin.\n\nAprès avoir adhéré à plusieurs partis républicains au lendemain de la Révolution Xinhai, Wang fut élu au premier Sénat, rejoignant le Parti républicain de Li Yuanhong, qui fusionna par la suite avec le Parti progressiste. Siégeant à la Conférence constitutionnelle de Yuan Shikai en tant que représentant de l'Anhui, Wang soutint les ambitions monarchiques de Yuan Shikai et, après l'échec de celles-ci, rejoignit la Clique de l'Anhui dirigée par Duan Qirui.\n\nPendant son mandat de président du Sénat, Wang organisa le parti-État du Club de l'Anfu, dirigeant de fait la Chine par le biais d'une clique au sein d'une clique. Contraint de fuir au Japon à la suite d'un mandat d'arrêt après la chute de l'Anhui, Wang participa au gouvernement de Duan en 1924 sous Zhang Zuolin, devenant un fervent défenseur et une figure majeure. Avec le retrait du Fengtian à la suite de la Troisième Guerre ZhiFeng, Wang devint l'un des membres les plus importants de la "Ligue de la Reconquête", une alliance informelle."

 #章宗祥
 FNG_zhang_zongxiang:9 "Zhang Zongxiang"
 FNG_zhang_zongxiang_leader_desc:9 "§YNaissance :§! §L1879, comté de Wuxing, province du Zhejiang, Grand Qing§!\n§YCarrière :§! §L$FNG_zhang_zongxiang_desc_body$ Aujourd'hui président d'une république pro-japonaise, rares sont ceux qui voient en leur compatriote autre chose qu'un sujet d'animosité.§!"
 FNG_zhang_zongxiang_advisor_desc:9 "§YNaissance :§! §L1879, comté de Wuxing, province du Zhejiang, Grand Qing§!\n§YAlignement :§! §cNouvelle Clique des Communications§!\n§YCarrière :§! §L$FNG_zhang_zongxiang_desc_body$§!"
 FNG_zhang_zongxiang_desc_body:9 "Après avoir réussi les examens impériaux dès son plus jeune âge, Zhang Zongxiang entama sa longue et riche histoire avec la culture japonaise en se rendant dans ce pays en 1899, où il étudia à la Première École supérieure, puis à la faculté de droit de l'Université impériale de Tokyo, et plus tard à l'Université Meiji. De retour en Chine en 1903, il enseigna à l'Université impériale de Beijing et devint Jinshi à la Cour. Au service de divers ministères, il participa même au procès pour tentative d'assassinat du régent Zaifeng.\n\nEnvoyé par Yuan Shikai pour participer aux pourparlers de paix entre le Nord et le Sud avec Tang Shaoyi en 1911, Zhang poursuivit son travail au service de Yuan, devenant ministre de la Justice en 1914. En 1916, il devint ministre auprès du Japon, s'associant à la Nouvelle Clique des Communications pour négocier secrètement un accord aux avantages douteux concernant les dettes chinoises envers le Japon. En 1918, il signa trois prêts au Japon pour un montant total de 60 millions de yens, accordant aux Japonais des droits sur les chemins de fer et les minerais, tout en acceptant l'occupation de Jinan et de Qingdao par le Japon.\n\nAlors qu'il représentait Beiyang à la Conférence de Paix de Spa pendant la Weltkrieg, ses relations pro-japonaises furent révélées au grand jour ; il fut alors dénoncé, battu, chassé de sa ville natale et contraint de quitter ses fonctions au sein du gouvernement. En 1920, il occupa le poste de directeur général de la Banque sino-japonaise, puis, en 1925, celui de directeur général de la Banque commerciale de Beijing. En 1928, il s'installa brièvement à Qingdao, avant d'être rappelé par ses vieux amis Lu et Cao pour rejoindre leur Nouvelle Clique des Communications, qui venait de renaître au Fengtian."

 #陸宗輿
 FNG_lu_zongyu:9 "Lu Zongyu"
 FNG_lu_zongyu_sic_desc:9 "§YNaissance :§! §L1876, préfecture de Hangzhou, province du Zhejiang, Grand Qing§!\n§YAlignement :§! §cNouvelle Clique des Communications§!\n§YCarrière :§! §LIssu d'une famille de commerçants, Lu Zongyu entra à l'Académie Wenzheng de Nanjing, puis, en 1899, étudia le droit et l'économie à l'université Waseda, à ses propres frais. En 1902, il retourna en Chine et travailla comme administrateur fiscal à Beijing, avant d'enseigner à l'Académie Jinshi et à l'Académie de police. En 1905, Lu devint directeur de la police de patrouille sous les ordres de Xu Shichang, puis occupa le poste de conseiller auprès d'Aisin-Gioro Zaize, ministre des Affaires politiques.\n\nAccompagnant Xu Shichang pour occuper le poste de directeur général du Bureau des affaires étrangères du Fengtian, Lu suivit Xu de retour à Beijing en 1908, et en 1910, il devint membre du Conseil d'État. Directeur adjoint à la Banque des communications, il devint bientôt vice-ministre des Finances par intérim. En 1913, il fut membre du Sénat et devint ministre de Chine au Japon la même année.\n\nAprès avoir fait part au Japon de la position neutre de la Chine face à l'occupation du Shandong, Lu se retrouva en première ligne face aux Vingt-et-une exigences japonaises ; à la mort de Yuan, il fut rappelé. Devenu président du conseil d'administration de la Banque des Communications, Lu fut envoyé par Cao Rulin pour négocier le prêt Nishihara avec Zhang Zongxiang, et devint en 1917 directeur général de la banque sino-japonaise commune. En 1919, il forma la Nouvelle Clique des Communications avec Cao, mais cette même année, il fut passé à tabac par des manifestants aux côtés de Zhang et démis de ses fonctions. Membre du Sénat en 1925, Lu finit par s'installer à Tianjin, avant d'être appelé par Cao pour le rejoindre au Fengtian.§!"

 #喜多誠一
 FNG_kita_seiichi:9 "Kita Seiichi"
 FNG_kita_seiichi_sic_desc:9 "§YNaissance :§! §L20 décembre 1886, préfecture de Shiga, Empire japonais§!\n§YAlignement :§! §jArmée du Kwantung§!\n§YCarrière :§! §LFils de Kita Saburo, Kita Seiichi obtint son diplôme du deuxième collège de Shiga, puis de l'Académie de l'Armée japonaise en 1907. Nommé lieutenant d'infanterie, il servit dans la garnison de Tianjin et occupa divers autres postes avant de s'inscrire et d'obtenir son diplôme du Collège de guerre de l'Armée en 1919.\n\nEn 1920, il devint commandant de compagnie, servant à l'état-major général et en tant que conseiller auprès de l'État-major général du Gouvernement de Beiyang. En 1925, il occupa un poste au sein de la section des affaires militaires du ministère de l'Armée, avant d'enchaîner une nouvelle série de fonctions au sein de l'état-major général et du haut commandement japonais. En poste à Nankin, il fut promu colonel d'infanterie en 1931.\n\nEn 1932, il devint officier de renseignement de la garnison de Shanghai, puis officier d'état-major de l'Armée du Kwantung dans le Dongbei, occupant le poste de chef de la section chinoise de l'état-major général. Récemment, il a été promu général de division et est devenu attaché militaire officiel auprès du Gouvernement du Fengtian.§!\n\n§YNotes : Considéré comme un "spécialiste de la Chine" par l'état-major japonais, Kita fait la navette entre Tianjin, Shanghai, Shenyang et le Kwangtung pour accomplir toutes sortes de missions.§!"

 #孫其昌
 FNG_sun_qichang:0 "Sun Qichang"
 FNG_sun_qichang_advisor_desc:9 "§YNaissance :§! §L1885, sous-préfecture de Liaoyang, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aBeiyang§!\n§YCarrière :§! §LAprès s'être rendu au Japon pour étudier à l'École normale de Tokyo, Sun Qichang revint en Chine peu après, en 1911, pour occuper les fonctions de directeur de l'École normale du Liaoning, de directeur de l'École de commerce du Fengtian et de secrétaire du bureau du gouverneur de la province du Heilongjiang. En 1920, Sun devint directeur par intérim du département de l'Éducation de la province du Heilongjiang, puis fut muté à Jilin plus tard dans l'année en tant que négociateur spécial du ministère des Affaires étrangères au nom du Gouvernement de Beiyang.\n\nEn 1925, Sun occupa les fonctions de directeur du département des Finances de la province du Jilin et de directeur d'une petite association bancaire, résistant à la tempête jusqu'en 1928, date à laquelle il devint directeur du département de la Construction de la province du Jilin. Après avoir été muté au poste de directeur des Finances, Sun devint vice-ministre des Finances en 1932. Poursuivant son ascension dans la hiérarchie bureaucratique, Sun finit par devenir ministre des Finances du gouvernement de Shenyang en 1935.§!"

 #王蔭泰
 FNG_wang_yintai:0 "Wang Yintai"
 FNG_wang_yintai_advisor_desc:9 "§YNaissance :§! §L1886, comté de Linfen, province du Shanxi, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LDiplômé du Lycée public n°1 de Tokyo en 1906, Wang Yintai se rendit ensuite en Allemagne pour étudier à la faculté de droit de l'université de Berlin, où il obtint son diplôme en 1912. De retour dans un pays complètement différent l'année suivante, Wang travailla comme fonctionnaire au sein du Bureau des Affaires législatives du Conseil d'État du gouvernement de Beiyang. Il occupa même brièvement le poste de maître de conférences à la faculté de droit de l'université de Beijing. En 1917, Wang occupa le poste de juge au Bureau du procureur général, puis, en 1919, celui de conseiller juridique au Bureau de gestion des biens de l'État.\n\nMuté au poste de directeur du Département des Affaires générales, il se rendit dans le Nord-Est en 1921 pour devenir conseiller de Zhang Zuolin. Au sein du Gouvernement Beiyang du Fengtian en 1926, Wang fut vice-ministre des Affaires étrangères, représentant à la Conférence douanière et président du Comité de négociation sino-russe. Ministre des Affaires étrangères dans le cabinet de Pan Fu en 1927, il devint président de la Cour suprême en 1928.\n\nAprès le retrait du Fengtian vers le nord à la suite de la Troisième Guerre ZhiFeng, il continua d'occuper divers postes au sein du gouvernement, notamment celui de président de la Cour suprême, ou de directeur de projets industriels locaux.§!"

 #李紹庚
 FNG_li_shaogeng:0 "Li Shaogeng"
 FNG_li_shaogeng_advisor_desc:9 "§YNaissance :§! §L1896, sous-préfecture de Liaoyang, district de Shengjing, Grand Qing§!\n§YAlignement :§! §cNouvelle Clique des Communications§!\n§YCarrière :§! §LDiplômé de l'École supérieure de Commerce de Harbin, Li Shaogeng y acquit deux compétences : le commerce et une maîtrise parfaite du russe. En 1920, Li obtint son diplôme et entra au service de la section diplomatique d'une petite banque. En 1924, Li devint directeur adjoint du Bureau de l'Administration municipale de la Région spéciale des Provinces orientales, puis, deux ans plus tard, il fut nommé directeur du Département de l'Éducation de cette même région. En 1926, grâce à sa maîtrise du russe, Li devint consul général par intérim à Vladivostok.\n\nResté dans le Dongbei pendant le séjour du Fengtian dans le sud, Li devint président par intérim de la Compagnie ferroviaire de Chine orientale, puis directeur de diverses autres entreprises ferroviaires dans le Dongbei. Attiré dans la Clique des Communications à mesure que ses ambitions grandissaient, Li Shaogeng incarne l'un de leurs nombreux visages dans le monde ferroviaire.§!"

 #呂榮寰
 FNG_lu_ronghuan:0 "Lu Ronghuan"
 FNG_lu_ronghuan_advisor_desc:9 "§YNaissance :§! §L1890, comté de Xingren, province du Shanxi, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LAprès avoir fréquenté le Lycée n°1 de la province du Fengtian et l'École législative et politique de la province du Jiangsu dans sa jeunesse, Lu Ronghuan s'orienta d'abord vers une carrière d'enseignant à l'Université normale du Fengtian, à l'École de droit et de sciences politiques, puis à l'École industrielle. Se lançant dans une carrière d'avocat, il occupa le poste de président de l'Association des Avocats du Fengtian et, en 1917, fut élu à l'Assemblée provinciale du Fengtian, dont il devint vice-président. Envoyé en Russie en tant que représentant pour résoudre un différend, il occupa par la suite le poste de président de la Conférence sur les Transports du Fengtian ainsi que d'autres fonctions administratives mineures.\n\nEnvoyé une nouvelle fois à Moscou pour négocier avec les Russes au nom de Zhang Zuolin, Lu contribua à la conclusion d'un accord entre le Fengtian et la Russie sur les détails de la frontière et les anciens biens russes situés au Fengtian. En 1924, il devint directeur de la Compagnie des chemins de fer de la Chine orientale, puis en 1927, il occupa le poste de superviseur. En 1932, Lu devint directeur du Bureau municipal de préparation à Harbin, avant d'être élu maire.\n\nPoursuivant sa carrière, il gravit les échelons au sein du ministère de l'Intérieur, où il occupe le poste de ministre, contribuant ainsi à conférer au gouvernement de Zhang Zuolin l'apparence de légitimité civile dont il avait tant besoin.§!"

 #袁金鎧
 FNG_yuan_jinkai:0 "Yuan Jinkai"
 FNG_yuan_jinkai_advisor_desc:9 "§YNaissance :§! §L1870, sous-préfecture de Liaoyang, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LDevenu boursier à l'âge de dix-neuf ans, il étudia à l'Académie Cuisheng de Shenyang, où il se lia d'amitié avec des personnalités telles que Wang Yongjiang dans le cadre des initiatives réformistes menées par les étudiants. Après avoir obtenu son diplôme, Yuan s'efforça de créer une série d'écoles privées dans son propre village et dans les villages voisins, entamant ainsi une carrière d'enseignant prolifique. Inspiré par des personnalités telles que Xu Zhen, Yuan s'employa également à organiser des milices villageoises afin de protéger les différents villages contre le banditisme.\n\nEn 1904, Yuan occupa les fonctions de chef de la police du comté de Liaoyang et de directeur général du Bureau de la police de patrouille de Liaoyang. Devenu un proche du puissant Zhao Erxun, Yuan fut élu membre du Bureau consultatif du Fengtian, et lorsque Wu Jinglian fut nommé président du Bureau, Yuan devint vice-président. Après la nomination de Zhao Erxun au poste de gouverneur, Yuan devint son conseiller et son confident. Nommé membre du premier parlement du Fengtian, il occupa le poste de secrétaire aux Finances, puis, après l'arrivée au pouvoir de Zhang Zuolin en 1915, devint secrétaire général du Vieux Maréchal.\n\nAprès avoir occupé brièvement divers postes, allant de fonctions provinciales à celles du Conseil provisoire de Beijing en 1925, il devint conseiller principal au bureau du Grand Maréchal en 1927, où il fut le bras droit du maréchal Zhang pour les affaires civiles.\n\nAvec la retraite vers le nord, Yuan a continué à servir le Vieux Maréchal, occupant également les fonctions de membre du Comité des Affaires politiques du Nord-Est.§!"

 #丁鑑修
 FNG_ding_jianxiu:0 "Ding Jianxiu"
 FNG_ding_jianxiu_advisor_desc:9 "§YNaissance :§! §L1890, comté de Xingren, district de Shengjing, Grand Qing§!\n§YAlignement :§! §mAssociation Concordia§!\n§YCarrière :§! §LDing Jianxiu, l'un des nombreux étudiants japonais d'origine chinoise, obtint un diplôme d'économie à l'université de Waseda. De retour en Chine, il réussit les examens impériaux et occupa un poste de fonctionnaire au sein du ministère des Postes et des Communications. Bien que de courte durée, il retourna au Fengtian pour enseigner dans diverses écoles, allant de l'enseignement primaire à celui destiné à l'armée et à la police.\n\nEn 1913, Ding fut nommé membre de la section de langue japonaise du département diplomatique du Fengtian, et deux ans plus tard, il occupa le poste de chef de la section diplomatique de la mission de patrouille du Fengtian. Au cours des années suivantes, Ding occupa successivement les fonctions de directeur du Bureau des Affaires étrangères du quartier général de l'armée, de conseiller au bureau du gouverneur du Fengtian, de directeur général de la Compagnie minière sino-japonaise Gongchang Tieling et de directeur général de la Compagnie de charbon et de fer de Liaoyang Tianli.\n\nPendant le séjour de la Clique du Fengtian dans le sud, Ding Jianxiu suivit Yuan Jinkai pour occuper le poste de conseiller au bureau du Grand Maréchal. Cependant, avec la retraite vers le nord, Ding occupa diverses fonctions sous l'égide de l'Association Concordia, notamment celles de directeur général du ministère des Communications et de ministre de l'Industrie, poste qu'il occupe toujours.§!"

 #町野武馬
 FNG_takema_machino: "Takema Machino"
 FNG_takema_machino_advisor_desc:9 "§YNaissance :§! §L16 novembre 1875, à Aizuwakamatsu, préfecture de Fukushima, Empire japonais§!\n§YAlignement :§! §mAssociation Concordia§!\n§YCarrière :§! §LPersonnage atypique au sein des cercles restreints du Fengtian, Takema Machino est le deuxième fils d’un samouraï, Mizusui Machino. Après avoir reçu l’éducation traditionnelle correspondant à ce statut social, il s’installa à Tokyo pour devenir l’élève de Yamakawa Hiroshi, fréquentant d’abord l’école Seijo, puis la Shikan Gakko, dont il sortit diplômé en 1898. En tant que lieutenant d'infanterie, Takema combattit pendant la Guerre russo-japonaise ; blessé au combat, il choisit de rester à Dalian pour se remettre. Aider Zhang Zuolin pendant la Révolution Xinhai, il tenta d'encourager les premières tentatives d'indépendance de la Mandchourie, mais échoua.\n\nDe retour au Japon dans les années 1920, Takema fut élu à la Chambre des Représentants japonaise en tant que député de la deuxième circonscription de la préfecture de Fukushima. Après un seul mandat à la Chambre, il ne perdit jamais son intérêt pour la défense de l'intégrité de la Clique du Fengtian, se faisant constamment le champion d'une alliance entre le Fengtian et le Japon.\n\nDe retour en Chine en 1925, il continua à servir le Vieux Maréchal, allant même jusqu'à tenter d'intervenir lors de la rébellion de Guo Songling pour servir de médiateur entre les deux parties. Agissant comme intermédiaire entre le Japon et le Fengtian, Takema est la force modératrice qui tempère les ambitions coloniales du Japon.§!\n\n§YNotes : Très apprécié, modeste et très estimé par des personnalités telles que Zhang Zuolin, il est connu pour être un homme altruiste et plein de ressources.§!"

 #吳俊陞
 FNG_wu_junsheng: "Wu Junsheng"
 FNG_wu_junsheng_commander_desc:9 "§YNaissance :§! §L11 octobre 1863, à Changtu, district de Shenjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LFils d'un modeste marchand de chevaux, Wu nourrissait les cochons et gardait le bétail dans des entrepôts lorsqu'il était enfant. Une fois adulte, il s'engagea dans l'armée Qing, rejoignant l'armée anti-banditisme de Ding Chunhua. En 1897, Wu devint chef de section et le bras droit de Ding. À la fin de la dynastie Qing, le banditisme sévissait à Shengjing, et Wu se donna pour mission de l'éradiquer, devenant ainsi le fer de lance de la lutte contre le banditisme dans le Nord-Est.\n\nEn 1907, Zhang Zuolin rencontra Wu, et les deux hommes devinrent des amis pour la vie et des frères de sang. Au lendemain du soulèvement de Wuchang, Wu et Zhang entrèrent dans Shenyang pour maintenir l'ordre, demandant à Yuan Shikai de réprimer la révolution. Wu soutint sans relâche les ambitions de Zhang après la Révolution Xinhai, l'aidant à évincer Feng Delin, l'ancien chef de bandits de Zhang, pour devenir le seigneur de la guerre du Fengtian. En 1921, Zhang Zuolin avait pris le contrôle de tout le Nord-Est et confia à Wu le contrôle du Heilongjiang.\n\nWu aida le Vieux Maréchal à mettre fin à la rébellion de Guo Songling et combattit également les forces de la Guominjun. Lors de l'Expédition vers le Nord, Zhang Zuoxiang et Wu Junsheng assurèrent les arrières tandis que l'avant-garde progressait vers le sud. Après l'Expédition du Nord, Wu reprit le contrôle du Heilongjiang, aux côtés de ses protégés Ma Zhanshan et Wan Fulin. Bien que peu habile en politique intérieure, il aimait se faire passer pour un érudit, se livrant souvent à la calligraphie et à la peinture de tigres malgré son manque relatif de talent.§!\n\n§YNotes : L'amitié entre Wu Junsheng et Zhang Zuolin est réputée si profonde qu'on raconte que Wu aurait dit à Zhang en 1917 : "Même si nous ne pouvons pas vivre ensemble, nous espérons mourir ensemble."§!"

 #張作相
 FNG_zhang_zuoxiang: "Zhang Zuoxiang"
 FNG_zhang_zuoxiang_army_chief_desc:9 "§YNaissance :§! §L8 mars 1881, à Yizhou, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LIssu d'une famille paysanne pauvre, Zhang fréquenta une école privée pendant plusieurs années. En 1901, Zhang Zuoxiang rejoignit la "Brigade d'assurance" de Zhang Zuolin, un groupe de bandits qui percevait des droits de protection auprès des villages, des marchands et des voyageurs. La Brigade d'assurance de Zhang Zuolin s'étendit jusqu'à couvrir une grande partie de l'ouest du Fengtian, ce qui poussa les autorités locales à intégrer les bandits de Zhang Zuolin au sein de l'administration.\n\nEn 1908, Zhang devint le premier étudiant de la Salle de conférence de l'Armée du Nord-Est, qui venait d'ouvrir ses portes. Après la Révolution Xinhai, Zhang aida le Vieux Maréchal à remporter sa lutte de pouvoir contre Tang Yulin et Feng Delin et à s'assurer le contrôle de la province du Fengtian.\n\nZhang Zuoxiang allait devenir le bras droit du Vieux Maréchal au sein de la Clique du Fengtian nouvellement formée. Zhang fut nommé directeur de l'Académie militaire du Nord-Est et forma Zhang Xueliang pendant son mandat. Après le décès de Sun Liechen, le Vieux Maréchal nomma son frère de sang au poste de gouverneur de la province de Jilin.\n\nAprès la rébellion anti-Fengtian de Guo, Zhang plaida en faveur d'une approche indulgente envers les rebelles, ce que Zhang Zuolin prit en compte. Pendant l'Expédition du Nord, lui et Wu Junsheng assurèrent l'arrière-garde pour soutenir Sun Chuanfang et Zhang Zongchang. Zhang retourna à Jilin après l'Expédition du Nord, où il gouverne la province avec compétence jusqu'à ce jour.§!\n\n§YNotes : Zhang Zuoxiang et Zhang Zuolin, bien qu'ils partagent le même nom de famille, ne sont pas apparentés, mais sont devenus frères de sang à l'époque où ils étaient bandits. Très respecté pour son intégrité, son humilité et sa simplicité, Zhang Zuoxiang jouit d'une immense considération au sein de la Clique du Fengtian.§!"

 #張廷樞
 FNG_zhang_tingshu:9 "Zhang Tingshu"
 FNG_zhang_tingshu_high_command_desc:9 "§YNaissance :§! §L1903, à Jinzhou, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aShaoshuai§!\n§YCarrière :§! §LAmi de Zhang Xueliang depuis leur jeunesse commune, Zhang Tingshu est le fils de Zhang Zuoxiang, le gouverneur de Jilin. Après avoir suivi un enseignement privé avant d’être envoyé dans une école étrangère pendant plusieurs années, il revint en Chine et, en 1919, s’engagea aux côtés de Zhang Xueliang dans l’Armée du Nord-Est nouvellement reconstituée. Éduqué par son père, il obtint son diplôme et servit comme colonel dans l'Armée du Nord-Est.\n\nSélectionné par Zhang Xueliang pour étudier à l'École d'infanterie de la préfecture de Chiba, au Japon, il revint en Chine en 1925 et fut promu au grade de général de division. Ayant combattu lors des Troisième et Quatrième Guerres ZhiFeng, Zhang reçut des éloges pour sa ténacité et sa rapidité à réagir aux percées du Zhili sur le terrain, ce qui lui valut d’être chargé du commandement de la 12e Brigade réorganisée en 1928.\n\nPromu lieutenant-général et commandant de la 112e division en 1932, Zhang Tingshu fut l'un des plus farouches opposants à l'influence japonaise au sein du Gouvernement du Fengtian, encourageant activement un nationalisme chinois rigoureux et un sentiment anti-japonais au sein de sa division. En 1933, il établit des liens secrets avec des partisans du KMT, fournissant à sa division de la littérature révolutionnaire, tout en s'abstenant d'adhérer au parti.§!\n\n§YNotes : En tant qu'ami d'enfance de Zhang Xueliang, il n'a de cesse d'inciter le Jeune Maréchal à adopter une position plus ferme face aux Japonais, quel qu'en soit le prix.\nAnimé d'un fervent sentiment patriotique, il est connu pour préférer combattre au front plutôt que d'occuper un poste d'état-major.§!"

 #王樹常
 FNG_wang_shuchang: "Wang Shuchang"
 FNG_wang_shuchang_high_command_desc:9 "§YNaissance :§! §L11 septembre 1885, à Liaozhong, district de Shengjing, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LIssu d'une famille aisée, Wang fut admis à l'université du Fengtian. Grâce à ses résultats exceptionnels, Wang Shuchang fut sélectionné pour étudier au Japon. En 1908, après avoir terminé ses études à la Tokyo Shinbu Gakko et effectué un stage dans un bataillon d'infanterie japonais, Wang intégra la 8e promotion de l'Académie de l'Armée impériale japonaise sur recommandation de Xu Shichang afin de se spécialiser dans l'infanterie. De retour en Chine, il rejoignit le Gouvernement provisoire à Nanjing, où il occupa un poste de commis. L'année suivante, Wang se rendit à Beijing, où il servit à l'état-major général avec le grade de lieutenant-colonel. Wang poursuivit sa formation militaire en 1917 en s'inscrivant à la 13e promotion de l'École supérieure de guerre de l'armée au Japon, et devint un haut responsable de l'état-major général après son retour en 1920.\n\nLa carrière de Wang au sein de la Clique du Fengtian débuta en 1921 lorsqu'il fut intégré à l'armée de Zhang Zuolin en tant que chef d'état-major de Wu Junsheng. Après la Première Guerre Zhifeng, Wang servit comme commandant de brigade sous les ordres de Wu Junsheng dans le Heilongjiang avant de devenir conseiller principal du Vieux Maréchal. En 1928, Wang, qui avait obtenu le grade de lieutenant-général en 1927, devint directeur du Département des Affaires militaires du Nord-Est tout en occupant simultanément un poste au sein du gouvernement provincial du Heilongjiang. Wang ne dispose pas des relations politiques étroites que possèdent de nombreux officiers de haut rang et fonctionnaires du Fengtian, mais il est néanmoins respecté pour sa diligence.§!\n\n§YNotes : Bien qu'il ait fait ses études au Japon, il n'entretient aucun lien particulier avec l'Association Concordia ni avec la Clique Shikan. On sait que Wang s'efforce d'éviter délibérément de faire l'éloge ou le dénigrement du Japon, sauf lorsque cela s'avère absolument nécessaire.§!"

 #馬占山
 FNG_ma_zhanshan: "Ma Zhanshan"
 FNG_ma_zhanshan_high_command_desc:9 "§YNaissance :§! §L30 novembre 1885, comté de Huaide, district de Jilin, Grand Qing§!\n§YAlignement :§! §aShaoshuai§!\n§YCarrière :§! §LNé dans la pauvreté, Ma Zhanshan a grandi en étant de santé fragile. À l’âge de 7 ans, Ma gardait les chevaux de Jiang Shun, un propriétaire terrien du village de Jiangjiawezi, ce qui lui permit de développer ses talents de cavalier. En 1903, Jiang accusa Ma d'avoir volé des chevaux, et ce dernier dut s'enfuir dans les montagnes de Harabala pour devenir bandit. La bande de Ma Zhanshan fut intégrée à la force de guérilla locale par le gouvernement du comté de Huaide après la Guerre russo-japonaise de 1905, dans le but de maintenir l'ordre social. Trois ans plus tard, la force de guérilla de Ma fut intégrée à l'Armée régulière des Qing.\n\nEn 1911, Ma rejoignit le Bataillon de Patrouille de Wu Junsheng, qui allait devenir son mentor. Lorsque Zhang Zuolin confia à Wu le contrôle du Heilongjiang, Ma fut promu par son mentor au grade de commandant de régiment. Au cours de la rébellion anti-Fengtian menée par Guo Songling, Ma vainquit Guo à Baiqibao et le captura vivant, ainsi que son épouse. Ses exploits lui valurent d'être promu commandant de la 2e armée de cavalerie. Après le retour de Wu dans le Heilongjiang à la suite de l'Expédition du Nord, Ma fut affecté à Heihe en tant que commandant de division. Bien qu'il soit de rang inférieur à Wan Fulin, Ma reste plus actif dans la gouvernance du Heilongjiang.§!\n\n§YNotes : Ma est connu pour son courage et son obstination, sans doute le résultat d'une enfance tumultueuse. Cet ancien bandit devenu soldat est très apprécié de la population du Heilongjiang, ayant consacré une grande partie des ressources de la province à la réforme. Au fil des ans, Ma s'est montré de plus en plus favorable à Zhang Xueliang.§!"

 #萬福麟
 FNG_wan_fulin: "Wan Fulin"
 FNG_wan_fulin_high_command_desc:9 "§YNaissance :§! §L1880, à Nong'an, district de Jilin, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LNé dans la pauvreté, Wan Fulin trouva du travail comme porteur pour les riches et comme gardien de troupeaux. Lorsque l'Alliance des Huit Nations envahit la Chine, la noblesse de Nong'an créa une association villageoise, et Wan devint soldat de la milice. Les dirigeants de cette association décidèrent par la suite de former une bande de bandits, à laquelle Wan se joignit. Le commandant chargé de la répression des bandits, Wu Junsheng, qui était stationné à Jilin, fit pression sur Wan pour qu'il se rende à lui et l'intégra immédiatement dans son armée de Jinbian.\n\nWan continua à gravir les échelons sous l'aile de Wu, devenant général de division en 1921 tandis que son mentor devenait le seigneur de guerre du Heilongjiang. Pendant la Première Guerre Zhifeng, Wan servit dans les réserves et ne participa pas aux combats. Lors de la Deuxième Guerre Zhifeng, Wan se rendit personnellement au front à Shanhaiguan et contribua grandement à la prise de Rehe. Lorsque Guo Songling se rebella contre Zhang Zuolin, Wan aida à réprimer sa rébellion et fut récompensé par le commandement de la 8e Armée.\n\nEn 1928, Wan fut nommé commandant adjoint de la Sécurité du Heilongjiang sous les ordres de Wu Junsheng. Wan, pour sa part, s'intéresse peu à la gouvernance du Heilongjiang, préférant déléguer ses responsabilités politiques à son fils et les questions militaires au chef de la police. Cependant, si le Vieux Maréchal l'appelait, lui et Wu, à servir une fois de plus, Wan répondrait sans aucun doute à l'appel.§!\n\n§YNotes : Wan est connu pour son indécision ; on le qualifie souvent de fonctionnaire médiocre et on estime qu'il n'a accédé à son poste actuel que grâce à sa loyauté envers Wu Junsheng. Il est intéressant de noter que Wan est réputé pour son attention envers les pauvres, malgré son désintérêt pour la politique.§!"

 #臧式毅
 FNG_zang_shiyi: "Zang Shiyi"
 FNG_zang_shiyi_commander_desc:9 "§YNaissance :§! §LOctobre 1884, à Fengtian, district de Shengjing, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LIssu d'une famille modeste, Zang Shiyi étudia à l'École primaire de l'Armée du Fengtian avant d'être envoyé au Japon en 1909. Après avoir suivi des études préparatoires à la Tokyo Shinbu Gakko et effectué un stage dans l'Armée japonaise, Zang s'inscrivit à la 8e promotion de l'Académie de l'Armée impériale japonaise, où il étudia la cavalerie. À son retour en Chine en 1911, il occupa d'abord le poste de professeur de tactique à l'Académie militaire de Baoding, puis fut affecté comme officier subalterne dans le Nord-Est, où Zang gagna les faveurs du seigneur de la guerre de Jilin, Sun Liechen, un vétéran de Zhang Zuolin. En tant que membre de confiance de l'état-major de Sun et commandant chevronné, Zang fut autorisé à agir en tant que gouverneur du Jilin en l'absence de Sun. Les compétences administratives efficaces de Zang attirèrent rapidement l'attention du Vieux Maréchal lui-même.\n\nÀ la suite de la 2e Guerre Zhifeng, Zhang nomma Zang pour travailler aux côtés de Yang Yuting à la tête de la province du Jiangsu en tant que chef d'état-major de Yang. Lorsque les forces du Zhili encerclèrent le Jiangsu, Zang aida Yang Yuting à s'échapper, bien qu'il ait lui-même été capturé par Sun Chuanfang pendant un an. Après la 3e Guerre Zhifeng, Zhang Zuolin nomma Zang gouverneur civil de la province du Fengtian, poste qu'il occupe toujours. Zang est réputé pour sa gestion avisée des finances de la province.§!\n\n§YNotes : Bien qu'il n'appartienne pas à proprement parler à une quelconque clique, Zang est connu pour entretenir de bonnes relations tant avec Zhang Xueliang qu'avec Yang Yuting. À l'instar de nombre de ses pairs, Zang considère que la coopération avec le Japon est utile, mais se montre prudent quant à la possibilité de laisser leur influence s'étendre davantage.§!"

 #張海鵬
 FNG_zhang_haipeng: "Zhang Haipeng"
 FNG_zhang_haipeng_commander_desc:9 "§YNaissance :§! §L1867, comté de Gaiping, district de Shengjing, Grand Qing§!\n§YAlignement :§! §mAssociation Concordia§!\n§YCarrière :§! §LAvant la Guerre sino-japonaise, Zhang était un bandit au service de Feng Delin. Après la guerre, l'armée de bandits de Feng Delin fut intégrée à l'armée Qing, et Zhang devint chef de patrouille. Par la suite, Zhang fit ses études à l'École militaire du Nord-Est. En 1910, Zhang Haipeng rencontra un autre ancien bandit, Zhang Zuolin, et les deux hommes devinrent frères de sang en raison de leur nom de famille commun. Zhang Haipeng continua à servir Feng Delin après la Révolution Xinhai jusqu'en 1917.\n\nIl fit défection au profit de Zhang Zuolin après que Feng eut été arrêté par Duan Qirui pour avoir soutenu la restauration de la dynastie Qing menée par Zhang Xun. En 1923, Zhang était commandant en chef de l'armée de Harbin-Nord-Est du chemin de fer du Moyen-Orient. En 1927, Zhang occupa le poste de commandant de la garnison de Taoliao, dans la province du Fengtian. En 1931, Zhang Zuolin le chargea de réprimer une rébellion mongole. Après l'intervention japonaise lors de la 4e Guerre Zhifeng, Zhang Heipeng se fit le fervent défenseur d'un renforcement des liens avec Tokyo.§!\n\n§YNotes : Il a occupé des fonctions officielles dans trois provinces et peut être considéré comme largement apolitique. Il est toutefois connu pour sa cupidité, son égoïsme et sa propension à accepter des pots-de-vin, notamment de la part des Japonais. Il a également été impliqué dans un trafic de drogue via la Mantetsu et oblige les civils à cultiver de grandes quantités d'opium sur ses terres. Il est membre de l'Association Concordia.§!"

 #湯玉麟
 FNG_tang_yulin: "Tang Yulin"
 FNG_tang_yulin_commander_desc:9 "§YNaissance :§! §LJuillet 1871, à Yizhou, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LNé dans la pauvreté, la famille de Tang n'a pas pu lui offrir d'éducation. Il passa son enfance à garder les troupeaux de bovins et de moutons pour les riches. À l'adolescence, Tang transportait des marchandises entre Chaoyang et Fuxin. Un jour, il fut victime d'un vol et décida de devenir lui-même bandit, finissant par s'imposer comme le Roi de la Montagne Hongluo à Jinxi. Tang se lia d'amitié et devint frère de sang avec son collègue bandit Zhang Zuolin lorsque le premier vint à la rescousse de ce dernier alors qu'il était attaqué par le bandit Jin Shoushan.\n\nLes deux hommes fusionnèrent leurs bandes de brigands et entrèrent en contact avec Zhang Jinghui et Zhang Zuoxiang, formant ainsi le noyau de ce qui allait devenir la Clique du Fengtian. Après la Guerre russo-japonaise, les forces de Zhang furent intégrées à l'Armée Qing, et Tang fut chargé d'éliminer le bandit Du Lisan. Lorsque Zhang Zuolin prit le contrôle de la province du Fengtian, Tang Yulin et le Vieux Maréchal s'éloignèrent de plus en plus l'un de l'autre en raison du traitement de faveur accordé par Zhang à Zhang Zuoxiang et de l'arrogance croissante de Tang.\n\nTang collabora avec Feng Delin pour évincer Zhang, mais cette tentative échoua ; par la suite, il tenta de soutenir le coup d'État de restauration de Zhang Xun, qui échoua également. Tang fut ensuite réintégré dans la Clique du Fengtian par Zhang Jinghui et Ji Jinchun. Les relations entre Zhang et Tang furent pleinement rétablies après que ce dernier eut contribué à la répression de la rébellion de Guo Songling. Après l'Expédition du Nord, Tang fut nommé gouverneur de Rehe par le Vieux Maréchal, et y est resté depuis lors.§!\n\n§YNotes : Tang est partisan de la reconquête du Chahar aux mains des Mongols, ce que Zhang Zuolin a refusé jusqu’à présent. On le surnomme le Grand Tigre en raison de son amour déclaré pour cet animal, et il reçoit souvent ses invités depuis un canapé recouvert d’une peau de tigre. Il affirme même avoir chevauché un tigre lors d’une partie de chasse en 1929.§!"

 #鮑文樾
 FNG_bao_wenyue: "Bao Wenyue"
 FNG_bao_wenyue_high_command_desc:9 "§YNaissance :§! §L1892, à Fengcheng, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aClique Shaoshuai§!\n§YCarrière :§! §LBien qu’il fût originaire du Nord-Est et d’ethnie mandchoue, Bao Wenyue passa son adolescence à Beijing, où il s’était réfugié avec ses frères pour échapper à leur oncle qui y résidait, après avoir perdu son père à l’âge de 8 ans. Avant d’intégrer l’École d’état-major en 1919, Bao étudia à l’École primaire militaire de la capitale, puis à l’École préparatoire militaire de Qinghe, avant d’entrer dans la 2e promotion de l’Académie militaire de Baoding, où il se spécialisa dans l’infanterie. Il servit également comme officier subalterne dans la 2e division stationnée dans le Hubei.\n\nÀ la fin de ses études à l'École d'état-major en 1922, Bao retourna dans sa région d'origine pour servir la Clique du Fengtian. Il entra au service du Jeune Maréchal, assumant le rôle de chef d'état-major et aidant ce dernier dans divers conflits avec la Clique du Zhili. À la suite de la 3e Guerre Zhifeng, l'influence de Zhang Xueliang au sein de l'armée augmenta considérablement, ce qui l'incita à demander au Vieux Maréchal de nommer Bao au poste de nouveau directeur de l'École militaire du Nord-Est. La position de Bao permet à Zhang Xueliang d'exercer une plus grande influence sur les officiers en formation issus de l'École militaire du Nord-Est.§!\n\n§YNotes : Largement considéré comme le bras droit de Zhang Xueliang, Bao est le principal conseiller du Jeune Maréchal en matière de stratégie militaire. Par ailleurs, Bao est cofondateur et vice-président de l'association des anciens élèves de l'École d'état-major, et il entretient de bonnes relations avec ses camarades de classe de Baoding et de l'École d'état-major.§!"

 #張景惠
 FNG_zhang_jinghui: "Zhang Jinghui"
 FNG_zhang_jinghui_bio:9 "Zhang Jinghui est né dans une famille paysanne. Dans sa jeunesse, il accompagnait son père pour vendre du tofu afin de subvenir à leurs besoins. Plus tard, il créa une "Équipe d'assurance" dans la ville de Bajiaotai. Zhang Zuolin, qui fuyait Jin Shoushan, trouva refuge à Bajiaotai. Les deux Zhang s'y rencontrèrent, devinrent frères de sang et fusionnèrent leurs bandes de brigands. En 1906, l'Équipe d'assurance de Zhang Zuolin avait été intégrée à l'armée Qing et Zhang Jinghui occupait le poste de commandant d'un bataillon de patrouille arrière. En 1910, Zhang Zuolin chargea ses subordonnés Zhang Zuoxiang, Tang Yulin et Zhang Jinghui de fréquenter l'Amphithéâtre de l'Armée du Nord-Est. Zhang Jinghui gravit encore les échelons jusqu'en 1917, tandis que Tang Yulin se brouilla avec Zhang.\n\nEn 1918, Zhang découvrit que Xu Shuzheng et Yang Yuting complotaient pour utiliser les ressources du Fengtian à leur propre profit, et en informa le Vieux Maréchal, ce qui entraîna l'expulsion de Yang et Xu. Il occupa le poste de commandant en chef de l'Armée de la Route de l'Ouest du Fengtian lors de la Première Guerre Zhili-Fengtian, mais son manque de détermination entraîna l'effondrement de l'Armée de la Route de l'Ouest.\n\nAprès la guerre, il fut nommé par Cao Kun au poste de directeur de l'Administration nationale des routes, trahissant ainsi le Vieux Maréchal. En 1925, après le décès de sa mère, Zhang Zuolin l'autorisa à rentrer chez lui pour s'occuper des funérailles, grâce à l'intervention de Zhang Zuoxiang et de Wu Junsheng. Depuis, Zhang a occupé divers postes, dont celui de chef de l'armée.§!\n\n§YNotes : Les Japonais le considèrent comme quelqu'un qui manque d'ambition et de connaissances, et qui est généralement facile à manipuler. C'est Tokyo qui l'a fait entrer dans l'Association Concordia lors d'un banquet où abondaient des produits étrangers de renom."
 FNG_zhang_jinghui_leader_Desc:9 "§YNaissance :§! §L21 juin 1871, à Bajiaotai, district de Shengjing, Grand Qing§!\n§YCarrière :§! §L$FNG_zhang_jinghui_bio$§!"
 FNG_zhang_jinghui_commander_desc:9 "§YNaissance :§! §L21 juin 1871, à Bajiaotai, district de Shengjing, Grand Qing§!\n§YAlignement :§! §mAssociation Concordia§!\n§YCarrière :§! §L$FNG_zhang_jinghui_bio$§!"

 #馮占海
 FNG_feng_zhanhai: "Feng Zhanhai"
 FNG_feng_zhanhai_high_command_desc:9 "§YNaissance :§! §L6 novembre 1889, comté de Jinxian, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aShaoshuai§!\n§YCarrière :§! §LDans son enfance, Feng élevait des cochons et fréquentait une école privée. En 1917, Feng choisit de rejoindre son oncle Zhang Zuoxiang au sein de la Clique du Fengtian en tant que militaire. Plus tard, Feng entra à l'Académie militaire du Nord-Est pour poursuivre ses études. Une fois diplômé, Feng servit comme capitaine d'état-major de la 108e division de la 27e armée, et continua à gravir les échelons, atteignant le grade de commandant en 1925. Feng fut affecté à Jilin après que son oncle Zhang Zuoxiang eut été promu gouverneur de la province. Le commandement du régiment de la garde du bureau du gouverneur de Jilin revint à Feng, qu'il assuma avec dévouement.\n\nContrairement à Wu Junsheng, l'autre ami du Vieux Maréchal, l'oncle de Feng, Zhang Zuoxiang, fit preuve d'un grand talent pour les affaires administratives. Au cours de son mandat de gouverneur, Zhang clarifia les compétences des fonctionnaires, mit en œuvre la méritocratie, réprima le banditisme, débarrassa la province de l’opium, réforma la fiscalité, résolut le déficit budgétaire de Jilin et consacra l’excédent au bien-être public, à la construction de chemins de fer, d’usines de traitement des eaux, de digues, de routes goudronnées, ainsi qu’à l’enseignement primaire et secondaire. L'affinité de Zhang pour la gouvernance et sa forte moralité déteignirent sur Feng, qui était de plus en plus mécontent de l'influence croissante du Japon dans le Nord-Est ces dernières années.§!\n\n§YNotes : Feng est un proche allié de la faction de la Jeune Garde dirigée par Zhang Xueliang, et il prône un programme réformiste auprès de son oncle à Jilin.§!"

 #蘇炳文
 FNG_su_bingwen: "Su Bingwen"
 FNG_su_bingwen_commander_desc:9 "§YNaissance :§! §L2 septembre 1892, à Xinmin, district de Shengjing, Grand Qing§!\n§YAlignement :§! §aClique Shaoshuai§!\n§YCarrière :§! §LLorsque Su Bingwen décida de se lancer dans une carrière militaire en 1905, il entra à l'École primaire militaire du Fengtian, puis à la Première École secondaire militaire de Qinghe. En 1912, Su fut admis dans la première promotion de l'Académie militaire de Baoding pour suivre une formation d'infanterie. Après avoir obtenu son diplôme en 1914, il fut affecté au Régiment modèle du ministère de l'Armée en tant qu'officier subalterne par Yuan Shikai. Lorsque Zhang Xun tenta de restaurer la monarchie Qing en 1917, Su participa à la bataille en tant que commandant de bataillon pour mettre fin au coup d'État de Zhang. Pendant la Weltkrieg, Su fit partie d'une force chinoise envoyée en Extrême-Orient russe et fut stationné à Vladivostok. Wang Huaiqing fit entrer Su dans la Clique du Zhili après la Guerre Zhili-Anhui en 1920, mais ce dernier fut renvoyé en raison de ses origines du Nord-Est lors de la 1ère Guerre Zhifeng.\n\nSu passa deux ans dans le Fujian avant que Guo Songling ne l'intègre à la Clique du Fengtian. Guo fit appel à Su lors de sa rébellion contre le Vieux Maréchal, mais celle-ci fut réprimée avant que Su n'ait eu l'occasion de se battre. Su fut intégré à la 6e brigade en tant que chef d'état-major et attira l'attention de Zhang Xueliang grâce à sa victoire contre la Guominjun en 1926. Après que Zhang Zuolin eut été repoussé au-delà de la Grande Muraille lors de la 3e Guerre Zhifeng, Su fut affecté dans le Heilongjiang au service de Wu Junsheng et Wan Fulin. Pendant son séjour dans le Heilongjiang, il contribua à la création d'usines collectives pour la population locale.§!\n\n§YNotes : Bien que Su soit au service de la Clique du Heilongjiang, tout le monde sait que sa loyauté va à son protecteur, Zhang Xueliang. Tout comme le Jeune Maréchal, Su s'oppose à l'accroissement de l'influence japonaise au Fengtian.§!"

 #于芷山
 FNG_yu_zhishan: "Yu Zhishan"
 FNG_yu_zhishan_commander_desc:9 "§YNaissance :§! §L1879, à Bajiaotai, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LNé sous le nom de Yu Shiwen, il a grandi dans une famille de propriétaires terriens au Fengtian. Malgré son éducation, Yu se tourna vers le banditisme dans sa jeunesse et rejoignit la bande de Du Lisan. Comme beaucoup d'autres bandits, Yu s'engagea dans l'Armée Qing en 1903. En 1914, après la révolution Xinhai, Yu Zhishan entra à l'Amphithéâtre de l'Armée du Nord-Est pour y suivre des études et devint colonel d'infanterie en 1920 sous les ordres de Zhang Zuolin.\n\nGravissant les échelons pendant l'ère des seigneurs de la guerre, Yu devint l'attaché de Zhang. Yu fut ensuite envoyé au Shandong pendant la crise de 1927 qui conduisit à la troisième guerre Zhili-Fengtian. Bien que le plan de Zhang ait finalement échoué, Yu fut rappelé en Mandchourie et reçut une promotion pour ses efforts. Lorsque Zhang perdit Beijing, Yu se retira au Fengtian, et dirige depuis lors une partie importante de l'est de la province.§!\n\n§YNotes : Après la 4e Guerre Zhifeng, l'influence japonaise s'est considérablement accrue dans le Nord-Est. Bien qu'il ne fasse partie ni de la Clique Shikan ni de l'Association Concordia, Yu est considéré, au sein du cercle restreint de Zhang Zuolin, comme un partisan d'un resserrement des relations avec le Japon. Il est également extrêmement ambitieux et n'hésitera pas à trahir Zhang si l'occasion d'en tirer un avantage personnel se présente.§!"

 #鄒作華
 FNG_zou_zuohua:0 "Zou Zuohua"
 FNG_zou_zuohua_high_command_desc:9 "§YNaissance :§! §L11 mai 1894, préfecture de Jilin, district de Jilin, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LIssu d'une riche famille de marchands, Zou Zuohua eut le privilège de fréquenter une école primaire supérieure, puis d'intégrer plusieurs établissements militaires dans le Nord-Est et à Beijing. Son parcours aboutit à son admission dans la 5e promotion de l'Académie militaire de Baoding en 1916. Un an plus tard, aux côtés d'autres talents tels que He Zhuguo, cet étudiant brillant se vit offrir l'opportunité d'étudier dans la 12e promotion de l'Académie de l'Armée impériale japonaise, où il reçut une formation en artillerie.\n\nLa situation en Chine se détériorant, ses compétences étaient indispensables à cette nation divisée et il revint en 1919 pour servir comme instructeur d'artillerie et commandant de bataillon sous les ordres de la Clique de l'Anhui. Après la Guerre Zhili-Anhui en 1920, de nombreuses forces de l'Anhui furent intégrées à l'Armée du Zhili, mais Zou choisit plutôt de rejoindre l'Armée du Fengtian. Rejoignant la Clique du Fengtian en tant qu'officier d'état-major, les compétences de Zou en artillerie firent de lui une étoile montante au sein de l'Armée du Fengtian ; il devint commandant de régiment en 1922 et commandant de brigade avec le grade de général de division en 1925.\n\nCette même année, Zou occupa le poste de chef d'état-major de Guo Songling lors de sa rébellion infructueuse contre le Fengtian. Zhang Zuolin finit par lui accorder son pardon sur les conseils de Zhang Zuoxiang, et le jeune officier fit preuve d'une loyauté sans faille envers le Vieux Maréchal. Après que Zhang Zuolin eut perdu Beijing au profit de Wu Peifu, Zou, nommé directeur de l'artillerie de l'Armée du Fengtian, s'est attelé à la reconstruction de l'Armée du Nord-Est, mettant à profit sa grande expertise en artillerie pour former une nouvelle génération de soldats au service du Vieux Maréchal.§!\n\n§YNotes : Bien qu'il ait été formé au Japon, Zou n'a aucun lien avec la Clique Shikan de Yang Yuting. Zou est personnellement fidèle à Zhang Zuolin, même s'il est considéré comme un officier apolitique doté d'un grand talent.§!"

 #何柱國
 FNG_he_zhuguo:9 "He Zhuguo"
 FNG_he_zhuguo_high_command_desc:9 "§YNaissance :§! §L1897, comté de Rong, province du Guangxi, Grand Qing§!\n§YAlignement :§! §aClique Shaoshuai§!\n§YCarrière :§! §LIssu d'une famille paysanne pauvre et devenu orphelin dès son plus jeune âge, He Zhuguo dépendait de son frère aîné pour subvenir à ses besoins. Après avoir étudié dans une école publique et une école primaire préparatoire à l'armée à Guangzhou, il s'inscrivit en 1917 dans la 6e promotion de l'Académie militaire de Baoding. Grâce à ses résultats remarquables, il fut transféré la même année dans la 12e promotion de l'Académie de l'Armée impériale japonaise pour y étudier la cavalerie, grâce à une bourse du gouvernement.\n\nAvant de rejoindre la clique du Fengtian en 1922 à l'invitation de Zou Zuohua, qui avait étudié dans la même classe que lui, il occupa les fonctions de tuteur, de chef d'escouade de cavalerie et de traducteur à Baoding après son retour en 1919. Lorsque la Deuxième Guerre Zhili-Fengtian éclata, He, qui travaillait comme tuteur en tactique et chef de la cavalerie à l'amphithéâtre de l'Armée du Nord-Est, fut choisi comme officier d'état-major opérationnel de Zhang Xueliang. Lorsque Guo Songling se révolta contre la clique du Fengtian en 1925, le Jeune Maréchal le nomma commandant des renforts de cavalerie, avec lesquels il captura Guo Songling lui-même lors d'une attaque surprise menée conjointement avec Ma Zhanshan, ce qui lui valut d'être promu commandant de régiment.\n\nPar la suite, celui que Zhang Xueliang considérait comme l’un de ses subordonnés les plus précieux a combattu aux côtés des Zhang dans divers conflits et a gravi les échelons sans relâche. Alors que l’armée du Fengtian s’étend et que l’on recherche des talents loyaux, il prend désormais les rênes en tant que général, avec le soutien du Jeune Maréchal.§!\n\n§YNotes : Il est fidèle à son protecteur Zhang Xueliang et partage sa méfiance à l'égard de l'influence japonaise.§!"

 #于珍
 FNG_yu_zhen:9 "Yu Zhen"
 FNG_yu_zhen_high_command_desc:9 "§YNaissance :§! §L1887, comté de Tieling, préfecture du Fengtian, Grand Qing§!\n§YAlignement :§! §PClique Shikan§!\n§YCarrière :§! §LAprès avoir étudié à l'Académie militaire japonaise en 1906, Yu Zhen obtint son diplôme et retourna en Chine pour occuper un poste d'officier d'état-major au sein du bureau du gouverneur militaire du Fengtian, avant de devenir inspecteur général du département de police provincial du Fengtian, puis directeur adjoint de la Direction de la police spéciale des trois provinces du Nord-Est. En 1914, il devint directeur de l'École complémentaire de l'Armée du Fengtian, adjudant de la garnison de Taoliao, chef d'état-major de la 29e division et également de celui du bureau du Dujun du Heilongjiang.\n\nEn 1918, Yu Zhen s'associa à Yang Yuting pour étendre leur influence et leur pouvoir, mais fut démis de ses fonctions par Zhang Zuolin, avant d'être réintégré en 1921. Pendant cette période, Yu s'associa à Yang Yuting, Jiang Dengxuan, Han Linchun et Ji Yiqiao pour former la Clique "Shikan", au sein de laquelle Yang et Yu jouaient les rôles principaux. Nommé commandant adjoint de la 3e armée de l'Armée Zhenwei, Yu ne prit finalement pas le commandement en raison de l'intervention de Yang.\n\nEn 1927, Yu servit lors des 3e et 4e Guerres ZhiFeng, mais fut finalement renvoyé en raison de bévues sur le terrain. Se retirant vers le nord avec Yang en Mandchourie après la 4e Guerre ZhiFeng, il devint chef d'état-major du bureau du Dujun du Fengtian.§!\n\n§YNotes : Tout en étant le co-chef de la Clique Shikan, Yu Zhen est l'un des membres les plus farouchement antijaponais de la Clique du Fengtian, et son domicile est devenu une sorte de lieu de rencontre pour les discussions antijaponaises.\nOn le surnomme le "Vieux Mongol" en raison de son caractère consciencieux et de son attachement inébranlable à la loi.§!"

 #劉鎮東
 FNG_liu_zhendong:9 "Liu Zhendong"
 FNG_liu_zhendong_commander_desc:9 "§YNaissance :§! §L1893, comté de Yishui, province du Shandong, Grand Qing§!\n§YAlignement :§! §aClique Shaoshuai§!\n§YCarrière :§! §LLorsque Liu Zhendong fréquentait l'école primaire dans sa ville natale, il était considéré comme un élève brillant ; malheureusement, il dut abandonner ses études et rejoindre son père dans la menuiserie afin de subvenir aux besoins de sa famille. En 1911, à l'âge de 19 ans, Liu émigra vers le Nord-Est de la Chine avec son père dans l'espoir d'améliorer leur sort.\n\nAvant d'entrer à l'École militaire du Nord-Est grâce à la recommandation de Guo Songling, Liu travailla d'abord comme rédacteur de lettres et rejoignit l'armée du Fengtian en tant que commis en 1918. Après avoir obtenu son diplôme, il resta dans les forces de Guo Songling en tant que commandant subalterne et prit part à la Deuxième Guerre Zhili-Fengtian. Lorsque Guo se révolta contre la Clique du Fengtian, Liu le suivit en tant que commandant de division sous ses ordres. Malgré cela, Liu fut finalement gracié et s'inscrivit à l'École d'état-major en 1927, devenant l'élève officier le plus haut gradé de sa promotion. Officier bien formé et passionné, Liu se distingua dans les rangs du Fengtian lorsque de nouveaux groupes d'officiers furent promus. Il convient toutefois de noter que Liu semblait avoir des opinions bien arrêtées contre la présence japonaise dans les provinces du Nord-Est et contre les éléments pro-japonais de la clique dite de Shikan.§!"

 #周福成
 FNG_zhou_fucheng:9 "Zhou Fucheng"
 FNG_zhou_fucheng_commander_desc:9 "§YNaissance :§! §L1897, au Fengtian, district de Shengjing, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LComme de nombreux officiers de l'Armée du Fengtian, Zhou Fucheng fit ses études à l'école primaire de l'Armée du Fengtian avant d'intégrer la 9e promotion de l'Académie militaire de Baoding en 1919, après avoir terminé ses études secondaires dans sa ville natale. Bien que Zhou ait suivi une formation d'infanterie à Baoding, il commença sa carrière militaire en tant que commandant de section au sein des forces stationnées dans le Heilongjiang sous les ordres de Wu Junsheng, le célèbre ancien cavalier qui était alors commandant de division, après avoir obtenu son diplôme en 1923. Zhou participa aux 3e et 4e Guerres Zhili-Fengtian et gravit les échelons grâce à ses performances en tant qu’officier bien entraîné sur le front contre les troupes de Zhili. Zhou était déjà commandant de régiment en 1927, et il fut promu commandant de division il y a peu, en remplacement de son supérieur incompétent.\n\nEn tant qu’officier sûr de lui et formé dans le pays, Zhou a reçu une grande reconnaissance au sein de la clique du Fengtian (à l’exception de certains membres haut placés appartenant à la Clique Shikan), en particulier de la part du Jeune Maréchal qui apprécie les talents dans l’armée ; c’est aussi la raison pour laquelle il se voit désormais confier le commandement en tant que général de haut rang. Cela dit, Zhou n’est pas particulièrement intéressé ni impliqué dans la politique de la clique, mais il semble préoccupé par la présence japonaise dans sa province natale.§!"

 #郭恩霖
 FNG_guo_enlin:9 "Guo Enlin"
 FNG_guo_enlin_commander_desc:9 "§YNaissance :§! §L1893, à Liaoyang, district de Shengjing, Grand Qing§!\n§YAlignement :§! §PClique Shikan§!\n§YCarrière :§! §LOfficier relativement jeune au sein de la clique du Fengtian, Guo Enlin avait reçu une formation militaire approfondie que peu (voire aucun) de ses supérieurs et collègues pouvaient égaler. Après avoir terminé ses études dans une école primaire militaire au Fengtian, Guo s’inscrivit en 1915 dans la 5e promotion de l’Académie militaire de Baoding, où il étudia l’artillerie. Au lieu de terminer ses études militaires, Guo décida de poursuivre sa formation de cadet au Japon en s'inscrivant à la 12e promotion de l'Académie de l'Armée impériale japonaise pour étudier l'infanterie, grâce à une bourse du gouvernement. Contrairement à la plupart de ses compatriotes qui retournaient en Chine après leurs études à l'Académie, Guo rejoignit un régiment d'artillerie japonais en tant que stagiaire, puis entra à la 4e promotion de l'École supérieure de guerre de l'Armée japonaise en 1923.\n\nGuo finit ses études militaires au Japon en 1925 et rejoignit l'armée du Fengtian en tant qu'officier supérieur sous les ordres de Zhang Zuoxiang ; il était également chargé de l'entraînement des troupes à Jilin. Bien qu'il ait manqué les deux premières Guerres Zhili-Fengtian, Guo fit néanmoins ses preuves en tant qu'officier compétent lors des deux autres conflits avec la clique du Zhili. En tant qu'officier bien formé ayant étudié la guerre moderne au Japon, les compétences de Guo s'avèrent précieuses. Guo est très proche de la clique Shikan et a ouvertement exprimé son admiration pour l'Armée japonaise, ce qui est très probablement lié à son parcours éducatif.§!"

 #郭希鵬
 FNG_guo_xipeng:9 "Guo Xipeng"
 FNG_guo_xipeng_commander_desc:9 "§YNaissance :§! §L1890, comté de Gaiping, district de Shengjing, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LIssu d'une famille de commerçants d'un petit comté, Guo Xipeng a pu suivre ses études primaires et secondaires dans sa ville natale. Après avoir brièvement étudié à l'École de droit et de sciences politiques du Fengtian, Guo fréquenta l'Amphithéâtre de l'Armée du Nord-Est où il suivit une formation de cavalerie. Avant d'être envoyé au Japon pour y suivre une formation militaire plus moderne, Guo servit comme commandant subalterne de cavalerie et combattit lors de la Première Guerre Zhili-Fengtian en 1922.\n\nAu Japon, Guo étudia dans une école de cavalerie à Chiba (certains membres de l'Armée du Fengtian pensent toujours qu'il fréquenta l'Académie de l'armée impériale japonaise), puis il s'inscrivit à l'École supérieure de guerre de l'Armée japonaise pour étudier les sciences militaires modernes et l'art de la guerre. En 1925, Guo revint en tant que commandant d'un régiment de cavalerie sous les ordres de Yu Zhishan ; l'année suivante, il prit le commandement d'une brigade de cavalerie, opérant dans les plaines du Chahar pendant les Guerres Zhili-Fengtian en 1927 et 1928. Guo continua à gravir les échelons au sein de l'Armée du Fengtian en tant que cavalier compétent. Ses connaissances en matière de guerre moderne acquises au Japon constituaient un atout majeur pour l'Armée du Fengtian, et Guo est connu pour ne pas avoir collaboré avec la clique Shikan ni avec l'Association Concordia, bien qu'il ait étudié au Japon.§!"

 #戢翼翘
 FNG_ji_yiqiao:9 "Ji Yiqiao"
 FNG_ji_yiqiao_commander_desc:9 "§YNaissance :§! §L1885, comté de Fang, province du Hubei, Grand Qing§!\n§YAlignement :§! §PClique Shikan§!\n§YCarrière :§! §LAyant grandi dans la province du Hubei, Ji Yiqiao fit des études modernes dans une école fondée par Zhang Zhidong, le célèbre réformateur de la fin de la dynastie Qing. En 1906, il fut envoyé par le gouvernement provincial du Fengtian étudier à la Rikugun Shikan Gakkō à Tokyo. De retour en Chine en 1911, il enseigna brièvement à l'Académie militaire de Baoding avant de prendre part à la Révolution Xinhai à Shanghai, participant à la prise de Nanjing. Après que les tensions entre Sun Yat-sen et Yuan Shikai eurent atteint leur paroxysme en 1912, aboutissant à la Seconde Révolution, Ji rejoignit le camp des révolutionnaires, puis s'exila après la défaite de ceux-ci. Plus tard, à l'invitation de Tang Jiyao, il se rendit au Yunnan pour occuper le poste d'instructeur à l'Académie militaire de Kunming. Finalement, en 1922, son ancien camarade de classe Yang Yuting l'invita à rejoindre l'armée du Fengtian en tant que chef d'état-major de la division de Han Linchun. Se distinguant depuis lors, Ji prouva ses talents de commandant lors de la Deuxième Guerre Zhifeng, de la répression de la rébellion de Guo Songling et des deux Guerres Zhifeng qui suivirent. C'est au cours des Troisième et Quatrième Guerres Zhifeng que Ji allait démontrer ses véritables talents de commandant, en déjouant les manœuvres d'une importante force du Zhili dans la province du Henan et en la coupant de ses lignes de ravitaillement. Malgré la défaite du Fengtian, Ji resta un officier compétent et un membre éminent de la Clique Shikan de Yang Yuting.§!\n\n§YNotes : Bien qu'il soit un membre éminent de la Clique Shikan, Ji entretient de bonnes relations avec de nombreux membres du haut commandement du Fengtian, y compris ceux de la Clique Shaoshuai. Il se méfie également de l'influence croissante du Japon dans le nord-est de la Chine, et se montre personnellement extrêmement sceptique quant aux intentions japonaises.§!"

 #周亚卫
 FNG_zhou_yawei:9 "Zhou Yawei"
 FNG_zhou_yawei_bio:9 "Élève brillant et engagé dès son plus jeune âge, Zhou Yawei suivit un parcours scolaire classique, mais à l’âge de 18 ans, il fut recruté par Qiu Jin pour rejoindre la Société de la Restauration. Cette organisation révolutionnaire anti-Qing, active principalement dans les provinces du Jiangsu et du Zhejiang, fut fondée par des personnalités telles que Tao Chengzhang, Zhang Taiyan et Cai Yuanpei. Axée sur une structure paramilitaire, elle tenta plusieurs soulèvements qui échouèrent, auxquels Zhou participa.\n\nAprès la Révolution Xinhai, Zhou s'associa brièvement à Ge Jingen avant d'intégrer l'Université militaire. Après avoir épousé Yin Ruizhi, une autre membre de la Société de la Restauration, Zhou obtint son diplôme et fréquenta l'Université de l'Armée japonaise. De retour en Chine en 1924, il occupa les fonctions de chef de section au Département des Sciences militaires du Gouvernement de Beiyang, puis de chef d'état-major des troisième et quatrième corps de l'Armée du Fengtian.\n\nPromu directeur du Département des Sciences militaires du commandement de sécurité des Trois Provinces du Nord-Est en 1928, il devint instructeur en chef du corps de formation des officiers de l'armée en 1934, puis doyen de l'Université militaire du Nord-Est. Sous son égide, Zhou entreprit de relancer la Société de la Restauration avec son épouse sous la forme d'un parti politique nationaliste pseudo-paramilitaire, bien que n'obtenant qu'un succès modéré."
 FNG_zhou_yawei_leader_desc:9 "§YNaissance :§! §LMars 1889, comté de Shengxian, province du Zhejiang, Grand Qing§!\n§YCarrière :§! §L$FNG_zhou_yawei_bio$§!"
 FNG_zhou_yawei_commander_desc:9 "§YNaissance :§! §LMars 1889, comté de Shengxian, province du Zhejiang, Grand Qing§!\n§YAlignement :§! §mSociété de la Restauration§!\n§YCarrière :§! §L$FNG_zhou_yawei_bio$§!"

 #沈鴻烈
 FNG_shen_honglie: "Shen Honglie"
 FNG_shen_honglie_navy_chief_desc:9 "§YNaissance :§! §L1882, à Tianmen, province du Hubei, Grand Qing§!\n§YAlignement :§! §PZhang§!\n§YCarrière :§! §LShen Honglie, alors qu'il était un jeune homme ambitieux et déterminé, avait très tôt pris conscience des faiblesses de la marine chinoise et avait décidé de devenir général de la marine. En 1906, il entra à l'Académie navale impériale japonaise, où il rejoignit le Tongmenghui (le Comité d'alliance de Chine). À son retour au pays après avoir obtenu son diplôme, il reçut l'ordre de mener la campagne navale anti-Qing dans les cours moyen et inférieur du Yangtsé, dans le Hubei, mais ne parvint pas à intégrer les forces navales. À cette époque, les figures de proue de la marine avaient toutes étudié en Grande-Bretagne et la plupart étaient originaires de Fuzhou. De toute évidence, Shen Honglie, qui avait étudié au Japon et était originaire du Hubei, ne pouvait pas y trouver sa place. Plus tard, il se rendit à Beijing pour occuper le poste d'attaché naval du régiment EuroWatch en 1916. Après 1920, il devint le confident de Zhang Zuolin, aidant ce dernier à mettre en place la marine du Nord-Est. Après plusieurs Guerres Zhili-Fengtian, il devint commandant en chef de la marine du Nord-Est, en monopolisant le pouvoir.\nBien qu'il ait étudié au Japon, il n'a pas rejoint l'Association Concordia, mais était membre de la Clique de Zhang.§!"

 #尹祚乾
 FNG_yin_zuoqian: "Yin Zuoqian"
 FNG_yin_zuoqian_navy_chief_desc:9 "§YNaissance :§! §L1887, à Zhijiang, province du Hunan, Grand Qing§!\n§YAlignement :§! §L"Apolitique"§!\n§YCarrière :§! §LParti au Japon pour suivre des études navales à l'École d'artillerie navale de Yokosuka, Yin Zuoqian obtint son diplôme en 1911. À son retour, il fut nommé capitaine du Corps des Marines du Bureau du gouverneur militaire de Shanghai, puis fut affecté comme greffier au Département de la Marine du Gouvernement de Beiyang. En 1913, Yin fut promu au grade de capitaine de corvette et, en 1920, il occupa le poste de chef de la section des codes du ministère de la Marine.\n\nAprès avoir commandé les navires "Jiangping" et "Liji", il reçut la médaille Wenhu de quatrième classe et continua à commander d'autres navires avant que le début de l'Expédition du Nord et des Guerres Zhifeng ne le conduise finalement au poste d'instructeur en chef de la Flotte de défense de la Marine du Nord-Est.\n\nAyant noué des liens étroits avec des officiers supérieurs japonais grâce à ses relations forgées pendant ses études, Yin Zuoqian entretient des liens étroits avec l'Association Concordia, mais reste insaisissable quant à son adhésion officielle.§!"

 #孟鐵樵
 FNG_meng_tieqiao:0 "Meng Tieqiao"
 FNG_meng_tieqiao_high_command_desc:9 "§YNaissance :§! §Ldans le Grand Qing§!"

 #謝剛哲
 FNG_xie_gangzhe:0 "Xie Gangzhe"
 FNG_xie_gangzhe_high_command_desc:9 "§YNaissance :§! §L1885, comté de Huayang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LAprès être entré en troisième année à l'École des forces armées de Fuzhou, Xie Gangzhe obtint son diplôme et se rendit au Japon pour poursuivre ses études à l'École de la marine marchande de Tokyo, ainsi qu'à l'École de tir naval et de torpilles de Yokosuka. Après Xinhai, il occupa le poste de directeur du Département du renseignement militaire au sein du ministère de la Marine du gouvernement provisoire de Nanjing, puis celui de directeur du Sixième Bureau de l'état-major du gouvernement de Beijing.\n\nEn 1925, il fut nommé chef d'état-major du Commandement naval du Nord-Est, puis, en 1934, il devint commandant subordonné de Shen Honglie.§!"

 #李桂丹
 FNG_li_guidan:0 "Li Guidan"
 FNG_li_guidan_high_command_desc:9 "§YNaissance :§! §L1er décembre 1913, comté de Xinmin, province du Fengtian, République de Chine§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LSouhaitant se lancer dans la guerre aérienne et devenir un pilote audacieux, Li Guidan s'engagea à l'Académie aérienne du Fengtian en 1930, dont il sortit diplômé en 1932, avant d'être admis dans la deuxième promotion de l'École d'aviation du Fengtian. Après avoir obtenu son diplôme un an plus tard, il servit comme instructeur de vol au sein de la modeste force aérienne du Fengtian et comme chef du groupe de chasse du département de vol, tout en occupant simultanément le poste de capitaine d'escadron de l'armée de l'air.§!"

 #佟彦博
 FNG_tong_yanbo:0 "Tong Yanbo"
 FNG_tong_yanbo_air_chief_desc:9 "§YNaissance :§! §LJanvier 1911, à Yizhou, province du Fengtian, Grand Qing§!\n§YAlignement :§! §aShaoshuai§!\n§YCarrière :§! §LIssu d'une famille aisée comptant de nombreux frères et sœurs, le père de Tong Yanbo allait devenir un modèle pour lui dans tous les aspects de sa vie. Homme à la fois strict, économe, soucieux du détail et bienveillant, il incita Tong à adopter un mode de vie ascétique. Étudiant dans son comté natal, Tong était un élève doué et assidu, sautant même deux classes entières dans sa jeunesse grâce à son excellent comportement et à ses résultats scolaires. Admis à l'Université du Nord-Est en 1928, il étudia au département de génie mécanique, se montrant joyeux, stable, franc et généreux. Soucieux de son apparence et de ses manières, il se lia d'amitié avec Zhang Xueliang, jouant fréquemment au tennis avec le Jeune Maréchal.\n\nInspiré par le patriotisme dont faisait preuve le Jeune Maréchal, Tong s'engagea dans l'armée de l'air du Fengtian à la demande de Xueliang. Spécialisé dans le bombardement pendant ses études, il obtint son diplôme en 1935, puis resta à son école en tant qu'instructeur de vol, devenant l'un des as de l'armée de l'air du Jeune Maréchal.§!"

 #高志航
 FNG_gao_zhihang:0 "Gao Zhihang"
 FNG_gao_zhihang_air_chief_desc:9 "§YNaissance :§! §L14 mai 1907, comté de Tonghua, province du Fengtian, Grand Qing§!\n§YAlignement :§! §aShaoshuai§!\n§YCarrière :§! §LAdmis à l'École d'officiers de l'Armée du Nord-Est en 1920, Gao Zhihang fut ensuite sélectionné pour suivre une formation de pilote d'avion en France pendant deux ans, à partir de 1924. Spécialisé dans les avions de chasse, Gao servit brièvement à Nancy au sein du 23e régiment de chasse de l'Armée de l'air française. De retour en Chine en 1927, Gao fut nommé par Zhang Xueliang au grade de commandant de bord au sein de l'escadron des Aigles volants du département de l'aviation du Nord-Est, où il occupa le poste d'instructeur principal de la classe de formation aéronautique du Nord-Est.§!"

 FNG_the_old_marshals_clique: "La Clique des Dashuai"
 FNG_the_old_marshals_clique_theorist_desc:9 "§YDescription :§! §LComposée principalement des proches de Zhang Zuolin et d'autres associés de son passé de bandit, la clique du vieux maréchal représente une majorité importante mais vieillissante du commandement du Fengtian. La véritable force de ses membres réside dans leur accès facile à Zhang lui-même, suivi de près par leurs connexions dans tout le nord-est. Bien que leur façon de faire la guerre soit dépassée et que leurs rôles militaires soient mis de côté, l'influence de la vieille garde peut encore s'avérer utile sur le plan politique.§!"

 FNG_the_young_marshals_clique: "La Clique de Shaoshuai"
 FNG_the_young_marshals_clique_theorist_desc:9 "§YDescription :§! §LLa "clique" du jeune maréchal est un mélange d'amis personnels de Zhang Xueliang et de jeunes officiers audacieux qui suivent ses traces. Nombre d'entre eux ont reçu une éducation militaire formelle dans des écoles chinoises et occidentales ou, à tout le moins, considèrent les méthodes et les technologies militaires modernes avec un certain enthousiasme. Pour Zhang Xueliang en particulier, cela s'est traduit par une passion pour la guerre aérienne et l'utilisation de tirs d'artillerie concentrés sur le champ de bataille pour soutenir des assauts d'infanterie bien disciplinés.§!"

 FNG_the_shikan_clique: "La Clique Shikan"
 FNG_the_shikan_clique_theorist_desc:9 "§YDescription :§! §LLa Clique Shikan porte le nom du Rikugun Shikan Gakkō, ou "Académie de l'armée impériale", la plus grande école militaire du Japon. La plupart de ses membres ont étudié dans cette école ou dans d'autres écoles d'élite japonaises, ce qui confère à la Clique du Fengtian une mentalité militaire typiquement japonaise. Bien qu'ils ne soient pas strictement pro-japonais, ils se tournent souvent vers des associés japonais pour obtenir des connaissances et de l'aide. Sur le plan stratégique, la Clique Shikan privilégie une planification militaire supérieure, des forces d'assaut d'infanterie d'élite et des tirs d'artillerie lourde.§!"

 FNG_anguojun_general_staff:0 "État-major général de l'Anguojun"
 FNG_anguojun_general_staff_theorist_desc:9 "§YDescription :§! §LBien que l'armée actuelle du Gouvernement du Fengtian soit officiellement l'Anguojun, il reste une myriade d'officiers expérimentés issus de l'époque du Gouvernement du Fengtian au sud de la Grande Muraille de Chine, qui ne sont alignés sur aucune faction particulière au sein de l'armée du Fengtian. Bien qu'ils ne privilégient peut-être pas une orientation stratégique particulière, les officiers non alignés de l'état-major général continuent de développer de nouvelles idées et stratégies.§!"

### Traits ###

 FNG_mukden_tiger:9 "Tigre du Nord"
 FNG_mukden_tiger_desc:9 "§LOriginaire de la province de Fengtian, Zhang Zuolin est passé d'une vie de pauvreté dans la région rurale de Dongbei au poste de Grand Maréchal de l'Anguojun. Doté de nombreux noms et fin stratège, le maréchal Zhang est sans aucun doute aussi féroce qu'un tigre.§!"
