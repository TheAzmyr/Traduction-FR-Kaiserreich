#Shared Army Tree Section
 FNG_Found_the_Shenyang_National_Academy: "Fonder l'Académie Nationale de Shenyang"
 FNG_Found_the_Shenyang_National_Academy_desc: "Dans les années de difficultés économiques qui ont suivi la dernière Guerre Zhifeng, la Salle de Conférence de l'Armée du Nord-Est a commencé à stagner. En refondant l'ancienne académie sous un nouveau nom et en actualisant son programme d'études, elle peut redevenir un motif de fierté."

 FNG_Promote_Young_Officers:0 "Promouvoir les Jeunes Officiers"
 FNG_Promote_Young_Officers_desc: "Malgré des années de réforme, notre corps d'officiers souffre toujours d'un manque chronique de modernité, une grande partie du corps d'officiers étant composée d'officiers âgés et médiocres. Bien que la clique de Shikan et la clique de Shaoshuai aient des candidats différents pour la promotion, elles préconisent toutes deux la promotion d'officiers jeunes et talentueux. Suivons leurs conseils pour résoudre nos problèmes actuels de leadership."

FNG_Obtain_Japanese_Instructors: "Obtenir des instructeurs japonais"
FNG_Obtain_Japanese_Instructors_desc: "Le Japon dispose d'un secteur militaire et industriel moderne comparable en termes de force et de discipline à celui de l'Occident. Étant donné que le gouvernement japonais est disposé à fournir des instructeurs gratuitement, nous devrions profiter de cette occasion pour constituer une force que nos ennemis nous envieront"

 FNG_Modernized_Curriculum: "Programme d'études modernisé"
FNG_Modernized_Curriculum_desc: "Le programme japonais moderne, conçu pour contrer l'agression russe dans les plaines de Mandchourie, met l'accent sur les facteurs du moral et la ténacité de la volonté, en insistant sur une formation conçue pour développer la capacité à reconnaître les possibilités d'une attaque décisive ; en enveloppant les flancs ouverts de l'ennemi, en encerclant les formations, et en détruisant ainsi les forces numériquement et technologiquement supérieures"

 FNG_Improve_Logistics:0 "Améliorer notre Logistique"
 FNG_Improve_Logistics_desc: "Notre réseau logistique a toujours été l'un des meilleurs de Chine. Depuis la première guerre de Zhili-Anhui, notre système logistique a été en mesure d'acheminer rapidement et efficacement les approvisionnements et les renforts vers la ligne de front, ce qui nous a permis d'utiliser efficacement notre vaste base industrielle et de main-d'œuvre à notre avantage. Utilisons à nouveau cet avantage contre nos ennemis !"

 FNG_Modernise_Infantry_Tactics: "Moderniser les Tactiques d'Infanterie"
 FNG_Modernise_Infantry_Tactics_desc: "Au cours des derniers conflits dans lesquels nous avons été impliqués, notre infanterie s'est révélée déficiente à de nombreux égards. Nos mitrailleurs utilisaient des tactiques dépassées, souvent avec des tireurs non qualifiés. Notre infanterie était souvent privée de l'appui de l'artillerie et d'autres armes de soutien. Si nous espérons sortir victorieux de notre prochaine lutte pour l'unification de la Chine, nous devons moderniser nos tactiques d'infanterie et résoudre les problèmes qui subsistent."

 FNG_Artillery_Reform: "Utiliser nos Forces"
 FNG_Artillery_Reform_desc: "Au cours des deux dernières décennies, notre force d'artillerie a été l'un des points lumineux de notre armée souvent terne, ses tirs efficaces et souvent précis nous ayant permis de sortir victorieux de nombreuses batailles. Bien que les deux factions de la Jeune Garde aient des idées différentes sur la manière dont notre corps d'artillerie devrait fonctionner à l'avenir, elles s'accordent toutes deux à dire que le maintien d'une artillerie forte sera un facteur décisif dans nos guerres à venir. Continuons à utiliser cette force."

FNG_Collaborative_Equipment_Design: "Conception d'équipement collaboratif"
FNG_Collaborative_Equipment_Design_desc: "En nous associant avec des fabricants japonais pour créer et rationaliser des designs adaptés à l'environnement chinois unique, nous pouvons produire des armes supérieures à moindre coût. Cela peut nous rendre dépendants de machines coûteuses fabriquées au Japon, mais à long terme, nous disposerons des outils dont nous avons besoin pour pacifier toute la Chine"

#Zhang Clique reforms

 FNG_Zhang_Clique: "Se Tourner Vers les Jeunes"
 FNG_Zhang_Clique_desc: "Dirigée par Zhang Xueliang, la Clique de Shaoshuai est née après notre défaite lors de la Troisième Guerre Zhili-Fengtian. Composée principalement de jeunes officiers avant-gardistes, elle insiste sur la nécessité de disposer d'un noyau de sous-officiers et de fantassins bien disciplinés. Nous devons donc confier la réforme de notre armée à ces jeunes officiers et à leurs alliés de la vieille garde afin de nous préparer à l'inévitable confrontation avec nos ennemis du sud tout en contrant l'influence japonaise dans notre armée."

 FNG_Train_New_Field_Officers: "Former les Nouveaux Agents de Terrain"
 FNG_Train_New_Field_Officers_desc: "Historiquement, l'armée de Fengtian a manqué d'officiers subalternes compétents capables de maintenir la cohésion sur les lignes de front. En formant une nouvelle génération d'officiers de terrain, nous pouvons distribuer des officiers subalternes compétents à l'ensemble de notre armée, ce qui nous permettra à la fois de pallier le manque de dirigeants compétents et de garantir l'efficacité de nos troupes au niveau tactique."

 FNG_Promote_New_Non-Commissioned_Officers: "Promouvoir les Nouveaux Sous-officiers"
 FNG_Promote_New_Non-Commissioned_Officers_desc:9 "S'inspirant des enseignements de l'académie militaire de Baoding et de l'influence de Guo Songling, la Clique Shaoshuai insiste sur la nécessité de disposer d'un corps de sous-officiers compétents pour maintenir la cohésion et la discipline de nos troupes au front. En promouvant des soldats prometteurs à ces postes, nos armées peuvent espérer vaincre l'ennemi grâce à une discipline et une organisation supérieures, au lieu de s'appuyer uniquement sur la supériorité de notre équipement comme nous l'avons fait par le passé."

 FNG_Model_Soldiers: "Soldats Modèles"
 FNG_Model_Soldiers_desc: "Bien que notre armée ait parcouru un long chemin depuis notre défaite en 1922, une grande partie de nos forces est encore composée de troupes non motivées et mal entraînées. Nous devons donc imposer à nos troupes un entraînement physique et un entraînement au combat rigoureux, ainsi qu'un endoctrinement moral, afin de créer une force de combat qualifiée, disciplinée et motivée, capable de rivaliser avec n'importe quelle armée chinoise."

 FNG_Mobilise_The_People:0 "Mobiliser le peuple"
 FNG_Mobilise_The_People_desc:9 "Comme nous l'avons fait au cours des nombreux conflits que nous avons connus jusqu'à présent, nous devons puiser dans les riches bases industrielles et humaines du Nord-Est afin d'approvisionner efficacement nos armées en armes et en nouvelles recrues."

 FNG_Absorb_Canmou_Clique_Remnants: "Héritage de Guo Songling"
 FNG_Absorb_Canmou_Clique_Remnants_desc: "Malgré la trahison de Guo Songling, il est difficile d'ignorer son héritage au sein de l'armée de Fengtian, en particulier son influence sur les jeunes officiers. Cependant, ses idées se sont avérées très efficaces au cours des années qui ont suivi sa mort et ont permis à notre armée de remporter de nombreuses victoires. Peut-être qu'en adoptant et en affinant ses idées, ainsi qu'en replaçant ses disciples à des postes plus influents, nous pourrions accroître considérablement la force de notre armée."

 FNG_Modernise_The_Cavalry: "Moderniser la Cavalerie"
 FNG_Modernise_The_Cavalry_desc: "Historiquement, notre force de cavalerie s'est exceptionnellement bien comportée face à nos adversaires dans la plaine de Chine du Nord. Au cours de la deuxième guerre Zhili-Fengtian, notre cavalerie a joué un rôle essentiel dans notre victoire à Rehe. Nous devons veiller à ce que notre force de cavalerie soit à la hauteur des normes modernes si nous espérons reproduire nos succès précédents. De plus, le général Ma Zhanshan a suggéré que notre cavalerie pourrait également s'avérer utile dans le cas où nos ennemis occuperaient nos terres..."

 FNG_Learn_From_The_Russians: "Apprendre des Russes"
 FNG_Learn_From_The_Russians_desc: "Après avoir constaté la puissance impressionnante de l'artillerie ferroviaire et des trains blindés utilisés par nos voisins russes, tant pendant leur guerre civile que lors de leurs rares affrontements frontaliers avec notre propre armée et les forces japonaises, de nombreux membres de notre clique ont été convaincus de l'efficacité de l'artillerie ferroviaire. Bien que coûteuse, cette artillerie pourrait s'avérer inestimable pour percer les puissantes fortifications construites par nos ennemis du sud."

 #Shikan Clique reforms

 FNG_Shikan_Clique_Chosen: "S'adresser à la Clique de Shikan"
 FNG_Shikan_Clique_Chosen_desc: "La Clique de Shikan, dirigée par Yang Yuting, est un groupe d'officiers formés au Rikugun Shikan Gakko au Japon. Les objectifs de Yang, à savoir la création d'une structure de commandement centralisée, des frappes d'artillerie de précision et un corps d'officiers moderne, nous ont bien servis par le passé, notamment sur le front de Rehe pendant la deuxième guerre Zhili-Fengtian. Peut-être que les idées de Yang Yuting pourront à nouveau transformer l'armée de Fengtian en l'une des plus grandes armées de Chine."

 FNG_Exchange_Programs_With_Japan: "Programmes d'Échange avec le Japon"
 FNG_Exchange_Programs_With_Japan_desc:9 "Si nos "alliés" japonais peuvent avoir des arrière-pensées derrière notre alliance, nous avons néanmoins accès à une grande expérience dans le corps des officiers de l'armée impériale japonaise. Nous devons donc utiliser cette précieuse ressource pour améliorer notre armée en envoyant nos meilleurs éléments dans les académies japonaises."

 FNG_Lessons_of_the_Weltkrieg:0 "Leçons de la Weltkrieg"
 FNG_Lessons_of_the_Weltkrieg_desc:9 "Bien que nous ayons officiellement participé à la Weltkrieg du côté de l'Entente, nous n'avons vu que de loin le carnage causé par les armes et les tactiques modernes, par l'intermédiaire d'observateurs et d'associés au sein de l'armée japonaise. Nous pouvons espérer améliorer considérablement l'efficacité de notre armée au combat si nous prenons à cœur les leçons tirées par les grandes puissances en mettant l'accent sur la nécessité de disposer d'un corps d'ingénieurs et d'artillerie compétents."

 FNG_Study_Japanese_Infantry_Tactics: "Étudier les Tactiques de l'Infanterie Japonaise"
 FNG_Study_Japanese_Infantry_Tactics_desc: "Lors des interventions japonaises très limitées de l'armée impériale japonaise dans nos conflits, ses tactiques se sont révélées extrêmement efficaces. Leur infanterie, en particulier, s'est révélée extrêmement performante dans les opérations d'infiltration et d'assaut, ce qui a permis de remporter de nombreuses victoires. S'inspirer de ces stratégies japonaises peut s'avérer extrêmement utile pour l'efficacité de notre armée au combat."

 FNG_New_Generation_Of_Chinese_Officers: "Une Nouvelle Génération d'Officiers Chinois"
 FNG_New_Generation_Of_Chinese_Officers_desc: "Si nous voulons produire l'une des meilleures forces de combat de Chine, nos officiers doivent être à la hauteur des normes de notre nouvelle armée. Par conséquent, notre nouvelle génération d'officiers chinois doit être disciplinée, bien informée et loyale envers nous si nous voulons produire des officiers compétents qui seront aptes à diriger notre nouvelle armée."

 FNG_Modern_General_Staff: "Un État-major Moderne"
 FNG_Modern_General_Staff_desc: "Le succès de l'armée impériale japonaise est dû en grande partie à son état-major. Par conséquent, pour reproduire leurs succès, nous devons créer un état-major moderne qui nous permette d'élaborer des plans de bataille pour toute confrontation avec nos ennemis bien avant que nous n'en venions aux mains. Cela nous donnerait un avantage sur nos ennemis et s'avérerait extrêmement utile dans nos batailles contre nos adversaires du Sud."

 FNG_Methodical_Approach_To_War: "Une Approche Méthodique de la Guerre"
 FNG_Methodical_Approach_To_War_desc: "Après avoir observé les trois dernières décennies de combats presque incessants, une seule conclusion s'impose. Même en Chine, où des armées fortes de centaines de milliers d'hommes s'affrontent régulièrement, le fanatisme et le nombre ne permettront pas de gagner des batailles. Seule une force forte, d'élite et moderne, soutenue par une stratégie moderne, nous permettra de gagner des batailles. Nous devons donc adopter une approche méthodique de la guerre pour que nos armées puissent en sortir victorieuses."

 FNG_li_yichun:9 "Li Yichun"

 #Army Tree effect tooltips subsection

 FNG_young_officer_tt: "Les effets de cette priorité varieront selon que §YYang Yuting§! ou §YZhang Zuoxiang§! est actuellement notre chef des armées."
 FNG_cavalry_reform_tt: "Si nous avons §YMa Zhanshan§! dans notre haut commandement militaire, les avantages de cette priorité seront accrus."
 FNG_railway_gun_tt: "Nous recevrons un §Ycanon ferroviaire§! une fois que l'esprit national chronométré aura expiré."

#Chinese Equipment Section
 FNG_Rearming_the_Northeast: "Réarmer le Nord-Est"
FNG_Rearming_the_Northeast_desc: "L'arsenal de Shenyang était autrefois la plus grande entreprise militaro-industrielle de Chine, mais la dernière décennie l'a vu éclipsé par la production combinée d'autres arsenaux chinois, comme ceux de Hanyang, Baoding et Jiangnan. Nous devons reprendre notre place au sommet et, ce faisant, réduire notre dépendance à l'égard de l'aide militaire japonaise. Nous pouvons commencer par éradiquer la corruption et augmenter les quotas de production"

FNG_Diversify_Armament_Production: "Diversifier la production d'armement"
 FNG_Diversify_Armament_Production_desc: "L'arsenal de Shenyang a toujours été une opération massive mais totalement centralisée, avec une seule usine et des sous-usines dans la région de Shenyang qui représentent la totalité de la production d'armement du Nord-Est. La taille de l'usine finit par devenir un fardeau. Nous devons envisager de diversifier notre processus de fabrication d'équipements pour inclure des composants construits dans des usines séparées, voire par des entreprises privées"

 FNG_Zaibatsu_Investments: "Investissements des Zaibatsu"
 FNG_Zaibatsu_Investments_desc: "En ouvrant notre industrie de l'armement aux Zaibatsu, nous invitons inévitablement à une influence japonaise accrue en Mandchourie. Cependant, ils peuvent fournir plus d'argent que nous ne pourrions jamais nous permettre de dépenser, et leurs procédés de fabrication sont bien plus sophistiqués que les nôtres."

FNG_Jigyou_Hikaku: "Jigyou Hikaku"
FNG_Jigyou_Hikaku_desc: "Les Japonais ont recommandé à nos entreprises militaro-industrielles d'adopter une stratégie de comparaison des résultats commerciaux, ou "Jigyou Hikaku", dans laquelle des données propriétaires sur la production sont divulguées. Ils vont ensuite classer les performances et envoyer des consultants pour améliorer nos méthodes industrielles. Cela devrait stimuler la production, tout en donnant aux Japonais de nombreuses informations sur notre industrie militaire"

FNG_Expand_the_Shenyang_Arsenal: "Développer l'arsenal de Shenyang"
FNG_Expand_the_Shenyang_Arsenal_desc: "La plus grande entreprise militaro-industrielle de Chine des années 1920, l'énorme arsenal de Shenyang produit une grande variété d'armes légères et d'artillerie modifiées, généralement basées sur des modèles acquis à l'étranger. En développant ses activités et en introduisant des équipements plus récents, nous pouvons augmenter considérablement sa production"

FNG_Develop_the_Dadong_Artillery_Complex: "Développer le complexe d'artillerie de Dadong"
 FNG_Develop_the_Dadong_Artillery_Complex_desc: "[FNG.GetLeader] a toujours eu un enthousiasme pour les gros canons, et l'Arsenal de Mukden a toujours construit son artillerie à la fabrique de mortiers de Shenyang à Dadong ; un district du nord-est de Shenyang. En développant cette opération dans un complexe d'artillerie totalement séparé, nous pouvons maximiser son efficacité"

#Modernising Equipment Section
FNG_The_Kwantung_Protocol: "Le protocole Kwantung"
FNG_The_Kwantung_Protocol_desc: "Au vu de l'amitié croissante entre nos deux nations, l'armée du Kwantung a demandé au ministère de l'Armée du Japon d'accroître sa coopération. Cette coopération doit inclure le transfert d'armes et de technologies, ainsi que la formation. Tout ce que nous avons à faire est d'ajouter notre signature au document préparé, bien que l'acceptation fera le jeu de l'Association Concordia"

#Naval Branch

 FNG_Reorganise_the_Coastal_Defence_Forces: "Réorganiser les forces de défense côtière"
 FNG_Reorganise_the_Coastal_Defence_Forces_desc: "Parce que la marine fengtienne n'a aucun moyen réaliste de s'opposer à la marine plus importante et plus récente mise en place par [QIE.GetNameDef], son principal objectif est la défense côtière. À la lumière des récentes insuffisances troublantes, telles que la vente de l'armement d'un équipage de navire sur le marché noir, une réorganisation et une réforme approfondies sont nécessaires"

FNG_Expand_Yingkou_Naval_Yard: "Agrandir le chantier naval de Yingkou" 
 FNG_Expand_Yingkou_Naval_Yard_desc: "Yingkou est le deuxième port de la région nord-est, après celui du Japon [745.GetCapitalVictoryPointName], et le port d'attache de notre marine. Si nous voulons entamer un projet de reconstruction navale significatif, l'expansion du chantier naval de Yingkou est une première étape essentielle"

 FNG_The_Nine_Points_Strategy: "La Stratégie en Neuf Points"
 FNG_The_Nine_Points_Strategy_desc: "La grave asymétrie de force entre les marines Fengtian et [QIE.GetAdjective] signifie que, en l'absence de soutien japonais, toute notre côte sera menacée d'invasion. Les stratèges japonais ont défini neuf positions où les débarquements navals sont les plus probables, et ont élaboré des plans pour leur défense."

 FNG_Regular_River_Patrols: "Patrouilles Fluviales Régulières"
 FNG_Regular_River_Patrols_desc: "La marine possède un certain nombre de petits patrouilleurs, utilisés occasionnellement pour surveiller les rivières Yalu et Songhua, mais dont la majorité rouille actuellement en entrepôt. Ils pourraient être mieux utilisés pour former nos équipages et maintenir notre sécurité intérieure, si nous pouvons trouver le financement nécessaire."

FNG_Re-Forming_the_Marine_Corps: "Re-former le corps des Marines"
FNG_Re-Forming_the_Marine_Corps_desc: "Un corps de marines a été créé en 1914, appelé le "Republic of China Marine Corps", mais cette tentative n'a pas abouti. Nous allons faire revivre le Corps des Marines de Chine selon des principes modernes, ce qui nous permettra de mieux opérer dans des environnements fluviaux comme le Huang He et le Yangtze. Si nous en avons la possibilité, nous pourrons peut-être même traverser la mer de Bohai et faire nôtre l'ancienne stratégie de Wu Peifu"

FNG_Commission_Japanese_Ships: "Navires japonaise comissionné"
FNG_Commission_Japanese_Ships_desc: "Il ne fait aucun doute que nos propres capacités de construction navale sont dérisoires par rapport à celles de la marine impériale japonaise. Ils ne nous donneront jamais les navires nécessaires pour construire une flotte vraiment moderne, mais ils pourraient nous en vendre suffisamment pour faire la différence face aux autres Chinois, et à toute autre menace future"

#Air Force Branch
 FNG_Request_Air_Shipment: "Demander des cellules d'avions japonais"
FNG_Request_Air_Shipment_desc: "Bien que nous ayons une force aérienne forte par rapport à la plupart des chefs de guerre, notre force aérienne n'est toujours pas à la hauteur des [QIE.GetName] en termes de taille et de modernité, car elle est équipée d'avions allemands modernes. Nous devrons mettre à profit nos relations avec le Japon pour pouvoir avoir une chance contre eux"

FNG_The_China_Flying_Corps: "Restructurer le China Flying Corps"
FNG_The_China_Flying_Corps_desc: "Organisé à l'origine par le fils du Grand Maréchal, Zhang Xueliang, le Corps a bien fonctionné pendant la dernière guerre, ne perdant sa supériorité aérienne qu'à l'arrivée d'avions plus modernes pilotés par les Allemands. Depuis, il s'est développé, mais conserve des avions qui ont des décennies de retard sur les normes occidentales"

FNG_Order_New_Aircraft: "Demande de plans d'avion"
FNG_Order_New_Aircraft_desc: "La conception d'un véritable avion exige des ingénieurs bien formés et extrêmement spécialisés, auxquels nous n'avons malheureusement pas accès. Par conséquent, afin d'améliorer notre force aérienne, nous devons commander davantage au Japon"
 FNG_Reverse_Engineering_Efforts: "Efforts en rétro-ingénierie"

FNG_Reverse_Engineering_Efforts_desc: "Avec certains avions japonais en notre possession, il semble possible que nous puissions les rétroconcevoir pour notre propre usage, bien que le succès de ces efforts ne puisse être garanti."

FNG_Shoutai_Tactics: "Tactique de Shoutai"
 FNG_Shoutai_Tactics_desc: "Les énormes progrès réalisés dans la conception des avions ces dernières années ont produit des avions qui volent de manière totalement différente de leurs prédécesseurs, ce qui nécessite de réévaluer les manœuvres et les tactiques de vol. Les Japonais ont réorganisé leurs escadrons aériens en unités "Shoutai" à trois avions, conçues pour offrir la flexibilité nécessaire aux combats de chiens. Cela pourrait nous donner un avantage important"

FNG_Expand_the_Shenyang_Aerodrome: "Agrandir l'aérodrome de Shenyang"
FNG_Expand_the_Shenyang_Aerodrome_desc: "L'un des premiers centres d'aviation militaire de Chine, l'aérodrome de Shenyang doit être agrandi en fonction de l'augmentation de notre puissance aérienne."

### Bookmark ###
 FNG_KR_gathering_storm_desc:9 "L'un des plus grands seigneurs de la guerre de Beiyang et maîtresse de la Chine du Nord, la Clique du Fengtian s'est retrouvée réduite à sa base du Nord-Est par la Clique du Zhili renaissante, et est la dernière héritière de la Révolution Xinhai depuis la Restauration des Qing.\n\nÉquilibrant les factions intérieures avec l'influence japonaise croissante, le maréchal Zhang reconstruit son armée pour une dernière bataille contre ses rivaux du Zhili. Le Vieux Maréchal parviendra-t-il à marcher sur les Plaines centrales et à mener à bien l'unification, ou ses bienfaiteurs à Tokyo écraseront-ils le rêve chinois sous leurs bottes ?"

### Intro Screen ###
 FNG_country_intro_background:9 "GFX_FNG_intro"
 FNG_country_intro_header:0 "Le Bastion au Nord"
 FNG_country_intro_content:0 "À l'aube de l'année 1936, le Fengtian se dresse dans le Nord-Est comme le dernier bastion du rêve républicain de la Chine. Cependant, comme c'est souvent le cas en Chine, les abstractions de ce rêve cachent des vérités complexes et souvent gênantes. Le Gouvernement de Fengtian de la République de Chine, qui conteste les revendications de légitimité de [QIE.GetNameDef], ne maintient la démocratie que comme un mince vernis, recouvrant ce qui a toujours été, et sera peut-être toujours, un État autoritaire.\n\nL'Assemblée de Shenyang est largement considérée comme corrompue, le pouvoir étant divisé entre des généraux autocrates, des barons du chemin de fer sans scrupules et des idéologues pan-asiatiques aux motivations douteuses. Au milieu de tout cela se trouve le Grand Maréchal Zhang Zuolin, dont les ambitions sont grandes, mais limitées par les dures réalités de la force [QIE.GetAdjective] et de la puissance japonaise ; pour l'instant, il est forcé de marcher sur une corde raide politique entre les deux, et au-dessus des machinations de son propre gouvernement divisé. Le statu quo ne peut durer éternellement, et si le bon moment pour frapper au sud n'est pas choisi rapidement, il pourrait ne jamais arriver.\n\nLe coût faramineux des guerres avec le Sud et la rupture des liens économiques ont ébranlé le Fengtian, et si les années passées ont été consacrées à la reconstruction, il reste encore beaucoup à faire. De même, l'armée a souffert de la négligence et doit être réorganisée. Les Japonais, dont l'influence s'accroît de jour en jour, représentent à la fois une menace et une opportunité. Les eaux sont traîtresses et il faudra un grand timonier pour diriger le navire de l'État non seulement vers la survie, mais aussi vers la reconquête de toute la Chine."

 FNG_country_intro_header_1:0 "Briefing sur les Mécanique Spéciales"
 FNG_country_intro_content_1:9 "Le Gouvernement du Fengtian est instable, soumis à des pressions extérieures et intérieures, et n'est finalement qu'une fusion d'éléments qui seraient contradictoires s'ils ne partageaient pas les mêmes objectifs. Les partis, plus exactement les factions, exercent leur emprise en dominant les institutions du pays plutôt qu'en faisant appel aux masses. En tant que telle, la "popularité" des partis doit être considérée comme représentant leur degré de contrôle sur le gouvernement du pays et les autres structures de pouvoir, ce contrôle étant déterminé non pas par les politiques populaires des ministres, mais par des choix, des orientations et des événements qui augmentent ou diminuent leur pouvoir.\n\nPar conséquent, votre objectif devrait être d'équilibrer les différentes factions, chacune d'entre elles ayant le potentiel d'abuser de son pouvoir si on lui en donne trop, bien que chacune le fasse différemment. Chaque conseiller politique appartient à l'une des quatre factions. Chaque conseiller engagé, en plus de ses caractéristiques, améliorera l'esprit national de la Gouvernance Divisée tout en renforçant l'influence de sa faction respective. Il convient donc de choisir judicieusement ses conseillers afin d'éviter les conséquences négatives d'un déséquilibre des forces en présence.\n\nUn autre point crucial est le rôle de nos bienfaiteurs à Tokyo, dont l'influence sur la Clique du Fengtian grandit et s'amenuise selon notre dépendance à leur aide. Au fur et à mesure que cette influence s'accroît, les primes à la production augmentent, mais au détriment du pouvoir politique et de l'autonomie. L'augmentation de cette influence est inévitable au fil du temps et doit être considérée avec prudence."

 FNG_country_intro_header_2:0 "Briefing sur les Japonais"
 FNG_country_intro_content_2:0 "Les Japonais exercent leur pouvoir au Fengtian par le biais d'une série de traités leur accordant non seulement l'extraterritorialité, mais aussi le droit de vivre et de travailler au Fengtian plus ou moins comme s'ils en étaient les citoyens. Bien que le Grand Maréchal et d'autres utilisent une grande variété de moyens pour ralentir et gêner les Japonais, leur présence est nécessaire et la croissance de leur influence est inévitable. La principale institution responsable de cette croissance est la Compagnie ferroviaire de Mandchourie du Sud, plus communément appelée "Mantetsu", dont les bénéfices ont représenté ces dernières années près d'un quart de l'ensemble du budget national du Japon.\n\nEn même temps, les Japonais ont besoin du Fengtian et de ce qu'il représente. Sa coopération et la perspective d'une victoire dans le Sud permettraient au Japon d'économiser beaucoup de temps et d'argent. Il en résulte un équilibre précaire, les Japonais étant toujours à la recherche de plus de profits et de pouvoir, mais conscients qu'en insistant trop, ils placeront Zhang Zuolin dans une position politiquement intenable et réduiront ainsi à néant leurs efforts prudents.\n\nJusqu'à présent, Zhang a poursuivi une politique hétéroclite : promotion de la fraternité pan-asiatique avec le Japon, remplacée par intermittence par le rejet des initiatives japonaises qui vont trop loin et par des efforts privés constants pour réduire l'influence japonaise. C'est à vous de décider de la marche à suivre, mais la prudence est de mise."

 FNG_country_intro_header_3:0 "Briefing Politique"
 FNG_country_intro_content_3:9 "Le Fengtian a quatre factions politiques principales :\n\n1. La Ligue pour la Reconquête\n\nAssociation informelle de généraux, de gouverneurs, de bureaucrates et de politiciens déchus sans affiliation idéologique forte, dont la plupart se retrouvent au Fengtian parce qu'il n'y a pas d'autres endroits où ils pourraient détenir un semblant de pouvoir. Facilement soudoyés et tentés, ils servent souvent à promouvoir les intérêts de quiconque est prêt à payer, et par conséquent la "ligue" est très divisée malgré le contrôle d'une grande partie de l'Assemblée, manquant de la volonté politique d'agir de manière décisive.\n\n2. La Clique de Zhang\n\nComposée de loyalistes et de généraux, la Clique de Zhang n'a pas d'idéologie particulière, si ce n'est celle de promouvoir les pouvoirs politiques du Grand Maréchal. Tout en se réclamant de la démocratie, les partisans de Zhang ne sont pas attachés aux idéaux républicains et ne les promeuvent que pour leur utilité.\n\n3. La Clique des Communications\n\nSeule faction politiquement cohérente issue de l'ancien gouvernement de Beiyang, la Clique des Communications est un groupe de barons des chemins de fer et des télégraphes, essentiellement intéressés, mais qui s'opposent à la Mantetsu et à l'Association Concordia au sujet de l'infrastructure du pays.\n\n4. L'Influence japonaise\n\nIl s'agit d'un groupe de fonctionnaires et d'officiers japonais envoyés à Shenyang, officiellement pour venir en aide au maréchal Zhang Zuolin ; ces hommes représentent divers intérêts au service de Tokyo. L'Armée du Kwantung espère préserver l'autonomie de la Mandchourie par rapport au reste de la Chine, l'Armée de Tianjin cherche à aider la province du Fengtian à reconquérir la Chine afin d'étendre l'influence japonaise à l'ensemble du territoire, tandis que les différents fonctionnaires japonais espèrent tester de nouvelles politiques jugées radicales dans l'archipel."

 FNG_guide:9 "§MZhang Xueliang - Débuter la Véritable Reconquête / Politiques Économiques Claires / Dans l'Esprit de 1912§! ($authoritarian_democrat_coloured$)\n£white_dot Unifiez la Chine avec §aZhang Zuolin§! sans que la §YPatience japonaise§! ne soit épuisée.\n\n§MZhang Xueliang - Débuter la Véritable Reconquête§! (Coalition $authoritarian_democrat_coloured$ - $social_liberal_coloured$ - $social_democrat_coloured$ - $national_populist_coloured$)\n£white_dot Sélectionnez la priorité §YDébuter la Véritable Reconquête§!.\n\n§MZhang Xueliang - Politiques Économiques Claires§! (Coalition $authoritarian_democrat_coloured$ - $social_conservative_coloured$)\n£white_dot Sélectionnez la priorité §YPolitiques Économiques Claires§!.\n\n§MZhang Xueliang - Dans l'Esprit de 1912§! ($authoritarian_democrat_coloured$)\n£white_dot Avant l'unification, si vous prenez Beijing et qu'un §fGouvernement fédéraliste§! s'est formé dans le Sud, prenez la décision §YDragons Jumeaux Unis par la Chance§!.\n£white_dot S'il accepte, il deviendra votre sujet.\n£white_dot Après l'unification, il recevra un événement pour se révolter ou accepter l'intégration.\n£white_dot S'il accepte l'intégration, vous pourrez nommer §SZhang Junmai§! comme commandant en second et compléter la priorité §YDans l'Esprit de 1912§!.\n\n§MYang Yuting - Le Pari du Dragon / Concorde des Nationalités§! ($paternal_autocrat_coloured$)\n£white_dot Faites en sorte que la §YPatience japonaise§! s'épuise avant d'unifier la Chine avec §aZhang Zuolin§!.\n£white_dot §aZhang Zuolin§! sera assassiné et §PYang Yuting§! prendra le pouvoir.\n\n§MYang Yuting - Le Pari du Dragon§! (Coalition $paternal_autocrat_coloured$ - $social_conservative_coloured$ - $national_populist_coloured$)\n£white_dot Gardez l'§YInfluence japonaise§! inférieure à 50%, et sélectionnez la priorité §YPari du Dragon§!.\n\n§MYang Yuting - Concorde des Nationalités§! (Coalition $paternal_autocrat_coloured$ - $social_conservative_coloured$)\n£white_dot Sélectionnez la priorité §YConcorde des Nationalités§!."

### New Fengtian Events ###
 fengtian_events.1.t:0 "Des Rumeurs Agitent les Régionalistes"
 fengtian_events.1.d:0 "Bien qu'aucun plan n’ait été rendu public, ni même n'existe sous une forme qui s'approche de la version définitive, des rumeurs ont déjà commencé à circuler selon lesquelles l'Armée du Fengtian se préparerait à marcher vers le sud et à conquérir Beijing dans le mois qui vient. Les nouvelles éparses qui parviennent du sud ont suscité un mélange puissant d'enthousiasme et d'inquiétude, et des affrontements ont déjà éclaté dans les salons de thé, les bars et autres lieux publics entre des nationalistes fervents et des membres régionalistes du "Parti du Dongbei".\n\nLe "Parti du Dongbei" n’est pas un parti politique au sens propre du terme, mais plutôt un surnom donné par ses détracteurs à quiconque exprime des doutes quant à la mission de Zhang Zuolin visant à réunifier le pays. Un nombre important de fonctionnaires et de bureaucrates locaux, y compris des enseignants, partagent ce scepticisme et ont commencé à organiser des manifestations pour critiquer ce qu'ils considèrent comme une guerre coûteuse et inutile.\n\nNaturellement, le gouvernement ne démentira pas ces rumeurs, car cela pourrait donner à Beijing les mains libres pour intervenir dans la Crise de la Ligue."
 fengtian_events.1.a:0 "Les rumeurs peuvent être dangereuses..."

 fengtian_events.3.t:0 "Les Régionalistes Passent à l'Action"
 fengtian_events.3.d1:9 "En scandant "Dongbei weile Dongbeiren", soit "Le Nord-Est pour les habitants du Nord-Est", des manifestants se sont rassemblés près du palais du Grand Maréchal, sur la place Sophia à Harbin, ainsi qu'à l'extérieur de la faculté de médecine de Jilin, pour exiger l'arrêt des préparatifs de guerre. Leur nombre n’est pas suffisant pour poser de sérieux problèmes, et la police a déjà été déployée pour maintenir l'ordre, mais cela ne représente qu'une partie d'une campagne en cours qui menace de saper la confiance du public dans le régime. Si l'ensemble du Nord-Est ne peut s'unir derrière le rêve du Grand Maréchal de réunifier toute la Chine, comment celui-ci pourra-t-il jamais se réaliser ?"
 fengtian_events.3.d2:0 "Des manifestants se sont à nouveau rassemblés dans plusieurs lieux stratégiques des villes du Nord-Est. Leur nombre n'était pas suffisant pour poser de réels problèmes, mais cela n'a pas empêché la police de réprimer durement la manifestation, en chargeant la foule à coups de matraques et de crosses de fusil, et en dispersant les manifestants en fuite dans les ruelles bondées. Indignés par cette violence, certains membres du "Parti du Dongbei" ont déjà promis de revenir en nombre encore plus important, mais on espère que cette réponse rapide et décisive dissuadera tous les participants, à l'exception des partisans les plus radicaux du mouvement, ce qui facilitera leur arrestation et leur mise au silence.\n\nPlus inquiétantes encore sont les discussions au sein des associations professionnelles locales, des chambres de commerce et des assemblées municipales concernant un boycott fiscal. Contrairement à certains jeunes étudiants, ces hommes plus âgés se souviennent des temps difficiles de la fin de la dernière décennie, lorsque les dépenses de guerre ont dépassé les capacités de l’économie du Nord-Est et l'ont plongé dans une chute libre économique."
 fengtian_events.3.d3:0 "Malgré les efforts de la police, les manifestations régionalistes se sont poursuivies de manière sporadique dans tout le Nord-Est, et ont été renforcées par le soutien des chambres de commerce locales, des bureaux de change et d’autres institutions commerciales préoccupées par les coûts économiques d’une guerre dans le sud. Bien que cela semble pour l'instant n'être qu'une posture, rien ne permet d’affirmer que ces groupes ne sapent pas l’effort de guerre lorsque le moment décisif arrivera ; et même si les manifestations publiques ne sont pas encore devenues violentes, ce n’est peut-être qu'une question de temps. Plus tôt ce problème sera traité, mieux ce sera."
 fengtian_events.3.d4:0 "Les nouvelles faisant état de conflits persistants dans le sud ont donné un nouvel élan au mouvement régionaliste. Les tentatives de répression ont été sans cesse entravées par le refus de certains fonctionnaires, chefs de police et autres responsables, pourtant bien disposés à l'égard du mouvement, d'exercer pleinement leurs fonctions. Il ne fait aucun doute qu'il faudra déployer tous les efforts nécessaires pour éliminer ces éléments perturbateurs et rétablir l'ordre. À mesure que le mécontentement populaire s'intensifie, la légitimité et la force de notre gouvernement s'érodent progressivement."
 fengtian_events.3.a:0 "C'est regrettable."

 fengtian_events.4.t:0 "Agent Provocateurs en Action"
 fengtian_events.4.d:0 "Comme prévu, nos agents infiltrés ont réussi à pousser certains membres du mouvement régionaliste à recourir à la violence. Les manifestations, déjà de plus en plus violentes, ont causé des dégâts aux biens publics, et les réactions ont été négatives. Ce n'est peut-être qu'une question de temps avant que nous ayons la justification dont nous avons besoin."
 fengtian_events.4.a:0 "Excellent."

 fengtian_events.5.t:0 "Les Émeutes de Harbin"
 fengtian_events.5.d:0 "Une manifestation s'est rapidement transformée en émeute générale hier soir, lorsque des manifestants se sont affrontés avec la police dans le centre-ville de Harbin. On dénombre quinze morts, ainsi qu'un nombre indéterminé de blessés dans les deux camps, qui pourrait s'élever à plusieurs centaines. La Gare centrale de Harbin est particulièrement touchée : ses vitrines ont été brisées et son toit est en flammes. Les dégâts causés à la gare et à plusieurs véhicules ferroviaires ont retardé la circulation sur les lignes de raccordement, et les responsables de la Mantetsu ont déjà fait part de leur indignation.\n\nLe nettoyage de ce désordre prendra sans doute un certain temps, mais au moins, nous disposons désormais d'une justification claire pour agir contre le mouvement régionaliste."
 fengtian_events.5.a:0 "Bien... et mal."

 fengtian_events.6.t:0 "Début des Arrestations Massives"
 fengtian_events.6.d:0 "Maintenant que les motifs justifiant cette action sont en place, nos policiers consciencieux, avec le soutien de la milice locale et de l'Armée du Fengtian, ont commencé à arrêter les manifestants présumés. La plupart d'entre eux finiront par être renvoyés chez eux, mais pas forcément sains et saufs. Espérons que leur incarcération servira de message aux autres manifestants, ainsi qu'à tous leurs sympathisants, pour leur faire comprendre que le gouvernement ne tolérera plus leurs agissements subversifs."
 fengtian_events.6.a:0 "Bon débarras."

 fengtian_events.7.t:0 "Une Offre de la Kempeitai"
 fengtian_events.7.d:0 "La Kempeitai, la police extrajudiciaire de l'Armée japonaise, a pris conscience de notre problème régionaliste et nous a proposé une solution partielle. Grâce à un vaste réseau d'informateurs, elle affirme disposer d'informations sur plusieurs figures clés du mouvement régionaliste – informations qu'elle nous a communiquées de son propre chef. En réponse, nous devons leur fournir des renseignements sur plusieurs agitateurs et insurgés antijaponais qui leur ont jusqu'à présent échappé, notamment en raison de notre propre ingérence. Jusqu'à présent, il nous a été commode de rester en contact avec ces nationalistes, en attendant les cas où nous devrons repousser l’influence japonaise.\n\nS’agit-il d’un de ces cas ? Ou devrions-nous accepter le marché et leur livrer ces personnes sur un plateau d’argent ?"
 fengtian_events.7.a:9 "Acceptez cette offre."
 fengtian_events.7.b:0 "Non merci."

 fengtian_events.8.t:0 "Mouvement Régionaliste Réprimé"
 fengtian_events.8.d:0 "Le "Parti du Dongbei" et le mouvement régionaliste en général ont enfin été réprimés. Bien que cela ne marque pas la fin du sentiment régionaliste dans le Nord-Est, qui pourrait perdurer pendant des décennies, ce mouvement a pour l'instant cessé d'être un sujet de préoccupation, alors que nous tournons notre attention vers le sud."
 fengtian_events.8.a:0 "On progresse."

#The Fate of Mantetsu Schooling
 fengtian_events.9.t:0 "Reprendre le Flambeau de l'Éducation"
 fengtian_events.9.d:0 "Comme on pouvait s'y attendre, notre campagne ciblée visant à écarter les enseignants et autres intellectuels régionalistes du "Parti du Dongbei" a entraîné un chaos dans l'enseignement et de graves perturbations dans la recherche, mais le personnel du Consulat japonais a proposé une solution possible. La Mantetsu gère depuis longtemps un réseau d'écoles privées initialement destinées aux fils et filles de ses employés, ainsi qu'aux immigrants japonais, qui se targuent d'offrir un enseignement comparable, voire supérieur, à celui dispensé dans l'archipel japonais. À notre demande, le gouvernement japonais pourrait faire pression sur la Mantetsu pour qu'elle ouvre ces établissements au public et fournisse du personnel afin de pallier les pénuries temporaires.\n\nUne fois que nous aurons ouvert la porte à ce genre d'activité, il sera très difficile de la refermer, et ces écoles seront presque certainement utilisées pour diffuser la culture et les normes japonaises. Nous devons y réfléchir attentivement."
 fengtian_events.9.a:0 "Déclinez cette offre."
 fengtian_events.9.b:0 "Acceptez cette offre."

 fengtian_events.10.t:0 "Le Scandale du Kimono"
 fengtian_events.10.d:0 "Scandale ! Dans un revirement des événements des plus malheureux, la plus jeune fille du Grand Maréchal a été photographiée vêtue d’un kimono japonais lors d’une séance photo à la "Hokutō Kokuritsudaigaku", ou "Académie nationale du Nord-Est", gérée par la Mantetsu. Malgré le risque d’arrestation, la nouvelle de cette photo s’est déjà largement répandue, accompagnée de quelques copies de l'image elle-même, bien que les agences de presse locales et nationales aient la sagesse de ne pas publier cette diffamation. Certains agents des services de renseignement militaires émettent l'hypothèse que cette photo a été prise et diffusée intentionnellement par les Japonais afin de punir le gouvernement pour ses récentes actions, mais aucune preuve à l'appui n'a été apportée.\n\nIl ne fait toutefois guère de doute que nos ennemis profiteront de cette occasion pour diffuser leur propagande malveillante."
 fengtian_events.10.a:0 "Quelle honte !"
 fengtian_events.10.b:0 "Fermez les écoles de la Mantetsu !"

 fengtian_events.11.t:0 "Des Étudiants Rejoignent la Ligue de la Jeunesse"
 fengtian_events.11.d:0 "Lors d'un incident embarrassant et profondément préjudiciable, un groupe d'écoliers chinois de Changchun a récemment annoncé son intention de rejoindre la Ligue de la Jeunesse du Fengtian, qui promeut activement les intérêts japonais dans notre pays. Il est évident que leurs jeunes esprits sont facilement influençables, mais leur défilé dans les rues de leur ville natale, drapeaux japonais à la main, a suscité le dégoût de nombreuses personnes et provoqué une hostilité ouverte envers le gouvernement. Les parents pleurent, se demandant comment leurs enfants ont pu être ainsi pervertis, et réclament une alternative à ces dangereuses écoles dirigées par des Japonais."
 fengtian_events.11.a:0 "C'est un scandale !"
 fengtian_events.11.b:0 "Fermez les écoles !"

 fengtian_events.12.t:0 "Des Uniformes Chinois pour les Étudiants Chinois"
 fengtian_events.12.d:0 "Après les effets démoralisants de notre campagne de répression, certes sévère mais nécessaire, à l'encontre des enseignants du "Parti du Dongbei", notre ministère de l'Éducation a présenté un nouvel uniforme scolaire national. Bien que cela puisse sembler être un changement mineur, ces uniformes sont un symbole de l'indépendance chinoise et de l'identité nationale, qui transcendent toute région particulière. Il ne fait aucun doute qu'un nouvel avenir radieux attend nos élèves au sein d'une Chine unie !"
 fengtian_events.12.a:0 "Un motif de fierté !"

#NTC Infrastructure and Railway Construction
 fengtian_events.13.t:0 "Développement des Infrastructures dans le Liaoning"
 fengtian_events.13.d:0 "Les infrastructures du nord-est de la Chine sont souvent considérées comme supérieures à celles du reste du pays, mais elles répondent néanmoins rarement aux normes occidentales. Malgré leur modernité, les chemins de fer de la Mantetsu ne parviennent pas à couvrir entièrement une région aussi vaste que la France et l'Allemagne réunies. Des lignes ferroviaires provinciales plus modestes, ainsi qu'un réseau d'autoroutes entrecroisées, ont été construits au cours des dernières décennies pour tenter de résoudre ce problème, mais elles sont rares et éloignées les unes des autres – sans parler de leur entretien souvent défaillant. Si nous voulons stimuler le développement économique et mieux soutenir nos armées sur le terrain, nous devons développer davantage ces réseaux et assurer leur entretien. Le Liaoning, au cœur de nos opérations, est un point de départ tout aussi valable qu’un autre, et plusieurs petites entreprises chinoises sont déjà impatientes de se mettre au travail.\n\nCes entreprises, en l’absence de la Mantetsu et d’ingénieurs japonais, contribueront grandement à démontrer la force et l’indépendance de la Chine."
 fengtian_events.13.d_jap:0 "Les infrastructures du nord-est de la Chine sont souvent considérées comme supérieures à celles du reste du pays, mais elles répondent néanmoins rarement aux normes occidentales. Malgré leur modernité, les chemins de fer de la Mantetsu ne parviennent pas à couvrir entièrement une région aussi vaste que la France et l'Allemagne réunies. Des lignes ferroviaires provinciales plus modestes, ainsi qu'un réseau d'autoroutes entrecroisées, ont été construits au cours des dernières décennies pour tenter de résoudre ce problème, mais elles sont rares et éloignées les unes des autres – sans parler de leur entretien souvent défaillant. Si nous voulons stimuler le développement économique et mieux soutenir nos armées sur le terrain, nous devons développer davantage ces réseaux et assurer leur entretien. Le Liaoning, au cœur de nos opérations, est un point de départ tout aussi valable qu’un autre, et déjà, la Mantetsu et un groupe de petites entreprises chinoises se disputent ce marché.\n\nLes Japonais affirment, peut-être à juste titre, qu'ils pourraient mener à bien ces travaux en deux fois moins de temps grâce à leurs ressources et à leur expertise, mais le choix d'une entreprise chinoise contribuerait grandement à démontrer la puissance et l'indépendance de la Chine."
 fengtian_events.13.a:0 "Choisissez une compagnie chinoise."
 fengtian_events.13.b:0 "Choisissez la Mantetsu."

 fengtian_events.14.t:0 "Développement des Infrastructures du Liaoning Terminé"
 fengtian_events.14.d:0 "Après des mois de travaux et divers contretemps, les projets d'aménagement des infrastructures prévus dans le Liaoning sont enfin achevés. Après avoir examiné les plans et les ressources disponibles, la NTC publiera sans aucun doute un nouveau contrat d'ici peu."
 fengtian_events.14.a:0 "Excellente nouvelle !"

 fengtian_events.15.t:0 "Développement des Infrastructures au Liaobei et à Jilin"
 fengtian_events.15.d:0 "Contrairement au Liaoning, les infrastructures locales existantes à Liaobei et à Jilin sont relativement peu développées, en particulier dans les contreforts des chaînes du Grand Khingan et du Changbai. La NTC a élaboré un plan détaillé d'inspiration japonaise visant à relier les pôles centraux de Jilin et de Changchun à des communautés autrement isolées, avec un réseau routier s'étendant vers l'extérieur presque comme les rayons d'une roue. Ce plan est si vaste qu'il dépasse largement notre capacité à le mener à bien dans un délai raisonnable ; nous n'en réaliserons donc pour l'instant que les premières étapes."
 fengtian_events.15.d_jap:0 "Contrairement au Liaoning, les infrastructures locales existantes à Liaobei et dans le Jilin sont relativement peu développées, en particulier dans les contreforts des chaînes du Grand Khingan et du Changbai. La NTC a élaboré un plan détaillé d'inspiration japonaise visant à relier les pôles centraux de Jilin et de Changchun à des communautés autrement isolées, avec un réseau routier s'étendant vers l'extérieur à la manière des rayons d'une roue. Ce plan est si vaste qu'il dépasse largement notre capacité à le mener à bien dans un délai raisonnable. Certains ont suggéré qu'il s'agissait d'un plan astucieux des Japonais visant à susciter une plus grande dépendance, car la Mantetsu serait probablement en mesure de mener à bien un projet d'une telle envergure là où nos propres entreprises chinoises échoueraient. Néanmoins, nous avons décidé de diviser les travaux en plusieurs phases, et seule la phase initiale est prévue pour l'instant.\n\nComme par le passé, la Mantetsu propose de réaliser les travaux de construction dans des délais très courts, mais des entreprises chinoises sont prêtes à accomplir la même tâche."
 fengtian_events.15.a:0 "Choisissez une compagnie chinoise."
 fengtian_events.15.b:0 "Choisissez la Mantetsu."

 fengtian_events.16.t:0 "Développement des Infrastructures au Liaobei et à Jilin Terminé"
 fengtian_events.16.d:0 "Notre plan de développement des infrastructures pour le Liaobei et Jilin est achevé, du moins dans la mesure où cela est nécessaire pour nos objectifs actuels. Il ne fait aucun doute que le Nord-Est se dirige vers un avenir meilleur."
 fengtian_events.16.a:0 "Excellent !"

 fengtian_events.17.t:0 "Développement des Infrastructures à Nenjiang et Songjiang"
 fengtian_events.17.d:9 "Bien que nettement moins sauvages que les contrées du Heilongjiang ou la steppe de Hailar, les régions de Nenjiang et de Songjiang comptent parmi les zones les moins développées de Mandchourie. L'essentiel de notre travail consistera à transformer d'anciens sentiers, serpentant à travers les collines et entre les montagnes, en voies ferrées modernes à voie étroite ou en autoroutes robustes. Par nécessité, la plupart de nos travaux seront reliés au "chemin de fer de l'Est chinois", construit à l'origine par les Russes dans le cadre du chemin de fer transsibérien, mais désormais fortement influencé par les Japonais."
 fengtian_events.17.d_jap:9 "Bien que nettement moins sauvages que les contrées du Heilongjiang ou la steppe de Hailar, les régions de Nenjiang et de Songjiang comptent parmi les zones les moins développées de Mandchourie. L'essentiel de notre travail consistera à transformer d'anciens sentiers, serpentant à travers les collines et entre les montagnes, en voies ferrées modernes à voie étroite ou en autoroutes robustes. Par nécessité, la plupart de nos travaux seront reliés au "chemin de fer de l'Est chinois", construit à l'origine par les Russes dans le cadre du chemin de fer transsibérien, mais désormais fortement influencé par les Japonais.\n\nSans surprise, la Mantetsu propose de réaliser les travaux de construction, bien qu'il existe également des entreprises chinoises tout à fait compétentes."
 fengtian_events.17.a:0 "Choisissez une compagnie chinoise."
 fengtian_events.17.b:0 "Choisissez la Mantetsu."

 fengtian_events.18.t:0 "Développement des Infrastructures à Nenjiang et Songjiang Terminé"
 fengtian_events.18.d:0 "Malgré les difficultés rencontrées par nos équipes, les travaux relatifs aux nouvelles infrastructures mises en place à Nenjiang et Songjiang sont désormais achevés. Bien qu'un développement plus au nord ait été envisagé, la NTC estime que cela dépasse le cadre de son mandat actuel, du moins pour l'instant."
 fengtian_events.18.a:0 "Wansui !"

 fengtian_events.19.t:0 "Grève des Ouvriers du Chemin de Fer !"
 fengtian_events.19.d:0 "Les travailleurs chinois, qui se plaignent de salaires insuffisants et de conditions de travail difficiles, ont refusé de reprendre le travail dans le cadre d’une grève minutieusement coordonnée. Bien que des syndicats ferroviaires soient présents dans le Nord-Est, leur coordination dans ce cas précis laisse supposer l’implication de la Clique des Communications, peut-être dans le but de démontrer son influence ou de riposter à ce qu’elle perçoit comme un affront.\n\nBien que cette tournure des événements les touche également, les Japonais se réjouissent de nous voir nous disputer entre nous. La grève prendra fin, mais non sans avoir causé d'importants retards."
 fengtian_events.19.a:0 "Dommage."

 fengtian_events.20.t:0 "Les Retards Pèsent sur la Construction des Infrastructures"
 fengtian_events.20.d:0 "La nature de la situation est apparue assez clairement dès les premiers signes : des cargaisons disparaissant sans explication, des rails posés avec un angle de déviation juste suffisant pour nécessiter une reconstruction complète, et des inspections soudaines de la main-d'œuvre par des agents japonais prétendant rechercher des "criminels dangereux" ; des inspections qui entraînaient inévitablement la suspension des travaux.\n\nCes mêmes tactiques avaient été employées par les Japonais dans les années 1920 contre les projets ferroviaires de la Clique du Fengtian, dans le but de ralentir et de discréditer la construction chinoise afin de limiter la concurrence à la Mantetsu, et aujourd’hui, elles semblent à nouveau retarder nos efforts. Malheureusement, nous ne pouvons pas faire grand-chose."
 fengtian_events.20.a:0 "Frustrant."

 fengtian_events.21.t:0 "Les Retards Pèsent sur la Construction des Infrastructures"
 fengtian_events.21.d:0 "Malgré l'excellence des ingénieurs et du matériel de la Mantetsu, le projet actuel de construction ferroviaire a connu des retards à répétition : des ouvriers disparaissent sans laisser de traces, des matériaux s'évanouissent dans la nuit et des bandits attaquent les camps situés le long des voies, avant de s'évanouir dans la nature avant l'arrivée des troupes japonaises.\n\nLa police locale et nos services de renseignement ne semblent pas disposés à faire grand-chose pour enquêter ou résoudre ces incidents à répétition, préférant regarder les Japonais se débattre. Le fait que la Mantetsu ait obtenu le contrat pour la construction du chemin de fer est de notoriété publique, et certains citoyens patriotes semblent avoir pris les choses en main."
 fengtian_events.21.a:0 "Quel dommage."

#Imperial Fury/Japanese Aid Cut
 fengtian_events.22.t:0 "Colère Impériale"
 fengtian_events.22.d:0 "Furieux, le gouvernement japonais a publié aujourd’hui un communiqué annonçant la fin de divers programmes d’aide au Fengtian, notamment dans des domaines tels que la recherche, le développement industriel, le développement agricole et l’armement militaire. Cette aide devrait reprendre d’ici quelque temps, car les Japonais ne peuvent se permettre de nous laisser nous affaiblir trop, mais d’ici là, de nombreuses fonctions de notre État sont paralysées."
 fengtian_events.22.d_influence_low:0 "Inquiet de voir s'affaiblir l'influence de son représentant politique au sein de l'Assemblée, le gouvernement japonais a publié aujourd'hui un communiqué annonçant la fin de divers programmes d'aide au Fengtian, notamment dans des domaines tels que la recherche, le développement industriel, le développement agricole et l'armement militaire. Cette aide devrait reprendre d'ici quelque temps, car les Japonais ne peuvent se permettre de nous laisser nous affaiblir trop, mais d'ici là, de nombreuses fonctions de notre État sont paralysées."
 fengtian_events.22.d_fengtian_refuses_food:0 "Indigné par ce qu'il considère comme une impertinence, le gouvernement japonais a publié aujourd'hui un communiqué annonçant la fin de divers programmes d'aide au Fengtian, notamment dans des domaines tels que la recherche, le développement industriel, le développement agricole et l'armement militaire. Cette aide devrait reprendre d'ici quelque temps, car les Japonais ne peuvent se permettre de nous laisser nous affaiblir trop, mais d'ici là, de nombreuses fonctions de notre État sont paralysées."
 fengtian_events.22.d_fengtian_blames_japan:0 "Indigné par notre "grave insolence", le gouvernement japonais a publié aujourd’hui un communiqué annonçant la fin de divers programmes d’aide au Fengtian, notamment dans des domaines tels que la recherche, le développement industriel, le développement agricole et l’armement militaire. Cette aide devrait reprendre d’ici quelque temps, car les Japonais ne peuvent se permettre de nous laisser nous affaiblir trop, mais d’ici là, de nombreuses fonctions de notre État sont paralysées."
 fengtian_events.22.a:0 "Une dure leçon."

 fengtian_events.23.t:0 "L'Aide Japonaise Reprend"
 fengtian_events.23.d:0 "Estimant apparemment que la leçon d'obéissance qu'ils nous ont donnée est suffisamment claire et sévère, les Japonais ont repris leur aide. Nous devrions veiller à ne pas les provoquer à l'avenir et nous assurer de ne pas écarter l'Association Concordia de l'Assemblée avant d'être prêts."
 fengtian_events.23.a:0 "Enfin !"

 fengtian_events.24.t:9 "Feng Yong Critique le Japon"
 fengtian_events.24.d:9 "Évoquant le récent renforcement de la garnison militaire japonaise à Shenyang, Feng Yong a lancé une critique cinglante à l'encontre du Japon et de sa politique étrangère depuis la tribune de l'Assemblée. Bien que d'autres hommes politiques aient déjà critiqué les Japonais par le passé, le poste de premier plan qu'occupe Feng Yong au sein de l'entourage du maréchal Zhang confère à ses propos une importance particulière et leur donne un retentissement qui dépasse le cadre de l'Assemblée.\n\nSans perdre de temps, le Consul général du Japon a déjà exigé que nous démettions Feng Yong de ses fonctions."
 fengtian_events.24.a:0 "Oh là là."
 fengtian_events.24.b:0 "Le Japon est notre allié fraternel..."

 fengtian_events.25.t:0 "La Mantetsu Proteste Contre la Construction Ferroviaire"
 fengtian_events.25.d:0 "Le président de la Mantetsu, Matsuoka Yōsuke, a informé le gouvernement de la reprise récente de nos travaux de construction ferroviaire. Exaspéré par nos tentatives de contourner le monopole de son entreprise sur la logistique, Matsuoka a arbitrairement augmenté les prix de l'acier importé de haute qualité dont nous avons besoin pour mener à bien le projet. Les aciéries japonaises ne se sont pas montrées plus coopératives, ayant probablement déjà reçu des instructions du gouvernement japonais. Bien que nous puissions nous procurer le matériel ailleurs, les coûts rendraient l'ensemble du projet irréalisable.\n\nAccepter les prix majorés aurait un coût politique important et réduirait le nombre de travailleurs que nous pouvons embaucher, mais il pourrait y avoir une autre solution. En prétendant mettre fin au projet, nous pourrions continuer à nous procurer l'acier à des prix normaux, tout en poursuivant secrètement la construction. En faisant tourner en rond les employés de la Mantetsu avec une bureaucratie excessive, de l'obstructionnisme administratif et de la paperasse bidon, nous pourrions probablement terminer la construction avant que quiconque ne s'en rende compte. Nous l'avons déjà fait par le passé. Malheureusement, en raison du caractère secret du projet, cela prendrait probablement beaucoup plus de temps."
 fengtian_events.25.a:0 "Les prix sont les prix."
 fengtian_events.25.b:0 "Il ne s'en rendront compte que trop tard."

 fengtian_events.26.t:0 "L'Armée du Kwantung Détruit notre Chemin de Fer"
 fengtian_events.26.d:0 "Ayant apparemment découvert notre supercherie, des soldats de la "Garde des chemins de fer" de l'Armée du Kwangtung ont pris d'assaut notre chantier de construction ferroviaire en cours, détruisant sauvagement les rails et faisant des dizaines de morts parmi les ouvriers, abattus pour "ingérence hostile" présumée. Bien que les Japonais n'aient pas réussi à tout détruire, de longs tronçons de rails ont même été fondus et tordus pour en faire des "traverses de chemin de fer". Pour compliquer encore la reprise du projet, les prix de l'acier japonais ont flambé, probablement à la demande de la Mantetsu. Bien que les Japonais ne puissent pas complètement arrêter nos travaux, nous devons désormais repartir presque de zéro."
 fengtian_events.26.a:0 "Maudits soient ces Japonais !"

 fengtian_events.27.t:0 "[FNG.GetLeader] Construit des Chemins de Fer Parallèles !"
 fengtian_events.27.d:0 "Selon des informations provenant des services de renseignement de la Mantetsu, [FNG.GetLeader] aurait relancé l’un de ses anciens projets, visant à contourner notre monopole sur le réseau ferroviaire de Mandchourie. En construisant des lignes ferroviaires parallèles à celles de la SMR et de la CER, Zhang serait en mesure, si une guerre venait à éclater entre nos deux pays, de faire passer ses hommes à travers la région sans intervention immédiate de l’Armée du Kwangtung, et bien sûr à son insu. Cela représente une menace pour nos intérêts et mériterait normalement une réponse rapide.\n\nL'Armée du Kwantung exige déjà que l'on ne laisse pas ces Chinois insolents s'en tirer à bon compte après cette insulte effrontée à la nation."
 fengtian_events.27.a:0 "Ils auront une réponse rapide !"
 fengtian_events.27.b:0 "Nous avons de plus gros problèmes."

 fengtian_events.28.t:0 "Le Japon Ignore la Construction Ferroviaire"
 fengtian_events.28.d:0 "Étonnamment, les Japonais semblent avoir choisi d'ignorer la construction de notre ligne ferroviaire, bien qu'ils aient découvert qu'elle se poursuivait. Mis à part une "lettre au ton ferme", dépourvue de toute véritable force, la réaction rapide et sévère à laquelle nous nous attendions n'est jamais venue. Il est possible qu'ils considèrent que leur emprise totale sur les transports en Mandchourie n'est plus tenable, mais il est plus probable qu'ils aient d'autres préoccupations plus pressantes pour le moment."
 fengtian_events.28.a:0 "Nous avons roulé ces idiots dans la farine !"

 fengtian_events.29.t:9 "Zhang Zongxiang Négocie de Nouveaux Accords Commerciaux"
 fengtian_events.29.d:9 "L'embargo germano-[QIE.GetAdjective] sur les marchandises à destination et en provenance du Nord-Est a durement frappé notre économie. Le commerce a alors été détourné vers les Villes des Légations, ouvertes à toutes les nations. Bien que nous ayons pu contourner l'embargo, le recours à Tianjin et Shanghai comme intermédiaires s'est accompagné de droits de douane supplémentaires et d'une dépendance vis-à-vis de tiers. Ces entreprises, tant légitimes qu’illégitimes, étant pleinement conscientes de leur emprise sur le commerce de toute une région, les accords commerciaux ont toujours été médiocres malgré leur nécessité.\n\nZhang Zongxiang a toutefois réussi, d’une manière ou d’une autre, à mener à bien des années de négociations et à conclure un accord offrant de meilleures conditions commerciales. Des rumeurs circulent selon lesquelles des pots-de-vin auraient été versés au cours du processus, mais personne ne semble vouloir poser de questions."
 fengtian_events.29.a:0 "Excellent !"

 fengtian_events.30.t:0 "La Mantetsu Lève les Restrictions sur les Chemins de Fer"
 fengtian_events.30.d:0 "Après mûre réflexion, et malgré nos relations parfois tendues, le conseil d'administration de la Mantetsu a décidé de lever les restrictions habituellement imposées à nos manœuvres stratégiques. Il s'agit sans aucun doute d'un geste de bonne volonté compte tenu de notre récente entrée en guerre. La Mantetsu réimposera probablement ces restrictions une fois la paix rétablie."
 fengtian_events.30.a:0 "Enfin !"

 fengtian_events.31.t:0 "La Mantetsu Réimpose les Restrictions Ferroviaires"
 fengtian_events.31.d:0 "Compte tenu de la fin de la guerre qui vient de s'achever, le conseil d'administration de la Mantetsu a décidé de rétablir les restrictions pesant sur nos mouvements stratégiques en Mandchourie."
 fengtian_events.31.a:0 "Naturellement..."

 fengtian_events.32.t:0 "Une Nouvelle Compagnie Automobile"
 fengtian_events.32.d:0 "Grâce à la production régulière du camion Minsheng par l'Arsenal de Shenyang et à nos efforts pour encourager la coopération sino-japonaise, un groupe d'oligarques de la Clique des Communications s'est associé à la société Jidōsha-Seizo, filiale de la Zaibatsu Nihon Sangyō, pour financer la création d'une nouvelle usine automobile dans la province du Fengtian. Déjà, un groupe de jeunes ingénieurs, pour la plupart formés au Japon, étudie les perspectives de modèles plus modernes, inspirés du Minsheng et axés sur le consommateur."
 fengtian_events.32.a:0 "Bonne nouvelle !"
 fengtian_events.32.b:0 "L'implication japonaise est inacceptable."

 fengtian_events.33.t:0 "Fin de la Pénurie d'Investissements"
 fengtian_events.33.d:0 "Après une dizaine d'années durant lesquelles les investissements externes ou internes, hormis ceux du gouvernement, ont été limités, le Fengtian s'est imposé comme un lieu fiable et sûr, propice à une croissance florissante. Fort de cette dynamique et porté par l'élan industriel, nos chances de reconquérir le pays s'améliorent de jour en jour.\n\nÀ mesure que nous lançons de nouveaux projets de développement, nos efforts en matière d'investissement devraient commencer à ouvrir de nouvelles perspectives."
 fengtian_events.33.a:0 "Enfin !"

 #Post-Beijing Chaos Events
 fengtian_events.34.t:0 "Lances Rouges à Dezhou !"
 fengtian_events.34.d:0 "Les bandes des Lances rouges, des groupes d'autodéfense paysans qui ne valent guère mieux que des bandits, ont récemment gagné en nombre et en puissance dans toute la région de Dezhou, en particulier le long de la frontière entre le Zhili et le Shandong. En tant que nouveaux dirigeants de la région, on attend de nous que nous maintenions la paix et l'ordre, qui sont aujourd'hui gravement perturbés. Plusieurs garnisons locales ont été attaquées, des villages incendiés et des villes pillées. Des forces ont déjà été dépêchées pour régler le problème, mais un effort concerté visant à éliminer la résistance dans les zones de l'arrière, derrière nos lignes de front, sera probablement nécessaire pour y mettre un terme définitivement."
 fengtian_events.34.a:0 "Maudits paysans !"

 fengtian_events.35.t:0 "Des Déserteurs se Soulèvent à Daming !"
 fengtian_events.35.d:0 "Lorsque nos troupes ont balayé la province du Zhili, elles ont écrasé toute forme de résistance organisée, mais celle-ci n’est pas toujours aussi structurée. Des groupes de déserteurs, issus tant des anciennes armées ennemies que de nos propres forces, ont commencé à s’organiser pour s’attaquer à des cibles plus importantes à travers le Daming. Plusieurs trains aux abords de Shimen ont été pris pour cible, ce qui a suscité de vives inquiétudes chez nos responsables de la logistique en raison de l’importance stratégique majeure de la ligne Jinhan. Les garnisons locales seront mobilisées pour faire face à la situation, mais des incidents de ce type derrière nos lignes méritent une réponse coordonnée."
 fengtian_events.35.a:0 "Traîtres, tous autant qu'ils sont !"

 fengtian_events.36.t:0 "Les Seigneurs de la Guerre Résistent à Ruyang"
 fengtian_events.36.d:0 "Comme elles reposent sur des réseaux informels de clientélisme, toutes les structures de pouvoir locales ne peuvent pas être cooptées par nos forces d'occupation. Dans le cas présent, plusieurs seigneurs de la guerre locaux, autrefois fidèles à Wu Peifu, semblent avoir pris ombrage de nos politiques à Ruyang et se sont emparés de l'Arsenal de Gongxian à Xinyang. Malgré leur relative organisation et les armes provenant de l'arsenal, leurs troupes sont encore trop peu nombreuses et trop mal équipées pour combattre les nôtres à grande échelle, mais elles nous obligeront néanmoins à détourner des forces des lignes de front. Nous devons apporter une réponse cohérente à ces cas de résistance."
 fengtian_events.36.a:0 "Imbéciles."

 fengtian_events.37.t:0 "Des Bandits Ravagent le Guanzhong"
 fengtian_events.37.d:0 "Les montagnes qui entourent Xi'an abritent des bandits depuis des temps immémoriaux, mais aujourd'hui, ces brigands sont descendus des collines et se sont mis à s'en prendre aux voyageurs sans défense, aux villages vulnérables et, surtout, à nos caravanes de ravitaillement. En raison de leur dispersion et de leur désorganisation, les bandits peuvent être difficiles à traquer et à éliminer définitivement. Pour y parvenir, nous aurons sans aucun doute besoin d'un effort coordonné."
 fengtian_events.37.a:0 "Eh bien, qu'attendons-nous ?"

#Soy Agricultural Initiative
 fengtian_events.42.t:0 "L'Initiative Agricole pour le Soja"
 fengtian_events.42.d:0 "Le soja est une culture extrêmement polyvalente, utilisée pour l'alimentation humaine et animale, la fabrication d'engrais, ainsi que pour une grande variété d'applications industrielles. Le pôle de recherche de la Mantetsu a réalisé d'importants progrès pour rendre sa culture, sa transformation et son utilisation plus efficaces, mais les pourcentages de plantation dans tout le Fengtian restent relativement stables. Les agriculteurs coréens, qui constituent la majorité des immigrants en Mandchourie, sont d'excellents riziculteurs et, comme beaucoup de Chinois, préfèrent les cultures avec lesquelles ils ont plus d'expérience.\n\nAfin de remédier à cette situation, la Mantetsu a lancé l'Initiative agricole pour le soja, un programme visant à former les agriculteurs et à encourager la production de soja en tant que culture de rente, mais celui-ci a jusqu'à présent été mal accueilli. La Mantetsu espère obtenir le soutien du gouvernement pour promouvoir cette initiative, ce qui augmenterait très certainement les rendements de soja et, par conséquent, les bénéfices à long terme.\n\nQuelques voix dissidentes ont souligné qu'une production excessive de soja pourrait réduire la sécurité alimentaire dans le nord-est et, dans certaines conditions, conduire à une famine."
 fengtian_events.42.a:0 "Soutenez l'initiative."
 fengtian_events.42.b:0 "Nous n'avons pas besoin de plus de soja."

 fengtian_events.43.t:0 "Le Japon et la Corée se Battent Contre la Sécheresse"
 fengtian_events.43.d_fengtian_forced:0 "Le Japon et la Corée sont tous deux confrontés à une grave sécheresse, dont nous avons heureusement été épargnés, mais leurs économies et leurs populations en souffrent aujourd’hui, et certains vivent au bord de la famine. Le gouvernement japonais nous a officiellement demandé de participer à un programme dans le cadre duquel nous fournirions du riz et du millet à la Corée, qui, en contrepartie, fournirait du riz au Japon. Cependant, ce plan est quelque peu compromis par le succès retentissant de l'Initiative agricole pour le soja de la Mantetsu, qui a remplacé de vastes étendues de rizières par des cultures de soja. En conséquence, nous sommes loin d'avoir suffisamment de riz et de millet pour nourrir la Corée, alors que notre production de soja reste essentielle à notre industrie et à notre commerce international.\n\nEn raison de l'influence politique et économique du Japon, nous n'avons guère d'autre choix que de nous plier à cette demande."
 fengtian_events.43.d_fengtian_normal:0 "Le Japon et la Corée sont tous deux confrontés à une grave sécheresse, dont nous avons heureusement été épargnés, mais leurs économies et leurs populations en souffrent aujourd’hui, et certains vivent au bord de la famine. Le gouvernement japonais nous a officiellement demandé de participer à un programme dans le cadre duquel nous fournirions du riz et du millet à la Corée, qui, en contrepartie, fournirait du riz au Japon. Cependant, ce plan est quelque peu compromis par le succès retentissant de l'Initiative agricole pour le soja de la Mantetsu, qui a remplacé de vastes étendues de rizières par des cultures de soja. En conséquence, nous sommes loin d'avoir suffisamment de riz et de millet pour nourrir la Corée, alors que notre production de soja reste essentielle à notre industrie et à notre commerce international.\n\nC'est un revirement surprenant de la part des Japonais, habituellement si réservés, mais quoi qu'il en soit, si nous refusions, cela entraînerait très certainement de graves répercussions."
 fengtian_events.43.a:0 "Nous donnerons de la nourriture."
 fengtian_events.43.b:0 "Le Japon est seul."

 fengtian_events.45.t:0 "La Proposition sur l'Industrie du Soja"
 fengtian_events.45.d:0 "L'augmentation de nos exportations alimentaires, destinée à pallier la sécheresse qui touche actuellement les îles japonaises et la Corée, a entraîné une pénurie de denrées alimentaires dans tout le Fengtian et suscité un vif mécontentement parmi la population. Certains ministres ont proposé de réduire la production de soja industriel, ce qui permettrait d'assurer un approvisionnement alimentaire suffisant, mais pénaliserait notre industrie civile et certaines exportations jusqu'à ce que la crise soit résolue."
 fengtian_events.45.a:0 "Diminuez la production industrielle de soja."
 fengtian_events.45.b:0 "Nous ne pouvons pas nous le permettre."

 fengtian_events.46.t:0 "La Sécheresse S'achève"
 fengtian_events.46.d:0 "Après des mois de difficultés, la sécheresse qui sévissait en Corée et au Japon a pris fin. Nous ne sommes plus tenus d'apporter une aide au Japon ou à la Corée."
 fengtian_events.46.a:0 "Enfin !"

#Hokkaido Farming
 fengtian_events.47.t:0 "Une Proposition de la Mantetsu"
 fengtian_events.47.d:0 "Un représentant du Pôle de Recherche de la Mantetsu a présenté une proposition dont il nous assure qu’il est dans notre intérêt de l’accepter, mais qui, insiste-t-il, doit rester strictement confidentielle. Apparemment, à la suite de la sécheresse de 1939, la Mantetsu a réuni des experts agricoles, des hauts responsables d’organisations agricoles et des universitaires dans le but d’améliorer l’efficacité et la production agricoles dans le Nord-Est. Après des mois d'essais, l'une des équipes de recherche a mis au point une solution s'inspirant des méthodes agricoles utilisées à Hokkaido, qui permettrait à une famille chinoise moyenne de cultiver dix hectares de terre sans avoir à embaucher de travailleurs saisonniers, améliorant ainsi la production et libérant de la main-d'œuvre pour les usines d'Anshan, de Fushun et de Shenyang. Le responsable de la Mantetsu indique que ces méthodes devraient être diffusées par le biais de brochures d'information et d'instructeurs chinois, eux-mêmes formés par des experts japonais, et il semblait insister sur l'idée que ce projet devait être dissocié de toutes les manières possibles du Chemin de fer de Mandchourie du Sud.\n\nAprès enquête, la section du renseignement de l'Armée a déterminé que l'Armée du Kwantung avait refusé de soutenir les efforts de la Mantetsu, ce qui suggère que les deux factions pourraient être en concurrence, ou qu'il s'agit simplement d'une partie d'une ruse japonaise élaborée. Les responsables relativement libéraux de la branche de recherche de la Mantetsu et d'autres services administratifs sont connus pour être en conflit avec l'Armée du Kwantung, plus conservatrice."
 fengtian_events.47.a:0 "Acceptez la proposition."
 fengtian_events.47.b:0 "Refusez la proposition."

 fengtian_events.48.t:0 "L'Agriculture de Hokkaido Porte ses Fruits"
 fengtian_events.48.d:0 "Après beaucoup de temps et d'efforts, les méthodes agricoles pour Hokkaido proposées par la Mantetsu semblent porter leurs fruits dans certaines régions, permettant d'augmenter la production et de libérer des terres supplémentaires dans le nord."
 fengtian_events.48.a:0 "Excellent."

 fengtian_events.49.t:0 "Découverte"
 fengtian_events.49.d:0 "Bien qu’aucune annonce publique n’ait été faite, le Pôle de recherche de la Mantetsu a indiqué que l'Armée du Kwangtung avait découvert notre projet agricole collaboratif, une affirmation corroborée par les conclusions de nos services de renseignement. Le général Ueda Kenkichi lui-même aurait fait irruption dans le bureau du président de la Mantetsu, Matsuoka Yōsuke, et lui aurait asséné un torrent de critiques virulentes sur la nécessité de maintenir le Fengtian dans un état de dépendance. La capacité de l'Armée du Kwangtung à sanctionner la Mantetsu est en fin de compte limitée, car cette puissante entreprise est pratiquement autonome, mais il ne fait guère de doute que l'armée fera tout son possible pour compliquer la tâche de toutes les parties concernées. Malheureusement, cela marquera certainement la fin de ce projet de collaboration spécifique avec la Mantetsu."
 fengtian_events.49.a:0 "Dommage."

 fengtian_events.50.t:0 "Découverte"
 fengtian_events.50.d:0 "Bien qu'aucune déclaration publique n'ait été faite, les récents signes de mécontentement au sein d’une partie des hauts responsables de l’armée sont désormais difficiles à ignorer. Il semblerait que la nouvelle de notre projet de collaboration agricole avec la Mantetsu se soit répandue plus largement que prévu, et selon certains généraux aux tendances nationalistes, "la Chine doit se réformer elle-même" et ne pas se soumettre à une "restructuration forcée déguisée en réforme collaborative".\n\nBien que cela soit loin d'être une crise majeure, toute menace pesant sur la poursuite de la coopération de nos généraux et autres responsables n’est pas une mince affaire. Certains ministres suggèrent que nous pourrions défendre notre collaboration, en la présentant comme un cas où nous sommes en mesure de manipuler la Mantetsu, plutôt que l’inverse. D’autres suggèrent que cela pourrait simplement aggraver notre situation."
 fengtian_events.50.a:0 "La main dans le sac."
 fengtian_events.50.b:0 "Nos actions étaient légitimes !"

 fengtian_events.51.t:0 "L'Opinion Publique Change en Notre Faveur"
 fengtian_events.51.d:0 "Contre toute attente, la défense du projet agricole d'Hokkaido par le grand maréchal Zhang semble avoir convaincu toutes les parties concernées. L'impact a été atténué et le programme peut se poursuivre sans interruption."
 fengtian_events.51.a:0 "Excellente nouvelle !"

 fengtian_events.52.t:0 "Le Public est en Colère !"
 fengtian_events.52.d:0 "Malgré tous les efforts déployés par nos bureaucrates, et même par le grand maréchal Zhang, de nombreuses personnalités de l'armée restent sceptiques quant à l'intérêt du Projet agricole d'Hokkaido. En conséquence, ce programme risque fort de s'enliser, et notre gouvernement divisé se trouve confronté à un nouveau sujet de discorde."
 fengtian_events.52.a:0 "Mince !"

#Focus Tree Specific Events

 fengtian_events.53.t:0 "Enrichir le Pays, Renforcer l'Armée"
 fengtian_events.53.d:0 "Après des décennies de déclin et de misère, la nécessité du progrès et du développement n'a jamais été aussi évidente. Cependant, si nous ne pouvons nous permettre de stagner, le changement comporte ses propres risques, à savoir la mauvaise gestion et le mécontentement de la population.\n\nIl incombe au gouvernement de répondre à l'appel visant à "Enrichir le Pays et Renforcer l'Armée", mais nous devons donner la priorité à l’un ou à l’autre."
 fengtian_events.53.a:0 "Nous devons enrichir le Pays !"
 fengtian_events.53.b:0 "Nous devons renforcer l'Armée !"
 fengtian_events.53.c:0 "Dites-m'en plus sur l'état de l'Économie."
 fengtian_events.53.e:0 "Dites-m'en plus sur l'état de l'Armée."

 fengtian_events.54.t:0 "Enrichir le Pays"
 fengtian_events.54.d:0 "Si la Mandchourie dispose de ressources abondantes et variées et que le Fengtian s'impose comme le troisième plus grand centre industriel d'Asie de l'Est, son économie reste en proie à de nombreux problèmes structurels, dont les symptômes paralysent l'État et ralentissent les progrès vers la Reconquête du Sud. Le principal investisseur du Fengtian n'est autre que l'État lui-même, qui réinjecte les recettes fiscales dans des secteurs clés tels que la sidérurgie, le charbon et la production de soja. Pourtant, les Japonais et la Mantetsu ne sont que légèrement en retrait du gouvernement à cet égard et investissent de manière bien plus diversifiée, ce qui leur confère une emprise incontestable tant sur l'économie que sur la société du Fengtian.\n\nAlors que l'étendue de cette emprise s'accroît de jour en jour, des réformes pourraient permettre d'augmenter les recettes du gouvernement grâce à la lutte contre la corruption endémique, à la création d'un environnement plus propice à l'investissement privé et à la coopération, malheureuse mais nécessaire, avec la Mantetsu dans des domaines clés tels que les infrastructures et la technologie. Tant que le gouvernement pourra conserver son autonomie politique et au moins une majorité de contrôle sur l'économie, il pourra mener des initiatives visant à contrer l'influence japonaise, à conserver sa légitimité aux yeux du peuple chinois et, à terme, à atteindre ses objectifs fondamentaux.\n\nIl convient de noter que, bien que le Japon ait tout intérêt à nous voir réussir face à [QIE.GetNameDef], il n'apportera son aide qu'à des efforts spécifiques visant à dépasser le retard de notre industrie, tout en tentant d'étendre son influence déjà inquiétante sur notre économie."
 fengtian_events.54.a:0 "Enrichissons le pays !"
 fengtian_events.54.b:0 "Peut-être que l'Armée est plus importante ?"

 fengtian_events.55.t:0 "Renforcer l'Armée"
 fengtian_events.55.d:0 "L'Armée du Fengtian, officiellement appelée Armée de la République, offre un spectacle impressionnant selon la plupart des critères chinois, même si elle fait pâle figure face à la plupart des forces étrangères ; elle n'a retrouvé qu'une grande partie de ses effectifs que récemment, après avoir été décimée lors de la dernière Guerre Zhifeng. La majorité des armes et des véhicules du Fengtian sont obsolètes, y compris le fusil de service fourni par les Japonais, et l'organisation en dessous du niveau divisionnaire est très inégale en raison du matériel de communication limité. La plus grande faiblesse de l'Armée réside dans le moral de ses troupes, en partie à cause de la présence généralisée dans ses rangs d'officiers formés à l'étranger, voire carrément japonais.\n\nPar ailleurs, le Corps aérien du Fengtian, officiellement appelé Corps aérien chinois, fait la fierté et la joie du fils aîné du Grand Maréchal, Zhang Xueliang, qui a mis à profit sa passion pour l'aviation pour former ses premiers pilotes. Le Corps aérien s'est bien comporté pendant la guerre et n'a perdu la supériorité aérienne face au Zhili qu'avec l'arrivée d'avions modernes pilotés par des Allemands. Depuis lors, le Corps s'est légèrement développé, bien que ses avions restent à plus d'une décennie de retard par rapport aux standards européens.\n\nDans l'ensemble, les forces du Fengtian sont à la traîne par rapport à celles de [QIE.GetNameDef] et restent fortement dépendantes de l'équipement et de l'aide japonais. Cette aide, ainsi que tout ce que le Fengtian peut faire pour devenir autosuffisant, sera cruciale pour réduire cet écart et, à terme, reconquérir le sud."
 fengtian_events.55.a:0 "Renforçons l'Armée !"
 fengtian_events.55.b:0 "Qu'en est-il de l'économie ?"

 fengtian_events.56.t:0 "Retour les Mains Vides"
 fengtian_events.56.d:0 "Malgré tous leurs efforts, les scientifiques et ingénieurs que nous avons envoyés étudier les méthodes de fabrication japonaises sont revenus les mains vides. Peut-être que l'énorme fossé en matière de sophistication entre leur technologie et la nôtre a constitué un obstacle, ou peut-être que les Japonais se sont donné beaucoup de mal pour ne pas nous aider. Quoi qu'il en soit, le grand public semble avoir été davantage impressionné par les prétendues réussites de nos "meilleurs éléments" que par leur échec, car celui-ci n'a mystérieusement pas été rapporté. Pour autant que l'on sache, nos scientifiques se sont rendus à l'étranger pour recevoir des distinctions très prestigieuses."
 fengtian_events.56.a:0 "Nos meilleurs éléments."

 fengtian_events.58.t:0 "Licences Hôtelières Yamato"
 fengtian_events.58.d:0 "La chaîne hôtelière Yamato de la Mantetsu est depuis longtemps une institution dans la Zone ferroviaire de Mandchourie du Sud ; cette zone de concession, cédée d'abord à la Russie impériale puis au Japon après 1906, a ensuite été étendue à la suite des 21 exigences de 1915, grâce à une interprétation assez large de ses dispositions, afin d'englober l'ensemble de la Mandchourie du Sud. Néanmoins, bien que les droits issus des traités autorisent les Japonais à résider et à exercer toute activité commerciale ou industrielle, la construction nécessite toujours, en théorie, l'accord du gouverneur local et, si nécessaire, du Grand Maréchal lui-même.\n\nLa Mantetsu a pour objectif de construire une série de nouveaux hôtels, qui deviendront inévitablement des pôles d'activité pour les Japonais. Si la construction ne peut être stoppée sans provoquer la colère du gouvernement japonais, des restrictions pourraient toutefois être imposées pour limiter l'influence japonaise dans certaines zones. Malheureusement, bien qu'ils symbolisent la puissance du Japon, ces hôtels sont fréquentés par l'élite japonaise et de nombreux employés de la Mantetsu, ce qui les rend indispensables au développement rapide que nous souhaitons."
 fengtian_events.58.a:0 "Limitez la construction."
 fengtian_events.58.b:0 "Laissez-les construire comme ils l'entendent."

 fengtian_events.59.t:0 "La Commission de Développement Industriel du Nord-Est"
 fengtian_events.59.d:0 "À la demande du Japon, et n'ayant aucune raison particulière de refuser, nous avons mis en place un cadre juridique et fiscal permettant la création de la Commission de développement industriel du Nord-Est. Chargée de superviser et d'orienter le développement de l’industrie du Fengtian, principalement par l'octroi de fonds et de baux, la commission doit désormais se pencher sur la question de sa composition.\n\nL'Association Concordia a proposé d'y inclure une série de personnalités extrêmement talentueuses ayant travaillé pour les zaibatsu Nissan et Mitsubishi au Japon, qui soulignent la nécessité d'une économie axée sur l'exportation tirant parti des ressources naturelles existantes du Fengtian, tandis que les généraux du Grand Maréchal insistent sur la nécessité d'une approche du développement privilégiant l'armée et usent de leur influence considérable pour garantir la présence de militaires au sein de la commission. La Clique des Communications recommande sa propre présence et prône une approche de développement mixte, en se référant à sa longue expérience des relations commerciales à travers la Chine, ainsi que, plus récemment, ici dans le Nord-Est.\n\nMalheureusement, un compromis impliquant les trois parties est pratiquement impossible, car cette tâche nécessite une vision claire, et les querelles internes à la commission la rendraient presque certainement incapable de fonctionner. De plus, bien que la nature de la commission, en tant qu'organe nommé, permette la présence de Japonais parmi ses membres, le public et une grande partie de l'Assemblée risquent de réagir négativement à leur présence. Dans le même temps, les Japonais n'apprécieront pas d'être exclus."
 fengtian_events.59.a:0 "Mettez l'accent sur les exports."
 fengtian_events.59.b:0 "L'armée doit passer en premier."
 fengtian_events.59.c:0 "Une approche mixte est préférable."

 fengtian_events.60.t:0 "Mantetsu Chōsabu"
 fengtian_events.60.d:0 "Le département de recherche de la Compagnie des chemins de fer de Mandchourie du Sud, communément appelé "Mantetsu Chōsabu", s'est développé au fil des ans, passant d'un simple service de R&D d'entreprise au cœur du programme de recherche colonial japonais, avec des divisions spécialisées dans tous les domaines, des sciences agricoles à la collecte de renseignements. L'ampleur même de cette organisation a conduit à l'ouverture de bureaux à Berlin, Vancouver et New York afin d'attirer des talents étrangers, ainsi qu'à un vaste recrutement au sein des plus grandes universités japonaises. Il en résulte une communauté intellectuelle étonnamment libérale et ouverte d'esprit, qui fait parfois passer la recherche scientifique avant les préoccupations nationalistes.\n\nCela semble être l'un de ces cas, puisque notre gouvernement a été contacté par un représentant du Chōsabu proposant une aide future dans l'un de plusieurs domaines. Il convient de noter que la garnison de l'Armée du Kwangtung à [745.GetCapitalVictoryPointName] s'est fermement opposée à cet accord."
 fengtian_events.60.a:0 "Le radar."
 fengtian_events.60.b:0 "La construction."
 fengtian_events.60.c:0 "L'efficacité de la production."
 fengtian_events.60.e:0 "Le renseignement."

 fengtian_events.61.t:0 "Collaboration de la Mantetsu Chōsabu sur le Radar"
 fengtian_events.61.d:0 "Compte tenu des récentes avancées technologiques du Japon dans le domaine des radars, les scientifiques de la division de recherche de la Mantetsu ont entamé une collaboration avec les nôtres, afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.61.a:0 "Excellent."

 fengtian_events.62.t:0 "Collaboration de la Mantetsu Chōsabu sur le Radar"
 fengtian_events.62.d:0 "Compte tenu des récentes avancées technologiques du Japon dans le domaine des radars, les scientifiques de la division de recherche de la Mantetsu ont entamé une collaboration avec les nôtres, afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.62.a:0 "Excellent."

 fengtian_events.63.t:0 "Collaboration de la Mantetsu Chōsabu sur la Construction"
 fengtian_events.63.d:0 "Compte tenu des récents développements au Japon, les responsables du département de recherche de la Mantetsu ont entamé une collaboration avec les nôtres, en nous fournissant de nouveaux outils et des bonnes pratiques afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.63.a:0 "Excellent."

 fengtian_events.64.t:0 "Collaboration de la Mantetsu Chōsabu sur la Construction"
 fengtian_events.64.d:0 "Compte tenu des récents développements au Japon, les responsables du département de recherche de la Mantetsu ont entamé une collaboration avec les nôtres, en nous fournissant de nouveaux outils et des bonnes pratiques afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.64.a:0 "Excellent."

 fengtian_events.65.t:0 "Collaboration de la Mantetsu Chōsabu sur la Production"
 fengtian_events.65.d:0 "Compte tenu des récentes avancées technologiques du Japon, les scientifiques de la division recherche de la Mantetsu ont entamé une collaboration avec les nôtres, en nous fournissant de nouvelles machines et des méthodes de fabrication afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.65.a:0 "Excellent."

 fengtian_events.66.t:0 "Collaboration de la Mantetsu Chōsabu sur la Production"
 fengtian_events.66.d:0 "Compte tenu des récentes avancées technologiques du Japon, les scientifiques de la division recherche de la Mantetsu ont entamé une collaboration avec les nôtres, en nous fournissant de nouvelles machines et des méthodes de fabrication afin que nous puissions atteindre plus rapidement le même niveau de progrès."
 fengtian_events.66.a:0 "Excellent."

 fengtian_events.67.t:0 "Collaboration de la Mantetsu Chōsabu sur le Renseignement"
 fengtian_events.67.d:0 "S'appuyant sur ses vastes opérations de renseignement, la branche de recherche de la Mantetsu a produit une série de manuels détaillant les méthodes spéciales et les meilleures pratiques destinées à nos agents secrets. Bien que ces ouvrages soient manifestement dépassés et que certaines sections aient été caviardées, ils recèlent encore de nombreuses informations utiles. Un ouvrage intitulé "Rakka Ryūsui", ou "Fleurs tombantes ; eau qui coule", qui détaille le travail d'Akashi Motojirō, le plus éminent maître espion du Japon pendant la guerre russo-japonaise, présente un intérêt particulier."
 fengtian_events.67.a:0 "Excellent."

 fengtian_events.68.t:0 "Collaboration de la Mantetsu Chōsabu sur le Renseignement"
 fengtian_events.68.d:0 "Grâce à ses vastes opérations de renseignement, la branche recherche de la Mantetsu a permis à nos agents d'accéder à certaines de ses ressources clandestines réparties à travers la Chine. Cela renforcera considérablement les capacités de nos agents."
 fengtian_events.68.a:0 "Excellent."

 fengtian_events.69.t:0 "La Zone Industrielle de Jinzhou"
 fengtian_events.69.d:0 "La situation géographique avantageuse de Jinzhou en fait un site idéal pour la zone industrielle envisagée, et plusieurs groupes ont déjà commencé à se disputer la position dominante dans le développement du projet ; notamment une filiale de la Mantetsu spécialisée dans la mise en conserve et la métallurgie légère, la Clique des Communications qui souhaite y implanter une usine de matériel roulant, et l'armée qui insiste pour que la zone soit affectée à la fabrication de munitions plutôt qu'à la "recherche de profits capitalistes personnels". La situation est quelque peu inhabituelle en raison de la Clique des Communications, qui est généralement en mesure de mettre en avant des sommes d'argent considérables, et des rumeurs suggèrent que plusieurs de ses membres subissent des pressions de la part de l'armée pour affaiblir leur propre position dans la course aux enchères."
 fengtian_events.69.a:0 "Choisissez la Mantetsu."
 fengtian_events.69.b:0 "Choisissez la Clique des Communications."
 fengtian_events.69.c:0 "Choisissez la Clique de Zhang."

 fengtian_events.70.t:0 "Remplir la Réserve d'Argent"
 fengtian_events.70.d:0 "Une réserve d'argent bien fournie est essentielle pour renforcer la confiance dans la monnaie du Fengtian, et encore plus cruciale pour attirer les investissements étrangers, sans lesquels le Fengtian ne peut espérer rivaliser avec le Zhili, au sud, qui depuis huit ans regorge de capitaux allemands. Cependant, l'argent est une matière première coûteuse, et en acheter suffisamment pour remplir entièrement la réserve réduirait sans aucun doute les fonds alloués à d'autres domaines.\n\nCertains ministres ont suggéré en privé de n'acheter qu'environ la moitié de la quantité souhaitée, car beaucoup pensaient que la réserve n'était pas pleine avant la dernière Guerre Zhifeng, et ces rumeurs n'ont jamais été confirmées. Bien sûr, il a ensuite été difficile d'expliquer la grave récession économique qui a suivi l'incapacité du gouvernement à régler ses dettes de guerre.\n\nNéanmoins, ne pas remplir la réserve de manière adéquate constituerait certainement un risque important, mais peut-être un risque qui en vaut la peine."
 fengtian_events.70.a:0 "Remplissez la réserve."
 fengtian_events.70.b:0 "Le jeu n'en vaut pas la chandelle."

 fengtian_events.71.t:0 "Désastre Économique !"
 fengtian_events.71.d:0 "Après que la Banque du Japon et la Banque Mitsui, principaux prêteurs de notre propre gouvernement, ont exigé de manière inattendue le remboursement des dettes en cours, notre Banque centrale s’est soudainement retrouvée dans l’incapacité de fournir suffisamment d’argent pour la transaction. La nouvelle de cette situation s’est rapidement répandue parmi la population, provoquant une ruée vers les banques et une panique financière généralisée. Selon certaines rumeurs, cette crise ne serait pas le résultat d'une grave mauvaise gestion et d'une incompétence de la part du gouvernement, ce qui ne surprendrait guère au Fengtian, mais plutôt d'une manœuvre délibérée visant à tromper le public. Les bureaux de la Mantetsu à Shenyang et Harbin ont déjà lancé une enquête à grande échelle, et à moins que des mesures ne soient prises, ils semblent sur le point de découvrir des traces écrites très compromettantes.\n\nBien que plusieurs options s'offrent à eux, il serait regrettable que certains dossiers gouvernementaux disparaissent de manière inexplicable..."
 fengtian_events.71.a:0 "Brûlez les preuves !"
 fengtian_events.71.b:0 "Brûlez-les et accusez les Japonais !"
 fengtian_events.71.c:0 "Demandez un renflouement au Japon !"
 fengtian_events.71.e:0 "Il faut dire la vérité !"

 fengtian_events.72.t:0 "Preuves Financières Découvertes !"
 fengtian_events.72.d:0 "Après une enquête complète, impliquant nombre de menaces et pots-de-vin, les enquêteurs de la Mantetsu ont conclu que notre gouvernement avait intentionnellement trompé son peuple, et est le seul responsable du récent désastre économique. Nous ne sommes pas en position de refuser leurs demandes d'arrestations de plusieurs ministres impliqués, mais le Grand Maréchal et ses conseillers les plus proches ont commodément évité d'être directement accusés, et le directeur de la Mantetsu, Matsuoda Yōsuke, a suggéré que toute l'affaire pourrait être arrêtée indéfiniment en contrepartie de faveurs politiques."
 fengtian_events.72.a:0 "Acceptez l'offre."
 fengtian_events.72.b:0 "Refusez l'offre."

 fengtian_events.73.t:0 "Le Japon Accepte le Renflouement"
 fengtian_events.73.d:0 "Dans une initiative qui ne manquera pas de sauver notre économie, le Japon a accepté de payer la quantité d'argent nécessaire pour constituer nos réserves, et ne se penchera pas davantage sur la question. Bien sûr, cette décision n'était sans doute motivée que par son propre intérêt, mais certains disent que le Japon n'est peut-être pas si mal après tout..."
 fengtian_events.73.a:0 "Nous sommes sauvés !"

 fengtian_events.74.t:0 "Le Japon Refuse le Renflouement"
 fengtian_events.74.d:0 "Malgré nos supplications, le Japon a refusé de nous accorder une aide financière, nous laissant dans la même situation économique qu'avant notre demande, avec en prime une profonde humiliation. La seule "lueur d'espoir" est que de nombreux citoyens, y compris certains employés de la Mantetsu, ont perdu une grande partie de leur confiance dans l'attitude bienveillante du Japon envers la Chine."
 fengtian_events.74.a:0 "Si seulement on avait plus d'argent."
 fengtian_events.74.b:0 "Peut-être que le ministre Ruan peut arranger les choses."

 fengtian_events.75.t:0 "L'État du Corps des Officiers"
 fengtian_events.75.d:0 "Le corps des officiers du Fengtian est un mélange inhabituel de jeunes Chinois éduqués à la Rikugun Shikan Gakkō au Japon, à l'Amphithéâtre de l'Armée du Nord-Est ou à l'Académie militaire de Baoding, de Chinois plus âgés ayant servi lors des Guerres civiles, et d'officiers japonais membres de la Mission militaire au Fengtian, tous unis par des loyautés communes envers des individus plutôt que par une dévotion envers l'État. Les officiers japonais en particulier sont connus pour fréquenter toutes les stations du Nord-Est, la monnaie dévaluée leur permettant de vivre des vies relativement luxueuses et d'engager des serviteurs pour les tâches les plus simples, ce qui leur vaut l'inimitié non seulement de leurs pairs mais aussi de la population locale.\n\nDésormais, avec la fondation de l'Académie nationale de Shenyang, ces officiers ont saisi l'opportunité de se moquer des aménagements actuels de l'académie, qui ont des décennies de retard et manquent d'entretien. Tandis qu'un bâtiment neuf et moderne est construit non loin, l'état pitoyable de l'académie fait du gouvernement la cible de critiques."
 fengtian_events.75.a:0 "Dommage."

 fengtian_events.76.t:0 "Expulsion des Officiers Japonais"
 fengtian_events.76.d:0 "Le Japon maintient une mission militaire au Fengtian depuis la fondation du Gouvernement du Fengtian en 1926. Elle était précédée par plus d'une décennie d'opérations japonaises non-officielles pour soutenir la Clique du Fengtian de Zhang Zuolin. La Mission a aidé de nombreux aspects du développement militaire, principalement en fournissant des armes et de l'équipement mais aussi en entraînant les hommes et en aidant à la planification.\n\nMalheureusement, la pénurie d'officiers à cause des guerres civiles a donné au Japon l'opportunité d'assigner des officiers japonais à des postes de commandement sur le terrain, et même de diriger nos unités de manière indépendante. Ceci a eu un effet négatif sur le moral de nos hommes, rendant l'influence japonaise trop visible, même alors que la Mission militaire tente, et réussit souvent, à influencer les affaires de notre gouvernement. Pour que nos soldats et le peuple chinois aient un minimum de respect envers notre Gouvernement, la Mission militaire japonaise doit partir."
 fengtian_events.76.a:0 "Expulsez-les tous !"
 fengtian_events.76.b:0 "Soyons plus diplomates."

 fengtian_events.77.t:0 "Le Japon Déclare la Guerre"
 fengtian_events.77.d:0 "En réponse à l'expulsion de ses officiers, le Gouvernement japonais a coupé tous les liens et a déclaré la guerre ! Beaucoup considèrent cela comme un désastre, mais c'est peut-être une opportunité cachée. La vérité se trouvera sur le champ de bataille."
 fengtian_events.77.d_breakaway:0 "En réponse à ce qu'il considère comme une violation de notre engagement de coopération, ainsi que des Treize Demandes de 1915, le Japon a conséquemment déclaré la guerre "pour protéger ses droits de traité et ses intérêts en Chine"."
 fengtian_events.77.a:0 "Zhonghua Minguo Wansui !"

 fengtian_events.78.t:0 "Le Japon Lance un Ultimatum"
 fengtian_events.78.d:0 "Malgré nos vaillantes tentatives pour dissoudre la Mission militaire japonaise, son influence au sein de notre gouvernement s'est avérée trop forte, ce qui a conduit à sa réintégration. La seule autre option qui s'offre désormais à nous serait de rejeter l'ultimatum et de déclarer la guerre, sous les ordres du Grand Maréchal lui-même."
 fengtian_events.78.d_ultimatum:0 "Les négociations ont échoué et le Japon a lancé un ultimatum sans équivoque. Nous devons rétablir la mission, sinon ils déclareront immédiatement la guerre."
 fengtian_events.78.a:0 "Nous n'avons d'autre choix que de nous soumettre."
 fengtian_events.78.b:0 "Alors c'est la guerre !"

 fengtian_events.79.t:0 "Wu Wang Zai Ju"
 fengtian_events.79.d:0 "Le grand maréchal Zhang Zuolin a prononcé un discours bref mais percutant, faisant allusion à l'ancien État de Qi qui, alors qu'il était au bord de la défaite lors du siège de Ju, a renversé la situation et a fini par remporter la guerre. C'est là l'exemple que nous devons suivre alors que nous marchons à l'assaut de ceux qui voudraient maintenir la Chine dans la faiblesse et la division."
 fengtian_events.79.a:0 "Lisez le texte du discours."
 fengtian_events.79.b:0 "La reconquête du sud est inévitable !"

 fengtian_events.91.t:0 "Escalade de la Guerre de Propagande"
 fengtian_events.91.d:0 "Le Département de la Propagande lance déjà avec acharnement un barrage idéologique dévastateur sous lequel le régime rétrograde [QIE.GetAdjective] ne manquera pas de céder et de s'effondrer ! Le Grand Maréchal a personnellement publié plusieurs brefs discours dénonçant "la marionnette du Kaiser en Asie", [QIE.GetLeader], le qualifiant de "pire qu'un chien" pour sa "lâcheté et sa collaboration éhontée avec l'envahisseur allemand", et pour avoir "vendu le peuple chinois à des intérêts étrangers". Jusqu'où le gouvernement illégitime [QIE.GetAdjective] pourra-t-il encore s'abaisser avant de s'effondrer ?"
 fengtian_events.91.d_mantetsu:9 "Le Département de la Propagande redouble déjà d'efforts pour lancer un barrage idéologique dévastateur sous lequel le régime rétrograde [QIE.GetAdjective] ne manquera pas de céder et de s'effondrer ! Le Grand Maréchal a personnellement publié plusieurs brefs discours dénonçant "la marionnette du Kaiser en Asie", [QIE.GetLeader], le qualifiant de "pire qu'un chien" pour sa "lâcheté et sa collaboration éhontée avec l'envahisseur allemand", et pour avoir "vendu le peuple chinois à des intérêts étrangers".\n\nDans le même temps, l'influence que les Japonais exercent sur notre propre gouvernement est évidente, même pour le plus humble des mendiants, et nos efforts sonnent donc comme de l'hypocrisie aux oreilles de beaucoup."
 fengtian_events.91.a:0 "La reconquête du sud est inévitable !"

 fengtian_events.92.t:0 "Artillerie Japonaise Obsolète"
 fengtian_events.92.d:0 "En réponse à notre demande, l'Armée impériale japonaise a autorisé une importante livraison de matériel d'artillerie obsolète qui n'a probablement pas servi au combat depuis la Weltkrieg. C'est décevant, voire carrément inutile."
 fengtian_events.92.a:0 "Bien."

 fengtian_events.93.t:0 "Artillerie Japonaise de Pointe"
 fengtian_events.93.d:0 "En réponse à notre demande, l'Armée impériale japonaise a autorisé l'expédition d'un important contingent de ses dernières pièces d'artillerie depuis l'Arsenal de Kokura. Nos officiers lorgnent déjà sur les armes promises avec cette excitation particulière que l'on réserve exclusivement à l'acier usiné et aux explosifs puissants."
 fengtian_events.93.a:0 "Bien."

 fengtian_events.94.t:0 "Le Fengtian Demande de l'Artillerie"
 fengtian_events.94.d1:0 "Le Gouvernement du Fengtian bénéficie depuis longtemps d'un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande de l'artillerie.\n\nNous pourrions envoyer ce que nous avons de mieux, ce qui devrait faire une différence notable dans un pays aussi arriéré, mais nous pourrions aussi fournir un plus grand nombre d'armes obsolètes et bon marché, à moindre coût pour nous-mêmes. Ou bien nous pourrions tout simplement ne rien envoyer du tout."
 fengtian_events.94.d2:0 "Le Gouvernement du Fengtian bénéficie depuis longtemps d'un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande de l'artillerie, qui est particulièrement prisée dans les arsenaux des seigneurs de la guerre."
 fengtian_events.94.a:9 "Envoyez de l'équipement de pointe."
 fengtian_events.94.b:9 "Envoyez de l'équipement obsolète."
 fengtian_events.94.c:9 "N'envoyez rien."
 fengtian_events.94.d:9 "Nous ne pouvons pas nous le permettre."

 fengtian_events.95.t:0 "Le Japon Envoie de l'Équipement Obsolète"
 fengtian_events.95.d:0 "En réponse à notre demande, l'Armée impériale japonaise a autorisé l'envoi d'une importante cargaison de matériel d'infanterie obsolète. Une partie de ce matériel semble avoir été utilisée pour la dernière fois pendant la Guerre russo-japonaise, voire avant. C'est décevant."
 fengtian_events.95.a:0 "Ainsi soit-il."

 fengtian_events.96.t:0 "Le Japon Envoie de l'Équipement de Pointe"
 fengtian_events.96.d:0 "En réponse à notre demande, l'Armée impériale japonaise a autorisé une importante livraison de son matériel d'infanterie le plus récent."
 fengtian_events.96.a:0 "Remercions-les."

 fengtian_events.97.t:0 "Le Fengtian Demande des Armes Légères"
 fengtian_events.97.d1:0 "Le Gouvernement du Fengtian bénéficie depuis longtemps d'un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande du matériel d'infanterie.\n\nNous pourrions envoyer ce que nous avons de mieux, ce qui devrait faire une différence notable dans un pays aussi arriéré, mais nous pourrions aussi fournir un plus grand nombre d'armes obsolètes et bon marché, sans que cela ne nous coûte grand-chose. Ou bien nous pourrions tout simplement ne rien envoyer du tout."
 fengtian_events.97.d2:0 "Le Gouvernement du Fengtian bénéficie depuis longtemps d'un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande du matériel d'infanterie.\n\nTout ce que nous pouvons nous permettre actuellement, c'est un certain nombre d'armes obsolètes et bon marché, même si cela ne nous coûte pratiquement rien. Bien sûr, nous pourrions toujours ne rien envoyer du tout."
 fengtian_events.97.a:9 "Envoyez de l'équipement de pointe."
 fengtian_events.97.b:9 "Envoyez de l'équipement obsolète."
 fengtian_events.97.c:9 "N'envoyez rien."

 fengtian_events.971.t:0 "Le Japon Refuse d'envoyer de l'Équipement"
 fengtian_events.971.d:0 "Le Japon a rejeté notre demande de livraison de matériel, invoquant ses propres "besoins plus pressants". Il faut bien avouer que cela n'a rien de surprenant."
 fengtian_events.971.a:9 "Et la Fraternité panasiatique ?"

 fengtian_events.98.t:0 "Chars Japonais Obsolètes"
 fengtian_events.98.d:0 "Même si, comme on pouvait s'y attendre, les Japonais ont refusé de nous fournir leur matériel blindé le plus récent, seuls les plus cyniques avaient prévu l'arrivée de ces chars rouillés et cabossés datant de la Weltkrieg qui sont actuellement déchargés à Yingkou. Bien qu'ils valent mieux que rien, c'est tout de même très décevant."
 fengtian_events.98.a:0 "Ainsi soit-il."

 fengtian_events.99.t:0 "Chars Japonais de Surplus"
 fengtian_events.99.d:0 "Même si, comme on pouvait s'y attendre, les Japonais ont refusé de nous fournir leur matériel blindé le plus récent, ils ont toutefois accepté de nous envoyer un certain nombre de chars légers excédentaires, d'un modèle plus ancien mais pas tout à fait obsolète."
 fengtian_events.99.a:0 "Bien."

 fengtian_events.100.t:0 "Le Fengtian Demande des Chars Légers"
 fengtian_events.100.d1:0 "Le Gouvernement du Fengtian bénéficie depuis longtemps d’un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande des chars légers, mieux adaptés que les modèles plus lourds aux terrains accidentés et aux infrastructures rudimentaires de la Chine.\n\nLes véhicules blindés les plus récents seraient gaspillés, voire carrément dangereux, entre les mains des Chinois, mais nous disposons de stocks excédentaires de chars à peine dépassés qui pourraient être appréciés. Nous pourrions également envoyer du matériel encore plus ancien sans que cela ne nous coûte grand-chose, bien que nous puissions bien sûr aussi choisir de ne rien envoyer du tout."
 fengtian_events.100.d2:9 "Le Gouvernement du Fengtian bénéficie depuis longtemps d'un avantage sur ses rivaux chinois grâce à notre aide matérielle régulière. Dans le cas présent, on nous demande des chars légers.\n\nBien que nous ne disposions actuellement d'aucun char moderne, nous pourrions envoyer un convoi de chars très anciens datant de la Weltkrieg, sans que cela ne nous coûte grand-chose. Ou bien nous pourrions tout simplement ne rien envoyer du tout."
 fengtian_events.100.a:9 "Envoyez des chars légers de surplus."
 fengtian_events.100.b:9 "Envoyez des chars obsolètes."
 fengtian_events.100.c:9 "N'envoyez rien."

 fengtian_events.101.t:0 "La Proclamation du Grand Maréchal"
 fengtian_events.101.d:0 "Aujourd’hui, le Grand Maréchal a prononcé un discours enthousiasmant appelant tout le Nord-Est à donner le meilleur de lui-même pour remporter la victoire dans la prochaine Guerre de Reconquête nationale. Vive la République pour dix mille ans !"
 fengtian_events.101.a:0 "Lisez le texte du discours."
 fengtian_events.101.b:0 "Wansui !"

 fengtian_events.102.t:0 "La [FNG_zhifeng_war_name] !"
 fengtian_events.102.d.no_shanhaiguan:0 "L'heure tant attendue est enfin venue. Dans les jours à venir, le fruit de plus d'une décennie de planification et de préparation minutieuses sera enfin mis à profit contre l'ennemi, et les premiers pas seront franchis sur la voie de la réunification nationale. Il ne reste plus qu'à aller de l'avant et à saisir cette occasion. Vive le Grand Maréchal Zhang pour dix mille ans ! Vive la République pour dix mille ans !"
 fengtian_events.102.d.shanhaiguan:0 "L'heure tant attendue est enfin venue. Dans les jours à venir, le fruit de plus d'une décennie de planification et de préparation minutieuses sera enfin mis à profit contre l'ennemi, et les premiers pas seront franchis sur la voie de la réunification nationale. Il ne nous reste plus qu'à aller de l'avant et à saisir cette occasion. Vive le Grand Maréchal Zhang pour dix mille ans ! Vive la République pour dix mille ans !\n\nPartis de petits villages et bourgs situés le long de la rive nord de la rivière Chaobai, nos soldats ont mené un soulèvement victorieux, isolant et éliminant les garnisons locales, et s'emparant des principaux points de passage sur la rivière. Nous devons avancer vers le sud aussi vite que possible, avant qu'ils ne soient submergés par la riposte de l'ennemi et sa supériorité numérique."
 fengtian_events.102.a:0 "L'Histoire se souviendra de ce jour !"

 fengtian_events.103.t:0 "Infiltration de Shanhaiguan"
 fengtian_events.103.d:0 "Le moment est venu pour nos soldats de mettre à exécution les plans que nous avons soigneusement élaborés et de commencer à s'infiltrer par Shanhaiguan pour pénétrer dans la province voisine. Leur mission ne sera pas facile, car bien des imprévus pourraient survenir, mais s'ils réussissent, nous aurons un soulèvement derrière les lignes ennemies qui les tiendra occupés et coupera leurs lignes de ravitaillement."
 fengtian_events.103.a:0 "Bonne chance à nos braves soldats !"
 fengtian_events.103.b:0 "Abandonnez."

 fengtian_events.104.t:0 "Préparations Complètes à Shanhaiguan"
 fengtian_events.104.d:0 "Nos agents de renseignement ont appris que la plupart de nos soldats infiltrés se trouvent désormais en position au sud de Shanhaiguan. Ils doivent désormais faire profil bas et attendre le début de la Guerre de Reconquête nationale."
 fengtian_events.104.a:0 "Bonne nouvelle."

 fengtian_events.105.t:0 "Échec à Shanhaiguan"
 fengtian_events.105.d:0 "Nos agents de renseignement ont appris que, lors de leur infiltration par Shanhaiguan, nos soldats ont été repérés et éliminés par des agents ennemis et des groupes de police militaire. S’il en reste, ils seront sans aucun doute trop dispersés et désorganisés pour être d’une quelconque utilité une fois la guerre déclenchée ; ce plan doit donc malheureusement être considéré comme un échec."
 fengtian_events.105.a:0 "Un sacrifice honorable."

 fengtian_events.106.t:0 "Les Infiltrés Disparaissent"
 fengtian_events.106.d:0 "Bien que nos services de renseignement aient reçu des rapports faisant état de progrès au cours des premières phases de l'opération d'infiltration de Shanhaiguan, les communications ont été brusquement coupées et nos forces ont disparu au sud de la Grande Muraille. Il est possible que certains aient été repérés et cherchent simplement à échapper à la détection, ou que l'ensemble des forces ait été anéanti. On ne saura jamais ce qu'il est advenu de ces courageux soldats."
 fengtian_events.106.a:0 "Rien n'est perdu."

 fengtian_events.107.t:0 "Un Avantage Inattendu"
 fengtian_events.107.d:0 "Bien que tout contact avec la force d'infiltration de Shanhaiguan ait cessé, des rapports nous parviennent du nord faisant état de coups de feu et de chaos sur la rive nord de la rivière Chaobai. Il semble que ces héros aient réussi à passer inaperçus, pour frapper à présent au moment opportun. Il s'agit là d'un avantage inattendu, et nous devons avancer vers le sud avant qu'ils ne soient submergés par la riposte ennemie et la supériorité numérique de l'adversaire !"
 fengtian_events.107.a:0 "Glorieux !"

 fengtian_events.108.t:0 "Le Soulèvement de Shanhaiguan Échoue"
 fengtian_events.108.d:0 "Avant même d'avoir vraiment pu commencer, notre soulèvement au sud de Shanhaiguan a été repéré et rapidement écrasé par la garnison ennemie locale lors d'un affrontement bref mais violent. Même si nous croisons peut-être quelques survivants au cours de notre avancée vers le sud, nous ne bénéficierons d'aucune aide organisée venant de l'autre côté de la Grande Muraille."
 fengtian_events.108.a:0 "Mince."

 fengtian_events.110.t:0 "Le Gang des Trois"
 fengtian_events.110.d:0 "Coalition informelle regroupant des généraux déchus, des gouverneurs, des fonctionnaires et des hommes politiques exilés du Sud à la suite de l'effondrement du Gouvernement de Beiyang, la Ligue de la Reconquête est largement reconnue pour sa vulnérabilité à la corruption. Cependant, des découvertes récentes de la police ont mis au jour un élément particulièrement inquiétant. Il semble qu'un groupe de politiciens de la Ligue de la Reconquête, qui avaient été nommés maires de communes dans le Jilin en raison de leur expérience de la gouvernance dans le Sud, n'avaient en réalité jamais été maires nulle part. Au lieu de cela, ils avaient tué et remplacé leurs homonymes et, grâce à un complot complexe de tromperie, avaient berné les autorités tout en éliminant quiconque pouvait les contredire.\n\nLe réseau de mensonges, de corruption et de meurtres nécessaire pour maintenir ce mensonge s'étend à l'ensemble de la province, et le préjudice causé à la légitimité du gouvernement n'est pas négligeable."
 fengtian_events.110.a:0 "Dégoûtant."

 fengtian_events.111.t:0 "Pots-de-Vin de la Mantetsu"
 fengtian_events.111.d:0 "Deux membres de l'Association Concordia ont récemment été pris en flagrant délit de tentative de corruption de politiciens de la Ligue de la Reconquête. Si l'on soupçonnait depuis longtemps de telles agissements, c'est la première fois qu'ils sont mis au jour. Bien que des membres des autres partis aient proposé d'exclure les membres incriminés, le consulat japonais a déjà fait savoir qu'il "déconseillait vivement" de prendre des mesures à l'encontre des membres de l'Association Concordia.\n\nLe Grand Maréchal pourrait choisir de le faire malgré tout, mais pas sans risquer de s'attirer les foudres du Japon."
 fengtian_events.111.a:0 "Excluez-les quand même."
 fengtian_events.111.b:0 "Nous ne pouvons rien faire."

 fengtian_events.112.t:0 "L'Incident d'Anshan"
 fengtian_events.112.d:0 "Le minerai d'Anshan se trouvant près de la surface, les mines se sont principalement étendues vers l'extérieur plutôt que vers le bas, engloutissant les terres voisines à un rythme alarmant. Notre décision d'approuver la poursuite de l'expansion de l'entreprise a ainsi entraîné la destruction totale de plusieurs fermes voisines et de la moitié d'un village, sous l'action des engins miniers japonais.\n\nLes indemnités promises ne se sont pas concrétisées, et des manifestations ont rapidement éclaté parmi les agriculteurs locaux, que notre police locale a refusé de disperser pour des "raisons patriotiques". Les émeutes qui ont suivi ont gravement endommagé du matériel minier coûteux, ce qui a conduit au déploiement de la garde ferroviaire japonaise et au recours à la force meurtrière pour disperser les émeutes. Ce massacre de nos citoyens n’est pas passé inaperçu, et le sentiment anti-japonais existant n’a fait que s’exacerber. La population nous tiendra pour responsables de notre réaction, mais les gisements et la société qui les exploite sont essentiels aux objectifs stratégiques du Japon, et nos relations avec les Japonais ne nous laissent guère de marge de manœuvre."
 fengtian_events.112.a:0 "Dénoncez les Japonais."
 fengtian_events.112.b:0 "Restez silencieux."

 fengtian_events.113.t:0 "Le Japon Nous Dénonce"
 fengtian_events.113.d:0 "Qualifiant notre condamnation de leur comportement lors du récent incident d'Anshan "d'insolente" et "d'indigne de la générosité japonaise", le gouvernement japonais nous a adressé une réprimande cinglante, tant publiquement que par le biais d'une lettre remise en mains propres par le consul général du Japon à Shenyang. La garnison du Kwangtung a procédé à une série de manœuvres motorisées et blindées sous les yeux de toute la capitale, envoyant ainsi un message sans équivoque. Toute escalade de cette situation entraînerait sans aucun doute de nouvelles réprimandes auxquelles nous ne pourrions apporter aucune réponse significative."
 fengtian_events.113.a:0 "Ainsi soit-il."
 fengtian_events.113.b:0 "Nous ne serons pas intimidés !"

 fengtian_events.114.t:0 "Une Opportunité se Présente"
 fengtian_events.114.d:0 "Depuis que l'Armée du Fengtian s'est retirée au-delà de la Grande Muraille, le sud fait l'objet d'une surveillance étroite. Le goulet d'étranglement naturel formé par le col de Shanhai a toujours rendu difficile l'entrée des armées du Zhili, mais a également empêché les nôtres de sortir. Toute tentative de reconquête de la Chine a toujours dépendu d'un moment de faiblesse du Sud. Un tel moment semble désormais sur le point d'arriver, alors que le sentiment anti-allemand qui couvait a éclaté en violences au sein de la Ligue des Huit Provinces, et que le gouverneur de l'Anhui s’est séparé de Nanjing – dans l'espoir de monter la Ligue et le Gouvernement central l’un contre l’autre à son propre profit.\n\nMalheureusement, nous ne sommes pas encore prêts à lancer notre campagne tant attendue, car il reste des questions en suspens à régler dans le Nord-Est et l'issue de la situation au sein de la Ligue n'est pas encore claire. Nous devons observer et attendre le moment opportun."
 fengtian_events.114.a:0 "Choisissons judicieusement."

 fengtian_events.115.t:0 "L'Incident Radiophonique de Zhang Zuolin"
 fengtian_events.115.d:0 "Au cours de ce qui est désormais connu sous le nom "d'incident radiophonique de Zhang Zuolin", un subversif [QIE.GetAdjective] a réussi à enregistrer une conversation franche entre le Grand Maréchal et ses généraux, et à la diffuser sur des fréquences très utilisées à Shenyang pendant près de quarante minutes avant d'être brouillé par une station voisine appartenant à la Mantetsu. Cette conversation, au cours de laquelle le Grand Maréchal a évoqué des "ennemis au nord, au sud, à l'est et à l'ouest", décrit les relations du Fengtian avec le Japon en des termes d'une franchise inhabituelle, préjudiciables à notre propagande et aux intérêts du Japon.\n\nLa diffusion a été doublement préjudiciable, car elle a permis d’entendre Zhang discuter de la réalité de la puissance industrielle et militaire relative de [QIE.GetNameDef], ainsi que de la mesure dans laquelle nous devons compter sur les Japonais pour des technologies cruciales, ce que nous avons pris soin de cacher au public."
 fengtian_events.115.a:0 "Tout comme pour les lois, mieux vaut ne pas assister à la fabrication de Hongchang."

 fengtian_events.116.t:0 "Les Articles Séditieux se Multiplient"
 fengtian_events.116.d:0 "Un article paru dans le Nihon Kogyō Shimbun, ou "Journal industriel du Japon", a été traduit en chinois et largement diffusé dans la presse locale avant que les responsables de la censure ne parviennent à identifier et à faire fermer l'éditeur. Cet article décrivait de manière très détaillée à quel point la Mantetsu et d'autres entreprises japonaises avaient pris le contrôle de la plupart des secteurs de notre économie, et prévoyait une mainmise quasi totale d'ici cinq ans. Pour des raisons évidentes, cet article a profondément bouleversé la population, et nous ne pouvons pas faire grand-chose pour empêcher la circulation des exemplaires existants."
 fengtian_events.116.a:0 "Honteux !"

 fengtian_events.117.t:0 "Attaques Honghuzi au Heilongjiang"
 fengtian_events.117.d:0 "Les Honghuzi, littéralement "Barbes rouges", sont des bandes de brigands et de voleurs qui sévissent depuis longtemps dans le Nord-Est. Ces dernières années, les Honghuzi se sont généralement contentés d’extorsions discrètes, de brigandages et de demandes de rançon, mais plusieurs bourgs du sud du Heilongjiang ont récemment été incendiés. Il s’agit là d’un comportement inhabituellement audacieux, peut-être encouragé par l’attention que le pays porte actuellement aux événements qui se déroulent dans le sud.\n\nCertains ont suggéré d'organiser une expédition pour écraser les bandits et envoyer un message clair, mais divers généraux estiment qu'une telle mission est indigne du gouvernement central.\n\nNous pourrions également demander de l'aide aux Japonais, bien que cette idée soit impopulaire."
 fengtian_events.117.a:0 "Envoyez une expédition."
 fengtian_events.117.b:0 "Demandez de l'aide aux Japonais."
 fengtian_events.117.c:0 "Une expédition serait de la folie."

 fengtian_events.118.t:0 "Attaques Honghuzi à Xing'an"
 fengtian_events.118.d:0 "Malgré nos efforts pour les contenir, les Honghuzi ont encore frappé, cette fois à Xing'an, pillant des fermes et des marchands près des grandes routes. Le gouverneur local a détaché sa garnison pour lutter contre de futures incursions, mais le terrain accidenté et la nature volatile des bandits suggère qu'ils pourraient encore frapper ailleurs.\n\nDes rumeurs circulent sur le fait que ce groupe, qui compte désormais plusieurs milliers de membres, est dirigé par Zhang Haitian, connu des locaux sous le nom de "Lao Beifeng" ou "Vieux Vent du Nord"."
 fengtian_events.118.a:0 "Traquez-le !"
 fengtian_events.118.b:0 "Demandez de l'aide aux Japonais."
 fengtian_events.118.c:0 "Demandez de l'aide aux Japonais, encore !"
 fengtian_events.118.e:0 "Peut-être que Lao Baifeng en a assez eu."

 fengtian_events.119.t:0 "Attaques Honghuzi à Liaobei"
 fengtian_events.119.d:0 "Encouragés par notre incapacité à les arrêter, les Honghuzi sont devenus particulièrement audacieux. Ils ont désormais commencé à mener des attaques dans la province de Liaobei et s’aventurent même jusqu’aux frontières de Jilin, où ils ont fait dérailler un train local et dépouillé ses passagers, parmi lesquels se trouvaient plusieurs citoyens japonais. Les autorités locales se sont excusées abondamment pour cet incident embarrassant, et des gardes supplémentaires ont été postés sur les trains à proximité, mais le consulat japonais a déjà exigé de notre gouvernement une indemnisation pour les biens perdus.\n\nLaisser cette situation perdurer serait une honte nationale."
 fengtian_events.119.d_jap:0 "Encouragés par notre incapacité à les arrêter, les Honghuzi sont devenus particulièrement audacieux. Ils ont désormais commencé à mener des attaques dans la province de Liaobei et s’aventurent même jusqu’aux frontières de Jilin, où ils ont fait dérailler un train local et dépouillé ses passagers, parmi lesquels se trouvaient plusieurs citoyens japonais. Les autorités locales se sont excusées abondamment pour cet incident embarrassant, et des gardes supplémentaires ont été postés sur les trains à proximité, mais le consulat japonais a déjà exigé de notre gouvernement une indemnisation pour les biens perdus.\n\nLaisser cette situation perdurer ou solliciter une nouvelle fois l'aide du Japon ne serait rien de moins qu'un déshonneur national."
 fengtian_events.119.a:0 "La troisième fois, c'est la bonne !"
 fengtian_events.119.b:0 "Demandez de l'aide aux Japonais."
 fengtian_events.119.c:0 "Demandez de l'aide aux Japonais, encore !"

 fengtian_events.124.t:0 "Assassinat à Shenyang !"
 fengtian_events.124.d:0 "Alors qu'il se rendait aux bureaux du gouvernement, un membre de la Clique des Communications a été abattu en public par ce qui semble être un partisan [QIE.GetAdjective], recruté parmi la population mandchoue du Nord-Est ! [QIE.GetNameDefCap] est connu pour avoir déjà recruté des espions et des assassins, mais certaines rumeurs suggèrent que cet assassin aurait plutôt été engagé par des membres de l'Association Concordia, en conflit avec les barons des chemins de fer et du télégraphe de la Clique des Communications pour le contrôle des infrastructures du pays."
 fengtian_events.124.a:0 "Une perte terrible."

 fengtian_events.125.t:0 "Profits Records de la Mantetsu"
 fengtian_events.125.d:0 "La Compagnie des Chemins de fer de Mandchourie du Sud, communément appelée "Mantetsu", domine depuis longtemps de vastes secteurs de l'économie du Fengtian et constitue, de ce fait, le principal moyen d'influence du Japon sur notre gouvernement. Bien que cette influence soit malvenue, elle apporte des capitaux et une technologie indispensables, sans lesquels le Grand Maréchal ne pourrait espérer reconquérir la Chine.\n\nLa Compagnie a annoncé aujourd’hui des bénéfices records, dont une grande partie revient au gouvernement japonais sous forme de recettes fiscales."
 fengtian_events.125.a:0 "Est ce un mal nécessaire ?"

 fengtian_events.126.t:0 "Les Faux Dollars se Multiplient"
 fengtian_events.126.d:0 "Afin de réaliser des économies, la version du dollar du Fengtian actuellement en circulation est identique à celle émise à l'origine, car le matériel d'impression de qualité coûte extrêmement cher. Cela semble toutefois avoir rendu la monnaie vulnérable à la contrefaçon, et on estime déjà que des milliers de faux dollars du Fengtian sont en circulation."
 fengtian_events.126.a:0 "On finira par les attraper."

 fengtian_events.128.t:0 "La Proclamation de Zhang"
 fengtian_events.128.d:0 "Le Grand Maréchal Zhang, du Gouvernement du Fengtian, a proclamé que, d’ici un an, son pays lancerait sa Guerre de Reconquête nationale afin de reprendre le Sud et de réunifier le pays sous sa direction. Bien sûr, notre aide a joué un rôle considérable dans l’ascension du Fengtian jusqu’à sa position actuelle, et certains ministres ont déjà suggéré que nous pourrions nous engager en privé à nous joindre à leur guerre.\n\nCela serait dans notre intérêt, car le Fengtian est le meilleur moyen de repousser l'influence allemande hors de Chine, mais en même temps, il serait peut-être préférable de limiter leurs ambitions, et nos ressources ne sont pas illimitées. Le Grand Maréchal ira bien sûr de l'avant quoi qu'il arrive. Sa légitimité en dépend."
 fengtian_events.128.a:0 "Soutenez le Fengtian."
 fengtian_events.128.b:0 "Refusez de soutenir le Fengtian."

 fengtian_events.129.t:0 "La Guerre Descend du Nord"
 fengtian_events.129.d:0 "Aujourd’hui, le grand maréchal Zhang, du Gouvernement du Fengtian, a déclaré qu’il lancerait d’ici un an sa "Guerre de Reconquête nationale" et qu’il mènerait une offensive vers le sud contre nous. Qu’il bénéficie ou non du soutien du Japon, une grande lutte nous attend, car au final, il ne peut y avoir qu’une seule Chine."
 fengtian_events.129.a:0 "Ils ne passeront pas."

 fengtian_events.130.t:0 "Le Japon Confirme son Soutien"
 fengtian_events.130.d:0 "Le gouvernement japonais nous a fait savoir en privé qu'il nous apporterait son aide alors que nous nous dirigeons vers le sud !"
 fengtian_events.130.a:0 "Excellent."

 fengtian_events.132.t:0 "Le Défilé de Tiananmen"
 fengtian_events.132.d:0 "La capitale étant désormais sécurisée et sous notre contrôle, nous avons atteint le premier, et peut-être le plus important, objectif sur le long chemin menant à la reconquête nationale. Bientôt, le monde ne pourra plus ignorer notre droit d’être reconnus comme le seul gouvernement légitime ! Malheureusement, nos alliés japonais ont également pris part aux combats autour de Beijing et ont déjà commencé à organiser un défilé de la victoire sur la place Tiananmen. Le commandant local de l'AIJ nous a adressé une invitation, mais avec un retard qui semble bien trop délibéré, et nos troupes vont devoir se dépêcher de se préparer.\n\nCertains de nos généraux suggèrent déjà que nous empêchions les Japonais de tenir leur défilé ou que nous organisions le nôtre plus tard, car Beijing est finalement notre capitale et c'est notre jour de gloire. D'autres membres plus diplomates du Cabinet et de l'Assemblée proposent que nous acceptions l'invitation, notamment les membres de l'Association Concordia."
 fengtian_events.132.d_mantetsu:0 "La capitale étant désormais sécurisée et sous notre contrôle, nous avons atteint le premier, et peut-être le plus important, objectif sur le long chemin menant à la reconquête nationale. Bientôt, le monde ne pourra plus ignorer notre droit d’être reconnus comme le seul gouvernement légitime ! Malheureusement, nos alliés japonais ont également pris part aux combats autour de Beijing et ont déjà commencé à organiser un défilé de la victoire sur la place Tiananmen. Le commandant local de l'AIJ nous a adressé une invitation, mais avec un retard qui semble bien trop délibéré, et nos troupes vont devoir se dépêcher de se préparer. L'Association Concordia, qui exerce une grande influence sur notre gouvernement, rend difficile l'adoption d'une position intransigeante, même si nous pourrions probablement convaincre nos commandants locaux de snober l'événement. Si cela venait à se produire, les Japonais seraient presque certainement furieux."
 fengtian_events.132.a:0 "C'est notre jour !"
 fengtian_events.132.b:0 "Nous marcherons côte à côte !"
 fengtian_events.132.c:0 "Nous ne participerons pas !"

 fengtian_events.133.t:0 "Insolence Chinoise à Tiananmen !"
 fengtian_events.133.d:0 "La capitale chinoise étant désormais sous notre contrôle, nous avons aidé le Gouvernement du Fengtian à atteindre le premier, et peut-être le plus important, objectif de son long chemin vers la reconquête nationale. Le commandant local de l'AIJ qui a mené l'assaut sur la capitale a déjà commencé à organiser un défilé de la victoire et a aimablement invité les divisions du Fengtian situées à proximité à y participer. Cependant, dans un élan d'impertinence sans précédent, le Gouvernement du Fengtian a non seulement refusé notre offre, mais a aussi activement entravé notre propre défilé, affirmant qu'il s'agissait de "leur jour de gloire" et non du nôtre !\n\nNous pourrions publier immédiatement un communiqué annonçant la suspension de l'aide au Fengtian, mais ils restent nos alliés, et la guerre se poursuit sans relâche."
 fengtian_events.133.a:0 "Punissez cette insolence immédiatement !"
 fengtian_events.133.b:0 "La punition devra attendre."
 fengtian_events.133.c:0 "Ainsi soit-il."

 fengtian_events.134.t:0 "Insolence Chinoise à Tiananmen !"
 fengtian_events.134.d:0 "La capitale chinoise étant désormais sous notre contrôle, nous avons aidé le Gouvernement du Fengtian à atteindre le premier, et peut-être le plus important, objectif de son long chemin vers la reconquête nationale. Le commandant local de l’AIJ qui a mené l’assaut sur la capitale a déjà commencé à organiser un défilé de la victoire et a aimablement invité les divisions du Fengtian situées à proximité à y participer. Cependant, dans un élan d’impertinence sans précédent, le Gouvernement du Fengtian a refusé notre offre et organisera son propre défilé ! Certes, nos propres troupes resplendissantes les ridiculiseront, mais leurs actions mériteraient peut-être une réponse plus sérieuse."
 fengtian_events.134.a:0 "Punissez cette impertinence immédiatement !"
 fengtian_events.134.b:0 "La punition devra attendre."
 fengtian_events.134.c:0 "Ainsi soit-il."

 fengtian_events.135.t:0 "La Colère Contenue du Japon"
 fengtian_events.135.d:0 "En réaction à l'humiliation infligée à leurs forces lors de l'occupation de Beijing, le Gouvernement japonais a temporairement suspendu ses différentes formes d'aide à notre pays. Il semble que la fierté japonaise soit facilement blessée et que les rancunes ne s'oublient pas de sitôt."
 fengtian_events.135.a:0 "Dommage."
 fengtian_events.135.b:0 "Nous aussi, nous pouvons garder rancune : expulsez leur mission militaire !"

 fengtian_events.136.t.annexed:0 "L'Effondrement du Gouvernement du Fengtian"
 fengtian_events.136.t.puppeted:0 "La Trahison du Fengtian"
 fengtian_events.136.d.annexed:0 "Tout au long de la journée, des télégrammes urgents et des appels affolés provenant d'hommes d'affaires de la Mantetsu ont afflué à notre quartier général militaire. Le régime de [FNG.GetLeader], dans le nord-ouest de la Mandchourie, semble être tombé aux mains de l'ennemi [716.owner.GetName]. En conséquence, la Mandchourie, source des plus grands profits et des ressources les plus importantes du Japon, a été perdue d'un seul coup. Après une succession de campagnes désastreuses, l'armée de la Clique du Fengtian, autrefois puissante, s'est complètement effondrée, ses soldats et ses officiers désertant en masse pour rejoindre le gouvernement rival audacieux de [716.owner.GetName]. On ignore où il se trouve, mais selon certaines rumeurs, [FNG.GetLeader] se serait soit donné la mort, soit enfui pour se cacher.\n\nAvec la perte de la grande ville de Shenyang et Port-Arthur désormais menacé par [716.owner.GetName], notre haut commandement militaire et les dirigeants de la Mantetsu réclament désormais une intervention militaire directe pour protéger les intérêts et les citoyens japonais du chaos et du désordre. Néanmoins, certains membres de notre gouvernement nous appellent à faire preuve de retenue et affirment que la guerre en Chine n'est pas notre priorité pour l'instant. "
 fengtian_events.136.d.puppeted:0 "Tout au long de la journée, des télégrammes urgents et des appels affolés provenant d'hommes d'affaires de la Mantetsu ont afflué à notre quartier général militaire. Le régime de [FNG.GetLeader], dans le nord-ouest de la Mandchourie, a pris une décision surprenante et scandaleuse en remplaçant les drapeaux de la Clique du Fengtian par ceux de [FROM.overlord.GetNameDef]. Ce faisant, la Clique du Fengtian reconnaît le gouvernement national de [FROM.overlord.GetNameDef] et a ainsi renoncé à ses revendications sur la République de Chine. À la suite de cette déclaration, [FNG.GetLeader] a annoncé que les liens entre le Fengtian et le Japon seraient désormais rompus et qu'ils ne soutiendraient plus les intérêts du Japon en Chine.\n\nPendant des années, [FNG.GetNameDef] n'a survécu que grâce à notre aide militaire et économique à leur province arriérée. Sous la domination du Japon, la Mandchourie est devenue un joyau de l'Orient – une province que toute l'Asie admire. Nous ne pouvons pas risquer l'humiliation et la honte que cette trahison nous causera. Notre haut commandement militaire et les chefs d'entreprise de la Mantetsu réclament désormais une intervention militaire directe pour protéger l'honneur du Japon et remettre à sa place la clique rebelle du Fengtian. Néanmoins, certains membres de notre gouvernement nous appellent à la retenue et affirment que la guerre en Chine n'est pas notre priorité pour l'instant."
 fengtian_events.136.a:0 "Nous ne pouvons pas prendre ce risque."
 fengtian_events.136.b:0 "En avant vers la Mandchourie !"

 fengtian_events.138.t:0 "Fondation de l'Association Cinématographique de Jilin"
 fengtian_events.138.d:0 "Réunissant le personnel de sa division photographique, des réalisateurs japonais et des acteurs locaux, la Mantetsu a entamé la création d'un studio de cinéma à Jilin qui, selon ses dires, "démontrera ce que la Chine peut accomplir grâce à la modernité, à travers l'objectif d'une caméra, dans un style chinois unique". En privé, le président de la Mantetsu a laissé entendre que le studio servirait également à diffuser subtilement des messages anti-[QIE.GetAdjective], ce qui a amené certains proches conseillers du Grand Maréchal à se demander ce qui pourrait encore être subtilement inséré.\n\nLe gouvernement pourrait toujours ordonner au gouverneur de Jilin de refuser à la Mantetsu l'autorisation de construire, mais l'Association cinématographique se contenterait probablement de déménager vers le sud, à [745.GetCapitalVictoryPointName], où nous n'aurions alors plus aucune influence sur elle."
 fengtian_events.138.a:0 "Notre but est la modernité !"
 fengtian_events.138.b:0 "Pas sur notre sol."

 fengtian_events.139.t:0 "Les cinq couleurs"
 fengtian_events.139.d_1:0 "La Jilin Film Association a publié aujourd'hui son premier long métrage, une vaste étude ethnographique détaillant les diverses populations du Nord-Est, des pins enneigés du Heilongjiang aux rives fertiles du cours inférieur du fleuve Liao, en épousant les valeurs de la politique nationale "Cinq races sous une seule Union"\nGrâce à l'aide du gouvernement, l'association a pu accéder facilement à un certain nombre d'endroits éloignés afin de filmer et de mieux diffuser son message d'unité et d'harmonie, bien que certaines critiques aient été émises sur sa couverture des Coréens et des Japonais, dont beaucoup cohabitent également dans le Nord-Est, mais ne font pas officiellement partie des "cinq races" désignées dans le drapeau national. Dans l'ensemble, et malgré sa projection relativement restreinte en raison du nombre limité de salles, le film a été considéré comme un grand succès"
 fengtian_events.139.d_2:0 "L'association du film [745.GetCapitalVictoryPointName] a publié aujourd'hui son premier long métrage, un vaste panorama ethnographique des diverses populations du Nord-Est, des pins enneigés du Heilongjiang aux rives fertiles du cours inférieur du fleuve Liao, qui défend les valeurs de la politique nationale "Cinq races sous une seule Union"\nBien que ses messages d'unité et d'harmonie raciales soient bons en eux-mêmes, le film a été critiqué pour avoir passé presque la moitié de son temps de projection à se concentrer sur les Japonais et les Coréens, dont beaucoup cohabitent dans le Nord-Est, mais ne font pas officiellement partie des "Cinq races" désignées dans le drapeau national. Malgré cela, et malgré sa projection relativement limitée en raison du nombre restreint de salles, le film a été considéré comme un succès"
 fengtian_events.139.a:0 "De petits succès ouvrent la voie à la victoire !"
 fengtian_events.139.b:0 "De petits succès ouvrent la voie à la victoire !"

 fengtian_events.140.t_1:0 "La chanson de l'orchidée blanche"
 fengtian_events.140.t_2:0 "Les poux font peur"
 fengtian_events.140.d_1:0 "Depuis sa première sortie, la Mantetsu Film Association a sorti plusieurs autres films, chacun ayant attiré une certaine attention et suivant généralement les accords convenus lors de sa fondation. Le dernier film, "Song of the White Orchid", a cependant attiré une attention particulière. Il s'agit d'un enchevêtrement romantique entre un Japonais (Kazuo Hasegawa) et une Chinoise (Li Xianglan) où Li quitte son amant à la suite d'un malentendu et rejoint un groupe de bandits mandchous qui complotent pour saboter le chemin de fer de Mandchourie du Sud. Elle apprend par la suite que ce malentendu a été délibérément arrangé par des espions [QIE.GetAdjective], renouvelle sa foi en Hasegawa et met le complot à mal. Les deux protagonistes semblent être des allégories claires pour leurs pays respectifs, et des inquiétudes ont été soulevées, mais la valeur de propagande anti [QIE.GetAdjective] est significative, et l'air du thème est tellement accrocheur..."
 fengtian_events.140.d_2:0 "Depuis sa première sortie, l'Association du film [745.GetCapitalVictoryPointName] a produit plusieurs autres films, chacun ayant attiré une certaine attention et suivant généralement les accords convenus lors de sa fondation. Le dernier film, "Les poux sont effrayants", a cependant attiré une attention notable. Il présente une leçon scientifique et hygiénique aux spectateurs grâce à une combinaison de microscopie et de poux animés "scandaleux" en stop-motion qui, selon certains, semblent "sauter de l'écran" Outre le fait que les spectateurs ont peur pour la première fois de sortir du théâtre, le message général est avilissant, jouant sur les suppositions japonaises selon lesquelles les Chinois sont, par habitude, sales et infestés de poux ; la réception étant par conséquent assez négative, et amenant certains à se demander si cela aurait pu être évité si le gouvernement avait joué un rôle plus actif dans la production"
 fengtian_events.140.a:0 "Bien."
 fengtian_events.140.b:0 "Je n'ai pas peur des poux !"

 fengtian_events.141.t:0 "Honghuzi écrasé !"
 fengtian_events.141.d:0 "Après une longue chasse, les Honghuzi ont été traqués au pied d'une montagne que les habitants du coin appellent "Hushan" ou "Montagne du Tigre". Les bandits se sont battus jusqu'à la mort, résistant à l'assaut de plusieurs milliers de soldats réguliers pendant près de trois heures ; des pentes raides, des chemins étroits et des cavernes cachées ont aidé à leur défense.\n\nUn certain nombre de prisonniers des villages environnants ont été libérés, ainsi qu'une importante somme en objets de valeur. Le camp a ensuite été incendié, créant un spectacle visible à des kilomètres à la ronde."
 fengtian_events.141.a:0 "Ainsi à tous les bandits !"

 fengtian_events.1411.t:0 "Le Prince Kan'in Kotohito va Visiter le Nord-Est"
 fengtian_events.1411.d:0 "Le consulat japonais à Shenyang a remis au gouvernement des documents détaillant l'arrivée prévue du prince Kan'in Kotohito, grand-oncle de l'Empereur régnant, qui effectuera une tournée dans le Nord-Est plus tard cette année. Il s'est déjà rendu en Mandchourie par le passé, et ce voyage sera très certainement autant une inspection qu'une opération de relations publiques. On sait qu'il s'intéresse tout particulièrement à nos projets de reconquête du reste de la Chine.\n\nLa date exacte de son arrivée n'a pas été divulguée pour des raisons de sécurité, et les inquiétudes japonaises ne sont pas infondées. Il est de notoriété publique qu'il existe à Shenyang et dans toute la région des éléments extrémistes qui pourraient vouloir nuire au prince.\n\nTout doit être mis en œuvre pour garantir sa sécurité et sa satisfaction pendant sa visite."
 fengtian_events.1411.a:9 "Nous devons tout préparer."

 fengtian_events.142.t:0 "Le Prince Kan'in Arrive"
 fengtian_events.142.d:0 "Le consulat japonais à Shenyang a informé le gouvernement de l'arrivée du prince Kan'in, qui a récemment débarqué du cuirassé Nagato dans le port de [745.GetCapitalVictoryPointName]. Conformément à son rang, cet événement est célébré avec tout le faste et les honneurs d'une visite d'État. Le prince se rendra ensuite vers le nord, à Shenyang, où il sera reçu officiellement par le Grand Maréchal, avant d'entreprendre une tournée à travers le pays.\n\nDivers ministres et généraux ont assuré de la sécurité du prince, car il serait politiquement catastrophique qu'un membre de la famille impériale subisse le moindre préjudice."
 fengtian_events.142.d_security:0 "Le consulat japonais à Shenyang a informé le gouvernement de l'arrivée du prince Kan'in, qui a récemment débarqué du cuirassé Nagato dans le port de [745.GetCapitalVictoryPointName]. Conformément à son rang, cet événement est célébré avec tout le faste et les honneurs d'une visite d'État. Le prince se rendra ensuite vers le nord, à Shenyang, où il sera reçu officiellement par le Grand Maréchal, avant d'entreprendre une tournée à travers le pays.\n\nPlusieurs ministres et généraux ont donné des assurances quant à la sécurité du prince, car il serait politiquement catastrophique qu'un membre de la famille impériale subisse le moindre préjudice ; toutefois, l'absence de certaines mesures de sécurité les laisse, en privé, inquiets."
 fengtian_events.142.d_school:0 "Le consulat japonais à Shenyang a informé le gouvernement de l'arrivée du prince Kan'in, qui a récemment débarqué du cuirassé Nagato dans le port de [745.GetCapitalVictoryPointName]. Conformément à son rang, cet événement est célébré avec tout le faste et les honneurs d'une visite d'État. Le prince se rendra ensuite vers le nord, à Shenyang, où il sera reçu officiellement par le Grand Maréchal, avant d'entreprendre une tournée à travers le pays. Il semble déjà avoir été impressionné par les élèves venus de plusieurs grandes écoles de la Mantetsu, qui agitaient le Hinomaru et chantaient l'hymne national japonais pour lui souhaiter la bienvenue.\n\nDivers ministres et généraux ont assuré de la sécurité du prince, car il serait politiquement catastrophique qu'un membre de la famille impériale subisse le moindre préjudice."
 fengtian_events.142.d_school_and_security:0 "Le consulat japonais à Shenyang a informé le gouvernement de l'arrivée du prince Kan'in, qui a récemment débarqué du cuirassé Nagato dans le port de [745.GetCapitalVictoryPointName]. Conformément à son rang, cet événement est célébré avec tout le faste et les honneurs d'une visite d'État. Le prince se rendra ensuite vers le nord, à Shenyang, où il sera reçu officiellement par le Grand Maréchal, avant d'entreprendre une tournée à travers le pays.\n\nPlusieurs ministres et généraux ont donné des assurances quant à la sécurité du prince, car il serait politiquement catastrophique qu'un membre de la famille impériale subisse le moindre préjudice ; toutefois, l'absence de certaines mesures de sécurité les laisse, en privé, inquiets."
 fengtian_events.142.a:0 "Bienvenue, Prince Kan'in !"

 fengtian_events.143.t:0 "Dans l'œil du tigre"
 fengtian_events.143.d:0 "Après son arrivée à la résidence du Grand Maréchal à Shenyang, le Prince a été reçu cérémonieusement dans la Salle du Tigre par des membres éminents de l'Assemblée et [Root.GetLeader] lui-même, avant de visiter l'ancien Palais de la dynastie Qing, qui a depuis été converti pour être utilisé par le gouvernement. Il a également visité l'Arsenal de Shenyang dans la banlieue nord-ouest de la ville. La soirée s'est terminée par un élégant dîner d'État à la chinoise, au cours duquel un toast a été porté aux relations particulières entre la Chine et le Japon.\n\nKotohito prévoit de quitter Shenyang dans quelques jours pour une inspection des défenses au sud, mais les rumeurs vont bon train sur le fait qu'on pourrait tenter de le tuer."
 fengtian_events.143.d_embarrassment:0 "Après son arrivée à la résidence du Grand Maréchal à Shenyang, le prince a été reçu en grande pompe dans la Salle du Tigre par d'éminents membres de l'Assemblée et par [Root.GetLeader] en personne, avant de visiter l'ancien palais de la dynastie Qing, qui a depuis été réaménagé pour être utilisé par le gouvernement. Il a également pris le temps de visiter l'Arsenal de Shenyang, situé dans la banlieue nord-ouest de la ville. La soirée s'est terminée par un élégant dîner d'État de style chinois, au cours duquel un toast a été porté à la relation privilégiée entre la Chine et le Japon.\n\nMalheureusement, Kotohito a remarqué le mauvais état de l'équipement de nos soldats et a fait part de ses observations, ce qui a causé un embarras considérable. Le prince prévoit de quitter Shenyang dans quelques jours pour inspecter les défenses au sud, mais des rumeurs circulent selon lesquelles un attentat pourrait être perpétré contre lui."
 fengtian_events.143.d_arsenal:0 "Après son arrivée à la résidence du Grand Maréchal à Shenyang, le Prince a été reçu cérémonieusement dans la Salle du Tigre par des membres éminents de l'Assemblée et [Root.GetLeader] lui-même, avant de visiter l'ancien Palais de la dynastie Qing, qui a depuis été converti pour être utilisé par le gouvernement. Il a également visité l'Arsenal de Shenyang, dans la banlieue nord-ouest de la ville, et a semblé particulièrement impressionné par ses récents agrandissements. La soirée s'est terminée par un élégant dîner d'État à la chinoise, au cours duquel un toast a été porté à la relation particulière entre la Chine et le Japon.\n\nKotohito prévoit de quitter Shenyang dans quelques jours pour une inspection des défenses au sud, mais les rumeurs vont bon train sur le fait qu'on pourrait tenter de le tuer."
 fengtian_events.143.d_evac:0 "Après son arrivée à la résidence du Grand Maréchal à Shenyang, le Prince a été reçu cérémonieusement dans la Salle du Tigre par des membres éminents de l'Assemblée et [Root.GetLeader] lui-même, avant de visiter l'ancien Palais de la dynastie Qing, qui a depuis été converti pour être utilisé par le gouvernement. Il a également visité l'Arsenal de Shenyang, dans la banlieue nord-ouest de la ville, et a semblé particulièrement impressionné par ses récents agrandissements. La soirée s'est terminée par un élégant dîner d'État à la chinoise, au cours duquel un toast a été porté à la relation particulière entre la Chine et le Japon.\n\nEn raison du déclenchement de la guerre, le Prince a décidé d'écourter sa visite et partira pour [745.GetCapitalVictoryPointName] demain matin."
 fengtian_events.143.a:0 "Un grand honneur."
 fengtian_events.143.b:0 "La visite doit être annulée pour sa sécurité."
 fengtian_events.143.c:0 "Adieu au prince Kan'in !"

 fengtian_events.144.t:0 "Une inspection du front sud"
 fengtian_events.144.d:0 "Dans le cadre d'une inspection générale de l'étroite zone démilitarisée séparant [QIE.GetAdjective] et le territoire fengtien, le Prince Kan'in a été accueilli par un exercice militaire de précision aux forts Wanjiazhen, construits en 1929 pour soutenir le fonctionnement de plusieurs trains blindés le long de la ligne de Jingfeng. Malheureusement, au cours des années qui ont suivi, le temps et le mauvais entretien ont fait des ravages. Kotohito n'a manifestement pas été impressionné par ce qu'il a vu, utilisant sa grande expérience de soldat pour critiquer le mauvais état de nos défenses. Au lieu de nouvelles inspections, le Prince séjournera à l'hôtel Yamato récemment terminé à Jinzhou, avant de repartir vers le nord à Harbin"
 fengtian_events.144.d_hotel:0 "Dans le cadre d'une inspection générale de l'étroite zone démilitarisée séparant [QIE.GetAdjective] et le territoire de Fengtian, le Prince Kan'in a été accueilli par un exercice militaire de précision au Wanjiazhen Forts, construit en 1929 pour soutenir le fonctionnement de plusieurs trains blindés le long de la ligne de Jingfeng. Malheureusement, au cours des années qui ont suivi, le temps et le mauvais entretien ont fait des ravages. Kotohito n'a manifestement pas été impressionné par ce qu'il a vu, utilisant sa grande expérience de soldat pour critiquer le mauvais état de nos défenses. Pour ajouter l'insulte à la blessure, il a été consterné de constater que l'hôtel Yamato à Jinzhou a connu des retards de construction considérables et ne pourra pas le recevoir. Au lieu de cela, le Prince Impérial a été réduit à passer plusieurs nuits dans un vieil hôtel chinois non loin du centre ville. Une fois ses inspections terminées, il fera escale à Harbin dans le Nord."
 fengtian_events.144.d_modern_defenses:0 "Dans le cadre d'une inspection générale de l'étroite zone démilitarisée séparant [QIE.GetAdjective] du territoire fengtien, le Prince Kan'in a été accueilli par un exercice militaire de précision au Wanjiazhen Forts, construit en 1929 pour soutenir l'exploitation de plusieurs trains blindés le long de la ligne de Jingfeng. Impressionné par les récents ajouts aux Forts, et par les autres fortifications au nord, parallèles à la Grande Muraille, Kotohito a également été surpris par le professionnalisme de nos soldats. Étant donné le rang considérable de notre estimé visiteur dans l'armée japonaise, il semble probable que le Japon nous considère comme un allié plus fiable à l'avenir. Au lieu de nouvelles inspections, le Prince séjournera à l'hôtel Yamato récemment achevé à Jinzhou, avant de se rendre à nouveau à Harbin au nord."
 fengtian_events.144.d_hotel_and_defenses:0 "Dans le cadre d'une inspection générale de l'étroite zone démilitarisée séparant [QIE.GetAdjective] du territoire fengtien, le Prince Kan'in a été accueilli par un exercice militaire de précision au Wanjiazhen Forts, construit en 1929 pour soutenir le fonctionnement de plusieurs trains blindés le long de la ligne de Jingfeng. Impressionné par les récents ajouts aux Forts, et par d'autres fortifications au nord, parallèles à la Grande Muraille, Kotohito a également été surpris par le professionnalisme de nos soldats. Sa bonne humeur s'est toutefois aigrie en découvrant que l'hôtel Yamato à Jinzhou a subi des retards de construction considérables et ne pourra pas le recevoir. Au lieu de cela, le Prince Impérial a été réduit à passer plusieurs nuits dans un vieil hôtel chinois non loin du centre ville. Une fois ses inspections terminées, il fera escale à Harbin dans le Nord."
 fengtian_events.144.a:0 "Les défenses de Fengtian sont solides !"
 fengtian_events.144.b:0 "Il est plus sûr de terminer la visite ici."

 fengtian_events.145.t:0 "Une excursion industrielle"
 fengtian_events.145.d:0 "Avant de partir pour Harbin, le prince Kan'in a surpris son entourage en rompant le calendrier établi pour examiner l'industrie naissante de Jinzhou, un produit direct de la nouvelle zone industrielle spéciale qui s'y trouve. Intrigué par la croissance qu'il avait déjà vue lors du voyage en train à Anshan, Kotohito fut encore plus impressionné par le rythme rapide de l'industrialisation présente ici, commentant qu'une grande partie de la zone environnante n'avait été qu'un champ nu lors de sa dernière visite. Espérons que cette expérience laissera une impression positive durable."
 fengtian_events.145.a:0 "L'avenir, c'est maintenant !"

 fengtian_events.146.t:0 "Les merveilles de Harbin"
 fengtian_events.146.d:0 "Le prince Kan'in est arrivé à Harbin, capitale culturelle du Nord-Est et centre d'innovation, à peine quatre heures et demie après son départ grâce à la vitesse stupéfiante de "l'Asia Express" de Mantetsu, l'une des locomotives les plus rapides au monde. Bien qu'il ait été au courant de l'existence du train, peu de choses préparent même la royauté à la vitesse et au luxe de cette merveille du monde.\n\nLe Prince a rapidement fait la transition pour visiter la ville, y compris le quartier russe, et a reçu des rapports des garnisons chinoises et japonaises le long de la frontière nord. Son départ de la ville dans quelques jours marquera la fin fonctionnelle de la visite, bien qu'il reste l'invité de la nation jusqu'à ce que son train repasse dans le territoire loué de Kwantung."
 fengtian_events.146.d_electrical_speech:0 "Le Prince Kan'in est arrivé à Harbin, capitale culturelle du Nord-Est et centre d'innovation, à peine quatre heures et demie après son départ grâce à la vitesse stupéfiante de "l'Asia Express" de Mantetsu, l'une des locomotives les plus rapides au monde. Bien qu'il ait été au courant de l'existence du train, peu de choses préparent même la royauté à la vitesse et au luxe de cette merveille du monde.\n\nLe Prince a rapidement fait la transition pour visiter la ville, y compris le quartier russe, et a reçu des rapports des garnisons chinoises et japonaises le long de la frontière nord. Peu après, il a déclaré son admiration pour ce que nous avons accompli ces dernières années, ainsi que son intention d'utiliser les lignes de communication récemment installées pour transmettre un discours par la radio japonaise en temps réel.\n\nLe Prince nous a assuré que le contenu ne serait que des éloges, et bien que la plupart des membres du gouvernement s'attendent à l'habituelle autosatisfaction japonaise, c'est une excellente occasion d'améliorer notre position nationale.\n\nPour le meilleur ou pour le pire, le départ du Prince de la ville dans quelques jours marquera une fin fonctionnelle à la visite, bien qu'il reste l'invité de la nation jusqu'à ce que son train passe de nouveau dans le territoire loué de Kwantung."
 fengtian_events.146.d_speech:0 "Le Prince Kan'in est arrivé à Harbin, capitale culturelle du Nord-Est et centre d'innovation, à peine quatre heures et demie après son départ grâce à la vitesse stupéfiante de "l'Asia Express" de Mantetsu, l'une des locomotives les plus rapides au monde. Bien qu'il ait été au courant de l'existence du train, peu de choses préparent même la royauté à la vitesse et au luxe de cette merveille du monde.\n\nLe Prince a rapidement fait la transition pour visiter la ville, y compris le quartier russe, et a reçu des rapports des garnisons chinoises et japonaises le long de la frontière nord. Peu après, il a déclaré son admiration pour ce que nous avons accompli ces dernières années, ainsi que son intention de prononcer un discours demain matin devant l'emblématique cathédrale Sophie de la ville. Alors que la plupart des membres du gouvernement s'attendent à l'habituelle autosatisfaction japonaise, c'est une excellente occasion d'améliorer notre position nationale.\n\nPour le meilleur ou pour le pire, le départ du Prince de la ville dans quelques jours marquera une fin fonctionnelle à la visite, bien qu'il reste l'invité de la nation jusqu'à ce que son train repasse dans le territoire loué de Kwantung."
 fengtian_events.146.a:0 "Harbin est le joyau multiculturel du Nord-Est !"

 fengtian_events.147.t:0 "Le prince Kan'in retourne au Japon"
 fengtian_events.147.d:0 "Ses fonctions ici achevées, le prince Kan'in Kotohito a quitté [745.GetCapitalVictoryPointName] en toute sécurité pour les îles de la Maison. Toute impression forte pourrait avoir un impact durable sur nos relations avec le Japon"
 fengtian_events.147.a:0 "J'espère qu'elles sont positives."

 fengtian_events.1477.t:0 "Une surprise généreuse !"
 fengtian_events.1477.d:0 "Le Prince Kan'in Kotohito, apparemment très impressionné par sa visite dans le Nord-Est, semble avoir tiré plusieurs ficelles à Tokyo. Maintenant, une division de chars légers de pointe attend à [745.GetCapitalVictoryPointName] !"
 fengtian_events.1477.a:9 "It will be part of an offensive to remember."

 fengtian_events.148.t:0 "Le Prince Kan'in Empoisonné"
 fengtian_events.148.d:0 "Après s'être plaint de maux de tête et de vertiges à la suite du dîner d'État, le prince Kan'in s'est effondré juste devant sa chambre, dans la résidence du Grand Maréchal. Grâce aux soins prodigués par un hôpital voisin appartenant à la Mantetsu, il semble en passe de se rétablir complètement. Cependant, les analyses sanguines ne laissent guère de doute sur le fait qu'il s'agissait d'une tentative d'assassinat.\n\nLa faille dans la sécurité, ainsi que l'événement lui-même, constituent un profond embarras national et une grave insulte à la famille impériale japonaise. De graves répercussions sont tout à fait possibles."
 fengtian_events.148.a:0 "Comment cela a-t-il pu arriver ?"

 fengtian_events.149.t:0 "On a Tiré sur le Prince Kan'in !"
 fengtian_events.149.d:0 "Au cours de son inspection d'un avant-poste situé au nord du col de Shanhai, un soldat rebelle a soudainement ouvert le feu sur le prince Kan'in, tuant plusieurs de ses gardes avant d'être maîtrisé. Heureusement, le prince n'a subi que des blessures relativement légères, mais la faille dans la sécurité qui a rendu cet incident possible, ainsi que l'événement lui-même, constituent un profond embarras national et une grave insulte à la famille impériale japonaise.\n\nL'enquête menée jusqu'à présent semble indiquer que le soldat faisait partie d'une faction extrémiste au sein de la Clique de Zhang, et la réponse du Japon pourrait être sévère."
 fengtian_events.149.a:0 "Comment cela a-t-il pu arriver ?"

 fengtian_events.150.t:0 "Le Train du Prince Attaqué à la Bombe !"
 fengtian_events.150.d:0 "Quelques minutes seulement après avoir quitté la gare de Huanggutun à Shenyang, le train du prince a été secoué par une violente explosion qui a détruit ses wagons arrière. Heureusement, un changement de dernière minute avait conduit à déplacer son wagon à l'avant du train, ce qui lui a permis de s'en sortir avec seulement quelques blessures légères. La faille dans la sécurité à l'origine de cet incident, ainsi que l'événement lui-même, constituent un profond embarras national et une grave insulte à la famille impériale japonaise.\n\nLes enquêtes menées jusqu'à présent semblent indiquer que des membres subalternes de la Clique des Communications pourraient être responsables, et la réponse du Japon pourrait être sévère."
 fengtian_events.150.a:0 "Comment cela a-t-il pu arriver ?"

 fengtian_events.1500.t:0 "La Visite du Prince est Écourtée"
 fengtian_events.1500.d_1:0 "En raison du déclenchement de la guerre, le Prince a décidé de mettre fin prématurément à sa visite et partira demain matin pour [745.GetCapitalVictoryPointName]."
 fengtian_events.1500.d_2:0 "En raison du déclenchement de la guerre, le prince Kan'in Kotohito a décidé d'annuler sa visite dans le Nord-Est. C'est un malheur, mais il va de soi que la guerre doit primer sur tout le reste."
 fengtian_events.1500.a:0 "En ce cas..."

 fengtian_events.167.t:0 "Ma Zhanshan et la Clique du Heilongjiang Proposent de Faire Défection !"
 fengtian_events.167.d:9 "Warlord cliques are hardly the most concrete or coherent bodies at the best of times, with such a statement being evident even within [ROOT.GetLeader]'s own ranks. However, serious is the common case of defection, or betrayal, from one clique to another. Usually such events are retained merely for when one Clique's epoch passes onto another's, such as when Anhui fell and beget defections to the Zhili and Fengtian on the rise to their first era of prominence, or when Feng Yuxiang's betrayal in conjunction with the Second Zhili-Fengtian war saw defections from the Zhili onto the Guominjun, or furthermore to Fengtian.\n\nWith the most concerning news of Zhang Zuolin's death in his prized Northeastern Provinces, allegedly at the hands of the Japanese, and the rapid rise of General Yang Yuting to the position of Grand Marshal of the Fengtian Government, another wave of defections have poured out from Fengtian. Following his assumption of power, Yuting set forth purging all rivals or those that had even a thought of betraying him, including the Young Marshal Zhang Xueliang and his loyalists.\n\nHowever, managing to avoid Yuting and his Shikan Clique for long enough, Shaoshuai stalwarts Ma Zhanshan and Zhang Tingshu alongside two of Marshal Zhang's old allies, Wan Fulin and Wu Junsheng, colloquially known as the \"Heilongjiang Clique\", have communicated through mounted messenger, informing [ROOT.GetLeader]'s field commanders of their intentions to defect. Whilst of varying degrees of skill, with Zhanshan known for his eccentricities, and Junsheng for his clumsy malaise, they nonetheless are fiercely vengeful for the death of the Old Marshal, seeking the deposition of Yuting. Albeit the question remains, can the bandits-turned-generals be trusted?"
 fengtian_events.167.a:0 ""Mon cœur et mes actes sont limpides ! Ce sont ceux de la "justice".""
 fengtian_events.167.b:0 "Nous n'avons pas besoin des laquais du Tigre."

 fengtian_events.168.t:0 "La Clique du Heilongjiang a fait défection vers [From.GetNameDef] !"
 fengtian_events.168.d_start:9 "Whilst Yang Yuting's enemies were always numerous within the Fengtian Clique, they nevertheless had retained a sense of cordialness in action and quality in words. All under the late Grand Marshal Zhang Zuolin, neither Shikan nor the disparate Anti-Shikan Cliques, such as Shaoshuai or Heilongjiang, would have dared to act against eachother in brazen strikes. Yet with the death of the Marshal, the cause for caution has been utterly called off — with Shikan's purge of the Shaoshuai Clique and other loyalists. Scheduled to be on the chopping block, in a surprising twist it would appear that the Heilongjiang Clique — that is, Wu Junsheng alongside his protégés, Wan Fulin and Ma Zhanshan — have struck first."
 fengtian_events.168.d:9 "$fengtian_events.168.d_start$\n\nWith the chaos of the interregnum purges thrusting the frontier, frontline, and garrison commands all into disarray, few noticed or even perhaps aided the scurrying horseback messengers crossing from Heilongjiang to [FROM.GetNameDef]. In correspondence with their frontline commanders, the Heilongjiang Clique's leaders managed to secure passage to, equipment from, and commissions within [FROM.GetNameDef]'s armies. During their rapid escape, the Clique simultaneously managed to secure three million silver dollars from the Fengtian treasury, taking it with them across the border. Whilst clearly a move pinned on their salvation, it has both made glaringly obvious the weakness of Yuting's nascent government, and the strength of Zhang Zuolin's last free loyalists. Whatever the case may be, it is clear that Tiger of the North has made one last defiant roar."
 fengtian_events.168.a:0 "Leur temps viendra sur le champ de bataille."

 fengtian_events.169.t:0 "L'Insurrection de la Clique du Heilongjiang !"
 fengtian_events.169.d:9 "$fengtian_events.168.d_start$\n\nWith the chaos of the interregnum purges thrusting the frontier, frontline, and garrison commands all into disarray, few noticed or even perhaps aided the scurrying horseback messengers crossing from Heilongjiang to provinces outside Fengtian control. Ultimately, it would appear that their soliciting for commissions from the enemy bore no fruit, thankfully. To [ROOT.GetLeader]'s dismay however, instead of choosing to lie down and accept defeat like the rest of Marshal Zhang's allies, the Heilongjiang Clique fled to the hills of their frontier province, intending to stage a defiant last stand, or at least collapse the perceived rotten structure of Yuting's government with the aid of outside forces."
 fengtian_events.169.a:0 "Ils peuvent difficilement combattre un empire à eux seuls !"

 fengtian_events.170.t:0 "L'insurrection du Heilongjiang se calme !"
 fengtian_events.170.d:0 "L'insurrection miniature de la clique du Heilongjiang battant son plein, le gouvernement et les autorités provinciales de la région, avec l'aide du Japon, se sont engagés dans une campagne de répression féroce contre les justiciers et les héros en herbe. Tout en ressemblant aux divers groupes de bandits qui ont parcouru les trois provinces du nord-est pendant des années, l'insurrection du Heilongjiang a pris la forme d'une force beaucoup plus organisée et compétente. Malgré les maladresses notoires de Wu Junsheng et de Wan Fulin, les desperados ont toujours réussi à prendre le dessus sur les forces de Fengtian.\n\nC'est du moins ce qui s'est passé jusqu'à récemment. Malgré les tentatives ardues des forces militaires de Kempetai et de Fengtian pour écraser les quartiers généraux provinciaux locaux des insurgés au fur et à mesure de leur apparition, la majorité des tentatives se sont soldées par des échecs mitigés. Alors que la plupart des succès ont été remportés dans la zone d'opération de Wan Fulin, les forces de cavalerie de Ma Zhanshan ont réussi à écraser non seulement l'armée de Fengtian, mais aussi les Japonais. Bien qu'elles n'aient pas infligé de pertes particulièrement importantes, les forces de Ma n'ont pas pu être écrasées. En raison de son habileté et de sa notoriété, les Japonais ont commencé à le surnommer le "Napoléon de l'Orient".\n\nNéanmoins, il semblerait que l'insurrection du Heilongjiang ait dépassé sa date de péremption, car ces derniers jours, la plupart des combats dans la province et les régions voisines se sont calmés. Les mouvements de troupes étant nettement moins nombreux qu'auparavant, la plupart des bavardages sur leur chaîne de radio se sont dissipés, et il est pratiquement acquis que leur mouvement s'est essoufflé. Selon certains rapports, Wan, Ma, Zhang et Wu seraient même partis en Sibérie, dans l'espoir de revenir dans une Chine moins hostile ou de rester à jamais en exil. Quoi qu'il en soit, l'incapacité du gouvernement à écraser une rébellion apparemment si petite a terriblement nui à sa réputation."
 fengtian_events.170.a:0 "Un pas, il semble qu'ils aient eu un pas d'avance sur nous !"

 fengtian_events.171.t:0 "L'insurrection du Heilongjiang est écrasée !"
 fengtian_events.171.d:9 "With the Heilongjiang Clique's miniature Insurgency in full swing, the government and provincial authorities in the region, alongside Japanese aid, have engaged in a fierce crackdown campaign against the wannabe vigilantes and heros. Whilst resembling the various bandit groups that have roamed the Three Northeastern Provinces for years, the Heilongjiang Insurgency took on the form of a far more organised, and capable, force. Even with noted blunders under the command of Wu Junsheng and Wan Fulin, the desperados continuously managed to trump Fengtian forces.\n\nOr so was the case up until recently. Chasing up the ladder of provincial insurgent HQs, and through systematic deployment of Kempetai interrogation and bribery of less than convicted cadres of the rebel's escapades, Ma Zhanshan, Wan Fulin, and Wu Junsheng fell akin to dominoes. First to fall was Wan Fulin, proving to be little more capable than his days in the broader Fengtian army. Then came Wu Junsheng, unable to stem the tide, perishing ironically due to a local explosive carried by a double agent. Third arrived Zhang Tingshu, collaborating with the Kuomintang insurgents, he would ultimately suffer the fate of many of China's prior revolutionaries.\n\nFinally arrived Ma Zhanshan, proving to be the most resilient of the three. An expert at maintaining the primacy, mobility, and cohesiveness of his broadly cavalry force, Ma defiantly resisted to the brutal and bitter end. Rallying all loyalist forces on radio channels all throughout the Northeast, he gained notoriety for his surprising skill in guerilla tactics to the point that [ROOT.GetNameDef] troops and the Japanese have dubbed Ma the \"Napoleon of the East\". Much like Napoleon however, Ma Zhanshan fell to superior forces. Conducting a raid on his HQ, a local explosive would gravely wound the General's left hand. Despite this, he continued to hold out for hours, only perishing in the fighting after much of his forces ran out of ammunition."
 fengtian_events.171.a:0 "Des fantômes qui ne savaient pas qu'ils étaient déjà morts."

 fengtian_events.173.t:0 "L'Asia Express va de [745.GetCapitalVictoryPointName] à Harbin !"
 fengtian_events.173.d:0 "Pour la première fois, le train rationalisé "Asia Express" de Mantetsu circulera de la pointe de [745.GetCapitalVictoryPointName] à la ville de Harbin, dans le nord du pays, à une vitesse étonnante de 130 km/h, ce qui le place parmi les trains les plus rapides au monde. Le voyage n'a duré que 21 heures et 30 minutes. La merveille de la locomotive est dotée de wagons équipés de chauffage, de climatisation et de luxueux salons, même pour les clients de troisième classe, ainsi que de son propre cocktail signé, servi au bar. Si le succès sans précédent de Mantetsu a donné quelques raisons d'applaudir et peut susciter l'envie à Beijing, d'autres ne peuvent qu'être de plus en plus préoccupés par les progrès de Mantetsu"
 fengtian_events.173.a:0 "Une merveille moderne !"

 fengtian_events.174.t:0 "Lu Ronghuan offre un poney robuste du Nord-Est"
 fengtian_events.174.d:0 "Pour des raisons probablement liées à sa récente nomination ministérielle, Lu Ronghuan a offert au Grand Maréchal un splendide poney de Mandchourie nommé "Pong", une race rare supposée capable de faire des tours, et qui vaut près d'un million de yens. Les échanges de cadeaux, qui pourraient être interprétés comme des pots-de-vin dans d'autres pays, sont monnaie courante dans le Nord-Est et dans toute la Chine, mais les poches profondes de Lu sont connues pour produire toutes sortes de bizarreries coûteuses"
 fengtian_events.174.a:0 "Ne jamais regarder un cheval de cadeau dans la bouche."

 fengtian_events.175.t:0 "Grèves ferroviaires"
 fengtian_events.175.d:0 "Des membres influents de l'Association Concordia avaient prévu de présenter demain une législation renforçant leur contrôle sur le télégraphe du pays, affirmant que certaines sections dans la province de Jilin avaient été construites sans permis, et demandant leur transfert à des "autorités plus fiables". Cependant, les principales lignes allant de [745.GetCapitalVictoryPointName] à Harbin ont soudainement connu une série de grèves, interrompant le service en signe de protestation contre la législation proposée.\n\nFace à ce rejet massif, la législation a été mise de côté pour le moment, et il semble probable que Li Shaogeng et ses nombreux contacts en soient responsables."
 fengtian_events.175.a:0 "Bien."

 fengtian_events.1751.t:0 "Grèves ferroviaires"
 fengtian_events.1751.d:9 "As of early this morning the major railway lines running between [745.GetCapitalVictoryPointName], Shenyang, and Harbin have experienced shutdowns and delays as strikes erupted along them, effectively grinding the country's resource economy to a halt.\n\nMantetsu and its advocates in the Concordia Association seem to have taken the opportunity to ship in workers from the Kwantung Leased Territory to ensure that basic services continue to run, but the strikes have continued nonetheless; demonstrating Zhang Zongxiang's willingness to damage even his own cause to demonstrate his displease with the Grand Marshal's refusal."
 fengtian_events.1751.a:0 "Merde Liang !"

 fengtian_events.176.t:0 "Le scandale du développement de Pan Fu"
 fengtian_events.176.d:0 "Malgré la confiance accordée à Pan Fu en lui attribuant, ainsi qu'à son parti, le droit de diriger le développement financier et monétaire de Fengtian conformément aux politiques initiales de Wang Yongjiang, ses efforts semblent avoir été vains. Des preuves ont été portées à l'attention du Grand Maréchal, suggérant que de vastes sommes d'argent destinées au développement ont été canalisées vers des projets et des comptes privés dans tout le pays. Il ne fait aucun doute que d'autres membres de son parti sont complices, et si un certain degré de corruption ne surprend guère le public, un scandale de cette ampleur bouleversera même les plus hautes sphères du gouvernement."
 fengtian_events.176.a:0 "A qui peut-on encore faire confiance ?"

 fengtian_events.177.t:0 "Le scandale du développement de Li Shaogeng"
 fengtian_events.177.d:0 "Malgré la confiance accordée à Li Shaogeng en lui attribuant, ainsi qu'à son parti, le droit de diriger le développement financier et monétaire de Fengtian conformément aux politiques initiales de Wang Yongjiang, ses efforts semblent avoir été vains. Des preuves ont été portées à l'attention du Grand Maréchal, suggérant que de vastes sommes d'argent destinées au développement ont été canalisées vers des mesures désespérées pour concurrencer Mantetsu dans tout le pays, la grande majorité sous forme de pots-de-vin. En outre, Li a abusé de sa position pour garantir des droits favorables aux efforts de construction menés par ses alliés au sein du gouvernement. Il ne fait aucun doute que d'autres membres de son parti sont complices, et si un certain degré de corruption ne surprend guère le public, un scandale de cette ampleur bouleversera même les plus hautes sphères du gouvernement."
 fengtian_events.177.a:0 "A qui peut-on encore faire confiance ?"

 fengtian_events.178.t:0 "Le scandale du développement de Sun Qichang"
 fengtian_events.178.d:0 "Malgré la confiance accordée à Sun Qichang en lui attribuant, ainsi qu'à son parti, le droit de diriger le développement financier et monétaire de Fengtian conformément aux politiques initiales de Wang Yongjiang, ses efforts semblent avoir échoué. Des preuves ont été portées à l'attention du Grand Maréchal, suggérant que de vastes sommes d'argent destinées au développement ont été canalisées vers l'achat d'armes pour équiper les divisions provinciales et les gardes du corps, ainsi que dans les poches de généraux éminents. Il ne fait aucun doute que d'autres membres de son parti sont complices, et si un certain degré de corruption ne surprend guère le public, un scandale de cette ampleur bouleversera même les plus hautes sphères du gouvernement."
 fengtian_events.178.a:0 "A qui peut-on encore faire confiance ?"

 fengtian_events.179.t:0 "Le scandale du développement de Ruan Zhenduo"
 fengtian_events.179.d:0 "Malgré la confiance accordée à Ruan Zhenduo en lui attribuant, ainsi qu'à son parti, le droit de diriger le développement financier et monétaire de Fengtian conformément aux politiques initiales de Wang Yongjiang, ses efforts semblent avoir été vains. Des preuves ont été portées à l'attention du Grand Maréchal, suggérant que de vastes sommes d'argent destinées au développement ont été canalisées vers des écoles et des hôpitaux parrainés par Mantetsu, chacun d'entre eux utilisant la soudaine augmentation des fonds pour poursuivre ses efforts de promotion de l'amitié sino-japonaise. Il ne fait aucun doute que d'autres membres de son parti sont complices, et si un certain degré de corruption ne surprend guère le public, un scandale de cette ampleur bouleversera même les plus hautes sphères du gouvernement."
 fengtian_events.179.a:0 "A qui peut-on encore faire confiance ?"

 fengtian_events.180.t:0 "Tang Yulin Chevauche un Tigre !"
 fengtian_events.180.d:0 "Le général Tang Yulin a été aperçu, assis avec audace sur le dos d’un tigre vorace quelque part dans la province de Rehe ! Ou bien s’agit-il d’un canular ?\n\nUne photo représentant Tang a largement circulé, apparaissant dans les journaux de tout le Nord-Est, bien que son origine reste incertaine. Certains affirment que l’image a été retouchée, tandis que d’autres pensent que le tigre n’est qu’un animal empaillé, mais c’est surtout le contexte qui retient le plus l’attention. Le grand maréchal Zhang Zuolin est souvent surnommé "le Tigre du Nord", et le fait que Tang soit représenté chevauchant un tigre jette donc un doute très sérieux sur cette image.\n\nDe son côté, Tang Yulin affirme que cette image est l'œuvre d'un [QIE.GetAdjective] saboteur, mais ses fêtes extravagantes à Chaoyang suggèrent que l'image, à défaut du tigre, pourrait bien être authentique."
 fengtian_events.180.a:0 "C'est un scandale !"
 fengtian_events.180.b:0 "C'est sûrement un faux..."

 fengtian_events.181.t:0 "Le différend fiscal sur les CER"
 fengtian_events.181.d:0 "La perception de taxes apparemment arbitraires pour combler les trous dans le budget, qu'ils soient réels ou non, est une pratique de longue date des gouvernements nationaux, régionaux et locaux en Chine, y compris le nôtre. Cette fois-ci, le chef de la police Yuan fait pression sur le directeur des chemins de fer de l'Est chinois, Li Shaogeng, pour qu'il accepte de prélever des taxes supplémentaires sur les chemins de fer, prétendument dans le but de renforcer l'armée. Si ses exigences ne sont pas satisfaites, il menace d'ouvrir une enquête sur les actifs de la Clique des communications, ainsi que sur les divers frais légalement discutables que la Commission fait déjà payer à ses clients, dont les revenus se comptent presque certainement sur les doigts d'une main.\n\nIl est fort probable que, Yuan étant également membre du conseil d'administration du CER et conseiller au sein de notre conseil interne, il s'agisse là de son idée d'un jeu de pouvoir. Néanmoins, il faut dire que sa taxe aiderait sans aucun doute à remplir le trésor national, même si c'est au prix d'une diminution de la concurrence pour Mantetsu. Il semble probable que le Grand Maréchal soit obligé de régler ce différend, de peur qu'il ne devienne incontrôlable."
 fengtian_events.181.a:0 "Prélever l'impôt."
 fengtian_events.181.b:0 "Aucune taxe n'est nécessaire."

 fengtian_events.182.t:0 "Le Yuan enquête quand même"
 fengtian_events.182.d:0 "Furieux de la décision d'interdire sa proposition de taxe ferroviaire, Yuan Jinkai a mis à exécution sa menace d'enquêter intensivement sur les autres membres du Conseil de la CER, ainsi que sur la Clique des Communications en général. Les forces de police ont déjà commencé à converger, et à moins que le Grand Maréchal n'intervienne rapidement, il y a un risque croissant que l'enquête révèle des secrets plus importants qu'il vaut mieux garder à l'abri des regards.\n\nBien sûr, si son enquête est arrêtée, Yuan démissionnera presque certainement de son poste de chef de la police."
 fengtian_events.182.a:0 "Cela ne sera pas toléré."
 fengtian_events.182.b:0 "Laissez l'enquête se poursuivre."

 fengtian_events.183.t:0 "L'enquête de Yuan donne des résultats"
 fengtian_events.183.d_large:0 "Lorsque Yuan a commencé son enquête, on craignait qu'elle ne révèle les profonds réseaux de corruption dont on pense généralement qu'ils existent au sein du gouvernement. Ces craintes se sont concrétisées. Bien que la Clique des Communications ait été la plus durement touchée par le scandale qui a suivi, le gouvernement dans son ensemble a subi un sérieux coup à sa légitimité, malgré les efforts de Yuan pour garder les résultats secrets. Bien que des voix se soient élevées pour demander la démission de Yuan, la limitation des dégâts est prioritaire et le chef de la police a gagné un grand respect de la part de la population, aussi ironique que cela puisse être."
 fengtian_events.183.d_small:0 "Lorsque Yuan a commencé son enquête, on craignait qu'elle ne révèle les profonds réseaux de corruption dont on pense généralement qu'ils existent au sein du gouvernement. Heureusement, ses résultats ont étroitement ciblé les membres de la Clique des Communications, laissant le gouvernement dans son ensemble largement indemne. Yuan s'en tirera avec un plus grand degré de contrôle sur le CER et un plus grand respect de la part de la population, malgré ses "prétendues" affaires louches."
 fengtian_events.183.a:0 "Au moins, c'est fini."

 fengtian_events.184.t:0 "L'enquête de Yuan ne donne rien"
 fengtian_events.184.d:0 "Malgré la croyance répandue que l'enquête de Yuan allait inévitablement découvrir des traces de corruption, le rapport officiel publié aujourd'hui indique que rien n'a été trouvé. Yuan est profondément mécontent, mais il ne peut pas faire grand-chose à moins d'intensifier le conflit d'une manière qui ne fera que nuire à sa propre réputation."
 fengtian_events.184.a:0 "Qui l'aurait cru ?"

 fengtian_events.191.t:0 "Fengtian en crise"
 fengtian_events.191.d.losing:0 "Malgré toute l'aide que nous avons fournie au fil des ans au Gouvernement du Fengtian, celui-ci risque maintenant de subir une défaite alors que ses armées luttent. Non seulement nous avons un engagement général en faveur de la défense du Fengtian sur le plan politique et économique, mais cela reste aussi le seul moyen par lequel nous pourrions indirectement contrôler la Chine dans son ensemble. Une occupation directe serait presque certainement coûteuse, mais une intervention pourrait aussi comporter ses propres risques. Le moment est venu de prendre une décision."
 fengtian_events.191.d.long:0 "Malgré toute l'aide que nous avons apportée au fil des ans au Gouvernement du Fengtian, celui-ci est aujourd'hui confronté au risque d'une défaite alors que la Guerre de Réclamation Nationale s'éternise en échouant à accomplir ses objectifs stratégiques. Non seulement nous avons un engagement général en faveur de la défense du Fengtian sur le plan politique et économique, mais cela reste aussi le seul moyen par lequel nous pourrions indirectement contrôler la Chine dans son ensemble. Une occupation directe serait presque certainement coûteuse, mais une intervention pourrait aussi comporter ses propres risques. Le moment est venu de prendre une décision."
 fengtian_events.191.d.peace:0 "Malgré toute l'aide que nous avons apportée au fil des ans au gouvernement de Fengtian, celui-ci risque aujourd'hui d'être vaincu, car le gouvernement au sud de la Grande Muraille amasse des armées bien plus importantes que celles du vieux maréchal. Non seulement nous nous sommes engagés à défendre Fengtian sur le plan politique et économique, mais cette province reste le seul moyen pour nous de contrôler indirectement la Chine dans son ensemble. Une occupation directe serait presque certainement coûteuse, mais une intervention pourrait aussi comporter ses propres risques. Le moment est venu de prendre une décision."
 fengtian_events.191.a:0 "Le Japon honore ses engagements."
 fengtian_events.191.b:0 "Zhang est seul."

 fengtian_events.1911.t:0 "Le Japon refuse d'intervenir"
 fengtian_events.1911.d:0 "Dans un acte de trahison stupéfiant, le Japon a refusé de nous protéger au moment où nous en avons le plus besoin. Il semble que nous devions maintenant nous tourner vers nos propres défenses, car elles sont tout ce qui nous sépare de l'oubli."
 fengtian_events.1911.a:0 "Traîtres !"

 fengtian_events.192.t:0 "Le Japon Vient à Notre Aide !"
 fengtian_events.192.d:0 "Respectant son engagement général pour notre défense, le Japon a autorisé notre entrée dans la Sphère de Coprospérité."
 fengtian_events.192.a:0 "Wansui !"

 fengtian_events.193.t.jinhan:0 "Récupérer le chemin de fer du Jinhan"
 fengtian_events.193.t.jinpu:0 "Récupérer le chemin de fer de Jinpu"
 fengtian_events.193.t.yuehan:0 "Récupérer le chemin de fer de Yuehan"
 fengtian_events.193.d.jinhan:0 "Financé à l'origine par des capitaux belges, le chemin de fer de Jinghan s'étend du nord au sud de Beijing à Zhili et à Hankou dans le Hubei. Pendant des décennies, il a été l'une des principales artères de transit de la Chine, transportant des marchandises sur toute la longueur de la plaine de Chine du Nord et reliant sa largeur en passant par Zhengzhou.\n\nAu cours des années qui ont suivi sa construction, le chemin de fer a connu des temps difficiles et, bien que les Belges soient partis depuis longtemps, il faudra beaucoup d'investissements pour restaurer son infrastructure et l'intégrer à nos nouveaux services ferroviaires nationaux."
 fengtian_events.193.d.jinhan_JAP:9 "$fengtian_events.193.d.jinhan$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.d.jinpu:0 "Financé par des capitaux britanniques et allemands près de quinze ans avant la Weltkrieg, le chemin de fer de Jinpu relie, du nord au sud, Tianjin à Pukou, un district de Nanjing. Comme le chemin de fer Jinghan, il a longtemps été l'une des principales artères logistiques de la Chine, reliant le nord au sud et l'est à l'ouest en passant par Xuzhou.\n\nAu cours des années qui ont suivi la dernière guerre de Zhifeng, les sections du chemin de fer situées dans le Shandong et le Jiangsu sont progressivement tombées sous l'emprise de l'entreprise allemande AOG, qui a modernisé et étendu son infrastructure. Cependant, comme les employés de l'entreprise ont été chassés ou fusillés comme Hanjian, ils devront être remplacés. Malheureusement, le processus de recherche et de paiement de ces personnes, sans parler de la réintégration du chemin de fer lui-même, pourrait s'avérer une entreprise coûteuse."
 fengtian_events.193.d.jinpu_JAP:9 "$fengtian_events.193.d.jinpu$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.d.yuehan:0 "Le chemin de fer de Yuehan, qui relie Hankou et Guangdong, est né au milieu d'un conflit entre les investisseurs belges et américains, et a donc pris un temps anormalement long pour être achevé une fois que les deux parties se sont retirées du projet. Le chemin de fer a finalement été achevé sous la supervision de l'AOG allemand au début des années 1930, et est resté sous son contrôle jusqu'à l'effondrement de la Ligue de Sun Chuanfang.\n\nAprès le départ des Allemands, le chemin de fer aura besoin d'une gestion entièrement nouvelle et d'une intégration dans le nouveau système ferroviaire national. Cette tâche sera coûteuse."
 fengtian_events.193.d.yuehan_JAP:9 "$fengtian_events.193.d.yuehan$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.a:0 "Donnez-le à Mantetsu."
 fengtian_events.193.b:0 "Nous le contrôlerons nous-mêmes."
 ask_Mantetsu_for_railway: "Bien sûr, nous pouvons toujours demander à Mantetsu de le faire pour nous."

 fengtian_events.194.t.jinhan:0 "Chemin de fer du Jinhan récupéré"
 fengtian_events.194.t.jinpu:0 "Chemin de fer de Jinpu récupéré"
 fengtian_events.194.t.yuehan:0 "Chemin de fer de Yuehan récupéré"
 fengtian_events.194.d.jinhan_mantetsu:0 "Les opérations le long du chemin de fer de Jinghan ont été transférées avec succès aux bureaucrates et ingénieurs de Mantetsu. Leur expertise devrait s'avérer cruciale pour que les trains continuent de circuler à l'heure, malgré le coût politique de la soumission des chemins de fer chinois à un contrôle étranger"
 fengtian_events.194.d.jinpu_mantetsu:0 "Les opérations sur la ligne de Jinpu ont été confiées avec succès aux bureaucrates et ingénieurs de Mantetsu. Leur expertise devrait s'avérer cruciale pour que les trains continuent de circuler à l'heure, malgré le coût politique de la soumission des chemins de fer chinois à un contrôle étranger"
 fengtian_events.194.d.yuehan_mantetsu:0 "Les opérations le long du chemin de fer de Yuehan ont été confiées avec succès aux bureaucrates et ingénieurs de Mantetsu. Leur expertise devrait s'avérer cruciale pour que les trains continuent de circuler à l'heure, malgré le coût politique de la soumission des chemins de fer chinois à un contrôle étranger"
 fengtian_events.194.d.jinhan_national:0 "Après beaucoup d'efforts, une équipe de bureaucrates et d'ingénieurs a été constituée pour prendre le contrôle de la ligne de chemin de fer de Jinghan. Un certain nombre de membres du personnel ont dû être retirés de la retraite, tandis que d'autres possédaient des certificats de fin d'études douteux, mais il n'en reste pas moins qu'à ce jour les trains circulent à l'heure"
 fengtian_events.194.d.jinpu_national:0 "Une équipe de bureaucrates et d'ingénieurs a finalement été constituée pour prendre le contrôle du chemin de fer de Jinpu. De nombreux membres du personnel au visage frais, dont certains n'ont été formés que récemment, semblaient nerveux à cette occasion. Il n'en reste pas moins que la récupération de ce chemin de fer autrefois détenu par des étrangers est un grand pas en avant dans la réaffirmation de la fierté nationale de la Chine"
 fengtian_events.194.d.yuehan_national:0 "Une équipe de bureaucrates et d'ingénieurs s'est finalement réunie au siège de la compagnie ferroviaire Yuehan à Guangzhou, et bien que l'enseigne à l'entrée soit en chinois, les journaux de bord et autres documents qui s'y trouvent restent en grande partie allemands. La conversion de toutes ces informations sera encore une autre tâche à accomplir, et trouver des ingénieurs germanophones sans antécédents de collaboration a été difficile.\nIl n'en reste pas moins que cela marque une importante victoire de propagande."
 fengtian_events.194.a:0 "Excellent."

 fengtian_events.195.t:0 "Le système ferroviaire de Mantetsu"
 fengtian_events.195.d:0 "Le personnel de Mantetsu s'installant dans le dernier siège social "récupéré" de la compagnie ferroviaire, celle-ci a décidé de créer deux filiales régionales pour superviser les activités dans le nord et le centre de la Chine. La North China Transportation Company, dont le siège est à Beijing, prendra le contrôle des opérations entre Shanhaiguan et le Yangtsé, tandis que la Central China Transportation Company opérera entre cette région et Guangzhou, dans le sud. Ironiquement, les Japonais ont maintenant réalisé ce que l'AOG allemande n'a jamais pu faire"
 fengtian_events.195.a:0 "Une merveille d'ingénierie."

 fengtian_events.196.t:0 "La propriété nationale des chemins de fer"
 fengtian_events.196.d:0 "Le gouvernement central a enfin achevé sa mission consistant à supprimer l'influence occidentale sur notre système ferroviaire, un projet très coûteux mais une grande victoire de propagande, car la propriété occidentale des chemins de fer chinois a longtemps été considérée comme le summum de l'humiliation nationale. À long terme, ces efforts permettront au gouvernement d'augmenter ses recettes et devraient rendre moins coûteuse l'expansion des infrastructures"
 fengtian_events.196.a:0 "Une autre victoire pour la Chine contre l'Occident !"

 fengtian_events.197.t:0 "Une Découverte Intéressante !"
 fengtian_events.197.d_Wang:0 "Nos agents en poste dans les Villes des Légations ont fait une découverte surprenante au Palace Hotel de Shanghai, qui a récemment accueilli une délégation du Gouvernement du Fengtian dirigée par le célèbre diplomate Wang Yintai. Un livre de codes de haut niveau, trouvé par le personnel d'entretien de l'hôtel, offre un aperçu complet des méthodes de décryptage du Fengtian et permet d'accéder sans restriction à leurs communications cryptées. Ce sera une véritable mine d'or pour nos espions, tant chez nous qu'à l'étranger.\n\nLe Gouvernement du Fengtian finira par changer ses codes, mais pour l'instant, l'avantage est de notre côté."
 fengtian_events.197.d_Ruan:0 "Nos agents en poste à Tokyo ont fait une découverte surprenante dans un izakaya de Nihonbashi. Un livre de codes semble avoir été oublié dans une arrière-salle louée par Ruan Zhenduo, président de l'Association Concordia pro-japonaise du Fengtian, et son entourage. Même s'il faudra peut-être quelques jours pour confirmer l'authenticité de ce livre, il offre néanmoins un aperçu complet des méthodes de décryptage du Fengtian et donne un accès total à leurs communications cryptées. Ce sera une véritable mine d'or pour nos espions, tant chez nous qu'à l'étranger.\n\nLe Gouvernement du Fengtian finira bien par changer ses codes, mais pour l'instant, l'avantage est de notre côté."
 fengtian_events.197.d_Tang:0 "Nos agents en poste dans les Villes des Légations ont fait une découverte surprenante à Tianjin : il s'agit plus précisément d'un livre de codes du Gouvernement du Fengtian acheté à la Bande verte locale. Il semblerait que les gangsters aient reçu ce livre d'une courtisane en provenance de Chengde, où le général Tang Yulin du Fengtian, réputé pour son caractère turbulent, aurait organisé une somptueuse fête. Même s'il faudra peut-être quelques jours pour confirmer l'authenticité de ce livre, il offre néanmoins un aperçu complet des méthodes de décryptage du Fengtian et donne un accès total à leurs communications cryptées. Ce sera une véritable mine d'or pour nos espions, tant chez nous qu'à l'étranger.\n\nLe Gouvernement du Fengtian finira bien par changer ses codes, mais pour l'instant, l'avantage est de notre côté."
 fengtian_events.197.d_JAPwang:0 "Nos agents en poste dans les Villes des Légations ont fait une découverte surprenante au Palace Hotel de Shanghai, qui a récemment accueilli une délégation du Gouvernement du Fengtian dirigée par le célèbre diplomate Wang Yintai. Un livre de codes de haut niveau, initialement dérobé par le personnel d'entretien de l'hôtel, s'est retrouvé entre les mains d'agents allemands de l'Abteilung III, qui en ont été sommairement débarrassés par nos courageux agents. Même s'il faudra peut-être quelques jours pour confirmer l'authenticité du livre, celui-ci nous offre néanmoins un aperçu encore plus complet des communications du Fengtian que celui dont nous disposons déjà.\n\nEn tant "qu'allié fraternel" du Fengtian, nous devrions rendre ce livre, même si cela ne sert qu'à démontrer notre supériorité, mais nous pourrions aussi choisir de le garder."
 fengtian_events.197.d_JAPtang:0 "Nos agents en poste dans les Villes des Légations ont fait une découverte surprenante à Tianjin : il s'agit plus précisément d'un livre de codes du gouvernement du Fengtian "acquis" auprès de la Bande verte locale. Ces malfrats avaient apparemment l'intention de vendre le livre au plus offrant, mais heureusement, nos courageux agents se sont emparés de l'objet de force. Après enquête, il s'est avéré que le livre de codes avait été introduit sur le marché noir à l'occasion d'une somptueuse fête organisée à Chengde par le général Tang Yulin, du Fengtian. Il est presque certainement authentique et offre un aperçu encore plus complet des communications du Fengtian que ce dont nous disposons déjà.\n\nEn tant "qu’allié fraternel" du Fengtian, nous devrions rendre le livre, même si cela ne sert qu’à démontrer notre supériorité, mais nous pourrions aussi choisir de le garder."
 fengtian_events.197.d_JAPruan:0 "La Police métropolitaine de Tokyo a fait une découverte intéressante dans un izakaya de Nihonbashi, où Ruan Zhenduo, président de l'Association Concordia, et son entourage avaient récemment réservé une salle à l'arrière. Un livre de codes semble avoir été laissé sous la table, et bien qu'il faille peut-être quelques jours pour confirmer son authenticité, cela nous offre un aperçu encore plus complet des communications du Fengtian que celui dont nous disposons déjà.\n\nEn tant "qu'alliés fraternels" du Fengtian, nous devrions rendre ce livre, même si cela ne sert qu'à démontrer notre supériorité, mais nous pourrions choisir de le garder à la place."
 fengtian_events.197.d_JAPruanremoved:0 "La Police métropolitaine de Tokyo a fait une découverte intéressante dans un izakaya de Nihonbashi, où Ruan Zhenduo, président de l’Association Concordia, et son entourage avaient récemment réservé une salle à l’arrière. Un livre de codes semble avoir été laissé sous la table, et bien qu’il faille peut-être quelques jours pour confirmer son authenticité, cela nous offre un aperçu bien plus complet des communications du Fengtian que ce dont nous disposons déjà.\n\nMalheureusement, la disparition du livre semble avoir été remarquée, comme en témoigne la destitution de Ruan. En tant que membre haut placé de l'Association Concordia, son renvoi constitue une insulte à nos efforts visant à soutenir le gouvernement du Fengtian et à développer la région de Mandchourie. Déjà, tant l'Armée du Kwantung à Shenyang que le ministère des Affaires étrangères ici à Tokyo exigent une réponse.\n\nNous pourrions choisir d'être polis, ou d'ignorer complètement les convenances."
 fengtian_events.197.a:0 "Voilà un beau coup des services secrets !"
 fengtian_events.197.b:0 "Rendez poliment le livre de codes."
 fengtian_events.197.c:0 "Gardez le livre de codes."
 fengtian_events.197.d:0 "Exigez la réintégration de Ruan !"

 fengtian_events.198.t:0 "Le Japon nous rend notre livre de codes"
 fengtian_events.198.d:0 "Il semble que le Japon ait récupéré le livre de code récemment perdu par notre ministre bousculé ; le président de Mantetsu, Matsuoka Yōsuke, l'a remis au Grand Maréchal en personne ce matin. En privé, Zhang aurait pris la situation à la légère, se référant à Matsuoka comme à son "chien fidèle retournant une balle lancée".\n\nIl y a toutes les raisons de croire que les Japonais ont fait des copies de nos codes top secrets, et l'Association Concordia en tirera sans doute profit. Pourtant, les choses auraient pu être pires."
 fengtian_events.198.a:0 "Bien, bien pire."

 fengtian_events.199.t:0 "Le Japon exige la réintégration de Ruan Zhenduo"
 fengtian_events.199.d:0 "Qualifiant "d'inacceptable" la révocation de notre ancien ministre des affaires étrangères et brandissant avec colère le livre de codes "perdu" à Tokyo, un diplomate japonais a exigé la réintégration immédiate de Ruan Zhenduo. Il ne fait aucun doute que les Japonais ont déjà copié nos codes top-secrets, et "l'histoire" fournie pour expliquer leur "découverte" dans un izakaya Nihonbashi semble peu probable. \n\nMais le Japon n'est pas à prendre à la légère, et la colère du diplomate se reflète sans doute à Tokyo. Nous devrions faire preuve de prudence dans notre prochaine étape."
 fengtian_events.199.a:9 "Reinstate Ruan."
 fengtian_events.199.b:9 "They should be thankful we didn't shoot him."

 fengtian_events.211.t:0 "Des alliés passionnés"
 fengtian_events.211.d:0 "Chen Tiaoyuan de la Clique d'Anqing, notre nouvel allié, ainsi que Zhang Zongchang, qui a longtemps eu de bonnes relations avec nous et a combattu à nos côtés il y a longtemps, n'ont pas de bonnes relations. Ce qui aggrave les choses, c'est que Chen considère sa Clique d'Anqing comme le dirigeant légitime de l'ensemble des cinq principales provinces qui composent la Ligue. Zhang cherche également à entrer dans le conflit, mais il est fort probable qu'il ne sera pas satisfait si on ne lui laisse rien, ce qui ne manquera pas d'arriver si Chen insiste pour contrôler l'ensemble des cinq provinces. Nous devrons commencer à réfléchir à une solution, car nous ne voulons absolument pas de guerre entre nos alliés"
 fengtian_events.211.a:0 "J'espère que cela se terminera bien..."

 fengtian_events.213.t:0 "Conférence sur la guerre de Shandong-Anqing"
 fengtian_events.213.d1:9 "Qi Xieyuan's League, which saw itself as the successor to Sun Chuanfang's League of Eight Provinces, has fallen apart after it was assaulted on three sides. Two of these, the Anqing Clique and the Shandong Clique, are our allies. Chen Tiaoyuan's Anqing Clique has successfully taken control of all the northern provinces, with only the reborn Left Kuomintang in the south. However, this is not satisfactory for Zhang Zongchang of Shandong, who believes control of the northern province of Jiangsu (Xuzhou, Yancheng, Nantong states) is his right. A right Chen is unwilling to give.\n\nWe must prevent war between them at all costs, as this could lead to their collapse, leaving the Kuomintang to take control of the Five Provinces instead. Shall we mediate between them?"
 fengtian_events.213.d2:9 "Qi Xieyuan's League, which saw itself as the successor to Sun Chuanfang's League of Eight Provinces, has fallen apart after it was assaulted on three sides. Two of these, the Anqing Clique and the Shandong Clique, are our allies. Zhang Zongchang's Shandong Clique has seized some of the League's north, in the province of Jiangsu (Xuzhou, Yancheng, Nantong states). This is unacceptable to Chen, who sees himself as the League's successor and thus the province's rightful owner.\n\nWe must prevent war between them at all costs, as this could lead to their collapse, leaving the Kuomintang to take control of the Five Provinces instead. Shall we mediate between them?"
 fengtian_events.213.d3:9 "Qi Xieyuan's League, which saw itself as the successor to Sun Chuanfang's League of Eight Provinces, has fallen apart as it was assaulted on three sides. Two of these, the Anqing Clique and the Shandong Clique, are our allies. Zhang Zongchang's Shandong Clique has seized parts of the northern province of Jiangsu (Xuzhou, Yancheng, Nantong statess), but also states even farther south. This is completely unacceptable to Chen, who feels that Zhang controls way too much of the League's former territory, all of which he believes belongs rightfully to Anqing.\n\nWe must prevent war between them at all costs, as this could lead to their collapse, leaving the Kuomintang to take control of the Five Provinces instead. Shall we mediate between them?"
 fengtian_events.213.a:0 "Tendre la main."
 fengtian_events.213.b:9 "It is not worth mediating between these two."

 #for ANQ:
 fengtian_events.214.t:0 "Fengtian cherche à faire de la médiation"
 fengtian_events.214.d1:0 "Notre guerre mutuelle contre la Clique de Nanjing n'a pu aboutir que grâce à notre promesse de respecter les acquis territoriaux de Zhang Zongchang. Cependant, Zhang Zongchang a continué à affirmer sans fondement que Zhang Zuolin lui avait promis les provinces d'Anqing. Il devrait être simple de forcer Zhang Zuolin à servir de médiateur dans cette affaire, et nous n'avons aucun doute que Zhang Zuolin sera d'accord avec nos revendications à Anqing. Juste au cas où les deux Zhangs nous trahissent, nous devrions quand même surveiller la frontière du Shandong"
 fengtian_events.214.d2:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Zhang Zongchang's territorial gains. However, Zhang Zongchang has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Zhang Zongchang has even gone so far as to annex part of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case the two Zhangs betray us, we should still keep watch on the Shandong border."
 fengtian_events.214.d3:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Zhang Zongchang's territorial gains. However, Zhang Zongchang has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Zhang Zongchang has even gone so far as to annex critical areas of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case the two Zhangs betray us, we should still keep watch on the Shandong border."
 fengtian_events.214.d4:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Zhang Zongchang's territorial gains. However, Zhang Zongchang has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Zhang Zongchang has even gone so far as to annex most of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case the two Zhangs betray us, we should still keep watch on the Shandong border."
 fengtian_events.214.a:0 "Zhang reste une menace."
 fengtian_events.214.b:0 "Ils peuvent avoir tout le Jiangsu."
 fengtian_events.214.c:0 "Ils ne peuvent garder que le Jiangsu."
 fengtian_events.214.d:0 "Nous exigeons l'ensemble des cinq provinces."
 fengtian_events.214.e:0 "Nous ne vous laisserons pas faire la médiation."

 #for SHD:
 fengtian_events.215.t:0 "Fengtian cherche à faire de la médiation"
 fengtian_events.215.d1:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Chen Tiaoyuan's territorial gains. However, Chen Tiaoyuan has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Chen Tiaoyuan has even gone so far as to annex all of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case Zhang and Chen intend to betray us, we should still keep watch on the Anqing border."
 fengtian_events.215.d2:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Chen Tiaoyuan's territorial gains. However, Chen Tiaoyuan has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Chen Tiaoyuan has even gone so far as to annex parts of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case Zhang and Chen intend to betray us, we should still keep watch on the Anqing border."
 fengtian_events.215.d3:9 "Our mutual war against the Nanjing Clique was only able to succeed thanks to our promise to respect Chen Tiaoyuan's territorial gains. However, Chen Tiaoyuan has continued his baseless claim that Zhang Zuolin promised him the provinces of Anqing. Chen Tiaoyuan has even gone so far as to annex the metropole of Jiangsu Province (Xuzhou, Yancheng, Nantong states) illegally to prop up this claim. It should be simple to force Zhang Zuolin to mediate this issue, and we have no doubt Zhang Zuolin will agree with our claims to Anqing. Just in case Zhang and Chen intend to betray us, we should still keep watch on the Anqing border."
 #they have other parts:
 fengtian_events.215.a:0 "Nous exigeons de ne garder que le Jiangsu maintenant."
 #they dont have:
 fengtian_events.215.b:0 "Nous exigeons d'avoir tout le Jiangsu maintenant."
 fengtian_events.215.c:0 "Nous gardons tous nos États."
 fengtian_events.215.d:0 "Nous ne vous laisserons pas faire la médiation."

 fengtian_events.216.t:0 "Anqing exige la fin de la revendication de Zhang Zongchang"
 fengtian_events.216.d1:0 "Chen Tiaoyuan est arrivé à Shenyang pour régler son différend territorial avec Zhang Zongchang. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Chen Tiaoyuan révèlent sa conclusion selon laquelle Zhang Zongchang et Shandong sont désormais responsables. Malgré la quantité de ressources déversées dans le Shandong, il ressort de l'entretien que Chen pense que les commandants criminels du Shandong sont trop dangereux pour travailler pour le plus grand bien de la Chine"
 fengtian_events.216.d2:0 "Chen Tiaoyuan est arrivé à Shenyang pour régler son différend territorial avec Zhang Zongchang. Bien que ni l'un ni l'autre n'aient proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Chen Tiaoyuan révèlent sa conclusion selon laquelle Zhang Zongchang et Shandong sont désormais responsables. En raison de la quantité de ressources déversées dans le Shandong, Chen suggère que Zhang Zongchang soit autorisé à conserver ses gains dans le Jiangsu, mais que le reste d'Anqing soit proclamé. Zhang peut avoir le Jiangsu, le reste qu'ils veulent"
 fengtian_events.216.d3:0 "Chen Tiaoyuan est arrivé à Shenyang pour régler son différend territorial avec Zhang Zongchang. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Chen Tiaoyuan révèlent sa conclusion selon laquelle Zhang Zongchang et Shandong sont désormais responsables. En raison de la quantité de ressources déversées dans le Shandong, Chen suggère que Zhang Zongchang soit autorisé à conserver ses gains dans le Jiangsu, mais que le reste d'Anqing soit proclamé. Zhang peut avoir des parties du Jiangsu, le reste ils veulent"
 fengtian_events.216.d4:0 "Chen Tiaoyuan est arrivé à Shenyang pour régler son différend territorial avec Zhang Zongchang. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Chen Tiaoyuan révèlent sa conclusion selon laquelle Zhang Zongchang et Shandong sont désormais responsables. En raison de la quantité de ressources déversées dans le Shandong, Chen suggère que Zhang Zongchang rende le Jiangsu, et que l'autodétermination de Chen sur Anqing soit proclamée"
 fengtian_events.216.a:0 "Noté."

 fengtian_events.217.t:0 "Shandong exige que Chen Tiaoyuan mette fin à sa revendication"
 fengtian_events.217.d1:0 "Zhang Zongchang est arrivé à Shenyang pour régler son différend territorial avec Chen Tiaoyuan. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Zhang Zongchang révèlent sa conclusion selon laquelle Chen Tiaoyuan et Anqing sont désormais responsables. Malgré la quantité de ressources investies à Anqing, il ressort des discussions que Zhang Zongchang pense que les commandants de tours à Anqing sont trop dangereux pour travailler pour le bien de la Chine. Zhang Zongchang insiste pour nous dire qu'il ne devrait garder que ses gains marginaux dans le Jiangsu"
 fengtian_events.217.d2:0 "Zhang Zongchang est arrivé à Shenyang pour régler son conflit territorial avec Chen Tiaoyuan. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Zhang Zongchang révèlent sa conclusion selon laquelle Chen Tiaoyuan et Anqing sont désormais responsables. Malgré la quantité de ressources investies à Anqing, il ressort des discussions que Zhang Zongchang pense que les commandants de tours à Anqing sont trop dangereux pour travailler pour le bien de la Chine. Zhang Zongchang insiste pour qu'on lui accorde tout le Jiangsu"
 fengtian_events.217.d3:0 "Zhang Zongchang est arrivé à Shenyang pour régler son conflit territorial avec Chen Tiaoyuan. Bien qu'aucun des deux n'ait proféré de menaces à notre connaissance, Zhang et Chen sont certainement capables de faire couler le premier sang si Zhang Zuolin ne parvient pas à résoudre la frontière. De longues heures de négociation avec Zhang Zongchang révèlent sa conclusion selon laquelle Chen Tiaoyuan et Anqing sont désormais responsables. Malgré la quantité de ressources investies à Anqing, il ressort des discussions que Zhang Zongchang pense que les commandants de tours à Anqing sont trop dangereux pour travailler pour le bien de la Chine. Zhang Zongchang insiste pour nous dire qu'il devrait garder tout notre nouveau territoire"
 fengtian_events.217.a:0 "Noté."

 fengtian_events.218.t:0 "Faire une proposition"
 fengtian_events.218.desc:9 "Zhang Zuolin has taken the two prevailing ideas of Chen Tiaoyuan and Zhang Zongchang into consideration. The fears of Zhang and Chen's rivalry was confirmed in these talks, but a surprising amount of trust was conferred to Zhang Zuolin. One could not properly predict either man's response, so there is no guarantee Zhang and Chen will agree to Marshal Zhang's decision. Although made in confidence, the weight of keeping the alliance alive and the possibility of Japan's judgement weighs heavy. After much deliberation, Zhang Zuolin has decided that, with regards to Shandong..."
 fengtian_events.218.a:9 "Shandong stays in Shandong."
 fengtian_events.218.b:9 "Shandong keeps Jiangsu."
 fengtian_events.218.c:9 "Shandong gets Jiangsu."
 fengtian_events.218.d:9 "Shandong keeps everything."

 #ANQ:
 fengtian_events.219.t:0 "Le Fengtian Fait une Proposition à Anqing"
 fengtian_events.219.d1:0 "Zhang Zuolin a communiqué sa décision à Chen Tiaoyuan. Concernant la question de la frontière Anqing-Shandong, Zhang Zuolin a déclaré que le Shandong devait céder tous les territoires situés en dehors de ses frontières. Pour la plupart des membres de l'état-major de Chen, il s'agit d'une victoire diplomatique. Cependant, quelques officiers estiment qu'un chien enragé tel que Zhang Zongchang ne devrait pas être autorisé à rester au pouvoir."
 fengtian_events.219.d2:0 "Zhang Zuolin a communiqué sa décision à Chen Tiaoyuan. Concernant la question de la frontière Anqing-Shandong, Zhang Zuolin a déclaré que le Shandong pouvait continuer à occuper le Jiangsu. Pour la plupart des membres de l'état-major de Chen, il s'agit d'une défaite diplomatique qui légitime la tyrannie de Zhang Zongchang. Cependant, nous savons que cette situation n'est que temporaire et que notre priorité absolue est actuellement de vaincre le Kuomintang. Nous devrions probablement accepter cette décision pour l'instant si nous ne voulons pas mener une guerre sur deux fronts."
 fengtian_events.219.d3:0 "Zhang Zuolin a communiqué sa décision à Chen Tiaoyuan. Concernant la question de la frontière Anqing-Shandong, Zhang Zuolin a déclaré que le Shandong devrait se voir attribuer la province du Jiangsu afin de l'apaiser, au moins temporairement. Pour la plupart des membres de l'état-major de Chen, il s'agit d'une défaite diplomatique qui légitime la tyrannie de Zhang Zongchang. Cependant, nous savons qu'une fois le Kuomintang éliminé, nous pourrons concentrer toute notre attention sur la reconquête du Jiangsu. Nous devrions donc peut-être accepter cette décision pour l'instant."
 fengtian_events.219.d4:0 "Zhang Zuolin a communiqué sa décision à Chen Tiaoyuan. Concernant la question de la frontière Anqing-Shandong, Zhang Zuolin a déclaré que le Shandong pouvait continuer à occuper l'ensemble du territoire qu'il avait pris à la Ligue des Huit Provinces. Cela constituerait une défaite diplomatique majeure et démontrerait un échec significatif de la part de Zhang Zuolin. Nous ne pouvons l'accepter."
 fengtian_events.219.a:0 "Accepter."
 fengtian_events.219.b:0 "Refusez de signer le traité."

 #SHD:
 fengtian_events.220.t:0 "Le Fengtian Fait une Proposition au Shandong"
 fengtian_events.220.d1:0 "Zhang Zuolin a communiqué sa décision à Zhang Zongchang. Concernant la question de la frontière Anqing-Shandong, Zhang Zuolin a déclaré que le Shandong devait céder tous les territoires situés en dehors de ses frontières. Pour l'état-major de Zhang Zongchang, il s'agit d'une défaite importante, car nous avons légitimement pris ces territoires à l'ancienne Ligue des Huit Provinces, qui n'existe plus aujourd'hui. Chen Tiaoyuan n'a pas plus de droits que nous sur ces terres."
 fengtian_events.220.d2:9 "Zhang Zuolin has delivered his decision to Zhang Zongchang. On the issue of the Anqing-Shandong border, Zhang Zuolin has declared that Shandong may continue to occupy Jiangsu Province (Xuzhou, Yancheng, Nantong states). This would be at least a temporary victory, as it will improve our chances of holding on to Jiangsu. However, we should be careful, as Anqing may seek to regain full control once they have dealt with the Kuomintang in the south."
 fengtian_events.220.d3:9 "Zhang Zuolin has delivered his decision to Zhang Zongchang. On the issue of the Anqing-Shandong border, Zhang Zuolin has declared that Shandong be awarded Jiangsu Province (Xuzhou, Yancheng, Nantong states). To most of Zhang Zongchang's military staff, this is a diplomatic victory. Anqing will not like this, so it is possible they might hold a grudge and move against us as soon as they have dealt with the Kuomintang. We should be very careful."
 fengtian_events.220.d4:9 "Zhang Zuolin has delivered his decision to Zhang Zongchang. On the issue of the Anqing-Shandong border, Zhang Zuolin has declared that Shandong be awarded Jiangsu Province (Xuzhou, Yancheng, Nantong states). We are also allowed to keep the rest of the territory we acquired from the League of Eight Provinces. This is a major victory, but Anqing will surely not accept this. However, it will give us a solid strategic position, aiding us in a potential conflict."
 fengtian_events.220.a:0 "Accepter."
 fengtian_events.220.b:0 "Refusez de signer le traité."

 fengtian_events.221.t:0 "Proposition de Zhang Zuolin Acceptée"
 fengtian_events.221.d:0 "La proposition du Fengtian a été acceptée par Zhang Zongchang et Chen Tiaoyuan. Peut-être s'agit-il là du début d'une nouvelle ère de coopération sous l'égide du Fengtian, qui mènera à la réunification nationale ? De nombreux membres de l'état-major sont optimistes, y voyant un triomphe que même Wu Peifu n'avait pas réussi à accomplir."
 fengtian_events.221.a:0 "La paix... pour le moment."

 fengtian_events.222.t:0 "Proposition de Zhang Zuolin Rejetée"
 fengtian_events.222.d:0 "La proposition du Fengtian a été rejetée par Zhang Zongchang et Chen Tiaoyuan. Il semble que les deux hommes resteront sur des positions hostiles et peu coopératives dans un avenir proche. Cela signifie-t-il que les négociations diplomatiques visant à réunifier la Chine sont vouées à l'échec ? Certains membres de l'état-major partagent cet avis, faisant valoir que même Wu Peifu n'aurait pas pu trouver de solution diplomatique."
 fengtian_events.222.a:0 "Malheureux, mais pas surprenant."

 fengtian_events.223.t:0 "Le Shandong et Anqing Trouvent un Accord"
 fengtian_events.223.d:0 "Après avoir échoué à instaurer une paix provisoire entre nos alliés, le Shandong et Anqing, nous avons appris par les diplomates d’Anqing et du Shandong qu’ils avaient conclu eux-mêmes un accord de paix provisoire, car ils n’étaient pas satisfaits de nos efforts. Apparemment, un humble diplomate a pris des risques et proposé un accord, de son propre chef. Si cet homme courageux a accompli une bonne action et instauré une paix qui nous est favorable, cela ne fait que mettre en évidence notre propre incompétence."
 fengtian_events.223.a:0 "Surprenant."

 fengtian_events.224.t:0 "Le Shandong et Anqing se Déclarent la Guerre"
 fengtian_events.224.d:0 "Nous ne savons pas exactement ce qui s'est passé, mais il semblerait que les négociations entre le Shandong et Anqing aient échoué d'une manière ou d'une autre. Les personnalités de Zhang Zongchang et de Chen Tiaoyuan ont clairement joué un rôle dans cette rupture. Anqing et Shandong, bien qu'ils soient tous deux favorables à une victoire du Fengtian, semblent prêts à déployer des troupes l'un contre l'autre. L'état-major est divisé : certains sont favorables à la protection de nos anciens investissements au Shandong par l'intermédiaire de Zhang Zongchang, tandis que d'autres préfèrent protéger la vallée fluviale plus riche sous le commandement de Chen Tiaoyuan."
 fengtian_events.224.a:0 "Soutenez Chen."
 fengtian_events.224.b:0 "Soutenez Zhang."
 fengtian_events.224.c:0 "Notre implication s'arrête là."

 fengtian_events.225.t:0 "Kuomintang vaincu - Conférence sur la nouvelle guerre"
 fengtian_events.225.d1:0 "Le Kuomintang de gauche a été vaincu avec succès. C'est une excellente nouvelle qui signifie que nos alliés contrôlent les cinq provinces, ce qui nous donne un énorme avantage face à [QIE.GetNameDef], mais cela pose également des problèmes. Peu de temps après la nouvelle de la défaite du Kuomintang, nous avons reçu un télégramme de Zhang Zongchang de la Clique du Shandong. Dans ce télégramme, qui part souvent en tangente et refuse d'en venir au fait jusqu'à la fin, Zhang décrit la force de notre "Vieille Alliance" et qu'en tant que telle, nous devrions le soutenir pour qu'il prenne le contrôle des Cinq Provinces. C'est assez scandaleux, car cela conduirait certainement à une guerre avec la Clique d'Anqing, ce qui serait un désastre. Cependant, il est vrai que Zhang Zongchang et Zhang Zuolin ont une longue histoire. Nous devrons organiser une autre conférence pour déterminer une solution qui satisfasse à la fois Zhang et Chen Tiaoyuan de la Clique d'Anqing"
 fengtian_events.225.d2:9 "The Left Kuomintang have been successfully defeated. While this is great news and means that our allies control the Five Provinces, which gives us an enormous advantage against [QIE.GetNameDef], it also introduces problems. Not long after the news broke that the Kuomintang were defeated, we received a telegram from Zhang Zongchang of the Shandong Clique and Chen Tiaoyuan of the Anqing Clique.\n\nZhang's telegram asks us to honour our old alliance and support him to press claims on the rest of the provine of Jiangsu (Xuzhou, Yancheng, Nantong states), which he only partially controls. It is true that Zhang Zongchang and Zhang Zuolin go back a long way. Chen instead describes the fact that as the legitimate successor to the League, all of the Five Provinces should fall under his dominion. He demands that all of Jiangsu is returned to him at once. If things are to end well, we will have to hold another conference to determine a solution that both Zhang and Chen Tiaoyuan of the Anqing Clique are satisfied with."
 fengtian_events.225.d3:9 "The Left Kuomintang have been successfully defeated. While this is great news and means that our allies control the Five Provinces, which gives us an enormous advantage against [QIE.GetNameDef], it also introduces problems. Not long after the news broke that the Kuomintang were defeated, we received a telegram from Chen Tiaoyuan of the Anqing Clique.\n\nChen says it is outrageous that Zhang Zongchang of the Shandong Clique is allowed to hold all of Jiangsu (Xuzhou, Yancheng, Nantong states) considering that Chen's Anqing Clique is the legitimate successor to the League. While he has a point, we never recognised the League originally and Zhang is an old friend. If things are to end well, we will have to hold another conference to determine a solution that both Zhang and Chen Tiaoyuan of the Anqing Clique are satisfied with."
 fengtian_events.225.a:9 "Think of a solution."
 fengtian_events.225.b:9 "Let them fight it out."

 fengtian_events.226.t:0 "Une Solution au Conflit"
 fengtian_events.226.d1:0 "À notre avis, il serait préférable que Zhang Zongchang fasse simplement marche arrière et laisse Chen contrôler l’ensemble des Cinq Provinces. Cela nous éviterait bien des ennuis. Cependant, avec Zhang, on ne sait jamais comment il va réagir, et le forcer à céder pourrait l’amener à faire ce qu’il veut de toute façon. Bien sûr, il pourrait aussi être intimidé par notre puissance militaire et simplement accepter. Nous devrons y réfléchir mûrement."
 fengtian_events.226.d2:0 "Comme Zhang et Chen sont tous deux mécontents, le problème devient difficile à résoudre. Nous pourrions forcer l'un d'eux à céder et laisser l'autre obtenir ce qu'il veut, mais cela pourrait très mal finir. Il faudra sans doute trouver un compromis."
 fengtian_events.226.d3:0 "Il serait préférable que Chen Tiaoyuan fasse simplement marche arrière et laisse le Jiangsu à Zhang. Cela résoudrait très probablement le problème. Cependant, Chen est un homme fier qui considère sa Clique d’Anqing comme la véritable héritière de la Ligue, laquelle englobe nécessairement les Cinq Provinces, dont fait partie le Jiangsu. Compte tenu de ses victoires et du soutien dont il bénéficie auprès de la population, il est peu probable qu’il cède simplement. Nous devrons donc chercher à trouver un compromis."
 fengtian_events.226.a:9 "Forcez Zhang à reculer."
 fengtian_events.226.b:9 "Forcez Chen à reculer."
 fengtian_events.226.c:9 "Proposons un compromis."

 fengtian_events.227.t:0 "Une Solution de Compromis"
 fengtian_events.227.d:9 "Il est clair que Chen ne cédera pas tant qu'il ne pourra pas, d'une manière ou d'une autre, se proclamer maître du Jiangsu (provinces de Xuzhou, Yancheng et Nantong). Zhang, lui aussi, ne se contentera jamais de se retrouver coincé avec le seul Shandong. Cela signifie que nous devrons diviser le Jiangsu, d'une manière ou d'une autre. Une possibilité serait de séparer simplement la région occidentale de Xuzhou, qui reviendrait à Zhang, de la région orientale de Yancheng, cette dernière incluant Nantong et revenant à Chen. Il est peu probable que Chen considère cela comme suffisant, car la province était gouvernée depuis Xuzhou, où se croisent également les voies ferrées les plus importantes de la province. Une autre possibilité serait de séparer le contrôle économique du contrôle politique. Dans ce scénario, l’un dirigerait officiellement le gouvernement du Jiangsu, qui devrait bien sûr être dirigé par un gouverneur au moins quelque peu indépendant. L’autre serait alors autorisé à nommer un vice-gouverneur, qui aurait le contrôle de toutes les ressources de la province et serait habilité à lever des impôts et à mener des recrutements, entre autres."
 fengtian_events.227.a:9 "Divisez le Jiangsu entre eux deux."
 fengtian_events.227.b:9 "Chen aura le Jiangsu, Zhang pourra l'exploiter."
 fengtian_events.227.c:9 "Zhang aura le Jiangsu, Chen pourra l'exploiter."

 fengtian_events.228.t:0 "Le Fengtian nous Force à Reculer !"
 fengtian_events.228.d:0 "Le gouvernement du Fengtian a déclaré que notre attitude intransigeante était la raison pour laquelle aucun accord n'avait été conclu. Il affirme que la seule solution est que nous cédions et retirions toutes nos revendications, faute de quoi il serait contraint d'envisager sérieusement une intervention militaire. C'est bien sûr scandaleux et cela n'a rien d'une véritable solution durable. Nous devrons les prendre au mot."
 fengtian_events.228.a:0 "Dites-leur qu'ils bluffent."

 fengtian_events.229.t:0 "Le Fengtian Propose un Compromis"
 fengtian_events.229.d1split:9 "The Fengtian government, in an effort to solve our problem with Shandong, has proposed a compromise. They say that by splitting the province of Jiangsu, we will both get something of value. We would get Yancheng and Nantong. Of course we cannot accept this, as Xuzhou is the heart of Jiangsu and an important railway hub. We cannot accept giving a way a part of the Five Provinces! Fengtian has utterly failed to defuse the situation."
 fengtian_events.229.d1specrzhang:0 "Le gouvernement du Fengtian, dans un effort pour résoudre notre problème avec le Shandong, a proposé un compromis. Ils disent que nous pourrons contrôler la province politiquement. Nous devrions nommer un gouverneur quelque peu indépendant en signe de bonne volonté envers le Shandong. En échange, Zhang obtiendrait le contrôle économique de la province, ce qui signifie qu'il est autorisé à prélever des impôts et à mener des recrutements. Cela signifie que nous pouvons prétendre de manière plausible que nous contrôlons l'ensemble des Cinq Provinces. Permettre à Zhang ce contrôle économique est un petit prix à payer pour la paix, surtout si cela rend le Fengtian, notre bienfaiteur, heureux."
 fengtian_events.229.d1specrchen:0 "Le gouvernement du Fengtian, dans le but de résoudre notre problème avec le Shandong, a proposé un compromis. Il suggère que nous laissions le contrôle politique entre les mains de Zhang, qui nommerait un gouverneur relativement indépendant en signe de bonne volonté. En échange, nous obtiendrions le contrôle économique de la province, y compris le droit de lever des impôts. Bien que cette proposition soit intéressante, cela signifierait que sur toutes les cartes, c'est Zhang qui détiendrait le Jiangsu. Nous céderions ainsi une partie intégrante de notre territoire, l'une des Cinq Provinces. C'est inacceptable !"
 fengtian_events.229.d2split:9 "The Fengtian government, in an effort to solve our problem with Shandong, has proposed a compromise. They say that by splitting the province of Jiangsu, we will both get something of value. We would get Xuzhou, an important railway hub. Of course we cannot accept this, as this leaves the region without sea access and also means that for all our efforts in the war, we only get half a province! We cannot accept such a laughable proposal. Fengtian has utterly failed to defuse the situation."
 fengtian_events.229.d2specrzhang:0 "Le gouvernement du Fengtian, dans le but de résoudre notre problème avec le Shandong, a proposé un compromis. Il affirme que Chen contrôlera la province sur le plan politique et devra nommer un gouverneur relativement indépendant en signe de bonne volonté à notre égard. En échange, nous obtiendrons le contrôle économique de la province, ce qui signifie que nous serons autorisés à prélever des impôts et à mener des campagnes de recrutement. Même si cela signifie que nos efforts contre la Ligue ne se traduiront pas par une expansion territoriale, la province du Jiangsu est très riche. Cela nous permettrait également de renforcer considérablement nos rangs et nous donnerait de nombreuses occasions d'agrandir nos armées afin de frapper à nouveau à l'avenir. Cependant, le contrôle total reste l'idéal et si Chen parvient à se reconstruire, il sera très difficile de le vaincre."
 fengtian_events.229.d2specrchen:9 "The Fengtian government, in an effort to solve our problem with Shandong, has proposed a compromise. They say that we would have full political control of Jiangsu, but we would have to appoint a somewhat independent governor as a sign of goodwill towards Anqing. In exchange, they would get economic control over the province, which includes levying taxes. Adding Jiangsu to our control means an enormous boost to the prestige of our government, even if it means we cannot benefit economically as much as we'd like. This option is very tempting."
 fengtian_events.229.a:9 "D'accord."
 fengtian_events.229.b:9 "Only war can solve this."

 fengtian_events.230.t:0 "[FROM.GetNameDefCap] met notre bluff à l'épreuve"
 fengtian_events.230.d:0 "[FROM.GetNameDefCap] a mis au jour notre bluff, convaincu que nous ne prendrons aucun risque réel et que nous ne soutiendrons ni Anqing ni le Shandong."
 fengtian_events.230.a:0 "Nous n'interviendrons pas"
 fengtian_events.230.b:9 "We'll fight."

 fengtian_events.231.t1:0 "Le Shandong ne recule pas"
 fengtian_events.231.t2:0 "Anqing ne recule pas"
 fengtian_events.231.d1:0 "Shandong a été contraint de faire marche arrière par Fengtian, mais a plutôt appelé leur bluff, Fengtian ayant décidé qu'il était temps d'intervenir."
 fengtian_events.231.d2:0 "Anqing a été contraint de faire marche arrière par Fengtian, mais a plutôt appelé à leur bluff, avec Fengtian décidant qu'il était temps d'intervenir."
 fengtian_events.231.a:0 "Reprenons la guerre dans ce cas."

 #other rejects:
 fengtian_events.232.t:0 "Le compromis se brise"
 fengtian_events.232.d:0 "En raison du refus d'une des parties, le compromis proposé par Fengtian n'a pas été accepté. La diplomatie a été interrompue et notre ennemi se mobilise. Il semble que Fengtian n'ait pas été un très bon médiateur, après tout"
 fengtian_events.232.a:0 "Reprenons la guerre dans ce cas."

 fengtian_events.233.t:0 "Compromis accepté"
 fengtian_events.233.d:0 "Le compromis élaboré par Fengtian, qui implique un contrôle politique aux mains de la clique de Chen à Anqing et un contrôle économique appartenant à Zhang, a été accepté par toutes les parties. Cela signifie que Shandong et Anqing peuvent maintenant devenir des alliés sous la protection de Fengtian"
 fengtian_events.233.a:0 "Excellentes nouvelles"

 fengtian_events.234.t:0 "Compromis rejeté"
 fengtian_events.234.d1:0 "Malheureusement, le comportement a été rejeté. Le Shandong n'a pas accepté le comportement, ce qui signifie qu'il est inutile. Anqing l'a cependant accepté, mais il fallait que les deux parties se mettent d'accord si nous voulions que cela fonctionne. Cela signifie que nos alliés, Shandong et Anqing, iront sûrement en guerre. Nous pouvons décider de soutenir l'un des deux, ou simplement attendre"
 fengtian_events.234.d2:0 "Malheureusement, le comportement a été rejeté. Anqing n'a pas accepté le comportement, ce qui signifie qu'il n'est d'aucune utilité. Shandong l'a cependant accepté, mais il fallait que les deux parties se mettent d'accord si nous voulions que cela fonctionne. Cela signifie que nos alliés, Shandong et Anqing, iront sûrement en guerre. Nous pouvons décider de soutenir l'un des deux, ou simplement attendre. "
 fengtian_events.234.d3:0 "Malheureusement, le comportement a été rejeté. Shandong et Anqing ont tous deux refusé le comportement, le rendant complètement inutile. Cela signifie que nos alliés, Shandong et Anqing, iront sûrement en guerre. Nous pouvons décider de soutenir l'un des deux, ou simplement attendre"
 fengtian_events.234.a:9 "We won't intervene."
 fengtian_events.234.b:9 "Support Chen. (Anqing)"
 fengtian_events.234.c:9 "Support Zhang. (Shandong)"

 fengtian_events.235.t:0 "Soutenir Chen"
 fengtian_events.235.d:0 "En raison de notre décision de soutenir la clique d'Anqing de Chen Tiaoyuan dans son combat contre Zhang Zongchang de Shandong, nous continuerons à expédier des armes à Chen, ce qui, espérons-le, lui permettra de gagner plus facilement."
 fengtian_events.235.a:0 "Très bien."

 fengtian_events.236.t:0 "Soutenir Zhang"
 fengtian_events.236.d:0 "En raison de notre décision de soutenir la clique de Shandong de Zhang Zongchang dans sa lutte contre Chen Tiaoyuan d'Anqing, nous cessons immédiatement nos livraisons d'armes à Anqing. Notre aide ira plutôt à Shandong, et le Japon suivra notre exemple."
 fengtian_events.236.a:0 "Très bien."

 fengtian_events.237.t:0 "Le Fengtian Recule"
 fengtian_events.237.d:0 "Le Gouvernement du Fengtian a annoncé qu'il resterait neutre dans le conflit opposant Anqing au Shandong. Nous sommes désormais seuls, tout comme notre ennemi."
 fengtian_events.237.a:0 "Très bien."

 fengtian_events.2371.t:0 "Le Fengtian Soutient le Shandong"
 fengtian_events.2371.d:0 "Le Gouvernement du Fengtian a apporté son soutien exclusif à la Clique du Shandong dirigée par Zhang Zongchang dans le conflit qui vient d'éclater entre ses deux alliés de l'Est. En conséquence, il nous a été demandé de suspendre notre aide à la Clique d'Anqing dirigée par Chen Tiaoyuan. Bien que nous puissions refuser, les objectifs anti-concessionnistes de Chen vont à l'encontre de nos intérêts en Chine, et des forces puissantes au sein du gouvernement insistent pour que nous accédions à la demande de Zhang. Nous pouvons réorienter notre soutien vers le Shandong, si nous le souhaitons."
 fengtian_events.2371.a:0 "Très bien."

 fengtian_events.2372.t:0 "Le Fengtian Soutient Anqing"
 fengtian_events.2372.d:0 "Le Gouvernement du Fengtian a apporté son soutien exclusif à la Clique d'Anqing dirigée par Chen Tiaoyuan dans le conflit qui vient d'éclater entre ses deux alliés de l'Est. En conséquence, on nous a demandé de suspendre notre aide à la Clique du Shandong dirigée par Zhang Zongchang. Bien que nous puissions refuser, des forces influentes au sein du gouvernement insistent pour que nous accédions à la demande de Zhang. Nous pouvons réorienter notre soutien vers Anqing, si nous le souhaitons."
 fengtian_events.2372.a:0 "Très bien."

 fengtian_events.243.t:0 "Anqing s'engage dans la reconquête"
 fengtian_events.243.d:0 "La Clique d'Anqing a pris la bonne décision et a décidé de rejoindre notre alliance et de s'engager à nous aider dans la guerre de reconquête contre Beijing. Ils ont pesé de nombreux facteurs, et savoir qu'ils ont quand même décidé de se joindre à notre cause est une très bonne nouvelle."
 fengtian_events.243.a:0 "Bien"

 fengtian_events.244.t:0 "Abandon des revendications d'Anqing"
 fengtian_events.244.d1:0 "La Clique d'Anqing, dirigée par Chen Tiaoyuan, a décidé de refuser toute participation à notre guerre de reconquête contre les [QIE.GetName] ! C'est extrêmement irrespectueux, car notre gouvernement et les Japonais les ont soutenus pendant la guerre de la Ligue et les ont aidés à prendre le contrôle des cinq provinces. Cependant, nous avons besoin de toute l'aide que nous pouvons obtenir, et en tant que telle, nous pouvons laisser faire et espérer qu'ils se joindront à la guerre, quelle que soit la date à laquelle elle aura commencé. Mais s'ils ne s'y joignent pas, cela signifierait que nous devrions les considérer comme un autre chef de guerre que nous devrons faire tomber pour unir la Chine."
 fengtian_events.244.d2:0 "La Clique d'Anqing, dirigée par Chen Tiaoyuan, a décidé de refuser toute participation à notre guerre de reconquête contre les [QIE.GetName] ! C'est extrêmement irrespectueux, car notre gouvernement et les Japonais les ont soutenus pendant la guerre de la Ligue et les ont aidés à prendre le contrôle des cinq provinces. Nous avons également investi des ressources considérables dans leur reconstruction, en espérant qu'ils s'avéreraient un allié plus précieux. Nous devrions annuler notre aide à la reconstruction immédiatement. Cependant, nous avons besoin de toute aide que nous pouvons obtenir, et en tant que telle, nous pourrions la laisser faire et espérer qu'ils se joindront à la guerre, quelle que soit la date à laquelle elle aura commencé. Mais s'ils ne s'y joignent pas, cela signifierait que nous devrions les considérer comme un autre seigneur de guerre que nous devrons abattre pour unir la Chine."
 fengtian_events.244.a:0 "Coupez les liens et dénoncez-les."
 fengtian_events.244.b:0 "Tolérez-les et attendez."

 fengtian_events.245.t:0 "Anqing Rompt ses Liens"
 fengtian_events.245.d:0 "Malheureusement, bien que nous ayons décidé de tolérer Anqing pour le moment, ils ont eux-mêmes décidé de rompre tous leurs liens. Cela signifie que nous ne pouvons pas compter sur eux et que nous devons les considérer comme juste une autre clique de seigneurs de la guerre."
 fengtian_events.245.a:0 "Dommage."

 fengtian_events.246.t:0 "Anqing Annexe le Shandong"
 fengtian_events.246.d:0 "A l'origine, nous avions convenu avec Anqing qu'ils contrôleraient temporairement le Shandong jusqu'au début de la Guerre de Reconquête, car ils ne l'avaient pas revendiqué et nous avaient reconnu comme le gouvernement national. Maintenant que cela n'est plus le cas, Chen Tiaoyuan d'Anqing a décidé de prendre le contrôle total du Shandong et d'en faire une partie de sa Ligue. Cela signifie que ce territoire nous est inaccessible."
 fengtian_events.246.a:0 "Mauvaise nouvelle."

 fengtian_events.247.t:0 "Anqing Annexe le Shandong"
 fengtian_events.247.d:0 "A l'origine, nous avions convenu avec Anqing qu'ils contrôleraient temporairement le Shandong jusqu'au début de la Guerre de Reconquête, car ils ne l'avaient pas revendiqué et nous avaient reconnu comme le gouvernement national. Maintenant que cela n'est plus le cas, Chen Tiaoyuan d'Anqing a décidé de prendre le contrôle total du Shandong et d'en faire une partie de sa Ligue. Cela signifie que ce territoire nous est inaccessible."
 fengtian_events.247.a:0 "Mauvaise nouvelle."

 fengtian_events.251.t:0 "Acceptation du suffrage féminin"
 fengtian_events.251.d:0 "La population a finalement accepté l'idée que les femmes puissent voter aux élections locales, ce qui était assez controversé auparavant car il s'agit d'un changement comparativement radical compte tenu de la société très conservatrice de la Chine. Song Qingling a déclaré que c'était une grande victoire pour les droits des femmes en Chine, ce qui est la raison principale pour laquelle [FNG.GetNameDef] a mis en place cette politique en premier lieu"
 fengtian_events.251.a:9 "A victory for women, a victory for democracy."

 fengtian_events.252.t:0 "Les travailleurs protestent contre nos politiques"
 fengtian_events.252.d_north:0 "Dans une tentative odieuse d'arrêter les armées qui balayent maintenant leur territoire [QIE.GetNameDef] a fait l'impensable et a fait sauter les digues du fleuve Jaune près de Zhengzhou. La vague d'eau qui a suivi s'est précipitée sur Hebei, Daming et Cangzhou, emportant avec elle des villages et des villes entières. On pense que des centaines de milliers de personnes se sont noyées et que la destruction catastrophique des terres agricoles menace de faire mourir de faim des millions d'autres personnes.\n\nFace à cette tragédie indélébile, le peuple chinois doit comprendre que plus vite [QIE.GetNameDef] aura disparu, mieux ce sera."
 fengtian_events.252.d_south:0 "Dans une tentative odieuse d'arrêter les armées qui balayent maintenant leur territoire [QIE.GetNameDef] a fait l'impensable et a fait sauter les digues du fleuve Jaune près de Zhengzhou. La vague d'eau qui s'ensuivit se précipita sur Kaifeng, emportant avec elle des villages et des villes entières. On pense que des centaines de milliers de personnes se sont noyées et que la destruction catastrophique des terres agricoles menace de faire mourir de faim des millions d'autres personnes.\n\nFace à cette tragédie indélébile, le peuple chinois doit comprendre que plus vite [QIE.GetNameDef] aura disparu, mieux ce sera."
 fengtian_events.252.d_north_evac:0 "Dans une tentative odieuse d'arrêter les armées qui balayent maintenant leur territoire [QIE.GetNameDef] a fait l'impensable et a fait sauter les digues du fleuve Jaune près de Zhengzhou. La vague d'eau qui s'ensuivit se précipita sur Hebei, Daming, and Cangzhou, emportant avec elle des villages et des villes entières. On pense que des centaines de milliers de personnes se sont noyées et que la destruction catastrophique des terres agricoles menace de faire mourir de faim des millions d'autres personnes.\n\nFace à cette tragédie indélébile, le peuple chinois doit comprendre que plus vite [QIE.GetNameDef] aura disparu, mieux ce sera."
 fengtian_events.252.d_south_evac:0 "Dans une tentative odieuse d'arrêter les armées qui balayent maintenant leur territoire [QIE.GetNameDef] a fait l'impensable et a fait sauter les digues du fleuve Jaune près de Zhengzhou. La vague d'eau qui s'ensuivit se précipita sur Kaifeng, emportant avec elle des villages et des villes entières. On pense que des centaines de milliers de personnes se sont noyées et que la destruction catastrophique des terres agricoles menace de faire mourir de faim des millions d'autres personnes.\n\nFace à cette tragédie indélébile, le peuple chinois doit comprendre que plus vite [QIE.GetNameDef] aura disparu, mieux ce sera."
 fengtian_events.252.a:0 "[QIE.GetLeader] est un monstre !"

 fengtian_events.253.t:0 "Loyauté des Ouvriers Assurée"
 fengtian_events.253.d:0 "Le [FNG.GetName] a finalement atteint son objectif de détruire l'influence des syndicats, en recourant à divers moyens tels que la répression syndicale, la propagande antisyndicale, ainsi que le renforcement du contrôle national sur les secteurs clés de l'industrie. La propagande a fait croire que les syndicats ne sont qu'un moyen de diviser la société, nous affaiblissant face à l'Occident, ce à quoi la plupart des travailleurs adhèrent désormais."
 fengtian_events.253.a:0 "Les syndicats divisent le pays face à l'impérialisme étranger !"

 fengtian_events.254.t:0 "La réforme de la structure de commandement est terminée"
 fengtian_events.254.d:0 "La réforme massive de la structure de commandement du [FNG.GetName] est enfin terminée, créant enfin une structure de commandement centralisée en Chine, considérée par le gouvernement central comme primordiale pour empêcher une nouvelle division de la Chine à l'avenir. Bien que cette réforme ait considérablement amélioré l'efficacité de l'armée, elle est très impopulaire auprès des généraux de haut rang car elle leur retire leur autonomie antérieure, tout comme les seigneurs de la guerre qui gouvernent dans de nombreuses régions de cette nation"
 fengtian_events.254.a:0 "La Chine sera unie pour toujours !"

 fengtian_events.255.t:0 "Nos Ennemis se Préparent à la Guerre !"
 fengtian_events.255.d_1:0 "Selon nos espions à [FROM.Capital.GetCapitalVictoryPointName], le [FROM.GetName] se prépare à nous déclarer la guerre bientôt. Cette lutte concernera notre survie."
 fengtian_events.255.d_2:0 "Au plus noir de la nuit, deux trains, longs de trente-quatre wagons, sont passés par la gare Huanggutun à Shenyang en direction d'une zone près de Jinxi, 250 km au sud. Deux heures plus tard, deux autres trains sont passés, pour un total de dix au matin. Nos espions en sont désormais certains, un grand rassemblement a commencé au-delà de la Grande Muraille. Une fois encore, les armées de  Zhang Zuolin se préparent à marcher vers le sud par la Passe de Shanhai. Une fois encore, nous devons écraser ces chiens du nord, comme il y a dix ans, comme l'ont fait les dynasties de jadis."
 fengtian_events.255.d_3:0 "Nos espions à [FROM.Capital.GetCapitalVictoryPointName] rapportent que le [FROM.GetName] se prépare à rejoindre la guerre du [FNG.GetName] contre nous !"
 fengtian_events.255.a:0 "Nous avons peu de temps pour nous préparer."

 fengtian_events.256.t:0 "[FROM.GetNameDef] demande de l'aide !"
 fengtian_events.256.d:0 "La nouvelle est arrivée par téléphone directement de [FROM.Capital.GetCapitalVictoryPointName], nos alliés de [FROM.GetName] sont sur le point d'être attaqués par [FNG.GetName] ! Leurs forces sont déjà mobilisées, mais ils ne peuvent pas affronter cet ennemi seuls."
 fengtian_events.256.a:0 "Nous devons nous préparer !"

 fengtian_events.270.t:0 "La Question de l'Occupation"
 fengtian_events.270.d:0 "Les occupations ne sont jamais faciles ni simples, mais le soldat chinois moyen n’est souvent guère mieux qu’un bandit muni d’ordres de marche. Nos troupes ont déjà commencé à incendier, piller et profaner les mêmes villes et villages que notre gouvernement prétend libérer. Certains diront qu’il faudrait laisser les troupes s’amuser, mais maintenant que le grand maréchal Zhang Zuolin est de nouveau en lice sur la scène nationale, il doit veiller à son image. Il a lui-même été bandit autrefois, et beaucoup ici, dans le sud, ont du mal à respecter un ancien criminel ou à se soumettre à ses ordres. L’élite a déjà tourné le dos, et bien que la force puisse être une solution facile, nous avons besoin de ces intellectuels, propriétaires terriens et hommes d’affaires pour faire avancer nos grands objectifs. C’est par l’intermédiaire de ces personnalités que nous devons gouverner. Heureusement, notre système logistique est suffisant pour nourrir nos soldats, ce qui signifie que nos hommes ne pillent pas pour survivre, mais ils n’en seront pas moins mécontents d’être privés de ce qu’ils considèrent comme leur droit de conquête.\n\nNous devons ici faire un choix : les libérateurs ou les libérés ?"
 fengtian_events.270.a:0 "Laissons-les s'amuser."
 fengtian_events.270.b:0 "Nous ne sommes plus des bandits."

 fengtian_events.271.t:0 "Nourrir la plaine de Chine du Nord"
 fengtian_events.271.d_food:0 "Alors que nous étendons notre autorité sur les zones nouvellement reconquises, nous devons nous assurer qu'elles aussi font leur part dans la marche vers la réunification. Malheureusement, la plaine de Chine du Nord est densément peuplée et consomme plus de nourriture qu'elle n'en produit, transformant des terres par ailleurs richement taxées en une ponction sur nos ressources. Heureusement, la Mandchourie est vaste et fertile, et grâce à notre décision de ne pas faire passer l'"Initiative pour l'agriculture du soja", nous pouvons nous permettre de nourrir la majeure partie de la population"
 fengtian_events.271.d_exports:0 "Alors que nous étendons notre autorité sur les zones nouvellement récupérées, nous devons nous assurer qu'elles aussi font leur part dans la marche vers la réunification. Malheureusement, la plaine de Chine du Nord est densément peuplée et consomme plus de nourriture qu'elle n'en produit, transformant des terres par ailleurs richement taxées en une ponction sur nos ressources. D'une part, la Mandchourie est vaste et fertile, et grâce à notre décision de ne pas faire passer l'"Initiative pour l'agriculture du soja", nous pouvons nous permettre de nourrir la majeure partie de la population. D'autre part, nous exportons actuellement tous nos excédents de céréales vers le Japon pour compenser la famine actuelle : La Chine ou le Japon ? Devons-nous faire passer notre propre peuple en premier, ou nous recroqueviller devant la suprématie martiale japonaise ?"
 fengtian_events.271.d_soy:0 "Alors que nous étendons notre autorité sur les zones nouvellement reconquises, nous devons nous assurer qu'elles aussi font leur part dans la marche vers la réunification. Malheureusement, la plaine de Chine du Nord est densément peuplée et consomme plus de nourriture qu'elle n'en produit, transformant des terres par ailleurs richement taxées en une ponction sur nos ressources. Malheureusement, grâce à l'Initiative pour l'agriculture du soja, une grande partie de la production céréalière du Nord-Est a été remplacée par des cultures de rente à base de soja. Avec à peine assez de nourriture pour nourrir le Nord-Est, nous ne pouvons même pas commencer à penser à expédier de la nourriture ailleurs. La Chine du Nord devra endurer une famine, qui aura une mauvaise image de notre leadership."
 fengtian_events.271.a:0 "Importer des céréales de Mandchourie"
 fengtian_events.271.b:0 "Nous avons besoin du grain, arrêtez d'exporter au Japon."
 fengtian_events.271.c:0 "Nous ne pouvons pas leur tenir tête."
 fengtian_events.271.e:0 "Ces foutus fèves de soja !"

 fengtian_events.272.t:0 "Scandale à Beijing"
 fengtian_events.272.d_bad:0 "Un certain nombre de pillages étaient inévitables à Beijing. Capitale nationale depuis des siècles et foyer de générations d'empereurs, la richesse répartie dans la bureaucratie omniprésente de la ville a longtemps échappé à toute mesure. Cependant, ce n'est pas la richesse matérielle qui a entraîné la ville dans un scandale. On suppose que certains de nos soldats ont capturé les épouses et les concubines de ministres du gouvernement et, après avoir commis des actes inqualifiables, les ont fait parader dans les rues de la ville comme des trophées. Pour aggraver les choses, certains ont été placés sur un échafaudage de fortune et sont vendus comme des bavardages au plus offrant. Dans toute armée disciplinée, ils seraient exécutés pour ce comportement, et nous avons donné des assurances en ce sens à la population locale, mais il est fort possible que l'affaire soit passée sous silence par les commandants locaux"
 fengtian_events.272.d_good:0 "Un certain nombre de pillages étaient inévitables à Beijing. Capitale nationale depuis des siècles et foyer de générations d'empereurs, la richesse répartie dans la bureaucratie omniprésente de la ville a longtemps échappé à toute mesure. Cependant, ce n'est pas la richesse matérielle qui a entraîné la ville dans un scandale. On suppose que certains de nos soldats ont capturé les épouses et les concubines de ministres du gouvernement et, après avoir commis des actes inqualifiables, les ont fait parader dans les rues de la ville comme des trophées. Pour aggraver les choses, certains ont été placés sur un échafaudage de fortune et sont vendus comme des bavardages au plus offrant. Dans toute armée disciplinée, ils seraient exécutés pour ce comportement, et nous avons donné des assurances en ce sens à la population locale. Heureusement, grâce à notre code de conduite et aux réactions rapides d'un commandant moins tolérant, la majorité de ces soldats ont été empêchés et attendent d'être punis"
 fengtian_events.272.a:0 "C'est scandaleux !"

 fengtian_events.273.t:0 "Profanation dans le comté de Yi"
 fengtian_events.273.d_bad:0 "Des nouvelles alarmantes sont apparues dans le comté de Yi, dans la province de Zhili, où un certain nombre de soldats de l'armée fengtienne ont fait sauter l'entrée de plusieurs tombes Qing occidentales. Depuis la vulgaire profanation du lieu de repos de l'impératrice douairière Cixi en 1928, par le subordonné indirect de Zhang, Sun Dianying, ce sujet a été utilisé pour nuire à la réputation du Grand Maréchal dans certains milieux. Avec ce nouvel épisode, si semblable au précédent, il n'y aura peut-être pas de véritable rétablissement. Le montant exact des richesses volées dans les tombes n'est pas clair, mais les soldats impliqués ont disparu dans les roseaux le long du lac Baiyangdian, et la majorité d'entre eux se retrouveront probablement bientôt sur le marché noir"
 fengtian_events.273.d_good:0 "Des nouvelles alarmantes sont apparues dans le comté de Yi, dans la province de Zhili, où un certain nombre de soldats de l'armée fengtienne auraient commencé à placer de la dynamite à l'entrée des tombes Qing occidentales. Depuis la vulgaire profanation du lieu de repos de l'impératrice douairière Cixi en 1928, par le subordonné indirect de Zhang, Sun Dianying non moins, ce sujet a été utilisé pour nuire à la réputation du Grand Maréchal dans certains milieux. Avec ce nouvel épisode, si semblable au précédent, il est heureux qu'un officier supérieur ait pu empêcher tout dommage grave. Indépendamment des intentions prétendument républicaines des soldats, il est important pour la légitimité nationale que nous respections nos ancêtres. C'est de leur exemple d'une seule Chine unifiée et inflexible que nous nous inspirons, sinon que nous pratiquons"
 fengtian_events.273.a:0 "Même l'histoire monarchiste peut mériter d'être préservée !"

 fengtian_events.274.t:0 "Désordre à Baoding"
 fengtian_events.274.d:9 "Disturbing reports have begun to emerge from Baoding Military Academy, which a company of our soldiers recently captured and occupied. As a military target in which the enemy held out for over a week, damage to the building was expected, as was some degree of looting, but few expected to hear of our men killing one another over the spoils. Supposedly the institution's store of medals and rank insignia was discovered shortly after its capture, creating several self-declared colonels, majors, and generals, each belonging to a variety of self-awarded honourable orders. These men, completely ignorant of the actual standing granted by their regalia, began to fight over precedence. By the time troops arrived from elsewhere to relieve the actual commander, the upstart soldiers had split into a number of cliques occupying different parts of the academy, and several dozen were dead."
 fengtian_events.274.a:9 "There can only be one Grand Marshal."

 fengtian_events.275.t:0 "L'ordre revient dans la province de Zhili"
 fengtian_events.275.d_bad:0 "Après une vague de pillages spontanés et parfois aveugles, d'incendies et autres comportements criminels de nos troupes, l'ordre est revenu dans la province de Zhili. Dans l'ensemble, les soldats se sont simplement brûlés. Cet épisode ne sera pas très apprécié par les paysans qui ont subi le plus fort de la violence, ni par les propriétaires, les commerçants ou les fonctionnaires du gouvernement. Même si cet épisode finira par s'estomper avec le reste des atrocités de l'époque des seigneurs de la guerre, il ne facilitera pas la gouvernance des vastes zones du territoire nouvellement conquis"
 fengtian_events.275.d_good:0 "Après que nos troupes aient balayé la province de Zhili, la majorité de la population s'est préparée à une vague de violence aveugle. Mais, malgré quelques incidents inévitables, nos troupes ont largement respecté le code de conduite établi par le maréchal Zhang. Certaines personnalités obstinées ont attribué la surprise au système logistique avancé de Fengtian, qui a réduit la nécessité pour nos armées de vivre de la terre, au lieu de faire l'éloge de Zhang lui-même. Pourtant, même eux ne peuvent ignorer les résultats, et cette performance contribuera grandement à gagner la confiance de la nation"
 fengtian_events.275.a:0 "Au moins, c'est fini."

##Luoyang-Zhengzhou Events
 fengtian_events.276.t:0 "Chaos ferroviaire à Zhengzhouz"
 fengtian_events.276.d_bad:0 "Apparemment, dès que nos troupes se sont emparées de Zhengzhou, elles sont descendues sur sa gare. En tant que cœur du réseau ferroviaire de la nation en temps de guerre, et peut-être en raison des tentatives acharnées de nos ennemis pour le défendre, les voies étaient encombrées de matériel roulant - remplies à ras bord d'effets personnels de réfugiés et de matériel de guerre. L'orgie de pillage qui a suivi a fait reculer le trafic ferroviaire dans la région pendant des jours, car chaque wagon a été saccagé, et bien que nous ayons saisi une certaine quantité de matériel militaire dans les wagons, la majorité d'entre eux sont maintenant démolis et inutilisables. Il faudra beaucoup de temps pour les dégager de la voie ferrée, et encore plus de temps pour que les anciens habitants de la ville oublient le vol flagrant de leurs biens"
 fengtian_events.276.d_good:0 "Apparemment, dès que nos troupes se sont emparées de Zhengzhou, elles sont descendues sur sa gare. En tant que cœur du réseau ferroviaire de la nation en temps de guerre, et peut-être en raison des tentatives acharnées de nos ennemis pour le défendre, les voies étaient encombrées de matériel roulant - remplies à ras bord d'effets personnels de réfugiés et de matériel de guerre. Les pillages ont commencé presque immédiatement, mais heureusement, certains de nos officiers ont pu limiter l'activité à la moitié des wagons, les officiers eux-mêmes n'en prenant qu'un quart supplémentaire. Par conséquent, ce qui aurait pu se transformer en un désastre logistique, où le matériel roulant pillé a bloqué les voies pendant des jours, est devenu une affaire relativement ordonnée qui a laissé au moins quelque chose derrière elle pour les habitants de la ville"
 fengtian_events.276.a:0 "Que reste-t-il ?"

 fengtian_events.277.t:0 "Bandits contre bandits"
 fengtian_events.277.d_bad:0 "Nos troupes se sont récemment emparées de Luoyang aux côtés de la plupart des grandes villes de la province du Henan, mais la sécurisation des campagnes s'est révélée être une autre affaire. Le banditisme a une longue histoire dans le Henan, et malgré près d'une décennie de domination zhili, ce problème n'a jamais vraiment disparu. La majorité d'entre eux ont simplement été incorporés dans les armées de Wu Peifu. Nos propres troupes, se sentant flouées, s'engagent maintenant dans des pillages et des destructions compétitives, qui se transforment parfois en batailles localisées mais coordonnées. L'arrivée prévue de quelques troupes plus ordonnées dans la région devrait apaiser les tensions afin que les véritables bandits puissent être rassemblés, mais le mal est déjà fait. La destruction combinée est comparée à une catastrophe naturelle"
 fengtian_events.277.d_good:0 "Nos troupes se sont récemment emparées de Luoyang aux côtés de la plupart des grandes villes de la province du Henan, mais la sécurisation des campagnes s'est révélée être une autre affaire. Le banditisme a une longue histoire dans le Henan, et malgré près d'une décennie de domination zhili, ce problème n'a jamais vraiment disparu. La majorité d'entre eux ont simplement été incorporés dans les armées de Wu Peifu. Nos propres troupes sont intervenues pour réprimer la violence, mais passer au peigne fin les collines et les bords de rivière du Henan demandera du temps et de l'énergie, ce que nos troupes ne préféreraient pas dépenser. Selon toute probabilité, les activités des bandits reprendront un jour ou l'autre, et tout ce qui a déjà été volé est maintenant entre les mains de nos propres troupes."
 fengtian_events.277.a:0 "Des bandits partout !"

 fengtian_events.278.t:0 "L'ordre revient dans la province du Henan"
 fengtian_events.278.d_bad:0 "Après le chaos des transports, la violence endémique et une vague de banditisme bien trop familière, la province du Henan est revenue à une relative normalité. Les temps sont encore durs pour le paysan moyen et les brigands errent encore dans les collines, mais dans l'ensemble, nos propres troupes se sont épuisées et se sont installées. Le Henan, en particulier, a connu sa part de famine, de violence et d'autres tragédies. Il ne s'agit peut-être que d'une simple note de bas de page historique, mais pour les vies qu'il a touchées, et certainement celles qu'il a réclamées, les événements de [GetYear] ne seront jamais oubliés"
 fengtian_events.278.d_good:0 "Après quelques violences inévitables et une vague de banditisme bien trop familière, le Henan est revenu à une relative normalité. La province n'est pas étrangère à la tragédie, et la conduite relativement décente de nos troupes a donc fait tourner certaines têtes. Les propriétaires d'entreprises locales, les propriétaires et les fonctionnaires apprécient la retenue de nos soldats, et c'est leur soutien qui sera essentiel pour gouverner la province à l'avenir"
 fengtian_events.278.a:0 "Au moins, c'est fini."

##Wuhan Events
 fengtian_events.279.t_bad:0 "Destruction à Wuhan"
 fengtian_events.279.t_good:0 "Victoire à Wuhan"
 fengtian_events.279.d_bad:0 "Le rêve républicain de la Chine est né à Wuhan, et nous en sommes aujourd'hui les porteurs de flambeau. Malheureusement, les idéaux révolutionnaires étaient loin de l'esprit de nos soldats qui, après avoir rencontré une résistance inattendue à Wuchang, se sont mis à courir à travers la ville, pillant sans discernement. Lorsque l'ordre fut rétabli, les docks, les quais et toutes sortes d'entreprises riveraines furent réduits en cendres, ainsi que d'importantes zones résidentielles. Ce qui aurait pu être une victoire politique est devenu une défaite politique, et une marque de honte. Sur une note plus positive, nos troupes ont pu récupérer un stock d'équipement de l'arsenal Hanyang maintenant abandonné, bien que l'on soupçonne qu'un certain nombre d'armes ont été siphonnées et mises sur le marché noir."
 fengtian_events.279.d_good:0 "Le rêve républicain de la Chine est né à Wuhan, et nous en sommes aujourd'hui les porteurs de flambeau. Heureusement, cela semble avoir été dans l'esprit de nos soldats lorsqu'ils sont entrés dans la ville, qui a survécu aux combats relativement indemne, d'autant plus que les pillages ont été limités. Après s'être frayé un chemin à travers la plaine de Chine du Nord, il semble que nos troupes aient commencé à reconnaître les bienfaits d'une population reconnaissante. Notre armée, composée de tant d'anciens bandits et vagabonds, ne changera peut-être jamais complètement, mais la relative retenue d'aujourd'hui est un pas en avant. Pour ajouter à la bonne nouvelle, nos troupes ont récupéré un stock de matériel de l'arsenal de Hanyang, maintenant abandonné."
 fengtian_events.279.a:0 "Honteux"
 fengtian_events.279.b:0 "Quel soulagement !"

 fengtian_events.280.t:0 "Catastrophe dans les mines de Daye"
 fengtian_events.280.d:0 "Le minerai est exploité à Daye depuis plus de deux mille ans, et aujourd'hui le fer des profondeurs alimente les feux de l'industrie moderne à Wuhan, Hubei et dans le Bas-Yangtsé. Cela n'a pas empêché nos soldats, qui, après avoir entendu des rumeurs selon lesquelles on y trouverait de l'or, ont pillé la mine et, déçus de ne rien trouver de tel, en ont fait s'effondrer l'entrée, enfermant ainsi plus d'une centaine de mineurs à l'intérieur. Un effort de sauvetage a été proposé, mais on considère généralement qu'une telle dépense est gaspillée pour les travailleurs ordinaires. Les responsables de la catastrophe ont, quant à eux, déserté et sont introuvables"
 fengtian_events.280.a:0 "Commencez les opérations de sauvetage."
 fengtian_events.280.b:0 "La vie n'est pas chère."

 fengtian_events.281.t_bad:0 "Tragédie dans les mines"
 fengtian_events.281.t_good:0 "Mineurs sauvés à Daye"
 fengtian_events.281.d_bad:0 "Au moment où nos hommes ont réussi à atteindre les mineurs piégés à Daye, tous avaient péri. Bien que ce ne soit certainement pas le résultat que nous espérions, le fait que nos hommes aient essayé a été bien accueilli par la communauté locale, et plus important encore par les journaux nationaux"
 fengtian_events.281.d_good:0 "Grâce à une vieille pelle à vapeur O&K apportée d'une mine voisine, nos soldats ont pu percer à temps pour sauver des dizaines de mineurs. Malgré leurs réserves initiales, les hommes semblent penser que la gratitude sincère des ouvriers et de leurs familles a rendu l'effort bien utile, et les éloges des journaux nationaux ont compensé la plupart des retombées politiques du désastre lui-même. Pour ajouter à la tournure positive des événements, un assortiment de caisses d'armes a été apporté par les mineurs reconnaissants, qui avaient apparemment été planquées là pendant la retraite de l'ennemi il n'y a pas si longtemps."
 fengtian_events.281.a:0 "Quel gâchis."
 fengtian_events.281.b:0 "Wansui !"

 fengtian_events.282.t:0 "Souvenez-vous de l'expérience en Ju"
 fengtian_events.282.d:0 "Les années écoulées depuis la formation de notre gouvernement ont jeté pour nous des bases solides pour la régénération nationale. Nous ne craignons aucun problème et nous ne sommes pas inquiets des dangers imminents. Nous nous contentons de déplorer le sort du Sud, dont la liberté a été à l'origine apportée par les efforts et les sacrifices des patriotes réformistes, et qui a été depuis effacée par les formes de gouvernement anciennes et dépassées. Aujourd'hui, son peuple est impuissant, et ses dirigeants sans intégrité, permettant ainsi la lente dégradation de la condition nationale, et le retour à un état de soumission totale aux nations occidentales. Ces anciennes méthodes sapent la force nationale de la Chine, ébranlent ses fondations nationales et soumettent son peuple. C'est ainsi que nous nous retrouvons au Nord, comme le dernier bastion de tout ce que nos prédécesseurs ont lutté pour construire, et les porteurs de l'avenir d'une Chine nouvelle. Le gouvernement régressif [QIE.GetAdjective] aime à dire qu'en fortifiant le Nord-Est, nous "creusons un trou pour y mourir" À cela, je réponds : "N'oubliez pas ce qui s'est passé à Ju" C'est à Ju que l'État de Qi a battu en retraite, et c'est de là qu'il a reconquis tout ce qu'il avait perdu. Quand le moment sera venu, le Nord-Est sera notre Ju, et la Chine entière sera notre Qi. Notre victoire est inévitable, vive la République !"
 fengtian_events.282.a:0 "Wansui !"

 fengtian_events.283.t:0 "La Proclamation du Grand Maréchal"
 fengtian_events.283.d:0 "Un vieux proverbe dit : "La vertu ne manque jamais de compagnie ; elle trouvera toujours du soutien." Les forces de la justice se lèveront, et les hommes de bonne volonté finiront par coopérer dans l'intérêt de la rectitude. Il ne fait aucun doute que le gouvernement [QIE.GetAdjective], régressif et illégitime, fait obstacle au progrès, opprimant et asservissant le peuple chinois, et j'ai reçu toutes les assurances que nos alliés se tiendront à nos côtés pour mettre fin à cette injustice. De notre côté, nous devons tenir bon, garder les yeux rivés sur notre objectif et rester fermes dans notre détermination. Tout le Nord-Est doit continuer à faire preuve d'unité. La victoire finale sera nôtre. J'exhorte mes ministres, notre armée et notre peuple à redoubler d'efforts afin d'atteindre le succès.\n\nC'est dans cet esprit que je proclame le début de l'Année de l'Effort Vertueux, trois cent soixante-cinq jours d'efforts nationaux acharnés, à l'issue desquels nous émergerons comme une force imparable dans la poursuite de notre objectif. Et, lorsque cette année sera terminée, le drapeau aux cinq couleurs flottera à nouveau haut à Beijing, et le gouvernement [QIE.GetAdjective] ne sera plus que cendres dans les vents de l'histoire. Dix mille ans à la République ! Zhonghua Mingguo Wansui !"
 fengtian_events.283.a:0 "Wansui !"

 fengtian_events.285.t:9 "Le Pari de Zhang Zuolin"
 fengtian_events.285.d:9 "Même si le maréchal Zhang a accepté de signer les Traités d'Amitié avec Tokyo à son retour à Beijing, le Japon a toujours suspecté qu'il tenterait de renégocier les concessions une fois l'unification achevée. Tokyo espérait garder le gouvernement du maréchal Zhang incapable de renégocier grâce au Front pro-Japonais, mais il semble que le Vieux Maréchal ait amassé suffisamment d'élan politique pour envoyer une note à notre ambassadeur quant à ses intentions de renégocier le statut de la Chine au sein de la Sphère de Coprospérité.\n\nEn échange du maintien de l'alliance actuelle avec Tokyo, Zhang espère le retour de toutes les concessions, le démantèlement de l'extraterritorialité, le retrait des forces japonaises en Chine et la nationalisation de facto de la Mantetsu et des autres entreprises japonaises en Chine. Bien que le Japon continue de bénéficier du fruit de ses investissements économiques, son statut politique privilégié sera grandement affaibli. Même si la proposition du maréchal Zhang est tout à fait cordiale, il est clair pour Tokyo qu'un refus provoquerait une action décisive du Gouvernement de l'Anguojun pour assurer ses intérêts. L'offre du maréchal Zhang a rendu furieux de nombreux membres du gouvernement japonais, même si d'autres reconnaissent qu'une guerre contre une Chine unie serait une entreprise coûteuse, qui pourrait tourner au désavantage du Japon."
 fengtian_events.285.a:0 "Punissez cette insolence !"
 fengtian_events.285.b:9 "Bien joué, maréchal Zhang."

 fengtian_events.286.t:0 "Le Japon accepte nos demandes !"
 fengtian_events.286.d:9 "Immediately after Marshal Zhang had sent out his new offer for the new Sino-Japanese partnership, he had also mobilised the Northeast Army to prepare along the Yalu River, and his forces within China proper to watch the Japanese concessions, in the event of Tokyo's retaliation. Much to Zhang's pleasant surprise, it seems that Tokyo has capitulated to all of his demands and has begun pulling out all forces from China.\n\nVarious Japanese companies operating within China have also reached out to Beijing, following Zhang's stipulations for de-facto nationalisation. For the first time in decades, China's cities and railroads are fully its own, and the nation has finally emerged from the Century of Humiliation. Marshal Zhang and his Fengtian Clique have secured China's future and independence through the pen, and will continue leading the Middle Kingdom into a new epoch of greatness!"
 fengtian_events.286.a:0 "Une relation plus égale, enfin."

 fengtian_events.306.t:0 "Attaques sur le chemin de fer de la Mandchourie du Sud"
 fengtian_events.306.d:0 "Laissés à eux-mêmes pendant plus de deux semaines, les loyalistes de Harbin ont lancé une série d'attaques coordonnées le long des chemins de fer de la Mandchourie du Sud. Heureusement, certains de nos commandants ont agi de leur propre initiative et, avec l'aide des gardes de la zone des chemins de fer japonais, ont pu limiter les dégâts et repousser l'ennemi en surnombre dans la ville.\n\nCe qui a suivi a été un combat brutal rue par rue à travers la ville, un combat auquel les loyalistes s'étaient évidemment préparés, et nos pertes se sont rapidement accumulées. Dans un dernier acte de défi, l'ennemi a fait exploser des explosifs dans plusieurs usines, mais au lever du jour, le silence régnait dans la ville - rompu seulement par des coups de feu occasionnels marquant l'exécution des survivants.\n\nHarbin est de nouveau à nous."
 fengtian_events.306.a:9 "At least they're dealt with."

 fengtian_events.307.t:0 "Une Rencontre avec les Marchands"
 fengtian_events.307.d:0 "La Chambre de Commerce du Fengtian représente les intérêts de nombreux commerçants de Shenyang et de toute la région du Nord-Est, dont la plupart sont essentiels au bon fonctionnement de notre économie – du moins des pans de celle-ci qui échappent encore au contrôle japonais. Leur pouvoir de négociation est considérable, et avec l’arrivée de nouvelles autorités dans la capitale, ils espèrent obtenir un nouvel accord qui leur soit plus favorable.\n\nZhang Zuolin est connu pour avoir fait fusiller plusieurs commerçants et banquiers qui lui avaient refusé des conditions favorables, mais agir de la sorte aujourd’hui créerait un mauvais précédent pour notre nouvelle administration – censée apporter ordre et civilisation à une Chine épuisée par la guerre.\n\nCependant, accepter des conditions moins favorables que celles de notre prédécesseur créerait un précédent tout aussi néfaste."
 fengtian_events.307.a:9 "Nous pourrions graisser quelques pattes."
 fengtian_events.307.b:9 "Peut-être que Zhang a raison."
 fengtian_events.307.c:9 "Pour l'instant, peu importe."

 fengtian_events.308.t:0 "Rétablir l'Ordre en Mandchourie"
 fengtian_events.308.d:0 "Malgré la mort du "Grand Maréchal" Zhang Zuolin, une partie de son héritage subsiste encore. Diverses autorités civiles de la région ont soit ignoré, soit refusé l'ordre de reconnaître notre nouvelle administration, et certains, toujours fidèles à sa cause, se seraient regroupés à Harbin – peut-être pour livrer un dernier combat.\n\nPour l'instant, nos ressources seront plus limitées que nous ne le souhaiterions, et nous devrions concentrer nos efforts sur le rétablissement du contrôle et d'une bonne gouvernance en Mandchourie. Les derniers vestiges du gouvernement de Zhang doivent être balayés."
 fengtian_events.308.a:0 "En avant !"

 fengtian_events.309.t:0 "Presser le Nord"
 fengtian_events.309.d:0 "La menace de Harbin étant éliminée, nos conseillers japonais ont recommandé que nous avancions vers le nord le long de la voie ferrée. Ces régions glaciales de Mandchourie, elles-mêmes aussi grandes que certains pays européens réunis, échappaient parfois même au contrôle direct de Zhang Zuolin et s'avèrent à nouveau problématiques.\n\nNotre plus grande inquiétude, cependant, devrait être les Russes, qui ont à l'occasion testé nos frontières et convoitent notoirement le chemin de fer chinois de l'Est - qui leur a été confisqué il y a plus de dix ans. Les Japonais veulent que les Russes soient contrôlés à l'Amour."
 fengtian_events.309.a:0 "Ce sera fait."

 fengtian_events.310.t:0 "[FNG.GetLeader] demande de l'aide contre les bandits"
 fengtian_events.310.d:0 "La Mandchourie a longtemps été la proie des bandits, en particulier à sa frontière nord, peu peuplée. Une certaine part de cette activité est considérée comme normale, mais apparemment [FNG.GetLeader] a demandé notre aide pour faire face à un groupe de bandits particulièrement frustrant. L'armée du Kwantung a recommandé de déployer un contingent de sa garde ferroviaire de Mandchourie du Sud, mais le ministère des affaires étrangères estime qu'un engagement aussi important risque de provoquer un incident imprévu. Nos troupes sont connues pour tirer d'abord et poser des questions ensuite. D'autres demandent pourquoi nous devrions nous impliquer dans quelque chose qui, après tout, devrait être la responsabilité de [FNG.GetLeader]."
 fengtian_events.310.a:9 "Deploy the Railway Guard."
 fengtian_events.310.b:9 "Provide weapons and reconnaissance."
 fengtian_events.310.c:9 "This is beneath us."

 fengtian_events.311.t:0 "Le Japon déploie la garde des chemins de fer !"
 fengtian_events.311.d:0 "Lorsque nous avons demandé l'aide des Japonais, nous n'avons pas nécessairement anticipé le déploiement de la garde ferroviaire de Mandchourie du Sud de l'armée du Kwantung, qui a commencé une vaste opération anti-bandit à [GetHonghuziLocation], avec une reconnaissance aérienne. Cette démonstration de force met clairement en valeur nos propres efforts, et déjà beaucoup de nos généraux insistent pour que nous montions notre propre expédition en réponse.\n\nAvant d'être qualifiés de "lâches", quelques voix plus calmes ont suggéré que les deux forces opérant sur le terrain ensemble pourraient déclencher un incident malheureux et imprévu."
 fengtian_events.311.a:0 "Nous ne serons pas surpassés par les Japonais !"
 fengtian_events.311.b:9 "Let's not take any risks."

 fengtian_events.312.t:0 "Les Honghuzi dans [GetHonghuziLocation] vont fondre"
 fengtian_events.312.d:0 "Malgré tous nos efforts, Zhang Haitian et son Honghuzi ont disparu dans la nature sauvage de la Mandchourie. Selon certaines informations, il aurait traversé l'Amour juste au sud d'Aigun, cherchant refuge de l'autre côté de la frontière russe. D'autres pensent que le chef des bandits lui-même est mort, tué par un insoumis, laissant le gang, autrefois fort de milliers de membres, se disperser ; ses membres se contentent une fois de plus de vols et d'extorsions de routine. Tous sont d'accord, cependant ; si le Vieux Vent du Nord est vivant, il reviendra probablement en temps voulu."
 fengtian_events.312.a:9 "Then let us hope he is dead."

 fengtian_events.313.t:0 "L'Incident de [GetFNGJAPClashTown]"
 fengtian_events.313.d:0 "Un incident très regrettable s'est produit à proximité de [GetFNGJAPClashTown], dans la province de [GetHonghuziLocation]. Apparemment pris pour des bandits, un contingent de notre expédition a essuyé des tirs de la garde ferroviaire japonaise SMR. S'attendant à peine à ce que les Honghuzi aient de l'artillerie, nos hommes ont été étroitement campés et ensuite réduits en miettes par les bombardements japonais. Entendant l'agitation à distance, nos autres forces proches ont interrompu leurs opérations anti-bandit, et se sont mises en colère lorsqu'elles ont découvert le lieu du massacre - attaquant les positions japonaises presque immédiatement.\n\nLorsque l'ordre a été rétabli, on a découvert que, au milieu du chaos, les Honghuzi avaient fait un raid audacieux sur le campement japonais et avait volé plusieurs centaines de fusils. Compte tenu de cette série de catastrophes, nos propres forces et la Garde ferroviaire japonaise ont décidé d'interrompre les recherches pour le moment."
 fengtian_events.313.a:0 "Quel gâchis..."

 fengtian_events.314.t:0 "Le Japon fournit des armes et de la reconnaissance"
 fengtian_events.314.d:0 "En réponse à notre demande d'aide pour résoudre notre problème de bandits, l'armée du Kwantung a livré un mélange d'armes et d'autres fournitures pour aider nos efforts. Le plus utile de tout est leur offre de faire une série de vols de reconnaissance au-dessus de [GetHonghuziLocation], car leur optique aérienne est bien en avance sur la nôtre. Cela devrait considérablement augmenter les chances de succès de notre expédition."
 fengtian_events.314.a:0 "Excellentes nouvelles !"

 fengtian_events.315.t:0 "Le Japon refuse de s'impliquer"
 fengtian_events.315.d:0 "Les Japonais ont refusé toute participation à nos opérations anti-bandits, considérant que la question était "indigne d'eux". Devrions-nous quand même procéder ?"
 fengtian_events.315.a:9 "Call it off."
 fengtian_events.315.b:9 "We'll do it ourselves."

 fengtian_events.316.t:0 "[FNG.GetLeader] demande encore de l'aide"
 fengtian_events.316.d:0 "On nous a demandé, une fois de plus, d'aider le gouvernement de Fengtian dans sa lutte pour traiter ce qui devrait être une affaire de routine : la pacification des bandits apparemment endémiques de la Chine. Il semble que le groupe qui donne à [FNG.GetLeader] une quantité inhabituelle d'ennuis soit dirigé par un dénommé "Lao Beifeng", ou "Vent du Vieux Nord", qui s'est montré difficile dans le passé et qui attaque maintenant [GetHonghuziLocation].\n\nDevrions-nous nous engager dans cette entreprise ?"
 fengtian_events.316.d_clash:0 "On nous a demandé, une fois de plus, d'aider le gouvernement de Fengtian dans sa lutte pour traiter ce qui devrait être une affaire de routine : la pacification des bandits apparemment endémiques de la Chine. Il semble que le groupe qui donne [FNG.GetLeader] une quantité inhabituelle d'ennuis soit dirigé par un dénommé "Lao Beifeng", ou "Vent du Vieux Nord", qui s'est montré difficile dans le passé et qui fait maintenant un raid [GetHonghuziLocation].\n\nÉtant donné le dernier déploiement désastreux de la Garde ferroviaire, on nous a demandé d'envisager d'autres options moins évidentes."
 fengtian_events.316.a:9 "Deploy the Railway Guard."
 fengtian_events.316.b:9 "Provide weapons and reconnaissance."
 fengtian_events.316.c:9 "We are not at [FNG.GetLeader]'s beck and call."

 fengtian_events.317.t:0 "Des bandits écrasés par la Garde Ferroviaire !"
 fengtian_events.317.d:0 "L'armée du Kwantung a annoncé la conclusion d'une opération anti-bandit à proximité de [GetFNGJAPClashTown] dans la province de [GetHonghuziLocation]. Bien que nous devions prendre les Japonais au mot, il y a tout lieu de croire que la menace posée par cette bande de Honghuzi exceptionnellement audacieuse et agressive a pris fin. Il est regrettable que les Japonais puissent s'attribuer la plus grande partie, sinon la totalité, du mérite de cette opération. Au moins, tout risque d'affrontement entre nos propres forces et les leurs a été évité avec succès, et nous pouvons être raisonnablement certains qu'il n'y aura pas d'autres attaques à l'avenir."
 fengtian_events.317.d_jap:0 "L'armée du Kwantung a annoncé la conclusion d'une opération anti-bandit dans la province de [GetHonghuziLocation], en Mandchourie. Nous avons apporté l'aide demandée par [FNG.GetLeader], et montré la nécessité de notre présence continue dans la région. En vérité, le soldat japonais doit maintenant représenter la paix et l'ordre dans un pays troublé !"
 fengtian_events.317.a:0 "Ainsi à tous les bandits !"
 fengtian_events.317.b:0 "Ainsi à tous les bandits !"

 fengtian_events.318.t:0 "Un incident regrettable"
 fengtian_events.318.d:0 "Un incident malheureux s'est produit près de [GetFNGJAPClashTown], dans [GetHonghuziLocation], en Mandchourie. Il semble que la garde ferroviaire SMR que nous avons déployée ait pris les forces du gouvernement de Fengtian pour des bandits et ait ouvert le feu avec l'artillerie, causant de lourdes pertes. Nos soldats ont ensuite été attaqués par les hommes de [FNG.GetLeader], causant d'autres destructions inutiles, tandis que de véritables bandits ont fait irruption dans notre camp d'opérations avancées et ont volé plusieurs centaines d'armes.\n\nLa Garde ferroviaire ne peut être tenue pour responsable de ce désastre, étant donné que la populace chinoise de [FNG.GetLeader] ne peut être distinguée des bandits, et que l'Armée du Kwantung a déjà présenté ses excuses pour son ingérence dans notre opération. Pour l'instant, c'est terminé."
 fengtian_events.318.a:0 "Quel gâchis..."

 fengtian_events.319.t:0 "Les Honghuzi disparaissent"
 fengtian_events.319.d:0 "Malgré les efforts de tous, les Honghuzi de [FNG.GetNameDef] ont apparemment disparu dans la nature sauvage de la Mandchourie. Certains rapports suggèrent qu'ils ont traversé l'Amour juste au sud d'Aigun, cherchant refuge de l'autre côté de la frontière russe. D'autres pensent que le chef des bandits est mort, tué par un insoumis, laissant la bande, autrefois forte de milliers de membres, se disperser ; ses membres se contentent une fois de plus de vols et d'extorsions de routine. Pour le moment, nos intérêts en Mandchourie sont à nouveau à l'abri de cette race particulière de bandits en maraude."
 fengtian_events.319.a:0 "Bonne nouvelle."

 fengtian_events.320.t:0 "Succès en Mandchourie"
 fengtian_events.320.d:0 "Des rapports de Mandchourie indiquent que les forces [FNG.GetName] ont finalement localisé et éliminé les bandits qui leur causaient tant de problèmes. La région devrait maintenant être un endroit plus sûr pour faire des affaires."
 fengtian_events.320.a:0 "Bonne nouvelle."

 fengtian_events.321.t:0 "La fin des protestations"
 fengtian_events.321.d:0 "Ces derniers jours, l'armée Kwantung, ou peut-être un bureaucrate de Tokyo, a décidé que les protestations continues à travers la Mandchourie étaient contraires aux intérêts nationaux japonais. Ce matin, des escadrons de soldats japonais se sont déployés dans les quartiers de Shenyang, Harbin, Changchun et Jilin.\n\nLes tirs ont commencé vers midi et se sont poursuivis jusque tard dans la soirée. Ceux qui ont tenté d'intervenir, y compris certains de nos propres soldats et policiers, ont été sommairement exécutés, et les corps, de toutes formes et tailles, ont été laissés éparpillés dans les rues de la ville.\n\nLa plupart de nos hommes se sont tenus à l'écart comme ordonné, et les autorités japonaises semblent satisfaites. Le message n'aurait pas pu être plus clair."
 fengtian_events.321.a:9 "They were only doing their jobs."

 fengtian_events.322.t:0 "Jubilation à Propos du Retour des Villes des Légations"
 fengtian_events.322.d:0 "Avec le retour de Shanghai et des autres anciennes "Villes des Légations" sous notre autorité légitime, le peuple chinois peut remercier [FNG.GetLeader]. La nouvelle s'est déjà répandue partout, renforçant considérablement notre légitimité."
 fengtian_events.322.a:0 "Un jour glorieux pour la Chine !"

 fengtian_events.323.t:0 "Le Drapeau à Cinq Couleurs Flotte sur Qingdao !"
 fengtian_events.323.d:0 "Pour la première fois depuis le début de ce siècle, Qingdao est fermement entre les mains des Chinois, grâce à nos efforts patriotiques acharnés. Le peuple chinois a de quoi se réjouir !"
 fengtian_events.323.a:0 "Wansui !"

 fengtian_events.324.t:0 "Macao est Rendue à la Chine !"
 fengtian_events.324.d:0 "Pour la première fois depuis près de cinq siècles, Macao a été restituée à la Chine ! Il y a de quoi faire la fête, et notre légitimité aux yeux du peuple chinois ne peut que s'en trouver renforcée !"
 fengtian_events.324.a:0 "Enfin !"

 fengtian_events.330.t:0 "Impliquer le Japon dans la Guerre de Reconquête ?"
 fengtian_events.330.d:0 "Malgré les nombreuses promesses de [FNG.GetLeader] de franchir la Grande Muraille et de lancer une guerre de Reconquête nationale, beaucoup de temps s’est écoulé sans que notre situation ne change guère. L'ancienne ville de Beijing se trouve à quelques kilomètres seulement de nos frontières, mais chaque jour qui passe, la possibilité que nous y mettions un jour le pied s'éloigne de plus en plus, s'amenuisant à mesure que nos ennemis se renforcent. Bien que Zhang ait insisté sur le fait qu’il attend simplement le moment opportun pour frapper, beaucoup craignent que ce moment n’arrive jamais et l'ont exhorté à jouer son atout ultime : l'Empire du Japon.\n\nMême si les Japonais ne nous font pas entièrement confiance, et que nous ne leur faisons pas entièrement confiance, la perspective d'une Chine dominée par [608.Owner.GetAdjective] dans un avenir prévisible est difficile à accepter pour nous deux. Les membres de la Clique Shikan ont encouragé [FNG.GetLeader] à contacter secrètement le Japon pour lui demander de se joindre à la Guerre de Reconquête nationale à nos côtés — nous ne serons peut-être pas capables de vaincre [608.Owner.GetNameDef] seuls, mais ils succomberaient certainement face à la puissance d’une armée combinée du Fengtian et du Japon. Bien sûr, cette proposition comporte le risque de détruire notre légitimité aux yeux du peuple, mais nous n'avons peut-être pas le choix..."
 fengtian_events.330.a:0 "Nous n'avons pas le choix - contactez le Japon."
 fengtian_events.330.b:0 "C'est une affaire chinoise !"

 fengtian_events.331.t:0 "[FNG.GetLeader] Nous Demande de Rejoindre sa Guerre"
 fengtian_events.331.d:0 "Confiné en Mandchourie à la suite de la Conférence de Shanghai, [FNG.GetLeader] envisage depuis longtemps de marcher vers le sud de la Grande Muraille pour reconquérir la Chine, mais il semble que ses plans se heurtent à obstacle après obstacle – le plus récent étant la montée en puissance de [608.Owner.GetNameDef]. Aujourd’hui, alors que ses ennemis se renforcent de jour en jour, Zhang nous a contactés pour obtenir notre participation à une guerre contre [608.Owner.GetNameDef]. Même si [FNG.GetNameDef] n’a pas la force de vaincre les [608.Owner.GetAdjective] à lui seul, il serait certainement écrasé par nos forces combinées.\n\nL'Armée et le ministère des Affaires étrangères, dans un rare élan d'unité, ont tous deux exhorté notre gouvernement à accepter la proposition de Zhang. Les ambitions des seigneurs de la guerre ont causé d'innombrables problèmes aux gouvernements japonais par le passé, et la perspective à long terme d'une Chine dominée par les [608.Owner.GetAdjective] est de mauvais augure pour nos intérêts. Si nous parvenions à convaincre [FNG.GetLeader] de se battre à nos côtés, nous résoudrions ces deux problèmes d'un seul coup. Beaucoup, cependant, se sont également montrés très critiques quant à nos chances dans une telle guerre. En acceptant cette proposition, nous risquons tout simplement de signer un pacte suicidaire."
 fengtian_events.331.a:0 "Nous nous battrons ensemble."
 fengtian_events.331.b:0 "Désolé..."

 fengtian_events.332.t:0 "Le Japon Accepte de Rejoindre notre Guerre"
 fengtian_events.332.d:0 "L'Empire du Japon a accepté de se joindre à nous dès le début des hostilités. Il n'y a plus de retour en arrière possible..."
 fengtian_events.332.a:0 "Excellent..."

 fengtian_events.333.t:0 "Le Japon Refuse de Rejoindre notre Guerre !"
 fengtian_events.333.d:0 "L'Empire du Japon a refusé de se joindre à notre guerre lorsqu'elle éclatera ! Il nous a plutôt exhortés à continuer d'attendre le "moment opportun" et s'est contenté de nous rassurer quant à notre sécurité en Mandchourie. Il semble que nous devrons nous en passer… un jour."
 fengtian_events.333.a:0 "Nous reprendrons la Chine sans eux !"

 fengtian_events.334.t:0 "[FNG.GetLeader] Part en Guerre"
 fengtian_events.334.d:0 "[FNG.GetLeader] a lancé sa guerre de Reconquête nationale contre [608.Owner.GetNameDef]. Nous lui avions promis de nous battre à ses côtés le jour venu : l'heure est venue d'honorer cet engagement."
 fengtian_events.334.a:0 "Aux armes !"

 fengtian_events.501.t:0 "Une Lettre de Yu Xuezhong"
 fengtian_events.501.d:0 "Aujourd'hui, le Grand Maréchal a reçu une lettre contenant une requête suppliante et humble de la part d'un ancien général ennemi, qui sollicite un poste dans l'armée du Fengtian afin de subvenir à ses besoins. En temps normal, le Maréchal n'aurait même pas pris la peine de lire une telle lettre, mais la signature a éveillé son intérêt, car elle lui rappelle ses jeunes années. Il l'a ouverte avec le plus grand soin sur son bureau.\n\nCette lettre provient de Yu Xuezhong, un ancien général du Zhili connu pour être un commandant défensif hors pair, qui est retourné dans sa ville natale de Penglai sans emploi ; ce qui importe au Grand Maréchal, c'est qu'il est le fils de Yu Wenfu, qui avait recruté et promu Zhang Zuolin dans l'Armée Yi en 1894. Cela a ouvert la voie à Zhang pour gravir les échelons en tant qu'homme fort du Nord-Est, et dans une certaine mesure, on peut dire que sans Yu, le Grand Maréchal serait peut-être resté un homme ordinaire, pauvre et inconnu, en cette époque chaotique. Après avoir tranquillement repensé à son passé et s'être remémoré ses jeunes années, seul dans sa résidence au milieu de la nuit, le Grand Maréchal a décidé de rembourser cette dette de gratitude tout en recrutant un commandant compétent ; il écrit..."
 fengtian_events.501.a:0 ""Votre service est plus qu'apprécié. Envoyez mes amitiés à votre père...""
 fengtian_events.501.b:0 ""Je peux vous offrir de l'argent en gratitude, mais je ne peux vous donner plus.""

 fengtian_events.502.t:0 "La [FNG_zhifeng_war_name]"
 fengtian_events.502.d:0 "Les tensions en Chine sont restées vives depuis 1927, année où l'intervention allemande a temporairement mis un terme au conflit qui opposait depuis vingt ans les différentes factions. Au cours de la dernière décennie, cependant, tant le gouvernement du Fengtian en Mandchourie que les [608.Owner.GetAdjective] à Beijing ont consolidé et renforcé leurs forces. Le décor est planté pour la confrontation la plus spectaculaire depuis plus de dix ans.\n\nQuelle que soit la partie qui sortira victorieuse, elle ne sera toutefois pas seule. Le Japon et l'Allemagne continuent de peser lourdement sur la région, alors que le Pays du Soleil levant lorgne avidement sur les possessions allemandes dans le Pacifique, et le vainqueur de cette guerre aura sans aucun doute un rôle à jouer dans ce conflit également."
 fengtian_events.502.a:0 "La bataille commence."

### FNG Political Events ###
 fengtian_political_events.15.t:0 "Fuite de codes de cryptage !"
 fengtian_political_events.15.d_Wang:0 "Bien que notre cryptage ne soit en aucun cas aussi avancé que celui de l'Occident, ou même du Japon, il permet de s'assurer que des informations vitales ne tombent pas entre de mauvaises mains. Malheureusement, Wang Yintai semble avoir égaré sa copie de notre livre de codes lors de son séjour au Palace Hotel de Shanghai. Par conséquent, une grande partie de notre réseau de renseignements et toutes nos communications cryptées sont maintenant compromises. Alors qu'un nouveau système pourrait être mis en place assez rapidement dans certains pays, une gouvernance arriérée et la taille même du Nord-Est signifient que cela pourrait prendre plus de deux mois.\n\nSi nous avons de la chance, le livre de codes ne sera pas découvert pendant ce laps de temps, mais cela semble peu probable."
 fengtian_political_events.15.d_Tang:0 "Bien que notre cryptage ne soit en aucun cas aussi avancé que celui de l'Occident, ou même du Japon, il permet de s'assurer que des informations vitales ne tombent pas entre de mauvaises mains. Malheureusement, le général Tang Yulin semble avoir perdu sa copie de notre livre de codes lors d'une fête somptueuse dans sa propriété à Chengde. Par conséquent, une grande partie de notre réseau de renseignements et toutes nos communications cryptées sont maintenant compromises. Alors qu'un nouveau système pourrait être mis en place assez rapidement dans certains pays, une gouvernance arriérée et la taille même du Nord-Est signifient que cela pourrait prendre des semaines.\n\nSi nous avons de la chance, le livre de codes ne sera pas découvert pendant ce laps de temps, mais cela semble peu probable."
 fengtian_political_events.15.d_Ruan:0 "Bien que notre cryptage ne soit en aucun cas aussi avancé que celui de l'Occident, ou même du Japon, il permet de s'assurer que des informations vitales ne tombent pas entre de mauvaises mains. Malheureusement, Ruan Zhenduo semble avoir perdu sa copie de notre livre de codes alors qu'il menait des affaires diplomatiques à Tokyo. Par conséquent, une grande partie de notre réseau de renseignements et toutes nos communications cryptées sont maintenant compromises. Alors qu'un nouveau système pourrait être mis en place assez rapidement dans certains pays, une gouvernance arriérée et la taille même du Nord-Est signifient que cela pourrait prendre des semaines.\n\nDe plus, en raison des tendances politiques de Ruan, certains ont déjà accusé cet incident "accidentel" d'être en fait entièrement délibéré. Bien qu'il n'y ait aucune preuve dans un sens ou dans l'autre, il est probable que le Japon n'appréciera pas le traitement réservé à Ruan, si nous décidons de l'éliminer."
 fengtian_political_events.15.a:0 "Tel est le destin..."
 fengtian_political_events.15.b:0 "Le démettre de ses fonctions !"

 fengtian_political_events.16.t:0 "Expulsez les bandits japonais !"
 fengtian_political_events.16.d:0 "Le temps est venu de déclarer notre indépendance, de chasser les intrus japonais de Chine, et de mettre fin à un siècle d'insupportable humiliation nationale ! Nous serons naturellement privés de tout soutien matériel étranger, mais le peuple chinois se rallie désormais à nous. En avant ! Zhonghua Mingguo Wansui !"
 fengtian_political_events.16.a:0 "Wansui !"

 fengtian_political_events.18.t:0 "Influence de la Mantetsu"
 fengtian_political_events.18.d:0 "L'influence économique de la Mantetsu s'étend à l'ensemble du pays et à l'Assemblée. Bien que le gouvernement s'efforce pour l'instant de lui résister en coulisses, ses efforts semblent s'affaiblir de jour en jour."
 fengtian_political_events.18.a:0 "Un mal nécessaire ?"

 fengtian_political_events.19.t:0 "Influence envahissante de Mantetsu"
 fengtian_political_events.19.d:0 "Nos usines grouillent d'activité, produisant des armes, des fournitures et des commodités quotidiennes à un rythme effarant. Rien de tout cela ne serait possible sans le Japon, mais les rumeurs de mécontentement abondent. Pour qui nous battons-nous, la Chine ou le Japon ? La République est-elle vraiment renforcée ou mise à genoux par l'exploitation étrangère ? Est-ce vraiment nécessaire ?"
 fengtian_political_events.19.a:0 "Jusqu'où cela peut-il aller ?"

 fengtian_political_events.20.t:0 "Domination de la Mantetsu"
 fengtian_political_events.20.d:0 "L'expertise japonaise et l'influence de la Mantetsu font progresser le Fengtian d'une manière qui semblait auparavant impossible, mais à toutes fins utiles, le contrôle effectif est passé des mains de l'Assemblée à celles du Japon. [FNG.GetLeader], pour le meilleur ou pour le pire, se retrouve seul face à la puissance écrasante de la Mantetsu dans le pays. C'est à lui qu'il reviendra de déterminer la voie à suivre, s'il en existe une, alors même que la légitimité du gouvernement s'effondre autour de lui."
 fengtian_political_events.20.a:0 "Ce sont des temps difficiles."

 fengtian_political_events.21.t:0 "Gouvernance Désastreuse"
 fengtian_political_events.21.d:0 "Le pouvoir des autres factions ayant décliné, la Ligue pour la Reconquête se retrouve dans une position de force sans précédent. Pourtant, la Ligue est loin d'être le parti politique que tout le monde s'imagine : elle manque d'un leadership fonctionnel et d'un cap clair aux niveaux les plus élevés ; ses niveaux inférieurs sont la proie de divers intérêts spécifiques et de querelles personnelles. Le résultat est un gouvernement incapable de gouverner, et tandis que le Grand Maréchal peut utiliser ses pouvoirs étendus pour conserver l'ordre politique, cela et les actions sans scrupules de la Ligue déchirent le fin voile de légitimité du gouvernement.\n\nL'équilibre doit être restauré si le pays veut prospérer."
 fengtian_political_events.21.a:0 "La situation échappe à notre contrôle..."

 fengtian_political_events.23.t:0 "Domination de la Clique de Zhang"
 fengtian_political_events.23.d:0 "Avec le pouvoir des loyalistes et des subordonnés immédiats de Zhang qui atteint des niveaux jamais vus depuis l'établissement du Gouvernement de Fengtian, ses autres factions politiques ont commencé à se tourner vers des moyens non conventionnels pour éviter une dictature totale.\n\nSur ordre de la Clique des Communications, les trains ont cessé de circuler à l'heure et les messages télégraphiques disparaissent, tandis que les Japonais ont intensifié la pression politique et économique pour aider l'Association Concordia. Même la Ligue pour la Reconquête, généralement considérée comme politiquement impuissante, a organisé des manifestations, ralliées par une cause célèbre.\n\nLa situation est aggravée par les abus de pouvoir désormais fréquents de la Clique de Zhang et ses tentatives de riposte par la force. Bien qu'il ait plus de pouvoir que jamais, le Grand Maréchal doit sûrement régner sur ses partisans pour le plus grand bien de la nation."
 fengtian_political_events.23.a:0 "La situation échappe à notre contrôle..."

 fengtian_political_events.25.t:0 "Exploitation ploutocratique"
 fengtian_political_events.25.d:0 "Bien que peu de gens auraient pu le prédire des années auparavant, la Clique des communications se retrouve comme la faction la plus puissante du gouvernement, bien que cette domination cache une structure de pouvoir construite sur rien de plus qu'un intérêt de contrôle dans les infrastructures et un capital abondant. Ainsi, Liang et son parti ne disposent pas d'une large base de soutien ni des moyens de rendre cette absence sans importance. Les autres factions repoussent déjà la Clique qui s'abstient de prendre le pouvoir, cherchant à exercer un contrôle supplémentaire mais sabotant l'intérêt national dans le processus. Cette situation déséquilibrée ne peut pas durer éternellement."
 fengtian_political_events.25.a:0 "La situation échappe à notre contrôle..."

 fengtian_political_events.28.t.minor:0 "Protestations antijaponaises"
 fengtian_political_events.28.d.minor:0 "Furieux de la mainmise croissante du Japon sur notre pays, des protestations ont éclaté à Shenyang, Harbin et Changchun. Des unités de la police et de l'armée sont déjà sur place pour contenir les protestations, mais le mal est déjà fait"
 fengtian_political_events.28.t.major:0 "Protestations antijaponaises majeures"
 fengtian_political_events.28.d.major:0 "Fâchés par l'écrasante mainmise du Japon et de Mantetsu sur notre pays, des protestations ont éclaté dans tout le pays. Des unités de police et de l'armée sont déjà sur place, mais elles ne semblent pas vouloir vraiment presser les foules. Bien que les manifestations devraient s'apaiser dans quelques jours, il semble peu probable qu'elles se terminent à moins de changements majeurs."
 fengtian_political_events.28.a:0 "C'est regrettable."

 fengtian_political_events.29.t:0 "Influence rampante de Mantetsu"
 fengtian_political_events.29.d:0 "Comme il l'a fait pendant des années, Mantetsu poursuit ses efforts, lents mais sûrs, pour dominer notre économie, en investissant dans les entreprises, en rachetant d'autres et en se diversifiant dans le secteur industriel. \N Avec suffisamment de temps, il semble que le pays tout entier pourrait être englouti, à moins qu'une rupture définitive et décisive ne soit faite avec le Japon."
 fengtian_political_events.29.a:0 "Il faut résister à cela."

 fengtian_political_events.30.t:0 "Les généraux s'agitent"
 fengtian_political_events.30.d:0 "Inquiets de la diminution de leur influence au sein de l'Assemblée et du gouvernement, les membres puissants de la Clique de Zhang ont commencé à exprimer leur mécontentement, affirmant que s'ils le souhaitaient, l'Assemblée entière pourrait être dissoute en quelques minutes par la force des armes. Ces déclarations ont été renforcées par une augmentation lente mais régulière de la garnison de la capitale, qui se rangerait presque certainement à une écrasante majorité du côté de leurs protecteurs généraux en cas de bouleversement politique."
 fengtian_political_events.30.a:0 "Inquiétant..."

 fengtian_political_events.31.t:0 "Les mystères du chemin de fer et du télégraphe"
 fengtian_political_events.31.d:0 "Les ministres et autres responsables gouvernementaux se sont étrangement retrouvés dans une situation extrêmement pénible ces derniers temps, avec des télégrammes qui ont disparu ou qui ont été transmis aux mauvaises personnes, des secrets qui n'ont été révélés qu'au téléphone, et des trains qui arrivent mystérieusement en retard de façon chronique. Bien sûr, beaucoup savent bien qu'il ne s'agit là que de la Clique des communications montrant son mécontentement face à la diminution récente de son influence, et il semble probable que les mesures qu'elle a prises renforceront sa nécessité pour le bon fonctionnement du gouvernement"
 fengtian_political_events.31.a:0 "Telle est la politique."

 fengtian_political_events.32.t:0 "La Clique des Communications Dirige des Grèves Ferroviaires"
 fengtian_political_events.32.d:0 "La Clique des Communications, qui exerce une influence considérable sur les chemins de fer mandchous détenus par des Chinois, comme le CER, a décidé d’encourager l’activité syndicale et les grèves afin de compenser la perte d’influence qu’elle a récemment subie au sein du gouvernement. La Clique ne devrait pas aller trop loin, de peur de créer une situation qu’elle ne pourrait plus contrôler, mais ses méthodes ont déjà permis de démontrer avec une certaine efficacité son poids politique et économique."
 fengtian_political_events.32.a:0 "Troublant."

 fengtian_shenyang_conference_events.1.t:0 "La Conférence de Shenyang"
 fengtian_shenyang_conference_events.1.d1:0 "À l'heure actuelle, [QIE.GetNameDef] constitue le principal obstacle à nos ambitions en Chine et en Asie dans son ensemble. Bien que nous ayons les moyens de les vaincre seuls, ce serait sans aucun doute une tâche colossale et coûteuse. Pire encore, nous courons un risque considérable d'être perçus comme les acolytes du Japon si nous agissons seuls, ce qui permettrait à [QIE.GetLeader] de rallier les autres seigneurs de la guerre contre nous. Nous ne devons pas laisser cela se produire.\n\nAfin de montrer à nos amis en Asie que nous sommes une puissance légitime lorsque nous nous opposons à [QIE.GetNameDef], nous avons organisé une conférence qui se tiendra à Shenyang, où nous formerons une coalition contre eux. Non seulement cela renforcera notre position, mais cela prouvera également notre légitimité aux yeux du monde."
 fengtian_shenyang_conference_events.1.d2:0 "Nous avons été contraints de lancer dès à présent notre Guerre de Reconquête contre [QIE.GetNameDef], même si tous nos alliés ne sont peut-être pas encore prêts. Cependant, certains pourraient encore être amenés à se rallier à notre cause au cours de ce conflit. Nous devons prendre contact avec la Clique d'Anqing, au sud, qui vient de remporter la victoire contre la Ligue, et espérer les convaincre de rejoindre immédiatement notre camp. Nous ne disposons pas actuellement des ressources nécessaires pour les aider à se reconstruire, car nous sommes déjà accaparés par la guerre."
 fengtian_shenyang_conference_events.1.a:0 "Envoyez les invitations."

 fengtian_shenyang_conference_events.2.t:0 "Invités à la Conférence de Shenyang"
 fengtian_shenyang_conference_events.2.ddef:0 "Nous avons reçu aujourd’hui une invitation officielle à la Conférence de Shenyang organisée par [From.GetNameDef]. Celle-ci a pour objectif de nous permettre d’améliorer notre coordination en cas de conflits futurs et d’instaurer une coopération plus large entre [From.GetNonIdeologyNameDef] et les autres puissances chinoises. Comme nous n’avons rien à perdre à accepter cette invitation amicale et à participer à la conférence, nous allons l’accepter et y assister."
 fengtian_shenyang_conference_events.2.danq:0 "Nous avons reçu une invitation à la Conférence de Shenyang organisée par [From.GetNameDef]. Ils souhaitent aborder des questions importantes concernant notre participation à leur Guerre de Reconquête contre [QIE.GetNameDef], qui a déjà commencé. Comme ils nous ont aidés dans notre conflit pour réunifier les Cinq Provinces, nous devrions les écouter. Ils nous ont également fait savoir qu'ils ne pouvaient actuellement consacrer aucune ressource à notre reconstruction, car ils sont entièrement mobilisés par la guerre."
 fengtian_shenyang_conference_events.2.a:0 "Envoyez une délégation."

 fengtian_shenyang_conference_events.3.t:0 "[FROM.GetName] Accepte la Conférence"
 fengtian_shenyang_conference_events.3.d:0 "Bonne nouvelle ! [FROM.GetNameDefCap] a répondu à notre invitation et a accepté de participer à la Conférence. Nous pouvons nous attendre à ce que leur délégation arrive d'ici peu."
 fengtian_shenyang_conference_events.3.d1:0 "Bonne nouvelle ! [FROM.GetNameDefCap] a répondu à notre invitation et a accepté de participer à la Conférence. Nous pouvons nous attendre à ce que leur délégation arrive sous peu. Il faut toutefois noter qu’ils sont actuellement fidèles à [ANQ.GetLeader], car Anqing a conquis le Shandong lors de la Guerre de la Ligue et en a fait un État fantoche. Ils nous ont toutefois promis de nous céder cette province dès que la guerre aura commencé."
 fengtian_shenyang_conference_events.3.a:0 "Excellent."

 fengtian_shenyang_conference_events.4.t:0 "Négociations avec les Fédéralistes ?"
 fengtian_shenyang_conference_events.4.d.no_allies:0 "Notre position diplomatique actuelle laisse beaucoup à désirer. À part le Japon, nous n'avons aucun allié naturel dans la région qui serait en mesure de coopérer avec nous contre [QIE.GetNameDef]. Il nous reste donc la possibilité, peu orthodoxe mais néanmoins réelle, de solliciter le soutien des Fédéralistes. Bien qu'ils soient loin d'être insignifiants, nous avons assurément notre lot de divergences idéologiques. Quoi qu'il en soit, si nous parvenons à les surmonter, ils pourraient devenir un allié de poids dans le conflit à venir."
 fengtian_shenyang_conference_events.4.d.conference:0 "Bien que nos récents efforts diplomatiques nous aient permis de gagner du terrain, certains de nos conseillers ont soulevé la question de savoir s’il fallait ou non nouer des liens avec les Fédéralistes. Même si nos divergences idéologiques sont réelles, ils font valoir que notre puissance et notre influence grandissantes devraient nous permettre de surmonter cet obstacle et d’ajouter un nouvel allié à nos rangs. Toutefois, grâce à nos autres succès, nous pourrions toujours refuser de le faire et nous épargner ainsi leurs inévitables exigences."
 fengtian_shenyang_conference_events.4.a:0 "Essayons de trouver un terrain d'entente."
 fengtian_shenyang_conference_events.4.b:0 "Pas la peine."

 fengtian_shenyang_conference_events.5.t:0 "Une Offre de [FROM.GetNonIdeologyNameDef]"
 fengtian_shenyang_conference_events.5.d.no_allies:0 "Nous avons reçu aujourd’hui un message de [FROM.GetNameDef] dans lequel ils expriment leur souhait de discuter d’une éventuelle coopération contre [QIE.GetNameDef]. Bien que nos points de vue divergent sur de nombreux sujets, nous pouvons peut-être attribuer leur ton plus conciliant à l’isolement croissant dont ils font l’objet. Compte tenu de leur manque d’alliés dans la région, notre participation à cette rencontre nous permettrait de les encourager à accepter des réformes indispensables en échange de notre aide. Comment devrions-nous répondre ?"
 fengtian_shenyang_conference_events.5.d.conference:0 "Contre toute attente, [FROM.GetNonIdeologyNameDef] nous a invités à participer à leur conférence à Shenyang. Leur objectif est de former une large coalition contre [QIE.GetNameDef]. Jusqu’à présent, ils semblent avoir réussi à rallier certains autres chefs de guerre à leur cause. Peut-être que si nous y participions, nous pourrions les convaincre d’entreprendre certaines réformes dont nous avons cruellement besoin. Comment devrions-nous répondre à leur invitation ?"
 fengtian_shenyang_conference_events.5.a:0 "Très bien, allons à Shenyang."
 fengtian_shenyang_conference_events.5.b:0 "Nous ne leur faisons pas confiance."

 fengtian_shenyang_conference_events.6.t.accepted:0 "[From.GetNonIdeologyNameDefCap] Accepte la Conférence"
 fengtian_shenyang_conference_events.6.d.accepted:0 "Bonne nouvelle ! [From.GetLeader] a répondu à notre invitation à participer à la Conférence de Shenyang. Il a accepté d'y assister et nous devrions voir arriver une délégation fédéraliste d'ici peu."
 fengtian_shenyang_conference_events.6.a:0 "Excellent."

 fengtian_shenyang_conference_events.6.t.refused:0 "[From.GetNonIdeologyNameDefCap] Refuse notre Offre"
 fengtian_shenyang_conference_events.6.d.refused:0 "Sans grande surprise, [From.GetLeader] a rejeté notre main tendue. Dans la lettre qu’il nous a adressée en réponse à notre invitation, il a invoqué l’influence japonaise comme raison principale, affirmant qu’il doutait de notre capacité à nous exprimer par nous-mêmes plutôt que de nous contenter d’obéir aux ordres de Tokyo."
 fengtian_shenyang_conference_events.6.b:0 "Tant pis pour eux."

 fengtian_shenyang_conference_events.7.t:0 "Début de la Conférence de Shenyang"
 fengtian_shenyang_conference_events.7.d:0 "Les délégués sont arrivés à Shenyang pour discuter de l'initiative de [From.GetNonIdeologyNameDef] contre le régime. Une brève cérémonie d'ouverture a eu lieu, couronnée par un discours d'introduction de Zhang Zuolin. Tout le monde est de bonne humeur, même si personne ne doute des défis diplomatiques qui les attendent."
 fengtian_shenyang_conference_events.7.a:0 "Commençons."

 fengtian_shenyang_conference_events.8.t:0 "Discussions Animées"
 fengtian_shenyang_conference_events.8.d:0 "Tout le monde savait que [ANQ.GetLeader] et [SHD.GetLeader] auraient du mal à coopérer, compte tenu de l'antipathie qu'ils se portent mutuellement. Malheureusement, ils ont laissé leurs désaccords privés dégénérer en conflit public, ce qui a désormais perturbé les pourparlers. Zhang Zongchang, en particulier, a fait un scandale : ses manières et son mépris flagrant de l'autorité suffisent à faire sourciller même le seigneur de la guerre le plus endurci. Nous ne pouvons qu'espérer que cela ne devienne pas une tendance à mesure que la conférence avance."
 fengtian_shenyang_conference_events.8.a:0 "Arrêtez ! Tous les deux !"

 fengtian_shenyang_conference_events.9.t:0 "Les Fédéralistes Exigent des Réformes"
 fengtian_shenyang_conference_events.9.d:0 "Comme on pouvait s'y attendre de la part des Fédéralistes, [FNG_shenyang_federalist_leader.GetLeader] tente de faire pression sur Zhang Zuolin pour qu'il adopte des réformes. L'objectif de celles-ci serait la libéralisation progressive de [From.GetNonIdeologyNameDef] et, idéalement – pour lui –, que ces réformes, menées au plus haut niveau, se répercutent pour influencer également les autres seigneurs de la guerre. Il est clair que les Fédéralistes ne sont pas prêts à soutenir Zhang sans obtenir quelque chose en échange."
 fengtian_shenyang_conference_events.9.a:0 "Faites des promesses vagues."

 fengtian_shenyang_conference_events.10.t:0 "La Question Anti-Concessionniste"
 fengtian_shenyang_conference_events.10.d.ANQ:0 "Fervents opposants aux Concessions accordées aux puissances coloniales, les membres de la délégation de [ANQ.GetNonIdeologyNameDef] ont exercé une pression active sur le Fengtian pour qu’il adopte une position ferme contre ces concessions. Zhang Zuolin s’est montré réticent jusqu’à présent à prendre des engagements définitifs sur la question, mais cela n’a pas suffi à faire disparaître le problème. Il est évident que cette situation ne pourra pas durer si l’on veut que la conférence puisse aller de l’avant."
 fengtian_shenyang_conference_events.10.d.GXC:0 "Fervents opposants aux Concessions accordées aux puissances coloniales, les membres de la délégation de [ANQ.GetNonIdeologyNameDef] ont exercé une pression active sur le Fengtian pour qu’il adopte une position ferme contre ces concessions. Elle a été soutenue dans cette entreprise par les Fédéralistes, qui s'opposent tout autant aux concessions, bien que depuis une position plus libérale. Si Zhang Zuolin s'est montré réticent jusqu'à présent à prendre officiellement position sur la question, il sera probablement contraint de le faire prochainement. L'influence exercée par les deux Chen ne cessant de croître, cette question ne risque pas de disparaître."
 fengtian_shenyang_conference_events.10.a:0 "Ils ont peut-être raison..."

 fengtian_shenyang_conference_events.11.t:0 "[ANQ.GetNonIdeologyNameDefCap] et [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] Trouvent un Accord"
 fengtian_shenyang_conference_events.11.d:0 "Unis par un programme résolument anti-concessionniste, les deux Chen de [ANQ.GetNonIdeologyNameDef] et [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] ont formé ce qui s'apparente à un bloc au sein de la conférence. Leurs positions bénéficiant d'un large soutien, la position non déclarée de Zhang Zuolin devient de plus en plus intenable d'heure en heure."
 fengtian_shenyang_conference_events.11.a:0 "Cela pourrait poser un problème."

 fengtian_shenyang_conference_events.12.t:0 "Les Divagations d'Ivrogne de Zongchang"
 fengtian_shenyang_conference_events.12.d:0 "Après avoir bu du saké, sans doute par barils entiers, [SHD.GetLeader] a fait un scandale aujourd’hui en débitant, d’une voix pâteuse, une tirade d’ivrogne. Le peu que l’on pouvait comprendre de ses divagations n’était rien d’autre qu’une déclaration d’amour au Japon ; seuls son amour pour l’alcool japonais et pour les femmes ont pu être saisis par l’auditoire retenu en otage, ne serait-ce qu’à force de répétitions. La plupart des divagations incompréhensibles de Zhang étaient, pour le meilleur ou pour le pire, impossibles à comprendre, ce qui a peut-être été une bénédiction déguisée.\n\nAprès avoir fait une scène spectaculaire, il s’est levé de sa chaise et a posé une botte sur la table. Avant qu’on puisse le faire s’asseoir à nouveau, il a porté un toast au Japon, le reste de son discours ressemblant davantage aux gémissements d’un homme luttant pour retenir ses vomissements qu’à de véritables mots. Dire que cela a créé une atmosphère négative parmi les participants à la conférence serait l’euphémisme de la décennie."
 fengtian_shenyang_conference_events.12.a:0 "Arrêtez de nous embarrasser !"

 fengtian_shenyang_conference_events.13.t:0 "Yang Yuting Préconise la Prudence"
 fengtian_shenyang_conference_events.13.d:9 "Face à la montée des sentiments anti-concessionnaires, Yang Yuting a pris la parole pour exhorter le Vieux Maréchal à faire preuve de prudence quant à la position à adopter sur les Concessions. Compte tenu des intérêts considérables que le Japon y porte, notamment par l’intermédiaire de son Agence chinoise dans les Villes des Légations, ce pays risquerait de subir de lourdes pertes si nous décidions de nous déclarer opposés aux Concessions. Compte tenu de notre coopération saine et mutuellement bénéfique, les aliéner serait perçu par Tokyo non seulement comme une insulte, mais aussi comme une agression flagrante à son encontre.\n\nBien que cela ne soit guère surprenant, les actions de Yuting prouvent que le Japon s'inquiète de notre décision finale. À tout le moins, cela nous rappelle qu'il ne restera pas les bras croisés si nous rejoignons le mouvement anti-concessionniste."
 fengtian_shenyang_conference_events.13.a:0 "Un avertissement juste."

 fengtian_shenyang_conference_events.14.t:0 "Le Moment Décisif"
 fengtian_shenyang_conference_events.14.d:9 "Face à la pression insurmontable exercée par ses partenaires potentiels, le maréchal Zhang doit décider s’il adhère à la position anti-concessionniste qui domine désormais la conférence ou s’il tente de s’y opposer. Se ranger contre les anti-concessionnistes compromettrait gravement nos chances de former une alliance solide. Adopter une position anti-concessionniste, en revanche, provoquerait la colère de Tokyo."
 fengtian_shenyang_conference_events.14.a:0 "Très bien, nous acceptons."
 fengtian_shenyang_conference_events.14.b:0 "Nous ne pouvons nous permettre de mettre le Japon en colère."

 FNG_federalist_allies: "§GLes Fédéralistes se joindront à nos efforts contre [QIE.GetNameDef] !§!"
 FNG_anticoncessionists_angered: "§R[ANQ.GetNonIdeologyNameDefCap] et [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] seront très mécontents de cette décision !§!"
FNG_federalists_angered: "§R[FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] sera très mécontent de cette décision !§!"
 FNG_anqing_angered: "§R[ANQ.GetNonIdeologyNameDefCap] sera très mécontent de cette décision !§!"

 fengtian_shenyang_conference_events.15.t:0 "L'Alliance [FNG.GetNonIdeologyAdjective]-Fédéralistes"
 fengtian_shenyang_conference_events.15.d:0 "Il n'a pas été facile de surmonter les nombreuses divergences qui nous séparaient. Finalement, le pragmatisme l'a emporté et nous avons trouvé suffisamment de points communs pour que cette amitié improbable devienne réalité. [FNG.GetNonIdeologyNameDef] et les Fédéralistes de [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] font désormais cause commune à l'issue d'une longue série de négociations secrètes. Espérons que cette alliance résistera à l'épreuve du temps."
 fengtian_shenyang_conference_events.15.a:0 "Excellent."

 fengtian_shenyang_conference_events.16.t:0 "[ANQ.GetNonIdeologyNameDefCap] nous Remercie"
 fengtian_shenyang_conference_events.16.d:0 "Nous avons reçu une confirmation officielle de la part de [ANQ.GetLeader] indiquant qu'il se réjouit de notre prise de position anti-concessionniste. Cependant, il n'a pas encore examiné tous les aspects liés à sa décision de se joindre à nous dans notre Guerre de Reconquête. Nous attendons sa décision finale."
 fengtian_shenyang_conference_events.16.a:0 "Nous devons attendre."

 fengtian_shenyang_conference_events.17.t:0 "Victoire des Anti-Concessionnistes"
 fengtian_shenyang_conference_events.17.d:0 "Même si les obstacles à surmonter n’ont pas manqué en cours de route, c’est la diplomatie qui l’a emporté. La Conférence de Shenyang s’est soldée par un succès pour [Root.GetNonIdeologyNameDef], consolidant ainsi sa position dans la région aux dépens du gouvernement de Beijing. Les délégués ont quitté la ville après une cérémonie de clôture cordiale. Zhang Zuolin a désormais fait un grand pas de plus vers la concrétisation de ses ambitions."
 fengtian_shenyang_conference_events.17.danq:0 "Zhang Zuolin a réaffirmé son soutien au Mouvement anti-concessions ! Bien que les obstacles n’aient pas manqué en cours de route, la diplomatie a fini par l’emporter. La Conférence de Shenyang s'est soldée par un succès pour [Root.GetNonIdeologyNameDef], consolidant sa position dans la région au détriment du gouvernement de Beijing. Les délégués ont quitté la ville après une cérémonie de clôture cordiale. C'est désormais à nous de décider si nous allons effectivement apporter notre soutien à Zhang Zuolin et rejoindre sa Guerre de Reconquête."
 fengtian_shenyang_conference_events.17.a:0 "Prochain arrêt : Beijing !"
 fengtian_shenyang_conference_events.17.b:0 "Nous prendrons la bonne décision."

 fengtian_shenyang_conference_events.18.t:0 "Les Fédéralistes Claquent la Porte"
 fengtian_shenyang_conference_events.18.d:0 "Trouver un compromis sur les Concessions s'est avéré être une tâche insurmontable. Il était tout simplement politiquement impossible pour les Fédéralistes de faire volte-face sur cette question, tandis que le refus de Zhang de céder est publiquement tourné en dérision, considéré comme un simple refus de mordre la main qui le nourrit. Après avoir publiquement dénoncé la conférence comme une mascarade, la délégation fédéraliste menée par [FNG_shenyang_federalist_leader.GetLeader] a quitté la conférence. Toute chance d'alliance entre eux et [Root.GetNonIdeologyNameDef] est désormais probablement tout à fait impossible."
 fengtian_shenyang_conference_events.18.a:0 "Ce sera difficile."

 fengtian_shenyang_conference_events.19.t:9 "Zhang Zuolin Refuse nos Exigences"
 fengtian_shenyang_conference_events.19.d:9 "De toute évidence, Zhang Zuolin ne peut tout simplement pas mordre la main qui le nourrit. En déclarant son opposition aux anti-concessionnistes, il a affiché ses couleurs aux yeux de toute la Chine. Il est absolument hors de question que nous nous rangions du côté de [From.GetNonIdeologyNameDef] dans ces circonstances. Même si nous avions espéré qu’il revienne à la raison, nous ne pouvons pas dire non plus que cela nous surprenne. Notre délégation a quitté la conférence plus tôt dans la journée, laissant Zhang Zuolin avec ses acolytes japonais."
 fengtian_shenyang_conference_events.19.a:0 "C'est un larbin des Japonais, après tout."

 fengtian_shenyang_conference_events.20.t:0 "[From.GetNonIdeologyNameDefCap] Refuse de Dénoncer les Concessions"
 fengtian_shenyang_conference_events.20.d:9 "Malgré tous nos efforts, nos délégués n'ont pas réussi à convaincre Zhang Zuolin de s'opposer aux concessions. Nous ne prendrons pas cela à la légère, mais nous ne devons pas agir dans la précipitation ni dénoncer immédiatement le maréchal Zhang. Examinons les différents facteurs et décidons s'il convient ou non de nous joindre à Zhang Zuolin dans sa Guerre de Reconquête contre Beijing."
 fengtian_shenyang_conference_events.20.a:0 "C'est dommage."

 fengtian_shenyang_conference_events.21.t:0 "Tiaoyuan décide de sa position"
 fengtian_shenyang_conference_events.21.d:0 "La position de [FNG.GetNonIdeologyNameDef] sur la question des concessionnaires a fortement irrité Chen Tiaoyuan de [ANQ.GetNonIdeologyNameDef]. Cependant, les délégués de [ANQ.GetNonIdeologyNameDef] nous ont informés que la décision de se joindre ou non à notre guerre contre Beijing et de conclure une alliance avec nous n'a pas encore été prise. Nous attendons avec impatience leur réponse finale."
 fengtian_shenyang_conference_events.21.a:0 "Il faut être patient."

 fengtian_shenyang_conference_events.413.t:0 "Condamné à l'échec"
 fengtian_shenyang_conference_events.413.d:0 "Nous avons une fois de plus pris la ville de Beijing et semblons prêts à réintroduire la Chine, mais cela est loin d'être suffisant pour dissiper l'ombre de l'influence japonaise. Avec notre pays enchaîné au Japon plus étroitement que jamais, les espoirs d'unifier la Chine par la négociation sont destinés à être de simples espoirs. La seule voie qui reste semble être celle du Japon..."
 fengtian_shenyang_conference_events.413.a:0 "Mais Beijing est à nous !"

#Beijing Conference

 fengtian_beijing_conference_events.000.t:9 "The Beijing Conference"
 fengtian_beijing_conference_events.000.d:9 "China, long divided, may finally find a respite from the chaos. The Five-Coloured Flag of the Chinese Republic now flies proudly over Zhengyang gate as [ROOT.GetNameDef]'s troops hold garrisons and posts throughout the country. With several major urban centers fully occupied and liberated, prospects of national unification grow ever so strong.\n\nDespite their victory, the Fengtian Clique has a massive hurdle to cross with the burdens of unification. Fengtian's economy, once one of China's greatest industrial centres, now faces hyperinflation with the sudden influx of inheriting the former national economy. With currency completely non-standard and markets utterly collapsing, the newly unified republic suffers from the possibility of a total economic depression. Furthermore, the ever-growing military of the Fengtian Clique also suffers from disarray, due to its overextended troops, undisciplined looting, and deserters. The military leadership have attempted to install discipline within the ranks but it's clear that the overextended and burdensome military will need to be addressed.\n\nZhang Zuolin, the Old Marshal, plans to use this moment of victory by hosting a National Reunification Conference in Beijing. This conference aims to bolster the Clique and Zhang's legitimacy as the true inheritor of the Republic of China. It's expected that politicians, intellectuals, industrialists, and generals from both the Fengtian Clique and China nationally will be in attendance to witness the momentous event.\n\nThe Japanese government has also been present in witnessing the unification of China unfold. Newspapers and pamphlets throughout Japan applaud Zhang's unification in driving out Western influence from Asia and achieving China's liberation from imperialism. In particular, Japan's prestigious Tianjin Army has been praised for their speed, discipline, and efficiency in assisting Marshal Zhang's advance throughout the country."
 fengtian_beijing_conference_events.000.a:9 "The Road to Unification lies in front of us."

 fengtian_beijing_conference_events.001.t:9 "Zhang Calls Conference in Beijing"
 fengtian_beijing_conference_events.001.d:9 "Once exiled and isolated from Beijing's halls of power, the Fengtian Clique has made a rapid turnabout with Japanese support. Grand Marshal Zhang Zuolin stands triumphant, having overrun most of his foes and is rapidly being recognised internationally as China's legal government.\n\nThe ascension of the National Pacification Army (the Anguojun) has worried many, who fear the rapid expansion of Japanese influence across China. As Zhang's foes begin to band together against Japan, within the Fengtian Clique divisions have emerged about their erstwhile \"patrons.\" Amid a changing political situation and the challenges of economic reconstruction, the Grand Marshal has called a conference to resolve lingering tensions."
 fengtian_beijing_conference_events.001.a:9 "The final enemy of the nation remains..."
 fengtian_beijing_conference_events.001.b:9 "Let us see if Marshal Zhang will play ball."
 fengtian_beijing_conference_events.001.c:9 "Will the Dragon remain shackled or fly free?"

 fengtian_beijing_conference_events.002.t:9 "Japan Divides the Conference"
 fengtian_beijing_conference_events.002.d:9 "Although Marshal Zhang called the Beijing Conference to discuss matters regarding national unification, it seems that much of the discussion has devolved into debates around Japan and the fate of the new Anguojun government. It is no secret that Sino-Japanese ties have proven to be a double edged sword for previous Chinese administrations, having resulted in the toppling of the Anfu Government. Zhang too was forced to rely extensively on Tokyo's aid to maintain his ailing government, his reputation too was marred and members of the Anguojun Conference have rightfully voiced concerns.\n\nThe Marshal's Zhang Clique inner circle are somewhat hesitant to maintain such close Japanese ties, with Zhang Xueliang's young guard being particularly hostile. Meanwhile, the Recovery League has split over the issue, with members like Wang Yitang calling for maintaining close ties to Tokyo, while Wu Jinglian and his supporters advise the Grand Marshal to distance himself from the Rising Sun.\n\nThe New Communications Clique is unsurprisingly also advising Marshal Zhang to maintain his ties to Tokyo on the grounds of economic recovery and development. Yang and the Shikan Clique have been somewhat split, with Chang Yinhuai's nationalist faction declaring that they've learned enough from Tokyo to go their own way, while Yang has been more passively pro-Tokyo in his stance.\n\nThe Concordia Association has been the most vocal about maintaining Japanese ties, declaring their support for the Pan-Asian project to topple European Imperialism and China's role in the New Asian Order. The New People's Society has also made a presence in the conference, funded by the Tianjin Army in hopes of challenging the Concordia Association and their Kwantung overlords. They too call for maintaining ties with Tokyo, but urge the conference to redirect its focus to unification. With so many voices declaring different concerns, Marshal Zhang recognises that his choice will be controversial no matter what."
 fengtian_beijing_conference_events.002.a:9 "For the good of the nation, we must maintain our ties to Tokyo."
 fengtian_beijing_conference_events.002.b:9 "The nation must be free, both from Germany and Japan!"

 fengtian_beijing_conference_events.003.t:9 "The Remnants of Beiyang"
 fengtian_beijing_conference_events.003.d:9 "The Beiyang Government was once a Northern Chinese government based in Beijing, held together by the united Beiyang Army. Although Yuan Shikai was able to hold the army together as its founder, his successor Duan Qirui favoured his Anhui faction above others, earning him the ire of many who coalesced into the Zhili Clique. Meanwhile in the Northeast, local Beiyang forces join with Zhang Zuolin's former bandit allies to create the Fengtian Clique.\n\nAfter the Beiyang Government was shattered by infighting, the Zhili and Fengtian Cliques remained in constant struggle, with the Zhili scooping up most of the apolitical elements and Fengtian gaining many former Anhui supporters. With the fall of the Zhili Clique as well, the Fengtian Clique has emerged as Beiyang's sole heir, leaving many old anti-japanese luminaries with a hard choice. The remaining Beiyang splinter cliques under the Zhili have been absorbed by the Fengtian factions, though such a process has not been smooth.\n\nLocal Northeast bureaucrats have been hesitant to move south, Beiyang bureaucrats are resentful of Northeasterners marching into the Northern Plains to dictate terms to them, and many Fengtian officials squabble amongst themselves for jobs. As it stands, much of the newly conquered territories will remain in states of unrest and disorder until the growth pains of the Fengtian Government subside."
 fengtian_beijing_conference_events.003.a:9 "Loyalty is more valuable than merit!"
 fengtian_beijing_conference_events.003.b:9 "Is this not a meritorious government?"
 fengtian_beijing_conference_events.003.c:9 "Perhaps the Beiyang factions know the Central Plains best?"

 fengtian_beijing_conference_events.004.t:9 "The FCDP Rally the Opposition"
 fengtian_beijing_conference_events.004.d:9 "With the Fengtian Clique consolidating control of Northern China, old opponents of the Zhili Clique have re-emerged. The Federation of Chinese Democratic Parties, founded as the United National Construction League, was created by liberal opposition to the Zhili Government in the aftermath of the Seven Gentleman Incident where seven prominent National Salvation Federation members were arrested on charges of treason.\n\nA coalition of the Chinese Constitutionalist Party, Political Science Clique, Endeavor Society, and National Salvation Federation, they were an influential force in Northern China until the Zhili suppressed them in 1932. In the chaos of the Fengtian reconquest, the FCDP has once again emerged as a prominent force across the Northern Plains.\n\nMany of China's intellectual and politician class dislike Zhang, viewing him as a despotic brute in comparison to the learned Wu. The FCDP is an unwieldy force, but they have some institutional power as established opposition, and Marshal Zhang recognises that ignoring them would be a grave mistake.\n\nThe FCDP has taken to the streets, where they foster support amongst nationalistic students and intellectuals, denouncing any potential alliance with Japan that Zhang may consider. Northeast People's Self-Help Association too has joined with the FCDP, with the NSF in particular, in denouncing Japanese domination. This development has been of particular concern to Zhang, who has traditionally been quite popular in the Three Northeastern Provinces."
 fengtian_beijing_conference_events.004.a:9 "Perhaps we can allow some level of democracy..."
 fengtian_beijing_conference_events.004.b:9 "Wu Peifu was too soft on these idealistic fools!"

 fengtian_beijing_conference_events.005.t:9 "The Great Decision"
 fengtian_beijing_conference_events.005.d:9 "What began with the Beijing Conference has come to a head. Pro-Japanese elements in the Fengtian Clique have increased pressure on Zhang to align his government with Tokyo, while anti-Japanese factions in the government as well as street protestors have intensified their rhetoric. Rumours circulate across the nation that non-aligned warlords and rival governments to Fengtian intend on forming a United Front to fight the Fengtian Government and public perception of Zhang is falling rapidly.\n\nIt seems that Tokyo has run out of patience with Zhang's deliberations, and the Japanese ambassador is directly pressuring the Old Marshal to sign more indepth treaties with them, including formally joining the Co-Prosperity Sphere.\n\nMarshal Zhang now finds himself facing a tough choice with two options. He could sign the treaty for joining the Co-Prosperity Sphere immediately, gambling on Japanese aid to sweep away the opposition and then negotiate for concessions later from a stronger position. The second more risky option is for him to demand the concessions as part of the agreement to join the Co-Prosperity Sphere, which would appease the nationalists but risks causing a major overreaction by the Japanese who expect to hold onto their major concessions."
 fengtian_beijing_conference_events.005.a:9 "We will open negotiations to join the Sphere."
 FNG_JAP_influence_high_tooltip:9 "§RCette option est la seule disponible car l'influence japonaise est supérieure à 50%.§!"
 fengtian_beijing_conference_events.005.b:9 "We will gamble that Japan values us more than the concessions."

 fengtian_beijing_conference_events.010.t:9 "Zhang Invites us to Beijing"
 fengtian_beijing_conference_events.010.d:9 "With Fengtian victory over their rivals in Beijing, it seems that unification is finally at hand after decades of division. In order to plan the Anguojun's next move, Marshal Zhang has called a conference in Beijing involving all major warlords that recognise his government. However, it seems that the conference has rapidly devolved into debates surrounding the future relationship between China and Japan, much to Zhang's chagrin. The Zhang Clique has argued for distancing from Tokyo, while Concordia, New People's Society, and Communications Clique have pushed for maintaining ties, and the Recovery League and Shikan Clique find themselves divided over the issue. On top of factional disputes on Japanese ties, the FCDP has re-emerged as a liberal opposition force, taking to the streets to campaign against Japanese alignment and call for an end to corruption and democratisation. The Japanese have also directly demanded Zhang to sign treaties of friendship, including formal entry into the Co-Prosperity Sphere. As a major figure in the Anguojun, [ROOT.GetLeader]'s word would surely influence Marshal Zhang's decision."
 fengtian_beijing_conference_events.010.a:9 "We must not ally with the Japanese Imperialists!"
 fengtian_beijing_conference_events.010.b:9 "Friendship with Tokyo guarantees our future."

 fengtian_beijing_conference_events.011.t:9 "[FROM.GetLeader] Rails Against Japan"
 fengtian_beijing_conference_events.011.d:9 "With Marshal Zhang's Beijing Conference well under way, it seems that the Japan question has generated strong opinions. [FROM.GetLeader] in particular has been very vocal in opposing further alignment with Tokyo, declaring it to be unthinkable. It is unknown whether he is coming from an angle of genuine patriotism, or is at least appealing to it. Cynically, perhaps [FROM.GetLeader] simply fears that Japanese dominance will result in their declining influence and eventual sidelining, or maybe they fear that the rest of China will rally against the Anguojun. For whatever reasons, Marshal Zhang must consider [FROM.GetLeader]'s stance carefully."
 fengtian_beijing_conference_events.011.a:9 "Their opinion is heard."
 fengtian_beijing_conference_events.011.b:9 "...or maybe not."

 fengtian_beijing_conference_events.012.t:9 "[FROM.GetLeader] Advocates for Japan"
 fengtian_beijing_conference_events.012.d:9 "With Marshal Zhang's Beijing Conference well under way, it seems that the Japan question has generated strong opinions. [FROM.GetLeader] in particular has been very vocal in supporting further alignment with Tokyo, declaring it to be critical to the survival of the Fengtian Government. It is unknown the true reason for why he supports the Japanese Alliance. Maybe he fears Japanese invasion and views alignment to be a better fate, and perhaps rationalises that China will inevitably have more leverage in the future in such a partnership. Cynically, perhaps he has merely been bribed by the Japanese to support their interests. For whatever reasons, Marshal Zhang must consider [FROM.GetLeader]'s stance carefully."
 fengtian_beijing_conference_events.012.a:9 "Their opinion is heard."
 fengtian_beijing_conference_events.012.b:9 "...or maybe not."

 fengtian_beijing_conference_events.013.t:9 "Zhang Sidelines Us"
 fengtian_beijing_conference_events.013.d:9 "Although we are a critical part of the Anguojun Alliance, it seems that perhaps [FROM.GetLeader] has garnered less respect than he is owed. It has become apparent that our opinion means nothing in Marshal Zhang's calculus. [FROM.GetLeader] offered his Marshal his sincere opinion in the hopes of bettering the nation, and was promptly ignored. It is clear that Marshal Zhang is nothing more than a selfish dictator who ignores his subordinates. [FROM.GetLeader] has angrily stormed out of Beijing, deliberating his next move."
 fengtian_beijing_conference_events.013.a:9 "We ought to reconsider our allegiance."

 fengtian_beijing_conference_events.020.t:9 "Zhang's Unification Conference"
 fengtian_beijing_conference_events.020.d:9 "After years of strife, it seems that Zhang Zuolin has defeated his rivals in Beijing and restored his status as leader of China's internationally recognised government. The Anguojun has greatly expanded, reaching deep into the Central Plains. However, success often proves to be a double edged sword, and the rest of China has become scared into banding together against both Zhang and Tokyo. We have the leverage to pressure Zhang into formally joining the Co-Prosperity Sphere as the internationally recognised China, but the Beijing Conference has produced worrying results. Many of Zhang's inner circle oppose alignment with us, and our allies and agents on the ground have been quite counterproductive. The Concordia Association's presence south of the Great Wall has been meagre to say the least, their associates in the Kwantung Army are more furious that the Tianjin Army was able to successfully carry out their plan, and the Tianjin Army has been doing premature victory laps before their eggs hatch in establishing the New People's Society to rival the Concordia Association and be their mouthpiece, and the Shanghai Garrison has not exercised any meaningful influence in the Beijing Conference. Of the Pro-Japanese elements in the Fengtian Government, many dislike each other, and are mutually suspicious of each other. We can consider trying to bring together all these disparate elements into a single cohesive Pro-Japanese front, but such a difficult effort requires substantial investment and time."
 fengtian_beijing_conference_events.020.a:9 "We are on the cusp of victory, we cannot fail now!"
 fengtian_beijing_conference_events.020.b:9 "Alas China unites but we remain divided."

 fengtian_beijing_conference_events.021.t:9 "Tokyo Coordinates Their Forces"
 fengtian_beijing_conference_events.021.d:9 "It is well-known that despite shared affinity for Japan, the various Pro-Japanese factions in the Fengtian Government have typically engaged in substantial infighting. Rivals in the Recovery League often get into squabbles with the New Communications Clique, and the Concordia Association and Kwantung Army spend more time attempting to root out Tianjin Army influence than on promoting Tokyo's interests in Shenyang, and vice versa. However, recently it seems that there has been a substantial shift in Pro-Japanese circles, as they have begun to work as one cohesive chorus guided by an invisible conductor at the helm. They have all been unanimous in urging Marshal Zhang to join the Co-Prosperity Sphere. Such a concerted effort has concerned the Old Marshal, who has traditionally played these groups against each other in his bid to prevent anyone from getting too much influence."
 fengtian_beijing_conference_events.021.a:9 "How much money did Japan spend to make this happen?!"

 fengtian_beijing_conference_events.200.t:9 "Zhang Demands the Concessions"
 fengtian_beijing_conference_events.200.d:9 "In the Beijing Conference, it became clear that Marshal Zhang's stance towards Tokyo would be the primary topic of discussion. Various minor warlords argued for or against us, as did Zhang's many factions in Shenyang. Of the major factions not directly aligned with us, the Recovery League was mainly divided, the New Communications Clique threw their weight in favour of us despite their recent business disputes with the Concordia Association, the Zhang Clique was mostly against us, and the Shikan Clique was divided, but leaned towards us.\n\nAlongside the debates at the highest levels of government, on the street the Federation of Chinese Democratic Parties organised protests of nationalistic students to rally against continued Japanese influence. With our ambassador directly pressuring him to sign treaties of friendship and formal entry into the Co-Prosperity Sphere, Zhang has finally made his move.\n\nHoping to throw his weight around to his advantage, the Old Marshal has demanded the return of Japanese concessions in China and the end of extra-territoriality. He has stressed that he hopes to enter the Co-Prosperity Sphere as in equal power to Tokyo. Although Zhang has not explicitly declared his intention to take control of Mantetsu or other Japanese interests in China, it is clear that Zhang already sees himself as the victor in China. Tokyo is faced with a choice to either accept Zhang's terms or stall for time while preparing our forces to \"protect\" vital interests."
 fengtian_beijing_conference_events.200.a:9 "We begrudgingly accept these terms."
 fengtian_beijing_conference_events.200.b:9 "Stall for time while our forces prepare."
 FNG_JAP_war_in_two_weeks_warning_tt:9 "§RDans deux semaines, nous entrerons en guerre avec la Chine.§!"

 fengtian_beijing_conference_events.201.t:9 "The Mukden Incident"
 fengtian_beijing_conference_events.201.d:9 "Ever since Marshal Zhang's confrontation with the Japanese, it seems that Sino-Japanese tensions were escalating rapidly and an invasion of the Northeast was imminent. In the dead of night, a section of the South Manchuria Railway near Liutiao Lake was blown up by unknown actors. Tokyo declared that Chinese dissidents connected to the FCDP were involved.\n\nDenouncing Marshal Zhang as being unable to protect Japan's interests, Tokyo mobilised the Kwantung Army and its forces in Korea to cross into Chinese territory to secure its interests. Firing at our border guards, the Japanese Imperial Army crossed the Yalu River at midnight in what was essentially a declaration of war in all but name. Marshal Zhang has called the Anguojun to meet this threat to Chinese sovereignty and defend China from the Japanese invaders.\n\nRegardless of whoever set off this bomb, it seems that China and Japan are headed towards all out war. Already Japan's youth are being called upon to \"fulfil the duty of their fathers\" who fought and died in Manchuria in 1905, and there can be no illusions about the seriousness or extent of this war - for us it will soon become one of survival or annihilation."
 fengtian_beijing_conference_events.201.a:0 "Perfidie!"

 fengtian_beijing_conference_events.202.t:9 "The Mukden Incident"
 fengtian_beijing_conference_events.202.d:9 "Although Marshal Zhang was widely reputed to be Japan's willing partner in China, it seems that the relationship between Shenyang and Tokyo was always more fragile than previously believed. Nationalistic street protests and pressure within the Beijing Conference has persuaded Zhang to take a more assertive stance against the Japanese, much to Tokyo's fury.\n\nA week ago a bomb went off on the South Manchuria Railway. The Japanese seized the incident as a pretext to cross the Yalu River in a full invasion of China. As the two Asian titans clash, the rest of the continent holds their breath. Should China emerge victorious, the Japanese will lose an integral part of the Imperial war machine. Should Japan win, the rest of Asia will surely bow swiftly."
 fengtian_beijing_conference_events.202.a:9 "Zhang will face the iron price!"
 fengtian_beijing_conference_events.202.b:9 "The Rising Sun breaks all who refuse to bow."

 fengtian_beijing_conference_events.210.t:9 "The Japanese Accept Our Terms"
 fengtian_beijing_conference_events.210.d:9 "Although Marshal Zhang feared a potential Japanese backlash, it seems that cooler heads in Tokyo have prevailed. Today, the Japanese ambassador has met with the Old Marshal to announce that Japan has accepted China formally into the Co-Prosperity Sphere in exchange for returning all concessions. This is a great victory for the Fengtian Government, for it has not only secured a powerful partner in the East, but also done so while undoing many of the unequal treaties imposed previously, appeasing nationalist elements in the populace. Although the various rival governments in the South will rally against us, Marshal Zhang is confident that the combined efforts of Japan and Fengtian will see them defeated and Beijing ascendant."
 fengtian_beijing_conference_events.210.a:9 "A toast to a beautiful friendship!"

 fengtian_beijing_conference_events.211.t:9 "The Sino-Japanese Pact"
 fengtian_beijing_conference_events.211.d:9 "Against the expectation and to the horror of [ROOT.GetLeader], it seems that Zhang has correctly assessed that Tokyo would prefer an alliance with the Fengtian Government over the continuation of Japanese concessions in China. Tokyo has agreed to hand over all concessions to Zhang's government, including the Legation Cities which have been a boon to the Japanese economy. The Shanghai Garrison has already been ordered to evacuate, and [ROOT.GetLeader] faces a difficult choice. He can choose to either go quietly and acquiesce to Fengian annexation or organise a desperate resistance against the Chinese."
 fengtian_beijing_conference_events.211.a:9 "A tragic betrayal!"
 fengtian_beijing_conference_events.211.b:9 "We will not go down without a fight!"

 fengtian_beijing_conference_events.212.t:9 "The Sino-Japanese Pact"
 fengtian_beijing_conference_events.212.d:9 "After the Fengtian victory, fears that Zhang would continue to work closely with Japan ran amuck. Zhang's Beijing Conference to discuss peaceful unification was derailed by debate surrounding China's future relationship with Japan.\n\nHemmed by anti-Japanese protests, threats of a warlord coalition against him, and pressure from within his own government, the Old Marshal made a daring gamble. Demanding Japanese concessions in exchange for entry into the Co-Prosperity Sphere, Zhang was able to enshrine his alliance while avoiding the appearance of kowtowing to Japanese interests. Though war with the rest of China is expected, he has staved off challenges to his leadership from within."
 fengtian_beijing_conference_events.212.a:9 "A Free China in a Free Asia!"
 fengtian_beijing_conference_events.212.b:9 "It seems our worst fears have been realised."

 fengtian_beijing_conference_events.300.t:9 "Zhang Asks to Join the Sphere"
 fengtian_beijing_conference_events.300.d:9 "In the Beijing Conference, it became clear that Marshal Zhang's stance towards Tokyo would be the primary topic of discussion. Various minor warlords argued for or against us, as did Zhang's many factions in Shenyang. Of the major factions not directly aligned with us, the Recovery League was mainly divided, the New Communications Clique threw their weight in favour of us despite their recent business disputes with the Concordia Association, the Zhang Clique was mostly against us, and the Shikan Clique was divided, but leaned towards us.\n\nAlongside the debates at the highest levels of government, on the street the Federation of Chinese Democratic Parties organised protests of nationalistic students to rally against continued Japanese influence. With our ambassador directly pressuring him to sign treaties of friendship and formal entry into the Co-Prosperity Sphere, Zhang has finally made his move.\n\nMuch to our approval, Zhang has agreed to join the Co-Prosperity Sphere without any stipulations. Perhaps Zhang hopes to negotiate for greater concessions after unification, where his leverage will be higher, but that will not be an issue for Tokyo. We can prevent Zhang from demanding much of anything if the Fengtian Pro-Japanese front and our agents in China work to maintain our influence in his government."
 fengtian_beijing_conference_events.300.a:9 "Zhang submits to reality."
 FNG_JAP_prevent_focus_tooltip:9 "§YTant que notre Influence reste élevée, la Clique du Fengtian est incapable de prendre les priorités et décisions nécessaires pour demander le retour des concessions.§!"

 fengtian_beijing_conference_events.301.t:9 "Our Entry into the Sphere"
 fengtian_beijing_conference_events.301.d:9 "With our entry into the Co-Prosperity Sphere, we can expect much more significant Japanese aid in the struggle to come. Marshal Zhang's rivals in the South have already denounced him as a traitor to the Chinese nation, and have openly called for a United Front to jointly fight off the Anguojun and Japanese. Marshal Zhang is less concerned about the United Front, instead already looking to his ambitions after unification is carried out. The Old Marshal is already scheming to retake the coastal concessions after unification is carried out against his rivals, and keep Japanese influence at a minimum, as he did a decade ago."
 fengtian_beijing_conference_events.301.a:9 "Let's hope we win this game of chess."

 fengtian_beijing_conference_events.302.t:9 "La Clique du Fengtian Rejoint la Sphère"
 fengtian_beijing_conference_events.302.d:9 "Après la victoire du Fengtian, la crainte que Zhang ne continue à collaborer étroitement avec le Japon s'est répandue comme une traînée de poudre. La Conférence de Beijing organisée par Zhang pour discuter de la réunification pacifique a été détournée par les débats sur les futures relations entre la Chine et le Japon. Faisant fi des manifestations antijaponaises, des menaces d'une coalition de seigneurs de la guerre contre lui et des pressions au sein même de son propre gouvernement, le Vieux Maréchal a décidé d'adhérer à la Sphère de Coprospérité, pariant que le soutien japonais l'aidera à écraser tous les ennemis qu'il se fera.\n\nIl semble que Zhang se dirige vers un affrontement inévitable avec ses derniers rivaux à travers la Chine. Le Front uni a peu de chances de remporter cette guerre contre le Goliath japonais, mais peut-être restera-t-il dans l'histoire comme le dernier bastion d'une Chine libre."
 fengtian_beijing_conference_events.302.a:9 "Une Chine libre dans une Asie libre !"
 fengtian_beijing_conference_events.302.b:9 "Il semble que nos pires craintes se soient réalisées."

###FNG-JAP Mechanic Events

#FNG-JAP Mech Events Pt 1 (000-099) - Mission Events
 fengtian_japan_mechanic_events.000.t:9 "Our Allies in Tokyo"
 fengtian_japan_mechanic_events.000.d:9 "Zhang Zuolin is proud to have survived decades of China's brutal power games, but the reality is he could not have done it alone nor would his dreams of reunifying the country be realistic if it was not for the patronage of Japan. Many of our rivals paint him as a stooge for foreign imperialists, and even more embarrassing a power that China once saw as akin to a younger brother, but the reality is more nuanced.\n\nZhang Zuolin and many other politicians sympathetic to Japan do seek cooperation with Japan and are willing to make pragmatic concessions to advance their interests, but they also often believe that once China is united they will inevitably have the leverage to renegotiate treaties as equals. Their personal motivations also vary - some are cynically hoping to preserve their own power and wealth while others sincerely buy into Japanese Pan-Asian rhetoric against European powers.\n\nWhatever the case, Japan's outsized influence adds another layer of intrigue in Fengtian Clique politics. Japan expects returns on their investments, but conceding too much to Japan has brought down entire governments in the past - a lesson the exile Anhui and Communications Clique have learned the hard way.\n\nJapan's agents on the ground often fight and compete among themselves as they execute competing agendas often without Tokyo's knowledge. Zhang has been willing to exploit the lack of strategic clarity among Japanese decision-makers, but it also means that many of the deals he makes lack permanence for both sides. Managing expectations from both sides will be integral in his quest to liberate his nation."
 fengtian_japan_mechanic_events.000.a:9 "We will not be scorched by the rising sun."
 fengtian_japan_mechanic_events.000.tt:9 "§RNous devons faire preuve de prudence dans nos relations avec le Japon. Lorsque nous lancerons notre offensive sur Beijing, cela inquiétera bon nombre de nos conseillers japonais, qui pourraient alors prendre des mesures radicales si la guerre venait à tourner à notre désavantage. De même, si l'influence japonaise est trop forte, nos options pour gérer la réunification pourraient s'en trouver limitées.§!"

 fengtian_japan_mechanic_events.001.t:9 "The Three Armies in China"
 fengtian_japan_mechanic_events.001.d:9 "We have a long history with China, but after our victory in the Sino-Japanese War it was clear that we had eclipsed the once great power. Still, our efforts at establishing a hegemony over China have been stymied, even after the Xinhai Revolution and the ensuing Warlord Era tore apart the fragile nation. In addition to surges of Chinese nationalism and also the interference of Western powers, a lack of consistent strategic clarity from Tokyo has caused our various forces on the continent to adopt their own rival agendas.\n\nWhile this strategic ambiguity does offer plausible deniability and flexibility, it has hampered the establishment of a cohesive strategy for handling Chinese affairs. The closest to the \"Official\" line taken by our government in Tokyo are the officers of the Tianjin Army. The oldest but smallest of our China garrisons, they aim to support Zhang Zuolin and the Fengtian Clique's planned War of National Reclamation, which they believe will pave the way for Japanese influence over the whole nation. This subtle, insidious strategy will allow for a Chinese leader at the helm but Japanese control behind the scenes.\n\nTheir rivals in the Kwantung Army, who protect our valuable railroad and mining concessions we won in our wars with China and Russia, oppose operations that may jeopardise those interests. They instead wish to create buffer states to protect our hard-won gains, supporting Russian adventurers in Siberia and secessionist groups in China. They have fostered the Concordia Association as a civilian front to promote our interests in Manchuria.\n\nThe last major force is the Shanghai Garrison, made up of marines and with support of the IJN. Fierce inter-service rivalries have led them to try to seek alternative collaborators in China's east and south.\n\nThe growing autonomy of these three forces are a major concern, as is the growing inevitability of conflict in China with the collapse of the League. It would appear that our fates are now intertwined."
 fengtian_japan_mechanic_events.001.a:9 "We will tame the Chinese dragon."
 fengtian_japan_mechanic_events.001.tt:9 "§RNos relations avec la Chine sont essentielles à la prospérité à long terme de notre empire. Lorsque la Clique du Fengtian lancera sa Guerre de Reconquête nationale, cela présentera à la fois des opportunités et des dangers. Nous serons probablement entraînés dans ce conflit, mais nous pouvons faire en sorte qu’il se déroule à des conditions favorables et qu’il se termine à notre avantage en soutenant la Clique du Fengtian et en renforçant notre influence en son sein.§!"

 fengtian_japan_mechanic_events.002.t:9 "Tensions in Manchuria"
 fengtian_japan_mechanic_events.002.d:9 "Ever since the fall of the Anhui Clique, the Fengtian Clique and Zhili Clique have regarded each other as their principal rival. The Zhili first gained the upper hand in the First ZhiFeng war, but Fengtian nearly toppled the entire clique in 1924. However, Zhang Zuolin was ousted yet again in 1927 following Zhili victory against the KMT. For around a decade, Zhang Zuolin has sat north of the Great Wall, licking his wounds and plotting his eventual return to Beijing. It seems that this period of buildup has finally run its course, and Marshal Zhang has embarked on one final campaign to not just seize Beijing, but unify all of China.\n\nAlthough Tokyo has been allied to Marshal Zhang's government for nearly two decades, Japanese policy towards the Fengtian Clique continues to be divided and contradictory. The Tianjin Army has largely been supportive of Zhang's National Reclamation War. They hope that by aiding Marshal Zhang in his war, the Tianjin Army will be able to insert themselves as China's real rulers from behind the scenes, even perhaps eliminating their Kwantung rivals. Conversely, the Kwantung Army has long maintained their influence in Manchuria, and are very concerned of the possibility of Marshal Zhang losing the war, which would result in the loss of their own influence.\n\nEven within the Fengtian Clique, there have been those with concerns regarding the National Reclamation War's feasibility. For the moment, Zhang Zuolin has largely kept such dissident voices quiet. However Zhang Zuolin, like the pessimists in his camp, understands that this war will be an all or nothing effort - either he succeeds in establishing himself as master of all China, or he will die trying. For Japan, they largely continue to support Marshal Zhang in his war for China, but should he disappoint Tokyo with lack of progress, the Kwantung Army may be provoked into taking drastic action to secure Japan's interests."
 fengtian_japan_mechanic_events.002.a:9 "When you play the game of thrones, you win or you die."
 fengtian_japan_mechanic_events.002.tt:9 "§YLes dés sont jetés. Zhang a un §Rtemps limité§! avant que les tensions ne dégénèrent, qui augmentera ou diminuera selon les succès sur le champ de bataille et les décisions prises par Shenyang et Tokyo. Si le temps arrive à son terme, l'Armée du Kwantung tentera de forcer la main de la Cour impériale et de l'§Rentraîner dans la guerre continentale§!. Si il §Gréussit à capturer Beijing§! et au moins l'une de Nanjing, Wuhan, Guangzhou ou Chongqing, les relations entre le Fengtian et le Japon auront des conséquences différentes §Rselon l'influence japonaise sur son gouvernement§!.§!"

 fengtian_japan_mechanic_events.003.t:9 "The Fengtian-Japanese Alliance Victorious?"
 fengtian_japan_mechanic_events.003.d:9 "Although the National Reclamation War threatened to strain the Fengtian - Japanese alliance to the limit, it seems that the war has concluded with Zhang's complete victory. The Kwantung Army is no longer openly scheming to replace Marshal Zhang, and the Tianjin Army has encouraged Zhang to continue his wars of unification.\n\nOnce again, the Fengtian Clique rules in Beijing, and extends its foothold in the Central Plains. However, as Zhang continues to consolidate his authority across the rest of China, many in both Japan and China both wonder if this Sino-Japanese alliance will continue to hold.\n\nTokyo had always hoped for a more subservient partner in China than Zhang, and the Old Marshal has long viewed the Japanese with suspicion and his alliance with them as merely one of convenience. Will Japan and China both continue to maintain their ties despite mutual distrust and conflicts of interest? Or will tensions boil over and Tokyo and Beijing engage in one final war to end all wars?"
 fengtian_japan_mechanic_events.003.a:9 "Can China and Japan really be long-term allies?"

 fengtian_japan_mechanic_events.004.t_huanggutun:9 "The Huanggutun Incident"
 fengtian_japan_mechanic_events.004.d_huanggutun:9 "With the National Reclamation War going poorly, it seems that Marshal Zhang's luck has finally run out. Although he had hoped to win the war swiftly, the situation has evolved to become anything but. Zhang's struggles in the war have vindicated the fears of the Kwantung Army, who believe that the Old Marshal may try to negotiate to save his skin, have decided to act decisively.\n\nAs Marshal Zhang was returning to Shenyang after visiting the frontline, his train was hit by a bomb planted by the Kwantung Army. Although Zhang survived for a few hours, the Old Marshal ultimately succumbed to his wounds. Acting immediately, the Kwantung Army has driven out Zhang Xueliang, leaving Fengtian in the hands of Yang Yuting who has reluctantly taken on the position of Generalissimo of the Anguojun.\n\nThe Kwantung Army has largely acted on their own without Tokyo's knowledge or consent, but are gambling on the prospect of total Japanese defeat to force Tokyo's hand. With the Fengtian Government in utter disarray, the Japanese Government will be forced to directly intervene in the National Reclamation War to save Yang's crippled government."
 fengtian_japan_mechanic_events.004.t_manchurian:9 "The Manchurian Incident"
 fengtian_japan_mechanic_events.004.d_manchurian:9 "With the fall of Shenyang, fears have grown among Japanese decision-makers of the possibility of the total loss of Japanese influence in Manchuria - and with it decades of investment and national pride. Zhang Zuolin's incompetent handling of the war and rumours that he is attempting to negotiate a peace behind their backs has led to Kwantung Army hardliners to make a drastic move.\n\nDetonating a small amount of dynamite near a Mantetsu-owned railway (though far away enough that it would not cause any significant damage to the track), they alleged that it was an attack by the Fengtian Clique's enemies on the ostensibly neutral Japanese garrison. Utilising that pretext, the garrison then began shelling Chinese positions - pressuring initially reluctant senior Japanese officers and later Tokyo to embrace the plan.\n\nAs the Japanese moved into position for direct intervention in the conflict, they assassinated Marshal Zhang before he could potentially denounce Japanese imperialism and switch sides. His allies have fled underground and in his place Yang Yuting has assumed control over the remaining Fengtian forces in hopes of preserving some semblance of autonomy for his men."
 fengtian_japan_mechanic_events.004.a:9 "All eyes are on Marshal Yang to navigate us out of the crisis..."
 fengtian_japan_mechanic_events.004.b:9 "Marshal Zhang has failed us for the last time."

 fengtian_japan_mechanic_events.005.t:0 "Zhang Zuolin Assassiné"
 fengtian_japan_mechanic_events.005.d:9 "Although Zhang Zuolin seemed like a loyal partner to the Empire of Japan, it seems that perhaps there was greater tension in the Fengtian-Tokyo relationship than was apparent on the surface. Dissatisfied with the progress of Zhang Zuolin's National Reclamation War, disgruntled Japanese officers carried out his assassination and installed Yang Yuting in charge of the collapsing government.\n\nYang Yuting's government is unlikely to survive without Japanese aid, while Nationalist sentiment rallies his enemies across the Chinese nation. China and Japan have been drawing towards another war for Asia's future, and it seems that this one will be far more destructive and devastating than the first."
 fengtian_japan_mechanic_events.005.a:9 "Surely we are safe from Marshal Zhang's fate, right?"
 fengtian_japan_mechanic_events.005.b:9 "It seems that Zhang's time simply ran out."
 fengtian_japan_mechanic_events.005.c:9 "Japan has disgraced itself in the eyes of the world."

 fengtian_japan_mechanic_events.006.t:9 "From Traitor to Top Dog?"
 fengtian_japan_mechanic_events.006.d:9 "Grand Marshal Yang Yuting toured the ruined city of Beijing, one of [FNG.GetNameDef]'s recent conquests as its military began to turn the tide against their foes. He was met with a stony reception by its local citizens, the intelligentsia, and the newly restored national assembly as he reasserted his claim to leadership over the republic. Though many of the soldiers and officers are the same as Zhang Zuolin's old National Pacification Army, perceptions have drastically worsened - a great feat given how controversial Zhang when he dominated the north.\n\nMany still refuse to forgive the Shikan Clique for their part in allowing Japan to tighten its grip on the continent, even if General Yang justifies it as part of the national fight imperialism and socialism in public, and in private claims it a necessary evil to prevent the total dominantion of the Kwantung Army in the aftermath of Zhang's death. Regardless, [FNG.Capital.GetCapitalVictoryPointName] is resurgent and their influence stretches far beyond Beijing. But with that will come many more challenges as they fight to unite the country under their banner."
 fengtian_japan_mechanic_events.006.a:9 "China's savior or its sellout?"

 fengtian_japan_mechanic_events.030.t:9 "Le Japon Entre dans la Mêlée"
 fengtian_japan_mechanic_events.030.d:9 "Le déclenchement de la Seconde Guerre sino-japonaise et la participation directe du Japon au conflit sur le continent ont placé [FNG.GetNameDef] dans une situation délicate. La majeure partie de la Chine s'est unie contre la menace japonaise et, bien que nous n'ayons pas soutenu la guerre menée par le Japon, nous avons rapidement été qualifiés de Hanjian et de collaborateurs. Bon nombre de nos propres officiers et fonctionnaires ont commencé à vaciller à mesure que se répandaient les nouvelles des atrocités commises par les Japonais et que grandissaient les craintes quant à leurs ambitions.\n\nAu sein des rangs de nos anciens "alliés", l'agitation s'est intensifiée. L'Armée du Kwantung aspire à la gloire sur le champ de bataille et l'Armée de Tianjin exige une coordination accrue avec Tokyo. Ils ont fait pression sur [FNG.GetLeader] pour qu'il rejoigne officiellement la Sphère de Coprospérité. Ce serait le choix le plus sensé, mais si nous perdons (et peut-être même si nous gagnons), nous risquons d'être maudits à jamais comme des traîtres."
 fengtian_japan_mechanic_events.030.a:9 "Au moins, nous pourrons nous assurer que la Chine ait son mot à dire dans la Sphère."
 fengtian_japan_mechanic_events.030.b:9 "S'il vous plaît, il nous faut juste un peu de temps pour régler nos affaires..."

 fengtian_japan_mechanic_events.031.t:9 "Le Japon Pénètre sur le Continent"
 fengtian_japan_mechanic_events.031.d:9 "Le déclenchement de la Seconde Guerre sino-japonaise et la participation directe du Japon au conflit sur le continent ont placé [FNG.GetNameDef] dans une situation délicate. La majeure partie de la Chine s'est unie contre la menace japonaise et, bien que nous n'ayons pas soutenu la guerre menée par le Japon, nous avons rapidement été qualifiés de Hanjian et de collaborateurs. Bon nombre de nos propres officiers et fonctionnaires ont commencé à vaciller à mesure que se répandaient les nouvelles des atrocités commises par les Japonais et que grandissaient les craintes quant à leurs ambitions.\n\nLa décision du Japon a pris [FNG.GetLeader] au dépourvu. L'Armée de la Clique du Fengtian n'a pas encore achevé ses préparatifs de guerre, mais l'intervention japonaise l'a contrainte à agir. Elle n'a d'autre choix que de rejoindre la Sphère de Coprospérité, faisant fi des accusations de trahison, et d'espérer devancer l'Armée impériale japonaise pour s'emparer des grandes villes."
 fengtian_japan_mechanic_events.031.a:9 "Il semble que nous n'ayons plus de temps."

 fengtian_japan_mechanic_events.032.t:9 "[FNG.GetNameDefCap] Rejoint la Sphère"
 fengtian_japan_mechanic_events.032.d:9 "Le déclenchement de la Seconde Guerre sino-japonaise et la participation directe du Japon au conflit sur le continent ont placé [FNG.GetNameDef] dans une situation délicate. La majeure partie de la Chine s'est unie contre la menace japonaise et, bien qu'ils n'aient pas soutenu la guerre menée par le Japon, ils ont rapidement été qualifiés de Hanjian et de collaborateurs. Bon nombre de leurs officiers et fonctionnaires ont commencé à vaciller à mesure que se répandaient les nouvelles des atrocités commises par les Japonais et que grandissaient les craintes quant à leurs ambitions.\n\nLe déclenchement de la Seconde Guerre sino-japonaise a pris [FNG.GetLeader] au dépourvu, ce qui a été source de tensions considérables. Mais sous la pression de l'Armée du Kwangtung et de l'Armée de Tianjin, et animés par le désir de s'assurer au moins une part de notre victoire finale, ils ont décidé, par pragmatisme, de signer des protocoles les intégrant officiellement à la Sphère de Coprospérité."
 fengtian_japan_mechanic_events.032.a:9 "Ensemble, nous triompherons de ces laquais des Occidentaux !"

 fengtian_japan_mechanic_events.033.t:9 "[FNG.GetNameDefCap] Gagne du Temps"
 fengtian_japan_mechanic_events.033.d:9 "Le début de la Seconde Guerre sino-japonaise et la participation directe du Japon au conflit sur le continent ont placé [FNG.GetNameDef] dans une situation délicate. La majeure partie de la Chine s'est unie contre la menace japonaise et, bien qu'ils n'aient pas soutenu la guerre menée par le Japon, ils ont rapidement été qualifiés de Hanjian et de collaborateurs. Bon nombre de leurs officiers et fonctionnaires ont commencé à vaciller à mesure que se répandaient les nouvelles des atrocités commises par les Japonais et que grandissaient les craintes quant à leurs ambitions.\n\nLe déclenchement de la Seconde Guerre sino-japonaise a pris [FNG.GetLeader] au dépourvu, ce qui a été source de tensions considérables. Malgré la pression de l'Armée du Kwangtung et de l'Armée de Tianjin, le gouvernement du Fengtian a été hésitant à se coordonner plus fortement avec nos forces et à rejoindre officiellement la Sphère de Coprospérité.\n\nNos agents sur le terrain nous ont cependant assuré qu'ils gardent un œil sur la situation. Si le besoin et l'opportunité se présentent, ils pourraient prendre des mesures d'urgence pour assurer la coopération de [FNG.Capital.GetCapitalVictoryPointName] dans ce grand conflit."
 fengtian_japan_mechanic_events.033.a:9 "Voyons ce qui va se passer..."

#FNG-JAP Mech Events Pt 2 (100-199) - Decision Events for Japan
 fengtian_japan_mechanic_events.100.t:9 "Zhang Demande plus de Temps"
 fengtian_japan_mechanic_events.100.d:9 "Même si Zhang Zuolin est le plus grand allié du Japon en Chine, il est loin d'être un partenaire idéal pour Tokyo. Tandis que Zhang accueille nos dignitaires et entrepreneurs avec des sourires et des poignées de main, il tente de garder ses distances dès que possible. La stratégie sournoise de Zhang consistant à apaiser Tokyo en position de faiblesse mais à défier le Japon une fois en position de force a poussé le gouvernement japonais à bout.\n\nDans toute notre coopération avec le maréchal Zhang subsistait l'espoir qu'un jour, il apprécierait la sagesse et l'expérience de Tokyo, mais il semble qu'il ne suivra jamais notre exemple vertueux. Une fois encore, il semblerait que le seigneur de la guerre ait gaspillé l'aide de Tokyo, et il est encore à nos portes pour quémander des miettes.\n\nPeut-être qu'il a réalisé à quel point notre désir de l'aider s'est épuisé, et qu'il tente de sauver notre relation conflictuelle. Quoi qu'il en soit, Tokyo a accepté de lui accorder un peu plus d'aide et un peu plus de patience, mais si Zhang échoue à obtenir des gains suffisants, ce sera la dernière fois qu'il se joue de nous."
 fengtian_japan_mechanic_events.100.a:9 "Nous sommes fatigués d'être déçus de votre manque de progrès..."

 fengtian_japan_mechanic_events.101.t:9 "Zhang Cracks Down on Sedition"
 fengtian_japan_mechanic_events.101.d:9 "Zhang Zuolin, though rising from humble circumstances to become master of the Northeast with whatever means available to him, has never been one to tolerate blatant corruption. No, the Grand Marshal has worked tirelessly to promote his regime with an image of inscrutability and moral principle.\n\nMost recently, Marshal Zhang has enacted an anti-corruption purge within his administration, prompting a slew of arrests and executions for those accused of corruption, sedition, and treason. While some have noted Zhang's earnestness in promoting a relatively fair administration, many observers note that most of those purged were tied in some way to Japanese interests operating in Dongbei.\n\nAlthough Marshal Zhang has not publicly revealed the source of bribes, most understand the message he is sending to Tokyo. Japan for their part have not publicly commented on the Old Marshal's recent anti-corruption purges, but the government is undoubtedly displeased with their wayward ally in the Middle Kingdom. However, Tokyo is not in a position to or has deemed it not in their interest to punish Zhang's regime at the moment, leaving the incident largely a victory for Zhang and his Anguojun regime."
 fengtian_japan_mechanic_events.101.a:9 "That ungrateful fool..."

 fengtian_japan_mechanic_events.102.t:9 "Zhang Curtails the Shikan Clique"
 fengtian_japan_mechanic_events.102.d:9 "In the late Qing Dynasty, many sought out a foreign education to learn how they could best heal the ailing Chinese state. Many aspiring soldiers gravitated towards the rising Japanese Empire, which had undertaken a rapid modernisation programme spearheaded by Emperor Meiji. The Japanese for their part encouraged Chinese students to seek an education on their shores, establishing the Tokyo Shinbu Gakko Military Preparatory School, specifically catered towards giving Chinese students military training and education.\n\nWhen the Qing Dynasty was brought down by the Xinhai Revolution and warlords rose up in its place, many of China's prominent generals and leaders were Tokyo Shinbu Gakko alumni. They brought with them a wealth of knowledge on modern warfare, which made them invaluable assets to various powerful warlords. Marshal Zhang recognised the capability of Yang Yuting, who was one such NCO with Japanese education. Yang shared Zhang's ambitions of leading unification efforts, and became a crucial officer within the Fengtian Clique. Yang and other Japanese-educated NCOs formed what became known as the Shikan Clique, and have generally called for ties between Tokyo and Shenyang to be strengthened.\n\nYang's Shikan Clique in recent years has profited greatly from the increase in Japanese influence in Dongbei following Marshal Zhang's retreat from Beijing, and has courted regionalists and disgruntled officers into its camp. The increase in Shikan power has not gone unnoticed under the Old Marshal's watch, as he watches with concern at both the rise of Shikan and Tokyo's influence. Marshal Zhang has increasingly worked to curtail the Shikan Clique's activities, elevating loyalists to higher military positions."
 fengtian_japan_mechanic_events.102.a:9 "Does Zhang really believe he can unite China without the Shikan Clique?"

 fengtian_japan_mechanic_events.103.t:9 "Concessions to the Concordia Association"
 fengtian_japan_mechanic_events.103.d:9 "In the aftermath of the Anguojun's crippling defeat by Wu Peifu and the Zhili Clique, the Fengtian Clique was once again pushed north of the Great Wall. In this time of vulnerability and weakness, the Russians attempted to pounce on Marshal Zhang's domain, forcing him to rely further on Tokyo's support.\n\nFengtian and Japan stood together against the Russian bear and humiliated the fools like in the days of 1905. In order to consolidate the Sino-Japanese friendship between Marshal Zhang's government and our own, the Concordia Association was formed in Fengtian to promote the ideals of the Pan-Asianist dream. The Association has found a boon of support within Manchuria's ethnic minorities, and has also become the home of certain Japanese radicals who have been expelled from the Home Islands in de facto exile.\n\nRegardless, the Concordia Association remains one of the primary allies of the Shikan Clique and the Kwantung Army, assisting Yang Yuting and his allies whenever possible. While Zhang Zuolin has never truly appreciated the Association, he has been known to shore up temporary support for them in times of strife, such as now."
 fengtian_japan_mechanic_events.103.a:9 "Marshal Zhang has recognised the wisdom in accepting our aid..."

 fengtian_japan_mechanic_events.104.t:9 "Zhang Empowers Our Advisors"
 fengtian_japan_mechanic_events.104.d:9 "Ever since the Russo-Japanese War which saw our ascendant empire defeat the clumsy Russian Bear, the Kwantung leased territory, which was ours by right ever since the Sino-Japanese War, was returned to us. A year after, the Kwantung Garrison was established, which saw the beginnings of the Kwantung Army. The actual army was established in 1919, when Japan replaced the old governance structure of the port.\n\nSince its creation, the Kwantung Army has maintained influence in the neighbouring Fengtian Clique, and has sought to act as a guiding hand for Japan's influence in Manchuria, and ensure Marshal Zhang's compliance to Tokyo's will. With the Japanese military radicalising substantially in the late 20s, the Kwantung Army for such beliefs, becoming involved in many various coups throughout the interwar period.\n\nThe Kwantung Army stands in staunch rivalry with the Tianjin Army, who look towards the rest of China and hope to assist Zhang Zuolin in destroying the German lapdogs in the Zhili Clique, restore the Anguojun's presence south of the wall, and ensure that Zhang will maintain his ties to Tokyo thereafter, or suffer the consequences. For whatever reasons, Zhang Zuolin has usually attempted to remain aloof from the Kwantung Army's influence, but he has recently brought in some Kwantung Army advisors to assist him in modernising his military force."
 fengtian_japan_mechanic_events.104.a:9 "We'll show them how modern wars are fought."

#FNG-JAP Mech Events Pt 3 (200-299) - Decision Events for Fengtian
 fengtian_japan_mechanic_events.200.t:9 "Japan Searches for Collaborators"
 fengtian_japan_mechanic_events.200.d:9 "Although Zhang Zuolin is regarded by many in China as the arch-collaborator with Japanese interests thanks to years of Zhili propaganda, the people of the Three Northeastern Provinces understand the true situation. Marshal Zhang was forced to inherit the Japanese as his “allies” upon his takeover of Dongbei, and attempted to contain their influence whilst also not provoking them into taking action.\n\nIt seems that this delicate balancing act is perhaps not long for this world, as it seems that the Empire of Japan is not only unsure of the Old Marshal's ability to win the war, and are even looking for potential replacements. If true, Tokyo could choose from a large array of willing conspirators. Japan's longtime relationship with the Fengtian Clique has produced pro-Japanese elements in all major factions within the government.\n\nThe Concordia Association is already openly pro-Japanese, the Shikan Clique is generally in favour for close ties, the Communications Clique's leaders in Zhang Zongxiang and Lu Zongyu have also shown an openness to working with Tokyo, and even within the Zhang Clique, the Old Marshal's more flexible sworn brothers like Zhang Jinghui and Zhang Haipeng may even be pliable puppets.\n\nAlthough Marshal Zhang is aware of Tokyo's increasing disillusionment with his leadership, there's not much for him to do. He can only recognise the danger he presently is in. The search for collaborators began under local Japanese elements but is now receiving backing from Tokyo itself now, certainly a bad omen for Zhang's government and the fight for a free China."
 fengtian_japan_mechanic_events.200.a:9 "I never thought it would end like this..."

 fengtian_japan_mechanic_events.201.t:9 "Japan Reins in Extremists"
 fengtian_japan_mechanic_events.201.d:9 "Although Japan and Fengtian have been allies for two decades, Japan's policy towards us has been incredibly unclear. While Tokyo may decide one thing, the Kwantung Army will do what they have deemed Japan's best interest, as will the Tianjin Army.\n\nWhile the Tianjin Army has generally been more cooperative with the Anguojun, the Kwantung Army not only wants to keep our government contained to north of the Great Wall, and have long disliked Marshal Zhang.\n\nThe increasing radicalism in the Kwantung Army has certainly generated great concern among the Grand Marshal and his inner circle, and years of increasing tensions has certainly been unbeneficial for both powers. Recently, Tokyo has sought to give Marshal Zhang's government some relief by reining in extremist officers stationed in the Northeast, targeted primarily towards the Kwantung Army.\n\nWhile many of their officers have been demoted or recalled, Tianjin Army Officers have been elevated in their place. Tokyo's policy towards Marshal Zhang's government has certainly been made clear, and finally they have enforced the compliance of the wayward armies."
 fengtian_japan_mechanic_events.201.a:9 "We might actually survive this age of chaos..."

 fengtian_japan_mechanic_events.202.t:9 "The Japanese Aid Plan"
 fengtian_japan_mechanic_events.202.d:9 "While Fengtian has boasted China's strongest regional economy with most of the nation's heavy industry centred around Fengtian Province and Jilin, the financial situation of the government is no better than the rest of China. Whenever Marshal Zhang has attempted to achieve his ambitions and cross the Great Wall, there have been massive economic consequences back home.\n\nJust a decade ago, the Fengpiao currency collapsed after Zhang's government was unable to secure loans due to the existence of a rival Kuomintang government in Guangzhou, and Zhili resurgence once again relegated Marshal Zhang's government to north of the Great Wall. Recognising the dangers of economic collapse in Fengtian, Tokyo has begun funneling emergency funds to our government through Concordia Association shell organisations.\n\nIn addition to loans, Japan has sent engineers, encouraged its businesses to make contracts with the Fengtian Government, and offered a trade deal for steel. Tokyo's generosity will certainly stabilise the homefront and thus aid the front lines, but every aid package strengthens our economic reliance on Tokyo."
 fengtian_japan_mechanic_events.202.a:9 "A Faustian Bargain, but one we cannot afford to refuse."

 fengtian_japan_mechanic_events.203.t:9 "Japanese Sends Arms Shipments"
 fengtian_japan_mechanic_events.203.d:9 "Ever since Marshal Zhang and Tokyo came to a mutually beneficial arrangement, the Fengtian Army has boasted one of the best equipped armies in the Chinese military. During the first Zhifeng War, Wu Peifu's soldiers were dressed in tattered uniforms while the Fengtian Army was fully equipped. To our shame, Wu and his men of rags were able to defeat us.\n\nSince the early 20s, it seems that the various rival warlords have also found friends in high places. Chen Jiongming found friends in the British and Americans, Wu in the Germans, the Kuomintang in France and Russia, and Feng Yuxiang also in Russia. The Fengtian Army has experienced the effects of the modernisation of the armies of the Central Plains firsthand, with equipment attrition skyrocketing.\n\nIn order to resupply our troops in this war for Chinese unification, Japan has sent a massive arms shipment to our government. Of course, Japan has seen to it that sympathetic officers to Tokyo have seen their men resupplied first, and while Anguojun High Command will have a say in weapons distribution, it has not stopped pro-Japanese united being favoured."
 fengtian_japan_mechanic_events.203.a:9 "We only hope that the cost is not too high..."

 fengtian_japan_mechanic_events.204.t:9 "Japanese Reinforcements Arrive"
 fengtian_japan_mechanic_events.204.d:9 "The increasing chaos in China in recent years has intensified Tokyo's interest in the affairs of our nation, for better or for worse. While Marshal Zhang was able to contain Japanese influence in Dongbei for the first decade of his rule, the collapse of the Fengtian dollar coupled with the loss of Beijing forced previously unseen levels of Japanese influence in the Three Provinces of the Northeast.\n\nWith Marshal Zhang's government once again waging for control of Beijing and China, Tokyo has increased its talons in the Anguojun Government once again. Just yesterday, the government in Tokyo has ordered additional divisions deployed to China in order to shore up its already-stationed Kwantung and Tianjin Armies. Though this move strengthens both of their forces, it in a way weakens both of them, as Tokyo's direct footprint has been increased, now that the Japanese Government is directly involved in this war."
 fengtian_japan_mechanic_events.204.a:9 "It's all getting away from us..."

###FNG Endgame Events
 fengtian_endgame_events.000.t:9 "Unification by Dongbei"
 fengtian_endgame_events.000.d:9 "Perhaps the greatest ambition of the Old Marshal and his compatriots since the 1920s, the cementing of their control within China has long been a desired dream for many within the Fengtian Clique. With multiple gambits such as the First and Second ZhiFeng Wars, with the latter seeing a term of Fengtian as the beholder of the Beijing Government, their rule was ultimately not to last. Following the Third and Fourth ZhiFeng Wars, Fengtian was ejected to the Three Northeastern Provinces, alongside Rehe.\n\nContinuing to parade themselves as the legitimate successors to the Beiyang Government, the Old Marshal and his subordinates could hardly pose much of a threat in the face of the Zhili's unification of the nation, even when such a foundation was gravely shaken in 1932 and 1933; Zhang Zuolin merely withdrawing from attempted peace negotiations beforehand due to Zhili success in national elections. Yet such a situation was not to last! Rebuilding their strength, in no small part due to Japanese assistance, the army of the Anguojun managed to successfully rout defenders south of the Great Wall, and secure Beijing.\n\nAt the present, there is much jubilation and many celebrations to be held. Both in earnest, and perhaps to mask government difficulties following intense warfare all-throughout the nation-state. Nonetheless, for the third time in the nation's history, Beijing has become the seat of a Dongbei-led government. And for many citizens in China, they look towards the Northeasterners for direction, and for support."
 fengtian_endgame_events.000.a:9 "And so our mission is fulfilled."

 fengtian_endgame_events.001.t:9 "Fengtian Factionalism Rises"
 fengtian_endgame_events.001.d:9 "Often thought to be a united force under the strength of a single figure, the Fengtian Clique itself is split into various disparate factions, akin to most major warlord cliques in China. Yet unlike most, it is relatively responsible in its proclamations of internal unity; few would dare defy Marshal Zhang. Even in such an environment however, intense rivalries and inter-personal differences can emerge, most violently and evidently in events such as Guo Songling's rebellion of the 1920s. In-effect, Guo's legacy lives on, shattered and reconstituted both politically and military into two major factions: Shaoshuai, and Shikan.\n\nLed informally by the Young Marshal Zhang Xueliang, the Shaoshuai Clique corresponds to his immediate courtiers, and their ambitions to prop up Guo's reform-minded protégé. As the Old Marshal's de-facto successor, Xueliang has appreciated immense benefits within the Fengtian government, albeit his military and political careers leave much to be desired, so much so as to not mention his social activities.\n\nOn the opposing end lies the Shikan Clique. A group of modernisers, militarists, patriots, and the meritocratic underdogs of Fengtian's factionalism, they are led by the oft misused Yang Yuting, and his close friend Chang Yinhuai. Graduates from the Japanese Army Academy and otherwise, the clique serves as the main vector for internal opposition within the military; fiercely opposed to the seeming nepotism and incompetency of the Shaoshuai, Zhang, Heilongjiang, and other Cliques.\n\nWith the arrival of new glories arrives similarly new difficulties, and the ever simmering lid of Fengtian tensions seems to have finally burst, as whole divisions refuse to heed Central Government orders, and Shikan Clique aficionados meet increasingly with Japanese contacts..."
 fengtian_endgame_events.001.a:9 "The legacy of Guo Songling..."

 fengtian_endgame_events.002.t:9 "Failure of Government Economics"
 fengtian_endgame_events.002.d:9 "Suffice to say, the Chinese economic situation has never been particularly stable ever since the onset of the Warlord Era, perhaps even ever since the decline of the Qing. Industrialisation has usually been at the behest, or at the enquiring, of foreign powers and foreign investments. As such, China's fledgling Feudal land-situation combined with foreign-dominated industrialisation efforts in the urban cities has resulted in quite a tenuous situation throughout the nation.\n\nFurthermore, with the outbreak of hostilities following a brief tenure of relative peace during the Zhilo Unification, investors have fled, industrialists have cordoned their factories and arsenals, and immense damage has been wrought in both the roaring countryside and urban sprawl. In the Northeast, relatively despoiled of damage and conflict, Japanese investments and the clever management of Communications Clique, Zhang Clique, and Recovery League officials have resulted in a flourishing industrial belt stretching through Jilin and other provinces.\n\nDescending from their Northeastern sanctuary however, the Fengtian government has run into all too friendly situation for Chinese Central Governments; an inefficient tax system, local banditry, incompetence and lack of trained officials, and many more issues have resulted in piling debt, and lowering economic productivity. Whilst foreign loans present themselves as a useful bandage to prevent hemorrhaging of national finances, they are but a pittance in light of the true issues. It will undoubtedly take concerted effort to remedy the situation at present."
 fengtian_endgame_events.002.a:9 "Best begin searching for loans..."

 fengtian_endgame_events.003.t:9 "Fears of Fengtian Domination"
 fengtian_endgame_events.003.d:9 "Politically, Dongbei almost always seemed as a microcosm of broader Chinese currents. Relatively isolated, the Northeastern Cliques had themselves far more concerned with the Japanese to the South, Russians to the North, and the affairs of the Mongol regions to the West. Suffice to say, the provincial governments of the Northeast functioned far more off of personalities and the Fengtian Clique than most other comparable administrations in the era. With relatively little infiltration by organisations south of the Great Wall, namely the Chinese Constitutionalists, Kuomintang, and the Young China Party, various minor Fengtian organisations have managed to rise to prominence: the revived Restoration Society, for example.\n\nYet following the Third and Fourth ZhiFeng Wars, the Northeastern has become a haven for those who have burnt political bridges in the Central Plains and further. Hosting exiled Anhui aficionadoes such as Wang Yitang, Zhang Zuolin's own personal political jockeys such as Pan Fu, or even the Japanophile Communications Clique (far removed from they heyday), the character of the Marshal's rival government has truly been multifaceted, and in-effect tearing at the seams.\n\nAscending from the Great Wall southwards, the character that long loomed Marshal Zhang's government attempts of the 1920s remains large even now. Few would desire to work with Northeasterners, viewed as nothing more but militarists, and perhaps bandits. Uniquely disposed of in-regards to available political muscle, the new Fengtian Government has seemingly brought forth fears of possible domination by men of lesser standing, and even lesser know-how."
 fengtian_endgame_events.003.a:9 "Really? As bandits? Still?"

 fengtian_endgame_events.004.t:9 "A Nation Under the Northeast"
 fengtian_endgame_events.004.d.base:9 "Bringing unification to China has been no easy task, and yet it would appear that the consistent, ever-present rival of the Zhili Government has finally emerged on top. Residing within their Northeast sanctuary, and backed by the Japanese, the Fengtian government has finally, for the third time, retaken Beijing. Running through the consequences of national unification, their government has been beset with critical economic shortcomings, and a wasteland of political support; few have forgotten the reputation of Fengtian's aficionados.\n\nFurthermore, it would appear that despite Zhang Zuolin's best efforts, the fracturing Anguojun alliance has begun to tear itself apart. With the ambitions of Tokyo intermixed, a rapidly unfolding tornado of political rivalry and infighting has emerged under the Five Banner flag. The Shikan Clique, the Communications Clique, Recovery League, various democrats and other smaller cliques have all begun to feud over patronage positions and the direction of the government."
 fengtian_endgame_events.004.d.generic:9 "$fengtian_endgame_events.004.d.base$\n\nSecuring national unification through the might of the Anguojun, it would appear that the disparate Warlord alliance stewarded by Fengtian's eclectic and corrupt government has begun to mandate proper consolidation under National forces. Whilst perhaps an ideal preferred by a nation so damaged by war and bloodshed for decades, is it tolerable for [ROOT.GetLeader] to submit their government to an intolerable northerner? To permanently sunder any ambitions of their own stake to the presidency?"
 fengtian_endgame_events.004.d.shx:9 "$fengtian_endgame_events.004.d.base$\n\nHaving collaborated with the Old Marshal intermittently all throughout the Warlord Era, few would besmirch the Model Governor for throwing his lot once again with the Dongbei divisionaries. And yet, many within Yan's camp insist upon his inherent kingmaker role within national politics. With the capacity to descend from Shanxi onto the Central Plain in a lightning strike, the notion of Yan's own Presidential ambitions present themselves as an all-too enticing offer, but is the Model Governor willing to roll the dice? Whatever the case, the time to decide is now, as the Anguojun recoils from its unification and own internal rivalries."
 fengtian_endgame_events.004.d.shd:9 "$fengtian_endgame_events.004.d.base$\n\nDedicated and loyal to the utmost, Governor Zhang Zongchang has dedicated his life to serving the Old Marshal and his various governments. Being a prized lieutenant of the Anguojun itself, Zhang's securing of Shandong played a primary role in the unification of the nation, and yet, shadows loom large amongst the Old Marshal's position. As evident to anyone, knives have been unsheathed, and Governor Zhang owes his loyalty to Marshal Zhang, not to his upstart child or any other member of the Fengtian Clique."
 fengtian_endgame_events.004.a:9 "We can't let their corruption rule us! To arms!"
 fengtian_endgame_events.004.b:9 "We welcome Marshal [FNG.GetLeader]!"
 fengtian_endgame_events.004.c:9 "Envoyons une délégation à la capitale. (Devient [FNG.GetNameDef])"

 fengtian_endgame_events.005.t:9 "La Rébellion [FROM.GetAdjective]"
 fengtian_endgame_events.005.d.base:9 "Suite à l'unification de la Chine par l'Anguojun, les différentes factions et les détenteurs du pouvoir au sein de la République chinoise restaurée ont commencé à se disputer le pouvoir et le soutien à travers tout le pays. Derrière le sentiment régionaliste se cache la crainte d'une centralisation croissante du gouvernement, de la corruption au sein des rangs gouvernementaux (que les habitants du Nord-Est ne connaissent que trop bien) et de la domination des factions politiques du Dongbei. Les partisans de [FROM.GetLeader] étant prêts à soutenir leurs revendications par les armes, une guerre civile est probable.\n\nLe Gouvernement central devrait bien sûr disposer d'un avantage majeur, puisqu'il contrôle les grandes villes chinoises et jouit d'une légitimité internationale (du moins pour l'instant), ce qui lui a permis d'accéder plus facilement à des prêts et de disposer d'une assiette fiscale et d'une main-d'œuvre plus importantes pour lever une armée. L'Anguojun centralisée compte toutefois encore de nombreux régionalistes déloyaux dans ses rangs. De plus, les régionalistes [FROM.GetAdjective] ont confiance dans les capacités de leurs forces et s'attendent à ce que d'autres se soulèvent contre la dictature tyrannique du Gouvernement central. Et la Chine n'est pas étrangère aux bouleversements. Ce sur quoi les deux camps s'accordent toutefois, c'est qu'ils ne toléreront pas un nouveau retour à l'ère des seigneurs de la guerre."
 fengtian_endgame_events.005.d.generic:9 "$fengtian_endgame_events.005.d.base$\n\n[FROM.GetLeader] et [FROM.GetRulingParty] ont récemment établi des liens assez lâches avec l'Anguojun, tout en conservant des origines indépendantes mais apparemment compatibles. Leurs ambitions nationales ont coïncidé avec la victoire du Fengtian dans le Nord, et ils ont surfé sur cette vague jusqu'à l'unification. Aujourd'hui, cependant, alors que le Gouvernement central tente d'affirmer son autorité sur ses anciens alliés, il semble que [FROM.GetNameDef] refuse tout simplement d'accepter la domination du Dongbei."
 fengtian_endgame_events.005.d.shx:9 "$fengtian_endgame_events.005.d.base$\n\nAyant collaboré par intermittence avec le Vieux Maréchal tout au long de l'ère des seigneurs de la guerre, rares étaient ceux qui auraient critiqué le Gouverneur modèle pour avoir une nouvelle fois lié son destin à celui des chefs de guerre du Dongbei. Et pourtant, nombreux sont ceux qui, dans le camp de Yan, insistaient sur son rôle inhérent de faiseur de rois dans la politique nationale. Avec la capacité de descendre du Shanxi vers la Plaine centrale en un clin d'œil, l'idée des ambitions présidentielles de Yan est devenue insupportable, et c'est ainsi que le Gouverneur modèle a émergé après des décennies d'isolement."
 fengtian_endgame_events.005.d.shd:9 "$fengtian_endgame_events.005.d.base$\n\nFidèle jusqu'au bout au Vieux Maréchal et au Fengtian, la révolte de [SHD.GetLeader] s'est avérée être un camouflet des plus cuisants pour le gouvernement du Dongbei. Un homme autrefois si loyal, véritable prolongement de la clique du Fengtian elle-même, a tout mis de côté pour assouvir ses propres ambitions. Si même Viande-de-Chien s'est révolté, à qui peut-on encore faire confiance ?"
 fengtian_endgame_events.005.a:9 "N'y a-t-il personne en qui je puisse avoir confiance ?"
 fengtian_endgame_events.005.b:9 "Des personnalités rivales ne peuvent que s'affronter."

 fengtian_endgame_events.006.t:9 "La Fin de la Présidence Provisoire"

