 SZC_federal_governmental_legitimacy_democratic_reconstruction:9 "Dernier Combat du Fédéralisme Chinois : §SReconstruction Démocratique§!"
 SZC_federal_governmental_legitimacy_democratic_reconstruction_desc:9 "Le Fédéralisme chinois moderne a connu son apogée et son déclin au cours de la première moitié des années 1920. Une coalition de constitutionnalistes, de démocrates et de régionalistes s'est formée au plus fort de l'ère des seigneurs de la guerre, alors que l'impasse entre le Nord et le Sud persistait. Leurs appels aux différentes provinces pour qu'elles s'efforcent de mettre en place une autonomie locale, puis de s'unir pacifiquement au sein d'une république fédérale, ont suscité un certain intérêt, mais après des débuts prometteurs, ils ont été rejetés par les gouvernements du Nord et du Sud. La réussite de l'unification par la force menée par le Zhili a discrédité le mouvement, et beaucoup en sont venus à le considérer comme une simple façade pour le seigneurisme.\n\nLa Chine est une nation d'ouvriers, de paysans et d'intellectuels ; instaurer une démocratie civile sur le lieu de travail pour les masses n'est pas une tâche facile. Chaque individu a ses propres besoins spécifiques, et la nation doit être en mesure d'exercer ses Quatre Droits civiques. En respectant les principes d'autonomie, de développement de la production et d'amélioration des conditions de vie des paysans et des ouvriers, de promotion de la culture nationale chinoise et de développement de son esprit scientifique, on espère que la nation progressera vers l'idéal démocratique."

 SZC_federal_governmental_legitimacy_democracys_five_spirits:9 "Dernier Combat du Fédéralisme Chinois : §gLes Cinq Principes de la Démocratie§!"
 SZC_federal_governmental_legitimacy_democracys_five_spirits_desc:9 "Le Fédéralisme chinois moderne a connu son apogée et son déclin au cours de la première moitié des années 1920. Une coalition de constitutionnalistes, de démocrates et de régionalistes s'est formée au plus fort de l'ère des seigneurs de la guerre, alors que l'impasse entre le Nord et le Sud persistait. Leurs appels aux différentes provinces pour qu'elles s'efforcent de mettre en place une autonomie locale, puis de s'unir pacifiquement au sein d'une république fédérale, ont suscité un certain intérêt, mais après des débuts prometteurs, ils ont été rejetés par les gouvernements du Nord et du Sud. La réussite de l'unification par la force menée par le Zhili a discrédité le mouvement, et beaucoup en sont venus à le considérer comme une simple façade pour le seigneurisme.\n\nTout comme la modernité conserve ses cinq principes fondamentaux que sont la Science, l'Endurance, l'Aspiration, la Loyauté, le Devoir public et la Recherche, la démocratie possède elle aussi ses cinq principes fondamentaux. Ceux-ci sont le Partage du pouvoir gouvernemental, la Garantie des libertés, la Protection des droits, la Santé industrielle et la Culture. La Chine aspire clairement à atteindre à la fois la Démocratie et la Modernité, mais on ne peut avoir la première sans la seconde, et la Chine manque cruellement de modernité. Jusqu'à ce qu'elle atteigne le niveau d'un État-nation industrialisé moderne, la démocratie du pays doit être prise en charge et planifiée sous les auspices du Gouvernement et du Progrès civils."

 SZC_federal_governmental_legitimacy_institutional_antipartisanship:9 "Dernier Combat du Fédéralisme Chinois : §lInstitutions Anti-Partisanes§!"
 SZC_federal_governmental_legitimacy_institutional_antipartisanship_desc:9 "Le Fédéralisme chinois moderne a connu son apogée et son déclin au cours de la première moitié des années 1920. Une coalition de constitutionnalistes, de démocrates et de régionalistes s'est formée au plus fort de l'ère des seigneurs de la guerre, alors que l'impasse entre le Nord et le Sud persistait. Leurs appels aux différentes provinces pour qu'elles s'efforcent de mettre en place une autonomie locale, puis de s'unir pacifiquement au sein d'une république fédérale, ont suscité un certain intérêt, mais après des débuts prometteurs, ils ont été rejetés par les gouvernements du Nord et du Sud. La réussite de l'unification par la force menée par le Zhili a discrédité le mouvement, et beaucoup en sont venus à le considérer comme une simple façade pour le seigneurisme.\n\nIl est absolument nécessaire que la nation dépasse son passé fracturé de l'ère des seigneurs de la guerre et prenne un nouveau départ. Le monde a progressé tandis que la Chine se déchirait, et il reste beaucoup à faire pour que l'Empire du Milieu rattrape le rythme de ses homologues. Aujourd'hui, la nation doit se concentrer sur elle-même et sur son propre développement. Grâce au rapprochement et au dialogue, les institutions nationales doivent dépasser les querelles politiques mesquines ; telle est l'affirmation de la nouvelle Chine, une nation pour toutes les couches de la société."

 SZC_martialing_of_the_vindicated:9 "Martialisation des Justifiés"
 SZC_martialing_of_the_vindicated_desc:9 "La Chine contemple l'abîme, et celui-ci la contemple en retour. Le Fédéralisme chinois, qui a depuis longtemps perdu son apogée des années 1920, s'est retrouvé sans racines, légué à son fils le plus improbable : Xiong Kewu. Sortant de sa masure de Tongren dans le Guizhou, l'ambitieux général s'est donné pour mission d'assurer un dernier triomphe là où ses camarades ont échoué, ou autrement. Rejoint en grande partie par des alliés de circonstance au sein des départements de Baoding et des officiers, et finalement dirigé par les démocrates de la Troisième Force, le bras armé du Fédéralisme chinois s'est largement constitué à partir des soldats disciplinés et robustes de l'intérieur du pays."

 SZC_industrial_autonomy:9 "Autonomie Industrielle"
 SZC_industrial_autonomy_desc:9 "Si la Chine veut réussir par ses propres moyens, elle ne peut pas laisser ses industries locales se retrouver regroupées au sein de conglomérats nationaux et de monopoles. Les provinces sont sacrées, et leurs industries doivent donc bénéficier d'une autonomie vis-à-vis du gouvernement national afin de pouvoir mener leurs activités et se développer selon leurs propres conditions, tout en respectant les dispositions nécessaires relatives aux travailleurs."

 SZC_start_of_the_golden_decade:9 "Début des Décennies Dorées"
 SZC_start_of_the_golden_decade_desc:9 "Le pays est en plein essor ! Grâce à la stabilité retrouvée depuis l'effondrement du Zhili, les investisseurs reviennent en masse, espérant tirer profit du marché chinois en plein développement. Avec ses riches ressources naturelles, sa population massive et sa gestion intelligente, la Chine est assurée de devenir la prochaine grande puissance mondiale, à condition que la croissance se poursuive."

 SZC_obscurations_on_military_loyalties_1:9 "Obscurcissement des Loyautés Militaires"
 SZC_obscurations_on_military_loyalties_1_desc:9 "Ce qui aurait dû être prévu a finalement frappé le Gouvernement de Reconstruction nationale comme sa pire trahison à ce jour. Tenu par ses promesses de Démobilisation nationale, mais tentant de faire passer en force un tel ordre sous une stratocratie de facto soutenue par des seigneurs de la guerre, le Gouvernement s'est retrouvé à douter profondément de la loyauté même de ses propres forces. Plus attachée à ses commandants locaux qu'au président, l'armée nationale est irrémédiablement divisée en factions, et des efforts sérieux devront être déployés pour remédier à cette situation absurde."

 SZC_nonsensical_economic_situation_1:9 "Situation Économique Absurde"
 SZC_nonsensical_economic_situation_1_desc:9 "Difficilement imputable au Gouvernement, la situation économique de la Chine est, faute d'une meilleure expression, catastrophique. Ruée par des années de mauvaise gestion, remontant peut-être même à la dynastie Qing, les décennies suivantes de troubles civils, de guerres et d'exploitation étrangère n'ont certainement pas profité aux masses chinoises. Avec la fuite des investisseurs après la guerre avec le Japon et une nation plus dévastée que jamais, la situation économique de la Chine est dérisoire et, comme toujours, le peuple se tourne vers le Gouvernement central pour obtenir de l'aide."

 SZC_increasing_political_instability_1:9 "Instabilité Politique Croissante"
 SZC_increasing_political_instability_1_desc:9 "Vaut-il mieux tenir ses promesses, au prix de grands sacrifices personnels ? Ou trahir ses compagnons afin de préserver la stabilité ? Pour le Gouvernement de Reconstruction nationale, c'est la première option qui prévaut. Ayant promis des élections nationales après l'unification du pays et l'accomplissement de sa mission, le Gouvernement a commencé à se déchirer, alors qu'il était déjà profondément désorganisé et instable. D'anciens alliés doivent désormais s'affronter, se préparant à un duel politique pour la direction du pays, tandis que des forces se rassemblent dans l'ombre, prêtes à "intervenir" pour protéger la nation de ses propres dirigeants, si nécessaire."

 SZC_no_preparation_too_rigorous_idea:9 "Aucune Préparation n'est trop Rigoureuse !"
 SZC_no_preparation_too_rigorous_idea_desc:9 "Nous avons parcouru un long chemin dans notre quête d'unification, et avec nos regards tournés vers le nord-est et les autres possessions japonaises, la guerre avec l'Empire du Soleil levant semble inévitable. Mais nous serons prêts ! Chaque homme doit être prêt à tout donner pour notre victoire et la Chine ne sera plus opprimée par le Japon comme elle l'est depuis 1895 !"

 SZC_the_chinese_determination_idea:9 "La Détermination Chinoise"
 SZC_the_chinese_determination_idea_desc:9 "Bien sûr, le destin de la nation chinoise et notre avenir ne peuvent être façonnés que par notre seule détermination, notre volonté de travailler, de lutter, de résister et de prospérer. Lorsque notre nation nous appelle, nous répondons présents, non seulement pour elle, mais aussi pour nos frères et sœurs qui se tiennent à nos côtés !"

 SZC_republic_of_china_navy_federalists:9 "La Marine de la République de Chine"
 SZC_republic_of_china_navy_federalists_desc:9 "Les prémices de la marine républicaine chinoise moderne remontent aux débuts de la Révolution Xinhai, lorsque le ministère de la Marine fut créé au sein du Gouvernement provisoire de la République de Chine. L'ancien amiral de la dynastie Qing, Liu Guanxiong, devint le premier ministre de la Marine pendant cette période troublée. Après l’Ère des Seigneurs de la Guerre et la Restauration Xuantong qui suivit, de nombreux éléments de la marine de la République de Chine s'enfuirent vers le sud, vers les bastions du Kuomintang et des Fédéralistes, tandis que beaucoup d'autres choisirent de rester fidèles au gouvernement de Beijing. Le pays chinois étant enfin unifié sous une seule bannière, le moment est venu de revitaliser et de reconstruire la marine de la République de Chine afin qu'elle soit véritablement à la hauteur de la protection des grands intérêts maritimes de la Chine."

 SZC_republic_of_china_air_force_federalists:9 "L'Armée de l'Air de la République de Chine"
 SZC_republic_of_china_air_force_federalists_desc:9 "Si les premières opérations aériennes ont débuté avec l'aérodrome de Nanyuan à Beijing sous la dynastie Qing, l'Armée de l'air de la République de Chine doit ses origines aux différents programmes aériens indépendants proposés et propagés par les seigneurs de la guerre locaux et le Gouvernement central. Forts d'une puissance industrielle et militaire plus grande que jamais, nous avons désormais pour mission de perpétuer l'héritage laissé par nos prédécesseurs et de créer une armée de l'air véritablement puissante et moderne pour le peuple chinois."

 SZC_rectifying_economic_disaster:9 "Rectifier le Désastre Économique"
 SZC_rectifying_economic_disaster_desc:9 "Le Sichuan n'a connu la paix que de manière éphémère et sporadique depuis Xinhai jusqu'à aujourd'hui, mais il est à nouveau entré dans une période de paix, qui, espérons-le, sera suffisamment stable pour ne pas sombrer davantage dans le chaos. Nos priorités peuvent et doivent désormais se tourner vers la situation socio-économique qui se détériore pour les habitants de cette province, en leur offrant la voie vers la prospérité et l'abondance que nous leur promettons depuis si longtemps."

 SZC_abolishing_abominable_tax_practices:9 "Abolition des Impôts Abominables"
 SZC_abolishing_abominable_tax_practices_desc:9 "Une caractéristique marquante de la lutte entre les seigneurs de la guerre du Sichuan était les impôts exorbitants, non seulement sur une multitude de choses, mais également prélevés bien à l'avance afin de satisfaire les demandes monétaires volatiles qui finançaient les armées des seigneurs de la guerre dans le bassin rouge. Mais nous verrons les choses différemment, en réglementant ces impôts et en trouvant d'autres sources de revenus, afin que le peuple puisse être soulagé d'un fardeau aussi énorme."

 SZC_on_the_great_campaign:9 "Sur la Grande Campagne"
 SZC_on_the_great_campaign_desc:9 "En tant que dernier espoir du mouvement fédéraliste, il est tout à fait normal que nous nous concentrions sur la réalisation de notre véritable potentiel et que nous nous préparions à repousser nos frontières contre les forces du despotisme pur et simple qui pourraient bien nous anéantir en premier."

 SZC_flourishing_academic_scene:9 "Scène Académique Florissante"
 SZC_flourishing_academic_scene_desc:9 "Les professionnels universitaires et les étudiants, en particulier dans le Sichuan et les provinces occidentales délabrées, ont longtemps été mis de côté au profit de questions plus urgentes. Mais grâce à nos initiatives récentes visant à soutenir à la fois les étudiants et les enseignants, nos réformes se sont avérées très fructueuses, car les jeunes d'aujourd'hui sont formés pour devenir les experts de demain."

 SZC_fighting_societal_apathy:9 "Combattre l'Apathie Sociale"
 SZC_fighting_societal_apathy_desc:9 "Dans toute la Chine, mais particulièrement dans le Sichuan, la population, toujours préoccupée par des questions plus urgentes liées à la survie, n'a guère eu le temps de s'intéresser aux grands mouvements politiques. Il faut s'attaquer à la racine de cette apathie, car la véritable démocratie ne peut espérer survivre si elle est attaquée dès le départ par le cynisme sans fin de la société."

 SZC_establishing_bicameral_legislation:9 "Établissement d'une Législature Bicamérale"
 SZC_establishing_bicameral_legislation_desc:9 "Maintenant que le gouvernement, l'opposition et divers autres groupes civiques s'organisent, les détails précis du fonctionnement du pouvoir législatif doivent également être réglés. La proposition de Zhang Lan d'un pouvoir législatif bicaméral a fait l'unanimité et sera donc la base sur laquelle toute la politique sera menée, tant que ces institutions démocratiques existeront."

 SZC_cemented_delegation_of_powers:9 "Délégation des Pouvoirs Renforcée"
 SZC_cemented_delegation_of_powers_desc:9 "Parallèlement à la définition de la structure du pouvoir législatif et de la nouvelle administration, nous devons prendre des mesures pour garantir naturellement la mise en place de freins et contrepoids adéquats afin de nous libérer de l'emprise de l'autocratie à l'avenir."

 SZC_seeing_to_domestic_student_demands:9 "Réponse aux Demandes des Étudiants Locaux"
 SZC_seeing_to_domestic_student_demands_desc:9 "En particulier dans les mouvements plus républicains du Kuomintang et des Fédéralistes, les masses étudiantes ont longtemps été à la fois une force de soutien et le principal fer de lance. À ce titre, nous devons essayer de satisfaire certaines de leurs revendications en échange, tout en essayant de parvenir à un compromis dans les domaines les plus radicaux."

 SZC_two_lius_war:0 "La Guerre des deux Liu"
 SZC_aggressive_modernisation:9 "Modernisation Accélérée"
 SZC_industrial_army:9 "Développement Accéléré de l'Armée"

 SZC_legitimacy_of_the_republic: "Légitimité de la République : §oDécourageante§!"
 SZC_legitimacy_of_the_republic_desc: "Quelle ironie. A l'origine promulguée avec l'assentiment de l'Impératrice douairière Longyu, au nom du Garçon-Empereur Puyi, la République de Beiyang a été formée en 1912 après la lutte sanglante et le sacrifice de légions de martyrs pour l'éradication de la monarchie. Bondissant d'espoir et d'optimisme, le peuple allait de l'avant sous les bannières des réformateurs comme des révolutionnaires, expérimentant la grande égalisation et la pluralisation d'une république jeune, nouvelle et malléable. Mais tout cela fut étouffé par les machinations d'un despote. Déchirée par des hommes forts et des seigneurs de la guerre, la République de Beiyang n'était rien d'autre qu'un outil corrompu et incompétent mené par toute clique de seigneur de la guerre qui contrôlait Beijing sur le moment. Les Gouvernements duraient des mois, le système gouvernemental lui-même ayant changé sept fois au cours de son existence, et malgré tout cela il y avait toujours un sentiment d'espoir.\n\nExpulsé de sa place légitime à Beijing, l'establishment de Beiyang et la Clique du Zhili ont été contraints à l'exil chez leurs alliés amicaux du Sichuan. Mais c'est peut-être là une des nombreuses erreurs qu'ont commis les Royalistes. Sous les auspices du Maréchal Wang Chengbin, le Zhili a récupéré, et avec lui l'héritage de la Révolution Xinhai survit encore. Pourtant les gens ordinaires, les masses populaires, et certains de nos alliés éloignés, doutent de la sincérité de nos sentiments. Étant donné que le Zhili a rejeté la République lorsque c'était opportun, beaucoup voient notre projet de construction d'un état-nation comme une arnaque. Cependant ils auraient tort, car le Maréchal n'a qu'une idée en tête : la vengeance."

 SZC_legitimacy_of_the_republic_1: "Légitimité de la République : §rSans Espoir§!"
 SZC_legitimacy_of_the_republic_1_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_2: "Légitimité de la République : §RStagnante§!"
 SZC_legitimacy_of_the_republic_2_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_3: "Légitimité de la République : §CCroissante§!"
 SZC_legitimacy_of_the_republic_3_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_4_civilian: "Légitimité de la République : §lLe Nouveau Beiyang§!"
 SZC_legitimacy_of_the_republic_4_civilian_desc: "Quelle ironie. A l'origine promulguée avec l'assentiment de l'Impératrice douairière Longyu, au nom du Garçon-Empereur Puyi, la République de Beiyang a été formée en 1912 après la lutte sanglante et le sacrifice de légions de martyrs pour l'éradication de la monarchie. Bondissant d'espoir et d'optimisme, le peuple allait de l'avant sous les bannières des réformateurs comme des révolutionnaires, expérimentant la grande égalisation et la pluralisation d'une république jeune, nouvelle et malléable. Mais tout cela fut étouffé par les machinations d'un despote. Déchirée par des hommes forts et des seigneurs de la guerre, la République de Beiyang n'était rien d'autre qu'un outil corrompu et incompétent mené par toute clique de seigneur de la guerre qui contrôlait Beijing sur le moment. Les Gouvernements duraient des mois, le système gouvernemental lui-même ayant changé sept fois au cours de son existence, et malgré tout cela il y avait toujours un sentiment d'espoir.\n\nEn réalité, les politiciens de Beiyang sont les seuls capables d'assurer une bonne gouvernance. Sous leur regard vigilant, l'administration technocratique continue à tourner, maintenant les rouages de la politique et de l'administration. Sous leur lumière, une nouvelle République, réformée, se dessine. Une République qui revendique l'héritage de l'ordre politique de Xinhai, certes, mais qui l'a transformé en une nouvelle machine véritablement diligente. Une république qui n'est pas contrôlée par des militaristes ou des seigneurs de la guerre, mais qui travaille avec eux, main dans la main."

 SZC_legitimacy_of_the_republic_4_military: "Légitimité de la République : §gSous le Maréchal§!"
 SZC_legitimacy_of_the_republic_4_military_desc: "Quelle ironie. A l'origine promulguée avec l'assentiment de l'Impératrice douairière Longyu, au nom du Garçon-Empereur Puyi, la République de Beiyang a été formée en 1912 après la lutte sanglante et le sacrifice de légions de martyrs pour l'éradication de la monarchie. Bondissant d'espoir et d'optimisme, le peuple allait de l'avant sous les bannières des réformateurs comme des révolutionnaires, expérimentant la grande égalisation et la pluralisation d'une république jeune, nouvelle et malléable. Mais tout cela fut étouffé par les machinations d'un despote. Déchirée par des hommes forts et des seigneurs de la guerre, la République de Beiyang n'était rien d'autre qu'un outil corrompu et incompétent mené par toute clique de seigneur de la guerre qui contrôlait Beijing sur le moment. Les Gouvernements duraient des mois, le système gouvernemental lui-même ayant changé sept fois au cours de son existence, et malgré tout cela il y avait toujours un sentiment d'espoir.\n\nÔ grand Maréchal de Tianjin ! Son excellente direction à vu la République de Beiyang se préparer parfaitement aux épreuves qui l'attendent. Sans lui, elle ne serait qu'un cadavre qui boitille en attendant son extinction. Avec nos soldats aguerris, leurs cœurs furieux et les yeux du Maréchal fixés sur Beijing, rien ne s'opposera à la grande reconquête de la position du Zhili au sein de la nation. Le Maréchal de Jade peut bien observer le Zhili avec désarroi, mais le fardeau du commandement repose désormais sur les épaules de Wang."

 SZC_legitimacy_of_the_republic_5_civilian: "Légitimité de la République : §9Sur l'Horizon Radieux§!"
 SZC_legitimacy_of_the_republic_5_civilian_desc: "Quelle ironie. A l'origine promulguée avec l'assentiment de l'Impératrice douairière Longyu, au nom du Garçon-Empereur Puyi, la République de Beiyang a été formée en 1912 après la lutte sanglante et le sacrifice de légions de martyrs pour l'éradication de la monarchie. Bondissant d'espoir et d'optimisme, le peuple allait de l'avant sous les bannières des réformateurs comme des révolutionnaires, expérimentant la grande égalisation et la pluralisation d'une république jeune, nouvelle et malléable. Mais tout cela fut étouffé par les machinations d'un despote. Déchirée par des hommes forts et des seigneurs de la guerre, la République de Beiyang n'était rien d'autre qu'un outil corrompu et incompétent mené par toute clique de seigneur de la guerre qui contrôlait Beijing sur le moment. Les Gouvernements duraient des mois, le système gouvernemental lui-même ayant changé sept fois au cours de son existence, et malgré tout cela il y avait toujours un sentiment d'espoir.\n\nL'intendance de Yan Huiqing, toujours fiable, a vu l'ordre politique de Xinhai s'épanouir et prospérer à la lumière de son formidable revers initial. Ayant accompli son service envers la nation consciencieusement encore et encore, il a réussi avec succès à construire une nation sur les décombres du Coup d'État Mandchou. Les Cinq Ethnies Sous Une Même Union, son héritage de fierté nationale, de patriotisme et d'unification flottera à jamais avec fierté ! Un espoir et un optimisme nouveaux arrive finalement pour le peuple chinois. "Comme le Nuage de Bon Augure est brillant ! Comme son éclat est large ! La lumière est spectaculaire avec le soleil ou la lune. Comme elle ravive aube après aube !""

 SZC_legitimacy_of_the_republic_5_military: "Légitimité de la République : §6Démocratie de Tianjin§!"
 SZC_legitimacy_of_the_republic_5_military_desc: "Quelle ironie. A l'origine promulguée avec l'assentiment de l'Impératrice douairière Longyu, au nom du Garçon-Empereur Puyi, la République de Beiyang a été formée en 1912 après la lutte sanglante et le sacrifice de légions de martyrs pour l'éradication de la monarchie. Bondissant d'espoir et d'optimisme, le peuple allait de l'avant sous les bannières des réformateurs comme des révolutionnaires, expérimentant la grande égalisation et la pluralisation d'une république jeune, nouvelle et malléable. Mais tout cela fut étouffé par les machinations d'un despote. Déchirée par des hommes forts et des seigneurs de la guerre, la République de Beiyang n'était rien d'autre qu'un outil corrompu et incompétent mené par toute clique de seigneur de la guerre qui contrôlait Beijing sur le moment. Les Gouvernements duraient des mois, le système gouvernemental lui-même ayant changé sept fois au cours de son existence, et malgré tout cela il y avait toujours un sentiment d'espoir.\n\nEnfin il l'a fait. Après les luttes, les grandes épreuves permanentes, les privations continues, le grand, le magnifique Maréchal de Tianjin a supervisé la restauration de la République de Beiyang et l'unification de la nation ! Bien que beaucoup craignaient qu'il ne soit qu'une continuation des despotes militaires qui ont joué avec les institutions de la République dès sa création, le Maréchal n'a aucune prétention à la supériorité sur la République. Sa mission achevée, et la nation stabilisée, une nouvelle ère de démocratie peut commencer à se développer en Chine. Sous son regard vigilant, bien sûr."

 SZC_all_for_the_reconquest: "Tous pour la Reconquête !"
 SZC_all_for_the_reconquest_desc: "Si nous voulons revoir un jour notre belle Pékin, nous devons avant tout consacrer toutes les ressources disponibles dans le Sichuan à notre grande et glorieuse campagne. Car la reconquête de notre glorieuse République est une tâche ardue, qui exige le maximum de chaque patriote chinois sur nos terres. Quel qu'en soit le prix."

 SZC_assistance_of_the_german_giant: "Assistance du Géant Allemand"
 SZC_assistance_of_the_german_giant_desc:9 "Dernier rempart de la prospérité du Zhili, la province du Sichuan est loin d'être un foyer durable pour les institutions de la République, ni pour son armée coûteuse et moderne. Utilisant nos contacts latents au sein des Légations allemandes, en supposant qu'elles n'aient pas brûlé tous nos ponts, nous avons invité une série de fabricants industriels militaires à créer de nouvelles usines accélérées dans notre base d'origine. Nous espérons ainsi que la reconquête de nos terres légitimes ne tardera pas à arriver."

 SZC_increasing_pluralisation: "Pluralisation Croissante"
 SZC_increasing_pluralisation_desc: "Après avoir permis une plus grande participation politique au sein de l'assemblée en exil, il semblerait que le peuple ait commencé à s'intéresser à la politique, influencé par les sages paroles de nos politiciens. En apportant la légitimité et la stabilité nécessaires à l'appareil gouvernemental, nous avons également accru le soutien populaire aux partis d'opposition au sein de l'assemblée croupion."

 SZC_legacy_of_baoding_and_luoyang_idea: "Héritage de Baoding et Luoyang"
 SZC_legacy_of_baoding_and_luoyang_idea_desc: "Les cliques de Baoding et de Luoyang, aujourd'hui fonctionnellement éteintes en raison de la décapitation de leurs dirigeants, avaient l'air austère et sincère de seigneurs de guerre se transformant en hommes politiques. Délaissant le sabre et le fusil pour le costume et la cravate, ils étaient de véritables hommes d'État chinois. Abattus par l'horrible coup d'État, c'est à la clique de Tianjin et aux restes des autres, ainsi qu'à la clique des bureaucrates de Beiyang, qu'il incombe de poursuivre leur mission d'hommes d'État sincères."

 SZC_embracing_meritocracy: "Adopter la Méritocratie"
 SZC_embracing_meritocracy_desc: "L'une de nos plus grandes folies est peut-être le réseau de patronage du Zhili. Cette association recluse de relations népotiques déguisées en bonnes pratiques confucéennes a donné naissance à un haut commandement de plus en plus isolé et à une secte inférieure d'officiers mécontents. Nombre de ces officiers ont aidé les Mandchous lors du coup d'État, dans l'espoir de recevoir la promotion qui leur était due. Pour réformer véritablement, il faut non seulement réformer la politique, mais aussi la structure de l'armée."

 SZC_expertise_of_the_military: "Expertise des Militaires"
 SZC_expertise_of_the_military_desc: "Notre armée d'antan était celle d'un faiseur de miracles. Sous le couvert de l'éclat militaire du maréchal de Jade, elle accomplissait des tâches inconcevables et des exploits presque impossibles. Bien sûr, cela était dû en partie au génie militaire de Wu Peifu. Le maréchal Wang n'est certes pas un imbécile, mais il n'est pas non plus un dieu de la guerre. Pour réussir, nous devons réexaminer nos doctrines, pour toutes les facettes de la guerre."

 SZC_cao_kun_constitution: "La Constitution de Cao Kun de 1923"
 SZC_cao_kun_constitution_desc: "Remarquable texte législatif progressiste, la Constitution de Cao Kun de 1923 représente peut-être l'apogée de l'idéalisme et de l'espoir de Beiyang dans les mérites de la clique de Zhili. Bénéficiant du soutien pluraliste de la majorité des membres de l'Assemblée du Nord de l'époque, la Constitution de Cao Kun a marqué une tentative significative de formaliser une gouvernance appropriée dans la République de Beiyang après une période tumultueuse d'abus flagrants de la part de Duan Qirui et de son Club Anfu. Cherchant à établir un gouvernement structuré, organisé et centralisé, elle confère un pouvoir exécutif important au président. Elle comporte toutefois des éléments remarquables, tels qu'une séparation claire des pouvoirs et une définition précise des droits civils du peuple chinois. Malheureusement, sa mise en œuvre, il y a dix ans, a été entachée d'allégations de corruption et d'autocratie, puisqu'elle a été menée à peu près au même moment que le scandale de corruption de Cao. Et une fois de plus, sa remise en œuvre en cette nouvelle ère chaotique marque une nouvelle tentative de stabilisation rapide de la situation politique. En raison des lacunes potentielles en matière d'abus de pouvoir, il faut simplement faire confiance aux institutions pour qu'elles exercent réellement la volonté du peuple."

 SZC_providing_bread_and_circuses: "Fournir du Pain et des Jeux"
 SZC_providing_bread_and_circuses_desc: "Pour gagner véritablement le cœur des gens, il ne serait pas prudent de leur lancer des concepts insignifiants de "réforme". En effet, le peuple ne souhaite pas de réforme pour le moment. Ils ont besoin de nourriture, d'un abri, d'eau et d'une vie agréable. C'est pourquoi la vieille expression métonymique s'applique précisément à notre situation. La véritable réforme peut attendre la reprise de la bonne gouvernance à Beijing."

 SZC_embracing_militarism: "Embrasser le Militarisme"
 SZC_embracing_militarism_desc: "Pour notre propre salut national, il faut la participation de l'esprit martial de chaque citoyen afin de superviser la renaissance de l'État-nation militariste. Sous les auspices du général Jiang Baili, le peuple connaît une renaissance de son propre bushido, de sa propre capacité à se sacrifier pour un objectif ultérieur. Plus que l'individu, c'est l'esprit de la nation qu'il faut retrouver."

 SZC_legacy_of_the_academies: "Héritage des Académies"
 SZC_legacy_of_the_academies_desc: "Privés de Baoding, privés de Kunming, les militaristes sont privés des berceaux de leurs cliques. Néanmoins, nous devons continuer, avec ou sans leur expertise. Car la majorité de nos officiers et commandants sont les descendants de l'esprit martial invoqué dans ces institutions, et nous serions damnés si nous oubliions nos origines maintenant."

 SZC_dawn_of_the_final_offensive: "Aube de l'Offensive Finale"
 SZC_dawn_of_the_final_offensive_desc: "L'heure du jugement a sonné ! L'heure du jugement ! Un véritable test de nos nouvelles capacités réformées ! Le moment est venu de mener une lutte acharnée, car nos ennemis sont les maîtres de notre capitale nationale légitime, et si nous échouons, la clique de Zhili telle que nous la connaissons disparaîtra. La République de Beiyang ne se maintient pas sous les auspices de ce perfide vieux maréchal, mais sous ceux du maréchal de Tianjin ! Zhonghua Mingguo Wansui !"

 SZC_old_hope_and_glory: "Vieil Espoir et Gloire"
 SZC_old_hope_and_glory_desc: "Nos hommes sont fatigués, leur moral s'effondre, nos usines s'arrêtent et nos travailleurs se lamentent. Le dévouement absolu de toutes les ressources gérables à notre victoire totale a eu un coût excessif. Même s'il disparaîtra avec le temps, la tension, les larmes, elles reposent sur notre nation, s'infiltrant dans son sol. On ne peut qu'espérer que les sacrifices en valaient la peine."

 SZC_hundred_years_war_of_resistance: "Guerre de Cent Ans de la Résistance"
 SZC_hundred_years_war_of_resistance_desc: "Les envahisseurs osent pénétrer sur notre territoire ! Les impérialistes étrangers, les vils Japonais ! Ils sont arrivés pour s'emparer définitivement de notre nation et l'éradiquer dans une guerre de survie nationale ! Chaque homme, chaque femme et chaque enfant doit se consacrer corps et âme à la préservation de la civilisation millénaire de la Chine, car nous devons prouver aux Japonais que nous sommes capables de mener une guerre de résistance de cent ans !"

 SZC_sounding_the_bugles_of_victory: "Sonner les Clairons de la Victoire"
 SZC_sounding_the_bugles_of_victory_desc: "Nous l'avons enfin fait ! La grande revendication de la position légitime de la clique de Zhili au sein de l'État-nation chinois. Nous ne serons plus contraints de coexister avec les perfides monarchistes, nous ne nous inclinerons plus devant aucune puissance étrangère ! La clique de Zhili a peut-être été renversée, elle a peut-être perdu ses dirigeants, mais elle a trouvé une nouvelle âme en la personne du maréchal Wang et de Yan Huiqing. Les clairons de la victoire retentissent et le peuple se réjouit !"

 SZC_extending_a_hand_to_the_young_china: "Tendre la Main à la Jeune Chine"
 SZC_extending_a_hand_to_the_young_china_desc: "Malgré ses convictions et sa participation réticente à la bureaucratie mandchoue, le parti Jeune Chine est fondamentalement nationaliste, patriotique et fervent républicain. Alors que nous étions en désaccord auparavant, de nombreuses personnes au sein de l'Assemblée et de la soldatesque considèrent leur ténacité idéologique avec fierté. Alors que les partisans de la ligne dure préféreraient les voir disparaître, coopérer une fois de plus avec le PCJ peut permettre de revigorer le militarisme et le nationalisme chinois."

 SZC_intellectualism_with_endeavour: "Intellectualisme à l'Épreuve de la Réalité"
 SZC_intellectualism_with_endeavour_desc: "L'Endeavour Society, une organisation intellectuelle qui fonctionne depuis longtemps et qui produit des articles, a été fondée par des personnalités telles que Cai Yuanpei, Hu Shih, Li Dazhao, Liang Shuming, Wang Chonghui, Tao Menghe et bien d'autres intellectuels réformistes, puis révolutionnaires dans certains cas. Toujours défendus par Hu Shih sous une forme ou une autre, ils représentent l'un des nombreux blocs fédéralistes sur la scène politique du Nord. Partageant une maison commune pendant notre exil, intégrons davantage ce groupe de réflexion dans notre gouvernement, même s'ils attendent beaucoup de notre gouvernement. Le plus important est une réforme immédiate de ses institutions."

 SZC_public_safety_bureau: "Le Bureau de la Sécurité Publique"
 SZC_public_safety_bureau_desc: "Le Bureau de la sécurité publique, ou BSP, est le nom de l'agence de renseignement qui fait office de police secrète du Zhili et qui est dirigée par Liu Menggeng et Wang Yujia. Grâce à leurs contacts dans les plaines centrales et ailleurs, ainsi qu'à leur expérience admirable dans la gestion des réseaux d'espionnage et de renseignement de Cao Kun, l'entité a été créée pour garantir que l'éventualité d'un coup d'État mandchou ne se reproduise plus jamais. L'espionnage, la suppression des dissensions internes et le contre-espionnage ne sont que quelques-uns des nombreux objectifs que l'institution a été autorisée à traiter."

 SZC_vindicating_the_invisible_element_idea:0 "Derrière les Lignes Mandchoues"
 SZC_vindicating_the_invisible_element_idea_desc: "Ils ont peut-être écrasé notre puissance militaire en surface, mais les royalistes sont loin de se douter que les réseaux et l'influence des Zhili s'infiltrent profondément dans la terre des plaines centrales. Notre bien-aimé roi de Baoding a peut-être été massacré sans pitié par les princes mandchous, mais ses réseaux sont toujours aussi puissants. Et prêts à nous faire profiter de tous les avantages pour l'anéantissement de notre ennemi."

 SZC_reconstituting_the_beiyang_navy: "Reconstituer la Marine de Beiyang"
 SZC_reconstituting_the_beiyang_navy_desc: "Conformément à un plan plutôt ambitieux élaboré par le ministre restauré de la marine, l'amiral Sa Zhenbing, une part importante du budget du pays est consacrée en priorité à un effort de modernisation et de production planifié par l'État d'une toute nouvelle flotte de navires. On espère que d'ici la fin de ce plan annuel, la marine chinoise se sera rapidement modernisée et qu'elle ne naviguera plus sur des navires datant d'une dizaine d'années."

 SZC_western_revitalisation_plan_effect:9 "Plan de Revitalisation Occidental"

 SZC_encourage_local_initiative_effect:9 "Encouragement des Initiatives Locales"

 SZC_crafting_talent_of_the_new_generation:9 "Talent Créatif de la Nouvelle Génération"
 SZC_crafting_talent_of_the_new_generation_desc:9 "L'élément le plus crucial dans le développement de la Chine sur la voie de la modernité est d'éduquer correctement les masses. À mesure que les masses acquièrent les compétences de l'ère moderne, davantage de personnes participeront au système politique et renforceront notre nouvelle démocratie. Nous voulons une population éduquée qui guide notre République vers l'avenir !"

 SZC_vaulting_militaristic_personalism:9 "Personnalisme Militariste Triomphant"
 SZC_vaulting_militaristic_personalism_desc:9 "Pendant la guerre civile chinoise, divers seigneurs de la guerre ont acquis une grande influence au sein de l'armée fédérale. Ces seigneurs de la guerre commandent une force qui n'est pas principalement loyale à la République, mais à leur commandant. Si nous voulons que la démocratie de notre République prospère, le personnalisme doit être éradiqué à la source."

 SZC_government_union_partnership:9 "Partenariat Gouvernement-Syndicats"
 SZC_government_union_partnership_desc:9 "Les syndicats n'ont pas été la force la plus importante en Chine, principalement en raison du caractère agraire du pays qui a longtemps été la norme. Cependant, à mesure que l'unification se réalise et que l'industrie chinoise prend le dessus, les travailleurs doivent également obtenir une représentation. Nous devons développer et intégrer les syndicats afin que les travailleurs des fermes de soie du Sichuan, des mines de charbon du Shanxi et des docks de Shanghai puissent faire entendre leur voix."

 SZC_chinas_industrial_revolution:9 "La Révolution Industrielle Chinoise"
 SZC_chinas_industrial_revolution_desc:9 "Après avoir été secouée par une multitude de troubles jusqu'à présent, la Chine était un pays divisé entre l'agriculture de subsistance à l'ouest et diverses industries en déclin à l'est. Mais ce n'est plus le cas ! En sensibilisant notre population aux avantages de l'industrie et en lui apprenant à exploiter et à construire, nous allons nous industrialiser à un rythme rapide, en tirant parti de nos ressources jusqu'alors inexploitées. Dans une dizaine d'années, nous rivaliserons avec la Grande-Bretagne !"

 SZC_specialised_practical_schools_0:9 "Écoles Pratiques Spécialisées"
 SZC_specialised_practical_schools_0_desc:9 "S'inspirant des exemples pionniers de Nanchong, des écoles pratiques spécialisées ont été créées, avec des classes professionnelles pour la formation à l'agriculture et à la sériciculture, deux industries essentielles, en particulier dans le Sichuan. D'autres écoles ont également commencé à introduire des classes professionnelles dans les domaines des sciences, des lettres, de la médecine traditionnelle chinoise et de l'industrie lourde. Chacune de ces classes spécialisées dispose de ses propres ateliers pratiques, fermes et stages cliniques, favorisant ainsi l'intégration de l'éducation et du travail productif."

 SZC_finding_a_use_for_all:9 "Trouver un Emploi à Tous"
 SZC_finding_a_use_for_all_desc:9 "La Centralisation nationale est nécessaire, aujourd'hui plus que jamais, alors que la Chine est enfin en grande partie sous l'égide d'une nouvelle administration. Les anciennes figures politiques, qu'il s'agisse d'hommes politiques ou de seigneurs de guerre, doivent se voir confier des tâches productives afin qu'elles ne se contentent pas d'entraver et de critiquer le gouvernement. De même, les chômeurs et les personnes inactives doivent être orientés vers des programmes techniques afin de les préparer à l'avenir industriel de la Chine, et toutes les compétences techniques doivent être mises à profit."

 SZC_the_national_demobilisation_programme:9 "Le Programme National de Démobilisation"
 SZC_the_national_demobilisation_programme_desc:9 "Maintenant que l'unification est à nos portes, la question de la militarisation peut à nouveau être abordée. La mobilisation excessive et incontrôlée de multiples acteurs a toujours été un problème dans le Sichuan et, plus généralement, dans la Chine des seigneurs de la guerre. Le moment est venu de normaliser les armées permanentes et de réduire considérablement la taille des formations militaires irrégulières et autonomes, comme nous l'avons promis au peuple dès le début."

 SZC_new_style_education_scheme:9 "Nouveau Programme Éducatif"
 SZC_new_style_education_scheme_desc:9 "Le manque d'éducation généralisée a toujours été à l'origine du retard culturel dans toute la Chine, comme l'a constaté de ses propres yeux le général Liu Wenhui lors de son séjour au Sichuan. Il ne fait aucun doute que le statu quo doit être réformé : de nouveaux examens publics doivent être organisés, des réunions de démonstration doivent être organisées, et les meilleurs étudiants doivent être sélectionnés pour occuper des postes plus prestigieux et être félicités pour leurs résultats."

 SZC_true_purposes_of_knowledge_civic_democracy:9 "Véritable But du Savoir : La Démocratie Civique"
 SZC_true_purposes_of_knowledge_civic_democracy_desc:9 "Pour aller de l'avant avec son temps, l'éducation doit évoluer en permanence afin de répondre aux exigences de la modernité. Il faut éliminer le poison persistant de l'ancienne mentalité des examens impériaux ! En tant qu'éducateurs et travailleurs culturels, nous avons un devoir historique : nous devons proclamer une déclaration d'indépendance intellectuelle, garantir aux étudiants la liberté d'apprendre, de faire des recherches, de s'exprimer et de publier, et ainsi achever la démocratisation de l'esprit éducatif."

 SZC_true_purposes_of_knowledge_national_sacrifice:9 "Véritable But du Savoir : Le Sacrifice National"
 SZC_true_purposes_of_knowledge_national_sacrifice_desc:9 "Pour aller de l'avant avec son temps, l'éducation doit évoluer en permanence afin de répondre aux exigences de la modernité. Il faut éliminer le poison persistant de l'ancienne mentalité des examens impériaux ! Les gens ne devraient pas considérer les études comme un tremplin vers des fonctions élevées et la richesse. Nous devons trouver des moyens pour que nos esprits les plus brillants se consacrent, d'ici cinquante ans, non pas à devenir docteurs en littérature ou en philosophie, mais à l'étude de l'élevage et de l'agriculture - une véritable éducation du peuple."

