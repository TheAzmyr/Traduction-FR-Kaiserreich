 SZC_saint_of_sichuan_hos:9 "Le Saint"
 SZC_saint_of_sichuan_hos_desc:9 "§LFigure unificatrice, d'un tempérament calme et respecté, Zhang Lan est révéré depuis longtemps pour sa poursuite désintéressée du salut chinois par l'éducation, et sa capacité à coopérer avec tous les camps du spectre politique.§!"

 SZC_warfox_of_bashu:9 "Renard de Bashu"
 SZC_warfox_of_bashu_desc:9 "§LMeneur d'un grand projet pour revitaliser l'État-nation chinois, la férocité de la gouvernance de Liu Wenhui lui vaut un surnom à la hauteur.§!"

 SZC_old_comrade:9 "Vieux Camarade"
 SZC_old_comrade_desc:9 "§LVétéran des luttes révolutionnaires depuis les années 1910, Dan Maoxin accompagne Xiong Kewu dans ces luttes depuis des décennies ; bien que peu connu des échelons supérieurs, il s'est révélé être une figue présidentielle joviale et stable.§!"
