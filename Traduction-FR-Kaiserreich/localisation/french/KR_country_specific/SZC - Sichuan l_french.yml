 #劉伯承
 SZC_liu_bocheng: "Liu Bocheng"
 SZC_liu_bocheng_high_command_desc:9 "§YNaissance :§! §L4 décembre 1892, comté de Kaixian, province du Sichuan, Grand Qing§!\n§YAlignement :§! §SCAP§!\n§YCarrière :§! §LAprès avoir travaillé à la ferme pendant son adolescence à la suite du décès de son père, Liu entra à l'École des officiers de l'armée du gouvernement militaire du Sichuan en 1912. Une fois diplômé, il servit sous les ordres de Xiong Kewu. Liu prit part à la Seconde Révolution de 1913 contre Yuan Shikai lorsque Xiong déclara son opposition à Beijing. Cependant, Yuan sortit vainqueur de ce conflit, et Liu s'exila à Shanghai. De là, Liu rejoignit le Parti révolutionnaire de Sun Yat-sen, précurseur du Kuomintang.\n\nLiu retourna au Sichuan pour organiser une Armée de Protection de la Nation lorsque Cai E marcha contre la manœuvre impériale de Yuan Shikai en 1915. Pendant la guerre de 1916, Liu fut touché deux fois à la tête, ce qui lui fit perdre la vue de l'œil droit. En 1924, Liu s'engagea contre les forces de la clique du Zhili dirigées par Wu Peifu et remporta la bataille de Longquanyi. C'est en 1924 que Liu fut influencé par les principes du marxisme et les objectifs de la Révolution nationale. En 1926, Liu fut officiellement intégré au Kuomintang.\n\nAlors que Liu soutenait le Gouvernement nationaliste de Guangzhou dans sa tentative de s'emparer de Wuhan en empêchant les seigneurs de la guerre locaux du Sichuan de venir en aide à Wu Peifu, le KMT non seulement échoua à prendre Wuhan, mais s'effondra complètement. L'isolement soudain de Liu par rapport à ses alliés a poussé les autres seigneurs de la guerre du Sichuan à le repousser aux confins du Sichuan, où il vit toujours caché à ce jour. Liu espère qu'un jour, le Kuomintang reviendra sur le continent et que les paysans seront libérés de l'oppression réactionnaire.§!"

 #張瀾
 SZC_zhang_lan: "Zhang Lan"
 SZC_zhang_lan_bio:9 "Fils d'un lettré et d'un instituteur, Zhang Lan étudia dès son plus jeune âge auprès de son père, devenant lui-même lettré en 1894, puis entrant à l'Académie Zunjing de Chengdu en 1902. Sélectionné pour étudier au Japon en 1903, il intégra l'Académie Hongwen de Tokyo, avant de revenir en Chine à la suite de ses propos contre Cixi. Après avoir occupé divers postes dans l'enseignement, il fut élu au Conseil consultatif du Sichuan en 1909, mais refusa ce poste, préférant s'engager dans le mouvement constitutionnaliste réformiste durant les dernières années de la dynastie Qing.\n\nParticipant au Mouvement de Protection des Chemins de fer du Sichuan, il s'impliqua pleinement dans l'insurrection de Xinhai au Sichuan, avant d'être élu député à l'Assemblée en 1913. En 1915, il participa à la Guerre de Protection de la Nation, avant de devenir gouverneur du Sichuan à Beijing en 1917 ; il s'enfuit de Chengdu avec Liu Cunhou en 1918, puis retourna à Beijing. En 1919, il soutint le Mouvement de la Nouvelle Culture et contribua à envoyer de jeunes étudiants dans les milieux intellectuels radicaux d'Europe.\n\nEn 1920, il retourna à Nanchong, où il se consacra à l'éducation, et devint même, en 1925, président de l'université de Chengdu. Défenseur de la liberté de pensée et de la liberté académique, il permit aux différents groupes révolutionnaires locaux d'exercer leurs activités sous son égide. Démissionnant en 1932 à la suite de la répression par le Zhili du Soulèvement de Shanghai, il retourna à Nanchong pour se consacrer à des questions éducatives. Participant à la création de la FPDC la même année, Zhang s'attira un immense respect pour son dévouement à la démocratie et son rôle de médiateur."
 SZC_zhang_lan_leader_desc:9 "§YNaissance :§! §L2 avril 1872, comté de Nanchong, province du Sichuan, Grand Qing§!\n§YCarrière :§! §L$SZC_zhang_lan_bio$§!"
 SZC_zhang_lan_advisor_desc:9 "§YNaissance :§! §L2 avril 1872, comté de Nanchong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §SARNS§!\n§YCarrière :§! §L$SZC_zhang_lan_bio$§!"

 #鮮英
 SZC_xian_ying:9 "Xian Ying"
 SZC_xian_ying_sic_desc:9 "§YNaissance :§! §L1885, comté de Xichong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §SARNS§!\n§YCarrière :§! §LNé dans la pauvreté, Xian Ying a dû compter sur le soutien de ses proches pour suivre ses premières études dans une école privée. Jeune élève de Zhang Lan, Xian allait devenir son protégé privilégié, à la fois en tant que mentor et en tant qu’ami. En 1908, Xian Ying s’inscrivit à l’École accélérée du Sichuan et s’engagea dans l’armée. Parallèlement, il adhéra au Tongmenghui et se lia rapidement d'amitié avec He Guoguang, Pan Wenhua, Yang Sen et Liu Xiang.\n\nSuivant Zhang Lan à travers le Sichuan, puis jusqu'à la Chambre des représentants à Beijing, Xian démissionna avec son mentor en 1914 sous prétexte de fréquenter l'Université de l'Armée. Partant vers le sud pour rejoindre le Mouvement de Protection de la Nation, il resta proche de Zhang, lançant pour son compte un journal favorable aux émeutes de novembre qui flirtait avec les idées socialistes. En 1921, Xian participa à la lutte entre les seigneurs de la guerre du Sichuan, apportant une aide considérable à Liu Xiang.\n\nAprès s'être intéressé au monde des affaires dès les années 1920, la passion de Xian pour la carrière militaire allait se transformer en une vocation industrielle ; il mit à profit ses relations avec Zhang Lan pour parcourir le pays, tant pour affaires que pour rencontrer des hommes partageant ses idées, tels que Liang Shuming et Yan Yangchu. Au service de He Guoguang en 1935, Xian devint inspecteur général de Nanchong, mais à la suite d'un scandale impliquant sa secrétaire, Gu Xinghua, il fut contraint de quitter son poste et devint directeur du collège Jianhua de Zhang Lan à Nanchong. Très proche de son mentor, Xian s'est peu à peu converti en défenseur de la politique démocratique chinoise de la Troisième Force.§!"

 #车耀先
 SZC_che_yaoxian:9 "Che Yaoxian"
 SZC_che_yaoxian_high_command_desc:9 "§YNaissance :§! §L27 septembre 1894, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §SARNS§!\n§YCarrière :§! §LAyant connu une enfance marquée par la misère, Che Yaoxian entra dans une école privée à l’âge de cinq ans, mais fut contraint d’abandonner ses études à la suite d’un litige familial. Vendant des produits agricoles pour subvenir aux besoins de sa famille, il devint apprenti chez un marchand en 1908 et se découvrit une passion pour la lecture qui ne le quittera plus ; en 1911, à l’âge de 17 ans, il était déjà comptable. En 1912, le jeune Che s'engagea dans l'armée, servant dans l'armée du Sichuan, et en 1918, il était devenu commandant de compagnie, avant d'être promu commandant de régiment dans l'armée de Liu Xiang.\n\nEn tant que représentant du Kuomintang, Che tenta de persuader Liu Xiang de faire défection, mais après que celui-ci eut rejeté ses efforts, Che démissionna de l'armée et partit étudier au Japon. Avec la défaite du Kuomintang, Che reporta ses espoirs sur les divers autres mouvements de gauche au sein du pays, dont le plus important était la gauche de la FPDC. En 1928, Che retourna à Chengdu et rejoignit par la suite le KMT en secret. Grâce à ses relations, il rejoignit l'armée de Liu Wenhui.\n\nMobilisant les groupes chrétiens locaux de Chengdu pour soutenir les insurgés du Sichuan oriental, Che lança une vague d'attaques contre les organisations socialistes chrétiennes patriotiques de Chengdu et, après le soulèvement de Shanghai, dénonça le gouvernement de Yang Sen et Beijing. Manqué de peu d'être arrêté par Xiang Chuanyi, Che coopéra avec Leng Yindong, puis servit sous les ordres des armées de Baoding de Liu Wenhui et Deng Xihou. Tout en restant en contact avec les groupes d'opposition locaux, Che s'intéressa tout particulièrement aux efforts de Zhang Lan dans le bassin.§!"

 SZC_zhou_taixuan:9 "Zhou Taixuan"
 SZC_zhou_taixuan_advisor_desc:9 "§YNaissance :§! §L14 février 1895, comté de Xindu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §SARNS§!\n§YCarrière :§! §LAyant suivi une éducation classique, Zhou obtint son diplôme de lycée en 1911, puis rejoignit en 1913, comme Wei Siluan et Hu Xuan, le département d'économie politique de l'École publique de Chine. Après son diplôme en 1916, Zhou travailla comme traducteur pour le Shanghai Minxin Daily, puis pour le Jinghua Daily et le Zhonghua Xinbao basés à Beijing, ainsi que pour l'agence de presse Zhonghua.\n\nEn 1918, il présenta Wang Guangqi au Jinghua Daily, et par son intermédiaire rencontra Li Dazhao. Devenant rapidement proches, Zhou et Li décidèrent de fonder la Société Jeune Chine en 1919 avec l'aide de Wang. Partant pour la France, il fut admis à l'université de Montpellier et y fonda l'agence de presse de Paris pour informer la Chine des événements locaux.\n\nAyant obtenu une maîtrise en éducation, Zhou entra à l'université de Paris en 1924, restant en France jusqu'en 1928. En 1930, il refusa de rester à l'université et rentra en Chine sur l'invitation de Zhang Lan ; il servit alors dans les institutions éducatives de Zhang Lan au Sichuan. En 1936, Zhou aurait publié une série d'articles dénonçant l'ordre capitaliste en Europe, et est l'un des membres fondateurs de la Société du Nouveau Siècle.§!"

 #劉泗英
 SZC_liu_siying:9 "Liu Siying"
 SZC_liu_siying_advisor_desc:9 "§YNaissance :§! §L24 février 1895, à Nanchuan, Chongqing, province du Sichuan, Grand Qing§!\n§YAlignement :§! §nPJC§!\n§YCarrière :§! §LNé dans la dernière décennie du XIXe siècle, Liu Siying, comme nombre de ses compatriotes, adhéra au courant nationaliste qui animait l’époque. Souhaitant acquérir une éducation moderne, Liu fréquenta l’université Hosei au Japon. Après avoir obtenu son diplôme, il trouva un emploi à Shanghai en tant que rédacteur en chef du Shanghai Jiguo Times. Dans les années 1920, Liu rejoignit le nouveau Parti Jeune Chine et joua un rôle crucial dans son fonctionnement. Sur ordre de la direction du parti, Liu retourna au Sichuan pour travailler comme secrétaire du seigneur de la guerre du Zhili, Yang Sen.\n\nGrâce à Yang, Liu put nouer des relations de travail avec Wu Peifu, qui cherchait le soutien d’un parti de masse moderne pour s’opposer au Kuomintang pendant l'Expédition du Nord. Grâce à Liu, le chef du parti, Zeng Qi, put considérablement étendre son influence à travers le nord de la Chine. Sous la supervision de Li Huang, le chef local du PJC au Sichuan, Liu œuvra à diffuser le message du parti dans tout le Sichuan, tant par ses contacts militaires qu’en sa qualité de directeur de l’École publique du Sud-Ouest de Chengdu. Grâce à ses efforts pour collaborer avec la noblesse locale afin de venir en aide aux réfugiés dans le besoin, le PJC bénéficie d’un large soutien à tous les niveaux de la société sichuanaise.§!\n\n§YNotes : Bien qu'il soit un proche allié de la Clique du Zhili, Liu ne sert avant tout que les intérêts du PJC, dans le but de mener à bien la révolution plébiscitaire tant attendue en Chine.§!"

 #熊克武
 SZC_xiong_kewu: "Xiong Kewu"
 SZC_xiong_kewu_bio:9 "Issu d'une famille de médecins, Xiong Kewu se passionnait pour les études dès son plus jeune âge. Il fut fasciné par les idées de démocratie et de modernisme véhiculées par l'Occident et déplorait que la Chine ait pris un retard considérable sur le reste du monde. En 1903, il fréquenta le Salle littéraire de l'Est du Sichuan et fit plus tard la connaissance de révolutionnaires tels que Dai Jitao. Après avoir obtenu le soutien financier de son oncle, Xiong partit étudier au Japon, où il rencontra Sun Yat-sen et rejoignit plus tard le Tongmenghui de ce dernier. Après la Révolution Xinhai, Xiong occupa le poste de commandant du gouvernement militaire de Dahan Sichuan jusqu'en 1913. Yuan Shikai et le Gouvernement de Beiyang chassèrent les forces de Sun de Chine, et Xiong fut contraint de s'exiler au Japon.\n\nPourtant, cette défaite n’empêcha pas Xiong de continuer à rêver d’une Chine libre. Au Japon et en Asie du Sud-Est, il leva des fonds pour la révolution, puis retourna en Chine pour rejoindre Cai E dans la Guerre de Protection de la Nation contre Yuan. Bien qu’ils eussent été camarades d’armes pendant cette guerre, Xiong se retourna contre son ancien allié Lü Chao en 1920 et réussit à l’expulser de la province avec l’aide du seigneur de la guerre Liu Cunhou. La même année, il fit une déclaration ferme selon laquelle le peuple du Sichuan ne se contenterait plus d’un rôle secondaire face aux gouvernements de Beiyang et de Guangzhou, qui avaient vu le jour dans le chaos de la période des seigneurs de la guerre. Cela ne dura pas longtemps, car le Sichuan sombra dans la guerre civile et Liu Cunhou s’allia au Gouvernement de Beiyang, contraignant une nouvelle fois Xiong à s’exiler. Il s'enfuit alors vers le Guangdong, rejoignit le Kuomintang chinois et participa à son premier Congrès en 1924.\n\nLe bref passage de Xiong au sein du Kuomintang prit fin en 1925 lorsqu'il fut trahi par Wang Jingwei et Chiang Kai-shek et accusé de collusion avec le leader fédéraliste chinois Chen Jiongming. Après l'échec de l'Expédition du Nord et l'effondrement du Kuomintang, Xiong est rentré chez lui au Sichuan, déçu par la vie politique. Pourtant, sa passion pour les idéaux républicains ne s'est jamais éteinte, et bien qu'il n'ait pas oublié la trahison du KMT, il prête une oreille attentive aux Fédéralistes chinois du Guangdong."
 SZC_xiong_kewu_leader_desc:9 "§YNaissance :§! §L26 décembre 1885, comté de Jingyan, province du Sichuan, Grand Qing§!\n§YCarrière :§! §L$SZC_xiong_kewu_bio$\n\nGrâce à son succès dans la récente guerre civile au Sichuan, Xiong veillera à ce que le Sichuan devienne une forteresse républicaine impénétrable qui contribuera à mettre fin à des années d'autoritarisme à Beijing.§!"
 SZC_xiong_kewu_sic_desc:9 "§YNaissance :§! §L26 décembre 1885, comté de Jingyan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §L$SZC_xiong_kewu_bio$§!"

 #但懋辛
 SZC_dan_maoxin:9 "Dan Maoxin"
 SZC_dan_maoxin_bio:9 "Déterminé à consacrer sa vie à la révolution et à la recherche de la vérité, Dan Maoxin rejoignit le Tongmenghui en 1905, à l'instigation de Sun Yat-sen et de Huang Xing, alors qu'il étudiait au Japon. De retour en Chine en 1906, Dan occupa les fonctions de responsable de la propagande et d'officier de liaison, tout en créant une école publique à Shanghai afin de diffuser les idéaux démocratiques. Capturé pour son rôle lors du Second Soulèvement de Guangzhou, puis libéré, Dan retourna au Sichuan où il occupa un poste provincial avant de démissionner en raison du régime autocratique du gouverneur Hu Jingyi.\n\nC'est à Chongqing que Dan devint chef d'état-major de Xiong ; son expérience acquise au cours de nombreuses révolutions avait endurci sa détermination et l'avait convaincu de la nécessité de l'unité révolutionnaire. À ce titre, Dan fut également l’un des rares à chercher activement à collaborer avec le Yunnan et le Guizhou, invoquant leur respect commun pour les idéaux républicains du Sud. Indépendamment de la ligne politique, Dan commanda loyalement les troupes contre les partisans de la ligne dure du Sichuan alignés sur le Zhili, tels que Yang Sen et Liu Cunhou, alors même que le vent tournait progressivement contre les Fédéralistes.\n\nÀ Tongren, Dan reste le bras droit de Xiong et l'un des principaux défenseurs de l'unité au sein du mouvement, ouvert à la coopération entre les mouvements démocratiques et les provinces partageant les mêmes idées."
 SZC_dan_maoxin_leader_desc:9 "§YNaissance :§! §L1884, comté de Rong, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LDéterminé à consacrer sa vie à la révolution et à la recherche de la vérité, Dan Maoxin rejoignit le Tongmenghui en 1905, à l'instigation de Sun Yat-sen et de Huang Xing, alors qu'il étudiait au Japon. De retour en Chine en 1906, Dan occupa les fonctions de responsable de la propagande et d'officier de liaison, tout en créant une école publique à Shanghai afin de diffuser les idéaux démocratiques. Capturé pour son rôle lors du Second Soulèvement de Guangzhou, puis libéré, Dan retourna au Sichuan où il occupa un poste provincial avant de démissionner en raison du régime autocratique du gouverneur Hu Jingyi.\n\nC'est à Chongqing que Dan devint chef d'état-major de Xiong ; son expérience acquise au cours de nombreuses révolutions avait endurci sa détermination et l'avait convaincu de la nécessité de l'unité révolutionnaire. À ce titre, Dan fut également l’un des rares à chercher activement à collaborer avec le Yunnan et le Guizhou, invoquant leur respect commun pour les idéaux républicains du Sud. Indépendamment de la ligne politique, Dan commanda loyalement les troupes contre les partisans de la ligne dure du Sichuan alignés sur le Zhili, tels que Yang Sen et Liu Cunhou, alors même que le vent tournait progressivement contre les Fédéralistes.\n\nDevenu président grâce à son engagement pendant la guerre et à ses relations étroites avec l'opposition, Dan œuvre sans relâche pour mettre en place, à tout prix, un gouvernement fédéraliste démocratique et non partisan.§!"
 SZC_dan_maoxin_sic_desc:9 "§YNaissance :§! §L1884, comté de Rong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §L$SZC_dan_maoxin_bio$§!\n\n§YNotes : Comme beaucoup de ses camarades, Dan Maoxin est réputé pour ses origines lettrées : il excelle dans la poésie et la calligraphie et connaît bien le "Livre des Mutations" ainsi que d'autres classiques confucéens.§!"

 #喻培棣
 SZC_yu_peidi:9 "Yu Peidi"
 SZC_yu_peidi_commander_desc:9 "§YNaissance :§! §L1889, comté de Zizhong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LEn 1905, Yu Peidi partit étudier au Japon avec son frère Yu Peilun. Il intégra une école militaire à Yokohama avant de retourner en Chine en 1908 pour tenter de rejoindre le soulèvement de Hekou, mais apprit son échec avant d'avoir pu regagner la Chine. Après avoir voyagé en Chine pendant un temps, Yu passa les années suivantes à naviguer entre le Japon et Guangzhou, jusqu'à ce qu'il apprenne le martyre de son frère lors du Second Soulèvement de Guangzhou.\n\nAprès cette tragédie, Yu rentra dans sa ville natale de Neijiang. Il participa activement au Mouvement de Protection des Chemins de fer et à la formation des gouvernements républicains dans le Sichuan, rejoignant les rangs de Xiong Kewu au passage. Yu continua de faire preuve de ses capacités de commandement sous les ordres de Dan Maoxin, suivant le "Régiment des Neuf Hommes" à Guangzhou après leur expulsion du Sichuan, alors que les officiers subalternes et les soldats du rang rentraient chez eux. Ayant appris la détention de Xiong Kewu et la privation de son commandement militaire par le KMT, Yu passa les années suivantes à Neijiang, effectuant occasionnellement des voyages au Japon et aux Légations. Désormais intégré aux divisions reconstituées de Xiong à Tongren, Yu reste un commandant fiable, bien que légèrement inexpérimenté, proche confident de Xiong et éminent interlocuteur auprès de l'intelligentsia locale.§!\n\n§YNotes : Au cours des dernières années, Yu a voyagé à plusieurs reprises au Japon et à Moscou avec Xiong Kewu pour rencontrer Hu Hanmin, restant un bon ami personnel de l'homme d'État.§!"

 #余際唐
 SZC_yu_jitang:9 "Yu Jitang"
 SZC_yu_jitang_commander_desc:9 "§YNaissance :§! §L6 décembre 1888, à Rongchang, Chongqing, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LÉtudiant dans une école privée de son village avant de s'inscrire à l'Académie du Sichuan oriental de Chongqing, Yu Jitang était un élève enthousiaste. Motivé à sauver la Chine des troubles, Yu se rendit au Japon à ses frais pour y étudier dans des académies militaires, et finit diplômé des Écoles du Génie, de l'Artillerie et des Mines maritimes.\n\nRevenu en Chine pour se joindre à la Seconde Révolution de 1913, Yu fut nommé commandant de la nouvelle flotte fluviale du Sichuan, combattant aux côtés de l'armée de Xiong Kewu mais fuyant vers le Japon après l'échec de l'opération. Yu retrouva Xiong Kewu lors de la Guerre de Protection de la Nation de 1915, au poste de quartier-maître en chef de Cai E. Pour la valeur qu'il avait démontré en se battant contre les armées du Yunnan et du Guizhou, il fut nommé commandant de la sixième division de l'Armée du Sichuan. Empêtré dans plus de conflits avec les militaristes du Sichuan dans les années 1920, Yu devint le chef d'une des meilleures divisions de "l'Armée de Répression des Bandits" de Xiong, et il fuit vers le sud avec Xiong une fois ses forces mises en déroute.\n\nYu fut également l'un des quelques détenus avec Xiong à la Forteresse de Humen, un acte de trahison qui le suit encore aujourd'hui. A sa libération, Yu passa quelques temps dans les Villes des Légations avant de rejoindre Xiong à Tongren, où Yu se distingua comme l'un des généraux les plus qualifiés de Xiong et un promoteur de la "Revitalisation industrielle", fusionnant aciéries et mines de charbon dans les faubourgs de la ville.§!"

 #趙渭濱
 SZC_zhao_weibin:0 "Zhao Weibin"
 SZC_zhao_weibin_high_command_desc:9 "§YNaissance :§! §L1893, à Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LFormé par Li Peifu, un érudit réformiste de renom à Chengdu, Zhao Weibin s'engagea dès ses débuts sur la voie de l'anti-impérialisme et du patriotisme. Après la Révolution Xinhai, Zhao participa avec détermination au programme de militarisation des étudiants du Grand Gouvernement Han du Sichuan, puis fut transféré à l'École des officiers de l'armée du Sichuan en 1912.\n\nEn 1914, après avoir obtenu son diplôme, il servit comme officier d'état-major dans la 1re division des forces de Xiong Kewu. En 1924, il suivit Xiong pour combattre le Zhili, et après la nomination de Xiong au sein des forces militaires du Kuomintang, il occupa successivement divers postes d'officier d'état-major dans différentes forces militaires du Sichuan. S'installant finalement aux côtés de Xiong dans sa campagne de guérilla à la frontière entre le Sichuan, le Guizhou et le Hunan, Zhao est un officier d'état-major féroce, doté d'un courage et d'une ferveur inébranlables.§!\n\n§YNotes : Pendant son temps libre, il consacre une grande partie de sa vie à l'étude de la littérature et s'est constitué une importante collection personnelle d'ouvrages, allant de "La collection de Yue Zhongwu Wang" aux œuvres de Li Dazhao, Lu Xun, Chen Duxiu, et même Marx.§!"

 #蕭毅肅
 SZC_xiao_yisu:9 "Xiao Yisu"
 SZC_xiao_yisu_army_chief_desc:9 "§YNaissance :§! §L11 décembre 1899, comté de Peng'an, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LExpulsé de l'école à un jeune âge pour avoir participé à des activités révolutionnaires, Xiao Yisu étudia à la prestigieuse Académie militaire du Yunnan grâce à l'aide financière de sa tante. Initialement dénué de toute conviction politique forte, il servit comme commandant de bataillon dans l'armée de Yang Sen avant de déserter pour rejoindre le général Tang Zimo, une figure plus alignée sur le Kuomintang du Sichuan.\n\nAprès la mort inattendue de Tang lors d'une purge du parti orchestrée par Chiang Kai-shek en 1925, Xiao fut relevé de ses fonctions et se montra légèrement déçu par le KMT, trouvant un emploi dans l'armée de Guo Rudong. Là, il passa la seconde moitié des années 1920 à commander des troupes sous les ordres de Guo tout en restant réceptif aux idéaux républicains. Frappé par le commandement arbitraire de Guo et renvoyé en 1932, Xiao devint apathique et passa du temps dans les Villes des Légations. Il retrouva une seconde jeunesse plus tard cette année-là, lorsque le Soulèvement de Shanghai poussa de nombreux porte-parole de la République chinoise à fuir vers l'Ouest par crainte d'être tués ou réprimés par la Ligue. Xiao se réfugia dans le Hunan, ne voulant pas être pris dans le chaos, et entra en contact avec divers intellectuels locaux, rejoignant Xiong Kewu lorsqu'il apprit que son expertise militaire pouvait à nouveau être utile. Au sein de l'état-major de Xiong, il se fit un nom grâce à son travail acharné et à son étude diligente du commandement militaire, faisant preuve de promesses dans les nombreuses batailles qui se profilent pour la cause fédéraliste.§!"

 #卞稚珊
 SZC_bian_zhishan:9 "Bian Zhishan"
 SZC_bian_zhishan_high_command_desc:9 "§YNaissance :§! §L1899, à Chongqing, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LDestiné à l'origine à une carrière dans les milieux académiques et artistiques, et recommandé par l'ami de son père, Yang Shukan, pour étudier à l'Académie Zhongyi de Nanjing, puis à l'étranger, Bian s'inscrivit plutôt à l'École des officiers de Baoding. Diplômé en 1920, il rejoignit l'armée de Xiong Kewu comme commandant de régiment adjoint avant d'être promu. Commandant des troupes sous les ordres de Xiong, Bian combattit avec conviction tout au long des années 1920, suivant même Xiong dans le Hunan puis le Guangdong, où il commanda une école de cadres d'officiers mineurs.\n\nAprès l'arrestation de Xiong Kewu au fort de Humen par le KMT en 1925, Bian fut relevé de ses fonctions et devint chef du département d'infanterie à l'Académie militaire de Zhu Peide, une filiale de Whampoa. Associé au comité des affaires de l'école de Whampoa jusqu'à la grâce accordée à Xiong par Hu Hanmin, Bian rejoignit son ancien supérieur en tant que chef d'état-major de la police militaire de Xiong. Général relativement jeune dans la cause fédéraliste du Sichuan, Bian était entièrement ouvert à la collaboration avec d'autres mouvements républicains et même avec les éléments les plus radicaux du KMT et du PSC. Pendant son séjour à Tongren, Bian acquit également une maîtrise dans le commandement et le recrutement de levées civiles et de milices, en plus de son infanterie régulière, ce qui s'avère utile pour éradiquer les bandits et naviguer sur les champs de bataille mouvants du Sichuan.§!\n\n§YNotes : En plus de ses fonctions régulières, Bian a également agi comme liaison de Xiong et chef à la fois du corps de garde de sécurité et de l'unité de travail civil à Tongren.§!"

 #李蔚如
 SZC_li_weiru:9 "Li Weiru"
 SZC_li_weiru_high_command_desc:9 "§YNaissance :§! §L1883, à Fuling, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LÉtudiant au Japon en 1904, Li Weiru rejoignit la Tongmenghui en 1906. Désigné par Sun Yat-sen pour retourner au Sichuan en 1907 afin d'y soutenir les efforts de la Tongmenghui, il conspira avec Xiong Kewu, Gao Yaheng et d'autres, aidant au développement de cellules révolutionnaires et à la révolution du Sichuan solidaire de Xinhai. Sur une période s'étalant sur plus d'une décennie, de 1911 à 1923, il servit comme commandant adjoint du gouvernement militaire de Fuling, chef d'état-major de l'armée de Shu, chef d'état-major du gouverneur et directeur de l'académie militaire du Sichuan.\n\nEn 1924, il prit sa retraite de l'armée et retourna à l'agriculture. En 1927, Li occupa divers postes locaux, levant des fonds pour établir des écoles progressistes. Restant en contact étroit avec Liu Bocheng et d'autres, Li finit par flirter avec les concepts de socialisme tels que prescrits par le Kuomintang de Gauche. Créant une armée paysanne à partir de 1926, Li s'engagea dans l'aventure politique du Sichuan, combattant des hommes comme Liu Xiang.\n\nAyant échappé de justesse à la mort, Li travailla avec Liu, et finalement avec le régiment progressiste des Neuf Hommes de Xiong Kewu, pour mener une campagne de guérilla contre les seigneurs de la guerre de Beiyang occupant le Sichuan. Ayant gagné les cœurs et les esprits de la paysannerie, Li s'est révélé être un atout vital pour le succès continu de la guérilla.§!"

 #劉光烈
 SZC_liu_guanglie:9 "Liu Guanglie"
 SZC_liu_guanglie_advisor_desc:9 "§YNaissance :§! §L1889, à Renshou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LAprès avoir pris part à la Révolution Xinhai en Chine, Liu Guanglie occupa les fonctions de directeur du gouvernement provincial du Sichuan et de représentant du Sud lors des pourparlers de paix Nord-Sud de 1919. Par la suite, il occupa divers postes, notamment ceux de commissaire de Nanchong et de Mianyang, avant de partir étudier le bouddhisme au Japon en 1924.\n\nDe retour avec le soutien d'autres bouddhistes, Liu fonda l'Institut de langue tibétaine au temple Ciyin à Beijing, invitant Dorje Jueba Geshe à enseigner la langue tibétaine et le bouddhisme tibétain.\n\nDe retour dans sa province natale après le soulèvement de Shanghai de 1932, Liu s'associa tacitement aux efforts de résistance progressiste de Xiong Kewu et de son Régiment des Neuf Hommes, œuvrant dans une mesure limitée en tant que fonctionnaire local sympathisant.§!"

 #石體元
 SZC_shi_tiyuan:9 "Shi Tiyuan"
 SZC_shi_tiyuan_advisor_desc:9 "§YNaissance :§! §L1890, comté de Xuanhan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LIntelligent dès son plus jeune âge, Shi Tiyuan excellait dans ses études et devint lettré à l'âge de 14 ans. En 1911, il fut diplômé de l'École supérieure de police du Sichuan et participa cette même année au Mouvement de Protection des Chemins de fer du Sichuan. Il lança un soulèvement anti-Qing, établit un gouvernement militaire local de district et devint membre du nouveau Gouvernement provincial révolutionnaire provisoire en 1912.\n\nEn 1914, il devint professeur de chinois dans une école locale, avant de devenir directeur général d'une société de transport du sel à Chongqing et président du Chongqing Commercial Daily. De 1916 à 1918, il servit dans la Huguojun comme officier d'état-major à divers postes, avant de retourner à son métier d'enseignant. En 1922, il fut secrétaire de Deng Xihou, secrétaire général et administrateur en chef de la garnison de Chongqing, et travailla au sein du département des finances provincial.\n\nEn 1927, Shi devint secrétaire général de la 3e division de Yang Sen, puis secrétaire de Pan Wenhua en 1928, et plus tard du gouvernement municipal de Chongqing, du bureau de l'éducation et du bureau de la sécurité publique. En 1932, il devint directeur du bureau d'inspection des marchandises de Chongqing, et en 1933 directeur général de Chongqing Electric Power. De 1934 à nos jours, Shi a exercé les fonctions de maire de Chongqing, œuvrant à la mise en œuvre de diverses réformes progressistes dans une ville en pleine expansion.§!"

 #胡子昂
 SZC_hu_ziang:9 "Hu Ziang"
 SZC_hu_ziang_advisor_desc:9 "§YNaissance :§! §LMars 1897, comté de Ba, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LAlors qu'il étudiait au collège du comté de Ba, la jeune vie étudiante de Hu Ziang allait être bouleversée par le déclenchement de la Révolution Xinhai à travers toute la Chine. Participant activement aux événements en tant que jeune étudiant, il entra ensuite à l'École supérieure d'agriculture de Beijing en 1919 et continua à manifester son esprit révolutionnaire en prenant part aux Émeutes de Novembre. Après avoir obtenu son diplôme en 1923, il retourna à Chongqing pour occuper les fonctions d'enseignant et de directeur dans son ancien collège, de président de l'Association des agriculteurs du comté et de directeur du Bureau de l'éducation de Chongqing.\n\nEntré dans l'armée en 1926, il servit dans l'armée de Liu Wenhui, avant de devenir directeur du Bureau des affaires frontalières du Bureau de supervision de la défense frontalière de Chengdu, dans le Sichuan. Contribuant au développement des fermes et des banques, parallèlement à l'interdiction de l'opium et à la réduction des impôts, il exerça brièvement une activité secondaire au Jiangxi en tant que membre de l'École d'agriculture, avant de retourner à Chongqing en 1933.\n\nCofondateur de la société industrielle Chongqing Huaxi, il supervisa diverses initiatives industrielles dans tout le Sichuan, devenant ainsi une sorte de magnat industriel renommé dans la province. Sympathisant de la cause de la FPDC, Hu entretient des contacts avec des membres de l'ANCDC de Huang Yanpei.§!"

 #熊哲帆
 SZC_xiong_zhefan:9 "Xiong Zhefan"
 SZC_xiong_zhefan_advisor_desc:9 "§YNaissance :§! §L1894, à Yanjingwan, comté de Jingyan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §fAUAF§!\n§YCarrière :§! §LFrère cadet de Xiong Kewu, Xiong Zhefan a fait ses études en France au début de sa vie, à une époque où le pays traversait une période de troubles nationaux sans précédent. Suivant de près les efforts de son frère, Xiong Zhefan a révélé ses véritables talents dans sa capacité à gérer les affaires administratives au nom de son frère. Talentueux et intransigeant, Xiong allait devenir de facto le chef civil de la zone de guérilla de Jinyang-Pingshan du Régiment des Neuf Hommes.§!"

 #李家鈺
 SZC_li_jiayu:0 "Li Jiayu"
 SZC_li_jiayu_bio:9 "Militaire de carrière, Li Jiayu obtint son diplôme de la quatrième promotion de l'École primaire militaire du Sichuan juste à temps pour participer à une armée étudiante pendant la Révolution Xinhai. Après la révolution, il s'inscrivit à la première promotion de l'Académie des officiers de l'armée du Sichuan, puis, en 1913, fut transféré à l'École préparatoire des officiers de l'armée de Nanjing. Au cours de l'été de la même année, Li Jiayu prit part à la première d'une longue série de révoltes contre Yuan Shikai, qui échouèrent finalement, et il retourna au Sichuan.\n\nEntré en troisième année à l'Académie des officiers de l'armée, Li Jiayu se retrouva au sein de la 4e division de l'Armée du Sichuan sous les ordres de Liu Cunhou, avant de devenir commandant de brigade dans la 3e division de Deng Xihou. Finalement promu major général de l'armée en 1923, Li devint commandant de la 1re division et, en 1926, se sépara du Département de Baoding de Deng Xihou pour aider à la formation du département des officiers.\n\nPendant leur exil, Li Jiayu réussit à maintenir vivante la flamme du républicanisme révolutionnaire dans le cœur de nombre de ses camarades cadres, et il est déterminé à poursuivre dans cette voie."
 SZC_li_jiayu_army_chief_desc:9 "§YNaissance :§! §L25 avril 1892, comté de Pujiang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §L$SZC_li_jiayu_bio$§!"
 SZC_li_jiayu_leader_desc:9 "§YNaissance :§! §L25 avril 1892, comté de Pujiang, province du Sichuan, Grand Qing§!\n§YCarrière :§! §L$SZC_li_jiayu_bio$§!"

 #羅澤洲
 SZC_luo_zezhou:0 "Luo Zezhou"
 SZC_luo_zezhou_sic_desc:9 "§YNaissance :§! §L1er juillet 1890, comté de Pujiang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LLuo Zezhou commença sa carrière en bluffant pour intégrer la deuxième promotion de l'École des officiers de l'Armée du Sichuan sous un faux nom, rejoignant la 2e division de l'Armée du Sichuan comme chef de section en 1914. En 1920, il rejoignit l'armée de Deng Xihou et fit la connaissance de son supérieur et futur compagnon d'armes, Li Jiayu. Progressant régulièrement dans les grades et exerçant les fonctions de chef de la police de Chongqing en 1923, Luo profita de ses succès contre Yang Sen en 1925 pour avancer sur Chengdu et s'emparer de ses principaux bureaux, étant nommé commandant de la 11e division en août de la même année.\n\nPassant la seconde moitié des années 1920 stationné à Suining, Luo rejoignit Li Jiayu dans la formation de la Société Qunyi, visant à attirer les anciens élèves de l'École des officiers dans leurs rangs. Luo prit part aux combats lors de la Guerre du Sichuan central de 1929, se mutinant contre son ancien supérieur Deng Xihou et menant ses troupes contre Liu Xiang, sortant finalement du conflit avec un bilan militaire mitigé mais un contrôle ferme sur Nanchong. Allié fidèle de Li Jiayu, sa carrière relativement longue est considérée comme précieuse par beaucoup, mais certains restent méfiants face à son leadership cruel et négligent.§!\n\n§YNotes : Conséquence naturelle de la culture forcée d'opium dans sa juridiction, presque tous les officiers de Luo, ainsi que la plupart de ses hommes, sont des toxicomanes à la valeur combat incertaine. Luo lui-même est devenu accro à l'opium et au tabac, ce qui lui vaut le surnom de "Luo le Cendrier".§!"

 #赖心辉
 SZC_lai_xinhui:9 "Lai Xinhui"
 SZC_lai_xinhui_high_command_desc:9 "§YNaissance :§! §LAoût 1884, comté de Santai, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LAprès avoir obtenu son diplôme de l'Académie de l'Armée du Yunnan en 1911, Lai Xinhui participa à l'insurrection du Double Neuf du Yunnan avant de rejoindre l'armée du Sichuan en tant que commandant d'un bataillon d'artillerie. Durant la fin des années 1910, il combattit dans l'armée de Liu Cunhou, progressant régulièrement et recevant de nouvelles pièces d'artillerie des arsenaux de Hanyang, gagnant en prestige après avoir secouru son supérieur à de nombreuses reprises lors de batailles contre Xiong Kewu et d'autres forces républicaines.\n\nL'invasion du Sichuan par les forces du Yunnan et du Guizhou tout au long des années 1920 vit Lai Xinhui passer sous le commandement de divers militaristes du Sichuan. Cependant, il fit la connaissance de Liu Chengxun en 1922 et resta un proche collègue durant les années suivantes. Le soutien de Lai au gouvernement du Zhili en 1924 porta ses fruits, car il fut nommé commandant de la 1re division du Sichuan, puis gouverneur du Sichuan en 1925, bien que Yang Sen le supplanta rapidement.\n\nDe retour au service sous Liu Chengxun, qui contrôlait désormais des zones dans le Sud du Xikang, Lai passa son temps à éliminer les bandits tant dans la région locale que dans ses propres rangs. La guerre du Sichuan central de 1929 s'avéra catastrophique pour Lai et Liu, car les deux hommes furent chassés du Xikang, Liu se retirant dans sa ville natale de Dayi et Lai rejoignant le Département des Officiers, emmenant avec lui ses hommes et des décennies d'expérience.§!"

 #陳蘭亭
 SZC_chen_lanting:9 "Chen Lanting"
 SZC_chen_lanting_high_command_desc:9 "§YNaissance :§! §L1887, comté de Shizhu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LÉtudiant fervent de l'École de la Forêt Verte et issu d'une vie de brigandage, Chen intégra l'armée en 1916 en dirigeant une bande d'hommes sous le commandement de Liu Bocheng. Suivant cette veine républicaine, il rejoignit l'armée de Xiong Kewu en 1920, puis fut promu commandant de brigade en 1923 avant de se rendre aux forces de Lai Xinhui en 1924 et de devenir son subordonné.\n\nLe séjour de Chen à Luzhou au sein de la 3e brigade de Lai Xinhui fut pour l'essentiel sans incident, mais provoqua de fortes tensions avec ses collègues comme Li Zhangfu. Cette tension permit à Chen d'être contacté par des guérilleros socialistes en 1926, qui saisirent l'opportunité de se joindre au soulèvement de Lushun. L'échec du soulèvement de Lushun et de l'Expédition du Nord vit Chen déserter successivement entre les différents seigneurs de la guerre de la province, passant des rangs de Liu Xiang à ceux de Yang Sen, puis revenant auprès de Lai Xinhui, où il resta tout au long des années 1930.\n\nPendant la guerre chaotique du Sichuan central, Chen joua un rôle relativement mineur, se concentrant principalement sur la défense de Neijiang et voyant peu d'actions ailleurs.§!\n\n§YNotes : Tout en conservant des liens importants avec les sectes fraternelles du Sichuan, les Paoge, Chen reste frère juré avec des personnalités telles que Fan Shaozeng, ainsi qu'avec des contrebandiers et des notables.§!"

 #李宗昉
 SZC_li_zongfang:9 "Li Zongfang"
 SZC_li_zongfang_high_command_desc:9 "§YNaissance :§! §L1891, à Mengyang, comté de Peng, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LEn 1909, Li Zongfang s'inscrivit dans la quatrième promotion de l'École primaire militaire du Sichuan, puis, après Xinhai, fut transféré à l'École des officiers de l'armée du Sichuan. Une fois diplômé, Li occupa diverses fonctions au sein de l'armée du Sichuan, allant de chef de section à commandant de bataillon, et prit part à la Guerre de protection nationale, au Mouvement pour la Protection de la Constitution, ainsi qu'à diverses escarmouches au sein du Sichuan. En 1923, il devint commandant de brigade, et en 1927, il était devenu commandant de brigade sous les ordres de Li Jiayu, gravissant progressivement les échelons.§!"

 #陳離
 SZC_chen_li:9 "Chen Li"
 SZC_chen_li_high_command_desc:9 "§YNaissance :§! §LMai 1892, comté d'Anyue, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LEngagé dans les rangs de l'armée étudiante de Chongqing dès les premiers jours de Xinhai, Chen Li intégra le département d'artillerie de l'École des officiers de l'armée du Sichuan, dont il sortit diplômé en 1915. Il futfréquemment promu durant son apprentissage sous le commandement de Li Jiayu dans l'armée de Liu Cunhou, commandant sa propre brigade dès 1925. Stationné dans les comtés du bassin du Sichuan, Chen servit de pilier de stabilité dans une région frappée par la pauvreté, la famine et l'insécurité en raison de sa proximité avec Chengdu.\n\nAu fil des ans, Chen intégra sans le savoir de nombreux membres du PSC dans sa brigade, qui exploitèrent sa position plus neutre envers le socialisme comme une opportunité de recruter pour leur propre cause. Cela culmina avec la mutinerie de Guanghan, menée par la branche du Sichuan occidental du PSC en tandem avec le soulèvement de Gujunba, au cours de laquelle les soldats ordinaires de l'armée de Chen Li se révoltèrent contre leurs officiers, ayant l'intention de rejoindre leurs compatriotes à l'est. Heureusement pour Chen, son retour rapide dans sa zone de garnison (ainsi que la dispersion des rebelles par les forces de Tian Songyao) rétablit l'ordre dans sa brigade.\n\nLa clémence de Deng envers Chen pour son erreur apaisa les tensions entre les deux hommes, ce qui se traduisit par l'ambivalence de Chen face à la rébellion de ses collègues Li Jiayu et Luo Zezhou en 1929. Connaissant à la fois les intérêts de Baoding et des Officiers, Chen maintient une ligne de neutralité, prêt à se ranger du côté de celui qui sortira vainqueur.§!"

 #旷继勋
 SZC_kuang_jixun:9 "Kuang Jixun"
 SZC_kuang_jixun_advisor_desc:9 "§YNaissance :§! §L16 juin 1895, comté de Sinan, province du Guizhou, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§! - §SFédération des Jeunes Soldats§!\n§YCarrière :§! §LAprès une jeunesse sans histoire, Kuang Jixun prit d'abord part à la Guerre de Protection de la Nation, combattant au sein de l'Armée du Sichuan de Lai Xinhui, avant de devenir commandant de régiment. Suivant son supérieur contre vents et marées, les sympathies progressistes inhérentes à Kuang se manifestèrent pleinement lorsqu’il adhéra à la Fédération des Jeunes Soldats. Collaborant tacitement avec des hommes tels que Liu Bocheng dans leurs opérations de guérilla, Kuang a permis aux guérilleros socialistes de bénéficier d'une voie semi-légale pour recevoir de l'aide et du matériel provenant des stocks de l'Armée du Sichuan.§!"

 #彭仕复
 SZC_peng_shifu:9 "Peng Shifu"
 SZC_peng_shifu_high_command_desc:9 "§YNaissance :§! §L1901, à Pujiang, Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§!\n§YCarrière :§! §LAprès avoir consacré ses premières années au service militaire, Peng Shifu prit le commandement du 12e régiment de la 5e brigade mixte au sein de l'armée du Sichuan dirigée par Li Jiayu. En 1935, il prendra le commandement du 9e régiment de la 3e brigade de la 104e division sous les ordres de Chen Shaotang. Pas plus tard qu'en 1936, Peng a été promu lieutenant-colonel dans l'Armée du Sichuan. En tant qu'officier subalterne servant sous les ordres de Li Jiayu, Peng Shifu est actuellement commandant du 619e régiment de la division de Li Jiayu.§!\n\n§YNotes : Il est réputé pour son charisme face à la guerre, sa loyauté indéfectible envers Li Jiayu et ses tactiques imprévisibles sur le champ de bataille.§!"

 #周從化
 SZC_zhou_conghua: "Zhou Conghua"
 SZC_zhou_conghua_advisor_desc:9 "§YNaissance :§! §L1896, à Xinfan, Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §lDépartement des Officiers§! - §SFédération des Jeunes Soldats§!\n§YCarrière :§! §LAprès avoir quitté l'école dès son plus jeune âge, Zhou Conghua s'engagea dans l'armée ; en 1917, il fut promu chef de section et s'inscrivit à l'École d'officiers parrainée par Liu Xiang. Une fois diplômé, il servit comme commandant de compagnie sous les ordres de Liu Yujiu au sein de l'armée du Sichuan, avant d'être transféré auprès de Liu Xiang après la défaite de ce dernier.\n\nInscrit à l'Académie militaire de Baoding par Liu, en partie pour surveiller les intrigues du Zhili, Zhou attira l'attention de Tang Zaili grâce à son assiduité, son esprit vif, sa bravoure et ses talents stratégiques. Tirant parti de sa relation avec Tang, Zhou transmettait toutes les informations relatives aux affaires du Sichuan à Liu Xiang. Après avoir obtenu son diplôme à Baoding, Zhou retourna au Sichuan, officiellement pour rejoindre l'armée de Liu Xiang en tant que major général et chef d'état-major du Bureau de pacification des frontières du Sichuan, bien qu'il fût sous la juridiction du département des officiers de Li Jiayu.§!\n\n§YNotes : Déterminé à sauver la nation, Zhou s'est mis à s'intéresser de près à la littérature socialiste, est devenu membre de la Fédération des Jeunes Soldats du Sichuan et a noué des contacts avec la FPDC dans cette province.§!"

 #呂超
 SZC_lu_chao: "Lü Chao"
 SZC_lu_chao_bio:9 "Originaire du Sichuan, Lü obtint son diplôme en 1909 à l'École primaire militaire du Sichuan. Il intégra ensuite la quatrième École secondaire militaire de Nanjing, qu'il quitta peu après pour rejoindre le Tongmenghui, le parti révolutionnaire de Sun Yat-sen, afin de résister et de lutter pour une Chine républicaine libre. Comme beaucoup d'autres de sa province, il fréquenta en 1910 l'Académie de Baoding, qu'il quitta lorsque la Révolution Xinhai éclata en 1911. Il se rendit ensuite à Shanghai, où il travailla avec Chen Qimei, Wang Jingwei et Li Shizeng (éminents collaborateurs du Dr Sun) jusqu'à ce qu'il soit contraint de fuir vers le Sichuan en exil après la prise du pouvoir par Yuan Shikai.\n\nEn 1915, la Guerre de Protection de la Nation éclata pour résister au régime de Yuan Shikai à Beijing, et Lü rejoignit son compatriote du Sichuan, Xiong Kiwu, au sein de l'armée de Cai E dans le Sichuan. Lorsque Chen Jiongming et le mouvement fédéraliste tentèrent d'expulser Sun Yat-sen du Guangdong, Lü prit le parti de Sun et combattit son ancien camarade Xiong Kiwu pour le contrôle du Sichuan. Il rejoignit ensuite Sun en exil à Shanghai et l'accompagna lors de son retour au Guangdong en 1923, devenant l'un des alliés de confiance de Sun au sein du Kuomintang. Lors de la malheureuse Expédition du Nord, Lü représenta les forces du Sichuan, et après l'échec de la mission, il s'enfuit une nouvelle fois en exil dans son Sichuan natal. Pourtant, malgré de nombreuses défaites, l'esprit révolutionnaire qui animait Lü ne s'éteignit jamais. Au contraire, il continua d'attendre son heure, croyant fermement aux principes incarnés par le défunt Président éternel du Kuomintang. Alors qu'il attendait en exil sous le régime de Yang Sen, qui avait repris le contrôle du Sichuan, il maintint ses contacts avec le Kuomintang à travers tout le pays."
 SZC_lu_chao_leader_desc:9 "§YNaissance :§! §L9 mars 1890, comté de Yibin, province du Sichuan, Grand Qing§!\n§YCarrière :§! §L$SZC_lu_chao_bio$\n\nAujourd'hui, avec la victoire des forces républicaines dans le Sichuan, Lü est devenu le leader de facto d'une alliance tendue entre le Kuomintang républicain et les Fédéralistes, prêt à réaliser la vision du président défunt pour une Chine libre et véritablement démocratique.§!"
 SZC_lu_chao_army_chief_desc:9 "§YNaissance :§! §L9 mars 1890, comté de Yibin, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PCorps industriel§!\n§YCarrière :§! §L$SZC_lu_chao_bio$§!"

 #鄧錫侯
 SZC_deng_xihou: "Deng Xihou"
 SZC_deng_xihou_leader_desc:9 "§YNaissance :§! §L24 mai 1889, comté de Yingshan, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LDeng s'engagea dans l'armée en 1906, puis s'inscrivit à l'Académie de Baoding, mais il interrompit par la suite ses études pour retourner au Sichuan lorsque la Révolution Xinhai éclata. Au fil des ans, Deng gravit les échelons jusqu'à être promu général en 1923. Le fait d'avoir été plus actif derrière un bureau que sur les différents champs de bataille pendant cette période troublée en Chine lui valut la réputation d'un carriériste fiable et compétent, même s'il n'en tira guère de gloire ni de fortune. Bien qu'il fût respecté parmi ses collègues du département de Baoding, il finit par être placé sous les ordres de Yang Sen, la Clique du Zhili favorisant le Département de l'Armement au détriment de celui de Baoding.\n\nBien qu'il n'ait pas les faveurs du Zhili, le Département de Baoding a réussi à coopérer avec le Département de l'Armement, ce qui lui a permis de combler le vide laissé au Sichuan par l'effondrement final de la clique de Yang Sen lors de la Guerre civile du Sichuan en 1936. En tant que figure de proue de l'aile la plus traditionaliste de la Clique de Baoding, ses réformes se concentrent sur le développement rural et l'amélioration du sort des agriculteurs du Sichuan. Le large soutien dont il bénéficie dans les campagnes et au sein de l'armée, combiné à celui dont jouit son partenaire de diarchie, Liu Wenhui, a placé le Département de Baoding dans une position de flexibilité politique rarement observée parmi les cliques de seigneurs de la guerre chinois. Il vise à faire du Sichuan une province modèle pour le reste de la Chine, faisant généralement passer le bien-être de la population du Sichuan avant l'idéologie ou les nobles ambitions expansionnistes.§!"
 SZC_deng_xihou_commander_desc:9 "§YNaissance :§! §L24 mai 1889, comté de Yingshan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §cFaction de Deng§!\n§YCarrière :§! §LAprès s'être engagé dans l'armée en 1906, Deng fut admis à l'Académie militaire du Sichuan. Une fois diplômé en 1909, il s'inscrivit à l'Académie de Baoding. À la suite de la Révolution Xinhai, Deng interrompit ses études et retourna au Sichuan pour y poursuivre son service militaire. Après la proclamation de la République de Chine, Deng rejoignit la 4e division du Sichuan sous les ordres de Liu Cunhou. Il occupa successivement le poste d'adjudant, puis gravit les échelons pour devenir commandant de bataillon en 1916, commandant de la cinquième brigade en 1917 et commandant de brigade indépendante en février 1918. De 1920 à 1923, Deng participa à diverses batailles dans le Yunnan, le Guizhou et le Sichuan, et se distingua suffisamment pour devenir commandant de la troisième division. En décembre de la même année, le gouvernement de Beijing établi par la clique du Zhili le fit promouvoir au grade de général. Il conserva ce grade après avoir été placé sous les ordres de Yang Sen lorsque celui-ci fut nommé gouverneur militaire du Sichuan.\n\nDeng est un carriériste pur et dur, dont le parcours professionnel comptait, au moment où il est devenu la figure de proue des diplômés de Baoding originaires du Sichuan, davantage d'affectations, de mutations et de promotions que de véritables combats. Si personne ne conteste ses compétences professionnelles, son expérience passée s'est avérée bien plus théorique que pratique par rapport à celle de ses pairs, plus aguerris au combat.§!"

 #田頌堯
 SZC_tian_songyao: "Tian Songyao"
 SZC_tian_songyao_bio:9 "En 1912, Tian s'engagea dans l'Armée du Sichuan au sein de la 4e division de Liu Cunhou. Bien qu'il eût été membre du Tongmenghui sous la dynastie Qing, Tian se rangea aux côtés de Yuan Shikai lors de la Seconde Révolution de 1913. Quelques années plus tard, lors de la Guerre de Protection de la Nation, Liu Cunhou finit par s'opposer à Yuan, et Tian occupait alors le grade de capitaine. En 1917, Liu lança une campagne pour reprendre Chengdu, s'empara avec succès de Chongqing et chassa les forces du Yunnan et du Guizhou du Sichuan.\n\nEn décembre, Tang Jiyao relança la guerre et repoussa Liu hors de Chengdu. Beijing réorganisa l'armée de Liu en 21e division et Tian fut promu major général. À la fin de l'année, Liu confia à Tian le commandement de la 21e division. Liu conclut une alliance avec Liu Xiang, et ensemble, ils chassèrent Xiong Kewu du Sichuan. En 1920, Xiong et Liu conclurent une alliance contre le Yunnan et chassèrent les forces yunnanaises du Sichuan. L'année suivante, Xiong s'allia avec Liu Xiang et ils chassèrent Liu du Sichuan.\n\nLa 21e division de Tian fut intégrée à la nouvelle structure du pouvoir du Sichuan. En 1922, Liu Xiang fut vaincu par Liu Chengxun, qui prit le contrôle de la majeure partie de l'ancien fief de Liu Xiang. Deng Xihou, originaire du Département de Baoding, mécontent du partage du butin, convainquit Tian, son camarade de promotion à Baoding, de se joindre à lui contre Liu, ce qui permit à la coalition de remporter la victoire. Lorsque Liu Cunhou revint au Sichuan en tant que subordonné de Yang, Tian se rallia à son ancien commandant, tout en conservant des liens avec les autres seigneurs de guerre au cas où."
 SZC_tian_songyao_leader_desc:9 "§YNaissance :§! §L1888, à Jianyang, province du Sichuan, Grand Qing§!\n§YCarrière :§! §L$SZC_tian_songyao_bio$§!"
 SZC_tian_songyao_high_command_desc:9 "§YNaissance :§! §L1888, à Jianyang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §aFaction de Tian§!\n§YCarrière :§! §L$SZC_tian_songyao_bio$§!"

 #黄隐
 SZC_huang_yin:9 "Huang Yin"
 SZC_huang_yin_high_command_desc:9 "§YNaissance :§! §L1890, à Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §cFaction de Deng§!\n§YCarrière :§! §LEngagé dans l'armée à l'âge de 17 ans et camarade de classe de Deng Xihou, Huang Yin étudia l'artillerie à l'Académie militaire de Baoding avant de rejoindre la Tongmenghui et de fabriquer des bombes pendant la Révolution Xinhai.\n\nDiplômé de Baoding en 1917 et intégré comme officier d'état-major au sein de l'une des nombreuses armées du Sichuan, il se retrouva sous le commandement de Liu Cunhou et de ses nombreux subordonnés, dont beaucoup sont devenus des généraux éminents à leur tour. Sa compétence en tant que commandant et ses relations amicales avec Deng Xihou jouèrent en sa faveur, car il fut nommé à la tête de l'Armée de défense fluviale du Sichuan par Wu Peifu en 1924. Le tact de Huang en politique civile fut également évident durant son mandat de maire de Chengdu de 1927 jusqu'à l'éclatement de la Guerre du Sichuan central à la fin de l'année 1929.\n\nDésormais stationné autour de la ville de Mianyang et de la rivière Fu qui la traverse, Huang gère bien ses hommes et a été tacitement accepté par la population locale. Parallèlement, il cherche à se concilier les partisans de la démocratie locale, bien qu'il reste profondément méfiant face à toute agitation socialiste qui pourrait en découler.§!\n\n§YNotes : Bien que Huang se soit élevé au rang de notabilité au sein du commandement de l'armée de Deng Xihou, il a fréquemment rejeté les suggestions de ses officiers lui conseillant de s'opposer à Deng et de tracer sa propre voie, restant obstinément loyal envers son supérieur et collègue.§!"

 #陳鼎勳
 SZC_chen_dingxun:9 "Chen Dingxun"
 SZC_chen_dingxun_high_command_desc:9 "§YNaissance :§! §L1892, comté de Jianyang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §cFaction de Deng§!\n§YCarrière :§! §LComme beaucoup de ses camarades, Chen Dingxun fut un proche associé de Deng Xihou, rejoignant ses rangs en tant que commandant de compagnie et aide de camp au quartier général de division après avoir obtenu son diplôme de l'école d'artillerie de l'Académie militaire de Baoding. Promu de commandant de régiment à chef de brigade au sein de l'armée de Deng, Chen reçut le titre honorifique de "Général Qiwei" du gouvernement de Beijing en 1924.\n\nAvec ce nouveau titre, Chen commanda la 3e division provisoire, passant nominativement au commandement de la 3e division officielle dans l'armée de Deng Xihou en 1927. Pendant la Guerre du Sichuan central, Chen ne participa que peu aux combats de première ligne, étant plutôt nommé surintendant de l'Administration Song-Li-Mao-Wen de Tuntian, une autorité coloniale établie par Deng pour superviser les affaires concernant les diverses tribus dans les montagnes du Nord et de l'Ouest du Sichuan. Comme beaucoup de ses autres collègues des rangs de Baoding, ses fonctions actuelles dans le Nord du Sichuan consistent à réprimer le banditisme et à maintenir la paix locale, en plus de préserver le système de plus en plus bureaucratique promulgué par son supérieur.§!\n\n§YNotes : Bien que Chen continue de s'acquitter de ses tâches et de suivre une formation, il est légèrement déçu par ce qui semble être une stagnation de sa carrière. Ainsi, si une opportunité se présentait, Chen pourrait tout à fait apporter son soutien à une autre personne.§!"

 #孙震
 SZC_sun_zhen:9 "Sun Zhen"
 SZC_sun_zhen_high_command_desc:9 "§YNaissance :§! §L5 février 1892, à Mianzhu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §aFaction de Tian§!\n§YCarrière :§! §LÉduqué de manière solide, mais profondément marqué par la mort de son père et de sa sœur en bas âge, Sun Zhen renonça à sa future carrière de lettré pour devenir soldat, intégrant l'Académie militaire de Baoding en 1912.\n\nSun, avec ses camarades de classe, participa activement au Mouvement de Protection des Chemins de fer ainsi qu'aux soulèvements qui s'ensuivirent à Wuchang et sur la côte Est. Cependant, Sun ne retourna pas à ses études après l'échec de la Seconde Révolution, et rentra à Chongqing pour préparer un autre soulèvement qui ne vit jamais le jour.\n\nAprès le drame de la mort de sa mère en 1914, Sun sombra dans le chômage avant de se voir offrir un poste de chef de section sous les ordres de Tian Songyao, grâce à l'intermédiaire d'un ami. Sun se distingua ensuite lors de la Guerre de Protection de la Nation en menant personnellement une escouade d'assaut de 40 hommes pour capturer la ville de Naxi, ce qui lui valut une promotion au commandement d'un régiment de cavalerie.\n\nIl continua de servir sous les ordres de Tian Songyao au sein de l'armée Jingchuan de Liu Cunhou, combattant désormais les forces de Xiong Kewu. C'est ici qu'il commanda une campagne audacieuse de trois semaines contre ses ennemis, recourant à tout, des attaques surprises aux leurres tactiques.\n\nEn gagnant en prestige au cours des années 1920 et 1930, Sun reste l'un des commandants les plus fiables de Tian Songyao, étant dépêché par ce dernier pour aider Liu Cunhou contre les guérilleros du Sichuan oriental et affinant sa maîtrise des terrains les plus difficiles du Sichuan.§!"

 #王銘章
 SZC_wang_mingzhang:0 "Wang Mingzhang"
 SZC_wang_mingzhang_high_command_desc:9 "§YNaissance :§! §L4 juillet 1893, dans le Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §aFaction de Tian§!\n§YCarrière :§! §LÉlevé principalement par son grand-oncle Wang Xintian, Wang Mingzhang obtint d'excellents résultats scolaires dans sa jeunesse et fut admis à l'École primaire de l'Armée du Sichuan à l'âge de 16 ans. Wang participa à de nombreuses campagnes anti-Qing, allant même jusqu'à quitter sa province pour se rendre à Shanghai afin d'attaquer l'arsenal de Jiangnan pendant la Seconde Révolution.\n\nDe retour au Sichuan, Wang s'engagea dans l'armée de Liu Cunhou et fut promu à plusieurs reprises au début des années 1920 pour ses services lors des guerres du Sichuan-Yunnan et des conflits internes au Sichuan, avant d'être affecté à la garnison de la ville de Deyang en 1924.\n\nL'échec de l'Expédition du Nord et la légère réorganisation de l'armée qui s'ensuivit entraînèrent le transfert de Wang à la tête de la Quatrième Division sous le commandement de Tian Songyao, où il continua à s'acquitter avec diligence de ses nouvelles fonctions. Dans le cadre de l'entraînement et des exercices de son armée, Wang s'efforça également d'intégrer des formations irrégulières dans ses rangs, renforçant ainsi ses capacités de combat.\n\nTout comme Sun Zhen, Wang se vit également confier par Tian une mission de "répression des bandits" ; il prit le commandement de ses troupes pour lutter contre les insurgés du PSC et du KMT dans le nord-est, où il se fit un nom grâce à son style unique, caractérisé par une grande audace en attaque et une ténacité sans faille en défense.§!"

 #董宋珩
 SZC_dong_songheng:9 "Dong Songheng"
 SZC_dong_songheng_high_command_desc:9 "§YNaissance :§! §L1889, à Pujiang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §aFaction de Tian§!\n§YCarrière :§! §LAprès avoir abandonné ses études à l'École primaire militaire du Sichuan, Dong Songheng obtint néanmoins son diplôme de l'Université militaire de Chongqing, puis de l'Académie militaire accélérée de l'Armée de Beiyang à Baoding en 1906. Rapatrié et condamné pour ses activités anti-Yuan Shikai, Dong rejoignit l'Armée de Défense nationale du Sichuan et servit comme officier d'état-major auprès de Xiong Kewu, puis comme commandant de bataillon sous les ordres de Liu Cunhou.\n\nParticipant aux Guerres de Protection de la Constitution et de Protection de la Nation, Dong combattit sous les ordres de Tian Songyao en 1921 pour le compte de Liu Cunhou. En 1924, il continua à gravir les échelons sous les ordres de Tian, pour finalement devenir commandant de sa propre division au sein de l'Armée du Sichuan, sous les ordres de Tian et de Sun Zhen. En 1933, il participa à diverses campagnes contre les guérilleros révolutionnaires et, en 1935, devint commandant adjoint de Sun Zhen au sein de l'Armée du Sichuan. Récemment, Dong a été promu au grade de général de division.§!"

 #邱延薰
 SZC_qiu_yanxun:9 "Qiu Yanxun"
 SZC_qiu_yanxun_sic_desc:9 "§YNaissance :§! §L1891, à Zizhong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §cFaction de Deng§!\n§YCarrière :§! §LMembre de la première heure du Tongmenghui, Qiu Yanxun a gravi les échelons de la Clique de Baoding, passant du poste de chef d'état-major adjoint du gouverneur militaire à celui de chef d'état-major de l'Armée du Sichuan de Deng Xihou, puis à celui de directeur du Bureau de la sécurité publique de Chengdu.§!"

 #胡临聪
 SZC_hu_lincong:9 "Hu Lincong"
 SZC_hu_lincong_high_command_desc:9 "§YNaissance :§! §Là Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §aFaction de Tian§!\n§YCarrière :§! §LProche collaborateur de Tian Songyao, Hu Lincong suivit Tian dans toutes ses opérations menées dans le Bassin Rouge, passant du grade de chef de section à celui de commandant de compagnie, puis de commandant de bataillon. En 1933, il fut admis à l'Académie militaire de Baoding et n'est revenu au Sichuan que récemment, après avoir obtenu son diplôme.§!"

 #马国荣
 SZC_ma_guorong:9 "Ma Guorong"
 SZC_ma_guorong_high_command_desc:9 "§YNaissance :§! §L20 septembre 1903, comté de Xichang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §cFaction de Deng§!\n§YCarrière :§! §LIssu d'une famille hui, Ma Guorong fut contraint de subvenir aux besoins de sa famille après le décès prématuré de son père et se lança dans le transport de marchandises locales entre Chongqing et Xichang. En 1923, Ma abandonna sa carrière dans les transports pour s'engager dans l'armée, s'inscrivant à la première promotion du Corps d'éducation militaire, fondé par Deng Xihou. Diplômé en 1924, il gravit les échelons pour atteindre le grade de commandant en 1930, puis, après avoir été muté à Chongqing en 1933, celui de lieutenant-colonel en 1935.§!"

 #劉文輝
 SZC_liu_wenhui: "Liu Wenhui"
 SZC_liu_wenhui_leader_desc:9 "§YNaissance :§! §L10 janvier 1895, comté de Dayi, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LMilitaire de carrière, Liu Wenhui est dans l'armée depuis l'âge de treize ans. Il entra à l'Académie militaire du Sichuan en 1911, puis à l'Académie militaire de Baoding en 1914, dont il sortit diplômé en 1916. S'il doit une grande partie de son succès et de son influence au népotisme et à des relations opportunes, il a néanmoins réussi à devenir une figure respectée et influente au sein de la clique. Après la fin de l'Expédition du Nord, Wenhui se rangea pleinement du côté de Deng Xihou et devint l'un des membres les plus notoires de la clique.\n\nAprès la défaite de son neveu Liu Xiang lors de la Guerre civile du Sichuan, le Département de Baoding est arrivé au pouvoir. Son amitié avec Deng Xihou lui a valu un poste de direction au sein de ce qui est devenu la diarchie du pays, où il représente - contrairement à son neveu - une branche plus réformiste de la diarchie. Populaire au sein de l’armée et de la classe administrative plus urbaine, il a permis au département d’élargir son soutien bien au-delà des électeurs conservateurs auxquels Xihou fait appel. S’il a peu de chances d’entrer dans les livres d’histoire comme l’un des plus grands chefs militaires de Chine, tant que la coopération entre les deux amis au sein de la diarchie se poursuivra, il restera certainement dans les mémoires pour ses efforts inébranlables visant à moderniser rapidement le Sichuan et à améliorer le sort des citoyens de la province.§!"
 SZC_liu_wenhui_high_command_desc:9 "§YNaissance :§! §L10 janvier 1895, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LLiu Wenhui a passé toute sa vie dans l'armée, son frère l'ayant inscrit à l'Académie militaire du Sichuan en 1911. Cela semble logique dans un certain sens, car la plupart de ses promotions ultérieures ont été obtenues soit grâce au népotisme de son frère Liu Wencai ou de son neveu Liu Xiang, soit grâce à ses relations avec un cercle d'influence, comme ce fut le cas avec l'Académie militaire de Baoding où il s'est inscrit en 1914.\n\nBien qu'il fût, de son propre aveu, un militaire dévoué et engagé depuis l'obtention de son diplôme de l'Académie militaire de Baoding en 1916, son parcours laisse beaucoup à désirer. Il convient notamment de noter que c'est sous son commandement que certaines parties de l'ouest du Xikang ont été perdues au profit du Tibet. Malgré le fait que ses débuts dans l'armée soient entachés de mauvais résultats, ses relations au sein du Département de Baoding et sa relative popularité dans les villes ont fait de lui une figure avec laquelle il faut compter.§!"

 #夏首勋
 SZC_xia_shouxun:9 "Xia Shouxun"
 SZC_xia_shouxun_army_chief_desc:9 "§YNaissance :§! §L1890, à Jiangjin, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LTémoin du déclin et des troubles nationaux de la fin de l'ère Qing, Xia fut admis à l'Académie militaire de Baoding et se prit d'intérêt pour les affaires militaires. Après avoir obtenu son diplôme, Xia rejoignit l'armée de Liu Xiang en tant que commandant de régiment avant de s'enfuir au Japon en 1915, craignant d'être poursuivi par les autorités de Yuan Shikai.\n\nÀ l'issue de la Guerre de Protection de la Nation, Xia retourna au Sichuan et rejoignit la division de Zhong Tidao avant de changer d'allégeance pour rejoindre Liu Wenhui lorsque celui-ci s'imposa. Combattant dans l'armée de Liu Wenhui contre divers adversaires, il fut promu au grade de commandant de division après l'échec de l'Expédition du Nord en 1927.\n\nOfficier compétent au sein de l'armée de Liu Wenhui, il prend bien soin de ses hommes tout en encourageant l'ingéniosité et la discipline lorsque cela s'avère nécessaire. Par conséquent, ses hommes sont motivés et d'une loyauté sans faille, prêts à obéir à tous les ordres de Xia contre vents et marées.§!\n\n§YNotes : Patriote dévoué, Xia est connu pour quitter de temps à autre sa zone de garnison afin de retourner dans sa ville natale de Jiangjin, où il développe les industries locales, renforce le commerce et consacre souvent ses propres fonds à la mise en place de projets hydroélectriques.§!"

 #向传义
 SZC_xiang_chuanyi:9 "Xiang Chuanyi"
 SZC_xiang_chuanyi_commander_desc:9 "§YNaissance :§! §L1886, comté de Renshou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LAprès avoir rejoint le Tongmenghui en 1902 et s'être engagé dans les milieux révolutionnaires, Xiang Chuanyi fut actif au Sichuan dès les années précédant Xinhai, rejoignant les rangs de Xiong Kewu lorsque la révolution éclata. Lors de la Seconde Révolution, cependant, Xiang fut contraint de fuir à Shanghai dans le chaos, puis quitta définitivement la Chine pour étudier à l'université Hosei au Japon.\n\nDe retour au Yunnan via l'Indochine en 1916, Xiang regagna le Sichuan aux côtés de Xiong Kewu. Au service de la coalition révolutionnaire, Xiang entra en contact avec les militaristes régionaux Deng Xihou et Tian Songyao, tout en se rapprochant davantage du Corps industriel qu'il ne le faisait de Xiong. L'expulsion de Xiong Kewu du Sichuan, d'abord par les forces du Yunnan-Guizhou, puis par les autres seigneurs de la guerre du Sichuan, amena Xiang à collaborer avec le Département de Baoding naissant.\n\nDe jure subordonné à Liu Wenhui, Xiang jouait en réalité le rôle d’un acteur autonome, uniquement soucieux des intérêts de Baoding. C’est cette dynamique qui conduisit à la nomination de Xiang Chuanyi à la tête du Bureau de commandement des Trois Armées en 1925, alors que le Département de Baoding contrôlait Chengdu, une solution de compromis pour le triumvirat en lutte pour le pouvoir. À ce poste, Xiang était chargé du dialogue entre Liu, Deng et Tian, tout en occupant officieusement les fonctions de chef de la police et de chef de la milice. Bien que le Bureau de commandement ait depuis été transféré à Ya'an en raison des hostilités avec Yang Sen, les fonctions de Xiang sont restées pour l'essentiel les mêmes.§!"

 #劉元瑄
 SZC_liu_yuanxuan:9 "Liu Yuanxuan"
 SZC_liu_yuanxuan_advisor_desc:9 "§YNaissance :§! §LAoût 1911, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LNeveu de Liu Wenhui, Liu Yuanxuan étudia avec assiduité dans sa jeunesse et, en 1925, il entra au collège Dacheng de Chengdu où il resta un an. Influencé par ses proches, il s'engagea dans l'armée et fut admis à l'école de formation locale de l'Armée du Sichuan de son oncle. Après avoir obtenu son diplôme, il servit comme capitaine de l'Équipe de Protection des Marchands de Xufu. Rapidement promu après la Guerre du Sichuan central, il devint bientôt commandant de la 13e brigade de l'armée de défense des frontières du Sichuan, stationnée à Hanyuan.\n\nEn 1934, Liu fut brièvement affecté à un corps de formation des officiers du Zhili à Lushan, et voyagea du Sichuan vers d’autres provinces, et même au Japon, ce qui influença profondément sa conception de l’impérialisme japonais. En conséquence, il se rapprocha de plus en plus des cercles progressistes, en particulier après l’afflux d’intellectuels démocrates qui déferla à l’intérieur du pays.§!"

 #吴景伯
 SZC_wu_jingbo:9 "Wu Jingbo"
 SZC_wu_jingbo_advisor_desc:9 "§YNaissance :§! §L1892, à Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LAprès avoir obtenu son diplôme de l'École primaire militaire du Sichuan et de l'École accélérée militaire du Sichuan, Wu Jingbo intégra la deuxième promotion de la section d'infanterie de l'École des Officiers de Baoding, dont il sortit diplômé dès 1916. En 1923, il devint directeur de l'état-major de la 9e division de l'Armée du Sichuan sous les ordres de Liu Wenhui, puis, l'année suivante, son chef d'état-major. En 1926, il collabora aux efforts menés à Baoding pour mettre en place un gouvernement unifié du Sichuan, puis, en 1927, il revint servir en tant qu'officier d'état-major de Liu Wenhui.§!\n\n§YNotes : Wu songe sans cesse à quitter l'armée pour se lancer dans la politique.§!"

 #汪雲翔
 SZC_wang_yunxiang:9 "Wang Yunxiang"
 SZC_wang_yunxiang_sic_desc:9 "§YNaissance :§! §L1886, à Jianyang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LLes débuts de Wang Yunxiang dans la carrière militaire furent rigoureux : non seulement il obtint son diplôme de la promotion accélérée de l'Académie militaire de Baoding en 1909, mais il fut également admis à l'Université militaire de Beijing, dont il sortit diplômé en 1916.\n\nFort d'une formation militaire aussi prestigieuse, il était très apprécié par tous ses supérieurs. Il commanda brièvement les troupes de Liu Xiang avant de devenir chef d'état-major de Liu Wenhui en 1927. Chargé de défendre l'arrière-garde du nord du Xikang pendant la Guerre du Sichuan central, Wang continua à s'attacher à renforcer la culture de la formation militaire au sein de ses rangs. Après avoir étudié le terrain local et analysé la capacité de combat de ses troupes lors d’escarmouches avec des bandits, il rédigea l’ouvrage « Géographie militaire » pour le département de formation de Liu Wenhui. Ce manuel fournissait aux officiers formés des connaissances sur les effets du mal des montagnes, le style et les techniques de combat de l’armée tibétaine, et constituait l’une des rares monographies régionales de géographie militaire de la Chine des seigneurs de la guerre.\n\nIl va sans dire que Wang s’est révélé être un formateur, un planificateur et un organisateur militaire chevronné, toujours ouvert aux nouvelles connaissances et prêt à vivre de nouvelles expériences. Cette maîtrise de l’éducation militaire a naturellement conduit à la nomination de Wang à la tête du corps de formation de Liu Wenhui et au poste d’instructeur tactique à l’École des officiers de l’armée du Sichuan.§!"

 #冷寅东
 SZC_leng_yindong:9 "Leng Yindong"
 SZC_leng_yindong_commander_desc:9 "§YNaissance :§! §L1894, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LAprès avoir rejoint le Tongmenghui en participant au Mouvement de Protection des Chemins de fer en 1911, Leng s'inscrivit à l'École des officiers de l'Armée du Sichuan avant d'errer à travers la Chine pour mener des activités révolutionnaires après Xinhai. Ce parcours, associé à son appartenance au Kuomintang, lui valut d'être emprisonné à Chengdu en 1915, mais il fut libéré peu après, suite à la reprise de la ville par l'APN.\n\nToujours impliqué dans les troubles politiques du Sichuan, Leng fut nommé commandant de bataillon sous les ordres de Luo Peijin avant de devenir lieutenant-colonel dans les rangs du seigneur de la guerre sichuanais Chen Hongfan en 1918. La défaite de Chen face à Yang Sen entraîna le transfert de Leng dans l'armée de Yang, puis dans celle de Liu Xiang après l'expulsion de Yang fin 1925. Au sein de l'armée de Liu Xiang, Leng commandait la 12e division, sous la supervision de Liu Wenhui, ce qui le fit peu à peu entrer dans le cercle de ce dernier.\n\nLeng a occupé une multitude de fonctions au sein du corps d'officiers de Liu Wenhui, l'une des plus importantes étant son rôle de médiateur de Liu à l'issue de la Guerre du Sichuan central. Il est également chargé de lutter contre la corruption parmi les fonctionnaires civils de la région et est un collègue fiable de Wang Yunxiang en tant que général de l'Armée de défense de Chuan-Kang.§!\n\n§YNotes : Outre la lutte contre la corruption et la consommation d'opium, Leng a également collaboré avec des personnalités telles que Xiang Chuanyi pour arrêter et exécuter des agents du PSC et des agitateurs à Xikang.§!"

 #劉文彩
 SZC_liu_wencai:9 "Liu Wencai"
 SZC_liu_wencai_sic_desc:9 "§YNaissance :§! §L1887, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LLiu Wencai, un propriétaire foncier influent et frère aîné de Liu Wenhui, est si présent dans le Sichuan qu’il s’est vu attribuer le surnom de "Liu le Tigre" en raison de son caractère autoritaire. En 1921, à la suite de la nomination de son frère au poste de commandant de brigade à Yibin, Liu devint directeur de la succursale de Yibin de la Compagnie du tabac et des alcools du Sichuan, du Bureau des taxes maritimes du Xunan, de la Division de protection des marchands du sud du Sichuan, de la Division d'enquête anti-opium du sud du Sichuan, du Bureau des impôts du sud du Sichuan, ainsi que lieutenant-général de la Campagne de secours rural du Xunan.\n\nGrâce à son immense influence, il imposa de lourds impôts dans le sud du Sichuan, taxant tout, des fleurs aux toilettes, en passant par la paresse. En 1927, il envoya des troupes pour assassiner Xu Jingbang, un membre éminent de l'Association des agriculteurs du comté de Pingshan, qui menait un mouvement de résistance contre ses lourds impôts. En 1928, Liu envoya la police militaire pour assassiner Li Xiaowen et Li Jiaxun, ainsi que divers autres membres d'organisations paysannes.\n\nEn 1931, Liu extorqua plus de 200 000 dollars en argent à Yibin en deux jours, puis les fit expédier chez lui, à Dayi. En 1933, Liu avait constitué un vaste empire foncier au Sichuan, comprenant plus de 12 000 acres de terres, 22 banques, 5 prêteurs sur gages, 684 maisons, 10 moulins, 29 manoirs et une importante collection d'or. Malgré cela, Liu s'est distingué par ses contributions significatives à l'enseignement primaire et par son aide aux pauvres par le biais de dons, ayant considérablement développé la province de Xikang.§!"

 #邵石痴
 SZC_shao_shichi:9 "Shao Shichi"
 SZC_shao_shichi_advisor_desc:9 "§YNaissance :§! §Ldans la province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LTrès respecté par Liu Wenhui, Shao Shichi s'est révélé un fonctionnaire compétent et un fidèle exécutant des manœuvres politiques de Liu à Chengdu, où il a occupé le poste de directeur du bureau de Liu. Soucieux de promouvoir la démocratie au sein du département de Baoding de Liu, Shao a lancé l'idée, aux côtés d'autres membres de l'entourage de Liu tels que Ma Zhemin, Huang Xianzhang, Yang Bokai et Li Xiangfu, de former leur propre société démocratique en coopération avec la Grande Alliance républicaine. Avec pour objectif ultime de préserver l'unité nationale, de persévérer dans la lutte anti-impérialiste, de s'opposer à la dictature et de mettre en pratique la démocratie, les véritables compétences de Shao brillent dans la gestion des finances de Liu Wenhui.§!"

 #曾庶凡
 SZC_zeng_shufan:9 "Zeng Shufan"
 SZC_zeng_shufan_advisor_desc:9 "§YNaissance :§! §L1897, à Nanxi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LDiplômé de la Faculté de droit de Beijing en 1925, Zeng Shufan retourna au Sichuan la même année et devint enseignant. Cofondateur du journal Le Nouveau Sichuan avec Chen Mingde et d’autres, il adhéra au Parti syndicaliste chinois en 1928 alors qu’il étudiait en France, où il suivait un cours d’économie politique à la Faculté des Lettres de l’Université de Paris. Participant aux programmes d'alternance travail-études et à la Ligue anti-impérialiste de l'Est, il a également publié le National Salvation Evening News.\n\nDe retour en Chine depuis peu, Zeng a demandé à adhérer à la FPDC, dont il est l'un des membres les plus résolument de gauche, et un proche collaborateur d'hommes tels que Zhang Lan, Zhang Dongsun et Zhang Junmai.§!\n\n§YNotes : Il est solidaire de la lutte menée par les guérilleros du Sichuan.§!"

 #李则民
 SZC_li_zemin:9 "Li Zemin"
 SZC_li_zemin_advisor_desc:9 "§YNaissance :§! §Lcomté de Shuangliu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §cDépartement de Baoding§! - §mFaction de Liu§!\n§YCarrière :§! §LIssu d'une famille de propriétaires terriens, Li Zemin possédait des centaines d'hectares de terres à Chengdu et à Shuangliu. Après s'être engagé dans l'Armée du Sichuan et avoir gravi les échelons jusqu'au grade de général sous les ordres de Liu Wenhui, Li considérait l'éducation comme la clé du salut national chinois. En 1930, en tant que l'un des officiers les plus haut gradés sous les ordres de Liu, il vendit les biens familiaux situés autour de Chengdu pour fonder le Collège privé Datong de Chengdu, en plein cœur de la ville.\n\nEn inculquant à ses élèves l'impératif moral du salut national, ainsi qu'une forme de militarisme civique, Li Zemin est devenu l'un des généraux les plus populaires et les plus respectés du Sichuan, même s'il s'est largement retiré du service actif.§!"

 #劉存厚
 SZC_liu_cunhou: "Liu Cunhou"
 SZC_liu_cunhou_leader_desc:9 "§YNaissance :§! §L24 janvier 1884, à Jianzhou, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LFils de riches marchands de sel, Liu Cunhou est davantage un bandit brutal qu'un stratège, et encore moins un gouverneur. Il fréquenta l'académie militaire du Sichuan en 1903, partit étudier au Japon en 1907, puis revint au Sichuan après avoir obtenu son diplôme en 1908. Il se fit un nom pendant la Révolution Xinhai, où il commença par diriger de petites forces anti-bandits avant de prendre la tête de troupes plus importantes, sa loyauté lui ayant valu la confiance de ses supérieurs. Cependant, lors des conflits auxquels il participa, ses troupes se préoccupaient souvent davantage d’extorquer des richesses aux habitants que de fonctionner comme une véritable force militaire. Alors que ses soldats se comportaient souvent comme des bandits, il réussit à s’imposer de force pour occuper une position de pouvoir relatif au Sichuan, bien qu’il ne se soit guère attiré la sympathie de la population.\n\nPendant la guerre civile du Sichuan, Liu Cunhou n'a guère contribué aux percées du Département de l'Armement, bien que ses forces aient été suffisamment nombreuses pour tirer parti de celles qui avaient été réalisées au cours du conflit. Comme il avait surtout l'habitude des opérations anti-banditisme, ses troupes ont passé la majeure partie de la guerre à débusquer les fidèles du Kuomintang et à achever les vestiges en déroute de la faction de Liu Xiang au sein du Département de l'Accélération. Grâce à cela, ses forces sont restées relativement intactes par rapport au reste du Département de l'Armement, ce qui lui a finalement permis de déjouer son soi-disant allié Yang Sen une fois la poussière retombée.\n\nSon règne en tant que gouverneur du Sichuan n'aura finalement été guère plus qu'une forme de banditisme de facto à plus grande échelle. Imposant d'innombrables taxes au peuple et utilisant son armée pour extorquer aussi bien les riches que les pauvres du Sichuan, il est rapidement devenu un tyran détesté qui ne parvient à se maintenir au pouvoir que grâce à une répression violente et à des pots-de-vin éhontés.§!"
 SZC_liu_cunhou_sic_desc:9 "§YNaissance :§! §L24 janvier 1884, à Jianzhou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LLiu Cunhou intégra l'Académie militaire du Sichuan en 1903. Il poursuivit ses études à l'Académie de l'Armée impériale japonaise en 1907 et en sortit diplômé en 1908, avant de retourner en Chine. Sa carrière militaire proprement dite commença lors de la Révolution Xinhai, lorsqu'il fut promu lieutenant-général par les commandants de Beiyang. Il mena ensuite une série de raids anti-bandits et gagna la confiance de ses supérieurs, au point de finir par commander des armées provisoires. Il est toutefois spéculé que cela tenait moins à ses capacités de commandant qu'à sa loyauté apparente en une période de conflit et de chaos.\n\nS'il parvint à pacifier les bandits et à gagner la confiance de ses supérieurs, il n'inspirait que le mépris des populations locales, ses armées se comportant aussi mal que les bandits qu'elles étaient censées combattre. Là où ses forces stationnaient, elles faisaient effectivement du racket de protection. Avare et moins soucieux de discipline que de doctrine militaire, il était mal vu par la plupart de ses pairs et était considéré comme un homme dénué d'acuité militaire durant la majeure partie de sa carrière. Cela dit, il resta l'archétype du seigneur de la guerre impitoyable et parvint à accumuler richesses et base de pouvoir redoutable.\n\nIl fut finalement subordonné à Yang Sen et chargé de maintenir l'ordre dans le nord du pays. Sa loyauté passée envers le Zhili lui a valu un poste élevé au sein du Département de l'Armement, malgré son parcours militaire irrégulier.§!"

 #廖振
 SZC_liao_zhen:9 "Liao Zhen"
 SZC_liao_zhen_army_chief_desc:9 "§YNaissance :§! §L1881, comté de Jianyang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LDiplômé de l'Académie militaire accélérée du Sichuan et ayant grimpé discrètement les échelons dans l'armée de Liu Cunhou, Liao Zhen se retrouva gouverneur et magistrat du comté de Wanyuan en 1923. En commençant son administration par la lutte contre les agitateurs et la répression des soulèvements, Liao fut transféré à Suining en 1925 avant d'être renvoyé à Wanyuan l'année suivante.\n\nMaintenant la neutralité pendant la majeure partie des luttes de pouvoir provinciales du Sichuan et s'intégrant au sein des rangs de l'Armée de défense de la frontière du Chuan-Shaan de Liu Cunhou, Liao Zhen passa la majeure partie de son temps à commander des troupes contre la persistance de l'Armée rouge du Sichuan oriental, recourant souvent à la collaboration avec des bandits pour éliminer les guérilleros. Cela n'aboutit malheureusement qu'à des succès limités, les 18 sommets formant les chaînes de montagnes environnantes de Wanyuan s'étant révélés complexes pour combattre, ce qui fut encore aggravé par la mauvaise logistique et la discipline au sein des formations de combat de Liao Zhen.\n\nNéanmoins, Liao Zhen continue de travailler à son poste sous Liu Cunhou, l'une des figures clés formant une nouvelle colonne vertébrale d'officiers au sein du Département de l'Armement.§!\n\n§YNotes : Malgré son héritage de brutalité envers les combattants de la guérilla dans le Sichuan oriental, où il est tristement célèbre pour avoir administré des punitions collectives et massacré les familles des insurgés, Liao est également connu par beaucoup à Wanyuan comme un philanthrope généreux, ayant fait don d'une grande partie de sa fortune pour la réparation et l'entretien des ponts et des digues fluviales.§!"

 #周道剛
 SZC_zhou_daogang: "Zhou Daogang"
 SZC_zhou_daogang_commander_desc:9 "§YNaissance :§! §L1875, comté de Shuangliu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LAprès avoir terminé ses études au Japon en 1904, Zhou passa les années suivantes en tant que directeur et instructeur militaire à l'Académie des forces armées du Sichuan. Après le déclenchement de la Révolution Xinhai en 1911, il occupa d'abord le poste de ministre de l'Armée du Sichuan, avant d'être appelé à Beijing en tant que conseiller, où il adhéra au Parti progressiste.\n\nLorsque la Guerre de Protection de la Nation débuta, Zhou se rangea du côté des forces de Cai E et fut nommé commandant de la 1re division de l'Armée du Sichuan. Après un bref passage au poste de gouverneur du Sichuan en 1917, Zhou resta largement en retrait jusqu'en 1925, date à laquelle Yang Sen accéda au pouvoir. Invité par Yang, il se retrouva à la tête des forces armées juste à temps pour l'Expédition du Nord. En tant que défenseur de l'unité trans-sichuanaise, Zhou s'est rapproché à la fois de la noblesse, de la Grande Alliance républicaine et de la Fédération des Partis démocratiques chinois.§!"

 #刘邦俊
 SZC_liu_bangjun:9 "Liu Bangjun"
 SZC_liu_bangjun_sic_desc:9 "§YNaissance :§! §L1890, comté de Jianyang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LÉtudiant dans une école privée à ses débuts, Liu Bangjun entra à l'École des Officiers de Baoding en 1907. Une fois diplômé, il rejoignit la Première Division de l'Armée du Sichuan de Zhou Jun comme commandant de compagnie, puis de bataillon, et enfin commandant de régiment. Appelé au combat lors de la lutte des seigneurs de la guerre du Sichuan, il fut ensuite promu adjudant général du gouverneur militaire, directeur du ravitaillement militaire, major puis finalement commandant de division.\n\nParticipant aux campagnes contre les guérilléros locaux, Liu fut promu lieutenant général, puis devint en 1935 commandant adjoint du Corps d'Entraînement des Officiers d'Emei.§!"

 #陈洪范
 SZC_chen_hongfan:9 "Chen Hongfan"
 SZC_chen_hongfan_advisor_desc:9 "§YNaissance :§! §Lcomté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LDisciple de l'érudit Li Xing, Chen Hongfan servit comme commandant de la Première Division de l'Armée du Sichuan après la Révolution Xinhai, et devint plus tard commandant de la 8e Division. Participant à la lutte des seigneurs de la guerre du Sichuan, il devint le "Roi de Jiading" lors de sa garnison à Leshan, dominant pratiquement la zone et levant de lourds impôts.§!"

 #赵荣华
 SZC_zhao_ronghua:9 "Zhao Ronghua"
 SZC_zhao_ronghua_high_command_desc:9 "§YNaissance :§! §L1873, comté de Huangxian, province du Shandong, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LFils d'une famille pauvre du Shandong, Zhao détestait étudier et travailler enfant, et en 1893 s'enfuit avec un ami dans la province du Zhili, où il rejoignit l'armée Yi. Ayant combattu en Corée pendant la Guerre sino-japonaise, il fut félicité par Ma Sanyuan pour son service et promu capitaine de garde. En 1900, Zhao mena un escadron de la mort et reconquit avec succès Caicun aux Japonais, ce qui lui valut d'être promu officier de garde. Après un bref mandat de commandant de garnison à Nanyuan et dans le comté de Yutian, il suivit Zhang Xun en 1907 dans le Jiangsu.\n\nAprès le soulèvement de Wuchang, Zhao se révolta pour les révolutionnaires à Nanjing, et en 1914 contribua à réprimer Bai Lang dans le Hubei. En 1917, Zhao combattit aux côtés de Wu Peifu contre Li Tiancai dans le Hubei, et en conséquence fut promu, servant ensuite comme général sous les ordres de Wang Zhanyuan. En 1920, Zhao détruisit le quartier général de Wu Guangxin dans le Hubei, le capturant vivant, et devint fonctionnaire local dans le Hubei. En 1923, il fut dépossédé de son pouvoir par Wu Peifu, et envoyé dans le Sichuan pour aider les efforts du Zhili sur place.\n\nAprès la Deuxième Guerre ZhiFeng en 1924, Zhao se regroupa avec Wu à Wuhan, servant dans un rôle de détachement de blocage, et en tant qu'inspecteur en chef du chemin de fer Beijing-Hankou. Supervisant la bataille du pont Hesheng pendant l'Expédition du Nord, Zhao fut contraint de battre en retraite vers Hankou, avant de contribuer à l'avancée du Zhili vers le sud dans le Hunan. Avec la victoire du Zhili, et sans place pour Zhao dans le Hubei, Wu l'envoya dans le Sichuan pour aider Liu Cunhou et Yang Sen.§!"

 #赵熙
 SZC_zhao_xi:9 "Zhao Xi"
 SZC_zhao_xi_advisor_desc:9 "§YNaissance :§! §L13 septembre 1867, comté de Rong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LNé dans une famille de paysans pauvres, Zhao Xi fréquenta une école privée en 1872, faisant preuve d'une intelligence remarquable dès son plus jeune âge. Maîtrisant les classiques à l'âge de 12 ans, il entama en 1879 une carrière poétique légendaire et devint lettré en 1882. En 1887, il échoua à l'examen provincial et partit étudier à l'Académie Jiufeng. Il échoua à nouveau à l'examen provincial en 1888, mais le réussit enfin en 1891, puis passa immédiatement l'examen impérial et, enfin, l'examen de la cour.\n\nAprès une période difficile en tant que fonctionnaire et éducateur, Zhao Xi acquit une véritable notoriété nationale en 1905, lorsque son œuvre originale, "Recueil de voyages du Nord", gagna en popularité, au point de lier une amitié étroite avec Liang Qichao. En 1909, il devint censeur du Jiangxi, réputé pour son impartialité et son intégrité. En 1911, il rejoignit le Mouvement de Protection du Chemin de fer du Sichuan et s'enfuit au Japon en 1912, où il rejoignit Kang Youwei et Liang. Proche collaborateur de Xiong Kewu et Yang Shukan, Zhao se retira du monde en 1914.\n\nEn 1916, il refusa un poste proposé par Cai E, préférant se consacrer à sa calligraphie et à son écriture. En 1929, il publia les annales locales de Rong County, un projet entamé en 1922, et établit une salle de littérature en 1930, fondant une école littéraire l'année suivante.§!\n\n§YNotes : Héros local du comté de Rong, Zhao est apolitique et figure parmi les "Cinq Anciens et Sept Sages" du Sichuan.§!"

 #尹昌齡
 SZC_yin_changling:9 "Yin Changling"
 SZC_yin_changling_advisor_desc:9 "§YNaissance :§! §L1869, comté de Huayang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LAprès avoir réussi l'examen impérial en 1888, Yin Changling entra à l'Académie Hanlin en 1889 et devint fonctionnaire ordinaire à la dissolution de celle-ci. Occupant les fonctions de magistrat et de préfet, il contribua de manière significative à la politique de réforme de la dynastie Qing dans la province du Shaanxi, ce qui lui valut le surnom de « Préfet des Huit Bureaux ». Après Xinhai, Yin occupa diverses fonctions au sein du gouvernement militaire du Sichuan, avant de démissionner lorsque Yuan Shikai s'empara de la présidence. En 1912, il entama une longue carrière consacrée à la philanthropie locale.\n\nAyant fondé diverses organisations caritatives et des orphelinats pendant le premier mandat de Yang Sen en tant que gouverneur du Sichuan, les organisations de Yin ne ressemblaient pas aux salles de charité typiques que l'on trouvait partout ailleurs en Chine, car elles se concentraient sur des solutions matérielles aux souffrances des gens, au point de gagner le respect personnel de Yang Sen. Après avoir bâti un empire industriel et social de taille, tout en consacrant sa vie à accueillir ceux que la société avait abandonnés, il est récemment devenu président du Comité provincial de secours du Sichuan.§!\n\n§YNotes : Très proche de la FPDC et de la GAR, Yin est lui-même connu pour ses liens étroits avec Zhang Lan.\nIl fait partie des "Cinq Anciens et Sept Sages" du Sichuan.§!"

 #劉師亮
 SZC_liu_shiliang:9 "Liu Shiliang"
 SZC_liu_shiliang_advisor_desc:9 "§YNaissance :§! §L1876, comté de Neijiang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §PArmement§!\n§YCarrière :§! §LJeune homme studieux et assidu, Liu Shiliang était particulièrement apprécié de ses professeurs. Cependant, insatisfait de leur manque de connaissances, il abandonna ses études et suivit un enseignement privé jusqu’en 1896, année du décès de son précepteur. Sensible aux idéaux de Kang Youwei, Liu soutint avec enthousiasme tant la Réforme des Cent Jours de la fin de la dynastie Qing que, par la suite, la Révolution Xinhai.\n\nCependant, sa désillusion face à la politique intérieure chinoise l'amena à fonder le Shiliang Suikan à Chengdu dans les années 1920. Critiquant les seigneurs de la guerre du Sichuan et d'autres personnalités politiques à travers des sketches humoristiques, de la poésie, des pièces de théâtre et des couplets, Liu se vit attribuer le surnom de "Maître de l'humour du Sichuan". Après avoir un peu trop dépassé les limites, Liu fut exilé à Shanghai par les mêmes seigneurs de guerre qu'il critiquait. Il n'est revenu que récemment, en 1935.§!"

 #楊森
 SZC_yang_sen: "Yang Sen"
 SZC_yang_sen_leader_desc:9 "§YNaissance :§! §L20 février 1884, à Guang'an, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LAprès s'être engagé dans l'armée en 1904, Yang Sen fit ses premiers pas en politique en adhérant à la Société Tongmenghui alors qu'il fréquentait l'École normale du Sichuan en 1906. Après avoir obtenu son diplôme en 1908, il servit dans la Nouvelle Armée du Grand Qing jusqu'en 1911. Son parcours et ses relations lui permirent de se faire remarquer lors de la Révolution Xinhai. Sous les ordres de Cai E, il fut finalement promu au grade de général en 1921 et affecté à Chongqing. Cette tendance à gravir les échelons grâce à ses relations politiques et à ses manœuvres plutôt qu'à ses exploits militaires se poursuivit lorsque Yang Sen devint un allié de Wu Peifu en 1925. Lorsque le Zhili devint la clique dominante au sein du Grand Qing restauré, Yang Sen fut élevé au poste de gouverneur du Sichuan.\n\nEn tant que gouverneur du Sichuan, Yang Sen se distingue des autres seigneurs de la guerre par son programme de modernisation rapide, tant sur le plan social qu'économique, porté par divers projets d'infrastructure et d'éducation qui ont amélioré la vie de nombreux habitants du Sichuan. Bien qu'il soit un chef militaire suffisamment compétent, le fait que Yang Sen doive une grande partie de son succès à son sens de la négociation et à son soutien aux bonnes personnes au bon moment l'a placé, lui et le Département de l'Armement, dans une position précaire. Sa position est encore fragilisée par son mode de vie, qui contredit ce qu'il prétend être le mieux pour le Sichuan, ce qui a limité son soutien public. Par exemple, il s'attire les foudres des éléments les plus conservateurs du Sichuan en s'élevant contre les rôles traditionnels des femmes et des pratiques telles que le bandage des pieds, puis gaspille toute la bonne volonté qu'il a pu obtenir des réformistes en ayant lui-même huit concubines et pas moins de trente enfants.\n\nMalgré ses nombreux défauts, il a réussi jusqu’à présent à se maintenir au pouvoir grâce à un soutien suffisant, tant de la part de l’armée que du peuple, pour rester une force avec laquelle il faut compter. Et tant qu’il sera aux commandes, le Zhili aura un allié fiable à Chengdu.§!"
 SZC_yang_sen_commander_desc:9 "§YNaissance :§! §L20 février 1884, à Guang'an, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aYang Sen§!\n§YCarrière :§! §LYang Sen s'engagea dans l'armée en 1904 et fréquenta l'Académie militaire du Sichuan, dont il sortit diplômé en 1908. Il servit ensuite dans la Nouvelle Armée Qing jusqu'en 1911. Son parcours et sa formation lui permirent de se faire une place de choix au sein de la clique militaire du Sichuan lorsque la Révolution Xinhai éclata la même année. Au cours de cette période, Yang servit sous les ordres du général Cai E, qui le promut au rang de général du Sichuan en 1921. Après avoir été affecté au commandement des forces de Chongqing, Yang Sen entra en conflit avec les autres seigneurs de la guerre de la province, notamment Xiong Kewu et Liu Xiang. Malgré ses tentatives pour affaiblir ses adversaires, il ne parvint jamais à ses fins.\n\nSa position de gouverneur militaire du Sichuan tient bien plus à ses liens avec Wu Peifu et la clique du Zhili qu’à ses exploits militaires. Cela dit, il n’est en aucun cas un chef militaire incompétent, loin s’en faut, puisqu’il s’est montré à la hauteur lors des guerres précédentes et a maintenu l’importance du Département de l'Armement au Sichuan tout au long de son mandat de gouverneur.§!"

 #范紹增
 SZC_fan_shaozeng: "Fan Shaozeng"
 SZC_fan_shaozeng_high_command_desc:9 "§YNaissance :§! §L1894, comté de Dazhu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LSurnommé "Fan Ha'er" dès son plus jeune âge, Fan Shaozeng était connu pour son aversion des études, son goût pour les contes dans les théâtres et son aspiration à une vie chevaleresque à la manière de Robin des Bois. Suite à ces ambitions douteuses, Fan rejoignit l'une des nombreuses sociétés secrètes du Sichuan, où il fut initié au Tongmenghui et à d'autres mouvements révolutionnaires.\n\nTout au long des années 1910, Fan continua de consolider son influence et participa à des activités révolutionnaires au sein de la Gelaohui locale, s'opposant d'abord à la dynastie Qing, puis aux éléments pro-Yuan présents au Sichuan. Il intégra l'armée de Xiong Kewu en 1920, mais la quitta rapidement après avoir perdu confiance en son commandement, probablement en raison de ses origines moins intellectuelles. Avec l'ascension de Yang Sen au Sichuan en 1923, Fan intégra rapidement ses forces, devenant commandant de la 9e Brigade mixte et reprenant la majeure partie des troupes de Yang après l'échec de sa tentative d'unification provinciale en 1925. Continuant de servir sous les ordres de Yang pendant la Guerre du Sichuan central, Fan se distingua par son style de commandement polyvalent et adaptable, utilisant souvent des irréguliers ou des détachements mobiles rapides.§!\n\n§YNotes : Fan a passé une grande partie des années 1930 dans les Légations, profitant du désordre du Soulèvement de Shanghai pour non seulement cultiver de bonnes relations avec les membres du crime souterrain, comme Du Yuesheng, mais aussi faire passer des armements britanniques modernes en remontant le Yangtsé pour armer ses propres hommes.§!"

 #賀國光
 SZC_he_guoguang: "He Guoguang"
 SZC_he_guoguang_high_command_desc:9 "§YNaissance :§! §L1885, comté de Puqi, province du Hubei, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LAyant intégré l'école de l'armée du Sichuan en 1903, He Guoguang étudia aux côtés de figures majeures du Sichuan telles que Yang Sen et Liu Xiang. Cependant, lorsque la Révolution Xinhai éclata, il retourna dans son Hubei natal et participa à la bataille de Wuchang. Après avoir suivi une quatrième année et obtenu son diplôme en 1916, il servit sous les ordres de Kou Yingjie pendant un temps en tant que commandant de brigade, avant de briller par ses propres moyens et d'être promu commandant de la 5e division de l'armée de Wu Peifu.\n\nInitialement en perte de vitesse lors de l'Expédition du Nord, He parvint à défendre sa province natale contre l'avancée du Kuomintang. Arrivant tardivement dans la faction "Luoyang" de la Clique du Zhili, il est membre du groupe des inspecteurs généraux. En raison de ses actions dans le Hubei, il se vit confier la responsabilité de la démobilisation et de la réorganisation de l'armée pour le Zhili après 1927.\n\nRécemment, He a été chargé du renseignement et des travaux administratifs du gouvernement central au Sichuan, et par extension, dans tout le Sud-Ouest, où il supervise les mouvements militaires locaux et gère les communications entre Luoyang et le Sichuan.§!"

 #郭汝栋
 SZC_guo_rudong:9 "Guo Rudong"
 SZC_guo_rudong_army_chief_desc:9 "§YNaissance :§! §L1889, comté de Tongjiang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LAyant abandonné le collège de la préfecture de Chongqing à un jeune âge, Guo Rudong rejoignit plutôt la Tongmenghui, puis une escouade suicide à Chongqing durant la Révolution Xinhai. En 1912, il intégra l'École des officiers de l'armée du Sichuan pour y étudier l'ingénierie, et après son diplôme, il s'engagea dans la 2e division de l'Armée du Sichuan sous Liu Cunhou en 1914. En 1916, il combattit dans la Guerre de Protection de la Nation contre Yuan Shikai, remportant de nombreuses distinctions et une promotion.\n\nEn 1917, il participa aux campagnes du Sichuan-Yunnan et du Sichuan-Guizhou, et devint commandant de division en 1920. Après une nouvelle promotion en 1923 et son enrôlement sous les ordres de Yang Sen, Guo suivit fidèlement son supérieur jusqu'à sa propre défaite. En 1925, il devint brièvement dirigeant intérimaire des forces de Yang Sen, et en 1926 rejoignit Yang Sen pour déposer Liu Xiang, servant ensuite dans les campagnes militaires contre les divers groupes de guérilla dans l'est du Sichuan.§!\n\n§YNotes : Il entretient une relation maître-élève avec Li Weiru, et fait preuve de pragmatisme avec des hommes tels que Liu Xiang.\nIl jouit d'une réputation extrêmement positive dans la ville de Yinjia.§!"

 #杨汉域
 SZC_yang_hanyu:9 "Yang Hanyu"
 SZC_yang_hanyu_advisor_desc:9 "§YNaissance :§! §L1905, à Guang'an, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LYang Hanyu, le jeune neveu de Yang Sen, vivait avec la famille Yang ; il entra dans la 19e promotion de l'Académie militaire de Kunming, puis dans la 3e promotion de l'Académie militaire de Baoding. En 1925, Yang était commandant de la 1re brigade mixte de l'Inspection des affaires militaires du Sichuan. Au service de son oncle pendant la Guerre du Sichuan central, il participa par la suite à des campagnes contre les ennemis de son oncle et contre les guérilleros insurgés du Sichuan oriental.§!"

 #夏炯
 SZC_xia_jiong:9 "Xia Jiong"
 SZC_xia_jiong_sic_desc:9 "§YNaissance :§! §L1897, à Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LVétéran aguerri des mêlées du Sichuan, Xia Jiong commença sa carrière au premier bataillon d'infanterie de l'Académie militaire de Luzhou, dirigée par Yang Sen lui-même, et intégra rapidement les rangs de Yang après son diplôme. Pendant la brève période où Yang dirigeait le Bureau de supervision des affaires militaires du Sichuan en 1925, Xia servit comme capitaine au deuxième bataillon de garde du Bureau. Xia continua d'être promu à des postes proches de Yang, devenant en 1927 le chef du régiment de garde du quartier général de Yang.\n\nEnfin, après la Guerre du Sichuan central en 1934, il prit un poste de combat sur le front, commandant diverses brigades mixtes et étant félicité par Yang Sen comme un leader extrêmement efficace. Bien que considéré comme très loyal et vu comme le second de Yang Sen, il est l'un des rares nouveaux généraux nommés par Yang Sen par mérite et non par népotisme. En tant que tel, Xia se retrouve souvent en désaccord avec certains des propres parents du général Yang, tels que Yang Hanyu et Yang Gancai, qu'il considère comme incompétents et indignes de commandements militaires. En tant que confident principalement militaire de Yang, Xia s'est également impliqué davantage dans les affaires civiles au fil des ans, entretenant des liens avec Mu Zibin et des contremaîtres de l'Association de Construction des Routes du Sichuan.§!\n\n§YNotes : Commandant déterminé et agressif, Xia est vénéré par ses subordonnés pour avoir équipé ses officiers de garde de sabres et d'épées pour abattre tout soldat osant battre en retraite ou déserté le champ de bataille.§!"

 #周维桢
 SZC_zhou_weizhen:9 "Zhou Weizhen"
 SZC_zhou_weizhen_high_command_desc:9 "§YNaissance :§! §L1890, comté de Tongliang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LÉtudiant dans une école privée de sa ville natale, Zhou Weizhen était réputé pour son excellence académique, son talent et son caractère. En 1906, Zhou quitta sa famille et s'inscrivit à l'École primaire de l'armée du Sichuan, où il excella dans ses études. Grâce à ses résultats, il fut envoyé à l'École militaire intermédiaire n°3 de Wuchang en 1909, et participa activement au Soulèvement de Wuchang. En 1912, il intégra la première promotion du corps des intendants à l'École des officiers de l'Armée de Baoding, et en sortit diplômé en 1914.\n\nL'année suivante, Zhou s'engagea sous les ordres de Liu Cunhou en tant qu'officier d'état-major, combattant dans la Guerre de Protection de la Nation, et en 1917, il fréquenta l'Université de l'armée pour poursuivre ses études. En 1919, il devint instructeur tactique à l'Académie accélérée du Sichuan, et servit sous les ordres de Yang Sen. En 1929, Zhou était instructeur à l'École centrale des intendants de l'armée, directeur du département des intendants et officier d'état-major supérieur de l'armée de Yang Sen. En 1935, Zhou devint directeur adjoint des transports entre Chongqing et Luoyang, établissant une ligne directe entre le gouverneur Yang et le Maréchal de Jade.§!\n\n§YNotes : Bien que tacticien compétent, Zhou est un musicien renommé, érudit et calligraphe, et est connu pour son cœur bienveillant.§!"

 #穆子斌
 SZC_mu_zibin:9 "Mu Zibin"
 SZC_mu_zibin_advisor_desc:9 "§YNaissance :§! §L1892, comté de Yichang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §nPJC§!\n§YCarrière :§! §LÉtudiant à l'Académie Liuyi dès son plus jeune âge, puis au Lycée Yiling, Mu Zibin intégra l'École de droit de Wuchang en 1916. Après avoir été transféré à l'Université Chaoyang de Beijing pour étudier le droit, il obtint son diplôme et se rendit au Japon en 1921 pour étudier à l'École de droit de Tokyo à ses propres frais. En 1925, il retourna en Chine et obtint le poste de magistrat du comté de Wuxi.\n\nEn route vers son poste, il rencontra des bandits, ses biens furent volés et son escorte fut massacrée. Mu, caché dans une cabane, s'échappa et fuit vers Yichang, son père lui interdisant de jamais servir à nouveau comme fonctionnaire. Lors de l'entrée de Yang Sen dans Yichang, Mu Zibin commença à servir comme conseiller du général, dirigeant le Quotidien de Yichang. En 1928, Mu demanda à la garnison locale du Sichuan de réprimer une révolte paysanne et entama une série de productions littéraires au début des années 1930 visant à promouvoir les efforts d'unification du Zhili.§!\n\n§YNotes : Assez corrompu mais ferme dans la gestion économique, Mu Zibin est un adepte récent mais dévoué du Parti Jeune Chine.§!"

 #劉咸滎
 SZC_liu_xianying:9 "Liu Xianying"
 SZC_liu_xianying_advisor_desc:9 "§YNaissance :§! §L1857, comté de Shuangliu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aFaction de Yang Sen§!\n§YCarrière :§! §LSélectionné comme boursier d'honneur en 1894, Liu Xianyang allait gravir les échelons de la société pour devenir un éminent érudit confucéen de l'époque Qing et un éducateur. Après avoir occupé les fonctions de secrétaire d'État et de membre du Conseil consultatif provincial du Sichuan, Liu enseigna à l'Académie de Zunjing et à l'Université normale du Sichuan, avant de devenir rédacteur en chef de la Chronique du comté de Shuangliu.\n\nEnseignant à l'Académie Guixin, il fonda en 1918 le Bureau public de Leshan, consacrant 70 % des recettes tirées de ses activités quotidiennes de calligraphie à l'aide aux sinistrés. En 1931, il publia des avis visant à promouvoir l'aide sociale et l'assistance à la communauté locale.§!\n\n§YNotes : Comptant parmi les "Cinq Anciens et Sept Sages" du Sichuan, le rôle de Liu à la cour de Yang Sen évoque avec force les images des lettrés qui fréquentaient autrefois les cours des ducs.§!"

 #劉湘
 SZC_liu_xiang: "Liu Xiang"
 SZC_liu_xiang_leader_desc:9 "§YNaissance :§! §L1er juillet 1888, comté de Dali, province du Sichuan, Grand Qing§!\n§YCarrière :§! §LL'ascension de Liu Xiang débuta en 1920 lorsqu'il aida à mener les forces du Sichuan à la victoire sur le Yunnan. Il monta en grade et finit par commander un large contingent de forces sichuanaises contre le Kuomintang lors de l'Expédition du Nord. Au cours de ce conflit, il réussit à gagner la réputation d'un commandant talentueux mais imprudent, avec de nombreuses victoire à son crédit. Une fois l'Expédition du Nord défaite avec fracas, il retourna au Sichuan et fut assigné à Chongqing comme chef de la garnison de la ville.\n\nBien que sa performance au cours de ce conflit lui ait permis d'établir sa propre clique et de rester une force avec laquelle il faut compter au Sichuan, il ne reçut jamais le gouvernorat de la province qu'il pensait mériter. À la place, il devint un subordonné de Yang Sen, un larbin loyal de Wu Peifu et du Zhili. Liu Xiang vécut cela comme une insulte et du copinage mesquin. Par conséquent, il commença à nourrir un ressentiment profond envers Yang Sen, le Zhili et leurs marionnettes du Département de l'Armement.\n\nCe ressentiment l'a conduit à saisir l'occasion après la chute de l'hégémonie Qing aux premiers jours de 1936. Après avoir rallié avec succès ses subordonnés du Département accéléré contre Yang Sen, Liu Xiang a réussi à prendre Chengdu et à vaincre à la fois les départements de l'Armement et de Baoding par une série de paris militaires audacieux au cours de la Guerre civile du Sichuan. Après s'être proclamé gouverneur du Sichuan et avoir déplacé la capitale de la province de Chengdu au centre industriel de Chongqing, il a entrepris de moderniser rapidement la région, espérant pouvoir enfin régler ses comptes avec le Zhili.§!"
 SZC_liu_xiang_commander_desc:9 "§YNaissance :§! §L1er juillet 1888, comté de Dayi, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LAprès avoir obtenu son diplôme de l'École militaire du Sichuan en 1909, Liu Xiang gravit les échelons de l'armée jusqu'à devenir commandant en chef de l'armée du Sichuan en 1919. Lorsque la guerre éclata entre le Sichuan et le Yunnan en 1920, Xiang remporta ses premiers succès militaires en repoussant les forces envahissantes des seigneurs de la guerre. À la fin de la guerre, en 1921, il fut chargé de diriger la garnison de Chongqing. Pendant cette période, il s'imposa comme une figure incontournable et acquit une influence considérable dans le cœur industriel du Sichuan.\n\nLorsque le Kuomintang lança l'Expédition du Nord, Liu Xiang mena ses forces contre eux. Au cours de cette guerre, il se forgea une réputation de commandant audacieux grâce à une série de batailles défensives et de contre-offensives parfois téméraires. Après la défaite du Kuomintang, il retourna au Sichuan où il fut placé sous les ordres de Yang Sen, désormais gouverneur du Sichuan. Bien qu'il ait considéré cela comme une insulte, il conservait néanmoins une force importante qui lui restait fidèle. Grâce en grande partie à ses succès dans la répression de l'Expédition du Nord, il est un commandant militaire respecté et un puissant seigneur de guerre à part entière.§!"

 #潘文華
 SZC_pan_wenhua: "Pan Wenhua"
 SZC_pan_wenhua_sic_desc:9 "§YNaissance :§! §L16 octobre 1886, comté de Renshou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LLaissant sa famille en difficulté pour trouver des moyens de joindre les deux bouts à Chengdu, Pan Wenhua trouva un emploi irrégulier comme apprenti dans un magasin de chapeaux avant de se voir conseiller de rejoindre la Nouvelle Armée Qing. Cela marqua le début de sa carrière militaire, où il servit comme aide de camp avant d'être officiellement incorporé dans l'armée comme soldat deux ans plus tard.\n\nDiplômé de l'École accélérée de formation des officiers de l'armée du Sichuan en 1909, il était alors camarade de classe de Liu Xiang. Dans les années 1910, Pan combattit sous plusieurs commandements ; au sein de la Nouvelle Armée Qing au Tibet, sous les généraux sichuanais Zhong Tidao et Liu Cunhou, avant d'acquérir suffisamment de force militaire pour tenir garnison dans sa propre région pendant un temps. Chassé de ses positions autour de Bazhong par Tian Songyao en 1920, Pan se joignit à son bon ami Liu Xiang, devenant rapidement l'un des généraux les plus fiables de Liu et le commandant du Commandement de Pacification du Sichuan oriental en 1923. Alors que Liu Xiang consolidait ses positions autour de Chongqing, Pan occupait également des postes aux côtés de son frère Pan Chongyou dans des affaires civiles, servant simultanément comme directeur du Bureau de supervision du port commercial de Chongqing avant d'être nommé maire de Chongqing en 1929.\n\nLa Guerre du Sichuan central vit Pan combattre sous le commandement de Liu Xiang, conseillant Liu à des moments clés du conflit. Dans son sillage, Pan fut assigné par Liu pour diriger le Commandement de répression des bandits du Sud-Sichuan contre divers bandits et les insurgés du KMTD dirigés par Lü Chao autour de Yibin.§!"

 #唐式遵
 SZC_tang_shizun: "Tang Shizun"
 SZC_tang_shizun_high_command_desc:9 "§YNaissance :§! §L1883, comté de Renshou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LDans un premier temps contraint par son père à embrasser la carrière de lettré, Tang Shizun renonça résolument à la vie littéraire pour se consacrer à la carrière des armes. En 1906, il intégra une unité militaire et entra à l'École de formation accélérée de l'Armée du Sichuan, où il côtoya des figures telles que Pan Wenhua, Liu Xiang, Wang Zuanxu et Yang Sen. Ancien camarade de la 33e brigade avec Pan Wenhua, le duo finit par servir leur vieil ami Liu Xiang.\n\nAssistant Liu à l'image de Pan, Tang conseilla ce dernier lors de l'invasion du Sichuan par Cai E en 1916, permettant à Liu de remporter de nombreuses victoires sur les Yunnanais. Toujours désireux d'obtenir sa prochaine promotion, Tang se montra de plus en plus insatisfait, car il devait constamment endurer le fait de vivre dans l'ombre de Liu Xiang.\n\nNéanmoins, Tang continue de conseiller Liu Xiang sur les questions militaires, se révélant un subordonné compétent, malgré ses ambitions démesurées.§!"

 #郭勛祺
 SZC_guo_xunqi:0 "Guo Xunqi"
 SZC_guo_xunqi_commander_desc:9 "§YNaissance :§! §L1883, comté de Huayang, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LNé dans une famille paysanne, Guo Xunqi rejoignit l'armée du Sichuan comme soldat en 1912 et participa à la campagne contre le Tibet. De retour à Chengdu, il intégra les rangs de Pan Wenhua en 1915 et s'éleva du grade de commandant de peloton à celui de commandant de régiment. Lorsque Pan Wenhua rejoignit Liu Xiang et devint commandant de la 4e division de l'Armée du Sichuan en 1921, Guo le suivit et devint commandant de la 7e brigade au sein de la division de Pan.\n\nDepuis lors, Guo sert sous les ordres de Liu Xiang aux côtés de Pan, et s'est lié d'amitié avec Chen Yi. On dit que durant l'Expédition du Nord du KMT, Guo participa activement aux soulèvements de gauche au Sichuan et apporta son aide aux dirigeants de gauche lorsque la Clique du Sichuan réprima les mouvements socialistes locaux.§!\n\n§YNotes : On raconte que Guo Xunqi aurait de fortes sympathies de gauche, y compris des contacts directs avec des figures telles que Liu Bocheng, ce qui a provoqué des frictions et de la méfiance entre lui et Liu Xiang.§!"

 #王陵基
 SZC_wang_lingji: "Wang Lingji"
 SZC_wang_lingji_army_chief_desc:9 "§YNaissance :§! §L1883, comté de Leshan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LIssu d'une famille de marchands de soie, Wang fit ses études d'abord au Sichuan, puis au Japon. Entré dans l'Armée du Sichuan en 1906, il resta neutre pendant la révolution Xinhai. Après avoir été promu commandant de régiment en 1913, il écrasa les forces révolutionnaires du Sichuan sous le commandement de Xiong Kewu. Lorsque la Guerre de Protection de la Nation éclata, il se rangea du côté de Yuan Shikai et combattit l'Alliance de Protection de la Nation. Bien qu'il ait réussi à s'emparer de Chengdu, il fut ensuite vaincu par l'Armée du Yunnan et démis de ses fonctions.\n\nEn 1921, Wang rejoignit les forces de Yang Sen et devint son chef d'état-major ; cependant, lorsque Yang fut contraint de quitter le Sichuan, il devint un subordonné de Liu Xiang. Après la fin de l'Expédition du Nord, il se retrouva toujours sous les ordres de Liu Xiang.§!"

 #王纘緒
 SZC_wang_zuanxu: "Wang Zuanxu"
 SZC_wang_zuanxu_high_command_desc:9 "§YNaissance :§! §L1886, comté de Xichong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LCamarade de classe de Liu Xiang, Yang Sen et Pan Wenhua, Wang suivit la formation accélérée de l'Armée du Sichuan. Durant l'ère républicaine, Wang servit l'armée de Liu Xiang, alignée sur Beijing. Pendant la Guerre Sichuan-Yunnan de 1920, Wang fut affecté à Yang Sen par Liu. Plus tard cette même année, Wang accéda au poste de commandant de brigade et régna sur le sud du Sichuan. Durant son règne, le sud du Sichuan connut de nombreuses améliorations des terres agricoles, de la conservation de l'eau, des routes, des prisons, et favorisa les bourses d'études à l'étranger.\n\nEn 1922, Yang Sen s'engagea dans une guerre contre le seigneur de la guerre rival du Sichuan, Xiong Kewu, que ce dernier perdit. Yang et Wang fuirent le Sichuan et se rendirent à Wu Peifu. Grâce au patronage de Wu, Yang et Wang reconstituèrent leurs forces et revinrent sur la scène politique du Sichuan. Yang s'allia à Liu Xiang et chassa Xiong, aligné sur Canton, de la province. L'année suivante, Yang envahit Chengdu et laissa Wang contrôler la ville. Durant son contrôle, Wang développa la rue Chunxi, construisit le parc Shaosheng, des arrêts de bus, des toilettes publiques et imposa l'éducation obligatoire.\n\nEn 1925, Yang tenta de prendre le contrôle total du Sichuan, mais se heurta à une coalition de tous les autres seigneurs de la guerre du Sichuan non soutenus par Guangzhou. Wang fut incité à rejoindre l'armée de Liu Xiang, et Yang dut mettre fin à sa manœuvre de pouvoir. Stationné à Zizhong, Wang a développé les institutions éducatives locales.§!"

 #許紹宗
 SZC_xu_shaozong:9 "Xu Shaozong"
 SZC_xu_shaozong_high_command_desc:9 "§YNaissance :§! §L1892, comté de Qingxian, province du Zhili, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LEntré à l'École de formation accélérée de l'Armée du Sichuan en 1908, Xu Shaozong rejoignit la 33e Brigade mixte de la Nouvelle Armée Qing en tant qu'officier de section après avoir obtenu son diplôme. En 1910, il entra à l'Académie militaire de l'Armée du Sichuan, où il étudia aux côtés d'hommes tels que Liu Xiang. Conservant son poste et devenant rapidement officier d'équipe, Xu servit, après avoir obtenu son diplôme, comme commandant de compagnie dans la 1re division de l'Armée du Sichuan dirigée par Zhou Jun en 1912.\n\nParticipant à toutes les batailles menées dans le Bassin Rouge à partir de ce moment-là, Xu devint un élément indispensable du corps des officiers du Département accéléré et, en 1934, fut promu lieutenant-général et commandant de la 161e division, placée directement sous les ordres de Liu Xiang.§!"

 #潘昌猷
 SZC_pan_changyou:9 "Pan Changyou"
 SZC_pan_changyou_advisor_desc:9 "§YNaissance :§! §L1901, comté de Renshou, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LAprès avoir travaillé sous les ordres de Yang Sen à Chengdu et enseigné auprès de Pan Wenhua à Chongqing, Pan Chongyou devint directeur du Trésor municipal de Chongqing en 1928 et cofonda une banque locale. En 1930, il devint président de la société minière de charbon Huachang, puis, l'année suivante, il fut nommé directeur général de la Banque des citoyens de Chongqing. En 1934, il occupa les fonctions de président de l'Association bancaire de Chongqing et de la Chambre de Commerce de Chongqing.§!"

 #刘从云
 SZC_liu_congyun:9 "Liu Congyun"
 SZC_liu_congyun_advisor_desc:9 "§YNaissance :§! §L1883, comté de Weiyuan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LAyant enseigné dans une école privée à ses débuts, le jeune Liu Congyun était naturellement enclin à se servir du mysticisme de la divination et de la voyance pour escroquer les gens. En 1911, il se donna le nom de "Grue Blanche" et fonda la secte Yiguanxiandao. Mêlant confucianisme, bouddhisme et taoïsme, il prêchait des prophéties millénaristes annonçant la fin du monde, attirant de nombreux adeptes en raison de la situation désastreuse dans laquelle se trouvait la Chine.\n\nEn 1918, il comptait plus de 10 000 adeptes à Weiyuan et dans les comtés environnants, ayant établi 108 autels et six Tongbu (autels principaux), l'autorité suprême résidant dans la propre demeure de Liu. En 1925, il fonda le Yiguanxiandao, qui commença à s’étendre dans les cercles militaires et politiques, établissant divers avant-postes à Chengdu, Chongqing et Wanxian. Des seigneurs de la guerre de toute la province commencèrent à solliciter l’influence de la secte, notamment Liu Xiang.\n\nAprès avoir engagé Congyun comme conseiller militaire, Liu Xiang a réorganisé une partie de ses troupes en ne recrutant que parmi les partisans de Congyun, et ce dernier a joué un rôle central dans la Guerre du Sichuan central, même si son manque total de compétences militaires laisse beaucoup à désirer. Néanmoins, ses relations avec son protecteur sont devenues de plus en plus tendues ces derniers temps, les autres subordonnés de Liu Xiang réclamant sa mise à mort.§!"

 #盧作孚
 SZC_lu_zuofu: "Lu Zuofu"
 SZC_lu_zuofu_advisor_desc:9 "§YNaissance :§! §L14 avril 1893, à Chongqing, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LAprès avoir terminé l'école primaire avec d'excellentes notes, Lu Zuofu quitta l'école pour des raisons financières et rejoignit le Tongmenghui en 1910, participant au Mouvement de Défense du Chemin de fer du Sichuan. En 1913, Lu prit part à la Seconde Révolution et, suite à son échec, quitta Chengdu pour Shanghai. L'année suivante, il fit la connaissance de Huang Yanpei et noua avec lui une profonde amitié. De retour à Chongqing pour y enseigner les mathématiques, il devint rédacteur pour le Chengdu Qunbao et le Chuanbao, rédigeant de nombreux articles critiquant les problèmes de société.\n\nEn 1919, il prit la présidence et la direction de la rédaction du Sichuan Daily, participant activement aux émeutes de novembre et rejoignant même la Société Jeune Chine organisée par Li Dazhao. En 1921, il devint chef de la section Éducation du bureau de Yongning Daoyin au Sichuan, où il mit en œuvre divers programmes d’éducation de masse, qui furent toutefois interrompus en raison des luttes intestines entre les seigneurs de la guerre. En 1924, Lu fut invité par Yang Sen à Chengdu pour fonder le Centre d’éducation populaire et participer à divers efforts réformistes.\n\nEn 1925, après l'échec de ses initiatives dans le domaine de l'éducation, Lu s'est tourné vers l'industrie et a fondé la Compagnie industrielle Minsheng. En 1926, après avoir levé des fonds à titre personnel, il se lança dans le secteur des transports et mit en place divers projets d'infrastructure tout le long du Yangtsé. En 1927, il fut nommé par Liu Xiang au gouvernement provincial du Sichuan, et en 1935, il s'était imposé comme l'un des magnats du transport maritime les plus influents de Chine.§!"

 #劉航深
 SZC_liu_hangchen:9 "Liu Hangchen"
 SZC_liu_hangchen_advisor_desc:9 "§YNaissance : §!§L1897, dans le comté de Lu, province du Sichuan, Grande Qing§!\n§YAllégeance : §!§aDépartement Accéléré§! - §aClique de Fucheng§!\n§YCarrière : §!§LNé sous la coupe d'un exploitant de distillerie catholique, Liu Hangchen intègre la faculté d'économie de l'université de Pékin en 1917. Après son diplôme en 1922, il retourne dans le comté de Lu et devient principal du lycée du comté de Lu. En 1926, après une altercation avec un bureaucrate local, Liu jure d'entrer en politique, et l'année suivante, il est recommandé par son camarade de classe Chen Xuechi (alors subordonné de Wang Lingji) pour devenir directeur du Bureau des monnaies de cuivre de Chongqing.\n\nMenant diverses réformes monétaires, Liu suscite l'admiration de Wang Lingji, qui le recommande ainsi à Liu Xiang pour devenir chef de section du département des finances de son armée, poste dont il devient rapidement le directeur. S'écartant des méthodes habituelles des seigneurs de la guerre, Liu réforme et rationalise les impôts locaux, et finit par établir un monopole sur l'opium sous le contrôle de Liu Xiang.\n\nEn 1930, Liu propose la création du Trésor général de l'Armée, qu'il utilise pour émettre des obligations gouvernementales efficaces et des traites du Trésor. Ayant pris ses fonctions de directeur général de la Banque provinciale du Sichuan en 1935, Liu a récemment créé une "classe de formation financière", réformé l'impôt foncier, et instauré une taxe commerciale de 3 %.§!\n\n§YNotes : A un désir notable de richesse et de pouvoir, seulement freiné par sa dépendance envers Liu Xiang et son animosité envers les autres membres du Département Accéléré.§!"

 #邓汉祥
 SZC_deng_hanxiang:9 "Deng Hanxiang"
 SZC_deng_hanxiang_advisor_desc:9 "§YNaissance :§! §L1888, comté de Pan, province du Guizhou, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LAprès avoir fréquenté des écoles privées tout au long de son enfance, Deng Hanxiang fut admis à l'École normale de Kunming en 1905, puis entra à l'Académie militaire de Kunming et à l'École militaire du Guizhou. En 1909, il étudia à l'École militaire du Hubei, où il fonda l'Association Yunnan-Guizhou et en devint le président. Pendant le Soulèvement de Wuchang, Deng servit comme capitaine d'un bataillon d'étudiants, puis occupa d'autres fonctions au début de la révolution.\n\nAprès Xinhai, Deng devint l'intermédiaire entre Yuan Shikai et Li Yuanhong, et de 1913 à 1916, il collabora avec Cai E pour s'opposer à la restauration de la monarchie par Yuan. Devenu représentant de Beijing auprès de Tang Jiyao, conseiller auprès du Conseil d'État et du ministère de la Guerre, Deng sillonna le Yunnan, le Guizhou, le Zhejiang et le Sichuan dans le cadre de diverses fonctions militaires et diplomatiques.\n\nEn 1922, Deng fut représentant de Duan Qirui auprès de Sun Yat-sen, proposant une alliance pour renverser la Clique du Zhili. En 1924, il devint conseiller en chef des forces alliées du Zhejiang et de Shanghai, et contribua à la formation du cabinet de Duan Qirui en 1925. En 1926, Deng suivit Duan à Tianjin, puis retourna au Guizhou en 1928, avant de devenir le représentant de Liu Xiang à Beijing. Depuis 1935, Deng est l'un des conseillers les plus proches de Liu, et l'homme que ce dernier consulte avant chaque décision importante.§!"

 #乔毅夫
 SZC_qiao_yifu:9 "Qiao Yifu"
 SZC_qiao_yifu_advisor_desc:9 "§YNaissance :§! §L1885, comté de Mianzhu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §aDépartement accéléré§! - §aClique de Fucheng§!\n§YCarrière :§! §LDiplômé de l'Académie militaire du Sichuan et de l'École accélérée du Sichuan en 1909, Qiao Yifu devint instructeur à l'Académie militaire de Kunming et rejoint le Tongmenghui la même année. Après Xinhai, Qiao retourna au Sichuan et servit comme commandant de bataillon sous les ordres de Liu Yuehou. En 1916, il combattit lors de la Guerre de Protection de la Nation.\n\nEn 1919, il servit en tant que représentant de l'Armée du Sichuan sous Liu Xiang dans la province du Yunnan, et devint en 1921 commandant en chef de l'Armée du Sichuan et représentant spécial du gouverneur du Sichuan à Hankou. En 1927, Qiao devint directeur du département de police municipale de Chongqing. Et depuis 1936, il est récemment devenu officier d'état-major au Bureau de pacification du Sichuan-Xikang.§!"

 #蒙文通
 SZC_meng_wentong:9 "Meng Wentong"
 SZC_meng_wentong_advisor_desc:9 "§YNaissance :§! §L16 octobre 1894, comté de Yanting, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LDès son plus jeune âge, Meng Wentong savait réciter les Cinq Classiques, les Quatre Livres et divers ouvrages philosophiques. Il intégra l'enseignement privé à l'âge de cinq ans. À treize ans, il se rendit à Chengdu et s'y installa. En 1907, il entra à l'École supérieure du Sichuan aux côtés de personnalités telles que Zeng Qi et Guo Moruo. En 1911, il rejoignit l'École Cungu (qui deviendra plus tard l'Académie nationale du Sichuan), où il reçut un enseignement intensif des classiques.\n\nAprès son diplôme en 1916, Meng se rendit à Chengdu pour y enseigner le chinois à l'École unie provinciale de 1919 à 1921, avant de déménager à Chongqing pour exercer la même fonction. En 1923, il s'inscrivit au programme d'essai de l'Académie intérieure de Nanjing pour étudier le bouddhisme, puis rentra à Chongqing pour continuer à enseigner. Il produisit son œuvre la plus célèbre, "L'Essence de l'histoire ancienne", en 1927, avant d'être sollicité pour enseigner au département d'histoire de l'Université centrale nationale, puis de retourner au Sichuan l'année suivante pour enseigner à Chengdu.\n\nAprès avoir démissionné suite à la fusion forcée des diverses universités de Chengdu par Liu Wenhui, il quitta le Sichuan pour enseigner à l'Université du Henan, puis à l'Université de Beijing. Avec le rétablissement de la stabilité au Sichuan après la Guerre du Sichuan central et le Soulèvement de Shanghai, Meng a été sollicité par Yang Sen pour revenir dans la province, où il enseigne au département d'histoire de l'Université du Sichuan.§!"

 #王恩洋
 SZC_wang_enyang:9 "Wang Enyang"
 SZC_wang_enyang_advisor_desc:9 "§YNaissance :§! §L1897, comté de Nanchong, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LDisciple d’Ouyang Jingwu, Wang Enyang débuta sa carrière universitaire au collège de Nanchong, avant de s'installer à Beijing en 1919 pour suivre des cours en auditeur libre au département de philosophie de l'université de Beijing. Apprécié par Liang Shuming, il devint son élève. En 1923, Wang se rendit à l'Académie intérieure de Chine à Nanjing, fondée par Ouyang Jingwu, pour étudier les textes bouddhistes, et participa activement aux débats philosophiques bouddhistes qui agitaient la Chine à cette époque.\n\nEn 1925, Enyang devint directeur et professeur du cours spécial de l'Académie intérieure, puis retourna au Sichuan en 1927 à la suite de la suspension des cours à l'Académie en raison de l'Expédition du Nord. Après avoir fondé la salle d’étude Guishan à Nanchong, il continua à enseigner le bouddhisme et le confucianisme à ses étudiants, et fut invité en 1930 à la Société bouddhiste de Chengdu. À ce jour, Enyang a concentré ses efforts sur l'enseignement et l'écriture, produisant divers textes sur le bouddhisme.§!"

 #溫少鶴
 SZC_wen_shaohe:9 "Wen Shaohe"
 SZC_wen_shaohe_advisor_desc:9 "§YNaissance :§! §L1888, comté de Ba, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LIssu d'une famille prestigieuse du comté de Ba, Wen Shaohe a connu une jeunesse classique, marquée par une progression régulière dans ses études, qui allait ensuite le mener à une longue carrière dans l'enseignement. Devenu directeur du collège du comté de Ba, il enseigna par la suite à l'École normale de l'Est du Sichuan, puis, de 1914 à 1921, occupa le poste d'inspecteur au Bureau de promotion de l'éducation du comté de Ba, avant d'être nommé directeur du Bureau de l'éducation du comté de Ba. En 1922, Wen fut envoyé en tant que représentant de la Chambre de commerce de Chongqing à la conférence de la Chambre de commerce de toute la Chine à Shanghai, où il rencontra diverses personnalités de renom telles que Liang Qichao, Zhang Taiyan et Huang Yanpei.\n\nEn 1923, il devint directeur de la Chambre de commerce de Chongqing et président de l'Association de l'industrie de la soie. En 1928, Wen fut réélu à la Chambre de commerce de Chongqing, établissant ainsi sa propre domination pour d'innombrables mandats consécutifs. La même année, Wen siégea au comité préparatoire de l'université de Chongqing, et en 1932, il fonda son propre collège, puis étendit ses établissements d'enseignement pour en compter trois en 1935.§!\n\n§YNotes : Considéré comme un homme populaire, travailleur et austère, Wen Shaohe est très apprécié au sein des communautés hui, commerçantes et des seigneurs de la guerre du Sichuan, et figure parmi les personnalités locales les plus en vue de la province.§!"

 #李劼人
 SZC_li_jieren:9 "Li Jieren"
 SZC_li_jieren_advisor_desc:9 "§YNaissance :§! §L20 juin 1891, à Chengdu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LNé sous le nom de Li Jiaxiang, Li Jieren entra à l'École supérieure du Sichuan en 1907, puis devint en 1912 rédacteur en chef du journal Chengdu Qunbao, poste qu'il occupa jusqu'en 1918. L'année suivante, Li organisa et dirigea les activités de la section de Chengdu de l'Association Jeune Chine, dont il assura la rédaction de l'hebdomadaire, avant de partir étudier en France la même année. En 1923, il écrivit la nouvelle "Sympathie", puis revint de France en Chine en 1924 pour devenir rédacteur en chef du Quotidien du Sichuan.\n\nLe journal ayant été fermé par Yang Sen, Li devint professeur à l'université de Chengdu en 1926, puis directeur des départements des lettres et des classes préparatoires. Pendant cette période, Li a également occupé le poste de rédacteur en chef du Quotidien Minli de Chengdu. En 1930, en raison des ravages causés par la corruption des bureaucrates et des seigneurs de la guerre, Li a démissionné de son poste à l’université et est devenu restaurateur, ne reprenant une vie "officielle" qu’en 1933, lorsqu’il est devenu directeur de l’usine de réparation de machines Minsheng de Chongqing.§!"

 #曾俊臣
 SZC_zeng_junchen:9 "Zeng Junchen"
 SZC_zeng_junchen_advisor_desc:9 "§YNaissance :§! §L6 septembre 1888, comté de Weiyuan, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LAprès avoir fait son apprentissage dès son plus jeune âge dans une saline à Luzhou, Zeng Junchen démissionna de son poste en 1912 pour ouvrir un magasin de céréales. En 1914, il ouvrit un restaurant, le plus grand de Luzhou, puis, en 1920, s'associa avec Hu Shaozhang et d'autres pour fonder une société de sel à Chongqing. En 1922, Zeng fonda une centrale hydroélectrique et, en 1924, devint président du Lobby du sel de Chongqing. Grâce à ses relations étroites avec les fonctionnaires et les seigneurs de guerre, son commerce du sel lui permit d'amasser une fortune dès 1928.\n\nParallèlement, Zeng cofonda la fabrique de tabac Shuyi avec Shui Xiheng, mais sous l’influence de Wang Zunxu, son commerce de sel fit faillite, et il devint par la suite directeur de l’entreprise de transport de sel de Pan Changyou. Comptant parmi les trafiquants d’opium les plus prolifiques et les plus "ouverts" du pays, Zeng a engagé des discussions avec d’autres grands trafiquants d’opium du Sichuan en vue de former un monopole de grande envergure.§!"

 #任鸿隽
 SZC_ren_hongjun:0 "Ren Hongjun"
 SZC_ren_hongjun_advisor_desc:9 "§YNaissance :§! §L20 décembre 1886, à Dianjiang, province du Sichuan, Empire Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LRen Hongjun, l'un des érudits les plus éminents de Chine, a commencé sa carrière universitaire en intégrant l'Académie de Dianjiang en 1898. Intelligent, assidu et comptant parmi les meilleurs de sa promotion, Ren passa le dernier examen impérial en Chine, puis se rendit au Japon en 1908 pour étudier la chimie appliquée. En 1909, il rejoignit le Tongmenghui grâce à l'entremise de Dan Maoxin et occupa le poste de président de la section du Sichuan de cette organisation.\n\nAuteur d'un manifeste révolutionnaire fustigeant la dynastie Qing, Ren supervisa le parrainage de révolutionnaires pour qu'ils puissent étudier à Tokyo, parmi lesquels Chiang Kai-shek et Zhang Qun. Après Xinhai, Ren fut secrétaire de Sun Yat-sen, mais démissionna pour se rendre aux États-Unis où il obtint une maîtrise en chimie à l'université Columbia. De retour en 1918, Ren occupa les fonctions de directeur du département de l'éducation au ministère de l'Éducation, de professeur à l'université de Beijing, de rédacteur en chef de la Commercial Press à Shanghai et de vice-président de l'université nationale du Sud-Est.\n\nEn 1935, Ren devint président de l'université du Sichuan et lança un ambitieux programme de réforme globale de son fonctionnement interne. Alors qu'il était au sommet de sa carrière, sa principale préoccupation était le manque de stabilité interne de la Chine et du Sichuan.§!"

 #蒋逵
 SZC_jiang_kui:9 "Jiang Kui"
 SZC_jiang_kui_navy_chief_desc:9 "§YNaissance :§! §L1893, comté de Ba, province du Sichuan, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LÉtudiant à l'Académie Guangyi de Chongqing, Jiang Kui poursuivit ses études à l'École Nanyang de Shanghai avant de commencer sa carrière navale à l'École de marine marchande de Wusong. En 1914, il rejoignit la marine comme stagiaire, puis se tourna vers la Troisième Voie de la guerre en 1915 après son inscription à l'École d'aviation de Beijing. Même si, après son diplôme, Jiang revint dans la marine et gravit les échelons jusqu'au grade de premier lieutenant.\n\nEn 1920, il se rendit en Grande-Bretagne et aux États-Unis pour étudier la fabrication d'avions et les technologies de vol, puis revint en Chine en 1922 pour servir comme instructeur de vol et directeur de l'éducation à l'Institut de formation aéronautique de Beijing. Ayant dirigé l'armée de l'air lors des Guerres Jiangsu-Zhejiang et ZhiFeng, Jiang fut promu commandant adjoint de l'Aviation de la Troisième Armée, avant d'être transféré au Bureau de l'aviation en 1925.\n\nAyant envisagé de déserter lors de l'Expédition du Nord, Jiang resta du côté de Beiyang et, en 1928, visita la France et l'Allemagne pour étudier leurs flottes aériennes. De retour pour servir à nouveau comme instructeur en aviation, Jiang fut engagé par Liu Xiang en 1930 pour aider à établir une armée de l'air et une marine au Sichuan. En 1935, Jiang a démissionné pour devenir professeur à l'Université de Chongqing, mais il reste sous contrat, au cas où un seigneur de la guerre du Sichuan aurait besoin de ses services.§!"

 #鄭少愚
 SZC_zheng_shaoyu:0 "Zheng Shaoyu"
 SZC_zheng_shaoyu_air_chief_desc:9 "§YNaissance :§! §L9 octobre 1911, canton de Xiandu, comté de Qu, province du Sichuan, Grand Qing§!\n§YAlignement :§! §L"Apolitique"§!\n§YCarrière :§! §LZheng Shaoyu est né à l’aube de la révolution chinoise. Il est entré à l’école primaire à l’âge de sept ans et a été admis au collège Wuzhou de Nanjing à 15 ans, avant d’intégrer le collège Dongfang. Il a ensuite rejoint l’académie militaire de Chongqing, où il s’est lié d’amitié avec ses compatriotes provinciaux Wu Maode et Lei Xiadian, qui nourrissaient de vives sympathies pour la gauche. Grâce à ses fréquentes interactions avec eux, il a développé une vision politique favorable aux idéaux progressistes et aux causes de gauche.§!"

 #樂以琴
 SZC_yue_yiqin:0 "Yue Yiqin"
 SZC_yue_yiqin_high_command_desc:9 "§YNaissance :§! §L23 novembre 1914, comté de Lushan, cité de Yan'an, province du Sichuan, République de Chine§!\n§YAlignement :§! §L"Apolitique"§!\n§YCarrière :§! §LYue Yiqin (Le Yizhong) est né dans une famille chrétienne baptiste. Son père tenait un salon de thé et un commerce de narguilés, et sa mère était d’origine tibétaine. En 1900, H.J. Openshaw, un missionnaire de l’Église baptiste du Nord des États-Unis, vint à Yan’an et convertit toute la famille Yue au christianisme.\n\nAprès avoir obtenu son diplôme à l'école primaire Lushan Mingde en 1926, Yue Yiqin entra au collège Zhangjieshan Mingde. Une fois son diplôme obtenu, il intégra le lycée de l'Université de l'Union de Chine occidentale avant de poursuivre ses études à l'université dans la province du Shandong. Bouleversé par le soulèvement de Shanghai en 1932, il rentra chez lui animé d'un fervent nationalisme pour rejoindre l'armée de l'air du Sichuan, alors en pleine expansion, en tant qu'audacieux as de l'aviation.§!"

