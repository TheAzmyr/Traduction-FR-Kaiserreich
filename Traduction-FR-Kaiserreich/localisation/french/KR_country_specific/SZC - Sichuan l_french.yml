 SZC_federal_governmental_legitimacy_desc:9 "Le Fédéralisme chinois moderne a connu son apogée et son déclin au cours de la première moitié des années 1920. Une coalition de constitutionnalistes, de démocrates et de régionalistes s'est formée au plus fort de l'ère des seigneurs de la guerre, alors que l'impasse entre le Nord et le Sud persistait. Leurs appels aux différentes provinces pour qu'elles s'efforcent de mettre en place une autonomie locale, puis de s'unir pacifiquement au sein d'une république fédérale, ont suscité un certain intérêt, mais après des débuts prometteurs, ils ont été rejetés par les gouvernements du Nord et du Sud. La réussite de l'unification par la force menée par le Zhili a discrédité le mouvement, et beaucoup en sont venus à le considérer comme une simple façade pour le seigneurisme.\n\nIl sera difficile de retrouver l'élan perdu il y a plus de dix ans, mais alors que le pays semble à nouveau irrémédiablement divisé et que les efforts de libéralisation de la clique du Zhili s'avèrent être une imposture, nombreux sont ceux qui espèrent que le mouvement fédéraliste pourrait être la solution aux problèmes de la Chine. Si peu de gens attendent grand-chose des cliques du Sichuan, souvent divisées, celles-ci portent néanmoins l'étendard du dernier bastion du Fédéralisme chinois."

 SZC_federal_governmental_legitimacy_1:9 "Dernier Combat du Fédéralisme Chinois : §RSans Espoir§!"
 SZC_federal_governmental_legitimacy_1_desc:9 "$SZC_federal_governmental_legitimacy_desc$"

