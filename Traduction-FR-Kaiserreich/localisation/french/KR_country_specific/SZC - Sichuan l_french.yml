 SZC_guide:9 "§MDépartement accéléré/Département de l'Armement§! — §MAmbition de Yang Sen§! / §MTradition de Liu Cunhou§! ($authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Dans §YLes Forces de Liu Xiang Approchent de Suining§!, Repliez-vous vers le Nord ou Évacuez vers Chengdu\n£white_dot Dans §YNejiang Sous Assaut§!, Détruisez les Ponts\n£white_dot Dans §YChoisir un Plan d'Attaque§!, Faites Mouvement vers Jianyang\n£white_dot Dans §YCombats à Ziliujing§!, Faites Semblant d'Attaquer — la guerre civile se terminera quelques jours plus tard.\n\n£white_dot Ou bien, dans §YChoisir un Plan d'Attaque§!, Faites Mouvement vers Chongqing\n£white_dot Dans §YChongqing Sous Assaut§!, Prenez Position dans les Collines — la guerre civile se terminera quelques jours plus tard.\n£white_dot Dans §YRencontre avec Deng Xihou§!, acceptez l'accord pour consolider le pouvoir de §aYang Sen§!, ou rejetez-le pour que §PLiu Cunhou§! prenne le pouvoir.\n\n§MDépartement de Baoding§! — §MUne Province Modèle§! / §MUne Province Moderne§! ($social_conservative_coloured$)\n£white_dot Dans §YLes Forces de Liu Xiang Approchent de Suining§!, Retranchez-vous et Tentez de Défendre\n£white_dot Ou bien, choisissez de vous Relier vers le Nord ou d'Évacuer vers Chengdu. Ensuite, dans §YNejiang Sous Assaut§!, Défendez les Têtes de Pont\n\n£white_dot Dans §YMobiliser les Troupes de Xikang§!, Renforcez la Garnison de Chengdu\n£white_dot Dans §YGuanxian Attaquée§!, Préparez une Attaque sur les Camps Ennemis de Nuit, ou Bloquez le Canal de Baopingkou — la guerre civile se terminera quelques jours plus tard.\n£white_dot Ou bien, dans §YMobiliser les Troupes de Xikang§!, Faites Mouvement à l'Est vers Luzhou et Chongqing\n£white_dot Dans §YLes Nombreux Visages de Baoding§!, Appuyez-vous sur le Cœur de Liu Wenhui — la guerre civile se terminera quelques jours plus tard.\n\n§MDépartement accéléré§! — §MAPN§! / §MSeigneur du Sichuan§! / §MPlan Grandiose§! ($authoritarian_democrat_coloured$)\n£white_dot Dans §YLes Forces de Liu Xiang Approchent de Suining§!, choisissez n'importe quelle option\n£white_dot Dans §YNejiang Sous Assaut§!, choisissez n'importe quelle option\n£white_dot Dans §YChoisir un Plan d'Attaque§!, Divisez vos forces — la guerre civile se terminera quelques jours plus tard.\n£white_dot Ou bien, dans §YChoisir un Plan d'Attaque§!, Faites Mouvement vers Chongqing\n£white_dot Dans §YChongqing Sous Assaut§!, Attaquez la Ville — la guerre civile se terminera quelques jours plus tard.\n\n£white_dot Ou bien, dans §YMobiliser les Troupes de Xikang§!, Renforcez la Garnison de Chengdu\n£white_dot Dans §YGuanxian Attaquée§!, Retranchez-vous et Fortifiez le Temple Er Wang — la guerre civile se terminera quelques jours plus tard.\n£white_dot Ou bien, dans §YMobiliser les Troupes de Xikang§!, Faites Mouvement à l'Est vers Luzhou et Chongqing\n£white_dot Dans §YLes Nombreux Visages de Baoding§!, Favorisez les Forces de Deng et Tian — la guerre civile se terminera quelques jours plus tard.\n\n§MRégiment des Neuf Hommes/Département des Officiers§! ($social_democrat_coloured$ / $social_liberal_coloured$)\n£white_dot Dans §YLes Forces de Liu Xiang Approchent de Suining§!, ne choisissez §Rpas§! de vous Retranchez et de tenter de Défendre\n£white_dot Dans §YNejiang Sous Assaut§!, Détruisez les Ponts\n£white_dot Dans §YChoisir un Plan d'Attaque§!, Faites Mouvement vers Jianyang\n£white_dot Dans §YCombats à Ziliujing§!, choisissez de Prendre Ziliujing ou d'Attaquer Chongqing — la guerre civile se terminera quelques jours plus tard.\n£white_dot Dans §YAccord du Nouveau Sichuan§!, choisissez §SXiong Kewu§! ou §lLi Jiayu§! pour arriver au pouvoir, selon si vous souhaitez le §SRégiment des Neuf Hommes§! ou le §lDépartement des Officiers§!.\n\n§MVestiges du Zhili§! — §MAile civile§! / §MAile militaire§! ($authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Choisissez la règle du jeu §cQing§! §YCoup d'État Mandchou§! avant de commencer la partie, et faites en sorte que §aYang Sen§! ou §PLiu Cunhou§! reste au pouvoir.\n£white_dot §PWang Chengbin§! arrivera au Sichuan un mois après le coup d'État.\n\n§MGouvernement de Reconstruction nationale§! ($social_democrat_coloured$ / $social_liberal_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Suivez le guide pour que §SXiong Kewu§! et le §SRégiment des Neuf Hommes§! arrivent au pouvoir.\n£white_dot Après le 1er juillet 1937, si vous n'êtes pas un vassal, vous possédez Chongqing et qu'aucun gouvernement fédéraliste n'a été établi, complétez la priorité §YSolliciter la Coopération Nord-Sud§! puis prenez la décision §YPorter le Flambeau des Espoirs Fédéralistes§!\n£white_dot §SZhang Lan§! sera invité à former un Gouvernement de Reconstruction nationale d'urgence au nom des seigneurs de la guerre du Sichuan.\n\n§MLigue démocratique de Chine - Association de Recherche du Nouveau Siècle§! ($social_democrat_coloured$)\n£white_dot Unifiez la Chine avec le Gouvernement de Reconstruction nationale tout en gardant un §fEnthousiasme démocratique§! équilibré.\n£white_dot Après l'unification, choisissez §SZhang Lan§! pour remporter les élections nationales.\n\n§MGrande Alliance républicaine - Association unie pour l'Autonomie fédérale§! ($social_liberal_coloured$)\n£white_dot Unifiez la Chine avec le Gouvernement de Reconstruction nationale tout en gardant un §fEnthousiasme démocratique§! équilibré.\n£white_dot Après l'unification, choisissez §lDan Maoxin§! pour remporter les élections nationales.\n\n§MGrande Alliance républicaine - Société du Gouvernement et du Progrès civils§! ($authoritarian_democrat_coloured$)\n£white_dot Après l'unification, faites en sorte que §lDan Maoxin§! ou §SZhang Lan§! remportent les élections nationales. Puis, faites en sorte que l'§fEnthousiasme démocratique§! passe en-dessous du réalisme émergeant ou au-dessus de l'idéalisme émergeant, et §aLiu Wenhui§! stabilisera le gouvernement par un coup d'État.\n£white_dot Ou bien, faites en sorte que l'§fEnthousiasme démocratique§! passe en-dessous du réalisme émergeant ou au-dessus de l'idéalisme émergeant au cours de la première campagne électorale, et §aLiu Wenhui§! stabilisera le gouvernement par un coup d'État.\n\n£white_dot §YNote : il sera bien plus facile de conserver les gouvernements de §SZhang Lan§! ou §lDan Maoxin§! si vous §fdépolitisez l'armée§!.§!\n£white_dot §YNote : il est possible d'empêcher §aLiu Wenhui§! de renverser le gouvernement si vous prenez les priorités §MDémobilisation Nationale§! ou §MSoumettre les Cliques de l'Armée§! pour §lDan Maoxin§! et §SZhang Lan§! respectivement.§!"

### Events ###
 sichuan_events.5.t:0 "Agitation dans le Sud"
 sichuan_events.5.d:0 "À la suite de la vente de la ligne ferroviaire ZheGan dans la Ligue des Huit Provinces, des rumeurs inquiétantes faisant état de troubles généralisés ont commencé à circuler. Alors qu’il ne s’agissait au départ que de rumeurs concernant des manifestations réprimées par les forces de police de la Ligue, nos gardes-frontières signalent désormais des flux de réfugiés fuyant les violences et une recrudescence du banditisme qui envahit nos frontières.\n\nIl semble qu'une manifestation pacifique à Wuhu ait dégénéré en un véritable bain de sang après que les forces de la Ligue ont ouvert le feu sur les manifestants – une scène qui a commencé à se répéter à travers toute la Ligue dans les jours qui ont suivi ce que l'on appelle désormais "l'Incident de Wuhu". Certains affirment désormais que la Ligue – et l'ordre du Zhili qui la soutient – est à bout de souffle, bien que la plupart soient encore prêts à croire que la force militaire peut contenir les troubles."
 sichuan_events.5.a:0 "Cela passera, comme par le passé."

 sichuan_events.6.t:0 "Le Maréchal Sun Chuanfang a été Abattu par un Assassin"
 sichuan_events.6.d:0 "De graves nouvelles nous parviennent de la Ligue des Huit Provinces : le Maréchal de la Ligue Sun Chuanfang, la plus haute autorité du Zhili dans la région, est dans le coma, mortellement blessé après avoir été abattu par un assassin. Le contrôle du Zhili sur le sud commence déjà à s'effriter et les répercussions ne tarderont pas à nous atteindre, ici, au Sichuan. Si le pire devait arriver et que le sud sombrait dans le chaos, Beijing pourrait être trop accaparé pour pouvoir nous venir en aide."
 sichuan_events.6.a:0 "Cela n'augure rien de bon."

 sichuan_events.7.t:0 "Chaos dans le Sud"
 sichuan_events.7.d.intervention:0 "Nos pires cauchemars sont devenus réalité. Le contrôle du Zhili sur le sud de la Chine s'est complètement effondré. À Nanjing, le général Qi Xieyuan s'est autoproclamé Maréchal de la Ligue par intérim après avoir pris le contrôle de la ville. Alors que la Ligue s'effondre à la suite de l'attentat contre Sun, des rebelles du KMT, que l'on croyait depuis longtemps maîtrisés, se sont soulevés dans le Fujian pour tenter de rétablir le Gouvernement national. Le gouverneur d'Anqing a déclaré la guerre à Qi, l'accusant d'avoir orchestré la tentative d'assassinat afin de prendre le contrôle de la Ligue. Plus à l'ouest, les gouverneurs du Hunan, du Guangxi et du Guangdong ont refusé de reconnaître l'autorité du nouveau Maréchal de la Ligue, mais n'ont pour l'instant pas ouvert les hostilités.\n\nLa situation est devenue suffisamment grave pour que le gouvernement central de Beijing s'implique directement, des troupes et des ravitaillements Qing étant déjà en route vers le sud. Pour l'instant, il semble que l'attention de Beijing soit entièrement accaparée par la crise au sud et que nous soyons livrés à nous-mêmes."
 sichuan_events.7.d.no_intervention:0 "Nos pires cauchemars sont devenus réalité. Le contrôle du Zhili sur le sud de la Chine s'est complètement effondré. À Nanjing, le général Qi Xieyuan s'est autoproclamé Maréchal de la Ligue par intérim après avoir pris le contrôle de la ville. Alors que la Ligue s'effondre à la suite de l'attentat contre Sun, des rebelles du KMT, que l'on croyait depuis longtemps maîtrisés, se sont soulevés dans le Fujian pour tenter de rétablir le Gouvernement national. Le gouverneur d'Anqing a déclaré la guerre à Qi, l'accusant d'avoir orchestré la tentative d'assassinat afin de prendre le contrôle de la Ligue. Plus à l'ouest, les gouverneurs du Hunan, du Guangxi et du Guangdong ont refusé de reconnaître l'autorité du nouveau Maréchal de la Ligue, mais n'ont pour l'instant pas ouvert les hostilités.\n\nPour aggraver encore la situation, le gouvernement de Beijing a refusé d'intervenir pour rétablir l'ordre et fait face à des manifestations massives contre sa décision. Partout en Chine, les dissidents dénoncent déjà haut et fort la décision de Wu, y voyant une preuve de la faiblesse et de l'incompétence du Zhili. Il semble que l'emprise du Zhili sur la Chine soit en train de s'effriter, et nos ennemis ne manqueront pas d'en profiter."
 sichuan_events.7.a:0 "C'est une catastrophe !"

 sichuan_events.8.t:0 "Liu Xiang se Mobilise Contre Nous"
 sichuan_events.8.d:9 "Alors que le fragile équilibre du Sichuan se retourne contre nous avec les troubles qui agitent la Ligue des Huit Provinces, Liu Xiang a décidé de franchir le Rubicon, pour ainsi dire. À la tête de sa grande armée, il a quitté Chongqing et des soldats qui lui sont fidèles ont été aperçus se déplaçant dans tout le Sichuan, principalement dans la partie orientale. Nos anciens alliés nous ont trahis et nos amis nous ont abandonnés. Pour l'instant, cependant, le Département de Baoding a décidé de maintenir le cap. Partout dans le Sichuan, les armées se mobilisent – et nous devons nous mobiliser nous aussi. L'heure est venue pour nous de jeter les dés, le sort du Sichuan est en jeu."
 sichuan_events.8.a:0 "Nous devons l'arrêter !"

 sichuan_events.9.t:0 "Le Sichuan Sombre dans la Guerre Civile"
 sichuan_events.9.d:9 "Le Sichuan est plongé dans le chaos.\n\nPartout dans la province, les forces du Département accéléré, autrefois alliées, s’affrontent, les troupes de Liu Xiang combattant celles de Yang Sen. Le Département de l'Armement et le Département de Baoding se sont temporairement alliés aux forces de Yang Sen, et ont été rejoints par le Département des Officiers, combattant côte à côte contre la plus grande armée du Sichuan. Depuis son poste de commandement à Chongqing, Liu Xiang continue de donner des ordres d'attaque à ses troupes pour qu'elles avancent et engagent le combat contre toutes les forces de la faction du Département accéléré de Yang Sen, le Département de l'Armement et le Département de Baoding.\n\nÀ Tongren, les forces fédéralistes sous les ordres de Xiong Kewu ont vu une opportunité de faire leur retour au Sichuan. Rejointes par les forces résiduelles du Kuomintang sous les ordres de Lü Chao et par les guérilleros omniprésents dans le sud-est du Sichuan, elles se sont montrées capables de plonger l'ordre sichuanais fragile dans le chaos le plus total.\n\nLe Département de Baoding est, jusqu’à présent, resté fidèle à Chengdu, ses forces combattant aux côtés de celles de Yang Sen dans la guerre sanglante pour l’unification de la province. La façade de stabilité du Sichuan s’est effondrée et seul le ciel sait ce que l’avenir réserve à la province."
 sichuan_events.9.a:0 "Contactez Beijing, nous avons besoin de leur aide !"
 sichuan_events.9.b:0 "Alors, c'est parti..."

 sichuan_events.16.t:9 "Le Département Accéléré Demande l'Asile"
 sichuan_events.16.d:9 "La guerre civile au Sichuan a pris fin, et nos alliés du Département accéléré et du Département de l'Armement ont été vaincus par leurs ennemis. Fuyant d'éventuelles représailles, les dirigeants de l'ancienne clique au pouvoir au Sichuan sont arrivés chez nous, désireux de se mettre au service de nos forces armées, dans l'espoir de pouvoir, un jour peut-être, retourner dans leur province d'origine."
 sichuan_events.16.a:0 "Les vieux amis sont toujours les bienvenus !"
 sichuan_events.16.b:0 "Trouvez un foyer, oui - mais ailleurs."

 sichuan_events.50.t:0 "Yang Sen Demande du Soutien"
 sichuan_events.50.d:9 "Des nouvelles alarmantes nous sont parvenues de Chengdu par l'intermédiaire de notre responsable pour le Sud-Ouest, He Guoguang. La paix fragile qui régnait au Sichuan s'est effondrée, conséquence directe de la perte de stabilité de l'ordre national du Zhili à la suite des troubles au sein de la Ligue des Huit Provinces. Affaiblissant considérablement l'influence du dirigeant du Sichuan, Yang Sen, allié clé du Zhili, les divisions internes de la province ont dégénéré en conflit ouvert. Liu Xiang, membre du Département accéléré et seigneur de la guerre de Chongqing, s'est retourné contre le gouverneur Yang Sen et ses forces, emmenant avec lui la plus grande armée de la province. Pour l'instant du moins, les alliés de Yang dans le Département de Baoding, sous les ordres de Deng Xihou, Liu Wenhui et Tian Songyao, restent fidèles, mais même cela est incertain alors que la situation devient de plus en plus incontrôlable à chaque jour qui passe.\n\nDéjà, la Clique du Zhili s'est mise à chercher fébrilement une réponse. Alors que le chaos s'empare de l'administration, nombreux sont ceux qui ont dû s'appuyer sur leur charisme, plutôt que sur le constitutionnalisme, pour faire passer leurs propositions. Toutefois, malgré toutes les apparences, il ne s'agit pas d'une division factionnelle sur la question du Sichuan, mais d'un problème logistique.\n\nCompte tenu du chaos qui règne actuellement au Sichuan, on ne peut exclure qu’un conflit prolongé, au cours duquel les deux camps épuiseraient leurs forces, permette aux partisans de Xiong Kewu de saisir l’occasion pour renverser le cours de leur malheur. Comme si cela ne suffisait pas, des sécheresses persistantes ont frappé la population du Sichuan, déjà en difficulté. Face à la catastrophe qui se profile, le gouverneur Yang, vieil ami du Zhili, a contacté la Clique par l’intermédiaire de He, la suppliant de lui offrir tout le soutien possible. Bien que les conséquences d’une défaite de Yang pourraient s’avérer graves pour la Clique à l’avenir, ni le Maréchal de Jade ni le Roi de Baoding n’ont daigné faire de commentaires, même si, en privé, il a été rapporté que Wu Peifu a préparé une petite aide pour son vieil ami."
 sichuan_events.50.a:0 "Envoyez-leur ce dont nous pouvons nous passer."
 sichuan_events.50.b:0 "Nous ne pouvons nous passer de rien."

 sichuan_events.51.t:9 "Le Zhili Envoie du Soutien"
 sichuan_events.51.d:9 "Après que tant d’anciens "alliés" aient révélé leur vrai visage en ces temps difficiles, rares étaient ceux qui attendaient grand-chose du Gouvernement central, déjà accablé par l’effondrement de la Ligue. Et pourtant, comme l’indiquent les derniers rapports de He Guoguang, un flot d’argent et de ravitaillements a commencé à affluer vers Chengdu, contournant de justesse les forces de Liu Xiang.\n\nRépondant à la demande d'aide du gouverneur Yang, il semblerait que Luoyang se soit engagée à soutenir [SZC.GetLeader] et le [SZC.GetRulingParty] dans leurs efforts pour maintenir la stabilité au sein de la province. Alors que de bonnes nouvelles se répandent enfin au sein de la clique de Yang Sen, les soldats font état d'un regain de moral, et les ravitaillements fournis s'avéreront sans aucun doute inestimables alors que la coalition de Yang Sen fait face à toute la puissance des forces de Liu Xiang."
 sichuan_events.51.a:9 "Quelle magnanimité !"

 sichuan_events.52.t:9 "Le Zhili nous Abandonne"
 sichuan_events.52.d:9 "Il semblerait aujourd’hui que tout le monde dans le pays soit en proie au malheur. Déjà trahi par Liu Xiang et ne conservant qu’une alliance précaire avec les départements de l’Armement, de Baoding et des Officiers, le gouverneur Yang, face à sa situation désespérée, a fini par lancer une bouée de sauvetage en direction de Luoyang, voire de Beijing. Grâce à He Guoguang, le contact du Zhili dans le Sud-Ouest, Yang a pu utiliser ses liens directs avec son vieil ami Wu Peifu pour obtenir un certain soutien à sa campagne contre Liu.\n\nEt pourtant, il semblerait que le Gouvernement central ait jugé inutile, ou peut-être soit-il trop occupé, d’aider le gouverneur à maintenir l’ordre. Bien plus préoccupé par les affaires internes suite à l'instabilité de Nanjing que par la loyauté personnelle, le Zhili a refusé d'aider Yang, laissant le gouverneur livré à son sort. Le moral étant déjà au plus bas, rares sont les simples soldats qui espèrent pouvoir tenir tête à l'armée de Liu, tant en termes d'effectifs que de matériel."
 sichuan_events.52.a:0 "Eh bien, au moins il n'y a plus d'alliés pour nous trahir..."

 sichuan_events.53.t:9 "Xiong Kewu Demande du Soutien"
 sichuan_events.53.d:9 "La clique militaire du Sichuan, au nord, a sombré dans la guerre civile, les différents seigneurs de la guerre de la province s'étant retournés les uns contre les autres. Alors que dans la plupart des cas, cela ne serait rien d’inhabituel en Chine, la région autour de Tongren, dans le Guizhou, est "occupée" par les forces fédéralistes de l’ancien gouverneur du Sichuan, Xiong Kewu, depuis l’Expédition du Nord. Bien que cela ne se produise généralement pas, surtout maintenant avec l’occupation militaire du Kuomintang dans le Guizhou et les problèmes propres à Dian, la guerre civile du Sichuan a offert une occasion rare.\n\nMarchant sur la province pour tenter une dernière fois de retrouver la gloire, Xiong a adressé une requête plutôt curieuse à [YUN.GetLeader]. Alors que les relations entre Xiong Kewu et l’armée de Dian ont connu des hauts et des bas au fil des ans, l’ancien gouverneur a mis son animosité de côté, peut-être de manière assez effrontée, pour demander du soutien dans son entreprise.\n\nDemande déjà farfelue en soi, surtout adressée à [YUN.GetLeader], Xiong a sollicité des hommes ou du matériel pour l'aider à intervenir dans la Guerre civile du Sichuan. Étant clairement prêt à tout pour gagner un peu de bonne volonté, peu de gens pourraient reprocher à [YUN.GetLeader] de simplement refuser ses conditions ; celles-ci sont trop coûteuses et n'offrent que trop peu de garanties quant à un retour sur investissement futur. Mais il reste la possibilité d'éloigner de Kunming certains hommes peu loyaux. Du moins, tant que cela n'entraîne pas une répétition de la dernière fois où le militarisme d'exportation a échoué au Sichuan."
 sichuan_events.53.a:0 "Envoyez quelques troupes."
 sichuan_events.53.b:0 "Envoyez quelques fusils."
 sichuan_events.53.c:0 "Cela n'en vaut pas la peine."

 sichuan_events.54.t:9 "Le Yunnan Soutient les Forces de Xiong Kewu"
 sichuan_events.54.d:9 "Bien que le Yunnan ne soit guère une province prospère, ni particulièrement stable à l'heure actuelle, la Clique du Yunnan dispose toujours d'une armée importante, et c'est un fait qu'elle aime trop souvent rappeler à ses provinces voisines, le Guizhou, le Guangxi et le Sichuan. Une fois de plus, il semblerait que le Yunnan cherche à s'immiscer dans la politique locale du Sichuan, malgré sa situation interne désastreuse.\n\nAprès avoir marché depuis Tongren, dans le Guizhou, les unités de Xiong Kewu se sont révélées plus fortes et bien mieux équipées que ne le laissaient supposer les renseignements précédents, de nombreuses unités arborant ce qui semble être des fusils d'occasion provenant du Yunnan. Ce qui est peut-être encore pire, ce sont les divers rapports faisant état de la participation directe de soldats et d'officiers de l'Armée de Dian à des combats et des escarmouches. Il semblerait qu'une fois de plus, le Maître du Continent oriental ait mis les pieds dans le bassin de la rivière Rouge."
 sichuan_events.54.a:0 "Arrêtez de vous mêler de nos affaires !"

 sichuan_events.55.t:9 "Les Forces de Liu Xiang Approchent de Suining"
 sichuan_events.55.d:9 "Selon les dernières informations, d'importantes forces de l'armée de Liu Xiang auraient réussi à marcher vers Suining à un rythme alarmant. Cet emplacement crucial revêt une grande importance stratégique en raison de sa proximité avec les bases de pouvoir de Xiang et de [ROOT.GetLeader], servant de plaque tournante au réseau routier du bassin sud, non loin de Chongqing.\n\nLiu Cunhou, l'allié temporaire de Yang, a affirmé que la ville pouvait être défendue contre les forces supérieures en nombre de Liu, et que même si elles étaient dispersées, les fortifications conjointes de l'alliance dans et autour de la ville équilibreraient les chances en sa faveur.\n\nGuo Rudong, un autre commandant compétent de l'alliance, a plaidé en faveur d'une approche plus prudente vis-à-vis de [ROOT.GetLeader], affirmant qu'un retrait stratégique permettrait aux lignes actuellement dispersées de l'alliance de se regrouper et de reprendre le combat depuis une position plus avantageuse dans les jours à venir."
 sichuan_events.55.a:0 "Retirez-vous au nord, vers Santai et Mianyang."
 sichuan_events.55.b:0 "Évacuez vers Chengdu."
 sichuan_events.55.c:0 "Retranchez-vous et tentez de défendre."

 SZC_battle_suining_santai:9 "§POrganiser une retraite tactique vers les villes du nord de Santai et Mianyang est une ligne de conduite sûre et presque garantie pour garder nos troupes en sécurité, mais ce faisant, nous céderons le contrôle d'une grande partie du bassin aux forces de Liu Xiang.§!"
 SZC_battle_suining_chengdu:9 "§gLa route la plus rapide pour conduire une retraite depuis Suining passe directement par notre capitale, Chengdu, mais Xiang a avancé rapidement dans le bassin. Il n'y aura peut-être pas assez de temps pour atteindre Chengdu avant l'arrivée des forces de Liu Xiang.§!"
 SZC_battle_suining_hold:9 "§cSuining contrôle une bonne partie du trafic routier à destination et en provenance du bassin central du Sichuan, mais la ville est également beaucoup plus proche du quartier général de Liu Xiang à Chongqing que du nôtre à Chengdu. Nos forces devront peut-être rester dangereusement dispersées pour maintenir les lignes de ravitaillement ouvertes.§!"

 sichuan_events.56.t:0 "Fuite vers le Nord"
 sichuan_events.56.d:9 "Après une planification minutieuse et des préparatifs soignés, nos forces ont réussi à organiser et à mener à bien un retrait ordonné de Suining. Peu de matériel militaire a été laissé sur place lors de leur retraite vers le nord, et leurs effectifs sont restés intacts, tant en termes d'hommes que d'équipement. Bien que Liu Xiang contrôle désormais la région, les forces de l'alliance sont désormais bien mieux placées pour faire face à toute incursion future de ses troupes. La situation est peut-être loin d'être idéale, mais le choix de la solution la plus sûre a permis au gouverneur [ROOT.GetLeader] de gagner un temps précieux et de sauver de nombreuses vies."
 sichuan_events.56.a:0 "Au moins, nos troupes sont en sécurité."

 sichuan_events.57.t:0 "Bataille à Jianyang"
 sichuan_events.57.d:9 "La route la plus rapide était aussi la plus prévisible. En route vers Chengdu, les forces de l'alliance ont été attaquées sur les flancs par les armées de Liu Xiang qui avançaient. Malgré une résistance vaillante, les forces de l'alliance ont été décimées lorsqu'elles ont été attaquées en terrain découvert par les soldats de Liu Xiang. Si certaines troupes ont réussi à se sortir de cette situation désespérée et à survivre pour combattre un autre jour, cette retraite précipitée a entraîné la perte de précieux effectifs et de matériel."
 sichuan_events.57.a:0 "Ce n'est pas bon."

 sichuan_events.58.t:0 "Encerclés à Suining"
 sichuan_events.58.d:9 "Dès que l'ordre de tenir Suining à tout prix a été donné, Liu Cunhou, plein d'assurance, a demandé à ses troupes de se retrancher et de se préparer à l'assaut inévitable. Alors que les forces de Liu se retranchaient, celles de Liu Xiang se sont mises en marche et ont encerclé la ville grâce à leur supériorité numérique écrasante, tandis que les défenseurs n'en soupçonnaient rien.\n\nLa bataille a été d'une brièveté traumatisante, car la plupart des forces du Département de l'Armement se sont rendues en masse dès qu'elles ont pris conscience qu'elles n'avaient fait que creuser leur propre tombe autour d'une ville condamnée, offrant ainsi à Liu Xiang une victoire totale. Liu Cunhou, tombé en disgrâce, s'est enfui vers le nord, vers le Zhili, échappant de justesse à la capture après cette erreur stratégique."
 sichuan_events.58.a:0 "Quel désastre !"

 sichuan_events.59.t:0 "Neijiang Sous Assaut"
 sichuan_events.59.d:9 "Les forces de Liu Xiang et de Yang Sen se livrent depuis peu à de violents combats autour des points de passage fluviaux près de Neijiang. Ces points de passage ont une importance stratégique capitale, car celui qui les contrôle maîtrise les voies d'accès au bassin du Sichuan. Ces combats font rage depuis le début des hostilités, mais il semblerait que Liu Xiang ait commencé à se préparer à lancer une offensive finale pour s'emparer des têtes de pont.\n\nBien qu'en infériorité numérique, [ROOT.GetLeader] a été informé de la possibilité d'attirer les forces de Liu Xiang vers des défenses bien préparées le long des têtes de pont susmentionnées, où l'on espère réduire leurs effectifs, même si ce serait certainement une victoire coûteuse si nous visons à repousser toute la puissance de ses forces.\n\nComme l'a ingénieusement proposé Xia Jiong, l'alliance pourrait demander à ses ingénieurs de piéger les têtes de pont afin de les faire sauter et de piéger les forces de Liu Xiang. Une telle stratégie s'avérerait toutefois coûteuse à long terme, car les infrastructures stratégiques de la région seraient laissées en ruines."
 sichuan_events.59.a:0 "Défendez les têtes de pont quoi qu'il en coûte !"
 sichuan_events.59.b:0 "Laissez-les traverser, puis faites sauter les ponts."

 SZC_battle_neijiang_defend:9 "§gNeijiang contrôle certains des plus grands passages, et serait un endroit idéal pour attaquer les flancs de Liu Xiang s'il était sous notre contrôle. Cependant, les attaques des forces de Liu Xiang deviennent plus intenses de jour en jour. Si cette tendance se poursuit, nos défenseurs risquent d'être dépassés.§!"
 SZC_battle_neijiang_blow:9 "§PEn utilisant des explosifs chronométrés sur les ponts, nous pouvons amener un bon nombre de soldats de Liu Xiang à se retrouver piégés de notre côté de la rivière Tuo, et le manque de ponts rendra sa capture inutile pour Liu. Cela nous deviendra aussi inutile, malheureusement.§!"

 sichuan_events.60.t:0 "Neijiang Submergée par les Forces Ennemies"
 sichuan_events.60.d:9 "Les soldats et les ingénieurs de [ROOT.GetLeader] ont travaillé jour et nuit pour mettre en place les défenses des têtes de pont autour de Neijiang. Des tranchées ont été creusées, des sacs de sable et des barbelés ont été installés, et des mitrailleuses ainsi que des mortiers ont été positionnés dans des zones de tir efficaces pour neutraliser quiconque oserait s'approcher. Les premières vagues d'attaquants ont été décimées en masse, mais alors que les heures se transformaient en jours et que les assauts incessants ne faiblissaient pas, les forces de l'alliance de [ROOT.GetLeader] ont commencé à manquer de munitions, d'équipement et de soldats face à cette attaque écrasante. Progressivement, les positions ont été envahies, et une grande partie des meilleurs soldats du Département de l'Armement ont péri dans cet assaut brutal."
 sichuan_events.60.a:9 "Le Département de l'Armement ne pourra plus tenir longtemps !"

 sichuan_events.61.t:0 "La Bataille des Ponts"
 sichuan_events.61.d:9 "La nuit dernière, à la faveur de l'obscurité, les ingénieurs de [ROOT.GetLeader] ont placé de la dynamite le long des structures de soutien clés des têtes de pont autour de Neijiang. Le lendemain matin, les forces de [ROOT.GetLeader] ont simulé un retrait des ponts, et comme prévu, le commandant adverse de Liu Xiang a mordu à l'hameçon. Alors que les colonnes de l'armée traversaient vers l'autre rive, les explosifs ont été déclenchés. Tous ceux qui avaient réussi à passer de l'autre côté se sont retrouvés pris dans une embuscade lorsque les forces de [ROOT.GetLeader] ont surgi, et se sont rendus en masse dans la panique et la confusion qui ont suivi. Ceux qui sont restés de l'autre côté ont simplement assisté, impuissants, à la déroute de leurs compagnons d'armes, ce qui a anéanti leur moral. Malgré le coût des têtes de pont, [ROOT.GetLeader] a remporté une victoire fantastique."
 sichuan_events.61.a:0 "Enfin une victoire !"

 sichuan_events.62.t:0 "Deng Xihou Prend Chengdu"
 sichuan_events.62.d:9 "Accablées par une succession de revers, les forces de Yang Sen et de Liu Cunhou ont été poussées au bord de l'effondrement total. Pour prévenir la catastrophe imminente, les troupes de Baoding, sous le commandement du général Deng Xihou, ont fait leur entrée à Chengdu. Les forces de Yang étant complètement décimées et démoralisées par leurs revers répétés, il s'agissait en fait d'un coup d'État sans effusion de sang, le règne de Yang ayant pris fin dans un murmure. Après la prise de Chengdu, le Département de Baoding a pris le contrôle total des comtés environnants, et les dernières forces fidèles à Yang ont soit déserté, soit rejoint le camp de Deng. La situation restant aussi désastreuse que jamais, il incombe désormais au Département de Baoding d'achever ce que le gouverneur Yang Sen et le général Liu Cunhou n'ont pas pu faire."
 sichuan_events.62.a:0 "Nous sommes le dernier rempart du Sichuan."

 sichuan_events.63.t:0 "Le Siège de Chengdu"
 sichuan_events.63.d:9 "Tôt le matin, les formations de l'armée de Liu Xiang sont enfin arrivées aux abords de Chengdu pour ce qu'il espérait être la bataille finale de sa campagne. Cela pourrait bien être le cas, mais c'est pour le moins un pari risqué, car à ce moment crucial, la majorité de ses troupes commence à montrer des signes de fatigue après des semaines de marche et de combats.\n\nLa ville elle-même est entourée de canaux provenant des digues de Dujiangyan en amont et fortifiée par des remparts datant de la fin de l'ère Qing, avant la Révolution Xinhai. Aussi anciens soient-ils et construits avant l'ère de l'artillerie moderne, ces remparts s'étendent encore sur près de onze kilomètres autour de la ville et s'élèvent à plus de neuf mètres de hauteur. Ils forment en effet une citadelle imposante, qui a résisté à l'épreuve du temps, ce qui en fait une tâche redoutable à franchir pour toute armée attaquante.\n\nConscient qu'un assaut frontal entraînerait la ruine de l'armée de Chongqing, Liu a préféré assiéger Chengdu. Des échanges de tirs sporadiques ont eu lieu entre les deux camps toute la matinée, mais il est clair que les troupes de Liu Xiang n'ont aucun espoir de percer les défenses de sitôt et se sont donc retranchées en prévision d'un long siège. Si les défenses de [ROOT.GetLeader] tiennent pour l'instant, la ville deviendra sa tombe s'il se contente d'attendre derrière ses murs.\n\nIl faut agir rapidement, et l'état-major est déjà à l'œuvre pour proposer divers plans de contre-attaque visant à lever le siège. Cependant, nombreux sont ceux qui, au sein du quartier général, craignent que ces querelles internes ne causent la perte de Chengdu."
 sichuan_events.63.a:0 "Le sort du Sichuan est en jeu."

 sichuan_events.64.t:0 "Choisir un Plan d'Attaque"
 sichuan_events.64.d:9 "Les forces de Liu Xiang ont avancé sur Chengdu depuis l'est et le sud, et ont commencé à soumettre la ville à un siège. Il est indéniable que tout sera perdu si [ROOT.GetLeader] n'agit pas rapidement et organise un effort pour briser le siège. Ses chefs militaires savent tous qu'ils ne peuvent pas attendre, et que l'attaque est la seule défense dans cette situation.\n\nUn plan proposé par les commandants de [ROOT.GetLeader] est de prendre avantage de leur étalement autour de la ville pour essayer de rompre et encercler les forces de Liu Xiang dans une offensive audacieuse contre Jianyang. Ce faisant, ils espèrent forcer la force principale à se rendre, surtout ses très précieuses unités du génie.\n\nD'un autre côté, la plupart de leurs forces expérimentées étant concentrées sur le siège, d'autres membres du haut commandement pensent qu'ils devraient couper la tête du serpent en attaquant Chongqing directement. La ville devrait être peu défendue par les réserves de Xiang, commandées par le maire Pan Wenhua, et sa capture désorganiserait massivement les efforts de Liu à cause de l'infrastructure vitale de la ville.\n\nEnfin, certains officiers des rangs de [ROOT.GetLeader] l'avertissent de ne pas mettre tous ses œufs dans le même panier, lui demandant de diviser ses forces et d'attaquer les deux cibles à la fois, l'empêchant de renforcer ses objectifs.\n\nLa seule chose sur laquelle le haut commandement semble être d'accord, c'est que quel que soit notre choix, il n'y a pas de place pour l'erreur."
 sichuan_events.64.a:9 "Avancez vers Jianyang pour encercler ses forces."
 sichuan_events.64.b:0 "Avancez vers Chongqing, elle sera faiblement défendue."
 sichuan_events.64.c:0 "Divisez les forces en deux groupes et engagez une double offensive."

 SZC_troop_mobilisation_jianyang:9 "§lLes meilleures forces de Liu Xiang sont concentrées autour de Chengdu en raison du siège en cours et nos forces pourraient être en mesure de couper les lignes d'approvisionnement de Xiang en prenant la ville voisine de Jianyang. Nous aurons besoin de toutes nos forces disponibles pour la mise en oeuvre de ce plan, qui laissera le sud sans surveillance, laissant peut-être une ouverture au Département des Officiers.§!"
 SZC_troop_mobilisation_chongqing:9 "§PConserver le contrôle de Chongqing est absolument vital pour l'effort de guerre de Liu et sa capture porterait un coup mortel à sa cause. D'autre part, Pan Wenhua commande une importante garnison dans la ville. Si nous ne parvenons pas à submerger rapidement les défenses de la ville, nous risquons d'être pris dans un mouvement de tenaille entre la garnison et les troupes que Liu Xiang enverra pour contrer notre avance.§!"
 SZC_troop_mobilisation_split:9 "§gDiviser nos forces en deux groupes d'attaque empêchera Xiang et Wenhua de se renforcer mutuellement, mais cela signifie que notre armée devra combattre la majeure partie de l'Armée de Liu Xiang en même temps. Celle-ci est puissante et notre armée pourrait ne pas être à la hauteur de la tâche.§!"

 sichuan_events.65.t:0 "Le Pari de Yang Sen"
 sichuan_events.65.d:9 "S'étant trop dispersées, les troupes les plus expérimentées de Liu Xiang étaient engagées dans le siège de la capitale de [ROOT.GetLeader], tandis que les flancs et l'arrière étaient protégés par des conscrits frais issus de leurs réserves. Agissant avec rapidité, ses forces ont réussi à balayer les détachements d'arrière-garde de Liu, dispersés et peu nombreux. Leurs effectifs supérieurs ont été épuisés à tenter d'encercler Chengdu et ils se retrouvent désormais complètement isolés, coincés entre la force principale de [ROOT.GetLeader] et la garnison de Chengdu, relativement intacte."
 sichuan_events.65.a:0 "Ne les laissez pas s'échapper !"

 sichuan_events.66.t:0 "La Roue Tourne"
 sichuan_events.66.d:9 "Les forces de Liu Xiang se sont mises dans une situation précaire en engageant leurs soldats les plus expérimentés contre les défenses de Chengdu, dans une tentative désespérée d'éliminer [ROOT.GetLeader] du conflit. Après avoir coupé la route aux forces principales de Liu Xiang, une bataille rapide a suivi entre les forces de [ROOT.GetLeader] et l'avant-garde piégée de l'armée de Liu Xiang, qui tentait désormais désespérément de briser l'encerclement. N'ayant nulle part où battre en retraite et aucun espoir d'être secourus, le moral et la cohésion des troupes se sont rapidement effondrés, conduisant à une reddition massive.\n\nChengdu étant désormais en sécurité, [ROOT.GetLeader] a reçu pour mission de mener l'offensive directement au cœur du territoire ennemi !"
 sichuan_events.66.a:0 "En avant maintenant, vers Chongqing !"

 sichuan_events.67.t:9 "Les Fédéralistes Envahissent le Sichuan"
 sichuan_events.67.d:9 "Alors que les forces de Liu Xiang sont en plein désarroi, les forces alliées de Xiong Kewu, menées par Yu Jitang, ont également pénétré dans le Sichuan depuis Tongren, dans le Guizhou, et ont commencé à occuper des comtés. Alors qu'en temps normal, une telle attaque ne constituerait pas une menace majeure, la présence persistante à Chongqing de garnisons autrefois sous le contrôle de Liu Xiang, et, plus inquiétant encore, les rumeurs qui circulent sur des contacts entre ces garnisons, les forces de Xiong Kewu et le Département des Officiers, font craindre une alliance contre nature entre ces trois parties pour s'opposer à Yang Sen."
 sichuan_events.67.a:0 "Attendez, quoi ?"

 sichuan_events.68.t:9 "L'Armée de Liu S'effondre"
 sichuan_events.68.d:9 "Ayant tout misé sur une victoire rapide et tout perdu, l'avant-garde de l'armée de Liu Xiang, étirée à l'extrême, exposée et épuisée, a été complètement mise en déroute après des semaines de combats menés sans se soucier des pertes. Liu Xiang est désormais confronté à une défaite totale sur le front et à la trahison dans ses arrières. Démoralisées par leurs nombreux revers et ayant perdu leur bastion vital de Chongqing, les troupes qui lui restent ont commencé à déserter et à faire défection en masse. Pendant ce temps, Liu Xiang est introuvable, ayant vraisemblablement fui le Sichuan comme un lâche plutôt que de partager le sort de ses soldats. Avec pour seule résistance symbolique celle de cette force autrefois redoutable, ce n’est qu’une question de temps avant qu’ils ne se rendent complètement."
 sichuan_events.68.a:0 "Il était temps !"

 sichuan_events.69.t:9 "L'Alliance Anti-Yang Sen"
 sichuan_events.69.d:9 "La trahison et les aléas sont monnaie courante dans le bassin de la Rivière Rouge, et malgré la défaite cuisante de Liu Xiang, la province est loin, très loin d’être unie. Alors que des rumeurs circulent partout au Sichuan au sujet d’une alliance visant à tenir le gouverneur Yang Sen en échec, il semblerait que celles-ci soient en passe de se concrétiser. Il semblerait qu’une alliance contre nature ait été conclue pour renverser une fois pour toutes le gouverneur en place.\n\nSi l'on compte les vestiges des forces de Liu Xiang, l'armée d'invasion de Xiong Kewu et le Département des Officiers opportuniste de Li Jiayu, ils se sont révélés presque assez puissants pour rivaliser avec les forces récemment victorieuses de l'Alliance de Yang Sen, et il semblerait donc que le Sichuan entre dans une nouvelle phase de guerre civile."
 sichuan_events.69.a:0 "Nous les avons déjà battus et nous les battrons à nouveau !"

 sichuan_events.70.t:0 "Affrontements à Ziliujing"
 sichuan_events.70.d:9 "Malgré l’alliance entre Officiers et Fédéralistes, tout n’est pas perdu. Les deux forces n’ayant pas encore rejoint leurs positions, Yang Sen conserve l’initiative dans ce conflit. Unis, ils constituent une force redoutable. Séparés, nombre de leurs unités, en particulier celles de Xiong Kewu, ne sont que des milices de fortune et des conscrits face à une armée de vétérans, aussi épuisée soit-elle. Tout général avisé saisirait cette opportunité pour frapper tant qu’ils sont divisés. Bien que seules de petites escarmouches aient eu lieu dans la région jusqu’à présent, une grande bataille entre les trois forces est inévitable.\n\nLes forces de [ROOT.GetLeader] dans la région sont commandées par Xia Jiong, un proche confident de Yang Sen. Les troupes qu’il dirige sont majoritairement composées de vétérans ayant remporté plusieurs victoires et disposant encore d’un équipement lourd en bon état. Ses ennemis constituent une force de Fédéralistes tout aussi aguerris mais mal équipés, dirigés par Yu Jitang, ainsi que les forces de Chongqing menées par Wang Lingji. À tous égards, il ne faut sous-estimer aucune de ces deux armées. Le lieu de la bataille est du seul choix de Xia : la région autour de Ziliujing est un mélange de collines et de plaines, parsemée de nombreuses forêts."
 sichuan_events.70.a:9 "Prenez Ziliujing et utilisez-la comme point d'appui."
 sichuan_events.70.b:9 "Attaquez les forces de Chongqing avant qu'elles ne se rassemblent."
 sichuan_events.70.c:9 "Simulez une attaque, puis retirez-vous pour forcer Yu Jitang à se montrer."

 SZC_ziliujing_defense: "§lZiliujing est probablement le point où l'ennemi a l'intention de fusionner ses forces avant de se diriger vers Chengdu. Nous allons prendre la ville et la transformer en une place forte défensive. Ils devront impérativement prendre la ville pour fusionner leurs forces, ou exposer leurs flancs à notre inévitable attaque depuis cette position.§!"
 SZC_ziliujing_attack_headfirst:9 "§lLa plus grande menace est sans aucun doute la garnison de Chongqing ; privilégiant une stratégie offensive agressive, Xia Jiong attaquera leurs forces de front avant qu'elles ne puissent se regrouper.§!"
 SZC_ziliujing_feign_withdraw:9 "§PLes forces fédéralistes sont peut-être fraîches, mais beaucoup d'entre elles manquent d'expérience et sont mal dirigées. Concentrer l'attaque sur elles devrait donner à Xia Jiong l'initiative et l'espace nécessaires pour contourner les forces de la garnison de Chongqing.§!"

 sichuan_events.71.t.pincer:9 "L'Assaut de Tongnan"
 sichuan_events.71.d.pincer:9 "Considérant que la force de Chongqing était la plus facile à vaincre, Xia Jiong a ordonné à ses forces épuisées mais déterminées de marcher vers l'est pour l'attaquer en premier, espérant l'écraser avant qu'elle ne rejoigne les forces fédéralistes. Même s'il n'est certainement pas faible, les défaites militaires de Liu Xiang ont bien épuisé la plupart de ses meilleurs soldats et de son équipement. Les forces de la garnison de Chongqing étaient plus légèrement équipées, particulièrement en artillerie. L'issue de ce pari serait décidée près de Tongnan, un village au nord-ouest de Chongqing.\n\nLorsque les deux armées se sont rencontrées, il était clair qu'une attaque du téméraire Xia Jiong avait été anticipée, et la garnison de Chongqing s'était préparée à résister. Bien qu'il ait jeté tous ses hommes dans la bataille, Xia Jiong a été fortement affaibli avant de pouvoir déloger les forces de Chongqing de leur position défensive. Mais le prix de la victoire a été élevé, et les forces du Département des Officiers ont manœuvré en direction de Chengdu tandis que les forces fédéralistes se sont préparées à affronter les vestiges épuisés de l'armée de Xia Jiong."
 sichuan_events.71.a.pincer:0 "C'est une catastrophe !"

 sichuan_events.71.t.stalemate:0 "Impasse à Ziliujing"
 sichuan_events.71.d.stalemate:9 "Comme prévu, la capture de Ziliujing a été la partie facile et sa tenue ne posera pas non plus de défi majeur. En s’appuyant sur un mélange de défenses statiques et élastiques contre ce qui s’est révélé être une force très mobile et agressive, l’affrontement autour de Ziliujing s’est toutefois rapidement transformé en cage pour ses conquérants.\n\nPlutôt que de mordre à l’hameçon, les forces fédéralistes savaient qu'attaquer un point fort aussi évident serait une catastrophe et ont privilégié des tactiques de coups de main et de retraite. En choisissant de miser sur une solide défense plutôt que sur une offensive mobile, Xia Jiong a cédé l'initiative à ses ennemis. Après quelques jours de combats sporadiques avec des pertes légères des deux côtés, la réserve de Wang Lingji à Chongqing est arrivée pour soulager les forces de Yu Jitang. Désormais, les Fédéralistes vétérans sont soutenus par le reste de la puissance de l'armée de Liu Xiang avec son équipement lourd. Le fort est ainsi devenu un piège, car l'artillerie de Wang Lingji plonge désormais sur ses murailles, restreignant les mouvements de ses défenseurs. Si la ville elle-même est épargnée, aucun camp ne souhaitant risquer la vie de ses habitants, toute tentative de sortie entraînerait de lourdes pertes pour les forces de Xia. Tandis que des éléments des forces de Wang Lingji et de Yu Jitang restent engagés à Ziliujing, un important détachement a été envoyé en direction de Chengdu sur la route désormais libre, recrutant au passage des civils aigris et des déserteurs de l'ancienne armée de Liu Xiang. À chaque pas en avant, ils se renforcent tandis que [ROOT.GetLeader] s'affaiblit derrière ses murailles.\n\nBien que les forces de Xia soient immobilisées, il a déjà prévu une retraite et devrait pouvoir s’en tirer avec la majeure partie de ses troupes intactes. La mauvaise nouvelle, c'est qu'à ce moment-là, il est douteux qu'il reste encore une Chengdu à secourir."
 sichuan_events.71.a.stalemate:0 "Son armée est en sécurité, mais Chengdu ne l'est pas..."

 sichuan_events.72.t:0 "La Chute de Chengdu"
 sichuan_events.72.d:9 "Après de nombreuses batailles, un siège coûteux et une intervention pour soutenir l'attaque contre Ziliujing, la garnison de Chengdu n'est plus que l'ombre d'elle-même. Refusant de subir un nouveau siège sans aucun espoir de secours, la garnison a simplement hissé un drapeau blanc au-dessus des portes principales de la ville plutôt que de condamner la population et le patrimoine historique de la ville à une mort et à une destruction inutiles. Si les puissants remparts de la ville sont restés intacts, on ne peut pas en dire autant de la volonté de se battre de ceux qui se trouvaient derrière eux. Chengdu est désormais sous le contrôle du Département des Officiers, ce qui semble mettre fin à la dernière vague de guerre civile au Sichuan. Les forces victorieuses se réjouissent et font la fête dans les rues presque désertes de la vieille ville. Ses habitants restent chez eux, et à ce stade, la plupart sont simplement soulagés que la guerre soit terminée."
 sichuan_events.72.a:9 "Les Jeunes Officiers ont remporté la partie."

 sichuan_events.73.t:9 "La Déroute Fédéraliste"
 sichuan_events.73.d:9 "Ayant été hors des combats à part une myriade d'escarmouches au fil des ans, peu de gens connaissaient vraiment les capacités des forces de Xiong Kewu. Opérant dans des zones similaires à celles des Insurgés de l'Est du Sichuan ou du Corps industriel de Lü Chao, Xia Jiong a décidé d'attirer son adversaire dans un affrontement à ciel ouvert. Le manque d'expérience de Yu Jitang, les officiers plus compétents de Xiong ayant été dépêchés ailleurs, jouait à son avantage.\n\nLe plan était risqué, mais Xia est un homme connu pour sa préférence pour l'action, et pour qui les sacrifices sont inévitables. Sa force principale devait rester concentrée en arrière, quelques détachements étant envoyés appâter l'armée fédéraliste. Tout au long de la matinée, les forces de Yu Jitang ont lancé des attaques de reconnaissance contre leurs ennemis. Bien qu'infructueuses, Yu Jitang en a conclu que ces forces avancées étaient probablement les seules troupes du Département accéléré dans la région, n'ayant reçu aucun renfort, ni effectué de repli, ni signalé leurs activités. Une fois qu'il a réalisé que les forces de Yu passaient à une attaque de front, les détachements avancés de Xia se sont rapidement retirés tandis que des effectifs écrasants se dirigeaient vers eux. Les pertes n'ont pas été légères, mais suffisamment d'entre eux ont réussi à regagner les lignes amies.\n\nProfitant de l'avantage, les forces de Yu ont rattrapé les troupes en retraite, mais ont été pilonnées par les positions d'artillerie et de mitrailleuses que le Département accéléré avait mises en place. Le piège s'est refermé, il ne restait plus qu'à le conclure. Les forces de Jitang manquaient d'équipement lourd, mais elles restaient une force redoutable, animée par le moral et la persévérance. À la fin de la première journée, les fédéralistes se sont retirés, espérant attirer l'ennemi dans une position plus favorable. Xia Jiong maintenant ses forces en place plutôt que de tomber dans son propre piège, les assauts ont continué au cours de la journée suivante. Pendant tout ce temps, les forces de la garnison de Chongqing n'ont pu apporter leur soutien, car leur équipement lourd signifiait qu'il faudrait au moins une semaine et demie avant qu'elles ne puissent entrer en contact avec les deux généraux aux prises avec l'ennemi.\n\nAprès plusieurs jours de combats, Yu Jitang avait subi des pertes dévastatrices et a été contraint de se retirer pour se regrouper et se rétablir. Une fois que Wang Lingji a reçu la nouvelle de cette défaite, il a décidé de faire demi-tour vers Chongqing. La manœuvre a été coûteuse, mais elle a remporté la journée pour le Département accéléré, et la route vers Chongqing est désormais ouverte."
 sichuan_events.73.a:0 "Un pari dangereux a fini par payer."

 sichuan_events.74.t:0 "La Chute de Chongqing"
 sichuan_events.74.d:9 "Au terme d'un bref siège, le cœur de ce qui constituait la clique de Liu Xiang a été envahi par les soldats déterminés de [ROOT.GetLeader]. Bien que fortement décimée par la brutale guerre civile, la petite garnison de la cité antique, sous le commandement de Wang Lingji, a opposé une résistance acharnée – quoique vaine – tandis que les troupes de Xia Jiong la délogeaient rue par rue au cours des jours qui ont suivi. Après plusieurs jours de combats, la Cité Haute est finalement tombée, entraînant avec elle les industries de la ville. Les combats ont toutefois laissé certaines parties de la ville en ruines, notamment bon nombre de ses usines et de ses infrastructures essentielles.\n\nAyant perdu tout espoir de victoire, ainsi que leur ancienne alliance, la plupart des troupes restantes du Département des Officiers ont commencé à se replier vers leurs bastions. La guerre est enfin terminée, et Yang Sen a conservé le contrôle du Sichuan."
 sichuan_events.74.a:0 "Nous sommes victorieux."

 sichuan_events.75.t:0 "Chongqing Sous Assaut"
 sichuan_events.75.d:9 "La guerre commence à faire des ravages parmi les troupes de Yang Sen. À l'approche de Chongqing, les vétérans de cette armée sont à la fois impatients de se trouver enfin aux portes de la victoire, mais aussi pleinement conscients de la tâche ardue qui les attend. Ils doivent non seulement s'emparer du dernier bastion ennemi, mais aussi s'attaquer à l'un des principaux pôles industriels de Chine. La bataille pour cette ville s'annonce difficile, car chacune de ses puissantes usines peut facilement être transformée en forteresse par les défenseurs.\n\nBien que le temps soit compté, un assaut frontal est une tâche très difficile. Les zones vallonnées autour de la ville pourraient offrir aux forces de [ROOT.GetLeader] d'excellentes positions pour repérer l'ennemi et déployer leur artillerie, leur conférant ainsi un avantage stratégique considérable. Certains commandants sur le terrain font valoir que le temps nécessaire pour sécuriser ces positions et en tirer parti est un temps dont nous ne disposons tout simplement pas, préférant un assaut rapide contre les restes malmenés des forces de Liu Xiang."
 sichuan_events.75.a:0 "Prenez position dans les collines avant d'attaquer."
 sichuan_events.75.b:0 "Prenez la ville d'assaut, nous n'avons pas beaucoup de temps !"

 SZC_chongqing_hills:9 "§PNos officiers sur le terrain insistent pour que nous prenions position dans les collines et les utilisions à notre avantage. Cela pourrait sauver de nombreuses vies et fournir un gros avantage stratégique dans la bataille à venir, à la fois contre Chongqing et nos poursuivants. Cependant, cela prend du temps et dispersera nos forces.§!"
 SZC_chongqing_assault:9 "§gNos généraux insistent sur le fait qu'ils ont les effectifs nécessaires pour prendre la ville lors d'un assaut frontal. Chaque minute perdue permettant à l'ennemi de se retrancher davantage tandis qu'une seconde armée approche de ses flancs, cet appel à l'assaut tous azimuts n'est pas sans mérite.§!"

 sichuan_events.76.t:0 "Défaite à Chongqing"
 sichuan_events.76.d:9 "Devant des options toutes difficiles, un assaut direct contre la garnison sous-équipée semblait être la manœuvre la plus susceptible de réussir. Sans perdre de temps, les forces ont chargé sous la couverture du tir d'artillerie, assaillant les tranchées entourant la ville. Après des heures de combats, le Département de l'Armement s'était emparé de ces positions, bien qu'à un lourd prix en vies humaines. Le déploiement précipité signifiait également que l'artillerie imprécise avait eu un effet assez limité sur le terrain. Pire encore, une fois les tranchées prises, il était clair que Pan Wenhua avait réussi à retirer progressivement ses forces à mesure que les attaquants progressaient. Il prenait le risque d'une opération de retardement efficace, et cela fonctionnait.\n\nComme pénétrer dans la ville de nuit aurait été un suicide désorganisé, le Département de l'Armement n'a pu que patienter à la périphérie de la ville antique jusqu'à l'aube, tandis que Pan Wenhua s'empressait de préparer de nouvelles défenses à l'intérieur même de la ville et faisait évacuer les civils vers les sections intérieures de Chongqing. Une fois l'aube venue, chaque usine et chaque installation gouvernementale a été transformée en fort de fortune. La progression fut lente, et le Département de l'Armement s'est bientôt retrouvé embourbé dans des combats de rue. Après une seconde nuit sans progrès significatif, la situation devenait désespérée à mesure que les renforts ennemis approchaient rapidement. Sachant qu'ils seraient anéantis s'ils se retrouvaient pris en étau entre les deux armées, la journée suivante n'a vu aucun combat. À la place, quelques soldats ont été envoyés avec un drapeau blanc pour discuter de leur reddition. Elle a été acceptée par Pan Wenhua peu de temps après, mettant fin à la brève bataille pour Chongqing par une catastrophe pour le Département de l'Armement.\n\nEn fin de compte, la force attaquante est devenue prisonnière de guerre et, avec certains des soldats les plus expérimentés hors de combat, il est désormais très peu probable que le Département de l'Armement puisse se remettre de cette défaite. La nouvelle de cette défaite se répand déjà parmi la population, malgré les meilleurs efforts des censeurs de Chengdu. Dire que leur volonté de résister à Liu Xiang a diminué serait un euphémisme."
 sichuan_events.76.a:0 "Tout est fini maintenant..."

 sichuan_events.77.t:0 "La Chute de Chongqing"
 sichuan_events.77.d:9 "En avançant de nuit, les collines ont été prises avec une relative facilité. La garnison de Chongqing avait visiblement concentré ses défenses sur la ville même, dans une approche du tout ou rien, probablement parce que Pan Wenhua n’avait guère de soldats à consacrer à cette tâche. Avant l’aube, les ingénieurs de [ROOT.GetLeader] avaient établi des positions sur les collines, suivies par l’arrivée de l’artillerie légère et des observateurs sous le couvert de l’obscurité. Dès l’aube venue, ses soldats ont pu lancer leur assaut sur la ville, les forces ennemies restant encore loin derrière eux. Leur charge a été précédée par un barrage aussi précis que dévastateur contre les retranchements des défenseurs, et bientôt les combats pour la ville elle-même ont fait rage.\n\nMalgré les désavantages, le cœur de la faction de Liu Xiang a bientôt été submergé par les forces de Yang. Dans les heures qui ont suivi, la petite garnison de la ville antique a opposé une résistance désorganisée alors que le Département de l’Armement, suivant le pas du Département accéléré, les éliminait rue par rue. La rapidité de l’assaut et la férocité du bombardement avaient anéanti les plans de Wenhua de se replier progressivement dans la ville, et désormais ses forces étaient éliminées à un rythme effréné. Bientôt, la ville et ses puissantes industries sont enfin tombées. Les combats ont toutefois laissé des parties de la ville en ruines, y compris nombre de ses usines et infrastructures critiques. Une fois la poussière retombée, Pan Wenhua n’était nulle part. On présume qu’il a été tué lors de la bataille pour la ville, ou qu’il s’est enfui depuis longtemps.\n\nLa ville était tombée si rapidement que les forces envoyées pour la secourir ignoraient son sort. Ainsi, elles ont été accueillies par des tirs d’artillerie depuis les montagnes et des tirs depuis les faubourgs de la ville à leur approche. Réalisant rapidement qu’il était trop tard en voyant les bannières du Département de l’Armement flotter au-dessus de la ville, ils ont rapidement levé le drapeau blanc. Leur reddition a été acceptée sans effusion de sang supplémentaire, et leur capture signifie désormais que les forces des Liu ne constituent plus un obstacle."
 sichuan_events.77.a:0 "Une grande victoire !"

 sichuan_events.78.t:9 "Les Forces de Liu Xiang se Désintègrent"
 sichuan_events.78.d:9 "Liu Xiang a tout misé sur une victoire rapide et a tout perdu. Disloquée, exposée et épuisée par des semaines de combats menés sans se soucier des pertes, l'avant-garde de ses forces a été complètement mise en déroute. Xiang est désormais confronté à une défaite totale sur le front et à des attaques dans son dos. Démoralisées par leurs nombreux revers et ayant perdu leur bastion vital de Chongqing, ses troupes ont commencé à jeter leurs armes et leurs uniformes, dans l'espoir de s'enfuir dans la campagne en tant que civils. Cette force autrefois redoutable n'opposant plus qu'une résistance symbolique, ce n'est qu'une question de temps avant qu'elle ne se rende complètement."
 sichuan_events.78.a:0 "Il était temps !"

 sichuan_events.79.t:0 "Liu Xiang S'échappe"
 sichuan_events.79.d:9 "Selon des informations en provenance de Chongqing, Liu Xiang aurait abandonné ses propres soldats et pris la fuite hors du Sichuan. La tête du serpent ayant été coupée, ce qui restait de ses forces a cessé toute résistance, soit en rejoignant les troupes de [ROOT.GetLeader], soit en désertant purement et simplement. La guerre est terminée et Yang Sen a conservé le contrôle du Sichuan."
 sichuan_events.79.a:0 "Nous avons gagné !"

 sichuan_events.80.t:0 "Défaite en Détail"
 sichuan_events.80.d:9 "Dans un pari audacieux, [ROOT.GetLeader] a divisé le gros de son armée restante au sud de Chengdu et a ordonné une attaque simultanée sur les villes de Jianyang et de Chongqing. La plupart des forces de Liu Xiang étant engagées dans un long siège, ses armées pouvaient attaquer sur les deux fronts tout en conservant une supériorité numérique sur un ennemi étiré. Cependant, deux grandes armées en marche sont impossibles à dissimuler, et aucune des deux forces n'ont pu atteindre leur destination avant que les intentions du gouverneur ne parviennent à l'ennemi.\n\nPrenant l'initiative, Liu Xiang a rapidement détourné ses forces, laissant derrière lui une force symbolique pour s'assurer que la garnison de Chengdu reste engagée. Son plan reposant sur l'engagement ennemi dans le siège, dès que les forces de Liu Xiang se sont mises en mouvement, celles de [ROOT.GetLeader] se sont livrées à une course contre la montre aussi acharnée que celle menée contre les éclaireurs et les milices locales. Ils ne s'en sont toutefois rendus compte que trop tard. L'infrastructure du Sichuan était déjà déficiente avant la guerre et, à ce stade, l'armée de [ROOT.GetLeader] avançait sur des routes défoncées, les communications radio étant pratiquement inexistantes. Les deux armées n'ont réalisé qu'elles étaient poursuivies que lorsque les forces de Liu Xiang les ont attaqué par l'arrière.\n\nLe plan ne laissait aucune place à l'erreur et, une fois que les deux moitiés de l'armée ont été attaquées sur leurs arrières et leurs flancs, toute cohésion s'est rapidement effondrée alors qu'elles se hâtaient d'adopter des positions défensives. Les pertes subies par [ROOT.GetLeader] ont été dévastatrices, et ses forces ont à peine pu commencer à s'enterrer avant que le coup de grâce ne soit porté par l'arrivée des forces de la garnison de Chongqing, sous le commandement compétent de Wang Lingji. Accablées par la supériorité numérique ennemie, attaquées de tous côtés et sans aucune chance de survie, de nombreux soldats se sont rendus ou ont déserté. La bataille est perdue, et avec elle, très probablement, la guerre."
 sichuan_events.80.a:0 "Nous avons parié, et nous avons perdu."

 sichuan_events.81.t.battle:0 "La Reddition de Chengdu"
 sichuan_events.81.d.battle:9 "Ces derniers jours, seules de mauvaises nouvelles sont parvenues aux commandants de Chengdu, et même avec la censure de l'armée, il est évident pour tous dans la ville que les choses ne se passent pas bien au-delà de ces hauts remparts. Alors que les rations, de plus en plus maigres, étaient distribuées vers midi, les guetteurs de la ville ont eu une désagréable surprise.\n\nDes milliers de soldats portant les uniformes du Département de l'Armement marchaient vers la ville, suivis de près par les forces de Liu Xiang. Le gros de cette force s'est arrêté non loin des remparts, un seul camion à plateforme réduisant l'écart entre l'armée assiégeante et les murs de la ville. Le camion n'était pas chargé de troupes ennemies ou de bombes, mais il était rempli d'officiers de haut rang du Département de l'Armement. Un officier a saisi un mégaphone de mains tremblantes, et lorsque l'identité de l'homme a été reconnue par la garnison, il a commencé à s'adresser aux soldats postés sur les remparts. Wang Lingji leur dit qu'ils étaient les seuls survivants de la force de secours, que leurs armées étaient brisées et que leurs soi-disant dirigeants s'étaient enfuis vers Beijing. Mais n'ayez crainte, insiste-t-il, car Liu Xiang a été assez généreux pour les épargner eux et la ville, à condition qu'ils se rendent.\n\nLa réponse ne s'est pas faite attendre longtemps. Les commandants chargés de la garnison savaient qu'avec un moral aussi bas, une fois que la nouvelle de l'anéantissement de l'armée du Département de l'Armement se répandrait, ils auraient sûrement une insurrection sur les bras. Les hauts remparts de Chengdu tenaient encore, et le siège s'est terminé non pas par un bang, mais par la levée d'un drapeau blanc au-dessus des portes de la ville désormais ouvertes."
 sichuan_events.81.t.sapped:0 "La Chute de Chengdu"
 sichuan_events.81.d.sapped:9 "Au fil des jours, sans qu’aucun secours n’atteigne la ville, les ingénieurs de Liu Xiang sont parvenus, lentement mais sûrement, à cartographier les points faibles des défenses de l’époque des Qing entourant la cité. Chaque nuit, ils s’activaient à creuser sous les remparts et à placer des explosifs à des endroits stratégiques. Un peu plus d’un mois après le début du siège, ces explosifs ont fini par détoner avant l’aube. Les énormes explosions ont rapidement provoqué de larges brèches dans les murailles, les décombres tombant bloquant certaines des digues de Dujiangyan qui ceinturaient la ville. En un instant, les murs qui avaient résisté si longtemps se sont effondrés comme de la poussière, emportant dans les explosions initiales des dizaines de défenseurs de la ville. Cela a marqué l’assaut final sur Chengdu et s’annonçait comme une bataille longue et difficile pour cette grande cité.\n\nMalgré l’effondrement des remparts et la capture de la Porte Est, la garnison a opposé une résistance acharnée aux forces attaquantes. Mettant à profit leur connaissance de la disposition de la ville, les défenses que la garnison de Chengdu et les civils réquisitionnés avaient édifiées à l’intérieur des murs se sont révélées difficiles à surmonter, même pour l’assaillant largement supérieur en nombre. Partout où ils avançaient, ils étaient accueillis par des mitrailleuses, des tireurs d’élite, des mines et des embuscades d’infanterie. Bien que la garnison se soit vaillamment battue, tout cela a été vain. À la fin de la première journée, une sorte de calme s’est installé avec la nuit, un tiers de la ville étant tombé. Les forces de Liu Xiang se sont regroupées et, le matin venu, ont attaqué le centre-ville. Faibles en hommes et en munitions, les défenseurs à demi affamés n'ont pu tenir que quelques heures avant d’être contraints de remettre l’hôtel de ville au Département accéléré en marche. Cela a marqué l’effondrement complet de la défense de la ville, les forces restantes se rendant rapidement. Le soir venu, Chengdu s'est enfin tue, un silence qui n'a pas tardé à être rompu par les acclamations du Département accéléré victorieux et de ses soldats.\n\nBien qu’il a payé un prix élevé pour cela, le pari de Liu Xiang pour le contrôle du Sichuan a porté ses fruits."
 sichuan_events.81.a:0 "La fin de la guerre."

 sichuan_events.82.t:0 "Mobilisation des Troupes du Xikang"
 sichuan_events.82.d:0 "Bien que Chengdu soit désormais sous le contrôle de Baoding, l'issue de la guerre elle-même reste incertaine et le Département de Baoding doit unir ses efforts pour l'emporter. Le général Deng Xihou en est bien conscient et a ordonné une mobilisation générale des troupes de Baoding, jusqu'aux dernières réserves. Nos forces principales, hors de la région de Chengdu, sont les unités de montagne bien entraînées placées sous le commandement du général Liu Wenhui, actuellement basées dans la région occidentale du Xikang. Il a reçu une lettre de Xihou, qui lui ordonne de..."
 sichuan_events.82.a:0 "... renforcer la garnison de Chengdu."
 sichuan_events.82.b:0 "... avancer vers l'est vers Luzhou et Chongqing."

 SZC_xikang_troops_jianyang:9 "§WEnvoyer les troupes vers Jianyang nous permettrait de couper les lignes de ravitaillement de Liu Xiang depuis Chongqing, mais c'est aussi une évidence : s'il parvient à anticiper notre plan, il tentera sûrement d'empêcher nos forces de se rejoindre.§!"
 SZC_xikang_troops_chongqing:9 "§WLes forces de Liu Xiang étant concentrées autour de Chengdu, la région sud du Sichuan le long du fleuve Yangtze devrait être légèrement défendue. Une offensive mobile longeant le fleuve vers la traversée de Luzhou devrait pouvoir vaincre toute résistance et atteindre Chongqing, mais Liu Xiang finira par en déduire notre plan. Si nos forces ne sont pas assez fortes pour s'emparer rapidement de Chongqing, nous risquons d'être pris en tenaille et encerclés.§!"

 sichuan_events.83.t:0 "Le Guanxian Subit une Lourde Attaque"
 sichuan_events.83.d:9 "Liu Xiang a l'habitude de la ruse et de l'audace, et cette fois encore, il n'y a pas d'exception. Il semble avoir correctement déduit les mouvements de troupes prévus par Baoding et a ordonné à un détachement de ses forces, actuellement en siège devant Chengdu, de se diriger vers l'ancienne capitale de Deng Xihou, Guanxian, située au nord de Chengdu, désormais commandée par son fidèle subordonné Huang Yin. Il est impératif que la ville ne tombe pas, sous peine de voir les forces de Baoding coupées en deux groupes distincts et subir le même sort que celles de Yang Sen plus tôt dans la guerre. Face à une décision difficile, le général Huang Yin choisit finalement de..."
 sichuan_events.83.a:0 "... préparer une attaque contre les camps ennemis, dans la nuit noire."
 sichuan_events.83.b:0 "... creuser et fortifier les positions autour du temple Er Wang."
 sichuan_events.83.c:0 "... bloquer le canal de Baopingkou, détournant son cours vers les camps ennemis."

 SZC_guanxian_night_attack_text:9 "§cPlutôt que d'affronter toute la force de l'armée de Liu Xiang selon ses propres conditions, nous pouvons annuler l'avantage numérique de l'ennemi avec une attaque nocturne bien planifiée contre leurs campements autour de Guanxian. Cela causera le désarroi dans leurs rangs et atténuera toute attaque future.§!"
 SZC_guanxian_fortify_er_wang:9 "§gAu lieu de prendre des risques inutiles, nous utiliserons le peu de temps dont nous disposons pour créer un périmètre défensif solide autour de l'emplacement le plus défendable de la région. En le transformant en une puissante forteresse, Xiang devra payer cher chaque centimètre qu'il tentera de prendre.§!"
 SZC_guanxian_flood_baopingkou: "§cL'ennemi disposant d'un avantage en nombre et en puissance de feu, certains commandants suggèrent que nous devrions pas nous ouvrir la voie à coup de canons, mais plutôt que l'eau du canal balaye leurs positions avant que nous attaquions. Les inondations risquent toutefois d'endommager les zones environnantes.§!"

 sichuan_events.84.t.victory:0 "La Défense de Guanxian"
 sichuan_events.84.d.victory:9 "Huang Yin disposait de peu de temps pour se préparer et encore moins pour manœuvrer, ce qui ne semble pourtant pas inquiéter le commandant vétéran. Convaincu qu’une offensive rusée est la meilleure des défenses, il a planifié une série d’attaques nocturnes contre l’ennemi, le retrait final de ses forces étant couvert par des barrages d’artillerie sur les camps ennemis. Après avoir forcé la main de Liu dans le chaos, les premières vagues de ses troupes seront anéanties par une combinaison d’actions d’arrière-garde et de feux d’artillerie défensifs, tandis qu’une série de contre-attaques d’infanterie cherchera à briser les assaillants épuisés et à contraindre les forces du Département accéléré à se retirer.\n\nBien que le raid nocturne ait été un succès en perturbant l’offensive prévue par Liu Xiang, la bataille pour Guanxian elle-même a fait rage pendant des jours. La plupart des plans ne survivent pas au premier contact avec l’ennemi, et celui-ci n’y a pas échappé. Les forces de Liu Xiang et de Huang Yin ont connu des succès et des revers au fur et à mesure que le terrain aux alentours de la ville changeait de mains. Toutefois, toute percée réalisée par les troupes de Liu Xiang était rapidement contrée par une contre-attaque ou un barrage d’artillerie. Après trois jours de combats, les forces de Huang Yin étaient gravement endommagées, mais le Département accéléré était également éprouvé, au point de renoncer à toute nouvelle attaque et de préférer se regrouper pour se battre un autre jour. Bien que les livres d’histoire puissent enregistrer cette bataille comme un match nul, il s’agit d’une victoire stratégique qui a empêché notre ennemi d’avancer vers le sud contre Liu Wenhui."
 sichuan_events.84.t.flood:0 "Les Inondations de Baopingkou"
 sichuan_events.84.d.flood:9 "Sur l'ordre de Huang Yin, les ingénieurs militaires se sont employés non pas à construire des défenses, mais à obstruer le canal de Baopingkou de manière à provoquer une inondation contrôlée, qui n'affecterait pas les positions de Baoding et causerait le moins de dégâts civils possible. L'objectif était d'inonder les forces de Liu Xiang et de transformer leurs camps en marécage. Les ingénieurs militaires ont travaillé dur pour s'assurer que les dommages au système de Dujiangyan et aux zones environnantes seraient limités. Réalisant toutefois qu'ils manquaient de temps, ils ne pouvaient espérer qu'atténuer la destruction dans le meilleur des cas.\n\nUne fois les préparatifs achevés, les canaux ont été bloqués avec des dalles en bois, et il n'a pas fallu longtemps pour que les digues environnantes débordent de leurs tracés déterminés, déversant directement les eaux dans les camps du Département accéléré. De nombreux soldats ont été réveillés brutalement, leurs tentes n'offrant aucune protection contre les eaux montantes qui transformaient lentement le sol en un marécage boueux. Les étuis d'armes étaient trempés et le sol sur lequel se tenaient de nombreuses pièces d'artillerie s'est rapidement transformé en une boue molle qui a lentement englouti les canons les plus lourds. Une retraite précipitée a suivi, les troupes tentant de sauver autant d'équipement que possible des eaux montantes. Inutile de dire que leur équipement abandonné et leurs positions sont aussi inutiles pour Baoding que pour eux, mais ils ne seront certainement pas en mesure de lancer une offensive désormais.\n\nBien qu'il s'agisse d'une victoire militaire, des rapports indiquent que, malgré nos meilleurs efforts, les dommages au système de Dujiangyan ont été considérables et que les inondations ont emporté de nombreuses cultures voisines. Cependant, Baoding a réussi à prendre l'initiative dans la guerre sans perdre un seul soldat, et lui seul peut juger si le risque en valait la peine."
 sichuan_events.84.a:0 "Ils ne passeront pas !"

 sichuan_events.85.t:0 "Effondrement des Défenses de Guanxian"
 sichuan_events.85.d:9 "Malgré les solides défenses mises en place par Huang Yin et les diverses actions d’arrière-garde menées contre l’ennemi, la supériorité numérique de celui-ci ainsi que les compétences stratégiques de Liu Xiang se sont révélées trop puissantes pour les forces de Yin. Bien que le Département accéléré ait payé un lourd tribut pour sa victoire, en grande partie grâce aux nombreuses zones de tir d’artillerie préparées à l’avance, il a fini par percer les lignes ennemies au bout de trois jours, grâce à un mélange d’agressivité impitoyable et de discipline. Une série de contre-attaques a été lancée dans l’espoir de reprendre les positions défensives de Huang Yin, mais toutes ont été vaines, et le drapeau du Département accéléré n'a pas tardé à flotter sur le temple Er Wang.\n\nHumiliés par cette défaite, les troupes de Baoding ont été contraintes de battre en retraite toujours plus à l’ouest. Si une dernière défense désespérée des passages de Dujiangyan a empêché la déroute et permis à la plupart des soldats de se replier vers Pixian, au sud-est, les troupes de Huang Yin sont désormais dispersées pour défendre les digues et ne pourront pas atteindre Chengdu ou Meishan à temps pour rejoindre les forces de Liu Wenhui. Elles sont désormais seules et doivent faire de leur mieux pour résister à l’avancée sud du Département accéléré."
 sichuan_events.85.a:0 "Bon, mais mauvais."

 sichuan_events.86.t:0 "Règlement de Compte à Meishan"
 sichuan_events.86.d.success:9 "Avec le succès de Baoding à Guanxian, qui a empêché le Département accéléré de se déplacer vers le sud comme prévu, les troupes de Liu Wenhui ont pu atteindre Meishan sans nouvelle interférence des forces industrielles. Elles traversent actuellement le fleuve Min pour se lier à la force principale à Chengdu et aux réserves triomphantes de Deng à Guanxian. Une fois les armées de Baoding enfin reliées, elles pourront mettre un terme au traître Liu Xiang et conclure cette guerre."
 sichuan_events.86.d.failure:9 "Avec l’effondrement des positions de Baoding autour de Guanxian malgré les vaillants efforts de Huang Yin, le flanc nord de la force accélérée est désormais sécurisé. Ne perdant pas de temps, Liu Xiang a ordonné à ses forces triomphantes d’avancer vers le sud-ouest en direction des passages de la rivière Min. Les forces du Xikang arrivées sur place se retrouvent face à un ennemi retranché de l’autre côté de l’une des plus grandes rivières du Sichuan. Refusant de jeter ses soldats dans une attaque vaine, Liu Wenhui a suspendu l’offensive prévue.\n\nLes deux camps se surveillent de part et d’autre du fleuve, échangeant seulement des escarmouches sporadiques et des tirs de tireurs d’élite. Les deux parties considèrent un passage de rivière comme un suicide, ce qui scelle la perte de Baoding et la victoire de ses ennemis. Toute tentative de secours étant bloquée par le fleuve, Chengdu est coupée. Il ne nous reste plus qu’à prier que ses défenseurs accomplissent un miracle."
 sichuan_events.86.a:0 "Enfin !"
 sichuan_events.86.b:0 "Tout est fini maintenant..."

 sichuan_events.87.t:0 "La Bataille de Longquanyi"
 sichuan_events.87.d:9 "Liu Xiang savait qu’il prenait un risque considérable en mettant le siège devant Chengdu, mais il reste un général suffisamment compétent pour deviner un piège. Commençant à prendre des mesures pour fortifier ses positions désormais exposées, à moins de lever le siège et de se retirer à Chongqing, c’est la seule carte qu’il semble disposé à jouer. Et les défenseurs l’ont clairement remarqué. Les mouvements simultanés ont amené les deux forces à tenter de se dépasser mutuellement, jusqu’à ce qu’elles s’affrontent finalement dans le village de Longquanyi, au sud-est de Chengdu.\n\nCe qui avait commencé comme une petite escarmouche entre des détachements d’éclaireurs s’est rapidement transformé en une bataille à grande échelle. Bien que Liu Xiang ait eu l’avantage au début grâce à sa propre habileté et à ses effectifs supérieurs, une défense opiniâtre de la campagne et une bonne coordination entre les commandants de [ROOT.GetLeader] ont permis à ses renforts en provenance de Chengdu et de Guanxian d’arriver à temps pour renforcer ses positions et porter un coup décisif aux forces ennemies. Avec le gros de ses troupes mis en déroute, la seule force cohérente qui subsiste du puissant Département accéléré en dehors de Chongqing est la force de siège symbolique laissée autour de Chengdu, désormais prise en étau entre les vastes armées de [ROOT.GetLeader] et les remparts de la ville. On raconte que l’organisation du Département accéléré a commencé à s’effondrer après cette défaite dévastatrice."
 sichuan_events.87.a:9 "C'est la fin pour toi, Liu Xiang !"

 sichuan_events.88.t:0 "Liu Xiang Disparaît"
 sichuan_events.88.d:9 "Il semble que la chance de Liu Xiang ait enfin tourné. Après le désastre de Longquanyi et la sévère défaite subie par ses troupes, l'ancien puissant seigneur de la guerre de Chongqing semble avoir disparu. On ignore à ce stade s'il est mort sur le champ de bataille ou s'il s'est simplement enfui hors du Sichuan une fois sa défaite devenue inévitable. Quoi qu'il en soit, le fait qu'il ait disparu a provoqué des secousses dans toute la région, pas seulement au sein de son armée, désormais l'ombre démoralisée de ce qu'elle était autrefois."
 sichuan_events.88.a:0 "Une fin appropriée."

 sichuan_events.89.t:9 "Les Forces Fédéralistes Attaquent Depuis Tongren"
 sichuan_events.89.d:9 "Avec les forces de Liu Xiang en déroute, celles de Xiong Kewu, dirigées par Yu Jitang, ont franchi la frontière provinciale depuis Tongren dans le Guizhou et ont commencé à occuper des comtés du Sichuan. Si une telle attaque ne constituerait pas une menace majeure en temps normal, la présence continue d'unités dans la garnison de Chongqing, anciennement sous le contrôle de Liu Xiang, et, plus inquiétant encore, les rumeurs circulant sur des contacts entre la garnison, les forces de Xiong Kewu et le Département des Officiers, ont suscité des craintes quant à une alliance malsaine entre les trois pour s'opposer à Yang Sen."
 sichuan_events.89.a:0 "Attendez, quoi ?"

 sichuan_events.90.t:9 "La Coalition Anti-Yang Sen"
 sichuan_events.90.d:9 "Avec l’invasion récente du Sichuan par les Fédéralistes en provenance du Guizhou, coïncidant avec le chaos général qui règne dans toute la province, peu considèrent le gouverneur Yang Sen autrement que comme un échec. Play-boy aux yeux de certains, patricien au prestige incalculable pour d’autres, voire modernisateur despotique pour d’autres encore, l’emprise de Yang sur la province est quasi inexistante, en dehors des sphères de contrôle direct de son Département accéléré. Et sa faiblesse, alliée à une force simultanément renaissante, est évidente, non seulement pour ses alliés du Département de l’Armement, mais aussi pour ses ennemis.\n\nRécemment, lors d’une réunion tenue en secret, une alliance à grande échelle s’est formée au sein du conflit du Sichuan, une coalition qui n’est pas particulièrement rare, se positionnant sur la base de la lutte contre la force retrouvée de Yang Sen. Formée conjointement avec le Département de Baoding, les Fédéralistes, le Département des Officiers, les restes du Département accéléré de Liu Xiang et de nombreux groupes mineurs, il semble que Yang Sen ait été surpassé.\n\nBien que la Coalition anti-Yang Sen soit loin de pouvoir véritablement chasser le gouverneur en place, elle a conduit le conflit à une impasse nocturne, et beaucoup croient que le gouverneur Yang sera simplement contraint de partir par les circonstances, plutôt que par la balle."
 sichuan_events.90.a:9 "Et ils croient pouvoir imposer la paix ?"

 sichuan_events.91.t:9 "Une Paix Précaire"
 sichuan_events.91.d:9 "Malgré toutes les tentatives et manœuvres visant à une résolution brutale de la guerre civile du Sichuan, il semble que le conflit ait surpris les observateurs comme les participants en ce qui apparaît comme un modus vivendi. Suite à l'alliance anti-Yang Sen entre le Département des Officiers, le Département de Baoding, les restes du Département accéléré de Liu Xiang et de nombreux autres petits groupes, le gouverneur soutenu par le Zhili a apparemment été destitué par ses propres anciens alliés. Le Département de l'Armement refusant de soutenir le propre Département accéléré de Yang, le gouverneur a été contraint de partir, non pas de Chengdu, mais du pouvoir.\n\nConservant la plus grande force militaire de la province, et soutenu par un contrôle significatif de son territoire, le Département de Baoding a réussi à s'imposer au-dessus de toutes les autres petites factions pour devenir les dirigeants apparents du Sichuan. Bien que contesté de manière mineure de tous côtés, aucune des oppositions ne semble avoir la force de véritablement s'opposer seule à Baoding, ni les capacités de rejeter leur animosité mutuelle.\n\nAyant assumé la position de "Gouverneur", Deng Xihou a été largement apaisé par sa nouvelle position au sein de la province. Dominant les zones autour des zones clés telles que Chengdu et Chongqing, le contrôle du nouveau gouverneur est loin d'être complet, et les rumeurs montent déjà que des hommes au sein de ses propres rangs, tels que Liu Wenhui, ont commencé à agiter pour influencer le gouvernement provincial."
 sichuan_events.91.a:9 "Et ainsi, le Sichuan s'apaise... sans une dernière balle."

 sichuan_events.92.t:0 "La Course pour Chongqing"
 sichuan_events.92.d:0 "Après la dernière bataille, le temps presse. Disposant de peu de marge de manœuvre et ne pouvant se permettre aucune erreur, Liu Wenhui déploie ses forces pour porter un coup rapide et décisif contre Chongqing. Il était impossible de maintenir une force de cette taille dissimulée pendant longtemps, et il ne faisait que question de temps avant que le rusé Liu Xiang ne retrouve leur trace."
 sichuan_events.92.a:0 "En route !"

 sichuan_events.93.t:9 "Les Multiples Visages de Baoding"
 sichuan_events.93.d:9 "Triumvirat de seigneurs de la guerre régionaux, le Département de Baoding est l'une des quelques factions militaires du Sichuan à ne pas être originaire du bassin du fleuve Rouge. Composé (pour la plupart) de diplômés de l'Académie militaire de Baoding, Liu Wenhui, Tian Songyao et Deng Xihou (même si ce dernier n'a aucun diplôme), les trois hommes sont des amis de longue date et des acteurs de la politique du Sichuan depuis leur alliance contre Yang Sen en 1925. Formant le "Bureau commun des Trois Armées" en 1926, le trio a amassé beaucoup d'influence au Sichuan.\n\nLiu Wenhui contrôlant la majorité du Xikang oriental, et Deng et Tian contrôlant de nombreux comtés au nord du Sichuan, le trio a réussi à dépasser son statut de simple pion dans les luttes de pouvoir du Sichuan, et a une opportunité claire pour prendre le pouvoir. Cependant, un problème est apparu, et il est majeur. La seule figure qui se tient entre Baoding et le succès est l'étincelle qui a mis le feu aux poudres : le neveu de Liu Wenhui, Liu Xiang, et sa large portion du Département de l'Armement.\n\nLa Course pour Chongqing étant lancée, Liu Wenhui a réussi à approcher une unité rapide de la ville depuis sa position de l'Est. Cependant, entendant la nouvelle d'un tel pari, Deng Xihou et Tian Songyao ont tous deux télégraphié à leur "partenaire" pour insister que la prise de Chongqing est leur prérogative, puisque la ville fait partie de leur sphère d'influence. Bien que ni Deng, ni Tian, ni Liu ne souhaitent briser les rangs de Baoding en ce moment crucial, une décision doit être prise, et beaucoup de gens ont peu d'espoir en la force relativement non éprouvée de Deng et Tian comparée aux unités d'élite de Liu Wenhui."
 sichuan_events.93.a:9 "Appuyons-nous sur le noyau de Liu Wenhui."
 sichuan_events.93.b:9 "Favorisez les forces de Deng et de Tian."

 sichuan_events.95.t:9 "Le Pari Audacieux de Liu Wenhui"
 sichuan_events.95.d:9 "Liu Wenhui a conçu un plan audacieux dès le début de cette guerre : capturer Chongqing sous le nez de Liu Xiang pendant que ses hommes sont occupés par le siège de Chengdu. Une manœuvre certes audacieuse et risquée, mais bien plus réaliste que de vaincre la vaste armée de Liu Xiang en terrain découvert.\n\nMaintenir une armée de cette taille dissimulée pendant longtemps s’est avéré impossible. Il ne s’agissait que d’une question de temps avant que les forces de Liu Xiang ne finissent par découvrir les manœuvres de l’armée de Baoding. De manière prévisible, Liu Xiang a ordonné à un détachement de ses troupes de quitter le siège de Chengdu pour intercepter l’armée de son oncle. Cependant, tout ce plan s’est effondré dans les montagnes et les rivières du Sichuan, car les troupes envoyées pour attaquer les forces de Liu Wenhui ont été victimes des attaques constantes des insurgés du Sichuan, des forces fédéralistes et des escarmouches sporadiques avec le Département des Officiers.\n\nLes embuscades, les pièges et les routes bloquées font que tout espoir de renforcer Chongqing est devenu totalement futile. La garnison de Wang Lingji dans la ville de Chongqing se retrouve désormais seule, rien ne semblant capable d’arrêter la force de Baoding à ce stade."
 sichuan_events.95.a:0 "Maintenant, pour que leurs efforts en valent la peine."

 sichuan_events.96.t:0 "La Chute de Chongqing"
 sichuan_events.96.d:9 "Déplacer le gros de l’armée de Baoding vers Chongqing était jouer à quitte ou double, mais les probabilités semblaient être en notre faveur, grâce à notre position stratégique avantageuse. Bien que Liu Xiang avait prévu cette manœuvre, il n’avait pas anticipé le rôle imprévisible des insurgés du Sichuan, des fédéralistes et d’autres groupes divers.\n\nQuoi qu’il en soit, Chongqing reste une ville fortement défendue, étant le cœur battant de l’industrie du Sichuan. Les commandants de Baoding sont réputés pour leur compétence, et cela s'est manifesté lors de cette bataille. Optant pour une approche méthodique, les défenseurs de Chongqing ont été délogés rue par rue. Malgré la taille de la ville et sa garnison, celle-ci n'a pas tenu longtemps. Une fois que Wang Lingji a appris que la force de secours de Liu Xiang n’arriverait pas avant au moins une semaine, en raison des attaques continues des guérilleros des Officiers, il a ravalé sa fierté et a offert sa reddition plutôt que de voir la ville dont il était maire réduite en cendres."
 sichuan_events.96.a:0 "Une grande victoire !"

 sichuan_events.97.t:9 "Effondrement du Département Accéléré"
 sichuan_events.97.d:9 "Chongqing était un bastion vital pour les forces de Liu Xiang, en raison des nombreuses usines de la ville et du contrôle qu’elle exerce sur le trafic du Yangtsé. Une fois cette ligne vitale coupée par la reddition de Wang Lingji, les troupes de Liu Xiang assiégeant actuellement Chengdu ont cessé de recevoir des fournitures indispensables telles que la nourriture, les munitions et les armes. Plus grave encore, la paie des soldats a également cessé d’arriver avec la paralysie complète des fonctions administratives de Chongqing. Sans fusils, sans paie, ni même une structure de commandement fonctionnelle, la désertion et l’insubordination sont devenues monnaie courante. Le siège de Chengdu a déjà faibli car la plupart des soldats et des officiers pensent que la guerre est perdue et à la campagne, les forces du Département accéléré ont commencé à fondre à mesure que la nouvelle de la chute de Chongqing les atteignait. La plupart ont simplement jeté leurs fusils et sont retournés chez eux, refusant de se battre pour une cause perdue.\n\nAprès avoir été surpassé dans un pari à haut risque, Liu Xiang a complètement perdu le contrôle de la situation. Voyant son armée se désintégrer et refusant de faire face à la justice pour sa trahison, il a choisi de fuir avec ce qui reste de son cercle intime. Sans leur capitale, sans leurs usines et sans leur leader, le Département accéléré a maintenant été complètement vaincu. La victoire est à nous."
 sichuan_events.97.a:0 "Nous triomphons."

 sichuan_events.98.t:0 "Désastre à Beipei"
 sichuan_events.98.d:9 "S’appuyant sur les forces de Deng et de Tian, Baoding a marché vers Chongqing, visant à prendre la ville aux mains de Liu Xiang tout en luttant contre les divers insurgés et bandits sans le soutien de Liu Wenhui. Prévoyant cette manœuvre, Liu Xiang a ordonné à une partie de son armée principale de se déplacer pour intercepter l’armée adverse en progression, sans avoir à craindre que le siège de Chengdu ne soit levé. Grâce, en grande partie, au harcèlement persistant des insurgés, les forces de Baoding ont été considérablement ralenties, permettant à des éléments des réserves de Wang Lingji, basées à Chongqing, de se mobiliser pendant que Liu Xiang poursuivait l’armée de Baoding. Cela a fini par les prendre en tenaille entre les deux armées accélérées en progression près de la ville de Beipei, juste au nord de Chongqing. Une défense désespérée a suivi.\n\nCernée et coupée de ses lignes, l’armée de Baoding se trouvait dans une position désastreuse. Les environs de la ville n’offrent aucune bonne position défensive, rendue encore plus précaire par une situation logistique catastrophique. Bien qu’il soit compétent, Huang Yin ne disposait que de quelques heures pour préparer quoi que ce soit ressemblant à une défense. La tâche qui lui était confiée était tout simplement impossible compte tenu de sa propre situation critique et de la supériorité ennemie. Les forces de Baoding ont vaillamment tenu leurs positions, mais après moins d’une heure de combat, les défenses de fortune se sont effondrées sous les assauts combinés de l’armée de Liu Xiang. Avec l’autorisation de Deng Xihou, la majeure partie des soldats et leurs officiers se sont rendus peu après, ne voulant pas sacrifier leur vie pour une bataille sans espoir."
 sichuan_events.98.a:0 "Tout est fini maintenant..."

 sichuan_events.99.t:0 "Liu Wenhui se Replie au Xikang"
 sichuan_events.99.d:9 "Être un bon officier, c’est aussi savoir reconnaître quand on a été battu et battre en retraite tant qu’il reste une chance de sauver la vie de ses soldats. Bien que la catastrophe de Beipei ait marqué la fin de toute résistance effective de l’armée principale de Baoding, sa défense contre l’attaque surprise en tenaille lui a permis de s’échapper avec une escorte de ses hommes les plus proches. C'est un sursis et il a échappé de justesse à la capture par les soldats avancés de l’armée de Liu Xiang alors qu’il fuyait vers l’ouest.\n\nPendant qu’il rassemble ses forces restantes dans la relative sécurité des montagnes du Xikang, Chengdu et ses défenseurs sont livrés à eux-mêmes."
 sichuan_events.99.a:0 "Au moins, il en est sorti indemne."

 sichuan_events.100.t:0 "Deng Xihou se Rend"
 sichuan_events.100.d:9 "Alors que l'avant-garde de Liu Xiang regagnait le nord pour poursuivre son siège de Chengdu de toutes ses forces, le Département de Baoding a décidé d'accepter l'inévitable. Après la défaite des forces de Huang Yin, Deng Xihou sait qu'il n'a aucune chance de venir à bout des forces combinées du Département accéléré et que poursuivre le combat ne causerait que des morts inutiles parmi ses propres soldats et la population derrière les murs de Chengdu. En conséquence, Deng a envoyé un émissaire au quartier général de campagne de Liu Xiang, situé à l'extérieur de Chengdu, pour demander un cessez-le-feu. Compte tenu de sa faible position de négociation, la seule chose qu'il demande en échange du transfert pacifique de Chengdu à Liu Xiang est le passage sûr hors du Sichuan pour Deng et la direction du Département de Baoding. Liu Xiang, sachant qu'une ville ruinée et de lourdes pertes ne l'aideraient pas à unifier le pays encore déchiré par de petits seigneurs de la guerre et des guérilleros, a accepté et honoré rapidement l'accord.\n\nBien que les murs de Chengdu soient encore debout, les portes ont été ouvertes aux soldats triomphants du Département accéléré. À ce stade, la plupart des citoyens de Chengdu ne ressentent que le soulagement que la guerre puisse bientôt prendre fin et qu'ils aient été épargnés par un assaut direct."
 sichuan_events.100.a:0 "Alors c'est fini. Ou bien ça commence ?"

 sichuan_events.101.t:0 "Le Gouverneur Xiao Envahit Enshi"
 sichuan_events.101.d:9 "La région de Shihe, dans le sud-ouest du Hubei, autrefois contrôlée par [SZC.GetNameDef], est partagée entre une gouvernance de jure et de facto depuis la fin des combats en Chine occidentale après la Restauration Xuantong. Indigné par cette situation, le gouverneur du Hubei, Xiao Yaonan, a régulièrement sollicité le Gouvernement central pour qu’il agisse et annexe ce territoire, considéré comme les terres légitimes du Hubei. Cependant, cette démarche n’a jamais abouti, le gouvernement privilégiant la stabilité et de bonnes relations avec Yang Sen plutôt que l’agitation.\n\nSuite à l’effondrement de l’autorité des Qing, la région a cependant été saisie par les forces du gouverneur Xiao Yaonan, dans un acte indépendant et non autorisé. Il a réussi à submerger les garnisons locales [SZC.GetAdjective] et a remporté un butin précieux pour sa position au sein de la Clique du Zhili. Le Département accéléré aurait organisé une forme de résistance futile contre la grande armée de la Clique du Zhili, et le Sichuan a déjà envoyé des divisions pour tenter de reprendre la région, mais les forces de Xiao Yaonan ont jusqu’à présent réussi à les repousser avec une relative aisance."
 sichuan_events.101.a:0 "Il ne peut pas vaincre une clique entière tout seul !"

 sichuan_events.102.t:0 "Enshi Capturée par le Zhili"
 sichuan_events.102.d:0 "La région de Shihe, dans le sud-ouest du Hubei, autrefois contrôlée par [SZC.GetNameDef], est partagée entre une gouvernance de jure et de facto depuis la fin des combats en Chine occidentale après la Restauration Xuantong. Indigné par cette situation, le gouverneur du Hubei, Xiao Yaonan, a régulièrement sollicité le Gouvernement central pour qu’il agisse et annexe ce territoire, considéré comme les terres légitimes du Hubei. Cependant, cette démarche n’a jamais abouti, le gouvernement privilégiant la stabilité et de bonnes relations avec Yang Sen plutôt que l’agitation.\n\nProfitant de l’opportunité, Xiao Yaonan a envahi le sud-ouest du Hubei. Ayant établi une occupation temporaire dans la ville d’Enshi, ses forces ont mis en déroute les garnisons locales et avancent. Des divisions ont déjà été envoyées à la frontière provinciale et de violents combats ont éclaté entre les forces de Liu Xiang et celles de l’armée du Zhili."
 sichuan_events.102.a:0 "Liu Xiang parvient à repousser le Zhili !"
 sichuan_events.102.b:0 "La campagne de Liu Xiang est défaite !"

 sichuan_events.103.t:0 "Assaut sur Enshi"
 sichuan_events.103.d:9 "Les forces du général Liu Xiang à Shihe ont échoué dans leur assaut sur la ville d’Enshi. Avec les soldats [SZC.GetAdjective] épuisés et en infériorité numérique, une retraite a été ordonnée et le Zhili a avancé pour réoccuper les terres qu’il avait perdues lors de l’offensive du Département accéléré. Au cours de la retraite [SZC.GetAdjective], de nombreux hommes ont été perdus en route, le Zhili menant une attaque féroce contre les forces en retraite."
 sichuan_events.103.a:0 "Un brillant succès, Xiao !"

 sichuan_events.104.t:0 "La Bataille d'Enshi"
 sichuan_events.104.d:0 "Après que les forces de Liu Xiang ont réussi à contourner et à encercler la ville d’Enshi, la présence du Zhili dans le Hubei s’est effondrée. Les repoussant jusqu’à la frontière [QIE.GetAdjective], le général Liu Xiang a remporté un succès considérable en reconquérant et en occupant le Hubei. La présence du Zhili a été largement éradiquée de la région, seules quelques poches de soldats paniqués tentant de regagner les forces principales qui occupaient Enshi."
 sichuan_events.104.a:0 "Vous nous avez coûté très cher en agissant seul !"

 sichuan_events.120.t:0 "Sécheresse ?"
 sichuan_events.120.d:0 "Il y a un peu plus d’une décennie, en 1925, une grande famine a dévasté la province du Sichuan. Des centaines de milliers de personnes sont mortes et autant ont fui la province. Exacerbée par les guerres intestines de cette époque, la famine a été provoquée par une sécheresse prolongée et a causé des dommages économiques et financiers irréparables au Sichuan. Depuis dix ans, les paysans qui ont survécu à la sécheresse prient précipitamment chaque fois que le soleil reste dans le ciel pendant plus d’une semaine - mais il semble que leurs prières soient restées sans réponse cette année. Il ne pleut pas dans la province depuis plus d’un mois et beaucoup craignent un retour à la catastrophe de 1925..."
 sichuan_events.120.a:0 "La pluie devrait bientôt tomber..."

 sichuan_events.121.t:0 "Lignes de Transport Coupées"
 sichuan_events.121.d:0 "Face à la crainte d’une famine déjà vive après que la sécheresse a persisté, de nombreux membres du cercle proche de [SZC.GetLeader] ont conseillé de constituer des stocks de riz importé par le Yangtsé. Désormais, ce plan a été abandonné. Les hautes marées, provoquées par des fonte glaciaire inhabituellement importante dans les montagnes, ont empêché tout commerce fluvial d’atteindre Chengdu cette année, et le chaos persistant au sein de la Ligue a largement coupé le commerce ferroviaire en provenance des ports des Légations où la nourriture est importée. Avec le gouvernement du Yunnan adoptant des mesures de plus en plus ouvertement hostiles à notre égard, la seule voie vers un port passe par la clique du Liangguang. Bien que cette route soit stable, ils ne sont pas exactement nos amis proches et nous risquons d’être coupés de *tout* commerce international sous peu."
 sichuan_events.121.a:0 "Il nous faut une route alternative, maintenant !"

 sichuan_events.122.t:0 "Flambée des Prix du Riz"
 sichuan_events.122.d:0 "Alors que les importations dans notre province se font de plus en plus rares et que la crainte d’une famine grandit à chaque jour ensoleillé, les prix des denrées alimentaires flambent dans l’ensemble des marchés du Sichuan. Cela a déjà provoqué des émeutes et des manifestations, depuis les petits villages de montagne jusqu’à Chengdu même. Ceux qui en ont les moyens ont commencé à quitter la province, la plupart se dirigeant vers la relative sécurité du nord."
 sichuan_events.122.a:0 "Comme si la guerre n'était pas déjà un problème !"

 sichuan_events.123.t:0 "Famine !"
 sichuan_events.123.d:0 "Nos pires craintes se sont réalisées : la menace imminente de famine est désormais une réalité. La sécheresse et les troubles au sein de la Ligue, qui ont coupé la majeure partie de nos importations, ont créé une tempête parfaite de misère et de chaos, alors que d’anciens voisins se retournent les uns contre les autres pour des miettes de nourriture. Les fonctionnaires de toute la province rapportent des émeutes alimentaires de masse, des pillages et des décès par famine. L’ordre public s’est effondré, les policiers étant trop affaiblis par la faim pour arrêter les criminels, tandis que les réfugiés fuient la province par tous les moyens possibles. Si la pluie ne tombe pas bientôt, l’anarchie totale est inévitable."
 sichuan_events.123.a:0 "Pas encore !"

 sichuan_events.124.t:0 "La Famine Éclate au Sichuan"
 sichuan_events.124.d:0 "La province du Sichuan a longtemps lutté contre la famine. Un terrain rocailleux et un climat imprévisible ont maintenu les populations à un niveau bas jusqu'au début de l'ère des Qing, lorsque des défrichements à grande échelle et des incitations à l'immigration ont attiré des hordes de paysans dans la province. En 1925, une longue sécheresse s'est transformée en une famine dévastatrice qui a ravagé la province, entraînant des centaines de milliers de morts et des millions de réfugiés.\n\nAujourd'hui, avec le chaos au sein de la Ligue qui perturbe les livraisons de nourriture et une autre longue sécheresse, le spectre de la famine hante à nouveau le Sichuan. Des récits horrifiants émergent déjà, rapportant des mères vendant leurs enfants pour quelques miettes de pain, tandis que l'anarchie s'empare même des villes les plus riches."
 sichuan_events.124.a:0 "Cette année ne fait qu'empirer !"

 sichuan_events.125.t:0 "La Pluie Revient au Sichuan"
 sichuan_events.125.d:0 "[SZC.GetLeader] était penché sur son bureau, rédigeant désespérément lettre après lettre à [GXC.GetLeader] pour négocier l'importation de riz lorsqu'il apprit la nouvelle. Cela avait commencé par quelques gouttes isolées, mais en quelques minutes, [SZC.GetLeader] entendit le battement régulier de la pluie sur le toit de son bâtiment. À peine croyant ses oreilles, il sortit et fut presque immédiatement trempé. Autour de lui, ses soldats célébraient et même les gardes du manoir du gouverneur, d'ordinaire si renfermés, dansaient presque de joie.\n\nBien qu'il faille un certain temps pour faire pousser une nouvelle récolte, la pluie aidera à calmer la paysannerie et à mettre fin à l'anarchie qui s'est emparée de la majeure partie de la province."
 sichuan_events.125.a:0 "Bénie soit la pluie !"

 sichuan_events.127.t:0 "La Famine S'estompe"
 sichuan_events.127.d:0 "À mesure que le secteur agricole sichuanais retrouve progressivement sa productivité, la sombre menace de la famine recule peu à peu de la province. De plus en plus de fermes commencent à accroître leur production, tandis que les ravages de la guerre civile s’estompent de la mémoire collective. Nous ne connaîtrons peut-être jamais l’étendue exacte des dégâts, mais il apparaît clairement que nous serons bientôt en mesure de déclarer officiellement la fin de la famine.\n\nNéanmoins, avec des millions de citoyens décédés dans cette catastrophe, la famine a laissé une marque sombre et indélébile sur le Sichuan, qui mettra des décennies à s’effacer complètement. Même aujourd’hui, de nombreuses zones restent dans une sorte de limbe, l’approvisionnement en grains demeurant instable. En première étape, nous devons œuvrer à éradiquer définitivement les dernières poches de famine."
 sichuan_events.127.a:0 "La fin d'une sombre époque."

 sichuan_events.128.t:0 "Le Sichuan S'adresse au Gouvernement Central"
 sichuan_events.128.d.zhili:0 "Comme si les choses ne pouvaient pas empirer, le gouvernement du Sichuan nous a récemment informés que la sécheresse qui frappait leur province depuis le mois dernier s’est transformée en une famine à part entière, l’ordre social s’effondrant à mesure que les denrées alimentaires se font de plus en plus rares. Par conséquent, ils ont sollicité l’aide de notre gouvernement. Bien que nous ayons des préoccupations plus urgentes à traiter, la province est d’une importance capitale pour notre régime, et garantir la loyauté de leur gouvernement sera essentiel pour réunifier la Chine."
 sichuan_events.128.d.manchu:0 "Bien que notre nouveau gouvernement ne soit pas reconnu par de nombreux seigneurs de la guerre qui l'entourent, l'administration provinciale du Sichuan de [SZC.GetLeader] nous a récemment contactés pour demander de l'aide. C'est une excellente occasion de montrer que nous sommes le nouveau gouvernement "légitime" de la Chine. Les ministères de l'Agriculture, cependant, sont encore sous le choc du coup d'État et pourraient mettre du temps à préparer l'aide nécessaire pour aider le Sichuan."
 sichuan_events.128.a:0 "Ordonnez aux ministères d'envoyer de l'aide."
 sichuan_events.128.b:0 "Nous avons d'autres préoccupations."

 sichuan_events.129.t:0 "Luttes Intestines dans les Ministères !"
 sichuan_events.129.d:0 "Comme c’est habituel à Beijing, notre ordre adressé aux différents ministères de l’agriculture a déclenché une guerre acharnée d’appels d’offres, de luttes bureaucratiques et une inertie générale qui caractérisent l’appareil gouvernemental de Beijing, indolent et inefficace. Un exemple d’aujourd’hui illustre particulièrement bien cette corruption : des sacs de riz ont été rassemblés à Beijing, mais un différend sur la compagnie ferroviaire chargée de les acheminer vers Chengdu a provoqué une semaine de négociations entrecoupées de pots-de-vin et, de manière surprenante, d’accusations selon lesquelles le propriétaire d’une des compagnies était homosexuel. Tandis que d’importantes sommes d’argent circulent, seule une poignée de grains de riz a réellement atteint les mains de la paysannerie affamée du Sichuan."
 sichuan_events.129.a:0 "Allez, dépêchez-vous !"

 sichuan_events.130.t:0 "Luttes Ministérielles Persistantes"
 sichuan_events.130.d.zhili:0 "Il semble que les différents ministères de l’agriculture tardent encore à livrer les denrées alimentaires qu’ils ont collectées à Beijing. Des sacs de grain pourrissent dans les entrepôts à travers la ville, tandis que la paysannerie du Sichuan meurt de faim et que la situation de Yang Sen devient de jour en jour plus précaire. Wu Peifu a conçu une solution pour débloquer la situation : en menaçant de renvoyer les ministres, il espère les secouer et les pousser à l’action. Comme toujours, toutefois, cela a un coût. Wu devra dépenser du pouvoir politique qu’il pourrait utiliser ailleurs au sein du gouvernement pour rassurer les réseaux de clientèle soutenant ces ministères, leur assurant que ces menaces ne sont pas *réellement* sérieuses. Ou le sont-elles ?"
 sichuan_events.130.d.manchu:0 "Il semble que les différents ministères de l’agriculture n’aient toujours pas livré la nourriture qu’ils ont collectée à Beijing. Des sacs de grains pourrissent dans les entrepôts à travers la ville pendant que la paysannerie du Sichuan meurt de faim. Le nouveau gouvernement a l’opportunité de montrer ses muscles en menaçant de renvoyer les ministres chargés de la distribution alimentaire - mais cela aurait un coût élevé."
 sichuan_events.130.a:0 "Poussez les ministères à s'y mettre !"
 sichuan_events.130.b:0 "Laissons-les continuer à se disputer..."

 sichuan_events.131.t:0 "Aide de Beijing contre la Famine"
 sichuan_events.131.d:0 "Alors que nous étions inquiets du manque de trains en provenance de Beijing suite à notre demande d'aide - leurs télégrammes quotidiens indiquant qu'elle était "en route" ne faisant guère diminuer nos craintes - il semble qu'ils aient réussi à stimuler les ministères de l'Agriculture et de l'Aide, réputés pour leur complexité byzantine, et à les faire fonctionner tant bien que mal. Bien que certains des sacs de riz promis soient moins pleins qu'annoncé - sans nul doute vidés partiellement par des fonctionnaires cupides - nous avons reçu suffisamment de nourriture pour atténuer temporairement le pire de la chaos."
 sichuan_events.131.a:0 "Enfin !"

 sichuan_events.132.t:0 "Beijing Ignore notre Demande"
 sichuan_events.132.d.zhili:0 "Alors que Yang espérait que son ancien allié Wu Peifu viendrait à son secours dans ce moment critique, il semble que le Maréchal de Jade ait d’autres chats à fouetter. Bien qu’il ait envoyé un message télégraphique compatissant à Yang, il a affirmé que le chaos persistant dans l’ancienne Ligue des Huit Provinces l’avait privé de toute ressource disponible pour l’aide aux victimes de la famine."
 sichuan_events.132.d.manchu:0 "Bien que nous ayons toujours craint que le gouvernement de Beijing n’ignore nos demandes, ces craintes se sont avérées fondées aujourd’hui lorsque [QIE.GetLeader] nous a informé formellement qu’il ne pouvait fournir l’aide nécessaire pour contrer notre famine. Beaucoup suspectent que cela soit dû à nos loyautés de "seigneur de la guerre" et la position de [SZC.GetLeader] semble déjà de jour en jour de plus en plus précaire."
 sichuan_events.132.a:0 "Nous nous en souviendrons !"

 sichuan_events.133.t:0 "L'AREC Félicite le Gouvernement"
 sichuan_events.133.d:0 "Quelques groupes au sein de l'Assemblée détestent l'Association Harmonie et le Zhili plus que l'AREC. Composée d'intellectuels naïfs, elle proteste fréquemment contre le "caractère seigneurial" de notre gouvernement et affirme que nous ne sommes que des kleptocrates corrompus, plus intéressés par le pillage des paysans que par le développement de la nation. Cependant, suite à notre promesse d'aider [SZC.GetLeader] et de mettre fin à la famine qui ravage sa province, ils ont publiquement loué notre "surprenante preuve de compassion pour les paysans de Chine".\n\nPersonne au sein de l'AH n'est vraiment sûr qu'ils soient assez naïfs pour croire que nous faisons cela pour aider réellement les paysans, mais ce soutien est certainement préférable à leurs habituelles protestations bruyantes."
 sichuan_events.133.a:0 "Merci, je suppose ?"

 sichuan_events.134.t:0 "L'AREC Critique le Gouvernement"
 sichuan_events.134.d:0 "Notre décision de rejeter la demande d’aide du gouverneur [SZC.GetLeader] a été accueillie par un silence presque total - jusqu’à aujourd’hui. L'AREC, qui se présente comme le parti de la "paysannerie" mais n’est en réalité guère plus qu’un groupe de riches philanthropes convaincus de pouvoir sauver la paysannerie chinoise en jetant l’argent de leurs pères sur ses problèmes, a violemment dénoncé notre inaction. Cela n’a rien d’extraordinaire, car ils semblent protester contre presque tout ce que nous faisons. Ce qui est en revanche inhabituel, c’est que les gens commencent à leur prêter attention. Alors que leurs tracts de protestation sont d’habitude distribués uniquement dans les villes, des soldats sur l’ensemble de notre territoire ont signalé la présence de tracts dénonçant les "seigneurs de la guerre qui laissent leur propre peuple mourir de faim dans les rues" dans chaque ville et village de notre nation !"
 sichuan_events.134.a:0 "Laissons-les crier !"

 sichuan_events.135.t:0 "La Commission Internationale de Secours"
 sichuan_events.135.d:0 "Nos appels à l’aide ne sont pas restés sans écho ! Un consortium de riches philanthropes des Villes des Légations s’est réuni pour organiser la "Commission internationale pour la Chine de secours en cas de famine" (CICSF). Bien que la plupart d’entre eux cherchent avant tout une reconnaissance internationale, l’argent occidental est désespérément nécessaire pour acheter de la nourriture afin de nourrir nos paysans affamés, les dirigeants des cliques de seigneurs de guerre environnants ayant, conscients de notre détresse, fait exploser les prix. Espérons que ces riches Occidentaux pourront aider à sauver le Sichuan !"
 sichuan_events.135.a:0 "Toute aide est la bienvenue."

 sichuan_events.138.t:0 "Envoyer de l'Aide au Sichuan ?"
 sichuan_events.138.d.no_soy:0 "La province du Sichuan souffre toujours d’une famine massive et, maintenant, ses représentants viennent jusqu’à nous, demandant une aide humanitaire. En soutenant les efforts de secours dans la province, nous pourrions considérablement renforcer notre légitimité et leur convaincre que nous, et non les vils traîtres de Beijing, sommes les véritables dirigeants de la Chine !"
 sichuan_events.138.d.soy:0 "L’Initiative agricole du soja a créé un excédent de céréales au Fengtian, tandis qu’au sud-ouest, le Sichuan continue de lutter contre une famine massive. Leurs représentants sont venus nous trouver, nous, pour demander une aide humanitaire. En soutenant les efforts de secours à la famine dans la province, nous pourrions considérablement renforcer notre légitimité et les convaincre que nous, et non les vils traîtres de Beijing, sommes les véritables dirigeants de la Chine !"
 sichuan_events.138.a:0 "Préparez un grand convoi."
 sichuan_events.138.b:0 "Nous ne pouvons rien épargner pour le moment."

 sichuan_events.139.t:0 "Les Envois de Céréales pour le Sichuan sont Prêts"
 sichuan_events.139.d:0 "Enfin, nos envois de grains destinés au Sichuan sont presque prêts à être expédiés. Leur transport sera sinueux en raison des nombreuses armées hostiles qui nous séparent du Sichuan proprement dit, mais nous doutons que les [GetZhiliManchu] soient assez sans cœur pour arrêter des grains destinés aux victimes d’une famine."
 sichuan_events.139.a:0 "Une preuve de notre légitimité !"

 sichuan_events.1390.t:0 "Shenyang Ignore notre Demande"
 sichuan_events.1390.d:0 "Bien que nous ayons toujours craint que le gouvernement de Shenyang n’ignore nos demandes, ces craintes se sont avérées fondées aujourd’hui lorsque [FNG.GetLeader] nous a informé formellement qu’il ne pouvait fournir l’aide nécessaire pour contrer notre famine. Beaucoup suspectent que cela soit dû à nos loyautés de "seigneur de la guerre" et la position de [SZC.GetLeader] semble déjà de jour en jour de plus en plus précaire."
 sichuan_events.1390.a:0 "Nous nous en souviendrons !"

 sichuan_events.140.t:0 "Le Fengtian Envoie de l'Aide au Sichuan"
 sichuan_events.140.d:0 "Nos alliés au sein du Gouvernement du Fengtian ont récemment décidé d'envoyer des céréales au Sichuan, à la fois pour contribuer à soulager la famine qui y sévit, mais aussi pour renforcer leur légitimité aux yeux de [SZC.GetLeader]. Les céréales seront acheminées par voie fluviale sous le pavillon du Fengtian, ce qui pourrait poser des problèmes.\n\nNous pourrions faire pression sur le Gouvernement du Fengtian pour qu'il arbore notre drapeau, ce qui empêcherait sans aucun doute toute armée hostile d'attaquer les convois par crainte de représailles."
 sichuan_events.140.a:0 "Faites pression pour qu'ils utilisent le drapeau [Root.GetAdjective]."
 sichuan_events.140.b:0 "C'est leur choix."

 sichuan_events.141.t:0 "Les Exigences Japonaises"
 sichuan_events.141.d:0 "Alors que nous espérions que les [GetZhiliManchu] n'oseraient pas intercepter notre aide alimentaire, des agents japonais nous ont informés qu'ils disposaient d'informations laissant penser que ces traîtres s'apprêtent justement à le faire !\n\nLes Japonais ont proposé une alternative : hisser leur propre pavillon sur nos cargaisons. Les [GetZhiliManchu] n'oseraient jamais provoquer un incident international en attaquant des navires japonais, même si cela nous ferait passer pour des marionnettes de Tokyo aux yeux de ceux qui observent les navires."
 sichuan_events.141.a:0 "Ils ont peut-être raison..."
 sichuan_events.141.b:0 "Ignorons-les."
 sichuan_events.141.c:0 "Utilisez leur drapeau pour dépasser Wuhan, puis remplacez-le par le nôtre."

 sichuan_events.142.t.japan:0 "Le Fengtian Accepte nos Demandes"
 sichuan_events.142.t.fengtian:0 "Le Fengtian Ignore nos Demandes"
 sichuan_events.142.d.japan:0 "Le Fengtian a accepté d'envoyer des céréales sous notre pavillon, empêchant ainsi [GetZhiliManchu] de tenter de détourner ou d'interrompre les convois destinés au Sichuan."
 sichuan_events.142.d.fengtian:0 "Le Fengtian a refusé d’envoyer des céréales sous notre pavillon, affirmant que cela annulerait toute tentative de présenter leur gouvernement comme légitime et convaincrait plutôt les paysans que leur régime n’est guère plus qu’un État fantoche à notre service."
 sichuan_events.142.a:0 "Excellent."
 sichuan_events.142.b:0 "Ils soulèvent un point pertinent..."

 sichuan_events.143.t:0 "Navires [SZC_fengtian_grain_origin.GetAdjective] sur le Yangtsé"
 sichuan_events.143.d.japan:0 "Mauvaise nouvelle ! La garnison de Wuhan a signalé une flottille de péniches battant pavillon japonais qui remonte le fleuve en direction du Sichuan ! Il semblerait qu'elles transportent d'importantes quantités de céréales, même s'il serait très facile de dissimuler des armes sous une couche de sacs de céréales...\n\nNous pouvons exiger que les navires s'arrêtent pour être fouillés, mais cela risquerait d'offenser gravement le gouvernement japonais et de provoquer un incident international."
 sichuan_events.143.d.fengtian:0 "Le commandant de la garnison de Wuhan a signalé qu'une flottille de navires battant pavillon du Fengtian remontait le fleuve en direction du Sichuan, chargée de céréales et de fournitures de secours. Nous sommes confrontés à un dilemme : laisser passer ces navires renforcerait considérablement la loyauté du gouvernement du Sichuan envers le Fengtian, mais les arrêter et les saisir pourrait provoquer un tollé encore plus grand et risquerait de donner de notre gouvernement une image cruelle et indifférente..."
 sichuan_events.143.a:0 "Envoyez-leur un ultimatum !"
 sichuan_events.143.b:0 "Saisissez-les !"
 sichuan_events.143.c:0 "Laissez-les passer."

 sichuan_events.144.t:0 "Le Japon Défie Notre Blocus"
 sichuan_events.144.d:0 "Nos ordres adressés aux capitaines marchands japonais ont été totalement ignorés ! Qualifiant nos lois de "cruelles et illégitimes", les navires ont continué à remonter le fleuve. Nos forces, peu enclines à déclencher une guerre, n’ont rien pu faire."
 sichuan_events.144.a:0 "Mince."

 sichuan_events.145.t:0 "Les Envois de Céréales du Fengtian"
 sichuan_events.145.d:0 "Nos forces ont embarqué à bord des navires du Fengtian, fouillant de fond en comble, mais n’ont trouvé que les cargaisons de grains prévues, déclarées sur les manifestes. Nous pouvons soit les laisser poursuivre leur route, soit saisir le navire et le faire remonter le fleuve sous notre pavillon, donnant ainsi l’impression que *nous* sommes les véritables bienfaiteurs en ces lieux."
 sichuan_events.145.a:0 "Laissez-les continuer vers le Sichuan."
 sichuan_events.145.b:0 "Saisissez leur cargaison et envoyez-la sous notre pavillon."

 sichuan_events.146.t.japan:0 "Cargaisons de Céréales du Fengtian Saisies !"
 sichuan_events.146.t.fengtian:0 "Cargaisons de Céréales Saisies !"
 sichuan_events.146.d.japan:0 "Mauvaise nouvelle ! Les navires du Fengtian que nous avions proposé d'envoyer sous notre protection ont été saisis par les autorités [GetZhiliManchu] à Wuhan, et le blé a été redirigé vers le Sichuan sous pavillon [GetZhiliManchu]. Il ne fait aucun doute que cela aurait pu être évité si nous avions hissé *notre* pavillon sur ces navires."
 sichuan_events.146.d.fengtian:0 "Mauvaise nouvelle ! Les autorités [GetZhiliManchu] à Wuhan ont saisi nos cargaisons de céréales et les acheminent vers le Sichuan sous *leur* bannière ! Il s'agit là d'une trahison de la pire espèce, qui ne fait que renforcer notre affirmation selon laquelle les [GetZhiliManchu] sont illégitimes et ne sont guère plus que des escrocs et des gangsters."
 sichuan_events.146.a:0 "Salauds !"
 sichuan_events.146.b:0 "Je vous l'avais bien dit."

 sichuan_events.147.t:0 "[SZC_fengtian_grain_origin.GetNameDefCap] Envoie de l'Aide Alimentaire"
 sichuan_events.147.d.zhili:0 "Excellente nouvelle ! Une immense flottille de barges transportant des céréales et des fournitures de secours vient d'arriver ce matin sur notre territoire, battant pavillon de Beijing. C'est un peu étrange, étant donné qu'ils ne nous ont informés de l'arrivée de ces cargaisons qu'il y a environ trois jours, mais [SZC.GetLeader] s'est empressé de rappeler à ses subordonnés qu'il ne fallait pas cracher dans la soupe."
 sichuan_events.147.d.japan:0 "Bonne nouvelle ! Une importante cargaison de céréales vient d'arriver du Japon. C'est toutefois inhabituel, étant donné que ce pays doit actuellement importer de la nourriture pour survivre, mais toute aide est toujours la bienvenue."
 sichuan_events.147.d.fengtian:0 "[FNG.GetLeader], fidèle à sa parole, a envoyé une énorme cargaison de céréales ! Cette aide témoigne de la bienveillance de [FNG.GetName] et confirme son autorité sur la Chine !"
 sichuan_events.147.a:0 "Merci !"

 sichuan_events.148.t:0 "Un Travail Bien Fait"
 sichuan_events.148.d.default:0 "Nous avons reçu un télégramme de [SZC.Capital.GetCapitalVictoryPointName], signé par [SZC.GetLeader], qui nous remerciait chaleureusement pour notre aide dans le cadre des opérations de secours au Sichuan. Cela a considérablement renforcé notre réputation dans cette province éloignée et densément peuplée, contribuant ainsi à rétablir la légitimité du régime dans le sud-ouest de la Chine."
 sichuan_events.148.d.JAP_steals_credit:0 "Si la cargaison destinée à lutter contre la famine a effectivement réussi à passer le blocus du Zhili, le fait que le navire battait pavillon japonais n’a pas échappé à la population locale, tandis que l’origine de cette cargaison, à savoir nous, a été oubliée ou purement et simplement ignorée. Le Japon s’est attribué tout le mérite de cette opération, saisissant cette occasion pour redorer son image dans la région. Nos protestations sont restées lettre morte."
 sichuan_events.148.a:0 "Excellent."
 sichuan_events.148.b:0 "Aïe..."

 sichuan_events.149.t:0 "Le Fengtian Abuse de notre Drapeau"
 sichuan_events.149.d:0 "Mauvaise nouvelle ! Il semble que le Fengtian ait abusé de notre confiance et remplacé notre drapeau par le sien dès le départ des barges de grains depuis Wuhan ! C’est une trahison des plus graves et elle ne restera pas impunie !"
 sichuan_events.149.a:0 "Quelle insolence!"

 sichuan_events.150.t:0 "Colère Japonaise"
 sichuan_events.150.d:0 "Le Japon a découvert notre petite astuce consistant à remplacer notre drapeau par le leur après notre départ de Wuhan, et il n'est pas satisfait. Déjà, des télégrammes furieux arrivent de Tokyo, réprimandant [FNG.GetLeader] pour son insolence et menaçant de couper l'aide au développement."
 sichuan_events.150.a:0 "Laissons-les crier."

 sichuan_events.151.t:0 "Famine dans le Nord"
 sichuan_events.151.d:9 "Bien que les nouvelles d’une famine dans la province du Sichuan aient déjà atteint Guangzhou avant leur arrivée, une délégation officielle de la province troublée est arrivée aujourd’hui. Après s’être entretenue en privé avec [ROOT.GetLeader], elle a plaidé pour le soutien de [GXC.GetNameDef]. Armés de paroles émouvantes teintées de désespoir, accompagnées de preuves photographiques troublantes, ils ont exposé leur cause devant les assemblées provinciales du Guangdong, dans l’espoir de rallier des soutiens à leur cause. Ils ont également apporté des témoignages de témoins de la famine, et leurs descriptions vivantes de la famine ont peint une image de la souffrance humaine bien au-delà de ce que pourrait transmettre un simple titre de presse.\n\nLeurs appels puissants à la compassion, à l’unité nationale et à la charité de la riche élite cantonaise se heurtent toutefois à des cœurs endurcis. Le Liangguang n’est pas étranger à la guerre et à la souffrance, et les bouleversements qui ont récemment secoué le Liangguang ont laissé la province avec peu de ressources à consacrer à d’autres causes. Néanmoins, les murmures de dissidence indiquent qu’il reste ample place à la discussion lorsque le sujet est porté au débat."
 sichuan_events.151.a:9 "Cela devrait être une discussion intéressante."

 sichuan_events.154.t:0 "Don Personnel de Chen Lianbo"
 sichuan_events.154.d:9 "Le riche homme d'affaires cantonais a réaffirmé avec force les déclarations qu'il avait faites précédemment devant l'Assemblée provinciale du Guangdong en effectuant un don privé colossal en faveur des victimes du Sichuan, aux côtés de nombreux amis issus de l'élite cantonaise. Fidèle à sa réputation de philanthrope, Chen a toutefois averti que les dons privés, même ceux provenant de donateurs fortunés comme lui, ne pouvaient rivaliser avec l'aide potentielle que le Gouvernement provincial du Guangdong était en mesure d'apporter. Sa déclaration constituait un message clair à l'intention des élus de l'Assemblée provinciale, même si les plus pessimistes l'ont écartée d'un haussement d'épaules, la qualifiant de simple coup de pub de la part d'une personnalité publique fortunée."
 sichuan_events.154.a:0 "Merci, mon ami."

 sichuan_events.155.t:9 "L'Assemblée Provinciale Vote"
 sichuan_events.155.d:9 "Les débats ont donné lieu à de vives émotions. Les sceptiques n’ont pas tardé à critiquer le gouvernement provincial du Sichuan, qui a laissé la situation se détériorer à ce point, ainsi que les intenses luttes factionnelles qui y règnent. Si peu de gens peuvent contester le bien-fondé moral de l’envoi d’aide, il était clair que le Sichuan souffrait non seulement de la famine, mais aussi d’une corruption endémique, susceptible de réduire à néant tout effort de secours. De plus, avec les dépenses militaires du Guangdong qui montent en flèche et leur propre avenir remis en question, l’envie de dépenses supplémentaires est bien faible. Certains ont ironisé en disant que les représentants du Sichuan devraient demander au soi-disant "gouvernement central" du nord d’assumer ses responsabilités, voire solliciter la charité de l’Assemblée provinciale du Guangxi.\n\nLes partisans du projet de loi ont reçu un coup de pouce considérable lorsque Chen Lianbo, éminent homme d’affaires cantonais et philanthrope de renom devenu maire de la ville en 1928, a fermement soutenu la proposition. Pour inciter l’assemblée à agir, lui et d’autres grands commerçants ont créé un fonds de secours privé pour la province en détresse, tout en avertissant que les dons privés ne suffiraient pas à eux seuls à conjurer la crise. Compte tenu de son mandat controversé en tant que maire, certains se demandent si sa dernière initiative caritative est sincère, mais ce qui ne fait aucun doute, c'est que son argent est bien réel. Les deux parties ayant exposé leurs arguments, il semble que les choses se dirigent vers une conclusion."
 sichuan_events.155.a:9 "Le projet de loi d'aide est adopté."
 sichuan_events.155.b:9 "Le projet de loi d'aide est rejeté."

 sichuan_events.158.t:0 "L'Aide Arrive du Guangdong"
 sichuan_events.158.d:0 "Le premier convoi d'aide provenant de la province du Guangdong est enfin arrivé. Grâce non seulement aux dons privés de nombreux particuliers fortunés de la province, mais aussi au fonds d'aide mis en place par le Gouvernement provincial, il sera possible de contribuer à atténuer la crise au Sichuan."
 sichuan_events.158.a:0 "Enfin, des bonnes nouvelles !"

 sichuan_events.159.t:0 "Pas d'Aide du Guangdong"
 sichuan_events.159.d:0 "Malgré nos appels, l'Assemblée provinciale du Guangdong a refusé d'allouer des fonds pour venir en aide au Sichuan, frappé par la famine. Ce refus public d'envoyer de l'aide a envoyé un message, non seulement à notre égard, mais aussi à l'ensemble de la Chine, quant à l'état de la moralité dans la riche ville de Guangzhou et à la démocratie provinciale dont elle se vante tant."
 sichuan_events.159.a:0 "Nous nous en souviendrons !"

 sichuan_events.160.t:0 "Les Mangeurs d'Argile"
 sichuan_events.160.d:0 "La crise de la famine atteint des proportions inquiétantes dans les campagnes. Tout comme en 1925, certains villageois, n'ayant plus d'autre recours, ont commencé à creuser de l'argile dans un désespoir désespéré pour apaiser leur faim. Tragiquement, cela n'a conduit qu'à des maladies et à davantage de misère. Nous avons ordonné aux administrateurs locaux et à la police d'informer la population sur les dangers de recourir à ces mesures, bien qu'avec la situation actuelle, ces avertissements risquent fort de tomber dans l'oreille d'un sourd."
 sichuan_events.160.a:0 "Cela n'arrangera pas les choses !"

 sichuan_events.161.t:0 "Émeutes du Riz"
 sichuan_events.161.d:0 "Les échauffourées et les altercations verbales qui ont suivi les flambées de prix plus tôt cette année ne sont rien comparées aux scènes qui hantent souvent les grandes villes du Sichuan. Trop souvent, lorsque des sacs de riz arrivent sur les marchés, des bagarres éclatent à leur sujet. Les accusations d'accaparement, de manipulation des prix et d'autres pratiques malveillantes sont monnaie courante et, hélas, souvent fondées. Avec la colère qui gronde parmi les citoyens affamés des villes, nous avons été contraints de déployer la police militaire dans les cités pour maintenir l'ordre et prévenir, ou du moins atténuer, toute future éruption de violence et de vandalisme. Il s'agit là d'une solution loin d'être permanente, car la présence de ce que certains peuvent considérer comme des voyous en uniforme est susceptible de faire monter encore davantage les tensions et le mécontentement si nous ne parvenons pas à résoudre ces pénuries."
 sichuan_events.161.a:0 "Il nous faut résoudre cette crise, maintenant !"

 sichuan_events.162.t:0 "Violences sur les Marchés"
 sichuan_events.162.d:0 "Les commerçants des villes portent souvent le poids de la colère provoquée par les pénuries alimentaires désastreuses qui y sévissent. Les cris les accusant de profiter de la famine et d’accumuler des stocks sont monnaie courante, et beaucoup d’entre eux sont attaqués en plein jour sur les marchés. Parfois, la simple rumeur d’un commerçant gardant pour lui des sacs de riz suffit à déclencher des émeutes, avant que les émeutiers ne découvrent, trop tard, que le magasin qu’ils ont saccagé est aussi vide que leurs estomacs. Cette situation a conduit plusieurs boutiques et marchés à fermer par peur de nouvelles violences, ce qui n’a fait qu’aggraver la rareté des denrées alimentaires. Si les commerçants n’accumulaient pas leurs derniers sacs de riz auparavant, c’est désormais chose faite. Des renforts policiers ont été déployés pour gérer ces situations, mais les dégâts sont déjà faits."
 sichuan_events.162.a:0 "Cette crise peut-elle empirer ?"

 sichuan_events.163.t:0 "Solutions Inhabituelles"
 sichuan_events.163.d:0 "Manger de l’herbe, des feuilles et des baies est devenu monnaie courante au Sichuan, car les populations, en particulier dans les zones rurales, ont commencé à recourir à des solutions peu orthodoxes pour se nourrir, faute d’autres alternatives. Nombreux sont ceux qui se tournent vers des remèdes encore plus extravagants, en utilisant diverses plantes et animaux généralement considérés comme impropres à la consommation comme substituts alimentaires. Ces solutions créatives sont parfois presque aussi troublantes que la crise elle-même. Si avoir quelque chose à manger vaut mieux que n’avoir rien à manger, cette situation souligne toutefois l’urgence de fournir une aide alimentaire adéquate aux masses affamées."
 sichuan_events.163.a:0 "Nous devrons surveiller cette évolution."

 sichuan_events.164.t:0 "Flambée des Cas d'Empoisonnement"
 sichuan_events.164.d:0 "La récente recrudescence de solutions de fortune face à la famine a conduit à des résultats tragiques mais prévisibles, malgré nos meilleurs efforts pour sensibiliser la population aux risques que ces pratiques entraînent. Les hôpitaux et les cliniques rurales enregistrent une forte augmentation des cas d'intoxication aiguë, à supposer que les patients puissent même y parvenir. Avec nos services médicaux mis à rude épreuve, les administrateurs locaux ont reçu l'ordre d'informer la population sur les dangers de ces activités. Tant que la famine persistera, ces cas ne manqueront pas de se reproduire."
 sichuan_events.164.a:0 "Nous aurions dû agir plus vite."

 sichuan_events.165.t:0 "La Pauvreté Infantile Augmente"
 sichuan_events.165.d:0 "La pauvreté a malheureusement accompagné la plupart des Sichuanais tout au long de notre histoire. Avec la famine qui balaye la nation, la situation a empiré, les familles déjà au bord du gouffre étant durement touchées par cette crise. Là où il y avait auparavant une pénurie, il n'y a maintenant presque plus rien pour eux. Sans filet de sécurité en ces temps difficiles, les plus jeunes sont parmi les plus durement touchés par cela."
 sichuan_events.165.a:0 "Le Sichuan n'en peut plus !"

 sichuan_events.166.t:0 "Les Enfants Abandonnés"
 sichuan_events.166.d:0 "En raison des conditions terribles qui ont récemment accablé la province, on constate une augmentation massive des enfants abandonnés à eux-mêmes. Parfois, cela est dû au fait que leurs parents n’ont tout simplement pas les moyens de nourrir leur famille, mais souvent, la raison tragique est qu’ils ne sont même plus là. Avec des milliers de cas déjà recensés et de nouveaux apparaissant chaque jour, la population supplie le gouvernement d’intervenir pour venir en aide aux enfants de la province."
 sichuan_events.166.a:0 "Nous *devons* les aider. Personne d'autre ne le fera."

 sichuan_events.167.t:0 "Les Enfants de la Famine"
 sichuan_events.167.d:0 "Les enfants du Sichuan ont été les plus durement touchés par la famine. Avec la pénurie de nourriture et l'insécurité généralisée, personne n'est épargné par les effets de la disette. Les enfants sont les plus sinistrés, leurs récits tragiques étant trop nombreux à compter. Nous ne pouvons tolérer cela. Avec nos partenaires internationaux, nous avons mis en place une opération gouvernementale spéciale pour les protéger ainsi que notre avenir. Cela inclut tout, des allocations spéciales de nourriture et d'autres ressources d'aide pour prévenir de futures tragédies, jusqu'à la fourniture d'abris et d'orphelinats dans les cas où la tragédie a déjà frappé.\n\nCe sont des mesures modestes et coûteuses sur la voie de la reprise après la famine, mais chaque effort en vaut la peine pour montrer à notre peuple que, quoi qu'il arrive, les enfants de notre province ne seront pas forcés de se débrouiller seuls."
 sichuan_events.167.a:0 "Nous prenons soin des nôtres."

 sichuan_events.168.t:0 "Des Réfugiés Fuient la Province"
 sichuan_events.168.d:0 "Ne voyant aucun avenir au Sichuan, des milliers de personnes fuient la province vers des pâturages plus verdoyants au nord, au sud et à l’est. Plusieurs petits villages se sont transformés en villes fantômes en raison de l’exode massif de leurs habitants. Si nous ne mettons pas rapidement fin à cette famine désastreuse, ce ne sera que la première vague d’une longue série."
 sichuan_events.168.a:0 "Les mauvaises nouvelles s'accumulent..."

 sichuan_events.169.t:0 "Réfugiés du Sichuan"
 sichuan_events.169.d.QIE:0 "La sécheresse et les séquelles d'une guerre civile brutale ont provoqué une terrible famine qui frappe le Sichuan. Le gouvernement de cette province semblant incapable de résoudre ces problèmes, beaucoup ont tout simplement baissé les bras et ont fui la région par dizaines de milliers pour rejoindre les terres plus fertiles de notre pays. Bien qu'ils ne soient pas les seuls à traverser une période difficile en Chine, nombreux sont ceux, tant parmi la population qu'au sein de notre gouvernement, qui exigent que nous agissions pour venir en aide à nos compatriotes chinois. D'autres estiment, non sans raison, qu'au vu de la crise qui a suivi l'effondrement de la Ligue des Huit Provinces, qui s'ajoute à nos propres difficultés, nous ne pouvons pas faire grand-chose pour les aider. Compte tenu de l'ampleur de la situation, les renvoyer au Sichuan ne ferait qu'empirer les choses.\n\nQuelles que soient nos actions, notre gouvernement a adressé une demande officielle au gouvernement de [SZC.Capital.GetCapitalVictoryPointName] afin qu'il redouble d'efforts pour résoudre cette crise."
 sichuan_events.169.d.XSM:0 "La sécheresse et les séquelles d'une guerre civile brutale ont provoqué une terrible famine qui frappe le Sichuan. Le gouvernement de cette province semblant incapable de résoudre ces problèmes, beaucoup ont tout simplement baissé les bras et ont fui la région par dizaines de milliers pour rejoindre les terres plus fertiles de notre pays. Bien qu'ils ne soient pas les seuls à traverser une période difficile en Chine, nombreux sont ceux, tant parmi la population qu'au sein de notre gouvernement, qui exigent que nous agissions pour venir en aide à nos compatriotes chinois. D'autres estiment, et ce n'est pas sans raison, que nous ne pouvons pas les aider tant que le sud est envahi par des bandits tibétains. Compte tenu de l'ampleur de la situation, les renvoyer au Sichuan ne ferait qu'empirer les choses.\n\nQuelles que soient nos actions, notre gouvernement a adressé une demande officielle au gouvernement de [SZC.Capital.GetCapitalVictoryPointName] afin qu'il redouble d'efforts pour résoudre cette crise."
 sichuan_events.169.d.HNN:0 "La sécheresse et les séquelles d'une guerre civile brutale ont provoqué une terrible famine qui frappe le Sichuan. Le gouvernement de cette province semblant incapable de résoudre ces problèmes, beaucoup ont tout simplement baissé les bras et ont fui la région par dizaines de milliers pour rejoindre les terres plus fertiles de notre pays. Bien qu'ils ne soient pas les seuls à traverser une période difficile en Chine, nombreux sont ceux, tant parmi la population qu'au sein de notre gouvernement, qui exigent que nous agissions pour venir en aide à nos compatriotes chinois. D'autres estiment, non sans raison d'ailleurs, que nous ne pouvons guère leur venir en aide, compte tenu des conflits incessants qui ravagent tant le sud que l'est depuis l'effondrement de la Ligue. Vu l'ampleur de la situation, les renvoyer au Sichuan ne ferait qu'empirer les choses.\n\nQuelles que soient nos actions, notre gouvernement a adressé une demande officielle au gouvernement de [SZC.Capital.GetCapitalVictoryPointName] afin qu'il redouble d'efforts pour résoudre cette crise."
 sichuan_events.169.d.YUN_Tang:0 "La sécheresse et les séquelles d'une guerre civile brutale ont provoqué une terrible famine qui frappe le Sichuan. Le gouvernement de cette province semblant incapable de résoudre ces problèmes, beaucoup ont tout simplement baissé les bras et ont fui la région par dizaines de milliers pour rejoindre les terres plus fertiles de notre pays. Bien qu'ils ne soient pas les seuls à traverser une période difficile en Chine, nombreux sont ceux, tant parmi la population qu'au sein de notre gouvernement, qui exigent que nous agissions pour venir en aide à nos compatriotes chinois. D'autres estiment, non sans raison d'ailleurs, compte tenu de la crise qui a suivi l'effondrement de la Ligue, que nous ne pouvons pas faire grand-chose pour les aider. Vu l'ampleur de la situation, les renvoyer au Sichuan ne ferait qu'empirer les choses.\n\nQuelles que soient nos actions, notre gouvernement a adressé une demande officielle au gouvernement de [SZC.Capital.GetCapitalVictoryPointName] afin qu'il redouble d'efforts pour résoudre cette crise."
 sichuan_events.169.d.YUN:0 "La sécheresse et les séquelles d'une guerre civile brutale ont provoqué une terrible famine qui frappe le Sichuan. Le gouvernement de cette province semblant incapable de résoudre ces problèmes, beaucoup ont tout simplement baissé les bras et ont fui la région par dizaines de milliers pour rejoindre les terres plus fertiles de notre pays. Bien qu'ils ne soient pas les seuls à traverser une période difficile en Chine, nombreux sont ceux, tant parmi la population qu'au sein de notre gouvernement, qui exigent que nous agissions pour venir en aide à nos compatriotes chinois. D'autres pensent, non sans raison d'ailleurs, compte tenu de la guerre civile qui a récemment éclaté à la suite de la chute du régime de Tang, que, vu l'ampleur de la situation, les renvoyer au Sichuan ne ferait qu'empirer les choses.\n\nQuelles que soient nos actions, notre gouvernement a adressé une demande officielle au gouvernement de [SZC.Capital.GetCapitalVictoryPointName] afin qu'il redouble d'efforts pour résoudre cette crise."
 sichuan_events.169.a:0 "Essayons d'aider comme nous le pouvons."

 sichuan_events.170.t:0 "La Corruption se Révèle"
 sichuan_events.170.d:0 "C'est une histoire aussi vieille que le monde. Qu'il s'agisse d'une caisse de matériel humanitaire qui a tout simplement disparu ou d'un colonel réclamant des rations alimentaires pour des régiments qui n'existent que sur le papier, le chaos qui règne dans le pays a permis à de nombreux individus sans scrupules de s'approprier des biens supplémentaires. Que ce soit par désespoir ou par cupidité, nous ne pouvons tolérer cela. Il faut redoubler d'efforts pour éradiquer ce genre de vols."
 sichuan_events.170.a:0 "Sérieusement ? Voler des paysans affamés ?"

 sichuan_events.171.t:0 "La Corruption Retarde les Efforts de Secours"
 sichuan_events.171.d:0 "Récemment, des informations ont fait état de soldats et de fonctionnaires extorquant de l'argent à la population sous forme de pots-de-vin afin d'autoriser le passage des convois d'aide, en les qualifiant de péage ou d'autres termes tout aussi fallacieux. Un ordre a été donné stipulant que toute personne surprise en train de se livrer à ce genre d'activités fera l'objet de mesures disciplinaires. Cela devrait les inciter à y réfléchir à deux fois avant de tenter de se faire un peu d'argent de cette manière."
 sichuan_events.171.a:0 "Pas encore..."

 sichuan_events.172.t:0 "Marché Noir de Produits Alimentaires"
 sichuan_events.172.d:0 "Alors qu’un sac de riz vaut son poids en or, la contrebande de denrées alimentaires est devenue une affaire lucrative pour les syndicats criminels et les cultivateurs d’opium sans scrupules. Certains utilisent les ressources qu’ils ont accumulées pour les revendre à prix d’or à des personnes désespérées à travers le Sichuan, tandis que des criminels plus effrontés se contentent de voler les colis de secours alimentaires pour les revendre sur le marché noir. La police fait tout son possible pour combattre cette criminalité sans vergogne, mais ses efforts sont jusqu’à présent insuffisants pour éradiquer totalement le problème."
 sichuan_events.172.a:0 "Encore du profit sur la souffrance ?"

 sichuan_events.173.t:0 "Raids du KMT Contre des Convois Alimentaires"
 sichuan_events.173.d:0 "La Chine n'est pas étrangère à la guerre et, bien que notre guerre civile ait pris fin récemment, des conflits continuent de secouer le pays. Une nouvelle tendance inquiétante se dessine : certaines de nos livraisons d'aide internationale ont été pillées par des guérilleros du Kuomintang. Même si nous n'avons pas encore déterminé s'ils proviennent du Yunnan, du Guangxi ou même du Kuomintang de Gauche qui combat dans ce qui était autrefois la Ligue des Huit Provinces, nous devons renforcer la sécurité afin d'empêcher que de tels incidents ne se reproduisent à l'avenir."
 sichuan_events.173.a:0 "C'est tout simplement ridicule."

 sichuan_events.174.t:0 "Prier pour la Pluie"
 sichuan_events.174.d:0 "Que ce soit par conviction sincère ou simplement pour redonner espoir à une population désespérée, Liu Xiang a réuni plusieurs chefs religieux de toute la province afin de prier pour que la pluie revienne sur le Sichuan et mette fin à la sécheresse. Bien que ce soit certainement un beau geste, cela n’a guère contribué à améliorer la situation sur le terrain : plusieurs jours après ces prières, il n’y a toujours pas un nuage dans le ciel, et encore moins de pluie."
 sichuan_events.174.a:0 "Ça ne sert à rien..."

 sichuan_events.175.t:0 "Dujiangyan, Endommagé"
 sichuan_events.175.d:0 "Pendant la guerre civile, le système d’irrigation de Dujiangyan, autour du canal de Baopingkou, a été saboté, provoquant une inondation destinée à repousser les forces de Liu Xiang sans avoir à les affronter sur le champ de bataille. Il s’avère cependant qu’en choisissant la facilité ce jour-là, nous avons aggravé la situation de famine pour nous-mêmes. L’opération menée par nos ingénieurs a causé des dommages durables qui ont aujourd’hui asséché le canal. Sans moyen d’irriguer les terres, une sécheresse a frappé les champs environnants, aggravant une situation déjà désastreuse. Nous n’avons personne d’autre à blâmer pour cette épreuve que nous-mêmes, et nous devons désormais assumer la responsabilité de nos actes."
 sichuan_events.175.a:0 "Qu'avons-nous fait ?"

 sichuan_events.176.t:0 "Don Personnel de James Yen"
 sichuan_events.176.d:0 "Il semble que, malgré nos conditions misérables, il y ait encore des amis prêts à nous aider. L’un d’eux est Y.C. James Yen, un intellectuel de premier plan à Beijing, dirigeant de l’Association pour la Réforme de l’Empire chinois et instigateur du Mouvement de reconstruction rurale. Nous venons de recevoir une missive de Yen, exprimant son désir d’aider aux efforts de secours en cas de famine. À cette fin, son Mouvement de reconstruction rurale a fait un don substantiel à nos opérations de secours, et d’autres aides sont à venir."
 sichuan_events.176.a:0 "Merci, mon ami."

 sichuan_events.200.t:0 "Les Affaires du Bassin Rouge"
 sichuan_events.200.d:0 "Le bassin du Sichuan, également nommé bassin rouge en raison des grès rouges qui constituent son sol, traverse actuellement une période difficile. Cette région vallonnée possède certaines des terres les plus fertiles de Chine, ainsi que d'abondantes possibilités d'irrigation et de culture en terrasses. Cependant, les dernières décennies n'ont pas été clémentes pour la province. Une succession de gouvernements incompétents depuis la fin de l'ère Qing a laissé la province stagnante et isolée par rapport à l'économie chinoise.\n\nAu cours des trois dernières décennies, la culture de l'opium est devenue peut-être le secteur économique le plus important et le plus vaste du Sichuan, en raison des profits élevés tirés de la culture du pavot. L'opium apporte une grande richesse, mais il constitue également un problème majeur en raison de ses effets sur la population. Sa culture non réglementée a été l'une des causes de la famine et a également été une source de conflit, tant en raison des associations criminelles que des seigneurs de la guerre du Sichuan tentant de contrôler le commerce.\n\nAvant même de pouvoir commencer à améliorer notre économie, nous devons décider du sort de l'industrie de l'opium. Le statu quo est insoutenable, mais il existe quelques options que nous pourrions choisir..."
 sichuan_events.200.a:0 "Nous devons éradiquer l'opium de la province."
 sichuan_events.200.b:0 "Nous prendrons le contrôle de l'opium."

 SZC_opium_removal_tooltip: "§RLa culture de l'Opium est omniprésente au Sichuan. Réduire sa propagation sera une tâche ardue et politiquement coûteuse. Les avantages potentiels, cependant, ne doivent pas être sous-estimés.§!"
 SZC_opium_monopoly_tooltip: "§RLe commerce de l'opium est extrêmement répandu dans le Sichuan, renforcé par l'absence totale de réglementation au cours des dernières décennies. Il faut s'attendre à une forte résistance contre toute forme de régulation.§!"

 sichuan_events.201.t:0 "Évaluation de la Propagation de l'Opium"
 sichuan_events.201.d:0 "Le Sichuan peut prétendre être le plus grand producteur et consommateur d'opium au monde, avec des milliers de tonnes de cette plante cultivées chaque année sur notre territoire. On dit souvent que le Sichuan est le cœur même de la crise de l'opium en Chine, et ce depuis les guerres anglo-chinoises du XIXe siècle. Compte tenu de l'ampleur de la production et de la consommation d'opium qui s'y déroulent, personne ne se fait d'illusions : ce sera une tâche extrêmement difficile à entreprendre."
 sichuan_events.201.a:0 "Cela doit être fait."

 sichuan_events.202.t:0 "L'Ampleur de la Corruption"
 sichuan_events.202.d:0 "De haut en bas, chaque segment de la société sichuanaise est affecté par le commerce de l'opium et ses vices, au point que les fonctions quotidiennes du gouvernement et de la société en sont compromises. Par exemple, le fait qu'un soldat soit payé en opium tandis que son commandant empoches ses soldes est une pratique alarmante. Cela ne favorise pas seulement la corruption et une mauvaise moralité au sein de l'armée, mais comme l'a tragiquement prouvé notre récente guerre civile, une addiction généralisée à l'opium dans les rangs a conduit à des morts et des souffrances inutiles de tous les côtés du conflit. Des pratiques similaires sont observées dans d'autres branches du gouvernement, des maires locaux s'enrichissant grâce au trafic de drogue, jusqu'aux petits bureaucrates acceptant des pots-de-vin et harcelant la population locale. Même le simple citoyen du Sichuan n'est pas immunisé contre les tentations de cette corruption, bien qu'il soit le plus souvent simplement sa victime.\n\nNous devons accepter le fait accablant que la corruption infeste chaque aspect de notre société - de haut en bas - sans qu'une seule entité du Sichuan soit épargnée. Nous avons un long et difficile chemin devant nous si nous voulons endiguer ce problème."
 sichuan_events.202.a:0 "C’est si grave que ça ?!"

 sichuan_events.203.t:0 "Addiction à l'Opium"
 sichuan_events.203.d:0 "La plaie de l'opium est si répandue dans le Sichuan qu'elle fait partie de la vie quotidienne de la province. Ses effets se voient partout, des gens dans la rue qui gaspillent leur vie pour cela jusqu'au sommet de la société. Personne n'est épargné par ses conséquences. C'est véritablement un signe que des scènes qui auraient choqué n'importe qui pendant la majeure partie de l'histoire soient considérées comme faisant partie de la routine quotidienne au Sichuan."
 sichuan_events.203.a:0 "Il nous faudra bien régler ce problème tôt ou tard."

 sichuan_events.204.t:0 "Un Plan Contre l'Opium"
 sichuan_events.204.d:0 "La commission chargée d’éradiquer l’abus d’opium et le trafic illicite dans le Sichuan a commencé à élaborer des plans pour cette tâche monumentale de débarrasser la province de ce fléau. Les mesures proposées indiquent une route difficile à venir, même les projections les plus optimistes suggérant que ce sera une entreprise incroyablement coûteuse et âprement disputée.\n\nCertaines des mesures les plus légères incluent des réformes et des mesures anti-corruption plutôt conventionnelles. La commission insiste également sur l’urgence de réhabiliter les toxicomanes et de les contraindre à rompre leur dépendance, ce qui alourdirait notre système de santé. Un représentant de l’armée était également présent à la réunion et a exposé les plans pour ce qu’ils peuvent faire en aidant les efforts de la police pour limiter la production et la contrebande, bien que certaines de leurs méthodes puissent être un peu brutales.\n\nC’est un long chemin qui nous attend. Portons cette lutte jusqu’à son terme."
 sichuan_events.204.a:0 "C'est parti."

 sichuan_events.205.t:0 "Essor du Marché Noir"
 sichuan_events.205.d:0 "Dès que le gouvernement a lancé son initiative de répression de la toxicomanie, un effet secondaire inévitable a été une explosion des prix de l’opium et l’émergence d’un marché noir. Cette économie souterraine est déjà l’une des plus importantes du Sichuan en termes de PIB, et l’intégralité des profits va directement dans les poches des criminels. La hausse des prix va également causer d’immenses souffrances aux toxicomanes de la population du Sichuan, à moins que nous n’intervenions et ne leur apportions l’aide dont ils ont besoin. Briser le marché noir doit toutefois rester notre priorité absolue."
 sichuan_events.205.a:0 "Ce sont des voyous et ils seront traités en conséquence."

 sichuan_events.206.t.delays:0 "Nos Efforts sont Retardés"
 sichuan_events.206.d.delays:0 "Avec l'opium qui vaut son pesant d'or grâce à un approvisionnement poussé dans la clandestinité, il y a beaucoup d'argent à gagner à fermer les yeux. Les fonctionnaires "oublient" régulièrement de signaler le transport d'opium à travers leurs districts, car la tentation de prendre une part sur le marché noir est souvent trop forte. Sans mesures plus strictes contre la corruption administrative, ces problèmes ont peu de chances de disparaître."
 sichuan_events.206.t.bribery:0 "Scandale de Corruption"
 sichuan_events.206.d.bribery:0 "Un grand scandale a ébranlé notre armée. Plusieurs responsables militaires chargés de superviser l’éradication des champs d’opium ont été arrêtés pour avoir distribué les stocks d’opium saisis, qu’ils étaient censés détruire. Sous leur commandement, les conscrits étaient également payés en paquets d’opium, tandis que l’argent destiné à solder leurs salaires allait directement dans les poches des officiers. Ils seront sévèrement punis, mais tant qu’il y aura de l’argent à gagner grâce à la corruption, ce ne sera probablement pas le dernier cas de ce genre."
 sichuan_events.206.t.no_enforcement:0 "Manque de Forces de l'Ordre"
 sichuan_events.206.d.no_enforcement:0 "Il n’est pas secret qu’une caisse d’opium peut rapporter le salaire annuel d’un policier. Ils ne sont que des hommes et, à ce titre, nombre de policiers auparavant honnêtes se sont fait prendre en train de prendre des pots-de-vin, voire de participer à des opérations de contrebande en tant qu’intermédiaires. Toutefois, la pratique la plus courante consiste pour les officiers à ne pas signaler ce qu’ils voient et à faire semblant de ne rien voir, le tout en échange d’argent et de drogues. Il semble que nous devions intensifier nos efforts pour assainir notre police. S’ils faiblissent, nos efforts anti-opium en feront autant."
 sichuan_events.206.a:0 "Jusqu'où cela peut-il aller ?!"

 sichuan_events.207.t:0 "Début de la Campagne Anticorruption"
 sichuan_events.207.d:0 "Les efforts visant à éradiquer la corruption commencent déjà à porter leurs fruits. Bien que les arrestations et les condamnations soient encore peu nombreuses, nous avons fait savoir que personne n’est à l’abri de la longue main de la loi. La menace sérieuse d’être jeté dans une geôle en cas de capture force nombre de ces lâches sans cervelle à se conformer et à accomplir leurs fonctions. Lentement mais sûrement, les administrations sont alignées sur le reste de notre initiative anti-opium."
 sichuan_events.207.a:0 "Nous les délogerons, un par un si nécessaire !"

 sichuan_events.208.t:0 "Corruption dans la Fonction Publique"
 sichuan_events.208.d:0 "Même notre administration n’est pas à l’abri de la tentation de faire un profit rapide sur les cendres de la guerre contre l’opium. La malversation, le vol et la corruption sont monnaie courante, plusieurs arrestations particulièrement embarrassantes ayant déjà eu lieu. Il semble qu’il reste encore beaucoup à faire pour débarrasser notre administration de ces criminels de pacotille au caractère faible."
 sichuan_events.208.a:0 "Comment est-ce devenu aussi énorme ?!"

 sichuan_events.209.t:0 "Corruption dans l'Armée"
 sichuan_events.209.d:0 "Une grande partie de notre armée souffre depuis longtemps d’une mauvaise réputation en raison d’un manque généralisé de professionnalisme. Une grande partie de ce problème est liée à l’opium, une large portion de nos forces étant composée de toxicomanes qui sont souvent payés en opium de manière clandestine, tandis que leurs commandants s’approprient les salaires réquisitionnés. Ces pratiques ont longtemps été tacitement acceptées, mais lorsque nous avons annoncé notre initiative anti-opium, ils ne pouvaient guère s’attendre à être exemptés de la loi. Cela a déjà causé des problèmes tant parmi les soldats que parmi les officiers. Les généraux auront du mal à remettre de l’ordre dans ce chaos."
 sichuan_events.209.a:0 "Même dans l’armée ?!"

 sichuan_events.210.t:0 "Contrebandiers dans l'Administration"
 sichuan_events.210.d:0 "Avec les sommes d’argent à gagner grâce à la contrebande d’opium, il était inévitable que des fonctionnaires de notre administration cèdent à la tentation financière. Déjà, de nombreux fonctionnaires de rang inférieur, voire intermédiaire, ont été mis derrière les barreaux pour avoir facilité les activités de contrebande dans les campagnes, généralement en percevant des pots-de-vin en échange de leur tolérance envers ces opérations. Il semble que, peu importe le nombre d’arrestations, il y ait toujours plus de fonctionnaires corrompus au coin de la rue."
 sichuan_events.210.a:0 "On ne peut pas enfreindre la loi si l'on *est* la loi, apparemment."

 sichuan_events.211.t.committee:0 "Le Comité de l'Opium Impliqué dans la Contrebande"
 sichuan_events.211.d.committee:0 "Ce qui pourrait bien être le plus grand déshonneur pour le comité à ce jour est qu’un membre de haut rang a été pris sur le fait par un piège tendu par la police. L’ancien fonctionnaire, désormais démis de ses fonctions, percevait d’importants pots-de-vin en échange de rapports affirmant que des opérations qui n’avaient même pas eu lieu avaient été couronnées de succès, ce qui a conduit, dans certains cas, à détourner des ressources de la police, pourtant indispensable dans la région. Si l’arrestation constitue un développement positif, le simple fait qu’elle ait eu lieu a humilié le comité."
 sichuan_events.211.t.bureau:0 "Le Bureau des Ventes Impliqué dans la Contrebande"
 sichuan_events.211.d.bureau:0 "Plusieurs membres du Bureau des ventes de l’État ont été arrêtés aujourd’hui après avoir été surpris à conclure des marchés avec les contrebandiers. Cela a non seulement nui à nos efforts pour établir un monopole étatique sain dans ce secteur, mais a également entraîné l’évasion de grandes quantités d’opium sous nos yeux. Les personnes arrêtées risquent de longues peines de prison, tandis que nous sommes contraints d’intensifier nos efforts contre les contrebandiers si nous souhaitons retrouver notre part de marché."
 sichuan_events.211.a:0 "Cela devient tout simplement ridicule !"

 sichuan_events.212.t:0 "Meurtres Politiques"
 sichuan_events.212.d:0 "Comme le dit l’adage, si vous êtes au-dessus de la cible, ils tireront sur vous. Avec leur part de marché en baisse grâce aux efforts de nos forces de l’ordre, de l’armée et de l’administration, une triste réalité est que les criminels vont se venger de nous. Aujourd’hui, deux fonctionnaires qui avaient été des combattants infatigables contre la corruption ont été assassinés en plein jour par des tueurs à gages. Les criminels ont bientôt rejoint leurs rangs grâce à notre police, mais cela montre que les contrebandiers sont prêts à tout pour gagner cette guerre."
 sichuan_events.212.a:0 "Ils doivent être désespérés !"

 sichuan_events.213.t:0 "L'Opium Disparait"
 sichuan_events.213.d:0 "Les efforts déployés pour lutter contre l'opium finissent par porter leurs fruits. Bien que le combat ait été rude et que de nombreuses épreuves aient été endurées, le rôle joué par l'opium dans l'économie du Sichuan commence à diminuer. Les toxicomanes dans la rue sont devenus une vue plus rare et les débauches associées aux tripots d'opium sont progressivement éliminées de la société. Lentement mais sûrement, nous gagnons cette bataille."
 sichuan_events.213.a:0 "On ne peut pas s'arrêter maintenant !"

 sichuan_events.214.t:0 "Augmentation de la Production Céréalière"
 sichuan_events.214.d:0 "La culture de l'opium est très exigeante en main-d'œuvre, nécessitant d'énormes quantités de travail, de ressources et d'attention pour être cultivée. Avec la quantité d'opium produite dans le Sichuan, une part massive des terres arables de notre province était consacrée à la production d'opium. Cependant, la culture de l'opium pouvant entraîner une peine de prison ou pire, de moins en moins d'agriculteurs en cultivent de nos jours. Il s'agit d'un développement positif car il a conduit à une augmentation progressive mais significative des cultures vivrières par nos agriculteurs. Ayant subi une famine il y a peu, nous ne sommes peut-être pas loin d'un boom agricole."
 sichuan_events.214.a:0 "Plus jamais de famine !"

 sichuan_events.215.t:0 "Évasion Fiscale Découverte"
 sichuan_events.215.d:0 "Le Sichuan a longtemps souffert de problèmes de corruption. En grande partie causée par un gouvernement dysfonctionnel et morcelé entre divers seigneurs de la guerre, une relique de cette époque est que la collecte des impôts a été très inefficace. Seulement 10 à 20% de ce qui est collecté semble parvenir à [SZC.Capital.GetCapitalVictoryPointName], le reste étant perdu en gaspillage et en fraude en cours de route."
 sichuan_events.215.a:0 "Il faut vraiment tout faire soi-même ?"

 sichuan_events.216.t:0 "La Fraude Fiscale Augmente Considérablement"
 sichuan_events.216.d:0 "Les plans visant à monopoliser et taxer l’opium se sont révélés non seulement extrêmement impopulaires, mais ils font également face à une vive résistance. L’évasion fiscale, déjà un problème majeur auparavant, a explosé depuis la mise en œuvre de nos projets. La résistance à la fiscalité émanant de tous les niveaux de la société, et non d’une poignée de marchands déçus, constituera un obstacle considérable à surmonter si notre monopole doit acquérir une légitimité."
 sichuan_events.216.a:0 "Éliminez ces parasites !"

 sichuan_events.217.t:0 "Révolte des Marchands contre nos Politiques"
 sichuan_events.217.d:0 "Nombre des plus grandes maisons de commerce et propriétaires fonciers du Sichuan commencent à opposer une résistance acharnée à notre monopole. Grâce à leurs ressources combinées, ils disposent d’une base de pouvoir très importante dans le pays, rien que par leur influence économique. Cela leur a permis de défier activement nos nouvelles règles et nos impôts. À y réfléchir, nous aurions dû nous attendre à ce qu’ils mènent ce type de combat lorsqu’ils ont été confrontés à la perspective de se voir retirer leurs gains illicites. Nous n’avons d’autre choix que de répondre par la même mesure."
 sichuan_events.217.a:0 "Qu'ils soient unis ou séparés, ils seront écrasés de la même manière."

 sichuan_events.218.t:0 "Les Contrebandiers Entament nos Profits"
 sichuan_events.218.d:0 "Avec la création de nouvelles taxes et la simplification des procédures de recouvrement, la contrebande d'opium est devenue une entreprise plus lucrative que jamais. Les taxes élevées et les mesures - prétendument - "draconiennes" de l'État ont permis aux gangs de proposer des prix inférieurs à ceux du gouvernement par le biais de ses circuits légaux. Malgré les meilleurs efforts de la police et de l'armée, ils continuent de fonctionner avec une relative aisance."
 sichuan_events.218.a:0 "Traquez ces voyous !"

 sichuan_events.219.t:0 "Production Illégale d'Opium"
 sichuan_events.219.d:0 "Avant la création du Bureau des ventes, la culture de l'opium était totalement non réglementée et non documentée. Cela a causé d'énormes difficultés pour établir avec précision la quantité d'opium cultivée illégalement, car aucun registre fiable n'existe. Déjà, nos percepteurs d'impôts et la police se plaignent que leur travail ressemble à une recherche dans le noir et qu'ils rencontrent de grandes difficultés à placer cette production sous l'égide de l'État. Des mesures doivent être prises pour renforcer les capacités de l'État à suivre et à taxer ces activités !"
 sichuan_events.219.a:0 "Attention, nouvelle règle : tous les producteurs doivent désormais avoir une licence !"

 sichuan_events.220.t:0 "Le Bureau Passe à l'Action"
 sichuan_events.220.d:0 "La création du Bureau du monopole des ventes pour en contrôler le marché a déjà connu quelques succès. Grâce à leurs premiers travaux, ils ont réussi à établir un cadre définissant le mode de fonctionnement ainsi que la manière de traiter tant la production légale que la production illégale. Lentement mais sûrement, nous pouvons nous attendre à ce que leur dur labeur remplisse nos caisses, à mesure que l'efficacité de leurs efforts s'accroît heure après heure."
 sichuan_events.220.a:0 "Cela devrait être rentable !"

 sichuan_events.221.t:0 "La Fiscalité Entravée par la Corruption"
 sichuan_events.221.d:0 "La tentation de l’argent gagne même les meilleurs d’entre nous. Nous faisons face à un problème croissant de fonctionnaires acceptant des pots-de-vin pour permettre aux contrebandiers de grignoter nos profits. D’autres se contentent de percevoir les impôts et de s’en emparer, avant de les déclarer comme un déficit causé par l’évasion fiscale des marchands. Il semble désormais évident que nous n’avons tout simplement pas mis en place de sanctions suffisamment sévères face à cette criminalité égoïste."
 sichuan_events.221.a:0 "Débarrassez-vous de ces idiots!"

 sichuan_events.222.t:0 "Arrivée des Premiers Profits de l'Opium"
 sichuan_events.222.d:0 "Pas à pas, le Bureau du monopole des ventes a accru son pouvoir pour devenir une institution omniprésente à l’échelle nationale. Grâce à leurs efforts soutenus, ils ont réussi à réduire la fraude fiscale à un niveau record et à mettre fin à la plupart des grandes opérations de contrebande dans la province. Nous commençons déjà à voir d’énormes profits s’engouffrer dans les caisses de l’État. Avec les richesses considérables générées par le succès de notre monopole, nous n’aurons aucun mal à financer les futurs projets gouvernementaux."
 sichuan_events.222.a:0 "Excellent !"

 sichuan_events.223.t:0 "L'Armée Écrase les Contrebandiers !"
 sichuan_events.223.d:0 "En combinant de bons renseignements et une force brute, l’armée a mené une offensive contre une série de champs d’opium et de centres de contrebande à travers le Sichuan, réduisant plusieurs d’entre eux en cendres par le feu et les bombardements, et infligeant de lourdes pertes aux trafiquants. À la fin de la journée, une grande quantité de champs illicites et d’entrepôts ont été détruits, et une part importante des navires de contrebande connus opérant sur le Yangtsé a également été anéantie. Partout, cette opération a porté un coup dévastateur à ces criminels. Non seulement elle a complètement démoralisé plusieurs réseaux de contrebande, mais elle envoie aussi un message clair aux trafiquants : leur profit illicite sur les stupéfiants les conduira à leur perte.\n\nCette victoire décisive de l’armée nous a permis d’améliorer significativement la situation dans notre lutte contre l’opium, et a enseigné à notre armée des leçons précieuses pour combattre des ennemis irréguliers dans des environnements variés."
 sichuan_events.223.a:0 "Un coup décisif !"

 sichuan_events.224.t:0 "L'Armée Combat les Contrebandiers"
 sichuan_events.224.d:0 "Ces derniers jours ont vu une grande offensive de l’armée contre les contrebandiers qui infestent le Sichuan. Une série de raids sur des fermes illégales, des entrepôts de contrebande et d’autres installations utilisées par des gangs criminels dans tout le Sichuan. Bien que non décisive, l’armée a remporté une victoire tout en subissant des pertes relativement légères face à des ennemis armés d’armes légères introduites illégalement dans le pays. Cette opération a également permis à nos troupes et à nos commandants d’apprendre quelques leçons précieuses pour combattre des adversaires dans les forêts et les villes."
 sichuan_events.224.a:0 "Nos soldats se sont bien battus aujourd'hui."

 sichuan_events.225.t:0 "L'Armée Lutte contre les Contrebandiers"
 sichuan_events.225.d:0 "Nos récentes opérations militaires contre les contrebandiers ont donné des résultats mitigés. Utilisant des armes laissées sur place pendant la guerre civile, ils ont riposté et ont enfermé nos forces dans une série de batailles de guérilla qui les ont immobilisées. Bien que nous ayons pu perturber leurs opérations et tuer plusieurs criminels, leur ténacité leur a permis d’évacuer et de transférer une grande quantité d’opium et d’armes avant que nous puissions les détruire. Bien que les pertes n’aient été que modérées et que certains progrès aient été réalisés, même les plus grands optimistes ont du mal à présenter cela comme une victoire."
 sichuan_events.225.a:0 "Nous les aurons la prochaine fois."

 sichuan_events.226.t:0 "L'Armée Mise en Déroute par les Contrebandiers !"
 sichuan_events.226.d:0 "Terribles nouvelles de la dernière série d'opérations anti-contrebande. Aussi embarrassant que cela puisse paraître, nos commandants incompétents ont laissé leurs soldats être mis en déroute par de simples bandits. Armés d'armes de qualité militaire récupérées lors de la guerre civile et connaissant probablement nos points d'intervention, ils ont pu nous tendre une embuscade et anéantir nos forces. Les pertes seraient très lourdes et la nature des attaques ne laisse aucun doute : nous pourrions bien avoir plusieurs espions au sein de nos rangs agissant pour le compte des contrebandiers. Une enquête est déjà en cours.\n\nIl n'y a aucun moyen d'atténuer cela : il s'agit d'une défaite totale. Malgré nos efforts pour étouffer l'affaire, les journaux de [SZC.Capital.GetCapitalVictoryPointName] en rendent déjà compte comme d'une humiliation qui entache la réputation de [SZC.GetLeader]. Certains membres de notre gouvernement exigent même que nous repensions en urgence le rôle de l'armée dans notre campagne contre l'opium."
 sichuan_events.226.a:0 "Un spectacle honteux ! Réprimandez le commandant !"

 sichuan_events.250.t:0 "Tian Songyao S'étend vers des Territoires Industriels"
 sichuan_events.250.d:0 "L’Est du Sichuan restant chaotique après la fuite de Xiang et la chute de Chongqing, Tian Songyao a saisi l’occasion d’envoyer ses troupes dans la région, ostensiblement pour "rétablir l’ordre". S’il a fait preuve d’efficacité sur ce plan, son antipathie pour Yang Sen est bien connue et ses ambitions demeurent, pour l’heure, un mystère."
 sichuan_events.250.a:0 "Gardez un œil sur lui."

 sichuan_events.251.t:0 "Liu Cunhou Pénètre le Territoire des Officiers"
 sichuan_events.251.d:0 "Alors que nous poursuivons nos efforts pour rétablir l'ordre dans le sud du Sichuan suite à la défaite du Département des Officiers lors de la guerre, nous avons reçu quelques… rapports intéressants de la part de nos commandants sur le terrain. Notre ancien allié, le général et ancien gouverneur du Sichuan Liu Cunhou, s'est montré inhabituellement actif en envoyant ses troupes dans la région. C'est certes un geste sympathique et, à tous égards, il n'y a pas lieu de s'inquiéter, mais Yang Sen soupçonne que quelque chose se trame..."
 sichuan_events.251.a:0 "Est ce qu'il trame quelque chose ?"

 sichuan_events.252.t:0 "Réunions Mystérieuses"
 sichuan_events.252.d:0 "Des informations contradictoires continuent d'affluer depuis l'est et le sud du Sichuan. Si les agissements des seigneurs de la guerre ne sont pas un phénomène nouveau dans cette région, il semble qu'il se passe peut-être autre chose. Plusieurs réunions ont eu lieu entre des seigneurs de la guerre de second plan dans la région. Nos espions n'ont pas encore obtenu beaucoup d'informations, mais le général Fan Shaozeng, commandant en second de Yang Sen, soupçonne fortement qu'ils pourraient être en train de préparer une coalition entre ces seigneurs de la guerre de second plan.\n\nOn ignore encore pour quelle raison."
 sichuan_events.252.a:0 "Alors, que se passe-t-il vraiment ?"

 sichuan_events.253.t:0 "Les Efforts de Baoding"
 sichuan_events.253.d:0 "Il semble que l’histoire se répète. Une fois de plus, l’armée de Chengdu est dans un état lamentable, après les combats intenses des derniers mois. Comme en 1931, après la première expédition du Département des Officiers, le Département de Baoding a intensifié ses efforts pour rétablir l’ordre dans le sud. Les rapports continuent d’indiquer que des zones sont pacifiées avec succès.\n\nBien que Baoding puisse encore s’avérer être une menace, pour l’instant, notre alliance avec eux continue de porter ses fruits."
 sichuan_events.253.a:0 "Merci, camarades !"

 sichuan_events.254.t:0 "Tian Songyao Prête Allégeance à Liu Cunhou"
 sichuan_events.254.d:0 "Des nouvelles inattendues en provenance de Nanbu, la base principale du seigneur de la guerre Tian Songyao, située au nord-est. Tian Songyao, connu pour sa neutralité politique - ayant isolé son domaine de toutes les forces impliquées dans la guerre civile quelques mois plus tôt - mais aussi pour son opportunisme sans scrupules, a soudainement et publiquement déclaré son allégeance à l'ancien gouverneur du Sichuan et dirigeant du Département de l'Armement, Liu Cunhou. Tian Songyao n'agit pas par loyauté envers le Département. Quelque chose de dangereux se trame, et Liu Cunhou y est certainement impliqué.\n\nNous pourrions faire face à une trahison au sein de nos rangs."
 sichuan_events.254.a:0 "Enquêtez là-dessus, tout de suite !"

 sichuan_events.255.t:0 "Une Offre du Département de Baoding"
 sichuan_events.255.d:0 "Les tensions augmentant dans la province à cause de l'alliance inattendue entre Liu Cunhou et Tian Songyao, nous avons reçu un message de Deng Xihou, qui prétend détenir des informations précieuses sur les mouvements et les intentions de Liu. Nos espions n'ont rien trouvé concernant les plans de Cunhou jusqu'à présent et cette offre est tentante. Cependant, leurs exigences pourraient bien s'avérer trop élevées."
 sichuan_events.255.a:0 "Organisez cette réunion. En secret."

 sichuan_events.256.t:0 "Rencontre avec Deng Xihou"
 sichuan_events.256.d:0 "Deng Xihou est arrivé ce soir à Chengdu dans le plus grand secret. Dans un sous-sol miteux sous l’ancien palais mandchou et après quelques tours de négociations, un accord a été conclu : Deng Xihou informe que Liu Cunhou l’a récemment contacté, lui demandant une déclaration publique de loyauté ou, à défaut, de neutralité. En échange de garanties d’autonomie et d’influence gouvernementale pour le Département de Baoding, ainsi que d’une plus grande liberté dans la mise en œuvre de leurs projets économiques, Deng Xihou et Liu Wenhui s’engageront tous deux à prêter allégeance à Yang Sen et au Département de l'Armement.\n\nLe Département de Baoding a ses propres intérêts, mais le programme de modernisation de Yang Sen s’aligne majoritairement sur leurs objectifs. De plus, les troupes de Baoding sont les mieux entraînées du Sichuan et se révéleront certainement inestimables.\n\nLa décision finale revient désormais à Yang Sen."
 sichuan_events.256.a:0 "Très bien, nous acceptons votre accord."
 sichuan_events.256.b:0 "On ne peut pas faire confiance à Deng."

 sichuan_events.257.t:0 "Complots dans l'Ombre"
 sichuan_events.257.d:0 "Notre accord étant signé et Baoding ayant obtenu l'autonomie et l'influence qu'elle convoitait depuis si longtemps, Deng Xihou a désormais remis à nos agents tous les renseignements qu'il possédait sur les mouvements de Liu Cunhou. Ce dernier prépare un coup d'État dans une semaine, avec le soutien de Tian Songyao et de plusieurs seigneurs de la guerre locaux, qu'il a ralliés en leur promettant richesse, pouvoir ou influence.\n\nFort de la connaissance détaillée des mouvements prévus par Cunhou et du soutien du Département de Baoding, nous pouvons retourner la situation à notre avantage. Le coup d'État de Liu se transformera en un piège dont il ne pourra s'échapper dès le lancement de son complot."
 sichuan_events.257.a:0 "Nous serons prêts pour lui."

 sichuan_events.258.t:0 "Une Déclaration de Neutralité"
 sichuan_events.258.d:0 "Nouvelles de Ya'an et Guanxian. Suite à notre refus de l'accord proposé par Deng Xihou, ses troupes du Nord ainsi que celles de Liu Wenhui au Xikang se retirent progressivement vers leurs territoires d'origine. Cela a été suivi aujourd'hui par une déclaration conjointe des deux dirigeants, qui dénoncent l'incompétence du leadership de Chengdu. Toutefois, ils s'abstiennent de se rallier à Liu Cunhou et proclament plutôt leur neutralité absolue à compter de ce jour. Nos soldats sont déjà expulsés de leurs zones."
 sichuan_events.258.a:0 "Nous avons peut-être fait une erreur..."

 sichuan_events.259.t:0 "Incendies dans la Garnison"
 sichuan_events.259.d.trap:0 "À l’aube, alors que le jour se levait sur Chengdu, Liu Cunhou est passé à l’action et ses troupes ont commencé à s’emparer de la garnison mandchoue qui abrite le quartier général de l’Armement. Tian Songyao est également présent dans la ville, commandant des troupes pour prendre le contrôle de plusieurs points stratégiques. Malheureusement pour lui, nous sommes bien préparés à sa trahison..."
 sichuan_events.259.d.coup:0 "L’aube se lève sur Chengdu en proie à un chaos absolu. Inattendu par quiconque au sein de la direction de l’Armement et considéré comme encore dans sa base de Daxian, Liu Cunhou a désormais commencé à s’emparer de la garnison mandchoue qui constitue le quartier général de l’Armement. Dans les rues de la ville, les sbires de Tian Songyao ont rapidement affirmé leur contrôle sur nos troupes engourdies par le sommeil. De violents combats ont éclaté à l’intérieur de l’ancienne garnison mandchoue, désormais siège du Département de l’Armement, tandis que Yang Sen est introuvable."
 sichuan_events.259.a:0 "Déclenchez le piège !"
 sichuan_events.259.b:0 "Chengdu est en jeu..."

 sichuan_events.260.t:0 "Le Contre-coup"
 sichuan_events.260.d:0 "En quelques heures, Liu Cunhou a complètement échoué dans tous ses objectifs. Ayant anticipé le coup d'État, Yang Sen et Fan Shaozeng ont feint le chaos dans la garnison, ce que Liu Cunhou a pris pour une preuve de son succès. Lorsqu'ils ont tenté de s'emparer du reste du bâtiment, plusieurs bataillons cachés dans l'immense complexe se sont mis en action, érigeant des barricades et piégeant les soldats de Cunhou. Regardant le cadavre de Liu Cunhou gisant au sol, Yang Sen a ordonné à son général fidèle Fan Shaozeng de balayer le bâtiment et de forcer la reddition du reste des troupes de Liu.\n\nDans la basse ville, Tian Songyao gît mort dans les rues, tué par des agents de Baoding infiltrés parmi la population.\n\nLe coup d'État est terminé et la paix peut enfin revenir au Sichuan."
 sichuan_events.260.a:0 "La mort d'un traître."

 sichuan_events.261.t:0 "Liu Cunhou Prend le Commandement"
 sichuan_events.261.d:0 "Les combats ont été intenses, mais brefs. Pris totalement au dépourvu, les troupes de Yang Sen n'ont pas pu résister à celles de Liu Cunhou et de Tian Songyao, et à midi, la majeure partie de la ville était solidement sous leur contrôle. Yang Sen et Fan Shaozeng sont morts, tués lors de l’échange de tirs, tandis que leurs troupes, désormais sans chef, ont capitulé.\n\nDepuis la cour de l’ancienne garnison mandchoue, Liu Cunhou a proclamé sa prise de tête du commandement de l’Armement, et personne n’est resté dans la ville pour s’y opposer."
 sichuan_events.261.a:0 "Liu est une fois de plus gouverneur du Sichuan."

 sichuan_events.262.t:0 "Le Sichuan Déclare son Soutien au Gouvernement Central"
 sichuan_events.262.d:0 "Malgré leurs récents ennuis, il semble que le Département de l'Armement de [SZC.GetLeader] ait réussi à déjouer les pronostics et à conserver le contrôle de la province, la faisant entrer dans notre sphère. Nous avons reçu une missive de [SZC.GetLeader] déclarant sa loyauté envers notre gouvernement."
 sichuan_events.262.a:0 "Une province de plus dans le giron !"

 sichuan_events.263.t:0 "Le Sichuan Envoie du Soutien"
 sichuan_events.263.d:0 "Une tournure positive des événements nous a récemment permis de voir nos rangs grossir grâce à un afflux constant de renforts envoyés par nos amis du Sichuan. La Ligue traverse peut-être une période difficile, mais il semble que nous ayons encore des alliés sur lesquels compter. Nous mettrons ces forces à profit pour chasser les derniers insurgés de nos terres !"
 sichuan_events.263.a:0 "De bonnes nouvelles, au moins."

 sichuan_events.264.t:0 "Le Maréchal Wang Chengbin Arrive au Sichuan"
 sichuan_events.264.d:0 "Après le récent Coup d'État mandchou dévastateur, beaucoup craignaient que la Clique du Zhili du Nord ne soit condamnée, reléguée aux oubliettes de l'histoire. La brutale Guerre Zhili-Mandchoue a vu le troisième dirigeant de la Clique du Zhili, le maréchal Wang Chengbin, rallier les forces du Zhili dans un dernier effort pour reprendre Beijing, et les pertes ont été immenses. Avec la perte de Cao Kun et Wu Peifu d'un seul coup, les soldats du Zhili ont d'abord été démoralisés. Sans le Maréchal de Jade, ont-ils seulement une chance ? Peuvent-ils vaincre les Mandchous ? Et les autres seigneurs de la guerre ? Ainsi, le cheval pâle était venu vaincre la Clique du Zhili une fois pour toutes.\n\nPourtant, un homme s'est dressé là, face aux ambitions des Royalistes, face au bain de sang, face à la mort de son mentor Cao Kun. Le ministre de l'Armée, le maréchal Wang Chengbin, absent de Beijing lors du coup d'État, est le premier point de ralliement des forces chaotiques du Zhili. Défendant les stratégies d'urgence de la Guerre civile, il se battra bec et ongles pour préserver l'hégémonie du Zhili, pour venger son ami tombé au combat, et même, à contrecœur, Wu Peifu. Car que serait-il s'il laissait leur souvenir disparaître en vain ? Organisant la retraite, Wang a subi la brutalité des armées royalistes. Rasant des villes entières, anéantissant Luoyang, semant la terreur à Wuhan, et tout cela pour rien.\n\nBeaucoup avaient présumé que Wang Chengbin était mort au combat, peut-être à Luoyang ou Wuhan, et personne à [SZC.Capital.GetCapitalVictoryPointName] ne s'attendait aux arrivées de la nuit dernière. Un convoi de camions, sans inscriptions et visiblement usés, est arrivé aux environs de [SZC.Capital.GetCapitalVictoryPointName]. Un garde leur a ordonné de faire demi-tour. Mais lorsqu'ils se sont arrêtés, le garde n'en a pas cru ses yeux. Un bras enveloppé dans un bandage ensanglanté et le visage couvert de blessures, le maréchal Wang Chengbin est descendu du premier camion.\n\nLe garde a rapidement indiqué au convoi le chemin vers le complexe de [SZC.GetLeader], au centre de la ville, où ce dernier a reçu Wang et les vestiges de la structure de commandement du Zhili. Les yeux pleins de fureur et de vengeance, Wang a supplié [SZC.GetLeader], l'implorant de rassembler ses forces et de se préparer à une campagne de reconquête contre les Royalistes maudits."
 sichuan_events.264.a:0 ""La dernière chance du gouvernement légitime de Chine...""
 sichuan_events.264.b:0 "À regret, le Maréchal découragé repart."

 sichuan_events.265.t:0 "Le Maréchal Wang Chengbin Refait Surface !"
 sichuan_events.265.d:0 "Dans notre triomphe retentissant contre les chiens du Zhili, nous étions persuadés que le Roi de Baoding et le Maréchal de Jade avaient péri, leurs corps jonchant la salle du trône. Cependant, fidèle à Cao, l'ancien ministre de l'Armée, Wang Chengbin, a lancé une contre-attaque immédiate contre le coup d'État. Avec des combats brutaux dans les rues de la capitale, les forces du Zhili démoralisées et désorganisées se sont finalement effondrées devant nos gardes impériaux d'élite, menés par Xiqia. Le maréchal Wang a cependant rebondi et poursuivi sa lutte vaine et futile contre le Fils du Ciel.\n\nMenant une retraite combattue au nord du Fleuve Jaune, Wang a livré une dernière résistance âpre, voire admirable, dans l'ancien quartier général du Maréchal de Jade à Luoyang. Ses soldats préférant mourir que de rendre la ville, ils ont finalement forcé notre main dans la guerre civile, entraînant la quasi-destruction de Luoyang. Présumant qu'il était mort dans les combats, de nombreuses sources avaient confirmé ces affirmations. Cependant, la guerre civile se poursuivant ailleurs sous la conduite de Liu Zhenhua, Xiao Yaonan et Zhang Qihuang, nous ne pouvions guère nous permettre de compter les corps.\n\nDes rumeurs ayant émergé dans la capitale selon lesquelles l'allié et ami le plus fidèle du Roi de Baoding s'était enfui au Sichuan, il semble que le Maréchal ait réussi à rallier [SZC.GetLeader] à sa cause. Tentant de monter une dernière campagne de reconquête pour nous chasser de notre Mandat, la Clique du Zhili s'est révélé un adversaire d'une résilience extrême. Malgré le fait qu'il contrôle une province en famine et en guerre civile, largement ignorée, le Zhili conserve une grande partie de ses forces et possède la volonté nécessaire pour mener sa campagne à bien."
 sichuan_events.265.a:0 "Ce satané Maréchal de Tianjin !"
 sichuan_events.265.b:0 "Sa cause est légitime !"

 sichuan_events.266.t:0 "Failles Grandissantes"
 sichuan_events.266.d:0 "Longtemps composante de la politique interne de la Clique du Zhili, celle-ci est nettement divisée entre de nombreuses camps. Le Zhili du Nord, sous les auspices des regrettés Cao Kun, Wu Peifu et Wang Chengbin. Le Zhili du Sud, soumis aux caprices de Sun Chuanfang et Qi Xieyuan. Même au sein de ces branches, des dynamiques de factions interpersonnelles existent. Le Nord compte ses factions de Luoyang et de Jinbao, appartenant à Wu et Cao. Le Sud voit les loyautés interchangeables de tous les subordonnés de Sun Chuanfang. Et même ainsi, persiste la scission cruciale entre les hommes d'armes et les hommes de plume.\n\nLorsque la Clique du Zhili avait restauré son contrôle sur Beijing à la fin des années 1920, elle avait officiellement tenté de s'organiser en un gouvernement légitime. Avec la majorité des hommes de plume occupant des postes à l'Assemblée et au Gouvernement, les hommes d'armes s'étaient résignés à contrôler les provinces et leurs propres sections des armées provinciales et centrales. Cependant, après la mort de Cao et de Wu, l'équilibre et les relations complexes entre les ailes militaire et politique de la Clique se sont trouvés déchirés.\n\nWu et Cao régnant sur leurs ailes respectives, leur absence a conduit à ce que des maréchaux comme Wang et ses contemporains en uniforme s'empoignent. L'exil venant encore tendre les relations, les civils se sont rassemblés autour du magnanime Yan Huiqing. Diplomate vétéran, bureaucrate, ancien Premier ministre et Président, il a commencé à se disputer fréquemment avec Wang Chengbin et le reste de l'appareil militaire du Zhili sur la meilleure voie à suivre pour l'avenir de leur gouvernance. En raison de leur conflit, beaucoup au sein de l'ancien gouvernement provincial du Sichuan craignent qu'une fracture profonde ne soit en train de s'ouvrir."
 sichuan_events.266.a:0 "Nous ne pouvons pas nous diviser maintenant !"

 sichuan_events.267.t:0 "L'Ascension du Diplomate"
 sichuan_events.267.d:0 "Personnage curieux au sein des cercles intimes de la Clique du Zhili, beaucoup au sein du réseau de clientélisme interne considèrent Yan Huiqing comme un étranger. N’ayant jamais été officiellement intégré à la Clique du Zhili, Yan incarne lui-même le prestigieux et majoritairement apolitique corps diplomatique de la République de Beiyang. Ayant servi à plusieurs reprises à titre intérimaire en tant que Premier ministre ou Président au nom de la Clique du Zhili, Yan a fait preuve d’une diligence remarquable pour veiller à ce que les gouvernements de Beiyang restent à flot.\n\nIl semble une fois de plus que Yan soit nécessaire pour maintenir la stabilité et prévenir l’anarchie au sein du Zhili. Ayant réussi à négocier un soutien suffisant, en tirant parti de ses liens étendus avec la bureaucratie et de son parcours irréprochable, Yan a utilisé sa position au sein du gouvernement pour demander au maréchal Wang de privilégier une voie civile, demande que Wang a acceptée. Élu à la fonction de Président, en exil bien sûr, aux côtés de figures telles que Gu Weijun, Bai Jianwu, Wang Kemin, le maréchal Wang et Gao Lingwei, entre autres, le gouvernement de Yan Huiqing ressemble à un équilibre soigneusement maintenu entre bureaucrates de Beiyang et inconditionnels du Zhili.\n\nAvec l'objectif noble d'affirmer le contrôle civil sur l'armée et d’éviter les erreurs imprudentes qui ont conduit au Coup d'État Mandchou, beaucoup nourrissent de l'espoir quant à leurs ambitions. Bien que nombreux soient également ceux qui doutent qu’ils parviennent à accomplir quelque chose d’important."
 sichuan_events.267.a:0 "Nous devons tirer les leçons de nos erreurs."

 sichuan_events.268.t:0 "L'Ascension du Fils de Tianjin"
 sichuan_events.268.d:0 "Troisième Hiérarque. Fils de Tianjin. Ministre de l'Armée. Maréchal de la République. Traître du Zhili. Wang Chengbin porte de nombreux surnoms aux connotations mitigées. Dépourvu du respect national et de la loyauté du Maréchal de Jade, Wang a toujours joué un rôle secondaire face à Wu Peifu. Pourtant, Wang était peut-être le seul homme que Wu Peifu craignait, car il menaçait véritablement sa position au sein de la Clique du Zhili, ayant été un compagnon de Cao Kun plus longtemps que Wu ne l'avait été. Jouant tout pour aider son mentor, Wang avait finalement été relégué à une retraite douce en raison des manœuvres de Wu, ce qui avait conduit à la trahison de Wang lors du Coup de Beijing de 1924.\n\nDe retour dans le rang pendant la Troisième Guerre ZhiFeng, Wang s'est révélé être le plus loyal défenseur du président Cao Kun au sein des cercles militaires, agissant comme son porte-parole et rappelant constamment l'ombre menaçante du Roi de Baoding sur l'appareil militaire. Et ce jour-là, Wang était l'un des rares à se méfier de l'accumulation de forces en vue du coup d'État mouvementé, complotant avec le Maréchal de Jade sur la base de rapports concernant de vigoureuses manœuvres de troupes. Et pourtant, il n'a rien pu faire pour sauver son mentor ou le détesté Wu Peifu. Consumé par lui-même, il a néanmoins ordonné une contre-attaque implacable, tentant d'écraser la rébellion avant qu'elle ne prenne de l'ampleur.\n\nMême si cela a échoué, il est désormais un esprit vengeur, la mort qui marche. Ayant grimpé aux premiers rangs de la hiérarchie du Zhili, Wang est admiré par toute la Clique Jinbao, et même certains membres de la Clique de Luoyang flattent le Maréchal de Tianjin. Utilisant son statut désormais légendaire, Wang est parvenu à forcer les civils de Yan Huiqing à se prosterner devant la primauté de l'armée dans une telle situation d'urgence. Promettant une vengeance rapide contre les forces manchoues naissantes et dérisoires auprès du Haut-Commandement des Vestiges, beaucoup au sein de la Clique et de la nation se préparent pour le dernier voyage de la Clique du Zhili."
 sichuan_events.268.a:0 "Déchirez et déchirez... jusqu'à ce que ce soit terminé."

 sichuan_events.269.t:0 "Du Sang Neuf dans de l'Eau Ancienne"
 sichuan_events.269.d:0 "Anéantie au-delà de toute réparation, ayant perdu à la fois sa tête et son second, le système de relations de la Clique du Zhili a été plongé dans le chaos total suite à la tentative de coup d'État. Ayant réussi à rétablir un semblant d'autorité, suffisant au moins pour monter une résistance admirable au nom du Maréchal de Jade, la nouvelle position de Wang Chengbin en tant qu'autorité absolue de la Clique du Zhili du Nord n'a été consolidée que récemment, avec l'assentiment de tous les autres prétendants potentiels, tels que Zhang Qihuang ou Cai Chengxun.\n\nCependant, ce qui reste de la hiérarchie militaire du Zhili est un cadavre démantelé, criblé de balles. Ayant perdu de nombreux officiers dans les combats, une nécessité urgente de réforme, de modernisation et d'élévation des jeunes survivants à l'avant-garde du commandement militaire s'impose. Blâmant la réticence et l'incapacité de Wu Peifu à mettre en œuvre des réformes significatives au sein du haut commandement, en raison de sa croyance en son système parfait d'autonomie complète des officiers, le maréchal Wang Chengbin a écrit des lettres à une série de commandants, demandant les noms d'individus exceptionnels qui ont fait leurs preuves au-delà de l'exécution normale de leurs devoirs.\n\nEntreprenant un effort massif de réforme à la suite de l'exil, le Maréchal a collaboré avec des figures telles que Jiang Baili pour mettre en œuvre et utiliser ses vastes connaissances en stratégie militaire, dans l'espoir que la nouvelle doctrine suffira à vaincre les armées royalistes naissantes et inexpérimentées. En y réfléchissant, on ne peut que placer sa foi dans la loyauté et la ténacité du soldat du commun pour mener la vengeance du Zhili à son terme."
 sichuan_events.269.a:0 "Nous marchons vers l'avenir avec le maréchal Wang !"

 sichuan_events.270.t:0 "Renaissance de la Clique du Zhili ?"
 sichuan_events.270.d:0 "Ayant régné sur la Chine de manière intermittente, de 1922 à 1924, puis de 1927 à 1936, la Clique du Zhili semblait être le pouvoir dominant l’ensemble du pays. Avec Beijing sous son étreinte, l’homme le plus puissant de Chine à ses côtés, et les nombreuses relations exploitées par Cao Kun, beaucoup croyaient que leur règne résisterait à toutes les tempêtes. Cependant, après l’effondrement de la Ligue et l’inaction du Gouvernement à intervenir aux côtés de la Ligue ou des Anticoncessionnistes, la Cour royale a exploité le sentiment populaire négatif et l’éloignement des bienfaiteurs allemands du Zhili afin de saisir l’opportunité d’éradiquer l’hydre à sa tête.\n\nAinsi, les Princes mandchous et le Parti Zongshe ont mis en doute la ténacité, l’obstination et la volonté de la Clique du Zhili. Se ralliant autour du désormais infâme Maréchal de Tianjin, Wang Chengbin, le Zhili a gravement blessé le gouvernement mandchou lors de leur retraite retardée vers les provinces voisines. Disposés à sacrifier leur vie et leur âme pour empêcher le retour d’une monarchie absolutiste, les derniers combats de la guerre civile Zhili-Mandchoue rappellent la Révolution Xinhai. Morts en martyrs pour leur cause, les Mandchous les ont traités avec une extrême sévérité, éradiquant des villages et des villes entières pour assurer l’anéantissement de la Clique du Zhili.\n\nCependant, les voici, les [SZC.GetName], représentants de la résistance d’acier de la Clique du Zhili. Sous les auspices de [SZC.GetLeader], ils ont adressé une offre particulière à [ROOT.GetLeader]. Proposant un pacte d’égalité en matière de loyauté et de cobelligérance, ils désirent un effort commun pour chasser la menace mandchoue de Beijing et restaurer la véritable autorité de l’ancienne gloire républicaine de la Révolution Xinhai."
 sichuan_events.270.a:0 "Bien sûr ! Les vieux amis doivent rester unis en ces temps difficiles."
 sichuan_events.270.b:0 "Vous avez été vaincus une fois, qui peut dire que cela n'arrivera pas encore ?"

 sichuan_events.271.t.accept:0 "[FROM.GetName] a Accepté notre Demande !"
 sichuan_events.271.d.accept:0 "Constatant la sagesse de notre requête, et peut-être admirant nos ambitions, notre ténacité et notre férocité, [FROM.GetName] a accepté de bon gré notre demande d'accord de cobelligérance. Engageant leurs soldats, leurs armes et leur gouvernement pour notre cause commune d'éradication des usurpateurs mandchous, nous verrons bientôt le retour d'un véritable gouvernement chinois révolutionnaire et républicain ! Zhonghua Minguo Wansui !"
 sichuan_events.271.a:0 "Un toast à nos nouveaux compatriotes !"

 sichuan_events.271.t.refuse:0 "[FROM.GetName] a Rejeté notre Demande !"
 sichuan_events.271.d.refuse:0 "Les faibles imbéciles de [FROM.GetName] ont, peut-être par lâcheté ou par crainte de représailles de la part de Beijing, catégoriquement refusé notre demande d’accord de cobelligérance commune. Bien que cela ne soit pas dévastateur pour la cause anti-Mandchoue, cela montre clairement que [FROM.GetName] n’a absolument aucune intention de suivre les pas des martyrs révolutionnaires qui ont saigné et souffert pour la résolution de Xinhai. Peu importe ! Avec le Maréchal de Tianjin, nous écraserons les perfides Mandchous, puis ces traînards ineptes !"
 sichuan_events.271.b:0 "Votre heure viendra !"

 sichuan_events.272.t:0 "La Clique du Zhili est de Retour"
 sichuan_events.272.d:0 "Après l'assassinat de Wu Peifu et de Cao Kun à Beijing lors du Coup d'État mandchou et l'effondrement consécutif de la Clique du Zhili, beaucoup avaient relégué l'ancienne alliance de seigneurs de la guerre aux oubliettes de l'histoire. Pourtant, des événements récents ont remis en question ces hypothèses.\n\nDes rumeurs circulent selon lesquelles le maréchal Wang Chengbin, que l'on croyait mort lors de la chute de Luoyang, aurait miraculeusement survécu et se serait allié au gouverneur de la province, Yang Sen, un ancien allié de Wu Peifu. Les deux dirigeants rallient actuellement les vestiges disparates du Zhili qui ont fui le Nord après le coup d'État, et la propagande anti-mandchoue a déjà commencé à se répandre dans les provinces environnantes. Il semble que la Clique du Zhili soit bien plus résistante qu'on ne le pensait."
 sichuan_events.272.a:0 "Ils n'abandonnent donc jamais ?"
 sichuan_events.272.b:0 "Une nouvelle menace pour les Mandchous."

 sichuan_events.273.t:0 "Arrivée d'un Camarade"
 sichuan_events.273.d:0 "Groupe robuste et adaptable de commandants et de soldats endurcis, la Clique du Zhili a survécu à de nombreuses reprises à une destruction quasi totale au cours de son histoire, et est toujours revenue plus forte. Pendant la Deuxième Guerre ZhiFeng, la Clique avait fait face à une annihilation absolue. La défection de Feng Yuxiang et de Wang Chengbin ayant provoqué le Coup de Beijing de 1924, elle a vu la capture de Cao Kun, l'expulsion de Wu Peifu et de la majorité de son état-major, les derniers vestiges du contrôle du Zhili restant entre les mains du gouverneur du Hubei, Xiao Yaonan.\n\nMême à ce moment-là, la Clique s'est régénérée, Wu cherchant refuge auprès de Zhao Hengti, reconquérant la province du Henan, et reprenant la province du Zhili avec l'aide du Fengtian. Et encore une fois, lorsque le torrent dévorant de la ferveur révolutionnaire, l'Armée nationale révolutionnaire, a marché vers le nord pour expulser tous les seigneurs de la guerre, quelle que soit leur allégeance, le Zhili du Nord et du Sud se sont alliés au Fengtian pour former l'Anguojun. Cao Kun, utilisant ses relations et son esprit, a négocié l'intervention allemande, et on connaît la suite.\n\nApparemment, nous y voilà une fois encore, le cœur de la Clique du Zhili et le Gouvernement ayant fui au Sichuan, personne n'ayant conscience de l'ampleur réelle des pertes de la Clique. On peut supposer que beaucoup de leurs flammes se sont éteintes dans les combats. Tôt ce matin, cependant, un général et quelques-uns de ses partisans se sont trainés jusqu'à Chengdu, apportant avec eux des armements et une petite réserve d'or."
 sichuan_events.273.a:0 "Notre heure n'est pas encore venue !"

 sichuan_events.274.t:0 "Luoyang Reprise"
 sichuan_events.274.d:0 "Les décombres, le carnage, le bain de sang. Le maréchal Wang et ses compatriotes connaissent trop bien le paysage de Luoyang, encore frais dans leur mémoire. Jadis berceau ancestral et cœur de la civilisation chinoise, Luoyang n’est plus aujourd’hui qu’une coquille vide de ce qu’elle fut. Datant de l’Époque classique, Luoyang a même été la capitale de nombreuses dynasties, dont celle des Han orientaux, devenant le point focal de la Chine pendant des décennies. Avec un tel prestige, Luoyang a pourtant connu de nombreuses épreuves, de nombreuses destructions, des pillages, tout le cortège de la dévastation.\n\nDepuis la dynastie Yuan, le statut de Luoyang en tant que "Capitale du Milieu" et capitale légale naturelle a été considérablement réduit, ayant été rasée à plusieurs reprises. Néanmoins, la Luoyang moderne était à nouveau un nœud d’importance. Considérée comme le quartier général du Maréchal de Jade, elle a attiré une attention considérable pendant la Deuxième Guerre ZhiFeng, ainsi que dans tous les conflits qui ont suivi entre le Zhili et ses ennemis.\n\nSon statut historique n'a pas empêché pas les soldats royalistes zélés de presque raser à nouveau Luoyang. Le maréchal Wang ayant apparemment monté sa dernière défense dans la ville, les royalistes avaient répondu avec une extrême sévérité. Maintenant que nous avons repris la province, il est clair que la dévastation brute infligée par les Mandchous dans leur fureur est immense. La première étape de la reconquête de la Chine est amère.\n\nNéanmoins, le Zhili a le devoir de préserver et de rétablir l’ordre, et la capture de Luoyang constitue une propagande formidable pour le moral de notre nation."
 sichuan_events.274.a:0 "Si seulement Wu pouvait nous voir maintenant !"

 sichuan_events.275.t:0 "La Chute de Wuchang"
 sichuan_events.275.d:0 "Autre bastion formidable du Zhili, Wuhan (nom collectif de Wuchang, Hankou et Hanyang) n'a pas été épargnée par la férocité des forces royalistes, dans leur soif de chasser le Zhili des Plaines centrales. Avec une histoire remontant à la dynastie Shang, c'est sur son sol sacré que reposent 3500 ans de culture et de civilisation chinoises. L'un des principaux foyers du confucianisme ancien, il a vu naître "l'Académie Wenjin", considérée comme la "plus ancienne université encore existante en Chine", aux côtés de l'Académie Yuelu au Hunan ou de l'Académie Donglin au Jiangsu.\n\nVéritablement florissante et jetant les bases de la ville moderne à l'époque des Trois Royaumes, la ville s'est transformée en un pôle culturel et économique le long du Yangtsé. Siège de nombreux régimes d'opposition, elle est véritablement devenue un marché renommé pour les marchands, sa position unique enjambant le Yangtsé et la rivière Han en faisant le point de rencontre naturel des commerçants de toute la Chine centrale. Elle a même reçu le surnom de "Chicago de l'Est", en référence à l'importance industrielle, financière, de transport et culturelle de Chicago pour les États-Unis.\n\nAssez prospère et épargnée par de nombreuses représailles par rapport aux autres pôles de développement chinois, Wuhan est néanmoins devenue le théâtre de la plus grande bataille du siècle dernier. Avec la chute de Hankou et Hanyang face aux Armées nationales révolutionnaires en progression lors de l'Expédition du Nord, Wuchang elle-même a continué de résister. A la suite de l'intervention allemande et aux manœuvres politiques internes du Kuomintang, la Révolution nationale s'est déchirée elle-même, permettant aux forces de Wu Peifu, Xiao Yaonan et du Zhili du Sud d'anéantir les forces restantes du Kuomintang.\n\nNos forces ayant capturé une ville industrielle aussi ancienne et aimée, nos soldats ont commencé à saluer cette prise comme une répétition du "Miracle de 1927", le maréchal Wang étant acclamé comme un génie militaire. Il existe déjà un sentiment croissant que notre cause est juste, et que nous reprendrons bientôt la Capitale du Nord, et rétablirons une fois pour toutes le règne légitime du Zhili."
 sichuan_events.275.a:0 "Là où tout s'est terminé. Et là où tout devra recommencer."

 sichuan_events.276.t:0 "La Chute de Beijing"
 sichuan_events.276.d:9 "Ville la plus centrale, la plus prisée et la plus connue internationalement de toute la Chine, l'histoire de Beijing remonte à 3000 ans, et son rôle tant dans notre ascension que dans notre déclin est sans égal. Les premiers événements de l'histoire de Beijing, cependant, sont enveloppés de mythes et de légendes, le premier événement de son histoire à bénéficier d'un soutien historique étant la déposition du dernier roi Shang par le roi Wu de Zhou. Longtemps siège du pouvoir dans le nord, l'histoire de Beijing est marquée par des raids de nomades frontaliers et la construction continue de défenses de plus en plus élaborées pour se défendre contre eux.\n\nIroniquement, Beijing a d'abord été placée sur la carte sous le nom de "Nanjing", car le siège du pouvoir de la dynastie Liao se trouvait dans l'actuelle Mongolie-Intérieure. Sous la domination des Liao, la ville s'est développée de manière gigantesque, devenant un pôle culturel pour les Khitans, les Xi, les Shiwei, les Balhae et les Han. Devenant plus tard "Zhongdu", ou "Capitale centrale" sous les Jin, la ville a vu une fois de plus sa taille doubler et a connu un développement rapide. Pourtant, elle a vu le plus grand progrès sous la dynastie Yuan.\n\nKubilai Khan l'ayant baptisée "Dadu", ou "Grande Capitale", elle est devenue le siège du pouvoir pour toute la Chine. Enfin, elle a gagné le nom de "Beijing" en 1403, sous la dynastie Ming. Prospérant sous les Ming et les Qing, l'importance de Beijing pour la culture chinoise moderne a été cimentée, devenant la ville la plus convoitée de l'ère des seigneurs de la guerre. Siège de la République de Beiyang et de toutes ses facultés, celui qui gouvernait Beijing gouvernait la Chine.\n\nEt ainsi, il est clair, avec la reconquête de la Capitale du Nord, que le Zhili a une fois de plus ressuscité le rêve républicain. Ayant vaincu les défenseurs royalistes, nos forces élites ont réussi à balayer méthodiquement les rues de la ville, aboutissant à une dernière résistance désespérée au sein de la Cité Interdite, rappelant les dernières résistances des Liao, des Ming et des Qing. Néanmoins, [SZC.Capital.GetCapitalVictoryPointName] a éclaté en une gerbe de célébrations alors que les derniers vestiges d'une époque révolue sont une fois de plus déposés !"
 sichuan_events.276.a:0 "Zhonghua Minguo Wansui !"

 sichuan_events.277.t:0 "Déposition du Garçon-Empereur"
 sichuan_events.277.d:0 "Enfin, nos forces ont réussi à pénétrer dans la Cité interdite, lourdement fortifiée. Inondées par les forces d'élite, dévouées et zélées de la Garde impériale, plusieurs couches de défense se dressaient devant nos vaillants soldats. Avec la majorité de nos troupes détournées vers d'autres fronts ou chargées de nettoyer les rues de Beijing de leur décadence, un petit groupe de plusieurs détachements a été chargé du siège et de la prise de la Cour impériale. Sous l'autorité de Guo Jijiao, un jeune commandant exceptionnel au potentiel débordant, qui a mis au point une excellente stratégie de ratissages minutieux entre les salles et les annales du Palais et ses structures extérieures.\n\nAyant subi de lourdes pertes, mais avec un moral à son comble, les vaillants hommes sous les ordres de Guo ont mis en œuvre une recherche méthodique du Garçon-Empereur et de son clan. Rencontrant des défenseurs extérieurs tels que Jixing et Zaitao, les deux Princes mandchous ont fini par tomber face aux unités du Zhili en progression. Menant une petite escouade, Guo est parvenu à dégager la salle du trône, trouvant Puyi caché derrière le Trône du Dragon, recroquevillé de peur. Alors qu'ils tentaient de l'entraîner hors de la pièce, son frère et son cousin, les princes Pujie et Xiqia, ont fait irruption dans la salle avec quelques gardes restants, tentant de s'opposer à ce que Guo saisisse l'Empereur.\n\nAussi vain qu'ait été leur dernier acte de résistance, de nombreux hommes vaillants ont péri dans l'échange, Guo lui-même étant blessé. Néanmoins, l'Empereur a été capturé, et ses maîtres sont morts ! Alors que de nombreux membres plus radicaux de l'état-major militaire et du cabinet réclament du sang, les maréchaux Wang et Yan ont apaisé les esprits. Reconnaissant que Puyi ignorait réellement le coup d'État initial, ils ont plutôt décidé de jeter Puyi en prison. Car bien qu'il ne puisse être tenu responsable de la mort de Cao ou de Wu, ses crimes contre la République sont nombreux. Potentiellement, dans le futur, il pourra être libéré, en tant que citoyen modèle. Jusqu'à ce que ce jour arrive, il restera prisonnier."
 sichuan_events.277.a:0 "Félicitations au courageux Guo ! Mort à la monarchie !"

 sichuan_events.278.t:0 "Se Souvenir du Roi de Baoding"
 sichuan_events.278.d:9 "Maintenant que notre reconquête du territoire du Zhili et de Beijing est achevée, il est temps d'enterrer les morts, de reconstruire la nation et de faire face au deuil. Beaucoup ont péri dans la lutte perpétuelle des Républicains contre la Monarchie. Lors de la Guerre Zhili-Mandchous, de notre reconquête, de Xinhai et des luttes qui ont suivi. Une nation d'une telle beauté, d'un tel amour et d'une telle compassion, luttant constamment contre ses propres frères d'armes à cause de convictions idéologiques perfides, de jeux de pouvoir et de la faim des seigneurs de la guerre. Sous tout ce miasme, cette consommation omniprésente de conviction et de rage, il est souvent sous-entendu que nous sommes tous humains. Tous chinois. N'avons-nous pas de la fierté à l'égard de notre civilisation millénaire, qui a résisté à l'épreuve du temps ?\n\nAu lieu de cela, nous nous querellons entre nous tandis que les impérialistes étrangers deviennent de plus en plus puissants. Les martyrs, les héros de notre nation ! Oh, combien leur savoir et leur majesté sont abondants ! Seul eux ont véritablement compris ce qui était en jeu. Et ce n'est qu'à présent que nous comprenons pleinement leur message. Tenter de construire une nation à partir d'une clique désordonnée de seigneurs de la guerre militaristes n'est pas une tâche facile. Le président Cao et le maréchal Wu le savaient trop bien. Et pourtant, ils comptent parmi les nombreux morts de cette lutte. Le Roi de Baoding, décrit comme le "Président corrupteur", un véritable patriote ne cherchant qu'à renforcer sa nation. Le Maréchal de Jade, malgré son animosité persistante envers le maréchal Wang, portait également en lui une grandeur dans la construction de la nation.\n\nÉriger un monument à partir des décombres de la République de Chine, le reconstruire à lui seul. Telle était leur tâche, et ils ont été effacés trop tôt pour en voir l'aboutissement. Et ainsi, il nous incombe à nous, leurs descendants, de poursuivre la mission de nos ancêtres et de permettre aux Cinq Ethnies sous une Seule Union d'enfin voler de leurs propres ailes avec fierté. Pour commémorer cette occasion de souvenir et de réflexion, [SZC.GetLeader] a institué une journée de deuil à travers la nation pour ceux qui ont sacrifié leur vie pour voir la République perdurer. Notre seul espoir, notre seul désir, est que leur mort n'ait pas été vaine."
 sichuan_events.278.a:0 "Notre nation, entachée par ces maudits conflits."

 sichuan_events.279.t:0 "Revitalisation de la Démocratie Chinoise"
 sichuan_events.279.d:0 "Le flambeau de la République de Beiyang étant désormais entre nos mains, il nous appartient de faire perdurer son rêve. Née de l'idéalisme, de l'espoir dans quelque chose de meilleur que la monarchie malhonnête, elle a finalement échoué. Elle a été déchirée par les militaristes sans foi ni loi, qui cherchaient plus à se remplir les poches et à garder leur influence que d'accomplir leur devoir envers la nation.\n\n"Plus jamais ! Aujourd'hui marque un jour nouveau dans l'histoire de la nation ! Nous ne nous inclinerons plus devant les seigneurs de la guerre ! Nous ne laisserons plus la démocratie monter à l'échafaud ! La monarchie n'est plus, et l'autocratie sera bientôt la suivante !" Tels sont les mots de Huang Fu, qui résonnent en ce moment autour de l'Assemblée nationale de Beijing à la suite de l'annonce d'une nouvelle Élection présidentielle. Elle doit se tenir rapidement, dans un moment marquant de l'histoire de la Chine. Car c'est là le véritable test de la capacité du peuple à exercer sa volonté sur l'avenir de la nation. Le Zhili, bien sûr, sait bien que la démocratie est la meilleure méthode pour que le peuple fasse entendre sa voix. On s'attend à ce qu'il propose ses propres candidats, et beaucoup pensent que les candidats du Zhili sont assurés d'obtenir la présidence.\n\nNéanmoins, cela n'a pas empêché une myriade de partis et de factions de proposer leurs propre candidats. Les Indépendants ont pour eux le magnanime Hu Shih, les Sciences politiques ont présenté Huang Fu, Xu Qin pour les Constitutionnalistes ainsi que Shen Junru et Liu Chongyou pour la Fédération du Salut national. Tous sont de plus en plus impliqués dans leur campagne présidentielle, et l'opposition s'attend à ce que l'Association Harmonie révèle bientôt son propre candidat."
 sichuan_events.279.a:0 "La preuve de notre héritage !"

 sichuan_events.280.t_incumbent:0 "Le Candidat Austère"
 sichuan_events.280.t_challenger:0 "L'Ascension du Diplomate"
 sichuan_events.280.d_incumbent:0 "Alors qu'on s'attendait à ce qu'il brigue un nouveau mandat, le vieux et raffiné Yan Huiqing remet une nouvelle fois sa candidature en jeu. Éloigné de la politique dans tous les sens du terme, Yan n’en a pas moins été continuellement poussé aux commandes afin d’éviter que la République de Beiyang ne s’embrase dans un chaos désastreux. Conscient que cette période de l’histoire chinoise constitue un tournant, et que la nation a grandement besoin d’une main ferme et fiable au sommet, il a fait part de sa candidature aux autorités.\n\nSoutenu par la Faction de Luoyang, les technocrates et les apolitiques au sein de l’establishment, la campagne de Yan est plutôt tiède. S’attendant à ce que ses propres mérites et son service public le portent à la victoire, il est probablement fondé dans cette hypothèse, car porter la torche durant la période la plus sombre de la Chine n’est pas une mince affaire. Pourtant, nombre de personnes au sein de son cercle intime craignent qu’il ne soit opposé par un candidat imposé par la faction de Tianjin du maréchal Wang. S’ils parvenaient à tirer parti de la complaisance de Yan et de son manque de discours enflammés, cela pourrait bien constituer un triomphe."
 sichuan_events.280.d_challenger:0 "Alors qu'on s'attendait à ce qu'il défie à nouveau le Maréchal, le vieux et raffiné Yan Huiqing a apparemment retenté sa chance. Épuisé par la politique dans tous les sens du terme, Yan n'en a pas moins été continuellement propulsé aux commandes afin d'empêcher que la République de Beiyang ne s’embrase dans un chaos désastreux. Conscient que ce moment de l'histoire chinoise constitue un tournant, et que la nation a bien besoin d'une main ferme et fiable au sommet, il a signalé aux autorités sa propre candidature.\n\nSoutenu par des figures telles que la Faction de Luoyang, les technocrates et les apolitiques au sein de l'establishment, la campagne de Yan est plutôt vigoureuse. Se focalisant sur la complaisance entêtée de la faction de Tianjin, il se serait autoproclamé candidat "propre", débarrassé de l'influence du Zhili. Pourtant, nombreux sont ceux au sein de son cercle intime à craindre qu'il ne soit opposé à un candidat imposé par la faction de Tianjin du maréchal Wang. Considéré comme un héros de guerre gravé dans les annales de l'histoire, à l'instar de Wu Peifu, quiconque est soutenu par le Maréchal de Tianjin emporte inévitablement avec lui toute la puissance militaire."
 sichuan_events.280.a:0 "Tous en avant avec le Corps diplomatique !"

 sichuan_events.281.t_incumbent:0 "L'Écuyer de Tianjin"
 sichuan_events.281.t_challenger:0 "Le Candidat de Tianjin"
 sichuan_events.281.d_incumbent:0 "Source de soulagement pour beaucoup, et une surprise pour les profanes, le Maréchal de Tianjin n'a aucune prétention quant à son unique rôle dans la démocratie chinoise. Laissant aux politiciens le soin de la politique, le Maréchal a plutôt choisi de faire perdurer son héritage, celui de Tianjin, par un autre membre du clan. Réunis à huis clos avec ses plus fidèles partisans, les décisions ont été prises avec une fermeté résolue, presque à l'unanimité si Wang Kemin ne s’était pas présenté comme candidat, pour que l'estimé Gao Lingwei atteigne enfin les sommets de la présidence.\n\nToujours politicien avisé, Gao Lingwei se retrouve bureaucrate de carrière dans un monde d'idéalistes. Ayant servi à divers postes au niveau provincial, puis au niveau gouvernemental, Gao est un homme politique depuis l'âge de vingt-cinq ans, et pourtant le chemin a été ardu et semé d’embûches. N'ayant été réalisé que grâce à ses liens avec diverses personnalités telles que Zhang Zhidong, Xiong Xiling et Cao Kun, Gao se retrouve une fois de plus bénéficiaire de la bienveillance d'autrui. Néanmoins, il est un homme d'État extrêmement compétent, et certainement pas dénué d’ambitions personnelles. Avec des liens et des attaches dans tout le pays, Gao est un homme studieux soutenu par les héros de la nation."
 sichuan_events.281.d_challenger:0 "Ne se laissant pas faire sans combattre, le maréchal Wang Chengbin a apparemment placé tout le poids de sa faction de Tianjin derrière son propre candidat à l'Élection présidentielle. Recevant apparemment les foudres du cercle intime de Yan Huiqing, il aurait transformé ce qui était considéré comme une course à sens unique en un vote partagé. Lors de réunions à huis clos, en présence de ses seuls fidèles, il a été convenu, presque à l’unanimité si Wang Kemin ne s’était pas présenté comme candidat, que l'estimé Gao Lingwei atteindrait enfin les sommets de la présidence.\n\nPoliticien avisé à l’excès, Gao Lingwei se retrouve bureaucrate de carrière dans un monde d'idéalistes. Ayant occupé diverses fonctions au niveau provincial, puis au niveau gouvernemental, Gao est un homme politique depuis l'âge de vingt-cinq ans, et pourtant le chemin à parcourir a été ardu et semé d'embûches. N'ayant été réalisé que grâce à ses liens avec diverses personnalités telles que Zhang Zhidong, Xiong Xiling et Cao Kun, Gao se retrouve une fois encore bénéficiaire de la bienveillance d’autrui. Néanmoins, il est un homme d'État d'une capacité exceptionnelle, et n'est certainement pas dépourvu d'ambition personnelle. Avec des relations et des liens dans tout le pays, Gao est un érudit soutenu par les héros de la nation."
 sichuan_events.281.a:0 "Tianjin porte l'héritage du Zhili !"

 sichuan_events.282.t:0 "Apogée de la Grande Lutte"
 sichuan_events.282.d:0 "Dans l’esprit de la fleur de bégonia, le cycle électoral récent a été cordial, prudent et attentionné. Même les candidats les plus farouchement anti-Zhili, tels que Huang Fu et Hu Shih, ont fait preuve de respect envers la Clique. Car ils reconnaissent tous que, sans les sacrifices du Zhili, ils ne seraient même pas dans leurs fonctions actuelles, et que la République telle que nous la connaissons aurait très bien pu être gaspillée.\n\nÀ cet égard, les nombreux délégués de l’Assemblée et du Sénat étaient les véritables figures à convaincre. La majorité de l’Association Harmonie s’étant enfuie, emprisonnée ou assassinée lors du Coup de Beijing, son emprise sur les organes du gouvernement est loin d’être acquise. Une réelle opportunité s’est donc présentée à l’opposition pour saisir le moment. Du moins, c’est ce que croient les journaux et les idéalistes.\n\nEn réalité, le peuple chinois et les fonctionnaires savent pertinemment que, si les partis de l’opposition ont contribué à part égale à la reconstitution de la République de Beiyang, c’est le Zhili et lui seul qui a rallié l’Union des Cinq Ethnies, défiant les chiens japonais et les monarchistes autocrates. À cet égard, l’élection de [GetYear], bien que potentiellement partagée entre plusieurs candidats, s’est en réalité réduite à deux. Les factions de Baoding et de Tianjin de la Clique du Zhili soutenant leur candidat préféré, Gao Lingwei, la faction de Luoyang, ainsi que les "technocrates" de la République, ont soutenu Yan Huiqing.\n\nTout est en jeu : l’avenir de la République chinoise en cette période de réconciliation dépend de la force et du caractère de ces deux vétérans de longue date de l’État. Un véritable test pour les familles politiques des vénérés Wu Peifu et Cao Kun."
 sichuan_events.282.a:0 "Gao remporte l'Assemblée !"
 sichuan_events.282.b:0 "Les paroles mielleuses du Diplomate font pencher la balance !"

 sichuan_events.283.t:0 "Perte de Notre Élan"
 sichuan_events.283.d:0 "Notre mission, notre objectif, notre raison de rébellion ! La déposition du Garçon-Empereur et le rétablissement de la République de Beiyang ! Elle nous a été arrachée de force. Néanmoins, la République de Beiyang dans sa forme authentique vit toujours au sein de notre gouvernement. Bien que nous ne contrôlions pas Beijing, le Maréchal a assuré qu’il ferait de sa vie une mission : unir le pays et rétablir l’Assemblée et le Gouvernement à leur place légitime. Jusqu’à ce que ces questions soient réglées, une période intérimaire a été instaurée par [ROOT.GetLeader].\n\nLe Zhili a enduré pire, bien pire, frôlant l’extinction à maintes reprises. On rapporte que le maréchal Wang a convoqué une réunion d’urgence avec Zhang Qihuang, Jiang Baili, Bai Jianwu et Gao Lingwei afin d’élaborer une nouvelle série de plans stratégiques, en mobilisant à la fois les organes militaires et le cabinet politique, pour réorienter la reconquête vers le rétablissement du Zhili et de la véritable République de Beiyang, plutôt que de se contenter d’évincer les Royalistes.\n\nParallèlement à la réunion du Maréchal, il semble qu’une série de vestiges de la scène politique de Beijing se soient réfugiés dans nos terres. Alors qu’ils auraient normalement été immédiatement détenus à leur entrée sur notre territoire, la faction de Luoyang, le Cabinet et le reste des civils ont exercé leur poids politique en faveur de leur amnistie. Suggérant qu’ils pourraient s’avérer utiles dans la reconquête, le Maréchal a cédé."
 sichuan_events.283.a:0 "Beijing est juste devant nous ! Nous ne pouvons pas faiblir !"

 sichuan_events.350.t:0 "Tian Songyao Rejoint le Département"
 sichuan_events.350.d:0 "Toujours opportuniste, Tian Songyao nous a quittés afin d’éviter la colère de Yang Sen après son coup d’État manqué de 1923. Une fois Yang déchu de son pouvoir et nous aux commandes, le transfuge Tian a imploré notre clémence pour nous permettre de le réintégrer au sein du département."
 sichuan_events.350.a:0 "Accueillez-le."

 sichuan_events.351.t:0 "Ordre Rétabli à Chongqing"
 sichuan_events.351.d:9 "Après la fuite de Xiang, le Département accéléré et ses fonctions administratives se sont effondrés. La tête du serpent, pour ainsi dire, a été tranchée. Depuis lors, la ville et ses régions avoisinantes ont souffert de troubles généralisés. Des civils luttant pour faire face au chaos aux opportunistes pillant et volant dans la foulée, la ville n’a guère connu un moment de paix depuis longtemps.\n\nC’est pourquoi nous sommes heureux d’annoncer que les efforts de notre police militaire ont enfin permis de réprimer les pires émeutes. Dans l’ensemble, l’ordre dans la ville a été rétabli et les fonctions de base de l’administration locale sont de nouveau opérationnelles. La vie normale ne tardera pas à reprendre à Chongqing."
 sichuan_events.351.a:0 "De bonnes nouvelles, au moins."

 sichuan_events.352.t:0 "La Diarchie"
 sichuan_events.352.d:0 "Le Département de Baoding est unique en ce sens qu'il n'est pas contrôlé par un seul puissant seigneur de la guerre. Il se distingue plutôt par la forte coopération entre ses figures les plus dominantes. D'un côté, on trouve Deng Xihou, un officier de carrière principalement préoccupé par la théorie militaire, les réformes sociales et le développement rural. De l'autre, Liu Wenhui, oncle de Liu Xiang, connu pour son dévouement aux réformes académiques et administratives.\n\nEnsemble, ils forment un équilibre entre traditionalisme et réformisme, avec un bon historique de collaboration. Bien que ce système d'équilibre des influences ait épargné au département les querelles internes et les luttes de pouvoir qui ont marqué de nombreuses autres factions en Chine, si cet équilibre venait à être rompu et qu'une figure prenne trop d'ascendant sur l'autre, il ne fait aucun doute que le Département de Baoding pourrait également être victime de ce type de problèmes. Il convient donc de veiller à préserver cette diarchie et de ne pas la laisser devenir une autre autocratie chinoise."
 sichuan_events.352.a:0 "Ensemble, pour un Sichuan meilleur."

 sichuan_events.353.t:0 "Liu Wenhui Affirme son Contrôle"
 sichuan_events.353.d:0 "Ses efforts de modernisation du Sichuan portant leurs fruits, les populations des villes et des campagnes ont vu leur niveau de vie nettement s’améliorer sous son impulsion. Cette progression s’accompagne d’une administration et d’un appareil d’État bien huilés qui, en grande partie grâce à son initiative, ont contribué à l’élever au rang de figure de proue. Si l’esprit de coopération propre à la diarchie subsiste, il n’en demeure pas moins que les réformes réussies de Liu en font, pour le moment, le véritable maître du Département de Baoding."
 sichuan_events.353.a:0 "La modernité du Sichuan sera enviée par toute la Chine !"

 sichuan_events.354.t:0 "Deng Xihou Affirme son Contrôle"
 sichuan_events.354.d:0 "Après une série de réformes populaires, la notoriété de Deng Xihou ne cesse de croître. Fort d'un large soutien de la population rurale et des soldats, ses réformes occupent le devant de la scène politique du Sichuan. Bien que la diarchie demeure dans un esprit de coopération saine, il est évident que la faction de Deng Xihou, plus traditionaliste, s'impose actuellement comme le véritable contrôleur du Département de Baoding."
 sichuan_events.354.a:0 "Le Sichuan deviendra un modèle pour toute la Chine !"

 sichuan_events.355.t:0 "Liu Wenhui Proteste contre l'Orientation Militaire"
 sichuan_events.355.d:0 "La force de l’amitié et de la coopération ne se mesure pas seulement aux aspects positifs, mais aussi à la capacité de résister et de surmonter les aspects négatifs. Récemment, la faction de Liu Wenhui a appelé à un changement de cap, car Deng Xihou a orienté le département vers une direction résolument militariste. Si l’on ne peut nier que le Sichuan dispose de certains des soldats les mieux entraînés de Chine, ni que Deng a remporté de grands succès en aidant les populations rurales, cela s’est fait au détriment d’autres domaines de réforme. En effet, la priorité accordée à l’un au détriment de l’autre a conduit à la négligence du volet administratif. Deng est exhorté à revenir à une approche plus équilibrée, au risque de devoir procéder à une correction plus radicale."
 sichuan_events.355.a:0 "Il a peut-être raison..."

 sichuan_events.356.t:0 "Deng Xihou Proteste contre l'Orientation Industrielle"
 sichuan_events.356.d:0 "Compte tenu de l'attention quasi exclusive portée à l'industrialisation et aux grands projets dans les grandes villes, Deng Xihou commence à exprimer ses inquiétudes : cette orientation se fait au détriment non seulement de l'armée, mais aussi du développement rural. Certes, personne ne conteste ses succès dans ses domaines de compétence, mais ceux-ci ont été obtenus au prix d'une armée au bord de la désorganisation et d'une population rurale dont la situation ne s'est guère améliorée depuis la guerre civile. Face à cette situation, Deng et d'autres hauts responsables du département appellent à un changement rapide de cap, afin de retrouver l'équilibre qui a longtemps été la marque de fabrique du département. Dans le cas contraire, il est certain qu'une mesure de correction plus radicale sera prise."
 sichuan_events.356.a:0 "Il a peut-être raison..."

 sichuan_events.400.t:0 "Le Seigneur du Xikang"
 sichuan_events.400.d:0 "La rivalité entre Liu Xiang et son oncle Liu Wenhui est ancienne et âpre. Or, il semble qu’elle soit sur le point de trouver son issue. Après la déroute du Département de Baoding durant la guerre, Wenhui a pu se réfugier dans sa base de la région montagneuse du Xikang, juste à l’est du Tibet. Tandis que les restes de la force de Baoding sont profondément affaiblis par leur défaite lors de la guerre civile, la distance considérable entre Chongqing et le bastion montagneux de Wenhui rend improbable une victoire militaire rapide. Le cauchemar logistique d’une telle entreprise le rendrait impensable sans préparatifs sérieux.\n\nD’une manière ou d’une autre, cette situation devra être résolue si Liu Xiang veut consolider pleinement sa victoire."
 sichuan_events.400.a:0 "Une question à régler, tôt ou tard."

 sichuan_events.401.t:0 "Une Question de Famille"
 sichuan_events.401.d:0 "Depuis la fin officielle de la guerre civile du Sichuan, un conflit oppose Liu Xiang à son oncle. La fortune tirée de l'opium a permis à Wenhui de reconstituer progressivement ses forces et, grâce au contrôle des montagnes, il a actuellement l'initiative. Avec le temps, Wenhui deviendra plus puissant, rendant chaque jour qui passe l'invasion de son bastion montagneux, déjà difficile, encore plus ardue.\n\nLiu Xiang doit désormais décider comment traiter avec son oncle insoumis. Une solution pacifique n'est pas impossible, mais le prix de l'alliance exigé par Xiang ne sera pas bon marché. En revanche, un conflit ouvert est loin d'être une victoire assurée."
 sichuan_events.401.a:0 "Nos intérêts convergent : proposez-lui une alliance !"
 sichuan_events.401.b:0 "Il se soumettra, comme tous les autres."

 sichuan_events.402.t:0 "Une Lettre du Xikang"
 sichuan_events.402.d:0 "Aujourd’hui, un messager est arrivé à Chongqing avec un message des plus importants pour Liu Xiang. Sobre en formalités, il était bref et direct. Dans celui-ci, l’oncle de Xiang lui a brièvement fait savoir qu’il est ouvert à une collaboration, moyennant un prix.\n\nCependant, ce prix n’est pas en or, mais en réformes. Il veut voir ses rêves d’un nouveau Sichuan se concrétiser sous le règne de Xiang. Avec des réformes sociales et éducatives qui ne correspondent pas entièrement à la vision de Xiang pour le Sichuan. Accepter signifierait une fin pacifique du conflit, mais est-ce un prix qui vaut la peine d'être payé ?"
 sichuan_events.402.a:0 "Très bien, un prix abordable."
 sichuan_events.402.b:0 "Pour qui se prend-il ?!"

 sichuan_events.403.t:0 "L'Alliance des Deux Liu"
 sichuan_events.403.d:0 "Une alliance malaisée s’est formée entre le neveu et l’oncle, scellée par une réunion tendue à Chongqing où les deux hommes se sont efforcés de faire croire que tout allait bien. Wenhui ne fait clairement pas confiance à son neveu, et Xiang n’est pas satisfait des sacrifices qu’il a dû consentir pour conclure cet accord. Des poignées de main ont été échangées, une photo a été prise pour la presse, et la réunion s’est achevée presque aussitôt qu’elle avait commencé.\n\nBien que la situation ne soit pas idéale, la trêve semble tenir pour l’instant. Avec le seigneur de la guerre du Xikang intégré à ses rangs, Liu Xiang peut désormais se consacrer à la poursuite de ses ambitions pour un Sichuan élargi."
 sichuan_events.403.a:0 "Voyons si cela va durer..."

 sichuan_events.404.t:0 "La Rébellion du Xikang"
 sichuan_events.404.d:0 "A la grande frustration de Xiang, son oncle passe son temps à patienter dans les montagnes depuis la fin de la guerre civile. Il apparaît désormais clairement que, si aucune action n’est entreprise, le Xikang restera une région de facto autonome, échappant au contrôle de Chongqing.\n\nJugeant cette situation intolérable, Liu Xiang doit désormais décider comment agir. Soit l’éliminer par des moyens détournés, soit se préparer à envahir le Xikang même et chasser Wenhui de son petit royaume de montagne."
 sichuan_events.404.a:0 "Faites le assassiner."
 sichuan_events.404.b:0 "Envoyez les troupes !"

 sichuan_events.405.t:0 "Une Balle, de Justesse"
 sichuan_events.405.d:0 "Bien que l’éloignement de Ya’an par rapport au reste du Sichuan l’ait épargnée des pires violences de la guerre civile, toute illusion de paix durable s’est envolée aujourd’hui alors que Xiang tirait les premiers coups du conflit qui l’opposait à son oncle.\n\nL’hôtel de ville, devenu le quartier général de facto de Wenhui depuis son arrivée au pouvoir, a été le théâtre de cette tentative d’assassinat. Profitant d’une étroite fenêtre d’opportunité, un assassin a ouvert le feu sur lui depuis un bâtiment voisin avec un fusil Gewehr 98k à lunette, alors que Wenhui sortait de sa voiture pour un court trajet vers l’édifice. Il s’agissait d’un acte d’une effronterie qui a failli réussir. Par chance, la balle a miraculeusement manqué Wenhui d’une fraction de pouce, laissant une marque en frôlant presque le tissu même de son uniforme, épargnant ainsi le seigneur de la guerre à toute blessure. Ses gardes du corps personnels l’ont rapidement couvert et précipité à l’intérieur du bâtiment, privant le tireur d’élite de toute chance de réussir un second tir.\n\nLa sécurité serrée dans la ville a permis aux soldats d’appréhender le coupable avant qu’il ne puisse s’échapper. Sous la menace de la peine de mort, il a tout avoué, comme si l’aveu de la participation de Xiang eût été vraiment nécessaire à ce stade. Absolument furieux de la lâcheté et de l’effronterie de son neveu qui avait tenté de le tuer, Liu Wenhui a ordonné à ses forces d’être en état de guerre total. Il semble que la guerre devra désormais trancher cette affaire."
 sichuan_events.405.a:0 "Mince."

 sichuan_events.406.t:0 "Liu Wenhui Envahit le Bassin"
 sichuan_events.406.d:9 "Tôt ce matin, les restes restructurés du Département de Baoding, sous le commandement de Liu Wenhui, ont envahi le bassin du Sichuan. Après la tentative d'assassinat contre lui, cela était considéré comme inévitable. Sachant qu'une invasion était imminente, Xiang a ordonné à ses troupes de se préparer à cette éventualité, et la rencontre des deux armées n'a pas tardé.\n\nLa première bataille a opposé le gros des forces de Wenhui à quelques brigades plus petites du Département accéléré dépêchées pour garder la longue frontière avec le domaine de Wenhui. Cependant, l'étendue de cette frontière signifie que Xiang a eu du mal à créer un point fort défensif, de sorte que cette force a principalement pour mission de retarder l'invasion assez longtemps pour permettre une retraite une fois le reste du Département accéléré mobilisé et prêt à lancer une contre-attaque. La bataille s'est soldée par un match nul, les soldats de Xiang étant contraints de se retirer plus tôt que prévu, mais freinant suffisamment l'avance de Wenhui pour l'empêcher de submerger le bassin. La guerre est loin d'être terminée cependant, et pour l'instant, il semble que l'un ou l'autre camp puisse remporter cette victoire."
 sichuan_events.406.a:0 "Alors, c'est la guerre."

 sichuan_events.407.t:0 "Liu Wenhui Bloque l'Entrée au Xikang"
 sichuan_events.407.d:9 "Comme prévu, la marche sur Ya'an s’avère être une entreprise difficile. Dès que ses forces entrent dans le Xikang, elles se heurtent à des défenses préparées en montagne, avec peu de routes praticables, ce qui signifie que même de petits détachements équipés de mitrailleuses et de mortiers peuvent résister aux forces de Xiang pendant des heures et leur infliger des pertes accablantes, les routes étroites se transformant en zones de tir. Cela dit, le Département accéléré continue sa marche, manifestement déterminé à prendre les montagnes de force, quel qu’en soit le coût."
 sichuan_events.407.a:0 "Alors, c'est la guerre."

 sichuan_events.408.t:0 "La Guerre des Deux Liu"
 sichuan_events.408.d:9 "Ce qui a commencé par des escarmouches frontalières s’est rapidement transformé en une tentative des deux armées régulières de pénétrer dans le territoire adverse. Une série d’avancées et de reculs a suivi, aucun camp ne parvenant initialement à prendre un avantage décisif. Si le Département accéléré est théoriquement plus fort, sa tâche de prendre Ya’an est des plus ardues. Une fois de plus, le Sichuan sombre dans une guerre civile sanglante."
 sichuan_events.408.a:0 "Punissez cette insolence !"

 sichuan_events.409.t:0 "La Guerre des Deux Liu"
 sichuan_events.409.d:9 "Après la victoire de la faction de Liu Xiang du Département accéléré lors de la récente guerre civile du Sichuan, l’ambitieux et agressif Liu Xiang a pris le pouvoir. De nombreux observateurs, tant nationaux qu’étrangers, ont vu là un développement inquiétant, car peu croient, même une seconde, que sa soif de pouvoir s’arrêtera à ses propres frontières. Cependant, une opportunité de le renverser s’est récemment présentée.\n\nUne rivalité connue oppose Liu Xiang à son oncle, Liu Wenhui, ce dernier contrôlant encore de vastes portions des restes du Département de Baoding qui ont combattu lors de la dernière guerre civile. Cette rivalité a dégénéré en une nouvelle guerre civile entre les deux hommes. Bien qu’elle nuise inévitablement aux ambitions de Xiang, quelle qu’en soit l’issue, elle offre l’opportunité de porter au pouvoir le Département de Baoding, bien moins agressif. Ne serait-il pas judicieux d’incliner le cours du conflit en apportant une aide discrète aux efforts de Liu Wenhui visant à chasser son neveu ?"
 sichuan_events.409.a:0 "Envoyez de l'aide à Liu Wenhui."
 sichuan_events.409.b:0 "Nous n'avons rien à gagner à interférer."

 sichuan_events.410.t:0 "Tian Songyao se Range du Côté de Liu Wenhui"
 sichuan_events.410.d:9 "La précipitation vers la guerre semble avoir eu des conséquences imprévues pour le Département accéléré. Tian, le traître, a changé de camp à de nombreuses reprises par le passé et a servi tous les maîtres connus du Sichuan. Bien qu'il soit un opportuniste retors, sa force personnelle considérable lui a permis de survivre. Il semble que, désormais, il ait officiellement déclaré sa loyauté envers le Département de Baoding une fois de plus et se soit rangé à leurs côtés, comme il l'avait fait il y a plus d'une décennie. Pourquoi il a eu ce changement d'avis opportun au milieu d'une guerre, personne ne peut le dire, mais quiconque connaît ce serpent devrait savoir que ce ne sera probablement pas le dernier."
 sichuan_events.410.a:0 "Traître !"

 sichuan_events.411.t:0 "La Bataille de Meishan"
 sichuan_events.411.d:9 "Peu importe qui a tiré le premier, les restes de l'armée de Baoding ne survivront pas longtemps s'ils avancent dans le bassin. C'est pourquoi ils se sont principalement appuyés sur les terrains difficiles du Xikang pour user le Département accéléré. Ils peuvent résister aux forces ennemies supérieures avec relativement peu de pertes et en utilisant un effectif humain limité, en les canalisant simplement à travers des défenses préparées. Bien que cela les ralentissent, il s'agit d'une guerre d'usure où une partie peut remplacer ses pertes, tandis que le Xikang est dépourvu de base industrielle.\n\nFinalement, l'avancée lente du Département accéléré a placé le gros de ses forces aux abords de la ville de Meishan, le dernier obstacle stratégique majeur sur la route menant à Ya'an. Bien que Baoding se soit offert un temps considérable pour préparer ses défenses, ils se trouvent clairement dans une position difficile, affrontant un ennemi qui, sur le papier, est supérieur. Cependant, celui-ci a été affaibli par l'usure et une partie de l'équipement lourd est encore en cours de transport à travers les cols de montagne.\n\nLiu Xiang doit désormais choisir : lancer une attaque à grande échelle sans le soutien de l'équipement lourd du département, ou attendre son arrivée pour l'utiliser pleinement. Attaquer maintenant offrirait une bonne chance de surprise, mais il s'agit d'un pari risqué face aux défenses préparées de la ville. D'un autre côté, le transport de l'artillerie jusqu'aux lignes de front prendrait au minimum plusieurs jours, offrant ainsi à Baoding un temps précieux pour se préparer."
 sichuan_events.411.a:0 "Attaquez la ville maintenant !"
 sichuan_events.411.b:0 "Attendez les renforts avant d'attaquer."

 SZC_meishan_assault:9 "Les montagnes étaient leur seules alliées. Maintenant qu'elles sont derrière nous, ils n'ont plus rien. Ils sont mal approvisionnés, désorganisés et sous-équipés. Même sans nos canons lourds, nous devrions avoir assez de puissance de feu pour ne faire qu'une bouchée d'eux. Une fois que nous prendrons d'assaut la ville, leurs défenses s'effondreront à coup sûr devant la puissance du Département accéléré."
 SZC_meishan_reinforce: "Bien qu'ils soient dans une position difficile, sans notre artillerie pour mettre hors d'état leurs canons et mitrailleuses, nous subirons des pertes ahurissantes. Bien qu'il soit très difficile de les amener ici vue la nature du terrain, des officiers plus prudents pensent que cela en vaut la peine."

 sichuan_events.412.t:0 "L'Assaut sur Meishan"
 sichuan_events.412.d:9 "En choisissant d’attaquer immédiatement, le Département accéléré s’est opposé aux défenseurs de la ville sans son équipement lourd. Même sans celui-ci, les divisions disposaient de bien plus de mortiers, de mitrailleuses et de canons légers pour tenir tête aux défenseurs. Baoding avait déjà perdu la majeure partie de son équipement lourd lors de la première phase de la guerre civile qui vit Xiang prendre Chengdu. Avec peu de chances de remplacer ces pertes, les défenses de la ville étaient plutôt sommaires. Des tranchées, de vieilles mitrailleuses et des fusils constituaient l’essentiel des défenses, avec quelques canons formant une poignée de points forts en forme de coin.\n\nBien que les forces de Xiang aient subi de lourdes pertes en prenant la ville, la ligne défensive principale a été brisée en quelques heures de combats. Wenhui n’était pas un stratège brillant et ses lignes défensives primitives offraient peu de surprises aux attaquants. Après la rupture du point central de la ligne défensive, le Département accéléré a envahi la ville et brisé les défenses restantes par les flancs. Bien que Liu Wenhui ait réussi à s’échapper, les prisonniers de guerre racontent déjà que le moral est bas et que même lui n’a plus l’espoir de gagner."
 sichuan_events.412.a:0 "La querelle familiale aura bientôt un vainqueur."

 sichuan_events.413.t:0 "La Déroute du Xikang"
 sichuan_events.413.d:9 "En choisissant d'attendre, Xiang a non seulement donné aux défenseurs plus de temps pour se préparer, mais ses forces ont également été constamment harcelées par les troupes de Baoding dans les montagnes. L'acheminement du ravitaillement vers le front s'est révélé être un cauchemar logistique, et de nombreuses pièces d'artillerie en déplacement ont été endommagées ou perdues sur les routes de montagne périlleuses, car Xiang avait ordonné la précipitation au détriment de la sécurité.\n\nLorsque l'attaque fut prête, les quelques pièces d’artillerie qui étaient parvenues jusqu'au front ont fait peu de différence. Les forces de Xiang avaient été décimées par milliers par l'usure, tant du fait des montagnes que des actions d'arrière-garde menées par Baoding. C'est une force démoralisée qui a finalement attaqué des défenses bien préparées, et les pertes subies face à la nature se sont faites rapidement sentir. Bien que les défenses autour de la ville étaient une imitation peu imaginative des fortifications de l'époque de la Weltkrieg, les quelques canons et mitrailleuses dont disposait Wenhui ont pu maintenir la ligne contre l'ennemi, quoique de justesse. Après plusieurs assauts successifs, la ville était endommagée, les défenses gravement éprouvées, mais l'avant-garde de Xiang était anéantie. Des milliers d’hommes gisaient morts sur le sol, beaucoup d'autres étant blessés ou faits prisonniers.\n\nSans espoir de prendre la ville, Xiang est désormais contraint de battre en retraite depuis Xiking. Bien qu'aucune force du Sichuan ne puisse égaler le Département accéléré sur le terrain, celui-ci a finalement été vaincu par les montagnes elles-mêmes, bien plus que par tout autre adversaire. Leur retraite a été un désastre comparable à la fuite de Napoléon depuis Moscou, le terrain et les poursuivants continuant à décimer ce Département accéléré jadis puissant. On parle déjà d’une mutinerie au sein du Département accéléré, et l'avenir de Xiang semble très incertain."
 sichuan_events.413.a:0 "La querelle familiale aura bientôt un vainqueur."

 sichuan_events.414.t:0 "Le Premier Exercice Naval"
 sichuan_events.414.d.landlocked:0 "Malgré le fait d'être un pays enclavé, Liu Xiang soutenait qu'une marine est d'une importance capitale. Il imaginait un avenir où de puissants navires, capables de rivaliser avec la Hochseeflotte allemande à son apogée, patrouilleraient sur le Yangtsé et protégeraient le commerce du Sichuan. Les "premiers pas vers la grandeur" ont valu au Sichuan une domination navale totale dans la région, soit, mais simplement parce que personne ne s'est donné la peine de la contester. Néanmoins, une victoire est une victoire. Bientôt, il a été annoncé qu'un déploiement public de cette nouvelle puissance navale aurait lieu. Pour impressionner les populations locales et terrifier les futurs ennemis, bien sûr.\n\nLe public a été invité à cette première démonstration navale mettant en valeur la force de la Marine. Les plus grands navires de guerre sur cette partie du Yangtsé n'étaient qu'une poignée de vieux navires à vapeur, convertis à la hâte de leurs anciennes fonctions civiles et réquisitionnés pour le service militaire. Les navires de fortune se sont vus ajouter des plaques de fer, ainsi que des batteries d’artillerie prélevées sur les régiments d'artillerie locaux et forcées à s’adapter à ce nouveau rôle. Une fois l'exercice naval pleinement engagé, les problèmes évidents n'ont pas tardé à se révéler.\n\nLe premier amiral du Sichuan a dû soupirer de soulagement lorsque les navires ont effectivement pu se déplacer malgré l'augmentation du blindage et de l'armement. Très lentement, soit, mais au moins ils ne coulent pas au fond de la rivière. Tout cela devait culminer avec une triple salve d'honneur, mais lorsque les vieux obusiers ont tiré, le recul des coups a presque failli faire chavirer le vieux navire à vapeur. La panique a saisi l'équipage et plusieurs de ses membres ont sauté dans le Yangtsé, craignant que leur navire ne se retourne complètement. Si leurs craintes ne se sont pas réalisées, toute cette farce a donné lieu à une bonne dose de moqueries, le désastre naval évité de justesse ayant conduit à la rédaction de plusieurs poèmes satiriques aux dépens de Xiang. Tandis que le peuple rit (du moins quand il est sûr que la police secrète n'est pas dans les parages), on ne peut pas en dire autant de Xiang.\n\nOu du premier amiral du Sichuan, pour être précis."
 sichuan_events.414.d.not_landlocked:0 "Malgré le fait d'être un pays enclavé, Liu Xiang soutenait qu'une marine est d'une importance capitale. Il imaginait un avenir où de puissants navires, capables de rivaliser avec la Hochseeflotte allemande à son apogée, patrouilleraient la Mer de Chine du Sud et protégeraient le statut de puissance régionale du Sichuan. Les "premiers pas vers la grandeur" n'ont certes pas impressionné les autres puissances navales de la région, mais Xiang a néanmoins attiré leur attention, ne serait-ce qu'en parvenant à constituer une marine dès le départ. Pour commémorer cet exploit, il a bientôt été annoncé qu'un déploiement public de cette nouvelle puissance navale aurait lieu. Pour impressionner les populations locales et terrifier les futurs ennemis, bien sûr.\n\nLe public a été invité à cette première démonstration navale mettant en valeur la force de la puissante marine. La "Grande Marine du Sichuan" ne compte pour l'instant que d'anciens navires à vapeur, convertis à la hâte de leurs anciens rôles civils et réquisitionnés pour le service militaire. Ces navires de guerre de fortune ont été dotés de plaques de fer, ainsi que de batteries d'artillerie prélevées sur les régiments d'artillerie locaux et forcées à s'adapter à ce nouveau rôle. Une fois l'exercice naval pleinement engagé, les problèmes évidents ne tardèrent pas à se révéler.\n\nLe premier amiral du Sichuan a dû soupirer de soulagement lorsque les navires ont effectivement pu se déplacer malgré l'augmentation du blindage et de l'armement. Très lentement, soit, mais au moins ils ne coulent pas au fond de la mer. Tout cela devait culminer avec une triple salve d'honneur, mais lorsque les vieux obusiers ont tiré, le recul des coups a presque failli faire chavirer le vieux navire à vapeur. La panique a saisi l'équipage et plusieurs de ses membres ont sauté dans le Yangtsé, craignant que leur navire ne se retourne complètement. Si leurs craintes ne se sont pas réalisées, toute cette farce a donné lieu à une bonne dose de moqueries, le désastre naval évité de justesse ayant conduit à la rédaction de plusieurs poèmes satiriques aux dépens de Xiang. Tandis que le peuple rit (du moins quand il est sûr que la police secrète n'est pas dans les parages), on ne peut pas en dire autant de Xiang.\n\nOu du premier amiral du Sichuan, pour être précis."
 sichuan_events.414.a:0 "Amiral Kui, vous êtes renvoyé !"

 sichuan_events.415.t:0 "La Puissante Force Aérienne"
 sichuan_events.415.d:0 "Aujourd’hui, la première cargaison d’avions importés est arrivée à Chongqing pour une inspection officielle par le triomphant Liu Xiang en personne. L’ensemble de la cérémonie avait toutefois plus d’allure protocolaire que tout autre chose. Il s’agissait de montrer au monde, ou du moins à la presse chinoise réunie, les prémices de la soi-disant Puissante Force aérienne du Sichuan. Si le triomphalisme était excessif pour l’occasion, Xiang avait raison de marquer cet événement comme important, soulignant la modernisation du Sichuan et l’adoption rapide de la province des technologies et méthodes militaires contemporaines.\n\nLes avions n’étaient guère spectaculaires selon les normes militaires mondiales, soit dit en passant. Bien qu’ils fussent de bonnes machines durant la Weltkrieg, l’ensemble des appareils autrefois mis au rebut ne ferait guère trembler les seigneurs de Beijing – ni l’empereur de Tokyo, d’ailleurs. Selon les standards de l’intérieur chinois souvent négligé, cependant, il s’agissait d’un grand bond vers le XXe siècle. Compte tenu de l’état des puissances régionales, cette poignée de reliques pouvait survoler les montagnes et rassembler des informations sur les positions ennemies, ce qui aurait été très difficile à obtenir à pied. Les terrains souvent étroits des cols de montagne et l’ouverture des bassins signifiaient qu’un appareil de la Weltkrieg, même équipé de deux mitrailleuses synchronisées, pouvait efficacement harceler des formations d’infanterie n’ayant jamais affronté de passages en piqué auparavant.\n\nPour tout le bruit qu’il faisait au sujet d’une force aérienne capable de dominer les cieux chinois, il pourrait bien avoir raison, au moins pour ce qui concerne son propre arrière-pays. Cela étant dit, des photos ont été prises de Xiang serrant la main des pilotes et des ingénieurs, et les histoires seraient imprimées le lendemain."
 sichuan_events.415.a:0 "Gardez mes paroles, le Sichuan régnera dans les cieux !"

 sichuan_events.416.t:0 "Le Défilé Aérien de Chongqing"
 sichuan_events.416.d:0 "Il n'a pas fallu longtemps après la création de la "puissante force aérienne" du Sichuan pour que Liu Xiang déclare que la Chine et même le monde entier trembleront devant sa puissance. Pressé de montrer à ses alliés et ses ennemis que le Sichuan peut désormais dominer les cieux, le Défilé aérien de Chongqing a été hâtivement organisé pour démontrer la domination aérienne sichuanaise.\n\nBien que la force aérienne ne soit qu'une collection de vieux avions d'entre-deux-guerres qui prenaient la poussière dans les entrepôts européens et japonais, elle a impressionné la foule qui s'était réunie pour admirer le spectacle. Après tout, la plupart des paysans et urbains du Sichuan n'avaient vu des machines volantes que sur des photographies. Ceci étant la première fois que ces pilotes montaient dans un cockpit, la parade aérienne a été loin d'égaler celles du Canada et de l'Allemagne, les pilotes débutants ne faisant que décoller et accomplir les manœuvres les plus basiques avant d'atterrir, pour la plupart sans problème.\n\nMalgré sa simplicité, ce défilé a récolté les applaudissements de la foule, dont de nombreux membres étaient sincèrement fiers que leur nation puisse afficher des avions si modernes. Vers la fin du spectacle, Xiang a offert à Pan Wenhua, le maire de Chongqing, une chance de voler dans un des chasseurs biplaces. Pan, peut-être inquiet de savoir à quel point ces pilotes étaient inexpérimentés, a poliment décliné, citant des raisons d'emploi du temps. Son adjoint a eu l'honneur d'y prendre place, et le vieux chasseur s'est envolé pour la dernière démonstration de la journée, Xiang lui-même ayant ordonné de pousser l'avion dans ses retranchements. La foule restante a vu l'avion s'envoler, mais l'admiration s'est rapidement muée en horreur lorsqu'une fumée noire a commencé à s'échapper du moteur de l'engin. Le pilote inexpérimenté a lutté pour reprendre le contrôle de l'appareil tandis que son altitude fluctuait, avant que ses efforts ne provoquent l'arrêt du moteur, et l'avion a plongé vers le sol comme un météore.\n\nLe pilote et le passager sont morts sur le coup, à la grande horreur des spectateurs civils et militaires. Il n'a pas fallu longtemps à Pan pour réaliser à quel point il était passé près de la mort, et il a commencé à suspecter en privé que cela ait pu être une tentative d'assassinat de la part du paranoïaque Liu Xiang. Cela a causé une certaine discorde entre lui et Liu Xiang, sans mentionner l'humiliation régionale provoquée par ce défilé aérien ridicule et tragique aux abords de Chongqing."
 sichuan_events.416.a:0 "Quelqu'un sera fusillé pour ça !"

 sichuan_events.500.t:0 "Réformes Réussies de la Fonction Publique"
 sichuan_events.500.d:0 "Depuis la Révolution Xinhai, la province du Sichuan a développé un système byzantin en raison de la rivalité entre les cliques militaires et civiles. Avec le Département des Officiers pleinement aux commandes, des efforts ont été déployés pour réorganiser en profondeur l'administration. La fonction publique a notamment fait l'objet d'enquêtes approfondies, les éléments corrompus ont été épurés, des mains compétentes ont été embauchées pour combler les lacunes, et des postes ont été supprimés ou réorganisés afin d'améliorer l'efficacité. D'un côté, cela a perturbé la bureaucratie pendant un certain temps, mais des améliorations visibles sont déjà notées. Il faudra encore un peu de temps, mais la fonction publique du Sichuan est en voie de devenir plus intègre que jamais."
 sichuan_events.500.a:0 "Un service renouvelé, pour une province renouvelée."

 sichuan_events.502.t:0 "Une Nouvelle Monnaie pour le Sichuan"
 sichuan_events.502.d:0 "Bien qu’il existe une monnaie unique pour toute la Chine sur le papier, cela n’a pas été le cas en réalité depuis des décennies. Des gouvernements individuels, provinciaux, nationaux et étrangers, ainsi que des banques, ont imprimé et frappé la monnaie de manière indépendante, avec des degrés de légalité variables. Le Sichuan a particulièrement souffert en raison des diverses factions luttant pour le contrôle de la province. La réforme monétaire entre dans une nouvelle phase avec la prise de pouvoir des officiers. Avec des finances rétablies, l’inflation est maîtrisée, les monnaies inutiles sont détruites et les ateliers de frappe illégaux fermés. La monnaie étant désormais émise de manière régulière, la stabilité économique se rétablit lentement, à mesure que la capacité du gouvernement provincial à gérer les finances s’améliore."
 sichuan_events.502.a:0 "Un autre pas victorieux en avant."

 sichuan_events.503.t:0 "Un Coup Porté à la Corruption"
 sichuan_events.503.d:0 "La corruption est endémique dans toute la Chine et la province du Sichuan n’y fait pas exception. Trop de clans, de chefs forts peu scrupuleux et ambitieux se disputent la province depuis trop longtemps, et l’éradication des éléments corrompus constitue un défi majeur pour notre administration, bien intentionnée mais encore jeune. Malgré les perturbations observées au sein de l’administration et parfois les affrontements entre les forces gouvernementales et de puissantes organisations criminelles ou des tueurs à gages, entraînant violence et dégâts, les officiers se vantent ouvertement de l’arrestation et de la punition de différentes personnalités corrompues. Ces événements, dont les nouvelles sont diffusées auprès de la population dans toute la mesure du possible, aident à restaurer la confiance envers l’administration et, plus important encore, l’État de droit, la corruption et le banditisme atteignant des records de baisse."
 sichuan_events.503.a:0 "Personne ne peut plus échapper à la loi. Plus maintenant."

 sichuan_events.505.t:0 "Loi Militaire de Zhongchuan"
 sichuan_events.505.d:0 "La loi Zhongchuan a été rédigée par Xiong Kewu, inspirée par Chen Jiongming, dans le but de réduire la taille de l’armée et de démilitariser la province afin de diminuer les dépenses. Les armées surdimensionnées du Sichuan ont constitué un fardeau massif pour le gouvernement et, plus important encore, pour la population. Cette mesure vise à restructurer l’armée provinciale et à dégager des ressources pour les travaux publics et les programmes sociaux. Depuis que l’opposition armée interne est devenue marginale après la victoire du Département des officiers, il est devenu suffisamment sûr de mettre en œuvre une mesure aussi radicale contre le seigneurisme ; les troupes restantes se concentreront sur la lutte contre les bandits plutôt que les unes contre les autres."
 sichuan_events.505.a:0 "L'armée servira désormais le peuple."

 sichuan_events.506.t:0 "Réforme de l'Armée Réussie"
 sichuan_events.506.d:0 "Les armées du Sichuan ont été gonflées pendant l’ère des seigneurs de la guerre, se combattant entre elles, massacrant et pillant sans discernement. Des réformes étaient nécessaires depuis de nombreuses années, mais aucune des factions en guerre dans la province n’était disposée à s’exposer à des attaques. Une fois la lutte de pouvoir terminée, l’armée provinciale a été replacée sous le contrôle du gouvernement et des mesures ont été prises pour éviter l’accumulation de paramilitaires. Avec la réduction de cet engorgement, les fonds peuvent être alloués ailleurs tandis que le budget militaire restant peut être utilisé pour moderniser nos forces et se concentrer sur la lutte contre le banditisme."
 sichuan_events.506.a:0 "Une nouvelle armée, pour une nouvelle province."

 sichuan_events.507.t:0 "La Fin du Banditisme"
 sichuan_events.507.d:0 "Le brigandage est inévitable lorsque les gouvernements s'effondrent et il est endémique depuis des années dans le Sichuan, alors que les seigneurs de la guerre luttaient pour le contrôle. La situation s'est aggravée lorsque des factions rivales ont été vaincues, car les soldats non intégrés ont fui vers la campagne et sont devenus des bandits. Avec des réformes bien engagées dans l'armée et l'administration, l'Armée provinciale a pu se concentrer sur l'éradication des derniers bastions de bandits dans la province, et la dernière campagne a été un succès majeur. Il ne tardera pas avant que l'État de droit ne soit restauré dans toute la province."
 sichuan_events.507.a:0 "Nous ne sommes plus une zone de guerre."

 sichuan_events.509.t:9 "Accord du Nouveau Sichuan"
 sichuan_events.509.d:9 "Après une nouvelle guerre civile dans le Sichuan, le fragile château de cartes de Yang Sen s’est enfin effondré. À la chute du Département accéléré, le Régiment des Neuf Hommes dirigé par Xiong Kewu et le Département des Officiers mené par Li Jiayu et Luo Zezhuo sont montés au rang de forces dominantes au Sichuan, établissant une trêve délicate. Lü Chao et son Corps industriel ont également respecté la trêve, malgré son hostilité envers Xiong suite à leur rupture amère après la scission entre les Kuomintang et les Fédéralistes. Liu Wenhui, l’un des dirigeants du Département de Baoding, a travaillé à se concilier les bonnes grâces de Li et de Xiong.\n\nAprès la trêve initiale, Xiong et Li ont convoqué une convention à l’échelle de la province, présidée par les diverses forces militaires respectant la trêve provinciale, dans l’espoir de désigner un gouverneur successeur à Yang Sen. Bien que plusieurs noms aient été avancés, Xiong Kewu et Li Jiayu se sont distingués du lot. Alors que Xiong détient une influence prépondérante à la convention en tant que principal fédéraliste du Sichuan, Li a trouvé un soutien plus large parmi les factions mineures.\n\nHésitant à accueillir son ancien rival, Lü Chao a établi une correspondance avec Li, espérant peut-être naïvement le pousser à adopter des principes plus révolutionnaires. Liu Wenhui, bien que vivement désireux d’obtenir le poste de gouverneur provincial, a choisi de ne pas se présenter, par crainte d’être chassé du Sichuan. Il a plutôt choisi de rester discret pendant la majeure partie de la convention, espérant que Xiong ou Li viendront lui demander leur soutien."
 sichuan_events.509.a:9 "Xiong domine la convention, comme prévu."
 sichuan_events.509.b:9 "La coalition de Li Jiayu surpasse le vétéran fédéraliste !"

 sichuan_events.519.t:9 "Les Idéalistes Audacieux et le Grand Abîme"
 sichuan_events.519.d:9 "La Chine du Sud était autrefois un bastion d’intellectuels libres-penseurs et un foyer de pensée progressiste, de nombreux habitants travaillant pour les gouverneurs locaux après le tournant autocratique du Zhili en 1932. Au Guangdong, les partisans de Liang, issus du Parti constitutionnaliste chinois dont les sympathies de gauche étaient de plus en plus surveillées dans le Nord, se placèrent sous la direction de Zhang Junmai. Au Yunnan, divers intellectuels se regroupèrent au sein de la Société du Croissant de Lune sous la direction de Luo Longji. Cependant, il semble que même la Chine du Sud soit devenue hostile à la cause de la démocratie chinoise.\n\nEn effet, il semble que la Clique du Sichuan de Xiong Kewu soit le dernier grand bastion du fédéralisme et de la liberté. Le PSD de Zhang Junmai, la SCL de Luo Longji, ainsi que de nombreux autres partis démocratiques autrefois associés à la Fédération des Partis démocratiques chinois, se sont réunis en congrès à Nanchong pour discuter des affaires de l’État avec Zhang Lan. Bien que tous les partis présents aient convenu de former une nouvelle Ligue démocratique de Chine, la question de la direction est devenue l’objet d’une vive controverse.\n\nAlors que les partisans de Liang au congrès ont continué à appeler les partis présents à reconnaître Zhang Junmai comme la force dirigeante du mouvement démocratique au Sichuan, d’autres ont désigné l’hôte, Zhang Lan, comme une force stabilisatrice et comme un candidat de compromis. Bien que Zhang Lan puisse afficher des vues de gauche qui pourraient être considérées comme radicales par beaucoup au sein du congrès, nul ne met en doute sa sincérité envers la démocratie. En fin de compte, Zhang Lan a été nommé président de la Ligue démocratique de Chine, à la satisfaction de la plupart."
 sichuan_events.519.a:9 "Nous sommes indépassables !"
 sichuan_events.519.b:9 "L'arrogance intellectuelle ne cesse de surprendre."

 sichuan_events.520.t:9 "Un Gouvernement de Reconstruction Nationale"
 sichuan_events.520.d:9 "Alors que la Clique de Zhili se montrait de plus en plus hostile à la politique libérale, de nombreux intellectuels progressistes se sont retrouvés à voyager plus au sud pour bénéficier d’un climat politique plus tolérant. Cependant, il semble que même les bastions fédéralistes du sud de la Chine soient tombés, ne laissant plus que le Sichuan comme dernier rempart du Mouvement fédéraliste. Alors que les exilés fédéralistes et les démocrates de la Troisième Voie gagnent le Sichuan, il devient clair que le flambeau de la liberté et de l’autonomie provinciale est tombé entre les mains de Xiong, et que la mise en place d’un gouvernement pour une Chine libre est une priorité absolue.\n\nReconnaissant cette nécessité, Xiong a convoqué une Convention fédéraliste afin d’établir le nouveau Gouvernement fédéral du Sichuan. Y assistent non seulement son Régiment des Neuf Hommes, mais aussi le Département de Baoding, le Parti Jeune Chine, le Département des Officiers et la Ligue démocratique de Chine. Bien que résolu à ne servir que d’épée au Mouvement fédéraliste, Xiong Kewu a choisi de ne pas occuper le poste de Président provisoire, ce qui a surpris de nombreux observateurs.\n\nXiong a plutôt appelé son fidèle bras droit de longue date, Dan Maoxin, à prendre la tête du gouvernement. Cependant, cette démarche a été critiquée par les autres partis présents, qui accusent Xiong de concentrer le pouvoir du gouvernement autour du Régiment des Neuf Hommes. En guise de compromis, Dan a proposé Zhang Lan de la LDC au poste de président. Avec une enthousiasme mesuré, Zhang Lan est monté sur scène et a déclaré son soutien à une Chine démocratique, remerciant Dan et Xiong pour leur appui. À une large majorité, Zhang a été élu et a prêté serment en tant que Président provisoire de la République fédérale."
 sichuan_events.520.a:9 "Le dernier espoir de la démocratie en Chine repose sur nous."

 sichuan_events.521.t:9 "Histoire de la Charte de Nanchong"
 sichuan_events.521.d:9 "Ayant participé à la lutte républicaine au Sichuan depuis le tournant du siècle, Zhang Lan est devenu une figure légendaire sur la scène politique, tant au sein de la province qu’à travers toute la Chine. Zhang et ses alliés ont gagné en popularité grâce à leur voix particulièrement retentissante et à la exhaustivité de leurs politiques, plaidant pour l’autonomie locale et l’autogestion provinciale dans une ère turbulente, où la présence du gouvernement central est si faible et la fracture nord-sud si prononcée que le Sichuan ne peut s’allier à l’une ou l’autre partie sans discernement.\n\nAfin de remédier aux maux du Sichuan, le "Plan d’autonomie provisoire du comté de Nanchong" fut l’un des principaux documents rédigés en mars 1921, après des mois de discussions entre Zhang et ses partisans fédéralistes tels que Xian Ying et Xiong Kewu. Ces politiques devaient d’abord être testées dans le comté de Nanchong, mettant en œuvre une série de changements au sein des strates sociales du comté, qui auraient ensuite été étendus à l’ensemble du Sichuan s’ils s’étaient révélés concluants. Les idéaux de la Charte de Nanchong comprenaient non seulement la promotion de la démocratie de base, de l’entraide, de la régulation des impôts et de la revitalisation des entreprises locales, mais aussi des idées plus originales, telles que la classification des professions en groupes sociaux et un gouvernement provincial doté de branches distinctes, à l’instar des institutions occidentales.\n\nBien que ces notions aient été foulées aux pieds et rejetées par les nombreux despotes et les masses indifférentes du Sichuan, l’autogestion et l’autonomie industrielle ont été maintenues en vie par de nombreux intellectuels et par Zhang lui-même. Au fil des ans, ces idées n’ont cessé d’évoluer, intégrant des opportunités d’enseignement supérieur ainsi que la nécessité d’accroître la capacité industrielle du Sichuan afin d’accéder à davantage de ressources pour tous. Il va de soi que, à mesure que le mouvement fédéraliste relève le défi de l’unification, les idées de démocratie et d’autonomie, pionnières à Nanchong, serviront de fondement à l’instruction du peuple chinois."
 sichuan_events.521.a:9 "De ce creuset, nous forgerons une démocratie libre et authentique !"
 sichuan_events.521.b:9 "De bons principes, mais ne nous emballons pas."

 sichuan_events.522.t:9 "Le Géant du Fleuve Jialing"
 sichuan_events.522.d:9 "Bien que la présidence de Zhang Lan ait eu lieu à l’heure la plus sombre de la Chine, le vénérable érudit reste fidèle à son engagement en faveur d’une véritable république fédérale s’étendant de Harbin à Kashgar. En effet, depuis la fondation de la République en 1911, le président Zhang s’est opposé à toute forme d’autoritarisme envahissant qui s’est infiltrée dans les murs de Zhongnanhai. Après l’échec lamentable de Yuan Shikai, qui tenta en vain d’établir sa propre dynastie autocratique, Zhang Lan a soutenu le Mouvement de Protection de la Constitution et le Gouvernement de Guangzhou, déclarant qu’une constitution provisoire était essentielle aux fondements d’une république stable.\n\nBien que Zhang Lan ait tenté de mettre fin aux luttes intestines fratricides entre les seigneurs de la guerre du Sichuan, il n’a pas réussi à enrayer les combats, jusqu’à ce que la récente Convention fédéraliste convoquée par Xiong le porte à la présidence. Cependant, Zhang comprend également la position précaire de son gouvernement. La trêve proclamée après la chute du Département accéléré n’a pas mis fin aux escarmouches mineures entre les factions militaires du Sichuan. Cela a motivé le président Zhang à entreprendre des efforts considérables pour coordonner les fonctionnaires civils et militaires au sein d’un mouvement plus uni.\n\nDans une tentative d'afficher de l'unité, le Premier ministre Xiong Kewu a confirmé les réformes du président, les déclarant bénéfiques pour la stabilité de [ROOT.GetNameDef]. Bien que certaines factions mineures aient critiqué en privé le fait que Xiong n’utilise le président Zhang que pour consolider son contrôle sur l’armée sous couvert d’unité nationale, Xiong et Zhang forment un front uni et n’ont d’autre choix que de jouer le jeu."
 sichuan_events.522.a:9 "Le Président a raison d'appeler à des réformes militaires !"
 sichuan_events.522.b:9 "Le Premier ministre ramène les seigneurs de la guerre à l'ordre."

 sichuan_events.523.t:9 "Le Président du Moment"
 sichuan_events.523.d:9 "Bien que le président Zhang se soit rapidement imposé comme le visage de notre Mouvement fédéraliste, ceux qui participent au Gouvernement de Reconstruction nationale savent que c’est le Premier ministre Xiong Kewu qui maintient l’ensemble en équilibre. Vétéran de la Révolution Xinhai, de la Guerre de Protection de la Nation et d’une série de conflits provinciaux internes, Xiong Kewu s’est imposé comme un membre clé du Mouvement fédéraliste durant l’ère des seigneurs de la guerre. Sous l’hégémonie du Zhili, Xiong s’est vu contraint de quitter la pentarchie établie par Yang Sen, Liu Xiang et le Triumvirat du Département de Baoding.\n\nCependant, après que Yang ait fait face à une contestation de l’aile du Département accéléré menée par Liu Xiang, Xiong a su tirer parti des luttes intestines provinciales pour réémerger comme le seigneur de la guerre prééminent du Sichuan. En tant que Premier ministre du Gouvernement fédéraliste du Sichuan, Xiong a intégré sa faction du Régiment des Neuf Hommes à la Grande Alliance républicaine, un parti coalition composé de divers partis principalement du Sud opposés à l’ordre de Beiyang, qui opère comme l’organisation politique fédéraliste principale depuis 1931.\n\nBien que Xiong ait concentré ses efforts à maintenir le Gouvernement fédéral uni sous son autorité et celle de Zhang Lan, il a utilisé Dan Maoxin pour exercer leur influence commune au sein de la GAR afin d’aligner autant que possible ses factions internes sur les intérêts du Gouvernement de Reconstruction nationale, et a tiré parti de leur soutien politique pour empêcher les autres seigneurs de la guerre d’acquérir une influence trop importante au sein de l’administration Zhang Lan."
 sichuan_events.523.a:9 "Nous avons la chance d'avoir Xiong Kewu à la barre !"
 sichuan_events.523.b:9 "Rappelez-nous pourquoi il est aux commandes, déjà ?"

 sichuan_events.524.t:9 "Le Triumvirat Brisé"
 sichuan_events.524.d:9 "Alors que le Premier ministre Xiong Kewu et le président Zhang Lan occupent le devant de la scène du nouveau Gouvernement de Reconstruction national, l'imperturbable Département de Baoding demeure dans leur ombre. Ayant survécu à la lutte de dix ans au sein de la province du Sichuan pendant l'ère des seigneurs de la guerre, le Département de Baoding a pu conclure un accord avec le Département accéléré de Yang Sen durant la décennie de l'hégémonie du Zhili. Tout au long de cette décennie, le Département de Baoding sous Deng Xihou, Tian Songyao et Liu Wenhui est devenu l'une des principales factions de la structure politique du Sichuan, s'imposant comme trois des "Cinq Géants" du Sichuan.\n\nCependant, lorsque la Ligue s'est effondrée et que l'autorité du Zhili s'est retirée dans son cœur du Nord, Yang Sen a vu son gouvernement renversé, et Baoding a plongé dans des eaux inexplorées. Liu Wenhui a su émerger du carnage avec le plus d'influence préservée, tandis que Deng et Tian en sont ressortis affaiblis. Ayant activement coopéré avec les officiers de Xiong Kewu et Li Jiayu, Liu s'est retrouvé non plus en position de triumvirat avec Deng et Song, mais comme principal dirigeant du Département de Baoding.\n\nAu sein du Gouvernement de Reconstruction national, Liu s'est promu comme l'un des principaux stratèges militaires du Gouvernement fédéral, plaidant pour que celui-ci restructure l'armée selon les lignes de la réforme de l'État militariste-populaire proposée par Jiang Baili. Liu a également formulé sa propre vision de la gouvernance, qu'il a décrite comme les "Trois Principes d'avancement" et les "Trois Politiques de transformation". Pour Liu, les Trois Principes d'avancement appellent à un avancement prudent, un avancement graduel et un avancement rapide, tandis que les Trois Politiques de transformation appellent à remplacer la conquête par la transformation, la division par l'assimilation, et le contrôle indirect par un développement progressif."
 sichuan_events.524.a:9 "Quelle est cette absurdité ?"
 sichuan_events.524.b:9 "Non, non, il a un bon argument."

 sichuan_events.525.t:9 "La Marée Montante du Mouvement Fédéraliste"
 sichuan_events.525.d:9 "Alors que beaucoup estimaient que les Fédéralistes ne pourraient pas se remettre de la perte du Yunnan et du Guangdong, le président Zhang Lan et le Premier ministre Xiong Kewu les ont tous contredits. Dans un retournement de situation stupéfiant, le Gouvernement national de reconstruction, basé dans le Sichuan, a réussi à briser le bastion des seigneurs de la guerre du Beiyang, mettant Beijing entre les mains d’un gouvernement dirigé par le Sud, un exploit qu’aucun des révolutionnaires de Xinhai n’avait pu accomplir.\n\nArrivé à Beijing au milieu d’une foule en liesse, Xiong Kewu a déclaré aux masses que ce ne serait que le début de la campagne d’unification du Gouvernement de reconstruction nationale. Bien que la Reconstruction nationale soit incontestablement le gouvernement le plus fort à prétendre représenter la Chine, il doit voir la nation entièrement unifiée avant de revendiquer un véritable succès. Alors que le président Zhang Lan organise le nouveau gouvernement de Beijing, le Premier ministre Xiong Kewu prépare l’armée pour la lutte finale de la Chine."
 sichuan_events.525.a:9 "Notre Mouvement rétablit l’ordre partout où nous allons !"
 sichuan_events.525.b:9 "Nous apportons la liberté à notre bien-aimée République !"

 sichuan_events.600.t:9 "Victoire de la Reconstruction Nationale"
 sichuan_events.600.d:9 "Il y a seulement quelques années, il semblait que la démocratie en Chine était au bord de l'extinction, submergée soit par des réactionnaires opportunistes, soit par des autocrates révolutionnaires. Pourtant, aujourd'hui, le Gouvernement fédéral de la Chine s'étend du Nord-Est glacial aux montagnes du Guangxi. Bien que légitimement reconnu comme une victoire triomphale de la Ligue démocratique de Chine et de la Grande Alliance républicaine, le gouvernement se trouve paradoxalement à son apogée, tout en dominant le précipice d'une crise grandissante.\n\nBien que nul ne puisse nier que le Gouvernement fédéraliste contrôle la majeure partie de la Chine, la victoire a entamé l'unité du gouvernement de Zhang Lan. Il est peu probable que les nombreux alliés de Xiong Kewu au sein de la GAR se contentent de rester dans l'ombre de Zhang Lan et de la LDC, et le Président doit s'employer à consolider ses acquis, ou bien voir le gouvernement fédéral trébucher à l'heure la plus cruciale."
 sichuan_events.600.a:9 "L'unification a été assurée par la résolution idéaliste du président Zhang !"
 sichuan_events.600.b:9 "Xiong Kewu est l'épée de la victoire pour notre mouvement !"

 sichuan_events.601.t:9 "Des Réalités Militaires Cruelles"
 sichuan_events.601.d:9 "Bien que l'armée fédérale ait été initialement une coalition de forces de seigneurs de la guerre, les réformes gouvernementales de Zhang et une impressionnante dose de chance ont permis de la maintenir largement intacte pendant la Guerre civile chinoise et la Guerre de Résistance contre le Japon. Cependant, avec l'unification enfin achevée, l'armée a commencé à se désagréger complètement. Bien que le président Zhang Lan ait proposé une démobilisation militaire pour faire face à cette armée surdimensionnée, il a éprouvé des difficultés à convaincre l'armée d'accepter cette mesure. En raison de l'influence des seigneurs de la guerre au sein de son gouvernement, Zhang Lan a rencontré de grandes difficultés à réguler l'armée fédérale.\n\nLe Premier ministre Xiong Kewu, désireux d'exploiter la crise, a critiqué le Président pour avoir fracturé l'unité, pourtant si péniblement acquise, du Gouvernement fédéral. Avec les tensions sous-jacentes entre le Premier ministre et le Président qui finissent par éclater, des rumeurs circulent sur un potentiel coup d'État élaboré par des officiers mécontents, potentiellement menés par Liu Wenhui. Liu, pour sa part, s'est abstenu de critiquer ouvertement le président et a adopté une position plus ambivalente envers la campagne de démobilisation. Pour les observateurs extérieurs, il est devenu évident que le gouvernement de Zhang Lan et sa grande coalition sont devenus intenables."
 sichuan_events.601.a:9 "Xiong parvient à contraindre le Président à reporter la démobilisation."
 sichuan_events.601.b:9 "Le président Zhang résiste fermement au Premier ministre."

 sichuan_events.602.t:9 "Crises Économiques Dévastatrices"
 sichuan_events.602.d:9 "Bien que la Chine ait autrefois possédé l'une des plus grandes économies du monde, le Siècle d'Humiliation a relégué notre nation mutilée au rang de l'une des économies les moins développées. Si les régions côtières ont connu une croissance modeste durant l'hégémonie du Zhili, l'arrière-pays agricole est resté dans un état d'arriération. Quelles que soient les réformes économiques entreprises par les divers seigneurs de la guerre provinciaux, les maigres progrès existants ont été détruits par l'état de guerre quasi permanent dans lequel la Chine se trouvait après l'effondrement de la Ligue en 1936, et la Guerre de Résistance contre l'Empire du Japon a plongé l'économie chinoise dans une hyperinflation. La monnaie papier devenant rapidement sans valeur, la population a commencé à utiliser un système rudimentaire de troc, jusqu'à ce que le gouvernement parvienne à endiguer la crise économique en cours."
 sichuan_events.602.a:9 "Xiong réprime les gangs criminels qui accaparent les ressources."
 sichuan_events.602.b:9 "Le président Zhang présente la distribution publique des denrées."

 sichuan_events.603.t:9 "La Reconstruction Nationale S'effiloche"
 sichuan_events.603.d:9 "Le Gouvernement fédéraliste du Sichuan s'est distingué par son succès dans l'unification de la Chine, malgré l'hostilité mutuelle des diverses factions au sein de l'administration Zhang Lan. Les prochaines élections annoncées par le Gouvernement fédéral n'ont pas aidé à réparer un gouvernement qui se fissure. Alors que la campagne électorale s'intensifie, le partisanisme n'a fait que se répandre davantage au sein de l'administration de Zhang Lan.\n\nLe Président, à la surprise de nombreux observateurs, a déclaré son intention de se représenter. Cette démarche a suscité une réaction mitigée au sein de la Ligue démocratique de Chine, de nombreux membres éminents de la LDC critiquant cette initiative. Cependant, incapable de s'accorder sur tout autre candidat convenable, le parti s'est largement rangé derrière la campagne présidentielle de Zhang.\n\nPendant ce temps, au sein du camp de la Grande Alliance républicaine, le Premier ministre Xiong s'est largement retiré de la gouvernance active, se concentrant sur la campagne électorale. Conscient qu'une candidature à la présidence sous son nom risquerait d'être perçue comme une tentative flagrante de s'accaparer le pouvoir, Xiong a désigné son bras droit, Dan Maoxin, comme candidat de la GAR à la présidence.\n\nDans le Nord de la Chine, Liu Wenhui a trouvé un nombre surprenant de partisans, en particulier parmi les anciens officiers de Beiyang qui le voient comme un symbole de gouvernement stable. Cependant, Liu Wenhui a jusqu'à présent refusé de se présenter ouvertement à la présidence, espérant plutôt devenir ministre de la Guerre du vainqueur des élections, qui que ce soit."
 sichuan_events.603.a:9 "Cette élection ne résout rien !"
 sichuan_events.603.b:0 "Que le meilleur gagne."

 sichuan_events.604.t:9 "La Reconstruction Nationale Échoue"
 sichuan_events.604.d:9 "Les relations entre le président Zhang Lan et le Premier ministre Xiong Kewu étant au plus bas, le Gouvernement de Reconstruction nationale se trouve dans une position unique de faiblesse. Avec la Chine une fois de plus plongée dans une nouvelle crise politique, peut-être est-ce à [ROOT.GetLeader] de remettre les choses en ordre, de prendre sa place dans la République et de la sauver de cette bande de fous querelleurs.\n\n[ROOT.GetLeader] comprend les risques d'une révolte, mais il sait aussi qu'il ne se présentera peut-être jamais une meilleure occasion. Cependant, [ROOT.GetLeader] sait également que défier le Gouvernement fédéral pourrait être perçu par le peuple chinois comme les agissements égoïstes d'un nouveau seigneur de la guerre cherchant à plonger à nouveau la nation dans le chaos, et le faire passer pour l'un des plus grands vilains de l'histoire du pays."
 sichuan_events.604.a:9 "[ROOT.GetLeader] est le seul homme capable de sauver la République !"
 sichuan_events.604.b:9 "Nous n'avons rien à y gagner."
 sichuan_events.604.c:9 "C'est une période de guérison, pas de guerre."

 sichuan_events.605.t:9 "[FROM.GetLeader] Passe à l'Action !"
 sichuan_events.605.d:9 "Alors que la fracture entre la Grande Alliance républicaine de Xiong Kewu et la Ligue démocratique de Chine de Zhang Lan s'élargit chaque jour, l'unité décroissante du Gouvernement de Reconstruction nationale a laissé aux seigneurs de la guerre et gouverneurs ambitieux une étroite fenêtre d’opportunité pour frapper.\n\nEn effet, il semble que [FROM.GetLeader] en particulier ait saisi cette opportunité, déclarant que les luttes intestines entre le président Zhang Lan et le Premier ministre Xiong Kewu affligent le gouvernement républicain, et s’est autoproclamé chef d'un gouvernement provisoire qui mettra fin aux conflits internes en Chine."
 sichuan_events.605.a:9 "Que croit-il faire ?!"
 sichuan_events.605.b:9 "Tant pis pour l'Unité démocratique."

 sichuan_events.610.t:9 "Retraite du Général aux Pieds de Fer"
 sichuan_events.610.d:9 "Après une longue période de tensions croissantes au sein du Gouvernement de Reconstruction nationale, le Premier ministre Xiong a officiellement annoncé sa démission du gouvernement Zhang Lan. À la suite de cette annonce, une série de fonctionnaires alliés à la Grande Alliance républicaine ont également présenté leur démission. Ce départ massif a laissé un vide politique considérable au sein du gouvernement, de nombreux membres de la Ligue démocratique de Chine tentant de pourvoir les postes vacants. Le poste de Premier ministre est au cœur des intrigues les plus vives du gouvernement Zhang Lan.\n\nComme il était tacitement entendu que le Premier ministre successeur serait probablement maintenu par Zhang après l'élection, de nombreux membres de haut rang de la LDC ont proposé leur candidature. Parmi eux, Zhang Junmai, Huang Yanpei, Luo Longji et Tang Hualong étaient les choix les plus populaires. Cependant, dans un mouvement surprenant et controversé, Zhang Lan a choisi Xian Ying, un compatriote du Sichuan, pour occuper le poste de Premier ministre. Associé de longue date et ami du président, l'accession de Xian Ying a été interprétée par beaucoup comme un signe de consolidation accrue de la LDC sous l'emprise de ses membres sichuanais."
 sichuan_events.610.a:9 "Bienvenue, Xian !"
 sichuan_events.610.b:9 "Peu démocratique de la part de la Ligue démocratique."
 sichuan_events.610.c:9 "Il y a des fous des deux côtés."

 sichuan_events.611.t:9 "Lever le Voile"
 sichuan_events.611.d:9 "La Ligue démocratique de Chine, bien que créée peu après la prise de Beijing par le Gouvernement de Reconstruction nationale, trouve ses origines dans la Fédération des Partis démocratiques chinois. La FPDC, formée par divers éléments libéraux, démocratiques et progressistes après la victoire du Zhili sur la Clique du Fengtian, avait pour objet de constituer une opposition politique démocratique à la Clique du Zhili. La FPDC s'est fracturée à la suite du Soulèvement de la Ligue de 1932, lorsque Cao Kun a annulé les élections de 1933. De nombreux partis et sociétés ayant quitté la FPDC se sont retrouvés dans le Sud de la Chine et se sont regroupés autour du Mouvement fédéraliste déjà établi. Bien que composée d'éléments conservateurs, libéraux et socialistes, la LDC a tendance à glisser vers la gauche sous la direction de Zhang Lan. Malgré cela, la LDC est restée largement intacte jusqu'à présent, grâce à l'engagement de Zhang Lan en faveur d'une véritable démocratie et à son opposition inébranlable à toutes les formes d'autoritarisme. La présidence de Zhang Lan l'a vu défendre l'autonomie des partis participant à la Ligue, tout en affirmant ses objectifs d'atteindre une démocratie authentique."
 sichuan_events.611.a:9 "La LDC accueille tous ceux qui rêvent d'une Chine libre !"
 sichuan_events.611.b:9 "Rien de plus qu'un rassemblement de rêveurs."

 sichuan_events.612.t:9 "Le Rôle du Liangisme dans la Nouvelle Chine"
 sichuan_events.612.d:9 "Lors des ambitieuses Réformes des Cent Jours de l’empereur Guangxu, Kang Youwei et Liang Qichao se distinguaient parmi tous les réformateurs. Défenseurs d’une monarchie constitutionnelle moderne, Kang et Liang furent contraints de fuir la Chine lorsque l’impératrice douairière Cixi, conjointement avec Yuan Shikai, assigna l’empereur à résidence.\n\nAlors que Kang resta un royaliste fervent jusqu’à la fin de sa vie, Liang comprit que l’avenir de la Chine résidait dans une république et adopta l’idéologie bismarckienne allemande de socialisme d’État. Au cours de l’histoire de la République, Liang et ses disciples émergèrent comme certains des penseurs les plus influents, contestant la forme plus révolutionnaire de la politique de Sun Yat-sen.\n\nLe sommet de la carrière politique de Liang intervint sous le règne de la Clique de l'Anhui, où lui et la Clique de la Recherche aidèrent à formuler les politiques et la structure développementalistes du Parti-État de l'Anfu, avant de se brouiller avec le Premier ministre Duan Qirui. Dans les années 1920, Liang dévia vers la gauche, se fascinant brièvement pour les courants réformistes du socialisme. L’un des derniers gestes politiques de Liang fut de fonder le Parti constitutionnaliste chinois, qui fut dirigé par Xu Qin après sa mort.\n\nBien que le PCC ait coopéré prudemment avec la Clique du Zhili jusqu’à sa réorganisation en PDC, le disciple de Liang, Zhang Junmai, établit le Parti social-démocrate dans le Sud de la Chine, en opposition farouche à Beijing. Bien que n’étant pas directement issu politiquement de Liang, le Parti Jeune Chine l’a revendiqué comme son leader spirituel. Bien que considéré comme une figure clivante, peu de gens nieraient ses réalisations pour le développement politique de la Chine."
 sichuan_events.612.a:9 "Les paroles de Liang continueront de guider la Chine vers l'avenir !"
 sichuan_events.612.b:9 "Le liangisme a fait son temps."

 sichuan_events.613.t:9 "Zhang Junmai Défie Zhang Lan"
 sichuan_events.613.d:9 "Bien que la campagne présidentielle de Zhang Lan ait été acceptée par la majorité des membres de la Ligue démocratique de Chine à ce stade, certains refusent toujours de lui apporter leur soutien. Parmi eux se trouve Zhang Junmai, dirigeant du Parti social-démocrate. Bien que les deux hommes prétendent suivre des courants du socialisme, beaucoup ont relevé la position plus conservatrice de Zhang Junmai ainsi que son caractère affirmé.\n\nHomme égocentrique et peu enclin à collaborer avec autrui, Zhang Junmai a vivement ressenti la domination des intellectuels du Sichuan au sein de la Ligue, les considérant comme de simples figurants n’ayant atteint ce rang que par coïncidence. Appelant les alliés de son parti, ainsi que les autres liangistes du Parti constitutionnel démocratique et du Parti Jeune Chine, Zhang a lancé sa propre campagne présidentielle.\n\nS’attaquant à la même base électorale, Zhang Junmai a tenté de grignoter le soutien de la LDC au profit de Zhang Lan et de la LDC, ce qui a frustré le président. Les luttes intestines entre la LDC et les liangistes ont grandement paralysé la capacité de la LDC à fonctionner. En tirant parti de cette situation, Dan, Xiong et la Grande Alliance républicaine ont pris l’initiative et se trouvent désormais en position de dominer le processus électoral, beaucoup craignant que la GAR n’aille jusqu’à truquer l’élection elle-même, en particulier au sein du Département des Officiers de Li Jiayu."
 sichuan_events.613.a:9 "Zhang Junmai est vraiment talentueux."
 sichuan_events.613.b:9 "Zhang Junmai, avec sa fierté et son ego !"

 sichuan_events.614.t:9 "Exprimer la Sauvegarde de la Chine"
 sichuan_events.614.d:9 "Avec la Ligue démocratique de Chine au cœur d’une guerre civile opposant Zhang Lan et Zhang Junmai pour la direction, et la Grande Alliance républicaine sur le point de remporter une victoire écrasante, tandis que les rumeurs circulent sur leurs ambitions de mettre fin à la fragile démocratie en place, Liu Wenhui a affirmé son droit de prééminence en tant que plus grand et plus puissant seigneur de guerre indépendant au sein du Gouvernement de Reconstruction nationale.\n\nLiu a exhorté la Grande Alliance républicaine à mettre fin à ses prétentions visant à éroder la démocratie fédérale, et la Ligue démocratique de Chine à empêcher ses luttes intestines de provoquer une hyper-partisanerie. Liu a mis en garde de manière inquiétante : si cela ne se produit pas, il forcera leur main pour protéger les institutions démocratiques et les intérêts du peuple chinois. Cela a conduit le public à réagir avec inquiétude face à la possibilité d’un coup d’État de Liu Wenhui, tandis que les fonctionnaires du gouvernement craignent les carriéristes et opportunistes qui pourraient profiter du coup d’État potentiel de Liu Wenhui pour accéder aux plus hautes fonctions du gouvernement chinois."
 sichuan_events.614.a:9 "Zhang Lan intensifie sa campagne contre Zhang Junmai."
 sichuan_events.614.b:9 "Xiong Kewu jette la lettre de Liu Wenhui à la poubelle."

 sichuan_events.620.t:9 "Dernière Étincelle de la Démocratie Chinoise"
 sichuan_events.620.d:9 "Que ce soit parce que la République s'est enflammée à cause de l'hyper-partisanisme amené par les luttes de la LDC ou parce que la Grande Alliance républicaine complotait ouvertement pour abattre la démocratie chinoise avant qu'elle ait eu une chance de vivre, il semble que ni la LDC ni la GAR ne remporteront la victoire.\n\nCes dernières heures, les soldats du Département de Baoding et d'autres armées seigneuriales se sont emparé de lieux stratégiques et de bureaux de vote dans tout le pays. Pendant ce temps, Liu Wenhui supervisait personnellement la capture du président Zhang, du gouvernement, de Xiong Kewu et de Dan Maoxin. Lors d'une annonce à la nation, Liu a déclaré l'annulation des élections.\n\nLiu a également annoncé sa propre candidature pour assurer l'intérim, sachant qu'il serait le seul candidat, tous ses opposants viables étant en état d'arrestation. Même s'il s'agit d'un putsch évident, il a rencontré assez peu d'opposition, beaucoup craignant un nouveau front de radicalisme sans l'intervention de Liu ou étant trop apathiques pour s'en soucier. Déjà, d'anciens officiels du Zhili sont sortis de leur quasi-retraite pour soutenir la candidature de Liu, et il semble que l'ordre détruit de Beiyang se soit une fois encore réaffirmé."
 sichuan_events.620.a:9 "Pollice Compresso Favor Iudicabatur."

 sichuan_events.621.t:9 "Le Marteau Frappant l'Enclume"
 sichuan_events.621.d:9 "Pour des raisons qui demeurent obscures, qu’il s’agisse de l’engouement de la République pour les passions d’une querelle hyperpartisane ou de son immersion dans les flots de l’apathie, il semble que l’expérience démocratique de la Chine ait brusquement pris fin. Au cours des dernières heures, des soldats du Département de Baoding et d’autres armées de seigneurs de la guerre ont pris le contrôle de positions stratégiques à travers le pays ainsi que des bâtiments gouvernementaux majeurs de la capitale. Le ministre de la Guerre, Liu Wenhui, principal artisan de ce coup d’État, a personnellement supervisé l’arrestation du Président, de son gouvernement et des principaux opposants.\n\nPeu de figures se sont opposées ouvertement au coup d’État de Liu, en raison de sa diplomatie minutieuse en coulisses et de son rôle au sein du gouvernement. Ayant réussi à imposer rapidement un consensus en muselant par la pression de groupe quelques dissidents, Liu a prêté serment en tant que Président. Étonnamment populaire auprès du peuple, le président Liu a réussi à mettre en place sa propre machine politique sous la forme de "démocratie à main lourde". S’appuyant sur le soutien de la petite noblesse, des paysans et de l’armée, Liu s’est rapidement forgé une réputation d’homme du peuple ayant agi avec fermeté pour sauver la République."
 sichuan_events.621.a:9 "Ainsi, Liu incarne la voix du peuple."

 sichuan_events.630.t:9 "L'Ancien Ordre"
 sichuan_events.630.d:9 "Bien qu’il ait toujours cherché à suivre l’exemple des idéalistes qui l’entourent, Liu Wenhui a plus souvent qu’à son gré dû agir par pragmatisme et opportunisme, bien qu’il aurait préféré s’en abstenir. L’opportunisme a toujours été, aux yeux de Liu, un fléau pour la Chine ; et même alors qu’un nouveau gouvernement est porté au pouvoir, comme tant d’autres avant lui, il ne peut s’empêcher de ressentir une légère déception. Yuan Shikai n’a-t-il pas tenté de saisir le pouvoir par opportunisme ? Les actions des seigneurs intrigants n’ont-elles pas émergé de cette même source ? Même au sein de ses propres rangs, son armée n’a-t-elle pas fluctué, se réduisant et s’agrandissant selon les fortunes personnelles de Liu ?\n\nAlors que la Société pour la Gouvernance civile et le Progrès lance ses réformes, Liu observe impuissant ses collègues s’employer à entraver ses politiques les plus progressistes, malgré ses plus grands efforts. A Chengdu, à des milliers de kilomètres de la capitale, des rapports et des pétitions parviennent sur le bureau de Liu, détaillant les discours de Deng dénonçant frontalement l’inefficacité de la démocratie, le recrutement d’anciens sbires de la dictature pour des postes provinciaux et, bien sûr, les manœuvres néfastes de Liu Wencai.\n\nNéanmoins, Liu s’est employé sans relâche à répondre aux préoccupations de ses nombreux critiques et à apaiser les tensions avec une opposition fréquemment harcelée par les proches de Liu, qui utilisent leurs nouveaux statuts pour agir en toute impunité et étouffer l’appareil démocratique naissant. Mais peut-être s’agit-il là d’un phénomène observé dans les premiers jours de chaque administration, qui finiront par se déposer comme la poussière après la pluie de printemps. L’essentiel reste d’observer la voie à venir, de s’efforcer au milieu des difficultés, de fixer des objectifs ambitieux et, par-dessus tout, de travailler avec diligence en toute chose. Liu n’est peut-être pas un homme parfait, ni même un idéaliste comme tant d’autres dans le mouvement fédéraliste, mais sa conviction demeure celle d’un patriote, quelqu’un qui reste fidèle à l’esprit des Émeutes de Novembre et de la Chine. Bien que la Chine ne parvienne peut-être jamais à se débarrasser de l’expédient sociétal, et que ceux qui agissent par intérêt personnel continueront toujours de comploter dans l’ombre, le pessimisme ne sera jamais une solution."
 sichuan_events.630.a:9 "Une nation a besoin de bâtisseurs, non de simples critiques."

 sichuan_events.631.t:9 "Souvenir Éternel de la Démocratie"
 sichuan_events.631.d:9 "La route du Sichuan vers le Fédéralisme n'a pas été facile. Il a été constamment harcelé et trahi dans une lutte provinciale sans fin, tandis que les autocrates locaux le surpassait constamment en nombre. Fréquemment expulsés de leur province natale, Xiong et ses hommes n'ont survécu que grâce à la gentillesse de leurs frères républicains, même si cela n'a pas été sans désagréments. Mais regardez où ils en sont arrivés, dernière étincelle d'un rêve fédéraliste qui n'a pas été éteinte par le temps.\n\nDésormais, le flambeau est passé à Dan Maoxin, un nouveau visage sur la scène politique mais un vétéran de la lutte républicaine, ayant été le camarade de Xiong Kewu depuis la fin des années 1910. Grâce à sa réputation de promoteur de la discussion civile et de l'unité non-partisane, ses accords avec les républicains indépendants, la Clique des Sciences politiques et les membres modérés de l'opposition lui ont valu une grande reconnaissance comme "l'homme de lettres" dont la Chine a tant besoin après des années de règne fragmenté et despotique. Toutefois, c'est un système encore nouveau pour la Chine, et on ne sait pas encore si Dan et son gouvernement peuvent résister aux excès des radicaux de gauche, des conservateurs subversifs ou à un effondrement de la coalition de l'intérieur. La démocratie, à l'échelle locale comme nationale, doit encore être réalisée pleinement tandis que les quelques hommes forts restants essayent de consolider leur contrôle et ceux qui veulent passer à l'action s'en abstiennent.\n\nBien sûr, les méthodes actuelles peuvent s'améliorer, et le modèle fédéraliste peut être la manière dont la Chine sera dirigée pour les siècles à venir, ou bien être aussi passager que les autres tentatives de démocratisation ou même de réforme de la Chine. Le compromis est difficile à conserver, et les coalitions changeront inévitablement, mais ce sont ces désaccords qui rendent un tel système si particulier, et c'est après tout le lot d'un tel marché libre des idées."
 sichuan_events.631.a:9 "Nos idéaux valent la peine qu'on continue à lutter pour eux."

 sichuan_events.632.t:9 "Bienveillance et Droiture"
 sichuan_events.632.d:9 "Depuis les jours troublés de la dynastie Qing et la république fragmentée qui a suivi, beaucoup en Occident ont considéré la Chine comme une nation arriérée, perdue dans les griffes des luttes intestines et du despotisme. Certes, à certains égards, cela a été vrai, nulle part plus qu'au Sichuan, lui-même déchiré par les seigneurs de la guerre locaux pendant des décennies. À travers ces conflits, Zhang Lan a tout vu : les paysans amaigris écrasés sous le poids des impôts, les quelques hommes d'affaires quittant la province pour des opportunités plus prospères à l'Est, et, bien sûr, les divers militaires qui se sont combattus sans relâche à travers le Bassin Rouge.\n\nAprès avoir navigué dans le paysage politique chinois et mené personnellement le mouvement fédéraliste moderne à une renommée nationale, Zhang a réalisé qu'il ne suffisait pas d'adopter les idées occidentales, celle de la démocratie pour tous, de la liberté de pensée et de l'indépendance intellectuelle, mais qu'il était aussi nécessaire de défendre les vertus prônées par les philosophes chinois il y a plusieurs millénaires. La première est l'idée de bienveillance, que Zhang estimait manquer à beaucoup des précédents dirigeants de la république ; bien qu'astucieux, intelligents et courageux, ils n'ont ni gagné le cœur du peuple ni œuvré dans l'intérêt des masses. Mais bien sûr, la bienveillance seule a souvent été mal comprise en Chine : la bureaucratie défaillante de Beiyang, le zèle révolutionnaire du KMT et le populisme des seigneurs de la guerre se prétendaient tous engagés dans le but grandiose de sauver la nation, mais ont échoué à agir de manière stable, juste et équitable pour conquérir l'adhésion populaire. La Ligue démocratique de Chine, cependant, est la synthèse de ces deux idées, se tenant du côté de la nation, s'efforçant d'unifier le pays, à la fois pour le sauver et le reconstruire alors qu'il avance vers le nouveau siècle.\n\nBien sûr, même lorsque les canons se taisent à travers la Chine et que le peuple se prépare aux fruits de la démocratie à venir, Zhang et ses collègues restent vigilants face aux diverses forces qui cherchent à priver les masses de leur autonomie. Pour Zhang, cet enthousiasme doit continuer à être utilisé, canalisé et cultivé au sein des masses, car qu'est la réforme, sinon une révolution à part entière ?"
 sichuan_events.632.a:9 "Nous persévérerons sans relâche ! Nous ne céderons jamais !"

