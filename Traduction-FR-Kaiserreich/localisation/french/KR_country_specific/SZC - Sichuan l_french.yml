### Parties ###
 SZC_totalist_party:9 "PSC-SDA"
 SZC_totalist_party_long:9 "Parti syndicaliste chinois - Société de la Dévotion absolue (Zhongguo Gongtuandang - Chixinshe)\n§LForce politique ayant connu une poussée de popularité ces dernières années, la faction la plus active et radicale du PSC sichuanais s'est réunie autour d'une des chefs syndicaux les plus importants de la province, Yang Angong.\n\nEn collaboration avec Wu Yuzhang et les autres membres du PSC provincial, Yang et ses collègues étaient chargés d'organiser des grèves et des soulèvements tout au long du milieu des années 1920. Sur le plan politique, cependant, Yang allait vraiment s'imposer à la tête de la "Société de la Dévotion absolue", l'une des nombreuses organisations syndicales clandestines de Chongqing, où la classe ouvrière n'était pas concentrée dans les champs, mais dans les nombreux chantiers navals, docks et fermes de soie du port. Vigoureux, avant-gardistes et peu réticents à l'action militante, les radicaux de Yang n'ont guère confiance dans le processus démocratique, car l'ère des seigneurs de la guerre n'a fait que prouver à quel point les institutions démocratiques et civiles existantes sont égoïstes et corruptibles dans la Chine des seigneurs de la guerre.\n\nContrairement aux autres sections provinciales du PSC, qui se sont divisées en factions distinctes de radicaux et de modérés, le PSC du Sichuan ne semble pas avoir subi le même sort, peut-être en raison de la situation particulièrement difficile de la province, qui favorise une plus grande unité idéologique qu'ailleurs, ou simplement grâce à la capacité de Wu Yuzhang à trouver des compromis et à stabiliser le front de gauche dans la province.§!\n"
 SZC_syndicalist_party:9 "PSC-O"
 SZC_syndicalist_party_long:9 "Parti syndicaliste chinois - Orthodoxes (Zhongguo Gongtuandang - Zhengtong Pai)\n§LS'écartant légèrement du syndicalisme plus urbain et industriel du courant dominant du PSC, le PSC du Sichuan trouve principalement son origine dans le groupe d'intellectuels sichuanais qui se sont rendus en France pour participer à des programmes d'études et de travail pendant la Grande Guerre, sous la direction notamment de Wu Yuzhang.\n\nLiés aux diverses initiatives éducatives sino-françaises et ayant passé du temps en France pendant la guerre et la révolution qui a suivi, Wu Yuzhang et ses collègues intellectuels sont revenus en Chine pour tirer parti de la vague de ferveur révolutionnaire qui a suivi la fin de la Weltkrieg. Inspiré par la pensée socialiste mais découragé par le manque d'unité au sein de la révolution chinoise, qui s'était fracturée en deux camps, révolutionnaire et réformiste, Wu passa les années 1920 à lire les œuvres de penseurs socialistes tels que John Reed, concluant à la nécessité d'un programme idéologique clair, qu'il trouva au sein du PSC. Ce programme allait être élargi avec le manifeste de Wu sur la Fédération autonome du Sichuan, qui prônait non seulement une transformation de l'économie sociale et des programmes d'entraide pour les travailleurs, mais aussi la fin du "parasitisme social" et une refonte du système éducatif chinois obsolète.\n\nContrairement aux autres sections provinciales du PSC, qui se sont divisées en factions distinctes de radicaux et de modérés, le PSC du Sichuan ne semble pas avoir subi le même sort, peut-être en raison de la situation particulièrement difficile de la province, qui favorise une plus grande unité idéologique qu'ailleurs, ou simplement grâce à la capacité de Wu Yuzhang à trouver des compromis et à stabiliser le front de gauche dans la province.§!\n"
 SZC_radical_socialist_party:9 "Armée rouge du Sichuan"
 SZC_radical_socialist_party_long:9 "Force de Guérilla de l'Armée rouge du Sichuan oriental (Chuandong Hongjun Youjidui)\n§LTout au long de l'ère des seigneurs de la guerre, le Sichuan, tout comme ses voisins du sud, a été un foyer de guérillas socialistes et d'activité intellectuelle, bien que cela ait été fortement contrebalancé par la répression militariste et l'influence de la noblesse. Pierre angulaire du cœur agricole de la Chine, la nature agraire du Sichuan a fait du Bassin rouge une base fertile de soutien favorable à la cause socialiste.\n\nPendant l'Expédition du Nord, de nombreux membres du KMT et du PSC, dont certains avaient suivi une formation d'officiers subalternes à Whampoa, ont mené des activités irrégulières pour perturber les mouvements des forces des seigneurs de la guerre. L'une des principales actions fut le soulèvement manqué de Lushun, mené par Liu Bocheng, Zhu De et Yang Angong à la fin 1926, qui visait à se révolter en tandem avec une nouvelle offensive de l'ANR et à perturber l'approvisionnement des seigneurs de la guerre dans les régions reculées du Sichuan. Bien qu'elle ait échoué, la révolte de Lushun allait attiser les flammes révolutionnaires de la paysannerie, affiner la stratégie de la future guérilla et inspirer d'autres personnes, comme Li Jiajun et Wang Weizhou, à mener également une résistance armée dans les campagnes, ce qui aboutit à la révolte étonnamment réussie de Gujunba en 1929.\n\nLes troubles des années 1930 ont vu les insurrections paysannes être progressivement repoussées, les militaristes en quête de consolidation, tels que Liao Zhen, cherchant à les éliminer complètement. Malgré cela, la résistance a été résolue, de nombreuses autres cellules de guérilla se mobilisant pour prendre la place de celles qui avaient été vaincues. Ces milices et ces révolutionnaires ont été réorganisés ces dernières années en une Force de guérilla de l'Armée rouge du Sichuan oriental, dirigée par un comité présidé par Wang Weizhou et divisée en trois armées de route, dont la puissance est renforcée par des formations plus irrégulières telles que l'armée paysanne de Fuling et les cellules insurgées du PSC. Mais malgré tous ces développements, il reste à voir si les derniers bastions du bloc agraire du KMT et du PSC au Sichuan auront les moyens de prendre le contrôle de la province divisée le moment venu.§!\n"
 SZC_social_democrat_party:9 "Régiment des Neuf Hommes"
 SZC_social_democrat_party_long:9 "Régiment des Neuf Hommes (Jiu Ren Tuan)\n§LConnu pour sa résistance contre le statu quo de Beiyang et les influences du Nord et du Sud, Xiong Kewu s'est fait un nom dans le Sichuan pendant les premières années chaotiques de la province, d'abord contre Yuan Shikai, puis à plusieurs reprises contre divers autocrates sichuanais. Lui et son "Régiment des Neuf Hommes", des associés de Xiong qui avaient étudié avec lui à l'Académie Dongbin de Tokyo, rejoignirent la lutte politique dans le Sichuan, Xiong occupant sporadiquement le poste de gouverneur tout au long des années 1920, remarquable pour sa croyance en l'autonomie provinciale et fédérale. Mais parmi les anciens "alliés" du groupe, leurs divergences idéologiques allaient creuser un fossé entre eux et les militaristes potentiels avec lesquels ils tentaient d'unir le Sichuan. Ils furent notamment trahis par Liu Cunhou, Liu Xiang et Liu Chengxun avant d'être complètement écrasés par une coalition de seigneurs de la guerre à la fin de l'année 1923.\n\nAprès son expulsion du Sichuan, Xiong et ses alliés devinrent encore plus favorables au fédéralisme dans le Hunan, s'appuyant sur les tentatives avortées de constitutionnalisme et d'autonomie régionale lancées dans le Sichuan. Ce sont les tendances fédéralistes de Xiong qui précipitèrent sa rupture officielle avec le KMT en 1924 et son incarcération, ainsi que celle de Yu Jitang, à la forteresse de Humen. Mais avec le début de l'Expédition du Nord et le recentrage de l'attention de Chiang Kai-shek sur le front, Xiong fut discrètement gracié par Hu Hanmin et envoyé au Sichuan pour rallier les restes de son armée.\n\nAprès la défaite du KMT, le Régiment des Neuf Hommes de Xiong se retrouva à nouveau attaqué, rapidement chassé du sud-est du Sichuan et s'installant temporairement dans le Hunan avant de conclure un accord avec le gouverneur du Hunan, Zhao Hengti, pour être stationné autour de la ville de Tongren. C'est là que Xiong continua à comploter son retour, à affiner ses plans et à recruter de nouveaux officiers pour sa cause.§!\n"
 SZC_social_liberal_party: "Département des Officiers"
 SZC_social_liberal_party_long:9 "$SZC_social_liberal_party_long_tt$\n§LContrairement aux autres départements, qui tirent tous leur nom d'académies militaires importantes, le Département des Officiers est issu des quatrième et cinquième promotions de l'École militaire préliminaire du Sichuan, également créée sous l'administration Qing. Ces officiers sont devenus un élément clé sous le commandement de Baoding, Li Jiayu et Luo Zezhou commandant leurs forces sous Deng Xihou jusqu'à leur rupture avec lui à la fin de 1929.\n\nEn 1927, Li et Luo furent affectés comme commandants de division autour de Suining, choisissant de former la Société Qunyi, une organisation informelle visant à attirer les nouveaux diplômés de l'École des officiers de l'armée du Sichuan. L'effondrement de l'Armée de Défense frontalière du Sichuan et la démission forcée de son commandant Liu Chengxun pendant la guerre du Sichuan central ont également amené l'un de ses subordonnés, Lai Xinhui, à rejoindre le Département des Officiers, renforçant ainsi leurs effectifs.\n\nHésitant à s'allier à l'un de leurs adversaires nettement plus puissants, les officiers réussirent dans une large mesure à rester neutres tant vis-à-vis des frères Liu que des dirigeants provinciaux du Zhili tout au long du début des années 1930. Cependant, les commandants de rang inférieur de ce département sont remarquablement progressistes, ces idéaux étant même défendus par Li Jiayu lui-même, ce qui permet au Département des Officiers d'être réceptif aux éléments du fédéralisme, de la démocratie et même à certains aspects du KMT.§!\n"
 SZC_market_liberal_party:0 "Corps industriel"
 SZC_market_liberal_party_long:9 "Corps industriel (Shiye Tuan)\n§LFondé dans le secteur non militaire, le Corps industriel est principalement composé de diplômés de l'Académie d'enseignement supérieur du Sichuan, alignés sur le centre et la droite du KMT. Ne disposant d'aucun véritable leader central en raison de la nature hybride civile et militaire du groupe, le Corps industriel commença par servir de subordonné dans les campagnes menées par Xiong Kewu contre Yuan Shikai et d'autres seigneurs de la guerre à la fin des années 1910. Bien qu'initialement alliés, le mécontentement de Xiong face à la nomination par Sun Yat-sen de Yang Shukan au poste de gouverneur du Sichuan en 1918, ainsi que l'éviction des membres du Corps industriel de l'armée par Xiong, conduisirent le Corps industriel à saisir l'occasion de l'invasion du Yunnan en 1920 pour se rebeller contre lui, ce qui entraîna l'expulsion du corps de la province.\n\nLes activités du Corps industriel dans le Sichuan ne reprirent qu'après le retour de Lü Chao dans la province en juin 1923, sur ordre de Sun Yat-sen. Après avoir monté les hommes forts de la province, Liu Xiang, Yang Sen et même Yuan Zuming, les uns contre les autres, Lü Chao se retrouva avec une petite zone de défense et une petite armée, tentant de rallier ses subordonnés à la cause du KMT avant l'Expédition du Nord. Après l'effondrement du gouvernement de Guangzhou, Lü se retrouva une fois de plus isolé, piégé le long de la frontière entre le Yunnan et le Sichuan, avec des forces extérieures hostiles attendant le moment opportun pour fondre sur lui.\n\nCette occasion se présenta au début des années 1930, lorsque les campagnes d'encerclement dans les montagnes commencèrent. Encerclé par les hommes de Liu Wenhui à l'ouest, par le Commandement de répression des bandits du sud de Pan Wenhua au nord et à l'est, ainsi que par la Commission de défense de Zhaotong de Long Yun au sud, Lü Chao n'avait d'autre choix que de se fondre davantage dans la campagne, où ses forces décimées tentaient d'entrer en contact avec la junte principale du KMT dans le Guizhou. Même si elles sont considérées comme épuisées pour l'instant, toute forme d'instabilité catastrophique pourrait s'avérer être le second souffle dont Lü a désespérément besoin.§!\n"
 SZC_social_conservative_party: "Département de Baoding"
 SZC_social_conservative_party_long:9 "$SZC_social_conservative_party_long_tt$\n§LL'une des rares factions militaires à ne pas avoir ses racines dans le Sichuan, le Département de Baoding est ostensiblement un triumvirat de seigneurs de la guerre régionaux qui ont obtenu leur diplôme et servi ensemble à la prestigieuse Académie de l'Armée de Baoding. Les trois dirigeants du département de Baoding, Liu Wenhui, Deng Xihou et Tian Songyao, ont tous vu leur ascension vers la notoriété en tant qu'acteurs clés de la politique du Sichuan alors qu'ils formaient une alliance contre Yang Sen en 1925, créant le Bureau de commandement des trois armées à Chengdu l'année suivante.\n\nS'inscrivant dans le système de « zones de garnison » qui s'est généralisé dans la province, le département de Baoding a cherché à collaborer avec tous ceux qui semblaient avoir la faveur de la fortune après la défaite de l'Expédition du Nord, contrôlant collectivement de vastes portions du nord et de l'ouest du Sichuan. Tous deux liés à la noblesse locale et disposés à prêter une oreille attentive aux intellectuels en herbe de la province, ils ont cherché à s'implanter dans la politique provinciale.\n\nMalgré cela, la consolidation accrue des armées de Baoding sous son commandement, ainsi que les résultats mitigés en matière militaire et civile, ont provoqué des fractures au sein du département, comme l'a montré de manière flagrante la rébellion du Département des Officiers au début de la Guerre du Sichuan central à la fin de 1929. Même au sein des échelons supérieurs de cette clique, Liu, Deng et Tian ont parfois des divergences sur des questions de gouvernance et d'allégeance, bien que les conflits majeurs aient généralement été évités grâce à la présence unificatrice du Bureau conjoint des Trois Armées, désormais stationné à Ya'an sous l'égide du général Xiang Chuanyi.\n\nGénéralement plus pragmatique, si la province devait retomber dans une guerre totale comme cela a souvent été le cas dans le passé, le soutien du département de Baoding pourrait être un facteur crucial pour déterminer le vainqueur, même s'il devait s'emparer de la couronne pour lui-même.§!\n"
 SZC_authoritarian_democrat_party:9 "Département accéléré"
 SZC_authoritarian_democrat_party_long:9 "Département accéléré (Sucheng Xi)\n§LLe noyau du Département accéléré a été formé au sein du corps "Bianmu" de l'Armée du Sichuan et de l'Académie militaire accélérée du Sichuan, fondée en 1909 par les gouverneurs Xiliang et Zhao Erxun, avec des généraux qui ont gravi les échelons jusqu'à occuper des postes importants au niveau provincial après la Révolution Xinhai. Après l'effondrement de l'autorité centrale dans le Sichuan, le Département accéléré a renforcé sa base de pouvoir grâce à deux acteurs clés de la politique sichuanaise, Yang Sen et Liu Xiang.\n\nYang Sen et sa clique ont gravi les échelons de diverses autres armées à travers le Sichuan au début des années 1920, finissant par devenir suffisamment puissants pour revendiquer leur place dans la mêlée des seigneurs de la guerre du Sichuan, bien qu'ils aient connu des revers dans le maintien de leurs possessions en raison des fluctuations du pouvoir de Yang. La faction de Yang au sein du Département accéléré entretenait également des liens étroits avec Wu Peifu et la clique du Zhili. Yang fut autorisé à renforcer ses positions dans l'ouest du Hubei avec la permission du Maréchal de Jade, qui l'aida à revenir lors des Guerres d'Unification du Sichuan de 1924, qui se soldèrent par un échec, et lors du retour triomphal de Yang dans la province en 1926.\n\nRivalisant avec son pair, Liu Xiang allait devenir l'une des figures principales de l'expulsion du contrôle des Yunnanais du Sichuan tout au long de l'ère des seigneurs de la guerre, utilisant son sens politique pour monter ses ennemis les uns contre les autres et s'élever dans le processus. À la tête de l'une des armées les plus redoutables de la province et contrôlant Chongqing, Liu a tiré parti de son contrôle du fleuve Yangtsé, de ses relations avec son oncle Liu Wenhui et des traités conclus avec le maréchal Sun Chuanfang pour s'imposer comme l'un des plus grands rivaux potentiels du gouverneur Yang.\n\nEn raison de la nature fluctuante de la politique du Sichuan, Yang et Liu ont collaboré à de nombreuses reprises, signant la Convention de Bingyin en 1926 ainsi qu'une autre trêve après la Guerre du Sichuan central. Cependant, au cours des dernières années, les tensions ont repris dans le Département accéléré, et le vieil adage n'a jamais été aussi vrai : gardez vos amis près de vous, et vos ennemis encore plus près.§!\n"
 SZC_paternal_autocrat_party:0 "Département de l'Armement"
 SZC_paternal_autocrat_party_long:9 "Département de l'Armement (Wubei xi)\n§LIssu du mouvement de réarmement du Sichuan à la fin de la dynastie Qing, le Département de l'Armement reste la plus ancienne des cliques du Sichuan, composée principalement de hauts responsables militaires diplômés de l'Académie de l'Armement du Sichuan fondée en 1902. Après la prise de contrôle de la province intérieure par Hu Jingyi et Yin Changheng en 1911, l'influence du Département de l'Armement ne fit que croître, tous les échelons du commandement du Sichuan étant pourvus de diplômés et d'anciens élèves de l'Académie de l'Armement. Sous le règne de Yuan Shikai, le Département de l'Armement se divisa en deux factions : celle des loyalistes de Hu Jingyi et celle de l'Armée de Protection de la Nation du Sichuan de Liu Cunhou. Cependant, Hu ayant été muté à Beijing et son successeur Chen Huan ayant déclaré l'indépendance de la province, le nouveau gouverneur de jure Luo Peijin n'avait que peu d'influence sur les affaires provinciales, ce qui entraîna son éviction par Liu Cunhou.\n\nLiu resta à la tête du Département de l'Armement pendant les années qui suivirent, menant des campagnes contre les forces extra-provinciales du Yunnan et du Guizhou, l'armée de Xiong Kewu et les bandits, tout en prenant divers partis dans les querelles militaristes qui agitèrent le Sichuan pendant des décennies, étant tour à tour au pouvoir puis écarté. Il fut finalement nommé par les Zhili à la tête du Bureau de supervision de la défense frontalière du Sichuan-Shaanxi en 1924, obtenant ainsi la juridiction sur le nord-est du Sichuan.\n\nLe "Général à la Peau dure" (comme on allait le surnommer en raison de son caractère obstiné et tenace) passa la majeure partie de la fin des années 1920 et du début des années 1930 à coopérer avec la noblesse locale, à s'allier avec d'autres régionalistes et à mettre en place un nouveau corps d'officiers d'armement avec des personnalités telles que Liao Zhen et Liu Bangjun. Parallèlement, Liu Cunhou s'occupait de réprimer le mouvement socialiste agraire naissant dans l'est du Sichuan, avec un succès limité.§!\n"
 SZC_national_populist_party:0 "PJC"
 SZC_national_populist_party_long:9 "Parti Jeune Chine (Zhongguo Qingniandang)\n§LNé de la "Société Jeune Chine" étudiante, le Parti Jeune Chine se divisa en factions "nationalistes", "socialistes" et "idéalistes", dirigées respectivement par Zeng Qi et Li Huang, Li Dazhao et Wang Guangqi. Lors de leurs voyages d'études en France, Zeng Qi et Li Huang, ainsi que les autres membres de leur faction nationaliste, se disputaient avec d'autres étudiants français tels que Zhou Enlai, Cai Yuanpei et Li Shizeng.\n\nDevenues parfois violentes, les manifestations de soutien au Parti syndicaliste chinois amenèrent Zeng et Li à former leur propre parti, annonçant la création du Parti Jeune Chine en 1923, en dehors de Paris. Se développant rapidement parmi les organisations étudiantes chinoises, le Parti Jeune Chine s'opposa concrètement à la coopération du Kuomintang avec le PSC, et le PJC revint à Shanghai en fondant une série de sociétés politiques et de journaux en 1924.\n\nPlusieurs hauts représentants du PJC étant originaires du Sichuan, le parti bénéficie d'une base populaire solide et bien établie parmi la coalition des seigneurs de la guerre et des institutions civiles. Les sections du PJC dans le Sichuan ont notamment gagné le plus de terrain pendant l'entre-deux-guerres, offrant aux seigneurs de la guerre du bassin une plateforme politique qui leur permet de maintenir une parité idéologique avec les systèmes des armées du parti KMT. Les fonctionnaires du PJC sont profondément implantés dans les réseaux de la noblesse et le haut commandement militaire de Yang Sen, Liu Cunhou, Liu Xiang et la plupart du Département de Baoding, où ils ont trouvé un refuge. Bien que Yang Shuming soit le chef de la branche provinciale du PJC du Sichuan, le principal dirigeant de la région est Liu Siying, un leader radical du PJC qui vise à mettre en œuvre les plans nationalistes de Zeng Qi. Aux côtés des armées des seigneurs de la guerre, Yang et Liu s'efforcent de concrétiser la vision du Parti de la jeunesse chinoise.§!\n"

