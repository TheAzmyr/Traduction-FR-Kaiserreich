 ###Federalist Parties
 #统一建国同志会
 SZC_CDL_ncra:9 "LDC-ARNS"
 SZC_CDL_ncra_long:9 "$SZC_CDL_ncra_long_tt$\n§L$GXC_CDL_intro$\n\nForce politique montante liée à un titan de la politique du Sichuan, l'Association de Recherche du Nouveau Siècle, fondée par Zhou Taixuan et désormais dirigée par Zhang Lan, a été un point de ralliement pour tous les progressistes, les nouveaux fédéralistes et les socialistes. Issue d'une coalition informelle entre les plus proches collaborateurs de Zhang Lan lors de son mandat à la tête du comté de Nanchong au début des années 1920 et de sa direction de l'Association pour la Construction rurale du Sichuan en 1927, l'ARNS est la dernière incarnation de la coalition politique de Zhang à l'approche de la réunification de la Chine.\n\nS'appuyant sur la Charte d'autonomie provisoire du comté de Nanchong et sur les premières années de coopération de Zhang avec des républicains de toutes tendances, les politiques de l'ARNS sont axées sur l'autonomie industrielle et la réorientation de l'éducation pour y parvenir, même si beaucoup restent méfiants face à la tendance de plus en plus gauchiste du nouvel appareil politique de Zhang.§!\n"
 SZC_CDL_ncra_long_tt:9 "Ligue démocratique de Chine - Association de Recherche du Nouveau Siècle (Zhongguo Minzhu Tongmeng Xīn shiji xuehui)"

 #聯省自治籌備處
 SZC_Provincial_Federal_Autonomy_party:9 "BPAFP"
 SZC_Provincial_Federal_Autonomy_party_long:9 "$SZC_Provincial_Federal_Autonomy_party_long_tt$\n§LAprès avoir été confinés pendant près d'une décennie dans la province du Guizhou, administrée par le Hunan, Xiong Kewu et son Régiment des Neuf Hommes se sont vu confier une nouvelle mission, non seulement sur le champ de bataille, mais aussi par le peuple du Sichuan qui aspire au changement.\n\nAfin de consolider et d'organiser une gouvernance plus formelle, Xiong a créé le Bureau préparatoire de l'Autonomie fédérale provinciale (BPAFP) pour commencer à répondre aux préoccupations et aux plaintes de la province après la récente cessation et la stabilisation de la province la plus fracturée de Chine. Le BPAFP a jusqu'à présent réussi à intégrer de nouveaux intellectuels dans ses rangs et ses membres ont activement communiqué les objectifs du fédéralisme aux masses. En termes de style administratif, cependant, Xiong et ses hommes se sont également inspirés en partie de ce qu'ils ont observé à l'Assemblée du Hunan de Zhao Hengti lors de leurs brefs séjours là-bas en 1924 et à nouveau en 1928, se faisant bien voir de la noblesse conservatrice locale et des milieux d'affaires tout en prenant soin de ne pas s'aliéner les agriculteurs et les ouvriers qui constituent la majorité de la population du Sichuan.\n\nQuoi qu'il en soit, le BPAFP reste vigilant face aux principales menaces qui pèsent sur le Sichuan, à savoir le banditisme, la pénurie de ressources et les intrigues incessantes des petits seigneurs de la guerre, qui sont autant de sources fréquentes de mécontentement social susceptibles de ternir l'image de Xiong auprès du public.§!\n"
 SZC_Provincial_Federal_Autonomy_party_long_tt:9 "Bureau préparatoire de l'Autonomie fédérale provinciale (Liansheng Zizhi Choubei Chu)"

 #公益协进社
 SZC_Public_Welfare_Society:0 "SPB"
 SZC_Public_Welfare_Society_long:9 "$SZC_Public_Welfare_Society_long_tt$\n§LBasée dans le comté de Dayi, la Société publique de Bienfaisance, dirigée par Liu Wencai, le frère de Liu Wenhui, est devenue une institution très controversée. Officiellement créée comme une organisation philanthropique et caritative, la SPB est au contraire devenue tristement célèbre dans tout le Sichuan comme une couverture pour les vastes réseaux de patronage provinciaux, les sociétés secrètes fraternelles, divers chefs de bandits et propriétaires terriens ruraux intrigants. Liu Wencai lui-même est devenu célèbre en tant que principal responsable de certains des pires excès de la société, non seulement en tant que propriétaire foncier impitoyable, mais aussi en extorquant et en taxant les civils pour tout, de la prostitution à la possession d'outils agricoles.\n\nLes autorités civiles de tout le Sichuan, en particulier celles des régions frontalières, se sont souvent retrouvées sous la coupe des membres de la SPB et de la milice rattachée à cet organisme. Les tribunaux locaux et les bureaux des impôts ont été exploités dans le seul but d'enrichir Liu Wencai et ses acolytes. Les relations de Liu avec les vestiges de la Chambre de commerce provinciale ont également aggravé l'influence de la SPB, les quelques marchands qui avaient utilisé leur intelligence et leurs ressources financières pour conclure des accords secrets avec les seigneurs de guerre locaux tombant désormais également sous l'autorité de Liu Wencai.\n\nLes tentatives de Liu Wenhui pour contrôler son frère jusqu'à présent ont été inefficaces, le SPB et ses relations au sein du Pao-Ge - le Gelaohui du Sichuan - continuant à éclipser les postes administratifs officiels dans le contrôle des activités économiques et locales.§!\n"
 SZC_Public_Welfare_Society_long_tt:9 "Société publique de Bienfaisance (Gongyi Xie Jin She)"

 #自治联合会
 SZC_gra_ufaa:9 "GAR-AUAF"
 SZC_gra_ufaa_long:9 "$SZC_gra_ufaa_long_tt$\n§L$GXC_GRA_intro$\n\nIssue des premiers mouvements et associations des années 1920 et 1930, au sein desquels divers intellectuels du Sichuan ont expérimenté l'Autonomie fédérale, l'Association unie pour l'Autonomie fédérale est le successeur naturel de ces groupes constitutionnalistes. À l'instar de nombreux alliés électoraux extraprovinciaux de la Grande Alliance républicaine, l'AUAF défend la rédaction de constitutions provinciales, la réorganisation de l'administration civile et une large démobilisation de l'armée nationale à l'issue de la plupart des combats qui ont ravagé la Chine.\n\nDirigée par Dan Maoxin, allié de longue date de Xiong depuis le retrait de ce dernier de la politique électorale, l'AUAF continue de promouvoir la cause fédéraliste, se distinguant de ses adversaires par sa plus grande disposition au compromis et à la conclusion d'alliances avec d'autres factions républicaines telles que les Indépendants de Beiyang ou les vestiges de la Clique des Sciences politiques. Malgré de légères divergences avec les éléments les plus progressistes de la Ligue démocratique de Chine, le dialogue entre ces deux blocs principaux est resté courtois et agréable, leurs membres ayant été unis dans la lutte contre le despotisme aux débuts du Fédéralisme sichuanais.§!\n"
 SZC_gra_ufaa_long_tt:9 "Grande Alliance républicaine - Association unie pour l'Autonomie fédérale (Gonghe Datongmeng Zizhi Lianhe Hui)"

 #民治竞进社
 SZC_gra_cgps:9 "GAR-SGPC"
 SZC_gra_cgps_long:9 "$SZC_gra_cgps_long_tt$\n§L$GXC_GRA_intro$\n\nAvec l'intégration de nombreuses figures clés du Département de Baoding du Sichuan et d'autres personnalités que beaucoup d'idéalistes du mouvement fédéraliste considéraient comme de simples opportunistes, ceux qui cherchaient à consolider leur position dans ce nouveau gouvernement se sont ralliés autour du général chevronné Liu Wenhui et de sa Société pour le Gouvernement et le Progrès civils. Composée des collègues militaristes de Liu, tels que Deng Xihou et Tian Songyao, ainsi que des camarades du général issus de sa propre famille et de ses réseaux de patronage, comme le tristement célèbre propriétaire foncier Liu Wencai, ces hommes sont tous ostensiblement membres pour des raisons d'autoprotection et ne s'intéressent guère, voire pas du tout, aux principes d'une véritable démocratie.\n\nÀ la surprise de nombre de ses détracteurs, Liu, à la tête de la SGPC, s'est efforcé de promouvoir des politiques d'administration novatrices et de nouvelles méthodes éducatives, mais ses efforts ont été constamment sapés et récupérés par nombre de ses alliés nominaux. Deng, en particulier, s'est montré de plus en plus virulent dans la défense de sa propre vision de la modernisation de la Chine, prônant une rhétorique populiste et l'importance d'une action décisive plutôt que les apparences d'un débat démocratique.§!\n"
 SZC_gra_cgps_long_tt:9 "Grande Alliance républicaine - Société pour le Gouvernement et le Progrès civils (Gonghe Datongmeng Minzhi Jingjinshe)"

 ###Zhili Exile Parties
 SZC_Zhili_Clique_Civilian_party: "Clique du Zhili"
 SZC_Zhili_Clique_Civilian_party_long:9 "$SZC_Zhili_Clique_Civilian_party_long_tt$\n§LLa Clique du Zhili trouve son origine dans l'ascension titanesque de Feng Guozhang. Elle se regroupe autour de lui et de sa présidence, où il prône l'unification par la négociation avec le Sud, par opposition à l'unification par la soumission prônée par le Premier ministre Duan Qirui. Après la mort de Feng en 1919, la clique de Zhili est divisée entre trois seigneurs de la guerre : Cao Kun, Wu Peifu et Wang Chengbin. Engagée dans des rivalités avec les cliques de Fengtian et d'Anhui, la clique de Zhili régnera en maître en 1922.\n\nDominant la République de Beiyang pendant des années, les Zhili connaîtront une chute vertigineuse après une guerre entre Qi Xieyuan et Lu Yongxiang qui se transformera en la deuxième guerre de ZhiFeng, au cours de laquelle Feng Yuxiang, membre des Zhili à l'époque, trahira la clique et lancera le coup d'État de Beijing en 1924, éjectant le président Cao et Wu Peifu. Bien qu'ils aient brièvement repris le pouvoir pendant un interrègne, il semblerait que les Zhili aient été éjectés des plaines centrales. Sans intervenir directement d'un côté ou de l'autre dans l'effondrement de la Ligue, les Zhili s'exposent à un coup d'État de la Cour royale détestée. Le chef principal et le chef secondaire de la clique des Zhili étant morts, c'est au chef tertiaire, le maréchal Wang Chengbin, qu'il incombera de battre en retraite dans la province du Sichuan.\n\nEn négociant un accord avec Yang Sen, le reste de la clique Zhili a vu son réseau de mécènes sévèrement réduit, et beaucoup sont morts dans les combats des plaines centrales. Désormais réuni autour du diplomate Yan Huiqing, cet homme intelligent et curieux s'est révélé être un point de ralliement capable d'offrir à la bureaucratie civile une alternative viable à la domination des militaristes de Wang. Unis, les civils espèrent voir un Beiyang réformé, afin d'éviter qu'une telle calamité ne se reproduise.§!\n"
 SZC_Zhili_Clique_Civilian_party_long_tt: "Clique du Zhili (Aile Civile) (Beijing Zhixi (Wenguan Pai))"
 SZC_Zhili_Clique_Military_party: "Clique du Zhili"
 SZC_Zhili_Clique_Military_party_long:9 "$SZC_Zhili_Clique_Military_party_long_tt$\n§LLa Clique du Zhili trouve son origine dans l'ascension titanesque de Feng Guozhang. Elle se regroupe autour de lui et de sa présidence, où il prône l'unification par la négociation avec le Sud, par opposition à l'unification par la soumission prônée par le Premier ministre Duan Qirui. Après la mort de Feng en 1919, la clique de Zhili est divisée entre trois seigneurs de la guerre : Cao Kun, Wu Peifu et Wang Chengbin. Engagée dans des rivalités avec les cliques de Fengtian et d'Anhui, la clique de Zhili régnera en maître en 1922.\n\nDominant la République de Beiyang pendant des années, les Zhili connaîtront une chute vertigineuse après une guerre entre Qi Xieyuan et Lu Yongxiang qui se transformera en la deuxième guerre de ZhiFeng, au cours de laquelle Feng Yuxiang, membre des Zhili à l'époque, trahira la clique et lancera le coup d'État de Beijing en 1924, éjectant le président Cao et Wu Peifu. Bien qu'ils aient brièvement repris le pouvoir pendant un interrègne, il semblerait que les Zhili aient été éjectés des plaines centrales. Sans intervenir directement d'un côté ou de l'autre dans l'effondrement de la Ligue, les Zhili s'exposent à un coup d'État de la Cour royale détestée. Le chef principal et le chef secondaire de la clique des Zhili étant morts, c'est au chef tertiaire, le maréchal Wang Chengbin, qu'il incombera de battre en retraite dans la province du Sichuan.\n\nEn négociant un accord avec Yang Sen, le reste de la clique Zhili a vu son réseau de mécènes sévèrement réduit, et beaucoup sont morts dans les combats des plaines centrales. Désormais regroupée autour du maréchal Wang, la colonne vertébrale militaire de la clique de Zhili est prête à reprendre les terres qui lui reviennent de droit et à restaurer la primauté de la République de Beiyang.§!\n"
 SZC_Zhili_Clique_Military_party_long_tt: "Clique du Zhili (Aile Militaire) (Beijing Zhixi (Junren Pai))"

### Ideas ###
 SZC_baoding_influence: "Influence de Baoding"
 SZC_baoding_influence_desc:9 "Le département de Baoding gère une quantité importante de travail au sein du gouvernement et l'influence qu'il détient diminue considérablement notre légitimité. Malgré cela, leurs efforts supplémentaires dans nos rangs nous aident à faire en sorte que le baril de poudre du Sichuan n'explose pas."

 SZC_internal_divisions: "Divisions internes"
 SZC_internal_divisions_desc:9 "Au cours de la dernière décennie, les divisions internes au sein de la Clique du Sichuan ont légèrement diminué, mais le problème persiste. Le très influent Département de Baoding, la puissante faction dirigée par Liu Xiang au sein du Département accéléré et le jeune Département des Officiers ont tous préparé le terrain pour un effondrement imminent de la province au moindre bouleversement du pouvoir."

 SZC_looming_agricultural_crisis: "Crise Agricole Imminente"
 SZC_looming_agricultural_crisis_desc:0 "La production d'opium est devenue extrêmement répandue dans le Sichuan, étant l'une des rares cultures rentables en raison de l'isolement économique de la province. En conséquence, la production de céréales et de riz dans la province a été réduite à un niveau critique, une situation aggravée par l'instabilité et l'incompétence de la gouvernance des trois dernières décennies. Le Sichuan est au bord d'une famine à grande échelle, et une catastrophe naturelle s'est produite"

 SZC_civil_war_idea: "Guerre Civile !"
 SZC_aftermath_of_the_civil_war: "Conséquences de la Guerre Civile"

 SZC_major_famine:0 "Famine majeure"
 SZC_major_famine_desc: "La sécheresse, les terres arables consacrées à la culture de l'opium et la guerre civile ont provoqué une famine dans la province du Sichuan. Tout comme la famine de 1925, les effets sur la population du Sichuan sont dévastateurs. L'État sera partiellement paralysé jusqu'à ce qu'il parvienne à résoudre cette crise urgente."

