 KOR_revolution_tt:9 "§tAprès des décennies de répression, le peuple coréen s'est levé. Notre indépendance étant assurée, notre nation sera reforgée dans les flammes de la révolution !§!"
 KOR_socialist_republic_tt:9 "§tNotre Révolution est destinée à nous faire marcher glorieusement vers l'utopie. Pour le Parti et la Nation !§!"
 KOR_germany_tt:9 "Bonus d'attaque contre l'§HAllemagne et ses colonies§! : [?0.10|+=%1]"
 KOR_china_check_tt:9 "§LLa Corée est sous le contrôle du §aParti national§! §Rrévolutionnaire coréen§!.§!"
