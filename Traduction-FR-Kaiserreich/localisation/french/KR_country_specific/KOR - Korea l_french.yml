 KOR_never_another_occupation_tt:9 "§aL'indépendance coréenne a été accomplie après des décennies d'oppression. Plus jamais nous ne serons les sujets d'une nation étrangère !§!"
 KOR_stabilising_the_new_regime_tt:9 "§LLe Président a guidé notre nation vers le pinacle de sa puissance. La Corée connaît la grandeur !§!"
