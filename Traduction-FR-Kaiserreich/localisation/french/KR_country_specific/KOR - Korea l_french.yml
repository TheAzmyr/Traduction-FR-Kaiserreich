 KOR_yi_kang: "Yi Kang"
 KOR_yi_kang_leader_desc:9 "§YNaissance :§! §L30 mars 1877, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LCinquième fils de Gojong par sa concubine Dame Jang, Yi Kang devint prince Uihwa en 1892. Après avoir épousé Kim Deoksu, le prince fut victime de procès et de dettes. En 1895, il devint ambassadeur spécial de la Corée au Japon pour participer aux célébrations de la victoire japonaise sur les Chinois lors de la Première Guerre sino-japonaise. N'ayant pas d'enjeu propre, il servit d'ambassadeur auprès des pays européens et des États-Unis, bien que son style de vie de playboy et ses dépenses somptuaires suscitèrent l'antagonisme du gouvernement coréen. Il participa à la Croix-Rouge coréenne de 1906 à 1907. Cependant, lorsque son père abdiqua, son demi-frère, le prince Yi Un, devint prince héritier en raison de l'aversion de son père à son égard.\n\nAprès l'annexion de la Corée par le Japon en 1910, Yi Kang fut de plus en plus mécontent de son statut, bien qu'il reçoive une généreuse allocation annuelle. Lorsqu'il apprit la création du Gouvernement provisoire de la République de Corée en 1928, il tenta de fuir la Corée pour rejoindre les exilés. Sa fuite fut un échec et, malgré les efforts de Yi Kang pour lui retirer ses titres, il resta prisonnier politique à Séoul. En 1930, il prit officiellement sa retraite. Malgré tout, son désir ardent de voir la Corée indépendante ne s'est jamais estompé ; il a fait remarquer un jour qu'il préférait être un paysan dans une Corée indépendante plutôt qu'un noble sous la domination japonaise.\n\nLorsque la Corée a été libérée après plusieurs décennies d'asservissement, Yi Kang a enfin pu rencontrer le Gouvernement provisoire qui était en exil depuis si longtemps. Afin d'honorer la préférence des libérateurs de la Corée pour la monarchie et de reconnaître leur nouvelle relation, Yi Kang a été déclaré à la quasi-unanimité empereur d'un Empire de Corée renaissant, écartant ainsi son frère, le prince héritier Yi Un, qui avait collaboré avec les Japonais. Il porte désormais la responsabilité de perpétuer le glorieux héritage de l'Empire de Corée sous la bannière d'une Corée nouvellement libérée.§!"

 KOR_kim_hong_il: "Kim Hong-il"
 KOR_kim_hong_il_high_command_desc:9 "§YNaissance :§! §L23 septembre 1898, à Yongcheon, province de Pyongan-Nord, Empire de Corée§!\n§YCarrière :§! §LL'enfance de Kim Hong-il fut secouée par des coups de canon lorsque la Guerre russo-japonaise commença dans son village natal. La guerre se termina vite et l'Empire de Corée s'effondra peu après sous la botte japonaise. Kim, ayant connu les horreurs de la guerre et la chute de sa nation très jeune, commença sa lutte pour son pays. Après une jeunesse turbulente passée à voyager entre la Corée et la Chine, et s'étant finalement établi comme enseignant, la police japonaise retrouva sa trace. Il s'enfuit ensuite vers la Mandchourie, où son frère possédait une entreprise. En 1918, Kim se trouvait à Shanghai, où il rencontra Huang Je, un autre partisan anti-japonais, qui aida Kim à s'enrôler comme cadet à l'Académie militaire du Guizhou. Kim, qui commença son éducation en ne plaçant pas son arme correctement, fut placé sous le tutorat spécial de He Yingqin, qui lui enseigna bien, à tel point qu'il fut diplômé avec les honneurs. Après cela, Kim se rendit à Shanghai à la recherche du Gouvernement provisoire de la République de Corée mais fut dégoûté par ses querelles internes déclenchées par le renvoi récent de Syngman Rhee. Plus tard, Kim eut une carrière de mercenaire et d'éducateur, entre la Chine, la Mandchourie et l'Extrême-Orient russe.\n\nEn se rendant à un enterrement, Kim rencontra le Dr Sun Yat-sen, qui encouragea grandement sa cause pour l'indépendance. Au début de l'Expédition du Nord, Kim rejoignit le Kuomintang et commença son service comme adjudant de son ancien mentor He Yingqin. Pendant l'expédition, Kim persuada les pilotes coréens des armées du Zhili à rejoindre la cause du KMT. A la fin de l'Expédition du Nord, il monta en grade pour devenir général, même si la chute du KMT rendit ce succès inutile. Kim suivit He au Guizhou puis au Yunnan, où il devint membre des vestiges de l'ANR loyale à Zhu Peide. En 1931, Kim rétablit le contact avec le bureau du Gouvernement provisoire coréen à Shanghai et devint un des chefs de l'Armée de Libération coréenne tout en devenant l'un des contacts du GPRC.§!\n\n§YNotes : En tant qu'ami proche de He Yingqin, il est associé au Kuomintang et à l'aile droite du mouvement pour l'indépendance de la Corée.§!"

 KOR_kim_kyu_sik:9 "Kim Kyu-sik"
 KOR_kim_kyu_sik_leader_desc:9 "§YNaissance :§! §L29 janvier 1881, à Busan, province de Gyeongsang, Corée§!\n§YCarrière :§! §LEnvoyé dès son plus jeune âge dans un orphelinat dirigé par le missionnaire américain Horace Grant Underwood, Kim Kyu-sik passa sa jeunesse à étudier le christianisme et l'anglais. Avec le soutien d'Underwood, Kim partit pour les États-Unis en 1896, où, contrairement à la Corée, il ne fut pas rejeté en raison de ses origines. Après ses études aux États-Unis, il obtint une licence au Roanoke College en 1903, puis une maîtrise en littérature anglaise à l'université de Princeton l'année suivante. Lorsque la guerre russo-japonaise éclata, Kim retourna en Corée et rejoignit Underwood, devenant son secrétaire et enseignant au YMCA local.\n\nAprès l'Incident des 105 Hommes de 1911, au cours duquel les Japonais arrêtèrent des militants indépendantistes coréens, dont beaucoup étaient chrétiens, Kim s’enfuit en Chine au début de l’année 1913. Outre ses efforts pour lever des fonds en faveur du mouvement indépendantiste coréen, Kim se lia d’amitié avec des révolutionnaires chinois tels que le Dr Sun Yat-sen. Lorsque l'Expédition du Nord du Kuomintang échoua, Kim suivit le KMT en exil à Paris.  En 1932, Kim participa à la formation du Parti national révolutionnaire coréen, dont il dirige la faction de droite.\n\nAvec la libération de la Corée sous l’aile droite du Kuomintang, Kim a été choisi pour diriger la nouvelle république-sœur coréenne. En tant que disciple de Sun Yat-sen, Kim a l’intention de refonder la jeune nation, en unissant tous les Coréens sous la bannière de la Révolution nationale.§!"
 KOR_kim_kyu_sik_sic_desc:9 "§YNaissance :§! §L29 janvier 1881, à Busan, province de Gyeongsang, Corée§!"

 KOR_lee_beom_seok: "Lee Beom-seok"
 KOR_lee_beom_seok_desc_body:9 "Descendant de la famille royale de Joseon et fils d’un fonctionnaire, le jeune Lee Beom-seok était un garçon brillant mais souvent espiègle. Au-delà de ses espiègleries, il nourrit bientôt un désir de vengeance contre les occupants japonais en Corée lorsque Jeong Tae-gyu, un nobi affranchi qui s’était occupé de lui, fut assassiné alors qu’il s’opposait à la dissolution de l'Armée coréenne à la suite du Traité nippo-coréen de 1907. Pendant ses études au lycée de Gyeongseong, Lee avait de mauvaises notes et des relations encore pires avec ses camarades japonais et son professeur. Avec des perspectives d'avenir de plus en plus sombres et une flamme grandissante en lui qui le poussait à lutter contre les Japonais, il s'exila en Chine avec l'aide de Lyuh Woon-hyung et rejoignit la diaspora coréenne à Shanghai.\n\nEn exil, Lee rencontra le Dr Sun Yat-sen, qui le recommanda pour entrer à l'Académie militaire du Yunnan. Diplômé en 1919, il devint instructeur à l'Académie militaire du Yunnan avant de retourner à Shanghai pour rejoindre l'Armée de Libération coréenne en 1925. Ayant été témoin de l'effondrement de l'Expédition du Nord du Kuomintang et de l'échec du Soulèvement de Shanghai de 1932, Lee se méfiait de plus en plus des éléments de gauche. Avec le temps, il devint un grand admirateur du Premier ministre roumain Corneliu Zelea Codreanu et du mouvement savinkoviste russe, qu'il considérait comme une source d'inspiration pour une Corée forte et sans classes."
 KOR_lee_beom_seok_commander_desc:9 "§YNaissance :§! §L20 octobre 1900, à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière :§! §L$KOR_lee_beom_seok_desc_body$§!"
 KOR_lee_beom_seok_leader_desc:9 "§YNaissance : §!§L20 octobre 1900 à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière : §!§L$KOR_lee_beom_seok_desc_body$\n\nL'indépendance enfin acquise, Lee Beom-seok rentre chez lui, dans une Corée libre. Sa méfiance à l'égard des éléments de gauche au sein du KIP a conduit à la popularité de ses partisans, les Ilministes, qui prônent le "principe d'un seul peuple" pour la nation coréenne. Ils croient à la révolution et à la mobilisation de la Corée pour en faire une société militarisée, monoethnique et sans classe, et vouent une vénération extrême à Kim Koo, la figure de proue de la nation.§!"
 KOR_lee_beom_seok_sic_desc:9 "§YNaissance :§! §L20 octobre 1900, à Hanseong, province de Gyeonggi, Empire de Corée§!"

 KOR_syngman_rhee:9 "Syngman Rhee"
 KOR_syngman_rhee_leader_desc:9 "§YNaissance :§! §L26 mars 1875, à Pyeongsan, province de Hwanghae, Corée§!\n§YCarrière :§! §LIssu d'une famille modeste de la campagne coréenne, Syngman Rhee s'engagea dans le mouvement d'indépendance coréen après avoir été impliqué dans un complot de vengeance à la suite de l'assassinat de la reine Min. Après plusieurs années passées à organiser des mouvements populaires, il fut arrêté en 1899 et torturé pendant sa détention, avant d'être libéré en 1904, au début de la Guerre russo-japonaise. Par la suite, Rhee s'installa aux États-Unis, où il étudia à Princeton et à Harvard au cours des années suivantes, tout en poursuivant ses efforts en faveur de l'indépendance coréenne.\n\nAlors que les troubles s'étendaient en 1925 avec l'effondrement de l'Empire britannique et les manifestations du 30 mai qui balayèrent l'est de la Chine, les militants pour l'indépendance coréenne se mobilisèrent et fondèrent le Gouvernement provisoire de la République de Corée à Shanghai, élisant Syngman Rhee à sa tête. En tant que président, il adressa une pétition aux délégués américains lors de la Conférence de Shanghai de 1928, dans l'espoir d'obtenir un soutien politique pour l'indépendance de la Corée. Ce plan échoua cependant, remettant en cause le leadership de Rhee, ce qui conduisit à son éviction par Kim Koo et à la reprise de son exil aux États-Unis.\n\nÀ la suite de l'occupation américaine de la Corée, Rhee est finalement revenu dans son pays natal après des décennies d'exil, déjouant toutes les prévisions et devenant le chef d'un nouveau gouvernement coréen. Bien que certains se soient rangés à son avis et aient soutenu son accession au pouvoir, nombreux sont ceux qui restent sur leurs gardes, alors que Rhee s'emploie à consolider son pouvoir par tous les moyens nécessaires.§!"

 KOR_lee_gap_seong:9 "Lee Gap-seong"
 KOR_lee_gap_seong_sic_desc:9 "§YNaissance :§! §L23 octobre 1889, à Daegu, province de Gyeongsang, Corée§!"

 KOR_ji_cheong_cheon: "Ji Cheong-cheon"
 KOR_ji_cheong_cheon_desc_body:9 "Diplômé de l'Académie Pai Chai en 1906, Ji entra à l'Académie militaire de l'Empire de Corée alors que le pays était au bord de l'annexion par le Japon. En 1909, le résident général japonais supprima l'armée coréenne, ainsi que l'académie. Ji finit par intégrer l'Académie de l'Armée impériale japonaise, dont il sortit diplômé en 1914. En 1919, Ji déserta l'armée japonaise et s'exila en Mandchourie, où il devint instructeur à l'Académie militaire de Sinhŭng, un centre de formation pour les combattants de l'indépendance coréenne créé en 1911.\n\nEn 1921, à la suite d’une bataille victorieuse entre les unités coréennes et japonaises à Qingshanli, Ji ferma l’académie et conduisit ses troupes à Gando pour éviter des représailles à grande échelle des Japonais contre les Coréens. Lorsque le Gouvernement provisoire coréen fut établi à Shanghai en 1925, Ji contribua à la création de l'Armée de Libération coréenne, qui en constituait la branche militaire. Bien qu'il fût initialement membre du Parti pour l'Indépendance de la Corée, des dissensions entre lui et la faction de Kim Koo l'amenèrent à quitter le parti et à former le Nouveau Parti pour l'Indépendance de la Corée."
 KOR_ji_cheong_cheon_army_chief_desc:9 "§YNaissance :§! §L25 janvier 1888, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §L$KOR_ji_cheong_cheon_desc_body$§!"
 KOR_ji_cheong_cheon_leader_desc:9 "§YNaissance :§! §L25 janvier 1888, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §L$KOR_ji_cheong_cheon_desc_body$\n\nAprès avoir passé des années à combattre et à organiser la résistance contre le Japon, Ji se retrouve aujourd’hui à la tête d’une Corée nouvellement indépendante. S’inspirant vaguement de l’aile droite du Kuomintang, Ji a transformé son NPIC en Parti nationaliste coréen, une nouvelle force politique déterminée à reconstruire la Corée en mettant pleinement en œuvre la doctrine Sanmin.§!"

 KOR_yeom_dong_jin:9 "Yeom Dong-jin"
 KOR_yeom_dong_jin_bio:9 "On ne sait pas grand-chose de Yeom Dong-jin ou de son enfance, à part son diplôme de l'école primaire de Chunghwa puis son inscription à l'école de commerce de Séoul en 1926. Diplômé en 1931 à l'âge de 22 ans, Yeom décida de se dévouer à la cause de l'indépendance coréenne et s'exila en Chine. A Shanghai, il rejoignit l'Armée de Libération coréenne en tant que jeune cadet.\n\nMembre de la faction de Ji Cheong-cheon au sein du Gouvernement provisoire coréen, Yeom s'est aligné sur l'adhésion de Ji aux Trois Principes du Peuple du Dr Sun Yat-sen. A cette époque, Yeom n'avait que du mépris pour les éléments socialistes du mouvement indépendantiste coréen, tout spécialement le Parti national révolutionnaire coréen et sa direction, pour avoir fui à Paris.\n\nLa Corée étant libérée de l'occupation japonaise, Yeom est revenu en Corée et a fondé la Société des Chemises blanches, une société militante ultranationaliste inspirée par la Société des Chemises bleues en Chine."
 KOR_yeom_dong_jin_leader_desc:9 "§YNaissance :§! §L14 février 1909, à Pyongyang, province de Pyongan-Sud, Empire de Corée§!\n§YCarrière :§! §L$KOR_yeom_dong_jin_bio$ Désormais à la tête du pays, Yeom cherche à reconstruire la nation coréenne, libérée de la pourriture socialiste et purgée de ses traîtres.§!"
 KOR_yeom_dong_jin_commander_desc:9 "§YNaissance :§! §L14 février 1909, à Pyongyang, province de Pyongan-Sud, Empire de Corée§!\n§YCarrière :§! §L$KOR_yeom_dong_jin_bio$§!"

 KOR_yu_chin_san:9 "Yu Chin-san"
 KOR_yu_chin_san_sic_desc:9 "§YNaissance :§! §L18 octobre 1905, comté de Jinsan, province de Jeolla-Nord, Empire de Corée§!"

 KOR_kim_wonbong: "Kim Wonbong"
 KOR_kim_wonbong_commander_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongnam-Sud, Empire de Corée§!\n§YCarrière :§! §LAprès avoir mis sur pied le "Corps héroïque" coréen au Fengtian, Kim Wonbong mena de multiples attaques contre le personnel et les avant-postes japonais dans le cadre de la lutte acharnée pour l'indépendance de la Corée. Inspiré par le Gouvernement nationaliste chinois établi à Guangzhou, Kim s'inscrivit à l'Académie militaire de Whampoa en janvier 1926 afin de former une véritable armée capable de lutter contre les Japonais. L'expédition ayant échoué, Kim parcourut la Chine continentale pour aider les mouvements socialistes et nationalistes coréens à s'organiser. Après s'être dissocié de la Troisième Internationale en 1931, Kim a contacté ses anciens amis à Whampoa pour se réintégrer en tant qu'officier associé du Kuomintang. À ce titre, il a décidé de s'intégrer pleinement, avec les vestiges du Corps héroïque, au sein du KMT de Gauche, qui allait mettre à profit son expertise en matière d'espionnage acquise lors de sa lutte pour l'indépendance coréenne tout en lui donnant accès à une formation complémentaire pour les cadets coréens. En 1932, Kim organisa le Parti national révolutionnaire coréen, qui servait d'organisation sœur au KMT au sein du Gouvernement provisoire coréen, lui-même largement associé au KMT, et d'opposition à son parti au pouvoir, le Parti pour l'Indépendance de la Corée.§!\n\n§YNotes : Connecté à presque toutes les factions au sein du KMT, et pour respecter sa position comme partenaire pragmatique, Kim Wonbong est resté en dehors de la politique interne des partis.§!"
 KOR_kim_wonbong_leader_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!\n§YCarrière :§! §LAprès s'être dissocié de la Troisième Internationale en 1931, Kim contacta ses vieux amis de Whampoa pour se réinsérer en tant qu'officier associé du Kuomintang, puis s'intégra pleinement, avec les restes du Corps héroïque, dans le KMT de Gauche, qui mit à profit son expertise en matière d'espionnage acquise au service d'armées vertueuses, tout en ayant accès à la formation continue des cadets coréens. En 1932, Kim créa le Parti national révolutionnaire coréen, qui était l'organisation sœur du KMT au sein du gouvernement provisoire coréen, lui aussi largement associé au KMT, et qui constituait l'opposition au parti au pouvoir, le Parti pour l'Indépendance de la Corée.\n\nUne vie d'exil n'a guère empêché le révolutionnaire coréen patriote Kim Wonbong de voir la résurrection d'une nation coréenne de son vivant. Il s'est révélé être un dirigeant énergique et passionné, comme en témoignent son leadership et son courage au sein de l'Armée nationale révolutionnaire lors de la Seconde Expédition du Nord et de la guerre contre le Japon. Bien que le chemin vers une Corée socialiste et nationaliste reste à parcourir, Wonbong a finalement réalisé le rêve de voir son pays libéré et libre de son vivant.§!"
 KOR_kim_wonbong_sic_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!"

 KOR_yoon_se_ju:9 "Yoon Se-ju"
 KOR_yoon_se_ju_sic_desc:9 "§YNaissance :§! §L24 juin 1901, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!"

 KOR_pak_hon_yong: "Pak Hon-yong"
 KOR_pak_hon_yong_leader_desc:9 "§YNaissance : §!§L28 mai 1900 à Yesan, province de Chungcheong du Sud, Empire de Corée§!\n§YCarrière : §!§LPak Hon-yong, fils illégitime d'un père Yangban, se rend à Séoul pour y faire des études et s'affilie à la pensée nationaliste. Contraint à l'exil et fidèle à une nation sans État, Pak se rend à l'étranger pour y trouver refuge. Il s'installe en Europe et se lie idéologiquement à la montée du syndicalisme en France, en Italie et en Grande-Bretagne. Profondément marqué par les révolutions dont il est témoin, Pak est l'un des premiers Coréens à s'affilier à la Troisième Internationale et retourne en Corée en tant qu'agent secret pour répandre les idéaux syndicalistes dans la péninsule occupée par les Japonais. Après une période d'emprisonnement et de maladie, Pak échappe miraculeusement à la colère des forces japonaises et retrouve le chemin de Paris. Là, il s'implique profondément dans le mouvement totalitaire naissant, se rapprochant des camps de Mosley et de Mussolini et trouvant un terrain d'entente avec leurs tendances nationalistes. En 1931, Pak fait la navette entre l'Europe et Shanghai, où il peut librement soutenir à la fois la lutte pour l'indépendance et la lutte pour le syndicalisme, en lançant la publication de journaux pro-syndicalistes. L'année suivante, Pak condamne le gouvernement provisoire pour avoir été trop réactionnaire et avoir exclu les penseurs socialistes. Ayant trouvé un soutien de même nature, Pak s'affirme fermement comme le champion du totalitarisme en Corée, et la puissance du pouvoir rouge ne fait que commencer.§!"

 KOR_yi_sung_yop:9 "Yi Sung-yop"
 KOR_yi_sung_yop_sic_desc:9 "§YNaissance :§! §L8 février 1905, district de Bupyeong, province de Gyeonggi, Empire de Corée§!"

 KOR_kim_tu_bong:9 "Kim Tu-bong"
 KOR_kim_tu_bong_leader_desc:9 "§YNaissance :§! §L16 février 1889, à Gijang, province de Gyeongsang, Corée§!\n§YCarrière :§! §LD'abord linguiste spécialiste du coréen, Kim rejoignit le mouvement d'indépendance coréen en 1919 et participa à la fondation du Gouvernement provisoire à Shanghai. Pendant son séjour là-bas, Kim fut exposé aux idées socialistes et fit rapidement la connaissance de la frange de gauche du Kuomintang et des syndicalistes chinois. Avec la libération de la Corée, Kim dirige désormais le Nouveau Parti populaire, qui rassemble les mouvements socialistes coréens sous sa direction ferme.§!"

 KOR_kim_mu_chong:9 "Kim Mu-chong"
 KOR_kim_mu_chong_commander_desc:9 "§YNaissance :§! §L16 mai 1904, à Chongjin, province de Hamgyeong-Nord, Empire de Corée§!\n§YCarrière :§! §LIssu d'une riche famille de propriétaires terriens, Kim Mu-chong fit ses premiers pas dans la politique révolutionnaire en 1919 en participant au Mouvement du 1er Mars. Finalement renvoyé de l'école en 1922, il devint socialiste au cours des années suivantes et s'enfuit en Chine pour intégrer l'Académie militaire de Baoding en tant qu'officier d'artillerie, où il entra au service du gouverneur Yan Xishan du Shanxi. Mais déjà séduit par l'idéologie socialiste, il adhéra en 1925 au Parti syndicaliste chinois à Beijing et participa au Soulèvement de Shanghai de 1932. Gravissant les échelons et se rapprochant d'éminents généraux de MinGan tels que Peng Dehuai, il contribua à l'organisation de leur précieuse artillerie.\n\nAprès la libération de la Corée sous un Gouvernement rouge, Kim Mu-chong a rapidement été propulsé à des postes de haut rang au sein de la nouvelle armée coréenne. L'un des leaders de la "Faction MinGan" des socialistes coréens, il est devenu le noyau du Nouveau Parti populaire. De tempérament colérique (certains l'ont même qualifié d'insidieux), malgré son séjour en Chine, il est un fervent défenseur des revendications coréennes sur le Gando (Yanbian en chinois), une région de Mandchourie comptant une importante population d'immigrants coréens, arguant que "la Corée devrait obtenir le Gando en récompense du sang versé par l'armée coréenne lors de la guerre de Mandchourie".§!"

 KOR_kim_song_ju:9 "Kim Song-ju"
 KOR_kim_song_ju_army_chief_desc:9 "§YNaissance :§! §L15 avril 1912, à Heijō, Chōsen, Empire du Japon§!\n§YCarrière :§! §LIssu d’une famille pauvre de chrétiens convertis, son père prit part, alors qu'il était adolescent, au Mouvement du 1er Mars 1919 contre l'occupation japonaise. La répression brutale des Japonais contraignit sa famille à fuir en Mandchourie, mais il fut renvoyé seul en Corée pour poursuivre ses études pendant les années qui suivirent. Son père mourut l'année suivante et il acheva ses études en Chine, où il apprit la langue chinoise et se familiarisa avec la théorie marxiste.\n\nIl rejoignit successivement plusieurs groupes antijaponais et son arrestation en 1929 marqua la fin de sa scolarité et le début de sa vie de guérillero. Ces insurgés furent sévèrement réprimés par le gouvernement chinois du Fengtian, allié des Japonais, et ils s'allièrent à des groupes rebelles socialistes chinois plus importants qui résistaient aux deux camps. Souvent en fuite, les dirigeants rebelles chinois commencèrent à se méfier des Coréens vivant dans la région, les soupçonnant d’être des collaborateurs japonais. En 1933, ils entamèrent une purge visant les centaines de socialistes coréens présents dans leurs rangs. Kim fit partie des personnes arrêtées en 1933 et innocentées en 1934, mais il réussit à s’emparer des dossiers du comité de purge et à les brûler. Les survivants de ce qu’on a appelé l’incident du Minsaengdan se sont ralliés à Kim, qui s’est imposé comme le chef des socialistes coréens en Mandchourie.\n\nEncore un commandant de guérilla mineur, bien que populaire, il a su tirer parti de ses exploits (peut-être exagérés) pour s’imposer comme un officier de premier plan au sein de la nouvelle armée coréenne.§!"

 KOR_choe_hyon:9 "Choe Hyon"
 KOR_choe_hyon_high_command_desc:9 "§YNaissance :§! §L6 mai 1907, à Hunchun, province du Jilin, Grand Qing§!\n§YCarrière :§! §LChoe Hyon est né en Chine de parents d'origine coréenne et est devenu, dès son plus jeune âge, un révolutionnaire antijaponais sous l'influence de ses parents. Sept années d'emprisonnement par les Japonais n'ont pas réussi à le dissuader et, après sa libération en 1932, il a rejoint un groupe de guérilleros coréens opérant depuis la Mandchourie, où il s'est révélé être un commandant de guérilla efficace. Proche collaborateur de Kim Song-ju, il est revenu avec Kim en Corée après l'indépendance et a joué un rôle majeur dans leur nouvelle armée.§!"

 KOR_yi_geon:9 "Yi Geon"
 KOR_yi_geon_commander_desc:9 "§YNaissance :§! §L28 octobre 1909, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LFils illégitime du prince Yi Kang et d'une concubine, Yi est né sous le nom de Yong-gil, mais a changé son nom pour Geon en 1924. Il n'a pas été inclus parmi les huit membres de la famille royale lors du décret de l'empereur Meiji de 1910 et son frère cadet a pris possession du palais d'Unhyeon en 1917 après avoir été adopté, mais Yi a néanmoins conservé un statut considérable. Il se rendit au Japon en 1918 pour y poursuivre ses études et reçut le titre de prince ducal ; il fut reconnu comme membre de la famille royale en 1926.\n\nCette année-là, il entra à l'Académie militaire japonaise, dont il sortit diplômé en 1930. Il épousa une noble japonaise en 1931 et fut nommé officier de cavalerie dans l'Armée impériale japonaise (AIJ), où il servit principalement comme instructeur. Colonel de l'AIJ avant la libération, la restauration de la monarchie coréenne lui a permis d'assumer un rôle plus élevé au sein de la nouvelle armée.§!"

 KOR_yi_un: "Yi Un"
 KOR_yi_un_high_command_desc:9 "§YNaissance :§! §L20 octobre 1897, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LNé dans la famille royale de Joseon en tant que septième fils de Gojong, l'empereur Gwangmu, Yi Un ne savait guère ce que signifiait être roi de Corée. Nommé prince héritier en 1907, il fut emmené au Japon à l'âge de dix ans à l'initiative d'Ito Hirobumi. Là-bas, l'empereur japonais Meiji porta une affection et une attention particulières au jeune prince coréen. Le prince grandit aux côtés de la noblesse japonaise, notamment des princes Hirohito, Takamatsu et Chichibu. Cependant, après l’assassinat d’Ito en 1909, l’empereur Meiji cessa de voir Yi Un, et le prince coréen devint un prisonnier dans son pays d’adoption.\n\nDe 1911 à 1924, Yi Un servit dans l’Armée impériale japonaise (AIJ) malgré sa petite taille, après s’être inscrit à l’École centrale de la jeunesse de l’armée. De 1927 à 1928, le prince décida de découvrir le monde en dehors du Japon et de la Corée. Il entreprit ainsi un voyage en Europe, visitant les capitales syndicalistes que sont Londres et Paris, ainsi que les empires allemand et autrichien, avant de retourner au Japon fin 1928.\n\nÀ son retour, il a continué à servir dans l'AIJ dans diverses structures, principalement à des postes de formation, mais aussi à quelques postes de commandement. Il a également été brièvement affecté au poste de commandant de l'armée de l'air. Au cours du conflit récent, il a commencé à ressentir le besoin de préserver la culture coréenne et s'est efforcé d'obtenir des archives contenant des chants populaires, de l'art populaire et d'autres objets.§!"

 KOR_hong_sa_ik:9 "Hong Sa-ik"
 KOR_hong_sa_ik_army_chief_desc:9 "§YNaissance :§! §L4 mars 1889, à Anseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LIssu du clan Namyang Hong, Hong était d'origine aristocratique. Il entra à l'Académie militaire coréenne en 1905, mais après la dissolution de celle-ci en 1909, il poursuivit ses études au Japon aux côtés du prince héritier coréen Yi Un. Lorsque le Japon annexa officiellement la Corée en 1910, de nombreux autres étudiants quittèrent le pays en signe de protestation ou suivirent l'exemple de Ji Cheong-cheon en terminant d'abord leurs études avant de partir rejoindre la résistance coréenne. Hong évita toutefois de s'associer à l'un ou l'autre de ces groupes, bien qu'il soit resté personnellement ami avec Ji et qu'il ait financé ses efforts, s'engageant comme officier dans l'Armée impériale japonaise.\n\nMalgré les pressions pour qu'il change son nom en un nom plus japonais, Hong conserva son nom de famille. Cela ne l'empêcha pas de gravir les échelons jusqu'au grade de général, servant principalement en Chine.§!"

 KOR_yi_u:9 "Yi U"
 KOR_yi_u_commander_desc:9 "§YNaissance :§! §L4 mars 1889, à Anseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LDeuxième fils (et premier fils légitime) du prince Yi Ang, Yi U fut adopté à l'âge de cinq ans pour devenir l'héritier du prince Yeongseon. Peu après, il fut envoyé au Japon pour y suivre une formation aux côtés d'autres membres éminents de la noblesse japonaise et coréenne. Il servit dans l'armée impériale japonaise, occupant principalement des fonctions d'état-major.\n\nMalgré cela, il conserva son identité coréenne et devint le fils préféré de son père, qui se fit connaître pour son activisme en faveur de l'indépendance. Yi U épousa également une noble coréenne. Avec l'accession de son père au trône coréen restauré, Yi U fut rapidement reconnu comme prince héritier.§!"

