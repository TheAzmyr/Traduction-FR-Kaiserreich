### Characters ###

 KOR_kim_koo: "Kim Koo"
 KOR_kim_koo_bio:9 "Towering over both his allies and opponents, Kim Koo is both the political embodiment of what remains of Korean nationalism while also the puppeteer behind countless cases of white terror. Born large, a young Kim Koo enlisted himself into the peasant armies in the Tonghak Movement, and as the Uprising scattered, he was rescued by An Taehoon, the father of the legendary An Junggeun, later assassin of Itō Hirobumi. In 1896 Kim would be arrested for murdering a Japanese merchant, believing him to be a military officer. After escaping, Kim turned away from politics,instead, he worked to establish schools with the help of churches. By 1905, however, outraged by the signing of the Japan-Korea treaty, Kim returned to the nationalist scene, befriending like-minded individuals who would become his comrades.\n\nWith the establishment of the Provisional Government of the Republic of Korea in Shanghai in 1925, Kim became one of its integral members, quickly establishing his position as the backbone of the Provisional Government, whether it be direct or indirect. Within his rise to power, Kim served as both a member of the Korean Provisional Congress and as the Chief of Policing, further solidifying his position. By 1923 he was appointed Provisional Interior Minister and in 1926 Prime Minister, before managing to oust Syngman Rhee from the Provisional Government in 1928. Eventually, Kim would found the Korean Independence Party in 1930, which would serve as his primary political vehicle."
 KOR_kim_koo_leader_desc:9 "§YNaissance :§! §L29 août 1876, à Haeju, province de Hwanghae, Corée§!\n§YCarrière :§! §LDominant à la fois ses alliés et ses adversaires, Kim Koo est à la fois l'incarnation politique de ce qui reste du nationalisme coréen et le marionnettiste à l'origine d'innombrables cas de terreur blanche. Né grand, le jeune Kim Koo s'est enrôlé dans les armées paysannes du mouvement Tonghak et, alors que le soulèvement se dispersait, il a été sauvé par An Taehoon, le père du légendaire An Junggeun, futur assassin d'Itō Hirobumi. En 1896, Kim sera arrêté pour avoir assassiné un marchand japonais, le croyant officier militaire. Après s'être échappé, Kim s'est détourné de la politique et a plutôt travaillé à la création d'écoles avec l'aide des églises. En 1905, cependant, indigné par la signature du traité entre le Japon et la Corée, Kim revient sur la scène nationaliste, se liant d'amitié avec des personnes partageant les mêmes idées qui deviendront ses camarades.\n\nAvec l'établissement du gouvernement provisoire de la République de Corée à Shanghai en 1925, Kim est devenu l'un de ses membres à part entière, s'imposant rapidement comme l'épine dorsale du gouvernement provisoire, que ce soit directement ou indirectement. Dans le cadre de son ascension au pouvoir, Kim a été à la fois membre du Congrès provisoire coréen et chef de la police, faisant tout ce qu'il pouvait pour empêcher les traîtres de s'infiltrer. Dans le même temps, il a assassiné plusieurs fois ses camarades, dont beaucoup ont servi d'obstacles à sa prise de pouvoir. En 1923, il est nommé ministre provisoire de l'Intérieur et en 1926, Premier ministre. En 1930, il crée le Parti de l'indépendance de la Corée, qui devient l'élément déterminant de son accession au pouvoir. En tant que leader incontesté de l'État et de la nation coréens, Kim Koo regarde vers l'abîme.§!"
 KOR_kim_koo_soccon_leader_desc:9 "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!\n§YBackground:§! §L$KOR_kim_koo_bio$\n\nAfter Korea was liberated, Kim and the KIP have won a true mandate of the people following the first free and fair democratic elections, despite initial fears that the KIP would resort to authoritarianism and persecute opposition parties. Now endowed with the trust of the Korean people, Kim Koo will continue to lead a stable and democratic Korean Republic, working to secure its independence forevermore.§!"
 KOR_kim_koo_autdem_leader_desc:9 "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!\n§YBackground:§! §L$KOR_kim_koo_bio$\n\nNow in charge of the new Korean Republic, Kim and the KIP have secured control over the country, instituting a government based on true Korean democracy, allowing the people to express their will while keeping the country safe from traitors and external threats. Under his leadership, Kim Koo will ensure that the Korean Republic will evolve into a strong, independent nation, rid of foreign-influenced and radical elements.§!"
 KOR_kim_koo_sic_desc:9 "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!"

