 KOR_yi_kang: "Yi Kang"
 KOR_yi_kang_leader_desc:9 "§YNaissance :§! §L30 mars 1877, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LCinquième fils de Gojong par sa concubine Dame Jang, Yi Kang devint prince Uihwa en 1892. Après avoir épousé Kim Deoksu, le prince fut victime de procès et de dettes. En 1895, il devint ambassadeur spécial de la Corée au Japon pour participer aux célébrations de la victoire japonaise sur les Chinois lors de la Première Guerre sino-japonaise. N'ayant pas d'enjeu propre, il servit d'ambassadeur auprès des pays européens et des États-Unis, bien que son style de vie de playboy et ses dépenses somptuaires suscitèrent l'antagonisme du gouvernement coréen. Il participa à la Croix-Rouge coréenne de 1906 à 1907. Cependant, lorsque son père abdiqua, son demi-frère, le prince Yi Un, devint prince héritier en raison de l'aversion de son père à son égard.\n\nAprès l'annexion de la Corée par le Japon en 1910, Yi Kang fut de plus en plus mécontent de son statut, bien qu'il reçoive une généreuse allocation annuelle. Lorsqu'il apprit la création du Gouvernement provisoire de la République de Corée en 1928, il tenta de fuir la Corée pour rejoindre les exilés. Sa fuite fut un échec et, malgré les efforts de Yi Kang pour lui retirer ses titres, il resta prisonnier politique à Séoul. En 1930, il prit officiellement sa retraite. Malgré tout, son désir ardent de voir la Corée indépendante ne s'est jamais estompé ; il a fait remarquer un jour qu'il préférait être un paysan dans une Corée indépendante plutôt qu'un noble sous la domination japonaise.\n\nLorsque la Corée a été libérée après plusieurs décennies d'asservissement, Yi Kang a enfin pu rencontrer le Gouvernement provisoire qui était en exil depuis si longtemps. Afin d'honorer la préférence des libérateurs de la Corée pour la monarchie et de reconnaître leur nouvelle relation, Yi Kang a été déclaré à la quasi-unanimité empereur d'un Empire de Corée renaissant, écartant ainsi son frère, le prince héritier Yi Un, qui avait collaboré avec les Japonais. Il porte désormais la responsabilité de perpétuer le glorieux héritage de l'Empire de Corée sous la bannière d'une Corée nouvellement libérée.§!"

 KOR_kim_hong_il: "Kim Hong-il"
 KOR_kim_hong_il_high_command_desc:9 "§YNaissance :§! §L23 septembre 1898, à Yongcheon, province de Pyongan-Nord, Empire de Corée§!\n§YCarrière :§! §LL'enfance de Kim Hong-il fut secouée par des coups de canon lorsque la Guerre russo-japonaise commença dans son village natal. La guerre se termina vite et l'Empire de Corée s'effondra peu après sous la botte japonaise. Kim, ayant connu les horreurs de la guerre et la chute de sa nation très jeune, commença sa lutte pour son pays. Après une jeunesse turbulente passée à voyager entre la Corée et la Chine, et s'étant finalement établi comme enseignant, la police japonaise retrouva sa trace. Il s'enfuit ensuite vers la Mandchourie, où son frère possédait une entreprise. En 1918, Kim se trouvait à Shanghai, où il rencontra Huang Je, un autre partisan anti-japonais, qui aida Kim à s'enrôler comme cadet à l'Académie militaire du Guizhou. Kim, qui commença son éducation en ne plaçant pas son arme correctement, fut placé sous le tutorat spécial de He Yingqin, qui lui enseigna bien, à tel point qu'il fut diplômé avec les honneurs. Après cela, Kim se rendit à Shanghai à la recherche du Gouvernement provisoire de la République de Corée mais fut dégoûté par ses querelles internes déclenchées par le renvoi récent de Syngman Rhee. Plus tard, Kim eut une carrière de mercenaire et d'éducateur, entre la Chine, la Mandchourie et l'Extrême-Orient russe.\n\nEn se rendant à un enterrement, Kim rencontra le Dr Sun Yat-sen, qui encouragea grandement sa cause pour l'indépendance. Au début de l'Expédition du Nord, Kim rejoignit le Kuomintang et commença son service comme adjudant de son ancien mentor He Yingqin. Pendant l'expédition, Kim persuada les pilotes coréens des armées du Zhili à rejoindre la cause du KMT. A la fin de l'Expédition du Nord, il monta en grade pour devenir général, même si la chute du KMT rendit ce succès inutile. Kim suivit He au Guizhou puis au Yunnan, où il devint membre des vestiges de l'ANR loyale à Zhu Peide. En 1931, Kim rétablit le contact avec le bureau du Gouvernement provisoire coréen à Shanghai et devint un des chefs de l'Armée de Libération coréenne tout en devenant l'un des contacts du GPRC.§!\n\n§YNotes : En tant qu'ami proche de He Yingqin, il est associé au Kuomintang et à l'aile droite du mouvement pour l'indépendance de la Corée.§!"

 KOR_kim_kyu_sik:9 "Kim Kyu-sik"
 KOR_kim_kyu_sik_leader_desc:9 "§YBorn:§! §LJanuary 29th, 1881, in Busan, Gyeongsang Province, Joseon§!\n§YBackground:§! §LSent to an orphanage run by American missionary Horace Grant Underwood at an early age, Kim Kyu-sik spent his youth learning Christianity and English. With the support of Underwood, Kim went to the United States in 1896, where, unlike in Korea, Kim was not ostracised for his background. Studying in the US, he received a bachelor's degree from Roanoke College in 1903, along with a master's degree in English literature from Princeton University the following year. When the Russo-Japanese War unfolded, Kim returned to Korea and rejoined Underwood, serving as his secretary and teaching at the local YMCA.\n\nAfter the 105-Man Incident in 1911, when the Japanese arrested Korean independence activists, many of whom were Christian, Kim fled to China in early 1913. Aside from attempting to raise funds for the Korean independence movement, Kim befriended Chinese revolutionaries such as Dr. Sun Yat-sen. When the Kuomintang's Northern Expedition collapsed, Kim followed the KMT into exile in Paris.  In 1932, Kim would be involved in the formation of the Korean National Revolutionary Party, leading its right-wing faction.\n\nWith the liberation of Korea under the Kuomintang's right wing, Kim has been selected to lead the new Korean sister republic. As a follower of Sun Yat-sen, Kim intends to remake the young nation anew, uniting all Koreans under the banner of National Revolution.§!"
 KOR_kim_kyu_sik_sic_desc:9 "§YNaissance :§! §L29 janvier 1881, à Busan, province de Gyeongsang, Corée§!"

 KOR_lee_beom_seok: "Lee Beom-seok"
 KOR_lee_beom_seok_desc_body:9 "Descendant de la famille royale de Joseon et fils d’un fonctionnaire, le jeune Lee Beom-seok était un garçon brillant mais souvent espiègle. Au-delà de ses espiègleries, il nourrit bientôt un désir de vengeance contre les occupants japonais en Corée lorsque Jeong Tae-gyu, un nobi affranchi qui s’était occupé de lui, fut assassiné alors qu’il s’opposait à la dissolution de l'Armée coréenne à la suite du Traité nippo-coréen de 1907. Pendant ses études au lycée de Gyeongseong, Lee avait de mauvaises notes et des relations encore pires avec ses camarades japonais et son professeur. Avec des perspectives d'avenir de plus en plus sombres et une flamme grandissante en lui qui le poussait à lutter contre les Japonais, il s'exila en Chine avec l'aide de Lyuh Woon-hyung et rejoignit la diaspora coréenne à Shanghai.\n\nEn exil, Lee rencontra le Dr Sun Yat-sen, qui le recommanda pour entrer à l'Académie militaire du Yunnan. Diplômé en 1919, il devint instructeur à l'Académie militaire du Yunnan avant de retourner à Shanghai pour rejoindre l'Armée de Libération coréenne en 1925. Ayant été témoin de l'effondrement de l'Expédition du Nord du Kuomintang et de l'échec du Soulèvement de Shanghai de 1932, Lee se méfiait de plus en plus des éléments de gauche. Avec le temps, il devint un grand admirateur du Premier ministre roumain Corneliu Zelea Codreanu et du mouvement savinkoviste russe, qu'il considérait comme une source d'inspiration pour une Corée forte et sans classes."
 KOR_lee_beom_seok_commander_desc:9 "§YNaissance :§! §L20 octobre 1900, à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière :§! §L$KOR_lee_beom_seok_desc_body$§!"
 KOR_lee_beom_seok_leader_desc:9 "§YNaissance : §!§L20 octobre 1900 à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière : §!§L$KOR_lee_beom_seok_desc_body$\n\nL'indépendance enfin acquise, Lee Beom-seok rentre chez lui, dans une Corée libre. Sa méfiance à l'égard des éléments de gauche au sein du KIP a conduit à la popularité de ses partisans, les Ilministes, qui prônent le "principe d'un seul peuple" pour la nation coréenne. Ils croient à la révolution et à la mobilisation de la Corée pour en faire une société militarisée, monoethnique et sans classe, et vouent une vénération extrême à Kim Koo, la figure de proue de la nation.§!"
 KOR_lee_beom_seok_sic_desc:9 "§YNaissance :§! §L20 octobre 1900, à Hanseong, province de Gyeonggi, Empire de Corée§!"

 KOR_syngman_rhee:9 "Syngman Rhee"
 KOR_syngman_rhee_leader_desc:9 "§YBorn:§! §LMarch 26th, 1875, in Pyeongsan, Hwanghae Province, Joseon§!\n§YBackground:§! §LComing from a modest family in rural Korea, Syngman Rhee became involved in the Korean independence movement after being implicated in a revenge plot following the assassination of Queen Min. After several years of activity organising grassroots organisations, he was arrested in 1899 and tortured in captivity, before being released in 1904 at the outbreak of the Russo-Japanese War. Subsequently, Rhee moved to the United States, studying at Princeton and Harvard in the following years, whilst resuming efforts to support Korean independence.\n\nAs turmoil spread in 1925 with the collapse of the British Empire alongside the May 30th protests that swept eastern China, Korean independence activists rallied and founded the Provisional Government of the Republic of Korea in Shanghai, electing Syngman Rhee as their chairman. As chairman, he petitioned American delegates at the Shanghai Conference of 1928, hoping to receive political support for Korean independence. This plan failed, however, putting Rhee's leadership into question, leading to his ousting by Kim Koo, and resumption of exile back in America.\n\nFollowing the American occupation of Korea, Rhee finally returned to his homeland after decades of exile, subverting all expectations and becoming the leader of a new Korean government. Although others have fallen in line and supported his ascension, many remain cautious, as Rhee moves to secure his rule through all means necessary.§!"

 KOR_lee_gap_seong:9 "Lee Gap-seong"
 KOR_lee_gap_seong_sic_desc:9 "§YNaissance :§! §L23 octobre 1889, à Daegu, province de Gyeongsang, Corée§!"

 KOR_ji_cheong_cheon: "Ji Cheong-cheon"
 KOR_ji_cheong_cheon_desc_body:9 "Graduating from Pai Chai Academy in 1906, Ji entered the Military Academy of the Empire of Korea as the country was on the brink of annexation by Japan. In 1909, the Japanese Resident-General abolished the Korean military, and the academy along with it. Ji eventually ended up in the Imperial Japanese Army Academy and graduated in 1914. In 1919, Ji deserted the Japanese Army and went into exile in Manchuria, becoming an instructor at the Sinhŭng Military Academy, a training facility for Korean independence fighters set up since 1911.\n\nIn 1921, following a victorious battle between Korean and Japanese units in Qingshanli, Ji closed down the academy and led his troops to Gando to avoid large-scale retaliation against Koreans by the Japanese. When the Korean Provisional Government was established in Shanghai in 1925, Ji helped in the creation of the Korean Liberation Army as its military wing. Although he was initially a member of the Korea Independence Party, strife between him and Kim Koo's faction caused Ji to leave the party and form the New Korea Independence Party."
 KOR_ji_cheong_cheon_army_chief_desc:9 "§YNaissance :§! §L25 janvier 1888, à Hanseong, province de Gyeonggi, Corée§!\n§YCarrière :§! §L$KOR_ji_cheong_cheon_desc_body$§!"
 KOR_ji_cheong_cheon_leader_desc:9 "§YBorn:§! §LJanuary 25th, 1888, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §L$KOR_ji_cheong_cheon_desc_body$\n\nAfter years of fighting and organising resistance against Japan, Ji now finds himself in charge of a newly independent Korea. Vaguely inspired by the Kuomintang's right wing, Ji has reorganised his NKIP into the Korean Nationalist Party, a new political force intent on rebuilding Korea through the true fulfilment of Sanmin Doctrine.§!"

 KOR_yeom_dong_jin:9 "Yeom Dong-jin"
 KOR_yeom_dong_jin_bio:9 "Not much is known about Yeom Dong-jin or his childhood, except for his graduation from Chunghwa Primary School and his subsequent enrolment in Sunrin Commercial School in Seoul in 1926. Graduating in 1931 at the age of 22, Yeom decided to devote himself to the cause of Korean independence and exiled himself to China. In Shanghai, he joined the Korean Liberation Army as a young cadet.\n\nBeing a part of Ji Cheong-cheon's faction within the Korean Provisional Government, Yeom aligned with Ji's adherence to Dr. Sun Yat-sen's Three Principles of the People. At the same time, Yeom holds disdain for socialist elements in the Korean independence movement, especially the Korean National Revolutionary Party and its leadership for fleeing to Paris.\n\nWith Korea liberated from Japanese occupation, Yeom returned to Korea and founded the White Shirts Society, a militant ultranationalist society inspired by the Blue Shirts Society in China."
 KOR_yeom_dong_jin_leader_desc:9 "§YBorn:§! §LFebruary 14th, 1909, in Pyongyang, South Pyongan Province, Empire of Korea§!\n§YBackground:§! §L$KOR_yeom_dong_jin_bio$ Now in charge of the country, Yeom seeks to rebuild the Korean nation, free from socialist filth and purged of traitors.§!"
 KOR_yeom_dong_jin_commander_desc:9 "§YNaissance :§! §L14 février 1909, à Pyongyang, province de Pyongan-Sud, Empire de Corée§!\n§YCarrière :§! §L$KOR_yeom_dong_jin_bio$§!"

 KOR_yu_chin_san:9 "Yu Chin-san"
 KOR_yu_chin_san_sic_desc:9 "§YNaissance :§! §L18 octobre 1905, comté de Jinsan, province de Jeolla-Nord, Empire de Corée§!"

 KOR_kim_wonbong: "Kim Wonbong"
 KOR_kim_wonbong_commander_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongnam-Sud, Empire de Corée§!\n§YCarrière :§! §LAprès avoir mis sur pied le "Corps héroïque" coréen au Fengtian, Kim Wonbong mena de multiples attaques contre le personnel et les avant-postes japonais dans le cadre de la lutte acharnée pour l'indépendance de la Corée. Inspiré par le Gouvernement nationaliste chinois établi à Guangzhou, Kim s'inscrivit à l'Académie militaire de Whampoa en janvier 1926 afin de former une véritable armée capable de lutter contre les Japonais. L'expédition ayant échoué, Kim parcourut la Chine continentale pour aider les mouvements socialistes et nationalistes coréens à s'organiser. Après s'être dissocié de la Troisième Internationale en 1931, Kim a contacté ses anciens amis à Whampoa pour se réintégrer en tant qu'officier associé du Kuomintang. À ce titre, il a décidé de s'intégrer pleinement, avec les vestiges du Corps héroïque, au sein du KMT de Gauche, qui allait mettre à profit son expertise en matière d'espionnage acquise lors de sa lutte pour l'indépendance coréenne tout en lui donnant accès à une formation complémentaire pour les cadets coréens. En 1932, Kim organisa le Parti national révolutionnaire coréen, qui servait d'organisation sœur au KMT au sein du Gouvernement provisoire coréen, lui-même largement associé au KMT, et d'opposition à son parti au pouvoir, le Parti pour l'Indépendance de la Corée.§!\n\n§YNotes : Connecté à presque toutes les factions au sein du KMT, et pour respecter sa position comme partenaire pragmatique, Kim Wonbong est resté en dehors de la politique interne des partis.§!"
 KOR_kim_wonbong_leader_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!\n§YCarrière :§! §LAprès s'être dissocié de la Troisième Internationale en 1931, Kim contacta ses vieux amis de Whampoa pour se réinsérer en tant qu'officier associé du Kuomintang, puis s'intégra pleinement, avec les restes du Corps héroïque, dans le KMT de Gauche, qui mit à profit son expertise en matière d'espionnage acquise au service d'armées vertueuses, tout en ayant accès à la formation continue des cadets coréens. En 1932, Kim créa le Parti national révolutionnaire coréen, qui était l'organisation sœur du KMT au sein du gouvernement provisoire coréen, lui aussi largement associé au KMT, et qui constituait l'opposition au parti au pouvoir, le Parti pour l'Indépendance de la Corée.\n\nUne vie d'exil n'a guère empêché le révolutionnaire coréen patriote Kim Wonbong de voir la résurrection d'une nation coréenne de son vivant. Il s'est révélé être un dirigeant énergique et passionné, comme en témoignent son leadership et son courage au sein de l'Armée nationale révolutionnaire lors de la Seconde Expédition du Nord et de la guerre contre le Japon. Bien que le chemin vers une Corée socialiste et nationaliste reste à parcourir, Wonbong a finalement réalisé le rêve de voir son pays libéré et libre de son vivant.§!"
 KOR_kim_wonbong_sic_desc:9 "§YNaissance :§! §L28 septembre 1898, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!"

 KOR_yoon_se_ju:9 "Yoon Se-ju"
 KOR_yoon_se_ju_sic_desc:9 "§YNaissance :§! §L24 juin 1901, à Miryang, province de Gyeongsang-Sud, Empire de Corée§!"

 KOR_pak_hon_yong: "Pak Hon-yong"
 KOR_pak_hon_yong_leader_desc:9 "§YNaissance : §!§L28 mai 1900 à Yesan, province de Chungcheong du Sud, Empire de Corée§!\n§YCarrière : §!§LPak Hon-yong, fils illégitime d'un père Yangban, se rend à Séoul pour y faire des études et s'affilie à la pensée nationaliste. Contraint à l'exil et fidèle à une nation sans État, Pak se rend à l'étranger pour y trouver refuge. Il s'installe en Europe et se lie idéologiquement à la montée du syndicalisme en France, en Italie et en Grande-Bretagne. Profondément marqué par les révolutions dont il est témoin, Pak est l'un des premiers Coréens à s'affilier à la Troisième Internationale et retourne en Corée en tant qu'agent secret pour répandre les idéaux syndicalistes dans la péninsule occupée par les Japonais. Après une période d'emprisonnement et de maladie, Pak échappe miraculeusement à la colère des forces japonaises et retrouve le chemin de Paris. Là, il s'implique profondément dans le mouvement totalitaire naissant, se rapprochant des camps de Mosley et de Mussolini et trouvant un terrain d'entente avec leurs tendances nationalistes. En 1931, Pak fait la navette entre l'Europe et Shanghai, où il peut librement soutenir à la fois la lutte pour l'indépendance et la lutte pour le syndicalisme, en lançant la publication de journaux pro-syndicalistes. L'année suivante, Pak condamne le gouvernement provisoire pour avoir été trop réactionnaire et avoir exclu les penseurs socialistes. Ayant trouvé un soutien de même nature, Pak s'affirme fermement comme le champion du totalitarisme en Corée, et la puissance du pouvoir rouge ne fait que commencer.§!"

 KOR_yi_sung_yop:9 "Yi Sung-yop"
 KOR_yi_sung_yop_sic_desc:9 "§YNaissance :§! §L8 février 1905, district de Bupyeong, province de Gyeonggi, Empire de Corée§!"

 KOR_kim_tu_bong:9 "Kim Tu-bong"
 KOR_kim_tu_bong_leader_desc:9 "§YBorn:§! §LFebruary 16th, 1889, in Gijang, Gyeongsang Province, Joseon§!\n§YBackground:§! §LInitially active as a linguist of Korean, Kim would join the Korean independence movement in 1919, participating in the founding of the Provisional Government in Shanghai. During his stay there, Kim would be exposed to socialist ideas, and would soon become acquainted with the Left Kuomintang and Chinese syndicalists. With the liberation of Korea, Kim now heads the New People's Party, bringing together Korea's socialist movements under their firm leadership.§!"

 KOR_kim_mu_chong:9 "Kim Mu-chong"
 KOR_kim_mu_chong_commander_desc:9 "§YBorn:§! §LMay 16th, 1904, in Chongjin, North Hamgyeong Province, Empire of Korea§!\n§YBackground:§! §LBorn to a wealthy landowning family, Kim Mu-chong's first foray into revolutionary politics was in 1919 when he participated in the March 1st Movement. Ultimately expelled from school in 1922, over the next few years he became a socialist and fled to China to join the Baoding Military Academy as an artillery officer - where he would enter the employ of Governor Yan Xishan of Shanxi. But already enamoured by socialist ideology, in 1925 he joined the Chinese Syndicalist Party in Beijing and participated in the 1932 Shanghai Uprising. Rising through the ranks and close with prominent MinGan guerilla generals such Peng Dehuai, he played a role in helping organize their precious artillery.\n\nUpon the liberation of Korea under a Red Government, Kim Mu-chong was quickly catapulted to senior roles in the new Korean Army. One of the leaders of the so-called \"MinGan Faction\" of Korean socialists, they became the nucleus of the New People's Party. Short-tempered (and some have even described him as insidious), despite his time in China he is a notable proponent of Korean claims over Gando (Yanbian in Chinese), a region in Manchuria with a significant Korean immigrant population, arguing that \"Korea should obtain Gando as a reward for the bloodshed of the Korean army fighting in the Manchurian War.\"§!"

 KOR_kim_song_ju:9 "Kim Song-ju"
 KOR_kim_song_ju_army_chief_desc:9 "§YBorn:§! §LApril 15th, 1912, in Heijō, Chōsen, Empire of Japan§!\n§YBackground:§! §LBorn to a poor family of Christian converts, when he was a teenager his father took part in the 1919 March 1st Movement protesting Japanese occupation. Brutal Japanese repression forced his family to flee into Manchuria, though he was sent alone back to Korea to continue his studies for the next few years. His father died the following year and he finished his studies in China where he learned the Chinese language and also became acquainted with Marxist theory.\n\nHe joined a succession of anti-Japanese groups and his arrest in 1929 marked the end of his formal education and the beginning of his life as a guerilla. These insurgents were harshly suppressed by the Japanese-allied Fengtian Government of China and they joined forces with larger Chinese socialist rebel groups resisting both. Frequently on the run, Chinese rebel leadership began to grow suspicious of Koreans living in the area - believing they were likely to be Japanese collaborators. In 1933 they began to purge the hundreds of Korean socialists in their ranks. Kim was among those arrested in 1933 and exonerated in 1934, but managed to seize and burn the purge committee's files. The survivors of this so-called Minsaengdan incident rallied around Kim and he emerged as the leader of Korean socialists in Manchuria.\n\nStill a minor albeit popular guerilla commander, he was able to parlay his (perhaps exaggerated) exploits to emerge as a prominent officer in the new Korean Army.§!"

 KOR_choe_hyon:9 "Choe Hyon"
 KOR_choe_hyon_high_command_desc:9 "§YBorn:§! §LMay 6th, 1907, in Hunchun, Jilin Province, Great Qing§!\n§YBackground:§! §LChoe Hyon was born in China to ethnic Korean parents and became an anti-Japanese revolutionary at a young age under his parents' influence. Seven years of imprisonment by the Japanese failed to dissuade him and after his release in 1932 he joined a band of Korean guerillas operating out of Manchuria where he proved to be an effective guerilla commander. A major associate of Kim Song-ju, he returned with Kim to Korea after independence and has played a major role in their new army.§!"

 KOR_yi_geon:9 "Yi Geon"
 KOR_yi_geon_commander_desc:9 "§YBorn:§! §LOctober 28, 1909, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LThe illegitimate son of Prince Yi Kang and a concubine, Yi was born Yong-gil but changed his name to Geon in 1924. He was not included as one of the eight members of the royal family during the Meiji Emperor's 1910 decree and his younger brother assumed the palace of Unhyeon in 1917 after being adopted, but Yi nevertheless retained considerable status. He went to Japan in 1918 for his studies and was given the title of Ducal Prince and recognised as a member of the royal family in 1926.\n\nThat year, he entered the Japanese Military Academy, where he would graduate in 1930. He married a Japanese noblewoman in 1931 and was commissioned as a cavalry officer in the Imperial Japanese Army (IJA) where he served primarily as an instructor. A colonel in the IJA before liberation, the restoration of the Korean monarchy has allowed him to assume a more senior role in the new military.§!"

 KOR_yi_un: "Yi Un"
 KOR_yi_un_high_command_desc:9 "§YBorn:§! §LOctober 20th, 1897, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LBorn into the family of Joseon royalty as the seventh son of Gojong, the Gwangmu Emperor, Yi Un hardly knew what it was like to be King of Korea. Anointed as Crown Prince in 1907, he was taken at the age of ten to Japan at the initiative of Ito Hibroumi. Here, the Japanese Emperor Meiji took a particular liking and attention to the young Korean prince. The prince grew up with Japanese nobility, such as the princes Hirohito, Takamatsu, and Chichibu. However, after Ito's assassination in 1909, the Meiji Emperor stopped seeing Yi Un, and the Korean prince became a captive in his adopted country.\n\nFrom 1911-to 1924, Yi Un served in the Imperial Japanese Army (IJA) despite his short stature after enrolling in the Army Central Youth School. From 1927-to 1928, the prince decided to see the world outside Japan and Korea. He thus embarked on a voyage to Europe, visiting the syndicalist capitals of London and Paris and visiting the German and Austrian Empires before returning to Japan in late 1928.\n\nAfter he returned, he continued to serve in the IJA in various facilities, primarily in training roles but with a few command roles as well. He was also briefly assigned as an air force commander. During the recent conflict, he began to feel the need to preserve Korean culture and worked to obtain records containing folk songs, folk art, and other artifacts.§!"

 KOR_hong_sa_ik:9 "Hong Sa-ik"
 KOR_hong_sa_ik_army_chief_desc:9 "§YBorn:§! §LMarch 4th, 1889, in Anseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LA member of the Namyang Hong Clan, Hong was born to a gentry background. He entered a Korean military academy in 1905 but after it was dissolved in 1909 he continued his studies in Japan along with then Korean Crown Prince Yi Un. When Japan formally annexed Korea in 1910, many other students either left in protest or followed Ji Cheong-cheon in finishing their studies first and then leaving to join Korean resistance efforts. Hong however avoided associating with either group despite remaining personally friends with and funding Ji's efforts, commissioning as an officer in the Imperial Japanese Army.\n\nDespite pressure to change his name to a more Japanese-style name, Hong retained his surname. This did not prevent him from rising through the ranks where he became a general - primarily serving in China.§!"

 KOR_yi_u:9 "Yi U"
 KOR_yi_u_commander_desc:9 "§YBorn:§! §LMarch 4th, 1889, in Anseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LThe second son (and first legitimate son) of Prince Yi ang, Yi U was adopted to be the heir of Prince Yeongseon when he was five. Shortly afterwards he was sent to Japan to be educated along with other senior members of the Japanese and Korean nobility. He served in the Imperial Japanese Army and he primarily served in staff roles.\n\nDespite this, he retained his Korean identity and became the favorite son of his father who became known for his pro-independence activism. Yi U also notably married a Korean noblewoman. With his father's ascension to the restored Korean throne, Yi U was soon recognised as Crown Prince.§!"

