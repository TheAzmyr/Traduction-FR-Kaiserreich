 KOR_sohn_won_yil: "Sohn Won-yil"
 KOR_sohn_won_yil_navy_chief_desc:9 "§YNaissance :§! §L22 juin 1909, à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière :§! §LFils du pasteur Sohn Jung-do, Sohn Won-yil fut torturé par les Japonais pendant l'occupation et dut donc fuir avec sa famille à Shanghai. Son père devint membre du Gouvernement provisoire en exil tandis qu'il étudiait la médecine. Inspiré par les grands navires qu'il y vit, il se jura que "nos mers devaient être protégées par nos propres mains".\n\nIl commença à étudier la navigation et rejoignit la marine chinoise, qui l'envoya étudier en Allemagne. Alors qu'il tentait de retourner en Corée en 1930, il fut arrêté par les Japonais et emprisonné. Par la suite, de 1935 jusqu'à la libération, il fit fortune dans les affaires en tant que marin marchand travaillant en Corée occupée par le Japon et à Shanghai.\n\nAprès la libération, le civil Sohn utilisa sa fortune pour créer le Corps de Libération, qui devint le fondement de la marine coréenne. Il a joué un rôle majeur dans la création d’une nouvelle Académie navale et d’un Corps des marines (bien qu’il n’ait apparemment pas assisté à leur cérémonie de fondation).§!"

 KOR_kim_suk_won: "Kim Suk-won"
 KOR_kim_suk_won_high_command_desc:9 "§YNaissance :§! §L29 septembre 1893, à Hanseong, province de Gyeonggi, Corée§!"

 KOR_choi_yong_duk: "Choi Yong-duk"
 KOR_choi_yong_duk_air_chief_desc:0 "§YNaissance :§! §L19 septembre 1898, à Seongbuk-dong, Hanseong, province de Gyeonggi, Empire de Corée§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §LNé en Corée, Choi Yong-duk fit ses études au collège Huiwen de Pékin en 1913, avant de retourner dans son pays natal (alors sous domination coloniale japonaise) pour terminer ses études au collège Chongsil de Pyongyang. Une fois ses études achevées, Choi retourna en Chine pour s'inscrire à l'Académie militaire de Nanyuan, sous la direction de Duan Qirui, dont il sortit diplômé en 1916. Il servit ensuite dans la deuxième armée du gouvernement de Beiyang.\n\nEn 1919, Choi devint un partisan du Mouvement du 1er Mars et commença à cultiver ses propres convictions en faveur de l'indépendance coréenne. Il participa au gouvernement provisoire de la République de Corée. En 1920, il fut recommandé par Seo Wal-bo, premier pilote coréen et compagnon de lutte pour l'indépendance, pour suivre une formation de pilote à l'école d'aviation de Baoding. En 1924, il rejoignit l'équipe d'aviation de Wu Peifu pour participer à la Deuxième Guerre ZhiFeng. Selon certaines sources, pendant la guerre, on aurait rapporté à tort que Choi était mort au combat, mais il survécut néanmoins et fut intégré à l'armée de Feng Yuxiang aux côtés de tous les autres cadets de Baoding.\n\nDiplômé en 1925, Choi fut affecté à la 2e Armée de l'air de la Guominjun, avant d'être transféré auprès de Wu Peifu lors de sa reconquête. Combattant lors de l'Expédition du Nord, Choi servit lors des dernières guerres ZhiFeng, où il fut nommé commandant en second de la Première Armée de l'air pour ses services. Gravissant lentement les échelons, Choi est aujourd'hui instructeur à l'Académie de l'armée de l'air de Nanjing et, depuis 1935, occupe le grade de commandant de l'armée de l'air.§!"

 KOR_lee_eung_jun: "Lee Eung-jun"
 KOR_lee_eung_jun_army_chief_desc:9 "§YNaissance :§! §L12 août 1890, à Anju, province de Pyongan, Corée§!"

 KOR_lyuh_woon_hyung: "Lyuh Woon-hyung"
 KOR_lyuh_woon_hyung_leader_desc:9 "§YNaissance :§! §L25 mai 1886, à Yangpyeong, province de Gyeonggi, Corée§!\n§YCarrière :§! §LTous les nationalistes coréens ne se sont pas ralliés au Gouvernement provisoire, et Lyuh Woon-hyung, qui fut ministre des Affaires étrangères du GPRC, en fait partie. En tant que ministre des Affaires étrangères, Lyuh se trouvait souvent en opposition avec les factions dominantes. À la suite d'une décision du Gouvernement provisoire d'accorder finalement un traitement préférentiel à l'ancienne famille impériale, Lyuh démissionna et suivit sa propre voie. Par la suite, il chercha de nouveaux contacts au sein de la Troisième Internationale puis du Kuomintang, avant de s'en détourner en raison de l'échec de l'Expédition du Nord. Après une tournée en Asie du Sud-Est où il combattit aux côtés des nationalistes locaux contre leurs suzerains coloniaux, Lyuh fut finalement capturé lors d'un match de football à Shanghai, d'où les autorités japonaises l'extradèrent vers le Japon. Après une courte période d’emprisonnement, Lyuh revint sur le devant de la scène en tant que directeur de la Joongang Newspaper Company, l'un des trois principaux journaux coréens restés en circulation, critiquant sans relâche la domination japonaise sur la Corée.\n\nAprès la libération de la Corée, Lyuh Woon-hyung a fondé le Parti du Peuple ouvrier, qui est rapidement devenu le fer de lance de la gauche démocratique. Ayant remporté la victoire lors des premières élections coréennes, Lyuh a promis de renforcer la démocratie coréenne et de protéger les droits des travailleurs et des paysans de Corée, afin de mettre en place un gouvernement démocratique et égalitaire qui profite à tous les Coréens.§!"

 KOR_yi_yong:9 "Yi Yong"
 KOR_yi_yong_sic_desc:9 "§YNaissance :§! §L7 avril 1888, à Bukcheong, province de Hamgyong-Sud, Corée§!"

 KOR_yun_chi_young:9 "Yun Chi-young"
 KOR_yun_chi_young_leader_desc:9 "§YNaissance :§! §L10 février 1898, à Hanseong, province de Gyeonggi, Empire de Corée§!\n§YCarrière :§! §LIssu d'une famille aisée, Yun fut inscrit à l'école chrétienne de jeunesse du YMCA, où il eut pour professeur Syngman Rhee. Fasciné par ce dernier, Yun devint un fervent disciple de Rhee et se consacra au mouvement pour l'indépendance dès 1916. Yun passa les années suivantes à étudier au Japon, poursuivant ses activités au sein de la communauté coréenne locale et soutenant le gouvernement provisoire lors de sa fondation en 1919. Après un bref retour en Corée, Yun fit des allers-retours entre la Corée et Hawaï, où résidait Syngman Rhee, avant de le rejoindre définitivement là-bas en 1924. Aux États-Unis, Yun poursuivit ses études à l’université George Washington et continua à militer aux côtés de Rhee pour rallier des soutiens et organiser la cause de l’indépendance coréenne, même après l’éviction de Rhee du gouvernement provisoire en 1928. Finalement, Yun retourna seul en Corée en 1935, où, peu après, il fut arrêté et torturé par les autorités japonaises, avant d’être finalement libéré.\n\nAprès le retour du Gouvernement provisoire en Corée, Yun Chi-young s'allia à Sin Ik-hui et Ji Cheong-cheon de l'Armée de libération coréenne, avec lesquels il fonda le Parti nationaliste coréen, inspiré du tridéisme. Après avoir remporté les premières élections coréennes, Yun a déclaré qu'il gouvernerait en s'inspirant des Trois Principes, afin de faire naître une nation coréenne moderne et démocratique.§!"
 KOR_yun_chi_young_advisor_desc:9 "§YNaissance :§! §L10 février 1898, à Hanseong, province de Gyeonggi, Empire de Corée§!"

 KOR_shin_ik_hui:9 "Shin Ik-hui"
 KOR_shin_ik_hui_sic_desc:9 "§YNaissance :§! §L9 juin 1894, à Gwangju, province de Gyeonggi, Corée§!"
 KOR_yoon_ki_seop:9 "Yoon Ki-seop"
 KOR_yoon_ki_seop_advisor_desc:9 "§YNaissance :§! §L4 avril 1887, à Hanseong, province de Gyeonggi, Corée§!"

 KOR_jo_so_ang: "Jo So-ang"
 KOR_jo_so_ang_sic_desc:0 "§YNaissance :§! §L30 avril 1887, à Wollong-myeon, province de Gyeonggi, Corée§!\n§YCarrière :§! §LJo So-ang, ancien élève de Sungkyunkwan, fut choisi par le gouvernement impérial coréen pour représenter son pays lors d’un voyage d’études au Japon. À son arrivée, il fut confronté à d’énormes préjugés à l’encontre de ses compatriotes, et c’est là que commença son long combat pour l’indépendance de sa nation. Jo s'inscrivit à l'université Meiji pour étudier le droit, mais fut bientôt bouleversé par la nouvelle de l'annexion de la Corée. Après une longue période marquée par l'anxiété et la dépression, Jo se rendit à Shanghai pour tenter d'échapper à la surveillance des autorités japonaises. Là-bas, il croisa le chemin de responsables coréens qui allaient plus tard devenir la colonne vertébrale du gouvernement provisoire de la République de Corée. À la fin de ses études, il s’installa définitivement en Chine. Lorsque le Mouvement du 30 Mai secoua l’est de la Chine, Jo se rendit rapidement à Shanghai, où il retrouva ses camarades et amis, qui s’unirent pour former le gouvernement provisoire. En 1928, Jo, accompagné de ses deux camarades, Kim Kyu-sik et Lyuh Woon-hong, se rendit à la Conférence de Shanghai en tant que délégués de Syngman Rhee. De retour avec ce qui allait causer la chute de Rhee, Jo prit l'initiative de rejoindre et de participer au PIC. Une fois le PNRC fondé, Jo se rangea à nouveau aux côtés de Kim Wonbong, mais cette fois-ci dans une perspective différente. Kim, fervent défenseur des trois principes du peuple, accueillit Jo et son projet de Samgyunisme, une version coréanisée de ces principes que Kim était prêt à accepter afin de dissocier son parti de son statut de simple marionnette du Kuomintang. Jo se tient désormais à l'écart, en tant qu'indépendant, tant des querelles réactionnaires que des socialistes sinophiles, s'efforçant de faire briller la flamme du libéralisme afin que sa patrie, enfin indépendante, puisse naviguer en toute sécurité à contre-courant de l'histoire.§!"

 KOR_chough_pyung_ok: "Chough Pyung-ok"
 KOR_chough_pyung_ok_advisor_desc:9 "§YNaissance :§! §L21 mai 1894, à Cheonan, province de Chungcheong, Corée§!"

 KOR_song_jin_woo:9 "Song Jin-woo"
 KOR_song_jin_woo_leader_desc:9 "§YNaissance :§! §L8 mai 1889, à Damyang, province de Jeolla-Sud, Corée§!\n§YCarrière :§! §LSong Jin-woo étudiait au Japon aux côtés de Kim Seong-su lorsque la nouvelle de l'annexion officielle de la Corée à l'Empire japonais fut annoncée. Après un bref retour au pays, ils reprirent leurs études à l'université Meiji l'année suivante, où ils commencèrent à mobiliser les étudiants coréens en échange et fondèrent un journal étudiant. En 1916, les deux hommes prirent la tête de l'école Choongang, qui devint un centre névralgique du Mouvement du 1er Mars en 1919. Song fut emprisonné, mais libéré au bout d'un an et demi. Il devint alors journaliste nationaliste et continua à œuvrer pour la cause de l'indépendance coréenne à travers divers journaux et associations d'émigrés. Il poursuivit ce travail tout au long des années 1920 et 1930 et fut à nouveau emprisonné, ce qui le contraignit à vivre reclus (officiellement pour cause de maladie) alors que son journal, le Dong-a Ilbo, était censuré par les autorités japonaises.\n\nAprès l'établissement d'une Corée libre, Song est sorti de son isolement pour devenir l'une des figures les plus en vue. Méfiant à l'égard de Lyuh Woon-hyung et de la gauche, il est devenu le chef du Parti démocratique coréen, un parti conservateur.§!"

 KOR_chang_myon:9 "Chang Myon"
 KOR_chang_myon_sic_desc:9 "§YNaissance :§! §L28 août 1899, à Hanseong, province de Gyeonggi, Empire de Corée§!"

 KOR_army_reform_department:9 "Conseil militaire coréen"
 KOR_army_reform_department_theorist_desc:9 "§YFondation :§! §Len Corée§!"

#### Traits ####
 KOR_korean_exile:9 "Exilés Coréens"
 KOR_korean_exile_desc: "§LUn chef militaire coréen en exil qui rêve de rentrer un jour dans une Corée libérée de l'impérialisme japonais. Pour l'instant, il s'est mis au service de seigneurs de guerre chinois prometteurs dans l'espoir qu'un jour l'indépendance de la Corée puisse être obtenue de son vivant.§!"

 KOR_great_president:9 "Président à la Résolution de Fer"
 KOR_great_president_desc:9 "§LLes lâches invertébrés du Gouvernement provisoire coréen pensaient que Rhee avait fait son temps, et qu'il était destiné à pourrir à Honolulu. Son retour ne signifie pas seulement leur échec, mais l'aube d'une nouvelle ère pour l'État coréen. Tous saluent le Chef !§!"

 KOR_generalissimo:9 "Le Généralissime Ilministe"
 KOR_generalissimo_desc:9 "§LNotre nation est unique au monde. Aucune société, aucun peuple ne peut espérer être grand sans un chef fort. Non, ils ont besoin de bergers pour les guider vers la prospérité et la gloire. Au-dessus de tous, le généralissime Lee incarne l'idéal du Grand Homme de l'Histoire qui change le destin de l'humanité, et avec lui à la barre, la Corée ne sera plus jamais faible !§!"

 KOR_tridemist_marshal:9 "Le Maréchal Tridémiste"
 KOR_tridemist_marshal_desc:9 "§LMalgré ses défauts, Sun Yat-sen était un grand homme qui imaginait des républiques libres dans toute l'Asie libérée. Au nom de Sun, Ji Cheong-cheon accomplira les trois principes pour la République coréenne. Gloire au maréchal Ji !§!"

 KOR_red_general:9 "Général Rouge"
 KOR_red_general_desc:9 "§LCombattant avec le Kuomintang lors de l'Expédition du Nord, rejoignant les exilés de Paris, et revenu porter la torche de la révolution en Asie, la carrière révolutionnaire de Kim Wonbong est indéniable. Avec le Général rouge aux commandes, la Corée marche vers son destin révolutionnaire !§!"

 KOR_revolutionary_chairman:9 "Président Révolutionnaire"
 KOR_revolutionary_chairman_desc:9 "§LQui a empêché le Parti national révolutionnaire coréen de se fragmenter au cours de sa décennie d'exil ? Qui a maintenu la dévotion absolue du Parti envers les idéaux de la Doctrine du Sanmin ? Nul autre que le président Kim, et sous sa direction, la Corée connaîtra la liberté.§!"

 KOR_supreme_leader:9 "Leader Suprême"
 KOR_supreme_leader_desc:9 "§LSes critiques l'ont souvent désigné comme un terroriste téméraire, ses rivaux l'accusent d'être un espion des Japonais. Yeom Dong-jin est un homme aux nombreux ennemis et rivaux, mais avec lui aux commandes, personne ne peut douter de sa volonté de fer.§!"

