### Initial Parties ####
 KOR_totalist_party:9 "PTC"
 KOR_totalist_party_long:9 "Parti des Travailleurs Coréens\n§LPetite faction constituée à partir du contingent de Coréens au sein du Parti Syndicaliste Chinois, ou de ceux qui ont trouvé le PNRC trop "modéré". Avant son retour en Corée, le PTC était basé à Paris où ses membres se sont fortement inspirés des idées du néosocialisme et des avant-gardistes travaillistes marginaux.§!\n"

 KOR_KPP_shared_desc:9 "As Japan's hold on Korea began to falter, Lyuh Woon-Hyung intensified his efforts to undermine their rule and rally people from all walks of life to the pro-independence cause. Arrested by Japanese authorities, he continued his work and his acquaintances stretched from former colleagues in the press, athletes and martial artists, anti-conscription activists, students groups, military defectors, various socialist groups and the \"Peasant Alliance\". From this base he created the Committee for the Preparation of Korean Independence and they conducted small-scale raids on the Japanese rear-guard. The committee evolved into the Korea People's Party but soon collapsed due to infighting."
 KOR_syndicalist_party:9 "PTC"
 KOR_syndicalist_party_long:9 "Parti des Travailleurs Coréens\n§LPetite faction constituée à partir du contingent de Coréens au sein du Parti Syndicaliste Chinois ou de ceux qui ont trouvé le KNRP trop "modéré". Elle entretient des relations étroites avec son parti frère, le PSC, et avec l'aile radicale du Parti Syndicaliste Chinois.§!\n"
 KOR_social_democrat_party:9 "CPIC"
 KOR_social_democrat_party_long:9 "Comité pour la Préparation de l'Indépendance Coréenne\n§LLe Comité pour la Préparation de l'Indépendance Coréenne est un comité fondé sur l'unification de toutes les factions politiques de la sphère politique coréenne autour d'un objectif commun : l'indépendance de la Corée. Bien que dominé par d'anciens gauchistes du PIC, le comité ne gaspille aucun effort ni ressource pour rechercher les bénédictions et le soutien d'autres factions, tout en se défendant contre les attaques desdites autres factions. Maintenant que l'indépendance est à portée de main, le comité s'est fixé pour objectif de maintenir les factions unifiées et les différends et les troubles à distance, de maintenir la paix en Corée jusqu'à ce que la nation devienne stable, tout en utilisant également toute la force disponible pour diriger le nouvel État et la nouvelle nation vers certains forme de prospérité.§!\n"

 KOR_KNP_shared_desc:9 "Formed through the reorganisation of Ji Cheong-cheon's New Korea Independence Party in light of Korea's newly independent state, the Korea Nationalist Party is inspired by Dr. Sun Yat-sen's Three Principles of the People, seeking to rebuild Korea in its Tridemist image. Despite sharing similarities with the Korean National Revolutionary Party in its commitment to implementing the Sanmin Doctrine, the KNP views itself as a true follower of Sun's vision, strongly opposing the KNRP for its syndicalist influence."
 #Because this should not be a rulign party, does not need a longer desc unless something goes wrong.
 KOR_social_liberal_party_united:9 "KNP"
 KOR_social_liberal_party_united_long:9 "Korea Nationalist Party\n§L$KOR_KNP_shared_desc$§!\n"
 KOR_social_liberal_party:9 "PIC"
 KOR_social_liberal_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"
 KOR_authoritarian_democrat_party:9 "PIC"
 KOR_authoritarian_democrat_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"

 KOR_market_liberal_party:9 "PIC"
 KOR_market_liberal_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"

 KOR_KIP_shared_desc:9 "The Korea Independence Party is the most prominent political entity governing the Korean Provisional Government, representing the longing for independence of countless parties and people. The KIP consists of many different factions, from KMT-aligned leftists to right-wing ultranationalists. Still, most are aware that by the end of the day, the power and methods of all different factions must be put to full and good use so that Korea can stand back up on its feet to survive against the tide of the world."
 #Because this is not a ruling party, does not need a longer desc.
 KOR_social_conservative_party: "PIC"
 KOR_social_conservative_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"
 KOR_social_conservative_party_split:9 "KIP-M"
 KOR_social_conservative_party_split_long:9 "Korea Independence Party - Moderates\n§L$KOR_KIP_shared_desc$\n\nForced to adopt a more parliamentary approach to maintain their hold onto power, the KIP nevertheless managed to secure their victory through aggressive campaigning and political inertia. They now can claim an official mandate from the people to carry out their vision for a free Korea.§!\n"
 KOR_authoritarian_democrat_party_kip:9 "KIP-H"
 KOR_authoritarian_democrat_party_kip_long:9 "Korea Independence Party - Hardliners\n§L$KOR_KIP_shared_desc$\n\nExpoiting their favored status as the leading figures in the Korean Provisional Government both before and after their return from exile, the KIP was able to easily win elections through political skulduggery and repression. This may cast a shadow on their legitmacy but will not prevent them from having legitimate popularity as well.§!\n"

 KOR_radical_socialist_party: "PNRC "
 KOR_KNRP_desc:9 "The KNRP is the official sister organisation of the Kuomintang, formed from old contingents of the KIP unwilling to cooperate with its predominantly antisocialist government. The KNRP seeks to implement the Three Principles of the People to Korea as well, whether it be through methods democratic or more coercive. While it was certainly an apolitical organisation within the Kuomintang, its members have a range of leanings from those who supported the Provisional Action Committee and those who supported the Reorganisation Comrades Association."
 KOR_radical_socialist_party_long:9 "Parti Révolutionnaire National Coréen\n§LLe KNRP est l'organisation sœur officielle du Kuomintang, formée d'anciens contingents du KIP qui ne veulent pas coopérer avec son gouvernement majoritairement antisocialiste. Le KNRP cherche également à mettre en œuvre les Trois Principes du Peuple en Corée, que ce soit par des moyens démocratiques ou plus coercitifs. Bien qu'il s'agisse certainement d'une organisation apolitique au sein du Kuomintang, ses membres ont des tendances diverses allant de ceux qui ont soutenu le Comité d'Action Provisoire à ceux qui ont soutenu l'Association des Camarades Réorganisés.§!\n"
 KOR_radical_socialist_party_split:9 "KNRP-L"
 KOR_radical_socialist_party_split_long:9 "Korean National Revolutionary Party - Left\n§L$KOR_KNRP_desc$\n\nThe mainline leftist faction is led by Kim Wonbong and and Yoon Se-ju and generally revolves around Kim's cult of personality.§!\n"
 KOR_authoritarian_democrat_party_knrp:0 "PNRC-R"
 KOR_authoritarian_democrat_party_knrp_long:9 "Korean National Revolutionary Party - Right\n§L$KOR_KNRP_desc$\n\nThe rightist faction is led by Kim Kyu-sik and Jo So-ang, who have generally distanced themselves from the more socialist elements of the KNRP platform.§!\n"

 KOR_WSS_shared_desc:9 "The White Shirts Society was established by various extremists in the Korean Liberation Army desperate to topple Japanese rule. Led by Yeom Dong-jin, though aligned with the Korean Provisional Government funded by the Beiyang Government they drew inspiration from the Kuomintang's Three Principles of the People. Generally hostile towards syndicalism and other factions more concilatory towards socialism, they have proven more than willing to back up their national populist rhetoric with political violence and terrorism. Unfortunately, they are far from alone in that willingness - with many other post-independence factions also engaging in assassinations."
 KOR_national_populist_party_knrp:9 "KNRP-WSS"
 KOR_national_populist_party_knrp_long:9 "Korean National Revolutionary Party - White Shirts Society\n§L$KOR_WSS_shared_desc$\n\nForced to ally with the KNRP at behest of the the Chinese, they remained close to Blue Shirts Society which they see as a kindred movement. Nevertheless they continued to plot for the day they could take leadership outright.§!\n"
 KOR_national_populist_party:9 "PIC"
 KOR_national_populist_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"

 KOR_KLP_shared_desc:9 "The Liberal Party was founded as a merger of several major groups loyal to the new dictatorship - the Korean youth Corps, the Korean National Association to for the Promotion of Independence, the Korean Federation of Trade Unions, the Korean Peasants' Union Federation, the Korean Women's Association, and members of the Korean Liberation Army led by Lee Beom-seok who initially formed the Unified Labour-Farmer Party. Despite their name, they oppose Western individualism and instead pursue a \"Korean-style liberal democracy\" which infuses traditionalism, anti-socialism and anti-Japanese sentiment as well as Ilminism - the \"One-People Principle\" which promotes Korean ultranationalism and ethnic supremacy."
 KOR_authoritarian_democrat_party_lp:9 "LP-C"
 KOR_authoritarian_democrat_party_lp_long:9 "Liberal Party - Conservatives\n§L$KOR_KLP_shared_desc$\n\nThe conservative faction of the Liberal Party is led by Lee Gap-seong, a long-time independence activist, member of Korean Christian groups, and an organiser for the Liberal Party (though he initially bounced around different groups). They have been used by Rhee as a counter-balance to Lee Beom-seok's Ilminist faction.§!\n"
 KOR_paternal_autocrat_party_split:9 "LP-I"
 KOR_paternal_autocrat_party_split_long:9 "Liberal Party - Ilminists\n§L$KOR_KLP_shared_desc$\n\nThe Ilminists are led by Lee Beom-seok and represent the more extreme wing of the party - operating primarily through the Korean National Youth Corps and the military. They are viewed with some suspicion by Rhee and have been accused of sympathies to the global National Populist movement.§!\n"
 KOR_paternal_autocrat_party:9 "PIC"
 KOR_paternal_autocrat_party_long:9 "Parti de l'Indépendance Coréenne\n§L$KOR_KIP_desc$§!\n"

### Events ###
 korea_events.1.t:9 "Ouverture des Partis Démocratiques"
 korea_events.1.d:9 "Hourra, démocratie coréenne ! Hourra, nous ne sommes plus une dictature !"
 korea_events.1.a:9 "Liberté."
 korea_events.1.b:9 "We trust that Kim can win in a fair contest."

 korea_events.2.t:0 "Élection de [GetYear]"
 korea_events.2.d:0 "Enfin, après beaucoup d'anticipation lors du dépouillage des urnes, le vainqueur des élections de cette année est..."
 korea_events.2.a:9 "L'Association Nationale Coréenne - Démocrates !"
 korea_events.2.b:9 "Le Parti Social Coréen !"
 korea_events.2.c:9 "Le Parti Démocratique Coréen !"
 korea_events.2.dem:9 "Le Parti du Peuple Ouvrier Coréen"
 korea_events.2.e:9 "The Korea Independence Party!"

 korea_events.3.t:0 "Succès révolutionnaires en Corée"
 korea_events.3.d:0 "Pendant les guerres d'unification et de résistance, les révolutionnaires coréens ont combattu aux côtés de l'Armée nationale révolutionnaire. Nombre d'entre eux appartenaient au Parti révolutionnaire national coréen (PRNC), une organisation créée par l'officier coréen Kim Wonbong, lui-même diplômé de l'Académie révolutionnaire de Whampoa.\n\nAprès la guerre, Kim Wonbong est rentré au pays avec le KNRP pour administrer la nation coréenne récemment libérée. Dans le cadre de ses réformes visant à moderniser la Corée, Kim a mis en œuvre les idéaux des trois principes du peuple, en s'inspirant fortement du Kuomintang chinois. Aujourd'hui, des représentants coréens ont rencontré [ROOT.GetLeader] pour discuter des relations futures entre la République de Chine et la République de Corée. Bien que la Corée doive rester sous la sphère et la protection de la Chine, elle jouira néanmoins d'une certaine autonomie nominale, les deux pays s'étant engagés à travailler ensemble en tant que sœurs révolutionnaires jumelles pour libérer l'Asie de l'Est de l'impérialisme."
 korea_events.3.a:0 "Nous sommes solidaires !"

 korea_events.4.t:0 "Traité de Paix et de Sécurité"
 korea_events.4.d:0 "Pendant les guerres d'unification et de résistance, les révolutionnaires coréens ont combattu aux côtés de l'Armée nationale révolutionnaire. Nombre d'entre eux appartenaient au Gouvernement provisoire de la République de Corée (PGROK), une faction indépendantiste coréenne dirigée par le grand révolutionnaire coréen Kim Koo.\n\nAprès la guerre, Kim Koo et le PGROK sont rentrés au pays pour administrer la nation coréenne nouvellement libérée, avec la bénédiction de la République de Chine. Cependant, malgré l'indépendance durement acquise de la Corée, les Coréens n'ont pas oublié l'aide et l'amitié qu'ils entretenaient avec leurs camarades chinois du Kuomintang. Aujourd'hui, des représentants coréens ont rencontré [ROOT.GetLeader] pour discuter des relations futures entre la République de Chine et la République de Corée. Si la Corée doit rester sous la sphère et la protection de la Chine, elle jouira néanmoins d'une certaine autonomie nominale, les deux pays s'étant engagés à collaborer en tant que tigres jumeaux pour maintenir la paix, la sécurité et la stabilité en Asie de l'Est."
 korea_events.4.a:0 "Nous sommes solidaires !"

 korea_events.5.t:0 "Kim Hong-il Retourne en Corée"
 korea_events.5.d:9 "En raison de l'occupation japonaise de leur pays, diverses armées de guérilla coréennes ont proliféré en Mandchourie, en Corée du Nord et en Chine continentale tout au long des années 1920. De nombreux révolutionnaires et nationalistes coréens en exil ont cherché la sécurité dans les académies militaires et les mouvements républicains chinois, dans l'espoir de rentrer un jour dans leur pays.\nComme beaucoup d'autres, Kim Hong-il s'est retrouvé en exil et s'est rendu dans l'extrême sud-ouest du Guizhou pour y suivre une formation militaire, où il a rencontré He Yingqin. En 1926, Hong-il rejoint l'Armée nationale révolutionnaire et participe à l'expédition du Nord, qui se solde par un échec. Après l'échec de l'expédition, Hong-il s'enfuit avec Yingqin et les restes de la faction de droite du Kuomintang dans le Yunnan. Cependant, avec la victoire des Chinois sur leurs adversaires japonais lors de la seconde guerre sino-japonaise, Hong-il a officiellement annoncé sa démission pour servir dans la nouvelle république coréenne."
 korea_events.5.a:0 "Merci pour votre service."

 korea_events.6.t:9 "Our Allies in Korea"
 korea_events.6.d:9 "During the final war against Japanese aggression, Korean revolutionaries worked alongside our government to bring an end to Tokyo's wretched empire and see a free Korea after half a century of domination. These faithful revolutionaries, serving under the Provisional Government of the Republic of Korea, have transitioned from a motley crew of freedom fighters to a responsible government under the leadership of Kim Koo with the blessing and support of [ROOT.getLeader] and the [ROOT.getAdjective] government in [ROOT.Capital.GetCapitalVictoryPointName].\n\nKim, who has solidified his position as Korea's founding father, has ensured that Korea has emerged as a pluralising society committed towards bettering the nation with every progressing year. Abroad, Kim Koo has also maintained close ties with [ROOT.getLeader]'s government, with outside observers noting the blooming [ROOT.getAdjective]-Korean special relationship. With [ROOT.getLeader] and Kim Koo always on the same page and agenda, the [ROOT.getAdjective]-Korean bloc shall continue to be pillars of world peace and security."
 korea_events.6.a:9 "Cheers for a lasting partnership."

 korea_events.7.t:9 "Socialism in the Sister Republic"
 korea_events.7.d:9 "With Generalissimo Feng Yuxiang's embrace of the Kuomintang's leftist flank underway, the Christian General now looks to consolidate China's sphere of influence in a new socialistic direction, especially the Korean Republic. Although installed by Feng and having given assurances of his continued loyalty, Feng and the Kuomintang remains cautious about Kim Kyu-sik's government. While he did follow the Central Executive Committee and the Korean National Revolutionary Party into exile in Paris before a triumphant return to China a decade later, it was always known that Kim Kyu-sik gravitated closer towards rightist circles within the Kuomintang.\n\nWhile Kim has leaned into a more socialistic direction in following Feng's lead, many within the party advise the Generalissimo to do away with Kim entirely in favour of a more reliable figure. Kim Wonbong, a longtime associate with the Kuomintang's left wing and former leader of the KNRP, has been raised as a prime candidate to replace Kim Kyu-sik. While slighted by Feng's initial favouritism towards Kim Kyu-sik, he has signalled to Feng of his intentions to support the new socialist government should he take power, convincing the Christian General.\n\nIn the late afternoon, Kim Wonbong and a contingent of loyalists stormed the army headquarters and seized the National Assembly. Moving swiftly, Kim Wonbong personally detained Kim Kyu-sik before having him removed from office. In a speech to onlookers, Kim Wonbong declared that Korea would embrace a genuine socialist direction and forge a republic that truly empowers the workers and peasants."
 korea_events.7.a:9 "The Korean people have stood up!"

 korea_events.8.t:9 "Purifying the Revolution Abroad"
 korea_events.8.d:9 "At long last, the Kuomintang finds itself bereft of the plague which has turned it into an immobile and decaying organisation for the past decade. Yet, more fifth columnists and socialist filth remain across East Asia. In the recently liberated Korean Peninsula, Generalissimo He Yingqin left the government in the control of Kim Kyu-sik and the Korean National Revolutionary Party, a critical mistake.\n\nKim, while less inclined to Marxism than the foolish anarchist Kim Wonbong, still threw in his lot with Wang Jingwei's den of dogs in Paris, instead of remaining in China to continue the righteous fight against imperialism and reaction. While in Paris, Kim Kyu-sik no doubt absorbed a substantial amount of syndicalist nonsense into his political agenda, which will surely bring Korea to ruin.\n\nYet, not all is lost. In the decadent mess that is the KNRP lies Yeom Dong-jin and his White Shirt Society. Long a friend to Teng Jie and the Kuomintang Blue Shirts, Yeom has embraced the use of terror and the revolver to bring about true political change and has instilled true revolutionary principles in his followers. The Lingxiu has resolved to call upon his old friend to save the Korean Republic from crypto-Marxism and deliver Korea to the true path of revolution.\n\nBringing in a coalition of loyalists and true national revolutionaries, Yeom's men quickly took control of downtown Seoul and the army headquarters while he personally stormed the National Assembly to detain President Kim. After an impromptu swearing-in ceremony, President Yeom declared that he would defend the Republic from all of Korea's enemies and cleanse the nation of all traitors."
 korea_events.8.a:9 "The Sister Republic returns to the fold."

