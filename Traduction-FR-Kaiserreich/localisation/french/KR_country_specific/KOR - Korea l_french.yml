### Characters ###

 KOR_kim_koo: "Kim Koo"
 KOR_kim_koo_bio:9 "Dominant tant ses alliés que ses adversaires, Kim Koo incarne à la fois ce qui reste du nationalisme coréen et le véritable instigateur d’innombrables cas de terreur blanche. De forte carrure dès son plus jeune âge, le jeune Kim Koo s’engagea dans les armées paysannes du Mouvement Tonghak, et lorsque le soulèvement fut écrasé, il fut sauvé par An Taehoon, le père du légendaire An Junggeun, qui assassina plus tard Itō Hirobumi. En 1896, Kim fut arrêté pour avoir assassiné un marchand japonais, qu’il prenait pour un officier militaire. Après s’être échappé, Kim se détourna de la politique et s’employa plutôt à créer des écoles avec l’aide des églises. En 1905, cependant, indigné par la signature du traité nippo-coréen, Kim revint sur la scène nationaliste, se liant d’amitié avec des personnes partageant ses idées qui allaient devenir ses camarades.\n\nAvec la création du Gouvernement provisoire de la République de Corée à Shanghai en 1925, Kim en devint l’un des membres à part entière, s’imposant rapidement comme le pilier du gouvernement provisoire, que ce soit de manière directe ou indirecte. Au cours de son ascension au pouvoir, Kim occupa à la fois les fonctions de membre du Congrès provisoire coréen et de chef de la police, consolidant ainsi davantage sa position. En 1923, il fut nommé ministre de l'Intérieur provisoire, puis Premier ministre en 1926, avant de parvenir à évincer Syngman Rhee du Gouvernement provisoire en 1928. Finalement, Kim fonda le Parti pour l'Indépendance de la Corée en 1930, qui allait devenir son principal instrument politique."
 KOR_kim_koo_leader_desc:9 "§YNaissance :§! §L29 août 1876, à Haeju, province de Hwanghae, Corée§!\n§YCarrière :§! §L$KOR_kim_koo_bio$\n\nAprès la libération de la Corée, Kim et le PIC sont revenus avec pour mission de bâtir une nouvelle république sur les ruines de la colonisation japonaise et, espérons-le, de mener la Corée vers un avenir radieux sous un gouvernement représentant la volonté du peuple.§!"
 KOR_kim_koo_soccon_leader_desc:9 "§YNaissance :§! §L29 août 1876, à Haeju, province de Hwanghae, Corée§!\n§YCarrière :§! §L$KOR_kim_koo_bio$\n\nAprès la libération de la Corée, Kim et le PIC ont obtenu un véritable mandat populaire à l'issue des premières élections démocratiques libres et équitables, malgré les craintes initiales que le PIC ne recoure à l'autoritarisme et ne persécute les partis d'opposition. Fort désormais de la confiance du peuple coréen, Kim Koo continuera à diriger une République de Corée stable et démocratique, œuvrant pour garantir son indépendance à jamais.§!"
 KOR_kim_koo_autdem_leader_desc:9 "§YNaissance :§! §L29 août 1876, à Haeju, province de Hwanghae, Corée§!\n§YCarrière :§! §L$KOR_kim_koo_bio$\n\nDésormais à la tête de la nouvelle République coréenne, Kim et le PIC ont pris le contrôle du pays et mis en place un gouvernement fondé sur une véritable démocratie coréenne, permettant au peuple d'exprimer sa volonté tout en protégeant le pays contre les traîtres et les menaces extérieures. Sous sa direction, Kim Koo veillera à ce que la République coréenne devienne une nation forte et indépendante, débarrassée des éléments radicaux et soumis à l'influence étrangère.§!"
 KOR_kim_koo_sic_desc:9 "§YNaissance :§! §L29 août 1876, à Haeju, province de Hwanghae, Corée§!"

