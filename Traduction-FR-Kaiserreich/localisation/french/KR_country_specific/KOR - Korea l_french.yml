 KOR_germany_tt:9 "Bonus d'attaque contre l'§HAllemagne et ses colonies§! : [?0.10|+=%1]"
 KOR_china_check_tt:9 "§LLa Corée est sous le contrôle du §aParti national§! §Rrévolutionnaire coréen§!.§!"
 KOR_knrp_wss_check_tt:9 "§LLa §nSociété des Chemises blanches§! a été intégrée dans le §aParti national§! §Rrévolutionnaire coréen§!.§!"
 KOR_establishing_korean_national_capitalism_effect_tt:9 "§WNous obtiendrons des usines civiles à §YSéoul, Pyongyang, Busan et Chongjin§!. Nous obtiendrons jusqu'à deux usines civiles par ville selon l'influence des §RRadicaux-Socialistes§!, §aDémocrates Autoritaires§! et §nNationaux-Populistes§!.§!"

 KOR_all_military_reforms_tt:9 "§LNous avons complété toutes les réformes militaires nécessaires.§!"
 KOR_final_army_tooltip_tt:9 "§CGrâce à notre discipline, à notre dévouement et à notre détermination sans faille, nous avons forgé une puissante force militaire qui préservera la liberté de la Corée pour toujours !§!"

 KOR_national_army_tt:9 "§CMême si elle est désormais libérée de la domination coloniale, la création d'une nouvelle armée nationale garantira l'indépendance de la Corée. Construisons-en une qui fera l'envie de tout l'Orient !§!"

 KOR_improve_legitimacy_effect_tt:9 "§GLa légitimité de notre gouvernement va s'améliorer !§!"
 KOR_improve_military_effect_tt:9 "§GNotre pays va renforcer ses forces armées !§!"

 KOR_improve_economy_effect_tt:9 "§GNotre pays va redresser son économie !§!"

 KOR_free_nation_tt:9 "§mMême si la Corée s'est peut-être libérée de l'emprise de Tokyo, notre indépendance s'est payée au prix d'une dévastation économique. Remettons-nous sur pied.§!"

 KOR_bright_future_tt:9 "§mNous allons redoubler d'efforts pour moderniser la Corée !§!"
 KOR_cinema_tt:9 "§lLumière, Caméra, Action !§!"

 KOR_railways_tt:9 "§CSi la Corée est un vassal de la Chine, cette priorité développera une ligne ferroviaire supplémentaire vers Shenyang !§!"

### Ideas ####
 KOR_legitimacy_idea_1:9 "Légitimité du Gouvernement Provisoire : §oAbyssale§!"
 KOR_legitimacy_idea_1_desc:9 "En exil depuis des décennies, le Gouvernement provisoire de Corée ne pouvait qu'assister, consterné, à la façon dont l’Empire du Japon privait sans cesse la nation de nouvelles libertés et soumettait le peuple coréen à l'humiliation de l’asservissement. Même aujourd'hui, alors que les chaînes japonaises sont définitivement brisées, l'État coréen reste dans une situation incertaine.\n\nLe départ des autorités coloniales japonaises a contraint le Gouvernement provisoire à se démener pour prendre les rênes de l'administration, plongeant le pays dans un chaos temporaire. Au-delà des problèmes liés à la transition gouvernementale, le nouveau régime se prépare également à diriger une nation qui a passé des générations sous la domination coloniale. Malgré la tâche titanesque qui attend le Gouvernement provisoire pour établir une nation nouvelle et libre, le peuple et ses dirigeants sont convaincus que l'avenir de la Corée sera bel et bien radieux."
 KOR_legitimacy_idea_2:9 "Légitimité du Gouvernement Provisoire : §gDysfonctionnelle§!"
 KOR_legitimacy_idea_2_desc:9 "$KOR_legitimacy_idea_1_desc$"
 KOR_legitimacy_idea_3:9 "Légitimité du Gouvernement Provisoire : §GToléré§!"
 KOR_legitimacy_idea_3_desc:9 "$KOR_legitimacy_idea_1_desc$"

 KOR_legitimacy_democratic:9 "Légitimité du Gouvernement Provisoire : §cCorée Démocratique§!"
 KOR_legitimacy_democratic_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice."
 KOR_legitimacy_kip:9 "Légitimité du Gouvernement Provisoire : §cIndépendance Éternelle§!"
 KOR_legitimacy_kip_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nAprès avoir été à la tête du gouvernement par intérim et fort du mandat que lui a confié le peuple coréen, Kim Koo s'apprête à s'engager dans une voie à la fois conservatrice et étonnamment égalitaire, adaptée aux conditions sociales et économiques propres à la Corée."
 KOR_legitimacy_authkip:9 "Légitimité du Gouvernement Provisoire : §aIndépendance Défendue à Tout Prix§!"
 KOR_legitimacy_authkip_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows.\n\nWith such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nWhile Kim Koo may have considered carrying out the democratic experiment, it has become clear to him that he alone has Korea's best interests in mind. With crypto-syndicalists, western lapdogs, and overzealous buffoons flanking him at any turn, how can the man who helmed the Provisional Government for so long allow them to ruin Korea's chance at a better future? No, Kim Koo will ensure that Korea remains on the right and proper path towards freedom and independence."
 KOR_legitimacy_knp:9 "Légitimité du Gouvernement Provisoire : §lTrois Principes de Corée§!"
 KOR_legitimacy_knp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Yun Chi-Young, le pays s'apprête à s'engager sur la voie tracée par Sun Yat-sen et ses Trois Principes, mais dans une direction plus démocratique et plus conservatrice, mieux adaptée aux conditions sociales et économiques propres à la Corée."
 KOR_legitimacy_kdp:9 "Légitimité du Gouvernement Provisoire : §mForteresse Démocratique§!"
 KOR_legitimacy_kdp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Chough Pyung-ok, le pays s'apprête à s'engager sur une voie conservatrice modérée, inspirée des démocraties libérales occidentales, mais adaptée aux spécificités sociales et économiques de la Corée."
 KOR_legitimacy_lpp:9 "Légitimité du Gouvernement Provisoire : §SIdéalisme Sans Compromis§!"
 KOR_legitimacy_lpp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Luh Woon-hyung, le pays s'apprête à s'engager dans une voie socialiste modérée, rejetant tant les puissances capitalistes occidentales que le syndicalisme révolutionnaire trop zélé, car la Corée doit tracer sa propre voie, adaptée à ses conditions sociales et économiques particulières."

 KOR_legitimacy_authoritarian:9 "Légitimité du Gouvernement Provisoire : §aLiberté par la Force§!"
 KOR_legitimacy_authoritarian_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows.\n\nWith such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim."
 KOR_legitimacy_authknp:9 "Légitimité du Gouvernement Provisoire : §aTridémisme Perfectionné§!"
 KOR_legitimacy_authknp_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Ji Cheong-cheon, unlike the fools who oppose him, has fought for Korean freedom throughout his entire life. As a true follower of Sun Yat-sen, unlike the syndicalist rodents of the Korean National Revolutionary Party who tainted his vision, the people can be assured that President Ji will carry out Sanmin Doctrine in a way truly befitting of the Korean people."
 KOR_legitimacy_lp:9 "Légitimité du Gouvernement Provisoire : §PLe Grand Généralissime§!"
 KOR_legitimacy_lp_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nGeneralissimo Lee Beom-seok and the Liberal Party only have love for the Korean people, and seek to build a truly great Korean Republic. Our nation will never again be subject to peoples truly beneath the dignity of Korea, and under the Generalissimo, we can be assured we will always be free from the capitalists and socialists who seek to enslave us."
 KOR_legitimacy_diarchy:9 "Légitimité du Gouvernement Provisoire : §PPuissance de la Diarchie§!"
 KOR_legitimacy_diarchy_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Syngman Rhee is a man who truly knows the struggle of the Korean people. With Generalissimo Lee at his right and the Liberal Party at his whim, the Korean people can rest easy knowing that these two men of divine providence will forge a Korea seeped in strength and a bulwark against cruel and unnatural syndicalism."
 KOR_legitimacy_rhee:9 "Légitimité du Gouvernement Provisoire : §aSeul Sauveur de la Corée§!"
 KOR_legitimacy_rhee_desc:9 "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Syngman Rhee is a man who truly knows the struggle of the Korean people. With the Liberal Party as his whim and his alone, Rhee will build a truly just and strong Korea that does not betray the values and traditions of his people. With friends in Washington, the Korean people can rest easy knowing that no nation will ever threaten Korean independence ever again."

 KOR_legitimacy_revolutionary:9 "Légitimité du Gouvernement Provisoire : §tCorée Révolutionnaire§!"
 KOR_legitimacy_revolutionary_desc:9 "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past."
 KOR_legitimacy_wpk:9 "Légitimité du Gouvernement Provisoire : §oLa Révolution Locale§!"
 KOR_legitimacy_wpk_desc:9 "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Chairman Pak Hon-yong. A veteran revolutionary who carried out the fight in the occupied homeland, he will ensure that Korea's path towards true socialism is undertaken on Korea's terms."
 KOR_legitimacy_npp:9 "Légitimité du Gouvernement Provisoire : §rLa Corée S'est Levée§!"
 KOR_legitimacy_npp_desc:9 "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Chairman Kim Tu-bong. A hardened revolutionary forged in the revolutionary stronghold of MinGan, Kim and the NPP will ensure that Korea embarks upon the steady path towards socialism, with all patriotic and truly democratic parties allowed to join the work ahead."
 KOR_legitimacy_knrp:9 "Légitimité du Gouvernement Provisoire : §RRévolution Nationale Coréenne§!"
 KOR_legitimacy_knrp_desc:9 "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than the faithful members of the Korean National Revolutionary Party. True followers of Sun Yat-sen and the Kuomintang, Kim Wonbong and Kim Kyu-sik know the real meaning of freedom, and under their leadership of Korea, the nation will be made anew in a righteous National Revolution."
 KOR_legitimacy_wss:9 "Légitimité du Gouvernement Provisoire : §nDémocratisation de la Peur§!"
 KOR_legitimacy_wss_desc:9 "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Yeom Dong-jin. Some decry him as a collaborator, terrorist, and bandit, but the Supreme Leader pays no heed to such voices. To him, the new Korea can only be forged through his iron will, with terror as his choice tool for the nation's rebirth."

 #Democratic Ideas
 KOR_welfare_state:0 "État Providence en Plein Essor"
 KOR_welfare_state_desc:9 "Bien que la Corée ait été libérée de l'occupation japonaise, notre peuple continue de souffrir de difficultés économiques, d'autant plus que le pays se remet encore des conditions de guerre. Maintenant que la situation s'est stabilisée, nous mettrons en place des mesures de protection sociale de base pour tous les Coréens, afin de garantir des conditions de vie décentes et d'empêcher les idéologies radicales de s'enraciner au sein de la population."
 KOR_westernising_state:9 "État Occidentalisé"
 KOR_westernising_state_desc:9 "La libération de la Corée a conduit à la création d'une république démocratique, et le Parti démocratique de Corée a remporté les premières élections. Forts de ce mandat populaire, il nous incombe désormais d'assurer la stabilité à long terme de la république. Les sociétés démocratiques du monde occidental nous ont fourni un excellent exemple à suivre ; adaptons avec soin les valeurs positives issues des démocraties occidentales tout en préservant l'identité coréenne unique."
 KOR_working_class:9 "Aide à la Classe Ouvrière"
 KOR_working_class_desc:9 "En tant que principale force représentant la gauche dans la nouvelle Corée démocratique, le Parti du Peuple ouvrier s'efforcera d'améliorer les conditions de vie de la classe ouvrière. Des réformes fondamentales du droit du travail, telles que la journée de travail de huit heures, l'interdiction du travail des enfants, l'instauration d'un salaire minimum et d'autres droits fondamentaux des travailleurs, seront mises en œuvre à l'échelle nationale, afin que les travailleurs coréens puissent pleinement profiter des fruits de leur propre travail."
 KOR_civilian_rule:9 "Contrôle Civil de l'Armée"
 KOR_civilian_rule_desc:9 "Depuis le retour du Gouvernement provisoire, une république constitutionnelle a été instaurée en Corée. La jeune république doit faire face à de nombreux défis, tant sur le plan intérieur qu’extérieur. Afin de préserver le caractère civil de l’administration, l’armée sera entièrement placée sous le contrôle civil, ce qui garantira la pérennité de la Constitution et permettra de parer à toute prise de pouvoir violente par des radicaux et des extrémistes."

 #Authoritarian Ideas
 KOR_antisocialist:9 "La Nation Morale"
 KOR_antisocialist_desc:9 "Le socialisme, sous toutes ses formes, ne vise qu’à attiser davantage les conflits de classe dans l’espoir d’atteindre une prétendue égalité sociale par la révolution. Dans la poursuite de leurs objectifs, ils ne feront que provoquer la destruction de la nation coréenne et de sa culture si nous ne mettons pas un terme à cela. Ce n’est qu’en promouvant une société morale qui met l’accent sur la piété filiale et le respect des traditions que nous pourrons garantir la stabilité et la survie de la Corée dans son ensemble."
 KOR_autarkic_state:9 "L'État Autarcique"
 KOR_autarkic_state_desc:9 "Même si notre pays ne dispose pas d’une économie comparable à celle de nos voisins, nous devons, en fin de compte, nous contenter de ce dont nous disposons et nous développer si nous voulons que la Corée devienne un pays véritablement indépendant. C’est grâce à la seule volonté et à la détermination du peuple coréen que nous jetterons les bases d’une économie nationale indépendante, capable d’assurer la prospérité de tous et de garantir la sécurité de la patrie."
 KOR_neither_china_nor_japan:9 "Contre le Dragon, Contre le Soleil"
 KOR_neither_china_nor_japan_desc:9 "Pendant trop longtemps, la Corée a été le jouet de la Chine et du Japon, qui nous traitaient comme de simples pions au service de leurs ambitions impérialistes. Mettons fin à cette idée et affirmons clairement que tant que le Taegeukgi continuera de flotter fièrement dans les airs, la Corée restera un peuple prêt à se battre pour son indépendance, tant que ces deux pays chercheront à nous imposer leur influence."
 KOR_corporatism:0 "L'État Corporatiste"
 KOR_corporatism_desc:9 "The subjugation of our nation at the hands of Japan happened during a moment of immense weakness for Korea, its backwardness exacerbated by the corruption of the Joseon elites. As a result, peasant rebellions rose up and plunged the nation into further weakness, condemning our Korean master race to decades of humiliation by Japanese imperialists. With Korea now free once more, we will make sure class conflicts never happen again, and harmony between all Koreans remains at all costs."
 KOR_third_way:9 "Contre la Puanteur du Capitalisme et du Marxisme"
 KOR_third_way_desc:9 "Marxist imperialism and capitalist imperialism, though the former is worse, both constantly seek dominance and profit, leading to the destruction of other ethnic groups and nations. To fight against this miasma of imperialist ideologies on our soil, the unification of all Koreans into one indivisible people is necessary for preserving the independence of the Korean nation."
 KOR_universal_suffrage:0 "Avant-garde de l'Émancipation"
 KOR_universal_suffrage_desc:0 "Notre nation est un phare brillant de l'émancipation, car presque nulle part ailleurs dans le monde les femmes ne bénéficient de la même liberté politique."
 KOR_stratocracy:9 "Stratocratie Coréenne"
 KOR_stratocracy_desc:9 "The continued preservation of Korean independence and sovereignty is dependent on the ability of our military to defend Korea from external forces; it is only natural that everyone must do their part in the service of supporting our army, unless we lose our nation once more. By placing the military at the forefront of national importance and bringing about military-citizen unity, Korea will forever be free!"

 #Revolutionary Ideas
 KOR_equal_republic:9 "La République Égale"
 KOR_equal_republic_desc:9 "At long last, the Revolution has arrived in Korea. With the liberation of the country, it falls upon our government to establish economic equality for all Koreans, destroying the shackles of oppression. The unjust influence and dominance of the Yangban shall be abolished, and Korea's wealth shall be accessible to all Koreans."
 KOR_unique_socialism:9 "Socialisme aux Caractéristiques Coréennes"
 KOR_unique_socialism_desc:9 "Marxism, as it was originally envisaged, was modelled around the mature capitalist economies of Western Europe that possessed a large industrial proletariat. However, as an agrarian nation with little in terms of an industrial base, the conditions for Korea to reach a socialist mode of production do not exist. Even so, we shall integrate the universal truth of Marxism with the realities of Korea, and build our own path towards socialism!"
 KOR_longyan:9 "Leçons de Longyan"
 KOR_longyan_desc:9 "The Kuomintang's MinGan Insurgency has been a valuable lesson for socialist revolutionaries around the world. Unlike the conventional tactics used in the French and British civil wars, the Longyan-based insurgency has given an important insight into the viability of guerrilla warfare. Using such unconventional tactics against our enemies, we shall prevail even if the world is against us!"
 KOR_tutelage:9 "Deuxième Étape de la Révolution"
 KOR_tutelage_desc:9 "In his Fundamentals of National Reconstruction, Dr. Sun Yat-sen detailed the three stages of revolution to transition China to a democratic nation: military rule, political tutelage, and constitutional government. With the expulsion of all obstacles to democracy, Korea has entered the second stage of revolution. Until the people are fully ready for self-governance and democratic rights, we shall guide them as mentors and crack down on those who seek to subvert the revolution."
 KOR_revolutionary_vanguard:0 "Avant-garde Révolutionnaire"
 KOR_revolutionary_vanguard_desc:9 "For a revolution to succeed, it must be organised and disciplined, guided by a vanguard of the most conscious of individuals. If Asia is to be freed from the clutches of imperialist colonialism, there must be a vanguard to bring about the flames of revolution to all corners of Asia. Alongside our allies, we shall serve as that very vanguard and enlighten all peoples of Asia to the grand vision of Pan-Asianism!"
 KOR_germany:9 "Rempart Contre l'Allemagne"
 KOR_germany_desc:9 "In the last two decades, Germany has consistently served as a bastion of foreign imperialism in Asia, becoming the foremost European power in the region while working with local collaborators to stamp out anti-imperialist revolutions, such as what happened with the Northern Expedition. Now, under the guidance of the Three Principles, China and Korea shall stand together for the liberation of Asia, and we shall serve as a bulwark against the German menace."
 KOR_great_purge:9 "Révolution Purifiée"
 KOR_great_purge_desc:9 "The long, arduous struggle for Korean independence has often been corrupted by the presence of treacherous intellectuals and bureaucrats of various shades, be it degenerate socialists, the democrats, the heads of the Provisional Government or the Ilminists. It shall be corrupted no more! Under our Supreme Leader, the Korean Revolution will be completed thoroughly. The White Shirts Society will cure the ills of Korean society, purifying it of its poisonous elements, and lead it to a truly revolutionary future, ushering the rebirth of the nation."

 #Economy Ideas
 KOR_economy_idea_1:9 "Économie Nationale Coréenne : §oEn Lambeaux§!"
 KOR_economy_idea_1_desc:9 "Although the Korean people can now enjoy freedom from Japanese tyranny, the country finds itself in the midst of rubble and turmoil. When the Japanese surrendered and ceded control of Korea, the mass exodus of colonial businessmen and settlers left a great vacuum in our nation's economic tapestry. Waves of confused citizens unaware of the Japanese withdrawal have only bolstered the responsibilities of the Provisional Government.\n\nMuch of Korea's northern industrial regions have been hit particularly hard by the war, and collaborationist landlords throughout the country continue to plague the government. If the Provisional Government hopes to capture the support of the people, it must work diligently to tend to the economic needs of the people."
 KOR_economy_idea_2:9 "Économie Nationale Coréenne : §gReconstruction en Cours§!"
 KOR_economy_idea_2_desc:9 "Although the Korean people can now enjoy freedom from Japanese tyranny, the country finds itself in the midst of rubble and turmoil. When the Japanese surrendered and ceded control of Korea, the mass exodus of colonial businessmen and settlers left a great vacuum in our nation's economic tapestry. Waves of confused citizens unaware of the Japanese withdrawal have only bolstered the responsibilities of the Provisional Government.\n\nMuch of Korea's northern industrial regions have been hit particularly hard by the war, and collaborationist landlords throughout the country continue to plague the government. The Provisional Government in response to the economic crisis has already begun drafting a plan for redistributing collaborator and colonial property to the poorest Korean peasants, and the northern industries have been placed under direct government control for the time being."
 KOR_economy_idea_3:9 "Économie Nationale Coréenne : §GModernisation de la Nation§!"
 KOR_economy_idea_3_desc:9 "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, though it may be a time before they begin to operate at proper productivity levels. In the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government. While Korea is far from a prosperous country as of yet, its future is bright and the Korean people are confident in their ability to chart the right path forward."
 KOR_economy_idea_4:9 "Économie Nationale Coréenne : §LLa Voie vers la Prospérité§!"
 KOR_economy_idea_4_desc:9 "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, and have charted a new path in the burgeoning Korean Industrial Revolution.\n\nIn the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government. With every passing year, the Korean state oversees unprecedented growth and prosperity, a state of affairs once thought to be unthinkable to onlookers."
 KOR_economy_idea_5:9 "Économie Nationale Coréenne : §YÉconomie du Tigre Renaissant§!"
 KOR_economy_idea_5_desc:9 "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, turning the country into a vibrant manufacturing hub rivalling both China and Japan.\n\nIn the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government.\n\nWith every passing year, the Korean state oversees unprecedented growth and prosperity, a state of affairs once thought to be unthinkable to onlookers. While certainly a small country in East Asia, it cannot be denied that the Korean miracle has made it into a singularly shining beacon of economic prosperity in the Far East."
 KOR_developmentalism:9 "L'État en Développement"
 KOR_developmentalism_desc:9 "While Anglo-American capitalism has certainly fueled the growth of two mighty superpowers, it is clear that in the 20th century, such free trade and laissez-faire minded principles have become utterly outdated. The might of the Empire of Free Trade could not prevent their collapse into socialism, nor did it save the Americans from a debilitating great depression and civil war.\n\nNo, it is clear that the German model, pioneered by Bismarck and refashioned by Svobodnik Russia, Tokyo, and Chinese statists must be Korea's destiny as well. Under the tutelage of the Korean economic planning board, the Korean government will ensure the nation rises steadily and on schedule without leaving anything to chance. State socialism forged Japan and China, and so shall it build a strong Korea!"
 KOR_liberalising_economy:9 "Économie Libéralisée"
 KOR_liberalising_economy_desc:9 "While it has been a growing trend across the world for governments to take a direct interest in the economic management of the nation, the Korean state must not follow such a course. Korea has only just found itself emerging from colonial independence, and it is the American model which suits our nation best.\n\nPresident Rhee is confident that by following the principles of free-market capitalism, the government can avoid unsustainable deficit spending and encourage foreign investment. In making Korea a land safe for business, we can ensure fast growth without idealistic dreams of East Asian state socialism. As it is so often said in America, life, liberty, and the pursuit of happiness shall be our mantra."
 KOR_agriculture:9 "Révolution Agricole Coréenne"
 KOR_agriculture_desc:9 "Long the backbone stock of the Korean economy, agriculture has only become even more important in the modern age. In a developing country with a growing population, a nation must always be on the lookout for famine. If Korea is to find itself renewed in this most critical of times, then Korea must ensure that its farmers and peasants are properly supported by the government in times of crisis. The lands of the south, always providing bountiful harvests, shall be the foundation upon which Korea's future will be built upon."
 KOR_industry:9 "Révolution Industrielle Coréenne"
 KOR_industry_desc:9 "In the modern age, the once agricultural Korean people found themselves swept in the tides of capitalism and industry. During the colonial era, the Empire of Japan established various industrial monopolies in Pyongyang and the surrounding areas, turning Northern Korea into a local industrial hub not dissimilar to Manchuria. Now, Korea finds itself free of Japanese overlordship and able to chart its own destiny. Northern industries shall turn our country into a manufacturing hub in the Far East, and products of the world shall bear the label made in Korea!"
 KOR_developmental_improved:9 "L'État en Développement"
 KOR_developmental_improved_desc:9 "$KOR_developmentalism_desc$"
 KOR_liberalising_improved:9 "Un État Guidé par le Marché Libre"
 KOR_liberalising_improved_desc:9 "$KOR_liberalising_economy_desc$"

 #Military Ideas
 KOR_military_idea_1:9 "État Militaire Coréen : §oChaos Post-Colonial§!"
 KOR_military_idea_1_desc:9 "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army from the get-go has been plagued with issues typical of a newly liberated nation: an officer corps filled with former collaborators and an almost non-existent defence industry only prepared to produce small arms.\n\nAlongside this, a debate amongst our exiled officer corps has erupted on which direction our KNA should take in terms of doctrine inspiration with the valuable legacies of Whampoa, Beiyang and Japan taking dominant positions in this struggle. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_2:9 "État Militaire Coréen : §gRéorganisation en Cours§!"
 KOR_military_idea_2_desc:9 "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army has begun to transition from an autonomous militia to a real force of national defence. Our officer corps is beginning to purge former collaborators from our ranks, though our defence industry is still dominant on support from our benevolent liberators.\n\nWhile our reorganisation is underway, our general staff is still ripe with heated debates over which direction to take our young military in the future, with the legacies of Whampoa, Beiyang and Japan still taking dominance. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_3:9 "État Militaire Coréen : §GNouvelle Armée Coréenne§!"
 KOR_military_idea_3_desc:9 "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. Our reorganisation labor is now showing some of the first fruits, with the Korean National Army growing in strength. With the purges of former collaborators making great progress, our domestic officer corps is seeing its first new recruits of young patriots ready to defend the nation, with our defence industry slowly but surely meeting the moment through expanding steadily.\n\nAs this progress is made, current debates over where to look for inspiration in terms of doctrine have slowly transitioned more towards patriotic collaboration over foreign loyalties, seeking a synthesis between our two former colonial overlords of different times. Only the future can tell what this discussion will bring. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_4:9 "État Militaire Coréen : §LPremière Ligne de Défense§!"
 KOR_military_idea_4_desc:9 "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. Our National Army is no longer a mere militia of exiled freedom fighters, but a truly professional, domestic army of patriots seeking to protect the land of their ancestors with their lives. Our officer corps is no longer one of collaborators and lackeys of the Japanese Empire, but one of newly trained NCOs and cadets ready to lead our people to a better future.\n\nOur defence industry is now almost completely independent of our benevolent liberators, able to develop weapons to take control of our lands, seas and skies. Discussions surrounding our military doctrine have become more and more positive, with our high command and military academies slowly but surely synthesising the teachings of our exiled patriots into a uniquely Korean doctrine. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_5:9 "État Militaire Coréen : §YAvant-Garde à l'Est§!"
 KOR_military_idea_5_desc:9 "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army is now a force respected across all of East Asia, capable of withstanding any attempts to subjugate our people. The Korean Officer Corps is now completely purged of collaborationists and opportunists, our military academies flooded with enthusiastic youth willing to commit their minds, hearts, and souls to defend the lands of our ancestors./n/n/Our defence industry is now capable of matching the efficiency and technological heights of those in Europe and America, producing weapons of war unthinkable mere years ago. Our high command is now fully united behind a truly Korean doctrine, backed by decades of experience from across the schools of East Asia, truly committed to fighting for our nation. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_kaic: "KAIC"
 KOR_kaic_desc:9 "In the days of the Joseon Kingdom, the royal court employed secret royal inspectors to keep government officials loyal to the state and ensure safety and security across the nation. In the reborn Korean state, public safety and government security has become even more paramount, with anti-goverment agents and opportunistic rabble rousers ready to take advantage of any perceived weakness. With enemies both within and without, the KAIC shall defend the state from treacherous elements in the shadows."
 KOR_navy:9 "Marine Coréenne Renaissante"
 KOR_navy_desc:9 "Korea has a proud tradition of dominating the seas, one which we must reclaim lest another imperial power subjugate us into another generation of servitude. Our benevolent liberators have agreed to sell us a select number of cruisers and coastal defense ships to defend our beaches alongside agreeing to admit Korean NCOs into their prestigious naval academies in order to truly bring our tradition to the future. The late Admiral Yi would be proud of what we accomplished, though much work remains before the East Sea is truly under our control."
 KOR_airforce:9 "Nouvelle Armée de l'Air Coréenne"
 KOR_airforce_desc:9 "Though our ancestors have a history of dominating land and sea, the domain of the skies remains under the control of imperialist powers. If we are to truly be free, this imbalance must be rectified by us. Our benevolent liberators have agreed to sell us a number of older liaison aircraft and fighters to launch a Korean Air Force, ready to conquer the skies. It will be a long time before our capabilities will match those of the west, but we must be ready to defend the lands of our ancestors on all flanks."
 KOR_office:9 "Bureau Général de Planification"
 KOR_office_desc:9 "No longer subservient to a foreign army staff demanded by our lack of a state, our newly professionalising and expanding army demands a centralised General Plan Office to coordinate multi-branch activity and movement across the peninsula. A loyal General Plan Office will be established with direct connection to the President in order to ensure coordination between the civilian and military branches."
 KOR_bushido:9 "Imiter l'Esprit du Bushido"
 KOR_bushido_desc:9 "In the long and difficult process of reestablishing ourselves as a nation, we must emphasise absolute loyalty to the nation in all aspects of military life. One must see their sacrifice of blood, heart, and soul in the battlefield as not an individual struggle, but as a collective struggle to protect the nation against those who seek to force us into betraying our values. We must be willing to commit our bodies and spirits to a series of codes and disciplines which separate us from those who wish to subjugate the lands of our ancestors again."
 KOR_lightning_war:9 "Mobilité des Forces Armées Coréennes"
 KOR_lightning_war_desc:9 "To meet the demands of a changing world, we must look towards adapting our doctrine to one focused on fast-paced warfare. Our generous liberators have been kind enough to share their knowledge on motorized and armored warfare in the hopes we may eventually develop a domestic armored industry capable of matching those of Japan and even Europe. Until then, we will seek to adapt these changes to our current armed forces in the hopes of a better future."
 KOR_eliteheer:9 "Eliteheer Coréenne"
 KOR_eliteheer_desc:9 "With the outbreak of the deadliest world war we have ever seen, our general staff has agreed we must follow our liberators in modernising our armed forces to meet the exponential growth in technological advances across all sectors of national defence. We must look towards the German Heer and the reforms made under the Beijing Government to develop a small, elite force of mobile forces equipped with modernised equipment. While we may need to table ambitions to match the so-called 80 division plan, our national defence demands the cultivating of an elite army capable of resisting all forms of imperialist aggression."
 KOR_whampoa_dynamic_modifier:9 "Whampoa Coréenne"
 KOR_whampoa_dynamic_modifier_desc:9 "Though many of our esteemed generals and officers were trained at Whampoa by our allies in China, we must not allow ourselves to become dependent on another foreign power. We have a duty to the motherland to construct a new Whampoa in Seoul, fostering new classes of patriotic cadets given both top-of-the-line military education and ideological training which moulds diverse patriotic sentiments into a unified brotherly consciousness focused on the revolutionary struggle of their ancestors for an independent motherland."
 KOR_loyalty:0 "Armée Loyale"
 KOR_loyalty_desc:9 "Across the world, the greatest powers the world has ever seen have fallen victim to the autonomous desires of an army wishing to subordinate the state itself and its people to their wishes. While the KNA is crucial to the survival of our nation, we must remind them who they exist to serve. To ensure absolute civilian control over our nation, the KNA must be subordinated to the wishes of the President's office and the National Assembly."
 KOR_final_army_modifier:9 "Terreur de l'Est Modernisée"
 KOR_final_army_modifier_desc:9 "For centuries upon centuries, the proud Joseon kingdom stood as a righteous pillar of morality and justice throughout Asia. Tragically, the great Korean state found itself consumed by the rising Empire of Japan, which would emerge as the dawning terror of Asia. Yet, history would see this monstrosity put down for good, and the Korean nation was once again freed. Yet, we knew not to rest on our laurels just yet, for in the tumultuous times in which we live in, or else the days of Japanese occupation would return.\n\nAnd so the people went to work on a grand project to forge a new mighty military that would ensure Korea's eternal independence. After years of hard work and incorporation of old and new ideas, the Korean military has emerged as a singularly deadly force. A synthesis of Japanese, Chinese, German, and Russian military developments, the Korean Armed Forces have become the new terror of Asia in the service of defending Korea's blessed freedom. Hanguk Manse!"

 KOR_sino_korean_friendship: "Amitié Sino-Coréenne"

 KOR_twin_tigers_idea: "Tigres Jumeaux de l'Asie de l'Est"

