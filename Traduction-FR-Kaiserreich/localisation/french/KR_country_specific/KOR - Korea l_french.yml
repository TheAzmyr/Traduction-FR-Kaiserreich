 KOR_kim_suk_won: "Kim Suk-won"
 KOR_kim_suk_won_high_command_desc:9 "§YNaissance :§! §L29 septembre 1893, à Hanseong, province de Gyeonggi, Corée§!"

 KOR_choi_yong_duk: "Choi Yong-duk"
 KOR_choi_yong_duk_air_chief_desc:0 "§YNaissance : §!§L19 septembre 1898 à Seongbuk-dong, Hanseong, province de Gyeonggi, Empire de Corée§!\n§YAlignement : §!§LApolitique§!\n§YCarrière : §!§LNé en Corée, Choi Yong-duk étudie au collège Huiwen de Beijing en 1913, puis retourne dans son pays (sous la domination coloniale japonaise) pour terminer ses études au collège Chongsil de Pyongyang. Après avoir terminé ses études, Choi retourne en Chine pour s'inscrire à l'Académie militaire de Nanyuan, sous la direction de Duan Qirui, dont il sort diplômé en 1916. Il sert ensuite dans la deuxième armée du gouvernement de Beiyang.\n\nEn 1919, Choi devient un partisan du Mouvement du 1er mars et commence à cultiver sa propre loyauté envers l'indépendance coréenne. Il participe au gouvernement provisoire de la République de Corée. En 1920, Seo Wal-bo, premier pilote coréen et partisan de l'indépendance, lui recommande d'étudier le pilotage à l'école d'aviation de Baoding. En 1924, il rejoint l'équipe d'aviation de Wu Peifu pour participer à la deuxième guerre de ZhiFeng. Pendant la guerre, il a été rapporté par erreur que Choi était mort au combat, mais il a survécu et a été incorporé dans l'armée de Feng Yuxiang avec tous les autres cadets de Baoding.\n\nDiplômé en 1925, Choi est affecté à la deuxième force aérienne du Guominjun, avant d'être transféré à Wu Peifu lors de sa reconquête. Combattant lors de l'expédition du Nord, Choi participe aux dernières guerres de ZhiFeng et est nommé commandant adjoint de la première armée de l'air pour son service. Gravissant lentement les échelons, Choi est devenu instructeur à l'Académie de l'armée de l'air de Nanjing et, depuis 1935, il est major de l'armée de l'air.§!"

 KOR_lee_eung_jun: "Lee Eung-jun"
 KOR_lee_eung_jun_army_chief_desc:9 "§YNaissance :§! §L12 août 1890, à Anju, province de Pyongan, Corée§!"

 KOR_lyuh_woon_hyung: "Lyuh Woon-hyung"
 KOR_lyuh_woon_hyung_leader_desc:9 "§YNaissance : §!§L25 mai 1886 à Yangpyeong, province de Gyeonggi, Joseon§!\n§YCarrière : §!§LLes nationalistes coréens ne sont pas tous affiliés au gouvernement provisoire, et Lyuh Woon-hyung, ancien ministre des Affaires étrangères du PGROK, est l'un d'entre eux. En tant que ministre des affaires étrangères, Lyuh s'est souvent trouvé en opposition avec les factions dominantes. Lyuh a souvent été approché en secret par des fonctionnaires japonais qui tentaient de le retourner, mais tous sont revenus les mains nues, voire ont été sévèrement ridiculisés. Fatigué par la factionnalisation constante du PGROK, il cherche de nouveaux contacts au sein de la Troisième Internationale et du Kuomintang, mais se brouille également avec eux. Après une tournée en Asie du Sud-Est, où il se bat avec les nationalistes locaux contre la présence coloniale allemande, Lyuh est finalement capturé lors d'un match de football à Qingdao, où les autorités allemandes l'extradent rapidement vers le Japon. Après une courte période d'emprisonnement, Lyuh revient sur le devant de la scène en tant que directeur de la Joongang Newspaper Company. Il en profite pour établir des contacts avec les différents groupes qui se chamaillent en Corée, y compris ses anciens rivaux, afin de créer une présence clandestine à l'abri des projecteurs japonais. Ce groupe est connu sous le nom de Comité pour la préparation de l'indépendance coréenne et, en tant que dirigeant, Lyuh tente de trouver une force unifiée de toutes les idéologies au sein du nouvel État coréen. Sous sa direction, la Corée deviendra forte, suffisamment forte pour résister aux vagues qu'elle devra affronter seule. Après des années de traumatisme, la Corée ne doit pas devenir un satellite ou une "République sœur", mais une démocratie totalement libre et indépendante !§!"

 KOR_yi_yong:9 "Yi Yong"
 KOR_yi_yong_sic_desc:9 "§YBorn:§! §LApril 7th, 1888, in Bukcheong, South Hamgyong Province, Joseon§!"

 KOR_yun_chi_young:9 "Yun Chi-young"
 KOR_yun_chi_young_leader_desc:9 "§YBorn:§! §LFebruary 10th, 1898, in Hanseong, Gyeonggi Province, Empire of Korea§!\n§YBackground:§! §LBorn into a wealthy family, Yun was enrolled at the YMCA Christian Youth School, where he would study under Syngman Rhee. Fascinated by the latter, Yun would become an ardent follower of Rhee, dedicating himself to the independence movement in 1916. Yun would spend the next few years studying in Japan, continuing his activities with the local Korean community, supporting the Provisional Government when it was founded in 1919. After a short return to Korea, Yun would travel back and forth between Korea and Hawaii, where Syngman Rhee resided, before permanently joining him there in 1924. In the United States Yun would receive further education in George Washington University, and continued to be active under Rhee in raising support for and organising the cause of Korean independence, even after Rhee's ouster from the Provisional Government in 1928. Eventually, Yun would return alone to Korea in 1935, where shortly after he was arrested and tortured by Japanese authorities, before eventually being released.\n\nAfter the return of the Provisional Government to Korea, Yun Chi-young realigned himself with Sin Ik-hui and Ji Cheong-cheon of the Korean Liberation Army, together founding the Tridemist-inspired Korea Nationalist Party. Having won the first Korean elections, Yun has declared that he will govern under an adaptation of the Three Principles, bringing about a modern, democratic Korean nation.§!"
 KOR_yun_chi_young_advisor_desc:9 "§YBorn:§! §LFebruary 10th, 1898, in Hanseong, Gyeonggi Province, Empire of Korea§!"

 KOR_shin_ik_hui:9 "Shin Ik-hui"
 KOR_shin_ik_hui_sic_desc:9 "§YBorn:§! §LJune 9th, 1894, in Gwangju, Gyeonggi Province, Joseon§!"
 KOR_yoon_ki_seop:9 "Yoon Ki-seop"
 KOR_yoon_ki_seop_advisor_desc:9 "§YBorn:§! §LApril 4th, 1887, in Hanseong, Gyeonggi Province, Joseon§!"

 KOR_jo_so_ang: "Jo So-ang"
 KOR_jo_so_ang_sic_desc:0 "§YNaissance :§! §L30 avril 1887, à Wollong-myeon, province de Gyeonggi, Corée§!\n§YCarrière :§! §LJo So-ang, ancien élève de Sungkyunkwan, a été sélectionné par le gouvernement impérial coréen pour représenter son pays lors d'un voyage éducatif au Japon. À son arrivée, il se heurte à d'immenses préjugés à l'encontre de ses compatriotes et c'est là que commence sa longue lutte pour obtenir l'indépendance de sa nation. Jo s'inscrit à l'université Meiji en tant qu'étudiant en droit, mais il est rapidement choqué par la nouvelle de l'annexion de la Corée. Après une longue période d'anxiété et de dépression, Jo se rend à Shanghai pour tenter d'échapper à l'espionnage des autorités japonaises. C'est là qu'il a rencontré les fonctionnaires coréens qui allaient devenir l'épine dorsale du gouvernement provisoire de la République de Corée. Après avoir terminé ses études, il s'installe définitivement en Chine. Lorsque le mouvement du 30 mai secoue la Chine orientale, Jo se rend rapidement à Shanghai, où il retrouve ses camarades et amis, qui s'unissent pour former le gouvernement provisoire. En 1928, Jo, ainsi que ses deux camarades, Kim Kyu-sik et Lyuh Woon-hong, arrivent à la conférence de Shanghai en tant que délégués de Syngman Rhee. Revenant avec ce qui serait la chute de Rhee, Jo a pris l'initiative de rencontrer le PIC et d'y participer. Une fois le PNRC  établi, Jo se range à nouveau du côté de Kim Wonbong. Kim, qui croit ardemment aux trois principes du peuple, accueille Jo et son projet de Samgyunisme, une version coréanisée des principes que Kim est prêt à accepter pour distancer son parti en tant que simple marionnette du Kuomintang. Jo est désormais indépendant, loin des chamailleries réactionnaires et des socialistes sinophiles, et fait de son mieux pour allumer un phare de libéralisme afin que sa patrie, enfin indépendante, puisse naviguer à contre-courant de l'histoire.§!"

 KOR_chough_pyung_ok: "Chough Pyung-ok"
 KOR_chough_pyung_ok_advisor_desc:9 "§YBorn:§! §LMay 21st, 1894, in Cheonan, Chungcheong Province, Joseon§!"

 KOR_song_jin_woo:9 "Song Jin-woo"
 KOR_song_jin_woo_leader_desc:9 "§YBorn:§! §LMay 8th 1889, in Damyang, South Jeolla Province, Joseon§!\n§YBackground:§! §LSong Jin-woo was studying in Japan along with Kim Seong-su when news broke out that Korea was formally annexed into the Japanese Empire. Returning home briefly, they continued their studies at Meiji University the following year where they began to organise Korean exchange students and found a student magazine. In 1916 the two headed the Choongang School which became a nexus for the March 1st Movement in 1919. Song was imprisoned but released after a year and a half. He then became a nationalist journalist and continued to work for the Korean Independence cause through various newspapers and emigre associations. He continued this work across the 1920s and 1930s and was imprisoned again, which forced him to become a recluse (ostensibly due to illness) as his publication Dong-a Ilbo was suppressed by Japanese authorities .\n\nAfter the establishment of a free Korea, Song emerged from his isolation as one of the most prominent men. Suspicious of Lyuh Woon-hyung and the left, he became the leader of the conservative Korea Democratic Party.§!"

 KOR_chang_myon:9 "Chang Myon"
 KOR_chang_myon_sic_desc:9 "§YBorn:§! §LAugust 28th, 1899, in Hanseong, Gyeonggi Province, Empire of Korea§!"

 KOR_army_reform_department:9 "Korean Military Council"
 KOR_army_reform_department_theorist_desc:9 "§YFounded:§! §Lin Korea§!"

#### Traits ####
 KOR_korean_exile:9 "Armée de Libération Coréenne"
 KOR_korean_exile_desc: "§LUn chef militaire coréen en exil qui rêve de rentrer un jour dans une Corée libérée de l'impérialisme japonais. Pour l'instant, il s'est mis au service de seigneurs de guerre chinois prometteurs dans l'espoir qu'un jour l'indépendance de la Corée puisse être obtenue de son vivant.§!"

 KOR_great_president:9 "President of Iron Resolve"
 KOR_great_president_desc:9 "The spineless cowards of the Korean Provisional Government thought Rhee was done for all those years ago, fated to waste away in Honolulu. His return heralds not only their failure, but the dawning of a new age for the Korean State. All hail the Chief!""

 KOR_generalissimo:9 "The Ilminist Generalissimo"
 KOR_generalissimo_desc:9 "§LOur nation is truly unique in the world. No society, no people can expect to amount to much without strong leadership. No, instead they require shepherds who guide them to prosperity and glory. Standing above all, Generalissimo Lee embodies the ideal of the Great Man in History who changes the destiny of humanity, and with him at the helm, Korea shall never know weakness!§!"

 KOR_tridemist_marshal:9 "The Tridemist Marshal"
 KOR_tridemist_marshal_desc:9 "§LDespite his shortcomings, Sun Yat-sen was a great man who envisioned free republics spanning across a free Asia. In Sun's name, Ji Cheong-cheon shall fulfill the three principles for the Korean Republic. Glory to Marshal Ji!§!"

 KOR_red_general:9 "Red General"
 KOR_red_general_desc:9 "§LFighting with the Kuomintang in the Northern Expedition, joining the exile in Paris, and returning to carry the flame of revolution back to Asia, Kim Wonbong's revolutionary resume cannot be doubted. With the Red General in command, Korea marches towards its revolutionary destiny!§!"

 KOR_revolutionary_chairman:9 "Revolutionary Chairman"
 KOR_revolutionary_chairman_desc:9 "§LWho was it that kept the Korean National Revolutionary Party from fracturing during its decade of exile? Who was it that maintained the Party's absolute dedication towards the ideals of Sanmin Doctrine? It was none other than Chairman Kim, and under his leadership, Korea will know freedom.§!"

 KOR_supreme_leader:9 "Supreme Leader"
 KOR_supreme_leader_desc:9 "§LHis critics often denounced him as a foolhardy terrorist, his rivals accuse him of being a spy for the Japanese. Yeom Dong-jin is a man with many enemies and foes, but with him in absolute control, none can doubt his iron will.§!"

#### Tooltips ####
 KOR_authoritarian_paths_tt:9 "§LLa Corée a été libérée par un régime réactionnaire§!"
 KOR_democratic_paths_tt:9 "§LKorea is under the leadership of §aKim Koo§! and the §aKorea Independence Party§!.§!"
