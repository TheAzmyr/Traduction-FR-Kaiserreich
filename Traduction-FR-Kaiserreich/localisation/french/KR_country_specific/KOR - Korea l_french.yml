### Initial Parties ####
 KOR_totalist_party:9 "PTC"
 KOR_totalist_party_long:9 "Parti des Travailleurs de Corée\n§LLe Parti des Travailleurs de Corée a été fondé par la fusion de plusieurs groupes syndicalistes marxistes ayant émergé après l'occupation japonaise. Pak Hon-yong et la "Faction domestique" des socialistes coréens ont rapidement émergé comme le plus important, ayant basé leurs opérations en Corée au cours de l'occupation japonaise. De plus petites factions incluent la Faction (mandchoue) de la Guérilla, dirigée par Kim Song-ju, la Faction Jangan/de la Reconstruction menée par Choe Ik-han, Yi Yong, Cho Tong-ho et Hyon Chun-hyok (elle-même une fusion de plusieurs factions plus petites incluant les factions de Séoul, Gyeongseong et Shanghai, le Club de Mardi et l'Union rouge de Wonsan), et l'obscur groupe du Drapeau rouge.\n\nUne tentative de fusionner avec le Parti populaire de Corée puis avec le Nouveau Parti populaire a échouée, laissant le Parti des Travailleurs adopter une interprétation radicale du marxisme sous la direction de Pak.§!\n"

 KOR_KPP_shared_desc:9 "Alors que la mainmise du Japon sur la Corée s'affaiblissait, Lyuh Woon-Hyung a intensifié ses efforts pour saper leur autorité et rallier des gens de toutes origines à la cause indépendantiste. Arrêté par les autorités japonaises, il a continué son œuvre et ses connaissances s'étendaient d'anciens collègues dans la presse à des athlètes et pratiquants d'arts martiaux, en passant par des activistes anti-conscription, des groupes étudiants, des déserteurs militaires divers groupes socialistes et "l'Alliance paysanne". De là, il a créé le Comité pour la Préparation de l'Indépendance coréenne, qui menait des petits raids sur l'arrière-garde japonaise. Le comité a évolué en Parti populaire de Corée, mais il s'est rapidement effondré à cause des luttes internes."
 KOR_syndicalist_party:9 "NPP"
 KOR_syndicalist_party_long:9 "Nouveau Parti populaire\n§L$KOR_KPP_shared_desc$\n\nLe Nouveau Parti populaire a été fondé par Kim Mu-chong, Kim Tu-bong, Choe Chang-ik et leurs alliés, connus sous le nom de faction "MinGan" de la gauche coréenne car nombre de ses membres ont d'abord été connus en se battant aux côtés des insurgés du Kuomintang dans la zone insurgée de Jiangxi-Fujian. Plus modéré que le Parti des Travailleurs mais plus radical que leurs pairs du Parti national révolutionnaire coréen et du Parti du Peuple ouvrier, il conserve une relation étroite avec le mouvement syndicaliste mondial.§!\n"
 KOR_social_democrat_party:9 "PPO"
 KOR_social_democrat_party_long:9 "Parti du Peuple ouvrier\n§L$KOR_KPP_shared_desc$\n\nLyuh Woon-hyung et ses alliés ont ensuite fondé le Parti du Peuple ouvrier, tenant une ligne médiane entre les factions socialistes plus révolutionnaires et l'opposition fermement anti-socialiste des éléments réactionnaires. Malgré la perte de nombreux fidèles, la popularité personnelle de Lyuh lui a permis d'émerger comme une force majeure de la politique coréenne, et le PPO s'est révélé être un parti bien plus cohérent que son prédécesseur.§!\n"

 KOR_KNP_shared_desc:9 "Formé par la réorganisation du Nouveau Parti pour l'Indépendance de la Corée de Ji Cheong-cheon lors de la prise d'indépendance de l'État coréen, le Parti nationaliste coréen est inspiré des Trois Principes du Peuple du Dr Sun Yat-sen, et cherche à reconstruire la Corée dans l'idéal tridémiste. Malgré ses similarités avec le Parti national révolutionnaire coréen dans son engagement à mettre en place la doctrine Sanmin, le PNC se considère comme le véritable fidèle de la vision de Sun, s'opposant fermement au PNRC pour ses influences syndicalistes."
 #Because this should not be a rulign party, does not need a longer desc unless something goes wrong.
 KOR_social_liberal_party_united:9 "PNC"
 KOR_social_liberal_party_united_long:9 "Parti nationaliste de Corée\n§L$KOR_KNP_shared_desc$§!\n"
 KOR_social_liberal_party:9 "PNC-M"
 KOR_social_liberal_party_long:9 "Parti nationaliste coréen - Modérés\n§L$KOR_KNP_shared_desc$\n\nLa faction la plus modérée du PNC est dirigée par Yun Chi-yong, qui préfère une approche plus parlementaire de la prise de pouvoir. S'appuyant sur ses talents de gestion des relations publiques et de la jeunesse - qui s'adapte plutôt bien aux méthodes plus cyniques d'assurer la "sécurité publique" en armant de jeunes miliciens, Yun s'est révélé être un survivant politique compétent et flexible.§!\n"
 KOR_authoritarian_democrat_party:9 "PNC-R"
 KOR_authoritarian_democrat_party_long:9 "Parti nationaliste coréen - Radicaux\n§L$KOR_KNP_shared_desc$\n\nAu sein du parti, Ji Cheong-cheon et ses fidèles constituent la faction radicale du PNC, dont beaucoup ont été membres de l'Armée de Libération coréenne. Forgée par des décennies de résistance contre l'occupant japonais, la faction du PNC de Ji est renforcée par sa résolution à mettre en œuvre son programme sans compromis.§!\n"

 KOR_market_liberal_party:9 "PDC"
 KOR_market_liberal_party_long:9 "Parti démocratique de Corée\n§LLe Parti démocratique de Corée a été fondé par la fusion de plusieurs petits partis fondés à la fin de la domination japonaise, comme le Parti démocrate, le Parti national et le Comité préparatoire à l'Assemblée nationale. D'abord conçu comme un front large, en pratique il est devenu un mouvement conservateur et fermement anti-socialiste. Il a une réputation extrêmement mitigée, étant le premier parti libéral de Corée (avec des influences confucéennes) mais considéré par certains comme strictement réactionnaire dans son opposition au socialisme, et accusé d'absorber de nombreux anciens collaborateurs japonais.\n\nIl ne doit pas être confondu avec le Parti démocrate de Cho Man-sik, une union de gauche d'entrepreneurs, de marchands, d'artisans, de petits bourgeois, de paysans et de chrétiens.§!\n"

 KOR_KIP_shared_desc:9 "Le Parti pour l'Indépendance de la Corée est la principale force politique au sein du Gouvernement provisoire coréen ; il incarne l'aspiration à l'indépendance d'innombrables partis et citoyens. Le PIC se compose de nombreuses factions différentes, allant des gauchistes alignés sur le KMT aux ultranationalistes de droite. Néanmoins, la plupart sont conscients qu'en fin de compte, le pouvoir et les méthodes de toutes ces factions doivent être pleinement et judicieusement mis à profit afin que la Corée puisse se relever et survivre face aux aléas du monde."
 #Because this is not a ruling party, does not need a longer desc.
 KOR_social_conservative_party: "PIC"
 KOR_social_conservative_party_long:9 "Parti pour l'Indépendance de la Corée\n§L$KOR_KIP_shared_desc$§!\n"
 KOR_social_conservative_party_split:9 "PIC-M"
 KOR_social_conservative_party_split_long:9 "Parti pour l'Indépendance de la Corée - Modérés\n§L$KOR_KIP_shared_desc$\n\nContraint d'adopter une approche plus parlementaire pour conserver le pouvoir, le PIC a néanmoins réussi à remporter la victoire grâce à une campagne électorale agressive et à l'inertie politique. Il peut désormais se prévaloir d'un mandat officiel du peuple pour mettre en œuvre sa vision d'une Corée libre.§!\n"
 KOR_authoritarian_democrat_party_kip:9 "PIC-E"
 KOR_authoritarian_democrat_party_kip_long:9 "Parti pour l'Indépendance de la Corée - Extrémistes\n§L$KOR_KIP_shared_desc$\n\nEn tirant parti de leur position privilégiée en tant que figures de proue du gouvernement provisoire coréen, tant avant qu'après leur retour d'exil, le PIC a pu remporter facilement les élections grâce à des manœuvres politiques déloyales et à la répression. Cela peut jeter une ombre sur leur légitimité, mais cela ne les empêchera pas pour autant de jouir d'une popularité légitime.§!\n"

 KOR_radical_socialist_party: "PNRC"
 KOR_KNRP_desc:9 "Le PNRC est l'organisation sœur officielle du Kuomintang, issue d'anciens groupes du PIC refusant de coopérer avec son gouvernement majoritairement antisocialiste. Le PNRC cherche à appliquer les Trois Principes du Peuple en Corée, que ce soit par des méthodes démocratiques ou plus coercitives. Bien qu'il s'agisse d'une organisation apolitique au sein du Kuomintang, ses membres ont des tendances diverses, allant de ceux qui soutenaient le Comité d'Action provisoire à ceux qui soutenaient l'Association des Camarades pour la Réorganisation."
 KOR_radical_socialist_party_long:9 "Parti national révolutionnaire coréen\n§L$KOR_KNRP_desc$§!\n"
 KOR_radical_socialist_party_split:9 "PNRC-G"
 KOR_radical_socialist_party_split_long:9 "Parti national révolutionnaire coréen - Gauche\n§L$KOR_KNRP_desc$\n\nLa faction de gauche dominante est dirigée par Kim Wonbong et Yoon Se-ju et s'articule généralement autour du culte de la personnalité de Kim.§!\n"
 KOR_authoritarian_democrat_party_knrp:0 "PNRC-D"
 KOR_authoritarian_democrat_party_knrp_long:9 "Parti national révolutionnaire coréen - Droite\n§L$KOR_KNRP_desc$\n\nLa faction de droite est dirigée par Kim Kyu-sik et Jo So-ang, qui se sont généralement démarqués des éléments les plus socialistes du programme du PNRC.§!\n"

 KOR_WSS_shared_desc:9 "La Société des Chemises blanches a été fondée par divers extrémistes de l'Armée de Libération coréenne, déterminés à renverser la domination japonaise. Dirigée par Yeom Dong-jin, bien qu'alignée sur le Gouvernement provisoire coréen financé par le gouvernement de Beiyang, elle s'inspirait des Trois Principes du Peuple du Kuomintang. Généralement hostiles au syndicalisme et aux autres factions plus conciliantes envers le socialisme, ses membres se sont montrés plus que disposés à étayer leur rhétorique nationale-populiste par la violence politique et le terrorisme. Malheureusement, ils sont loin d’être les seuls à faire preuve d’une telle volonté, de nombreuses autres factions post-indépendance se livrant également à des assassinats."
 KOR_national_populist_party_knrp:9 "PNRC-SCB"
 KOR_national_populist_party_knrp_long:9 "Parti national révolutionnaire coréen - Société des Chemises blanches\n§L$KOR_WSS_shared_desc$\n\nContraints de s'allier au PNRC à la demande des Chinois, ils sont restés proches de la Société des Chemises bleues, qu'ils considèrent comme un mouvement partageant les mêmes idées. Ils ont néanmoins continué à comploter en vue du jour où ils pourraient prendre le pouvoir sans partage.§!\n"
 KOR_national_populist_party:9 "SCB"
 KOR_national_populist_party_long:9 "Société des Chemises blanches\n§L$KOR_WSS_shared_desc$§!\n"

 KOR_KLP_shared_desc:9 "Le Parti libéral est né de la fusion de plusieurs groupes importants fidèles à la nouvelle dictature : le Corps de la Jeunesse coréenne, l'Association nationale coréenne pour la Promotion de l'Indépendance, la Fédération coréenne des Syndicats, la Fédération coréenne des Syndicats paysans, l'Association des Femmes coréennes, ainsi que des membres de l'Armée de Libération coréenne dirigée par Lee Beom-seok, qui avaient initialement formé le Parti unifié des Ouvriers et des Paysans. Malgré leur nom, ils s'opposent à l'individualisme occidental et prônent plutôt une "démocratie libérale à la coréenne" imprégnée de traditionalisme, d'antisocialisme et de sentiments anti-japonais, ainsi que d'ilminisme - le "Principe du Peuple unique" qui promeut l'ultranationalisme coréen et la suprématie ethnique."
 KOR_authoritarian_democrat_party_lp:9 "PL-C"
 KOR_authoritarian_democrat_party_lp_long:9 "Parti libéral - Conservateurs\n§L$KOR_KLP_shared_desc$\n\nLa faction conservatrice du Parti libéral est dirigée par Lee Gap-seong, militant indépendantiste de longue date, membre de groupes chrétiens coréens et organisateur au sein du Parti libéral (bien qu'il ait au départ fait des allers-retours entre différents groupes). Rhee s'est servi d'eux pour contrebalancer la faction ilministe de Lee Beom-seok.§!\n"
 KOR_paternal_autocrat_party_split:9 "PL-I"
 KOR_paternal_autocrat_party_split_long:9 "Parti libéral - Ilministes\n§L$KOR_KLP_shared_desc$\n\nLes Ilministes sont dirigés par Lee Beom-seok et représentent l'aile la plus extrême du parti - opérant principalement à travers le Corps de la Jeunesse nationale coréenne et l'armée. Rhee les considère avec une certaine méfiance et les a accusés de sympathiser avec le mouvement national-populiste mondial.§!\n"
 KOR_paternal_autocrat_party:9 "PL"
 KOR_paternal_autocrat_party_long:9 "Parti libéral\n§L$KOR_KLP_shared_desc$\n\nLes Ilministes sont dirigés par Lee Beom-seok et représentent l'aile la plus extrême du parti - opérant principalement à travers le Corps de la Jeunesse nationale coréenne et l'armée. On dit qu'ils sont favorables au mouvement national-populiste mondial, et fonctionnent globalement comme un gouvernement militaire.§!\n"

### Events ###
 korea_events.1.t:9 "Un Télégramme de Séoul"
 korea_events.1.d:9 "Sous l'égide du Gouvernement provisoire dirigé par le Parti pour l'Indépendance de la Corée de Kim Koo, l'État coréen semble en passe de devenir une nation stable et équilibrée. Après de nombreuses discussions et négociations avec d'autres partis mineurs, il semble même que la Corée pourrait organiser des élections dans un avenir proche. Pourtant, malgré l'euphorie ambiante, un sentiment d'incertitude persiste. Alors que Kim Koo a publiquement appelé à la tenue d'élections libres et équitables, nombreux sont ceux qui doutent de la volonté du Président provisoire de tenir sa parole.\n\nS'il est vrai que Kim Koo est universellement respecté en tant que père fondateur de la nation, beaucoup pensent que sa crainte de voir d'autres partis égarer le pays l'empêchera de garantir l'équité des élections. En effet, un courant de discours de plus en plus présent a libéré des éléments plus radicaux au sein de la population coréenne et alimente un sentiment croissant de partisanerie dans ce jeune État. Il semble que ces tensions croissantes aient effectivement donné à Kim des raisons de s’inquiéter, notre ministère des Affaires étrangères ayant reçu une lettre de Kim demandant un soutien pour d’éventuels plans visant à maintenir la stabilité du pays.\n\nAffirmant que les éléments socialistes et radicaux deviennent de plus en plus violents à l'approche du jour du scrutin, Kim a dévoilé des plans secrets visant à garantir le bon déroulement des élections en faveur du PIC, voire à organiser un coup d'État si un parti hostile aux intérêts nationaux de notre pays venait à l'emporter. Affirmant qu'il est le seul capable de mener la Corée vers un avenir meilleur et qu'il est un allié de confiance pour [ROOT.getLeader], Kim a clairement fait connaître sa position. S'il est vrai que Kim reste un allié solide de notre gouvernement, soutenir de telles mesures pourrait s'avérer risqué.\n\nSi le pari de Kim venait à échouer et que le nouveau gouvernement élu l'apprenait, les relations avec l'État coréen pourraient rapidement se détériorer et déboucher sur une méfiance mutuelle. Pourtant, la situation serait peut-être encore pire si les élections étaient détournées par des éléments déjà hostiles et si le PIC n'était pas correctement soutenu par notre appui. En fin de compte, [ROOT.getLeader] doit réfléchir à une décision difficile."
 korea_events.1.a:9 "Soutenez le plan de Kim, il est notre homme jusqu'au bout."
 korea_events.1.b:9 "Nous faisons confiance à Kim pour l'emporter à la loyale."

 korea_events.2.t:0 "Élection de [GetYear]"
 korea_events.2.d:0 "Enfin, après beaucoup d'anticipation lors du dépouillage des urnes, le vainqueur des élections de cette année est..."
 korea_events.2.a:9 "Le Parti pour l'Indépendance de la Corée !"
 korea_events.2.b:9 "Le Parti nationaliste coréen !"
 korea_events.2.c:9 "Le Parti démocratique de Corée !"
 korea_events.2.dem:9 "Le Parti du Peuple ouvrier !"
 korea_events.2.e:9 "Le Parti pour l'Indépendance de la Corée !"

 korea_events.3.t:0 "Succès révolutionnaires en Corée"
 korea_events.3.d:0 "Pendant les guerres d'unification et de résistance, les révolutionnaires coréens ont combattu aux côtés de l'Armée nationale révolutionnaire. Nombre d'entre eux appartenaient au Parti révolutionnaire national coréen (PRNC), une organisation créée par l'officier coréen Kim Wonbong, lui-même diplômé de l'Académie révolutionnaire de Whampoa.\n\nAprès la guerre, Kim Wonbong est rentré au pays avec le KNRP pour administrer la nation coréenne récemment libérée. Dans le cadre de ses réformes visant à moderniser la Corée, Kim a mis en œuvre les idéaux des trois principes du peuple, en s'inspirant fortement du Kuomintang chinois. Aujourd'hui, des représentants coréens ont rencontré [ROOT.GetLeader] pour discuter des relations futures entre la République de Chine et la République de Corée. Bien que la Corée doive rester sous la sphère et la protection de la Chine, elle jouira néanmoins d'une certaine autonomie nominale, les deux pays s'étant engagés à travailler ensemble en tant que sœurs révolutionnaires jumelles pour libérer l'Asie de l'Est de l'impérialisme."
 korea_events.3.a:0 "Nous sommes solidaires !"

 korea_events.4.t:0 "Traité de Paix et de Sécurité"
 korea_events.4.d:0 "Pendant les guerres d'unification et de résistance, les révolutionnaires coréens ont combattu aux côtés de l'Armée nationale révolutionnaire. Nombre d'entre eux appartenaient au Gouvernement provisoire de la République de Corée (PGROK), une faction indépendantiste coréenne dirigée par le grand révolutionnaire coréen Kim Koo.\n\nAprès la guerre, Kim Koo et le PGROK sont rentrés au pays pour administrer la nation coréenne nouvellement libérée, avec la bénédiction de la République de Chine. Cependant, malgré l'indépendance durement acquise de la Corée, les Coréens n'ont pas oublié l'aide et l'amitié qu'ils entretenaient avec leurs camarades chinois du Kuomintang. Aujourd'hui, des représentants coréens ont rencontré [ROOT.GetLeader] pour discuter des relations futures entre la République de Chine et la République de Corée. Si la Corée doit rester sous la sphère et la protection de la Chine, elle jouira néanmoins d'une certaine autonomie nominale, les deux pays s'étant engagés à collaborer en tant que tigres jumeaux pour maintenir la paix, la sécurité et la stabilité en Asie de l'Est."
 korea_events.4.a:0 "Nous sommes solidaires !"

 korea_events.5.t:0 "Kim Hong-il Retourne en Corée"
 korea_events.5.d:9 "En raison de l'occupation japonaise de leur pays, diverses armées de guérilla coréennes ont proliféré en Mandchourie, en Corée du Nord et en Chine continentale tout au long des années 1920. De nombreux révolutionnaires et nationalistes coréens en exil ont cherché la sécurité dans les académies militaires et les mouvements républicains chinois, dans l'espoir de rentrer un jour dans leur pays.\nComme beaucoup d'autres, Kim Hong-il s'est retrouvé en exil et s'est rendu dans l'extrême sud-ouest du Guizhou pour y suivre une formation militaire, où il a rencontré He Yingqin. En 1926, Hong-il rejoint l'Armée nationale révolutionnaire et participe à l'expédition du Nord, qui se solde par un échec. Après l'échec de l'expédition, Hong-il s'enfuit avec Yingqin et les restes de la faction de droite du Kuomintang dans le Yunnan. Cependant, avec la victoire des Chinois sur leurs adversaires japonais lors de la seconde guerre sino-japonaise, Hong-il a officiellement annoncé sa démission pour servir dans la nouvelle république coréenne."
 korea_events.5.a:0 "Merci pour votre service."

 korea_events.6.t:9 "Nos Alliés en Corée"
 korea_events.6.d:9 "Au cours de la dernière guerre contre l'agression japonaise, les révolutionnaires coréens ont collaboré avec notre gouvernement pour mettre fin à l'empire infâme de Tokyo et voir naître une Corée libre après un demi-siècle de domination. Ces fidèles révolutionnaires, au service du Gouvernement provisoire de la République de Corée, sont passés d’une bande hétéroclite de combattants de la liberté à un gouvernement responsable sous la direction de Kim Koo, avec la bénédiction et le soutien de [ROOT.getLeader] et du gouvernement [ROOT.getAdjective] à [ROOT.Capital.GetCapitalVictoryPointName].\n\nKim, qui a consolidé sa position de père fondateur de la Corée, a veillé à ce que la Corée devienne une société pluraliste engagée à améliorer la nation au fil des années. À l'étranger, Kim Koo a également entretenu des liens étroits avec le gouvernement de [ROOT.getLeader], les observateurs extérieurs soulignant l'épanouissement de la relation privilégiée [ROOT.getAdjective]-coréenne. [ROOT.getLeader] et Kim Koo étant toujours sur la même longueur d'onde et partageant le même programme, le bloc [ROOT.getAdjective]-coréen continuera d'être un pilier de la paix et de la sécurité mondiales."
 korea_events.6.a:9 "Buvons à un partenariat durable."

 korea_events.7.t:9 "Socialism in the Sister Republic"
 korea_events.7.d:9 "With Generalissimo Feng Yuxiang's embrace of the Kuomintang's leftist flank underway, the Christian General now looks to consolidate China's sphere of influence in a new socialistic direction, especially the Korean Republic. Although installed by Feng and having given assurances of his continued loyalty, Feng and the Kuomintang remains cautious about Kim Kyu-sik's government. While he did follow the Central Executive Committee and the Korean National Revolutionary Party into exile in Paris before a triumphant return to China a decade later, it was always known that Kim Kyu-sik gravitated closer towards rightist circles within the Kuomintang.\n\nWhile Kim has leaned into a more socialistic direction in following Feng's lead, many within the party advise the Generalissimo to do away with Kim entirely in favour of a more reliable figure. Kim Wonbong, a longtime associate with the Kuomintang's left wing and former leader of the KNRP, has been raised as a prime candidate to replace Kim Kyu-sik. While slighted by Feng's initial favouritism towards Kim Kyu-sik, he has signalled to Feng of his intentions to support the new socialist government should he take power, convincing the Christian General.\n\nIn the late afternoon, Kim Wonbong and a contingent of loyalists stormed the army headquarters and seized the National Assembly. Moving swiftly, Kim Wonbong personally detained Kim Kyu-sik before having him removed from office. In a speech to onlookers, Kim Wonbong declared that Korea would embrace a genuine socialist direction and forge a republic that truly empowers the workers and peasants."
 korea_events.7.a:9 "Le peuple coréen s'est soulevé !"

 korea_events.8.t:9 "Purifying the Revolution Abroad"
 korea_events.8.d:9 "At long last, the Kuomintang finds itself bereft of the plague which has turned it into an immobile and decaying organisation for the past decade. Yet, more fifth columnists and socialist filth remain across East Asia. In the recently liberated Korean Peninsula, Generalissimo He Yingqin left the government in the control of Kim Kyu-sik and the Korean National Revolutionary Party, a critical mistake.\n\nKim, while less inclined to Marxism than the foolish anarchist Kim Wonbong, still threw in his lot with Wang Jingwei's den of dogs in Paris, instead of remaining in China to continue the righteous fight against imperialism and reaction. While in Paris, Kim Kyu-sik no doubt absorbed a substantial amount of syndicalist nonsense into his political agenda, which will surely bring Korea to ruin.\n\nYet, not all is lost. In the decadent mess that is the KNRP lies Yeom Dong-jin and his White Shirt Society. Long a friend to Teng Jie and the Kuomintang Blue Shirts, Yeom has embraced the use of terror and the revolver to bring about true political change and has instilled true revolutionary principles in his followers. The Lingxiu has resolved to call upon his old friend to save the Korean Republic from crypto-Marxism and deliver Korea to the true path of revolution.\n\nBringing in a coalition of loyalists and true national revolutionaries, Yeom's men quickly took control of downtown Seoul and the army headquarters while he personally stormed the National Assembly to detain President Kim. After an impromptu swearing-in ceremony, President Yeom declared that he would defend the Republic from all of Korea's enemies and cleanse the nation of all traitors."
 korea_events.8.a:9 "La république-sœur revient dans le giron."

