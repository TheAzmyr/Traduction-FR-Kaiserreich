### Ideas ####
 KOR_legitimacy_idea_1:9 "Légitimité du Gouvernement Provisoire : §oAbyssale§!"
 KOR_legitimacy_idea_1_desc:9 "En exil depuis des décennies, le Gouvernement provisoire de Corée ne pouvait qu'assister, consterné, à la façon dont l’Empire du Japon privait sans cesse la nation de nouvelles libertés et soumettait le peuple coréen à l'humiliation de l’asservissement. Même aujourd'hui, alors que les chaînes japonaises sont définitivement brisées, l'État coréen reste dans une situation incertaine.\n\nLe départ des autorités coloniales japonaises a contraint le Gouvernement provisoire à se démener pour prendre les rênes de l'administration, plongeant le pays dans un chaos temporaire. Au-delà des problèmes liés à la transition gouvernementale, le nouveau régime se prépare également à diriger une nation qui a passé des générations sous la domination coloniale. Malgré la tâche titanesque qui attend le Gouvernement provisoire pour établir une nation nouvelle et libre, le peuple et ses dirigeants sont convaincus que l'avenir de la Corée sera bel et bien radieux."
 KOR_legitimacy_idea_2:9 "Légitimité du Gouvernement Provisoire : §gDysfonctionnelle§!"
 KOR_legitimacy_idea_2_desc:9 "$KOR_legitimacy_idea_1_desc$"
 KOR_legitimacy_idea_3:9 "Légitimité du Gouvernement Provisoire : §GToléré§!"
 KOR_legitimacy_idea_3_desc:9 "$KOR_legitimacy_idea_1_desc$"

 KOR_legitimacy_democratic:9 "Légitimité du Gouvernement Provisoire : §cCorée Démocratique§!"
 KOR_legitimacy_democratic_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice."
 KOR_legitimacy_kip:9 "Légitimité du Gouvernement Provisoire : §cIndépendance Éternelle§!"
 KOR_legitimacy_kip_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nAprès avoir été à la tête du gouvernement par intérim et fort du mandat que lui a confié le peuple coréen, Kim Koo s'apprête à s'engager dans une voie à la fois conservatrice et étonnamment égalitaire, adaptée aux conditions sociales et économiques propres à la Corée."
 KOR_legitimacy_authkip:9 "Légitimité du Gouvernement Provisoire : §aIndépendance Défendue à Tout Prix§!"
 KOR_legitimacy_authkip_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre.\n\nAvec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs.\n\nMême si Kim Koo a peut-être envisagé de mener à bien l'expérience démocratique, il lui est désormais apparu clairement qu'il était le seul à avoir à cœur les intérêts de la Corée. Avec des crypto-syndicalistes, des laquais occidentaux et des bouffons zélés qui l'entourent à chaque instant, comment l'homme qui a dirigé le gouvernement provisoire pendant si longtemps pourrait-il les laisser ruiner les chances de la Corée d'avoir un avenir meilleur ? Non, Kim Koo veillera à ce que la Corée reste sur la bonne voie vers la liberté et l'indépendance."
 KOR_legitimacy_knp:9 "Légitimité du Gouvernement Provisoire : §lTrois Principes de Corée§!"
 KOR_legitimacy_knp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Yun Chi-Young, le pays s'apprête à s'engager sur la voie tracée par Sun Yat-sen et ses Trois Principes, mais dans une direction plus démocratique et plus conservatrice, mieux adaptée aux conditions sociales et économiques propres à la Corée."
 KOR_legitimacy_kdp:9 "Légitimité du Gouvernement Provisoire : §mForteresse Démocratique§!"
 KOR_legitimacy_kdp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Chough Pyung-ok, le pays s'apprête à s'engager sur une voie conservatrice modérée, inspirée des démocraties libérales occidentales, mais adaptée aux spécificités sociales et économiques de la Corée."
 KOR_legitimacy_lpp:9 "Légitimité du Gouvernement Provisoire : §SIdéalisme Sans Compromis§!"
 KOR_legitimacy_lpp_desc:9 "On a souvent affirmé que le Gouvernement provisoire de Corée et le Parti pour l'Indépendance de la Corée étaient voués à l'échec dans leur projet d'ériger un État coréen libre et égalitaire, et même aujourd'hui, de nombreuses voix pessimistes persistent, mais on ne peut nier que l'Administration provisoire de Corée a réussi à atteindre ses objectifs.\n\nLa Corée d'aujourd'hui est non seulement libérée de la domination étrangère d'une puissance coloniale, mais jouit également des libertés d'un État démocratique en plein essor, ce qui était considéré comme impossible dans un État postcolonial. Il est vrai que la nouvelle démocratie coréenne est récente et n'a pas encore fait ses preuves, mais le peuple coréen est à la hauteur de la tâche qui consiste à gouverner son propre pays avec sagesse et justice.\n\nSous la houlette de son premier dirigeant démocratique, Luh Woon-hyung, le pays s'apprête à s'engager dans une voie socialiste modérée, rejetant tant les puissances capitalistes occidentales que le syndicalisme révolutionnaire trop zélé, car la Corée doit tracer sa propre voie, adaptée à ses conditions sociales et économiques particulières."

 KOR_legitimacy_authoritarian:9 "Légitimité du Gouvernement Provisoire : §aLiberté par la Force§!"
 KOR_legitimacy_authoritarian_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre.\n\nAvec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs."
 KOR_legitimacy_authknp:9 "Légitimité du Gouvernement Provisoire : §aTridémisme Perfectionné§!"
 KOR_legitimacy_authknp_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre. Avec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs.\n\nContrairement aux imbéciles qui s'opposent à lui, le président Ji Cheong-cheon s'est battu toute sa vie pour la liberté de la Corée. En tant que véritable disciple de Sun Yat-sen, et contrairement aux rongeurs syndicalistes du Parti national révolutionnaire coréen qui ont souillé sa vision, le peuple peut être assuré que le président Ji mettra en œuvre la doctrine Sanmin d'une manière qui soit véritablement à la hauteur du peuple coréen."
 KOR_legitimacy_lp:9 "Légitimité du Gouvernement Provisoire : §PLe Grand Généralissime§!"
 KOR_legitimacy_lp_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre. Avec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs.\n\nLe généralissime Lee Beom-seok et le Parti libéral n'ont d'amour que pour le peuple coréen et aspirent à bâtir une République coréenne véritablement grande. Notre nation ne sera plus jamais soumise à des peuples indignes de la dignité de la Corée, et sous l'autorité du Généralissime, nous pouvons être assurés que nous serons toujours à l'abri des capitalistes et des socialistes qui cherchent à nous asservir."
 KOR_legitimacy_diarchy:9 "Légitimité du Gouvernement Provisoire : §PPuissance de la Diarchie§!"
 KOR_legitimacy_diarchy_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre. Avec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs.\n\nLe président Syngman Rhee est un homme qui connaît véritablement les difficultés du peuple coréen. Avec le généralissime Lee à ses côtés et le Parti libéral à sa disposition, le peuple coréen peut avoir l'esprit tranquille, sachant que ces deux hommes, issus de la providence divine, forgeront une Corée empreinte de force et un rempart contre un syndicalisme cruel et contre nature."
 KOR_legitimacy_rhee:9 "Légitimité du Gouvernement Provisoire : §aSeul Sauveur de la Corée§!"
 KOR_legitimacy_rhee_desc:9 "Grâce à une direction forte et à un sens politique avisé, la Corée s'est véritablement stabilisée et est désormais prête à renaître en tant que nouvelle nation, libérée de toute influence coloniale. Pourtant, des traîtres et des agitateurs rôdent dans l’ombre. Avec de tels parasites prêts à replonger notre pays dans les fléaux de la guerre et de l'exploitation, comment pourrions-nous envisager d'accepter des élections libres et équitables, au cours desquelles ces membres de la cinquième colonne pourraient égarer le peuple ?\n\nNon, la Corée connaîtra la véritable prospérité grâce au maintien de notre glorieuse et juste direction. Ayant toute latitude pour mettre en œuvre la volonté nationale, on peut même affirmer que le gouvernement actuel est l'incarnation de la véritable démocratie, quoi qu'en disent ses détracteurs.\n\nLe président Syngman Rhee est un homme qui connaît véritablement les difficultés du peuple coréen. Avec le Parti libéral à sa seule et unique disposition, Rhee bâtira une Corée véritablement juste et forte, qui ne trahira pas les valeurs et les traditions de son peuple. Grâce à ses alliés à Washington, le peuple coréen peut avoir l'esprit tranquille, sachant qu'aucune nation ne menacera plus jamais l'indépendance de la Corée."

 KOR_legitimacy_revolutionary:9 "Légitimité du Gouvernement Provisoire : §tCorée Révolutionnaire§!"
 KOR_legitimacy_revolutionary_desc:9 "Pour la première fois de son histoire, la Corée se trouve au seuil d'une société véritablement grande et égalitaire. Sous le gouvernement actuel, toutes les idées réactionnaires et colonialistes ont été éliminées, et la nation s’en porte mieux. Les imbéciles d'Ilministes et les démocrates dérangés dénoncent l'orientation prise par la République de Corée comme une trahison des valeurs et des traditions coréennes, mais que savent-ils de la décence et de la justice ?\n\nKim Koo s'est rallié au gouvernement de Beiyang et a abandonné la juste lutte du Kuomintang contre l'impérialisme et la décadence, Lee ne sait rien d'autre que brutaliser la population, Rhee n'est rien d'autre qu'un larbin des Américains, et la soi-disant opposition démocratique est composée de râleurs trop épris du son de leur propre voix. Non, le gouvernement révolutionnaire coréen ne s'inclinera pas devant les critiques de ces imbéciles, qui refusent d'embrasser l'avenir en rompant avec le passé."
 KOR_legitimacy_wpk:9 "Légitimité du Gouvernement Provisoire : §oLa Révolution Locale§!"
 KOR_legitimacy_wpk_desc:9 "Pour la première fois de son histoire, la Corée se trouve au seuil d'une société véritablement grande et égalitaire. Sous le gouvernement actuel, toutes les idées réactionnaires et colonialistes ont été éliminées, et la nation s’en porte mieux. Les imbéciles d'Ilministes et les démocrates dérangés dénoncent l'orientation prise par la République de Corée comme une trahison des valeurs et des traditions coréennes, mais que savent-ils de la décence et de la justice ?\n\nKim Koo s'est rallié au gouvernement de Beiyang et a abandonné la juste lutte du Kuomintang contre l'impérialisme et la décadence, Lee ne sait rien d'autre que brutaliser la population, Rhee n'est rien d'autre qu'un larbin des Américains, et la soi-disant opposition démocratique est composée de râleurs trop épris du son de leur propre voix. Non, le gouvernement révolutionnaire coréen ne s'inclinera pas devant les critiques de ces imbéciles, qui refusent d'embrasser l'avenir en rompant avec le passé.\n\nPersonne ne le sait mieux que le président Pak Hon-yong. Révolutionnaire chevronné qui a mené la lutte dans la patrie occupée, il veillera à ce que la Corée emprunte la voie du socialisme véritable selon ses propres conditions."
 KOR_legitimacy_npp:9 "Légitimité du Gouvernement Provisoire : §rLa Corée S'est Levée§!"
 KOR_legitimacy_npp_desc:9 "Pour la première fois de son histoire, la Corée se trouve au seuil d'une société véritablement grande et égalitaire. Sous le gouvernement actuel, toutes les idées réactionnaires et colonialistes ont été éliminées, et la nation s’en porte mieux. Les imbéciles d'Ilministes et les démocrates dérangés dénoncent l'orientation prise par la République de Corée comme une trahison des valeurs et des traditions coréennes, mais que savent-ils de la décence et de la justice ?\n\nKim Koo s'est rallié au gouvernement de Beiyang et a abandonné la juste lutte du Kuomintang contre l'impérialisme et la décadence, Lee ne sait rien d'autre que brutaliser la population, Rhee n'est rien d'autre qu'un larbin des Américains, et la soi-disant opposition démocratique est composée de râleurs trop épris du son de leur propre voix. Non, le gouvernement révolutionnaire coréen ne s'inclinera pas devant les critiques de ces imbéciles, qui refusent d'embrasser l'avenir en rompant avec le passé.\n\nPersonne ne le sait mieux que le président Kim Tu-bong. Révolutionnaire aguerri, forgé dans le bastion révolutionnaire de MinGan, Kim et le NPP veilleront à ce que la Corée s'engage résolument sur la voie du socialisme, en permettant à tous les partis patriotiques et véritablement démocratiques de se joindre à l'œuvre qui nous attend."
 KOR_legitimacy_knrp:9 "Légitimité du Gouvernement Provisoire : §RRévolution Nationale Coréenne§!"
 KOR_legitimacy_knrp_desc:9 "Pour la première fois de son histoire, la Corée se trouve au seuil d'une société véritablement grande et égalitaire. Sous le gouvernement actuel, toutes les idées réactionnaires et colonialistes ont été éliminées, et la nation s’en porte mieux. Les imbéciles d'Ilministes et les démocrates dérangés dénoncent l'orientation prise par la République de Corée comme une trahison des valeurs et des traditions coréennes, mais que savent-ils de la décence et de la justice ?\n\nKim Koo s'est rallié au gouvernement de Beiyang et a abandonné la juste lutte du Kuomintang contre l'impérialisme et la décadence, Lee ne sait rien d'autre que brutaliser la population, Rhee n'est rien d'autre qu'un larbin des Américains, et la soi-disant opposition démocratique est composée de râleurs trop épris du son de leur propre voix. Non, le gouvernement révolutionnaire coréen ne s'inclinera pas devant les critiques de ces imbéciles, qui refusent d'embrasser l'avenir en rompant avec le passé.\n\nPersonne ne le sait mieux que les fidèles membres du Parti national révolutionnaire coréen. Véritables disciples de Sun Yat-sen et du Kuomintang, Kim Wonbong et Kim Kyu-sik connaissent le véritable sens de la liberté, et sous leur direction, la Corée renaîtra à la vie grâce à une révolution nationale juste."
 KOR_legitimacy_wss:9 "Légitimité du Gouvernement Provisoire : §nDémocratisation de la Peur§!"
 KOR_legitimacy_wss_desc:9 "Pour la première fois de son histoire, la Corée se trouve au seuil d'une société véritablement grande et égalitaire. Sous le gouvernement actuel, toutes les idées réactionnaires et colonialistes ont été éliminées, et la nation s’en porte mieux. Les imbéciles d'Ilministes et les démocrates dérangés dénoncent l'orientation prise par la République de Corée comme une trahison des valeurs et des traditions coréennes, mais que savent-ils de la décence et de la justice ?\n\nKim Koo s'est rallié au gouvernement de Beiyang et a abandonné la juste lutte du Kuomintang contre l'impérialisme et la décadence, Lee ne sait rien d'autre que brutaliser la population, Rhee n'est rien d'autre qu'un larbin des Américains, et la soi-disant opposition démocratique est composée de râleurs trop épris du son de leur propre voix. Non, le gouvernement révolutionnaire coréen ne s'inclinera pas devant les critiques de ces imbéciles, qui refusent d'embrasser l'avenir en rompant avec le passé.\n\nPersonne ne le sait mieux que Yeom Dong-jin. Certains le qualifient de collaborateur, de terroriste et de bandit, mais le Leader suprême ne prête aucune attention à ces voix. Pour lui, la nouvelle Corée ne peut voir le jour que grâce à sa volonté de fer, la terreur étant l'outil qu'il a choisi pour assurer la renaissance de la nation."

 #Democratic Ideas
 KOR_welfare_state:0 "État Providence en Plein Essor"
 KOR_welfare_state_desc:9 "Bien que la Corée ait été libérée de l'occupation japonaise, notre peuple continue de souffrir de difficultés économiques, d'autant plus que le pays se remet encore des conditions de guerre. Maintenant que la situation s'est stabilisée, nous mettrons en place des mesures de protection sociale de base pour tous les Coréens, afin de garantir des conditions de vie décentes et d'empêcher les idéologies radicales de s'enraciner au sein de la population."
 KOR_westernising_state:9 "État Occidentalisé"
 KOR_westernising_state_desc:9 "La libération de la Corée a conduit à la création d'une république démocratique, et le Parti démocratique de Corée a remporté les premières élections. Forts de ce mandat populaire, il nous incombe désormais d'assurer la stabilité à long terme de la république. Les sociétés démocratiques du monde occidental nous ont fourni un excellent exemple à suivre ; adaptons avec soin les valeurs positives issues des démocraties occidentales tout en préservant l'identité coréenne unique."
 KOR_working_class:9 "Aide à la Classe Ouvrière"
 KOR_working_class_desc:9 "En tant que principale force représentant la gauche dans la nouvelle Corée démocratique, le Parti du Peuple ouvrier s'efforcera d'améliorer les conditions de vie de la classe ouvrière. Des réformes fondamentales du droit du travail, telles que la journée de travail de huit heures, l'interdiction du travail des enfants, l'instauration d'un salaire minimum et d'autres droits fondamentaux des travailleurs, seront mises en œuvre à l'échelle nationale, afin que les travailleurs coréens puissent pleinement profiter des fruits de leur propre travail."
 KOR_civilian_rule:9 "Contrôle Civil de l'Armée"
 KOR_civilian_rule_desc:9 "Depuis le retour du Gouvernement provisoire, une république constitutionnelle a été instaurée en Corée. La jeune république doit faire face à de nombreux défis, tant sur le plan intérieur qu’extérieur. Afin de préserver le caractère civil de l’administration, l’armée sera entièrement placée sous le contrôle civil, ce qui garantira la pérennité de la Constitution et permettra de parer à toute prise de pouvoir violente par des radicaux et des extrémistes."

 #Authoritarian Ideas
 KOR_antisocialist:9 "La Nation Morale"
 KOR_antisocialist_desc:9 "Le socialisme, sous toutes ses formes, ne vise qu’à attiser davantage les conflits de classe dans l’espoir d’atteindre une prétendue égalité sociale par la révolution. Dans la poursuite de leurs objectifs, ils ne feront que provoquer la destruction de la nation coréenne et de sa culture si nous ne mettons pas un terme à cela. Ce n’est qu’en promouvant une société morale qui met l’accent sur la piété filiale et le respect des traditions que nous pourrons garantir la stabilité et la survie de la Corée dans son ensemble."
 KOR_autarkic_state:9 "L'État Autarcique"
 KOR_autarkic_state_desc:9 "Même si notre pays ne dispose pas d’une économie comparable à celle de nos voisins, nous devons, en fin de compte, nous contenter de ce dont nous disposons et nous développer si nous voulons que la Corée devienne un pays véritablement indépendant. C’est grâce à la seule volonté et à la détermination du peuple coréen que nous jetterons les bases d’une économie nationale indépendante, capable d’assurer la prospérité de tous et de garantir la sécurité de la patrie."
 KOR_neither_china_nor_japan:9 "Contre le Dragon, Contre le Soleil"
 KOR_neither_china_nor_japan_desc:9 "Pendant trop longtemps, la Corée a été le jouet de la Chine et du Japon, qui nous traitaient comme de simples pions au service de leurs ambitions impérialistes. Mettons fin à cette idée et affirmons clairement que tant que le Taegeukgi continuera de flotter fièrement dans les airs, la Corée restera un peuple prêt à se battre pour son indépendance, tant que ces deux pays chercheront à nous imposer leur influence."
 KOR_corporatism:0 "L'État Corporatiste"
 KOR_corporatism_desc:9 "La soumission de notre nation au Japon s'est produite à un moment où la Corée était extrêmement affaiblie, son retard étant aggravé par la corruption des élites de la dynastie Joseon. En conséquence, des révoltes paysannes ont éclaté, plongeant le pays dans un affaiblissement encore plus grand et condamnant notre race supérieure coréenne à des décennies d'humiliation infligée par les impérialistes japonais. La Corée étant à nouveau libre, nous veillerons à ce que les conflits de classe ne se reproduisent plus jamais et à ce que l'harmonie entre tous les Coréens soit préservée à tout prix."
 KOR_third_way:9 "Contre la Puanteur du Capitalisme et du Marxisme"
 KOR_third_way_desc:9 "L'impérialisme marxiste et l'impérialisme capitaliste, bien que le premier soit pire que le second, recherchent tous deux sans relâche la domination et le profit, ce qui conduit à la destruction d'autres groupes ethniques et nations. Pour lutter contre ce fléau des idéologies impérialistes sur notre sol, l'unification de tous les Coréens en un seul peuple indivisible est nécessaire pour préserver l'indépendance de la nation coréenne."
 KOR_universal_suffrage:0 "Avant-garde de l'Émancipation"
 KOR_universal_suffrage_desc:0 "Notre pays est un véritable phare de l'émancipation, car il n'existe pratiquement aucun autre endroit au monde où les femmes jouissent d'une telle liberté politique."
 KOR_stratocracy:9 "Stratocratie Coréenne"
 KOR_stratocracy_desc:9 "Le maintien de l'indépendance et de la souveraineté de la Corée dépend de la capacité de nos forces armées à défendre le pays contre les forces extérieures ; il est tout à fait naturel que chacun apporte sa contribution pour soutenir notre armée, sous peine de perdre à nouveau notre nation. En plaçant l'armée au premier rang des priorités nationales et en renforçant l'unité entre l'armée et les citoyens, la Corée restera libre pour toujours !"

 #Revolutionary Ideas
 KOR_equal_republic:9 "La République Égale"
 KOR_equal_republic_desc:9 "La Révolution est enfin arrivée en Corée. Avec la libération du pays, il incombe à notre gouvernement d'instaurer l'égalité économique pour tous les Coréens et de briser les chaînes de l'oppression. L'influence et la domination injustes des Yangban seront abolies, et les richesses de la Corée seront accessibles à tous les Coréens."
 KOR_unique_socialism:9 "Socialisme aux Caractéristiques Coréennes"
 KOR_unique_socialism_desc:9 "Le marxisme, tel qu’il avait été initialement conçu, s’inspirait des économies capitalistes matures d’Europe occidentale, qui comptaient un important prolétariat industriel. Or, en tant que nation agraire disposant d’une base industrielle très limitée, la Corée ne réunit pas les conditions nécessaires pour parvenir à un mode de production socialiste. Malgré tout, nous allons concilier les vérités universelles du marxisme avec les réalités de la Corée, et tracer notre propre voie vers le socialisme !"
 KOR_longyan:9 "Leçons de Longyan"
 KOR_longyan_desc:9 "L'Insurrection MinGan du Kuomintang a constitué une leçon précieuse pour les révolutionnaires socialistes du monde entier. Contrairement aux tactiques conventionnelles employées lors des guerres civiles françaises et britanniques, cette insurrection, dont le centre névralgique était Longyan, a apporté un éclairage important sur la viabilité de la guérilla. En recourant à de telles tactiques non conventionnelles contre nos ennemis, nous l'emporterons même si le monde entier est contre nous !"
 KOR_tutelage:9 "Deuxième Étape de la Révolution"
 KOR_tutelage_desc:9 "Dans ses Fondements de la Reconstruction nationale, le Dr Sun Yat-sen a détaillé les trois étapes de la révolution visant à faire de la Chine une nation démocratique : le régime militaire, la tutelle politique et le gouvernement constitutionnel. Après avoir éliminé tous les obstacles à la démocratie, la Corée est entrée dans la deuxième étape de la révolution. Jusqu’à ce que le peuple soit pleinement prêt à l’autonomie et à l’exercice de ses droits démocratiques, nous le guiderons en tant que mentors et nous réprimerons ceux qui cherchent à saboter la révolution."
 KOR_revolutionary_vanguard:0 "Avant-garde Révolutionnaire"
 KOR_revolutionary_vanguard_desc:9 "Pour qu'une révolution aboutisse, elle doit être organisée et disciplinée, guidée par une avant-garde composée des individus les plus conscients. Si l'Asie doit être libérée de l'emprise du colonialisme impérialiste, il faut une avant-garde capable de propager les flammes de la révolution aux quatre coins de l'Asie. Aux côtés de nos alliés, nous incarnerons cette avant-garde et ferons découvrir à tous les peuples d'Asie la grande vision du pan-asiatisme !"
 KOR_germany:9 "Rempart Contre l'Allemagne"
 KOR_germany_desc:9 "Au cours des deux dernières décennies, l'Allemagne a toujours été un bastion de l'impérialisme étranger en Asie, s'imposant comme la première puissance européenne dans la région tout en s'associant à des collaborateurs locaux pour réprimer les révolutions anti-impérialistes, comme ce fut le cas lors de l'Expédition du Nord. Désormais, guidés par les Trois Principes, la Chine et la Corée uniront leurs forces pour la libération de l'Asie, et nous formerons un rempart contre la menace allemande."
 KOR_great_purge:9 "Révolution Purifiée"
 KOR_great_purge_desc:9 "La longue et pénible lutte pour l'indépendance de la Corée a souvent été corrompue par la présence d'intellectuels et de bureaucrates perfides de toutes sortes, qu'il s'agisse de socialistes dégénérés, de démocrates, des dirigeants du gouvernement provisoire ou des ilministes. Elle ne sera plus jamais corrompue ! Sous la direction de notre Chef suprême, la révolution coréenne sera menée à bien jusqu’au bout. La Société des Chemises blanches remédiera aux maux de la société coréenne, la purifiera de ses éléments toxiques et la mènera vers un avenir véritablement révolutionnaire, inaugurant la renaissance de la nation."

 #Economy Ideas
 KOR_economy_idea_1:9 "Économie Nationale Coréenne : §oEn Lambeaux§!"
 KOR_economy_idea_1_desc:9 "Bien que le peuple coréen puisse désormais jouir de la liberté après avoir été sous la tyrannie japonaise, le pays se trouve aujourd’hui en ruines et en proie à des troubles. Lorsque les Japonais se sont rendus et ont cédé le contrôle de la Corée, l’exode massif des hommes d’affaires et des colons coloniaux a laissé un grand vide dans le tissu économique de notre nation. Les vagues de citoyens désorientés, ignorants du retrait japonais, n’ont fait qu’alourdir les responsabilités du gouvernement provisoire.\n\nUne grande partie des régions industrielles du nord de la Corée a été particulièrement touchée par la guerre, et les propriétaires fonciers collaborationnistes à travers le pays continuent de tourmenter le gouvernement. Si le gouvernement provisoire espère gagner le soutien du peuple, il doit travailler avec diligence pour répondre aux besoins économiques de la population."
 KOR_economy_idea_2:9 "Économie Nationale Coréenne : §gReconstruction en Cours§!"
 KOR_economy_idea_2_desc:9 "Bien que le peuple coréen puisse désormais jouir de la liberté après avoir été sous la tyrannie japonaise, le pays se trouve aujourd’hui en ruines et en proie à des troubles. Lorsque les Japonais se sont rendus et ont cédé le contrôle de la Corée, l’exode massif des hommes d’affaires et des colons coloniaux a laissé un grand vide dans le tissu économique de notre nation. Les vagues de citoyens désorientés, ignorant le retrait japonais, n’ont fait qu’alourdir les responsabilités du gouvernement provisoire.\n\nUne grande partie des régions industrielles du nord de la Corée a été particulièrement touchée par la guerre, et les propriétaires fonciers collaborationnistes à travers le pays continuent de tourmenter le gouvernement. En réponse à la crise économique, le gouvernement provisoire a déjà commencé à élaborer un plan visant à redistribuer les biens des collaborateurs et des colons aux paysans coréens les plus pauvres, et les industries du nord ont été placées sous le contrôle direct du gouvernement pour le moment."
 KOR_economy_idea_3:9 "Économie Nationale Coréenne : §GModernisation de la Nation§!"
 KOR_economy_idea_3_desc:9 "Si le retrait japonais a plongé l'État coréen dans une période de troubles et de bouleversements, il semble que le pire soit désormais derrière nous. Dans le nord, bon nombre des usines dévastées ont été reconstruites, même s'il faudra sans doute encore un certain temps avant qu'elles ne fonctionnent à leur plein rendement. À la campagne, de nombreux paysans coréens profitent des avantages d’une terre qui leur appartient grâce au démantèlement des domaines coloniaux et des propriétés des collaborateurs, et deviennent rapidement un pilier du gouvernement coréen. Bien que la Corée soit encore loin d’être un pays prospère, son avenir est prometteur et le peuple coréen a confiance en sa capacité à tracer la bonne voie pour l’avenir."
 KOR_economy_idea_4:9 "Économie Nationale Coréenne : §LLa Voie vers la Prospérité§!"
 KOR_economy_idea_4_desc:9 "Si le retrait japonais a plongé l'État coréen dans une période de troubles et de bouleversements, il semble que le pire soit désormais derrière nous. Dans le nord, bon nombre des usines dévastées ont été reconstruites et ont tracé une nouvelle voie dans la révolution industrielle coréenne en plein essor.\n\nÀ la campagne, de nombreux paysans coréens profitent des avantages d’une terre qui leur appartient grâce au démantèlement des domaines coloniaux et des collaborateurs, et deviennent rapidement un pilier du gouvernement coréen. D’année en année, l’État coréen connaît une croissance et une prospérité sans précédent, une situation qui semblait autrefois inimaginable aux yeux des observateurs."
 KOR_economy_idea_5:9 "Économie Nationale Coréenne : §YÉconomie du Tigre Renaissant§!"
 KOR_economy_idea_5_desc:9 "Si le retrait japonais a plongé l'État coréen dans une période de troubles et de bouleversements, il semble que le pire soit désormais derrière nous. Dans le nord, de nombreuses usines dévastées ont été reconstruites, transformant le pays en un pôle industriel dynamique capable de rivaliser tant avec la Chine qu'avec le Japon.\n\nÀ la campagne, de nombreux paysans coréens profitent des avantages d’une terre qui leur appartient grâce au démantèlement des domaines coloniaux et des collaborateurs, et deviennent rapidement un pilier du gouvernement coréen.\n\nAu fil des années, l’État coréen connaît une croissance et une prospérité sans précédent, une situation qui semblait autrefois inimaginable aux yeux des observateurs. Bien qu’il s’agisse d’un petit pays d’Asie de l’Est, on ne peut nier que le miracle coréen en a fait un phare particulièrement brillant de la prospérité économique en Extrême-Orient."
 KOR_developmentalism:9 "L'État en Développement"
 KOR_developmentalism_desc:9 "Si le capitalisme anglo-américain a certes alimenté la croissance de deux puissantes superpuissances, il est clair qu’au XXe siècle, ces principes de libre-échange et de laissez-faire sont devenus totalement dépassés. La puissance de l’Empire du libre-échange n’a pas pu empêcher son effondrement dans le socialisme, pas plus qu’elle n’a sauvé les Américains d’une Grande Dépression débilitante et d’une guerre civile.\n\nNon, il est clair que le modèle allemand, lancé par Bismarck et remodelé par la Russie des Svobodniks, Tokyo et les étatistes chinois, doit également être la destinée de la Corée. Sous la tutelle du comité de planification économique coréen, le gouvernement coréen veillera à ce que la nation se développe de manière régulière et dans les délais prévus, sans rien laisser au hasard. Le socialisme d'État a forgé le Japon et la Chine, et il bâtira ainsi une Corée forte !"
 KOR_liberalising_economy:9 "Économie Libéralisée"
 KOR_liberalising_economy_desc:9 "Alors que l'on observe partout dans le monde une tendance croissante des gouvernements à s'impliquer directement dans la gestion économique du pays, l'État coréen ne doit pas s'engager dans cette voie. La Corée vient tout juste de sortir de la colonisation, et c'est le modèle américain qui convient le mieux à notre nation.\n\nLe président Rhee est convaincu qu’en suivant les principes du capitalisme de libre marché, le gouvernement peut éviter un déficit budgétaire insoutenable et encourager les investissements étrangers. En faisant de la Corée un pays sûr pour les affaires, nous pouvons garantir une croissance rapide sans nous bercer d’illusions idéalistes sur le socialisme d’État est-asiatique. Comme on le dit si souvent en Amérique, la vie, la liberté et la poursuite du bonheur seront notre credo."
 KOR_agriculture:9 "Révolution Agricole Coréenne"
 KOR_agriculture_desc:9 "Pilier de longue date de l'économie coréenne, l'agriculture n'a fait que gagner en importance à l'ère moderne. Dans un pays en développement où la population ne cesse de croître, la nation doit toujours se prémunir contre la famine. Si la Corée veut se renouveler en cette période critique, elle doit veiller à ce que ses agriculteurs et ses paysans bénéficient d’un soutien adéquat de la part du gouvernement en temps de crise. Les terres du sud, qui ont toujours offert des récoltes abondantes, constitueront le fondement sur lequel se bâtira l’avenir de la Corée."
 KOR_industry:9 "Révolution Industrielle Coréenne"
 KOR_industry_desc:9 "À l'ère moderne, le peuple coréen, autrefois agricole, s'est retrouvé emporté par la vague du capitalisme et de l'industrialisation. Pendant la période coloniale, l'Empire du Japon a mis en place divers monopoles industriels à Pyongyang et dans les environs, transformant la Corée du Nord en un pôle industriel régional comparable à la Mandchourie. Aujourd'hui, la Corée s'est affranchie de la domination japonaise et est en mesure de tracer sa propre voie. Les industries du Nord feront de notre pays un pôle manufacturier en Extrême-Orient, et les produits du monde entier porteront le label "Made in Korea" !"
 KOR_developmental_improved:9 "L'État en Développement"
 KOR_developmental_improved_desc:9 "$KOR_developmentalism_desc$"
 KOR_liberalising_improved:9 "Un État Guidé par le Marché Libre"
 KOR_liberalising_improved_desc:9 "$KOR_liberalising_economy_desc$"

 #Military Ideas
 KOR_military_idea_1:9 "État Militaire Coréen : §oChaos Post-Colonial§!"
 KOR_military_idea_1_desc:9 "Avec l'effondrement de l'Empire japonais, notre nation doit s'attacher à prévenir toute nouvelle tentative d'asservissement en redynamisant nos forces armées. Dès ses débuts, l'Armée nationale coréenne a été confrontée aux problèmes typiques d'une nation nouvellement libérée : un corps d'officiers comptant de nombreux anciens collaborateurs et une industrie de défense quasi inexistante, uniquement capable de produire des armes légères.\n\nParallèlement, un débat a éclaté au sein de notre corps d'officiers en exil quant à la direction que devrait prendre notre ANC en matière d'inspiration doctrinale, les précieux héritages de Whampoa, de Beiyang et du Japon occupant des positions dominantes dans cette lutte. Quelle que soit la voie que prendra l'ANC, nous devons veiller à ce qu'elle devienne une force capable de repousser tous les envahisseurs étrangers et garantir que la Corée reste libre pour les dix mille prochaines années."
 KOR_military_idea_2:9 "État Militaire Coréen : §gRéorganisation en Cours§!"
 KOR_military_idea_2_desc:9 "Avec l'effondrement de l'Empire japonais, notre nation doit désormais s'attacher à prévenir toute nouvelle tentative d'asservissement en redynamisant nos forces armées. L'Armée nationale coréenne a entamé sa transition d'une milice autonome vers une véritable force de défense nationale. Notre corps d'officiers commence à purger ses rangs des anciens collaborateurs, bien que notre industrie de défense reste largement tributaire du soutien de nos bienveillants libérateurs.\n\nAlors que notre réorganisation est en cours, notre état-major est toujours le théâtre de débats animés sur la direction à donner à notre jeune armée à l’avenir, les héritages de Whampoa, de Beiyang et du Japon continuant de dominer. Quelle que soit la voie que prendra l’ANC, nous devons veiller à ce qu’elle devienne une force capable de repousser tous les envahisseurs étrangers et garantir que la Corée reste libre pour les dix mille prochaines années."
 KOR_military_idea_3:9 "État Militaire Coréen : §GNouvelle Armée Coréenne§!"
 KOR_military_idea_3_desc:9 "Avec l'effondrement de l'Empire japonais, notre nation doit désormais s'attacher à prévenir toute nouvelle tentative d'asservissement en redynamisant nos forces armées. Nos efforts de réorganisation commencent à porter leurs premiers fruits, l'Armée nationale coréenne gagnant en puissance. Alors que les purges visant les anciens collaborateurs progressent à grands pas, notre corps d'officiers national accueille ses premières recrues parmi de jeunes patriotes prêts à défendre la nation, tandis que notre industrie de défense, par une expansion régulière, s'adapte lentement mais sûrement aux exigences du moment.\n\nÀ mesure que ces progrès sont réalisés, les débats actuels sur les sources d’inspiration en matière de doctrine se sont lentement orientés vers une collaboration patriotique plutôt que vers des allégeances étrangères, cherchant une synthèse entre nos deux anciens suzerains coloniaux de différentes époques. Seul l’avenir nous dira ce que cette discussion apportera. Quel que soit l’avenir de l’ANC, nous devons veiller à ce qu’elle devienne une force capable de repousser tous les envahisseurs étrangers et garantir que la Corée reste libre pour les dix mille prochaines années."
 KOR_military_idea_4:9 "État Militaire Coréen : §LPremière Ligne de Défense§!"
 KOR_military_idea_4_desc:9 "Avec l'effondrement de l'Empire japonais, notre nation doit désormais s'attacher à prévenir toute nouvelle tentative d'asservissement en redynamisant nos forces armées. Notre armée nationale n'est plus une simple milice composée de combattants de la liberté en exil, mais une armée nationale véritablement professionnelle, formée de patriotes prêts à protéger de leur vie la terre de leurs ancêtres. Notre corps d'officiers n'est plus composé de collaborateurs et de laquais de l'Empire japonais, mais de sous-officiers et de cadets nouvellement formés, prêts à mener notre peuple vers un avenir meilleur.\n\nNotre industrie de défense est désormais presque totalement indépendante de nos bienveillants libérateurs, capable de développer des armes pour prendre le contrôle de nos terres, de nos mers et de notre espace aérien. Les discussions autour de notre doctrine militaire sont devenues de plus en plus positives, notre haut commandement et nos académies militaires synthétisant lentement mais sûrement les enseignements de nos patriotes en exil en une doctrine proprement coréenne. Quel que soit l’avenir de l’ANC, nous devons veiller à ce qu’elle devienne une force capable de repousser tous les envahisseurs étrangers et garantir que la Corée reste libre pour les dix mille prochaines années."
 KOR_military_idea_5:9 "État Militaire Coréen : §YAvant-Garde à l'Est§!"
 KOR_military_idea_5_desc:9 "Avec l'effondrement de l'Empire japonais, notre nation doit désormais s'attacher à prévenir toute nouvelle tentative d'asservissement en redynamisant nos forces armées. L'Armée nationale coréenne est aujourd'hui une force respectée dans toute l'Asie de l'Est, capable de résister à toute tentative visant à asservir notre peuple. Le corps des officiers coréens est désormais entièrement purgé des collaborationnistes et des opportunistes, et nos académies militaires regorgent de jeunes enthousiastes prêts à consacrer leur esprit, leur cœur et leur âme à la défense des terres de nos ancêtres. Notre haut commandement est désormais pleinement uni derrière une doctrine véritablement coréenne, s’appuyant sur des décennies d’expérience acquise dans les écoles de toute l’Asie de l’Est, et véritablement engagé à se battre pour notre nation. Quel que soit l’avenir de l’ANC, nous devons veiller à ce qu’elle devienne une force capable de repousser tous les envahisseurs étrangers, et garantir que la Corée reste libre pour les dix mille prochaines années."
 KOR_kaic: "KAIC"
 KOR_kaic_desc:9 "À l'époque du royaume de Joseon, la cour royale employait des inspecteurs secrets chargés de veiller à la loyauté des fonctionnaires envers l'État et d'assurer la sûreté et la sécurité dans tout le pays. Dans l'État coréen renaissant, la sécurité publique et la sûreté gouvernementale sont devenues encore plus cruciales, face à des agents antigouvernementaux et à des agitateurs opportunistes prêts à tirer parti de la moindre faiblesse perçue. Confrontée à des ennemis tant à l'intérieur qu'à l'extérieur, la KAIC défendra l'État contre les éléments perfides qui agissent dans l'ombre."
 KOR_navy:9 "Marine Coréenne Renaissante"
 KOR_navy_desc:9 "La Corée peut se targuer d’une fière tradition de domination des mers, que nous devons nous réapproprier afin d’éviter qu’une autre puissance impérialiste ne nous assujettisse à une nouvelle génération d’asservissement. Nos bienveillants libérateurs ont accepté de nous vendre un certain nombre de croiseurs et de navires de défense côtière pour défendre nos plages, tout en acceptant d’admettre des sous-officiers coréens dans leurs prestigieuses académies navales afin de véritablement perpétuer notre tradition. Feu l’amiral Yi serait fier de ce que nous avons accompli, même s’il reste encore beaucoup à faire avant que la mer de l’Est ne soit véritablement sous notre contrôle."
 KOR_airforce:9 "Nouvelle Armée de l'Air Coréenne"
 KOR_airforce_desc:9 "Bien que nos ancêtres aient longtemps dominé la terre et la mer, le domaine aérien reste sous le contrôle des puissances impérialistes. Si nous voulons être véritablement libres, c’est à nous qu’il revient de corriger ce déséquilibre. Nos bienveillants libérateurs ont accepté de nous vendre un certain nombre d’anciens avions de liaison et de chasse afin de mettre sur pied une armée de l’air coréenne, prête à conquérir les cieux. Il faudra beaucoup de temps avant que nos capacités n’égalisent celles de l’Occident, mais nous devons être prêts à défendre les terres de nos ancêtres sur tous les fronts."
 KOR_office:9 "Bureau Général de Planification"
 KOR_office_desc:9 "N'étant plus soumise à un état-major étranger, conséquence de l'absence d'État, notre armée, en pleine professionnalisation et expansion, a besoin d'un Bureau central de planification générale chargé de coordonner les activités et les mouvements des différentes branches à travers la péninsule. Un Bureau central de planification générale fidèle sera mis en place, en lien direct avec le président, afin d'assurer la coordination entre les branches civile et militaire."
 KOR_bushido:9 "Imiter l'Esprit du Bushido"
 KOR_bushido_desc:9 "Dans le long et difficile processus qui consiste à nous réaffirmer en tant que nation, nous devons mettre l'accent sur une loyauté absolue envers la nation dans tous les aspects de la vie militaire. Il faut considérer le sacrifice de leur sang, de leur cœur et de leur âme sur le champ de bataille non pas comme un combat individuel, mais comme un combat collectif visant à protéger la nation contre ceux qui cherchent à nous forcer à trahir nos valeurs. Nous devons être prêts à consacrer notre corps et notre esprit à une série de codes et de disciplines qui nous distinguent de ceux qui souhaitent à nouveau asservir les terres de nos ancêtres."
 KOR_lightning_war:9 "Mobilité des Forces Armées Coréennes"
 KOR_lightning_war_desc:9 "Pour répondre aux exigences d'un monde en mutation, nous devons nous efforcer d'adapter notre doctrine à une guerre caractérisée par un rythme effréné. Nos généreux libérateurs ont eu la gentillesse de partager leurs connaissances en matière de guerre motorisée et blindée, dans l'espoir que nous puissions, à terme, développer une industrie blindée nationale capable de rivaliser avec celles du Japon, voire de l'Europe. D'ici là, nous nous efforcerons d'intégrer ces changements à nos forces armées actuelles, dans l'espoir d'un avenir meilleur."
 KOR_eliteheer:9 "Eliteheer Coréenne"
 KOR_eliteheer_desc:9 "Avec le déclenchement de la guerre mondiale la plus meurtrière que nous ayons jamais connue, notre état-major a convenu que nous devions suivre l'exemple de nos libérateurs en modernisant nos forces armées afin de faire face à la croissance exponentielle des avancées technologiques dans tous les secteurs de la défense nationale. Nous devons nous inspirer de la Heer allemande et des réformes menées sous le Gouvernement de Beijing pour développer une petite force d'élite mobile, dotée d'équipements modernisés. Même si nous devrons peut-être mettre de côté nos ambitions de rivaliser avec le plan des 80 divisions, notre défense nationale exige la constitution d'une armée d'élite capable de résister à toutes les formes d'agression impérialiste."
 KOR_whampoa_dynamic_modifier:9 "Whampoa Coréenne"
 KOR_whampoa_dynamic_modifier_desc:9 "Même si bon nombre de nos estimés généraux et officiers ont été formés à Whampoa par nos alliés chinois, nous ne devons pas nous permettre de devenir dépendants d’une autre puissance étrangère. Nous avons le devoir envers la mère patrie de construire un nouveau Whampoa à Séoul, afin de former de nouvelles promotions de cadets patriotes bénéficiant à la fois d’une éducation militaire de premier ordre et d’une formation idéologique qui forge, à partir de sentiments patriotiques divers, une conscience fraternelle unifiée, centrée sur la lutte révolutionnaire de leurs ancêtres pour une patrie indépendante."
 KOR_loyalty:0 "Armée Loyale"
 KOR_loyalty_desc:9 "Partout dans le monde, les plus grandes puissances que l'histoire ait jamais connues ont été victimes des ambitions autonomes d'une armée désireuse de subordonner l'État lui-même et son peuple à sa volonté. Si l'ANC est essentielle à la survie de notre nation, nous devons lui rappeler à qui elle doit obéir. Afin de garantir un contrôle civil absolu sur notre nation, l'ANC doit être subordonnée à la volonté de la présidence et de l'Assemblée nationale."
 KOR_final_army_modifier:9 "Terreur de l'Est Modernisée"
 KOR_final_army_modifier_desc:9 "Pendant des siècles et des siècles, le fier royaume de Joseon s'est imposé comme un pilier de la moralité et de la justice dans toute l'Asie. Malheureusement, ce grand État coréen a été envahi par l’Empire japonais naissant, qui allait devenir la terreur de l’Asie. Mais l’histoire allait voir cette monstruosité définitivement vaincue, et la nation coréenne a été à nouveau libérée. Cependant, nous savions qu’il ne fallait pas nous reposer sur nos lauriers, car dans les temps tumultueux que nous vivons, les jours de l’occupation japonaise risquaient de revenir.\n\nLe peuple s’est donc attelé à un projet de grande envergure visant à forger une nouvelle armée puissante qui garantira l’indépendance éternelle de la Corée. Après des années de travail acharné et l’intégration d’idées anciennes et nouvelles, l’armée coréenne s’est imposée comme une force redoutable. Synthèse des avancées militaires japonaises, chinoises, allemandes et russes, les Forces armées coréennes sont devenues la nouvelle terreur de l’Asie au service de la défense de la liberté bénie de la Corée. Hanguk Manse !"

