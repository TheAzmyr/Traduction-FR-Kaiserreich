 HYD_madapati_hanumantha_rao: "Madapati Hanumantha Rao"
 HYD_madapati_hanumantha_rao_sic_desc:9 "§YNaissance :§! §L22 janvier 1885, à Pokkunuru, État d'Hyderabad, Inde§!\n§YCarrière :§! §LRao suivit les traces de son père et de ses oncles lorsqu'il rejoignit, en 1904, le département de l'éducation d'Hyderabad. Travailleur assidu, il changea de voie après 8 ans pour devenir avocat. C'est là qu'il fit ses armes et acquit une réputation très respectable en tant qu'organisateur social, en particulier sous la tyrannie de fer du Nizam. L'un des événements qui le propulsa sur le devant de la scène fut la controverse entourant la Conférence sur les réformes sociales des États du Nizam en 1921. Menée en anglais, en marathi et en ourdou, l'absence du télougou comme langue était déjà controversée. Lorsqu'un participant se vit interdire de présenter une motion en télougou, Rao et d'autres profitèrent de l'indignation pour créer "l'Andra Jana Sangh", une organisation qui a grandement développé la conscience sociopolitique parmi les locuteurs du télougou. Cette même organisation devint plus tard l'Andhra Mahasabha.\n\nEn tant qu'homme occupant la plus haute fonction de son pays, on peut être sûr que l'avenir de celui-ci sera marqué par le dépassement de son passé sombre, marqué par les inégalités sociales. Sa grande popularité auprès du peuple lui assure une position solide et empêche ses adversaires de monter une opposition efficace.§!"
