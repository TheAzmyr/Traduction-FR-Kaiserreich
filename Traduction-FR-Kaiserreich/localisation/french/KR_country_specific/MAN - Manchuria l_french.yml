### Characters ###

 #關向應
 MAN_guan_xiangying:0 "Guan Xiangying"
 MAN_guan_xiangying_bio:9 "Issu d'une famille mandchoue du clan Guerjia, Guan Xiangying fut témoin direct des horreurs de l'impérialisme alors qu'il travaillait d'arrache-pied dans une imprimerie financée par les Japonais. À l'âge de 22 ans, il rejoignit une ligue de jeunesse socialiste sous la tutelle de Li Zhenying et travailla au sein d'une cellule du Kuomintang à Shanghai. En 1925, il partit étudier à Paris, mais revint lors du Mouvement du 30 Mai et aida les forces socialistes lors de l'Expédition du Nord en tant qu'organisateur syndical. Après l'effondrement de l'Armée nationale révolutionnaire, il retourna dans sa province natale du Fengtian avec pour mission d'aider les agents socialistes locaux à mettre en place des cellules de résistance."
 MAN_guan_xiangying_leader_desc:9 "§YNaissance: §!§L10 septembre 1902 à Daguanjia, Jinzhou, district de Shengjing, Grand Qing§!\n§YCarrière :§! §L$MAN_guan_xiangying_bio$\n\nLa libération de la Mandchourie par les forces étrangères a placé Guan dans une situation délicate. Bien qu’il soit d’origine mandchoue, il s’identifie à l’identité chinoise au sens large. Mais les forces d’occupation ont insisté pour que la Mandchourie devienne indépendante et le président Guan a accepté à contrecœur de diriger un nouveau gouvernement avec le Parti socialiste de Mandchourie, récemment fondé.\n\nConfronté à ces circonstances dont il ne voulait pas, Guan s'efforce, non sans malaise, de construire une nouvelle identité mandchoue fondée sur la composition multiethnique de la région et sur leurs nouveaux liens socialistes. De nombreux résistants se sentent trahis par la création d'un État mandchou indépendant, et le nationalisme chinois persiste. En privé, Guan espère qu'une réunification avec la Chine aura lieu et qu'il sera libéré du fardeau de devoir construire une identité artificielle à laquelle il ne croit pas lui-même.§!"
 MAN_guan_xiangying_commander_desc:9 "§YNaissance :§! §L10 septembre 1902, à Daguanjia, Jinzhou, district de Shengjing, Grand Qing§!\n§YAlignement :§! §rLigue des Syndicalistes chinois§!\n§YCarrière :§! §L$MAN_guan_xiangying_bio$§!\n\n§YNotes : Commandant de guérilla de longue date, il a eu quelques difficultés à s'ajuster au commandement régulier, mais il s'est révélé apprendre très vite.§!"

 #趙欣伯
 MAN_zhao_xinbo: "Zhao Xinbo"
 MAN_zhao_xinbo_leader_desc:9 "§YNaissance :§! §L1890 dans le comté de Wanping, province de Zhili, Grand Qing§!\n§YCarrière :§! §LJeune homme issu d'une bannière mandchoue de la Garde impériale, à l'aube du déclin du Grand Qing, Zhao Xinbo s'inscrivit à l'université Beiyang de Tianjin. Alors que les troubles de la Révolution Xinhai s'intensifiaient, il rejoignit la troupe de théâtre Wenming de Beijing en tant qu’actrice, tout en s'engageant au sein de l'organisation révolutionnaire Tongmenghui.\n\nAprès l’échec de la Seconde Révolution, Zhao s'enfuit à Dalian. Il devint professeur de chinois pour des étudiants japonais avant d'être admis en droit à l'université Meiji. Fortement influencé par le Japon, il fut conseiller juridique de Zhang Zuolin après l'obtention de son diplôme. Sous le patronage de Zhang Xueliang, il fonda l'Association de recherche juridique du Nord-Est.\n\nPersonnage mineur et pro-japonais au sein de la Clique du Fengtian, il n'hésita toutefois pas à franchir le pas lorsque les autorités étrangères décidèrent de créer un nouvel État mandchou. Zhao se révéla être un collaborateur zélé, mettant en place le Comité local de maintien de la province du Liaoning, qui publia une déclaration d’indépendance de la Mandchourie.\n\nCelui que l’on surnomme la "Sage-femme de la Mandchourie" a été facilement élu président grâce au soutien d’une "Ligue démocratique de Mandchourie" aux fondements fragiles, mais l’avenir de sa république reste extrêmement précaire, une situation aggravée par ses détournements de fonds habituels. Derrière un vernis de démocratie, destiné à satisfaire les protecteurs étrangers, se cache une oligarchie impopulaire dirigée par un président aux compétences douteuses.\n\nZhao tente de présenter l’identité mandchoue comme une identité commune fondée sur la nature démocratique de la tradition chinoise, en opposition à la prétendue tyrannie qu’il dénonce au sud de la Grande Muraille, mais seul le temps dira si la nation mandchoue de Zhao tiendra le coup, ou si l’histoire rejettera son existence et considérera la Mandchourie comme une tentative avortée de créer une nouvelle nation.§!"

 #富雙英
 MAN_fu_shuangying:0 "Fu Shuangying"
 MAN_fu_shuangying_bio: "Un mandchou ethnique de Mandchourie, Fu Shuangying étudia à l'École de l'Armée du Fengtian avant de passer son diplôme à l'Académie Militaire de Baoding en 1918. Il se retrouva bientôt membre de l'armée du Fengtian, servant comme instructeur là où il avait fait son école primaire. Entraîné comme commandant d'infanterie, il servit dans un régiment dans la 2e Guerre ZhiFeng.\n\nA un moment, ses exploits captèrent l'attention de son commandant Zhang Xueliang. Ne rencontrant pas de succès particulier dans la Quatrième Guerre Zhili-Fengtian, il fut affecté à divers postes dans le domaine de la logistique. A cette fin il servit en tant que directeur du Bureau Minier de Jingxing et également comme officier d'état-major dans le gouvernement du Fengtian."
 MAN_fu_shuangying_notes: "§YNotes : Même si il a des connexions pro-japonaises, Fu n'est membre ni de la clique Shikan ni de l’Association Condordia.§!"
 MAN_fu_shuangying_commander_desc:9 "§YNaissance :§! §L1894, à Liaoyang, district de Shengjing, Grand Qing§!\n§YAlignement :§! §LApolitique§!\n§YCarrière :§! §L$MAN_fu_shuangying_bio$§!\n\n$MAN_fu_shuangying_notes$"
 MAN_fu_shuangying_leader_desc:9 "§YNaissance :§! §L1894, à Liaoyang, district de Shengjing, Grand Qing§!\n§YCarrière :§! §LCommandant mineur d'origine mandchoue de la Clique du Fengtian, Fu Shuangying n'avait rien d'exceptionnel dans l'ordre ancien : diplômé de la prestigieuse académie militaire de Baoding, il a un passé mouvementé sur le champ de bataille et entretient des liens avec les intérêts japonais en Mandchourie. Son absence de liens étroits avec les Zhang ou Tokyo, son éducation militaire et son expérience bureaucratique acquise en administrant le Bureau minier de Jingxing ont finalement joué en sa faveur lorsque les autorités étrangères ont commencé à chercher un candidat pour diriger une Mandchourie indépendante.\n\nLargement considéré comme une figure de proue du pouvoir étranger et jouissant d'une légitimité douteuse, même parmi les Mandchous de souche, Fu a néanmoins assumé son rôle avec brio. Nommé Chef de l'exécutif de Mandchourie, il a concentré son pouvoir dans le Conseil administratif suprême de Mandchourie, travaillant avec les élites locales pour protéger l'autonomie de la région.\n\nIl hérite d’une Mandchourie en ruines, où les investissements japonais ont été retirés, pillés par les occupants étrangers ou détruits au cours des combats. Bien qu’on s’attende à ce qu’il parvienne à s’imposer auprès de l’ancienne élite foncière et bureaucratique, la décision de créer une Mandchourie indépendante a heurté de nombreuses personnes, y compris parmi certains des régionalistes les plus fervents du Dongbei. Les campagnes restent en proie à l’insurrection alors que les travaux de reconstruction commencent.\n\nFu, pour sa part, est ambivalent face au projet de construction d’une nouvelle identité mandchoue, et laisse à ses subordonnés le soin de définir cette nouvelle identité. Son gouvernement a promu une "identité mandchoue" qui ne se définit pas par la descendance des Jurchen ni par le service au sein des bannières Qing, mais qui constitue une nationalité composite forgée à partir d’un mélange éclectique de Hans, de Mongols, de Hui et de Mandchous de souche, qui partagent tous des traditions séculaires que ceux qui vivent au sud de la Grande Muraille n’ont plus.§!"

