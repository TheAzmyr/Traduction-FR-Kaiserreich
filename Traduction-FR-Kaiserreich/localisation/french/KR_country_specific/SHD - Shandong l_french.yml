### Tooltips
 SHD_tianran_can_reclaim_tooltip: "§GLe professeur honoré Zhang Tianran peut commencer à reconquérir les cœurs et les esprits des provinces de la Ligue\n§!"
SHD_two_zhangs_tooltip: "§CCette priorité décidera du sort du Shandong et de son rôle à jouer en Chine§!"

 SHD_xuzhou_garrison: "Recruter dans la garnison de Xuzhou"
 SHD_xuzhou_garrison_desc: "Autour de la ville de Xuzhou, de plus petites forces se joindraient volontiers à notre armée pour le bon prix."

 SHD_qu_will_be_mad: "§RLe gouverneur Qu soutiendra moins les efforts de la monarchie !§!"

### Decisions ###
SHD_riot_policy_decisions: "Troubles civils au Shandong"
 SHD_riot_policy_decisions_desc: "Nous devons faire face aux nombreuses opportunités que l'instabilité politique a engendrées. Ils se cachent dans les montagnes, font des raids dans les villes et insistent sur le fait que notre gouvernance est illégitime."

SHD_end_Yiguandao_riot: "Mettre fin à l'émeute de Yiguandao"
SHD_end_peasant_riot: "Mettre fin à l'émeute des paysans"
 SHD_end_Zongchang_riot:9 "Mettre fin à l'émeute de Zongchang"

 SHD_develop_jiangxi_tungsten_decision: "Développer le tungstène du Jiangxi"
 SHD_develop_fujian_aluminium_decision: "Développer l'aluminium du Fujian"

SHD_create_LSP: "Créer la ligue des six provinces"
 SHD_create_LSP_desc: "Les six provinces peuvent désormais être réorganisées sous la direction d'un seul maréchal, Zhang Zongchang. Après le chaos qui a suivi la mort de Sun, Zhang Zongchang a réorganisé la Ligue et a réuni les six provinces sous son autorité. Son approbation du vice et du militantisme opportuniste est maintenant la politique de facto des six provinces"

SHD_internal_decisions: "L'équilibre du Shandong"
SHD_internal_decisions_desc: "La gouvernance est certainement une extension de la personnalité, et il est essentiel que nous projetions la nôtre à la fois comme une province indépendante et comme un lieu légitime d'investissement en Chine".

SHD_obtain_dockyard_access: "Demande d'assistance navale japonaise"
 SHD_obtain_dockyard_access_desc: "Le meilleur usage de notre dépendance renouvelée envers le Japon en prenant l'avantage de leur marine. Bien que la capacité du Shandong à combattre en haute mer soit limitée, il existe au Japon de nombreux ports civils que nous pouvons louer pour nos besoins"

 SHD_dockyard_count_tt:0 "Cette décision peut être prise jusqu'à §Y3§! fois. (Actuellement §Y[?SHD_dockyard_count]/3§!)"

 SHD_assemble_air_squadron:9 "Assemblez les escadrons aériens volontaires Qing"
 SHD_assemble_air_squadron_desc:9 "Les courageux pilotes chinois du royaume de Qing sont les bienvenus pour utiliser le Jinan afin de s'entraîner au tir contre les impérialistes étrangers."

 SHD_pull_strings_with_qing_industrialists:9 "Location d'usines de Qing"
 SHD_pull_strings_with_qing_industrialists_desc:9 "La nécessité de vaincre enfin les impérialistes étrangers signifie que nous sommes prêts à payer n'importe quel prix afin de recevoir un soutien industriel supplémentaire des Qing."

 SHD_industrialist_count: "Cette décision peut être prise jusqu'à §Y3§! fois. (Actuellement §Y[?SHD_industrialist_count]/3§!)"

SHD_war_intervention_decisions: "Intervenir dans les États chefs de guerre"
SHD_war_intervention_decisions_desc: "Nous devons tirer parti de toute frontière non surveillée si nous voulons atteindre notre objectif ultime. Il faut passer à travers les armées idiotes qui s'opposent à nous et qui empêchent le peuple chinois d'avoir la gouvernance qu'il mérite. Nous verrons bientôt les murs de Nanjing, le port des parfums et nous mangerons des épices du Sichuan".

 SHD_intervene_xuzhou: "Saisir Xuzhou"
 SHD_intervene_xuzhou_desc: "La ville de Xuzhou est l'une des zones les plus développées du Jiangsu et de ses environs, une récompense digne d'intérêt en soi."

SHD_intervene_jiangsu: "Intervenir dans le Jiangsu"
 SHD_intervene_jiangsu_desc: "Le Jiangsu a grand besoin de notre aide, et son peuple souffre sous le talon du Sud. Nous devons consolider leur contrôle sur la province"

 SHD_intervene_southeast: "Intervenir dans [From.GetNameDef]"
 SHD_intervene_southeast_desc: "Le pays entre Taishan et Zijin Shan est en plein chaos. Si nous voulons rencontrer cette grande ville, nous devons frapper maintenant"

SHD_Yantai_Port_Line: "Route maritime Yantai-Port Arthur"
SHD_Yantai_Port_Line_desc: "Le plus grand port que nous contrôlons nous-mêmes, £victory_points §GYantai§! permet des expéditions continues du gouvernement japonais et fengtien".

SHD_Nantong_Port_Line: "Route maritime Nantong-Nagasaki"
SHD_Nantong_Port_Line_desc: "Après Shanghai, probablement le deuxième port le plus important de la mer de Chine orientale et relié à l'intérieur par le rail, £victory_points §GNantong§! est d'une importance vitale pour assurer un approvisionnement régulier en armes".

SHD_Hangzhou_Port_Line: "Route maritime Hangzhou-Nagasaki"
SHD_Hangzhou_Port_Line_desc: "Une grande ville, £victory_points §GHangzhou§! permettrait d'importantes livraisons d'armes japonaises et fengtiennes pour nous soutenir dans notre effort de guerre"

 SHD_intervene_xuzhou_tt:9 "Si vous contrôlez §Y[1047.GetName]§! vous pouvez devenir directement son propriétaire et augmenter $MODIFIER_WAR_SUPPORT_FACTOR$ de 2%."
 SHD_intervene_jiangsu_tt:9 "Si vous contrôlez §Y[598.GetName]§! et §Y[1075.GetName]§!, vous pouvez devenir directement leur propriétaire et augmenter $MODIFIER_WAR_SUPPORT_FACTOR$ de 4%."

SHD_raise_army: "Levée d'une armée"
 SHD_raise_army_desc: "Notre soi-disant armée fait défaut par rapport aux nombreux chefs de guerre que nous espérons affronter. Même si nous n'avons pas d'armée moderne, nous avons la popularité des gens que nous pouvons utiliser à notre avantage. Si la force ne fonctionne pas, le nombre..."

 SHD_raise_division: "Recruter les paysans de [FROM.GetName]"
 SHD_raise_division_desc: "Nous pouvons recruter les paysans de [FROM.GetName] pour aider notre cause."

### Parties ###
SHD_totalist_party: "Ligue des jeunes socialistes"
 SHD_totalist_party_long:9 "Ligue de la Jeunesse Socialiste (Shehui Zhuyi Qingnian Tuan)\n§LIl s'agit du dernier développement de la pensée socialiste, qui n'est vraiment populaire qu'auprès des jeunes du Shandong familiers des ouvrages publiés par le Secrétariat du syndicat pan-pacifique. Composé principalement d'étudiants, ce groupe ne peut prospérer qu'avec l'aide massive de puissances étrangères.§!\n"
SHD_syndicalist_party: "Société de solidarité antijaponaise"
 SHD_syndicalist_party_long:9 "Société de solidarité anti-japonaise (Fanri Tuanjiehui)  \n§LFrange radicale de la mission initiale de Kuomintang dans le Shandong, ce groupe a passé plusieurs années dans la clandestinité à Qingdao en attendant que l'occasion se présente. Influencés par les ouvrages socialistes traduits et publiés par le Secrétariat syndical pan-pacifique, leur organisation ne peut survivre qu'avec le soutien de ces influenceurs étrangers.§!\n"
SHD_radical_socialist_party: "Kuomintang"
 SHD_radical_socialist_party_long:9 "Parti National (Kuomintang)\n§LLes fondations du mouvement de la Chine Nouvelle ayant été posées dans le Shandong, il existe toujours un courant sous-jacent de progressisme et de changement dans le Shangqing. Ces personnes cherchent toutes à se rapprocher du Kuomintang clandestin au sud du fleuve Yangtze.§!\n"
SHD_social_democrat_party: "Parti progressiste"
 SHD_social_democrat_party_long:9 "Parti Progressiste (Jinbudang)\n§LFondé en 1916 par Kang Youwei, le Parti Progressiste s'est développé en grande partie grâce aux dons d'ex-patriotes et dans la marge de l'opportunisme démocratique de la décennie. Lorsque cet opportunisme a été remplacé par la restauration des Qing, plusieurs membres du parti au Shandong ont choisi d'entrer dans la clandestinité.§!\n"
 SHD_social_liberal_party:9 "Société Guiyidao"
 SHD_social_liberal_party_long:9 "Clique de la Recherche (Yanjiuxi)\n§LÉmanation du Parti progressiste de 1916 fondé par Kang Youwei sous le règne de Yuan Shikai, la Clique de la Recherche du Shandong lutte depuis la restauration des Qing pour gagner de l'importance dans le Shandong. Les membres du parti étant peu disposés à faire des compromis avec le climat intellectuel de l'intelligentsia du Shandong, l'adhésion au parti repose principalement sur les dons des expatriés et les appels aux visiteurs occidentaux.§!\n"
SHD_market_liberal_party: "La société de la fleur de dragon sur la voie du paradis"
 SHD_market_liberal_party_long:9 "Société de la Fleur de Dragon de la Voie Céleste (Yixin Tiandao Longhua Hui)\n§LFondée dans le comté de Zouping pour lutter contre la pauvreté excessive dans la région, la Société de la Fleur de Dragon représente une alternative au banditisme qui a attiré tant de personnes au cours de cette décennie. Son fondateur, Ma Shiwei, avait l'intention d'unifier plusieurs écoles différentes de Xiantiandao dans le but commun d'améliorer le bien-être dans le Shandong. La Société de la Fleur de Dragon n'a été reconnue comme parti politique que lorsque les interventionnistes et les observateurs occidentaux ont cherché une alternative au militarisme latent du Yiguandao et aux généreux idéaux sociaux des Guiyidao.§!\n"
 SHD_social_conservative_party:9 "Clique de la recherche"
 SHD_social_conservative_party_long:9 "Société Guiyidao (Guiyidao Hui)\n§LCette organisation a une origine similaire à celle du Yiguandao, mais inclut le christianisme et l'ésotérisme occidental. Leur financement a donc fortement diminué ces dernières années en raison de la nature divisée du Shandong. Ceux qui recherchent le christianisme ont déjà déménagé à Qingdao. Ils ont cependant acquis une solide réputation d’assistance aux pauvres et cela quelle que soit leur origine et leur race.§!\n"
 SHD_authoritarian_democrat_party: "Société de Restauration de la Bienveillance"
 SHD_authoritarian_democrat_party_long:9 "Société de Restauration de la Bienveillance (Guiren Hui)\n§LLes bouleversements du siècle de l'humiliation ne sont qu'une page de plus dans la longue histoire du Shandong. Pour beaucoup de gens au Shandong, l'illumination est le seul moyen d'y échapper, d'autres cherchent à dominer dans leur courte vie. Les traditionalistes autour de Qu Yingguang et du Duc Yansheng s'opposent à tous les changements introduits par les étrangers du siècle dernier. Le commerce secret et ouvert de la drogue de la clique Zongchang est considéré comme un comportement dégénéré par de nombreux habitants du Shandong. Sans parler de l'extravagance et de la grossièreté affichées par Zhang Zongchang lui-même. Pour beaucoup, l'échec des Qing est dû à leur attitude peu enthousiaste à l'égard du Shandong, et non à leur monarchie. L'engagement public de Qu Yingguang envers les Qing trouve un écho dans le sud-est du Shandong, qui souhaite rentrer chez lui, à Weihaiwei et à Qingdao.§!\n"
 SHD_auth_dem_liu_heding_puppet:0 "Clique de Liu"
 SHD_paternal_autocrat_party:9 "Clique de Zongchang"
 SHD_paternal_autocrat_party_long:9 "Clique de Zhang (Zhang Pai)\n§LLa clique de Zhang règne sur une majorité du Shandong depuis le centre commercial intérieur de Jinan. Cela s'étend le long de la voie ferrée du Shandong jusqu'à Weifang et le long de la route principale menant à Yantai. La clique est dirigée par le Général Viande-de-Chien lui-même ainsi que par ses associés qui lui sont fidèles, notamment Zhang Jingyao et Zhang Zizhong. Le véritable pouvoir de Zhang Zongchang réside dans les restes bien armés de l'armée révolutionnaire du Shandong qui patrouillent dans la province. Bien qu'ils adhèrent toujours techniquement à l'interdiction de l'opium, en pratique, Zhang Zongchang utilise le chemin de fer pour s'approvisionner à Qingdao.§!\n"
SHD_national_populist_party: "Société de Yiguandao"
 SHD_national_populist_party_long:9 "Société de la Yiguandao (Yiguandao Hui)\n§LLa Yiguandao est un culte qui faisait à l'origine partie de la Société du Lotus Blanc et qui était pratiqué dans toute la Chine au XIXe siècle. Leurs croyances syncrétiques combinent la structure du ciel du Confucianisme, la variété des dieux du Bouddhisme et les pratiques de prolongation de la vie du Taoïsme. La doctrine Yiguandao a été confiée par le Professeur Lu Zhongjie à son petit groupe pendant la Weltkrieg, et la plupart des convertis ultérieurs apprennent par étapes. Cela permet au noyau dirigeant de disposer de suffisamment d'éléments pour adapter le culte à ses objectifs personnels. Le premier de ce groupe est le Professeur Zhang Tianran, le successeur de Lu Zhongyi. Grâce aux manœuvres politiques de Zhang Tianran, le culte a atteint environ 7 millions d'adhérents dans toute la Chine, et seulement 500 000 membres au sein du Shangqing lui-même.\n\nLes Armées Paysannes de toute la Chine du Nord, en particulier la Société des Grandes Épées et la Société des Lances Rouges, considèrent la Yiguandao comme le gouvernement le plus moralement intègre de Chine.§!\n"
 SHD_pat_aut_liu_heding_puppet:0 "Clique d'Anqing"

### Focus Tree ###
 Shandong_Focus: "Arbre de Priorités du Shandong"

### Political focuses ###
 SHD_two_zhangs_enter:0 "Deux Zhangs entrent"
 SHD_two_zhangs_enter_desc:9 "Des années de tension entre le Yiguandao et Zhang Zongchang ont atteint un point de rupture. Les promesses de Zhang Zongchang de rester sobre se sont fanées, et l'infiltration de Qu Yingguang dans le trafic de drogue a permis de déterrer des preuves précieuses pour le condamner aux yeux du monde. Avec l'arrivée de Lu Zhongjie à Jinan, le Général Viande-de-Chien s'est mis sur la voie de la destruction pour tous les trois à Shandong."

 SHD_announce_revelationary_order:0 "Annoncer l'ordre révélationnaire"
 SHD_announce_revelationary_order_desc:9 "Comme l'ont fait tous les grands professeurs d'histoire chinoise, Zhang Tianran révélera l'ordre revalorisé au public chinois par des sermons publics. Pendant que les seigneurs de la guerre de Chine crieront et briseront leurs hommes, Zhang Tianran dictera calmement l'avenir de la Chine tel qu'il lui sera raconté par l'écriture des esprits. A travers Tianran, Wujimu, Sun Yat-Sen et le Bouddha parlent"

 SHD_destroy_the_drug_trade: "Détruire le Trafic de Drogue"
 SHD_destroy_the_drug_trade_desc:0 "Les générations de douleur dont la Chine sort sont menacées par les graines vicieuses de l'Opium. L'opium n'est pas un médicament mais un poison pour le peuple chinois, et c'est ce à quoi les nobles Boxeurs et Sun Yat-Sen ont voulu mettre fin. Zhang Tianran a établi une liste de trafiquants de drogue connus, et compte sur les citoyens pour les déraciner"

 SHD_back_to_the_basics:0 "Retour à l'essentiel"
 SHD_back_to_the_basics_desc:9 "Toute la bureaucratie de Jinan est pourrie avec une foi aveugle dans les seigneurs de la guerre. Le conseil d'indépendance du Shandong, le bureau du gouverneur de Zongchang et le bureau d'importation corrompu doivent tous être condamnés. A partir de leur échec, les Yiguandao vont mettre en place des directeurs et des enseignants pour superviser la gouvernance civile. "

 SHD_absorb_the_guiyidao: "Absorber le Guiyidao"
 SHD_absorb_the_guiyidao_desc:0 "La capacité innovante du Guiyidao à mettre en relation des hommes pieux de l'extérieur de la Chine avec notre cause de salut est louable. C'est avec un grand regret qu'ils ont abandonné le Shandong pour Beijing et Tianjin. Peu importe. Leurs bureaux sont des lieux privilégiés pour que les dirigeants puissent distribuer des œuvres de charité"

 SHD_benevolence_and_morality:0 "Bienveillance et moralité"
 SHD_benevolence_and_morality_desc:9 "La destruction que Zhang Zongchang a provoquée dans le Shandong est évidente. Le commerce de l'opium et la corruption sont endémiques, infiltrant tous les niveaux de la société, les fonctionnaires du gouvernement n'étant guère plus que des bandits embauchés par Zongchang. Maintenant que Qu Yingguang est revenu au pouvoir dans la province, avec la Société pour la Restauration de la Bienveillance à ses côtés et les fonds du gouvernement central en poche, le Shandong sera débarrassé de ses maux et l'ordre sera rétabli."

 SHD_return_to_the_source:0 "Retour à la source"
 SHD_return_to_the_source_desc:9 "Maintenant que les deux Zhangs ont été éliminés, le Shandong peut revenir à la source de la légitimité en Chine, Beijing. Notre intérêt mutuel de voir la Chine libérée de l'influence étrangère sera réalisé, et les institutions culturelles du Shandong seront préservées. "

 SHD_story_of_a_bastard: "Histoire d'un Bâtard"
 SHD_story_of_a_bastard_desc:9 "Les foules qui se sont moquées lui lorsqu'il est arrivé à Jinan dans un cercueil sont maintenant elles-mêmes dans des boîtes en bois. Le Gouverneur Zhang Zongchang a annoncé à ses soldats qu'ils sont tous des salauds comme lui. Ce sont aussi les plus grands et les plus virils bâtards de Chine. Le destin de Shandong est de surpasser les grands chiens et de garder le Général Viande-de-Chien en vie à tout prix."

 SHD_honoured_teacher_lu_zhongjie: "Honorable Professeur Lu Zhongjie"
 SHD_honoured_teacher_lu_zhongjie_desc:9 "La leçon la plus importante que Zhang Zongchang a tirée de Taishan est que les habitants du Shandong ont afflué vers la religion alors que leur désillusion à son égard s'accroît. Afin de les couper au col, Zongchang a invité la reconnaissante Lu Zhongjie à reprendre son poste de professeur honoré du Yiguandao, et à rester en dehors de la politique"

 SHD_besiege_mount_taishan: "Assiéger le mont Taishan"
 SHD_besiege_mount_taishan_desc:9 "Après le temple des Boxeurs à Dezhou, Sun Dianying a pris goût au décor doré des temples. Les Yiguandao persistent toujours sur Taishan, et Song Dianying a conçu un plan plus prudent consistant à les affamer puis à rançonner tous leurs objets de valeur pour les laisser vivre"

 SHD_bolster_the_drug_trade: "Renforcer le Trafic de Drogue"
 SHD_bolster_the_drug_trade_desc:9 "La menace imminente de la découverte que Yingguang et Tianran tenaient au-dessus de notre tête est terminée. Une fois que nous aurons éliminé les dernières nourrices qui tentent de perturber le commerce de la drogue, nous pourrons jouir de cette liberté que les monarchistes et les philosophes dénigrent"

 SHD_shandong_model_province: "Shandong, Province Modèle"
 SHD_shandong_model_province_desc:0 "L'idée d'une gouvernance modèle n'est pas ce qui a maintenu l'indépendance du Shandong, mais elle pourrait bientôt être le seul argument en faveur de l'autonomie. Les fonctionnaires du Shandong sont employés pour diffuser des évaluations positives de la province, ainsi que pour veiller à ce que les visiteurs étrangers ne s'aventurent pas trop loin des villes."

### Army ###
 SHD_reaffirm_the_northeast_army:0 "Réaffirmer l'armée du Nord-Est"
 SHD_reaffirm_the_northeast_army_desc:0 "L'Armée du Nord-Est a été décampée à Shandong, et la plupart des observateurs ont déclaré qu'elle n'existait plus. Malgré tous nos efforts, les observateurs étrangers ont largement raison. De nombreux vétérans de la force de Fengtian se cachent et doivent être appelés de la réserve pour combattre. Les vieilles bannières du Shandong devraient être sorties pour appeler tous les hommes capables à notre armée"

 SHD_an_army_of_professionals:0 "Une armée de professionnels"
 SHD_an_army_of_professionals_desc:0 "L'expérience passée avec les recrues qui désertaient et la désobéissance indique que nous devrions nous concentrer sur la formation de soldats professionnels. Le fait de devoir puiser dans une sélection de soldats plus mûrs, de leur fournir une formation adéquate et de leur donner des ordres spécifiques de retraite permettra à nos soldats de durer plus longtemps dans une guerre prolongée"

 SHD_replace_outdated_weapons:0 "Remplacer les armes obsolètes"
 SHD_replace_outdated_weapons_desc:0 "Les origines mercenaires de l'armée se manifestent dans leur équipement de qualité inférieure. Si nous voulons nous réformer vers le professionnalisme, il faut donner à nos ingénieurs le temps d'expérimenter de nouvelles conceptions d'armes et de nouveaux achats"

 SHD_train_with_northern_cavalry:0 "S'entraîner avec la cavalerie du Nord"
 SHD_train_with_northern_cavalry_desc:0 "La cavalerie mercenaire qui est venue à Shandong avec Zhang Zongchang attend maintenant son signal pour partir ou pour se battre. Certains d'entre eux ont l'expérience de la recherche de nourriture dans le Nord et de la distanciation des grandes patrouilles. Ces leçons seraient très utiles si elles étaient appliquées à nos plans de bataille"

 SHD_improve_rail_supply_lines: "Améliorer les chaînes d'approvisionnement ferroviaires"
 SHD_improve_rail_supply_lines_desc:9 "Le chemin de fer à travers le Shandong était essentiel pour Zongchang pendant son service à Fengtian. Ses leçons peuvent maintenant être appliquées à de futures campagnes, avec des améliorations supplémentaires. Le fait que certains wagons transportent de la nourriture, et d'autres des pièces de rechange réduira les pannes"

 SHD_an_army_of_fanatics:0 "Une armée de fanatiques"
 SHD_an_army_of_fanatics_desc:0 "L'expérience passée avec des recrues faisant preuve de plus de bravoure que leurs supérieurs et des manœuvres défiant la mort indique que nous devrions nous concentrer sur la formation de soldats fanatiques. Le fait de devoir puiser dans une sélection de soldats plus jeunes, de leur fournir un entraînement adéquat et de leur donner l'ordre précis de ne jamais battre en retraite assurera la victoire rapide de notre soldat"

 SHD_request_weapons_from_followers:0 "Demander des armes aux partisans"
 SHD_request_weapons_from_followers_desc:9 "Le peuple du Shandong construit des armes de défense personnelle depuis des années dans la crainte de Zongchang. Maintenant qu'il est parti, notre administration peut demander à ces patriotes potentiels de faire don de leurs armes au salut national"

 SHD_learn_from_the_chahar_horsemen: "Apprendre des Cavaliers Chahar"
 SHD_learn_from_the_chahar_horsemen_desc:9 "Les cavaliers de Chahar ont joué leur rôle en aidant les pauvres du nord du Shandong à résister aux collecteurs d'impôts de Zongchang. Il est maintenant temps de leur rendre la pareille. Les cavaliers Chahar vivant dans le Shandong ont été graciés de tout acte de banditisme qu'ils auraient pu commettre, et sont employés pour rejoindre l'armée et aider au salut national. "

 SHD_fight_for_the_master:0 "Combattre pour le maître"
 SHD_fight_for_the_master_desc:0 "Les soldats ne répondent plus en masse aux ordres des seigneurs de la guerre. Il faut un chef compétent et éprouvé, un maître, pour faire preuve de courage en ces temps de prudence. Un centre de commandement dirigé par une administration civile et militaire peut garantir que les objectifs peuvent être atteints en utilisant toutes les facultés du Shandong"

 SHD_modernise_officer_portfolios: "Moderniser les Portefeuilles des Agents"
 SHD_modernise_officer_portfolios_desc:0 "La jeune génération de soldats n'a pas la possibilité de fréquenter les académies militaires à l'étranger, en raison de notre manque de légitimité. Nous devons tenir compte de nos options en matière de formation militaire à l'étranger et faire pression dans ce sens"

 SHD_novel_military_projects: "Nouveaux projets militaires"
 SHD_novel_military_projects_desc:0 "Penser en dehors du moule est ce qui a permis au Shandong de préserver son autonomie au cours des décennies passées. Dans le prolongement, nous avons une série de projets militaires exploratoires sur lesquels nous pouvons nous concentrer"

 SHD_modern_military_research: "Recherche militaire moderne"
 SHD_modern_military_research_desc:0 "La jeune génération d'étudiants n'a pas la possibilité de fréquenter les académies militaires à l'étranger, en raison de notre manque de légitimité. Notre administration peut dépenser un certain capital pour rassembler des enseignants de Qingdao et de Tianjin, et assembler un plan de recherche militaire"

### Industry ###
 SHD_revive_shandongs_industry:0 "Revivez l'industrie du Shandong"
 SHD_revive_shandongs_industry_desc:0 "Alors que le Shandong n'était pas sous l'administration inepte de la Ligue des huit, les années précédentes ont vu de nombreuses petites usines fermer leurs portes. L'administration s'est consacrée à l'évaluation des lots d'usines vides en vue d'éventuels prêts pour l'ouverture de nouvelles entreprises dans le Shandong"

 SHD_reopen_mothballed_factories: "Rouvrir les usines mises en veille"
 SHD_reopen_mothballed_factories_desc:0 "La tentative de Zhang Zongchang de jouer le rôle du cartel minier de Shandong contre la compagnie minière de Luda a entraîné la fermeture de plusieurs usines de Shandong lorsque le cartel et les centres de distribution n'ont pas pu se réconcilier. Il est temps de faire avancer la réconciliation et de rouvrir les centres de distribution"

 SHD_repair_the_jinan_qingdao_railway: "Réparer le chemin de fer Jinan-Qingdao"
 SHD_repair_the_jinan_qingdao_railway_desc:0 "La voie ferrée Jinan-Qingdao a été usée par la surutilisation et les mauvaises méthodes de construction lors de la pose des rails dans les années 1910. Une sorte d'arrangement mutuellement bénéfique peut être conclu avec les autorités allemandes, où elles fournissent l'acier pour la réparation de la voie ferrée, et nous fournissons la main-d'œuvre de la corvée"

 SHD_mineral_rights_leases: "Baux de Droits Miniers"
 SHD_mineral_rights_leases_desc:0 "Dans les années qui ont suivi l'arrêt de la production de charbon, de plus en plus de spéculateurs ont révélé des gisements de minerais dans le Shandong. Notre administration est désormais suffisamment compétente pour gérer la location de droits miniers à des sociétés chinoises. Nous pouvons prédire de meilleurs profits et pas d'entourloupettes cette fois-ci"

 SHD_empower_the_shandong_mining_cartel:0 "Donner du pouvoir au cartel minier de Shandong"
 SHD_empower_the_shandong_mining_cartel_desc:0 "Le cartel minier du Shandong a été créé en 1928 avec l'aval secret de Zhang Zongchang. Leur but est d'organiser la main-d'œuvre chinoise pour s'assurer que les entreprises étrangères ne bénéficient pas d'un avantage de coût par rapport à la concurrence nationale. Ce but, s'il est atteint en secret avec l'aide de notre administration, peut enrichir tout le monde, sauf les étrangers"

 SHD_shandong_university: "Université du Shandong"
 SHD_shandong_university_desc:0 "L'université de Shandong est fermée depuis la fin de la Weltkrieg, étant restée dans le Qingdao allemand. Dans ce vide, il n'y a que l'université agricole du Shandong à Tai'an, qui est mal adaptée à la science militaire. L'administration a conclu un accord avec Qingdao pour permettre aux étudiants du Shandong de fréquenter l'Université du Shandong tant que nous la rouvrirons"

 SHD_improve_roads_to_beijing:0 "Améliorer les routes pour le bipeur"
 SHD_improve_roads_to_beijing_desc:9 "Les routes vers Beijing se sont révélées plus utiles alors que la baie de Bohai est disputée entre Qing et Fengtian. Surtout que la zone de libre-échange de Tianjin attire le commerce. La route vers Beijing à l'intérieur du Shandong est maintenant en réparation sous la supervision de notre administration"

 SHD_court_northern_elites: "Cour des Élites du Nord"
 SHD_court_northern_elites_desc: "Le gouvernement de Beijing expulse des résidents qui, par ailleurs, se sentent bien pour des raisons politiques insignifiantes, et leur perte est notre aubaine. L'administration nous a autorisé à embellir plusieurs domaines autour du Shandong et à proposer aux élites du Nord d'y résider. Cela améliorera nos revendications d’autonomie ou, dans le pire des cas, constituera de bons otages."

 SHD_purchase_factories_in_tianjin:0 "Acheter des usines à Tianjin"
 SHD_purchase_factories_in_tianjin_desc:0 "Les récentes turbulences économiques dans le monde entier ont rendu l'immobilier assez abordable à Tianjin. Il est dans l'intérêt de l'administration d'acheter une partie des usines de Tianjin frappées par l'argent pour notre industrie militaire. Cet emplacement nous permettra également de mieux évaluer la situation de la Chine grâce à un port neutre"

### Reclaiming Industry ###
 SHD_reclaim_despoiled_industry:0 "Récupérer l'industrie spoliée"
 SHD_reclaim_despoiled_industry_desc:0 "Après des années de mépris non systématique de la part des gouverneurs zhili, [SHD.GetLeader] est arrivé avec la promesse de revigorer les provinces du sud. Cette promesse initiale s'est accompagnée d'une prime pour les gouverneurs s'ils devaient faire défection à ce nouveau système."

 SHD_victory_in_the_south:0 "Victoire dans le Sud"
 SHD_victory_in_the_south_desc:0 "Les vastes étendues en ruines de la vallée du Yangtsé étant désormais ouvertes à [SHD.GetLeader], il est temps d'entendre les besoins des millions de réfugiés dont les maisons sont désormais à portée de main. Ces citoyens reconnaissants seront facilement mis à contribution pour aider à l'industrialisation de la région en vue de notre objectif de défense nationale"

 SHD_develop_the_coastline:0 "Développer le littoral"
 SHD_develop_the_coastline_desc:0 "Le littoral de la région du nord du Yangtsé est devenu un champ de mines d'intérêts concurrents, même après la levée de l'AOG. Il faudra les plus grands efforts de notre administration pour rétablir efficacement le trafic maritime, mais la récompense sera grande"

 SHD_develop_anqing:0 "Développer Anqing"
 SHD_develop_anqing_desc:0 "Anqing, la capitale de la plus ancienne des cliques du haut Yangtsé, a été trop longtemps malmenée par ses intendants. Il est temps que les habitants d'Anqing et d'Anhui puissent bénéficier des opportunités économiques que leurs dirigeants narcissiques leur ont refusées"

 SHD_renovate_nanjing: "Rénover Nanjing"
 SHD_renovate_nanjing_desc:9 "La vieille ville fortifiée de Nanjing a résisté à des siècles d'occupation, mais elle est aujourd'hui enfin en sécurité. Notre administration acceptera volontiers des dons en échange d'une main-d'œuvre pour reconstruire la ville. "

 SHD_complete_the_jinan_nanjing_railway: "Achever le chemin de fer Jinan-Nanjing"
 SHD_complete_the_jinan_nanjing_railway_desc:0 "Lorsque les millions de personnes ont poussé et se sont bousculées sur les routes de terre du Jiangsu au Shandong, elles ont déploré l'absence de voie ferrée. Avec les dangers de voyager par la côte toujours présents, et suffisamment de capitaux des provinces nouvellement libérées, nous devrions être en mesure d'accélérer la mise en place d'une ligne de chemin de fer à petit écartement entre ces villes"

 SHD_dayu_tungsten_mines:0 "Mines de tungstène de Dayu"
 SHD_dayu_tungsten_mines_desc:0 "On sait depuis longtemps qu'il y a de grandes quantités de tungstène à Dayu, qui est situé près de Ganzhou à Gannan, dans le Jiangxi. Cependant, il y a peu d'infrastructures pour extraire réellement ces ressources. Nous devrions travailler à l'amélioration de la région afin que le tungstène puisse être extrait et exporté."

 SHD_connect_fujians_communities: "Connecter les communautés du Fujian"
 SHD_connect_fujians_communities_desc:0 "Le Fujian abrite de nombreux réfugiés et une communauté traditionnelle qui n'apprécie pas les occupants. Nous espérons que notre administration sera en mesure de gagner leur loyauté grâce à des projets de travail dans leur province."

 SHD_rebuild_northern_zhejiang: "Reconstruire le nord du Zhejiang"
 SHD_rebuild_northern_zhejiang_desc:0 "Le Zhejiang du Nord a été partiellement détruit pendant la rébellion de Taiping, un événement dont aucun dirigeant en Chine ne souhaite porter la responsabilité. Jusqu'à l'arrivée de notre administration, c'est-à-dire. La population du Zhejiang du Nord, avec quelques condoléances et des travaux d'infrastructure, pourrait très bien se joindre à notre cause et se réjouir de nos futures victoires"

### Navy ###
 SHD_rebuild_the_beiyang_fleet: "Reconstruire la flotte Beiyang"
 SHD_rebuild_the_beiyang_fleet_desc:9 "Le Shandong abritait autrefois la Flotte de Beiyang, la fierté de l'ancien Grand Qing. Bien que les Allemands nous aient réduits à des ports de moindre capacité, nous y retournerons. La flotte qui possédait la mer de Bohai vivra à nouveau, et le Shandong sera à l'avant"

 SHD_steal_japanese_designs: "Voler des plans japonais"
 SHD_steal_japanese_designs_desc: "Notre administration a identifié un groupe de personnes affiliées au sein de l'IJN qui sont prêtes à divulguer les modèles utilisés pour construire certains de leurs plus petits navires... moyennant un certain prix."

 SHD_modernise_naval_bases: "Moderniser les bases navales"
 SHD_modernise_naval_bases_desc:0 "La base navale de Yantai n'est pas suffisante pour approvisionner nos soldats s'ils perdent la connexion terrestre avec le Shandong. Une base navale plus importante peut être nécessaire, et il est dans la capacité de cette administration d'acquérir une telle base navale"

 SHD_purchase_convoys: "Acheter des convois"
 SHD_purchase_convoys_desc:0 "Si nous voulons tirer le commerce de la mer de Bohai, qui est un lieu de conflit, et survivre aux sous-marins, nous devons investir dans plus de convois. Il est plus prudent de les acquérir d'occasion auprès de vieux navires marchands"

 SHD_obtain_submarine_designs: "Obtenir des plans de sous-marins"
 SHD_obtain_submarine_designs_desc:0 "Si nous voulons arracher le contrôle de la mer de Bohai à nos rivaux, nous devons déjouer leur puissance de feu supérieure en mer. La solution est un programme secret de sous-marins. Les bénéfices potentiels si nous sommes capables de déloger cette mer dépassent le coût du développement"

 SHD_incorporate_qingdao:9 "Incorporer Qingdao"
 SHD_incorporate_qingdao_desc:0 "Il est temps pour nous d'assumer le véritable foyer de la flotte Beiyang, Qingdao. Notre grand retour précipitera la revitalisation de l'industrie navale chinoise dans le Shandong."

### Air Force ###
 SHD_create_an_air_force:0 "Créer une Force Aérienne"
 SHD_create_an_air_force_desc:0 "Avec les mers en difficulté, il est temps de penser latéralement. Nous ne pouvons pas utiliser la puissance aérienne tant que Jinan n'aura pas un aéroport adéquat pour décoller"

 SHD_experimental_fighters: "Chasseurs Expérimentaux"
 SHD_experimental_fighters_desc:0 "Avec des coûts aussi élevés pour développer des avions de chasse, nos techniciens ont consacré leurs efforts à réduire les coûts et à sacrifier la sécurité au nom de la mise en service du plus grand nombre d'avions possible. Nous pourrons projeter notre puissance beaucoup plus loin une fois que nous aurons acquis une certaine expérience de vol"

 SHD_train_fighter_pilots:0 "Former les pilotes de chasse"
 SHD_train_fighter_pilots_desc:0 "Les jeunes hommes courageux du Shandong sont prêts à prendre leur envol. Le peuple reconnaissant du Shandong appréciera de se sentir en sécurité avec nos garçons dans le ciel"

 SHD_expand_the_jinan_airstrip: "Agrandir la piste d'atterrissage de Jinan"
 SHD_expand_the_jinan_airstrip_desc:9 "La piste d'atterrissage de Jinan n'est pas suffisante pour accueillir le nombre de vols prévus par notre armée dans les années à venir, au fur et à mesure que nous développons notre capacité militaro-industrielle. Nous avons prévu un aéroport plus grand à mesure que nous développons notre industrie aéronautique afin d'aller plus loin dans nos mesures audacieuses et de surpasser les autres seigneurs de la guerre."

 SHD_planes_over_the_bohai_sea:0 "Avions au-dessus de Bohai"
 SHD_planes_over_the_bohai_sea_desc:0 "Pouvoir projeter une puissance sur la mer de Bohai nous permettra d'aider la marine à sécuriser la mer de nos rivaux. Des avions navals spécialement conçus seront également capables de traiter des cibles en mer bien mieux que des cibles terrestres"

 SHD_airspace_protection: "Protection de l'espace aérien"
 SHD_airspace_protection_desc: "Escorter nos chasseurs et notre infanterie est une tendance croissante dans les actualités des guerres à l’étranger. Cela vaut peut-être la peine d’investir dans des défenses anti-aériennes pour compléter notre armée."

 SHD_bomber_aircraft:0 "Bombardiers"
 SHD_bomber_aircraft_desc:0 "Le rêve de pouvoir intimider les seigneurs de la guerre avec des avions de combat est en train de se réaliser. Les bombardiers, avec une tutelle industrielle suffisante, peuvent facilement anéantir la capacité de l'ennemi à financer ses guerres"

### Bookmark ###
 SHD_KR_gathering_storm_desc: "Le souverain du Shandong, Zhang Zongchang, n'est précédé que par son train blindé et une réputation monstrueuse. Le 'Général Viande-de-Chien' est connu pour sa violence, son vice et sa corruption, et sous sa férule, la capitale de Jinan n'a cessé d'être à l'image de son maître.\n\nCependant, du haut du Mont Tai, l'insaisissable patriarche Zhang Tianran évite la dépravation. Il espère au contraire faire reculer la Chine de plus d'un siècle et guider le pays dans les bras de sa captivante foi Yiguandao. L'affrontement entre ces forces contradictoires pourrait changer la Chine à jamais..."

### Intro Screen ###
 SHD_country_intro_background:9 "GFX_SHD_intro"
 SHD_country_intro_header:0 "1936 ; Tournant dans le Shandong"
 SHD_country_intro_content:9 "La province de §PShandong§! a été amputée de ses terres les plus précieuses par les §mÉtats des Légations§! et l'§mAllemagne§!. Le port de §aQingdao§!, autrefois dévasté par la guerre entre le §jJapon§! et l'§mAllemagne§!, sert désormais de port important à la fois pour la §gMarine Impériale Allemande§! et pour le commerce civil des entreprises qui composent l'§aAufsichtsrat§!. Cette situation a fait de §aJinan§! la maison parfaite pour le véritable pouvoir du §PShandong§!. §PZhang Zongchang§!.\n\n§PZhang§! est arrivé au §PShandong§! en 1911, apparemment pour diriger l'§PArmée Révolutionnaire du Shandong§!, mais il a rapidement fait du §mjeu§! et de la §aprostitution§! sa principale activité. §aJinan§! s'est développée comme le §PGénéral Viande-de-Chien§! ; sale, rentable, et moins défendue que prévu initialement. Au sommet des 6 600 marches de §nTai Shan§! se trouve le quartier général du §nYiguandao§!. Le mystérieux et apparemment saint §nZhang Tianran§! en a fait l'endroit le plus sûr et le plus moral du §PShandong§!. En 1936, les citoyens du §PShandong§! ont été coincés entre des routes déconnectées et pauvres entre §aJinan§! et §aWeihaiwei§!. Le salut se trouve dans la ville voisine de §aJinan§! ou au sommet du §nMont Tai§!."

 SHD_guide:9 "§MClique de Zhang§! ($paternal_autocrat_coloured$)\n£white_dot Lorsqu'un espion de Qu Yingguang est capturé, choisissez de bloquer les routes.\n£white_dot Lorsque le Mont Tai est outragé par Zhang Zongchang, attendez les lettres désespérées de Zhang Tianran.\n\n§MSociété Yiguandao§! ($national_populist_coloured$)\n£white_dot Lorsqu'un espion de Qu Yingguang est capturé, choisissez de bloquer les routes.\n£white_dot Lorsque le Mont Tai est outragé par Zhang Zongchang, confrontez les ascètes.\n\n§MSociété de Restauration de la Bienveillance§! ($authoritarian_democrat_coloured$)\n£white_dot Lorsqu'un espion de Qu Yingguang est capturé, envoyez des hommes à la maison de Qu Yingguang."

### Events ###

### Political Events###
 shandong_events.2.t:0 "Lu Zhongjie arrive à Jinan"
 shandong_events.2.d:0 "Ce jour apporte à Zongchang une nouvelle occasion d'humilier le vieil homme de la montagne, Zhang Tianran. Afin d'établir son petit culte sur la colline, Tianran a dû expulser la soeur de son ancien maître, Lu Zhongyi. La soeur, Lu Zhongjie, est devenue une réfutation assez concise des nombreux adeptes du Yiguandao auxquels Zongchang a dû faire face ces derniers mois. C'est pourquoi elle doit retourner au Shandong, ne serait-ce que pour plaisanter. Afin de renforcer la valeur de choc, Zongchang a amené sa vieille mère à cette cérémonie d'accueil, qui s'est transformée du groupe prévu en une foule importante. Zongchang, dans une tentative de renforcer l'humiliation que Tianran devrait ressentir, a offert un bouquet à la vieille Lu Zhongjie et une salve traditionnelle de 21 coups de feu a été tirée dans un immeuble voisin pour célébrer l'arrivée de Lu Zhongjie"
 shandong_events.2.a:0 "Les balles doivent aller quelque part"

 shandong_events.970.t:0 "Les festivités de Zongchang s'achèvent à Jinan"
 shandong_events.970.d:0 "Après cette explosion de joie et de violence, Zongchang a déposé sa mère chez Lu Zhongjie et a décidé de passer une nuit en ville. Zongchang s'arrête de temps en temps pour distribuer du "Minsheng" aux réfugiés du Jiangsu. Ce jour-là, les manifestants de Yiguandao se sont également rencontrés dans les bureaux de Zongchang. Leurs promesses vides quotidiennes ont été remplacées par l'indignation suscitée par le retour de Lu Zhongjie au Shandong. Avant que Zongchang ne tente de les frapper avec sa voiture, ils ont prétendu que Tianran arriverait pour juger l'âme même de Zongchang. La seule chose qui a aigri la soirée a été de découvrir que le dealer d'opium de Zongchang se cache toujours. Cela est sans doute dû à l'interception de Ren Ci qui a déjoué par le passé des soirées autrement amusantes à Jinan avec leur moralité. L'aventure s'est terminée par une visite au bordel préféré de Zongchang, où plusieurs femmes ont rejoint son entourage sur le chemin du retour ce soir-là pour se droguer. Alors que la journée touche à sa fin, une de ces femmes a disparu avec de l'opium, Zongchang demande à ses officiers de ne pas la poursuivre, car il y a encore plein de femmes et de capsules d'opium pour la nuit"
 shandong_events.970.a:0 "Sa perte alors"

 shandong_events.3.t:0 "Un espion pour Yingguang est capturé"
 shandong_events.3.d:0 "Après une nuit de drogues dures et de femmes douces à Jinan, Zongchang se délectait de lui-même le lendemain matin quand il a vu un étranger dans son jardin. Alertant ses femmes, puis ses gardes, Zongchang a appréhendé l'intrus. Après que Sun Dianying ait eu des mots particuliers avec l'homme, il a été révélé qu'il était un allié de Qu Yingguang, et qu'il était venu après qu'une travailleuse du sexe l'ait alerté de la présence de drogues sur la propriété. Dianying pense que cet intrus est l'avant-garde d'une rébellion que Yingguang prépare à partir de Qufu. Une crainte que Dianying entretient depuis plusieurs mois, depuis que ses revenus fiscaux ont été coupés par la milice de Yingguang. Le commandant Junnosuke Date, quant à lui, insiste auprès de Zongchang, qui a la gueule de bois, sur le fait que Yingguang prévoit plutôt d'alerter les Qing. Junnosuke insiste pour que leurs forces soient détournées vers Dezhou pour empêcher Yingguang de s'échapper. A peine capable de se souvenir de la nuit précédente, Zongchang décide de..."
 shandong_events.3.a:0 "Bloquez les routes, Yingguang doit partir"
 shandong_events.3.b:0 "Envoyez des hommes chez Yingguang"

 shandong_events.971.t:0 "Junnosuke Date attaque Yingguang à Dezhou"
 shandong_events.971.d:0 "Les forces de Junnosuke Date sont arrivées à Dezhou sous le coup d'une forte répulsion publique, plus forte que d'habitude. Il était immédiatement évident que la ville avait été livrée aux Ren Ci et aux Yingguang. Junnosuke a envoyé sa cavalerie à Dezhou pour rechercher Yingguang, avec la perspective menaçante et dangereuse d'un éventuel raid dans le royaume Qing. Yingguang a été retrouvé près du temple Haido Jinshan, en train de rendre hommage à ses ancêtres. Les soldats de Junnosuke s'emparèrent de Yingguang, et une escarmouche commença entre ses miliciens Ren Ci et la cavalerie. Heureusement, Junnosuke a apporté suffisamment de puissance de feu pour éliminer la milice et Yingguang dans le processus. Malheureusement, l'abondance de témoins à Dezhou a nécessité beaucoup plus de combats pour les faire taire. À la fin de la bataille, le temple Haido Jinshan était en flammes, et Junnosuke se retirait en direction de Jinan en faisant de son mieux pour trouver un alibi."
 shandong_events.971.a:0 "C'était un temple de boxeurs, personne ne s'en souciera"

 shandong_events.972.t:0 "Sun Dianying ne trouve pas Yingguang à Qufu"
 shandong_events.972.d:0 "Les soldats envoyés à Qufu trouvèrent ce qu'ils voulaient, mais pas ce dont ils avaient besoin. Après que Dianying ait proféré des menaces de violence et que plusieurs quartiers aient été brûlés, les occupants de Qufu ont fui tandis que Dianying se mettait à la recherche de Yingguang. Bien qu'il y ait de nombreuses preuves que les Ren Ci ont utilisé le manoir, ni Yingguang ni le duc Yansheng n'ont été trouvés. Zongchang attendit plusieurs jours une réponse de Dianying, et reçut les plus humbles excuses de Dianying et des cadeaux du manoir de Confcuian. Ces cadeaux n'ont guère apaisé la colère de Zongchang, qui est immédiatement parti avec la cavalerie japonaise vers Dezhou, furieux que le conseil de Junnosuke n'ait pas été suivi. À son arrivée à Dezhou, Zongchang n'a pas trouvé Yingguang, ni même de preuves de sa présence. Face à la dangereuse perspective d'envoyer un raid dans le royaume Qing sur l'intuition de Junnosuke Date, Zongchang décida que l'enquête était terminée, et retourna à Jinan pour continuer sa campagne de harcèlement sur le Yiguandao."
 shandong_events.972.a:0 "Au moins, j'en ai tiré quelques cadeaux"

 shandong_events.4.t:0 "Zongchang envoie un alibi aux Qing"
 shandong_events.4.d:0 "Plusieurs livres de poésie et un commentaire sur les classiques se sont avérés très utiles pour Zongchang en ce moment. Des lettres qui contenaient autrefois des fautes d'orthographe embarrassantes et un mauvais ordre des traits sont maintenant affinées dans un alibi en or que Zongchang a envoyé au gouvernement Qing. Cet alibi vise à répondre à la question de savoir ce qui a provoqué une telle panique à Dezhou récemment, et pourquoi cette question ne devrait pas déranger le moins du monde Puyi ou Wu Peifu. La lettre brosse le tableau d'une province remplie de bandits et d'escrocs. Cet environnement, explique la lettre, conduit à des rumeurs infondées de décadence morale dans le Shandong, ce qui est certainement une exagération de la part d'escrocs comme Zhang Tianran. De plus, la lettre ajoute que Zongchang a trouvé et éliminé une cellule de résistants du KMT dans le Shandong, et qu'il n'y a aucune raison de s'inquiéter des traîtres à l'empereur, quoi qu'ils puissent prétendre"
 shandong_events.4.a:0 "Rien à voir ici, circulez"

 shandong_events.5.t:0 "Les magistrats de Qing arrêtent Zongchang"
 shandong_events.5.d:0 "Sun Dianying était un imbécile. Pendant qu'il brûlait et pillait le manoir de Yingguang, l'homme lui-même était déjà à mi-chemin de Beijing. Malgré les excuses de Dianying et ses efforts pour découvrir les comploteurs au Shandong, cela laissait Jinan vulnérable à un grand contingent d'infanterie Qing qui entrait dans Jinan. Pire encore, Zongchang n'avait aucun moyen de savoir que les soldats Qing étaient là pour l'arrêter. Une lettre écrite par Zongchang depuis la prison à l'Empereur lui demandant d'autoriser les visites familiales a été rejetée. Zongchang a maintenant une quatrième inconnue, celle de savoir quand il sera libéré de prison pour ses nombreux crimes. L'autre jour, l'un des nombreux enfants de Zongchang a approché Qu Yingguang, lui demandant si son père survivra à son emprisonnement."
 shandong_events.5.a:0 "Ton père s'en sortira bien en prison"

 shandong_events.6.t:0 "Le Mont Tai en colère à Zongchang"
 shandong_events.6.d:0 "Il n'a pas fallu longtemps au professeur Tianran pour découvrir Lu Zhongjie. La première réaction a été de demander à revenir au Mont Tai pour un traitement plus approfondi de sa longue maladie. Ces lettres ont été ignorées par Zongchang, qui souhaitait ennuyer davantage le professeur sur la montagne et l'humilier en les lisant publiquement. Finalement, la dernière lettre délivrée aujourd'hui a pris un ton beaucoup plus sombre. La lettre s'adressait aux habitants de Jinan et accusait Zongchang de faire entrer clandestinement de l'opium en Chine, de trahir les Chinois pour des partenaires de jeu occidentaux et de tenter de prendre Lu Zhongjie pour épouse. Tianran a mis Zongchang au défi de venir au Mont Tai pour recevoir son jugement éternel, sinon les habitants du Shandong vont dépérir et mourir pour punir leur chef. Sun Dianying recommande de contrôler et de purifier le Mont Tai de ses habitants, tandis qu'un autre commandant, Zhang Jingyao, recommande d'attendre le départ du professeur"
 shandong_events.6.a:0 "Venez, confrontons ces ascètes"
 shandong_events.6.b:0 "J'attendrai ses lettres désespérées"

 shandong_events.7.t:0 "Tianran prononce le jugement sur Zongchang"
 shandong_events.7.d:0 "Le contigent de Zongchang arrive aux portes du Dai Miao, déjà les semelles fatiguées des 6600 marches. Dianying leur suggère de cacher leurs armes et d'ouvrir le feu quand on les laisse entrer. Alors que Zongchang passait sous la porte de Zhengyang, il fut mortellement touché par un tireur d'élite du haut de la porte. Dianying a tenté de charger la cour avec tous les hommes qu'il avait, mais Jingyao s'était enfui avec les soldats qui gardaient ses arrières. Dianying a également été tué par balle, et on ignore où se trouve actuellement Zhang Jingyao. Le professeur honoré Zhang Tianran a été reçu à Jinan avec une célébration du Nouvel An en avance, et a lu sa dernière lettre à Zongchang à une foule enthousiaste"
 shandong_events.7.a:0 "Je déclare que c'est le jour des lettres rouges !"

 shandong_events.8.t:0 "Zongchang sauve Jinan du raid de Yiguandao"
 shandong_events.8.d:0 "Les semaines qui ont suivi à Jinan ont montré le chemin parcouru par l'influence de Tianran. Des membres du public ont défiguré le bureau de Zongchang, et plusieurs anciens amis ont écrit à Zongchang pour lui demander de se prosterner devant le Yiguandao. En retour, Zongchang a dit à ses commandants de surveiller les murs de Jinan, d'extorquer et de fouiller tous les membres suspects du Yiguandao qu'ils rencontreraient, et de lui livrer tout ce qui est suspect. Plusieurs des articles confisqués comprenaient du poison étiqueté comme médicament, des armes légères et des malédictions contre Zongchang. Aujourd'hui, Zongchang livrait une autre lecture de la lettre de Tianran, ainsi qu'une thèse sur les maux des Yiguandao, lorsqu'une foule d'entre eux est entrée dans la ville. Les soldats de Zongchang ont rapidement engagé le combat contre les sectaires qui portaient des armes, et la cavalerie japonaise a chassé les autres. Tianran, alors qu'il tentait de cacher sa tête brillante, fut capturé et abattu par la cavalerie"
 shandong_events.8.a:0 "Enfin le public voit ma vérité"

### Focus tree related events ###
 shandong_events.9.t:0 "Yiguandao et l'émeute des paysans"
 shandong_events.9.d:0 "Après la nouvelle du meurtre de Zhang Tianran lors de l'attaque de Jinan, des milliers de personnes en deuil sont descendues dans la ville pour chercher la dépouille de l'enseignant honoré. Lorsque la rumeur s'est répandue que Zhang Tianran ainsi que tous les combattants de Yiguandao avaient été enterrés de façon déshonorante dans une fosse commune, la panique s'est répandue dans tout le Shandong. Les derniers Yiguandao du Shandong ont commencé à attaquer agressivement les policiers et les propriétaires terriens dans toute la province. Les habitants, craignant à la fois le fanatique et la clique Zongchang désormais démonisée, ont commencé à se protéger du monde extérieur. Ils ne répondront à aucune autorité gouvernementale et doivent être traités"
 shandong_events.9.a:0 "Tuez deux hommes chauves et tout le monde devient fou !"

 shandong_events.1000.t:0 "Une Frappe contre Nanjing"
 shandong_events.1000.d:0 "La mort de Sun a plongé l’est de la Chine dans le chaos. Les incendies, les pillages et le banditisme sont devenus la norme dans toute la région, mais cela constitue en même temps une opportunité en or. L'hégémonie du Zhili est terminée, un vide de pouvoir se creuse rapidement en Chine, et si nous pouvons saisir notre chance et prendre le contrôle de Nanjing, nous serons assurés de jouer un rôle majeur dans les luttes à venir pour l'avenir de la Chine. Des conseillers de haut niveau nous ont conseillé de marcher vers le sud, en direction de l'ancienne capitale, et d'assurer notre place parmi les grands acteurs chinois."
 shandong_events.1000.a:0 "Nanjing sera à nous !"
 shandong_events.1000.b:0 "Nous devrions attendre et voir..."

 shandong_events.11.t:0 "Projets militaires dans le Shandong"
 shandong_events.11.d:0 "Il devient déjà évident que l'armée du Shandong est en retard sur son temps. Bien que nous ayons consacré nos efforts à essayer d'élever le niveau de nos équipements militaires, nous n'avons pas osé nous aventurer en dehors de ce que nous pouvons acheter. Le commandement de l'armée a convaincu [SHD.GetLeader] d'investir des ressources dans des projets récemment réalisés par un habitant tchèque du Shandong, Hanchtedelay. Hanchtedelay a l'ambition de transformer plusieurs Studebaker qu'il possède en chars d'assaut. Un deuxième projet consiste à acheter des vélos Flying Pigeon à Tianjin et à former une division pour les utiliser. Un troisième plan proposé par un professeur de l'université de Jinan est d'acheter du matériel d'escalade et de concentrer les efforts culinaires pour permettre aux soldats de survivre dans les nombreuses chaînes de montagnes chinoises"
 shandong_events.11.a:0 "Construire un char d'assaut"
 shandong_events.11.b:0 "Développer des unités cyclistes"
 shandong_events.11.c:0 "Former des troupes de montagnes"

 shandong_events.12.t:0 "Enquêter sur les cargaisons manquantes"
 shandong_events.12.d:0 "Depuis quelques mois, le commerce vital est perturbé le long de la ligne ferroviaire Qingdao-Jinan. Une enquête de police en cours a seulement déterminé qu'il ne s'agit pas des employés de la ligne, aucune autre possibilité n'a encore été écartée. [SHD.GetLeader] a été appelé à surprendre l'enquête avant qu'elle ne devienne un scandale majeur à Jinan. La police, toujours prudente vis-à-vis des gardes-frontières chinois en dehors de Qingdao, a suggéré que nous enquêtions d'abord sur les stations de relais ferroviaires. [SHD.GetLeader], d'autre part, soupçonne que les objets sont volés le long des étendues désertes de la campagne entre Qingdao et Jinan. Sur quoi devrions-nous enquêter en premier ?"
 shandong_events.12.a:0 "Enquêtez sur le chemin de fer"
 shandong_events.12.b:0 "Enquêter sur la frontière"

 shandong_events.13.t:0 "Preuve de banditisme sur le chemin de fer ?"
 shandong_events.13.d:0 "[SHD.GetLeader] a eu raison. La police envoyée pour inspecter les tronçons les plus déserts du chemin de fer a trouvé des constructions de soutènement cachées sous des broussailles. Ces constructions semblent être un coussin et des sangles à bagages. Il ne fait aucun doute que ceux qui ont volé les voies ferrées ont jeté leur butin hors du train, où il est déplacé vers un deuxième endroit. Le chef de la police insiste sur le fait que les bandits doivent être responsables, et demande du renfort afin de sonder les tanières de l'est du Shandong pour trouver leur cachette"
 shandong_events.13.a:0 "Oui, prenez ces hommes"

 shandong_events.14.t:0 "Preuves de corruption aux postes frontières"
 shandong_events.14.d:0 "La police avait raison, le poste frontière était certainement suspect. Lors de la première inspection, la petite cabane qui abrite les gardes-frontières pouvait à peine accueillir cinq occupants. Cependant, en inspectant le sol de la cabane, une grande alcôve vide a été découverte. Comme il n'y a pas d'utilité logique à un espace vide aussi grand sous la cabane, le chef de la police a décidé d'arrêter les gardes-frontières présents. Bien qu'il y ait un certain risque que cela provoque la colère de nos vendeurs à Qingdao, la loi et la justice sont de notre côté"
 shandong_events.14.a:0 "Interroger les gardes du poste"

 shandong_events.15.t:0 "Assiéger les bandits"
 shandong_events.15.d:0 "En suivant un chemin de terre, plusieurs soldats sont tombés sur un campement de la milice en activité. Heureusement, ces hommes courageux ont pu alerter le chef de la police, qui a la grâce de [SHD.GetLeader] d'assiéger les bandits sur présomption de vol. En appelant [SHD.GetLeader] lui-même, le siège du chef a fait quelques morts, et une offre arrive le matin de la part des bandits. Ils demandent leur liberté en échange de tous leurs biens, volés et possédés, tant qu'ils peuvent partir avec leurs armes et leur vie"
 shandong_events.15.a:0 "L'argent ne signifie rien pour nous, périssez !"
 shandong_events.15.b:0 "La reddition sauve des vies, nous sommes d'accord"

 shandong_events.16.t:0 "Les gardes-frontières arrêtés, avouent la contrebande"
 shandong_events.16.d:0 "Les gardes-frontières s'effondrent rapidement lors des interrogatoires, proclamant que la pauvreté les a poussés à se livrer à un stratagème où l'un d'eux bloque les trains en provenance de Qingdao, tandis que l'autre vole des objets dans les chariots. Ces gardes ont supplié d'aller en prison pour être exécutés, et ont offert tout le butin qui leur restait comme colladéral. [SHD.GetLeader] a finalement décidé de poursuivre l'exécution, car les prisons de Jinan sont déjà trop encombrées en l'état"
 shandong_events.16.a:0 "La justice est juste, par-dessus tout."

 shandong_events.17.t:0 "Notre chemin de fer est sécurisé"
 shandong_events.17.d:0 "Lorsque la nouvelle est parvenue aux coins du Shandong que [SHD.GetLeader] avait découvert les voleurs de chemin de fer, beaucoup de gens ne l'ont pas cru. Ils étaient tellement habitués à la gouvernance corrompue et ignorante de Jinan, qu'un pas dans la bonne direction a ravivé l'espoir dans le gouvernement. Le trafic le long de la voie ferrée a également augmenté, preuve que nos actions n'ont pas perturbé les macinations à Qingdao"
 shandong_events.17.a:0 "Maintenant, nous pouvons améliorer les rails."

 shandong_events.18.t:0 "Les bandits envoient un leurre, s'échappent à Hebei"
 shandong_events.18.d:0 "Une manifestation gaie est sortie du campement des bandits. A l'aide de jumelles, [SHD.GetLeader] a vu des bandits indiquer qu'ils étaient prêts à se rendre, plusieurs des bandits ont commencé à entrer dans leur cale, et à en sortir avec des marchandises dans des malles. Finalement, à la surprise générale, plusieurs bandits sont sortis de la cale et ont enlevé leurs vêtements. Ces bandits ont alors déposé leurs armes et ont commencé à tirer les malles vers notre ligne d'attaque. En état de choc, [SHD.GetLeader] a ordonné à sa ligne de tenir le feu héritier, et a laissé passer ces bandits apparemment fous. Les soldats ont tellement ri en humiliant ces bandits que personne n'a remarqué qu'un autre groupe de bandits s'était glissé dans les bois jusqu'à la fin du spectacle. Une ruée sur cette ruse a entraîné la mort des bandits nus, mais il semble que l'autre groupe se soit échappé du Shandong oriental"
 shandong_events.18.a:0 "Nous sommes baisés, les gars"

 shandong_events.31.t:0 "Les réfugiés demandent à Yingguang de sauver leurs familles"
 shandong_events.31.d:0 "Un comité de citoyens concernés est venu au bureau de [SHD.GetLeader] aujourd'hui avec une proposition. Il y a de nombreuses familles dans le Jiangsu, l'Anhui et au-delà qui sont séparées par la guerre de la Ligue. Des milliers d'entre elles n'ont pas pu traverser le champ de bataille et sont maintenant coincées. Le comité propose de rompre la politique de neutralité de [SHD.GetLeader] avec un groupe de volontaires pour sauver les familles des habitants du Shandong. Cela impliquera certainement que le Shandong choisisse un camp dans le conflit, et si ces volontaires choisissent de coopérer avec le camp perdant, nous pouvons nous attendre à une animosité accrue de la part du sud"
 shandong_events.31.a:0 "Non, nous devons garder le cap"
 shandong_events.31.b:0 "Sûrement, mais seuls les braves peuvent y aller"

 shandong_events.32.t:0 "Les [QIE.GetNameDefCap] envoient de nouveaux secours pour mettre fin aux émeutes"
 shandong_events.32.d:0 "Reconnaissant la nécessité de maintenir notre province forte face à la menace des républicains insipides, les Qing ont daigné nous envoyer des troupes supplémentaires pour réprimer ces émeutes. Le gouverneur [SHD.GetLeader] a fait preuve d'une gratitude éternelle envers les Qing pour avoir restauré l'ordre dans le Shandong et sécurisé la province contre la subversion étrangère une fois de plus. Après tout, il est normal que là où nous trouvons une cellule KMT, nous en trouvions une autre, n'est-ce pas ?"
 shandong_events.32.a:0 "Nous vous sommes éternellement reconnaissants, mon Empereur"

 shandong_events.33.t:0 "Les Fengtiens soutiennent Chen Tiaoyuan"
 shandong_events.33.d:0 "Le gouvernement fengtien, avec lequel nous avons conclu une alliance souple, a décidé de soutenir Chen Tiaoyuan de la Clique d'Anqing dans son conflit contre la Ligue. La réputation de Chen dépasse de loin [SHD.GetLeader], et notre propre réputation joue contre nous. Bien que cela devrait améliorer nos chances contre la Ligue, cela signifie aussi que, grâce au soutien de Fengtian, nous ne pouvons plus nous contenter d'agir contre Anqing par la suite"
 shandong_events.33.a:0 "Très bien"

 shandong_events.34.t:0 "Le Fengtien refuse d'intervenir"
 shandong_events.34.d:0 "Fengtian nous a fait savoir qu'il ne chercherait plus à s'impliquer dans notre différend avec Anqing, citant qu'il serait impossible de nous faire accepter. C'est regrettable, car cela signifie également qu'ils ne nous soutiendront pas dans notre guerre contre la Clique d'Anqing, que nous devons maintenant commencer immédiatement"
 shandong_events.34.a:0 "C'est le moment de frapper."

 shandong_events.35.t:0 "Les pourparlers fengtiens s'arrêtent"
 shandong_events.35.d:0 "La médiation tentée par Fengtian entre nous et la Clique Anqing de Chen Tiaoyuan a échoué. Nous devons agir immédiatement avant que Chen puisse répondre"
 shandong_events.35.a:0 "C'est le moment de frapper."

 shandong_events.36.t:0 "Un marché est conclu avec Anqing"
 shandong_events.36.d:0 "Nous avons réussi à conclure un accord avec la Clique d'Anqing. Cela signifie que nous aurons le temps de préparer d'autres mouvements pendant qu'ils s'occuperont du Kuomintang. Il est important de savoir que cet accord n'est pas permanent et nous chercherons à le modifier en notre faveur si nous le pouvons"
 shandong_events.36.a:0 "Une paix fragile."

 shandong_events.37.t:0 "Un diplomate d'Anqing nous approche"
 shandong_events.37.d1:0 "Alors qu'il semblait que la récente proposition de Fengtian n'était pas acceptée par nous et par Anqing, un modeste diplomate d'Anqing a trouvé le courage de demander une audience à Zhang Zongchang pour discuter de la possibilité d'un accord de paix sans interférence de la part de Fengtian. Zhang, qui était d'une humeur inhabituellement bonne, a entendu le diplomate. Nous détenons actuellement un territoire jugé extrêmement critique par Anqing de Chen Tiaoyuan. Le diplomate a déclaré qu'Anqing était très probablement prêt à accepter la paix si nous renonçons à un territoire en dehors du Jiangsu. Ce n'est peut-être pas une mauvaise idée, car ce territoire est difficile à administrer de toute façon et ne nous apporte pas beaucoup d'avantages, sauf à mettre Chen très en colère. Une paix temporaire nous donnerait également le temps de préparer d'autres actions"
 shandong_events.37.d2:0 "Alors qu'il semblait que la récente proposition de Fengtian n'était pas acceptée par nous et par Anqing, un humble diplomate d'Anqing a trouvé le courage de demander une audience à Zhang Zongchang pour discuter de la possibilité d'un accord de paix sans interférence de la part de Fengtian. Zhang, qui était d'une humeur inhabituellement bonne, a entendu le diplomate. Nous n'avons actuellement de territoire que dans la province du Jiangsu du nord. Le diplomate a déclaré qu'Anqing était très probablement prêt à accepter la paix si nous ne conservons que les territoires que nous avons acquis. Ce n'est peut-être pas une mauvaise idée, car obtenir quelque chose de plus n'entraînerait très probablement qu'une résistance dans ce nouveau territoire. Une paix temporaire nous donnerait également le temps de préparer d'autres actions."
 shandong_events.37.d3:0 "Alors qu'il semblait que la récente proposition de Fengtian n'était pas acceptée par nous et par Anqing, un humble diplomate d'Anqing a trouvé le courage de demander une audience à Zhang Zongchang pour discuter de la possibilité d'un accord de paix sans interférence de la part de Fengtian. Zhang, qui était d'une humeur inhabituellement bonne, a entendu le diplomate.\n\nNous n'avons pu acquérir aucun nouveau territoire. Le diplomate a déclaré qu'Anqing était très probablement prêt à céder tout le Jiangsu en échange de la paix. C'est une excellente nouvelle, car le Jiangsu est le principal territoire que nous recherchons. Une paix temporaire nous donnerait également le temps de préparer d'autres actions."
 shandong_events.37.d4:9 "Alors qu'il semblait que la récente proposition de Fengtian n'était pas acceptée par nous et par Anqing, un humble diplomate d'Anqing a trouvé le courage de demander une audience à Zhang Zongchang pour discuter de la possibilité d'un accord de paix sans interférence de la part de Fengtian. Zhang, qui était d'une humeur inhabituellement bonne, a entendu le diplomate.\n\nNous n'avons pu acquérir aucun nouveau territoire. Le diplomate a déclaré qu'Anqing était très probablement prêt à céder Xuzhou, la partie occidentale du Jiangsu, en échange de la paix. C'est une excellente nouvelle, car ce serait un grand pas vers de nouveaux gains. Une paix temporaire nous donnerait également le temps de préparer d'autres actions."
 shandong_events.37.a:0 "Faisons le."
 shandong_events.37.b:0 "Frapper maintenant, c'est mieux."

 shandong_events.38.t:0 "Le Fengtian nous soutient"
 shandong_events.38.d:0 "Le conflit avec Anqing s'est intensifié et a conduit à la guerre, mais heureusement, le gouvernement fengtien a décidé de nous soutenir et non Chen Tiaoyuan."
 shandong_events.38.a:0 "Bon."

 shandong_events.39.t:0 "Le Fengtian soutient Anqing"
 shandong_events.39.d:0 "Le conflit avec Anqing s'est intensifié et a conduit à la guerre, mais le gouvernement fengtien a décidé de soutenir Chen Tiaoyuan et pas nous !"
 shandong_events.39.a:0 "Mauvais."

 shandong_events.40.t:0 "Le problème d'Anqing"
 shandong_events.40.d1:9 "Maintenant que le Kuomintang a été vaincu, il n'est plus nécessaire de se plier aux souhaits de Chen Tiaoyuan. Chen se considère comme meilleur que les autres pour son soutien au mouvement anticoncessionniste, mais nous savons tous que ce n'est qu'un spectacle. Nous ne pouvons plus nous permettre d'être coincés uniquement au sein du Shandong. Nous devons au moins prendre le contrôle du Jiangsu (états de Xuzhou, Yancheng et Nantong). Nous enverrons immédiatement un télégramme à Fengtian pour nous assurer que cela se réalise"
 shandong_events.40.d2:9 "Maintenant que le Kuomintang a été vaincu, il n'est plus nécessaire de se plier aux souhaits de Chen Tiaoyuan. Chen se considère comme meilleur que les autres pour son soutien au mouvement anticoncessionniste, mais nous savons tous que ce n'est qu'un spectacle. Si nous avons pris le contrôle d'au moins certaines parties de la province du Jiangsu (états de Xuzhou, Yancheng et Nantong), nous devons maintenant chercher à nous emparer du reste ! Nous allons immédiatement envoyer un télégramme à Fengtian pour nous assurer que cela se fasse"
 shandong_events.40.d3:9 "Maintenant que le Kuomintang a été vaincu, il n'est plus nécessaire de se plier aux souhaits de Chen Tiaoyuan. Chen se considère comme meilleur que les autres pour son soutien au mouvement anticoncessionniste, mais nous savons tous que ce n'est qu'un spectacle. Nous contrôlons toute la province du Jiangsu (états de Xuzhou, Yancheng et Nantong), mais Chen Tiaoyuan d'Anqing l'acceptera très certainement de façon permanente. Nous allons immédiatement envoyer un télégramme à Fengtian pour nous assurer qu'ils ne lui cèdent pas notre territoire"
 shandong_events.40.a:0 "Attendons leur réponse."

 shandong_events.41.t:0 "Mission de Formation à Shandong"
 shandong_events.41.d:0 "La clique de Shandong a un besoin urgent de troupes supplémentaires pour pouvoir faire face à la Ligue. Devrions-nous leur envoyer une importante mission d'entraînement ? Bien qu'une victoire de leur part renforcerait considérablement notre influence en Chine, cette mission d'entraînement limiterait nos propres capacités d'entraînement pendant au moins un certain temps."
 shandong_events.41.a:0 "Faisons-le"
 shandong_events.41.b:0 "Ne vaut pas le coût"

 shandong_events.42.t:0 "Mission d'entraînement japonaise"
 shandong_events.42.d:0 "Le gouvernement de Fengtian, dans son soutien à nos efforts, nous a envoyé une importante mission de formation, composée de sergents instructeurs et d'autres officiers chinois et japonais. Cela devrait nous aider à mettre en place la grande armée nécessaire pour un conflit avec la Ligue."
 shandong_events.42.a:0 "Bonnes nouvelles"

 shandong_events.43.t:0 "[QIE.GetNameDefCap] n'envoie aucune aide"
 shandong_events.43.d:9 "Ne ressentant pas le besoin de prioriser l'envoi d'aide à Shandong, [QIE.GetNameDef] a refusé la demande de [SHD.GetLeader] pour qu'un régiment de l'armée vienne à Shandong afin d'essayer de soulager Shandong des récentes émeutes ! Le gouverneur [SHD.GetLeader] exprime sa profonde déception à l'égard de [QIE.GetNameDef], qui a choisi de s'isoler du Shandong et de n'épargner aucune ressource pour nous aider. Il semble que nous soyons désormais livrés à nous-mêmes."
 shandong_events.43.a:0 "Maudits soient-ils !"

 shandong_events.100.t:0 "Ingénieurs Capturés en Train de Vendre des Secrets Navals au Shandong"
 shandong_events.100.d:0 "Le Kemeptai a découvert un complot de plusieurs ingénieurs navals de la Kawasaki Shipbuilding Corporation qui prévoient de vendre des plans de navires au Shandong. Le Kemeptai est prêt à mettre fin à ce marché et à arrêter les deux hommes, mais une autre solution est possible. Si le Kemeptai prévenait la Kawasaki Shipbuilding Corporation qu'elle peut légalement vendre des plans de navires au Shandong, elle pourrait arrêter les traîtres elle-même et nous pourrions profiter d'une vente légale. C'est une proposition risquée, mais étant donné que le Shandong est trop petit pour devenir un rival naval, les dommages causés à la sécurité nationale par la vente sont minimes"
 shandong_events.100.a:0 "Alertez Kawasaki, autorisez la vente"
 shandong_events.100.b:0 "Non, arrêtez cette vente immédiatement !"

 shandong_events.101.t:0 "Les ingénieurs japonais nous vendent des dessins et modèles"
 shandong_events.101.d:0 "L'affaire clandestine a dérapé, mais la vente finale semble avoir été sauvée. Peu avant la transaction, la société Kawasaki nous a avertis qu'elle avait reçu l'autorisation de nous vendre légalement des modèles navals. Les ingénieurs avec lesquels nous étions en contact sont maintenant en prison. Cette tournure surprenante des événements est de mauvais augure, mais elle est actuellement satisfaisante"
 shandong_events.101.a:0 "C'était moins une"

 shandong_events.102.t:0 "Ingénieurs japonais arrêtés avant la vente"
 shandong_events.102.d:0 "L'accord clandestin a dérapé, et nous avons perdu le contact avec les ingénieurs japonais. On pense que les ingénieurs ont été arrêtés lors d'une importante descente de police à la Corporation Kawasaki, où ils étaient employés. Cette tournure surprenante des événements est de mauvais augure et l'investissement que nous avions fait pour les conceptions est perdu. "
 shandong_events.102.a:0 "Nous nous souviendrons de cela"

 shandong_events.991.t:0 "Zongchang et l'émeute des paysans"
 shandong_events.991.d:0 "Les habitants du Shandong, des âmes perdues, effrayées et confuses, pensent que le gouvernement est parti depuis longtemps. Nous leur rappellerons leur devoir envers la terre qu'ils ne peuvent abandonner. Les Yiwu que Zongchang employait continuent eux aussi à voler les Chinois aveugles, et doivent être pris. Bien qu'il était évident de voir la vilenie de Zhang Zongchang, tant de gens s'indignent encore aujourd'hui de sa mort. Nous avons repoussé tous les visiteurs de Jinan qui souhaitent assister aux funérailles de Zhang Zongchang, ce qui est mieux que ce qu'il mérite"
 shandong_events.991.a:0 "Les funérailles sont déjà trop chargées en ce moment..."

 shandong_events.992.t:0 "Panique contre la restauration de Qing au Shandong"
 shandong_events.992.d:0 "Après le grand retour de Qu Yingguang au Shandong, les magistrats Qing réquisitionnent publiquement les restes de la clique de Zongchang, leur ordonnant de se soumettre à leur autorité. Heureusement, la familiarité de Qu avec la tradition militaire du Shandong lui a permis d'obtenir les pots-de-vin nécessaires à la soumission de la majorité des forces armées. Étonnamment, son Rec Ci a même reçu des gages des armées paysannes anti-bandits qui contrôlent le sud du Shandong. Malheureusement, les chefs de la clique de Zongchang et ceux qui sont dévoués au Yiguandao jusqu'à la mort ont d'autres plans. Nous devons protéger les habitants du Shandong contre ces seigneurs de guerre nouvellement déclarés."
 shandong_events.992.a:0 "Restaurer la bienveillance ne sera pas facile"

 shandong_events.21.t:0 "Qu Yingguang Demande à [QIE.GetNameDef] de l'Aide contre les Émeutes"
 shandong_events.21.d:0 "Après avoir arrêté le vil seigneur de guerre Zhang Zongchang, les magistrats de Beijing ont été chargés de rassembler un rapport sur ses crimes pour l'accusation. C'est donc avec surprise que le nouveau gouverneur du Shandong, Qu Yingguang, a envoyé une copie de ces témoignages directement à l'empereur. Non seulement ces récits de témoins condamnent davantage Zhang Zongchang, mais ils mettent fortement en évidence l'instabilité permanente du Shandong résultant du régime de Zhang Zongchang. Qu Yingguang s'en est servi pour insister sur le fait qu'une aide militaire supplémentaire était nécessaire pour sécuriser le Shandong pour Beijing. Nous sommes enclins à aider Qu Yingguang une fois de plus, sauf pour les nombreuses autres utilisations très importantes de notre gendarmerie que le chef des armées a déjà prévues. Que devons-nous faire ?"
 shandong_events.21.a:0 "Bien, envoyez une division pour aider"
 shandong_events.21.b:0 "Non, nous avons des préoccupations plus urgentes"

### 400 - 409 Natpop Flavour Events

 shandong_events.400.t:0 "La matriarche Zhao rejoint Zhang Tianran"
 shandong_events.400.d:0 "Dans la mer des réfugiés qui fuient le nord-est de la Chine, de nombreuses promesses sont faites au maître de la maison Zhang Tianran. De nombreux paysans ont confié à Zhang la possession de leur vie, d'autres ont juré de se battre à la Lance Rouge pour le Shandong. Par une journée ensoleillée, une femme de Beijing portant une tenue d'hiver s'est approchée de Zhang Tianran. Les gardes de Yiguandao prétendent qu'elle est une matriarche comme la femme de Tianran, Sun Suzhen, mais elle se tient devant lui avec deux pistolets à la ceinture. Zhao Hong Wenguo, mère du leader étudiant de Beijing Zhao Dong, est ici pour offrir à sa famille les services du Yiguandao. Zhao Hong Wenguo prétend le faire non pas par loyauté religieuse ou par nécessité financière, mais parce que le Yiguandao lui apparaît comme la résistance essentielle contre l'agression japonaise qui menace sa maison. Le Maître d'honneur est d'accord et réitère sa promesse de ne jamais coopérer avec les Japonais en échange de services financiers et tactiques pour sa famille. Zhao Hong Wenguo insiste également pour diriger les divisions Red Spears et Big Sword en tant que Field Marshall à part entière"
 shandong_events.400.a:0 "Sa détermination ne nous laisse aucun doute sur ses capacités"

 shandong_events.401.t:0 "Tianran publie Provisional Etiquette"
 shandong_events.401.d:0 "Zhang Tianran soutient depuis longtemps que les enseignements du bouddhisme et de Confucius font partie intégrante de la société chinoise et ne peuvent pas être remis en question. Au sein du cercle restreint de la Yiguandao, un débat fait rage entre Zhang Tianran et Sun Suzhen sur la meilleure façon d'impliquer les lettrés du Shandong. Zhang Tianran et Suzhen ont tous deux collaboré à un livre intitulé « Etiquette provisoire », destiné à démontrer comment la Yiguandao respecte la lignée spirituelle des dirigeants chinois. Pour Zhang Tianran, qui était autrefois un bureaucrate mineur sous Yuan Shikai, la lignée spirituelle du dictateur chinois allait du régent Zaifeng à Yuan Shikai, puis enfin à un Puyi intronisé. Cependant, pour Sun Suzhen, la lignée spirituelle en Chine appartenait à Sun Yat-sen, et depuis la mort de Sun Yat-sen, il n'y a actuellement aucun véritable chef spirituel de la Chine. L'interprétation de Zhang semble s'en tenir à son accord de promouvoir Puyi comme empereur au sein du Yiguandao, mais ignore la source de soutien spirituel pour les idéalistes du Sud."
 shandong_events.401.a:0 "Zhang a raison, louez Puyi"
 shandong_events.401.b:0 "Le soleil a raison, louange à Sun Yat-Sen"

 shandong_events.402.t:0 "Tianran avertit le public de Maha-Kalpa"
 shandong_events.402.d:0 "Parlé souvent dans les temples et les écoles, mais insaisissable pour le public laïc, Zhang Tianran a décidé de révéler l'existence de la prophétie Maha-Kalpa lors d'un rassemblement public. Pour Zhang Tianran et le Yiguandao, l'histoire du monde est divisée en trois périodes par trois périodes de paix et de barbarie, représentées par les Trois Soleils. La dernière ère, celle du Soleil rouge, s'est terminée avec la révolution du Xinhai. La légende confucéenne Kang Yuowei est évoquée dans le discours de Zhang Tianran, qui a convenu que le troisième âge, Datong, ou Maha-Kalpa, était à l'aube. Bientôt, affirme Tianran, le peuple chinois sera perfectionné sur le plan racial ou sera détruit par des étrangers comme l'empereur du Japon ou l'empire britannique. Pour le peuple incertain du Shandong, la seule suggestion concrète issue de tant d'adoration ésotérique est qu'il devrait travailler plus dur à l'unification nationale, et renforce le sentiment déjà prégnant de lutte existentielle qu'il ressent."
 shandong_events.402.a:0 "Peut-être aurions-nous dû le révéler plus tôt"

 shandong_events.403.t:0 "Rendements médiocres au Shandong"
 shandong_events.403.d:0 "Les famines ont longtemps ravagé le peuple chinois, causant des morts en masse et nous maintenant encore dépendants de céréales qui échappent à notre contrôle. Notre dépendance excessive à l'égard de l'agriculture traditionnelle en est probablement la cause, mais essayer de nous en éloigner mettrait en colère les agriculteurs qui utilisent les mêmes méthodes éprouvées depuis des milliers d'années. Nous pourrions toujours commencer à appliquer les nouvelles techniques agricoles modernes des Occidentaux et courir le risque de nous aliéner nos partisans qui se tournent vers nous pour obtenir des conseils traditionnels, ou nous pourrions consacrer une part importante de nos lances rouges à aider les agriculteurs et à faire en sorte que nous n'ayons pas de famine"
 shandong_events.403.a:0 "Distribuer secrètement des engrais"
 shandong_events.403.b:0 "Les lances rouges dans les champs"

 shandong_events.404.t:0 "Le prêtre bouddhiste Juzan déclare Tianran hérésiarque"
 shandong_events.404.d:0 "Nos frères bouddhistes du Hunan ont décidé de lancer une campagne de diffamation contre nous !  Le professeur Juzan a déclaré que le Yiguandao était une hérésie, et Tianran un hérésiarque ! Cette dénonciation fait déjà des vagues dans les échelons inférieurs de notre organisation. Les responsables rapportent que plusieurs riches donateurs bouddhistes ont cessé d'apparaître au temple. Les enseignants bouddhistes en formation sur Taishan ont déjà entendu la nouvelle, et leur indécision a poussé plusieurs d'entre eux à abandonner le Yiguandao. Pour Zhang Tianran, l'enseignant Juzan n'est rien d'autre qu'un fanatique sectaire, qui souhaite briser la généalogie spirituelle chinoise et devancer le Maha-Kalpa"
 shandong_events.404.a:0 "Envoyez des lances rouges pour trouver et brûler les pamphlets de Juzan"

 shandong_events.405.t:0 "L'ancien professeur honoré Lu Zhongjie arrêté"
 shandong_events.405.d:0 "Zhang Tianran est peut-être le 18e patriarche du Yiguandao, mais les cicatrices du départ de Lu Zhongjie demeurent. Après que Lu Zhongjie ait fui le Shandong une seconde fois lors de l'assaut du Yiguandao sur Jinan, elle a été repérée peu souvent par nos Lances rouges. Après avoir suivi un conseil que le professeur Juzan avait donné à Lu Zhongjie lorsqu'il a publié sa diffamation contre nous, les Lances Rouges se sont faufilées dans le Hunan. L'un de nos plus fidèles empereurs mineurs a réussi à la traquer et à nous la ramener, après toutes ces années. Dans le cercle restreint, un débat fait rage sur la manière de gérer cette manne. Pour Zhang Tianran et Sun Suzhen, maintenir Lu Zhongjie en vie est une tentation pour les dissidents de la vénérer comme la réincarnation de Guan Yin. Pour les Red Spears et leur chef Xue Dian, Lu Zhongjie est si faible qu'elle ne représente aucune menace pour eux. Xue Dian a insisté pour que Lu Zhongjie soit assignée à résidence et qu'aucun mal ne lui soit fait."
 shandong_events.405.a:0 "Imprison but do no harm to her!"La matriarche Zhao rejoint Zhang Tianran"
 shandong_events.405.b:0 "Ignorez Xue Dian, Lu Zhongjie meurt !"

 shandong_events.406.t:0 "La société de la svastika rouge déserte Yiguandao"
 shandong_events.406.d:0 "La Société de la Svastika Rouge, autrefois alliée du Yiguandao sous le régime de Zhang Zongchang, a finalement craqué et nous a abandonnés. Cette nouvelle surprend même le professeur honoré, qui peut effrayer ses disciples en leur donnant une réponse. Mais pour Sun Suzhen, cette désertion justifie son opposition à la posture de guerre, qu'elle prétend avoir toujours ressentie. Sun a profité de l'occasion pour réprimander Zhang Tianran, en disant que c'était la conséquence évidente de sa tentative d'équilibrer la guerre et la charité. En dehors des limites du cercle intérieur de Yiguandao, les empereurs et les directeurs mineurs ont minimisé cette perte. Il est clair, disent-ils, que la Société de la Svastika Rouge a été rachetée par le YMCA américain pour calomnier et diffamer le Yiguandao."
 shandong_events.406.a:0 "Le dollar américain est à blâmer"

 shandong_events.407.t:0 "Tianran rencontre secrètement Tsunesaburo Makiguchi"
 shandong_events.407.d:0 "L'enseignant honoré Zhang Tianran prend contact avec la Soka Gakkai au Japon. Cette société bouddhiste a été soumise à l'oppression du gouvernement pour avoir fait pression sur ses camarades bouddhistes contre l'intervention japonaise en Chine. La lettre de Zhang Tianran à Tsunesaburo Makiguchi a été rendue publique dans les deux nations, soulignant leur adhésion commune au Sutra du Lotus. Il semble que l'opinion publique japonaise ait accueilli favorablement cette lettre. Nos frères japonais peuvent encore influencer les choses d'une manière plus bénéfique pour nous"
 shandong_events.407.a:0 "Les Japonais honorables doivent être vénérés"

 shandong_events.408.t:0 "Tianran envoie une lettre à Dao Cai Dao"
 shandong_events.408.d:0 "L'enseignant honoré Zhang Tianran a pris contact avec le leader du Dao Cao Dai au Vietnam. Ce groupe a reçu des messages du mystérieux Cao Dai, une puissance divine bouddhiste qui, selon eux, unit l'humanité de toutes les races. La lettre de compasisonnement de Tianran espère établir et formaliser des liens avec nos frères au Vietnam. Le chef actuel du Dao Cai Dai, Pham Cong Tac, a organisé une milice semblable à celle des Lances rouges du Shandong pour défendre leur pays contre l'absolutisme religieux allemand. Bien que nous ayons une longue rivalité et une animosité entre Chinois et Vietnamiens, nous pouvons encore forger des liens plus importants grâce à notre foi commune, et donc l'un l'autre"
 shandong_events.408.a:0 "L'honorable Yue doit être vénéré"

 shandong_events.409.t:0 "Tianran envoie une lettre à Kim Kyohong"
 shandong_events.409.d:0 "L'enseignant honoré Zhang Tianran a pris contact avec les Daejonggyo en Corée. Les Daejonggyo sont un groupe noble de Goshindo qui voient clair dans les mensonges de l'impérialisme japonais et qui luttent pour une Corée indépendante. Les Daejonggyo sont célèbres pour leur ancien chef Na Cheol, dont la dévotion absolue envers le peuple coréen a conduit au suicide de ce dernier en 1916, après son échec à libérer la Corée et la Mandchourie.  Grâce à ce rayonnement, nous pourrons peut-être influencer davantage les Daejonggyo, et ainsi obtenir le soutien des nationalistes Daejonggyo"
 shandong_events.409.a:0 "Les Coréens honorables doivent être vénérés"

 shandong_events.410.t:0 "Qu Yingguang envoie une bouée de sauvetage à Beijing"
 shandong_events.410.d:0 "Le brouillard de la confusion s'est levé de la province du Shandong et un homme a émergé : Qu Yingguang. Qu était chargé d'alerter le magistrat des crimes illégaux et inexcusables de Zhang Zongchang dans le Shandong, et a été nommé gouverneur en remerciement. Le gouverneur Qu Yingguang, citant les rébellions qui freinent le Shandong, plaide auprès du gouvernement Qing pour aider à rétablir l'ordre. Les craintes que la province puisse encore être perdue au profit d'un autre Seigneur de Guerre parvenu, ou perdue au profit du KMT, abondent. A coup sûr, les Qing ne permettraient-ils pas qu'une autre province échappe à leur contrôle ?"
 shandong_events.410.a:0 "Enfin un gouverneur sensé"
 shandong_events.410.b:0 "Nous ne faisons pas confiance à un ancien républicain"

 shandong_events.411.t:0 "Beijing promet de protéger le Shandong"
 shandong_events.411.d:0 "La délégation de Beijing a cédé et a envoyé un détachement de soldats pour rechercher et arrêter les bandits dans le Shandong. Les soldats sont arrivés en fanfare à Jinan et ont été déployés dans les villes par le général Qu Yingguang. Il semble que la plupart des rebelles qui résistaient à l'imposition aient déposé les armes, et que certains de ceux qui ont résisté soient désormais en sécurité derrière les barreaux."
 shandong_events.411.a:0 "Nous pouvons enfin nous concentrer sur l'intérieur"

 shandong_events.412.t:0 "Beijing rejette les demandes de Yingguang"
 shandong_events.412.d:0 "La délégation de Beijing reste ferme et refuse d'envoyer des soldats au Shandong pour aider un ancien gouverneur républicain. N'ayant pas la légitimité d'ordonner aux rebelles de se retirer. Le général Qu Yingguang a décidé de les prendre au mot. Quelques soldats de réserve seront envoyés pour intimider les rebelles du Shandong, habillés en bleu Qing. Espérons que les rebelles ne découvriront pas que les soldats que nous envoyons pour les disperser ne viennent pas de Beijing."
 shandong_events.412.a:0 "Nous devons nous protéger"

 shandong_events.413.t:0 "Arrivée d'un chef militaire exilé du Shandong"
 shandong_events.413.d:0 "Bien que notre armée n'atteigne pas le niveau de loyauté des puissances occidentales, nous sommes fiers de notre méritocratie. Les commandants et les amiral que vous voyez sur le champ de bataille ont prouvé leur loyauté envers le chef et le peuple. D'un autre côté, la victoire pourrait dépendre de la volonté mortelle affichée par certains des commandants les plus mercenaires, ceux qui sont prêts à faire ou à mourir. Cet homme nous vient de la tumultueuse province du Shandong, dont les cliques ont beaucoup compté sur les commandants mercenaires dans le passé. Ce général vient avec une histoire triste sur la façon dont les marées se sont retournées contre lui, et il est venu en haillons vers nous, prêt à mener le bon combat pour une fois. Il est difficile de déterminer s'il est authentique, mais nous devons décider s'il vaut la peine d'être recruté en ces temps déjà tragiques"
 shandong_events.413.a:0 "Nous avons besoin de toute l'aide possible"
 shandong_events.413.b:0 "Belle histoire, mais non merci"

### 414 - 423 Authdem Flavour Events

 shandong_events.414.t:0 "Kong Dechang insulte les savants confucéens de Beijing"
 shandong_events.414.d:0 "Le jeune Kong Dechang, symbole de la Société pour restaurer la bienveillance, a commencé à faire des vagues auprès du public. En tant qu'héritier de l'héritage du manoir de Qufu, Kong Dechang a été tenu au courant des derniers développements philisophiques du confcuianisme. Dans ce domaine, des enlumineurs de Beijing comme Wu Peifu et Chen Huanzhang ont fait connaître leur propre interprétation du canon confucéen. Ce qui distingue la première publication de Kong Dechang des autres est son rejet des tentatives de relance de la piété imposée par l'État. Alors que Wu Peifu et Chen Huanzhang ont décrié leur époque comme étant impie, Kong Dechang a déclaré que chaque famille en Chine définit la piété par ses actions. Ce rejet de la partisanerie dans la religion qu'il aide à représenter a contrarié les intellectuels de Beijing"
 shandong_events.414.a:0 "L'enfant est encore jeune, Votre grâce"

 shandong_events.415.t:0 "Zheyuan achète de nobles titres pour les alliés"
 shandong_events.415.d:0 "Le Duc Yansheng, le marquis de Grâce étendue et d'autres titres de noblesse ont été achetés par le gouverneur Yingguang au cours du récent déclin économique de Beijing. Il ne s'agit que de gestes symboliques de la part des entités bureaucratiques de Beijing qui ne confèrent aucune responsabilité au propriétaire, mais l'effet recherché demeure. Cela permet aux alliés de Qu Yingguang de retrouver une partie de l'honneur dont ils ont été privés pendant la révolution Xinhai. La noblesse terrienne du Shandong a désormais une position plus légitime au sein de la clique et peut plus facilement exercer une influence sur le peuple du Shandong."
 shandong_events.415.a:0 "Merci, votre grâce"

 shandong_events.416.t:0 "Famine au Shandong, aide nécessaire de Qing"
 shandong_events.416.d:0 "Le rendement de cette année dans le Shandong n'est pas aussi bon que prévu. Très probablement en raison de l'utilisation excessive des terres pour la culture commerciale de l'opium pendant les années Zongchang. Qu Yingguang a été appelé pour résoudre la pénurie alimentaire avant qu'elle ne conduise à une famine endémique. La solution du gouverneur Yingguang consiste à puiser une fois de plus dans la réserve provinciale et à payer les importations de nourriture en provenance du Hebei, où les récoltes sont plus abondantes. Ce fardeau sera partagé avec la population par le biais de taxes supplémentaires."
 shandong_events.416.a:0 "Nous devons désormais économiser les céréales"

 shandong_events.417.t:0 "Big Swords font défection à Yiguandao et offrent de l'aide"
 shandong_events.417.d:0 "Les membres de Big Sword qui avaient juré fidélité à Zhang Tianran sont retournés à Jinan pour promettre fidélité à Qu Yingguang. En effet, le gouverneur Qu a satisfait l'un de leurs désirs les plus pressants, à savoir endiguer le trafic de drogue dans le Shandong. Cependant, ces miliciens de Big Sword demandent à être traités avec le même respect et le même paiement que les réguliers entraînés, ce qui causerait de nouveaux problèmes à notre trésorerie. Que devons-nous répondre ?"
 shandong_events.417.a:0 "Nous avons besoin de professionnels, pas d'eux"
 shandong_events.417.b:0 "Nous avons besoin de beaucoup plus pour sauver la Chine"

 shandong_events.418.t:0 "Yellow Sands Society attaque, captué"
 shandong_events.418.d:0 "De Hebnan est née la toute jeune Yellow Sands Society, avec une histoire similaire à celle du Yiguandao. Ces bandits vertueux ont été chassés du Henan par le gouvernement de Beijing et répètent le mantra séculaire "Détruisez les Qing, restaurez les Ming". Cette phrase fatiguée a apparemment amené un leader paysan à se déclarer Chu le Neuvième et à mener une charge sur Dezhou. Heureusement, nos gardes étaient bien équipés pour gérer un autre réveil religieux, et ont capturé Chu le Neuvième et détruit la Société des Sables Jaunes"
 shandong_events.418.a:0 "Quand vont-ils apprendre ?"

 shandong_events.419.t:0 "La Société des Sables jaunes revient, vaincue"
 shandong_events.419.d:0 "Le temple des Boxeurs de Dezhou a connu une éruption de violence, la Société des Sables jaunes ayant de nouveau fait sauter sa sale tête. Cette fois, un certain "Wang le sixième" a lancé une attaque surprise contre la ville, mais il a été abattu par nos gardes. Le Kong Dechang a été consulté pour obtenir des conseils sur la manière d'empêcher une nouvelle insurrection de la part des sociétés de Sables jaunes. Le jeune Kong Dechang, après y avoir longuement réfléchi, a suggéré que les différents temples des Sables jaunes qui vénèrent les Ming soient confiés à de nouveaux gardiens nommés par le gouvernement. Pour le Kong Dechang, le peuple fatigué du Shandong continue de se rebeller en raison de la menace existentielle qu'il ressent du fait de la situation politique"
 shandong_events.419.a:0 "Une idée brillante, jeune homme !"

### 424 - 423 Patauto Flavour Events

 shandong_events.424.t:0 "Une visite d'État au Fengtian"
 shandong_events.424.d:0 "Zhang Zongchang, dans le but d'obtenir le soutien de Zhang Zuolin, a décidé de se rendre à Shenyang. Cependant, les discussions n'ont jamais pu avoir lieu car le Général Viande-de-Chien, dès son arrivée à Shenyang, s'est mis à boire et à se prostituer de façon obscène, couronnant le tout en arrivant avec 3 heures de retard à la réunion avec Zhang Zuolin complètement et totalement hors de contrôle à cause de la drogue et de l'alcool. Se moquant du Vieux Maréchal pour son analphabétisme en plus ! "
 shandong_events.424.a:0 "Je préfère divertir Zhang Xueliang"

 shandong_events.425.t:0 "Zhang Zongchang publie un livre de poésie"
 shandong_events.425.d:0 "Même Zhang Zongchang n'est pas à l'abri des charmes et de l'attrait de la poésie, et il a donc décidé de publier un livre contenant sa poésie. Il a donc décidé de publier un livre contenant sa poésie, plusieurs années après l'échec de ses Commentaires sur les treize classiques. Pour de nombreux lecteurs, le seul conseil moral que leur apportait le commentaire était des leçons anecdotiques sur la façon dont Confucius approuvait la polygamie. Bien que les poèmes puissent être discutables, le Général Viande-de-Chien semble être assez satisfait de lui-même, réduisant sa dégénérescence quotidienne."
 shandong_events.425.a:0 "Même un chien apprécie un os ou deux"

 shandong_events.426.t:0 "La Deuxième Publication du Général Viande-de-Chien"
 shandong_events.426.d:0 "Zhang Zongchang a publié son deuxième commentaire sur les Treize classiques, et insulte horriblement les écrits de Wu Peifu ! Décrivant les écrits de Wu Peifu comme circonstanciels, et en accord avec le style de Beijing qui consiste à se conformer aux intérêts politiques plutôt qu'à la morale absolue. Le Général Viande-de-Chien écrit dans le Commentaire que les travaux de Mencius s'inscrivent bien dans le cadre de la crise actuelle en Chine, et établit une comparaison favorable entre le premier empereur, Qin Shi Huangdi, et le Jeune Maréchal Zhang Xueliang."
 shandong_events.426.a:0 "Heureusement que le père de Xueliang ne peut pas le lire"

 shandong_events.427.t:0 "Chiens de soleil ou de pluie"
 shandong_events.427.d:0 "Zhang, atteignant de nouvelles profondeurs de dépravation, a décidé de prendre la femme du commandant Sun Dianying. Furieux, le Général Sun a décidé de faire chanter Zhang Zongchang, le menaçant de révéler cette bigamie s'il ne lui accorde pas une promotion. Le Général Viande-de-Chien est évidemment connu pour sa luxure et sa dégénérescence, mais prendre la femme d'un subordonné de confiance serait une honte pour son armée. Bien que Zhang veuille garder le silence, s'il cède, cela pourrait affaiblir sa position auprès de ses subordonnés."
 shandong_events.427.a:0 "Assieds-toi, Maréchal"
 shandong_events.427.b:0 "Taxi, je préfère marcher"

 shandong_events.428.t:0 "Le Roi du Charbon et le Général Viande-de-Chien"
 shandong_events.428.d:0 "Une débâcle au début des années 1930 est revenue hanter l'administration de Zhang Zongchang. Dans ces années-là, Zongchang a imposé une taxe de 40 cents sur le charbon exporté afin de tirer profit des opérations charbonnières de Qingdao. Cette taxe était cependant si exorbitante qu'aucune compagnie minière ne l'a jamais payée. Pourtant, il y a toujours de l'exploitation minière dans l'est du Shandong. Une solution plus radicale a été concoctée, qui a permis à Zhang Zongchang de financer un syndicat de mineurs de charbon pour donner aux mineurs de charbon les moyens de combattre leurs patrons. Ce pari s'accompagne d'un niveau d'accord avec les cellules KMT dans l'est du Shandong pour leur permettre d'inciter les travailleurs à se syndiquer. Pour le personnel de Zongchang, ce type de manipulation idéologique semble tiré du livre de tactique de Yan Xishan"
 shandong_events.428.a:0 "Une ombre des idées de Xishans, je vois ?"

 shandong_events.429.t:0 "Bataille de bordel pour les affaires"
 shandong_events.429.d:0 "Zongchang, que ce soit en raison de sa toxicomanie ou pour son propre amusement, a nommé deux hommes au même poste de chef de la sécurité. Les deux hommes n'ont découvert l'existence de l'autre que lorsqu'ils sont allés occuper leur nouveau poste en même temps. Cherchant à clarifier la question, ils ont fait irruption dans la chambre de Zhongchang, où ils l'ont trouvé engagé dans la dépravation comme d'habitude. Zhongchang, amusé par leur confusion, ordonna aux deux hommes de se battre l'un contre l'autre pour la position, et celui qui était au sommet revendiquerait la victoire, bien qu'il n'excluait pas un bas de pouvoir. Les hommes se sont donc déchirés, au grand amusement de Zhongchang et des filles"
 shandong_events.429.a:0 "Il semble que ce fut une orgie à plus d'un titre"

 shandong_events.430.t:0 "Le médicament le moins cher"
 shandong_events.430.d:0 "La menace de famine est revenue au Shandong en raison de la prolifération du commerce de l'opium dans la province. En raison de la quantité de terres actuellement utilisées pour la production d'opium, les gens commencent à se serrer la ceinture. Les années précédentes, des pétitions étaient adressées au gouvernement central pour faire revivre la population. Pour Zhang Zongchang, cette option comporte trop de risques qu'un autre seigneur de guerre découvre ses plantations d'opium. En conséquence, le Général Viande-de-Chien a adopté une position fataliste, et a ordonné que ses soldats ne fournissent que ceux qu'ils jugent dignes de recevoir une aide alimentaire."
 shandong_events.430.a:0 "Les choix les plus difficiles exigent la plus forte des volontés"

 shandong_events.431.t:0 "Le soleil construit des temples de bandits"
 shandong_events.431.d:0 "L'autonomie du général Sun Dianying au sein de l'armée est grande, à tel point que ses officiers agissent comme si Sun Dianying était une clique dans la clique. Les soldats de Sun Dianying, après avoir pillé Taishan de ses livres de Yiguandao, ont conçu un plan pour s'enrichir. Comme Sun Dianying était autrefois un leader de la Société de la Route du Temple au Henan avant de se retirer à Shandong, ses hommes ont pensé qu'il était prudent de recréer la société à Taishan. Au sommet de Taishan, sous une brume d'opium obligatoire, Sun Dianying a construit un sanctuaire appelé le Neuvième Ciel. Les soldats de Sun Dianying auraient commencé à se peindre les caractères Te et Sheng sur le visage."
 shandong_events.431.a:0 "Difficile d'échapper à la foi en Shandong"

 shandong_events.432.t:0 "L'impératrice n'a pas de vêtements"
 shandong_events.432.d:0 "Sun Dianying a dirigé un groupe de bandits pour dévaliser la tombe de l'impératrice douairière Cixi à Beijing, un événement choquant. Sous le couvert de la nuit, des hommes menés par Sun Dianying ont ouvert la tombe de Cixi et ont emporté une grande partie de ses trésors funéraires en or. Le summum de leur débauche a été atteint lorsqu'ils ont pris le melon de jade que Cixi tenait dans son sarcophage. Bien que son héritage ait été débattu, à savoir qu'elle était un despote impitoyable qui a provoqué une grande humiliation, les traditionalistes la considèrent toujours comme un parangon de la société chinoise. Piller sa tombe est une profonde insulte à la tradition chinoise, et les Qing sont profondément embarrassés. Malheureusement, Sun Dianying est retournée sur le front, entourée de gardes et à l'abri des chasseurs de primes et des justiciers."
 shandong_events.432.a:0 "Ça doit être dans un musée !"

 shandong_events.433.t:0 "Les Ming ont encore une fois été humiliés"
 shandong_events.433.d:0 "Sun Dianying, dans sa soif croissante d'or et de butin, a décidé de dévaliser la tombe du Mausolée Ming Xiaoling à Nanjing. Les hommes de Sun Dianying arrivent à nouveau dans la nuit, escaladent les murs de la tombe avant d'en faire sauter la porte. Le tombeau Ming Xiaoling appartenant à l'empereur Hongwu, le premier Ming. Hongwu qui était un Turban Rouge dans une société de Lotus Blanc comme feu Zhang Tianran, alimentant la fureur de Sun Dianying. Sun Dianying s'est enfui avec les trésors de l'empereur Hongwu et de ses épouses, leur valeur étant définitivement souillée par leur disposition à côté du melon de jade de Cixi. La tombe a été pillée et incendiée, ce qui n'était pas arrivé depuis que Li Zicheng l'a fait en 1644, lorsqu'il a pris Beijing. Il semble vraiment qu'il n'y ait aucun honneur à restaurer les Ming, malgré ce que disent ces vieux slogans. Les centaines de personnes qui, dans le passé, ont promis de "Détruire les Qing, restaurer les Ming", sont attristées par cette profanation."
 shandong_events.433.a:0 "Plus rien n'est sacré ?"

 shandong_events.434.t:0 "Un nouveau quartier général ?"
 shandong_events.434.d:0 "Notre expansion nous a conduit à occuper un territoire plus vaste que la seule province de Shandong. Le peuple de Jinan souffre et réclame le départ des soldats. Alors que la maison des impôts de Jinan a été incendiée par des foules en colère chaque année depuis son occupation, Nanjing promet une sécurité bien plus grande. Alors que certains partisans de la ligne dure souhaitent que nous restions à Jinan, car elle a servi de capitale lors de campagnes réussies, d'autres suggèrent que nous déménagions à Nanjing. La population métropolitaine de Nanjing se prépare au pire de l'équipage de Zongchang. Les bunkers construits pour survivre au siège de Nanjing sont actuellement remplis d'objets précieux dans l'espoir que Zhang Zongchang ne les trouve pas."
 shandong_events.434.a:0 "Restez à Jinan"
 shandong_events.434.b:0 "Déménager à Nankin"

 shandong_events.438.t:0 "Tianguo de Shangqing Déclaré"
 shandong_events.438.d:0 "Le gouverneur Zhang Zongchang, connu dans toute la Chine comme le "Général Viande-de-Chien", est mort. Selon les rapports de Jinan, Zongchang et son lieutenant Sun Dianying auraient tenté de prendre d'assaut le Tai Shan sacré en début de semaine, et n'auraient pas survécu à l'assaut. Cette nouvelle stupéfiante s'accompagne de proclamations du nouveau maître du Tai Shan, Zhang Tianran, selon lesquelles il dirige désormais le Shandong et tout son peuple.\n\nZhang Tianran est un personnage moins connu des journaux, mais il est bien connu des réfugiés de la Chine orientale comme le chef bienveillant du culte Yiguandao. Pour les réfugiés les plus conservateurs, cet événement symbolise quelque chose de plus brillant pour la Chine."
 shandong_events.438.a:0 "Cela ne se passera pas bien..."

 shandong_events.439.t:0 "Agitation dans le Sud"
 shandong_events.439.d:0 "Dans la Ligue des huit provinces, de nombreux rapports font état de troubles généralisés après la vente aux Allemands du chemin de fer nouvellement construit. Si nous voulons nous assurer une meilleure emprise sur la Chine, nous devrions garder un œil sur les événements du Sud-Est car nous pourrions tirer un grand profit de l'effondrement de la clique des Chuanfangs. "
 shandong_events.439.a:0 "Nous devrions garder un œil sur cette affaire."

 shandong_events.440.t:0 "Une balle importante"
 shandong_events.440.d:0 "Le maréchal de la Ligue Sun Chuanfang a été abattu et se trouve actuellement dans un état critique. Après des semaines d'émeutes, il semble qu'un paysan chanceux l'ait atteint. On ne sait pas ce que cela signifie pour la Ligue, mais si le chaos s'ensuit, nous devons être prêts à en tirer profit"
 shandong_events.440.a:0 "Cette balle va changer le destin de la Chine."

 shandong_events.445.t:0 "L'empereur mineur Xue Dian déserte avec Lu Zhongjie"
 shandong_events.445.d:0 "Après avoir assuré à Zhang Tianran et Sun Suzhen que Lu Zhongjie était isolé, le petit empereur du Shandong a trahi les Yiguandao. Après avoir omis de se présenter aux exercices quotidiens, les soldats de la Lance Rouge ont découvert que Xue Dian avait disparu de ses quartiers. La panique s'est emparée des Lances Rouges qui ont cherché en vain à retrouver Xue Dian. Cette panique s'est amplifiée lorsque le vieux professeur maison, Lu Zhongjie, est resté introuvable lui aussi. Après que Zhang Tianran soit arrivé dans une fureur peu caractéristique, il est entré dans la maison de Xue Dian pour demander aux esprits de le guider. Après plusieurs heures, Zhang Tianran est sorti des quartiers de Xue Dian et a déclaré que l'Empereur mineur était appelé par une puissance supérieure à s'engager dans un pèlerinage immédiat et permanent. Alors que les soldats des Lances rouges sont rassasiés, les dissidents à l'extérieur de Taishan ont facilement déduit que Xue Dian et Lu Zhongjie ont échappé au culte. À la surprise de beaucoup, y compris Sun Suzhen, Zhang Tianran n'a pas ordonné de chasse à l'homme. Il semble que le Maître honoré ait accepté une conséquence qu'il n'avait pas prévue."
 shandong_events.445.a:0 "Il fait probablement partie du Maha-Kalpa"

 shandong_events.500.t:0 "Victoire dans la guerre de la Ligue !"
 shandong_events.500.d:0 "Nous avons gagné"
 shandong_events.500.d1:0 "Une nouvelle ère commence pour la Chine. Alors qu'elles n'étaient qu'une organisation étrange mais influente au début de la Guerre de la Ligue, les forces des Yiguandao ont apporté l'espoir et la rédemption aux pays souffrant des corrompus et des méchants lorsqu'elles ont marché sur Nanjing. Aujourd'hui, Zhang Tianran, le 18e patriarche des Yinguandao, est sorti vainqueur de la guerre de la Ligue et règne sur les riches provinces orientales de la Chine. L'homme n'a pas perdu de temps - dans la ville de Nanjing, l'opium a été confisqué, les fumeries perquisitionnées et les étrangers criminels expulsés. L'aide a également été distribuée aux personnes souffrantes et nécessiteuses par les moines Yinguandao, désireux de gagner la sympathie de la population.\n\nMais bien que notre contrôle ait été largement assuré sur la Chine orientale, l'anarchie reste la norme dans une trop grande partie de la campagne. Gouverneurs peu coopératifs, bandits du KMT, vestiges de seigneurs de la guerre - la liste des obstacles à l'intégration est assez longue. Il faudra un certain temps pour consolider le contrôle des terres que nous avons gagnées dans la lutte, mais bientôt le Shangqing Tianguo élèvera la Chine dans une nouvelle ère de moralité vertueuse."
 shandong_events.500.d2:0 "Une nouvelle ère commence pour la Chine, du moins c'est ce que pensaient les radicaux du KMT et les zélotes du Yiguandao en tentant d'imposer leurs dangereuses idéologies au peuple. Se distinguant des autres petits dirigeants chinois principalement par l'ampleur de sa corruption et de ses extravagances, le Général Viande-de-Chien, Zhang Zongchang, est sorti vainqueur de la Guerre de la Ligue, régnant désormais sur les riches provinces orientales du pays. Pour fêter cet incroyable exploit, Zhang s'est livré à une nuit d'ivresse, agrémentée d'une étonnante quantité d'opium et se terminant par une visite des beaux bordels de Nanjing.\n\nMais bien que notre contrôle ait été largement assuré sur la Chine Orientale, l'anarchie reste la norme dans une trop grande partie de la campagne. Gouverneurs peu coopératifs, bandits du KMT, fanatiques religieux - la liste des obstacles à l'intégration est assez longue. Il faudra un certain temps pour consolider le contrôle des terres que nous avons gagnées dans la lutte, mais bientôt nous serons en mesure d'annoncer une nouvelle Ligue des Provinces Chinoises de l'Est sous le règne du futur Maréchal Zhang Zongchang."
 shandong_events.500.a:0 "La paix, enfin"

 shandong_events.501.t:0 "Zhang Zongchang fuit le Shandong"
 shandong_events.501.d_FNG:0 "Après avoir laissé Jinan en flammes et Shandong en proie à une violente révolte, Zhang Zongchang est récemment arrivé à [745.GetCapitalVictoryPointName] après s'être échappé de prison avec une bande de proches associés, à la barre d'un cargo de bétail réquisitionné à la hâte. Malgré son moyen de transport discret, le Général Viande-de-Chien n'a pas tardé à se rendre à Shenyang et à demander son retour dans le cercle restreint de Zhang Zuolin. Malgré sa récente défaite, Zhang Zongchang reste un formidable général, largement considéré comme l'un des plus efficaces de la Chine du Nord. Nombreux sont ceux qui affirment que son retour représente une opportunité inégalée.\n\nCependant, Zhang n'a pas tardé à affirmer son autonomie lorsqu'il s'est retrouvé isolé dans le Shandong pendant la troisième guerre de Zhifeng. Ses armées se sont tenues à l'écart en 1928, au moment où nous avions le plus besoin d'elles ; une trahison en soi.\n\nEn vérité, c'est Zhang Zuolin qui a fait Zhang Zongchang ; ce sont ses armées que le Général Viande-de-Chien a menées à la victoire. Maintenant qu'il dépend à nouveau de la charité du Grand Maréchal, sans parler de sa clémence, faut-il prolonger l'une ou l'autre ?"
 shandong_events.501.d_SZC:0 "Après avoir laissé Jinan en flammes et le Shandong en proie à une violente révolte, Zhang Zongchang est arrivé à [SZC.Capital.GetCapitalVictoryPointName] après s'être échappé de prison avec une bande de proches collaborateurs. Apparemment sans domicile fixe à Fengtian, Zhang réclame hardiment une place à la tête de l'une de nos armées, et promet une série de victoires rapides par sa main.\n\nMalgré ses récentes défaites, Zhang Zongchang reste un formidable général, largement considéré comme l'un des plus efficaces de la Chine du Nord. Nombreux sont ceux qui soutiennent que son retour représente une opportunité inégalée. D'un autre côté, Zhang est connu pour être violemment imprévisible, et mal réputé dans les cercles les plus respectables."
 shandong_events.501.a:0 "Bienvenue, Vieux Quatre-Vingt-Six !"
 shandong_events.501.b:0 "Nous n'avons pas besoin de ce chien enragé."

 shandong_events.502.t:0 "Les loyalistes de Zongchang fuient le Shandong."
 shandong_events.502.d:0 "Après avoir tenté de prendre d'assaut le mont sacré Tai, Zhang Zongchang et son principal lieutenant Sun Dianying ont été abattus. Les loyalistes qui ont survécu à l'assaut ont fui le Shandong et sont maintenant arrivés à [ROOT.GetNameDef]. Ils ont demandé à servir dans nos forces armées, peut-être dans l'espoir de rentrer chez eux un jour. Bien que leurs connaissances puissent s'avérer utiles dans les futures batailles du Shandong, ils sont également considérés par les autres membres des forces armées comme des bandits."
 shandong_events.502.a:0 "Ils sont les bienvenus ici."
 shandong_events.502.b:0 "Nous n'avons pas besoin de seigneurs de guerre dépendants."

 shandong_events.503.t:0 "Les Mandchous Fuient Beijing Après l'Échec du Coup d'État !"
 shandong_events.503.d:0 "Après l'échec de la restauration des Qing à Beijing, certains généraux et conseillers mandchous ont fui le spectre de la clique Zhili de Wu Peifu et se sont réfugiés dans notre province. Les événements évoluent rapidement et, bien que le sort de l'empereur Puyi et de son frère Pujie ne soit pas encore connu, ces membres de la famille offrent leur aide à la cause de la restauration de la monarchie."
 shandong_events.503.a:0 "Ils sont les bienvenus ici."
 shandong_events.503.b:0 "Nous n'avons pas besoin d'eux."

 shandong_events.504.t:0 "Un pari effréné"
 shandong_events.504.d:0 "Les événements ont pris une tournure choquante, et il semblerait que le monde souterrain de la politique de Beijing se soit dévoilé à l'échelle nationale. Il s’avère que l’emprise de fer du maréchal de Jade, du roi de Baoding, de Wu Peifu et de Cao Kun, , était moins solide qu’on ne le croyait à l’échelle internationale. Après leur inaction lors de l’effondrement de la Ligue, la clique Zhili a été plongée dans un sentiment de désarroi. Sentant à la fois l’opportunité et la faiblesse de leurs ennemis, les membres de la famille royale mandchoue se sont entendus avec le gouverneur Yan Xishan du Shanxi pour éjecter le Zhili des provinces centrales.\n\nMais l'histoire s'est répétée et Wu Peifu a une fois de plus défié les pronostics et les a retournés en sa faveur. Selon les informations disponibles, la tentative de coup d'État a échoué de manière spectaculaire et a insufflé au nouveau « Protecteur national » un esprit de vengeance et de vigueur. La clique Zhili semble à présent déterminée à s'engager sur le sentier de la guerre contre la clique Jin de Yan Xishan et le Guominjun de Feng Yuxiang.\n\nIl reste cependant une opportunité pour [SHD.GetLeader] de passer du statut de simple province au niveau national. Il faut bien sûr que ses armées puissent combattre celles du Maréchal de Jade à armes égales, ce qui n'est pas vraiment le cas."
 shandong_events.504.a:0 "Prenez l'initiative ! Pour l'Empereur !"
 shandong_events.504.b:0 "Nous serions fous de lutter contre le Maréchal de Jade."

 shandong_events.505.t:0 "Coup d'État à Jinan"
 shandong_events.505.d:0 "Pendant 12 ans, la province du Shandong a été dirigée par Zhang Zongchang, un homme décrit comme le seigneur de guerre "le plus bas" de Chine pour sa corruption et son extravagance même selon les standards chinois. Mais cette situation a connu une fin surprenamment brusque. Tôt dans la matinée, un contingent d'infanterie Qing, apparemment sur les ordres de [SHD.GetLeader], est entré à Jinan et a pris d'assaut la maison de Zhang, l'emmenant menotté à Beijing pour répondre de ses crimes.\n\n[SHD.GetLeader] a donc été nommé nouveau gouverneur du Shandong. Monarchiste fervent et général compétent, cette nomination marque l'entrée de la province dans l'orbite des Qing."
 shandong_events.505.a:0 "Ça n'est pas bon du tout."
 shandong_events.505.b:0 "Une menace de moins."
 shandong_events.505.c:0 "Fascinant."

