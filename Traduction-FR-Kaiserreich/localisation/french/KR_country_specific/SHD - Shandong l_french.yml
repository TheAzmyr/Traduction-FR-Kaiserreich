 #屈映光
 SHD_qu_yingguang:0 "Qu Yingguang"
 SHD_qu_yingguang_leader_desc:9 "§YNaissance :§! §L14 mars 1883, à Linhai, province de Zhejiang, Grand Qing§!\n§YCarrière :§! §LQu Yingguang a été inspiré par Qiu Jin pour devenir révolutionnaire, mais il s'est plus tard aligné sur les cliques de l'Armée de Beiyang. En 1919, Qu fut nommé gouverneur du Shandong, qui devint pour lui une province d'adoption. Il se distingua en tant que bon dirigeant, améliorant la gestion du fleuve Jaune et s'efforçant de protéger l'héritage religieux et culturel de la province, en partie en favorisant les liens avec le duc Yansheng. Des années plus tard, il rejoignit le gouvernement de Beiyang et se rapprocha de Duan Qirui. Les deux hommes sont des adeptes du bouddhisme, une croyance que Qu a apprise du côté maternel de sa famille. Il a passé du temps à travailler avec des sociétés religieuses et des organisations caritatives, ce qui lui a valu le nom bouddhiste de "Faxian" et le surnom de "Qu Bodhisattva". Mécontent de l'autoritarisme et de la corruption qui règnent à Beijing, il s'installa à Shanghai peu avant le renversement de Duan en 1926.\n\nLe Soulèvement de Shanghai en 1932 dévasta son organisation caritative, "l'Alliance de la Bienveillance", dont on craignait qu'elle ne soit infiltrée par des agents syndicalistes. Il fuit la ville comme beaucoup de ses pairs, choisissant de retourner au Shandong, mais y fut témoin de l'horreur que le "plus bas seigneur de guerre" de la Chine, Zhang Zongchang, avait fait régner dans la région avec l'opium et la débauche. Grâce à des liens avec des membres de l'Association antidrogue du Shandong, ainsi qu'avec des amis comme le duc Yansheng et des alliés à Beijing, son Alliance de la Bienveillance fut reformée à Qufu sous le nom de "Société pour le rétablissement de la Bienveillance". Bien qu'il se soit rarement opposé publiquement au gouverneur Zhang, Qu a entamé des pourparlers secrets avec le Zhili et la Cour impériale, cherchant un moyen d'extraire la corruption du Shandong par la racine. Qu estime que la Chine doit vaincre la corruption et le péché, ce qu'un ordre politico-religieux soutenu par un Empereur est le mieux à même de réaliser. Il se méfie des princes mandchous, mais soutient l'Empereur Puyi, qui l'a reçu une fois en audience. Il est très intéressé par les sympathies bouddhistes de Puyi, car il en est venu à penser que l'Empereur est le meilleur candidat pour imposer un ordre politique harmonieux et dharmique en Chine.§!"

 #張宗昌
 SHD_zhang_zongchang: "Zhang Zongchang"
 SHD_zhang_zongchang_leader_desc:9 "§YNaissance :§! §L13 février 1881, à Yixian, province du Shandong, Grand Qing§!\n§YCarrière :§! §LZhang Zongchang n'éprouvait pas de grande fierté nationale pour Qingdao lorsqu'elle fut perdue en 1897 au profit de l'Allemagne, mais la Révolution de 1911 le poussa à l'action. Arrivé à Shanghai pour prêter allégeance à la République, il se lia avec Feng Guozhang et rejoignit la Clique du Zhili lorsqu'elle émergea en 1917. Mais lorsque Feng mourut en 1919, Zhang retourna en Mandchourie et rejoignit la Clique du Fengtian juste à temps pour participer à la première guerre entre le Zhili et le Fengtian en 1922. La défaite du Fengtian dans cette guerre ne le découragea pas et il joua un rôle important dans la seconde guerre en 1924, capturant la passe cruciale de Lengkouguan. Après l'effondrement quasi-total de la Clique du Zhili du Nord à la suite du coup d'État de Beijing, Zhang conquit le Shandong et poussa jusqu'à Nanjing et Shanghai dans le sud du pays. Sa capacité à utiliser efficacement les chemins de fer ainsi que le charisme inhabituel d'un homme qualifié de « sale », même par ses alliés, lui ont permis de remporter victoire sur victoire. Après une période de débauche dans la ville la plus internationale de Chine, Zhang se retrancha complètement dans le Shandong et, à la suite de guerres successives pour le Jiangsu, se retrouva piégé dans la province lors de la quatrième guerre Zhili-Fengtian en 1928. Depuis, le Shandong est devenu à la fois un refuge et une prison, où sa présence illégale mais tolérée reste dans l'ombre du gouvernement Qing de Beijing. Plus récemment, une maladie apparemment incurable l'a poussé à gravir les 6 600 marches pour se rendre chez un médecin du Yiguandao. Zhang a fini par rencontrer l'Honorable Professeur du Yiguandao, Zhang Tianran lui-même. Qu'il s'agisse de sa maladie ou de l'absence de toute autre activité sur le mont Tai, le Général Viande-de-Chien a promis à l'Honorable Professeur de suivre le mode de vie ésotérique prôné par la secte pour préserver sa santé.§!"

 #張天然
 SHD_zhang_tianran: "Zhang Tianran"
 SHD_zhang_tianran_leader_desc:9 "§YNaissance :§! §L15 août 1889, à Jining, province du Shandong, Grand Qing§!\n§YCarrière :§! §LZhang Tianran n'avait aucune ambition dans sa vie jusqu'à ce qu'il soit introduit au culte de Lu Zhongyi. Lu Zhongyi était le chef d'un petit groupe de syncrétistes religieux appelé Yinguandao en 1918. Lu Zhongyi avait toujours prévu que sa sœur Lu Zhongjie lui succède à la tête du Yinguandao, et avait même reconnu sa supposée divinité en tant que réincarnation du dieu bouddhiste Guan Yin. Un schisme théologique s'opéra après la mort de Lu Zhongyi en 1930, lors duquel Lu Zhongjie emmena ses fidèles loyalistes hors du Yinguandao et déménagea vers Henan, où ils résident encore aujourd'hui. Zhang Tianran, ayant la confiance totale de ses membres ainsi qu'une femme nouvellement divinisée, Sun Suzhen, commença à faire des révélations surprenantes. En 1922, Zhang Tianran avait bâti un autel sur le Mont Tai, qui grandit au point d'absorber les autres monastères de la montagne. En 1924, le Mont Tai était devenu la résidence permanente de l'Honorable Professeur et de son cercle proche. La même année, une séance d'écriture spirituelle a prédit que l'Empereur Puyi risquait d'être empoisonné, et un voyage à Beijing fut planifié. Zhang Tianran amusa et flatta l'Empereur Puyi en lui promettant que le Yiguandao renforcerait la loyauté envers les Qing par la charité et la guerre si nécessaire. Les premières Lances rouges et Grandes épées arrivèrent au mont Tai en 1925. La plus belle prise fut la conversion supposée de Zhang Zongchang par Zhang Tianran en 1935.§!"

 #李藻麟
 SHD_li_zaolin: "Li Zaolin"
 SHD_li_zaolin_sic_desc:9 "§YNaissance :§! §L1892, à Beijing, province du Zhili, Grand Qing§!\n§YCarrière :§! §LIssu d'une famille paysanne et ayant perdu son père dès son enfance, Li Zaolin dut trouver refuge chez son oncle, mais la pauvreté l'empêcha de poursuivre ses études. Sa carrière militaire débuta en 1909 lorsqu'il entra à l'Académie militaire de Baoding à l'âge de 17 ans, sur recommandation d'un ami. Après trois années d'études difficiles dans la filière infanterie, il rejoignit la 3e division en tant que sous-officier sous les ordres de Cao Kun et Wu Peifu.\n\nÀ la suite de la création d'une force aérienne par Yuan Shikai en 1913, Li étudia à l'école d'aviation de Nanyuan et fit partie de la première promotion de pilotes chinois en 1915. En tant que commandant d'escadrille, lorsque la guerre de protection nationale éclata, Li fut envoyé par Yuan pour démontrer le prestige militaire grâce à ses talents de pilote sous les ordres de Feng Yuxiang. Li retourna à Beijing et s'inscrivit à la 5e promotion de l'École d'état-major en 1916, mais il rejoignit spontanément les forces de Zhang Zongchang dans le Hunan en tant qu'officier d'état-major en 1917 pour combattre l'Armée de Protection de la Constitution et acquérir de l'expérience sur le terrain. Comme cette initiative n'était pas officiellement autorisée, il fut déclaré porté disparu à un moment donné. Après avoir obtenu son diplôme en 1919, cet officier exceptionnel devint tuteur à Baoding.\n\nLors de la Première Guerre Zhili-Fengtian en 1922, Li occupa le poste d'état-major de Peng Shouxin au sein de l'armée du Zhili (avec une reconnaissance officielle cette fois-ci). Lors de la Deuxième Guerre Zhili-Fengtian, en tant que chef d'état-major du 1er corps d'armée du Zhili sous les ordres de Peng, Li fut capturé et recruté par la Clique du Fengtian après avoir repoussé plusieurs offensives du Fengtian à Shanhaiguan avant d'être encerclé (on raconte que Zhang Xueliang l'aurait rencontré en personne après sa capture). Découragé par sa défaite, Li tenta de retourner secrètement à Beijing, mais les hommes de Zhang Zongchang l'interceptèrent à la gare et le persuadèrent de travailler à nouveau avec le Général Viande-de-Chien. Depuis lors, Li occupe le poste de chef d'état-major de Zhang, l'aidant à superviser les affaires militaires, en particulier après qu'il eut pris le contrôle du Shandong.§!\n\n§YNotes : Bien que Li ait travaillé avec plusieurs personnalités de premier plan, sa loyauté ne fait aucun doute, car il désapprouve fermement toute action allant à l'encontre de ses supérieurs.§!"

