 #馬良
 SHD_ma_liang:0 "Ma Liang"
 SHD_ma_liang_high_command_desc:9 "§YNaissance :§! §L1878, comté de Qingyuan, province du Zhili, Grand Qing§!\n§YCarrière :§! §LHui originaire du Hebei, Ma Liang est un homme particulièrement aguerri et rompu aux aléas de la vie. Diplômé de l'Académie militaire de Beiyang, Liang servit comme commandant d'un bataillon de la Nouvelle Armée de Beiyang, avant de devenir commandant du 5e régiment de l'Armée de Beiyang en 1911. Curieusement, il étudia la lutte auprès du célèbre lutteur Ping Jingyi, et veilla à ce que la plupart de ses subordonnés pratiquent également ce sport.\n\nEn 1912, il fut engagé au service de Jin Yunpeng, puis muté au poste de commandant de la 47e brigade mixte dans le Shandong. En 1916, il fut promu commandant de la garnison de Jinan, puis devint commandant de la 2e division de l'armée chinoise engagée dans la Weltkrieg ; cette division fut finalement réorganisée en Armée de Défense de la Frontière Nord-Ouest, tout en restant stationnée dans le Shandong.\n\nMobilisé pour combattre lors de la Guerre Zhili-Anhui, Ma Liang fut démis de ses fonctions après la défaite de l'Anhui. Après avoir pris une retraite anticipée, Ma s'installa à Jinan et rédigea "Les nouveaux arts martiaux chinois". Encouragé par la montée en flèche de la criminalité, du trafic de drogue et du déclin général des mœurs dans le Shandong, Ma Liang renonça à sa retraite et entra en contact avec Qu Yingguang grâce à sa participation à l'Association anti-drogue. Il finit par devenir membre fondateur de l'Alliance de la Bienveillance et de la "Société pour le Rétablissement de la Bienveillance", devenant ainsi le bras droit de Qu dans les affaires liées à la lutte contre la drogue.§!"

 #李景林
 SHD_li_jinglin: "Li Jinglin"
 SHD_li_jinglin_army_chief_desc:9 "§YNaissance :§! §L1885, à Zaoqiang, province du Zhili, Grand Qing§!\n§YCarrière :§! §LFaisant sa première apparition sur la scène publique en tant que diplômé de l'École de l'Armée de Beiyang à Baoding en 1907, Li Jinglin fut l'un des centaines de jeunes officiers pris dans la vague d'activités militaires partisanes. Li reçut sa première décoration importante lors de la répression du Soulèvement de Wuchang en 1911. Son association avec le général de l'Anhui Qu Tongfeng le conduisit vers la politique des cliques pendant les années républicaines. À l'instar de Qu Tongfeng, qui fut exclu de la Clique de l'Anhui pour corruption, Li se retrouva à la dérive et rejoignit la Clique du Fengtian en 1924. Le grand maréchal Zhang Zuolin réaffecta Li cette année-là auprès de Zhang Zongchang, qui combattait dans le Zhili. Li fut d’abord impressionné par les capacités de Zhang Zongchang malgré son manque de manières, mais cette opinion s’assombrit dès 1928, lorsque le Général Viande-de-Chien s’enracina dans le Shandong. Li, malgré ses antécédents de corruption, ne parvint pas à payer correctement sa division avec les impôts honnêtement perçus dans le Shandong. Li, s'inspirant de la proclamation de Xue Dian comme empereur mineur du Yiguandao au Shandong, décida de se présenter comme un être spirituellement éclairé. Li commença à s'entraîner publiquement à l'art de l'épée de Wudang et se donna le nom de "l'Épée magique" pour se donner un air de mystère. Cela finit par attirer l'attention de Zhang Tianran, qui proposa à plusieurs reprises à Li de s'entraîner avec les milices de la Grande Épée à Taishan.§!"

 #張懷芝
 SHD_zhang_huaizhi: "Zhang Huaizhi"
 SHD_zhang_huaizhi_high_command_desc:9 "§YNaissance :§! §L1862, à Dong'e, province du Shandong, Grand Qing§!\n§YCarrière :§! §LNé dans la pauvreté à une époque marquée par l'humiliation, Zhang Huaizhi commença sa vie comme agriculteur, ballotté par les aléas de la misère. La famille Zhang, voyant un avenir dans les entreprises occidentales du nord, fit déménager Huaizhi à Tianjin dès son plus jeune âge. Alors qu'il était élève à l'école d'armement de Tianjin, Zhang Huaizhi prit part à la révolte des Boxers avec son régiment et fut félicité pour avoir bombardé le quartier des Légations. La culpabilité d'avoir perdu face aux Occidentaux poussa Zhang, tombé en disgrâce, à rejoindre l'armée de Yuan Shikai, dont l'ambitieux objectif de devenir empereur semblait à Zhang une évolution plus naturelle que le républicanisme. Après la mort de Yuan, Zhang se rallia à la Clique de l'Anhui et servit brièvement sous les ordres de Zhang Shuyuan en tant qu'administrateur dans le Shandong en 1918. Zhang finit par trahir à nouveau son chef après la défaite de son régiment au Hunan. Zhang Huaizhi se retrouva alors à nouveau sans ressources, et les seuls à vouloir l'accueillir furent les Yiguandao. Invoquant son âge, son expérience et ses services contre l'impérialisme occidental, Zhang Tianran nomma Zhang Huaizhi commandant des Lances rouges du Shandong.§!"

 #徐源泉
 SHD_xu_yuanquan: "Xu Yuanquan"
 SHD_xu_yuanquan_high_command_desc:9 "§YNaissance :§! §L1886, à Huangzhou, province du Hubei, Grand Qing§!\n§YCarrière :§! §LXu débuta sa carrière militaire à l'Académie d'équipement militaire du Hubei, où il excellait dans ses études. Dans les années 1910, il fut admis à la IVe École militaire de Nanjing, où il s'engagea politiquement. En 1912, Xu collabora avec le Gouvernement provisoire de Nanjing, ralliant les étudiants à la cause révolutionnaire contre la dynastie Qing. Xu utilisa cette position politique pour diriger le régiment de cavalerie de Guangfu en 1913, passant également un bref moment au Xinjiang. Xu fut envoyé avec le 6e bataillon de la Brigade mixte dans le Shandong pour le compte du KMT afin de sécuriser la province. Xu ne parvint pas à sécuriser la province à l'arrivée de Zhang Zongchang en 1926. Xu choisit de trahir le KMT et de livrer sa brigade à Zhang, tout en restant indigne de confiance à ses yeux. Xu joua un rôle déterminant en attisant le sentiment d'insécurité de Zhang, ce qui le poussa finalement à rester au Shandong pendant l'offensive de 1928. Xu développa une dépendance à l'opium pendant cette période et se rendit complice du trafic de drogue au Shandong, ce qui entraîna une baisse de la discipline dans ses rangs.§!"

 #小日向白朗
 SHD_hakuro_kohinata: "Kohinata Hakurō"
 SHD_hakuro_kohinata_high_command_desc:9 "§YNaissance :§! §L1900, à Sanjo-shi, Niigata, Empire du Japon§!\n§YCarrière :§! §LDès son plus jeune âge, Kohinata s'intéressait aux récits de Fukushima Yasumasa sur le Tibet, la Chine et l'Allemagne, pays lointains. Il concrétisa cet intérêt en embrassant une carrière militaire, d'abord en s'engageant dans l'Armée japonaise du Kwangtung, où il servit en tant que colonel sous les ordres de Banzai Rihachiro en Mandchourie. Kohinata déserta l'armée du Kwangtung en 1920 pour se rendre dans la mystérieuse ville d'Urga, en Mongolie, mais fut capturé par des bandits au cours de son voyage. Les bandits prirent Kohinata en affection et lui permirent de rejoindre leur bande de voleurs de chevaux. Ces voleurs de chevaux enseignèrent à Kohinata le taoïsme et les arts martiaux, et lui offrirent un pistolet Browning orné d'un dragon, qu'il surnomma le "Petit Dragon Blanc" - ce qui devint par la suite un surnom populaire pour Kohinata lui-même. Lorsque la dynastie Qing fut rétablie, Kohinata commença à se faire appeler Shao, dissimulant ainsi ses origines japonaises. Kohinata fut capturé par Zhang Zuolin et initialement condamné à mort, mais il fut gracié à condition de servir Zhang Zongchang en 1928. Kohinata rejoignit la Clique de Zhang et joua un rôle déterminant dans le maintien d'un corps de cavalerie flexible au sein de l'armée, afin de contrer les innovations militaires plus avancées observées ailleurs.§!"

 #伊達順之助
 SHD_junnosuke_date: "Date Junnosuke"
 SHD_junnosuke_date_high_command_desc:9 "§YNaissance :§! §L1892, à Tokyo, Empire du Japon§!\n§YCarrière :§! §LDate est le benjamin du clan Date, une lignée respectée et ancienne. À l’origine, le clan Date était composé de samouraïs de la province de Mutsu et comptait parmi ses membres des ministres de haut rang. Ce sont ses relations familiales qui lui ont sauvé la vie lorsqu’en 1909, il a assassiné un camarade appartenant à un gang rival. Date échappa à l'exécution grâce au travail juridique d'Iwai Saburo, le premier détective du Japon. Pendant son séjour en prison, Date rejoignit l'Église Oomoto, très populaire auprès des jeunes officiers à l'époque. Date fut libéré de prison en 1916 et se rendit en Mandchourie. Un complot visant à assassiner Zhang Zuolin, orchestré par le prince Yamagata Aritomo, se heurta à la colère de Zuolin, forçant Date à lui jurer allégeance. Date s'engagea dans l'armée du Général Viande-de-Chien en 1929, initialement pour enseigner les tactiques de cavalerie japonaises aux mercenaires. Membre sobre de la Clique de Zhang, Date emporte la bannière de sa famille dans la guerre pour la Chine.§!"

 #孫殿英
 SHD_sun_dianying: "Sun Dianying"
 SHD_sun_dianying_army_chief_desc:9 "§YNaissance :§! §L1888, à Yongchang, province du Henan, Grand Qing§!\n§YCarrière :§! §LSun Dianying a grandi dans la pauvreté, convaincu qu’il descendait du grand général Ming Sun Chengzong, et entretenant une rivalité avec le descendant légitime, Sun Yue. Dès son plus jeune âge, Sun se disputait avec ses professeurs et, après avoir abandonné ses études, il incendia son école. Il devint ensuite accro au jeu et à l’opium, et rejoignit le bandit de Yangshan, Zhang Ping, alors qu’il n’était encore qu’un enfant. Sun rejoignit également la Société de la Route du Temple, une religion populaire, et finit par occuper un poste de direction au sein de cette société. Sun convainquit la société de rejoindre la Force de Pacification du Mont Song, un groupe anti-banditisme composé d'anciens bandits. Après avoir été mis en déroute et avoir assisté au suicide de Han Yukun en 1925, Sun déserta avec des soldats fidèles. Ces soldats entrèrent à Bozhou, dans l'Anhui, et prêtèrent serment d'allégeance au KMT pour se faire passer pour des loyalistes. Lorsque l'Expédition du Nord s'effondra en 1927, Sun emmena ses hommes au Ningxia. Là-bas, les soldats firent preuve d'une extrême violence en pillant les campagnes, attribuant une signification religieuse à leur banditisme. La Clique des Ma riposta, et les bandits de Sun se retirèrent au Shandong en 1928. Sun Dianying fut gracié par Zhang Zuolin dans le cadre d'un accord visant à rejoindre la Clique de Zhang.§!"

 #張敬堯
 SHD_zhang_jingyao: "Zhang Jingyao"
 SHD_zhang_jingyao_high_command_desc:9 "§YNaissance :§! §L1881, à Huoqui, province de l'Anhui, Grand Qing§!\n§YCarrière :§! §LZhang montra très jeune des penchants criminels, ayant été accusé de meurtre à l’âge de 15 ans dans la province de l'Anhui. Peu après, Zhang quitta l’Anhui pour se rendre à Beijing, où il entra dans l’entourage de Yuan Shikai. En 1911, Zhang suivit une formation à l’Académie militaire de Baoding, puis fut affecté au 22e régiment de la 11e armée sous les ordres de Yuan Shikai. En 1913, Zhang fit appel et fut transféré dans une division de marines pour combattre le Kuomintang. Au cours de cette campagne, il s'empara de Luzhou, dans le Sichuan, en 1915. Zhang trahit Yuan Shikai et rejoignit la Clique de l'Anhui en 1917. Zhang se vit confier le poste de gouverneur du Hunan en 1918, mais son règne brutal, sous le surnom de Boucher du Hunan, suscita rapidement un mouvement visant à l'expulser, et il fut destitué de ses fonctions au Hunan le 11 juin 1920. Jingyao décida alors de se livrer à des manœuvres frauduleuses entre la Clique de l'Anhui, puis plus tard auprès de Zhang Zongchang après la montée en puissance de la Ligue des Huit Provinces. Zhang devint le chef de la 2e armée du Général Viande-de-Chien en 1926 et changea son nom en Chang Shigu pour dissimuler son mandat d'arrêt pour meurtre. Zhang Jingyao est connu pour croire à n'importe quelle conspiration qu'on lui raconte et pour être impliqué dans au moins la moitié d'entre elles.§!"

 #曲同豐
 SHD_qu_tongfeng: "Qu Tongfeng"
 SHD_qu_tongfeng_army_chief_desc:9 "§YNaissance :§! §L1873, à Yantai, province du Shandong, Grand Qing§!\n§YCarrière :§! §LÀ l'âge de 16 ans, Tongfeng s'engagea dans la Flotte de Beiyang et servit comme ingénieur à bord du cuirassé Dingyuan, véritable merveille de la modernité dans le nord de la Chine. Se rangeant du côté de Yuan Shikai, Qu entra à l'École navale de Tianjin, puis poursuivit ses études à l'Académie de l'Armée impériale japonaise, dont il sortit diplômé en 1904. De retour en Chine, Qu occupa le poste d'instructeur à l'Académie des sciences militaires de Wuyang en 1910. Après avoir initialement coopéré avec les républicains lors du Soulèvement de Wuchang en 1911, Qu occupa divers postes au sein de la République, avant de revenir brièvement auprès de Yuan puis de diriger le Bureau des affaires militaires du Shandong en 1916. En 1917, Qu conclut un accord avec Li Yuanhong pour vendre au Japon les droits miniers d'une mine d'aluminium du Shandong et autoriser les expéditions depuis Yantai. En 1920, la Clique de l'Anhui, en conflit avec Li Yanhong, annula ce droit et convoqua Qu à Nanjing pour qu'il y soit jugé. Plutôt que de se présenter au procès, Qu feignit la maladie et reporta son voyage jusqu'à ce que la Clique de l'Anhui se désintéresse de l'affaire en 1925. Une lettre de Sun Yat-sen, lui demandant de se rallier contre Wu Peifu, le poussa à agir, et il tenta d'organiser une force dans le Shandong pour se joindre à la cause. Cette force décida d'affronter Zhang Zongchang dès son arrivée dans le Shandong en 1926, mais elle fut sévèrement battue, et Qu dut se cacher. L'absence d'autorité centrale, ainsi que le sentiment que Sun Yat-sen lui avait ordonné de se battre et qu'il avait échoué, pesaient lourdement sur Qu. Ce dernier fut alors invité au Fengtian par Zhang Zuolin, qui lui proposa de le racheter s'il rejoignait la Marine de Beiyang. Qu, se méfiant de la présence japonaise en Mandchourie, refusa et partit. Qu fut rappelé une nouvelle fois, lorsque l'actuel dirigeant du Shandong demanda son retour dans la province, motivé par une promesse faite à Sun Chuanfang de combattre.§!"

 #靳雲鶚
 SHD_jin_yune: "Jin Yun'e"
 SHD_jin_yune_high_command_desc:9 "§YNaissance :§! §L1887, dans la province du Shandong, Grand Qing§!\n§YCarrière :§! §LIssu d'une famille paysanne pauvre, Jin Yun'e est le frère cadet de Jin Yunpeng, célèbre dignitaire de la clique de l'Anhui. Contrairement à son aîné, Yun'e passa toutefois une grande partie de son enfance à travailler dans les champs.\n\nDans l'espoir d'une vie meilleure, Jin Yun'e s'engagea en 1898 comme simple soldat dans la Nouvelle Armée de Yuan Shikai, avant d'être promu au grade d'officier subalterne. Sa carrière militaire se poursuivit lorsqu'il fut sélectionné pour étudier à l'Académie accélérée d'état-major de Baoding, où il devint officier d'état-major, ce qui lui ouvrit la voie à une promotion ultérieure. En 1918, sur recommandation de Cao Kun, Jin devint commandant de brigade et intégra ainsi la clique du Zhili. Cependant, Wu Peifu se méfiant de la relation entre Jin et son frère aîné, Jin Yun'e se trouva dans l'impossibilité de gravir les échelons. La promotion de Jin Yun'e fut visiblement plus lente que celle de presque tous ses collègues de la clique du Zhili, malgré sa contribution aux Guerres Zhili-Fengtian. Cela sema le germe du mécontentement dans son cœur, qui ne fit que grandir lorsque Jin, qui n'avait été promu commandant de division qu'en 1923, soit trois ans plus tard que les autres, fut envoyé au Shandong.\n\nC'est pourquoi, lorsque Zhang Zongchang a consolidé son pouvoir dans sa province d'origine, Jin Yun'e ne lui a pas opposé de résistance, mais a collaboré avec lui de manière indirecte, bien qu'il fût censé appartenir au groupe du Zhili. En tant que commandant relativement indépendant et indifférent à la politique, Jin Yun'e est prêt à s'allier avec n'importe qui, pourvu qu'il puisse conserver son statut.§!"

 #褚玉璞
 SHD_chu_yupu:0 "Chu Yupu"
 SHD_chu_yupu_commander_desc:9 "§YNaissance :§! §L1887, comté de Wenshang, province du Shandong, Grand Qing§!\n§YCarrière :§! §LIssu d'une famille de propriétaires terriens dont la fortune était en fort déclin depuis la génération de son père, personne ne s'étonne que Chu Yupu, qui avait échoué à deux reprises à son admission à l'Académie militaire de Baoding, soit devenu l'un des bandits les plus célèbres de sa province natale.\n\nDéçu de ne pas avoir pu embrasser une véritable carrière militaire, Chu décida de devenir un Lulin (un mélange de triades et de bandits) et gagna sa vie en commettant des vols avec une bande de voyous. On raconte que sa première troupe de bandits lui fut confiée par un chef de bandits qu’il avait secouru lors d’un de ses raids contre une prison Qing. Plus tard, en 1913, Chu et ses bandits furent intégrés aux forces de Zhang Zongchang, et ils collaborèrent étroitement par la suite. Chu Yupu, qui entama de manière inattendue une carrière militaire, gravit progressivement les échelons de l’armée de Zhang, le suivant pour s’aligner sur la Clique du Fengtian et menant d’innombrables guerres aux côtés des Zhang. Chu fut finalement promu commandant de corps d'armée et quartier-maître général pour ses mérites après que Zhang Zongchang eut consolidé son pouvoir dans le Shandong.\n\nAujourd'hui, en tant que l'un des dignitaires de la clique de Zhang, Chu est un subordonné de confiance et un ami du Général Viande-de-Chien, et il est plus que disposé à soutenir ce dernier en tirant parti de ses forces "irrégulières" et de son expérience dans la conduite de la guerre non conventionnelle.§!"

 #陸錦
 SHD_lu_jin: "Lu Jin"
 SHD_lu_jin_high_command_desc:9 "§YNaissance :§! §L1879, à Tianjin, province du Zhili, Grand Qing§!\n§YCarrière :§! §LEntré à l'Académie militaire de Beiyang à l'âge de 20 ans, Lu Jin faisait partie des nombreux étudiants chinois envoyés étudier les méthodes militaires japonaises ; il obtint finalement son diplôme de l'Académie de l'Armée impériale japonaise et revint en Chine en 1903 pour enseigner à l'École d'études militaires de l'Académie de Beiyang. Il commença à fréquenter les Cliques du Zhili et de l'Anhui au sein de l'Armée de Beiyang, s'appuyant sur des relations politiques pour obtenir plusieurs postes de haut rang dans les provinces du Zhili et du Shandong, où il se constitua à son tour un réseau local. Jin ne resta cependant jamais assez longtemps au même endroit pour s'y enraciner véritablement, et il passa sans cesse d'une clique militaire à l'autre. En 1917, il devint un fervent partisan de la tentative de Restauration mandchoue menée par Zhang Xun et fut comblé d'éloges et de titres militaires archaïques par le reste des putschistes. Lorsque la Restauration échoua, Jin parvint néanmoins à préserver sa carrière militaire, mais il s'enfonça davantage dans les intrigues de la Clique du Zhili et devint de plus en plus tributaire de l'influence de Cao Kun et de Wu Peifu. Il dut finalement fuir le pays après le Coup d'État de Beijing mené par Feng Yuxiang en 1924, trouvant refuge temporairement au Japon, avant de rejoindre les membres de la Clique de l'Anhui. Au moment où le Zhili reprit le pouvoir, Jin était une force politique épuisée. Malgré ses références au sein de la clique du Zhili et son engagement monarchiste, ses tentatives pour demander à la clique du Zhili ainsi qu’à l’empereur Xuantong, récemment réintronisé, de le réintégrer à son poste dans l’armée échouèrent. Incapable de progresser politiquement parmi les anciens membres de la clique de l'Anhui au Fengtian, Jin erra entre Beijing, Tianjin et le Shandong, finissant par entrer en contact avec Qu Yingguang.\n\nLes deux hommes se sont liés d'amitié grâce à leurs convictions monarchistes communes, à leur haine de la corruption endémique au sein du gouvernement de Beijing et à leurs origines communes, tous deux étant originaires de la province du Zhejiang. Même si Lu Jin était né à Tianjin, sa famille était originaire du Zhejiang, ce qui lui valut le respect de Qu Yingguang. Il fut finalement recruté comme membre de l'Association antidrogue du Shandong et de l'Association de Bienfaisance, sous un prétexte fallacieux lui permettant d'aider légalement à organiser la branche militaire du mouvement politique de Qu Yingguang, à l'abri des regards indiscrets de la Clique du Zhili.§!"

 #吳化文
 SHD_wu_huawen: "Wu Huawen"
 SHD_wu_huawen_commander_desc:9 "§YNaissance :§! §L1904, à Laizhou, province du Shandong, Grand Qing§!\n§YCarrière :§! §LWu Huawen est né dans une famille paysanne chrétienne du Shandong, mais il accompagna son père à Mengcheng, dans la province de l'Anhui, à l'âge de 7 ans. Différentes versions circulent quant à la vie qu'a menée le jeune Huawen : il s'est parfois vanté d'être issu d'une riche famille paysanne et d'avoir obtenu son diplôme dans une école missionnaire privée, tandis qu'à d'autres moments, il affirmait avoir survécu à peine, tel un jeune paysan affamé. Dans l'une de ces versions, il s'est engagé dans l'armée en tant qu'étudiant ambitieux et nationaliste, tandis que dans l'autre, il s'est enrôlé après qu'une inondation eut détruit sa maison. Quoi qu'il en soit, l'adolescent Huawen a d'abord servi comme cuisinier et effectué d'autres tâches subalternes avant que l'on ne se rende compte qu'il savait lire et écrire et qu'il soit nommé messager. Il fut ensuite envoyé servir dans une garnison à Jinan, sous le commandement du général Feng Yuxiang, alors aligné sur le Zhili. Huawen se lia d'amitié avec son commandant grâce à leurs convictions religieuses communes, et Feng s'attacha au jeune homme ; il se porta garant de ses qualifications et l'envoya à Beijing pour suivre une formation militaire complète en 1923. Après avoir changé plusieurs fois d'établissement, il obtint finalement son diplôme de l'Académie militaire de Beiyang en 1927, l'année même où son mentor, Feng Yuxiang, fut chassé de Beijing par la Clique du Zhili. Huawen dénonça rapidement Feng et chercha à s'attirer les faveurs de la Clique du Zhili, ce qui lui valut un poste d'enseignant dans le Henan ; il fut finalement nommé en 1930 commandant de la garnison de Jinan, celle-là même où il avait autrefois servi. C'est là qu'il fit cause commune avec le gouverneur Zhang Zongchang et tomba dans sa tristement célèbre "Clique de Zhang". Huawen gravit rapidement les échelons de la hiérarchie corrompue du Général Viande-de-Chien et finit par rompre ses liens avec la Clique du Zhili. On sait qu’il s’est taillé un territoire à Jinan et qu’il a noué des contacts avec d’autres forces politiques de la province, au cas où la chance lui tournerait. Son habitude de changer fréquemment de camp entre différents généraux et de raconter des versions contradictoires de son passé lui a valu une réputation de personnage indigne de confiance. Il porte deux surnoms tristement célèbres : le premier est "Le bâtard aux trois pères", car tout comme Lu Bu, il a servi trois maîtres différents, et le second est "Le général sauteur".§!"

 #李麗久
 SHD_li_lijiu: "Li Lijiu"
 SHD_li_lijiu_high_command_desc:9 "§YNaissance :§! §L1897, à Ningjin, province du Zhili, Grand Qing§!\n§YCarrière :§! §LDès son plus jeune âge, Li Lijiu était de santé fragile et dépendant. D’après ses propres récits ultérieurs, Li Lijiu aurait été guéri par un adepte du Yiguandao grâce à la médecine traditionnelle. Cette guérison fit de Li Lijiu, une fois adulte, un fervent croyant. C’est à cette époque que le jeune Li Lijiu commença à étudier les arts martiaux. En 1925, il fut entraîneur d'arts martiaux pour l'armée du Henan. Depuis lors, il a côtoyé divers seigneurs de la guerre. En 1935, Li vint à Nanjing et séjourna chez son maître d'arts martiaux, Du Xinwu. Très vite, il se passionna pour le Yiguandao. Le premier versement de la dîme au Shandong propulsa Li Lijiu dans le cercle restreint de Zhang Tianran. Li Lijiu a rendu la pareille en se consacrant aux Sociétés des Lances rouges du Shandong, promettant de libérer Nanjing et, à terme, son ami Zhou Fohai du joug des seigneurs socialistes du KMT.§!"

 #盧永祥
 SHD_lu_yongxiang: "Lu Yongxiang"
 SHD_lu_yongxiang_high_command_desc:9 "§YNaissance :§! §L1867, à Jinan, province du Shandong, Grand Qing§!\n§YCarrière :§! §LLu Yongxiang débuta sa carrière militaire après avoir obtenu son diplôme de l'Académie militaire de Wubian à Tianjin à la fin du XIXe siècle. D'abord comme simple soldat sous les ordres de l'homme d'État Qing Li Hongzhang, puis comme instructeur au sein du bataillon de l'armée Wuwei dans le Shandong. Lu Yongxiang passa la première décennie du XXe siècle à gravir les échelons dans le Shandong, pour finalement diriger la 20e division de la Nouvelle Armée Qing contre la Révolution Xinhai. L'expérience et la loyauté de Lu lui valurent le titre de "baron" dans l'Armée de Beiyang de Yuan Shikai en 1912. Après la mort de Yuan Shikai, Lu rejoignit la Clique de l'Anhui et servit sous ses ordres pendant plusieurs années. Lu Yongxiang mena une attaque infructueuse contre la Ligue dirigée par Sun Chuanfang lors de leur lutte contre la Clique de l'Anhui, et s'enfuit précipitamment au Japon après sa défaite. Refusant d'abandonner sa patrie, Lu Yongxiang demanda au grand maréchal Zhang Zuolin de trouver un moyen de lui permettre de retourner en toute sécurité dans le Shandong. Ce retour s'effectua sous la bannière du général Zhang Zongchang, qui fit de Lu un important outil de propagande dans sa lutte contre l'Expédition du Nord. Lu revint à Jinan pour découvrir que sa ville natale était en proie au vice. Le vieux Lu tomba rapidement dans l'opium, tentant ainsi de renouer avec ses racines.§!"

 #林建章
 SHD_lin_jianzhang: "Lin Jianzhang"
 SHD_lin_jianzhang_navy_chief_desc:9 "§YNaissance :§! §L1874, à Fuzhou, province du Fujian, Grand Qing§!\n§YCarrière :§! §LLin Jianzhang débuta sa carrière navale en faisant immédiatement preuve d'un intérêt marqué et d'une grande audace face aux nouvelles technologies. Originaire du Fujian, Lin s'engagea dans la Marine impériale chinoise et fut diplômé de l'Académie navale de Kiangnan, alors nouvellement créée. Il démontra cette audace lors de la Révolution Xinhai en lançant une mission de sauvetage remontant le fleuve Yangtsé pour aller à la rencontre des républicains. Le Gouvernement provisoire de Nankin récompensa Lin pour cet acte en le promouvant au grade d'amiral et en lui confiant le cuirassé amiral Nan Shun. Cette promotion marqua le début de l'implication de Lin dans la politique chinoise et sa défection finale au profit de la Clique du Zhili. Après la restauration de la dynastie Qing, Lin déclara l'indépendance de sa flotte et fit voile vers Shanghai. Cette action faillit lui coûter la vie, lorsque sa flotte le destitua et l'abandonna à Yantai. Humilié mais compétent, Lin devint la cible idéale pour être recruté par la Clique du Fengtian de Zhang Zuolin, qui lui versait un salaire alors qu’il était chargé de reconstruire une flotte à Yantai.§!"

 #趙洪文國
 SHD_zhao_hong_wenguo: "Zhao Hong Wenguo"
 SHD_zhao_hong_wenguo_commander_desc:9 "§YNaissance :§! §L1881, à Xiuyan, district de Shengjing, Grand Qing§!\n§YCarrière :§! §LHong Wenguo est née dans une famille pauvre et a vécu les événements de la première guerre sino-japonaise à l'âge de 14 ans. Elle a épousé Zhao Yuhuang en 1898, prenant son nom de famille, et a eu cinq fils et trois filles. L'un de ses fils, Zhao Dong, est devenu professeur à l'université de Dongbei. Grâce à son travail acharné, Madame Zhao a gagné le respect de sa communauté villageoise et a amélioré la situation financière de sa famille, leur permettant ainsi d'accéder à une position sociale plus élevée. Lorsque Zhang Zuolin a déclaré sa famille traîtres et bandits en 1930, Zhao a pris les armes pour se défendre. Elle a évacué sa ville de Xiyuan avant l'arrivée de la gendarmerie de Zhang Zuolin, et on raconte qu'elle aurait tiré sur les soldats de Zuolin avec deux pistolets cachés, ce qui lui a valu le surnom de "Grand-mère aux deux pistolets".§!"

 #薛顛
 SHD_xue_dian: "Xue Dian"
 SHD_xue_dian_high_command_desc:9 "§YNaissance :§! §L1887, à Shulu, province du Zhili, Grand Qing§!\n§YCarrière :§! §LUne longue et régulière formation aux arts martiaux Xinji Quan à Tianjin a marqué les premières années de Xue Dian. Xue étudia auprès des maîtres Li Cunyi, Li Taihe et Xue Zhengang. Lorsqu’il fut battu lors d’un combat de défi contre Fu Jianqiu, il dut quitter la ville en raison des règles culturelles régissant la compétition dans les arts martiaux. Xue s'exila en 1925 et se rendit dans le Shandong, où une rencontre fortuite avec Zhang Tianran changea sa vie. Zhang Tianran donna à Xue Dian des leçons de mode de vie et de prière, ce qui permit à Xue Dian de retourner à Tianjin et de battre Fu Jianqiu. En signe de gratitude, Xue Dian fit don de sa demi-part de son académie d'arts martiaux à Tianjin à la Yiguandao et rejoignit l'organisation caritative de la Yiguandao. En 1926, Xue Dian assista à une réunion secrète entre les Lances rouges et Zhang Tianran, et fut nommé Petit Empereur du Shandong sous l'égide de la Yiguandao afin de diriger l'entraînement militaire et spirituel des Lances rouges.§!"

 SHD_boris_annenkov: "Boris Annenkov"
 SHD_boris_annenkov_commander_desc:9 "§YNaissance :§! §L9 février 1889, dans le gouvernement de Kiev, Empire russe§!\n§YCarrière :§! §LBoris Vladimirovitch Annenkov est issu de la noblesse héréditaire russe et a suivi sa formation militaire à l'École militaire Alexandre. Il servit dans l'Armée cosaque de Sibérie et se fit déjà remarquer pendant la Grande Guerre en tant que chef de raids sanglants à longue portée contre les Allemands. Ayant déjà un passé d'insubordination, il refusa de se retirer après le Coup d'État d'Octobre et devint le chef des rebelles blancs en Sibérie centrale. En 1918, Annenkov fut élu ataman en chef de l'Armée cosaque sibérienne et reçut le commandement du 2e corps de la steppe.\n\nAnnenkov mena ses forces à Semirechye et, après une campagne sanglante, devint gouverneur général. Au cours de ses deux années de règne sur Semirechye, des villages entiers furent massacrés au moindre soupçon de sympathies bolcheviques. Ses forces, les Annenkovites, se livrèrent à des pogroms, pillèrent et détruisirent à leur guise jusqu’à ce qu’en 1921, on n’ait plus besoin de lui. Kolchak le dépouilla de ses grades mais autorisa Annenkov à partir pour la Mongolie avec un petit noyau de ses hommes.\n\nAprès avoir pris part à divers combats mineurs à travers la Chine occidentale, ses hommes finirent par rejoindre Shanghai. Le général Zhang Zongchang, alors dirigeant de facto de la ville, engagea Boris Annenkov comme officier pour diriger ses forces mercenaires russes.§!"

 #劉珍年
 SHD_liu_zhennian:0 "Liu Zhennian"
 SHD_liu_zhennian_high_command_desc:9 "§YNaissance :§! §L1898, comté de Nanhong, province du Zhili, Grand Qing§!\n§YCarrière :§! §LAprès avoir débuté sa carrière militaire à l'École d'officiers de Baoding, où il fut admis avec d'excellentes notes, Liu Zhennian fit la connaissance de Li Jinglin et fut affecté comme stagiaire à la section des mortiers du Corps de formation des officiers. Peu après, il fut envoyé à l'Académie militaire du Nord-Est pour acquérir des compétences en artillerie, et obtint son diplôme pour devenir commandant de compagnie de mortiers. Au cours de la Deuxième Guerre ZhiFeng en 1924, Liu commanda notamment six mortiers pour anéantir les positions de l'Armée du Zhili, permettant ainsi à ses camarades de s'engouffrer dans les brèches. S'étant illustré pendant la guerre, il fut promu commandant de bataillon.\n\nAprès une période de convalescence suite à des blessures de guerre, il rejoignit Chu Yupu en tant que commandant de la 16e brigade, puis servit comme commandant du deuxième bataillon du "Régiment modèle. Sous les ordres de Zhang Jingyao, Liu Zhennian participa activement à l'Expédition du Nord, au cours de laquelle il vécut des combats sanglants. Critiquant notamment les performances de Zhang Jingyao pendant la guerre, Liu Zhennian se vit confier le commandement des restes de la deuxième division de Jingyao. Grâce à des mesures drastiques et à un entraînement rigoureux, il réussit à transformer cette division en une force de combat redoutée. Ayant survécu à l’Expédition du Nord, Liu s'aliéna de nombreux membres de la clique de Zhang Zongchang et s’allia donc à Qu Yingguang dans le Shandong. Liu continue de faire preuve d’une ambition sans faille dans la hiérarchie militaire, gravissant lentement les échelons à chaque grande victoire.§!\n\n§YNotes : Ayant eu un morceau de crâne de deux centimètres emporté par une balle, Liu aime souvent qualifier la cicatrice qui en résulte de "fleur du soldat", au grand dam de tous ceux qui en sont témoins.§!"

