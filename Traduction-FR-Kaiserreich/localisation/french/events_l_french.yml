 GAME_OVER_TT: "§RCeci mettrait fin à la partie.§!\n"
 excellent: "Parfait."
 unfortunate: "C'est bien dommage."
 traitors: "Sales traîtres !"
 15_days_tt: "Cela prendra environ §Y15 jours§! pour mettre en œuvre.\n"
