l_french:

### Operative Traits ###
 operative_bold: "Audacieux"
 operative_bold_desc: "L'agent est excellent pour prendre des décisions rapides et calculer le meilleur moment pour frapper."
 operative_cautious: "Prudent"
 operative_cautious_desc: "Parfois, la discrétion est la meilleure partie du courage."
 operative_reckless: "Insouciant"
 operative_reckless_desc: "Fait le travail, mais semble moins concerné par la sécurité personnelle."
 operative_military_background: "Expérience Militaire"
 operative_military_background_desc: "L'agent connaît bien l'armée et parle le langage universel des soldats du monde entier."
 operative_political_connections: "Connexions Politiques"
 operative_political_connections_desc: "Connaître les bonnes personnes en haut lieu peut être utile."
 operative_highly_educated: "Très Instruit"
 operative_highly_educated_desc: "Il est parfois utile de connaître la différence entre un acide et une base."
 operative_efficient: "Efficace"
 operative_efficient_desc: "Effectue le travail avec aussi peu d'outils que nécessaire."
 operative_streetwise: "Dans la Rue"
 operative_streetwise_desc: "Son passé peut être louche, mais l'agent a des contacts là où ça compte."
 operative_master_infiltrator: "Maître Infiltrateur"
 operative_master_infiltrator_desc: "Cet agent est passé maître dans l'art de s'adapter à n'importe quel environnement et de s'y fondre parfaitement."
 operative_survivor: "Survivant"
 operative_survivor_desc: "D'une manière ou d'une autre, cet agent semble toujours s'en sortir vivant."
 operative_master_commando: "Maître Soldat"
 operative_master_commando_desc: "Cet agent a reçu l'un des meilleurs entraînements militaires qui soient."
 operative_master_saboteur: "Maître Saboteur"
 operative_master_saboteur_desc: "Si cet agent peut s'en approcher, il peut le saboter."

### Unit Leader Traits ###
 artillery_officer: "Officier d'artillerie"
 artillery_officer_desc: "§LEntraîné en tant qu'officier d'artillerie.§!"
 artillery_specialist: "Chef de l'artillerie"
 artillery_specialist_desc: "§LAptitude à diriger l'artillerie au combat.§!"
 artillery_expert: "Expert en Artillerie"
 artillery_expert_desc:9 "§LUn vrai expert en direction de l'artillerie.§!"
 artillery_ratio_over_20:0 "Ratio d'artillerie> §H20%§!"
 master_of_ordnance:9 "Maître des Munitions"
 master_of_ordnance_desc:0 "§LOn n'a jamais "trop d'artillerie".§!"
 compassionate_leader:9 "Chef compatissant"
 compassionate_leader_desc:9 "§LCet officier fait preuve de beaucoup de soin envers les soldats sous son commandement.§!"

 rising_star:9 "Étoile Montante"
 rising_star_desc:9 "§LCet officier est très prometteur dans le champ de la tactique militaire et de la grande stratégie.§!"
 rising_star_tt:9 "Retiré après avoir atteint le §YNiveau de Compétence 3§!"

### Temporary Unit Leader Traits ###
 reinvigorated_temp_trait:9 "Reinvigorated"
 reinvigorated_temp_trait_desc:9 "§LThis officer and the command staff find themselves flush with new energy as they redouble their efforts on the battlefield.§!"
 energised_temp_trait:9 "Energised"
 energised_temp_trait_desc:9 "§LHaving grown comfortable in their position, this character feels emboldened to take further initiative in their career.§!"
 offensive_mindset_temp_trait:9 "Offensive Mindset"
 offensive_mindset_temp_trait_desc:9 "§LThis officer has adopted an offensive mindset for the near future, pushing their forces bravely forward into enemy territory.§!"
 defensive_mindset_temp_trait:9 "Defensive Mindset"
 defensive_mindset_temp_trait_desc:9 "§LThis officer has adopted a defensive mindset for the near future, preparing their forces for a dogged defense of friendly territory.§!"
 flexible_mindset_temp_trait:9 "Flexible Mindset"
 flexible_mindset_temp_trait_desc:9 "§LThis officer has adopted a flexible mindset for the near future, organising their men into free-flowing units capable of independent operation able to react to any situation.§!"
 precise_mindset_temp_trait:9 "Precise Mindset"
 precise_mindset_temp_trait_desc:9 "§LThis officer has adopted a precise mindset for the near future, demanding careful adherence to their meticulously crafted plan from their men.§!"
 all_out_assault_mindset_temp_trait:9 "All Out Mindset"
 all_out_assault_mindset_temp_trait_desc:9 "§LThis officer has adopted an all out mindset, sending their legions into battle in a decisive, no holds barred offensive to win the war as soon as possible.§!"
 last_stand_mindset_temp_trait:9 "Last Stand Mindset"
 last_stand_mindset_temp_trait_desc:9 "§LThis officer has adopted a last stand mindset, instilling in soldiers and civilians alike a grim determination to fight until victory or to the bitter end.§!"
