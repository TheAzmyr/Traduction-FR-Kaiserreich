### Name and Description ###
KR_history_title: "Un bref historique"
KR_scenario_name: "L'héritage de la Weltkrieg"
 KR_scenario_desc:9 "À l'aube de 1936, l'héritage de la Weltkrieg pèse lourd sur les épaules d'une nouvelle génération. L'Allemagne se tient toujours au centre du monde, d'une puissance sans égale, mais des ennemis anciens et nouveaux sont à ses portes : de l'Internationale française à l'ancienne Entente, en passant par une Russie inébranlable et le Soleil levant. Le vaste territoire de l'Allemagne l'a contrainte à disperser ses forces sur tous les fronts tandis que ses alliés à Constantinople et à Vienne se sont éloignés, et que, de l'autre côté de l'Atlantique, le colosse américain vacille. Dix-sept ans se sont écoulés depuis la fin de la guerre, et peu s'attendent à ce que la nouvelle année soit un tournant ; mais une simple étincelle pourrait bien suffire à rallumer la poudrière..."

