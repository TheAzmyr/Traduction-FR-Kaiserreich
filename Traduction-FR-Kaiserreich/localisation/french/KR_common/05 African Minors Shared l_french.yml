l_french:

### Focus Tree ###
 african_minors_focus: "Arbre de Priorités des Pays Africains Mineurs"

 AFR_Independence_Conflict: "Protéger notre Souveraineté"
 AFR_Independence_Conflict_desc: "L'effondrement de la Mittelafrika a donné l'opportunité à [ROOT.GetNameDef] de revendiquer son statut d'État souverain, ne laissons pas cette chance passer.\n\nUnion, travail, justice !"

 AFR_the_German_Remnants: "Les Vestiges [AFR_FormerOverlord_ADJ]"
 AFR_the_German_Remnants_desc: "La fin brutale du règne colonial a laissé de nombreux soldats sur le carreau. Elle a cependant également laissé derrière elle une quantité raisonnable de matériel militaire dans des dépots des lieux clés de notre nation."

 AFR_Analyse_their_Equipment: "Analyser leur Équipement"
 AFR_Analyse_their_Equipment_desc: "Dans l'administration [AFR_FormerOverlord_ADJ], nos hommes n'apprenaient pas l'usage de l'équipement moderne, destiné à ce que nos maîtres coloniaux l'utilisent pour garder la nation [ROOT.GetAdjective] soumise. Même si la plupart de cet équipement est tombé entre nos mains, nous devons apprendre à l'utiliser avant de nous en servir sur le champ de bataille."

 AFR_Petition_French_Republic:0 "Adresser une pétition à la République française"
 AFR_Petition_French_Republic_desc: "[ROOT.GetNameDefCap] a besoin d'armes, et c'est sans doute là qu'il faut se tourner en premier lieu."

 AFR_Petition_French_Commune:0 "Adresser une pétition à la Commune de Paris"
 AFR_Petition_French_Commune_desc: "La Commune pourrait se montrer réceptive à nos besoins."

 AFR_Open_Recruitment_Program:0 "Programme de recrutement ouvert"
 AFR_Open_Recruitment_Program_desc: "En ce moment, [ROOT.GetNameDef] a besoin de toute l'aide possible sur le terrain !"

 AFR_independence_push:0 "La poussée vers l'indépendance "
 AFR_independence_push_desc: "[ROOT.GetNameDefCap] a goûté pour la première fois à la liberté et n'est pas prêt à renoncer si facilement à cette chance d'être indépendant !"

 AFR_modern_african_army: "Une armée africaine moderne"
 AFR_modern_african_army_desc: "Nos soldats ont pris conscience de l'enjeu. Nous avons rassemblé tout le matériel éparpillé que nous avons pu trouver et avons appris à utiliser de nouvelles armes et tactiques. Même s'il reste encore beaucoup à faire, nous sommes en passe de constituer une armée unifiée et puissante, prête à affronter n'importe quel chef de guerre qui se dressera sur notre chemin !"

 AFR_a_Homegrown_Industry: "Une industrie locale"
 AFR_a_Homegrown_Industry_desc: "Sans une production industrielle significative, notre pays s'effondrera face à des nations plus avancées sur le plan économique. Nous ne devons pas laisser cela se produire ; nous devons nous lancer sans tarder dans l'industrialisation."
 AFR_a_Homegrown_Industry_2: "Un coup de pouce pour les infrastructures"
 AFR_a_Homegrown_Industry_2_desc: "Sous le règne de nos maîtres [AFR_FormerOverlord_ADJ], les infrastructures ont été négligées. Alors que nous nous engageons sur la voie de l'industrialisation, nous devons investir dans les infrastructures de base, telles que les bâtiments et les routes, non seulement pour assurer la prospérité de nos citoyens, mais aussi pour soutenir nos soldats sur le front."
 AFR_a_Homegrown_Industry_3: "Machines industrielles"
 AFR_a_Homegrown_Industry_3_desc: "Les progrès réalisés dans le domaine des outils agricoles et industriels ont considérablement fait avancer notre pays. Même s'il reste encore beaucoup à faire, nous avons posé les premiers jalons d'une économie moderne et performante."
 AFR_a_Homegrown_Industry_4: "Une base industrielle lourde en plein essor"
 AFR_a_Homegrown_Industry_4_desc: "Investir dans l'industrie lourde sera coûteux, mais cela en vaudra la peine, car cela contribuera grandement à notre développement économique et à notre industrialisation. Nous pourrons ainsi produire davantage de matériel militaire."
 AFR_a_Homegrown_Industry_5: "Armes [ROOT.GetAdjective]"
 AFR_a_Homegrown_Industry_5_desc: "La chute du régime [AFR_FormerOverlord_ADJ] à [ROOT.GetNameDef] a laissé derrière elle d'importants stocks de matériel militaire. Cependant, si nous voulons nous concentrer sur la prospérité et la sécurité à long terme de [ROOT.GetNameDef], il serait judicieux d'investir dans des usines d'armement afin de ne pas devenir dépendants de l'équipement étranger."

 AFR_international_waters: "Eaux internationales"
 AFR_international_waters_desc: "Il est primordial de garantir notre accès à la mer, surtout en période de crise comme celle-ci. Grâce à cet accès, nous pourrons nous procurer les matières premières et l'aide dont nous avons désespérément besoin."
 AFR_join_international_community:0 "Rejoignez la communauté internationale"
 AFR_join_international_community_desc:9 "Notre position gouvernementale étant désormais bien établie, nous nous sommes proclamés État libre et souverain et sommes prêts à rejoindre la communauté internationale. Nous devons d'abord nous tourner vers les nations disposées à nous apporter leur soutien ; qu'elles aient manifesté leur intérêt pour notre indépendance ou qu'elles soient simplement à la recherche de nouvelles opportunités, nous ne pouvons pas nous permettre d'être sélectifs, compte tenu de notre situation précaire."

 AFR_materiel_from_benefactor: "Contenu provenant de [?AFR_benefactor_tag.GetNameDef]"
 AFR_materiel_from_benefactor_desc: "Nous ne pouvons pas produire toute la munition dont nous avons besoin sur place, et nous ne pouvons pas non plus la trouver par terre n'importe où. Demander des armes à notre bienfaiteur nous sera d'une grande aide."

 AFR_military_advisors_from_benefactor: "Supervision [?AFR_benefactor_tag.GetAdjective]"
 AFR_military_advisors_from_benefactor_desc: "Nos officiers font peut-être preuve de courage et de détermination dans la lutte pour notre indépendance, mais la triste réalité est qu'ils manquent d'expérience. Avec [?AFR_benefactor_tag.GetNameDef] à la tête de nos affaires militaires, nous pourrons mettre en place une armée moderne et acquérir de nouvelles tactiques."

 AFR_economic_aid_from_benefactor: "Aide économique de [?AFR_benefactor_tag.GetNameDef]"
 AFR_economic_aid_from_benefactor_desc: "Grâce à l'introduction de biens et de services étrangers en provenance de [?AFR_benefactor_tag.GetNameDef], nous serons en mesure de développer notre économie de manière bien plus efficace."

 AFR_investments_from_benefactor: "Le miracle [?AFR_benefactor_tag.GetAdjective]"
 AFR_investments_from_benefactor_desc:9 "Quelles que soient les intentions de notre bienfaiteur en soutenant notre développement, personne ne peut nier que son aide a permis à [ROOT.GetNameDef] de prospérer. Nous sommes en bonne voie pour réaliser un miracle économique."

 AFR_join_iedc:0 "Rejoindre l'IEDC"
 AFR_join_iedc_desc: "Sans nos amis [?AFR_benefactor_tag.GetAdjective], notre nation n'aurait probablement pas connu une telle prospérité. Compte tenu de notre manque de capacités industrielles, il est peu probable que nous puissions leur rembourser nos dettes dans un avenir proche. Cependant, nous pourrions les dédommager en officialisant notre adhésion à leur bloc économique, le Conseil impérial de développement économique (IEDC)."

 AFR_join_cairo_pact:0 "Rejoindre le Pacte du Caire"
 AFR_join_cairo_pact_desc: "L'investissement [?AFR_benefactor_tag.GetAdjective] s'est révélé essentiel à la survie de notre nation, tant sur le plan économique que militaire. Nous devrions leur rendre la pareille en rejoignant leur faction, le Pacte du Caire."

 AFR_join_phalanstere:0 "Rejoindre le Phalanstère"
 AFR_join_phalanstere_desc: "Sans nos amis [?AFR_benefactor_tag.GetAdjective], notre nation n'aurait probablement pas connu une telle prospérité. Compte tenu de notre manque de capacités industrielles, il est peu probable que nous puissions leur rembourser nos dettes dans un avenir proche. Cependant, nous pourrions les dédommager en officialisant notre adhésion à leur bloc économique, le Phalanstère."

 AFR_join_mitteleuropa: "Rejoindre Mitteleuropa"
 AFR_join_mitteleuropa_desc: "Sans nos amis [?AFR_benefactor_tag.GetAdjective], notre nation n'aurait probablement pas connu une telle prospérité. Compte tenu de notre manque de capacités industrielles, il est peu probable que nous puissions leur rembourser nos dettes dans un avenir proche. Cependant, nous pourrions les dédommager en officialisant notre adhésion à leur bloc économique, la Mitteleuropa."

