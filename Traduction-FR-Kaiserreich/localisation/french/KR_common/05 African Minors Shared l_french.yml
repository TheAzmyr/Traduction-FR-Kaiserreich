### Events ###
 africa_events.1.t:0 "Demander une aide à l'étranger"
 africa_events.1.d:0 "Notre nouvelle situation est précaire ; le régime colonial n'a pas préparé nos terres à l'indépendance. Nous devons trouver un bienfaiteur sur la scène internationale."
 africa_events.1.BEL:0 "Demandez de l'aide à [BEL.GetNameDef]."
 africa_events.1.CAN:0 "Demandez de l'aide à [CAN.GetNameDef]."
