 africa_events.1.alone:0 "Nous nous débrouillons très bien seuls."

 africa_events.2.t:0 "[FROM.GetNameDefCap] demande de l'aide"
 africa_events.2.d:0 "La nation africaine de [FROM.GetNameDef] nous a contactés au sujet d'un partenariat potentiel. Le régime colonial allemand ne les a pas préparés à l'indépendance et ils cherchent à acquérir le capital nécessaire au démarrage de leur économie."
 africa_events.2.a:0 "Nous enverrons ce qu'ils demandent"
 africa_events.2.b:0 "Ils sont livrés à eux-mêmes."

 africa_events.3.t:0 "[FROM.GetNameDefCap] accepte l'aide mutuelle"
 africa_events.3.d:0 "[FROM.GetNameDefCap] a accepté d'entrer dans un partenariat avec notre nation."
 africa_events.3.a:0 "Splendide "

 africa_events.4.t:0 "[FROM.GetNameDefCap] refuse de l'aide mutuelle"
 africa_events.4.d:0 "[FROM.GetNameDefCap] a refusé d'entrer dans un partenariat avec notre nation."
 africa_events.4.a:0 "On s'en sortira très bien tout seuls !"
