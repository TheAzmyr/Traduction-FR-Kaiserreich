### Characters ###

 #關向應
 MAN_guan_xiangying: "Guan Xiangying"
 MAN_guan_xiangying_bio: "Born to a Manchu family of the Guerjia clan, Guan Xiangying saw the horrors of imperialism firsthand toiling away at a Japanese-funded printing company. At the age of 22, he joined a Socialist Youth league under the mentorship of Li Zhenying and worked in a Kuomintang cell in Shanghai. In 1925 he studied abroad in Paris but returned during the May 30th Movement and aided socialist forces in the Northern Expedition as a labour organiser. After the collapse of the National Revolutionary Army, he returned home to Fengtian province with orders to help local socialist agents establish resistance cells."
 MAN_guan_xiangying_leader_desc: "§YBorn:§! §LSeptember 10th, 1902, in Daguanjia, Jinzhou, Shengjing District, Great Qing§!\n§YBackground:§! §L$MAN_guan_xiangying_bio$\n\nThe liberation of Manchuria by foreign forces has put Guan in an uncomfortable spot. Though ethnically a Manchu, he identifies with the broader Chinese identity. But occupation forces have insisted on an independent Manchuria and Chairman Guan has reluctantly agreed to head a new government with the newly founded Socialist Party of Manchuria.\n\nForced into these unwanted circumstances, Guan uncomfortably looks towards constructing a new Manchurian identity based upon the multi-ethnic composition of the region and their new socialist bonds. Many resistance fighters feel betrayed by the foundation of an independent Manchurian state, and Chinese nationalism endures. Privately, Guan hopes that a reunion with China shall be undertaken and he be freed from the burden of constructing an artificial identity which he himself lacks faith in.§!"
 MAN_guan_xiangying_commander_desc: "§YBorn:§! §LSeptember 10th, 1902, in Daguanjia, Jinzhou, Shengjing District, Great Qing§!\n§YAlignment:§! §rLeague of Chinese Syndicalists§!\n§YBackground:§! §L$MAN_guan_xiangying_bio$§!\n\n§YNotes: A long-time guerrilla commander, he has had some difficulty adjusting to formal field command, however he has proven to be a quick learner.§!"

 #趙欣伯
 MAN_zhao_xinbo: "Zhao Xinbo"
 MAN_zhao_xinbo_leader_desc: "§YBorn:§! §L1890, in Wanping County, Zhili Province, Great Qing§!\n§YBackground:§! §LA Manchu bannerman with the Imperial Guard during the waning days of the Great Qing, a young Zhao Xinbo enrolled in the Tianjin Beiyang University. Amid the growing turbulence of Xinhai, he joined the Beijing Wenming New Theatre Troupe as a female actor and also the revolutionary Tongmenghui.\n\nAfter the failure of the Second Revolution, Zhao fled to Dalian. He became a Chinese teacher for Japanese students before successfully enrolling in law classes at Meiji University. Heavily connected to Japanese influence, he was a legal advisor to Zhang Zuolin after graduation. Under Zhang Xueliang's patronage, he founded the Northeast Law Research Association.\n\nAn otherwise minor, pro-Japanese figure in the Fengtian clique, he was nevertheless willing to make the jump when foreign authorities decided to create a new Manchurian state. Zhao proved to be an eager collaborator, establishing the Liaoning Province Local Maintenance Committee, which issued a declaration of independence for Manchuria.\n\nThe so-called \"Midwife of Manchuria\" was easily elected President with the backing of a shaky \"Manchuria Democratic League\", but the future of his republic remains extremely shaky, exacerbated by his habitual embezzling. Beneath a veneer of democracy, designed to cater to foreign patrons, lies an unpopular oligarchy helmed by a President of dubious competency.\n\nZhao attempts to present Manchurianness as a shared identity based upon the democratic nature of Chinese tradition, in opposition to the purported tyranny he decries exists south of the Great Wall, but only time will tell if Zhao's Manchurian nation will hold, or if history will repudiate its existence and mark Manchuria to an aborted attempt at inventing a new nation.§!"

 #富雙英
 MAN_fu_shuangying: "Fu Shuangying"
 MAN_fu_shuangying_bio: "An ethnic Manchu from Manchuria, Fu Shuangying attended Fengtian Army School before graduating from Baoding Military Academy in 1918. He soon found himself a member of the Fengtian army, serving as an instructor where he once attended primary school. An infantry commander by training, he served in such a regiment in the 2nd Zhifeng War.\n\nAt one point his achievements caught the eye of his commander Zhang Xueliang. Not particularly successful during the Fourth Zhili-Fengtian war, he was rotated to various back-end positions working in logistics. To this end he served as director of the Jingxing Mining Bureau and also as a staff officer in the Fengtian government."
 MAN_fu_shuangying_notes: "§YNotes: Although he has some pro-Japanese connections, Fu is not a member of the Shikan clique or Concordia association.§!"
 MAN_fu_shuangying_commander_desc: "§YBorn:§! §L1894, in Liaoyang, Shengjing District, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §L$MAN_fu_shuangying_bio$§!\n\n$MAN_fu_shuangying_notes$"
 MAN_fu_shuangying_leader_desc: "§YBorn:§! §L1894, in Liaoyang, Shengjing District, Great Qing§!\n§YBackground:§! §LA minor commander of Manchu descent in the Fengtian clique, Fu Shuangying was nothing special in the old order: a graduate from the prestigious Baoding military academy with a checkered record on the battlefield and some ties with Japanese interests in Manchuria. His lack of entrenched ties with the Zhangs or Tokyo, military education and bureaucratic experience gained administering the Jingxing Mining Bureau ultimately worked in his favour however when foreign authorities began searching for a candidate to lead an independent Manchuria.\n\nLargely a figurehead for foreign rule and with a questionable legitimacy even among ethnic Manchus, Fu has nonetheless taken on the role with stride. Installed as Chief Executive of Manchuria, he concentrated his rule through the Manchurian Supreme Administrative Council, working with the local elite to protect the region's autonomy.\n\nHe inherits a broken Manchuria, with Japanese investments withdrawn, looted by foreign occupiers, or destroyed in the fighting. Although expected to make some inroads with the old landed and bureaucratic establishment, the decision to create an independent Manchuria has stung many, even among some of the fiercest Dongbei regionalists. The countryside remains embroiled in insurgency as reconstruction work begins.\n\nFu for his part is ambivalent to the project of constructing a new Manchurian identity, and allows subordinates to characterize new Manchu identity. His government has promoted a Manchu-ness not defined by descent from the Jurchens or service within the Qing banners, but one that is a composite nationality forged from an eclectic mix of Han, Mongols, Hui, and Ethnic Manchus who all share age-old traditions that those south of the Great Wall no longer do.§!"

