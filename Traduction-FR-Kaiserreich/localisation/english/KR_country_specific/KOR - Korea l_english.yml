#### Traits ####
 KOR_korean_exile: "Korean Exile"
 KOR_korean_exile_desc: "§LA Korean military leader in exile with dreams of perhaps one day returning home to a Korea free from Japanese imperialism. For now, he has attached himself to the service of promising Chinese warlords in the hopes that one-day Korean independence may be achieved in his lifetime.§!"

 KOR_great_president: "President of Iron Resolve"
 KOR_great_president_desc: "The spineless cowards of the Korean Provisional Government thought Rhee was done for all those years ago, fated to waste away in Honolulu. His return heralds not only their failure, but the dawning of a new age for the Korean State. All hail the Chief!""

 KOR_generalissimo: "The Ilminist Generalissimo"
 KOR_generalissimo_desc: "§LOur nation is truly unique in the world. No society, no people can expect to amount to much without strong leadership. No, instead they require shepherds who guide them to prosperity and glory. Standing above all, Generalissimo Lee embodies the ideal of the Great Man in History who changes the destiny of humanity, and with him at the helm, Korea shall never know weakness!§!"

 KOR_tridemist_marshal: "The Tridemist Marshal"
 KOR_tridemist_marshal_desc: "§LDespite his shortcomings, Sun Yat-sen was a great man who envisioned free republics spanning across a free Asia. In Sun's name, Ji Cheong-cheon shall fulfill the three principles for the Korean Republic. Glory to Marshal Ji!§!"

 KOR_red_general: "Red General"
 KOR_red_general_desc: "§LFighting with the Kuomintang in the Northern Expedition, joining the exile in Paris, and returning to carry the flame of revolution back to Asia, Kim Wonbong's revolutionary resume cannot be doubted. With the Red General in command, Korea marches towards its revolutionary destiny!§!"

 KOR_revolutionary_chairman: "Revolutionary Chairman"
 KOR_revolutionary_chairman_desc: "§LWho was it that kept the Korean National Revolutionary Party from fracturing during its decade of exile? Who was it that maintained the Party's absolute dedication towards the ideals of Sanmin Doctrine? It was none other than Chairman Kim, and under his leadership, Korea will know freedom.§!"

 KOR_supreme_leader: "Supreme Leader"
 KOR_supreme_leader_desc: "§LHis critics often denounced him as a foolhardy terrorist, his rivals accuse him of being a spy for the Japanese. Yeom Dong-jin is a man with many enemies and foes, but with him in absolute control, none can doubt his iron will.§!"

