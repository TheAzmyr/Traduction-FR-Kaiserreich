### Initial Parties ####
 KOR_totalist_party: "WPK"
 KOR_totalist_party_long: "Workers' Party of Korea\n§LThe Worker's Party of Korea was founded as a merger of several Marxist syndicalist groups which emerged in the aftermath of Japanese occupation. Pak Hon-yong and the \"Domestic Faction\" of Korean socialists quickly emerged as the most prominent, having based their operations from within Korea during Japanese occupation. Smaller factions included the (Manchurian) Guerilla Faction led by Kim Song-ju, the Jangan Faction/Reconstruction Faction led by Choe Ik-han, Yi Yong, Cho Tong-ho, and Hyon Chun-hyok (itself a merger of several smaller factions including the Seoul, Gyeongseong, and Shanghai factions; the Tuesday Club, and Wonsan Red Union), and the obscure Red Flag group.\n\nAn attempt to merge with the People's Party of Korea and later the New People's Party failed, leaving the Worker's Party to adopt a hard line interpretation of Marxism under Pak's leadership§!\n"

 KOR_KPP_shared_desc: "As Japan's hold on Korea began to falter, Lyuh Woon-Hyung intensified his efforts to undermine their rule and rally people from all walks of life to the pro-independence cause. Arrested by Japanese authorities, he continued his work and his acquaintances stretched from former colleagues in the press, athletes and martial artists, anti-conscription activists, students groups, military defectors, various socialist groups and the \"Peasant Alliance\". From this base he created the Committee for the Preparation of Korean Independence and they conducted small-scale raids on the Japanese rear-guard. The committee evolved into the Korea People's Party but soon collapsed due to infighting."
 KOR_syndicalist_party: "NPP"
 KOR_syndicalist_party_long: "New People's Party\n§L$KOR_KPP_shared_desc$\n\nThe New People's Party was founded by Kim Mu-chong, Kim Tu-bong, Choe Chang-ik and their allies, which came to be known as the \"MinGan\" faction of the Korean left since many of them first gained prominence fighting with Kuomintang insurgents in the Jiangxi-Fujian insurgent zone. More moderate than the Worker's Party but more radical than their Korean National Revolutionary Party and Laboring People's Party counterparts, it maintains a close relationship with the global syndicalist movement.§!\n"
 KOR_social_democrat_party: "LPP"
 KOR_social_democrat_party_long: "Labouring People's Party\n§L$KOR_KPP_shared_desc$\n\nLyuh Woon-hyung and his allies went on to found the Labouring People's Party, straddling the line between more revolutionary socialist factions and fierce anti-socialist opposition from reactionary elements. Despite losing many followers, Lyuh's personal popularity has allowed him to emerge as a major force in Korean politics and the LPP proves to be a much more cohesive party than its predecessor. §!\n"

 KOR_KNP_shared_desc: "Formed through the reorganisation of Ji Cheong-cheon's New Korea Independence Party in light of Korea's newly independent state, the Korea Nationalist Party is inspired by Dr. Sun Yat-sen's Three Principles of the People, seeking to rebuild Korea in its Tridemist image. Despite sharing similarities with the Korean National Revolutionary Party in its commitment to implementing the Sanmin Doctrine, the KNP views itself as a true follower of Sun's vision, strongly opposing the KNRP for its syndicalist influence."
 #Because this should not be a rulign party, does not need a longer desc unless something goes wrong.
 KOR_social_liberal_party_united: "KNP"
 KOR_social_liberal_party_united_long: "Korea Nationalist Party\n§L$KOR_KNP_shared_desc$§!\n"
 KOR_social_liberal_party: "KNP-M"
 KOR_social_liberal_party_long: "Korea Nationalist Party - Moderates\n§L$KOR_KNP_shared_desc$\n\nThe more moderate faction of the KNP is led by Yun Chi-yong, which generally prefers a more parliamentary approach to securing power. Leaning on his skills managing public relations and the youth - which translated well to more cynical methods of ensuring \"public security\" by arming young militia-men, Yun proves to be a capable and flexible political survivor.§!\n"
 KOR_authoritarian_democrat_party: "KNP-R"
 KOR_authoritarian_democrat_party_long: "Korea Nationalist Party - Radicals\n§L$KOR_KNP_shared_desc$\n\nWithin the party, Ji Cheong-cheon and his followers constitute the radical faction of the KNP, of which many were members of the Korean Liberation Army. Forged by decades of resistance against the Japanese occupiers, Ji's faction of the KNP is hardened with resolve to implement their will without compromise.§!\n"

 KOR_market_liberal_party: "KDP"
 KOR_market_liberal_party_long: "Korea Democratic Party\n§LThe Korea Democratic Party was founded as a merger of several smaller parties founded in wake of the end of Japanese rule, including the Democratic Party, the National Party, and the Preparatory Committee for the National Assembly. Although initially meant to be a broad-front movement, in practice it became a conservative and fiercely anti-socialist one. They have an extremely mixed reputation, arguably Korea's first liberal party (albeit with Confucian influences) but viewed by some as stringently reactionary in their opposition to socialism and accused of absorbing many ex-Japanese collaborators.\n\nThey are not to be confused with Cho Man-sik's Democratic Party, a left-leaning union of entrepreneurs, merchants, handicraftsmen, petite bourgeoisie, peasants, and Christians.§!\n"

 KOR_KIP_shared_desc: "The Korea Independence Party is the most prominent political entity governing the Korean Provisional Government, representing the longing for independence of countless parties and people. The KIP consists of many different factions, from KMT-aligned leftists to right-wing ultranationalists. Still, most are aware that by the end of the day, the power and methods of all different factions must be put to full and good use so that Korea can stand back up on its feet to survive against the tide of the world."
 #Because this is not a ruling party, does not need a longer desc.
 KOR_social_conservative_party: "KIP"
 KOR_social_conservative_party_long: "Korea Independence Party\n§L$KOR_KIP_shared_desc$§!\n"
 KOR_social_conservative_party_split: "KIP-M"
 KOR_social_conservative_party_split_long: "Korea Independence Party - Moderates\n§L$KOR_KIP_shared_desc$\n\nForced to adopt a more parliamentary approach to maintain their hold onto power, the KIP nevertheless managed to secure their victory through aggressive campaigning and political inertia. They now can claim an official mandate from the people to carry out their vision for a free Korea.§!\n"
 KOR_authoritarian_democrat_party_kip: "KIP-H"
 KOR_authoritarian_democrat_party_kip_long: "Korea Independence Party - Hardliners\n§L$KOR_KIP_shared_desc$\n\nExpoiting their favored status as the leading figures in the Korean Provisional Government both before and after their return from exile, the KIP was able to easily win elections through political skulduggery and repression. This may cast a shadow on their legitmacy but will not prevent them from having legitimate popularity as well.§!\n"

 KOR_radical_socialist_party: "KNRP"
 KOR_KNRP_desc: "The KNRP is the official sister organisation of the Kuomintang, formed from old contingents of the KIP unwilling to cooperate with its predominantly antisocialist government. The KNRP seeks to implement the Three Principles of the People to Korea as well, whether it be through methods democratic or more coercive. While it was certainly an apolitical organisation within the Kuomintang, its members have a range of leanings from those who supported the Provisional Action Committee and those who supported the Reorganisation Comrades Association."
 KOR_radical_socialist_party_long: "Korean National Revolutionary Party\n§L$KOR_KNRP_desc$§!\n"
 KOR_radical_socialist_party_split: "KNRP-L"
 KOR_radical_socialist_party_split_long: "Korean National Revolutionary Party - Left\n§L$KOR_KNRP_desc$\n\nThe mainline leftist faction is led by Kim Wonbong and and Yoon Se-ju and generally revolves around Kim's cult of personality.§!\n"
 KOR_authoritarian_democrat_party_knrp: "KNRP-R"
 KOR_authoritarian_democrat_party_knrp_long: "Korean National Revolutionary Party - Right\n§L$KOR_KNRP_desc$\n\nThe rightist faction is led by Kim Kyu-sik and Jo So-ang, who have generally distanced themselves from the more socialist elements of the KNRP platform.§!\n"

 KOR_WSS_shared_desc: "The White Shirts Society was established by various extremists in the Korean Liberation Army desperate to topple Japanese rule. Led by Yeom Dong-jin, though aligned with the Korean Provisional Government funded by the Beiyang Government they drew inspiration from the Kuomintang's Three Principles of the People. Generally hostile towards syndicalism and other factions more concilatory towards socialism, they have proven more than willing to back up their national populist rhetoric with political violence and terrorism. Unfortunately, they are far from alone in that willingness - with many other post-independence factions also engaging in assassinations."
 KOR_national_populist_party_knrp: "KNRP-WSS"
 KOR_national_populist_party_knrp_long: "Korean National Revolutionary Party - White Shirts Society\n§L$KOR_WSS_shared_desc$\n\nForced to ally with the KNRP at behest of the the Chinese, they remained close to Blue Shirts Society which they see as a kindred movement. Nevertheless they continued to plot for the day they could take leadership outright.§!\n"
 KOR_national_populist_party: "WSS"
 KOR_national_populist_party_long: "White Shirts Society\n§L$KOR_WSS_shared_desc$§!\n"

 KOR_KLP_shared_desc: "The Liberal Party was founded as a merger of several major groups loyal to the new dictatorship - the Korean youth Corps, the Korean National Association to for the Promotion of Independence, the Korean Federation of Trade Unions, the Korean Peasants' Union Federation, the Korean Women's Association, and members of the Korean Liberation Army led by Lee Beom-seok who initially formed the Unified Labour-Farmer Party. Despite their name, they oppose Western individualism and instead pursue a \"Korean-style liberal democracy\" which infuses traditionalism, anti-socialism and anti-Japanese sentiment as well as Ilminism - the \"One-People Principle\" which promotes Korean ultranationalism and ethnic supremacy."
 KOR_authoritarian_democrat_party_lp: "LP-C"
 KOR_authoritarian_democrat_party_lp_long: "Liberal Party - Conservatives\n§L$KOR_KLP_shared_desc$\n\nThe conservative faction of the Liberal Party is led by Lee Gap-seong, a long-time independence activist, member of Korean Christian groups, and an organiser for the Liberal Party (though he initially bounced around different groups). They have been used by Rhee as a counter-balance to Lee Beom-seok's Ilminist faction.§!\n"
 KOR_paternal_autocrat_party_split: "LP-I"
 KOR_paternal_autocrat_party_split_long: "Liberal Party - Ilminists\n§L$KOR_KLP_shared_desc$\n\nThe Ilminists are led by Lee Beom-seok and represent the more extreme wing of the party - operating primarily through the Korean National Youth Corps and the military. They are viewed with some suspicion by Rhee and have been accused of sympathies to the global National Populist movement.§!\n"
 KOR_paternal_autocrat_party: "LP"
 KOR_paternal_autocrat_party_long: "Liberal Party\n§L$KOR_KLP_shared_desc$\n\nThe Ilminists are led by Lee Beom-seok and represent the more extreme wing of the party - operating primarily through the Korean National Youth Corps and the military. Said to be sympathetic to the global National Populist movement, they generally operate as a glorified military government.§!\n"

### Events ###
 korea_events.1.t: "A Telegram from Seoul"
 korea_events.1.d: "Under the tutelage of the Provisional Government helmed by Kim Koo's Korea Independence Party, the Korean state seems poised to emerge as a stable and balanced nation. After numerous discussions and negotiations with other minor parties, it seems that Korea may even host elections in the near future. Yet, there remains an undercurrent of uncertainty despite the jubilance in the air. While Kim Koo has publicly called for the need for free and fair elections, many have doubts as to how much the Provisional President intends to hold true to his word.\n\nWhile it is true that Kim Koo is universally respected as the nation's founding father, many believe that his fears of other parties leading the country astray will keep him from keeping the election fair. Indeed, a rising current of discourse has unleashed more radical elements within the Korean populace, and fuel a growing sense of partisanship in the young state. It seems that such rising tensions has indeed given Kim cause for concern, with our foreign ministry receiving a letter from Kim requesting support for potential plans to keep the country stable.\n\nListing socialist and radical elements as becoming increasingly violent as the country marches towards election day, Kim has outlined clandestine plans to ensure the election goes smoothly in favour of the KIP, or even carry out a coup should a party hostile to our country's national interests win. Asserting that he alone is the only one capable of leading Korea into a better future and a capable friend to [ROOT.getLeader], Kim has made his position clear. While it is true that Kim remains a strong ally of our government, supporting such measures may prove risky.\n\nIf Kim's gamble should fail and the new elected government finds out, relations with the Korean state may quickly deteriorate into mutual distrust. Yet it would perhaps be worse still if the elections were hijacked by already-hostile elements if the KIP were not properly bolstered by our support. In the end, [ROOT.getLeader] must deliberate on a difficult decision."
 korea_events.1.a: "Back Kim's plan, he's our man until the end."
 korea_events.1.b: "We trust that Kim can win in a fair contest."

 korea_events.2.t: "Election of [GetYear]"
 korea_events.2.d: "Finally after much anticipation at the polls, the winner of this year's elections are..."
 korea_events.2.a: "The Korea Independence Party!"
 korea_events.2.b: "The Korea Nationalist Party!"
 korea_events.2.c: "The Korea Democratic Party!"
 korea_events.2.dem: "The Labouring People's Party!"
 korea_events.2.e: "The Korea Independence Party!"

 korea_events.3.t: "Revolutionary Successes in Korea"
 korea_events.3.d: "During the wars of unification and the War of Resistance, Korean revolutionaries fought alongside the National Revolutionary Army. Many of them belonged to the Korean National Revolutionary Party (KNRP), an organisation created by the Korean officer Kim Wonbong - himself a graduate of the revolutionary Whampoa Academy.\n\nAs such, after the war, Kim Wonbong returned home with the KNRP to administer Korea's recently liberated nation. As part of his reforms to modernise Korea, Kim has implemented the ideals of the Three Principles of the People - taking a strong influence from the Chinese Kuomintang. Today, Korean representatives met with [ROOT.GetLeader], to discuss the future relationship between the Republic of China and the Republic of Korea. While Korea is to remain under China's sphere and protection, it will nonetheless enjoy a sense of nominal autonomy - as the two have pledged to work together as twin revolutionary sisters to liberate East Asia from imperialism."
 korea_events.3.a: "We stand together!"

 korea_events.4.t: "Treaty of Peace and Security"
 korea_events.4.d: "During the wars of unification and the War of Resistance, Korean revolutionaries fought alongside the National Revolutionary Army. Many of them belonged to the Provisional Government of the Republic of Korea (PGROK), a Korean independence faction led by the great Korean revolutionary Kim Koo.\n\nAs such, after the war, Kim Koo and the PGROK returned home to administer the newly liberated nation of Korea with the blessing of the Republic of China. Yet, despite Korea's hard-fought independence, the Koreans have not forgotten the aid and friendship they held with their Chinese comrades in the Kuomintang. Today, Korean representatives met with [ROOT.GetLeader], to discuss the future relationship between the Republic of China and the Republic of Korea. While Korea is to remain under China's sphere and protection, it will nonetheless enjoy a sense of nominal autonomy - as the two have pledged to work together as twin tigers to maintain peace, security, and stability in East Asia."
 korea_events.4.a: "We stand together!"

 korea_events.5.t: "Kim Hong-il Returns to Korea"
 korea_events.5.d: "As a result of the Japanese occupation of their country, various Korean guerilla armies proliferated in Manchuria, northern Korea, and the Chinese mainland throughout the 1920s. Many Korean revolutionaries and nationalists in exile sought the safety of Chinese military academies and republican movements with the hopes of perhaps one day returning home.\nLike many others, Kim Hong-il found himself in exile and travelled to the far southwest of Guizhou for military instruction, where he met He Yingqin. In 1926, Hong-il joined the National Revolutionary Army and participated in the doomed Northern Expedition. After its failure, Hong-il fled with Yingqin and the remnants of the rightist faction of the Kuomintang into Yunnan. However, with the victory of the Chinese over their Japanese adversaries in the Second Sino-Japanese War, Hong-il has officially announced his resignation in favour of serving in the new Korean republic."
 korea_events.5.a: "Thank you for your service."

 korea_events.6.t: "Our Allies in Korea"
 korea_events.6.d: "During the final war against Japanese aggression, Korean revolutionaries worked alongside our government to bring an end to Tokyo's wretched empire and see a free Korea after half a century of domination. These faithful revolutionaries, serving under the Provisional Government of the Republic of Korea, have transitioned from a motley crew of freedom fighters to a responsible government under the leadership of Kim Koo with the blessing and support of [ROOT.getLeader] and the [ROOT.getAdjective] government in [ROOT.Capital.GetCapitalVictoryPointName].\n\nKim, who has solidified his position as Korea's founding father, has ensured that Korea has emerged as a pluralising society committed towards bettering the nation with every progressing year. Abroad, Kim Koo has also maintained close ties with [ROOT.getLeader]'s government, with outside observers noting the blooming [ROOT.getAdjective]-Korean special relationship. With [ROOT.getLeader] and Kim Koo always on the same page and agenda, the [ROOT.getAdjective]-Korean bloc shall continue to be pillars of world peace and security."
 korea_events.6.a: "Cheers for a lasting partnership."

 korea_events.7.t: "Socialism in the Sister Republic"
 korea_events.7.d: "With Generalissimo Feng Yuxiang's embrace of the Kuomintang's leftist flank underway, the Christian General now looks to consolidate China's sphere of influence in a new socialistic direction, especially the Korean Republic. Although installed by Feng and having given assurances of his continued loyalty, Feng and the Kuomintang remains cautious about Kim Kyu-sik's government. While he did follow the Central Executive Committee and the Korean National Revolutionary Party into exile in Paris before a triumphant return to China a decade later, it was always known that Kim Kyu-sik gravitated closer towards rightist circles within the Kuomintang.\n\nWhile Kim has leaned into a more socialistic direction in following Feng's lead, many within the party advise the Generalissimo to do away with Kim entirely in favour of a more reliable figure. Kim Wonbong, a longtime associate with the Kuomintang's left wing and former leader of the KNRP, has been raised as a prime candidate to replace Kim Kyu-sik. While slighted by Feng's initial favouritism towards Kim Kyu-sik, he has signalled to Feng of his intentions to support the new socialist government should he take power, convincing the Christian General.\n\nIn the late afternoon, Kim Wonbong and a contingent of loyalists stormed the army headquarters and seized the National Assembly. Moving swiftly, Kim Wonbong personally detained Kim Kyu-sik before having him removed from office. In a speech to onlookers, Kim Wonbong declared that Korea would embrace a genuine socialist direction and forge a republic that truly empowers the workers and peasants."
 korea_events.7.a: "The Korean people have stood up!"

 korea_events.8.t: "Purifying the Revolution Abroad"
 korea_events.8.d: "At long last, the Kuomintang finds itself bereft of the plague which has turned it into an immobile and decaying organisation for the past decade. Yet, more fifth columnists and socialist filth remain across East Asia. In the recently liberated Korean Peninsula, Generalissimo He Yingqin left the government in the control of Kim Kyu-sik and the Korean National Revolutionary Party, a critical mistake.\n\nKim, while less inclined to Marxism than the foolish anarchist Kim Wonbong, still threw in his lot with Wang Jingwei's den of dogs in Paris, instead of remaining in China to continue the righteous fight against imperialism and reaction. While in Paris, Kim Kyu-sik no doubt absorbed a substantial amount of syndicalist nonsense into his political agenda, which will surely bring Korea to ruin.\n\nYet, not all is lost. In the decadent mess that is the KNRP lies Yeom Dong-jin and his White Shirt Society. Long a friend to Teng Jie and the Kuomintang Blue Shirts, Yeom has embraced the use of terror and the revolver to bring about true political change and has instilled true revolutionary principles in his followers. The Lingxiu has resolved to call upon his old friend to save the Korean Republic from crypto-Marxism and deliver Korea to the true path of revolution.\n\nBringing in a coalition of loyalists and true national revolutionaries, Yeom's men quickly took control of downtown Seoul and the army headquarters while he personally stormed the National Assembly to detain President Kim. After an impromptu swearing-in ceremony, President Yeom declared that he would defend the Republic from all of Korea's enemies and cleanse the nation of all traitors."
 korea_events.8.a: "The Sister Republic returns to the fold."

