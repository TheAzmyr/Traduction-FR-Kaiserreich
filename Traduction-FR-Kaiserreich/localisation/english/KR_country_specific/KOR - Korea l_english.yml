### Ideas ####
 KOR_legitimacy_idea_1: "Legitimacy of the Provisional Government: §oAbysmal§!"
 KOR_legitimacy_idea_1_desc: "In exile for decades, the Provisional Government of Korea could only watch with dismay as the Empire of Japan continually stripped the nation of further freedoms and subjected the Korean people to the humiliation of servitude. Even now with the Japanese chains shattered for good, the Korean state remains in a nebulous state.\n\nThe evacuation of Japanese colonial authorities has left the Provisional Government scrambling to take the reins of administration, leaving the government in a temporarily chaotic state. Beyond the issues with governmental transition, the new regime also prepares to rule over a nation who has spent generations under colonial rule. Despite the insurmountable task of the Provisional Government to establish a new and free nation, the people and its leadership are confident that Korea's future will be bright indeed."
 KOR_legitimacy_idea_2: "Legitimacy of the Provisional Government: §gDysfunctional§!"
 KOR_legitimacy_idea_2_desc: "$KOR_legitimacy_idea_1_desc$"
 KOR_legitimacy_idea_3: "Legitimacy of the Provisional Government: §GTolerated§!"
 KOR_legitimacy_idea_3_desc: "$KOR_legitimacy_idea_1_desc$"

 KOR_legitimacy_democratic: "Legitimacy of the Provisional Government: §cDemocratic Korea§!"
 KOR_legitimacy_democratic_desc: "It has often been said that the Provisional Government of Korea and the Korea Independence Party were destined to fail in their hopes to establish a free and equal Korean state, and even now many pessimistic voices persist, but it cannot be denied that the Provisional Stewardship of Korea has succeeded in achieving its aims.\n\nKorea today knows not only freedom from foreign dominion by a colonial power, but also enjoys the freedoms of a burgeoning democratic state that was viewed to be an impossibility in a post-colonial state. It is true that Korea's new democracy is new and untested, but the Korean people are up to the task of ruling their own country wisely and justly."
 KOR_legitimacy_kip: "Legitimacy of the Provisional Government: §cIndependence Forever§!"
 KOR_legitimacy_kip_desc: "It has often been said that the Provisional Government of Korea and the Korea Independence Party were destined to fail in their hopes to establish a free and equal Korean state, and even now many pessimistic voices persist, but it cannot be denied that the Provisional Stewardship of Korea has succeeded in achieving its aims.\n\nKorea today knows not only freedom from foreign dominion by a colonial power, but also enjoys the freedoms of a burgeoning democratic state that was viewed to be an impossibility in a post-colonial state. It is true that Korea's new democracy is new and untested, but the Korean people are up to the task of ruling their own country wisely and justly.\n\nOnce its provisional head and now given a mandate by the Korean people, Kim Koo is poised to embark upon a conservative and yet surprisingly equal direction suited to Korea's unique social and economic conditions."
 KOR_legitimacy_authkip: "Legitimacy of the Provisional Government: §aIndependence Defended at any Cost§!"
 KOR_legitimacy_authkip_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows.\n\nWith such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nWhile Kim Koo may have considered carrying out the democratic experiment, it has become clear to him that he alone has Korea's best interests in mind. With crypto-syndicalists, western lapdogs, and overzealous buffoons flanking him at any turn, how can the man who helmed the Provisional Government for so long allow them to ruin Korea's chance at a better future? No, Kim Koo will ensure that Korea remains on the right and proper path towards freedom and independence."
 KOR_legitimacy_knp: "Legitimacy of the Provisional Government: §lThree Principles for Korea§!"
 KOR_legitimacy_knp_desc: "It has often been said that the Provisional Government of Korea and the Korea Independence Party were destined to fail in their hopes to establish a free and equal Korean state, and even now many pessimistic voices persist, but it cannot be denied that the Provisional Stewardship of Korea has succeeded in achieving its aims.\n\nKorea today knows not only freedom from foreign dominion by a colonial power, but also enjoys the freedoms of a burgeoning democratic state that was viewed to be an impossibility in a post-colonial state. It is true that Korea's new democracy is new and untested, but the Korean people are up to the task of ruling their own country wisely and justly.\n\nUnder its first democratic leader in Yun Chi-Young, the nation is poised to embark upon a path dictated by Sun Yat-sen and his Three Principles, but in a more democratic and conservative direction more suited to Korea's unique social and economic conditions."
 KOR_legitimacy_kdp: "Legitimacy of the Provisional Government: §mDemocratic Stronghold§!"
 KOR_legitimacy_kdp_desc: "It has often been said that the Provisional Government of Korea and the Korea Independence Party were destined to fail in their hopes to establish a free and equal Korean state, and even now many pessimistic voices persist, but it cannot be denied that the Provisional Stewardship of Korea has succeeded in achieving its aims.\n\nKorea today knows not only freedom from foreign dominion by a colonial power, but also enjoys the freedoms of a burgeoning democratic state that was viewed to be an impossibility in a post-colonial state. It is true that Korea's new democracy is new and untested, but the Korean people are up to the task of ruling their own country wisely and justly.\n\nUnder its first democratic leader in Chough Pyung-ok, the nation is poised to embark upon a moderate conservative path styled upon the liberal democracies of the West, yet adapted to suit Korea's unique social and economic conditions."
 KOR_legitimacy_lpp: "Legitimacy of the Provisional Government: §SUncompromised Idealism§!"
 KOR_legitimacy_lpp_desc: "It has often been said that the Provisional Government of Korea and the Korea Independence Party were destined to fail in their hopes to establish a free and equal Korean state, and even now many pessimistic voices persist, but it cannot be denied that the Provisional Stewardship of Korea has succeeded in achieving its aims.\n\nKorea today knows not only freedom from foreign dominion by a colonial power, but also enjoys the freedoms of a burgeoning democratic state that was viewed to be an impossibility in a post-colonial state. It is true that Korea's new democracy is new and untested, but the Korean people are up to the task of ruling their own country wisely and justly.\n\nUnder its first democratic leader in Luh Woon-hyung, the nation is poised to embark upon a moderate socialist direction in rejection of both the Western capitalistic powers as well as overzealous revolutionary syndicalism as Korea must chart its own path suited to its unique social and economic conditions."

 KOR_legitimacy_authoritarian: "Legitimacy of the Provisional Government: §aFreedom Through Strength§!"
 KOR_legitimacy_authoritarian_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows.\n\nWith such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim."
 KOR_legitimacy_authknp: "Legitimacy of the Provisional Government: §aTridemism Perfected§!"
 KOR_legitimacy_authknp_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Ji Cheong-cheon, unlike the fools who oppose him, has fought for Korean freedom throughout his entire life. As a true follower of Sun Yat-sen, unlike the syndicalist rodents of the Korean National Revolutionary Party who tainted his vision, the people can be assured that President Ji will carry out Sanmin Doctrine in a way truly befitting of the Korean people."
 KOR_legitimacy_lp: "Legitimacy of the Provisional Government: §PThe Great Generalissimo§!"
 KOR_legitimacy_lp_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nGeneralissimo Lee Beom-seok and the Liberal Party only have love for the Korean people, and seek to build a truly great Korean Republic. Our nation will never again be subject to peoples truly beneath the dignity of Korea, and under the Generalissimo, we can be assured we will always be free from the capitalists and socialists who seek to enslave us."
 KOR_legitimacy_diarchy: "Legitimacy of the Provisional Government: §PMight of the Rule of Two§!"
 KOR_legitimacy_diarchy_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Syngman Rhee is a man who truly knows the struggle of the Korean people. With Generalissimo Lee at his right and the Liberal Party at his whim, the Korean people can rest easy knowing that these two men of divine providence will forge a Korea seeped in strength and a bulwark against cruel and unnatural syndicalism."
 KOR_legitimacy_rhee: "Legitimacy of the Provisional Government: §aKorea's Sole Saviour§!"
 KOR_legitimacy_rhee_desc: "Under strong leadership and capable statesmanship, Korea has truly stabilised and made ready to be remade into a new nation free from all colonial influences. Yet, traitors and agitators lurk in the shadows. With such parasites ready to plunge our country back into the calamities of war and exploitation, how can we possibly countenance an embrace of free and fair elections, where these Fifth Columnists may lead the people astray.\n\nNo, Korea will know true prosperity through the maintenance of our glorious and righteous leadership. With a free hand to enact the national will, it can even be said that the current government is an exercise of true democracy, regardless of what detractors may erroneously claim.\n\nPresident Syngman Rhee is a man who truly knows the struggle of the Korean people. With the Liberal Party as his whim and his alone, Rhee will build a truly just and strong Korea that does not betray the values and traditions of his people. With friends in Washington, the Korean people can rest easy knowing that no nation will ever threaten Korean independence ever again."

 KOR_legitimacy_revolutionary: "Legitimacy of the Provisional Government: §tRevolutionary Korea§!"
 KOR_legitimacy_revolutionary_desc: "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past."
 KOR_legitimacy_wpk: "Legitimacy of the Provisional Government: §oThe Homegrown Revolution§!"
 KOR_legitimacy_wpk_desc: "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Chairman Pak Hon-yong. A veteran revolutionary who carried out the fight in the occupied homeland, he will ensure that Korea's path towards true socialism is undertaken on Korea's terms."
 KOR_legitimacy_npp: "Legitimacy of the Provisional Government: §rKorea has Stood Up§!"
 KOR_legitimacy_npp_desc: "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Chairman Kim Tu-bong. A hardened revolutionary forged in the revolutionary stronghold of MinGan, Kim and the NPP will ensure that Korea embarks upon the steady path towards socialism, with all patriotic and truly democratic parties allowed to join the work ahead."
 KOR_legitimacy_knrp: "Legitimacy of the Provisional Government: §RKorea's National Revolution§!"
 KOR_legitimacy_knrp_desc: "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than the faithful members of the Korean National Revolutionary Party. True followers of Sun Yat-sen and the Kuomintang, Kim Wonbong and Kim Kyu-sik know the real meaning of freedom, and under their leadership of Korea, the nation will be made anew in a righteous National Revolution."
 KOR_legitimacy_wss: "Legitimacy of the Provisional Government: §nDemocratisation of Fear§!"
 KOR_legitimacy_wss_desc: "For the first time in its history, Korea is at the precipice of a truly great and egalitarian society. Under its current government, all reactionary and colonial ideas have been purged and the nation is better for it. Foolish Ilminists and deranged democrats decry the direction of the Korean Republic to be a betrayal of Korean values and traditions, but what would they know of decency and justice?\n\nKim Koo threw in with the Beiyang Government and abandoned the righteous struggle of the Kuomintang against imperialism and decadence, Lee knows nothing but how to best brutalise the populace, Rhee is nothing more than an American lapdog, and the so-called democratic opposition is composed of complainers too enamoured with the sounds of their own voices. No, Korea's Revolutionary Government will not kowtow to the criticism of these imbeciles, who are unwilling to embrace the future by breaking with the past.\n\nNone know this better than Yeom Dong-jin. Some decry him as a collaborator, terrorist, and bandit, but the Supreme Leader pays no heed to such voices. To him, the new Korea can only be forged through his iron will, with terror as his choice tool for the nation's rebirth."

 #Democratic Ideas
 KOR_welfare_state: "Burgeoning Welfare State"
 KOR_welfare_state_desc: "Although Korea has been liberated from its Japanese occupiers, our people continue to suffer from economic hardship, especially as the country is still recovering from wartime conditions. Now that the situation has been stabilized, we shall establish provisions of basic welfare for all Koreans, guaranteeing proper living conditions, and preventing radical ideologies to take root among the populace."
 KOR_westernising_state: "Westernising State"
 KOR_westernising_state_desc: "The liberation of Korea led to the establishment of a democratic republic, and the Korea Democratic Party has won the first elections. With a popular mandate in our hands, it has become our responsibility to ensure the long-term stability of the republic. The democratic societies of the Western world have provided an excellent example for us to emulate, let us carefully adapt positive values from western democracies while maintaing a unique Korean identity."
 KOR_working_class: "Aiding the Working Class"
 KOR_working_class_desc: "As the primary force representing the left in the new democratic Korea, the Labouring People's Party shall strive to improve the conditions of the working class. Basic labour law reforms such as eight-hour work days, the prohibition of child labour, the establishment of a minimum wage and other fundamental workers' rights will be enacted nationwide, so that Korean workers may fully enjoy the fruits of their own labour."
 KOR_civilian_rule: "Civilian Control of the Military"
 KOR_civilian_rule_desc: "After the return of the Provisional Government, a constitutional republic has been established in Korea. The young republic has a lot of challenges facing it, both domestically and externally. To protect the civilian nature of the administration, the military shall be entirely subordinated to civilian control, ensuring the survival of the constitution and fending off a violent takeover by radicals and extremists."

 #Authoritarian Ideas
 KOR_antisocialist: "The Moral Nation"
 KOR_antisocialist_desc: "Socialism, in all its forms, seeks only to further enflame class conflict in its hopes of achieving supposed social equality through revolution. In pursuit of their goals, they will only bring about the destruction of the Korean nation and its culture if we do not put a stop to it. Only through the promotion of a moral society which emphasises filial piety and respect for traditions can we ensure stability and the survival of Korea as a whole."
 KOR_autarkic_state: "The Autarkic State"
 KOR_autarkic_state_desc: "Despite our country not possessing an economy which rivals that of our neighbours, in the end, we must make do with what we have and develop ourselves if Korea is to be a truly independent country. Through the will and determination of the Korean people alone, we will lay the foundations of an independent national economy capable of ensuring prosperity for all and safeguarding the security of the fatherland."
 KOR_neither_china_nor_japan: "Against the Dragon, Against the Sun"
 KOR_neither_china_nor_japan_desc: "For too long had Korea been the pawn of both China and Japan, treating us as mere subjects to their imperial ambitions. Let us put to sleep that notion and make it clear that for as long as the Taegeukgi continues to fly proud and high, Korea is one people willing to fight for their independence, so long as both countries seek to impose their influence upon us."
 KOR_corporatism: "The Corporatist State"
 KOR_corporatism_desc: "The subjugation of our nation at the hands of Japan happened during a moment of immense weakness for Korea, its backwardness exacerbated by the corruption of the Joseon elites. As a result, peasant rebellions rose up and plunged the nation into further weakness, condemning our Korean master race to decades of humiliation by Japanese imperialists. With Korea now free once more, we will make sure class conflicts never happen again, and harmony between all Koreans remains at all costs."
 KOR_third_way: "Against the Stench of Capitalism and Marxism"
 KOR_third_way_desc: "Marxist imperialism and capitalist imperialism, though the former is worse, both constantly seek dominance and profit, leading to the destruction of other ethnic groups and nations. To fight against this miasma of imperialist ideologies on our soil, the unification of all Koreans into one indivisible people is necessary for preserving the independence of the Korean nation."
 KOR_universal_suffrage: "Emancipation Vanguard"
 KOR_universal_suffrage_desc: "Our nation is a shining beacon of Emancipation, as almost nowhere else in the world do women experience the same amount of political freedom."
 KOR_stratocracy: "Korean Stratocracy"
 KOR_stratocracy_desc: "The continued preservation of Korean independence and sovereignty is dependent on the ability of our military to defend Korea from external forces; it is only natural that everyone must do their part in the service of supporting our army, unless we lose our nation once more. By placing the military at the forefront of national importance and bringing about military-citizen unity, Korea will forever be free!"

 #Revolutionary Ideas
 KOR_equal_republic: "The Equal Republic"
 KOR_equal_republic_desc: "At long last, the Revolution has arrived in Korea. With the liberation of the country, it falls upon our government to establish economic equality for all Koreans, destroying the shackles of oppression. The unjust influence and dominance of the Yangban shall be abolished, and Korea's wealth shall be accessible to all Koreans."
 KOR_unique_socialism: "Socialism with Korean Characteristics"
 KOR_unique_socialism_desc: "Marxism, as it was originally envisaged, was modelled around the mature capitalist economies of Western Europe that possessed a large industrial proletariat. However, as an agrarian nation with little in terms of an industrial base, the conditions for Korea to reach a socialist mode of production do not exist. Even so, we shall integrate the universal truth of Marxism with the realities of Korea, and build our own path towards socialism!"
 KOR_longyan: "Lessons From Longyan"
 KOR_longyan_desc: "The Kuomintang's MinGan Insurgency has been a valuable lesson for socialist revolutionaries around the world. Unlike the conventional tactics used in the French and British civil wars, the Longyan-based insurgency has given an important insight into the viability of guerrilla warfare. Using such unconventional tactics against our enemies, we shall prevail even if the world is against us!"
 KOR_tutelage: "Second Stage of Revolution"
 KOR_tutelage_desc: "In his Fundamentals of National Reconstruction, Dr. Sun Yat-sen detailed the three stages of revolution to transition China to a democratic nation: military rule, political tutelage, and constitutional government. With the expulsion of all obstacles to democracy, Korea has entered the second stage of revolution. Until the people are fully ready for self-governance and democratic rights, we shall guide them as mentors and crack down on those who seek to subvert the revolution."
 KOR_revolutionary_vanguard: "Revolutionary Vanguard"
 KOR_revolutionary_vanguard_desc: "For a revolution to succeed, it must be organised and disciplined, guided by a vanguard of the most conscious of individuals. If Asia is to be freed from the clutches of imperialist colonialism, there must be a vanguard to bring about the flames of revolution to all corners of Asia. Alongside our allies, we shall serve as that very vanguard and enlighten all peoples of Asia to the grand vision of Pan-Asianism!"
 KOR_germany: "Bulwark Against Germany"
 KOR_germany_desc: "In the last two decades, Germany has consistently served as a bastion of foreign imperialism in Asia, becoming the foremost European power in the region while working with local collaborators to stamp out anti-imperialist revolutions, such as what happened with the Northern Expedition. Now, under the guidance of the Three Principles, China and Korea shall stand together for the liberation of Asia, and we shall serve as a bulwark against the German menace."
 KOR_great_purge: "Purified Revolution"
 KOR_great_purge_desc: "The long, arduous struggle for Korean independence has often been corrupted by the presence of treacherous intellectuals and bureaucrats of various shades, be it degenerate socialists, the democrats, the heads of the Provisional Government or the Ilminists. It shall be corrupted no more! Under our Supreme Leader, the Korean Revolution will be completed thoroughly. The White Shirts Society will cure the ills of Korean society, purifying it of its poisonous elements, and lead it to a truly revolutionary future, ushering the rebirth of the nation."

 #Economy Ideas
 KOR_economy_idea_1: "Korean National Economy: §oIn Shambles§!"
 KOR_economy_idea_1_desc: "Although the Korean people can now enjoy freedom from Japanese tyranny, the country finds itself in the midst of rubble and turmoil. When the Japanese surrendered and ceded control of Korea, the mass exodus of colonial businessmen and settlers left a great vacuum in our nation's economic tapestry. Waves of confused citizens unaware of the Japanese withdrawal have only bolstered the responsibilities of the Provisional Government.\n\nMuch of Korea's northern industrial regions have been hit particularly hard by the war, and collaborationist landlords throughout the country continue to plague the government. If the Provisional Government hopes to capture the support of the people, it must work diligently to tend to the economic needs of the people."
 KOR_economy_idea_2: "Korean National Economy: §gReconstruction Underway§!"
 KOR_economy_idea_2_desc: "Although the Korean people can now enjoy freedom from Japanese tyranny, the country finds itself in the midst of rubble and turmoil. When the Japanese surrendered and ceded control of Korea, the mass exodus of colonial businessmen and settlers left a great vacuum in our nation's economic tapestry. Waves of confused citizens unaware of the Japanese withdrawal have only bolstered the responsibilities of the Provisional Government.\n\nMuch of Korea's northern industrial regions have been hit particularly hard by the war, and collaborationist landlords throughout the country continue to plague the government. The Provisional Government in response to the economic crisis has already begun drafting a plan for redistributing collaborator and colonial property to the poorest Korean peasants, and the northern industries have been placed under direct government control for the time being."
 KOR_economy_idea_3: "Korean National Economy: §GModernising the Nation§!"
 KOR_economy_idea_3_desc: "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, though it may be a time before they begin to operate at proper productivity levels. In the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government. While Korea is far from a prosperous country as of yet, its future is bright and the Korean people are confident in their ability to chart the right path forward."
 KOR_economy_idea_4: "Korean National Economy: §LCharting the Course to Prosperity§!"
 KOR_economy_idea_4_desc: "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, and have charted a new path in the burgeoning Korean Industrial Revolution.\n\nIn the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government. With every passing year, the Korean state oversees unprecedented growth and prosperity, a state of affairs once thought to be unthinkable to onlookers."
 KOR_economy_idea_5: "Korean National Economy: §YRejuvenated Tiger Economy§!"
 KOR_economy_idea_5_desc: "While the Japanese withdrawal left the Korean state in a period of strife and turmoil, it seems that the worst has begun to pass. In the north, many of the devastated factories have been rebuilt, turning the country into a vibrant manufacturing hub rivalling both China and Japan.\n\nIn the countryside, many Korean peasants enjoy the benefits of land to call their own with the dismantling of colonial and collaborator estates, and are rapidly becoming a pillar of support for the Korean Government.\n\nWith every passing year, the Korean state oversees unprecedented growth and prosperity, a state of affairs once thought to be unthinkable to onlookers. While certainly a small country in East Asia, it cannot be denied that the Korean miracle has made it into a singularly shining beacon of economic prosperity in the Far East."
 KOR_developmentalism: "The Developmental State"
 KOR_developmentalism_desc: "While Anglo-American capitalism has certainly fueled the growth of two mighty superpowers, it is clear that in the 20th century, such free trade and laissez-faire minded principles have become utterly outdated. The might of the Empire of Free Trade could not prevent their collapse into socialism, nor did it save the Americans from a debilitating great depression and civil war.\n\nNo, it is clear that the German model, pioneered by Bismarck and refashioned by Svobodnik Russia, Tokyo, and Chinese statists must be Korea's destiny as well. Under the tutelage of the Korean economic planning board, the Korean government will ensure the nation rises steadily and on schedule without leaving anything to chance. State socialism forged Japan and China, and so shall it build a strong Korea!"
 KOR_liberalising_economy: "Liberalising Economy"
 KOR_liberalising_economy_desc: "While it has been a growing trend across the world for governments to take a direct interest in the economic management of the nation, the Korean state must not follow such a course. Korea has only just found itself emerging from colonial independence, and it is the American model which suits our nation best.\n\nPresident Rhee is confident that by following the principles of free-market capitalism, the government can avoid unsustainable deficit spending and encourage foreign investment. In making Korea a land safe for business, we can ensure fast growth without idealistic dreams of East Asian state socialism. As it is so often said in America, life, liberty, and the pursuit of happiness shall be our mantra."
 KOR_agriculture: "Korean Agricultural Revolution"
 KOR_agriculture_desc: "Long the backbone stock of the Korean economy, agriculture has only become even more important in the modern age. In a developing country with a growing population, a nation must always be on the lookout for famine. If Korea is to find itself renewed in this most critical of times, then Korea must ensure that its farmers and peasants are properly supported by the government in times of crisis. The lands of the south, always providing bountiful harvests, shall be the foundation upon which Korea's future will be built upon."
 KOR_industry: "Korean Industrial Revolution"
 KOR_industry_desc: "In the modern age, the once agricultural Korean people found themselves swept in the tides of capitalism and industry. During the colonial era, the Empire of Japan established various industrial monopolies in Pyongyang and the surrounding areas, turning Northern Korea into a local industrial hub not dissimilar to Manchuria. Now, Korea finds itself free of Japanese overlordship and able to chart its own destiny. Northern industries shall turn our country into a manufacturing hub in the Far East, and products of the world shall bear the label made in Korea!"
 KOR_developmental_improved: "The Developmental State"
 KOR_developmental_improved_desc: "$KOR_developmentalism_desc$"
 KOR_liberalising_improved: "A State Driven by the Free Market"
 KOR_liberalising_improved_desc: "$KOR_liberalising_economy_desc$"

 #Military Ideas
 KOR_military_idea_1: "Korean Military State: §oPost-Colonial Chaos§!"
 KOR_military_idea_1_desc: "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army from the get-go has been plagued with issues typical of a newly liberated nation: an officer corps filled with former collaborators and an almost non-existent defence industry only prepared to produce small arms.\n\nAlongside this, a debate amongst our exiled officer corps has erupted on which direction our KNA should take in terms of doctrine inspiration with the valuable legacies of Whampoa, Beiyang and Japan taking dominant positions in this struggle. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_2: "Korean Military State: §gReorganisation Underway§!"
 KOR_military_idea_2_desc: "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army has begun to transition from an autonomous militia to a real force of national defence. Our officer corps is beginning to purge former collaborators from our ranks, though our defence industry is still dominant on support from our benevolent liberators.\n\nWhile our reorganisation is underway, our general staff is still ripe with heated debates over which direction to take our young military in the future, with the legacies of Whampoa, Beiyang and Japan still taking dominance. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_3: "Korean Military State: §GNew Korean Military§!"
 KOR_military_idea_3_desc: "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. Our reorganisation labor is now showing some of the first fruits, with the Korean National Army growing in strength. With the purges of former collaborators making great progress, our domestic officer corps is seeing its first new recruits of young patriots ready to defend the nation, with our defence industry slowly but surely meeting the moment through expanding steadily.\n\nAs this progress is made, current debates over where to look for inspiration in terms of doctrine have slowly transitioned more towards patriotic collaboration over foreign loyalties, seeking a synthesis between our two former colonial overlords of different times. Only the future can tell what this discussion will bring. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_4: "Korean Military State: §LKorea's First Line of Defence§!"
 KOR_military_idea_4_desc: "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. Our National Army is no longer a mere militia of exiled freedom fighters, but a truly professional, domestic army of patriots seeking to protect the land of their ancestors with their lives. Our officer corps is no longer one of collaborators and lackeys of the Japanese Empire, but one of newly trained NCOs and cadets ready to lead our people to a better future.\n\nOur defence industry is now almost completely independent of our benevolent liberators, able to develop weapons to take control of our lands, seas and skies. Discussions surrounding our military doctrine have become more and more positive, with our high command and military academies slowly but surely synthesising the teachings of our exiled patriots into a uniquely Korean doctrine. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_military_idea_5: "Korean Military State: §YVanguard in the East§!"
 KOR_military_idea_5_desc: "With the collapse of the Japanese Empire, our nation must look towards preventing all other attempts at subjugation through revitalising our Armed Forces. The Korean National Army is now a force respected across all of East Asia, capable of withstanding any attempts to subjugate our people. The Korean Officer Corps is now completely purged of collaborationists and opportunists, our military academies flooded with enthusiastic youth willing to commit their minds, hearts, and souls to defend the lands of our ancestors./n/n/Our defence industry is now capable of matching the efficiency and technological heights of those in Europe and America, producing weapons of war unthinkable mere years ago. Our high command is now fully united behind a truly Korean doctrine, backed by decades of experience from across the schools of East Asia, truly committed to fighting for our nation. Whatever future the KNA takes, we must ensure that it will become a force capable of repelling all foreign invaders, and ensure Korea remains free for the next ten thousand years."
 KOR_kaic: "KAIC"
 KOR_kaic_desc: "In the days of the Joseon Kingdom, the royal court employed secret royal inspectors to keep government officials loyal to the state and ensure safety and security across the nation. In the reborn Korean state, public safety and government security has become even more paramount, with anti-goverment agents and opportunistic rabble rousers ready to take advantage of any perceived weakness. With enemies both within and without, the KAIC shall defend the state from treacherous elements in the shadows."
 KOR_navy: "Reborn Korean Navy"
 KOR_navy_desc: "Korea has a proud tradition of dominating the seas, one which we must reclaim lest another imperial power subjugate us into another generation of servitude. Our benevolent liberators have agreed to sell us a select number of cruisers and coastal defense ships to defend our beaches alongside agreeing to admit Korean NCOs into their prestigious naval academies in order to truly bring our tradition to the future. The late Admiral Yi would be proud of what we accomplished, though much work remains before the East Sea is truly under our control."
 KOR_airforce: "New Korean Air Force"
 KOR_airforce_desc: "Though our ancestors have a history of dominating land and sea, the domain of the skies remains under the control of imperialist powers. If we are to truly be free, this imbalance must be rectified by us. Our benevolent liberators have agreed to sell us a number of older liaison aircraft and fighters to launch a Korean Air Force, ready to conquer the skies. It will be a long time before our capabilities will match those of the west, but we must be ready to defend the lands of our ancestors on all flanks."
 KOR_office: "Korean General Plan Office"
 KOR_office_desc: "No longer subservient to a foreign army staff demanded by our lack of a state, our newly professionalising and expanding army demands a centralised General Plan Office to coordinate multi-branch activity and movement across the peninsula. A loyal General Plan Office will be established with direct connection to the President in order to ensure coordination between the civilian and military branches."
 KOR_bushido: "Emulating Bushido Spirit"
 KOR_bushido_desc: "In the long and difficult process of reestablishing ourselves as a nation, we must emphasise absolute loyalty to the nation in all aspects of military life. One must see their sacrifice of blood, heart, and soul in the battlefield as not an individual struggle, but as a collective struggle to protect the nation against those who seek to force us into betraying our values. We must be willing to commit our bodies and spirits to a series of codes and disciplines which separate us from those who wish to subjugate the lands of our ancestors again."
 KOR_lightning_war: "Mobility of the Korean Armed Forces"
 KOR_lightning_war_desc: "To meet the demands of a changing world, we must look towards adapting our doctrine to one focused on fast-paced warfare. Our generous liberators have been kind enough to share their knowledge on motorized and armored warfare in the hopes we may eventually develop a domestic armored industry capable of matching those of Japan and even Europe. Until then, we will seek to adapt these changes to our current armed forces in the hopes of a better future."
 KOR_eliteheer: "Korean Eliteheer"
 KOR_eliteheer_desc: "With the outbreak of the deadliest world war we have ever seen, our general staff has agreed we must follow our liberators in modernising our armed forces to meet the exponential growth in technological advances across all sectors of national defence. We must look towards the German Heer and the reforms made under the Beijing Government to develop a small, elite force of mobile forces equipped with modernised equipment. While we may need to table ambitions to match the so-called 80 division plan, our national defence demands the cultivating of an elite army capable of resisting all forms of imperialist aggression."
 KOR_whampoa_dynamic_modifier: "Korean Whampoa"
 KOR_whampoa_dynamic_modifier_desc: "Though many of our esteemed generals and officers were trained at Whampoa by our allies in China, we must not allow ourselves to become dependent on another foreign power. We have a duty to the motherland to construct a new Whampoa in Seoul, fostering new classes of patriotic cadets given both top-of-the-line military education and ideological training which moulds diverse patriotic sentiments into a unified brotherly consciousness focused on the revolutionary struggle of their ancestors for an independent motherland."
 KOR_loyalty: "Loyal Army"
 KOR_loyalty_desc: "Across the world, the greatest powers the world has ever seen have fallen victim to the autonomous desires of an army wishing to subordinate the state itself and its people to their wishes. While the KNA is crucial to the survival of our nation, we must remind them who they exist to serve. To ensure absolute civilian control over our nation, the KNA must be subordinated to the wishes of the President's office and the National Assembly."
 KOR_final_army_modifier: "The Modernised Terror of the East"
 KOR_final_army_modifier_desc: "For centuries upon centuries, the proud Joseon kingdom stood as a righteous pillar of morality and justice throughout Asia. Tragically, the great Korean state found itself consumed by the rising Empire of Japan, which would emerge as the dawning terror of Asia. Yet, history would see this monstrosity put down for good, and the Korean nation was once again freed. Yet, we knew not to rest on our laurels just yet, for in the tumultuous times in which we live in, or else the days of Japanese occupation would return.\n\nAnd so the people went to work on a grand project to forge a new mighty military that would ensure Korea's eternal independence. After years of hard work and incorporation of old and new ideas, the Korean military has emerged as a singularly deadly force. A synthesis of Japanese, Chinese, German, and Russian military developments, the Korean Armed Forces have become the new terror of Asia in the service of defending Korea's blessed freedom. Hanguk Manse!"

