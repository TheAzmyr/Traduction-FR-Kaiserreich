### Characters ###

 KOR_kim_koo: "Kim Koo"
 KOR_kim_koo_bio: "Towering over both his allies and opponents, Kim Koo is both the political embodiment of what remains of Korean nationalism while also the puppeteer behind countless cases of white terror. Born large, a young Kim Koo enlisted himself into the peasant armies in the Tonghak Movement, and as the Uprising scattered, he was rescued by An Taehoon, the father of the legendary An Junggeun, later assassin of Itō Hirobumi. In 1896 Kim would be arrested for murdering a Japanese merchant, believing him to be a military officer. After escaping, Kim turned away from politics,instead, he worked to establish schools with the help of churches. By 1905, however, outraged by the signing of the Japan-Korea treaty, Kim returned to the nationalist scene, befriending like-minded individuals who would become his comrades.\n\nWith the establishment of the Provisional Government of the Republic of Korea in Shanghai in 1925, Kim became one of its integral members, quickly establishing his position as the backbone of the Provisional Government, whether it be direct or indirect. Within his rise to power, Kim served as both a member of the Korean Provisional Congress and as the Chief of Policing, further solidifying his position. By 1923 he was appointed Provisional Interior Minister and in 1926 Prime Minister, before managing to oust Syngman Rhee from the Provisional Government in 1928. Eventually, Kim would found the Korean Independence Party in 1930, which would serve as his primary political vehicle."
 KOR_kim_koo_leader_desc: "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!\n§YBackground:§! §L$KOR_kim_koo_bio$\n\nFollowing the liberation of Korea, Kim and the KIP have returned to Korea, with a mandate to build a new republic from the ashes of Japanese colonization, and hopefully lead Korea to a bright future with a government representing the will of the people.§!"
 KOR_kim_koo_soccon_leader_desc: "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!\n§YBackground:§! §L$KOR_kim_koo_bio$\n\nAfter Korea was liberated, Kim and the KIP have won a true mandate of the people following the first free and fair democratic elections, despite initial fears that the KIP would resort to authoritarianism and persecute opposition parties. Now endowed with the trust of the Korean people, Kim Koo will continue to lead a stable and democratic Korean Republic, working to secure its independence forevermore.§!"
 KOR_kim_koo_autdem_leader_desc: "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!\n§YBackground:§! §L$KOR_kim_koo_bio$\n\nNow in charge of the new Korean Republic, Kim and the KIP have secured control over the country, instituting a government based on true Korean democracy, allowing the people to express their will while keeping the country safe from traitors and external threats. Under his leadership, Kim Koo will ensure that the Korean Republic will evolve into a strong, independent nation, rid of foreign-influenced and radical elements.§!"
 KOR_kim_koo_sic_desc: "§YBorn:§! §LAugust 29th, 1876, in Haeju, Hwanghae Province, Joseon§!"

 KOR_ahn_chang_ho: "Ahn Chang-ho"
 KOR_ahn_chang_ho_sic_desc: "§YBorn:§! §LNovember 9th, 1878, in Kangso County, Pyongan Province, Joseon§!"
 KOR_park_chan_ik: "Park Chan-ik"
 KOR_park_chan_ik_advisor_desc: "§YBorn:§! §LJanuary 2nd, 1884, in Gyeonggi Province, Joseon§!"
 KOR_cha_ri_seok: "Cha Ri-seok"
 KOR_cha_ri_seok_advisor_desc: "§YBorn:§! §LJuly 26th, 1881, in Pyongan Province, Joseon§!"

 KOR_yi_kang: "Yi Kang"
 KOR_yi_kang_leader_desc: "§YBorn:§! §LMarch 30th, 1877, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LBorn as the fifth son of Gojong through his concubine Lady Jang, Yi Kang became Prince Uihwa in 1892. Falling into lawsuits and debts after being wedded to Kim Deoksu, the prince became Korea's special ambassador to Japan in 1895 to partake in the Japanese victory celebrations over the Chinese in the First Sino-Japanese War. Having no issue of his own, he served as an ambassador to European countries and the United States, although his playboy lifestyle and profligate spending antagonised the Korean government. He participated in the Korean Red Cross from 1906 to 1907; however, when his father abdicated, his half-brother Prince Yi Un became crown prince due to his father's dislike of him.\n\nFollowing Japan's annexation of Korea in 1910, Yi Kang became increasingly dissatisfied with his status despite being provided with a generous annual allowance. When he heard the news of the Provisional Government of the Republic of Korea in 1928, he attempted to flee Korea to join the exiles. His escape was a failure, and despite Yi Kang's efforts to remove his titles, he effectively remained a political prisoner in Seoul. In 1930, he officially retired. Despite all this, his burning desire to see Korea independent never faded; he once remarked that he would rather be a peasant in an independent Korea than a noble under Japanese rule.\n\nWhen Korea was liberated after many decades of subjugation, Yi Kang was finally able to meet the Provisional Government that had been in exile for so long. To honour Korea's liberators preference for monarchy and acknowledge their newfound relationship, Yi Kang was almost unanimously declared as Emperor of a revived Empire of Korea, bypassing his brother Crown Prince Yi Un who had collaborated with the Japanese. He now bears the responsibility of carrying on the Empire of Korea's glorious legacy under the banner of a newly freed Korea.§!"

 KOR_kim_hong_il: "Kim Hong-il"
 KOR_kim_hong_il_high_command_desc: "§YBorn:§! §LSeptember 23rd, 1898, in Yongcheon, North Pyongan Province, Empire of Korea§!\n§YBackground:§! §LKim Hong-il's childhood shook with the blasts of cannons as the Russo-Japanese War began in his hometown. Soon the war ended and followed the collapse of the Empire of Korea under the Japanese jackboot, and Kim, who had seen the horrors of war and the fall of a nation at a very early age, began his struggle to fight for his country. After a turbulent youth travelling between Korea and China, eventually settling as a teacher, the Japanese police would catch up to Kim's footsteps. He ultimately fled to Manchuria, where his brother ran a business. In 1918 Kim would find himself in Shanghai, where he would meet Huang Jue, a fellow Anti-Japanese partisan, which would help Kim enrol himself as a cadet in the Guizhou Military Academy. Kim, who began his education with the rather abrupt misplacement of his weapon, was placed under the special tutoring of He Yingqin, who taught him well to the point where he would graduate with honours. After graduating, Kim would make his way to Shanghai in search of the Provisional Government of the Republic of Korea but would be shunned by its infighting sparked by the recent impeachment of Syngman Rhee. Later, Kim would have an on-and-off career as a mercenary and an educator between China, Manchuria, and the Russian Far East.\n\nWhile attending a funeral, Kim would meet Dr. Sun Yat-sen, who encouraged his cause for independence greatly. By the beginning of the Northern Expedition, Kim had joined the Kuomintang and began service as his old teacher, He Yingqin's adjutant. During the expedition, Kim would persuade Korean pilots from the Zhili armies to the KMT cause. By the end of the Northern Expedition, he would climb the ranks to become a general, although the fall of the KMT would make that achievement rather unnecessary. Kim would follow He back to Guizhou and later to Yunnan, where he became part of the remnants of the NRA loyal to Zhu Peide. In 1931 Kim re-establish contact with the Korean Provisional Government office in Shanghai and became one of the leaders of the Korean Liberation Army while also becoming one of the arms contacts of the PGROK.§!\n\n§YNotes: As a close aide and long time friend of He Yingqin, he is associated with the Kuomintang and Korean independence movement's right-wing.§!"

 KOR_kim_kyu_sik: "Kim Kyu-sik"
 KOR_kim_kyu_sik_leader_desc: "§YBorn:§! §LJanuary 29th, 1881, in Busan, Gyeongsang Province, Joseon§!\n§YBackground:§! §LSent to an orphanage run by American missionary Horace Grant Underwood at an early age, Kim Kyu-sik spent his youth learning Christianity and English. With the support of Underwood, Kim went to the United States in 1896, where, unlike in Korea, Kim was not ostracised for his background. Studying in the US, he received a bachelor's degree from Roanoke College in 1903, along with a master's degree in English literature from Princeton University the following year. When the Russo-Japanese War unfolded, Kim returned to Korea and rejoined Underwood, serving as his secretary and teaching at the local YMCA.\n\nAfter the 105-Man Incident in 1911, when the Japanese arrested Korean independence activists, many of whom were Christian, Kim fled to China in early 1913. Aside from attempting to raise funds for the Korean independence movement, Kim befriended Chinese revolutionaries such as Dr. Sun Yat-sen. When the Kuomintang's Northern Expedition collapsed, Kim followed the KMT into exile in Paris.  In 1932, Kim would be involved in the formation of the Korean National Revolutionary Party, leading its right-wing faction.\n\nWith the liberation of Korea under the Kuomintang's right wing, Kim has been selected to lead the new Korean sister republic. As a follower of Sun Yat-sen, Kim intends to remake the young nation anew, uniting all Koreans under the banner of National Revolution.§!"
 KOR_kim_kyu_sik_sic_desc: "§YBorn:§! §LJanuary 29th, 1881, in Busan, Gyeongsang Province, Joseon§!"

 KOR_lee_beom_seok: "Lee Beom-seok"
 KOR_lee_beom_seok_desc_body: "A descendant of Joseon royalty and son of a government official, young Lee Beom-seok was a bright but often mischievous personality. Beyond mischief, he soon harboured a desire for revenge against the Japanese occupiers in Korea when Jeong Tae-gyu, a freed nobi who had taken care of Lee, was murdered while resisting the disbandment of the Korean Army following the Japan-Korea Treaty of 1907. While attending Gyeongseong High School, Lee had poor grades and even poorer relations with his Japanese peers and teacher. With dwindling prospects and a growing flame inside him urging him to fight against the Japanese, he went into exile in China with the help of Lyuh Woon-hyung and joined the Korean diaspora in Shanghai.\n\nIn exile, Lee met Dr. Sun Yat-sen, who recommended him for entry into the Yunnan Military Academy. Graduating in 1919, he became an instructor for the Yunnan Military Academy before returning to Shanghai to join the Korean Liberation Army in 1925. Having witnessed the collapse of the Kuomintang's Northern Expedition and the failure of the 1932 Shanghai Uprising, Lee has grown ever more suspicious of left-wing elements. In time, he became a great admirer of the Romanian Prime Minister Corneliu Zelea Codreanu and the Russian Savinkovist movement - seeing them as inspiration for a strong and classless Korea."
 KOR_lee_beom_seok_commander_desc: "§YBorn:§! §LOctober 20th, 1900, in Hanseong, Gyeonggi Province, Empire of Korea§!\n§YBackground:§! §L$KOR_lee_beom_seok_desc_body$§!"
 KOR_lee_beom_seok_leader_desc: "§YBorn:§! §LOctober 20th, 1900, in Hanseong, Gyeonggi Province, Empire of Korea§!\n§YBackground:§! §L$KOR_lee_beom_seok_desc_body$\n\nWith independence finally achieved, Lee Beom-seok returned home to a free Korea. His distrust of left-wing elements within the KIP has led to the popularity of his followers, the Ilminists who advocate the “One People Principle” for the Korean nation. They believe in revolutionising and mobilising Korea into a militarised monoethnic classless society with extreme veneration for Kim Koo, the figurehead of the nation.§!"
 KOR_lee_beom_seok_sic_desc: "§YBorn:§! §LOctober 20th, 1900, in Hanseong, Gyeonggi Province, Empire of Korea§!"

 KOR_syngman_rhee: "Syngman Rhee"
 KOR_syngman_rhee_leader_desc: "§YBorn:§! §LMarch 26th, 1875, in Pyeongsan, Hwanghae Province, Joseon§!\n§YBackground:§! §LComing from a modest family in rural Korea, Syngman Rhee became involved in the Korean independence movement after being implicated in a revenge plot following the assassination of Queen Min. After several years of activity organising grassroots organisations, he was arrested in 1899 and tortured in captivity, before being released in 1904 at the outbreak of the Russo-Japanese War. Subsequently, Rhee moved to the United States, studying at Princeton and Harvard in the following years, whilst resuming efforts to support Korean independence.\n\nAs turmoil spread in 1925 with the collapse of the British Empire alongside the May 30th protests that swept eastern China, Korean independence activists rallied and founded the Provisional Government of the Republic of Korea in Shanghai, electing Syngman Rhee as their chairman. As chairman, he petitioned American delegates at the Shanghai Conference of 1928, hoping to receive political support for Korean independence. This plan failed, however, putting Rhee's leadership into question, leading to his ousting by Kim Koo, and resumption of exile back in America.\n\nFollowing the American occupation of Korea, Rhee finally returned to his homeland after decades of exile, subverting all expectations and becoming the leader of a new Korean government. Although others have fallen in line and supported his ascension, many remain cautious, as Rhee moves to secure his rule through all means necessary.§!"

 KOR_lee_gap_seong: "Lee Gap-seong"
 KOR_lee_gap_seong_sic_desc: "§YBorn:§! §LOctober 23rd, 1889, in Daegu, Gyeongsang Province, Joseon§!"

 KOR_ji_cheong_cheon: "Ji Cheong-cheon"
 KOR_ji_cheong_cheon_desc_body: "Graduating from Pai Chai Academy in 1906, Ji entered the Military Academy of the Empire of Korea as the country was on the brink of annexation by Japan. In 1909, the Japanese Resident-General abolished the Korean military, and the academy along with it. Ji eventually ended up in the Imperial Japanese Army Academy and graduated in 1914. In 1919, Ji deserted the Japanese Army and went into exile in Manchuria, becoming an instructor at the Sinhŭng Military Academy, a training facility for Korean independence fighters set up since 1911.\n\nIn 1921, following a victorious battle between Korean and Japanese units in Qingshanli, Ji closed down the academy and led his troops to Gando to avoid large-scale retaliation against Koreans by the Japanese. When the Korean Provisional Government was established in Shanghai in 1925, Ji helped in the creation of the Korean Liberation Army as its military wing. Although he was initially a member of the Korea Independence Party, strife between him and Kim Koo's faction caused Ji to leave the party and form the New Korea Independence Party."
 KOR_ji_cheong_cheon_army_chief_desc: "§YBorn:§! §LJanuary 25th, 1888, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §L$KOR_ji_cheong_cheon_desc_body$§!"
 KOR_ji_cheong_cheon_leader_desc: "§YBorn:§! §LJanuary 25th, 1888, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §L$KOR_ji_cheong_cheon_desc_body$\n\nAfter years of fighting and organising resistance against Japan, Ji now finds himself in charge of a newly independent Korea. Vaguely inspired by the Kuomintang's right wing, Ji has reorganised his NKIP into the Korean Nationalist Party, a new political force intent on rebuilding Korea through the true fulfilment of Sanmin Doctrine.§!"

 KOR_yeom_dong_jin: "Yeom Dong-jin"
 KOR_yeom_dong_jin_bio: "Not much is known about Yeom Dong-jin or his childhood, except for his graduation from Chunghwa Primary School and his subsequent enrolment in Sunrin Commercial School in Seoul in 1926. Graduating in 1931 at the age of 22, Yeom decided to devote himself to the cause of Korean independence and exiled himself to China. In Shanghai, he joined the Korean Liberation Army as a young cadet.\n\nBeing a part of Ji Cheong-cheon's faction within the Korean Provisional Government, Yeom aligned with Ji's adherence to Dr. Sun Yat-sen's Three Principles of the People. At the same time, Yeom holds disdain for socialist elements in the Korean independence movement, especially the Korean National Revolutionary Party and its leadership for fleeing to Paris.\n\nWith Korea liberated from Japanese occupation, Yeom returned to Korea and founded the White Shirts Society, a militant ultranationalist society inspired by the Blue Shirts Society in China."
 KOR_yeom_dong_jin_leader_desc: "§YBorn:§! §LFebruary 14th, 1909, in Pyongyang, South Pyongan Province, Empire of Korea§!\n§YBackground:§! §L$KOR_yeom_dong_jin_bio$ Now in charge of the country, Yeom seeks to rebuild the Korean nation, free from socialist filth and purged of traitors.§!"
 KOR_yeom_dong_jin_commander_desc: "§YBorn:§! §LFebruary 14th, 1909, in Pyongyang, South Pyongan Province, Empire of Korea§!\n§YBackground:§! §L$KOR_yeom_dong_jin_bio$§!"

 KOR_yu_chin_san: "Yu Chin-san"
 KOR_yu_chin_san_sic_desc: "§YBorn:§! §LOctober 18th, 1905, in Jinsan County, North Jeolla Province, Empire of Korea§!"

 KOR_kim_wonbong: "Kim Wonbong"
 KOR_kim_wonbong_commander_desc: "§YBorn:§! §LSeptember 28th, 1898, in Miryang, South Gyeongsang Province, Empire of Korea§!\n§YBackground:§! §LAfter he organised the Korean 'Heroic Corps' in Fengtian, Kim Wonbong led multiple attacks against Japanese personnel and outposts in the desperate struggle for Korean independence. Inspired by the Nationalist Chinese Government set up in Guangzhou, Kim enrolled himself into the Whampoa Military Academy in January 1926 to train a proper army against the Japanese. As the expedition came to a failure, Kim would move around continental China helping socialist and Korean nationalist movements organise themselves. After disassociating himself from the Third Internationale in 1931, Kim would contact his old friends in Whampoa to re-insert himself as an associated officer of the Kuomintang. As such, he decided to fully integrate himself, along with the remnants of the Heroic Corps, into the Left KMT, who would use his expertise in espionage from his time fighting for Korean independence while gaining access to further training of Korean cadets. In 1932 Kim organised the Korean National Revolutionary Party, acting as the sister organisation to the KMT within the also widely KMT-associated Korean Provisional Government, and as the opposition to its ruling party, the Korea Independence Party.§!\n\n§YNotes: Connected to almost all factions within the KMT to some degree, and to respect his position as a partner in pragmatism, Kim Wonbong is mostly above internal party politics.§!"
 KOR_kim_wonbong_leader_desc: "§YBorn:§! §LSeptember 28th, 1898, in Miryang, South Gyeongsang Province, Empire of Korea§!\n§YBackground:§! §LAfter disassociating himself from the Third Internationale in 1931, Kim would contact his old friends in Whampoa to re-insert himself as an associated officer of the Kuomintang, and later fully integrate himself, along with the remnants of the Heroic Corps, into the Left KMT, who would use his expertise in espionage from his time serving for righteous armies to their use, while he would gain access to further training of Korean cadets. In 1932 Kim organised the Korean National Revolutionary Party, acting as the sister organisation to the KMT within the also widely KMT-associated Korean Provisional Government, and as the opposition to its ruling party, the Korea Independence Party.\n\nA life in exile hardly deterred the patriotic Korean revolutionary Kim Wonbong from seeing the resurrection of a Korean nation in his lifetime. He has emerged as an energetic and passionate leader as shown in his leadership and courage in the National Revolutionary Army during the Second Northern Expedition and the war with Japan. While the road to a socialist and nationalist Korea remains in the future, Wonbong has finally achieved the dream of seeing his country liberated and free in his lifetime.§!"
 KOR_kim_wonbong_sic_desc: "§YBorn:§! §LSeptember 28th, 1898, in Miryang, South Gyeongsang Province, Empire of Korea§!"

 KOR_yoon_se_ju: "Yoon Se-ju"
 KOR_yoon_se_ju_sic_desc: "§YBorn:§! §LJune 24th, 1901, in Miryang, South Gyeongsang Province, Empire of Korea§!"

 KOR_pak_hon_yong: "Pak Hon-yong"
 KOR_pak_hon_yong_leader_desc: "§YBorn:§! §LMay 28th, 1900, in Yesan, South Chungcheong Province, Empire of Korea§!\n§YBackground:§! §LPak Hon-yong, born illegitimate son to an Yangban father, travelled to Seoul to seek study, and in the process became affiliated with nationalist thought. Forced into exile and a loyalist to a stateless nation, Pak went to foreign shores to find refuge. He settled in Europe, growing ideologically entangled with the rise of Syndicalism in France, Italy, and Britain. Profoundly affected by the revolutions he witnessed, Pak would be one of the first Koreans to be affiliated with the Third Internationale, and returned to Korea as an undercover agent to spread syndicalist ideals to the Japanese occupied peninsula. After a period of imprisonment and illness, Pak miraculously escaped the wrath of the Japanese forces and found his way back to Paris. There he involved himself deeply in the burgeoning Totalist movement, drawing himself close to Mosley and Mussolini's camps and finding common ground with their nationalistic tendencies. By 1931, Pak shuttled between Europe and Shanghai, where he could freely support both the struggle for independence and the struggle for syndicalism, initiating the publication of pro-syndicalist newspapers. The following year Pak condemned the Provisional Government for being too reactionary and excluding socialists thinkers. Having found a similarly minded backer, Pak firmly asserts himself as the champion of totalism in Korea, and the might of red rule has only begun.§!"

 KOR_yi_sung_yop: "Yi Sung-yop"
 KOR_yi_sung_yop_sic_desc: "§YBorn:§! §LFebruary 8th, 1905, in Bupyeong District, Gyeonggi Province, Empire of Korea§!"

 KOR_kim_tu_bong: "Kim Tu-bong"
 KOR_kim_tu_bong_leader_desc: "§YBorn:§! §LFebruary 16th, 1889, in Gijang, Gyeongsang Province, Joseon§!\n§YBackground:§! §LInitially active as a linguist of Korean, Kim would join the Korean independence movement in 1919, participating in the founding of the Provisional Government in Shanghai. During his stay there, Kim would be exposed to socialist ideas, and would soon become acquainted with the Left Kuomintang and Chinese syndicalists. With the liberation of Korea, Kim now heads the New People's Party, bringing together Korea's socialist movements under their firm leadership.§!"

 KOR_kim_mu_chong: "Kim Mu-chong"
 KOR_kim_mu_chong_commander_desc: "§YBorn:§! §LMay 16th, 1904, in Chongjin, North Hamgyeong Province, Empire of Korea§!\n§YBackground:§! §LBorn to a wealthy landowning family, Kim Mu-chong's first foray into revolutionary politics was in 1919 when he participated in the March 1st Movement. Ultimately expelled from school in 1922, over the next few years he became a socialist and fled to China to join the Baoding Military Academy as an artillery officer - where he would enter the employ of Governor Yan Xishan of Shanxi. But already enamoured by socialist ideology, in 1925 he joined the Chinese Syndicalist Party in Beijing and participated in the 1932 Shanghai Uprising. Rising through the ranks and close with prominent MinGan guerilla generals such Peng Dehuai, he played a role in helping organize their precious artillery.\n\nUpon the liberation of Korea under a Red Government, Kim Mu-chong was quickly catapulted to senior roles in the new Korean Army. One of the leaders of the so-called \"MinGan Faction\" of Korean socialists, they became the nucleus of the New People's Party. Short-tempered (and some have even described him as insidious), despite his time in China he is a notable proponent of Korean claims over Gando (Yanbian in Chinese), a region in Manchuria with a significant Korean immigrant population, arguing that \"Korea should obtain Gando as a reward for the bloodshed of the Korean army fighting in the Manchurian War.\"§!"

 KOR_kim_song_ju: "Kim Song-ju"
 KOR_kim_song_ju_army_chief_desc: "§YBorn:§! §LApril 15th, 1912, in Heijō, Chōsen, Empire of Japan§!\n§YBackground:§! §LBorn to a poor family of Christian converts, when he was a teenager his father took part in the 1919 March 1st Movement protesting Japanese occupation. Brutal Japanese repression forced his family to flee into Manchuria, though he was sent alone back to Korea to continue his studies for the next few years. His father died the following year and he finished his studies in China where he learned the Chinese language and also became acquainted with Marxist theory.\n\nHe joined a succession of anti-Japanese groups and his arrest in 1929 marked the end of his formal education and the beginning of his life as a guerilla. These insurgents were harshly suppressed by the Japanese-allied Fengtian Government of China and they joined forces with larger Chinese socialist rebel groups resisting both. Frequently on the run, Chinese rebel leadership began to grow suspicious of Koreans living in the area - believing they were likely to be Japanese collaborators. In 1933 they began to purge the hundreds of Korean socialists in their ranks. Kim was among those arrested in 1933 and exonerated in 1934, but managed to seize and burn the purge committee's files. The survivors of this so-called Minsaengdan incident rallied around Kim and he emerged as the leader of Korean socialists in Manchuria.\n\nStill a minor albeit popular guerilla commander, he was able to parlay his (perhaps exaggerated) exploits to emerge as a prominent officer in the new Korean Army.§!"

 KOR_choe_hyon: "Choe Hyon"
 KOR_choe_hyon_high_command_desc: "§YBorn:§! §LMay 6th, 1907, in Hunchun, Jilin Province, Great Qing§!\n§YBackground:§! §LChoe Hyon was born in China to ethnic Korean parents and became an anti-Japanese revolutionary at a young age under his parents' influence. Seven years of imprisonment by the Japanese failed to dissuade him and after his release in 1932 he joined a band of Korean guerillas operating out of Manchuria where he proved to be an effective guerilla commander. A major associate of Kim Song-ju, he returned with Kim to Korea after independence and has played a major role in their new army.§!"

 KOR_yi_geon: "Yi Geon"
 KOR_yi_geon_commander_desc: "§YBorn:§! §LOctober 28, 1909, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LThe illegitimate son of Prince Yi Kang and a concubine, Yi was born Yong-gil but changed his name to Geon in 1924. He was not included as one of the eight members of the royal family during the Meiji Emperor's 1910 decree and his younger brother assumed the palace of Unhyeon in 1917 after being adopted, but Yi nevertheless retained considerable status. He went to Japan in 1918 for his studies and was given the title of Ducal Prince and recognised as a member of the royal family in 1926.\n\nThat year, he entered the Japanese Military Academy, where he would graduate in 1930. He married a Japanese noblewoman in 1931 and was commissioned as a cavalry officer in the Imperial Japanese Army (IJA) where he served primarily as an instructor. A colonel in the IJA before liberation, the restoration of the Korean monarchy has allowed him to assume a more senior role in the new military.§!"

 KOR_yi_un: "Yi Un"
 KOR_yi_un_high_command_desc: "§YBorn:§! §LOctober 20th, 1897, in Hanseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LBorn into the family of Joseon royalty as the seventh son of Gojong, the Gwangmu Emperor, Yi Un hardly knew what it was like to be King of Korea. Anointed as Crown Prince in 1907, he was taken at the age of ten to Japan at the initiative of Ito Hibroumi. Here, the Japanese Emperor Meiji took a particular liking and attention to the young Korean prince. The prince grew up with Japanese nobility, such as the princes Hirohito, Takamatsu, and Chichibu. However, after Ito's assassination in 1909, the Meiji Emperor stopped seeing Yi Un, and the Korean prince became a captive in his adopted country.\n\nFrom 1911-to 1924, Yi Un served in the Imperial Japanese Army (IJA) despite his short stature after enrolling in the Army Central Youth School. From 1927-to 1928, the prince decided to see the world outside Japan and Korea. He thus embarked on a voyage to Europe, visiting the syndicalist capitals of London and Paris and visiting the German and Austrian Empires before returning to Japan in late 1928.\n\nAfter he returned, he continued to serve in the IJA in various facilities, primarily in training roles but with a few command roles as well. He was also briefly assigned as an air force commander. During the recent conflict, he began to feel the need to preserve Korean culture and worked to obtain records containing folk songs, folk art, and other artifacts.§!"

 KOR_hong_sa_ik: "Hong Sa-ik"
 KOR_hong_sa_ik_army_chief_desc: "§YBorn:§! §LMarch 4th, 1889, in Anseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LA member of the Namyang Hong Clan, Hong was born to a gentry background. He entered a Korean military academy in 1905 but after it was dissolved in 1909 he continued his studies in Japan along with then Korean Crown Prince Yi Un. When Japan formally annexed Korea in 1910, many other students either left in protest or followed Ji Cheong-cheon in finishing their studies first and then leaving to join Korean resistance efforts. Hong however avoided associating with either group despite remaining personally friends with and funding Ji's efforts, commissioning as an officer in the Imperial Japanese Army.\n\nDespite pressure to change his name to a more Japanese-style name, Hong retained his surname. This did not prevent him from rising through the ranks where he became a general - primarily serving in China.§!"

 KOR_yi_u: "Yi U"
 KOR_yi_u_commander_desc: "§YBorn:§! §LMarch 4th, 1889, in Anseong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LThe second son (and first legitimate son) of Prince Yi ang, Yi U was adopted to be the heir of Prince Yeongseon when he was five. Shortly afterwards he was sent to Japan to be educated along with other senior members of the Japanese and Korean nobility. He served in the Imperial Japanese Army and he primarily served in staff roles.\n\nDespite this, he retained his Korean identity and became the favorite son of his father who became known for his pro-independence activism. Yi U also notably married a Korean noblewoman. With his father's ascension to the restored Korean throne, Yi U was soon recognised as Crown Prince.§!"

