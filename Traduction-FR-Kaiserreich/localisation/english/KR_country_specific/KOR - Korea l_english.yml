 KOR_sohn_won_yil: "Sohn Won-yil"
 KOR_sohn_won_yil_navy_chief_desc: "§YBorn:§! §LJune 22nd, 1909, in Hanseong, Gyeonggi Province, Empire of Korea§!\n§YBackground:§! §LBorn to pastor Sohn Jung-do, Sohn Won-yil was tortured by the Japanese during their occupation and thus fled with his family to Shanghai. His father became a member of the exiled Provisional Government while he studied medicine. Inspired by the great ships he saw there, he vowed that \"our seas must be protected by our own hands.\"\n\nHe began to study navigation and joined the Chinese navy who sent him to study in Germany. Attempting to return to Korea in 1930, he was arrested by the Japanese and imprisoned. Afterwards from 1935 until liberation he made a fortune in business as a merchant mariner working in Japanese occupied Korea and in Shanghai.\n\nAfter liberation the civilian Sohn used his fortune to establish the Liberation Corps, which became the foundation of the Korean navy. He has played a major role in establishing a new Naval Academy and Marine Corps (though allegedly failed to attend their founding ceremony).§!"

 KOR_kim_suk_won: "Kim Suk-won"
 KOR_kim_suk_won_high_command_desc: "§YBorn:§! §LSeptember 29th, 1893, in Hanseong, Gyeonggi Province, Joseon§!"

 KOR_choi_yong_duk: "Choi Yong-duk"
 KOR_choi_yong_duk_air_chief_desc: "§YBorn:§! §LSeptember 19th, 1898, in Seongbuk-dong, Hanseong, Gyeonggi Province, Empire of Korea§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LBorn in Korea, Choi Yong-duk would find himself studying at Beijing Huiwen Middle School in 1913, later returning to his homeland (under Japanese colonial rule) to complete his studies at Chongsil Middle School in Pyongyang. After completing his studies, Choi return to China to enrol in the Nanyuan Military Academy under Duan Qirui, graduating in 1916. Afterwards he served in the Second Army of the Beiyang Government.\n\nIn 1919 Choi became a supporter of the March 1st Movement, and began to cultivate his own Korean Independence loyalties. Participating in the Provisional Government of the Republic of Korea. In 1920 he was recommended by Seo Wal-bo, the first Korean pilot and fellow independence advocate, to study flying at the Baoding Aviation School. In 1924, he joined Wu Peifu's aviation team to participate in the Second ZhiFeng War. Reportedly, during the war, it was once mistakenly reported that Choi had died in battle, but nonetheless he survived, and was folded into Feng Yuxiang's army alongside all other Baoding cadets.\n\nGraduating in 1925, Choi would be assigned to the 2nd Air Force of the Guominjun, before being transferred to Wu Peifu upon his reconquest. Fighting in the Northern Expedition, Choi would see service in the latter ZhiFeng wars, being appointed deputy commander of the First Air Force for his service. Slowly rising up the ranks, Choi has now become an instructor at Nanjing's Air Force Academy, and as of 1935 serves as an Air Force Major.§!"

 KOR_lee_eung_jun: "Lee Eung-jun"
 KOR_lee_eung_jun_army_chief_desc: "§YBorn:§! §LAugust 12th, 1890, in Anju, Pyongan Province, Joseon§!"

 KOR_lyuh_woon_hyung: "Lyuh Woon-hyung"
 KOR_lyuh_woon_hyung_leader_desc: "§YBorn:§! §LMay 25th, 1886, in Yangpyeong, Gyeonggi Province, Joseon§!\n§YBackground:§! §LNot all Korean nationalists affiliated themselves with the Provisional Government, and Lyuh Woon-hyung, once the Foreign Minister for the PGROK, is one of them. As foreign minister, Lyuh often found himself in opposition with the dominant factions. Following a decision by the Provisional Government to eventually give preferential treatment to the former Imperial Family, Lyuh resigned and went his own way. After that, he sought new contacts in the Third Internationale and then the Kuomintang, before turning away thanks to the failure of the Northern Expedition. After a tour of Southeast Asia fighting along local nationalists against their colonial overlords, Lyuh was eventually captured during a football match in Shanghai, where Japanese authorities extradited him to Japan. After a short period of imprisonment Lyuh would return to the stage as the head of the Joongang Newspaper Company, one of three leading Korean newspapers that remained in circulation, continuously criticising Japanese rule over Korea.\n\nFollowing the liberation of Korea, Lyuh Woon-hyung founded the Labouring People's Party, which quickly became the champion of the democratic left. Having achieved victory in the first Korean elections, Lyuh has promised to strengthen Korean democracy and protect the rights of the workers and peasants of Korea, achieving an equal, democratic government that benefits all Koreans.§!"

 KOR_yi_yong: "Yi Yong"
 KOR_yi_yong_sic_desc: "§YBorn:§! §LApril 7th, 1888, in Bukcheong, South Hamgyong Province, Joseon§!"

 KOR_yun_chi_young: "Yun Chi-young"
 KOR_yun_chi_young_leader_desc: "§YBorn:§! §LFebruary 10th, 1898, in Hanseong, Gyeonggi Province, Empire of Korea§!\n§YBackground:§! §LBorn into a wealthy family, Yun was enrolled at the YMCA Christian Youth School, where he would study under Syngman Rhee. Fascinated by the latter, Yun would become an ardent follower of Rhee, dedicating himself to the independence movement in 1916. Yun would spend the next few years studying in Japan, continuing his activities with the local Korean community, supporting the Provisional Government when it was founded in 1919. After a short return to Korea, Yun would travel back and forth between Korea and Hawaii, where Syngman Rhee resided, before permanently joining him there in 1924. In the United States Yun would receive further education in George Washington University, and continued to be active under Rhee in raising support for and organising the cause of Korean independence, even after Rhee's ouster from the Provisional Government in 1928. Eventually, Yun would return alone to Korea in 1935, where shortly after he was arrested and tortured by Japanese authorities, before eventually being released.\n\nAfter the return of the Provisional Government to Korea, Yun Chi-young realigned himself with Sin Ik-hui and Ji Cheong-cheon of the Korean Liberation Army, together founding the Tridemist-inspired Korea Nationalist Party. Having won the first Korean elections, Yun has declared that he will govern under an adaptation of the Three Principles, bringing about a modern, democratic Korean nation.§!"
 KOR_yun_chi_young_advisor_desc: "§YBorn:§! §LFebruary 10th, 1898, in Hanseong, Gyeonggi Province, Empire of Korea§!"

 KOR_shin_ik_hui: "Shin Ik-hui"
 KOR_shin_ik_hui_sic_desc: "§YBorn:§! §LJune 9th, 1894, in Gwangju, Gyeonggi Province, Joseon§!"
 KOR_yoon_ki_seop: "Yoon Ki-seop"
 KOR_yoon_ki_seop_advisor_desc: "§YBorn:§! §LApril 4th, 1887, in Hanseong, Gyeonggi Province, Joseon§!"

 KOR_jo_so_ang: "Jo So-ang"
 KOR_jo_so_ang_sic_desc: "§YBorn:§! §LApril 30th, 1887, in Wollong-myeon, Gyeonggi Province, Joseon§!\n§YBackground:§! §LJo So-ang, alumni of Sungkyunkwan, was selected by the Korean Imperial government to represent his country on an educational trip to Japan. Upon arriving, he encountered immense prejudice against his countrymen, and there began his long struggle to achieve his nation's independence. Jo would enrol into Meiji University as a law student but soon be shocked by the news of the annexation of Korea. After a long period of suffering from anxiety and depression, Jo would travel to Shanghai in an attempt to evade the spying eyes of the Japanese authorities. There, he would cross paths with the Korean officials who would later become the backbone of the Provisional Government of the Republic of Korea. Upon finishing his education, he settled in China for good. When the May 30th Movement shook eastern China, Jo quickly travelled to Shanghai, where he would meet up with his comrades and friends, who united together to form the Provisional Government. The year 1928 saw Jo, along with his two comrades, Kim Kyu-sik and Lyuh Woon-hong, arriving in the Shanghai Conference as the delegates of Syngman Rhee. Returning with what would be Rhee's downfall, Jo took the initiative to meet up with and participate in the KIP. Once the KNRP was established, Jo would again side differently now with Kim Wonbong. Kim, an ardent believer in the three principles of the people, welcomed Jo and his draft of Samgyunism, a Koreanised version of the principles that Kim was willing to accept to distance his party as a mere Kuomintang puppet. Jo now stands independent away from both reactionary bickering and Sinophilic socialists, trying his best to light a beacon of liberalism so his now finally independent motherland may sail soundly against the tide of history.§!"

 KOR_chough_pyung_ok: "Chough Pyung-ok"
 KOR_chough_pyung_ok_advisor_desc: "§YBorn:§! §LMay 21st, 1894, in Cheonan, Chungcheong Province, Joseon§!"

 KOR_song_jin_woo: "Song Jin-woo"
 KOR_song_jin_woo_leader_desc: "§YBorn:§! §LMay 8th 1889, in Damyang, South Jeolla Province, Joseon§!\n§YBackground:§! §LSong Jin-woo was studying in Japan along with Kim Seong-su when news broke out that Korea was formally annexed into the Japanese Empire. Returning home briefly, they continued their studies at Meiji University the following year where they began to organise Korean exchange students and found a student magazine. In 1916 the two headed the Choongang School which became a nexus for the March 1st Movement in 1919. Song was imprisoned but released after a year and a half. He then became a nationalist journalist and continued to work for the Korean Independence cause through various newspapers and emigre associations. He continued this work across the 1920s and 1930s and was imprisoned again, which forced him to become a recluse (ostensibly due to illness) as his publication Dong-a Ilbo was suppressed by Japanese authorities .\n\nAfter the establishment of a free Korea, Song emerged from his isolation as one of the most prominent men. Suspicious of Lyuh Woon-hyung and the left, he became the leader of the conservative Korea Democratic Party.§!"

 KOR_chang_myon: "Chang Myon"
 KOR_chang_myon_sic_desc: "§YBorn:§! §LAugust 28th, 1899, in Hanseong, Gyeonggi Province, Empire of Korea§!"

